<p class="p">ЧАСТЬ ПЕРВАЯ</p>
</div><p class="subtitle">— 1 —</p><p class="p1">Когда в октябре 1940 года Мишу Гвирцмана исключили из института, у него появилось много свободного времени.</p><p class="p1">Как им распорядиться, Миша не знал. Оставаться дома было немыслимо, вздохи матери доводили его до белой, буйной, несправедливой ярости. Он еле удержал ее от похода к ректору, от заявления с признанием собственной вины, — и она притихла, но не успокоилась, нет. Особенно ужасны были ежечасные предложения что-то съесть, подкладывание вкусненького. Впрочем, вечернее покашливанье отца и нарочито-бодрые разговоры о чем попало, чаще всего о газетных новостях, были ничуть не лучше. Не мог оставаться дома, первое время просто шлялся по городу, благо сентябрь был теплый, почти летний, и ноги сами уводили как можно дальше от Сокольников, чтобы ни-ни-ни, не встретить человека из института. Никто ему не попадался, не звонил, не предлагал повидаться: для одних он был зачумленный, другие чувствовали себя виноватыми. Он допускал, впрочем, что некоторые радовались, но вряд ли многие.</p><p class="p1">Большая часть времени уходила на то, чтобы закрасить настоящие воспоминания и выдумать новые, врастить их в картину мира. Он полагал себя в академическом отпуске. Сказал же ему Евсевич, вполголоса, еще и подмигнув: ничего, придете через полгода, все забудется, восстановитесь. Если бы еще прошлой весной кто-то посмел ему намекнуть, что он будет утешаться подмигиваньем Евсевича, приспособленца, вечно висевшего на волоске, в страхе изгнания, а все-таки бессмертного! Раз в семестр Евсевич менял свою концепцию истории русской критики, которую преподавал блекло, полушепотом, а когда-то считался эффектнейшим лектором Москвы, и держали его, кажется, лишь затем, чтобы показать результаты перековки. Непонятно только, был это дурной пример или хороший. Вот что будет с тем, кто перековался, — или с тем, кто в душе остался не наш! Евсевич, безусловно, был не наш. Наш не может быть таким. И теперь, когда Евсевич возле деканата наклонился к нему воровато и полушепотом пожалел, Миша Гвирцман был себе вдвойне отвратителен.</p><p class="p1">Некто хотел изнасиловать женщину, но не смог. Кто-то шел мимо, или иначе помешали, или просто, бывает, не получилось. Она, однако, подняла шум, и его посадили. Он отсидел, вышел и изнасиловал ее, потому что иначе было обидно. Такой сюжет. Миша не знал, прочитал его где-то или придумал. Валя из его мыслей была изгнана начисто и пребывала в изгнании, пока он не понял, что обдумывание планов мести способно пролить на рану хоть сколько-то бальзама, пусть и второсортного. Планы мести были троякие. Первый, откровенно детский: он многого достигал и торжествующе, презрительно шел мимо. Из серии «Тогда она поняла». Желание славы, раз уже испытанное в истории с Леной М. Он читал на пушкинском вечере «Воспоминания в Царском Селе», был вылитый Пушкин, в качестве Державина присутствовал умиленный Сельвинский, но… месть не удалась. Он счастлив был позволением проводить Лену два раза — и все. Но теперь-то уж, конечно, мы не дрогнем.</p><p class="p1">Второй был взрослей, решительней: он реабилитировался, вся история забывалась как мелкая неприятность — у кого их не было? — и от него зависело ее трудоустройство или карьера, и Валя получала такой от ворот поворот, какого не делал в Сокольниках любимый трамвай 4а.</p><p class="p1">Третий был самый странный, он не ждал от себя ничего подобного: нравилось представлять ее повешенной или подвергаемой пыткам, какими франкисты пытались сломить испанских коммунистов, попавших к ним в лапы. Мечты и даже сны такого рода вызывали кратковременное облегчение и жгучий стыд.</p><p class="p1">Вообще же — к черту, все к черту! Когда он, бледный, но гордый, выходил из института после собрания, без слез, естественно, однако дергалось веко, — его нагнал Игорь: брось, ничего страшного, никто не верит, все это не всерьез. Миша тогда остановился и чеканно переспросил: не верит? Почему же ни одна сво… ни один… не раскрыл рта? Почему воздержался только ты, и не против, заметь, а воздержался? Но ты же понимаешь, старик… Я не старик, огрызнулся он тогда, это ты старик, и все вы старики. Вообще держался вроде бы не самым стыдным образом. На следующий день к нему пришел Полетаев — странный человек, кое-чего повидавший. Мише Полетаев всегда нравился, хотя говорили о нем разное. Он был, говорят, в ссылке. Марина сказала, что от него буквально пахнет ватником. Ей-то откуда знать, как пахнет ватник? Полетаев однажды похвалил его стихи, вообще, кажется, был к нему сдержанно расположен. Он был у Миши на дне рождения, восемнадцатом, самом счастливом — знать бы тогда! Нет, лучше, конечно, не знать. Просидел три часа молча. Так что запомнил, где Миша живет, и пришел без звонка, хорошо, что застал. Вышли пройтись. Полетаев некоторое время молчал, потом сказал: не могу ничем тебя утешить, да тебе и не нужно (Миша гордо кивнул), и вообще не старайся себе внушить, что ничего особенного не произошло. Безусловно, произошло. Но, во-первых, поэту нужна судьба, и теперь ты будешь писать иначе. Я всегда, сказал Полетаев, догадывался, что тебе не хватает именно толчка. Сколько можно писать о Жанне д’Арк? Теперь будет внутренний опыт, и все, что ты напишешь, будет уже не детское. Ни в коем случае не надо прятаться. Надо принять, пережить и превратить в лирику. А во-вторых, ты этого хотел, Жорж Данден. Очень многие страдают без вины, что и некрасиво, и унизительно. Ты же можешь сказать, что пострадал из-за любви, и это лучше, чем огрести просто так. Но пойми, сказал Миша, ведь ничего не было. Не было, так будет, загадочно сказал Полетаев. А я, добавил он, думаю сам уйти — этот институт совсем не то, что надо, просто обидно уходить на ровном месте. Я уйду так, чтобы вышла польза. Ну, ладно, мне направо — и исчез, как явился, внезапно.</p><p class="p1">Катя не решилась прийти, но написала. Писала она, что про Валю всем давно понятно, и что она то, конечно, с самого начала понимала, что Миша не такой и ничего не могло быть. Все про это говорят, и вокруг Вали образовался как бы колокол, из которого высосали воздух. Этот физический опыт из учебника Перышкина знали все. Ужасней всего — нет, противней всего, потому что ужасное происходило сейчас с Мишей, — противней всего было то, что Катя приложила к письму стихи, и по стихам было понятно, какая она некрасивая, с прыщавеньким лбом. Стихи были с отвратительной рифмой «дым из труб» — «на ветру», и почерк ее был школьный. Его жалели только люди вроде Евсевича и девушки вроде Кати, чье тихое обожание он принимал с откровенной брезгливостью. Вызывать сострадание у тех, кого презираешь, — что хуже? Он записал эту мысль в дневник, который теперь убрал из ящика стола и спрятал как следует.</p><p class="subtitle">— 2 —</p><p class="p1">Что, собственно, случилось? Прежде чем мысленно переписывать прошлое, его надо было по крайней мере уяснить; назвать вещи своими именами, чтобы придумать эти имена заново. Назовем же: его все-таки не стали исключать из комсомола. Если бы исключили, это означало бы куда более серьезные последствия. Тут и отца погнали бы с работы, и вообще могло быть что угодно. Но по комсомольской части объявили выговор, и на этом все закончилось. Да и что, по самому строгому счету, могли ему инкриминировать? Изнасиловал? Смешно. Поцеловал? И этого не было — скользнул губами, и только потому, что явно заигрывала сама. Но он, конечно, не сказал об этом ни слова. Все было рыцарственно. По большому счету, ему не в чем себя упрекнуть. И если она затеяла всю эту историю, то лишь для того, чтобы избежать соблазна. Так у них могло что-то быть, он чувствовал. А после того, как она написала заявление, — все отрезано, и она опять звезда факультета, невенчанная вдова героя, столп чистоты. Интересно, до пятого курса проходит так? Не может быть, выгонят с третьего. Сказал же ей Толкачев на майской сессии: ответ, конечно, малоудовлетворительный, но в связи с исключительными обстоятельствами… Остальные про обстоятельства не сказали, но было ясно.</p><p class="p1">Итак. Пойдем с начала, с самого начала. Он увидел ее при подаче документов, но не уверен сейчас, она ли это была. Любовь всегда присылает вестниц. Тогда, оставляя свои грамоты и папку со стихами, он заметил ее взгляд — как бы иронический и при этом сразу сдающийся, долгий. И обязательное подталкивание подружки локтем, и сдержанный хихикс. Он прошел мимо не удостоив — еще в девятом классе привык, что звали то Пушкиным, как после того вечера, то Байроном, когда Нонна Ивановна прочла им Байрона. Шел и сам чувствовал, как хорош, — несмотря на малый рост, из-за которого никогда не страдал, всегда гордился. Важен не рост, а соразмерность. У него был рост Лермонтова, совсем немного не дотянул он до Гёте.</p><p class="p1">На вступительных испытаниях они с Валей пересечься не могли, потому что Миша, почти отличник (подгадила геометрия), поступал после легкого, символического собеседования, на которое и шел как на праздник. Праздник, как и аттестат, был подпорчен — собеседование у него принимал Ларин, доцент, тихий, стройный, всегда улыбающийся. Миша, пожалуй, заигрался: белая рубашка с открытым воротом, блеск глаз, несколько наигранная пылкость — он думал выехать на одном обаянии, но это не прошло. Теперь, наверное, он предпочел бы экзамены, потому что нынешняя катастрофа прислала вестника еще на собеседовании. На всю природу, казалось, наползла тень, даже сияющий июньский день поблек за окнами, когда Ларин, вдруг перестав улыбаться или, точней, начав улыбаться совсем по-змеиному, вдруг сказал: ладно, ваши знания весьма поверхностны, вы, так сказать, нахватаны, поговорим теперь серьезно. Миша понял, что Ларин его не полюбил, а ведь все, что Миша делал и говорил раньше, было рассчитано именно на любящих. Он отвык от другой среды. Когда-то, класса до седьмого, в прежней, тридцать третьей школе его не любили, но он постарался это забыть, изжить. Ларина можно понять: он увидел перед собой — думал теперь Миша — удачливого мальчика, мысленно уже поступившего, вступившего на легкую дорогу (рассказывали о ларинском блистательном начале, которое в двадцать восьмом году вдруг подкосили при темных обстоятельствах, он в чем-то был замешан, — и с тех пор его высшим наслаждением было низвергать счастливцев). Что же, сейчас мы этого удачника… «Теперь серьезно. Вы сказали, что романтики видели воплощение своих идеалов в фигуре Наполеона. Это спорно, однако примем на веру. Отчего же „столбик с куклою чугунной“ вызывает такую иронию у Татьяны, и в какой момент у Пушкина наметился скепсис в отношении Наполеона?» Миша понес невразумительную чушь о том, что в Татьяне говорит оскорбленная любовь, отвергнутое девичье признание, — а надо было, конечно, говорить о том, что «Евгений Онегин» был первой ласточкой русского реализма, что для реалиста Наполеон лишь самовлюбленный убийца, процитировать «Мы все глядим в Наполеоны; двуногих тварей миллионы для нас орудие одно», и уж он набрал бы цитат, потому что «Онегина» знал наизусть, выучил без малейших усилий к пушкинскому году; но не нашелся, и Ларин его прервал: «Так-с. Этого вы не знаете. Чем вы объясняете, что роман Пушкина называется „Капитанская дочка“, тогда как Маша Миронов — а далеко не главный персонаж?» Мишу подмывало рассказать свою теорию про скрытую пружину действия — но пришла спасительная мысль: «Для Пушкина, — сказал он с отчаянной дерзостью, — вообще характерно давать название вещи как бы по касательной. „Медный всадник“ не про „Медного всадника“, „Золотой петушок“ не про петушка: они лишь символы. И капитанская дочка — лишь символ чистоты и чести». Ларин хмыкнул. «А Дубровский»? — спросил он, улыбаясь уже не столь змеино. «А название „Дубровский“ было дано при публикации Жуковским», — отчеканил Миша с сознанием трудно добытой победы. Ларин покачал головой, усмехнулся и спросил что-то вовсе уж простое про Мопассана. Мопассана от Миши никогда не прятали, и он с легкостью пустился рассказывать о деградации художника, отравленного общественным разложением. «Мопассан как настоящий парижанин…» — начал он. Ларин поднял бровь. «Парижанин? Он был нормандец». — «Но жил и умер в Париже», — парировал Миша. «Он умер в Пасси, в лечебнице. И вот так у вас все, понимаете? Все поверхностно, приблизительно. С этим багажом можно было считаться эрудитом в школе, но в институте, тем более в таком… Хорошо, собеседование вы прошли. Но расслабляться, Гвирцман, — расслабляться я вам не советую».</p><p class="p1">И он не расслабился, хотя вечером отец повел их с матерью и с дядей Леней в открытое кафе в Парке культуры, где пили слабое сладкое вино, и ели мороженое, и отец провозглашал смешные неловкие тосты. Миша сидел скромный и строгий. Он сказал только: спасибо, дорогие параны — parents, родители, — но я понимаю, как мало еще умею и знаю. Вообще об успехах говорить рано. Правда, уже следующим утром его затопило такое счастье — поступил, и лето впереди, и он так прекрасно нашелся насчет Дубровского, — что предчувствие померкло, а ведь Ларин тоже был вестник. Но Миша, что греха таить, был уверен, что счастливцев срезают всегда, просто чтобы не заносились, так что отнестись к этому следовало с благодарностью, словно к экзамену на смирение. Задавак ненавидел он сам. И он все забыл, вытравил, а в середине сентября — занятия начинались десятого — увидел Валю. Он долго на нее смотрел, и она почувствовала этот взгляд, и ответила, но небрежно, без интереса. Он понял, что случилось непоправимое. В отличие от счастливой тройки отличников, прошедшей собеседование: он, скучный Ваня Карцев и неприятная, прилипчивая Катя — они все сдавали экзамены и успели сдружиться. Валя училась теперь в одной группе с Николаем Тузеевым, по его личной просьбе. На общих лекциях она сидела только с ним, но иногда Миша ловил ее взгляд, словно говорящий: а вот оно как. А тебе шиш.</p><p class="p1">Ну, что делать. Тузеев прибыл из Сталинграда, где его отец работал начальником цеха на тракторном и где сам он успел год отработать после школы. Заочно учился в педагогическом, писал стихи, печатался в газете «Искра индустрии». Кстати и некстати подчеркивал, что на очное не стал поступать сознательно, решил попробовать жизни. Напробовался быстро, почти сразу оказался в рабкорах, потом, как молодой и перспективный, получил направление в ИФЛИ. Почему человек, который прочел, допустим, всего Бальзака, хуже знает жизнь, чем другой человек, проездивший год по сталинградским командировкам и писавший о том, как сельские школы готовятся к учебному году? На собрании припомнили — Никитин, кстати, настолько уже явная сволочь, что угадывалась за этим сознательная жажда падения, поиск вдохновения на дне, за отсутствием абсента и сифилиса, — припомнили, что Миша смеялся при обсуждении стихов Тузеева. Ну да, смеялся. Вот Ширшов сидел с каменным лицом, еще более смешным, чем стихи Тузеева, Катя закрыла лицо руками. Умная Катя. Что ему стоило тоже закрыть лицо руками на стихотворении, скажем, про утреннюю степь, в которой так хорошо, что не может он стерпеть, — такая рифма на «степь». Миша представил, как именно «не может», но дальше было даже лучше, потому что поэт хотел бы, конечно, любоваться степью, но у него много дел, и все срочные. И Миша, надменный Миша, переглядывался с остальными участниками андреевского семинара, но Андреев покосился неодобрительно, и прочие не поддержали веселья. Тузеев после обсуждения, на удивление снисходительного, сказал, глядя в свои листки: вообще, конечно, я понимаю, что для некоторых… которые знают жизнь из дачного окна… это все несколько коряво, шершаво, занозисто. Но сказал же наш сталинградский поэт, он же рабочий, стихи пишет в свободное, тэ-скэть, время: и будет пусть в стихе заноза! Миша хотел тогда сказать — и, может, лучше бы сказал, откровенность искупает многое: дорогой товарищ, не надо хвалиться занозами! Мозолями! У нас дачи нет, но мы ее однажды снимали, и мне пожилой садовод там объяснил: если у вас мозоли от лопаты, вы просто ее неправильно держите! Так же, думаю, и с занозами. И не надо выхваляться корявостью стиха — не станешь же ты хвалить коряво сделанный трактор, если брать область, которая тебе ближе. Но он ничего не сказал и, что всего ужаснее, жарко покраснел.</p><p class="p1">Тузееву удивительно везло, словно пружина сжималась или рогатка натягивалась, дабы выстрелить последним и главным невезением в первом же бою. Его боялись трогать, напечатали в «Красной нови» в подборке лучших студентов, с хвалебным предисловием Андреева (у Миши взяли сначала балладу, но по темным причинам она вылетела из верстки, да он и не верил, что напечатают); на семинарах, какую он чушь ни ляпни, обязательно со ссылкой на своих пролетарских философов, всю жизнь отработавших на тракторном, но в свободное, тэ-скэть, время… — преподаватели усиленно кивали, и даже Коробкина, на которую уж подлинно было не угодить, сказала, тряся седой головенкой: многие зубрят, а Тузеев мыслит! И кто бы ждал — Боря, непреклонный Боря, не хваливший никого, и у Маяковского находивший слабости, сказал на одной из прогулок по Тверскому, глядя, однако, в сторону: конечно, Тузеев есть Тузеев, но все-таки, как угодно, никто не обещал, что пролетарская поэзия начнется с Бодлера или хоть с Некрасова. Тузеев — первые попытки, у него появляются даже метафоры, «зеленый, снежный ком луны». Боже мой, если снежный, то отчего зеленый?! Да, кивнул Борис, мы можем лучше, но за каждым из нас стоит известная культура, а за Тузеевым — ничего. И хотел Миша возразить, что за Тузеевым стоит папа-начцеха, а это серьезней любой культуры, — но смолчал, потому что, назовем вещи своими именами, боялся Бориса. Борис был вожак, негласный инспектор молодой поэзии, человек прямой и храбрый, столь храбрый, что на то собрание не пришел, сказался больным, и, когда — опять отводя глаза — сказал Мише неделю спустя, что тактически правильного решения в ситуации не было, Миша очень прямо ему ответил: Боречка, ты всегда теперь так будешь. Понимаешь? Всегда. И вожак-инспектор ничего не сказал на это. У Миши было теперь изгойское право говорить им все как есть, преимущество, которое жаль покупать такой ценой, но другой не бывает. Он по крайней мере мог теперь не скрывать, что тузеевские стихи — дрянь, и даже то, что Тузеева убили, не сделало их лучше.</p><p class="p1">«Тактического решения не было». Но как же Робин Гуды, как же кружок, братство, один за всех — все за одного? Как же возрождение добрых нравов, и если уж Борис, железный Борис, оказался таким картонным — если лучшие из них настолько ни на что не годились, — каков же должен быть катаклизм, из которого внезапно образовались бы новые, не гнилые люди? Об этом он думать боялся.</p><p class="subtitle">— 3 —</p><p class="p1">Война началась внезапно, как все очевидно неизбежные вещи: не может же быть, чтобы простые правила так наглядно сбывались? Но вот сбылась, и в понедельник, четвертого декабря, был всеинститутский митинг, и ректор Карпова сказала с явным неудовольствием, что могли бы собраться и в воскресенье, не перетрудились бы, и тотчас следом за ней Тузеев заявил, что отправляется добровольцем и будет записывать всех желающих, и тридцать человек немедленно выстроились к нему в очередь, а Миша туда не пошел. Миша был освобожден от военной службы. Мать — кардиолог. У него действительно были осложнения от детских ангин. Он еще в школе был спринтером, потому что не мог бежать долго. Освобождение ему подтвердили на повторной медкомиссии в сентябре. Маме ничего не пришлось выдумывать. Он знал, что, если дойдет до крайности — чего быть практически не могло, но все понимали, что будет, — его призовут все равно, он был типичный второэшелонник; но пока не дошло, он действительно не имел права рисковать собой и другими. Еще не хватало на фронте приглядывать за его здоровьем.</p><p class="p1">А Тузеев вызвался добровольцем и переписал всех желающих, и естественней всего было предположить, что ему повезет и тут — скажут спасибо, внесут в реестры добровольных героев, но не призовут, скажут: дойдет до вас очередь, навоюетесь. А пока пусть другие, не студенты. Но тут его везение кончилось — их всех призвали. Впрочем, на то он, верно, и рассчитывал? Быстрая победоносная война, триумфальная прогулка до Хельсинки, и ты герой. Так же попробовать войны, как попробовал он жизни. И, чем черт не шутит, попасть в дивизионную газету. Миша понимал, что это мысли подлые, но продолжал приписывать герою Тузееву самые худшие намерения, и мертвый Тузеев, так незаслуженно ему навредивший, ничуть в его глазах не улучшался. Коробкина рассказывала об устойчивом готическом мотиве — мертвом женихе; Миша мечтал написать такую балладу, но сам в нее попал. Мертвый жених Тузеев встал у него на пути и вышиб из седла. Где-то были теперь его длинное лицо, белесые волосы, приплюснутый нос, похожий на вжатую кнопку, — как все это после смерти изменилось? Тузеев, конечно, ничего не знал о Мишиной катастрофе, а между тем ясно было, что он-то ее и организовал.</p><p class="p1">Сначала от него ничего не было. Война шла трудно, не так, как предполагалось. Катя съездила в Ленинград и сказала, что в некоторых районах по ночам отключают электричество — то ли для маскировки, то ли его не хватает. И будто бы даже хлебные очереди. Сама не видела, но говорят. Говорили также, что финны более приспособлены для войны в зимних условиях, что все они прирожденные лыжники. Миша вообще не понимал, почему финны. Ему казалось, что это случайная, преждевременная растрата долго копившегося напряжения. Об этом шли разговоры. Боже мой, он вел разговоры и не предполагал, как это все может быть повернуто! Но, к счастью, на собрании никто об этом не вспомнил, а может, умолчали расчетливо, потому что пришлось бы отвечать самим: а почему не возразили? не сообщили? Что и с кем он осмеливался обсуждать! Например: почему финны? Торкунов сказал с новообретенной солидностью: старик, немцы называют это геополитикой. Они давно в этом понимают. Почитай Хаусхофера, только что перевели. Нам надо было это сделать, потому что Финляндия ведь исконно наша. Мы не можем оставлять врагу такой плацдарм, а Рюти, безусловно, враг. Ему предлагали идеальные условия. Они выжидают. Если большая война, то это направление главного удара. Ленинград — это тридцать, кабы не больше, процентов оборонной промышленности, ты слышал про это? Это все высокоточное оружие. Мы должны были. А Полетаев просто сказал: ну, как же иначе? Ты разве не чувствовал? Чувствовал, сказал Миша (как казалось ему теперь, довольно тупо). Но почему именно финны? А какая разница, ответил Полетаев, хоть бы и папуасы. Он-то был осторожен, опытный Полетаев, знал, что можно, чего нельзя.</p><p class="p1">Потом вернулся едва оправившийся от воспаления легких Гриша Кумов. Видимо, все было не так серьезно, если домой отпускали после пневмонии. Кумов был неудачник, так и выглядел, и даже на войне ему не посчастливилось — комиссовали не после раны, не как героя, а из-за болезни, вполне гражданской. Он был мал, квадратен, непонятно почему поперся добровольцем: может, надеялся вырасти, набраться нового опыта, а то было совсем непонятно к чему человек. И опыта он набрался, но, как всегда бывает с такими людьми, непременно нуждающимися в ужасном, чтобы вырасти, этот опыт его раздавил. Он зашел в институт в феврале всего дважды. В первый раз Миша не решился к нему подойти, к тому же вокруг него толклись, а Миша не любил растворяться в толпе. Во второй раз Кумов пришел через неделю, и Миша подошел, скрывая неловкость, держа руки в карманах: ну что, Гриша? Но бодряческий этот тон совсем не годился, и Миша просто сказал: ты знаешь, душа у меня неспокойна. Я думаю, что, может быть, следовало пойти. И Кумов, подняв на него глаза и почувствовав, может быть, серьезность вопроса, ответил: тебе — тебе это ни в коем случае не надо. И никому не надо. Что, спросил Миша, такой ужас? Да не ужас, ответил Кумов, не надо — и все. Лишнее. Но хотя бы что там происходит? Я был в бараке, неохотно пояснил Кумов, такой барак-лазарет. А на самой войне что? Кумов ответил, что войны почти не видел, заболел скоро. Огляделся и добавил: с обмундированием не очень хорошо. Довольно холодно. (Зима была в самом деле лютая, даже в Москве чувствовалось.) И кроме того… ты знаешь, у меня было впечатление, что много времени тратится непонятно на что. Самой войны мало, передвигались непонятно куда, ничего не объясняли. Выбирали позицию, потом вдруг уходили. И как-то вдруг оказывалось, что кругом финны. Я заболел, сказал Кумов, и меня увезли, а почти вся наша рота потом… Опять-таки не очень было хорошо с креплениями для лыж, иногда приходилось приматывать веревками. Это не всегда удобно. У финнов были крепления. В общем, тебе не надо было, не следует думать, что это полезно. И Кумов исчез, словно его притянула к себе почти полностью исчезнувшая рота. Говорили, что он уехал к себе в Белгород. Но вообще понятно было, что не жилец.</p><p class="p1">А в марте погиб Тузеев, и в тот же день погиб Робштейн, пытавшийся его, уже мертвого, вытащить из-под обстрела. Погиб совершенно ни за что, просто чтобы бросить себя на неведомую чашу, которая вдруг перевесит — и тогда все поймут, что хватит. Тузеев Робштейна терпеть не мог, видел в нем одного из дачников, которых почему-то считал средоточием зла, — тогда как Наум был с Донбасса, успел понюхать жизнь лучше сталинградского рабкора. Миша его любил, но издали. Приближаться к Робштейну он не хотел — тот был слишком шумен, неряшлив, нелеп, и чем-то таким Миша боялся от него заразиться: чутье на обреченных. Но поэт он был настоящий, и Миша успокаивал свою совесть тем, что несколько раз сказал ему: слушай, это удача. И Наум, уже издавший у себя в Донбассе две книжки по-украински, радовался как дитя, нет, как слон. Он радовался всему, без надрыва, не накручиваясь, просто потому, что после нищего беспризорного детства любой кусок пирога был для него произведением искусства, пиром сложности. И то, что он погиб из-за Тузеева, было для Миши отдельным горем. Он хотел написать о Робштейне балладу, но что-то в этом было неприличное. Скорей бы он написал про Валю. Тут нашлась действительно лирическая тема. Потому что Валя была теперь свободна — но более недоступна, чем когда-либо. От живого Тузеева она ушла бы наверняка, а мертвый он стиснул ее намертво.</p><p class="subtitle">— 4 —</p><p class="p1">Шестого марта, когда в институте узнали о двух смертях, ее била истерика, слишком громкая, чтобы выглядеть настоящей. Икала, стучалась головой о стену, отпаивали водой и валерьянкой. Девочки дежурили у ее постели в общежитии, чтобы не наложила на себя руки. Уже девятого явилась в институт, траурная, строгая, ни слезинки в глазах, словно желая достойной учебой, деловитостью соответствовать памяти героя. Черное ей шло. Миша мысленно писал ей письмо.</p><p class="p1">И потом всю весну, все лето ничего не было. Правда, в мае его так замучили сны о ней, и в этих снах она была так расположена, так податлива, что между зарубежкой и творческим семинаром, между мейстерзингерами и Андреевым он подошел и сказал: Валя, я все понимаю. Если вдруг какие-то трудности, я готов… и тут же оборвал себя: так не вовремя, так высокомерно это вышло! Какие трудности в учебе, он что же, предлагал себя в репетиторы? И она посмотрела ледяными глазами, совершенно не так, как во сне, и он отвел взгляд, но тут она вдруг улыбнулась. Ты что, Мишка, сказала она. Мишка! Он никогда не слышал, не чаял услышать от нее ничего подобного. Ты что, краснеешь? Ну да, краснею, ответил он, и это был первый его удачный шаг в отношениях к ней. Всего глупей было бы сказать «нет, что ты» — и запунцоветь окончательно. Да, я краснею, мне неловко. Мне вообще все теперь с тобой неловко. Да, сказала она вдруг по-взрослому, как умела, и проступило на секунду все ее настоящее обаяние, вот уж два месяца как спрятанное. Со мной всем теперь неловко, все сочувствуют и никто не подойдет. А я что ж, я человек. Я в кино иногда хочу. Но мне нельзя. Ты понимаешь? Он кивнул, и так ее было жалко в эту минуту! Безмужняя вдова. Идиот. За эту секунду жалости он себя проклинал теперь. И никакой грубости, вот интересно, никакой простоватости не было в эту секунду в ее лице. Или он весь был под действием мейстерзингеров? Но ему показалось тогда, что ничего нет возвышенней этой бесплотной любви: она — вдова, не познавшая замужества, он — рыцарь, не допущенный даже к самому куртуазному ухаживанью. И не рыцарь даже, а, допустим, конюший. Сцены из рыцарских времен. И как прелестно просветило ее солнце, как она вся порозовела, какая была ослепительная рыжая прядь! Уже совершенный расцвет, поздняя весна. Почему она тогда позволила ему эту близость? Заманивала? Но какой расчет, какая ей выгода от того, что он теперь так растоптан? Этого он не понимал, но почему-то все лето, идиот, считал ее своей. Весь царицынский цикл, все, что сочинено было на даче, все, что рассчитывал послать и так и не осмелился, — все посвящалось ей, он никого другого и не представлял теперь. И Даша, соседка, туманно намекавшая на какие-то июньские грибы колосники, на какой-то шалаш, на то, что у нее все уже было, — оставляла его безучастным, о чем он сильно теперь жалел. Все было глупо, так глупо! А между прочим, стихи были неплохие, особенно одно, раешина-скоморошина. Сам не ожидал от себя. Теперь все это пришлось забыть, он давно порвал царицынскую тетрадь, но стихи, к сожалению, помнил. Не так легко они забывались.</p><p class="p1">И начался третий курс, и по случаю его начала — чему радовались, интересно? — всех собрала Клара Нечаева, у нее была настоящая трехкомнатная квартира. Отец ее был шишка, но, странное дело, никто не знал его должности. А впрочем, настоящим шишкам так и положено: о них никто ничего не знает, и все им можно. Это была шишка, так скажем, нового поколения. Потому что, когда он был у Веры (вот, может быть, последняя развилка в его жизни, когда все можно было поменять, — конечно, Вера-то настоящая, она человек, и потому у нее так все сложилось), — у Веры он видел совершенно другой стиль. Там отец был действительно из тех, из конницы, из легенд. Можно ли представить, чтобы он слушал Лещенко? И потом болезнь жены, сумасшествие или что-то вроде, а когда она вернулась из лечебницы — словно что-то хрустнуло, и его перевели в Астрахань с понижением. Они уехали, и больше о них ничего не было слышно. Нечаев-старший был совершенно другой, наголо бритый, с толстой складкой на загривке, с огромной, почему-то внушительной бородавкой на губе. Заметный южный выговор, гэканье, — но не мягкое, а такое, с каким изображают удар шашкой: хэк! И всего ужасней было, что он Мишу похвалил: черт дернул Мишу читать именно скоморошину! Хорошо, прям-таки наше, сказал Нечаев. Кларе он приходился отчимом. У ее матери была дивная судьба: она выходила замуж не за людей, а за эпохи. Первый муж был бандит, наводивший ужас на весь Николаев, второй — чекист, расстрелявший бандита, третий — промышленник, переживший чекиста (что-то такое случилось в двадцать девятом, темное, о чем Клара говорила, расширяя глаза и понижая голос). С промышленником случился в тридцать шестом сердечный приступ — вскоре после того, как его зачем-то вызвал как раз Нечаев; ничего страшного, поговорил и отпустил, но на приступ хватило. После этого Нечаев стал заходить, сделался в доме своим человеком, женился, удочерил Клару и заставил взять свою фамилию. Клара родилась от чекиста и до тридцать шестого была Фрумкина, но Нечаев сказал: хватит. Почему Кларина мать, красавица, вышла за этого типа — никто не понимал, но Клара, опять-таки округляя глаза и шепотом, объясняла: «Мы были бедны, дон Альвар богат». Зато теперь они были везде прикреплены, а имя промышленника как ни в чем не бывало носил самарский завод, который он некогда возглавлял.</p><p class="p1">И вот, как сказано, была вечеринка, среди которой Нечаев вдруг уехал — на ночь глядя, но у шишек теперь ночами была самая работа, так что никто не удивился. После его исчезновения стало словно легче дышать — «Сундук вынесли», тихо сказал кто-то, и все засмеялись оглушительно, с облегчением. Мать Клары, тридцатишестилетняя красавица, отнюдь еще не собиравшаяся увядать, посидела с ними и ушла к себе, сославшись на головную боль. У них было три комнаты, невероятно. Тут пошла настоящая вольница. Сначала еще старались не усугублять мигрени, говорили вполголоса, потом распоясались, танцевали, пили кислый вермут, показавшийся Мише исключительно крепким (и до сих пор вкус этого вермута связывался в его памяти со счастьем и вседозволенностью). Выходили курить на лестничную площадку, Миша тоже курил, стреляя папиросы у рослого тихого Утюгова, чей подбородок — на троих рос, ему достался — в самом деле напоминал утюг. Удивительно мягко ложился свет. Потом Клара настояла, чтобы выключили люстру, зажгли свечи. Уже в прихожей кто-то целовался. Миша танцевал с Валей, и она была в его руках все податливей, он позволял себе все больше, не встречая уже почти никакого сопротивления, и тогда в углу комнаты, когда никто, казалось бы, не видел, он отважился поцеловать ее в шею, ближе к уху. От нее пахло духами, названия которых он, конечно, не знал, а спросить стеснялся, не то давно купил бы… чтобы что? Чтобы утешаться или еще сильней ненавидеть? И вот он ее поцеловал, и она почти не отклонялась, только вдруг сильно задышала. И он сказал с легкой грустью: Валя, Валя, как жаль, что все так сложилось. Теперь он будет между нами всегда, а ведь могло бы… Да, сказала она хрипло, могло бы. Но, может, еще будет? — спросил он, уже не выдержав элегического тона, с идиотской подростковой надеждой; но вместо того чтобы его высмеять, она серьезно ответила: может, еще и будет. Потом засмеялась: глупый ты какой! Ты же целоваться не умеешь, Миша! Но целоваться он умел, научился этому в подвале их дома очень рано, в четырнадцать лет, и тут же попробовал ей доказать это. Она вырвалась и посмотрела, как ему казалось, с одобрительным изумлением: надо же! — но быстро опомнилась и рассердилась: ты что это себе вообразил? Ну иди-ка отсюда! Она так и сказала: ну иди-ка! — с интонацией глупо-провинциальной, и тут случилась его ошибка. Он решил, что если с такой интонацией, то, уж конечно, она шутит, и в этом случае нет значит да. Тут уж она его отпихнула по-настоящему, и он, криво улыбаясь, вернулся за стол. Что, облом? — спросил Утюгов. Их никогда не поймешь, ответил Миша снисходительно. Тут начался дождь, зашумел по листьям, застучал по стеклу, и этим дождем словно разрешилось мучительное напряжение этого вечера. Миша окончательно впал в элегическое настроение и думал: мы не можем быть вместе, и это к лучшему. Обладание никогда не ведет к поэзии, зато теперь у меня есть вечный повод. И в этом настроении, ни с кем не простившись, он тихо, мечтательно ушел, и, идя по мокрой улице пешком в свой Потаповский переулок, даже что-то уже сочинял, ласковое и всепрощающее.</p><p class="subtitle">— 5 —</p><p class="p1">О том, что происходило после его ухода, он знать не мог, и по обычной невинности поэта никогда не прозрел бы в маленькой Фоминой источник всех своих бедствий. Потом, через полгода, он даже смеялся. Конечно, ему не нравилась малютка Фомина — кривозубая, нервная, с внезапными взрывами хохота. Когда Фомина и Валя возвращались — тоже пешком — в свою комнату на втором этаже общежития по Усачевой улице, Фомина как бы между делом спросила:</p><p class="p1">— Что же это ты, с Гвирцманом-то?</p><p class="p1">— А что я с Гвирцманом? — небрежно отвечала Валя, хотя на самом деле похолодела.</p><p class="p1">— Нехорошо это, подруга, — сказала Фомина. — Ты героя вдова, несмотря что и не записанная.</p><p class="p1">— Что с Гвирцманом, ничего с Гвирцманом, — забормотала Валя.</p><p class="p1">— Нехорошо это, — упрямо повторила Фомина. Она жила с грузчиком из соседнего магазина, говорила, что он пролетарий, страшно гордилась.</p><p class="p1">И тут Валя неожиданно для себя самой забормотала что-то чудовищное: да что я, он так на меня насел, так лез, что я вообще ничего не могла…</p><p class="p1">— А что ж не кричала? — подозрительно спросила Фомина. — На меня раз учитель не то что лез, а по голове погладил, я так орала на него, что он, сволочь, вообще с тех пор глаза поднять боялся, а не то что. Он подошел, я дежурная была. Он сразу: ши-ши-ши, ши-ши-ши! Если б он руки начал распускать, я, наверное, убила бы.</p><p class="p1">— Нет, ну что орать, — неуверенно сказала Валя, — кругом же все были, что бы он сделал…</p><p class="p1">— А что ж, надо ждать, пока сделает? Он должен знать, к кому лезть, ты вдова героя!</p><p class="p1">— Но он же не то что… Он же не успел…</p><p class="p1">— Ты это, подруга, — решительно сказала Фомина. — Если б Коля твой ждал вот так вот, пока они до Ленинграда дойдут, он бы не пошел добровольцем. Если все время ждать, пока они успеют, это как называется? Если б он жив был, нешто этот клоп посмел бы подойти? Ты подумай. И я считаю, что если так, то ты должна заявить, иначе это будет поощрение. Они руки распускать, а ты пожалуйста. И все видели. При всех к вдове героя — это же я не знаю какая наглость. Учти, если тебе свидетели нужны, то я первая.</p><p class="p1">Миша смеялся потом: вмешался старый дуэлист, он зол, он сплетник, он речист… Но и тогда, когда смеялся, когда многое уже мог Вале простить, и было за что, — он все-таки не понимал: как можно? Положим, он сам не ангел. Положим, он всегда в школе обличал тех, кого полагалось, рисовал карикатуры и писал стишки про двоечника Романова, хотя отлично понимал, что Романов не виноват и что у него не было условий нормально учиться, отчим бьет, да и сам дураком уродился. Возможно, теперь Миша расплачивался именно за эти стишки, за то, что сам вызвался обличать Романова и даже не покраснел под его затравленным взглядом, хотя Романов был, в сущности, приличный человек и учил его правильно копать червей. Но пойти и заявить… Валя сама не понимала, как она это сделала. Просто теперь, полгода спустя, она не могла уже представить, как будет жить, если утратит статус жены героя. Если серьезно, какая она была ифлийка? По меркам родной тамбовской школы она была безусловный отличник, хотя и забывала все после каждого экзамена, а когда поступила, хоть и со скрипом, с рекомендациями, с обкомовской грамотой за трудовую доблесть, — сразу поняла, насколько она тут чужая. И не за ум любил ее Коля Тузеев. Ему тоже было неуютно, и он даже сказал один раз мечтательно, что хорошо бы им вместе, знаешь, на какое-нибудь строительство, жаль, что почти все уже построено… Она так привыкла существовать в ореоле, что пасть, да еще так позорно, из-за копеечных приставаний Гвирцмана, которому и так все в жизни легко давалось, папа — московский врач, две комнаты в хорошей квартире в центре, и рассказывали, что учился он всегда легко, и девки засматривались, и не работал ни дня, вообще барин! Она и представить не могла, будто ему что-нибудь сделают. Ну осудят морально. И он, конечно, никогда к ней больше не подойдет, о чем она и жалела отчасти, но уже на самом дне души, не признаваясь себе. Но по заслугам. Пусть не думает, что все можно. Правда же, такой заносчивый. А вот не надо заноситься. Он потому ей и нравился, если правду, что был именно такой легкий и потому добрый, без малейшего запаха трудового пота, и так просто ему все давалось, и так никогда он не лез за словом в карман. Все другие даже стихи писали с натугой, а у него не чувствовалось усилий, хотя и стихи были словно необязательные, и она не всегда понимала, зачем они ему. Но уж теперь-то он будет понимать все про жизнь, думала она, и, может быть, если говорить про себя самое грешное и стыдное, она попросту думала таким образом с ним сравняться. Но какая разница, что она думала? В тот самый день, когда она отнесла в бюро заявление на Мишу, античник Гурьев сказал на лекции: Рим не интересуется помыслами, и потому, может быть, он не знал философии в греческом смысле. Всякий римский мыслитель имеет основное занятие: он либо император, как Марк Аврелий, либо политик, как Цицерон, либо воспитатель тирана, как Сенека. Желающий действовать — действуй, сомнение — постыдно, колебания — хуже самого черного греха. Эта мысль подействовала на нее. И, как назло, Миши в тот день не было в институте. Где он был? Кажется, они с Борисом отправились к Брикам, но те не могли их принять, и они пили на углу пиво с чувством сладкой осенней вольницы. Чертово пиво. Может, если бы она увидела Мишу, то и не пошла бы никуда. Но вместо Миши она увидела, как на нее зорким глазком поглядывает Фомина, и, словно боясь — кого же? — Фомину! — она процокала на третий этаж прямо в бюро.</p><p class="p1">Секретарь факультетского комитета аспирант Драганов был человек со странностями, хотя и умел привлекать сердца. Странности, возможно, и привлекали. Он всегда сиял, приземистый, с ранней лысиной, круглился улыбкой, словно ему только что объявили таинственное, негласное поощрение. Весь его вид говорил: но мы-то знаем, и вы знаете. Масленый блин, говорил про него Тузеев. Но в этом лучении, в круглении было столь явное издевательство, что и в секретарях-то его держали именно поэтому. Если бы он был слишком верный, то был бы дурак. А так он улыбался на всякий случай, такой оборотный, всегда готовый отыграть, — словно все, как и положено начальнику, знал заранее. Сияющая его улыбка будто шла впереди него, или как будто он ее нес. И теперь, когда Валя вошла, он втолковывал пылкой румяной дуре с такой изумительной доброжелательностью, словно издевался каждым словом:</p><p class="p1">— Ты пойми, сегодня, может быть, в Бессарабии и Буковине решается будущее Европы! Ты понимаешь, какого масштаба выбор там делается? А? Климова? И в этих условиях ты в своей группе не вовлекаешь в работу студентку из Бессарабии, на что это похоже! «Из лыв густых выходит волк на бледный труп в турецкий полк» — ты знаешь, кто это сказал?</p><p class="p1">Румяная в ужасе хлопала глазами.</p><p class="p1">— Закрой, кричит, багряной вид и купно с ним прикрой свой стыд, — продолжал Драганов. — «Оду на взятие Хотина» надо знать, Климова, тем более что сейчас она мирным путем осуществляется вторично. (Он занимался русским восемнадцатым веком, стихосложением.) Товарищ Скурту у тебя не вовлечена, а надо, чтобы была вовлечена. Ступай, девушка, работай. А тебе что нужно, товарищ Крапивина? — и он улыбнулся Вале еще шире, чем только что Климовой.</p><p class="p1">— Я по личному, — сказала Валя, не глядя на него.</p><p class="p1">— Это очень хорошо, что по личному, общественное у меня уже вот где, — только что не пропел Драганов. — Когда красивая женщина приходит по личному, очень приятно.</p><p class="p1">Он-то мог себе такое позволить, и никогда не было понятно, когда он перестанет шутить.</p><p class="p1">— Ко мне приставал Гвирцман Михаил при свидетелях, — сказала Валя, сразу подпираясь свидетелями, — против моего желания.</p><p class="p1">Удивительно было, как легко сказалось.</p><p class="p1">— Это ужасно, — сказал Драганов, не изменяясь в лице, словно прямо ждал чего-то подобного. — Против желания при свидетелях — чудовищно. Я надеюсь, вы дали достойный отпор? — Неясно было, перешел ли он на официальное «вы» или имеет в виду свидетелей.</p><p class="p1">— Отпор я, конечно, ему дала, — сказала Валя, задыхаясь, — но считаю недопустимым и хочу заявить. Потому что я считаю недопустимым.</p><p class="p1">— Ну конечно, а то как же, — согласился Драганов. — А ты присядь, товарищ Крапивина. Уже потому недопустимо, думаю, что ты же не просто так студентка, верно? Мы все помним Колю Тузеева. Мы помним стихи товарища Комлева про девушку Валю. А девушка Валя, как будто заране скорбя, она чересчур осторожно любила тебя. И тут такое. Нужно примерно наказать, правда?</p><p class="p1">— То есть я дала отпор, конечно, — говорила Валя, словно этим отпором можно было еще поправить дело. Но вдруг ей самой стала противна своя суетливость. В конце концов, кто поставил ее в это положение, кто вообще ее вынудил? Если бы он не полез руки свои распускать, ничего бы этого не было, Фомина не держала бы ее на крючке и сама она не стояла бы тут сейчас в идиотском положении. — Но поскольку против моего желания и никак со мной не согласовав… ничего вообще никак…</p><p class="p1">И после она ничего почти не помнила — ни что говорила, ни как писала.</p><p class="subtitle">— 6 —</p><p class="p1">В следующий вторник Драганов поджидал Мишу у выхода из третьей поточной аудитории.</p><p class="p1">Он был неулыбчив и деловит.</p><p class="p1">— Пойдем, товарищ Гвирцман, потолкуем, — и они отправились на третий этаж, причем Миша, идиот, шел радостно, предвкушая общественное поручение. Что скрывать, по-настоящему он был в этом смысле невостребован. Выступить от курса в Доме литераторов, сочинить стенгазету — сколько угодно, но у него были идеи по очеловечиванию, усложнению агитации, он был уверен, что нужно меньше барабанного боя, и теперь Драганов — поговорив, может быть, с Борисом, главным активистом курса, — обратился к настоящему резерву.</p><p class="p1">Они вошли в комитет, Драганов уселся за стол и некоторое время молчал.</p><p class="p1">— Гвирцман, — сказал он наконец обычным своим голосом, столь непохожим на издевательский фальцет его публичных назиданий. — Я мог бы тебе ничего не говорить, но это было бы неправильно. Отнесись с пониманием и про это наше с тобой собеседование не трепись.</p><p class="p1">Идиот Миша все еще рассчитывал на секретное политическое задание и с готовностью кивнул несчастной кучерявой головой.</p><p class="p1">— Тебе не следовало распускать руки, и ты плохо понимаешь, с кем имеешь дело.</p><p class="p1">Миша не успел испугаться и стал припоминать, с кем подрался за последнее время. Но он и в школе почти не дрался.</p><p class="p1">— Короче, у меня на тебя заявление от Крапивиной, и поскольку она о нем растрепала, то я обязан дать ему ход. Думаю, ничем для тебя серьезным это не кончится, все обойдется. Но тебе, Гвирцман, надо думать, кого и где хватать.</p><p class="p1">Миша с облегчением рассмеялся, ибо был, как уже сказано, идиот, молокосос, карась-идеалист.</p><p class="p1">— Я никогда ее не хватал.</p></span>
