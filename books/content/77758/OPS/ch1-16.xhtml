<p class="p">ЧАСТЬ ТРЕТЬЯ</p>
</div><p class="subtitle">— 1 —</p><p class="p1">А вот у Игнатия Крастышевского все время было свободным, а между тем времени не было совсем.</p><p class="p1">Он умел воздействовать на людей посредством слов, но это было не писательство, а, как говорил он сам, сверхписательство. Способность открылась у него в восьмом классе гимназии, когда он с помощью вольного сочинения «Чему учимся мы у греков и римлян» внушил учителю словесности, патологическому садисту и полонофобу, мысль о самоубийстве, которое, впрочем, сорвалось. Крастышевский был тогда юн и неопытен.</p><p class="p1">Идея воздействовать на читателя прямо, а не только путем рассказывания историй лежала на поверхности, но, как мы знаем, для всякого открытия потребна небольшая патология. Так, Дмитрий Менделеев имел болезненную страсть к изготовлению чемоданов, и именно желанием изготовить, наконец, такой чемодан, в который поместилась бы вся Вселенная, было продиктовано создание периодической таблицы. Шутка. Патология Игнатия Крастышевского состояла в его клаустрофобии. Его преследовали сны о замкнутых пространствах, о бегствах сквозь какие-то коридоры и переходы, о гнетущих белых сводах, в которых разворачивалась большая часть русской придворной истории, о тюремных камерах, где ему надлежало провести без какого-либо преступления бесконечно долгое время без всякой надежды на свободу; и почему-то эти камеры были частично погружены в воду, и почему-то он там не умирал сразу, а продолжал жить. Это было всего невыносимее.</p><p class="p1">После одного из таких снов, когда тринадцатилетний Крастышевский проснулся с бешено колотящимся сердцем, в липком поту, он впервые поставил перед собой задачу — найти такое сочетание слов, которое в безнадежной ситуации убило бы его немедленно. Эта задача, впрочем, заинтересовала его еще при чтении книги Густава Оже «Огонь и вода». Самый симпатичный герой — француз Молинар, обязательный шут при отважном капитане Паттерсоне, — попадал в плен к злобным каннибалам Новой Гвинеи, предпочитавшим пожирать жертву заживо, не сразу, а по куску. Дабы не попасть на этот пир в качестве главного деликатеса, Молинар с помощью древнего заклинания, передававшегося в их роду еще со времен крестоносцев, умертвил себя. Отчаяние кровопивцев, лишившихся свежатинки, было велико.</p><p class="p1">Хотя Крастышевский читал эту книгу еще в первом классе, он уже тогда задал воображаемому автору правильный вопрос: если роковое заклинание передавалось из уст в уста и каждый молодой Молинар получал его у одра предка, — почему оно не убивало его сразу? Положим, предок, произнеся семь ужасных слов, естественным образом загибался на месте; но почему они не останавливали сердце потомка? Эта мысль так мучила Крастышевского, отличавшегося уже и тогда некоторой мономанией, что он обратился с письмом к Густаву Оже, но не застал его в живых; ответ пришел от переводчика, которому письмо добросовестно вручили в товариществе Маркс.</p><p class="p1">Переводчик Измайлов писал, что точного ответа у него нет, но вопрос волновал и его; вероятно, полагал он, заклинание убивало лишь тогда, когда произносилось вслух. Существуют, писал он пытливому отроку, таинственные практики, связывающие устную речь с физиологией: так, именно произнесение вслух некоторых заклинаний у северных народностей способно облегчить боль, и даже у русских сохранились остатки этих верований. Известно, что простолюдины (подражать которым ни в коем случае не следует) после сильного ушиба произносят некоторые слова, почитающиеся неприличными. Когда мы их говорим про себя или — в редких случаях — читаем на бумаге, они не меняют ничего; но стоит после сильного ушиба выговорить запретное словосочетание, как боль сама собой уходит, тогда как повторять в этой ситуации «Я помню чудное мгновенье» было бы совершенно бессмысленно. «Как это верно!» — подумал юный Крастышевский. Ведь и ему случалось, споткнувшись на скользкой петербургской улице, говаривать про себя «…»! — или «…»!</p><p class="p1">Тогда он успокоился. Но в тринадцать лет снова озаботился поиском разгадки. Довольно скоро установил, что между голосовым или мысленным произнесением роковых слов нет большой разницы, артикуляция сама по себе неспособна остановить ничье сердце, а потому поиск самоубийственного заклинания, увы, остается задачей неразрешимой: счастливый исследователь отправится к праотцам ровно в тот момент, когда ему откроется таинственное словосочетание. Но уничтожить другого — задача исполнимая, только для этого нужно доскональное знание его биографии. С учителем словесности, как видим, сорвалось. Оставалось искать секреты менее радикального воздействия, и в этом Крастышевский за тридцать лет преуспел серьезно.</p><p class="p1">Очевидно, что литературознание переживает сегодня детские времена; лишь в конце десятых годов наметилась литературная школа, позволявшая понять, как и что устроено, а не просто подсчитывать капиталы автора или разбираться в его убеждениях. К школе этой Крастышевский не то чтобы примыкал, но посещал иные занятия; интересней всех казался ему Стрельников, поборник статистических методов. Правда, наука в исполнении Стрельникова была чересчур строга и не позволяла объяснить, почему в иных местах «Войны и мира» у Крастышевского щипало в носу, а при чтении Верченых, ровно с тем же сочетанием гласных и количеством согласных, нигде не щипало. Но это была хотя бы наука, а не лирика, не болтовня, не всяческие «Муки музы» под маской филологии. Иное дело, что Стрельников свою теорию строил на ненадежном фундаменте: статистика гласных и согласных говорила о сути текста не больше, чем ветки о корнях. В основании филологии лежала физиология, тут консультироваться надо было не со Стрельниковым, а с Дехтеревым. Другие ценные данные мог сообщить Ветлугин, занимавшийся поисками Тунгусского метеорита и попутным собиранием местного фольклора. Его книжка «Заговоры, плачи и любовные зовы Восточной Сибири» (1912) была у Крастышевского настольной. С плачами все было понятно, но почему песнь о горностае вызывала желание? Сам жанр любовного зова, не имевший аналогов в мире, подчеркивал исключительную зависимость русских от устного слова. Слово стояло в центре русского мира, служа универсальной компенсацией. Большинство названий русских романов содержало «и» — «Преступление и мир», «Война и дети», «Отцы и думы», «Былое и наказание», — но это было «и» в значении «зато»: война, зато какие дети! Отцы, зато какие думы! Мы живем вот так — зато какое у нас слово! «Зато» было более важным, более значимым словом, нежели «авось». Зато, о шибболет народный! Любовный зов заменял собою соитие. Этот жанр выявил еще Афанасьев, но лишь Ветлугин собрал наилучшие примеры. И не понять, почему песня о горностае, крадущемся по льду, означала собою призыв; почему кот звал кошурку в печурку именно за этим самым делом. Точно так же было неясно, почему белый пудель шаговит, шаговит, и почему это пелось бурлаками, как облегчало их участь. Целая дискуссия кипела вокруг «Разовьем мы березу, разовьем мы кудряву!»: Шаляпин пел это как куплет бурлацкой песни, Горький уверял, что это кусок из хороводной, а между тем почему-то именно под березу, под кудряву шагалось куда легче, чем под сама пойдет, сама пойдет. То есть Шаляпин чувствовал, а не знал, и потому взял это в трудовую песню, а не в отдыхальную.</p><p class="p1">Наибольший материал Крастышевскому давали трудовые и любовные, да еще иногда заговоры на здоровье. Следовало отличать подлинные тексты от бесчисленных имитаций: в последние сто лет стилизации под русский, а на самом деле немецкий стиль плодились с грибной скоростью. Отличительной их чертой были постпозитивы — гусли звончатые, луга пышные, — всё это пришло, конечно, из французского. Древние тексты отличались не звероватостью, а именно алогичностью, непредсказуемостью: целебен был не смысл их, а звук, как в имени лошади типа Карман — что общего у жеребца с карманом? — важно было происхождение от Картины и Мангала. Пусть тебе ворон, пусть тебе вон он, пусть тебе ворог, пусть тебе творог, — записал Шахматов от старухи под Ростовом Великим; в этом не было никакого смысла, но от зубов помогало.</p><p class="p1">Первый свой заговор Крастышевский сочинил, убаюкивая сына, и как-то сбил у него температуру — сам не понял как. Впрочем, в такие минуты просыпаются в организме неведомые силы. Чуковский, бывший некоторое время его соседом по Лештукову переулку, лучшую детскую поэму сочинил, тоже заговаривая боль и жар у больного сына. Вернуть то жуткое вдохновение потом уже невозможно, да и вообще, оно не подчиняется никаким законам.</p><p class="p1">Заметим: сказанное слово действовало далеко не всегда. В девятнадцатом году Крастышевского грабили в Москве на Петровке, и хотя он спокойно, с полной убедительностью сказал: «Вот возьми гору на открытой тропе, черную, усатую, крепко засоли», — грабитель только взглянул на него как на идиота и продолжил ревизию его карманов. С письменной речью дело обстояло проще, тут не мог подвести голос, не влияла интонация. Вообще глупостью было бы думать, что вот так сочинил — и действует: это было примерно как стихи. Все мы знаем законы стихосложения, но далеко не каждый может написать уже упомянутое «Я помню чудное мгновенье». Если бы стиховедение позволяло сочинять, все шедевры уже были бы созданы, а между тем добыча их остается занятием нелегким. Метод Крастышевского, как он сформировался к началу тридцатых, позволял достичь известных результатов при регулярной обработке заранее известного адресата, но не гарантировал ничего. Каким отличным делом стало бы сверхписательство, если бы с его помощью можно было уговорить любую женщину, обольстить начальство, выколотить повышенную зарплату! Жизнь превратилась бы в непрерывную конкуренцию словотворцев, а общение свелось бы к обмену заговорами вроде: «Принеси свою горь, унеси мою хворь, пусти по морю синему, по ливню линему, по бивню бинему» — «Вон, моя вонь, дон, моя донь, по песку крупичату, по мыску язычату!» Но способы выбить деньги Крастышевского не интересовали, а с женщинами все было слишком просто. Они в двадцатые годы были истерически податливы, ибо мужчин осталось мало, а за мужчин при должностях и вовсе шла смертельная борьба. Крастышевский брезговал такой легкой добычей. Он ушел от жены в двадцать третьем, когда понял, что у него завелся счастливый соперник. Правду сказать, сбежал с облегчением. Человеку, овладевающему главной тайной языка, к которой лишь приблизился Хлебников, к которой даже не подошел Якобсон, — не было нужды в отвлечениях.</p><p class="p1">К тридцати трем годам — началу самого плодотворного своего периода — Крастышевский был одиноким контрольным редактором в издательстве «Энциклопедия», попутно редактировал диалоги для фильмов: с началом звукового кино явилась потребность в профессионале, умевшем приспособить суконный язык сценариста к нравам описываемой эпохи. У Крастышевского не было других забот, кроме одной.</p><p class="subtitle">— 2 —</p><p class="p1">Разумеется, прежде чем всецело на ней сосредоточиться, он изучил общие законы словесности и не нашел в них ничего сложного. Самым перспективным жанром двадцатых был плутовской роман. Первым плутовским романом было Евангелие — рецепт был прост и включал десять составляющих. В центре странствующий Учитель, превращавший воду в вино и даже воскрешающий мертвых. Носитель прогресса, смягчающий жестоковыйный мир отца. С отцом всегда были проблемы: иногда его вовсе не было видно, иногда — призрак. Учитель непременно умирал и воскресал, ибо сам плутовской роман бывал наиболее успешен в яме, в период темных веков между двумя светлыми полосами. Так, христианство родилось между античностью и Ренессансом, а Гамлет и Дон Кихот были последышами Ренессанса в преддверии Просвещения. Возникновение шекспировского вопроса объяснялось тем, что во времена Шекспира сам он был никому не интересен, рукописей его не собирали, личность не только не помнили, а старались забыть. Интересны были Бомонт и Флетчер, которых сегодня в рот не возьмешь. Воскресение Учителя было залогом наступления новой светлой полосы, в которой, собственно, он и становился главным героем — как Рождество и Благовещение сделались главными сюжетами Возрождения. У Учителя всегда был глуповатый друг (иногда — ученик) и предатель (иногда — из числа учеников). Учитель всегда странствовал, потому что за повторение трюка в одном и том же месте могут и побить; иногда странствовали его альтер эго, как актеры в «Гамлете». Рядом с Учителем не могло быть женщины — она всегда ждала где-то, иногда за сценой; лучшим финалом было возвращение к ней и совместное рыдание, что так удалось в «Пер Гюнте». «Пер Гюнт», изготовленный по этим лекалам, был единственной всемирно известной пьесой автора, убежденного в том, что ее поймут одни норвежцы, тогда как остальные его создания волновали только скандинавов. Правариантом плутовского странствия была «Одиссея», в которую укладывались все прочие сюжеты. Любимым инструментом Учителя служило безумие, ибо часто только оно позволяло избежать расплаты. Так, Одиссей надеялся было избежать призыва на Троянскую войну, в порядке симуляции засевая поле солью, но Паламед оказался хитрей и положил под плуг Телемаха. Тут Одиссей быстро вошел в разум и сказал: «Всё, всё, поехали на войну».</p><p class="p1">Здесь важно, что Одиссей не хотел войны. Он понимал, что от войны ничего хорошего не будет. Война нужна была Менелаю и Агамемнону для решения внутренних проблем. Елены, конечно, не было. Casus belli всегда выдумывается задним числом.</p><p class="p1">Безумие было любимым инструментом Гамлета и Чацкого — пародии на Гамлета. Плутовской роман всегда пишется в жанре пародии, ибо на спине оригинала легче проскользнуть в читательское сознание. Новый Завет пародировал Ветхий с его культом мщения и закона. «Гамлет» — Хроники Саксона Грамматика, в которых герой побеждал всех. «Дон Жуан» Байрона высмеивал всех предыдущих «Дон Жуанов». Мендель Крик и его сыновья воскрешали и вновь добивали Тараса Бульбу. «Хулио Хуренито» был пародией на Евангелие, а когда двое молодых приятелей Крастышевского озаботились способом быстро разбогатеть, он подсказал им написать пародию на «Хулио Хуренито». Великого провокатора они заменили на комбинатора, а имя оставили почти без изменений. Впрочем, основная его часть отсылала к тем же сыновьям Бульбы.</p><p class="p1">Комбинатор никогда не хочет войны. Он умеет договариваться.</p><p class="p1">Сложней обстоит дело со второй сюжетной схемой, а именно с Телемахом: она начала оформляться лишь во второй половине последнего тысячелетия. Фенелон написал «Приключения Телемака», сделавшиеся одиссеей нового времени: сын плута отличается от плута прежде всего тем, что у него есть профессия. «Фауст» относился к «Гамлету» как сын: чему учили Гамлета, кроме как сомнению, — непонятно; Фауст же был доктор, специалист во многих отраслях — от артиллерии до книгопечатания, что, в сущности, одно и то же. Пушкин был нашим Гамлетом. Лермонтов, помешанный на подражании Гёте, — нашим Фаустом, «Герой» был грубой пародией «Вертера», «Сказка для детей» — попыткой нового Мефистофеля. Всего странней, что в истории о Телемахе всегда появлялся инцест; это возникло еще на уровне мифа, когда сын Одиссея сначала женился на Кирке, сестре Пасифаи, а потом убил, чтобы жениться на ее дочери Кассифоне. Кроме того, от Телемаха обычно рождали мертвого ребенка, поэтому продолжения у истории человечества пока не было. Больше того: по некоторым признакам она близилась к концу. Русского Фауста уже писал Шелестов, чьи «Пороги» были хроникой несчастной судьбы профессионала, конника и землепашца; вышли пока три тома из четырех, мертвый ребенок уже родился, инцест был в первом томе. Инцест, догадывался Крастышевский, был метафорой власти, призванной опекать и вместо того растлевающей. Бегство с любовником — метафорой революции. Революция породила мертвое, нежизнеспособное общество, это было уже видно — страна гибла, профессионал куда-то девался. Второй том «Воскресения», из которого вырастала вся словесность нового века, не был написан. Хорошо бы назвать его «Понедельник», рассказать о том, как Нехлюдов, брошенный ради Симонсона, возвращается в Петербург и пытается встроиться в прежнюю жизнь; увенчать все сценой в церкви, когда он восторженно подходит к причастию… но похоже, пути назад уже не было.</p><p class="p1">Как-то один из немногих оставшихся собеседников сказал Крастышевскому: «Думаю написать книгу, которая произвела бы впечатление на…».</p><p class="p1">— А на остальных? — тут же спросил Крастышевский.</p><p class="p1">— Остальные считали бы верхний слой и ничего не поняли. Мне нужно написать сочинение, которое прочли бы все, а по-настоящему понял один.</p><p class="p1">Интересно, подумал Крастышевский, откуда он знает. Результатами своих изысканий он не делился.</p><p class="p1">— Полагаю, — сказал он с кажущимся равнодушием, — нужно совместить две абсолютно выигрышные стратегии, объединив в одном повествовании «Одиссею» с «Фаустом». Один ирландец так поступил и прославился чрезвычайно.</p><p class="p1">— Расскажите, — попросил знакомец.</p><p class="p1">— Да вы ведь и сами наверняка читали, Стечин перевел с учениками для «Интернациональной литературы».</p><p class="p1">— Я ничего сейчас не читаю, — сказал бывший врач, — нейрастения.</p><p class="p1">— Ничего особенного, но угадано верно. Одна часть книги — скитания по городу в течение дня дублинского еврея, нового Одиссея. Другая — такие же скитания его как бы сына, потому что настоящий сын умер в младенчестве. Он обретает новый объект заботы в лице одинокого мыслителя, который в последний раз мылся в октябре, а дело происходит в июне.</p><p class="p1">— И что же, — спросил врач, — он его моет?</p><p class="p1">— До этого не доходит, но поит.</p><p class="p1">— По-моему, чушь.</p><p class="p1">— Почему, любопытно.</p><p class="p1">Врач помедлил и спросил прямо:</p><p class="p1">— Как полагаете, на какие клавиши следовало бы нажать, чтобы там лучше всего поняли?</p><p class="p1">— Я же всерьез, — ответил Крастышевский. — Сочетание «Гамлета» с «Фаустом» способно творить чудеса. Плут — для всех, доктор — для адресата. Что до впечатления — думаю, для читателя, которого имеете в виду вы, хорошо бы побольше голого тела…</p><p class="p1">— Я подумаю, — обещал врач, а Крастышевский обратился к себе с монологом из «Гамлета»: как, уже и до этого дошло, а я медлю, медлю, медлю, — я! Я один, знающий, как это делается!</p><p class="p1">Но на самом деле он не медлил; уже четыре года, как не медлил.</p><p class="subtitle">— 3 —</p><p class="p1">Больше всего на свете Крастышевский боялся войны. Нет, больше всего на свете, как мы помним, Крастышевский боялся замкнутого пространства. Но война-то и представлялась ему апофеозом замкнутого пространства: окоп, со всех сторон сыплется земля, нельзя никуда пойти без дозволения, все время надо куда-то бежать, обязательно умирать, а смерть и есть самая безнадежная замкнутость. Крастышевский начитался ужасов о войне четырнадцатого года и помнил общую патриотическую истерику. Это была дичь, мерзость, позорище. Вдруг словно разрешили наихудшее, и люди этим разрешением радостно воспользовались. Он был в седьмом классе, и все, кого он ненавидел, тут же ринулись в погромщики. Радостная расправа с немецкими магазинами все объяснила ему про грядущую революцию. Тогда тоже было выдано разрешение на худшее. У Крастышевского были основания полагать, что новая мировая война окажется последней. Человечество достигло некоего предела и почти перешло на новую ступень, но это была ступень вавилонского зиккурата. Разрушение было не за горами. Но если даже оно предопределено, о чем заговорили в двадцатые годы почти все серьезные люди, — это не повод приближать неизбежное. Мы все умрем, но лучше не торопиться.</p><p class="p1">Нужно было выработать стратегию. Понятно, что вопрос о войне будет решать один человек. Понятно, что этому человеку война необходима, потому что в конце концов любой Вавилон упирается в войну. Сплочение нации, все такое. Военная риторика с самого начала слышалась отовсюду. Только чудом не взяли Варшаву, после этого жили мечтой о мести, дальше прицеливались ко всем. Иногда Крастышевский слышал осторожные разговоры о том, что на самом деле мы не хотим, не допустим, не выдержим войны; что нам нужно двадцать лет мирного развития; что Европа пусть хоть вся передерется, а мы пожнем плоды. Но даже если на самом верху действительно не хотели войны, вся логика европейской, да и всемирной, истории вела к этому, и начать войну обречены были мы. Крастышевский с ужасом присматривался к приготовлениям, читал «Красную звезду» и «Библиотеку командира», видел явственно наступательный характер всех будущих операций и все ясней понимал, что выхода нет. То есть выход был, и Крастышевский увидел его в тридцать пятом.</p><p class="p1">Иные спросили бы: неужели он не допускает, что на Россию кто-то нападет первым? Что решение о войне будет приниматься другой стороной, и воздействовать надо на нее? Нет, этого Крастышевский не допускал совершенно. Он исходил из логики и здравого смысла. Завоевать Россию было нереально, последнюю в истории попытку покорить и покроить ее предпринял Наполеон: положим, он вовсе не собирался захватывать Россию целиком, но Россия не понимала всех этих тити-мити, всех этих рыцарских представлений и локальных задач. Кто с мечом к нам придет и так далее, ради каковой концовки и был переделан убийственный сценарий под характерным названием «Русь». Можно было захватить столицу России — и все равно закончить войну в собственной столице, с полным разгромом. Россия непобедима, поскольку колоссально и огромно необхватна; Россия не знает никакой другой войны, кроме как до последнего человека; локальных поражений она не замечает вовсе, и ни Крымскую, ни Японскую войну не принимает всерьез. Те, кто негодует по поводу этих поражений, элементарно не понимают собственной страны. Сравним: «Царь дурит — народу горюшко! Точит русскую казну. Красит кровью Черно морюшко, корабли валит ко дну. Перевод свинцу да олову, да удалым молодцам. Весь народ повесил голову, стон стоит по деревням». Кто это говорит? Коробейник? Как бы не так; это говорит автор. Сам он в то же самое время, в тот же самый реформенный год признается: «В столицах шум, гремят витии, идет журнальная война, а там, во глубине России, там вековая тишина». Хоть ты обвоюйся в Крыму, хоть подогни все окраины — это за войну не считается.</p><p class="p1">Нападать на Россию бессмысленно уже потому, что она не может проиграть; чтобы напасть на нее, надо быть безумцем, а Крастышевский хорошо распознавал чужое безумие, потому что… потому что… Словом, он не наблюдал вокруг такого самоубийцы. Последняя война в человеческой истории могла быть начата только нынешним хозяином России, потому что без этого никак не получалось. Война просматривалась на всех путях. О ней пели все песни, снимали все фильмы, ставили главные пьесы, а когда обращались вдруг к полузабытому классическому наследию, это делалось в рамках все той же военной пропаганды: мы русские, у нас все русское. Слово «русское» было реабилитировано, Демьян был посрамлен.</p><p class="p1">К этому моменту Крастышевский отправил уже четыре послания. Иногда он впадал в отчаяние, ибо результатов не видел, но рук не опускал.</p><p class="p1">В общих чертах его метод был готов и опробован. О нем ниже. Пока надлежало определиться с подходом, с тем единственным каналом, который гарантировал выход на самый верх. Крастышевскому было вполне достаточно посылать сигнал раз в полгода. Собственно, и один раз в год был бы вполне приемлемым ритмом, но он решил действовать наверняка. Надо было найти щель, лазейку, тот единственный вариант, при котором раз в полгода его несколько страниц — число которых было строго просчитано для каждого случая — ложились бы на самый главный стол. Никаких других решателей не было с 1939 года.</p><p class="p1">Писать наобум лазаря в надежде, что единственное письмо из десятков тысяч дойдет, как говорили в редакции, самотеком, — Крастышевский не мог. Подготовка каждого письма требовала многомесячных усилий. Представьте себе поэта, штурмующего сердце возлюбленной и сочиняющего для этой цели единственно возможное послание с учетом всех ее биографических данных, малейших перепадов настроения и даже, не в последнюю очередь, физиологических особенностей. Это работа труднее секстины — сложнейшего из поэтических жанров. Это работа не для нормального человека. Это Бог знает какая работа. И бросать это в доносную щель венецианского типа он не мог себе позволить — он должен был знать, что его письмо прочитано единственным адресатом.</p><p class="p1">Жанр был неважен. Одно из первых открытий Крастышевского состояло в том, что содержание текста вообще не воздействует на читателя. Придавать ему значение можно было в доформальную эпоху. Формальная эпоха открыла, что текст есть конструкция, структура, и воздействует на читателя именно соразмерность этой структуры. Тынянов — открыв это, но не напечатав — перешел на невинную с виду историческую прозу и создал по крайней мере один превосходный, законченный образец, чтение которого в самом деле сильно влияло на читателя, — но увы! — в безумном напряжении сил гений пошел не туда, и заостренная им стрела полетела в его собственную голову. С чародеями случается такое — заклинание поражает заклинателя; с этого дня голова его была расщепляема, пожираема, палима убийственным недугом, всегда имеющим, увы, эндогенную природу. При чтении главы пятой, дойдя до слов «туманно, оголтело смотрел в жадные черные глаза продавцов», Крастышевский застонал сквозь зубы и схватился за свою вытянутую голову: он увидел роковую ошибку. До этого все развивалось с изяществом и легкостью танцевальными, прямо с пареньем, — но здесь автор обсчитался, соскочил, и дальше вся работа шла в направлении аутоиммунном, в полном соответствии с названием. После этого, несмотря на титанические усилия, Тынянов ничего уже сделать не мог, и Крастышевский с ужасом следил за его распадом; один раз послал сострадательное письмо, но ответа не получил, добился лишь — как и полагал — кратковременной вспышки творческой активности. Это Крастышевский еще умел, и это было несложно; а вот добиться того главного, чего он желал, — было сложно.</p><p class="p1">Но лазейку, микронную точку, в которую надлежало бить, — он нашел, и все благодаря спасительному кино. Раз в полгода на главный стол ложилась сводка об экспорте советского искусства: количество закупленных картин, переведенных книг, приглашенных на международные конгрессы авторов. Сначала, как верно смекнул Крастышевский, это был показатель престижа: чего от нас хотят, за что любят. Впоследствии — с тех примерно пор, как Совкино преобразовалось в Союзкино, — это был еще и смотр потенциальных шпионов: кого приглашают, кого слишком хотят видеть? Всякий заграничный успех с этого времени был уже приговором, хотя раньше воспринимался как еще одно утверждение наших ценностей. Шумяцкий, как все «отсохисты» — так прозвал Стечин простых людей от сохи, — доверял грамотным, вообще любил культуру, хоть и давил ее неутомимо; но давил именно тех, в ком чуял пролетарский дух, а спецов не трогал, даже боялся. И Крастышевский осторожно втерся в Союзкино — редактором, не более; должность его была мельчайшая, чиновничья. Он подготавливал отчеты по зарубежным поездкам, по экспорту отечественного кино, по кинофестивалям, куда приглашали наших. Он был в этом мире свой, ибо там сохранились добрые нравы, которых давно — а может, и никогда — не было в литературе. Его любили. Он был почти родной.</p><p class="p1">Вот, оказывается, как легко колебать мировые струны — достаточно найти единственный вариант, при котором твое сочинение, в любом жанре, любого содержания, ложилось бы перед верховные очи. Пользуясь своими кодами, Крастышевский мог, вероятно, добиться для себя министерского поста, или вынудить верховное начальство к уходу в монастырь, или ниспровергнуть любого сановника, казавшегося ему вредоносным. Но все эти мелкие задачи Крастышевского не волновали. Он спасал человечество, блокируя мысль о войне, ставя на ней крест, внушая панический страх перед нею. Мономания имеет свои преимущества: человеку, всецело поглощенному одной мыслью, не нужна семья, чужды посторонние интересы, смешны богатство и алчность. Мономан бьет в одну точку, не отвлекаясь ни на что. Если десять лет кряду думать об одном и том же — выдумаешь.</p><p class="p1">Особенности текста, призванного влиять, были следующие, — нет, скажем сначала еще об одном, чтобы снять недоразумения. Всякий ли текст влияет? О, разумеется. Да ничто и не влияет, кроме текста. Прочитанное способно вызвать мигрень верней любых погодных перемен, расстройство желудка — верней несвежей пищи. С первых навыков чтения, получаемых обычно в четыре-пять лет, человек управляем буквами, реже звуками. Но далеко не всякий автор применяет эти приемы сознательно, и потому после чтения мы испытываем неконтролируемую тошноту, отчаяние, изжогу, иногда эйфорию. Крастышевский первым рассчитал влияние расстановки гласных на сердечные ритмы, научился внушать, а затем исцелять головную боль, так внедрять цифры в сознание читателя, чтобы программировать его на определенные последовательности действий. До него все это было стихийно, и многие простужались от простого чтения детских повестей, а другие страдали запорами от советских производственных романов, не понимая, при чем тут цемент. Цемент тут при том, что незачем подменять художественную ткань цементом, — хотя, назови автор свой роман «Амброзия», все было бы то же самое.</p><p class="p1">Так вот, первым из правил управляющего текста, далее УТ, было то, что он должен содержать автоописание, — этим запускается механизм. Второй особенностью УТ служит структура, в идеале четырехчастная. Вторая часть должна составлять половину первой, третья — примерно треть второй, четвертая же содержит главный посыл и вчетверо меньше. Эта идеальная пропорция составляет золотое сечение всякого текста. Приказ, непосредственно передающийся читателю, должен быть зашифрован в каждой части строго определенным образом: в первой он присутствует в виде сигнальных слов, расстановка которых выстраивается в мозгу при первом же чтении по фонетическому сходству. Во второй он закодирован на уровне букв, узор которых самостоятельно и непроизвольно выкладывается в мозгу, поскольку нужные гласные стоят под ударением, а согласные правильно нагнетены. В третьей части нужная фраза присутствует полностью, но состоит из антонимов, данная как бы в негативе. В четвертой она звучит правильно, спрятанная в виде цитаты. Поместить кодовую фразу в контекст — задача особого рода. Прочие согласные несут колористическую функцию, задавая цветовое восприятие приказа; гласные задают минорную или мажорную интонацию, создавая эмоциональный контекст.</p><p class="p1">На правильную инструментовку пятистраничного доклада Крастышевский, случалось, тратил месяцы, просчитывая буквенные коды по двадцать раз, засиживаясь ночами. Схемами с кружочками и стрелками были завалены все поверхности в его комнате, а наиболее ценные результаты он перенес прямо на обои. Гостей у него не было, удивляться было некому. Дважды в год шофер Леня забирал у него перебеленный доклад и отвозил в редакцию «СССР на стройке», где формировалась общая сводка для подачи на Самые Верха: туда вносились все данные о советском искусстве за рубежом. Составлял эту сводку лично ответственный секретарь, и от него она передавалась другому секретарю. Крастышевский не впускал к себе шофера Леню, отдавал ему свои странички внизу. Никто не должен был видеть схему на обоях; Крастышевский, напротив, должен был видеть ее перед собой ежедневно, чтобы следование буквенным ритмам вошло в его кровь.</p><p class="p1">Внешне текст выглядел гладко, и лишь самый опытный лингвист — тот же Стрельников, допустим, — мог заподозрить легкое неблагополучие в синонимии. УТ выстраивался всегда как мозаика, куски которой слишком ярки, чтобы образовать монотонную поверхность; и в самом деле, иногда Крастышевскому нужны были синонимы общепринятых слов. В тексте, разумеется, они никак не выделялись, но мы здесь их подчеркнем, чтобы понятнее стал механизм. «В то время, как ЧЕРНАЯ туча БОЛЕЕ ИЛИ МЕНЕЕ СТРЕМИТЕЛЬНО наползает на Европу, ВСЕОБЩИЙ интерес к нАшей кинемАтографии делАется очевиднее ЯСНОГО. Гуманистичность и НУЖНАЯ направленность советского кино еще и еще, РАЗ ЗА РАЗОМ обрушиВАЕТ на западного зрителя, сЛУШателя, читаТЕЛя ту несомненную, ЯСНУЮ истину, что человек челоВЕКУ браДТ. СИНИЙ, ЖЕЛТЫЙ, ЗЕЛЕНЫЙ — все эти цвета отступают перед красным, который со временем займет главенствующее место на карте». Любой, у кого есть минимальный навык чтения между строк и хотя бы азбучное знакомство с лингвистическими воздействиями, прочтет здесь фразу «Арави тари оми», არავითარი ომი, или «Никакой войны» на родном языке адресата.</p><p class="p1">Самое простое было бы сказать, что Крастышевский — сумасшедший, в этом была бы даже какая-то рифма. Показался Крастышевский, оказался шамашедчий. И пожалуй, для всех было бы лучше думать именно так. Есть тайны, приближение к которым не способствует душевной ясности. Но формула Крастышевского была опробована, и опробована способом, исключавшим любые двусмысленности. Он не мог вкладываться в пустышку. Как писали в газетах, судьба мира была на карте; но в газетах она на карте не была, а тут была. Крастышевский поставил эксперимент, который нельзя было подвергнуть двоякому истолкованию: он нуждался в окончательной верификации и получил ее.</p><p class="p1">Лучшая из актрис второй студии МХАТа была известна тем, что прочитывала всю почту от своих поклонников и коллекционировала эти письма — не то для перечитывания в старости, не то для издания отдельной книгой. Курьезы попадались презабавнейшие. Что же, он написал ей несколько скромных, сдержанных писем, без малейшей эротической подоплеки. Эксперимент заключался в том, что он не указывал обратного адреса. Адрес был закодирован в строго составленных текстах. Прочее было обычным любовным бредом, не лишенным, однако, изысканности. На фоне общей безграмотной похотливости послания Крастышевского произвели впечатление. Была тихая, зловещая сентябрьская ночь. В такие ночи бесшумно падают сухие кленовые листья и беспомощно карябают по асфальту, царапают его, пытаясь зацепиться. А чего цепляться, ты уже всё. В такие ночи бесприютные влюбленные шатаются по улицам. В такие ночи переламывается время, и утром нет уже той осенней лихорадки, наступит серое, мокрое, стылое. В некотором смысле это последняя ночь. Забудь меня, никогда больше не вспоминай, живи своей жизнью: я говорю это именно тебе, не зря говорят — послушай меня и сделай наоборот. И в такую бесшумную, сухую сентябрьскую ночь, когда сквозь антрацитную черноту еще проступала кое-где золотая пыль осени, она приехала к нему по адресу, которого он не указал.</p><p class="p1">Это был шедевр. Он зашифровал этот адрес не в буквах даже, а в ударениях, в самом ритме, не выделив нужные слова ни подчеркиванием, ни цветом. Графика вообще была ни при чем, все решилось фонетически. И когда грянули неожиданные, как всегда, три звонка и Крастышевский распахнул перед ней дверь, уже зная точно, что она, ночные визиты не были еще в обычае, — о, миг триумфа, с которым ничто не сравнится. Ему неважно было, что к нему приехала ночью женщина, следы которой готовы были целовать все московские театралы и удачливые любовники, женщина, которую заваливали цветочными корзинами, которой снисходительно хлопали из правительственной ложи — легчайшими касаниями пальцев, дабы не выдать энтузиазма. Не женщина совершенная, мудрая как змея и чистая как змея в новой коже, волновала его. Волновало блистательное подтверждение метода, теперь уже бесспорное.</p><p class="p1">— Как вы нашли меня? — спросил он сдержанно.</p><p class="p1">— Но вы указали адрес! — ответила она, смеясь. — Как бы еще я нашла вас? Ну говорите же, я хочу знать все.</p><p class="p1">Велик, о, велик был соблазн рассказать ей всё — ей первой, именно той, на ком опробовал он свое зелье; но нельзя. Что бывает, когда мы доверяемся женщинам, хорошо знал главный русский автор: «Он из любви со мною проболтался!». И Крастышевский не сказал ей, каким способом внушил адрес; он воспользовался ею грубо, нагло, с полным сознанием победы. И это было далеко, далеко не так хорошо, как думали московские театралы. Он даже, пожалуй, и не хотел больше. И она почувствовала, и высвободилась, и была такова. Следующее письмо содержало приказание все забыть, и поскольку письма от прежнего адресата она бы не открыла, смертельно оскорбленная, — он написал ей от другого имени, настоятельно требуя в последней трети — «Помни! Помни!». И она стерла его адрес, так же, как и свой позор.</p><p class="p1">Так начались его тонкие, системные атаки. Три года они как будто не приносили результатов, и войной пахло все резче; определился и главный враг. Все попытки раздуть в главврага Британию, Японию, Испанию — оказывались тщетны; но поиски врага не прекращались, и как будто все ясней становилось, что кроме Германии, напороться не на кого. Уже ставились пьесы о том, как немецкий пролетариат скидывает фашистов и братается с русскими на поле боя; уже в карикатурах все чаще мелькали усики; уже готовился — Крастышевский знал это — фильм о том, как трактористов готовят в танкисты, не все ли равно, пахать или давить, если у нас гусеницы. Уже кое-кто припоминал лозунги «На Берлин»; уже напечатали в собрании сочинений плакаты Маяковского о том, как у Вильгельма Гогенцоллерна размалюем рожу колерно, — страшные вариации на тему «Француз не тяжелей снопа ржаного»; «В славном лесе Августовом битых немцев тысяч сто вам. Враг изрублен, а затем он пущен плавать в синий Неман». Уже такое печаталось, что стыдно было всегдашних разговоров о миролюбии; уже и самые эти разговоры были непредставимы.</p><p class="p1">Крастышевский почитывал, почитывал, что скрывать. Он врага изучал не менее тщательно, чем физиологию и походку главного адресата; читая его речи, он отлично выучился его повторам, паузам, неспешной тавтологичной аргументации. Он даже говорил иногда в его ритме, с его словечками. Но врага он знал не хуже. Враг, при всем внешнем сходстве, сильно отличался. Дело было даже не в том, что здесь для порядку иногда заговаривали о будущем, а там превозносили прошлое, великую эру ледяных титанов. Истинное различие коренилось в том, что здесь преобладала религия аскезы, простоты, гражданской скорби — ибо хорошим жителем считался только тот, у кого почти ничего не было, а если что-то давали — то нехотя, и с таким видом, будто надо было немедленно поклониться и вернуть. Там же царила сплошная радость, цветущее физическое здоровье — особенно контрастное на фоне местной желтолицести, сероодетости, постоянной пришибленности. Там с восторгом, с ликованием позволяли себе встать на четвереньки; там всё понимали, но продолжали с упоением лгать. Фашизм в том и заключался, чтобы с радостью преступать осознанный, отлично понимаемый моральный закон: с оргиастическим детским криком пасть в объятия дьявола.</p><p class="p1">Нет, мы были лучше, много лучше; но именно с нас и могло начаться то, чем все в целом должно было кончиться.</p><p class="subtitle">— 4 —</p><p class="p1">Временами Крастышевский был близок к отчаянию. В тридцать восьмом отчаяние сделалось его главным внутренним ощущением.</p><p class="p1">Нельзя сказать, чтобы его писания не действовали. Они не могли не действовать, но тут открылось то, что впору было назвать законом Крастышевского. В посланиях, во втором и третьем их слое, ненавязчиво внушалось, что есть способ удержать ситуацию. Если по тридцать седьмой включительно еще уничтожались те, кого было за что, хоть косвенно, — патологическая жестокость, конкуренция, возможные контакты с фашистами, чем черт не шутит, — то с тридцать восьмого появились разнарядки, и грести начали уже всех вообще, непредсказуемым образом. За себя Крастышевский не боялся, ибо был надежно закодирован, — он был практически невидим, на то существовали особые, нелингвистические способы; впрочем, теперь не помогала и кодировка, но дело было не в нем. Могло погибнуть нечто большее, чем он и все его теории. Он впервые начал догадываться, что бывают вещи хуже войны.</p><p class="p1">Описать то время смог бы только тот, кто в нем не жил, ибо у того, кто жил, сломались все механизмы для описания. Ужасна была именно постепенность этой перемены, ибо когда привыкаешь — перестаешь понимать, что, собственно, тебя не устраивало. На Крастышевского словно навалилась гигантская тяжесть большинства, мешавшая себя сознавать, ибо если большинство так терпело и, более того, так хотело — значит, ему было так надо. Крастышевский не мог сформулировать, почему надо. Он знал лишь, что здесь не было и следа оргиастической радости фашизма. Немцы мечтали быть плохими и с энтузиазмом бросались в бездну, русские же мечтали быть хорошими и могли стать хорошими только ценой покорности. Страх сковал все их потребности. Они строили из-под палки, почти не читали, о творчестве не могло быть и речи. Но они были хорошими, и ими были довольны.</p><p class="p1">Опрокинуть такую власть было невозможно. Взамен войны шло азартное самоистребление. Следовало арестовать столько-то и столько-то, кого — никто уже не вглядывался. Если посмотреть трезво, это было все-таки лучше газовой атаки, от которой вовсе уж не было спасения, — и если от тотальной мобилизации Крастышевскому некуда было укрыться, у него еще сохранялись шансы пересидеть террор в своей щели. Однако к концу тридцать восьмого года, когда все человеческие чувства оказались окончательно извращены, Крастышевский всерьез готов был усомниться в своей правде, — потому что он еще не видел тридцать девятого.</p><p class="p1">А именно в тридцать девятом он впервые получил доказательства, что его читают. Начались, как это называлось, подвижки. Полетел Литвинов, уцелевший, но смещенный с должности; на смену ему пришел человек тупой и во всех отношениях гнусный. А 23 августа случилось, случилось, и Крастышевский впервые за двадцать лет — что там! впервые в жизни! — по-настоящему напился, один, сам. Ибо Бог явил ему один из своих главных законов: бойся своих желаний, они осуществляются. Или, как говорил Сенека в нравственных письмах, — текст, который был у Крастышевского любимейшим, — смело проси Бога: ничего чужого ты у него не просишь.</p><p class="p1">Заключен был союз с единственной истинно, неприкрыто дьявольской силой; заключен был блок с беспросветной чернотой. Войны не предполагалось и быть не могло; вместо ужасного конца был ужас без конца. Крастышевский с омерзением смотрел на свои схемы. Не будь он так устойчив к любому воздействию, он принялся бы биться головой о стену. Он подумал о самоубийстве. Самоубийство было, конечно, невыносимым моветоном, но нельзя ли было составить такую надпись, которая подействовала бы на него самого? Нельзя ли было, по гимназической мечте, обратиться к себе самому на родном для себя языке? Дома никогда не говорили по-польски, но польский был всосан с молоком матери; вероятно, подсознательно Крастышевский его знал. Он стал лихорадочно вспоминать, как будет по-польски «умри», «умри сейчас же», «умри немедленно». Skonać? natychmiast? prędko? Но надо было все это донести до подсознания, иначе оно не отреагирует; когда-то он был знаком с фрейдистом, человеком толстым, с виду ленивым, но соображавшим стремительно; фрейдист-то и объяснил ему, что на команды отзывается только подсознание, а потому, командуя «Смирно» или «Правое плечо вперед», мы добиваемся, как правило, непредсказуемого результата. Идти-то они идут, но кто поручится, в какой момент им это надоест?</p><p class="p1">И ужаснее всего было то, что на следующий день должен был приехать Леня — и забрать совершенно уже готовый новый отчет. Крастышевский думал его уничтожить, но как, как загубить труд пяти месяцев, в котором снова с маниакальным упорством зашифровано «мир, мир во всем мире, иначе смерть тебе»?! И он заносил уже и руку, и спичку над драгоценными листками, но всякий раз отдергивался и продолжал биться в стену. Со стороны, должно быть, выглядело всё довольно комично.</p><p class="p1">Утром явился Леня, как всегда, чистый и ясный, и машина его сияла, и сам он был доброжелателен; Крастышевский ненавидел доброжелательных людей, но об этого разбивалась любая ненависть. Крастышевский вынес листки и, против обыкновения, решил с Леней заговорить.</p><p class="p1">— Ну что, Леня, — спросил он, — как жизнь молодая?</p><p class="p1">— Да живем, — ответил Леня. — Живем, хлеб жуем.</p><p class="p1">— Слыхали вы, мы с фашистами договорились?</p><p class="p1">— Слыхал, — ответил Леня, но распространяться не стал.</p><p class="p1">— Ну, и как же мы будем теперь?</p><p class="p1">— Да что же, — сказал Леня, — им наверху виднее. Курочка в гнезде, яичко в…</p><p class="p1">Крастышевский не знал этой поговорки, она ему понравилась. Было в ней что-то от самой души русского народа, всегда безразличной к будущему и насмехающейся над самой возможностью его предсказания.</p><p class="p1">— Ну а сами вы как? — спросил Крастышевский. Он заметил вдруг, что ничего не знает про Леню, а ведь интересно. Всю правду жизни мы узнаем от посредников, они-то и живут, а остальные — вожди, творцы, производители каких-ни-будь дросселей, поглощенные своими делами.</p><p class="p1">— Да неплохо, — сказал Леня. — Вот комнату дали.</p><p class="p1">Комнату ему дали уже два года как, но с тех пор ничего не давали, а потому это оставалось для него серьезным событием.</p><p class="p1">— А дети есть? — заботливо спросил Крастышевский.</p><p class="p1">— Дочка. Два года.</p><p class="p1">— А, ну прекрасно. Ну вот, возьмите. Извините, что задержал. Кстати, Леня! Мне может иногда понадобиться машина — ну, мало ли… У вас там в квартире телефона нет?</p><p class="p1">— Есть, — сказал Леня и с готовностью продиктовал номер. Крастышевский его запомнил — память была абсолютная — и поплелся к себе на пятый этаж.</p></span>
