<span><p class="p1">…И был необыкновенный день в конце октября, странный день, очень плохой, как понимал он впоследствии: день, начавшийся с плохого и тоже странного сна. Такие сны должны сниться убийцам. Он никогда не видел ничего похожего, но, может быть, теперь, когда он сам был виноватым, приплюснутым человеком, когда у него отнято все, вся культура, на которую он привык опираться и на которую не имел теперь права. Такие сны должны были сниться загнанным, тщетно — именно тщетно! — убегающим от преследования. Наверное, это было как-то связано с войной. Ему снился противогаз. Устройство показывал англичанин. Он говорил: сделано так, что нельзя подложить даже спичечного коробка. Почему именно коробка, спрашивал он? А некоторые подкладывают, но в условиях настоящей газовой атаки — смертельно. И он раз за разом погружался в противогаз, но тут же выныривал оттуда. Было невозможно, душно, жарко. Может быть, у вас дыхательный клапан завинчен? — спрашивал англичанин. Дайте мне, я проверю. Да нет же, говорил он, все отлично. Попробуйте. И Миша снова окунался в жар, в задыхание, и в этом противогазе еще надо было бежать. Он побежал сквозь сгущающийся серо-желтый воздух и выбежал вдруг в парк, но в парке все было не то. Листья пожухли — вероятно, под действием газа, — и кое-где валялись серыми кучками бывшие люди, полуистлевшие, вероятно, под тем же действием. И страшно давило, страшно жгло, но снять проклятую маску было нельзя, не то он сам тут же превратился бы в горсть серого тряпья. А потом надоело, и он сорвал маску. Воздух был обыкновенен, даже прохладен. Можно было дышать без страха отравиться. Но голос англичанина — его не было видно, он наблюдал откуда-то, — сказал очень холодно, очень серьезно: если вы не хотите играть в эту игру, что ж, вы будете играть в другую игру. Он сказал это по-английски, но при этом совершенно по-русски. Английской была интонация — разочарованная, высокомерная. Так и сказал: тогда вы будете играть в другую игру. И Миша понял, что это гораздо хуже любого противогаза, хуже даже, чем превратиться в серое тряпье, — но просить о пересмотре было уже бесполезно. Это не могло быть пересмотрено. И он проснулся с таким отвращением к себе, какого не чувствовал даже после собрания.</p><p class="p1">День был свободный, и он так устал от тоски и мыслей о себе, что решил совсем не думать, просто идти куда глаза глядят. И очутился в районе Новослободской, сел в трамвай, и трамвай понес его довольно быстро неизвестно куда. Миша загадал: раз он весь день шляется, не думая, то, значит, самое время проявиться судьбе, и трамвай привезет его к судьбе. В вагоне не было, однако, ни одной девушки его возраста, вообще ни одного приятного лица. Ехали среди рабочего дня либо старики, либо угрюмые люди сельского вида. Что они делали в Москве в это время? У некоторых были грязные рогожные мешки. Что могло быть в таких мешках? Человеческое мясо хорошо возить в таких мешках. Миша, кажется, заболевал, ломило виски, и горло побаливало. Обычная осенняя простуда, но теперь — очень некстати. С простудой можно ходить в институт, но не таскать тюки. Миша смотрел в окно, там подозрительно рано темнело, места были незнакомые. Казалось, сон продолжается, но все происходило наяву, просто он ехал непонятно зачем неизвестно куда. Город истончался, уменьшался, пропадал. Наконец трамвай остановился на конечной, там делал круг, дальше начиналось поле. Миша оторвался от холодного окна, к которому последние десять минут блаженно прижимался лбом, и увидел, что, кроме него, в вагоне осталось всего двое: согбенная старуха и ражий дядька с баулом. Они сошли и как-то сразу растворились в сыром воздухе, словно их тут ждали и мгновенно подхватили. А Мишу никто не ждал, он вышел из трамвая и шагнул в почти опавший, серо-желтый лесок. Тихо здесь было и пусто, и пахло землей. Небо было низкое и не серое даже, а бурое. Закурить бы, подумал Миша, но он не курил: пробовал и не понравилось. Он прошелся по облетевшему перелеску, чувствуя, что надо повернуть, что вот-вот его засосет воронка пространства, присутствие которой он ощущал иногда: именно так люди и пропадают без вести, и потом никто их не может найти, а выплевывает их это самое пространство за тысячи верст от дома, на какой-нибудь железнодорожной станции, где они ничего не помнят и никого не узнают. Это пространство было от него в полушаге, но он чуял, что надо еще куда-то пройти, сделать еще несколько шагов, а уже потом, возможно, повернуться и со всех сил бежать к трамвайной остановке, к последнему, что связывало его с городом и с жизнью. Он прошел еще метров тридцать и увидел то ли канавку, то ли ручей, и что-то ему подсказало, что перепрыгивать эту канавку не надо, а надо постоять. И точно — он поднял глаза и увидел, что напротив, на том берегу, стоит и в упор смотрит на него Валя Крапивина.</p><p class="p1">Это, значит, и была судьба. Она изменилась, но не настолько, чтобы не узнать. Щеки втянулись, лицо стало уже и строже, но по-прежнему она носила челку и по-прежнему смотрела с вызовом. Конечно, это была не она, но уж очень похожа. Скорее всего, это была галлюцинация. Если все время думать о человеке, то и начнешь его всюду видеть. Но он-то видел ее не всюду, и на улицах она ему не мерещилась, и на сходствах, как сказано, никто его не ловил. А здесь стояла именно она, подойдя к той же канавке с другой стороны. Скорее всего, это был призрак. И надо было ее окликнуть, заговорить, но он понимал — и она понимала, — что делать этого нельзя. Или она следила за ним, пряталась, ехала в том же трамвае и вышла раньше? Нет, этого никак быть не могло. Он смотрел на нее полминуты, не больше. Потом резко повернулся и быстро пошел назад — бежать было ни в коем случае нельзя, как нельзя бегать от собаки. Если это призрак, то, подобно шаровой молнии, он прицепится к тому, кто создает ветровой поток, в этот поток попадает призрак и может двигаться в нем быстрее, и не отцепится наверняка. Мише в голову приходили сумасшедшие, никогда прежде не являвшиеся мысли, он и такого порядка слов не помнил за собой. Все было как в бреду, и его знобило. Оглядываться тоже было ни в коем случае нельзя, но спиной, как и положено при встрече с призраком, он чувствовал ясно, что она тоже развернулась и тоже уходит. Но он-то идет к остановке, а вот она куда? Никакой остановки все не было, он усомнился уже в ее существовании. Может, проклятая канавка поменяла их местами, и теперь он идет все дальше в лес, а Валя уже едет в трамвае, приедет сейчас в институт и пойдет на лекцию. Но это был вовсе уж бред, Миша не настолько еще сошел с ума. И тут подошел трамвай, и Миша вскочил в него, словно за ним тянулись руки виллис, и водитель сказал, что здесь входить нельзя, здесь выходят. Входить можно было только напротив, здесь была конечная, а там начальная. На остановке Миша прочитал название: парк Тимирязевской академии. Господи! Это был тот парк, в котором грот, а в гроте убили студента Иванова, того, который стал впоследствии Шатовым; им рассказывал об этом Дурмилов, большой специалист по всякого рода бесовщине. Дурмилов, щурясь, тянул: у этого места дурна-а-а-я слава! Вот, значит, куда его занесло. Трамвай, казалось, никогда не поедет. Но прошло полчаса, и он поехал, и Миша заснул, трясясь на переднем сиденье, а дома начался жар, и от походов на работу он по крайней мере на неделю был избавлен. И три долгих месяца он так и не знал, что это было.</p><p class="subtitle">— 8 —</p><p class="p1">Но странно — после этого дня (потому ли, что ночь темнее перед рассветом?) стало легче и легче, и даже медбратство не было уже так мучительно. Привычка все побеждает, а молодые привыкают быстро. В ноябре он уже не терял аппетита после прозекторской, научился смеяться специфическим анекдотам, перешучивался с кастеляншей Марфой, сочинил даже стишок к семидесятилетию почечного больного Самохина из урологии, и внучка Самохина, очень хорошенькая, робко позвала его заходить, когда деда выпишут. И он записал адрес. Завелась у него и среда, не хуже прежней, потому что в больнице лежали всякие люди, не только никчемушные старики, но и вполне свойские парни, ровесники. Поскольку Миша так и не закурил, важная возможность для знакомств была утрачена, но пачку папирос астматику Колычеву он все же принес. Константин Колычев, двадцати шести лет, был совершенный инвалид, в чем душа держалась: ему регулярно грозились отнять ногу (и всякий раз спасали), кожа у него была именно та, что называется пергаментной, лицо треугольное, дробящееся и рассыпающееся от постоянных кривых усмешек. А похож он был то ли на политического ссыльного в Якутске десятых годов, как их описывали в партийных мемуарах, то ли на так и не выросшего мальчика из горьковских очерков про всякие подвальные страсти-мордасти. По вечерам Колычева лихорадило, он не мог лежать, ему хотелось двигаться и говорить. Он шатался по коридору на костылях, задирал сестер, на него не обращали внимания — потому, вероятно, что уже списали; но он был живуч.</p><p class="p1">— Санитар, — позвал он однажды. — Вы, вы. Подойдите. Вы мне можете морфия достать?</p><p class="p1">Про морфий было, конечно, сказано для затравки разговора. В коридоре были больные, да и какой морфий, откуда?</p><p class="p1">— Вы производите впечатление юноши просвещенного. Как вас сюда? Вы действительно сын Гвирцмана из Склифа?</p><p class="p1">Миша не отрекся.</p><p class="p1">— Почему же он вас сюда послал? Набираться опыта? Это хорошо, полезно. Врачу на войне всегда лучше.</p><p class="p1">Миша тогда не стал расспрашивать его про войну, хотя Колычев заговаривал о ней часто. Это была его идея фикс, пунктик. У легочных больных, знал Миша, такой пунктик есть непременно, и еще они часто озабочены эротикой — какие-то бугорки в мозгу. Он об этом читал в одной из отцовских кабинетных энциклопедий. Но про эротику Колычев с ним пока не разговаривал, а про войну — случалось. Собственная обреченность, видимо, заставляла его фиксироваться на чужой. Он был из тех, кому можешь рассказать про себя все: потому, наверное, что никому не расскажет, умрет не сегодня завтра. Но Колычев не умирал, и его даже выписали. Он позвал Мишу заходить, и Миша зашел.</p><p class="p1">Тут стал ему открываться невероятный мир, который был вроде и близко, но никто о нем не знал, потому что все ходили по поверхности. Пленка была весьма тонкой, и провалиться не составляло труда. У Колычева собирались совсем не те поэты, которых Миша привык видеть в институте. Читали они явно хорошие, но непонятные тексты, по большей части слишком простые: иногда это были детские стихи, иногда — отрывки прозы, сочиненные словно идиотом, с чересчур простым синтаксисом и непривычными названиями привычных вещей. Это была не заумь, а что-то после зауми, как будто в стране победили заумники и насадили свой язык, но у людей еще оставался прежний, и потому они говорили на странной смеси обывательщины и всяческого дырбурщила. Было понятно, как это сделано, и идея казалась привлекательной, но сам текст не впечатлял, то есть действовал только на ум. Бывал у Колычева кинохудожник, приносивший записки о Средней Азии, где половина слов была непонятна из-за среднеазиатского колорита. Бывал экскурсовод, писавший только в жанре экскурсии, тоном гида описывавший визит в булочную, в Парк культуры, в уборную. Миша не читал ничего своего и в обсуждениях старался помалкивать. Иногда, если Колычев был один, он показывал ему кое-что из ифлийского творчества и стыдно радовался, когда Колычев все это разносил.</p><p class="p1">— Послушай, какая бесподобная мерзость: «Такая точность, что мальчики иных веков, наверно, будут плакать ночью о времени большевиков»!</p><p class="p1">— Он писал это честно, — сказал Миша слишком твердо для трезвого, и было, увы, слышно, что он старается говорить именно твердо.</p><p class="p1">— Ну конечно, честно! — хихикал Колычев, дробясь и рассыпаясь. — Это и есть самое гнусное, что абсолютно честно! Если бы он сказал это за деньги, я бы первый восхитился. Искусство добывать деньги — не последнее и по крайней мере почтенное. А он — искренне! И ему никогда ничего за это не обломится, потому что они по-своему как раз порядочные люди. Они платят тем, кто честно зарабатывает, а не тем, кто хочет дойти до Ганга.</p><p class="p1">Колычев одной ногой уже стоял за чертой, а потому все, что касалось войны, смерти и неудовлетворенной страсти, было ему близко и родственно. Он в этом понимал. Он все чаще терял сознание и в эти минуты, видимо, что-то видел.</p><p class="p1">— Война будет обязательно, — говорил он, — и скоро. Без войны из всего этого нет вовсе никакого выхода. И заметь, что они подбираются с разных краев. Он пробовал в Испании, не вышло, там потушили. Все, кто видел эту неудачу, были виноваты. Он попробовал на Халхин-Голе. Тоже не получилось, потому что взяли и победили, а противник оказался тьфу. Тогда он зашел в Финляндию. С Финляндией было чуть лучше, но здесь, наоборот, тьфу оказались мы.</p><p class="p1">— Всё глупости, — не очень уверенно говорил Миша. — Если бы так хотели войны, не было бы пакта.</p><p class="p1">— Дурак, — беззлобно говорил Колычев. — Пакт ему нужнее всего. Они сейчас договорятся и вместе будут делить мир. Ты видел когда-нибудь, чтобы мы поддерживали приличного человека? Только людоедов. И здесь глубокая мысль. Все оттого, что мы не верим в чистую любовь. Мы можем поддерживать только корысть, а корысти ради нас любят только сволочи. Мы и Гитлеру нужны только ради хлеба. Сырья у нас вагон. Это будет гораздо хуже, чем война с Гитлером. Это будет война вместе с Гитлером, и слава Богу. После нее нас точно не будет. Мы вскочили на тонущий корабль, не буду тебе говорить, как он называется.</p><p class="p1">— Какой не думал век, что он последний, а между тем они толклись в передней, — процитировал Миша.</p><p class="p1">— Конечно, не последний, почему последний? Есть разные стадии вырождения, есть интересный подземный мир, у темноты свои градации. Мы все это увидим. Ясно только, что мы уже в подземном царстве, а там можно пробивать еще много днищ. Советская власть недурна, но есть в ней черное пятно, и оно будет теперь расползаться, пока не захватит ее всю. Ты думаешь, они подружились просто так? Нет, это давно должно было случиться Ты же знаешь, зло потому только еще не победило, что не умеет договариваться. Но на этот раз они договорились, и я не знаю, что может мир противопоставить этой силе. Наверное, они поссорятся, но только тогда, когда уже завоюют всех прочих. Тогда, разумеется, победим мы, потому что мы больше. Но, впрочем, за это время они смешаются до полной неразличимости.</p><p class="p1">И, как в стихах колычевских гостей, это была чушь, но в ней что-то было. Во всякой чуши что-то бывает, и порой кажется, что она-то и есть истинное лицо мира.</p><p class="subtitle">— 9 —</p><p class="p1">На Чистых прудах появилось новое лицо — девушка в белом свитере. Саша Горецкий сказал, что познакомится завтра же. Почему не сегодня? Сегодня он был не в лучшей форме. Вообще все самое важное надо откладывать на завтра. Сегодня рано, послезавтра поздно. Лида Сажина призналась, что у нее над постелью висела одно время бумажка: «Завтра начну худеть». Очень утешало по утрам. А потом как-то сама похудела и стала красавицей. Она говорила об этом легко, как и положено самоуверенной красавице, но с девушкой в белом ей было не сравниться. Та вообще была фея.</p><p class="p1">Миша решил, что с Горецким конкурировать не будет. Он увидел, как девушка в белом свитере села на скамейку и стала переобуваться, понял, что она сейчас уйдет и шанс будет упущен, и подъехал к ней, торопясь изо всех сил, чтобы не успеть передумать.</p><p class="p1">— Здравствуйте, — сказал он, — мы любим вас.</p><p class="p1">Эта фраза пришла в последний момент и была прекрасна тем, что на нее нельзя было не ответить. И она ответила именно так, как он предполагал:</p><p class="p1">— Здравствуйте, а сколько вас?</p><p class="p1">Теперь близорукий Миша хорошо ее рассмотрел. Она была красива необыкновенно, ровно в том смысле, какой и вкладывается в это слово: обыкновенная красота может остановить взгляд, может даже заставить разинуть рот и посмотреть вслед, но не вызывает желания любой ценой, вот здесь, сейчас, вступить в то же тайное общество, в котором состоит эта женщина. Ведь она состоит, иначе откуда такая уверенность, ладность? При виде такой красавицы всегда понимаешь, что где-то есть такие, как она, но мы их не видим, потому что это общество тайное. Она была из тайного общества людей, ходящих по воздуху. Они в любой момент могли из этого воздуха соткаться и защитить ее от всякой опасности. У нее всегда все получалось. Улыбка ее была заговорщицкая. Волосы ее рыжие с золотом, нос прям и ровен, лоб высок, черты соразмерны. Уста ее имели тот карминный оттенок, ту нежную алость, которой Миша никогда не видел, но представлял. Карминную помаду готовил парфюмер Рене для королевы Марго. В этом слове был также камин.</p><p class="p1">— Нас человек семь, — небрежно отвечал Миша, — они все вон там катаются, а я расхрабрился и подъехал.</p><p class="p1">Он вообще сильно осмелел с того момента, как его отчислили. Кроме того, у него был теперь заработок. Он был самостоятельный, немного демонический юноша, которому нечего терять.</p><p class="p1">— Вы хорошо сделали, — ответила она, — но долго собирались. Я уже ухожу.</p><p class="p1">— Это ужасно, — сказал Миша. — Лучше мне вас не провожать, ведь вы идете к кому-то, а я этого не переживу.</p><p class="p1">— Лучше не провожать, — кивнула она, — потому что я уже переобулась и не смогу вас ждать. А иду я в театральную студию, туда нельзя опаздывать. Вы это переживете, а завтра я опять здесь буду в это время.</p><p class="p1">— Вы не придете, — сказал Миша, — я точно знаю. Я не смогу даже позвонить вам.</p><p class="p1">— Не сможете, — подтвердила она очень серьезно. — Мы недавно приехали, телефона еще нет. Поэтому я приду. Ведь вы меня любите.</p><p class="p1">И ушла, и, конечно, обернулась. Он знал, что она обернется. Обернулась, но махать не стала.</p><p class="p1">Назавтра Миша пришел ровно в семь, и, конечно, она явилась в четверть восьмого, это было как балет. И он подлетел к ней. Она была еще лучше, потому что без берета. Берет не шел, или, точней, ей все шло, но он увидел теперь всё золото, всю рыжину. Вокруг было сказочней прежнего, снег порхал, фонари сияли благожелательно. Миша прищурился, и вокруг всего выросли лучи.</p><p class="p1">Ее звали Лия, ее отец работал в Германии, потом приехал. О матери она никогда не рассказывала. Она училась теперь в педагогическом институте, но готовилась поступать в театральный, в какой-нибудь из трех, как делается всегда: куда пройдет. Поступать сразу после школы она не решилась, а в педагогическом думала проучиться год, просто чтобы не терять времени. В крайнем случае останется учительницей, она прекрасно ладит с детьми. И почти со всеми она говорила как с детьми, не снисходительно, а скорей сострадательно и очень серьезно. У нее были ямочки на щеках, тонкие пальцы, все в ней было невыносимо, невыразимо изящно, и Миша всегда понимал, что приблизиться к такой девушке ему не дано. Но он уже понимал, что, если ничего не делать — ничего и не будет, и потому нагло расспрашивал об отце, нагло набивался в театральную студию, куда она ходила, — и в самом деле получил приглашение туда зайти.</p><p class="p1">Они репетировали пьесу, которую сочиняли сами. Сюжет ее был — строительство города в тайге. Началось с этюдов: Орехов предлагал «безнадежное положение», «невыносимую неловкость», «знакомство», и как-то все это закрутилось вокруг быта комсомольцев в новеньких бараках, вокруг массового выезда в незнакомые места. Тут был простор для освоения любой натуры, импровизировали сколько угодно — в тайге появлялись валуны, льды, только что не пустыни; публика была самая разношерстная, работы хватало всем типажам. Орехов пояснял, что строительство города — древнейший сюжет, позволяющий всем раскрыться. Ну, или уничтожение, неважно. Если греческая Илиада была про осаду и разрушение, то наша, советская Илиада должна быть про созидание.</p><p class="p1">Орехов был из беспризорников, и поначалу Мишу это поразило — так он был культурен, мягок и так умел подладиться к каждому; но, вдумавшись, Миша понял, что это и есть школа беспризорщины — иначе не выживешь. Со всеми ласков, любую идею принимал восторженно, с тщательно имитируемым детским любопытством, но умел всегда повернуть так, чтобы на ней появлялся ореховский налет. Он в высшей степени умел то, что называется «студийностью» и без чего будущего театра не бывает. Миша полагал, что и Станиславский действовал так же. Это не было актерской вольницей: Орехов сначала создавал климат, в котором каждый являл свое лучшее, а после отбирал то, что ему годилось. Годилось ему, впрочем, не лучшее. Миша с трех репетиций понял, что без Орехова это был бы другой спектакль, куда более талантливый и пестрый. Орехов отбирал идейное, позитивное и трогательное. На этом думал он построить советскую сказку. Его главной формальной идеей был хор, объяснявший все обстоятельства. Герои занимались в основном тем, что рассказывали о себе — как говорил дядя, выбалтывались, — выясняли отношения и пели песни. Изобразить на сцене трудовой процесс не удавалось даже хору. Выходила лютая вампука: о, как мы побежим! Вместо трудового процесса были песни, много, из них состояло почти все действие. Это и была комсомольская опера с вкраплениями споров о вредительстве. Без вредительства не выходило конфликта.</p><p class="p1">Студия собиралась дважды в неделю, по средам и субботам: Миша скоро начал благословлять эти дни, точней, глубокие, мягкие поздние вечера. Декабрь сорокового был теплый. Техника Орехова была такая: он «задавал обстоятельства». Назначенцы, то есть те, кого он уже назначил на роли, вступали в диалог. Летописцы, они же Несторы, записывали удачные реплики. Наблюданцы, они же недовольцы, предлагали свои действия в предложенных обстоятельствах. Обсужданцы, они же зрители, отбирали лучшее. В паузах между сборами Орехов все это записывал. Так из вариантов, ветвясь и кустясь, росла пьеса, в которой от бурных споров, насмешек и озарений почти ничего не оставалось. Если бы Творец творил коллективно, мир был бы невыносимо скучной равнодействующей. Эту мысль следовало продумать.</p><p class="p1">Но самым ценным результатом всего творившегося в гимнастической зале на Никитской была не комсомольская опера о городе ветров, а то, что происходило после репетиций и вне студии. Когда режиссер Степанов, немногословный и вечно недовольный — без этого он не мог бы выглядеть единственным профессионалом, — гулко хлопал в ладоши и говорил «Сегодня всё», начиналось главное: раздувался настоящий самовар, за который отвечал Орехов (у него был для этой цели особый сапог, никто не подпускался к сапогу), заваривался чай, девушки — как были, в гимнастических трико, прелестные, разгоряченные, — устраивали застольный уют, распивалось легкое белое — возникала милая суета, и тут-то импровизировались диалоги получше сценических.</p><p class="p1">А всего слаще было возвращаться с репетиций. Всякий город создан для своего тайного заветного действия, и Москва — по крайней мере та, какой она была в том декабре, — казалась устроенной для ночного возвращения с репетиций одинокого медбрата, влюбленного одновременно в ангела и демона, причем демон был немного ангелическим, а ангел — демоническим, или так: ангел — немного падшим, а демон — немного взлетевшим; вот такая сложная, витиеватая цель — но ведь и сам город сложен и витиеват, изгрызен переулками, кротовьими норами, внезапными выходами из одного пространства в другое. Миша шел пешком с Герцена на свои Чистые пруды под крупными снежными звездами, город был тих, снег глушил все, даже трамваи Бульварного кольца лязгали вполголоса. Петербург, положим, хорош для неусыпных трудов и судорожных пиров Петра, для экзекуций и рекреаций, для корабельного строительства на плоских берегах и восстаний на обширных площадях; Москва нехороша для восстаний, они в ней обычно не удаются, а для трудов тесна и суетлива. Москва вся как бы кругами расходится после чего-то главного; камень брошен, и пошли круги — Бульварное, Садовое, Окружная железная дорога… Вся Москва расходится кругами — с пьянки, гулянки, репетиции. Репетиции длятся вечно, от слова репетэ; спектакль никогда не состоится, главное — расходиться. В Москве хорошо поздними вечерами возвращаться из школы, с заседаний непременно авиамодельного кружка, хотя хорош бывает и кружок мягкой игрушки. Хорошо идти с репетиций, долго провожать друг друга, прощаться в подъезде, целоваться, возвращаться, терять варежки. Москва создана для молодых людей, еще не перешедших окончательной черты ни в чем — ни в изгойстве, ни даже в любви; переходить эту последнюю черту в Москве всегда негде.</p><p class="p1">Миша много думал о том, где же и как им наконец с Лией сделать то, к чему все шло; чем больше обожали Лию все хозяева и гости студии, чем ярче сиял вокруг нее ореол этого обожания, чем напевней делалась ее речь, как бы состоящая из одних переливчатых гласных, — тем яснее Миша видел, что это все ему, и не за особенные его достоинства, а просто потому, что он первый осмелился это взять. Вот так подойти и сказать: мы вас любим. И все-таки она чего-то ждала от него, чего-то еще ему не хватало, он знал, что форсировать нельзя.</p><p class="p1">Но он уже знал, что из всех его воспоминаний, которые случится же когда-то перебирать, самым золотым светом будут сиять все эти посиделки и попевки. И, когда ему вспоминалась Лия, а она, собственно, и не вспоминалась, а так и жила с ним все дни, встречала его теперь каждое утро, и он тупо улыбался в подушку, — он чаще всего видел ее в профиль, рот полуоткрыт, волосы еще собраны в хвост после акробатики, слушает Гуннарса и Цветкова, поющих хором еженедельную порцию частушек, — и на лице то сложное сочетание любопытства, любви и жалости, которое он видел у нее только в студии. Он не понимал, как можно было так слушать частушки, или песенки Горецкого, или жестокие романсы Орехова, которых набрался он еще в беспризорничестве.</p><p class="p1">— Это же шлак на три четверти, Лийка, — сказал он в начале очередного провожания; Лийка — была единственно доступная ему фамильярность, надо же было называть ее как-нибудь простецки, чтобы не прорывалось все время благоговение. В конце концов он был студент, хоть и отчисленный, и старше двумя годами, и должен был скрывать, что чувствует ее старшинство.</p><p class="p1">— Ну вот четверть и останется, — ответила она тихо и как бы виновато, все понимая, но не умея предотвратить. И, после нескольких шагов в молчании: — Не факт, что это будет лучшая четверть.</p><p class="p1">Он заговорил о том, что в литературе остается как раз лучшее, можно оспаривать отсев, как некоторые пытаются доказать, что Кюхля писал лучше Пушкина, — но почувствовал (он всегда это чувствовал с ней), что говорит мимо темы.</p><p class="p1">— Литература не то, я не про литературу.</p><p class="p1">— А про что?</p><p class="p1">— Про четверть. Вообще останется четверть, и я никогда не понимаю кто. Себя, например, не вижу, про себя ничего не знаю. Ты вот останешься. — Этот ее взгляд он знал: прищуренный и, кажется, неодобрительный, словно говорящий: «Ишь ты!» — но так, как говорят про удачливого жулика.</p><p class="p1">— В каком смысле останусь?</p><p class="p1">— В прямом. Запоминающийся такой. Это не всегда хорошо, кстати. Виноват будет другой, а запомнят тебя.</p><p class="p1">— Любишь ты, Лийка, говорить непонятно, — сказал он, чтобы стряхнуть страх. Он всегда побаивался, когда она так говорила.</p><p class="p1">— Да все тебе понятно. Мишка, отстань. Сколько можно целоваться.</p><p class="p1">Он понял это как намек — действительно, хватит целоваться, пора уже дело делать. Есть рубеж, на котором не стоит задерживаться. Но рубеж этот труден, и всегда есть страх, что ничего не получится: он это чувствовал, хотя дальше интенсивного обжимона (нужно другое слово, но где взять?) ни с кем еще не заходил. Дело не в банальной робости, не в пошлом «получится — не получится», но в том, что последнего взаимопонимания не будет, а без него любые совпадения прочитанных книжек ничего не значат. Ужас, что все должно подтверждаться чем-то грубым и земным, хотя отчасти, конечно, небесным. Ужас, что в основе всего так-таки плоть, базис, как в основе всякой поэзии, учат нас отцы-основоположники, лежат производительные силы. И, значит, придется решать десятки унизительных вопросов, переходить от провожаний и разговоров к поискам идеального времени и приемлемого места. С ней было ясно и просто, но до поры. Барьер он чувствовал, и, если бы не барьер, Лия была бы обычным своим парнем, как все та же Вера, комбригская дочка.</p><p class="p1">И временами он начинал ненавидеть ее красоту, которая притягивала всех, красоту, на которую оглядывались (заодно скользя взглядом и по нему — и взгляд этот был не завистливый, как ему бы хотелось, а снисходительный: ну, этот-то не помеха). Он видел в ней и силу, и мудрость, и скрытый талант — ведь, не сочиняя песенок и не подавая реплик, она все-таки была в студии талантливей всех, это признавалось молчаливо и единогласно; а другие видели красоту в самом пошлом смысле, и с ними надо было держаться так, чтобы не увели. Ах, она с такой легкостью могла польститься на ложную многозначительность, на чье-то жирное восхищение, на зрелость, наконец! Столько пошляков вокруг мечтали с ней быть, и для красоты это так привлекательно — желать восхищения, раздаривать себя! Сам он рядом с ней чувствовал себя иногда как собака на сене: Лию надо было уступить тому, с кем она смотрелась бы лучше. И при этой мысли он закипал.</p><p class="p1">Иногда им случалось разговаривать о войне. Эту тему Миша ни с кем старался не расковыривать, потому что ему всегда казалось, что только оказанное слово приближает катастрофу, а пока о ней молчат, она как бы спрятана. Самое ужасное, что он не понимал, с кем будет эта война. Иногда ему даже представлялось, что она будет гражданской. С Германией мы договорились, никакой Европы больше нет, Англия далеко, Америка еще дальше, с Японией в последнее время тоже начались странные телодвижения с обеих сторон — мы как бы не против, да и мы не против, да, и ведь мы такие большие… Интересно было бы с Африкой, тут намечался как будто сюжет. Еще любопытней с Антарктидой, вылезут оттуда страшные ледовые люди… Но понятно было, что вечно жить в таком неврозе нельзя, он должен чем-то разрешиться, иначе никто так и не поймет, к чему мы всю жизнь готовились. Все это Миша попытался изложить — по возможности насмешливо, хотя смеяться было не над чем: мало того, что вся история придет к бездонному зеро, но и вся его жизнь кончится ничем, а это волновало его гораздо серьезнее.</p><p class="p1">— Нет, — сказала Лия, — война обязательно будет. Я знаю.</p><p class="p1">Миша даже возмутился: что ты знаешь, откуда?</p><p class="p1">Она помолчала таинственно.</p><p class="p1">— Я могу тебе рассказать, и ты даже поймешь. Но будет ли тебе хорошо от этого?</p><p class="p1">— Ох, Лийка. Мастерица туман разводить.</p><p class="p1">Но полчаса спустя он сам жалел, что уговорил ее рассказать. Страшно было все — и то, что она это знала и вот такое носила в себе; и само по себе то, что она рассказала; и главное — что она, похоже, была права.</p><p class="p1">— Это убийство двадцать второго года, — сказала она, наконец решившись. — На ферме Хинтер Кайфек.</p><p class="p1">И уже в названии фермы почудилось ему ужасное.</p><p class="p1">— Мне сначала в школе рассказали, когда я там училась. И потом я все прочла, все, что могла. Но яснее не стало.</p><p class="p1">— И кто кого убил?</p><p class="p1">Лия все молчала.</p><p class="p1">— Ну, слушай, — заговорила она наконец, глядя вдаль странно расширенными глазами, словно ее и мучила, и завораживала эта история.</p><p class="p1">Она рассказывала не так, как дети рассказывают страшное — наслаждаясь и гордясь, что завладели вниманием всей компании где-нибудь ночью у костра, — а как будто заглядывая на изнанку мира, и то, что она видела, было жутко, но очень важно.</p><p class="p1">— Это ферма в Верхней Баварии. Сейчас ее уже нет, там год спустя все сровняли с землей. Три здания — дом, конюшня и сарай. Все это такое, знаешь, немецкое, низкое, приплюснутое. И толстые стены, беленые, как каменное мыло. Жили там Груберы. Муж и жена, Андреас и Цецилия, она старше на десять лет. Его насильно женили, потому что она единственная наследница фермы, а он из бедняков, батрачил там у них, что ли… Он ее не любил совсем. И она действительно очень некрасивая, тоже низкорослая. И у них была дочь Виктория. И с этой дочерью он стал жить как с женщиной с ее четырнадцати лет.</p><p class="p1">Лия сказала об этом очень просто, как говорят о скоте.</p><p class="p1">— Подожди. Дочь точно была от него? Может, эта Цецилия была вдова уже?</p><p class="p1">— Нет, точно. Если бы не от него, было бы не так дико. Но именно от него, и он бил их все время. Обеих.</p><p class="p1">Замолчала.</p><p class="p1">— А соседи?</p><p class="p1">— Соседи знали, конечно. В деревнях всегда всё знают. Но это же ферма, отдельный, можно сказать, хутор. Там две соседские семьи. Про одну будет дальше потом, а на другой вообще с ними не знались. Не любили их сильно. Викторию эту еще туда-сюда, а Андреас был хмурый, часто пьяный. Жена все знала. Она не возмущалась, ничего. Да и что могли они обе? А потом, в двенадцатом году, когда Виктории было двадцать три года, ее выдали замуж, но к отцу она продолжала бегать при первой возможности.</p><p class="p1">— Добровольно?</p><p class="p1">— Ну, кто же теперь скажет. Думаю, добровольно. И муж все знал, поэтому через два месяца такой жизни он сбежал от них. Назад к родителям. И призвался оттуда в армию, и пошел в четырнадцатом году на войну. Его убили под Аррасом, знаешь битву при Аррасе? В октябре. Тысяч сто поубивали с разных сторон. Он провоевал всего три дня. Мясорубка.</p><p class="p1">Миша слышал только об одной битве при Аррасе — той, в которой убили барона де Невиллета и тяжело ранили Сирано, — но кивнул. Да и какая разница.</p><p class="p1">— Вот. А у Виктории осталась дочь, непонятно от кого. Тоже Цецилия. К двадцать второму году ей было семь лет. А в пятнадцатом году Виктория вдруг призналась священнику на исповеди, что все то время вот такое было с отцом. А священник не смолчал, видишь? Все одно к одному. Если священник нарушает тайну исповеди, это страшное дело. Но ему показалось, что инцест — это более страшное дело. И он проговорился, и Андреасу дали год каторги, а Виктории — месяц тюрьмы.</p><p class="p1">— Ей-то за что?</p><p class="p1">— А по немецким законам это общий грех. Прелюбодеяние. И он год спустя вернулся, и все это опять началось, представляешь? Но в девятнадцатом году Виктория соблазнила соседа. Пришла к нему за чем-то, якобы по хозяйству, и там в сарае буквально заставила. Так он рассказывал. Он был немолодой уже, сорок с лишним. Похоронил только что жену. И там уж непонятно, кто кого соблазнил. Но у них было несколько раз, в том же сарае. И она забеременела опять. И сосед пришел к Андреасу просить ее руки, но тот сказал: никогда.</p><p class="p1">— Почему?</p><p class="p1">— А кто знает. Наверное, любил. Такая тоже любовь.</p><p class="p1">— А сосед?</p><p class="p1">— Сосед сказал: но она же беременна. А Андреас ответил, что он за это уже отсидел и все равно запишет ребенка на себя. Но ребенок родился больной. Уж он-то явно был от этого дикого брака с отцом. Он не рос почти и был отсталый. Видишь, сколько там уродства на одну ферму? Прямо концентрация, всё налицо. И тогда этот сосед женился на другой, но про ребенка все равно всем говорил, что это его сын.</p><p class="p1">— Вот. — Она снова замолчала, и Миша не торопил. Он уже чувствовал, что дальше будет хуже. — И вот март двадцать второго года. Я это все очень хорошо помню, в газетах подробно было. Мы же в Мюнхене жили, там это недалеко. В библиотеку ходила, всё читала. В конце марта Андреас ездил на ярмарку. И там в кабаке одному человеку рассказал, что начались странности. Что он слышал шум на чердаке ночью, а в лесу, рядом с фермой, кто-то ходил с факелом. А потом видел, что от опушки леса к его дому шла цепочка следов. Явно один человек. И следы обрываются у его порога, а обратных следов нет.</p><p class="p1">— Жуть.</p><p class="p1">— Да. Вот он это рассказал, а сам с выручкой поехал домой. Он не хранил деньги ни в банке, нигде, не верил никому. Все знали, что деньги в доме, и все его боялись. И на следующий день, и через два дня видели дым у них из трубы, и свет был в окнах. Приходил мастер чинить трактор, с ним Андреас за неделю договаривался, потому что весна, скоро пахать. Он приходит — никого нет, сарай открыт. Стал чинить трактор, нарочно громко свистит, поет — вдруг откликнется кто. Никто не отозвался. Он постучал — глухо. Удивился и ушел. А потом почтальон пришел, принес газеты. Видит — окно кухни открыто, там детская коляска. Удивился, газеты бросил и ушел. А еще через день приходит — опять окно, опять коляска. Ее не сдвинул никто. Тут он насторожился и пошел в поселок, и там вспомнили, что дочка в школу не ходит уже три дня. Пошли к этому соседу, от которого сын. Он говорит: я их тоже не видел. Видел только, говорит, свет от фонарика позавчера ближе к лесу, но когда я окликнул, то фонарик погас. Пошли на ферму впятером, взяли самых крепких на всякий случай, а там уже не надо было никаких крепких. Там в сарае лежат Андреас, его жена старая, Виктория и девочка. Лежат прямо на пороге, старой дверью прикрыты и сеном. У всех четверых головы разбиты ударом крест-накрест, то есть как бы в два удара тяжелым и острым. И кирка рядом, мотыга. Так выглядело, будто их кто-то заманил в сарай вечером. Они все уже были в исподнем. Дверь там узкая, заходили по одному. Кто-то их там ждал. А потом убили прислугу их, хромую, тоже больная была — одна нога короче другой, и если над ней смеялись, то она на людей прямо кидалась, нигде не задерживалась дольше месяца. А эти взяли, они сами, понимаешь, кидались на людей… Вот, ее зарубили в комнате, а младенца — в детской. Причем…</p><p class="p1">— Да не тяни ты!</p><p class="p1">— Причем, — сказала она, опустив голову, — ого ударили, уродца этого, с такой силой, что полчерепа на метр отлетело буквально. И кровать в щепки. Кто-то сильно очень молотил.</p><p class="p1">— Начинаю догадываться.</p><p class="p1">— Погоди. Ни гроша не взято, все деньги на месте, хоть они лежали практически на виду. И самое страшное не это, а то, что на чердаке нашли привязанную веревку, очень толстую, и потолок был разобран над конюшней. А там все строения — сарай, конюшня, дом, — они соединены, так что можно было спуститься, скажем, в конюшню и пройти в сарай. И на чердаке были следы, там жил кто-то. И до убийства, и, что совсем непонятно, после. Их убили еще в конце марта, а ушел убийца совсем недавно. Он задавал корм скоту. Собаку привязал, но кормил. И ходил по опушке, ходил, не уходил никак. Собак привезли, они нашли следы на опушке, а дальше их замело, и в лесу они уже не нашли никого. И еще, ты знаешь… Вот я не могу про это рассказывать.</p><p class="p1">— Но теперь-то, раз начала…</p><p class="p1">— Вот эта девочка… она из всей семьи, мне кажется, была самая нормальная. И она умерла не сразу. Потом писали, что если б ее вовремя нашли, то она бы спаслась. У нее порезана была шея, и она пальцами пыталась зажать раны. И нашли несколько клочьев волос, у нее в руках были зажаты клочья и кругом были. Это оказались ее волосы. Ты понимаешь? Она лежала там под трупами еще живая, зажимала свои раны и от боли рвала сама на себе волосы. Лежала, может быть, три часа, может быть, всю ночь. И была жива. И не могла кричать или боялась. Может быть, она и рвала волосы, чтобы не кричать. Вот как после этого можно вообще? Я понимаю, конечно, что под Аррасом умерли в ужасных муках, с разорванными, там, животами, триста тысяч человек, и от газов в разное время погибло не меньше, но там война. А когда я подумаю про эту девочку, дочь, наверное, собственного деда, которая родилась на этой глухой ферме, ничего, кроме фермы, в жизни не видела, и умирала там ночью, и рвала на себе волосы… я тогда думаю: нет, уже никто никого не спасет.</p><p class="p1">— Но это сосед, конечно.</p><p class="p1">— Нет, не сосед. У соседа алиби. Оно, правда, странное, потому что сначала он якобы там в предполагаемую ночь убийства сказал жене, что пойдет ночевать в сарай… слышал он какой-то шум, сказал, пойду караулить. А потом жена сказала: нет, он спал со мной. Но следы остались кровавые, такие большие мужские ботинки. А у него не нашли таких.</p><p class="p1">— Мало ли, в лесу выбросил. Сжег.</p><p class="p1">— Нет, не нашли. И не сжигал он ничего. И мотив у него какой был — обида? Правда, он платил на ребенка. Но это же его было решение. Я знаю, кто.</p><p class="p1">— Убитый муж, — сказал Миша, криво улыбнувшись.</p><p class="p1">— Конечно. Но понимаешь… его же никто не видел убитым. Было дознание. Опросили всех, кто с ним воевал. Видели его в начале боя, а потом там такое началось, что уже было не до отдельных людей. Объявили пропавшим без вести, а потом кто-то сказал: да видел я, в него осколок попал. И записали погибшим. Кто же там найдет.</p><p class="p1">— Это важно. Ты не говорила.</p><p class="p1">— Да. Но я не для эффекта, а просто — не пришлось. И я думаю, что он решил отомстить, и ждал, и пришел в двадцать втором, когда они уже не ждали, и убил всех.</p><p class="p1">— Ты думаешь, он так любил Викторию?</p><p class="p1">— Да не думаю. По-моему, тут другое. По-моему, он просто навидался… и решил, что самое средоточие греха — вот. Что и война была для того, чтобы смыть общие грехи. Что, грубо говоря, война была из-за них. Что он там рехнулся, после первых обстрелов, и ему представилось — вот, когда люди столько грешат, рано или поздно у Бога заканчивается терпение. И он подумал, что вся война, весь вот этот Аррас, кишки на деревьях и все такое — это было за Викторию и Андреаса. Потому что много же было таких ферм. На него это сильно подействовало, я думаю, он потому и сбежал. И ребенка с такой силой убивал, чтобы от них никакого уж следа не осталось. А может, просто этот ребенок ему представился таким исчадием ада — плод греха и еще урод, — и он его за всех…</p><p class="p1">— Ужасные вещи ты носишь в голове, конечно.</p><p class="p1">— Ну а как, Миша? Там ведь все газеты это обсасывали, и до сих пор обещают премию за любую информацию, которая поведет к раскрытию. Модная такая тайна. Причем, конечно, никто никогда не найдет. Его же считают мертвым.</p><p class="p1">— Но почему он тогда там жил еще три дня?</p><p class="p1">— А не знаю. Наверное, ждал погоды, чтобы тихо уйти, чтобы в лесу следы замело. Там снег вдруг пошел, в начале апреля. Или еще чего-то ждал. Или кормил коров, чтобы не орали. Не знаю. Но они шли к нему в сарай, как будто знали его. Понимаешь? К незнакомому человеку они бы не пошли. Андреас, видно, вошел первым, его там завалили, а дальше пошла жена, а потом Виктория, а потом дочь. Но, конечно, к чужому не вошли бы. Хотя тоже не знаю. Странно все. Он же мог бы с чердака прямо в спальню спуститься. Но знаешь, как я представлю… что вот они жили там, а он в это время прятался на чердаке и готовился… ел что-то, там объедки нашли… И что потом этот рабочий сидит, чинит трактор, а на чердаке в это время выжидает убийца. И если только рабочий что-то заподозрит, его тут же мотыгой… И он свистит еще, да? Но, думаю, его бы он не убил. Он этим отомстил — и хватит. Правда, служанка… непонятно со служанкой.</p><p class="p1">— А представляешь, если это все из-за служанки?</p><p class="p1">— Я тоже думала. Она на кого-то наорала, на ребенка, который дразнился, — а он вырос, убил ее и всех. Причем, понимаешь, я даже не очень бы удивилась. Просто потому, что настолько уже можно все… Понимаешь, там Германия после войны. Нищая. И все со всеми, буквально. Извращения любые, все. Потому что война ведь не кончилась. И я даже думаю… то, что он, как бы мертвый, как бы из аррасской могилы за ними пришел, — это ведь и значит, что война не кончается, видишь? Эта война еще будет, придет за всеми. Потому что я не знаю, чем еще можно такой мир спасти.</p><p class="p1">— А войной можно? — спросил Миша. Он разозлился. Ему не хотелось войны и не нравилось, когда в войне видели нравственное благо.</p><p class="p1">— А войной можно, но не всякой. Вот ты подумай. Должна быть такая война, которая во что-то перерастет. Во время которой люди что-то вспомнят. Она должна быть очень огромная, очень. Очень страшная. Но только такая война сотрет все вот это, и с нее начнется новый мир. Уже навсегда.</p><p class="p1">— От количества зла, Лийка, ничего нового начаться не может.</p><p class="p1">— Нет, может! — закричала она. — Ты просто не понимаешь еще. Все это время растет, пухнет огромное, невыносимое зло. Оно было рассредоточено, а теперь собралось. И это единственный шанс его убить, и мы все сейчас ждем, чтобы оно набухло и треснуло. Его можем убить только мы, больше некому.</p><p class="p1">— А виновата ферма.</p><p class="p1">— Виновата ферма, да, — кивнула она. — Виновата ферма. Но пойдем ходить, я не хочу больше про это говорить.</p><p class="p1">— Я все равно теперь буду про это думать.</p><p class="p1">— Думать — пожалуйста! — согласилась она. — Обязательно думай. Ты же должен знать, чем все кончится.</p><p class="p1">И этой же ночью Миша почти не спал: ему все представлялся чердак, свет на опушке и толстая веревка в конюшне. И рядом неслышно переступает скот. И убил всех кто-то, кого они знают, кого они все бессознательно ждут. Но ничего мистического он в этой истории не видел. Ну, не взяли денег, подумаешь. Значит, кто-то, у кого достало жестокости убить Груберов, очень сильно их ненавидел — до того, что брезговал деньгами и любым их имуществом. Но действительно, хоть Миша и не хотел себе признаваться, концентрация уродства и зла во всей этой истории была такая, что только всех убить — а уж после такого убийства сровнять с землей ферму, и Мюнхен, и Германию, и весь прочий мир. Словно язык какой-то выхлестнулся из преисподней.</p><p class="p1">И на Лию он смотрел после этого иначе — как на девочку, причастную тайне жизни. Ведь только в нераскрытых преступлениях и виден почерк жизни: в раскрытых все рационально, а здесь вскрывается подвальное. И хотя Лия была грозно-прекрасна, говоря обо всей этой грязи, — теперь он еще меньше был готов переступать черту; и ему виделся в этом грех — странное слово, совсем не из его лексикона. Словно, сделав с ней это, он бы уже бесповоротно накликал расплату — ту самую, о которой она говорила: общую месть за личные грехи.</p><p class="subtitle">— 10 —</p></span>
