<p class="p">ЭПИЛОГ</p>
</div><p class="p1">Ранним утром в воскресенье Леня с женой и дочкой отправился в лес. Наташа давно просилась в лес, и хотя грибам было еще рано, он не мог отказать. Она никогда не была в настоящем лесу, и ей казалось, что это что-то вроде царства Бабы-яги — Бабы-ягищи, как она говорила. Она вообще любила смешно коверкать слова, и всегда с преувеличением. Картошка была картошища, дворовая черная лайка Багира была Багирулища.</p><p class="p1">Они приехали на дачу по приглашению начальника Лёниного гаража, старого большевика Косарева: тот снимал дом в Кратове и позвал на выходные Леню с семьей. Рядом со станцией начинался смешанный лес, с тремя тропинками, расходившимися как бы от единого корня; и Леня пошел по правой. Скоро началась вырубка, полная земляники. Дочка Наташа кинулась было ее собирать, но не во что было класть. «Собирай в себя», — посоветовал Леня, и она захихикала. Леня недавно с удивлением узнал, что клубникой называется как раз эта мелкая лесная и полевая ягода, а земляника — то, что растет в садах. Но чего уж переучиваться. Земляника была мелкая, кислая, но чувствовался в ней лесной привкус, которого у садовой ягоды не было. Трава была еще в росе, пахло влажной корой, уже успело нападать мелких желтых березовых листьев, сгоревших на ранней июньской жаре; потом пошли дожди, все смягчилось, а теперь опять надвигалась жара. Но Леня ей радовался, не переносил он только холода.</p><p class="p1">Что-то было удивительное в нынешнем утре, а может, просто он давно не был на природе. Ему почти не приходилось выезжать за город, все асфальт да асфальт, а тут что-то было в самом деле необычное, словно в подарок ему на эти два дня. Облака были широкие, как бы многоярусные. Они двигались, но тихо, и меняли форму, оплывая и сливаясь. Леня подумал, что их никак нельзя зафиксировать, разве что сфотографировать, а он немного уже фотографировал, потому что жена подарила ему на день рожденья, две недели назад, хоть и купленный с рук, но прекрасный, вкусно пахнущий ФЭД. Только вот зачем фотографировать облака? Леня и свою жизнь не очень дорого ценил, не то что облако. Ни над чем не надо было дрожать, он это знал с детдома. Тогда ничего не убывало, да и что может убыть? Ничто ведь никуда не девается.</p><p class="p1">Жизнь вообще налаживалась. Работа ему нравилась, денег прибавили, жену он любил, дочка выздоравливала. Ее недолюбливали почему-то во дворе, и она все больше сидела дома, читала книжки, уже в четыре хорошо читала сама, правда, только детское пока, но просила и что-нибудь для ребят постарше. Соседка давала ей старые книжки, еще дореволюционные. Вообще соседка проводила с ней многовато времени, как бы не научила ерунде, но говорила, что девочка очень способная, что она скоро научит ее по-французски и что у нее будет настоящий парижский выговор, потому что Наташа картавила — не сильно, а чуть-чуть.</p><p class="p1">Наташа наелась земляники и искала теперь грибы, но грибов не было, конечно. Тогда она стала собирать цветы. Лес надвинулся на нее сразу всеми новыми запахами, от которых она обалдела, как собака на первой охоте. Она и представила себя собакой, которую выгуливает отец, и стала дергать его за штаны. Тогда он взял ее на плечи, но скоро она соскочила и стала бегать кругами.</p><p class="p1">Лес Наташу все время обманывал. То лист притворялся жуком, то бабочка вспархивала, а только что ее не было видно. Потом через узкую полоску леса они вышли в поле, в котором Наташа сразу потерялась. Само собой, отец ее видел, но ей казалось, что ее не найдет теперь никто. Вокруг были высокие стебли, напившиеся недавнего дождя, и вдруг начались колокольчики, огромное колокольное царство. Те колокольчики, что она видела во дворе, ни в какое сравнение не шли с этими. Те были гости, а эти тут хозяева. Непонятно, откуда их столько выросло, кто их сеял. Они были разные — густо-лиловые, бледные, почти голубые; они наплывали отовсюду, и Наташа среди них заблудилась. Они совсем не пахли, но горько пахло травой и почему-то медом, этот медовый запах приносил ветер непонятно откуда. Мед был прямо в этом ветре растворен. Дальше колокольчики кончились, и началось что-то желтое, восхитительное, очень яркое, — мать сказала, что это, наверное, горчица, а отец — что сурепка. Но как бы это ни называлось, оно-то и пахло, и в этом запахе Наташа прошла еще некоторое время, пока не начались малиновые, красные, лиловые — Наташа уже знала, что это полевые гвоздики, несколько таких росло у Косарева на даче. Она хотела и их сорвать, но потом пожалела. Они были самые красивые. Бабочки здесь были другие, не как в лесу, — больше и ярче, и одна взлетела прямо перед ней, совсем необыкновенная, серебристо-зеленая. Наташа еще никогда не видела таких, и потом тоже никогда не видела, и эту серебристо-зеленую она запомнила навсегда, с яркостью сна. И кому бы она ни рассказывала потом об этой бабочке, все говорили, что такой неоткуда было взяться, это какая-то из джунглей, и как она залетела в тот день, в тот луг, — непонятно.</p><p class="p1">Дальше поле кончалось, и начиналась пыльная дорога, ведущая в деревню. Отец снова взял ее на плечи. Пошли вдоль пруда, долгого, никак не кончавшегося, потом вдоль железной дороги. Отец обещал, что они купят парного молока. Наташа никогда еще не пила парного молока. Ей представлялось что-то вроде молочного пара, и притом не обычного молочного, а сладко-творожного вкуса.</p><p class="p1">Дорога была пустынна, никого не было. Высоко-высоко над полем летала и клекотала странная коричневатая птица. Мать сказала, что это ястребок. Воздух был тоже совсем не московский, все в нем слышалось особенно далеко и чисто. Прошумел поезд, и Наташа помахала ему. Люди ехали куда-то в необыкновенные места, куда и они все втроем поедут когда-нибудь. Снова теплой волной поплыл медовый запах, теперь уже смешанный с горячим запахом поезда, с летними шпалами, от которых пахло так надежно и деловито, как никогда и ничем не пахло в городе, — и Наташа подумала, что так хорошо ей тоже никогда еще не было, но теперь, конечно, будет много раз.</p><p class="p1">Когда они вошли в деревню, Леню поразило безлюдье. Молока купить было не у кого. Он прошел чуть подальше и увидел, что все стоят вокруг репродуктора на высоком желтом столбе. Репродуктор передавал радостную, бодрую военную музыку, и люди почему-то слушали ее, никто не расходился. Лица у всех были серые, как во сне, Леня никогда не видел таких. Никто не говорил, и репродуктор тоже ничего не говорил, вообще не было ничего, кроме музыки; но он догадался.</p><div class="cite">
<p class="text-author">2015–2017</p>
</div></span>
