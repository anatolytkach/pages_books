<span><p class="p1">О том, что дело не кончится обычным романом, он догадался в Крыму. Они поехали туда в сентябре, оба взяли отпуск, — Алю обязали вдобавок написать серию очерков о Крыме глазами русской иностранки. Их отправили в санаторий имени Двадцатилетия Революции, только что открытый, близ Массандры, но из санатория они сбежали на пятый день. Молодая республика страстно увлеклась самолечением. Ей потребны были свои герои — начиная чуть не с доисторических времен. Своих вождей и рыцарей она лечила серьезно, со знанием дела, с оттенком ласковой принудительности. Рыцарю полагалось до последнего отбиваться, негодовать, но потом сдаваться — и чуть не в смирительной рубашке отправляться в Крым. Там его по часам кормили, поили всякой горькой дрянью, сажали на строжайшую диету, и возвращался он либо помолодевшим и бодрым, либо, что чаще, замученным насмерть. Все медсестры, врачи и самые повара имели тот же любовно-строгий вид, с наслаждением запрещали ночные купания и поздние прогулки, у Али нашли следы туберкулезного процесса, у Бори — увеличенное сердце (вмещавшее, как он тут же сказал Але, слишком многое), и они ушли на базар, да так и не вернулись.</p><p class="p1">Там же, на базаре, они сняли полдома у почти черной татарки в изношенном черном халате и остаток отпуска провели в диких, райских местах, напоминавших одновременно Гогена и таможенника Руссо. Эти сравнения придумывала Аля, видавшая их в оригиналах. Татарка была молчалива, намекала, что времена пришли совсем плохие, но денег ей они не прибавляли — главным образом из принципа: она сдавала дом и, по сути, ничего не делала — а они все-таки зарабатывали. Это высокомерие зарабатывающих относительно паразитирующих настигало их по десять раз на дню. Крым оказался совсем не курортный, еще дикий, голодноватый, население было поражено апатией и словно все чего-то ждало. Крым, говорила Аля, всегда чего-то ждет. Она была тут, по ее уверениям, зачата и чувствовала себя более чем дома — на прародине; ехать в Коктебель, однако, отказалась наотрез — «Я помню, как было, и не хочу видеть, что там сделали после. Вот, может быть, с матерью когда-нибудь» — она никогда не называла мать мамой, и это было Боре приятно: его поколение бежало сантиментов и радо было видеть то же в младших. Крым весь был пограничен, на краю моря, России, жизни, потому что слишком много туберкулезников отправились отсюда дальше, чем за море. Ты знаешь, говорила Аля, ведь и отец здесь воевал, и уехал отсюда. Это было самое мучительное. Я могу понять людей, которые прощаются с Россией ноябрьской; но уезжать из России вот такой…</p><p class="p1">Здесь абсолютным стало то, что называется лицемерным словом «близость», и здесь, пожалуй, началась близость подлинная — не псевдоним секса, но полное родство.</p><p class="p1">Казалось, и воспоминания у них были общие. Он был груб, черств, заматерел за последние годы, но ему уже чуялось, что это в его жизни был волшебный Арбат и страшная сказка промерзшей мансарды; а она словно знала все о нем, о детских морских мечтах, хотя какое море на брегах Сожа? Он впервые увидел Крым в двадцать пятом, когда приехал помогать Соловьеву разбивать палатки для будущей детской республики.</p><p class="p1">Ночи были почти бессонны, они не могли наговориться, перебрались на пол — в узкой кровати было жарко и тесно; Аля наслаждалась тем подростковым, запоздалым бесстыдством, которое так пленяет в недавних девственницах, стремглав проходящих весь путь, который они для себя закрывали в семнадцать, в девятнадцать… Удивительная простота была во всем, что она делала. В России ужасно всего стеснялись. Боря помнил девушку, готовую скорей обмочиться, чем спросить, где тут, братец, у вас нужник, — для Али никаких запретов не было, и тела своего она не стеснялась, потому что как можно было стесняться этого сияющего тела? Она находила в Боре десятки совершенств, о которых он не подозревал; она превращала в праздник все, включая лазание на японскую мушмулу за странными — не то слива, не то груша, — узловатыми кисленькими плодами; каждая подобранная на сухом склоне кедровая шишка была для нее праздником. Они были хозяевами этого безумного, никому не принадлежащего Божьего края; и когда в Москве Силин спросил, действительно ли там голодают и нигде нельзя достать мяса, Боря затруднился с ответом. Какой голод, какое мясо? Вероятно, в Крым надо было ездить только во влюбленном состоянии; да впрочем, если жить в России с прекрасной девушкой, светло-русой, лет на двенадцать младше себя, — Борис знал теперь, что это идеальная разница, — можно вообще не замечать ни очередей, ни квартирного вопроса. Беда в том, что мир со всеми его неудобствами задуман был для влюбленных, а достался разведенным.</p><p class="p1">Вот тогда он дал себе слово остаться с Алей навсегда, а серьезней некуда все стало после визита к родителям.</p><p class="p1">Он отвез Алю в Гомель в июле тридцать восьмого года. Мать давно просила приехать, отец жаловался скупо, но ясно было, что плоховат. Чехов говорил: пока легкие в порядке, то и все в порядке, — а отец теперь все покашливал, обследоваться не хотел, курил не меньше, приговаривая, что в этаком возрасте уже ничего не начинают и не бросают. Боря взял Алю, предчувствуя, что другого случая познакомить ее с отцом, может, и не представится. Кроме того, была смутная надежда уговорить родителей переехать в Москву.</p><p class="p1">Он нашел бы возможность их устроить, Гомель был в пятистах километрах от границы и становился местом опасным — о войне с Германией писали романы и ставили спектакли. Сколько бы ни говорили о том, что мы не пустим немцев в глубь территории, случиться могло всякое. Многие вокруг него паниковали и забирали родителей в Москву даже из безопасных мест вроде Брянска. Они приехали свежим, мокрым днем с яркой зеленью и серо-лиловым, клубящимся небом. Принимался и переставал теплый дождь. Их Аптечная называлась теперь в честь Азриэля Жарковского, который никогда тут не жил и вообще жил мало, убитый на двадцать первом году в боях со стрекопытовцами. Аля старательно радовалась, стараясь угодить Боре, и Боря никак не мог ей сказать, что города он, в сущности, не любил, всегда отсюда рвался и никогда тут не был вполне своим. Да, очарование западной России, да, все возможности для игр в индейцев — Борис и теперь был убежден, что война красных с белыми была лишь продолжением войн между краснокожими и бледнолицыми, охвативших в начале века всю подростковую Россию; а все почему? — потому что в восьмидесятые годы Купер и Рид издавались приложениями и были в каждом доме. Но жизнь была скучная, с глупыми переходами города из рук в руки до начала девятнадцатого года, и он уехал при первой возможности. Родителей было жаль, и поначалу, в первые годы, он навещал их часто, потом раз в год, потом раз в три. Отец теперь шутил, что по стопам сына пошел в журналистику — печатал краеведческое в «Гомельской правде», благо многое узнал в бытность свою архитектором. Они с матерью старели красиво, без брюзжания, следили за московскими делами, читали все, что Боря присылал, старались реже напоминать о себе и просили только внуков поскорей.</p><p class="p1">Отец встретил их на вокзале, обнял Алю, ни о чем не расспрашивал. Дома ждали все чудеса материнской кулинарии — суп с клецками, вкусней которого Боря так и не нашел ничего на свете, фаршированная рыба, яблочный штрудель с корицей, хворост, грушевый взвар, и Аля преувеличенно хвалила все, так что Боре было за нее, пожалуй, неловко — уж очень хотела понравиться. После обеда она легко и естественно принялась помогать матери с посудой, и мать приняла эту помощь; отец удалился в кабинет, поманив Борю пальцем. Боря знал, что сейчас последует политический разговор, но не уклонился: ему нравился кабинет, он с детства любил лежать около книжного шкафа и, пока отец работал, тихо читать, грызя что-нибудь; особенно хорошо под это дело шла сушеная вишня.</p><p class="p1">Квартира не изменилась, родителей не уплотняли, ничего не отняли — отец был на хорошем счету, не в последнюю очередь потому, что успел понравиться сапожнику Кагановичу, наводившему порядок среди местных коммунистов в январе восемнадцатого года. Отец, в сущности, жил удивительно чистой жизнью. Деньги его интересовали мало, хотя зарабатывал он всегда прилично — нестыдно, как сам выражался; иудаизм, как вообще все врожденное и родовое, не занимал его вовсе. От глупого и лизоблюдского еврейского русопятства, столь распространившегося в десятые годы, он тоже был совершенно свободен. И в кабинете его ничего не было лишнего: благородная простота, чувствовавшаяся во всем, даже в эскизах скамеек на набережной, — они преспокойно перестояли все катаклизмы.</p><p class="p1">С катаклизмов Боря и начал: не дожидаясь, пока отец начнет расспрашивать о московских делах, полагая, что сын посвящен во все тайны, — прямо спросил: что с переездом? Если хочешь работать, будешь работать, и обещаю тебе, что выхлопочу комнату в хорошем месте. Отец качал головой: всё глупости.</p><p class="p1">— Поговорим серьезно, — сказал он. — Что с Тухачевским?</p><p class="p1">— Ты год ждал, чтобы меня об этом спросить?</p><p class="p1">— В письме об этом нельзя, ты сам понимаешь.</p><p class="p1">— Тухачевский — предатель, — сказал Боря.</p><p class="p1">— Ты в это веришь?</p><p class="p1">— В это, — сказал Боря, — верю абсолютно. Он был отвратительный, тщеславный тип. Знаешь, что будет, если к килограмму повидла прибавить килограмм навоза?</p><p class="p1">Отец не знал.</p><p class="p1">— Два килограмма навоза, — сказал Боря. — Вот чего действительно не переношу, так это железо в сахаре. Дружба с артистами, игра на скрипке… У меня коллегу посылали делать с ним беседу, просили комментарий. Он говорит, что более самовлюбленного и напыщенного собеседника у него не было в жизни. И, кстати, я верю, что Тухачевский в молодости двух солдат придирками довел до самоубийства.</p><p class="p1">— Да? — недоверчиво спросил отец. — Ну хорошо, но если все вы это понимали, почему же тогда…</p><p class="p1">— Что же мы могли сделать?</p><p class="p1">— Что угодно. Написать, поставить вопрос.</p><p class="p1">— Ты знаешь, что я не военспец.</p><p class="p1">— Но есть другие военспецы. В конце концов, должен он был делать что-то подозрительное?</p><p class="p1">— Как только сделал, его сразу перевели, а потом взяли.</p><p class="p1">— Но писали, что он был завербован чуть ли не сразу в Польше…</p><p class="p1">— Не в Польше, а позже, — назидательно сказал Боря. — Завербован он был предположительно в двадцать восьмом. Но он был осторожен, и потом армия — оптимальная среда для заговора. Все очень закрыто. Потребовалась санкция на прослушивание всех разговоров. Он был под плотной слежкой два года.</p><p class="p1">— Да? — снова переспросил отец. — А мне отсюда видней другое.</p><p class="p1">— Я надеюсь, ты не обсуждаешь это с Варшавским? — Варшавским звали бывшего соседа, ныне переехавшего на окраину.</p><p class="p1">— Я с тобой первым это обсуждаю. Но пока весь ход вещей убеждает меня в том, что предательство коренится совершенно в другом месте,</p><p class="p1">— Да? В каком же?</p><p class="p1">— А вот в том самом. Ворошилов ничего не понимает, этого не видят только слепые. Я ничего не знаю о военном деле, но кто умный, кто дурак, как-нибудь еще разберу. Тухачевский был умный, хоть ты и считаешь, что военному это не положено.</p><p class="p1">— Я не считаю. — Боря защищался уже и от родного отца. Сейчас нельзя было поддаваться ни в одном разговоре, и это превратилось в рефлекс.</p><p class="p1">— Ну, ты говоришь, что ему не положена скрипка, дружба с артистами… Он стратег, других таких нет. И все это — расчистка пути для какой-то огромной сдачи. Ты увидишь. Все, что сейчас делается, это расчистка места. Я и у нас тут смотрю. Всех, кто соображает, увольняют или берут. И конечно, всегда оказывается, что было за что. Умного всегда есть за что. А на их место ставят тех, кто аза в глаза не видел. Они готовят сдачу, большую сдачу.</p><p class="p1">— Сдачу кому?</p><p class="p1">— Я не могу еще сказать точно. Но я думаю, — отец еще понизил голос, — что немцам.</p><p class="p1">— Почему, каким образом? Прости, но ты тут совсем с ума сошел.</p><p class="p1">— Я не знаю, каким образом. И это неважно. Но немцы проникли очень глубоко, и они морочат голову. Все эти разговоры, что угрожает Англия, бред. Англии самой бы разобраться с колониями. Я, между прочим, в Англии провел полгода.</p><p class="p1">— Папа, это было в девяносто пятом году.</p><p class="p1">— Неважно. Англичане никогда не нападут на Россию, это островное государство. Острова всегда думают только про собственную оборону.</p><p class="p1">— Да-да. Особенно в Трансваале.</p><p class="p1">— В Трансваале начали буры.</p><p class="p1">— Да-да. Англичане развернулись на границе и влезли во внутренние дела, после чего, конечно, начали буры.</p><p class="p1">— Борис, мы не будем об этом спорить. Англия ничем не может угрожать России, у них нет границы. Про Францию вообще смешно говорить, они уже в четырнадцатом воевали хуже всех.</p><p class="p1">— Хуже всех в четырнадцатом воевали мы.</p><p class="p1">— Отнюдь нет. Если на то пошло, хуже всех воевали немцы. И немцы хотят реванш, и реванш будет. Они влезли страшно глубоко. Ты не знаешь, но я помню. Немецкой разведкой тут все было пронизано уже в пятнадцатом.</p><p class="p1">— С того времени кое-что изменилось.</p><p class="p1">— Изменилось, но не все. Ты знаешь, что вернулся Дымшиц?</p><p class="p1">— Дымшиц? — Боря не помнил никакого Дымшица.</p><p class="p1">— Здешний, дантист. Его сын уехал в Германию, якобы учиться на инженера-путейца. Я ничего не знаю, может быть, действительно учиться. Потом он вернулся, около тридцатого. А сейчас его перевели сюда, они приехали оба с отцом. Устроился работать на вокзал. И я думаю, что все это не просто так. Я не говорю, что он завербован, и конечно, не буду писать никуда. Но наш узел — крупный узел, это прямой путь на Москву. И то, что они сейчас прислали человека, обучавшегося в Германии, все это крайне подозрительно.</p><p class="p1">Отец сошел с ума, понял Боря.</p><p class="p1">Они все тут сошли с ума, коллективный невроз, это не могло закончиться просто так. Когда вся страна ловит шпионов, первыми лишаются ума старики.</p><p class="p1">— Я надеюсь, ты не следишь за ним? — спросил Боря по возможности беспечно.</p><p class="p1">— Представь себе, слежу. И я знаю уже достаточно. Он дружит с Брехуновым, а Брехунов отвечает за весь водопровод, я знаю его много лет. Ко мне иногда приходят за консультациями. Твой отец, представь, кое-что сделал для этого города. Но это все после, речь не о том. Ты понимаешь, что немцами сейчас инфильтровано буквально все? Ты увидишь, меньше чем через год мы заключим с немцами союз.</p><p class="p1">— Папа, я сам думал когда-то, что мы заключим союз. Но с тридцать третьего года там много переменилось. У нас никогда не будет союза с антисемитами.</p><p class="p1">Потому что — едва не добавил он — чем мы тогда будем от них отличаться?</p><p class="p1">— Разуй глаза наконец! — закричал отец шепотом. — Союза с антисемитами! Кто мы такие, если не антисемиты?</p><p class="p1">— Особенно мы с тобой.</p><p class="p1">— Ты прекрасно все понимаешь!</p><p class="p1">— Нет, отец, ничего этого я не понимаю. Понимаю я только то, что пора тебе в Москву, иначе ты совсем вываришься в этом котле.</p><p class="p1">— Тухачевский просто узнал, — не отставал отец. — Просто понял. И поэтому его убрали.</p><p class="p1">— Ладно. Позволь мне это не обсуждать. Тебе отсюда видней.</p><p class="p1">Он хотел пойти на кухню, помочь Але, вообще вырвать ее из объятий матери и показать город, но отец удержал.</p><p class="p1">— Я не все еще могу тебе сказать. Но поверь, если со мной что-то случится, это они меня достали. Ты не знаешь. Но здесь весной была сыпнотифозная эпидемия.</p><p class="p1">— Какая сыпнотифозная, откуда?</p><p class="p1">— Оттуда. Люди пили сырую воду и заражались. Это не может быть ничем, кроме вредительства, поверь мне, я знаю. Это они.</p><p class="p1">— Папа, но Сож — грязная река…</p><p class="p1">— Сыпного тифа здесь не было пятнадцать лет. Я говорил с Брехуновым. И он сказал мне, что в феврале к нему внедрили нового сотрудника. В службу водоочистки. Некто Греков. Я попросил ого поднять все сведения. Так вот, дядька этого Грекова, — отец поднял палец, — дядька Грекова арестован в прошлом году за шпионаж. Он указал это в анкете, потому что не мог не указать. Иначе скрыл бы, конечно. Но у нас-то пока следят. Это Москва расслабляется.</p><p class="p1">— Хорошо, — сказал Боря. — Я понял. Если с тобой что-то случится, я буду знать, что это Греков.</p><p class="p1">— Не Греков, а они! И помяни мое слово, они разослали свою агентуру уже везде, и через год, самое большое, здесь будет их власть. Ты говоришь — переезжать, но куда? От этого никуда не переедешь.</p><p class="p1">Черт-те что, подумал Боря. Я не представляю, какого масштаба должна быть катастрофа, чтобы все они вошли в ум. Но чего я ждал, — собственно, чего все мы ждали? Мы ведь тоже превращаемся, как лягушка в кипятке. Если кипятить постепенно, она не выскочит, так и сварится. Когда взяли Тухачевского, я тоже сначала не верил себе, хотя и понимал, что ему по заслугам. Вообще всех, кого пока брали, я не любил. Но любил ли я кого-нибудь, осталось ли тут, кого любить?</p><p class="p1">Аля сидела напротив матери за столом, глядя на нее влюбленными глазами. Мать раскладывала на столе пасьянс из фотографий. Боря этого терпеть не мог.</p><p class="p1">— Отпускайте домашнюю рабыню, — скомандовал он. — Мы пойдем гулять по местам моей славы.</p><p class="p1">Аля попыталась внизу спеть дифирамб родителям, Боря ее прервал.</p><p class="p1">— Папа сошел с ума, — сказал он. — Думаю, что совершенно. Видеть это ужасно, он всегда был человек умный и даже, пожалуй, холодноватый.</p><p class="p1">— Что случилось?</p><p class="p1">— Он считает, что Германия окружила его шпионами, что Тухачевского убили шпионы, что слесарь — шпион. Хорошо, что он ничего не знает про тебя.</p><p class="p1">— Но я все рассказала маме, — Аля округлила глаза и выглядела так невинно, что он рассмеялся.</p><p class="p1">— Рассказала и рассказала. Мама пока, надо надеяться, в уме. Кстати, здесь напротив жила девочка, страшно похожая на тебя.</p><p class="p1">— Это была вестница. Ты не знаешь? Настоящая жена всегда присылает вестников.</p><p class="p1">— Интересно, где она теперь.</p><p class="p1">— Давай спросим.</p><p class="p1">— Давай. Я помню, как ее звали. Даша, кажется?</p><p class="p1">Они вошли во двор напротив. Оглушительно пахло мокрой травой и листьями, этот запах в Москве был другим, слаще, а здесь он был остр и горек, напоминая о детстве. Боря ненавидел воспоминания, считая их вообще дурным тоном, люди модерна не должны позволять себе этого; причисление Пруста к модернистам — ошибка.</p><p class="p1">Во дворе сидела на лавке грузная старуха.</p><p class="p1">— Вы не знаете, тут в пятнадцатом году девочка жила? — спросил Боря вежливо. — Дашей, кажется, звали.</p><p class="p1">— В пятнадцатом много кто жил, — сказала старуха сонно.</p><p class="p1">— Беленькая такая, блондинка.</p><p class="p1">— Много жило.</p><p class="p1">— Может, в доме кто помнит?</p><p class="p1">— Да спросите, — ответила она равнодушно.</p><p class="p1">Спросить, однако, было некого. Они постояли еще и вышли. Мимо арки проехал мальчик на дряхлом велосипеде.</p><p class="p1">— Мальчик! — окликнула Аля. — В этом доме не живет женщина вроде меня, Дарья?</p><p class="p1">Боря усмехнулся. Это очень мило у нее получилось.</p><p class="p1">— Вроде вас никто не живет, — крикнул мальчик.</p><p class="p1">— Это точно, — серьезно сказал Боря.</p><p class="p1">Он собирался показать ей Румянцевскую, Замковую, Кавказскую, на которой, говорят, жили убийцы, и был особенный шик вечером прогуляться туда, — но по дороге Аля его остановила:</p><p class="p1">— Мне очень нужно позвонить в Москву.</p><p class="p1">— На работу? Сегодня же суббота.</p><p class="p1">— Не на работу. Должна приехать моя подруга, Оттуда. Мне просто надо знать, приехала или нет.</p><p class="p1">— Хорошо, пойдем на почту.</p><p class="p1">Он знал, где теперь почта, — прекрасный узел связи открылся еще в тридцать четвертом на улице Коминтерна, которую он знал и не любил еще как Соборную. Но что это ей приспичило, почему не сказала раньше?</p><p class="p1">— Я просто сама забыла, понимаешь? — виновато пояснила она, прочитав, как всегда, тайные мысли.</p><p class="p1">На почте ей, однако, понадобилось сделать не один, а три звонка, и пока Боря расхаживал по улице и курил, ему пришла в голову мысль, что и это все не случайно, и что там, откуда она приехала, ее явно к чему-то готовили; он ведь ничего не знает о ней. Паранойя отца оказалась на диво заразительна.</p><p class="p1">Через двадцать минут Аля вышла, сильно встревоженная.</p><p class="p1">— Не приехала.</p><p class="p1">— С кем же ты разговаривала так долго?</p><p class="p1">— С любовником, ведь у меня любовник, ты не знал? Борька, какое счастье! — Она уже смеялась. — Ты ревнуешь!</p><p class="p1">— Нет. Я, если честно, — он знал, что это лучшая политика, — понял тут, что ты шпионишь. Отец сказал, а я ведь, знаешь, в него!</p><p class="p1">— Я заметила. Те же брови. Конечно, шпионю. Но ты не понял, откуда я. Это тайный небесный шпионаж. Я тебя послана хранить и за тобой приглядываю, и сейчас сообщила на небеса, что ты ведешь меня на окраину. Можно ли идти или убьет? Сказали, что можно. Ты на хорошем счету.</p><p class="p1">Он показал ей городской вал, и штаб, где собирались команчи, и гимназию. Грустно было все это. Прошлое слежалось пластами, трогать их не следовало. Слишком много было всего, слишком со многим пришлось примириться. Он всегда гордился своей адаптивностью — и доадаптировался до того, что давно утратил себя. Собственная личность никогда не казалась ему ценной, а между тем там кое-что было. Вот здесь однажды он весной брел из синематографа с Галей, про которую двадцать лет не вспоминал. С Галей все могло быть, но почему-то оба, понимая это, пренебрегли. Может, отложили на потом. Она была красавица, хотя и несколько испанского, чересчур знойного типа; страшно обаятельна была ее манера склонять голову набок и заглядывать ему в лицо. Было часов пять вечера, еще светло, и все таяло. Этот желто-оранжевый свет, талый снег, бледная голубизна!.. Почему такой полноты счастья не было ни тогда, ни потом? С Алей было не хуже, но с ней была другая память, с ней был счастлив только он нынешний, давно утративший ту остроту и свежесть. Нечего было ее сюда привозить.</p><p class="p1">Правда, ночью она сумела сделать так, что вернулась молодость, почти детство, — в той самой комнате, в которой спал он до семнадцати лет, на узкой кровати, где — Аля настояла — они должны были улечься вместе. Он предлагал притащить диван из гостиной, как было с Муреттой, когда он привез ее в тридцать четвертом и все еще было у них прекрасно, хотя и не без первых признаков охлаждения, но Аля потребовала: только здесь, только на этой мальчишеской кровати. И не то чтобы это ее заводило — скорей тут было нечто психотерапевтическое. Она была ровно такой, как мечталось ему в отрочестве, — он никогда не мечтал о вакханках. «О, как милее ты, смиренница моя». Горький запах доносился в форточку, светало в пять, она была такая тонкая, такая белая, так странно осваивалась со своей женственностью, все еще не привыкнув, что они вместе и что это прочно. И он старался отдалить все, ограничиться пока тем, что называется ужасным словом «ласки». Как можно дольше хотелось не прерывать эту подростковую негу. Подростки робеют переходить к главному, для них оно не главное, и он гладил ее, едва касаясь. Все было похоже на полусон, мысли не приходили, ничто не тревожило.</p><p class="p1">Тем внезапней оказалась ее атака уже под утро, когда она не давала ему заснуть, требовала еще и еще, из вымечтанной девочки превращаясь на глазах в женщину двадцати четырех лет: вот так всегда — мы разбудим, а потом изумляемся. И здесь они поменялись ролями — уже она была решительней и старше, и делала все, как хотелось ей; и он подумал — если бы тот, четырнадцатилетний, видел меня и ее сейчас, он уж точно не подумал бы, что двадцать лет прожиты напрасно. И они проспали потом почти до полудня.</p><p class="p1">Мать с утра была на базаре и купила черешни — дорогой; себе они, конечно, не покупали. Он не мог отказаться, и пока Аля еще спала, он в кухне ел эту черешню. И заметил потом, вытряхивая косточки в ведро, что они цеплялись за дно миски, не хотели падать, выигрывая, может быть, секунду — но выигрывая. Вот так и мы, подумал Борис, но не стал уточнять, за что мы цепляемся и куда падаем. Просто подумал, просто таково было ощущение. Он часто, впрочем, представлял, что должны чувствовать последние листья, цепляющиеся за ветку, или последние птицы перед отлетом, — странно, почему он, всегда умудрявшийся идти в ногу со временем, всегда так быстро перестраивающийся, чувствовал себя последним цепляющимся за жизнь; какое-то тут было предчувствие, тайнознание о себе, от которого он пока убегал. Но здесь, рядом с родителями, это чувство еще обострялось.</p><p class="p1">А матери, против всех его ожиданий, Аля не понравилась, и мать сказала об этом с неожиданной злостью. Она смягчилась после пятидесяти, и уже ничего не было в ней от той снисходительной и властной красавицы, какой она ему представлялась лет в двенадцать; теперь все было мягче, проще, улыбчивей, но про Алю она сказала ему с явным удовольствием, чувствуя, что он ждет иного:</p><p class="p1">— А девочка твоя мне не нравится совсем, прости, Боря.</p><p class="p1">— Почему же?</p><p class="p1">— Врет она все, Боря, ты увидишь еще. Ни одного слова в простоте.</p><p class="p1">— Ну, понимаешь, она воспитывалась совсем в другой семье…</p><p class="p1">— Да мне, знаешь, и неважно, где она воспитывалась. Пирог ни с чем, а держит себя так, как будто прилетела райская птица и всем сделала удовольствие. Нет, Боря, если ты любишь, то делай как хочешь, а я тебе скажу, что ты с ней хлебнешь.</p><p class="p1">— Ну, ты это всегда говорила…</p><p class="p1">— И всегда говорила, и всегда права была. Вот ты так разливался соловьем про эту свою Мурку, — она отлично помнила, как зовут Муретту, но опять с удовольствием уязвила. — А теперь ты бросил ее, и наверняка ей квартиру оставил.</p><p class="p1">— Я пока не знаю, бросил я ее или нет.</p><p class="p1">— Да уж если ты с другой сюда приехал, то, конечно, бросил. А та хоть красивая была.</p><p class="p1">Он знал и это — матери все предыдущие нравились больше новых. Весь его путь выглядел сплошной деградацией. Так критик, желая уязвить автора, вечно бранит новую книгу сильней предыдущей, даже если предыдущая тоже никуда не годилась.</p><p class="p1">— А эта разве некрасивая?</p><p class="p1">— Ну что ты, какая же она красивая. Глаза — во! — а лицо маленькое. И ни одного слова, ни словечка по-человечески, такая ломака. Вот ты увидишь. Я понимаю, что не надо бы этого говорить, но промолчать не могу, потому что мать твоя старая дура.</p><p class="p1">Они больше не возвращались к этому, и с Алей мать была доброжелательней прежнего, и когда они уезжали ночным поездом, даже обняла ее. Аля, казалось ему, так ничего и не заподозрила, и только в Москве, два дня спустя, сказала:</p><p class="p1">— По-моему, я не понравилась.</p><p class="p1">— Кому?</p><p class="p1">— Твоим родителям. Они хотят, чтобы рядом с тобой было что-нибудь понадежней. Но это они еще не всё видели. Я очень надежная, Борька.</p><p class="p1">— Да очень ты понравилась, не беспокойся. Отцу особенно.</p><p class="p1">— Отец чудесный, прямо германец такой. Рыцарь. Но они еще не поняли, и бог даст, им не придется понять, что я самая надежная. Ты понимаешь, Борька? Самая.</p><p class="p1">Знала бы ты, подумал Боря, как он ненавидит германцев. Все-таки при всем своем уме, говоря о других людях, она вечно попадала пальцем в небо. Но если бы знал он сам, как ему вспомнятся слова отца спустя год с небольшим! Отец бы непременно поднял палец и долго, назидательно грозил. Но отец не дожил. Его нашли на улице в апреле тридцать девятого. Разрыв сердца, смерть в одночасье. И только в августе Боря подумал: вдруг отец действительно что-то знал, и все эти Дымшицы дотянулись до него? Не может же просто так… Но решимости уйти к Але после поездки еще не убавилось.</p><p class="p1">Гром грянул позже.</p><p class="p1">В сентябре Муретта уехала на Кавказ — разумеется, без него, даже не предложив отправиться вместе. Прощалась она почему-то тише и при этом патетичнее, чем обычно. Позвала его в «Прагу». В последний раз в ресторане они были на пятилетии свадьбы, пригласили только ближайший круг, да и то Боря ерзал — была уже Аля, и во всем чувствовалась невыносимая фальшь. Еще и Муретта решила впервые появиться в бархатном, которое совсем к ней не шло, и многие ядовито шутили про лета, которые клонят, и Боря, защищая ее, наговорил колкостей ни в чем не повинным людям. Теперь, год спустя, она была непривычно тихой и словно виноватой. Официант — «с раньшего времени», хотя, возможно, и нет, просто этот стиль теперь приветствовался, и первой, как всегда, реагировала обслуга, — принимал заказ не записывая, холодно кивая. «Смотри, как у нас все стало», — сказала Муретта, машинально все еще гордясь достижениями. «Ты отчего грустная?» — спросил Боря. Она объяснила что-то про печень, про предчувствия. «В Кисловодске подлечишься», — сказал он вполне по-товарищески, он же не был к ней совершенно равнодушен. А между тем было чувство, что Муретта не просто прощалась перед Кисловодском, а может, чем черт не шутит, собиралась уйти. Он не знал даже, с кем она ехала, мог спросить — но не спросил. Но ехала она одна, как выяснилось, и уже там, в Кисловодске, познакомилась с местным жителем, темным типом, обладателем чуть ли не единственной в городе частной машины, в которой подвозил к санаторию имени Куйбышева особо почетных клиентов, а иногда самого директора, но тот, человек рыхлый и болезненный, выезжал редко. В основном, как можно было догадаться, машина служила для соблазнения скучающих курортниц.</p><p class="p1">Муретта сразу сделалась объектом его особенного внимания. Возил ее к Провалу, к месту дуэли, еще куда-то. Она не возражала. Однажды вечером попросилась за руль, ссылаясь на обучение в первой шоферской школе Москвы (и действительно, как хвасталась Боре, посетила пару занятий), но водить, конечно, не умела и не пробовала, а тип побоялся возразить. Видимо, дело у них зашло довольно далеко. Она перебралась на водительское сиденье, со смехом и визгом проехала сто метров, а потом решительно сдвинула брови и кинула машину вниз по крутому склону, сбив два столбика бессмысленного ограждения. Это счастье, повторял водитель, это чудо, что там росла эта орешина! Орешину Муретта не разглядела, а может, наоборот, присмотрела давно, рассчитав не погибнуть, но покалечиться и отяготить Борю вечной виной. Но и покалечиться толком не вышло — она сломала правую руку (а между тем была левшой, чем гордилась, и именно левой удаляла зубы) и еще изуродовала осколками лицо. Был сильный ушиб глаза, но глазу в итоге ничего не сделалось.</p><p class="p1">Боря получил телеграмму от санаторского главврача и бросился в Кисловодск — шеф впихнул его в самолет академика Крылова, летевшего в Тбилиси по своим сельскохозяйственным делам. Академик в полете пригласил Борю сесть рядом и все три часа бешено ругал журналистов. Боря не выдержал и наговорил ответных резкостей — о том, что академики-то вообще молчат, закопавшись в свои экспериментальные грядки, а журналисты пытаются хоть контрабандой донести живое слово. Академик слушал с неожиданной покорностью, а при расставании вдруг обнял, и стало невыносимо жаль старика…</p><p class="p1">Из Тбилиси добирался десять часов на двух попутках, удостоверение не действовало, машины не давали, ехал в итоге на грузовике, набитом кукурузой. Шофер завернул в Нальчик, где жила у него какая-то родня, и Боря не посмел возражать — по такой жуткой дороге ехал, да еще ночью, заслужил отдых. У родни оказался праздник, поили свежей чачей, не отпускали, дом был бедный, но жадно-гостеприимный. Гостя из Москвы принялись расспрашивать и бесстрашно ругать местное колхозное начальство. Боря думал только об одном — застанет ли Муретту в живых, кивал, записывал, пил, наконец взмолился: Степан, поедем, у меня жена, может быть, умирает в Кисловодске! А, махнул рукой тот, в Кисловодске всех на ноги ставят, там такая вода есть, что у племянника позвоночник сросся, — веришь, нет? И потом я сейчас пьяный, мне три часа спать надо…</p><p class="p1">Он поспал, умылся ледяной водой и ехал дальше злой, и денег содрал больше, чем договаривались. Боре казалось, что Степан зол оттого, что все понимает: ай, слушай, какая она тебе жена? Рассказал бы ты ей, как за нее беспокоишься, когда с девкой своей французской ночуешь и лыбишься, когда та зовет тебя мужем? Вот тогда бы ты ей рассказал, да? А теперь рабочий человек из-за тебя не ел, не спал, теперь у него из-за тебя голова болит… Вообще в последнее время весь мир смотрел на Борю исподлобья, но после катастрофы с Муреттой и деревья, и стены совсем обнаглели — давили на него со всех сторон.</p><p class="p1">Ее поместили в отдельную палату, поставили капельницу — хотя в капельнице не было особой нужды; поначалу, конечно, было страшно — замотанное лицо с дырами рта и единственного неповрежденного глаза, — но врач сказал, что, в сущности, отделалась легко. Врач был русский, но давно живший на Кавказе, радующийся случаю поговорить с московской прессой; рассказывал об удивительных случаях исцеления на водах, мимоходом добавив, что избыток солей приводит к отложениям, к малоподвижности суставов: «Мы все тут к тридцати годам хрустим». Заметил, что транспортировка вод совершенно неудовлетворительна: они теряют половину целебных свойств, «да и вообще, положа, так сказать, ногу на ногу, — перевозить бессмысленно, лечение возможно только здесь, где источник сохраняет, так сказать, силу земли…». И Боря выслушивал все это, как и колхозные жалобы, кивая и понимая только то, что Муретта хотела покончить с собой, а виноват в этом он. Никто его ни в чем не подозревал, она не справилась с машиной, понятно, но он-то знал, что Муретта — захоти она — справилась бы с чем угодно.</p><p class="p1">Врач еще долго объяснял, что челюстно-лицевая хирургия стоит сейчас на уровне высочайшем, да и среди ее коллег наверняка будут люди, готовые помочь; ведь мы не в Америке, повторял он, там за это с вас слупили бы целое состояние, а здесь это доступно, вы убедитесь. С рукой же вообще пустяк, простой перелом без смещения. Таких ишаков, как этот водитель, следовало бы вешать за одно место, но у него вообще ни царапины, и даже его драндулет можно восстановить, хотя по-хорошему надо бы отобрать…</p><p class="p1">Водитель драндулета подстерег Борю около палаты, долго тискал его руку, повторяя про счастье и чудо, и Боря именно чудом не отдергивался, потому что от брезгливости к этому сизолицему типу его мутило. После естественной в таких случаях прелюдии — «Вы же понимаете, что вашей жене никто не может отказать?» — тип перешел к делу: Боря должен был оплатить ремонт его машины. «Вы понимаете, запасные части… у меня стояло все новое, я заменял сцепление месяц назад, теперь это счастье, это чудо, если вообще можно будет восстановить…» — «Вы хотите, чтобы наша семья оплатила ремонт?» — спросил Боря железным голосом. «Но хотя бы вполовину!» — стремительно отступил сизый. «Вы пустили неопытного водителя за руль на горной дороге, не проверив ни прав, ничего… и после этого преступления хотите, чтобы она платила? Да вас самого за это прав лишить пожизненно, даже если у вас в дружках тут все судьи!» Сизый струхнул и попятился, повторяя: «Вы всё же мне не угрожайте, у меня есть свидетели…» — «Свидетели чего?! — шепотом рявкнул Боря. — Вы места другого не нашли, кроме больницы, чтобы приставать со своим вымогательством?!» Он убил бы этого человека не поморщившись — не потому, что приревновал его к Муретте (он огорчался больше из-за того, что уехал от Али, которая звала его кататься по Москва-реке — зелень, плеск, счастье, звезды, запахи!). Нет, не в ревности было дело, а в том, что из-за глупости этого ишака он был теперь прикован к жене; теперь — по крайней мере на год, пока она будет приходить в себя и чинить лицо, — не могло быть и речи о разводе, и если она так и задумала, то ум ее был поистине иезуитский. Но он не верил — женщина может покончить с собой, но никогда не согласится изуродовать себе лицо! «Я думала наказать тебя, а наказала себя», — едва ворочая языком, сказала Муретта, и был момент, когда он, целуя ее левую руку, чуть не разрыдался. Правда, сострадание быстро испарилось: виноваты были все, но он хотя бы не нанес никому физического ущерба.</p><p class="p1">Всё и в самом деле оказалось не так страшно — небольшой шрам под глазом и еще один на виске, большей частью уходивший под волосы. Но что-то в Муретте сломалось.</p><p class="p1">По возвращении в Москву они пробовали жить словно ничего не произошло, и Боря стал даже чаще бывать дома, и были какие-то прогулки по вечерам, во время которых разговор не клеился, но однажды она, не стесняясь людей, громко, тяжело разрыдалась, прямо-таки упав на скамейку и он сидел рядом, свесив руки меж колен, не утешая, потому что утешать было бесполезно. Хорошо сказала она наконец, мы договоримся с тобой так. Мне нужно только, чтобы ты не уходил, по крайней мере сейчас. Сейчас я не смогу быть одна физически. Я пролечусь, это пройдет, я встану на ноги, и тогда иди куда хочешь. Но сейчас мне нужен человек рядом, пусть такой, как ты, пусть жестокий и лживый (он не возразил ни словом), пусть вовсе нечеловек, но все-таки живой, чтобы не каждый раз просыпаться одной. Я ни на чем не настаиваю, ты можешь ходить к этой своей, ты можешь вовсе не спать со мной, если тебе противно, а тебе это теперь наверняка противно (все-таки не могла удержаться, отметил про себя Боря), — но развода я сейчас не вынесу. Считай, что я полностью капитулировала.</p><p class="p1">Все это была грубейшая манипуляция, но он ничего не сказал. Другая на ее месте затеяла бы ужасное разбирательство, сообщила бы наверх — как? бросает советскую женщину, прекрасного специалиста, ради какой-то эмигрантки? — но Муретта была из тех, кто может покончить с собой или по крайней мере сделать попытку, но написать в партком не может. И все продолжалось так, как устоялось к лету, только дома он ночевал чаще и старался ее иногда, как выражалась Муретта, лакомить: покупал торты, тем более что она резко похудела. К тридцати выглядела на все сорок, а главное, переломился в ней стержень: на все попытки разговорить ее только усмехалась устало, иногда принималась просить прощения, а то вдруг, особенно если выпивала лишнего, начинала страстно уверять, что ничего не было, клянусь, Боря, с этим шофером — вообще ничего! Это было последним, что его волновало, но он кивал с глубоко сострадательным видом. Два раза случилась близость, и Боря с изумлением отметил, что Муретта по-прежнему обладает неким воздействием на него, — хотя и он был не тот, и она не та, и никакого сравнения с небесами, на которые возносила его Аля. В первый раз Муретта заснула совершенно счастливой, а во второй оттолкнула его чуть не с рычанием — «Ты все равно сейчас с ней!» — и это было мелодраматично и смешно, да вдобавок почти не окупалось удовольствием. И больше ничего такого не было, не считая августовской ночи год спустя.</p><p class="p1">Аля все поняла и о браке больше не заговаривала. «В конце концов, — сказала она однажды вдруг, посреди праздной болтовни, — ты мой муж, и этого нельзя изменить. Нужно ли нам что-то еще?»</p><p class="p1">Он промолчал, опустив глаза; эта маска печали и вины действовала, он знал, безотказно.</p><p class="subtitle">— 4 —</p><p class="p1">Когда Серов вернулся с Халхин-Гола, его восторгу не было границ. Прямо стихи, современная баллада, все теперь писали баллады и поэмы, произведения сюжетные, киплингианские. Из Каталонии он прилетел далеко не такой восторженный: видимо, в Каталонии не было большого риска. Теперь же разливался соловьем, как человек, которому действительно повезло. Дружище, захлебывался он, дружище, всем запомнить фамилию Жуков! Это — это нечто феноменальное! За него — вот я лично — ты не поверишь — но я не считал себя даже способным на такие ощущения — вот лично в бой! Это молодой, из новых. В гражданскую командовал полком. Сейчас комкор. «Это… это… — захлебывался Серов. — Это абсолютный военный, которого не хватало. Он поверх всякой субординации сам инспектирует. Его ценят…» — Серов глазами показал, где ценят. Тем, наверху, немедленно была необходима война. Они жили войной. Они заходили на нее с разных сторон, пробовали здесь и там: Япония, Испания… Им не впервой было лечить внутренние проблемы внешним воздействием. Только война могла разрешить все. Она списывала что угодно, объединяла нацию, запрещала задавать вопросы. Так было множество раз — всегда, когда явно не получалось. А что не получалось — видели уже все.</p><p class="p1">Война выручала Николая Первого, Александра Второго, война должна была спасти империю. И никогда не спасала, ибо ни одной проблемы не решала, а загоняла вглубь. Кровопускание было некогда любимым методом лечения, это называлось «бросить кровь»; оно и в самом деле могло спасти от апоплексии, но больше ни от чего. Война была замечательным способом маскировать пороки под добродетели. Война отмывала, переводила в разряд подвига что угодно — и глупость, и подлость, и кровожадность; на войне нужно было все, что в мирной жизни не имеет смысла. И потому все они, ничего не умеющие, страстно мечтали о войне — истинной катастрофе для тех, кто знал и любил свое дело. Но у этих-то, у неумеющих, никакого дела не было, они делали чужое, и потому в них копилась злоба, а единственным выходом для злобы была война. На войне не надо искать виноватых — виноватые были назначены; на войне желать жить было изменой, и те, кому было чем дорожить, объявлялись предателями. Слово «предатель» вообще теперь было в большом ходу.</p><p class="p1">Обо всем этом до поры ни с кем, и в особенности с друзьями, нельзя было говорить: Борис сам не заметил, как разговоры сделались опасны. Еще в тридцать втором году прилично было шутить; больше того — неприлично было не шутить. И в тридцать третьем еще шутили, а потом вдруг перестали.</p><p class="p1">Полная ясность наступила с арестом баснописца. Захмелевший актер, одержимый тем же мерзким чувством допущенности и дозволенности, которое привез Серов с Халхин-Гола, принялся в верховном присутствии читать басни, уместные, быть может, в кругу подвыпивших актеров, но оскорбительные на кремлевском банкете. Собственно, это и разозлило. Сами басни были совершенно невинны. Отреагировали именно на то, что, как мог судить Борис, особенно раздражало там: когда пьяный — часто нарочно подпоенный — лицедей или сочинитель преисполняется лизательного восторга. Он бывает вполне искренен в такие минуты, он даже, честное слово, готов отдать жизнь… И в порыве любви принимается раскрываться, преподносить в дар все свое нутро, а что было у него в нутре? В основном зловоние. Бахарев рассказывал, что Демьян впал в опалу не из-за идейных ошибок, а потому, что заваливал вождя влюбленными письмами, в которых подробно освещал ход лечения своего диабета. Детально писал о сахаре в моче! Сахар в моче безобразен сам по себе, а докладывать о нем наверх есть бестактность запредельная, и потому Демьяна выперли из Кремля. Так и здесь: пьяный расчувствовавшийся актер начал показывать все, на что способен. Жертвой пал автор, тоже, конечно, пошляк, но совсем иного разбора. И с этого момента анекдоты прекратились, сатира стала формой панегирика, а многие перестали вести дневники. Чего не говоришь — того и нет, и году к тридцать шестому замолчавшие уверовали. Последним собеседником Бориса сделался Горелов.</p><p class="p1">Первый разговор с первым Гореловым помнился ему отчетливо. Горелов словно задался целью опровергнуть все его предположения. Несмотря на явно крестьянское лицо, широкое, крепконосое, он казался истинным европейцам и, судя по обмолвкам, — намеренным, вероятно, — побывал в Германии, и не побывал даже, а пожил. Он не предлагал ничего заведомо неприемлемого. В какой-то момент, устав от Бориных аккуратных «ни да, ни нет» — ровно тогда, когда тактика требовала перейти к угрозам, — он вдруг, прочитав Борины мысли, сказал: «А почему бы вам не допустить, что нам интересны именно вы?»</p><p class="p1">Наверное, с другими были другие аргументы. Но надо было в самом деле очень хорошо читать в сердцах, чтобы зайти именно с этой стороны. Дело в том, что Боря уже давно никому не был интересен. То есть как? Интересен был Гордон, востребован Ильич, но до Команча никому не было дела, а главное, вся эта сложная система не привлекала ничьего внимания. Правду сказать, лет с пятнадцати — с тех пор, как родители ограничились робкой любовью и не пытались проникнуть в его сложный мир, — Боря был порядочно одинок, и даже Муретта, самое близкое, почти родное временами существо, скользила по гладкой поверхности его сложной жизни. Давно не чувствуя ни в ком подлинного интереса, он и сам замкнулся, заткнулся. И даже если предположить, что его покупали, то по крайней мере знали, что предложить.</p><p class="p1">— Так почему вы не хотите допустить, что нам просто интересны ваши оценки? Нам надо знать то, о чем вы не пишете. Всем это читать не обязательно, но должна же быть у вас возможность донести…</p><p class="p1">И здесь Горелов улыбнулся, потому что обмолвка вышла характерная.</p><p class="p1">Пусть это была игра, но игра забавная, с непредсказуемым финалом. Хотя предсказуемы все финалы, — но есть разница: умрут все, но некоторые перед этим живут, а другие нет. Можно было подразнить и, чем черт не шутит, действительно что-то исправить. Наконец, можно было передать что-то полезное. И если даже они будут наглухо равнодушны к тому дельному, что он скажет, и станут чутко выслушивать только оговорки про Бориных знакомых, — пускай, что-нибудь все равно осядет и запомнится. И наконец — это было главным, хотя и переживалось на дне, втайне, — это была гарантированная защита: он был достаточно умен, чтобы уж о себе-то не сказать лишнего.</p><p class="p1">Правда, в Горелове-первом что-то ощущалось, что-то такое, что явно намекало на неизбежность появления Горелова-второго. Тут был повод для рефлексии, и Борис еще до замены подумал над ее принципиальной возможностью: что именно было в Горелове не так? А вот, пожалуй, неорганичность. Побеждала органика, абсолютная естественность, а Горелов-первый был результатом каких-то скрещений, внутреннего роста, работы над собой. Может быть, действительно сочетание вот этого селянства и Европы, крепконосости — но притом элегантности или по крайней мере претензии. Одет он был лучше Бори, хотя на Боре, он знал это, хорошо смотрелась не только кожаная куртка, но и любая местная тряпка, даже халат в Туркменистане. Подлецу все к лицу, говорила Муретта, может быть, даже и не шутя. И вообще, Горелов был напряжен, не до конца искренен, и разговоры с Борей не доставляли ему удовольствия: Горелов работал. Но разве можно быть до конца откровенным с человеком, который работает? И Боря не очень удивился, когда вскоре после знакомства с Алей — он поначалу связал эти события, но потом понял, что Аля ни при чем, — в скромной комнате близ Спартаковской площади появился Горелов-второй.</p></span>
