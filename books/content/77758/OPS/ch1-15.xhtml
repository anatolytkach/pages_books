<span><p class="p1">Боря в растерянности стоял на жалкой станции, но тут подкатил, о чудо, грузовик, и из грузовика выпрыгнул, о чудо, человек. Рожа его была темная — только рожу да кисти рук и видел Боря, но этого совершенно хватило, чтобы он про этого человека многое понял. Это был человек тюремный, по-тюремному пришибленный и при этом всегда готовый к прыжку: ходил он враскачку, пружинисто, глядел исподлобья, из-под темно-серого, мышиного кепарика, и было в его манерах нечто наглое и притом заискивающее. «Гражданин Гордон?» — спросил он любезно, то есть с той именно любезностью, с какой грабитель просит закурить или осведомляется, хороша ли погода. Боря известил Алю за неделю о своем приезде, предупредив, однако, что сорваться все может в любой момент; но он и представить не мог, что Аля организует ему встречу. «Для Ариадны мы всегда, гражданин Гордон, Ариадна имеет друзей», — говорил водитель с невыносимой гнусностью, и такие же невыносимо гнусные мысли лезли Боре в голову. Аля молода, прелестна, могла здесь и торгануть собой, и кто осудил бы ее за это? Наверняка никто из следователей, охранников, да кто угодно, — не отказывает себе, ведь каждый ворует с того места, к какому приставлен, а кто приставлен к живому товару, тот берет проценты с него… Руки водителя на руле — «Вы называйте меня Гусем для простоты» — были покрыты синюшной сетью татуировок, как бы митенками, все эти рисунки наверняка что-то значили, даже ладони были истыканы. «Не подумайте, — Гусю, как и всей воровской аристократии, было важно предстать джентльменом, отсюда и чинное полное имя „Ариадна“, — у нас без этого. Мы к ней без корысти. У нас исключительно благородно». Все теперь читали мысли, и это оказалось несложно: предполагай худшее да опровергай.</p><p class="p1">Тот свет поразил его опрятностью. Это была типичная опрятность ада, аккуратность чистеньких мертвецких, палаты безнадежных больных с простынями в голубой цветочек, скромность серых казенных одеял. Был очень ровный желтый забор, очень ровная проволока над ним. Почему Алю надо было держать за проволокой? Боря задался этим вопросом машинально, сказался недосып, стресс, — вопросов у него давно не возникало. Все та же лягушка в медленно нагревающемся котле. Был дом свиданий, куда его провели, тоже удивительно чистенький, с голубыми стенами. Аля была на завтраке. Привезти ее раньше не было никакой возможности: надо было регулярно питать, как в крымском санатории. Вместе с тем за этими голубыми стенами, за цветочками видел он такую камеру пыток, такую лавину унижении и прямого разрешенного насилия, что голова шла кругом и глаза словно выдавливались наружу от боли; мигрень начиналась очень не вовремя. Будто ударная волна давила на уши, просто взрыв прогремел еще в сентябре. Он сейчас увидит Алю. Вместить это было невозможно. Невозможно было представить, что разрешают ездить в ад, как бы в командировку или с визитом.</p><p class="p1">Он ждал два часа. Пришел офицер, назвавшийся политработником, переписал подробно все его данные. Пришел охранник, перед которым Боря непроизвольно встал. Охранник пристально его осмотрел и вышел — доложить, вероятно, что приезжий благонадежен. Пришел еще один охранник, досмотрел подробно все содержимое чемодана, отобрал папиросы, унес, вернул папиросы. Из теплых вещей оставили безрукавку, остальное унесли. Унесли печенье. Яблок оставили два. Еще раз пришел офицер, еще раз осмотрел чемодан. Через десять минут привели Алю.</p><p class="p1">Они стояли друг против друга, не решаясь заговорить при охраннике. Охранник потоптался и вышел. Дверь заперли снаружи. Боря тоже был теперь в заключении. Иван-царевич приехал освобождать Василису, им дали свидание, Иван-царевич все понял и уехал восвояси. Иванова ничуть не преувеличила. Все было даже страшней, чем она рассказывала. Глаза. Это были уже не фары, это были дыры. Из Алиных глаз всегда шел свет, озарявший лицо, комнату, Борю, — теперь эти глаза были мертвы, как чистенькая мертвецкая, и страшно было в них заглядывать, и ясно было, что никакой любовью, никакой заботой, никаким Крымом не вернуть прежнего света. Далее — руки. Они тискали, мяли цветастую юбку, которой Боря никогда на ней не видел, — откуда взялась эта юбка? На ногах были толстые коричневые чулки, большущие галоши, но галоши можно снять, юбку сбросить, а куда деть руки? И она тоже не знала, куда деть издырявленные, загрубевшие, согнувшиеся пальцы с опухшими суставами, с короткими расслоившимися ногтями. Рот странно искривился, словно она перенесла удар, — какие удары и сколько их было, этого он и представить не мог. И поверх всего эта страшная маска, выражение покорной, согбенной виноватости, заранее согласной на любую кару; это сознание предательства, полной отверженности, отлученности от всего прежнего, — и виновата была только она, без всяких ссылок на внешние условия; прощения не было.</p><p class="p1">— Аленька, — выговорил он вдруг. Он никогда к ней так не обращался. Это было ужасное слово, какой-то аленький цветочек; но она была теперь именно Аленька, никак не Аля.</p><p class="p1">— Я сдала отца, — сказала она очень тихо, совсем беззвучно, словно это было первое, что теперь надо было о ней знать.</p><p class="p1">— А меня? — спросил Боря, и это был подлый вопрос, но с инстинктом ничего не сделаешь.</p><p class="p1">— Тебя? — переспросила она. — Про тебя не спрашивали.</p><p class="p1">И камень свалился с его плеч, и это было страшней всего.</p><p class="p1">— Да не сдала ты никого, — сказал Боря фальшиво. — Ты же знаешь, они спрашивают только то, что уже знают.</p><p class="p1">— Все равно, — сказала она. — Значит, им надо просто, чтобы мы всех сдали. Тогда мы уже такие, как надо.</p><p class="p1">Они так и стояли, он не решался к ней прикоснуться. Он и на похоронах опасался трогать покойников. Они были уже там, а он еще здесь: не положено.</p><p class="p1">— Боря, я была такая хорошая девочка, — сказала она вдруг жалобно, и рот у нее еще сильней покривился. — Так меня все любили. Почему со мной надо было это сделать?</p><p class="p1">Боря молчал.</p><p class="p1">— Так мне нравилось всё… — проговорила она.</p><p class="p1">— Это не тебе, — начал Боря. — Это все мне. Это мне за тебя, за все. Пойми, Алька, я лучше бы двадцать раз умер…</p><p class="p1">— Чем вот так приехать, да?</p><p class="p1">— Нет, чем отдать тебя.</p><p class="p1">— Нас всех мало убить, — повторила она слова Ивановой. — Всех убить.</p><p class="p1">И сказать, что с этим не задержатся, уже нельзя было.</p><p class="p1">— Ну что мама, что Шур?</p><p class="p1">— Вот… вот они написали тебе, — засуетился Боря. — Сядь, поешь. Я тут привез, они только печенье унесли…</p><p class="p1">Голод, видно, был все-таки сильней любых чувств — любви, вины; Аля стала осторожно отламывать халву по крошечному кусочку.</p><p class="p1">— Ты знаешь, меня тут встретили по-царски, прямо на станции…</p><p class="p1">— А. — Она попыталась улыбнуться. — Я передала. Я оказала им тут услугу. Спрятала одну вещь. Меня досматривали на этапе, ну, и здесь не стали. Мне отдали, я в лифчике спрятала. Потом оказалось, большая ценность. Неважно. У той, которая мне это отдала, — такая есть Муха, — у нее на воле влиятельный друг. У влиятельного друга шофер, тоже друг. Тут, в общем, связи, везде связи…</p><p class="p1">— Но что за люди вообще?</p><p class="p1">Она молчала и ела.</p><p class="p1">— Я к тому, не слишком ли обижают и все это…</p><p class="p1">— Нормальные люди, — сказала она блекло. — Если бы убили, то было бы правильно.</p><p class="p1">Были у них сутки, за время этих суток так и не стемнело, все тот же мертвенный свет. Ненадолго они засыпали, привалившись друг к другу, но любовь — какая любовь? Не могло быть и речи о том, чтобы по-мужски к ней прикоснуться. Вся она была как тряпочная кукла, жалкое мясо на гнутых костях. И если с ней, вообще с лучшим, что было на свете, можно было такое сделать, — то действительно оставалось только всех убить. Но почему, за что? Теперь не спрашивают, за что, вспомнилось ему; теперь спрашивают — зачем. Так неужели только затем, чтобы выросло племя, которому умирать не больно; а племя это нужно только затем, чтобы воевать; а воевать нужно только затем, чтобы все списать? Неужели тут всегда стоит одна задача — все списывать; всех сплачивать вокруг стержня; отводить любые претензии? А чтобы все были готовы умирать, неужели надо, чтобы никому не хотелось жить? Он взглянул на свою руку: жить не хотелось. Он был уже почти в том идеальном состоянии, в каком можно ложиться под серп; а тут и не было другой задачи, кроме как дать себя скосить. Одних надо убить, чтоб не мешались; других прогнать через фильтр; после фильтра можно воевать; после войны можно еще пятьдесят лет жить этой легендой. Если цель такова, они все делают правильно; если они все делают правильно — цель такова.</p><p class="p1">Они почти не разговаривали. Борис отдал ей письма матери и брата, сказал, что попробует приехать еще.</p><p class="p1">Когда уже оставалось полчаса до назначенного им срока и он явственно ощущал присутствие охранника за дверью, когда чувствовал физическую тяжесть каждой секунды, она сказала вдруг:</p><p class="p1">— У меня была младшая сестра. Я никогда не рассказывала. Ни тебе, никому. Она была страшная. Я и жалела ее, и боялась. У нее была огромная круглая голова, шейка тонкая, голова не держалась. Она как начнет одно слово повторять, без всякого смысла, как шаман, так и по полчаса, по часу… Если бы кормить и лечить, то, может быть, все встало бы на место. Но мы ее отдали в приют, и она умерла. Я тогда каялась, потому что ведь это меня спасали, когда ее отдали. И я молилась тогда: пусть я стану как Марина! Должно быть, я думала, это ее вернет. Но вот эту именно молитву и услышали. Может так быть?</p><p class="p1">— Нет, не может, — сказал Боря.</p><p class="p1">— Ты знаешь, — сказала она под конец, — я думала… Может, мне можно как-то отсюда писать? Ведь писала же я очерки из Крыма, писала, как мы в театр ходили… Была же книга про Беломорканал! Здесь тоже область жизни. Как ты думаешь? Печатать очерки, как тут перековываются все, как я… Фотографии, конечно, нельзя, но я делала бы рисунки. А?</p><p class="p1">Она так ничего и не поняла, она еще не понимала, что попавший сюда вычеркивается отовсюду, что, если даже ему и повезет выйти, — ведь ее фактически признали невиновной, «врешь, ни за что у нас пять дают», — все равно вход в журналистику, хоть в районную газету, хоть в помоечный листок, будет ему закрыт навеки, вплоть до запрета на некролог. Репортажи о перековке, боже мой! После статьи за шпионаж! Он сам был виноват, конечно, не написав ей правды, да и кто бы решился написать? Он передавал ей приветы от людей, давно сделавших вид, что ее нет и никогда не было; посылал номера журналов, сообщая в письмах, что все ее ждут не дождутся, а то совсем просел стиль, нет свежих идей…</p><p class="p1">Ни одна душа там ее не помнила, а она все хотела для них работать, передавала ответные благие пожелания, интересовалась, как растет ребенок у одной и оболтус у другой… «Да, — сказал он, — да, пиши, конечно. Попробуем напечатать. В конце концов, сегодня это главная сфера жизни, об этом думают все».</p><p class="p1">Вошел охранник. «Собирайтесь», — сказал им обоим. Она взяла тяжелые свертки со словарями и легкий — с едой.</p><p class="p1">— Аля! — чуть не заорал Боря, но надо было щадить ее.</p><p class="p1">При охраннике обняться было немыслимо. Она поцеловала его в щеку, не поцеловала — коснулась, и ужасный запах снова проник в его ноздри, растворился в его крови, стал его частью — запах мертвой опрятности, в котором, как в белом цвете, было все зловоние мира.</p><p class="p1">Гусь поджидал его с грузовиком. «У нас со всем уважением», — повторял он.</p><p class="p1">Боря закаменел. Обратного пути он не помнил.</p><p class="p1">И стал жить, то есть умирать.</p><p class="subtitle">— 6 —</p><p class="p1">Гремевший тогда поэт воспевал войну, уже идущую повсюду; он извергал дикую смесь барачной киплинговской вони и шипра, причем шипр преобладал. Шипром было пропитано все. Осенью наметился некий перерыв в дружбе: случилась ось Германия — Италия — Япония, и под это дело пришлось переверстывать весь номер, на девяносто процентов посвященный германским друзьям. Но потом улеглось и пошло прежним чередом. Аля писала письма, полные вины и ужаса: «Прости, я была сама не своя, твой приезд был так невозможен» и прочее. Боря все понимал, не понимал одного: как вышло, что он, красавец и муж красавицы, оказался вдруг старым человеком, тащившим на себе двух инвалидов? Это была расплата за слишком легкую жизнь, за совмещение черняночки и беляночки, двух красавиц, которым все завидовали; теперь обе они никуда не годились, как, собственно, и Родина, до поры ими олицетворяемая. И та, игривая, на все готовая, любительница экспериментов, гибкая, в шоферской кепке, и эта, нежная, вернувшаяся откуда-то из дореволюционной дымки, женственная и девственная, страстно преданная ему одному и предаваемая им, — обе они теперь никуда не годились. У одной был шрам и тик, у другой срок, и он волок их на себе, ни одной не желая и ни одну не любя. Долг привязывал его к ним, долг и больше ничего, и ничего он так не желал, как их взаимного уничтожения; но обе были между жизнью и смертью, а потому бессмертны.</p><p class="p1">Так и тянулось бы это существование, в котором не было теперь места ни попойкам, ни дружеским остротам; случалось, он по неделям ни с кем подолгу не говорил, кроме разве Горелова, назначавшего встречи все реже. Все начало переворачиваться после одного существенного разговора — и именно с Гореловым.</p><p class="p1">Боря не хотел больше ехать к Але, но Горелов сам вывел разговор на нее.</p><p class="p1">— Вы не хотите ее навестить?</p><p class="p1">— В каком качестве?</p><p class="p1">— В качестве жениха, — сказал Горелов. — Папа, понимаете, оказался упрям. И, чтобы ускорить ее освобождение, вы бы, может быть…</p><p class="p1">Боря ничему уже не удивлялся, но этому удивился.</p><p class="p1">— Вы хотите, чтобы я вытащил из нее недостающие свидетельские показания?</p><p class="p1">Горелов мог завозражать, заотнекиваться, но он был честный малый.</p><p class="p1">— Почему же нет, — сказал он.</p><p class="p1">— Разве он недостаточно изобличен? — спросил Боря. — Ведь уже сидит, может и дальше сидеть.</p><p class="p1">— Нет, этого нельзя. Мы не можем посадить человека несправедливо. Все должно быть справедливо.</p><p class="p1">— То есть на него надо изготовить показания?</p><p class="p1">— Почему изготовить? Скажем так, добыть. Цель всякой психотерапии заключается в том, чтобы виновный сам объяснил вину. Сам отыскал ее. Если пациент живет с неявным чувством вины, наш долг — найти ее источник.</p><p class="p1">— А если пациент не виноват?</p><p class="p1">— Смешно, — сказал Горелов. — Мы же с вами модернисты. Вина — ключевое понятие модерна. Невиноватых нет. Состояние вины — самое творческое, самое высокое. Мы всех сделаем виноватыми и всех излечим.</p><p class="p1">— Погодите, — сказал Боря. — Игра игрой… Но не хотите же вы сказать, что и в самом деле…</p><p class="p1">— Именно это я и хочу сказать. — Горелов прошелся по кабинету — да, по кабинету, как еще это назвать? — Так вижу я. А как это все на самом деле…</p><p class="p1">Снова пауза. Боря захрустел пальцами.</p><p class="p1">— А знаете, что тут бывает, когда мы с вами не встречаемся? — вдруг спросил Горелов.</p><p class="p1">— Откуда же мне знать.</p><p class="p1">— Тут один мой приятель встречается с девушками. У него есть ключ. Не простаивать же помещению. Он говорит, ему здесь не очень комфортно и не всегда получается, но это, наверное, потому, что срабатывает психологический барьер. А мне, напротив, гораздо лучше здесь работается, когда я знаю, что в другие дни… или ночи… Это как бы подстегивает. Я думаю, что и у вас так хорошо идет терапия во многом за счет того, что мы с вами присутствуем как бы на месте любви.</p><p class="p1">«Сошел с ума», — подумал Боря с облегчением. Было гораздо легче думать, что это безумие, нежели принять за норму.</p><p class="p1">— Случаи бывают теперь очень интересные, — сказал Горелов с обычным своим скучающим видом. — Вот, полюбуйтесь.</p><p class="p1">И, закинув голову, закрыв глаза, прочел:</p><div class="poem">
<div class="stanza">
<p class="v">Поймем ли мы в огне и дыме</p>
<p class="v">Своей сегодняшней войны,</p>
<p class="v">Какими битвами иными</p>
<p class="v">Мы в этот миг окружены?</p>
</div>
</div><p class="p1">Он открыл глаза и в упор посмотрел на Борю:</p><p class="p1">— Нравится?</p><p class="p1">— Хорошо, — не сразу ответил Боря. — Похоже немного на…</p><p class="p1">Он назвал человека, давно уехавшего и, вероятно, уже умершего.</p><p class="p1">— Похоже, — кивнул Горелов. — Неприятный был человек. Я знал его немного. Тоже все надеялся, что придет всемирная катастрофа и все спишет. Тяжек груз ответственности.</p><p class="p1">— А это чье?</p><p class="p1">— А эта фамилия вам ничего не скажет. Интересный человек. Обратился, между прочим, добровольно. Сообщил о нескольких ближайших друзьях, тоже поэтах. Сообщал с такой откровенностью, что даже удивительно. Всю их жизнь рассказал, с какой-то, знаете, любовью. Я долго бился, не хотел спрашивать прямо: почему? С одним, положим, ясно: девушку они не поделили, роковое такое создание. Но остальные? Пока не стал читать его стихи, не угадал. Позор на мои седины. Он знаете что решил? Что ему не хватает злодейства. Что он никак не может создать шедевр, потому что слишком морален. А надо перешагнуть — вот и пойдут шедевры один за одним. Просто ему лень топором махать, и старухи подходящей нет на примете. А так — гуляй, душа. Ему кажется, что раз грядет мировая катастрофа, то в последние дни перед ней можно все попробовать. Вот он и пробует. Сверхчеловечек такой, графоманчик. Ведь им зачем нужен конец всего? Чтобы все списалось. Правда, по моим ощущениям, настоящего шедевра нет, — а вам как кажется? Вы же литератор.</p><p class="p1">— По четырем строчкам судить трудно, — осторожно сказал Боря.</p><p class="p1">— Да и по одной можно, — уверенно заметил Горелов. — Ясно, что случай патологический, и что всем до смерти хочется списать свои грехи, увидать битву мировую. И вот — доносят: думают, попробуют запретного. Да ведь ничего не будет. Гадостей наделали, а никакого конца света не случится. И теперь с этим надо будет жить, просто жить. Такая ловушка. Господь ведь тоже с юмором. Все ждут: ну, сейчас будет Содомская Гоморра! А будет максимум еще одна европейская война, и посмотрю я на них на всех…</p><p class="p1">Боря не знал, что сказать. Разговоров на такие темы он давно не вел.</p><p class="p1">— Ну да ладно, — сказал Горелов. — Я поспособствую вам, конечно. У вас все чисто. Она, кстати, на вас ничего плохого не сказала.</p><p class="p1">— Она, кстати, говорила мне, что несколько… как бы это… что-то лишнее про отца…</p><p class="p1">— Нет, совсем нет. Всякие невинные вещи. Вот если бы серьезное — тогда, может, мы давно бы его отпустили.</p><p class="p1">— Странно, — сказал Боря.</p><p class="p1">— Ничего странного. Признание вины решает все. Пока человек не признался, он не исцелен.</p><p class="p1">— А я?</p><p class="p1">— А вы и так кругом виноваты. Я же говорил вам. Так что если надумаете еще раз поехать, зимой, например, или весной, — милости просим. Большего пока сделать не могу, но, знаете, перемелется — будет мука.</p><p class="p1">И отпустил его, опустошенного, как никогда прежде.</p><p class="p1">«Нет, голубчики, — думал теперь Боря, — вы хотите меня сделать виноватым — так нет же. Не будет вам виноватого. Не будет вам исцеленного. Сотня безумных психиатров или кто они там — стая безумцев решила всех подавить комплексом вины и бросить в огонь, чтобы существовать вечно, — нет, увольте. Этого не будет никогда, — повторял он, шагая по лужам, глядя в блеклое, голубое, виноватое небо цвета мертвой опрятности. — Все повинятся, а я не повинюсь, потому что я не виноватый, потому что я не русский».</p><p class="p1">Так начал просыпаться Шестой.</p><p class="p1">Шестой, как и положено, был жестоковыйный, упрямый, смуглый; Шестой терпеть не мог прощения и примирения. Примирение он считал чем-то вроде вишистского компромисса, который, может, кого-то и спас, но погубил единственно ценное, что там вообще было. Если вы думаете, что я имею в виду их жалкую французскую честь, вы заблуждаетесь. Я имею в виду всех шестых, всех, кого взяли первыми. Нас заставили забыть о крови, я сам заставлял себя забыть о крови, утверждая, что для новых людей пол, возраст, нация несущественны; но нация — последнее, что можно отнять у человека, а точней, то, чего отнять нельзя. Когда сдергивается блестящий покров Европы, под ним остается нация; и вот их осталось две — я и волк. С волком не может быть примирения. Я слишком долго прожил с русскими, это верно; но, когда русские показали свое лицо и я узнал, что единственное их предназначение — война, а единственный инструмент войны — человеческий тростник, я отказался от всех пяти идентичностей и вспомнил шестую. Теперь я понимаю, почему мы стали главной мишенью: потому что мы — последний оплот человеческого.</p><p class="p1">Но думать так он решился не сразу. Поворот в его душе совершился тогда, когда Шур вдруг сказал (Боря как раз принес ему свою кожаную куртку, которая оказалась мала, но Шур кое-как застегнулся; плечи у него были, как у каменотеса):</p><p class="p1">— Боря, я думал тут… Скорее всего, то, что мы с матерью на свободе, это совершенно временно. Это ненадолго. Скажи, что о тебе я мог бы сказать, что было бы для тебя наименее nuisible?</p><p class="p1">Он всегда переходил на французский, когда смущался.</p><p class="p1">— Минуту, минуту, — торопливо сказал Боря. — Это что же, ты хочешь получить от меня показания на меня?</p><p class="p1">— Боря, пойми, — засуетился Шур, — пойми, что-нибудь сказать им все равно придется. Надо просто заранее рассчитать то, что наименее опасно. Просто скажи мне, и я это повторю. Для себя я уже придумал. Я недопонимал ценность договора позапрошлого года, но теперь я допонимаю. Я с Митько и Антоном делился, это двое из школы, совершенно неинтересные люди, но мне казалось, что от них может зависеть мой авторитет. Я хотел казаться независимым. И я делился. Но теперь я понимаю. Скажи мне, потому что иначе может выйти ужасная ошибка…</p><p class="p1">— То есть ты хочешь сказать, — перебил его Боря, — что после всего… — Он хотел сказать «после всего, что я для вас делал», но попрекать несчастного юношу куском не хотел и теперь; хотя, черт побери, приятно было бы отобрать у него вполне еще приличную куртку, пусть даже иссохшему Боре она была велика, а раздобревшему, куда только его прет, Шуру мала. — …что после всего, о чем мы с тобой говорили, ты бы оклеветал меня?</p><p class="p1">— Почему оклеветал, почему… Но просто ты меня тоже пойми. В конце концов, может быть, с Алькой все вышло именно из-за тебя. Возможно, ее взяли потому, что ты сделал ее второй женой. Тебя не решились тронуть, а она за это ответила. Ведь это может быть? Ведь если бы она была шпионка, то, наверное, все было бы серьезнее? Значит, это какая-то мораль, или аборт, или я не знаю что, но согласись, что перед моей семьей ты несколько виноват, старина… то есть ты ею воспользовался, и теперь, может быть…</p><p class="p1">— Я понял, — сказал Боря. — Да, я все понял. Что же, ты прав. Хорошо. Ты можешь им сказать обо мне. Ты можешь сказать, например, что я ненавижу русских.</p><p class="p1">— То есть как, Боря, то есть как это…</p><p class="p1">— Очень просто. Это те же немцы, только без немецкой аккуратности. Народ-предатель. Никакой внутренней основы. Он предает всех. Аля к этому неспособна, потому что в ней есть отцовская примесь. Но в тебе, как мы знаем, этой примеси нет, и потому ты чист. Это не значит, что я ненавижу лично тебя. Но в принципе можешь сказать им с полной уверенностью: союз русских с немцами был предопределен, и я противник не только этого союза… нет… я противник всего, что они олицетворяют.</p><p class="p1">— Но прости, Боря, погоди, — залепетал Шур, — ведь если кто-то и может остановить немцев, то только русские…</p><p class="p1">— Они не собираются их останавливать, — произнес Боря торжественно. — Они уже решили с ними слиться. Они всегда хотели стать ими, при Петре и Бироне им это почти удалось. Я ненавижу этот союз. Понял? Так и скажи им.</p><p class="p1">Прежний, осторожный Боря не только не сказал бы, но и не подумал бы этого. Но Боря нынешний не знал страха, в нем проснулось наследие патриархов, о которых он и не помнил. Да и не повернулся бы язык у робкого Шура пересказывать такие вещи.</p><p class="p1">— После этого… — пискнул Шур. — После этого я не знаю, как буду с тобой разговаривать.</p><p class="p1">— Ты не будешь со мной разговаривать, — твердо сказал Боря. — Я буду помогать твоей сестре и твоей матери, но с тобой я больше не скажу ни слова. Иди.</p><p class="p1">И Шур стремительно удалился, пару раз оглянувшись. Он, кажется, боялся, что Боря отберет куртку.</p><p class="p1">Так просыпался Шестой, занимая все предоставленное ему пространство; он властно распоряжался Бориной жизнью, и оказывалось, что все прежние развилки тоже разрешались благодаря ему, что все выборы бессознательно совершались при его прямом участии, что писал и думал за Борю тоже он, а маски, которые он принимал, были, в сущности, прозрачны. Он всю жизнь ненавидел немецкую чистоплотность и русскую грязь; он всю жизнь понимал их одинаковую природу; он всю жизнь радовался любым разрушениям и измывался над созиданиями, признавая только одно созидание — башню собственного духа. Окончательное подтверждение своей правоты он получил 14 июня, когда ТАСС заверил всех интересующихся, что войной и не пахнет. Иван и Зигфрид держали друг друга в стальном объятии. Торжествовала идиллия. Растоптанная Европа и миллионы желтых звезд всех совершенно устраивали. Все облегченно выдохнули, а Боря окончательно отдал себя в распоряжение Шестого, лишь для виду терпя прочих пятерых.</p><p class="p1">Он никому ничего не сказал. Но он себе позволил. Муретта уехала в Кисловодск. Боря выследил в Парке культуры обворожительную, свежую, крепкую девочку с ямочками. Грубейшей ошибкой было бы думать, что он захочет теперь кого-то из своих. Нет, тратить силы на своих — значило бы расходовать их нерасчетливо. Наше дело — чужие, проникновение в чужих, порабощение чужих. И он выцепил хозяйским глазом эту новую, свежую девочку, потому что бесконечно тащить за собой двадцатые и тридцатые годы было уже нельзя. Они были сломаны, перерублены пополам. Он выбрал ясные, чистые сороковые, девочку эпохи дирижаблей и фонтанов. Эта девочка была вылитая Брунхильда, светловолосая, грудастая, монументальная. Он знал, чего ей хочется. Она вся лопалась от своих соков. Она сама пошла к нему в руки.</p><p class="p1">Кое-что, конечно, забылось, навык отчасти утратился. Но с каким же наслаждением он сбросил груз двух своих прежних любовей! Так демон отбрасывает сломанные, черные, запыленные крылья. И развернулись новые, легкие, крепкие, казавшиеся почему-то зелеными. Был упоительный зеленый день и упоительная ночь, и среди этого он, человек пустыни, пьяный влагой и свежестью июня. Он брал ее трижды, не уставая. Она успокоилась, откричавшись, и заснула, отвернувшись, а он распахнул окно в четыре утра и уставился в эту самую короткую ночь. Кричали воробьи. Медленно расчищалась синева ослепительного, должно быть, дня.</p><p class="p1">Вот я, говорил он этому небу. Вот я, твой первый, твой главный, твой избранный, уцелевший во всех передрягах, один сохранивший подобие чистоты среди всеобщего кровосмешения, расслабления и предательства. Вот я, твой кристалл, твой миндальный стержень, твой посох. Вот я, вышедший победителем из всех противостояний и готовый к последнему. Вот я в полноте моей силы, моей власти и страсти. Что можешь ты сделать со мной?!</p><p class="p1">И что-то мигнуло в воздухе, но он не понял — что; словно взорвалось где-то, но не рядом, а километров за семьсот.</p></span>
