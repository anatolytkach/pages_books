<span><p class="p1">— Совет да любовь, — сказал Миша. — Лишь бы человек был хороший.</p><p class="p1">— Хороший, не беспокойся.</p><p class="p1">— Мне-то что волноваться.</p><p class="p1">— Слушай, — сказала она вдруг заговорщическим тоном, какого он и не помнил у нее. — Ты полежи тут еще минут пять, хорошо?</p><p class="p1">Приведет сейчас этого своего, лениво подумал Миша, еще поколотят, не дай бог, как все с ней понятно, просто ужас. Но уйти будет трусостью. Он закрыл глаза и изобразил на лице блаженство.</p><p class="p1">Через три минуты на него опять упала тень, он открыл глаза и снова увидел Валю — одну. Валя ходила договариваться с соседкой по комнате и договорилась.</p><p class="p1">— Пошли, — сказала она, наклонилась и взяла Мишу за руку. Он встал, голова после солнца кружилась. Спрашивать, куда пошли, тоже было бы трусостью.</p><p class="p1">Она жила на пятом этаже новенького корпуса. Корпус был выстроен с крымско-кавказской курортной роскошью, странной среди кроткого Подмосковья, но это был теперь такой стиль, по понятным причинам заимствованный с Кавказа. Роскошь была признаком силы, как у всех азиатов. Мы теперь азиаты. Внутри было прохладно, стоял бильярд и огромные шашки, которыми как раз сейчас двое атлетически сложенных отдыхающих играли в «Чапаева». Игра возникла после фильма и заключалась в том, чтобы выбивать нижнюю шашку из столбца. Атлеты были мастерами своего дола.</p><p class="p1">В номере на пятом этаже Миша обратил внимание, сколько флаконов и пилочек было наставлено на тумбе около кровати, но это оказалась не Валина кровать. Валя стянула платье через голову, и тут Миша вспомнил почти забытое за два месяца, да что там, насильственно вытесняемое чувство.</p><p class="p1">Он вспомнил, как бывает, когда очень хочется, как это невыносимо, как унизительно. Он зависел от нее, как ни от кого в жизни, и вспоминать это было попросту страшно. В ней все настолько было на месте, настолько как надо. У нее была подлая душа и жалкий ум, и все-таки все ее тело говорило о другом, тело было умным и отважным, это было не в том, как она двигалась, не в том, как принимала его, — а независимо от него, в каждой линии. Это тело было ему предназначено, а что там было с ее изуродованной душой и неразвитым умом — неважно.</p><p class="p1">Валя быстро забралась под одеяло и повелительно хлопнула рукой по простыне.</p><p class="p1">— Нет, погоди, — сказал Миша, — я хочу посмотреть.</p><p class="p1">— Мало ли что ты хочешь.</p><p class="p1">Она схватила его за руку и потянула к себе. Она была сильная. Вообще, тут как: примерно как в женской палате больницы, успел подумать он. Женщины красивее, чище, лучше, мужчины по большей части скоты, но женское разложение ужаснее, женщины хуже пахнут и в полураспаде меньше за собой следят. И в постели так же. Или это нормальное соитие без особенных чувств, здоровое такое бычье дело, или это самый страшный восторг и самая страшная грязь. Если любишь, то потом так же сильно и ненавидишь. Действительно, или ты в этом деле бог, или животное, совсем животное, вот как я сейчас, когда вылизываю здесь. Но когда я животное, я все-таки больше бог, чем когда я с любой другой, с обыкновенной, с никакой. За всю эту животную божественность я буду платить ужасно…</p><p class="p1">Им никогда еще не случалось заниматься этим делом в нормальной кровати, и потому у них не было времени на медленное, вдумчивое привыкание, Миша не закрывал глаз. Он понимал, что все надо запомнить.</p><p class="p1">— Вот знаешь, — заговорил он потом, — вот я смотрю на тебя сейчас — и думаю, как все в тебе хорошо. Вот смотрю — и думаю: слишком хорошо, чтобы это было мое. И никогда не будет мое, хотя вообще должно бы с самого начала. И если бы ты была моя, я бы не любил тебя так. И ревность ничего не портит. Серьезно. Есть только одна вещь, которая вообще все портит. Это страх. Я иногда тебя боялся и тогда ненавидел. Ты этого понять не сможешь, ты слишком здорова, а я всегда живу с чувством, что если начнется, то начнется с меня.</p><p class="p1">— Ты, Гвирцман, все про себя, — сказала Валя ласково. — Ты потому и не видишь ничего.</p><p class="p1">— Согласен, мне всю жизнь это говорят. Но я не скрываю хотя бы.</p><p class="p1">— А что ты про меня знаешь? Ничего ты про меня не знаешь. — Она перевернулась на живот. — Моя жизнь такая была, что посмотрела бы я на тебя. Меня в четырнадцать лет отчим растлил.</p><p class="p1">Она сама не знала, правду ли говорит. Правды, во-первых, нет, и что выдумаешь, то и будет, а во-вторых, что-то отчим безусловно с ней сделал, так что учитель физкультуры в десятом только продолжил давно начатое. То есть что-то было.</p><p class="p1">— А я знал, — сказал Миша и обнял ее. — Вот знал.</p><p class="p1">— Ничего ты не знал, — произнесла она, не высвобождаясь.</p><p class="p1">— Все знал. Это сейчас так у всех. Всех растлил отчим.</p><p class="p1">— Иди ты к черту. Тебе все бы зубоскалить.</p><p class="p1">— Слушай, нет! Клянусь, я серьезно. Но это со всеми сейчас. Я не могу объяснить. У всех или отчим, или мачеха, потому что родные родители так не сделают никогда. И всех они насилуют. Я не буду тебе объяснять, ладно? Ты сама понимаешь.</p><p class="p1">— И учили меня плохо, — добавила она. — Я всегда была среди вас как дура, и выручало меня то крестьянское происхождение, то Коля. Понимаешь что-нибудь? Ничего ты не понимаешь.</p><p class="p1">— Молчи, молчи. — Это было совсем не нужно, как не нужен был иногда в терпком запахе ее пота какой-то земляной, чуть не конский отголосок, что-то неистребимо крестьянское. Крестьянство Миша ненавидел, и она не была крестьянкой, а если и крестьянкой, то французской, из тех, которые у Мопассана отдавались бродягам или извозчикам. Он не хотел, чтобы она сейчас говорила.</p><p class="p1">— А никто не придет? — спросил он, когда уже темнело. Ночь была почти белая, нежно-зеленая, из ее окна был виден дальний лес, над ним стояло бледное тихое сияние.</p><p class="p1">Валя встала и открыла окно. Пахло водой, свежескошенной травой, чем-то илисто-глинистым гнилостным, но сладостным. Миша подошел к ней, и некоторое время они так стояли у окна, глядя на острые верхушки елей и ломаную линию леса. Потом небо стало лиловеть, хотя полная темнота не наступала. Самая короткая ночь, подумал он, а больше нам и не дано.</p><p class="p1">— Я сговорилась, Светка у своего дундука останется. А как он со своим сговорится, это уж его дело. Все сговариваются как-то. Смешно, знаешь, приехали три дня назад, расселили всех, мальчик к мальчику, девочка к девочке, а сейчас перемешались — я не могу.</p><p class="p1">— А кто этот, жених-то твой?</p><p class="p1">— А тебе что за дело?</p><p class="p1">— Интересно все-таки.</p><p class="p1">— Ничего уж не сделаешь, Миша, — сказала Валя тихо. — Ничего уж не сделаешь.</p><p class="p1">— Ну, а потом, после… ты будешь со мной видеться?</p><p class="p1">— Может, буду, а может, нет. Скорее нет. Чего душу травить.</p><p class="p1">— Но ведь не плохо тебе… так? — спросил он, не решившись сказать «со мной».</p><p class="p1">— А я не знаю, как мне плохо. Мне по-всякому хорошо и по-всякому плохо.</p><p class="p1">Он ощутил вдруг нечеловеческую, невместимую полноту этой ночи, запаха, тишины. Он посмотрел на ее крепкие белые ноги, плоский живот с дорожкой волосков от пупка, — ее и это не портило, — удлиненные груди с как бы курносыми сосками, как ужасно все это звучит, ничего нельзя назвать, — и подумал: нет, это совсем не то, что было с Лией, там все было святыня, а здесь такое страшное родство. Но как бы я целовал эту грудь, если бы поверил, что она вскормит моих детей. А этого никогда не будет, и потому мне хочется не целовать, а кусать ее. Все будет чужое, но сейчас, в эту ночь, все мое. Вот эта страшная полнота и зовется плерома. И это не может быть долго, иначе никто бы не выдержал. Я смотрю на все, как будто оно предназначено быть моим, а оно чужое: и этот лес, и эта река, и эта чужая комната в санатории, и Валя Крапивина. На один миг все это мое, а больше — уже никогда.</p><p class="p1">— Пойдем спать, — сказал он. — Мне завтра к детям рано.</p><p class="p1">— Господи, — сказала Валя вдруг с такой звериной тоской, что Мише стало страшно. — Господи, Миша. Вот если бы… слушай… я говорю такое, что сама не знаю… но подумай только, как было бы хорошо, если бы ты просто ушел на войну, а я бы тебя просто ждала! Господи, как бы это было… без всего этого, знаешь, без всей этой дряни… Мы так все испортили теперь!</p><p class="p1">— Но это же не мы виноваты, — сказал он, как будто это имело значение.</p><p class="p1">— Мы, не мы… Но ты только представь: если бы ты просто ушел, а я тебя просто ждала… Мишка, ведь это было бы счастье, да?</p><p class="p1">— Да, — сказал он. — Да, наверное.</p><p class="p1">И что-то мигнуло в воздухе, он не понял, что.</p></span>
