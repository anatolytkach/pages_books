<span><p class="p1">Очень быстро она оказалась на полу, а он на ней, очень быстро слетали с нее тряпки. Он много раз представлял ее голой, но, конечно, ошибался. Не так все было. Ему казалось, что у нее сильное, твердое, тонкое тело. А между тем она была мягкой, необыкновенно податливой, с кожей влажной и даже липкой. Некоторое время он тыкался вслепую, ее это забавляло, послышалось уже не вакханское ах-ха-ха, а тихое, почти уютное хихиканье. Наконец она ему помогла, он с остервенением об нее колотился, тычась губами в шею. Запах кожи тоже был странен — и отвратителен, и притягателен одновременно. Он не переставал думать, конечно, и заметил, что чем отвратительней, тем притягательней. Его тянуло будто в могилу — под всеми духами и присыпаниями, померещился ему даже детский тальк, какая-то уж совсем прапамять, — от нее шел земляной дух, почти болотистый. Вот интересно, мертвый Тузеев кончал сюда, пока совсем не кончил. Было не тесно, она была не тесна. По причине все того же опьянения, часто выражающегося в сухостое, он не так быстро, не так сразу, как могло бы, и еще как-то, еще сколько-то, тянул, и странно было, что он обнимал это — злобное, невыносимо отталкивающее. Ведь теперь ясно было, что ничего человеческого. Человеческое могло быть с Лией, но теперь уж, конечно, не будет. Теперь всю жизнь будет это болото, замарался навсегда. И когда — успев выдернуться из нее, потому что еще бы не хватало, — он ей забрызгал живот, первым чувством было такое раскаяние, такое омерзение, каких он не знал, не помнил в жизни. И какое-то время еще лежал, отдуваясь, пока такое же тихое, уютное хихиканье но защекотало ему ухо: ведь мальчик, да? Знала, знала. Мальчик. А туда же лезет. Куда лезешь, мальчик? Подвинься, говно. Да, это было то самое слово, оно ничуть не резало слух. ПОДВИНЬСЯ, ГОВНО. И стала невозмутимо надевать свои тряпки, и он увидел грудь — ничего похожего на ту светящуюся святыню, которую он, подумать страшно, оглядывал вчера. Сука, тварь, опять пробормотал он сквозь зубы…</p><p class="p1">Он вскочил, голова болела и кружилась. Ну вот, предсказание сбылось, рубеж перейден, а о чем же плакала Аглая? Неужели и о своей поруганной душе? И все не мог найти пуговицы на рубашке, пока не понял, что они отлетели.</p><p class="p1">Валя сидела, привалившись к стене, склонив голову на плечо. Видно было, что губа у нее распухла. Не могло быть и мысли о том, чтобы с ней говорить. И мысли не могло быть. Не могло быть и мысли, повторял он, и ни одной мысли не было. Боль набухала в правой половине головы, пульсировала. Он выскочил в прихожую, в большой комнате танцевали, танцевали под ужасного, невыносимого «Домового». Домовой причитал: вау, вау! Теперь, конечно, она на него заявит. Там свидетели, на ней одежда порвана. Она скажет всем, и хотя его неоткуда теперь выгнать, но тем лучше. Окончательно асоциальный элемент. Он выбежал, не зашнуровывая ботинок, тихо прикрыл дверь — не дай бог, заметят. Всем было не до него, но это сейчас. Сейчас она выйдет туда, все скажет. Возможна погоня. Те, что пришли с ней, догонят и изобьют. Он плутал какими-то дворами. Но холод немного остудил голову, и он глубоко, судорожно вздохнул. Потом его вырвало. Хорошо, не на нее, подумал он. Кончил бы уж и всем желудком заодно.</p><p class="p1">Но стало легче, и он заметил, что вокруг была божественная зеленая ночь. Ни одного окна не горело в больших новых домах вокруг — нет дураков праздновать за день до Нового года. Какой-то доброжелательный пьяница, начавший отдыхать за сутки до праздника, посмотрел на Мишу сострадательно. Чувствуя, как проникает в кровь свежая колкая влага, как из головы уходит мечущаяся боль, Миша шел по Садовому кольцу. Теперь они, конечно, никогда больше не увидятся. Интересно, заявит она все же или нет. Положим, он всегда сможет доказать, что все было по обоюдному согласию и даже по ее инициативе. Гнусность. Он попытался не думать вовсе, но страх уже гнездился. Он взял пригоршню снега и потер лоб. Как это все плохо, в сущности, в какое болото соскользнула его жизнь. Но хорошо, что убежал. Может быть, он уедет куда-нибудь. А может быть, и обойдется теперь. Все равно есть какая-то правильность в том, что он это сделал. В конце концов, он это сделал. И, проходя по Краснохолмскому мосту, он посмотрел в зеленоватое гнилостное небо, а потом победоносно плюнул в реку.</p><p class="p1">А боялся он зря. Ей очень даже понравилось. Отымел, как имеющий право, и даже ей показалось, что некий опыт. Она, конечно, тоже губа ив дура (и полизала опухшую губу), она все правильно ему сказала, она и виду не подала, что было почти хорошо. Теперь-то он был ее. Теперь-то никуда не деться ему. А это откуда, спросила Бровкина, кивая на разбитую губу. А, это, засмеялась Валя, это он кусался.</p><p class="subtitle">— 14 —</p><p class="p1">Новый год Миша встречал дома, как и предполагалось, но и тут не обошлось без приключений, хотя и совсем иного свойства. Сосед Баландин долго маялся животом и наконец под самый бой курантов был увезен на «скорой». Отец сразу ему сказал, что подозревает заворот кишок и что добром не кончится, но Баландин никак не желал ехать под праздник, все уверял, что так уже было и переможется, а вот если бы порошок… Отец сказал, что порошка от таких случаев не предусмотрено, что можно сделать только хуже, что без рентгена ничего сказать нельзя, но симптомы плохие. Что ты хочешь, объяснил он Мише, начал праздновать очень рано и, видимо, пережрал. В этих случаях всегда начинается со схваткообразной боли, потом проходит — и Баландину полегчало, — а потом боль становится постоянной, после чего, простите, калообразная рвота и некроз, тут уже ничего не поправишь. Судя по тому, что это абдоминальная область… я мог бы тебе подробно нарисовать… Благодарю, сказал Миша, благодарю, достаточно. Помни, что аппетит мне еще понадобится.</p><p class="p1">Баландин был изумительный в своем роде человек. Пребывал на пенсии, до того трудился кладовщиком, но сравнительно рано получил инвалидность по причине больных вен. В качестве кладовщика, хотя бы и бывшего, он отличался особенной бережливостью, у него бесполезно было просить даже спички. Большую часть времени он проводил не в комнате, а на кухне, глядя в окно, — и у этого окна, всегда почему-то зимнего, серого, Миша его и запомнил. Он глядел на тополя, на клен, на медленный крупный снег и встречал Мишу вопросом — ему, вероятно, казалось, что, если Миша студент, он должен всегда интересоваться политикой: «Слыхали, целое гнездо гадючье раскрылося? А што, и правильно. Теперь к ногтю». В их квартире никого, слава богу, не брали, а в доме случалось, и Баландин говорил: инженера Грунского увели. А я считаю, что и правильно. Он што же думает, он будет вредить, а люди — глядеть? И всегда это он скрытничал. Пробегал, будто гонится кто. Какую бы гадость ни говорил Баландин о людях, всегда подчеркивал, что эта гадость заслужена, что поделом.</p><p class="p1">Жена его была сильно моложе, белобрысая, тихая, и двое детей: сын-подросток, поступивший в ремесленное, и дочка, удивительно похоже передразнивавшая всех, говорившая голосом матери, со всеми ее интонациями. Отца она, кажется, не любила, или Миша это додумал, чтобы лучше к ней относиться. Она была мягкая, приятная, как из русской сказки, и всего пугалась. Сейчас ей было лет восемь. Баландин на жену покрикивал, сына лупил, все это знали. Перед Мишиным отцом благоговел, считая доктора кем-то вроде шамана. Собственный организм был для Баландина тайной: он никак не мог установить связь между тем, что пережрал, и тем, что теперь у него начинает покалывать или тошнить. На этот раз, впрочем, ему всерьез поплохело, и отец, не слушая возражений его кроткой жены, позвонил прямо в больницу. Дрянь дрянью, но не помирать же человеку. В результате без четверти полночь врач и фельдшер, страшно ругаясь, снесли Баландина в машину. Он порывался протестовать, но вскоре с облегчением отключился: судьба его попала в чужие руки.</p><p class="p1">— И правильно, — сказал Миша с баландинской интонацией, усаживаясь за стол. — Он думал, он будет жрать, а кишечник — варить. Нет, товарищ, так не будет. Кишечник будет перекручиваться, заворачиваться. Он думал, справедливости неть, а она исть.</p><p class="p1">Отец дал ему благожелательный подзатыльник, по радио послышались гудки и отдаленный колесный шум, и с шестым ударом курантов наступил сорок первый год. Миша задумался: если как встретишь, так и проведешь, то что ему сулит именно этот год? Какой урок заключен в том, что увезли Баландина? Он подумал: главный смысл происходящего — безусловно, заслуженность. Пусть все в новом году получат то, что заслужили. Давно пора. Мы наработали на полноценный конец света, и за то, что я вчера сделал с Крапивиной, по большому счету, следовало бы меня примерно наказать чем-нибудь посерьезней изгнания. Но ведь это на сторонний взгляд, а ежели жить внутри той жизни, которой живем мы, все логично и даже прекрасно. Кто мог бы вернуть нам другую логику? Потрясение каких масштабов должно случиться для этого? Что-то, чего я не могу себе представить, как жители Содома не могли и допустить, что их невыносимое существование когда-нибудь кончится. Но есть же простые вещи, к которым никогда не поздно вернуться. Словно напоминая об этих простых вещах, мать сказала: Миша, позови к нам этих Баландиных, бог уж с ними. Нельзя же, чтобы они встречали Новый год вот так. Миша поморщился — ты хочешь отравить праздник себе и всем? — но мать была права, он чувствовал это и пошел. Жена Баландина, Саша, плакала в кресле, ФЗУшник отсутствовал, веселясь в своей компании, а дочь Нюта тихо читала книжку-раскладушку, которую давно знала наизусть. Пойдемте к нам, сказал Миша весело, что ж так сидеть? Нет, отвечала Саша, я не пойду, как это я пойду, когда он там больной лежит и, может, его уже режут. Это нельзя. А Нюта пусть пойдет, пойди, Нюта. Нюта радостно вскочила и пошла с Мишей. За столом, по-баландински жадно уплетая торт «Дунай», добытый отцом, она с материнской интонацией — скорбной, но ускоренной сообразно детскому темпераменту, — тараторила:</p><p class="p1">— И ведь какое у нас несчастье, Господи помилуй, только подумайте! (Она говорила «помилый», словно это был эпитет к имени Божьему.) — Какие ужасти. Наш папа покушал, и его ужасно рвало, а мог, я думаю, вообще.</p><p class="p1">— Ужасно, ужасно, — сказала Мишина мать.</p><p class="p1">— Кушать много не надо, и не будет ужасно, — сказал отец, отодвигая от Нюты тарелку с тортом.</p><p class="p1">…Мысль о доносе точила Мишу. Теперь, когда он фактически исполнил первый план мести, Валя, конечно, не упустит случая. А если она уже сняла, как называлось это в судебной медицине, побои, — то есть зафиксировала распухшую губу, — то придут за ним непременно.</p><p class="p1">И еще. Его тянуло к ней, как на место преступления. Поначалу он эти мысли гнал. И, конечно, его тошнило от нее, от самого воспоминания, от этих жидких грудей… Где она работает? Ах да, на «Соколе», в депо новой ветки. И после очередного дежурства, в свободный день, проторчав дома до пяти, он отправился туда — не повезет, так не повезет. Выйдет, поговорим — тогда ладно; не выйдет или вовсе соврала, что ушла из института, — отлично, видеться не станем вообще. И он поехал, совершенно не отдавая себе отчета, что едет. Это был лучший способ — не думать, а делать.</p><p class="p1">Он почему-то очень ясно запомнил обстоятельства этой поездки: двадцать третий трамвай, медленный, шаткий, желтые здания Ленинградского проспекта, пухлый снег, медное солнце, черных галок, которых было очень много, и это, наверное, ужасная примета; в метро ему никак не могли объяснить, как пройти в депо, и он полчаса блуждал среди бараков, длинных сараев, инструментальных мастерских, где вслед ему смотрели приплюснутые люди, совсем не похожие на праздничных строителей метрополитена, какие глядели с плакатов. Наконец, узким проулком, по натоптанной скользкой тропе, он вышел к приличному двухэтажному зданию, административному, значит, корпусу, где она теперь трудилась. Ну, понятно же, что не проходчица. Вероятно, у нее была там должность, что-то мелкое, секретарское, да и кто бы взял ее на другую работу? Он все-таки не верил до конца, что она покинула ИФЛИ. Это слишком было непохоже на нее и на других людей этой складки, пробивающих себе дорогу лбом, пузом, коленом, чем придется. Он думал зайти, но… что сказать? И кто пустит? Ведь метро, еще бы, место стратегическое. И опять галки чертили над ним, и от них наступала ранняя темнота. День хоть и прибавлялся на воробьиный шаг, а все же к шести небо было уже густо-синего, почти черного цвета, и без толку, конечно, он сюда заявился.</p><p class="p1">Он топтался напротив двухэтажного здания минут десять, когда вдруг выпорхнула — именно выпорхнула — Крапивина, а за ней сановито, молодцевато вышел плотный мужчина в овчинном полушубке удивительно добротного вида. Мужчина и сам был добротен, черноус и похож на артиста, чьей фамилии Миша не помнил. Этот артист однажды сыграл героя, а в другой раз — вредителя, и оба раза очень убедительно. Всякий герой притворялся вредителем, так что, когда его разоблачали, никто особенно не удивлялся. Герой-вредитель шел чуть позади Крапивиной, как ее хозяин, словно выгуливал на незримом поводке. Он распахнул перед ней дверь черной машины, названия которой Миша не знал, потому что вообще плохо разбирался в технике, то ли дело Борис, который ею бредил и гордился каждым новым советским ЗИСом; но машина была начальственная, серьезная. Валя Крапивина хихикала, Миша слышал этот смех, визгливый, фальшивый, смех шлюхи, отлично знающей, куда ее везут. Мужчина усадил ее на заднее сиденье, сам уселся рядом с шофером и, вероятно, сказал ему: «Гони к „Яру“», — что еще можно сказать в подобных обстоятельствах? Миша его уже ненавидел. На Крапивиной была та же самая псивая шубка, что и в гостях, но это, конечно, ненадолго. Скоро приоденется, расфуфырится.</p><p class="p1">Мише полагалось бы чувствовать стыдное облегчение от того, что никакого доноса она не пишет и счастлива с начальником, секретутка без страха и упрека, — но вместо этого он испытывал страшную досаду, потому что ему, выходит, кинули кость с барского стола. Повез наслаждаться… Он вообразил медленное, сановитое, молодцеватое раздевание, со смакованием, со вкусом; вообразил козлиный дух, начальственный запах, притом что сам-то, конечно, с обочины жизни. Он, Миша, мог быть хоть Аполлоном, никакой привлекательности это теперь не составляло. Хозяева вот — совсем иное дело. И он, опять теряясь, пошел назад, к метро, оттуда зачем-то отправился на «Динамо», в больницу, но там никому не был нужен. Только в аллее выпивал с приятелем, опасливо озираясь, пациент из второй хирургии, которого Миша не знал по имени; он и на Мишу стрельнул недоверчиво — нарушался режим, — но Мише так невыносимо вдруг захотелось выпить, что он нагло подошел и попросил хлебнуть. Обрадовавшись, что не накрыли, пациент дал ему приложиться. Сейчас еще заражусь черт знает чем, подумал Миша и хлебнул, закашлявшись.</p><p class="p1">…Он шел по Ленинградскому и думал: да, это теперь моя среда, мой предел. Пивной павильон на Бутырском валу светился теплом, и это было приманчивое, уютное тепло полного падения. Удивительно, что много было женщин, баб, и что были среди них молодые, но такие синие, мятые, истасканные, что стыдно было смотреть, хотелось тут же отвести глаза. Он никогда не зашел бы в такое место в институтские времена, но теперь-то конечно. Он взял пива, ему дали место, инстинктивно отстранившись: даже тут он был чужой, ненужный, он все теперь оборачивал против себя, хотя если б эта публика с ним заговорила — разве было бы лучше? Пиво было отвратительное, с привкусом рыбьего жира; отвратителен был цвет серых каменных столов и бурые огрызки от воблы. Вот такие люди, наверное, «сидят»; Миша ужасно боялся сесть. Ему казалось, что армия была бы лучше. В этот момент ему захотелось пойти в армию. Он все же ограниченно годен, хотя и в военное время; может быть, к лету обстановка еще более напряжется, и его призовут. Он допил пиво, и мужичонка в треухе попросил у него на кружечку; Миша дал — «хоть одному творенью»… Никакой радости от опьянения не было, скорее гордое сознание отверженности: нет, не они меня отвергли, я их отверг. А все эти мальчики и девочки пусть плавают в своем аквариуме, где на стенках нарисованы античность и барокко. Когда-нибудь Валя Крапивина, павшая окончательно, будет тут, среди синих баб, глядящих на мужчин с жалкой надеждой и тайной ненавистью. А одним из этих мужчин буду я, понял он внезапно; мы встретимся на дне, на дне встречаются все… Ночью у него страшно болела голова, болела так, что в ней не осталось ни одной мысли.</p><p class="p1">А Валя Крапивина, напротив, до известного момента проводила ночь очень весело. Георгий Степаныч был мужчина конкретный, без разговоров и всяких развлечений вроде ресторанов. Он один раз сводил ее в кино, и после этого кино, в котором он вел себя совершенно прилично, она даже не сомневалась ни минутки, что теперь уже кина больше не будет. Ей надо было теперь отрабатывать. И она с большим облегчением, с радостью, без сомнений пошла в руки своей судьбе, потому что теперь ей не надо было изображать вдову. Здесь она была не вдовой, а секретаршей, и круг ее обязанностей был понятен.</p><p class="p1">Георгий Степаныч, по фамилии Ганцев, привез ее в квартиру, имевшую все следы холостяцких свиданий. Нельзя было определить эти следы, что-то в воздухе, но понятно было, что тут не жили, а встречались. Тут не наводили уюта, потому что встречаться в принципе дело неуютное, и во всем, особенно в голой лампочке в кухне, была тревога: встретились, и он поехал в ночном поезде на восток, а она — в другую сторону на Гражданскую войну. И там, в поезде или на Гражданской войне, им явно было обоим уютней, чем в этой квартире.</p><p class="p1">Но несмотря на тревогу, понятно было, что тут происходило дело сладкое. На стене была прикноплена фотография пухлого ребенка, явно от прежних хозяев, но ее всё забывали снять, ненужную, потому что приходили не обустраиваться, а встречаться. Сразу бросались раздеваться, потом кушать, потом назад в постельку. А пухлый ребенок все так и висел. Он как бы воплощал нежелательное последствие. Валя не бывала прежде в таких квартирах, но все понимала, потому что и как же было не понять. Георгий Степаныч прихватил по дороге салаки копченой, булку, сала с жилкой, всякого мармеладу, вообще еды, которую не надо разогревать. Еще две бутылки взял он минеральной воды, азербайджанской, очень неприятного запаха. Валя даже спросила — фу-у, что за вода, — и он пояснил, что прекрасно для здоровья, в особенности для желудка. Проблем с желудком он, судя по виду, не имел, но водой запасся.</p><p class="p1">— Ты сама понимаешь, Валентина, — сказал он ей серьезно, без церемоний, и ей нравилось, что он не притворяется, — сама понимаешь, что вот так вот.</p><p class="p1">Квартира с минимумом обстановки тоже была без церемоний. Валя смотрела на желтый стол без клеенки, весь в порезах, на белый кафель. Сюда возили не тех девушек, перед которыми притворяются. Которые посерьезней, покраше, тех возили, наверное, в ресторан, а наслаждаться — куда-нибудь за город, в санаторий или мало ли. Конечно, Георгий Степаныч был не совсем шишка, но машина с водителем ему полагалась. И Валя была его уровень, уровень повседневных удовольствий.</p><p class="p1">— Ты сама понимаешь, — продолжал он, — семья у меня и все такое. Но ты меня держись, не пожалеешь. Будет у тебя и рост, и в отпуск поедешь в Минеральные Воды, и вообще я если кому помогаю, то помогаю.</p><p class="p1">Валя представила, как он сейчас ей будет помогать, и чуть не прыснула.</p><p class="p1">— Да ты ешь, ешь, — подбодрил он, — что ты глаза-то в стол упираешь? Нам с тобой, Валентина, стесняться нечего. У меня глаз на это самое. Я сразу вижу, какая девушка по мне, какая не по мне. Тебе смущаться к чему, ты человек рабочий. Мы вместе работаем, вместе будем отдыхать. А что жена, то надо тебе знать, я не люблю жену, она боевой товарищ. Но мне больно было бы ей сделать нехорошо.</p><p class="p1">— Ну что, — спросила Валя с неожиданной решимостью, — я в постельку?</p><p class="p1">— Да ты ешь, — повторил Ганцев, — ешь, не обляпайся!</p><p class="p1">И засмеялся непонятно чему. Видимо, проявлять инициативу не надо было. Надо было подождать, пока он сам станет раздеваться. И он стал раздеваться. Отстегнул подтяжки, снял потом кальсоны, вообще раздевался с большим достоинством, как человек, которому нечего стесняться. С большим достоинством, повторила про себя Валя и опять едва не прыснула. Она стояла посреди комнаты не шевелясь и почему-то не могла раздеться.</p><p class="p1">— Ну что ты стесняешься, — сказал Ганцев уже из-под серого одеяла. — Ведь я знаю, у меня глаз на это самое. Я знаю, ты любишь это дело.</p><p class="p1">И не сказать, чтобы Ганцев был ужасен, противен и тому подобное. Ганцев был человек нормальный, много лучше прочих, и, если вы хотите знать, если только вы действительно хотите знать, — Валя несколько раз повторила это про себя, — первый вообще был у нее в пятнадцать лет, при обстоятельствах, которые мы вспоминать не будем. Да у тетки в деревне, что такое. И она еще задержалась по меркам этой деревни, там баловаться начинали рано. Конечно, из всех, что у нее были, а было их к нынешнему дню уже почти десяток, один Гвирцман был на что-то похож, он ей с самого начала нравился, у него хоть тело было похоже на тело, а не на доску занозистую и не на куль. И она умела, и даже, пожалуй, Георгий Степаныч угадал, что ей это скорее нравилось; во всяком случае, нравилось больше, чем все остальное. Но это же было все-таки особенное, непростое дело, и просто так заниматься этим в чужой комнате, куда Георгий Степаныч и его товарищи явно часто ездили, причем даже, очень вероятно, не меняли белья, — ей не слишком хотелось. Хотя Валя и понимала, что ей положено.</p><p class="p1">Он хохотнул, и она поняла, что надо раздеваться. Она потянулась было к выключателю, но Георгий Степаныч вдруг резко сказал: это не надо — и ей, значит, предстояло все снимать при свете, а он будет любоваться. Он и вправду любовался и при этом себя под одеялом мял, сначала тихо, потом все решительнее. Но трусы и бюстгальтер она все-таки оставила и нырнула под одеяло в таком как бы пляжном виде. Нет, потребовал он, все снимай, ему, видимо, была в этом особая сласть. Сами снимите, попросила она. Он с неохотой, как ей показалось, оторвал руку от себя, стал возиться с застежкой, чертыхнулся, расстегнул, дальше сунул ей сначала руку в трусы, она отдернулась. Да что ты, сказал он уже с раздражением. У него, видимо, не совсем получалось. Хотя он и понимал, что она та самая, ему в масть, и любит это дело, и все как он говорил, — но в ней не было готовности, не было встречного желания. В другое время, может, это бы его раззадорило, но в ней и протеста не было, такого, от которого он заводился. Какая-то она совсем была снежная баба. Фу-ты ну-ты, сказал он, вскочил, скрылся в ванной, пустил там с силой воду — что он там делал, Валя догадаться не могла. Коля говорил, правда, как-то в перерыве между ласками, что хорошо помогает в таких случаях поссать, облегчиться, говорил он, желая быть культурным, но все равно потом со смехом пояснил: поссать.</p><p class="p1">Валя лежала, ждала, потом, все еще в трусах, подошла к окну, за которым была пустая, темная улица — район, кстати, недалеко от института, вот куда все пути сходятся. Голый Ганцев вернулся, отчего-то стыдливо прикрывая ладошкой достоинство. Ну, сама понимаешь, Крапивина, сказал он, дело такое, что раз на раз не приходится. Ты ложись, поговорим, ты мне, может, про детство расскажешь. Таких аттракционов Вале еще не приходилось исполнять, и она не сдержалась — вырвался у нее металлический, скрежещущий смешок, очень, должно быть, неприятный. Можно я все-таки выключу свет, попросила она. Ну выключь, сказал Ганцев равнодушно. Валя легла рядом. Детство было какое же, обычное, сказала она, я очень в детстве не любила гусей, дралась о ними… Да что ты мне гусей своих, сказал он почему-то шепотом, со страшной злостью. Ты давай, трогай. Она стала трогать, но без особенного результата. Да что ты делаешь, сказал он, ты не умеешь, что ли? В руках не держала? Он был из той породы людей, которые нежность почитают за порок, за бабство. «По кунде ладошкой гладишь», говаривали у него на родине в Сибири. Валя подумала с ужасом, что сейчас ей придется, как называлось это во французской книге тринадцатого года, которую принесли однажды в общежитие и передавали тайно, ласкать ртом, к чему она не имела ни склонности, ни желания. Ганцев о желаниях не спрашивал, он стал придвигать, пригибать ее голову к тому подлому изменнику, от которого никогда еще не видел неповиновения, но возраст, товарищ возраст берет свое. И нервы, конечно. В последнее время столько было нервов. Валя сопротивлялась, смущало ее и это насилие, и эти запахи. И подумалось ей, что Миша ее поцеловал только, и то даже не поцеловал — коснулся, и она на него за это донесла, а теперь начальник творил с ней вот такое, и насколько же хуже она сделала себе! Ганцев, однако, не настаивал, человек был все-таки порядочный. Ну, не хочешь, чего ж, сказал он. Утро вечера мудренее. Давай, однако, спать, я на всю ночь ведь отпросился. Мне это легко, теперь ночные совещания, почитай, каждую неделю. И, немного помацав ее для порядку, отвернулся к стене — Валя почувствовала его мохнатую спину и шершавую почему-то задницу — и захрапел очень быстро и очень густо.</p><p class="p1">Сколько уж она лежала без сна, вставала то воду пить, то смотреть на пустую улицу, по которой вдруг пробежал зигзагами человек без шапки, похоже, пьяный, — этого она потом и вспомнить не могла; ей казалось, что очень долго. Невыносимо тикали большие стенные часы, а стрелок она не видела. Ведь он меня выгонит теперь, выгонит, думала она с невыносимой тоской; возьмет такую, с которой все у него получится… Наконец она озябла, легла под одеяло и почти сразу уснула, а ранним утром, когда едва светлело, Ганцев вдруг разбудил ее. То ли что-то ему приснилось, то ли случился утренний стояк, который, оказывается, вовсе не является приметой молодости; он немного и деловито потерся об ее бедро, добиваясь полной твердости, и Валя, толком еще не проснувшись, сообразила, что надо согнуть ноги в коленях и развести. Ну ведь хочешь, сопел Ганцев, чую же, что хочешь; его, видимо, как-то это возбуждало — то ли эта мысль, то ли эти слова. И он некоторое время щупал сначала, потом засадил, завозился, но сделал все довольно быстро, успев, разумеется, уйти в решительный момент. Ну вот, прошептал он, теперь вот, теперь как надо, — и ненадолго заснул опять, но в семь вскочил.</p><p class="p1">— Ты знаешь что, — сказал, отводя глаза, — меня в восемь машина заберет, я договорился, Вася подъедет. А ты можешь сегодня к обеду. Ну, пойдешь, отоспишься, там, а к обеду приходи. Выйдешь, там, после меня, через минут десять, полчасика. Дверь захлопнешь.</p><p class="p1">Он немного смущался, но вид у него был довольный. Все получилось в конце концов, хотя и без той роскоши, которая ему рисовалась. Он думал, что будет именно роскошь, которую можно долго длить.</p><p class="p1">Вале было странно, что он не оставил ее в этой квартире: не все ли равно, где ей спать? Но, вероятно, у них с друзьями так было оговорено, что кто-нибудь заявится днем, тоже с подругой. Она переждала десять минут под невыносимое стенное тиканье и вышла, «был сильный мороз». И подниматься действительно пришлось медленно в гору: трамвайная остановка была выше, и, оскальзываясь, она два раза чуть не упала. Ей казалось, что в общежитии она мгновенно заснет, но за тот час, что добиралась, она спать расхотела окончательно. И тогда ей пришла в голову такая непонятная мысль, что и обдумывать ее толком не стоило — надо было делать, и быстро.</p><p class="p1">Она и сделала.</p><p class="subtitle">— 15 —</p><p class="p1">— Вот это да, — сказал Миша. Он совершенно ее не ждал и не успел спрятать идиотскую радость.</p><p class="p1">— А вот так. Взяла да приехала.</p><p class="p1">Губа у нее зажила совершенно; вообще на женщинах этой породы все заживает как на собаке. Собака, в сущности, и есть.</p><p class="p1">— А почему вдруг?</p><p class="p1">— А заскучала. Но ты, Гвирцман, много об себе не понимай, я по тебе не сильно скучаю. Как приехала, так уехала. Ты давай мне что-нибудь покажи интересное.</p><p class="p1">— А с чего мне тебе показывать интересное?</p><p class="p1">Она вызвала его через приемный покой ко второму корпусу, самому близкому к воротам. Тут у вас работает такой Гвирцман, медбрат? Имеется. Санитар в приемном покое посмотрел на нее с игривостью, на нее все теперь так смотрели. Будто запах, что ли, от нее шел. Ну давайте, позовите мне вашего Гвирцмана, у меня дело до него. Какое это у вас дело до него в рабочее время? Такое, что я беременная от него. Гинекология в шестом корпусе, сказал с гадкой ухмылкой санитар. А что мне гинекология, у меня течение нормальное, я просто хочу его обрадовать. Санитар пожал плечами, нажал какие-то кнопки, и скоро Гвирцман, запыхавшись, прибежал из соседнего корпуса. Хорошо у них тут было поставлено.</p><p class="p1">— Интересного у нас тут много. Хочешь, Крапивина, видеть настоящую любовь? Ведь ты ж, небось, и не знаешь, как она бывает.</p><p class="p1">— Это как же ты мне покажешь, с собой?</p><p class="p1">— С собой я уж показал тебе. Я хочу тебе настоящую.</p><p class="p1">Они говорили немного не своей речью, с поправкой на то, что оба теперь деклассированный элемент и надо снижать, вульгаризировать; так, по крайней мере, делал он.</p><p class="p1">— Только ты халат надень. У нас тут без халата ничего не делается.</p><p class="p1">Он сделал ей полную экскурсию — по всем тем местам, которые поначалу так впечатлили его; идея была — показать весь ад, в который он из-за нее ввергнут. Белый халат был ей чрезвычайно к лицу, к золотистым волосам, к серым глазам. Он повел ее посмотреть мотоциклиста Севостьянова, теперь одноногого, который все писал и писал письма своей девушке, а девушка уже месяц его не навещала; показал Белова с вдавленным черепом, избитого неизвестно кем, но остаток соображения у него остался, и он держал за руку мать, тоже любовь, а мать смотрела в пустоту, и лицо у нее было каменное; Белов же, напротив, улыбался блаженной улыбкой, не зря блаженными называли именно безумцев. И разумеется, Соколовы, куда же без Соколовых: она по-прежнему лежала неподвижно, а он по-прежнему сидел рядом и смотрел. Что он там собирался высмотреть?</p><p class="p1">Миша ждал любой реакции, какой угодно. Но Валя Крапивина смотрела на все не отводя глаз, словно уже насмотрелась. А на самом деле ей все ото даже, пожалуй, нравилось. После той совершенной бесчеловечности, которая была ночью и потом в трамвае, где сидели сплошь ужасные серые люди, ехавшие с каких-то ужасных ночных работ, — это было даже хорошо, совсем почти нормально. И когда Миша вывел ее на воздух и закурил — он курил мало, но теперь обязательно надо было, — она вдруг сказала ему:</p><p class="p1">— Гвирцман, Гвирцман, бедный.</p><p class="p1">— С чего ж это бедный?</p><p class="p1">— Ни с чего, просто.</p><p class="p1">И вдруг обняла его за шею, прижала его голову к своей груди — они были одного роста, она даже путь повыше, — и принялась гладить затылок. Надо признать, Мише очень это понравилось: не из тщеславия, а просто приятно. Он долго мог так стоять. И прекрасен был ее запах после сплошной карболки, здоровый запах среди болезни.</p><p class="p1">— Ты бы мне настоящую любовь показал, а это что ж за любовь. Они больные. У больных жалость, это не любовь, гораздо хуже.</p><p class="p1">— Ну и мы с тобой больные, — прошептал Миша ей в шею. — Прокаженные, можно сказать.</p><p class="p1">— Нет, ты этого не говори. Это все ерунда. Накликаешь еще.</p><p class="p1">И тогда он потащил ее туда, куда ходила санитарка Таня с врачом Левиным, куда, наверное, много кто ходил, — вся местная любовь делалась в таких странных, служебных, часто зловонных местах. И эта зловонность странным образом придавала любви особую остроту, то ли по контрасту, то ли наоборот, потому что сама любовь — дело грубое, всячески земное. Как объяснял друг отца, уролог Земский, — дело такое земское, нечего там рассусоливать: если простата — всё, то никакая любовь ничего не сделает, и напротив, если с простатой хорошо, то будет прекрасно без всякой любви. Врачи бывают часто и религиозны, и материалистичны, как Базаров: одни говорят, что все есть химия и взаимодействие трущихся частей, а другие — что вся эта химия так отвратительна и трущиеся части так ничтожны, что должно быть что-нибудь кроме, а то насмотришься на вскрытия — думаешь: и вот это все?</p><p class="p1">И вот, значит, на этих тюках, в этой кастелянской. Он знал, где ключ. Ему Левин это сказал с усмешечкой еще на третий день работы. И так это все было медленно, так осторожно, так волшебно. Если бы она не была такой дурой, подумали оба одновременно, все это могло бы у них быть уже давно, еще в сентябре могло быть! И конечно, это было совсем не то, что светящееся тело Лии, но ведь и Лия была совсем не то. А эта девочка, сейчас именно девочка, со следами резинок от рейтуз, была его жизнью, просто жизнью, ничем кроме. Не лучше и не хуже, чем его жизнь. Она ему помогала, и в этом не было ничего унизительного. Жизнь и должна быть опытнее, старше. Удивительно долго, медленно, плавно все это происходило. И странно, что в голове у него была в это время мелодия совсем не медленная и не плавная. Бывает, что в голове играет музыка, сам себе ее играешь, и никак она не соотносится с тем, что в это время делаешь: просто так, чтобы не думать, или, наоборот, это и есть самая главная мысль. Эта музыка была — увертюра из «Детей капитана Гранта». Фильм был глупый, как все фильмы о полярных путешествиях или скитаниях в дебрях Амазонки; этого делали сейчас много, и все это было ужасным, фальшивым детством. Но музыка, как часто бывает, получилась подлинная, магическая, зовущая к тому, чего не бывает. Валя лежала с закрытыми глазами. Валя лежала теперь как бревно. Не надо было ей ничего делать, никак помогать, все это было бы ложью. Теперь, когда все уже началось и пройден был стремительный, беглый стыд начала, он делал все сам. Такая слаженность, прилаженность могла быть только при изначальной предназначенности. Запах белья не мешал, запах того самого белья, на котором вчера-сегодня кто-то умирал. Мы тут сейчас тоже умираем, ускоряем смерть неизвестным науке способом. И Валя была такая страшно близкая, такая с самого начала своя! Почему они ждали так долго? По глупости своей она все поломала, но теперь они сращивали, заглаживали. Он ускорялся и замедлялся, когда хотел, он был хозяином положения. Он при этом мог гладить ее где угодно. И вдруг она сжала его там, и он возгордился — у нее это случилось раньше! — но это было не то, что он подумал; нет, она не могла бы кончить, все было слишком хорошо, чтобы кончить, хотелось еще это длить. Она сжала его, думая, что так будет легче ему, а он расценил это самым лестным для себя образом и решил, что теперь можно и ему, и в два-три движения все действительно кончилось, но, разумеется, все было под контролем, под контролем. В краях, где аборты запрещены, все про это хорошо помнят.</p><p class="p1">Некоторое время они еще лежали молча, потом Валя стала выправляться, шевелиться, выскальзывать из-под него.</p><p class="p1">— Но ты это, ты успел? — спросила она.</p><p class="p1">— Не беспокойся, все чисто.</p><p class="p1">— А то я сказала им внизу, что беременная от тебя.</p><p class="p1">Сначала Мишу это резануло, но потом он успокоился: иначе бы не позвали.</p><p class="p1">— Ну прогресс, что ж, — сказал он. — Сперва совратил, теперь беременную бросил.</p><p class="p1">Он потянулся и улыбнулся, и это была его ошибка. Ее разозлило, что он лежит такой довольный. Вчера человек, который ей помогал, который взял ее на работу, — привез ее в квартиру, отдельную, с постелью, купил еды, и ничего не было, то есть почти. А сегодня наглый этот еврей притащил ее на тюк грязного белья и поимел, как шлюху, без ухаживаний, без ничего; и поимел небрежно, не позаботившись, чтобы и она что-то чувствовала. Небрежно хватая. И он чувствовал себя теперь победителем, чувствовал, как бог знает кто. Запахи стали ощущаться острей и были отвратительны. Она к нему поехала за утешением, а он сначала показал всякой мерзости, а потом попользовался… Валя расковыривала, расчесывала эту мысль. Главное было не подать виду, как она зла, и нанести удар внезапно, когда он раскроется.</p><p class="p1">— А я ведь ходил к тебе вчера, — сказал он, расчувствовавшись. Подпер головенку рукой, что твой юный Пушкин на гравюре. — На работу ходил.</p><p class="p1">— И для чего же? — спросила она лениво, почти томно.</p><p class="p1">И Мишу что-то насторожило, но он уже устал настораживаться. Хотелось верить.</p><p class="p1">— Скучал тоже, повидать хотел.</p><p class="p1">— Что ж не повидал?</p><p class="p1">— Почему, повидал. Видел, как ты в машину садилась с начальником.</p><p class="p1">И он улыбнулся, потому что все это ведь не имело теперь никакого значения. Садилась с начальником, а пришла к нему.</p><p class="p1">— Что ж начальник, начальник — хороший человек, — сказала Валя все так же лениво. — Я с ним давно живу.</p><p class="p1">— Давно? — переспросил Миша. — Как давно?</p><p class="p1">Он еще не понял, как реагировать.</p><p class="p1">— Да тебе-то что, — сказала Валя. — Ты, Гвирцман, не ревнуй. Ты мальчик, а он мужик. Я за ним как за стеной, а с тобой я где? В кастелянской, на простынях ссаных.</p><p class="p1">— И чего пришла? — спросил Миша, уже подобравшись. — Свежатинки захотелось?</p><p class="p1">— Да нет, — сказала она все так же томно. — Захотелось поглядеть, в какой ты яме. Ну, поглядела. Все хорошо, ты в яме. Самое тебе место.</p><p class="p1">Этого не могло быть, она говорила нарочно, ведь только что она гладила его шею, прижимала голову к груди.</p><p class="p1">— Ты все врешь, Крапивина, — так и сказал он, и это снова была ошибка, на этот раз посерьезней. — Ты все врешь, потому что ты боишься любить. Ты этого не умеешь.</p><p class="p1">— Ты больно умеешь, — ответила она и начала одеваться. — Вот как эти ты умеешь, как параличные твои. Самое тебе место.</p><p class="p1">Она сама не понимала, зачем говорит ему эти гадкие слова, но почему-то именно они лезли ей на язык. Может, это болезнь какая, мелькнуло у нее в голове. Всякий раз, как с ним, у меня на языке грязь, мерзость. Почему я хочу сейчас это говорить? Ведь пока он это делал, мне было хорошо, — неужели это я так стыжусь?</p><p class="p1">— Но чего ж ты пришла, от красавца своего? — спросил Миша, едва удерживаясь от того, чтобы ударить ее уже по-настоящему, а не так, как тогда, в предновогодье.</p><p class="p1">— А посмотреть, как ты тут. Мне с ним теперь слаще будет, как про ссань твою вспомню.</p><p class="p1">Что я говорю, подумала она, что говорю! Но поделом ему. Попользовался, барчук.</p><p class="p1">— Выход найдешь? — спросил он.</p><p class="p1">И странно: чем дольше, чем наглее смотрела она на него, тем слаще ей было, еще немного — и будет то самое, до чего они так и не дошли на тюках.</p><p class="p1">— Что ж, и не проводишь? Кавалер тоже, говорю — не умеешь ничего.</p><p class="p1">— Иди, Крапивина. Иди быстро. А то, знаешь…</p><p class="p1">— Чего — знаешь?</p><p class="p1">Она как-то особенно гнусно подбоченилась, как базарная баба перед дракой.</p><p class="p1">— То и знаешь. Иди, Крапивина. Иди к начальнику своему, полижи ему.</p><p class="p1">Это было так глупо, так жалко! Потом Миша выдумал столько замечательных, остроумных ругательств, столько настоящих слов! Но тогда, красный и беспомощный, он ничего не смог ей сказать. И тут вспомнил, что уже час отсутствует на месте, и сейчас его начнут костерить, и хорошо, если не выкинут, а куда он тогда денется?</p><p class="p1">— Иди, Крапивина. Делу время, потехе час, мне работать надо.</p><p class="p1">— А иди, работай. Как раз там кто-нибудь обосрался без тебя.</p><p class="p1">Он не узнавал ее. Такими голосами ругались синие бабы в пивном павильоне. Она даже сказала «без тибе».</p><p class="p1">Он почти вытолкал ее из кастелянской и запер дверь.</p><p class="p1">— Беги, беги. Смотри сам не обосрись.</p><p class="p1">— Иди, Крапивина. Не приходи больше.</p><p class="p1">Он подтолкнул ее, и она заорала:</p><p class="p1">— Руки не распускай, людей позову!</p><p class="p1">— Позвала уже, — буркнул Миша и пошел, почти побежал в другую сторону, к черной лестнице. За то, что провел постороннюю, ничего ему не будет, все проводили посторонних, на это смотрели сквозь пальцы. А вот что на месте он отсутствовал уже час, это дурно. Через больничный парк пробегая в свой корпус, он несколько успокоился: холод был целебен. А Валя медленно, заглядывая в окна, пошла к выходу, и отчего-то на душе у нее было прекрасно. Он был ее, в любой момент ее, собственный, никуда теперь не денется, и она могла прийти к нему всегда, и взять, и сделать с ним что угодно.</p><p class="p1">Прочти она про такое в книжке — сама бы не поверила, но в книжках про такое не писали. «Мадам Бовари», всякая «Принцесса Клевская», глупый курс зарубежной литературы… А они жили в небывалое время, в небывалом месте, и случки у них случались небывалые.</p><p class="p1">И еще она подумала: хорошо б меня Георгий Степаныч сегодня опять туда повез! Чтобы три раза за один день — с утра с одним, теперь с другим, да еще вечером опять с одним, — этого она даже от Фоминой не слышала, мечтать не могла. Но это уж вряд ли. И она поехала в общежитие сладко спать.</p><p class="subtitle">— 16 —</p><p class="p1">Миша дважды пропустил репетиции «Города ветров» — истинной причиной была не работа, а страх перед Лией, которую он и хотел видеть и боялся встретить, словно осквернился. Когда он пришел на очередную среду, пьеса ушла далеко вперед. Лии не было, и он вздохнул было с облегчением. Но тут Горецкий сообщил, что на сегодня намечен визит целой плеяды молодых гениев — обещали прийти люди как раз ифлийские, так что Миша, как истинный поэт, подгадал. «Поражаюсь этому ясновидению влюбленных», — сказал Миша кисло. Он не общался ни с кем из своего круга уже около трех месяцев и хотя скучал временами, но предательства не прощал. Конечно, они должны были прийти в деканат и заявить протест, или хоть явиться к Мише для дружеского разговора, или просто поинтересоваться, где он и жив ли, но интересовались как раз те, кого он близко не знал, а друзья, видать, слишком сочувствовали — так жалели, что ай не могу. Надо, надо было возненавидеть все прежнее, чтобы теперь терпеть настоящее.</p><p class="p1">И вот, значит, они пришли с мороза, раскрасневшиеся. По тому, как с преувеличенным шумом вваливались, отряхивая снег, как гимназистки румяные (он хохотнул, вообразив черноусого Лугина гимназисткой), по тому, как галдели, дохохатывая над чьей-то шуткой, пошученной еще на улице, по тому, как приглаживали волосы перед огромным зеркалом, перед которым проходили танцевальные репетиции, — видно было, что изображалось вторжение молодых вихрастых гениев, детски непосредственных, моцартиански легких. При взгляде на Мишу все делали такие же вогнутые лица, как Валя в предновогоднюю ночь.</p><p class="p1">— Похудел, брат, потоньшал, — искусственно окая, сказал Лугин. Борис тут же принялся хлопать Мишу по плечу. Миша поморщился. Один Павел ничего не изображал, не кокетничал, смотрел серьезно.</p><p class="p1">— Хорошо выглядишь, — сказал он, и хоть этот комплимент был Мише приятен, но никакого тепла к бывшим однокашникам он не почувствовал.</p><p class="p1">— Ты где теперь? — спросила Лена.</p><p class="p1">— В Боткинской больнице медбратом.</p><p class="p1">— У отца, значит, — утвердительно сказала Лена.</p><p class="p1">— Отец в Склифе, вообще-то. Но, как ты понимаешь, для этой должности протекция не нужна.</p><p class="p1">— Очень трудно? — она резко сменила тон.</p><p class="p1">— Ничего, справляемся.</p><p class="p1">— А здесь ты как?</p><p class="p1">— А здесь я в студии.</p><p class="p1">Тут, несколько запоздав, вплыла Лия под руку с новым человеком, которого Миша не знал, — длинным костистым парнем, нескладным, но не замечавшим этой нескладности; как это у него получалось — Миша не понял, но видно было, что этот человек не испытывал ни малейшего смущения и что вся эта компания ему побоку, он пришел с Лией и ради Лии. Это его кольнуло. Лия, впрочем, сразу оставила кавалера и подбежала к Мише:</p><p class="p1">— Где ты пропадал? Я волнуюсь.</p><p class="p1">— Волновалась бы — зашла, — буркнул он.</p><p class="p1">— Я думала, ты не хочешь меня видеть.</p><p class="p1">— Я хочу, пришел вот, — сказал Миша абсолютно честно, сразу попав в тот прямой тон, который был у них принят.</p><p class="p1">— Это отлично, и мы всё с тобой сделали очень правильно. Еще много всего будет. Я тебе очень рада и вообще скучала. Не будь таким, — и она оттопырила нижнюю губу. Впрочем, она и с оттопыренной губой была очень хороша. Дурак я дурак, подумал Миша.</p><p class="p1">— Я порядком помучился в этот месяц, потом расскажу.</p><p class="p1">— Обязательно расскажешь, — и прежде чем он успел что-нибудь спросить или сказать колкость по поводу нового спутника, Лия к этому спутнику вернулась. На него она смотрела заботливо, как на Мишу не смотрела никогда, и это было плохо.</p><p class="p1">Предполагалось показать гостям готовые сцены и привлечь их к сочинению песен для новых. Студийцы сочинили и отрепетировали две, которых он не видел, — одинаково отвратительных. Он с радостью понял, что и раньше, до паузы, во время которой столько всего переменилось, — он бы, скорее всего, отнесся к ним так же. Мише всегда было свойственно недооценивать себя раннего, думать, что он только в последние дни начал что-то понимать, — обычная черта человека, ценящего новый опыт и презирающего собственное прошлое, как записал он год назад в набросках для будущего эпического романа (по его наблюдениям, все, особенно поэты, готовились тогда к эпическому роману, который ужо объяснит все необъяснимое, вберет в себя жизнь русской провинции, Гражданскую войну и всемирное коммунистическое движение; но главным в нем будет, конечно, небывалый герой, порождение первых лет революции, комиссарский сын, антропологическое чудо, которому предстоит победить старый мир в неизбежной, да, когда-нибудь, войне).</p></span>
