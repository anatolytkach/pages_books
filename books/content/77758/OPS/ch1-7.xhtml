<span><p class="p1">И эти сцены действительно были плохи: первая — разговор вечно таинственной комсомолки Шуры с отцом, приехавшим инспектировать строительство. Все рассказывали о себе, обычно песнями, только Шура стыдливо отмалчивалась, и все уж решили было, что она кулацкая дочь, — но тут интрига раскрылась, лопата выстрелила (Шура трудилась лопатой). Ее отец был крупным начальником и не отпускал дочь строить новый город, так что она сбежала, отправив с дороги покаянное письмо. Теперь отец явился вовсе не для инспекции, а в безумной надежде вернуть блудное дитя. Он готовился зарезать для нее даже теля, то есть автомобиль. Он обещал, что у нее будет свой автомобиль! Понятно, Шура росла без матери (мать где-то отвалилась по ходу студийных обсуждений, и участь ее не уточнялась; торчали странные намеки на то, что она предпочла другого, непартийца, потому что партиец вечно пропадал на совещаниях, — и вот, бросив дочь, она закружилась в вихрях враждебных). Суровый, немногословный партийный отец (болтливый, вертлявый Глеб Сухих, впихнутый на эту роль за недостатком мужского контингента) заваливал дочь игрушками и сластями, компенсируя недостаток уделяемого ей времени. Шура, напротив, почему-то стихами умоляла его отказаться уже и от той машины, что была в его распоряжении, и пешком, видимо, посещать стройки подмосковных заводов, на которых он бесперечь пропадал. Миша заметил, что в стихах любая чушь выглядела уже не так чушисто; вероятно, диалог отца с дочерью в прозе звучал бы вовсе позорно. Естественно, папа дочку не поколебал и убыл с обещанием ужо навести тут порядок, а то распоясались и никакой производственной дисциплины; Шура после его отъезда рыдала на плече соседки по бараку, такой Ирмы Шульц, немки (немка была, понятное дело, данью курса на сближуху — ну вот, нашлась идейная инженерша, поехала строить город ветров; от каких радостей она сбежала, уже не уточнялось). На словах «Ведь все ж он папка мне!» Павел с Борисом нехорошо переглянулись, а Лена угодливо прыснула — она всегда узнавала свое мнение из этих переглядок. Вообще, она была правильная комиссарская жена, дело которой — обхватывать комиссарскую голову и провожать на войну, откуда голова могла и не вернуться.</p><p class="p1">Вторая сцена оказалась серьезнее, чувствовалась лапа Орехова. Там Горецкий, явный троцкист, комиссар строительства, который кормил добровольцев все больше лозунгами, а настоящего питания обеспечить не мог, убеждал их, что они соль земли, новая раса, что Европа вот не выдержала испытания новым веком, а они его самое порожденье и есть, — но красивые эти слова среди беспрерывных дождей не убеждали ветровцев. Он заговорил было о правительстве, которое пристально за нами, товарищи, следит, и о врагах, которые, товарищи, не дремлют, — но тут маленький Семка кричал: баста! Хватит демагогии, товарищ, где обед! Забавно было, что маргиналу Горецкому противостоял маргинал Семка, и вот только в этом была какая-никакая, протащенная под полой художественная правда. Еще бы не хватало противопоставлять несуществующему эстету еще менее существующего человека из гущи.</p><p class="p1">Просмотрев, — собственно, прослушав, поскольку сценического решения пока никакого не было, гости опять переглядывались, мялись, изображали недовольство, после чего, чтобы тем сильнее обрадовать, Паша сказал: вы знаете, по-моему, вы только извините, конечно, и не обижайтесь, и не примите нас за снобов и все такое, но, по-моему… по-моему, ребятцы, это очень здорово! И все тут же разулыбались, помягчели, даже Орехов вздохнул с облегчением — не то чтобы он переживал за действо, цену которому знал наверняка, но авторитет-то был ему дорог, а тут пришли как-никак люди из лучшего вуза Москвы. Да, ребятцы, оказал Паша, очень здорово, и поэтому надо переписывать… он сделал паузу… переписывать… и еще раз, наверное, придется переписать, и тогда будет ничего себе. Вообще же это, знаете, о чем всегда мечталось. О том, чтобы текст рождался не у поэта в отдельной голове, а в общей артели, потому что литературное дело у нас последнее оставалось необобществленным. А вот теперь — это же первая вещь, созданная некустарно! Или кустарно от слова «куст», подхватил Глеб, и все мальчики подхватили его восклицание. (Миша не любил этого автора, ненавидел эту цитату.) И знаете, уже серьезно продолжал Паша (этот переход к серьезности был отлично у него поставлен), я ловил себя даже на том иногда, что не мог угадать реплику. Обычно угадываю. У Погодина вот всегда угадываю. А у вас я смотрел — и иногда не знал… Понимаете, какие великие дела можно теперь делать, и не только в театре?</p><p class="p1">Миша слушал и прикидывал: какой, собственно, был им резон хвалить явно бледную вещь, которая при обсуждении на любом литсеминаре была бы растерта, распатронена, выпотрошена? Во-первых, Паша был комиссар настоящий, не Борису чета, и понимал, что надо расширяться. Тут в их разговоре маячила новая площадка, весьма перспективная; тут они могли стать законодателями, поучаствовать в пьесе, о которой наверняка будут говорить, тут они могли читать, и девушки тут были прелестные, не последнее дело, — в общем, начинать с разносов было глупо. Потом, вгрызясь, вползя, можно было начать рушить, выедать их изнутри, — но это еще когда. Во-вторых, чем черт не шутит, вдруг ему действительно нравилось! Кто сказал, что у Паши был вкус? Писать в тридцать девятом году роман в стихах — это как? Но Миша еще помнил, с каким обожанием смотрел год назад на этого комиссара, до того как Колычев его разнес, — и, будучи мальчиком честным, понимал, что Колычев-то, между нами говоря, уж никак не человек будущего.</p><p class="p1">После пили чай, долго по обыкновению кхекали и мялись, прежде чем извлечь сухач, к которому прилагалась теперь принесенная непьющим Борисом поллитра, и после этого затеяли наконец обещанные чтения: сначала читал Сергей — начал он с военного стихотворения о холерном бараке, очень хорошего, которого Миша никогда не слышал; видимо, что-то должно было в нем оттаять, прежде чем появились стихи. Потом Витя — совсем никакие, но чрезвычайно мастеровитые, под Кирсанова, стихи о рубке дров и последующей обработке древесины, в которой автор, чувствовалось, сроду не принимал участия, потому что ассоциации, являвшиеся ему, — золотые кудри стружки, откуда-то взятые, гул земли, на которую падает дерево, и вздох веток, и вот так же и ты падала, я помню (ясно было, что не помнил и не падала), — были ассоциации человека праздного, недостаточно утомленного. Борис читал два стихотворения о футболе, которые он написал, потому что не пошел на футбол. Пока все смотрели, он описывал. Миша подумал, что и вся Борисова жизнь так пройдет: все будут жить, а он — описывать. И мельком заметил, что и сам для себя мечтал именно о такой тактике. Жить не стоит, от жизни остается только то, что напишут — может быть, он, а может быть, и Борис.</p><p class="p1">Последним читал Павел — одно совсем новое, и Миша отметил это с болью (кому-то писалось, а ему — все что-то странное, смутное, насильственно из себя добытое; он привык, что вещь все-таки приходит, а тут ее приходилось, требовалось добыть). Но и у Паши, заметил он уже с радостью, не получалось легко: это было непохоже на прежнее, тоже смутно, две только строчки были понятные и живые, совпадавшие, по крайней мере, с Пашиным опытом: а дальше я пока не прожил и, может быть, не проживу. Но потом он читал знакомое, и Миша снова попал под его обаяние, потому что пусть одна крупица морской соли и синевы, но все-таки в этих стихах была — и, бесконечно разведенная, все-таки их подсаливала, подкрашивала. Снова месяц висит ятаганом, на ветру догорает лист, утром рано из Зурбагана корабли отплывают в Лисс… Кипарисами машет берег. Шкипер, верящий всем богам, совершенно серьезно верит, что на свете есть Зурбаган… Это было, в общем, никак, но в эти слова каким-то чудом, не иначе, прокрался осенний Севастополь: они однажды поехали туда поздно, потому что отца некем было подменить, и на ветру догоравший лист — платан, сухой и жесткий, про который мать вдруг сказала, что это и есть чинара, — был тот самый. И тогдашние синие вечера в уже строгом, осеннем, полупустом городе, в Балаклаве, где не было больше отдыхающих, откуда съехали даже «дикари», приехавшие смотреть Херсонес, — и начинавшийся холод, не грозный, южный, и переход всего во всё, всеобщая переходность — море в берег, лето в осень, Миша в отрочество, — эта сладкая тревога была в стихах, ничего не поделаешь. И это одновременно обрадовало и уязвило: институт сколько угодно мог представляться аквариумом, на стенах которого нарисована ненастоящая жизнь, но в этом аквариуме получались стихи более настоящие, чем жизнь. Да и вся разница была в том, что раньше Миша плавал в аквариуме, на стенах которого были нарисованы Лаокоон, Диккенс и Франс, а теперь — глупые девки и гнойные тряпки. Эта мысль была совершенно невыносима, и, однако, ее следовало запомнить. Формула могла пригодиться.</p><p class="p1">Миша знал, что после завершения официальной части ему придется разговаривать, хотя ни им, ни ему это не было в радость.</p><p class="p1">— Ну ты как? — спросил Борис, который всегда брал на себя самое трудное. Комиссары бывают двух видов: одни первыми поднимаются в бой, другие выслушивают донесения. Хорош или плох был Борис, но он поднимался первым.</p><p class="p1">— Да так как-то все, — ответил Миша, желая показать, что манера его не изменилась. Раньше еврей на вопрос отвечал вопросом, теперь цитатой.</p><p class="p1">— Работаешь?</p><p class="p1">— Проверяешь? — ответил Миша, уже как еврей.</p><p class="p1">— Имей в виду, — сказал Борис, выходя на тему в лоб, — я за исключение не голосовал, а Паша вообще не комсомолец.</p><p class="p1">— Я никого не виню.</p><p class="p1">— Пишешь?</p><p class="p1">У них в разговорах один на один принято было это мужественное немногословие, и Миша тогда любил эту манеру.</p><p class="p1">— Мало. Медбратом работаю.</p><p class="p1">— На войне пригодится.</p><p class="p1">Эти постоянные упоминания о войне начинали уже утомлять.</p><p class="p1">— Слушай, — сказал Миша, — сколько можно? Еще не началась, а уже всё списывает.</p><p class="p1">— Началась.</p><p class="p1">— Где-нибудь она идет всегда, — зло сказал Миша. — А списывает всегда у нас.</p><p class="p1">— Сам посмотришь.</p><p class="p1">Тут подошел Паша.</p><p class="p1">— А ты тоже в этой студии? — спросил он, будто не виделись со вчерашнего дня. Паша был курсом старше, они и в ИФЛИ пересекались редко, и всякое его обращение к младшим они расценивали как праздник — по крайней мере, так было принято. Люди из Поселка — так называлась улица на окраине, где стояла новая институтская общага, — были на особом счету и держались вместе, у них были свои шутки и пароли, малопонятные прочим, в особенности коренным москвичам.</p><p class="p1">— Я не играю, так, захаживаю.</p><p class="p1">— Кем устроился?</p><p class="p1">— Медбратом.</p><p class="p1">— К отцу?</p><p class="p1">Удивительна была эта их манера все оборачивать против того, перед кем они подспудно виноваты: Борис подозревал его в желании устроиться на войне, а Паша — в использовании отцовской крыши.</p><p class="p1">— Туда протекция не нужна, — снова вытянул Миша полюбившееся объяснение.</p><p class="p1">— Ты приходи весной, — сказал Паша, становясь вдруг сочувственным и почти заговорщицким. Это тоже была комиссарская манера — внезапно, сразу после несостоявшегося расстрела, предложить чаю и посвятить в тайные планы.</p><p class="p1">— Зачем?</p><p class="p1">— Мне кажется, восстановят. Они и сейчас уже остыли. В конце концов, что ты такого сделал?</p><p class="p1">— А Валя тоже ушла, — сказал вдруг Борис. — Еще в ноябре.</p><p class="p1">— Я в курсе.</p><p class="p1">— Откуда?</p><p class="p1">— Виделись тут, — сказал Миша, предвкушая сенсацию, и сенсация произошла.</p><p class="p1">— Не убил? — поинтересовался Сергей, который подошел и слушал молча.</p><p class="p1">— Если б убил, меня бы уж точно исключили ив комсомола. И ты бы об этом знал.</p><p class="p1">Сергей хохотнул — вообще был смешлив.</p><p class="p1">— А ты чего не приходишь-то? — спросил Павел.</p><p class="p1">— В жизнь окунаюсь, — пояснил Миша. — В жизень. Нельзя же одновременно окунаться и собираться на берегу.</p><p class="p1">— Понимам и одобрям, — сказал Паша. — Я бы тоже не рвался в прежнюю обстановку. А там люди нормальные, в больнице?</p><p class="p1">— Больные в основном.</p><p class="p1">— Ну и правильно, — кивнул Борис. — Со здоровыми неинтересно. Я сам когда-нибудь, товарищи, лягу в больницу на старости лет. Жизнь изучать.</p><p class="p1">— Да, — согласился Миша, — оттуда открывается интересный вид.</p><p class="p1">— Ну а Валя-то? Крапивина-то? — не отставал Сергей, которому бы все про баб.</p><p class="p1">— Работает в Метрострое, тоже окунается. Мне кажется, когда мы оба окунемся, то значительно сблизимся. Наша проблема, Сережа, была в том, что мы оба были неокунутые.</p><p class="p1">— Молодец, — сказал Паша. — Нет, ребятцы, мне нравится, как он держится. Ты приходи все-таки. И в институт приходи, и к нам. Мы в пятницу у Нинки будем, да, Лен?</p><p class="p1">— Я еще немного окунусь и приду, — сказал Миша. — Уже с Крапивиной.</p><p class="p1">Все посмеялись, и он отошел к соседнему кружку, где блистала Лия. Но Миша не знал, о чем с ней говорить. Впрочем, она-то всегда знала. Она сразу взяла его за руку и отвела в сторону. Удивительно: у любой другой девчонки это выглядело бы фальшиво, но Лия всегда действовала как власть имеющая.</p><p class="p1">— Ты из-за меня не приходишь, да? — спросила она прямо.</p><p class="p1">— Нет, были обстоятельства.</p><p class="p1">— А я, между прочим, знала.</p><p class="p1">— Что знала?</p><p class="p1">— Что у тебя будут обстоятельства. Я тоже отсюда уйду скоро.</p><p class="p1">— Когда?</p><p class="p1">— Не знаю пока. Но что-то они уже точно не туда свернули.</p><p class="p1">После Вали Миша себя чувствовал настолько оскверненным, что и не надеялся на продолжение тех встреч и провожаний. Но Лия ничего не знала, хотя что-то чувствовала.</p><p class="p1">— Я скучаю вообще-то.</p><p class="p1">— Я тоже.</p><p class="p1">— Миш, скажи честно. Ты что, не можешь со мной теперь разговаривать?</p><p class="p1">— Почему, все могу.</p><p class="p1">— Ты пойми. Ведь я не отказывала тебе. Я просто сказала, что лучше потом. Мне будет больно, если ты от меня совсем оторвешься.</p><p class="p1">— Лия, — сказал он неожиданно для себя. — Так неправильно. Вот им тоже хочется, чтобы я был с ними, а при этом чтобы меня исключить. И тебе хочется, чтобы спать с кем-то, а разговаривать со мной. Всем хочется, чтобы я как бы не был и при этом разговаривал, ведь я так весело это делаю. Да?</p><p class="p1">— Господи, Мишка, какое счастье, — сказала она.</p><p class="p1">— Что именно?</p><p class="p1">— Так разговаривать. Я уже очень, очень давно, кажется, ни с кем не говорила, а всего-то три недели. Мишка. Я не хочу ни с кем спать. Со мной никто сейчас не спит. Я не хочу тебя ни с кем совмещать, ты ничего не понял, дурак.</p><p class="p1">— Ну объясни, умная.</p><p class="p1">— Мишка. Я объясню, но давай пойдем, да? Я хочу идти и разговаривать. Хотя нет. Холодно. У тебя пальто на рыбьем меху.</p><p class="p1">— Да я выдержу.</p><p class="p1">— Но я не выдержу. Нет. Я все скажу тебе здесь. Мишка. — Она помолчала, но не отводила глаз. — Я хочу, чтобы ты понимал. В тебе есть еще какое-то зло, кусок зла, он просто из тебя торчит. Может быть, это остаток детства, я не знаю. Но тебе надо изжить этот кусок, я чувствую. Просто пережить его и стать тем, кто ты есть. И тогда, Мишка, если ты не раздумаешь, я дам тебе все, что вообще могу дать. И нам ничто не будет мешать тогда. И я знаю, что сейчас ты из себя выталкиваешь этот ужасный чужой кусок, но сделать это можешь только ты сам, понятно? Пожалуйста, не злись. Ради бога. Ты должен понимать. А я буду ждать сколько нужно. Не сколько угодно, почувствуй, а сколько нужно.</p><p class="p1">Миша криво усмехнулся, ему нечего было возразить, как и три недели назад. Но ему было досадно, и особенно досадно оттого, что она видит в нем плохое и позволяет себе решать, когда им сблизиться. Он не должен, а она позволяет. И еще его точили эти Пашины стихи про Зурбаган, Миша никогда прежде не испытывал от них такой тоски. Счастливого человека они так не задевали. Теперь он был даже более несчастлив, чем когда его выгнали, — потому что его оскорбила грошовая девка и временно — разумеется, временно, и даже со всем уважением, — отвергла настоящая девушка. И он услышал ангельский, хоть и сквозь эфирные помехи, голос оттуда, куда ему больше хода не было. Что-то подобное как раз и чувствовал демон — изгнанник рая, — и нет тут ничего провинциально-демонического, а просто без всякой вины, по чистой прихоти выгнали оттуда, где было хорошо. Нельзя было тут оставаться, но и домой идти нельзя, и он отправился к Колычеву.</p><p class="p1">Это было плохо. Миша потом только понял, что шел к нему в надежде поделиться собственным несчастьем, перевалить его на Колычева и по возможности оттоптаться на том, кому было еще хуже. Но изначально надеялся — так он потом себя уговаривал, тогда все себя уговаривали, — что Колычев развеет магию зурбаганских стихов, капнет на них, по обыкновению, своей ядовитой желчью — и очарование рассеется. И Колычев не обманул ожиданий. Он был ужасно рад Мише, потому что сидел один и плохо себя чувствовал — даже у него, оказывается, бывали плохие минуты. По случаю холода он плохо дышал, а Миша все-таки живая душа, хоть и птенец.</p><p class="p1">— Давно не был, — приветствовал он Мишу. — Есть даже чай.</p><p class="p1">— Я не умею и не должен писать, — сказал Миша решительно. — У меня все в лучшем случае от головы, а в худшем — сам понимаешь. У тебя есть выпить?</p><p class="p1">— Может быть, но немного. Можно достать. Да что с тобой?</p><p class="p1">— Я слушал сегодня Пашу. Опять. Паша может быть кто угодно, но все-таки он поэт.</p><p class="p1">— Поэт, поэт, конечно. Не беспокойся. Никто тебя не тронет.</p><p class="p1">Колычев сходил к соседу и принес водки в круглом стакане.</p><p class="p1">— Отхлебни, но не до дна.</p><p class="p1">Водка была отвратительна.</p><p class="p1">— Только продукт переводишь, — сказал Колычев укоризненно, видя, как Миша сморщился.</p><p class="p1">— Пить надо, пока противно.</p><p class="p1">— Вкус водки чувствуют не все. Ее вкус — божественный, ни на что не похожий, но большинству она невыносима, как истинное искусство. Господь поставил барьер. Ну, чему ты там обзавидовался?</p><p class="p1">Миша прочел про Зурбаган.</p><p class="p1">— Вот это действительно невыносимо, — захихикал Колычев. — Еще раз, пожалуйста: и тихонько выпьем за Лисс? Человека, употребляющего в поэзии слово «тихонько», следует до конца дней разжаловать в детские поэты и обязать писать про зайку. Не говори мне, санитар, что тебе по-настоящему это нравится. Если ты будешь завидовать такой лирике, ты никогда не дорастешь до фельдшера.</p><p class="p1">— А что тебе не нравится, собственно?</p><p class="p1">— Мне? Мне не нравится, что это пошлость первостатейная, а ты, человек с десятиклассным образованием, от этого пищишь.</p><p class="p1">— Пошлость, да?</p><p class="p1">— Эталонная. Химически чистая. Медный купорос.</p><p class="p1">— Ну а что не пошлость?</p><p class="p1">— Не пошлость? — переспросил Колычев. — То есть тебя интересуют хорошие стихи?</p><p class="p1">— Да, представь себе, интересуют.</p><p class="p1">— Ну вот, допустим…</p><p class="p1">Колычев присел к столу и закинул голову.</p><p class="p1">— Вот придет война большая, — сказал он мечтательно и после паузы добавил: — Заберемся мы в подвал…</p><p class="p1">Миша впервые слышал, как он читает, — очень просто, по-детски.</p><div class="poem">
<div class="stanza">
<p class="v">Тишину с душой мешая,</p>
<p class="v">Ляжем на пол, наповал.</p>
<p class="v">Мне, безрукому, остаться</p>
<p class="v">С пацанами суждено,</p>
<p class="v">И под бомбами шататься</p>
<p class="v">Мне на хронику в кино.</p>
<p class="v">Как чаинки, вьются годы,</p>
<p class="v">Смерть поднимется со дна,</p>
<p class="v">Ты, как я, — дитя природы</p>
<p class="v">И прекрасен, как она.</p>
<p class="v">Рослый тополь в чистом поле,</p>
<p class="v">Что ты знаешь о войне?</p>
<p class="v">Нашей общей кровью полит,</p>
<p class="v">Я порубан на земле.</p>
<p class="v">И меня во чистом поле</p>
<p class="v">Поцелует пуля в лоб,</p>
<p class="v">Ветер грех ее замолит,</p>
<p class="v">Отпоет воздушный поп.</p>
<p class="v">Сева, Сева, милый Сева,</p>
<p class="v">Сиволапая свинья…</p>
<p class="v">Трупы справа, трупы слева</p>
<p class="v">Сверху ворон, сбоку — я<a href="ch2.xhtml#id1" class="a">[1]</a>.</p>
</div>
</div><p class="p1">— Это твое?</p><p class="p1">— Не мое, но какая разница. Хорошая вещь не имеет авторства.</p><p class="p1">— Знаешь, — неожиданно для себя сказал Миша, — а по-моему, вот это и есть пошлость.</p><p class="p1">Колычев уставился на него в изумлении.</p><p class="p1">— Вот это?</p><p class="p1">— Именно. Настоящая пошлость, только другого рода. Знаешь притчу про нищего? Идет франт, ну весь расфранченный. Нищий смотрит и говорит: вот чванство! Франт смотрит на него и говорит: нет, а вот ты — чванство. И это худшее чванство, нищее. Потому что от Паши, от его стихов хоть морем пахнет. А здесь вообще ничего, и у тебя ничего. Потому что самая большая пошлость — это говорить про все: пошлость. Живое все пошлость, ты не находишь?</p><p class="p1">Миша не на шутку раздухарился.</p><p class="p1">— Все живое, все уязвимое. А неуязвимо только мертвое, и вот то, что ты читаешь, — это мертвое. И сам ты мертвый. Подумайте, какая лирика: тишину с душой мешая! Мякина, а не стихи. Выдача гуся за порося. И говорить, что это и есть настоящее… Это, знаешь, как войти в загаженную комнату, долго примериваться и строго по центру бросить еще более грязный носовой платок. И сказать: вот теперь прекрасно!</p><p class="p1">Колычев помолчал.</p><p class="p1">— Ну что же, — сказал он наконец. — Я всегда знал, что на дне ты случайный человек. Наверное, тебе не надо больше приходить сюда.</p><p class="p1">— Да уж наверное, не надо, — сказал Миша. — Среди трупов я действительно еще какой-то пока слишком живой.</p><p class="p1">И он ушел, хоть и чувствовал себя виноватым. Дома его довольно быстро развезло, и проснулся он в шесть утра с чувством горького стыда и ужасной неправильности. Неправильно все было сделано, и обидел он несчастного человека — обидел единственно из желания доказать себе, что может еще кого-то обидеть; что есть люди беззащитней, уязвимей, чем он. Это было дурно, он сам себе это мог сказать, не все же говорить гадости прочим. И потом, так он останется совсем один. Ему вспомнился прошлогодний анекдот: инженер возвращается из командировки, с женой — его ближайший друг. Он бросается на него с ножом, протыкает… Жена, испуганно: Коля, так ты вовсе без друзей останешься!</p><p class="p1">И он твердо решил сегодня же после работы пойти к Колычеву и, если тот впустит, — а человек он гордый, как все, у кого одна только гордость и осталась, — загладить как-то, Боже мой, смягчить, не извиняться, конечно, но объясниться… Но в почтовом ящике ждало его нечто, совершенно вытеснившее Колычева из его ума.</p><p class="p1">Это была повестка из военного комиссариата с требованием явиться послезавтра по вопросу призыва.</p><p class="subtitle">— 17 —</p><p class="p1">Армии Миша боялся.</p><p class="p1">Боялся не тягот, не голода и даже не портянок. Все в конце концов обучаются наматывать портянки. Боялся он армейского духа, той смеси бодрости, вранья и ласкового садизма, которая мерещилась ему. Иногда он слушал по радио песни военных ансамблей, причем солировали всегда уютный басок и трепетный тенор, два как бы лика этой мирной, добродушной армии, любезной к чужим (ибо все они были классово близкие, заблуждающиеся пролетарии), неумолимой к своим (ибо все они знай отлынивали от службы, хотели поваляться, понежиться). Этот диалог происходил на глазах сурового хора, певшего, как пел бы под бурей еловый лес. Миша был недостаточно дерево, чтобы вливаться в этот хор. Он был бы готов противостоять сколь угодно опасным чужим, но снисходительность и злорадство своих были ему заранее омерзительны.</p><p class="p1">Он надеялся, что до очередного призыва успеет восстановиться: хорош или плох был институт, но пренебрегать его немногочисленными достоинствами не следовало. Но и в больнице, вспомнил он, ходили неясные слухи о досрочном призыве; в воздухе, невзирая на дежурные успокоения и небывалое сближение с немцами, что-то такое сгущалось. Теперь все стало понятно, и надо было спокойно и просто готовиться к переходу в другую жизнь — нет, нет, не так радикально, обратился он к невидимой публике, но к другой форме существования. И пора уже наконец проверить, чего ты стоишь: если ты так уверенно внушаешь себе, что стал другим и расплевался с прошлым, — вот попробуй действительно стать и расплеваться, а я посмотрю. Кто я? Да тот я, который всегда смотрит; инопланетный пришелец из книжки, придуманной в детстве. Его тогда мучила мысль о своем я: ведь это я, и сейчас это я, и вот сейчас это я… Не в книжке про себя читаю, не со стороны на себя смотрю, но я — действительно я, все зависит от меня, за все расплачиваюсь я. Он будил тогда мать в слезах: мама, какой ужас, я не могу больше ощущать себя собой! Она не понимала, она вообще плохо соображала со сна, над чем сама же шутила; но утром, когда все было уже не страшно и надо было в школу, такую успокоительную, она сказала: представь, что ты прилетел с другой планеты и наблюдаешь со стороны. Так решен был мучительный вопрос с душой, основа всякого детского кризиса. Был Миша Гвирцман, который так-то и так-то действовал, и был инопланетянин, которому ничего не делалось, когда Мишу Гвирцмана поколачивали или исключали из института. Вероятно, исключение было еще не так страшно, как армия, потому что сейчас инопланетянин включился, а тогда молчал. Теперь он спокойно поглядывал вокруг глазами Миши Гвирцмана и думал: как интересно, вот и я узнаю, как у них тут служат в армии. Вообще же раздвоение на инопланетянина и Мишу было так же забавно и притом неприятно, как в детстве шатающийся зуб: расшатывалось нечто, чему надлежало быть твердым. (Интересно, что сочинял тоже Миша, а инопланетянин читал. Инопланетянин наверняка умел сочинять лучше, потому что был старше, повидал больше, — но если бы он начал сочинять, получилось бы что-то холодное, тягучее; возможно, когда Миша возьмется за роман, инопланетянин поможет. Миша, кстати, не знал, как выглядела его планета. Он знал только, что планета была холодная.)</p><p class="p1">…Говорить матери он не стал — что такое, справится сам. Являться надлежало завтра, хорошо, что ждать недолго. Можно было придумать, конечно, отъезд или болезнь — мало ли, уехал в Ленинград, там подруга, встретились в Крыму прошлым летом; только отсрочки ничего не решали. Он взял паспорт, приписное свидетельство и пошел. Почему-то хотелось за ужином попрощаться с родителями, но не призовут же его сразу, да и нет сейчас призыва, до него два месяца. Впрочем, сейчас все могло быть. В том-то и беда, что давно уже могло быть все, и никто бы особенно не удивился. Вот Баландин выжил, а свободно мог не выжить; но и прежним не остался — чего-то испугался. Вероятно, ему в бессознании сказали — он сам так рассказывал, что под наркозом был в бессознании и что-то видел, — дескать, будет ему после смерти нехорошо, а как же ты думал, ты будешь все одобрять, а тебе будет хорошо? Не так, мой милый. И он задумывался, иногда застывал на кухне, подняв руку или просто глядя в пустоту, и с него, казалось, спадают штаны (он похудел очень). Могло быть все: забрать, не забрать… Художественной логики во всем этом сюжете давно не было, как не было и у них с Валей, и потому с Валей могло быть счастье, а могло больше ничего никогда не быть. Он об этом подумал уже на ночь, когда ему вдруг с особенной силой захотелось. Но мысль об армии погасила вспышку; а могла бы и обострить, тоже никакой логики. Бывают времена, когда нет логики, и без войны ее уже не выстроишь.</p><p class="p1">Военкомат помещался в военно-зеленом зданьице, почти уютном на вид, и чувствовать себя здесь надлежало уютно, потому что все уже случилось и дальше все пойдет без твоей воли. Миша подошел с повесткой к жабообразной бабе в плексигласовом окошечке. Почему не обычное стекло? — Ну как же, оборонные нужды. Его направили в кабинет номер два, ничего не объясняя, и у кабинета номер два уже сидела небольшая очередь, явные ФЗУшники. И — как давно уже, вне всякой логики, — Миша увидел тут того, кого менее всего желал увидеть: своего палача Никитина, того самого, с липким голосом и липкими пальцами; того, что переломил тогда ход собрания и повернул дело к исключению. Миша ему машинально кивнул и думал потом, что это было сделано правильно: еще бы не хватало в очереди к дежурному по военкомату выяснять старые отношения. Все равно как в камере перед расстрелом в каком-нибудь двадцатом году: вы недопонимали! — а вы недооценили… Никитин ему, казалось, обрадовался, робко улыбнулся. Миша воздержался от общения и раскрыл Франса. Франс для таких мест самое оно.</p><p class="p1">А военкомат был довольно скучное место. На стене висели таблицы новых знаков различия — Миша знал их, конечно, хотя изучал исключительно для тренировки памяти, но чувствовал, что пригодится. Подробно описывалось, как пришивать петлицы («подгибом»; почему подгибом? Почему столько было ужасных слов — подшив, подгиб, опрятность?). Изображался в полный рост бригадный комиссар со всеми знаками различия и отличия. Судя по знакам, он был еще бравый бегун и непременно стрелок. Еще он бороду не брил, а был уже стрелок, и самый дюжий бородач тягаться с ним не мог. Миша стрелял хорошо, но то в тире, а как оно будет из настоящей винтовки? Совсем другой вес, другие обстоятельства. Забавно, если б на воинских стрельбах тоже, как в парке Горького, выдавали поощрения в виде бутылки лимонада. Еще забавней было бы оформлять повестку в виде праздничной открытки: зайка, встав на задние лапки, вручает призывнику трехлинейку, лисонька — пилотку, кисонька — гранату… Ничего не умеют, все у них скучно. Еще было бы весело затеять народную игру в перетягивание призывника: родня тянет к себе, военкомат — к себе; кто перетянет, с тем он и останется.</p><p class="p1">Скучное, унылое место был военкомат, и не менее скучное — армия, и, хотя войной пахло последние три года, война не делала армию веселей. Это плохо, подумал Миша, воевать надо весело, как при осаде Ла-Рошели. Его слегка подташнивало. Особенно противной была мысль, что сейчас их, как два года назад во время приписки, погонят на медицинскую комиссию, притом голыми, а раздеваться при Никитине ему отчего-то особенно не хотелось. Миша был невелик ростом, но гармонично, почти идеально сложен, и стыдиться ему было нечего, а Никитин, сутулый и вялый, был, должно быть, мерзок без одежды — но раздеваться перед ним было все равно что перед палачом: слишком интимная и оттого отвратительная связь.</p><p class="p1">К счастью, Никитин вошел первым и вышел почти сразу: он передал в военкомат некую справку, по которой, вероятно, числился белобилетником, — и обновлять эту справку требовалось ежегодно. Миша видел, как Никитин бережно внес эту бесценную справку на зеленом бланке, а вышел без нее, с выражением гордо-отрешенным: вот, я явился, но мне отказано в исполнении гражданского долга, ибо я неизлечим. Он ушел, а Мише и прочим приказано было войти. Лейтенант, которому идеально подошла бы фамилия Фердыщенко или даже Пердыщенко, являя собою твердыщенко обороны, заговорил сначала именно с Мишей. Глаза у лейтенанта были белесые, волосы — бледно-рыжие, все остальное — красное, не считая формы: красные щеки, красные руки, очень красные губы.</p><p class="p1">— Гвирцман, так? — спросил он. — Что не явились сразу?</p><p class="p1">— Я по повестке явился, — ответил Миша растерянно.</p><p class="p1">— Я вас не спрашиваю, что по повестке. Вы по повестке обязаны явиться, иначе уклонение. Я спрашиваю, что вы сразу не явились, как были отчислены.</p><p class="p1">— Я встал на учет, — пролепетал Миша, хотя ему и хотелось бы говорить твердо.</p><p class="p1">— Я не спрашиваю вас про учет. — Лейтенанту сразу надо было дать понять Мише, что он виноват и это непоправимо. — Если б вы не встали на учет, то это преступление. А я спрашиваю, почему вы сразу не явились по отчислении.</p><p class="p1">— Я не знал, что это нужно.</p><p class="p1">— Что вы подлежите призыву, вы тоже не знали?</p><p class="p1">— Я знал, но призыв весной…</p><p class="p1">— Призыв сейчас, такое положение, что во всякое время, — сказал лейтенант неопределенно. — Вас отчислили, вы должны явиться. Нам вас приходится отдельно вызывать, что такое. Вы пройдете комиссию сейчас, послезавтра вам явиться с вещами, помытым, иметь кружку, котелок. И вы на призыв.</p><p class="p1">Миша похолодел: подтверждалось худшее; но взял себя в руки, ибо был теперь падший ангел и жизнь ему была не дорога. И хорошо, что так сразу. Чувствуется серьезная организация.</p><p class="p1">— Я восстановлюсь в институте, — сказал он вдруг тонким голосом; мерзость, какая мерзость!</p><p class="p1">— Да конечно, восстановитесь! — сказал лейтенант с горячим дружелюбием. Он был ненамного старше Миши, а может, и вовсе ровесник. Теперь Миша был уже усвоен и почти переварен, и с ним можно было держаться подружелюбнее. — Отслужите и восстановитесь. Уже другой человек будете. На медкомиссию кругом арш.</p><p class="p1">Миша вместе с другими голыми людьми, эти были помладше, прямо вчерашние школьники, прошел комиссию. У него был, конечно, шум в сердце, о чем он сразу заявил, и последствия многих детских ангин, и терапевт кивал вполне сочувственно. Но согласно новых обстоятельств и вы сами понимаете…</p><p class="p1">Миша подлежал призыву немедленно, в рамках директивы, номер которой ему зачем-то назвали, но он не запомнил. Это все из-за нее, из-за Вали, думал почему-то Миша. Если бы она не пробила так ужасно мое защитное поле, меня бы, может быть, и теперь не заметили. Но между нами случилась вспышка, северное сияние, магнитное возмущение, и я обнаружил себя. А так меня никто не видел, и не призывали, и работал бы я медбратом еще сколько угодно, до лета, до осени, до окончания института…</p><p class="p1">Он получил справку с резолюцией «Годен» и после двух часов скитаний по кабинетам в голом виде снова предстал перед лейтенантом.</p><p class="p1">— Одевайтесь и всё, — сказал лейтенант. — И увольняйтесь, а завтра являйтесь. Ну, попрощайтесь там, это все такое. Но много не перепивайте, я вам советую. Потом голова болит и все такое. Кругом арш.</p><p class="p1">Он был ужасно доволен. Какая-то бодрость исходила от него, свиноватое довольство.</p><p class="p1">Миша вышел из военкомата — пошел мягкий снег, он порхал вокруг совершенно по-школьному, и так мило было все, в самом деле, совсем как в детстве, когда всё решали за тебя; как любой человек, получивший по голове обухом, Миша испытывал легкое удовлетворение, спокойствие, временное примирение с участью. И такой милый среди этого милого снега сидел на лавке у военкомата Никитин, сунув руки в карманы. Он Мишу зачем-то поджидал.</p><p class="p1">— Гвирцман, — сказал он и встал, намереваясь, видимо, сказать речь, но тут же осекся. — Я вас жду, — произнес он вдруг, хотя это было как раз самоочевидно и не нуждалось в артикулировании. И странно, что они были на «вы». Они вообще сроду не переговаривались, но теперь были на «вы», прямо этикет.</p><p class="p1">— Вижу, — сказал Миша сурово.</p><p class="p1">— Гвирцман, вы меня ненавидите, наверное, но это ошибка, — бледным голосом сказал Никитин.</p><p class="p1">— Я не очень помню про вас, если честно, — соврал Миша.</p><p class="p1">— Это напрасно, меня вам лучше бы запомнить. Пройдемтесь.</p><p class="p1">— Почему я должен куда-то прохаживаться? — Миша никак не мог найти верный тон, потому что слишком на Никитина злиться значило бы действительно его помнить, а Миша рассчитывал изображать безграничное безразличие.</p><p class="p1">— Вы ничего не должны, но лучше нам пройтись, — сказал Никитин почти весело. — Пойдемте чаю выпьем, я замерз.</p><p class="p1">И они, как лучшие друзья, направились в сторону бубличной. Весь этот абсурд, от повестки в разгар зимы до внезапного явления Никитина, который, видимо, просто жил тут неподалеку и был приписан к тому же военкомату, длился и ширился, и ничего уже не было удивительного в том, что Миша шел рядом со своим недругом пить чай с бубликами.</p><p class="p1">— Я угощаю, — поспешно сказал Никитин для довершения чуда.</p><p class="p1">Миша пожал плечами.</p><p class="p1">— Гвирцман, я, собственно, давно должен был с вами встретиться, — заговорил Никитин после паузы, во время которой оба прихлебывали горячий, но слабоватый чай с пресноватыми бубликами. Вообще все в бубличной было вяло, как Никитин, и столы так же липки. — Я должен был вам объяснить, но надеялся, что вы поймете.</p><p class="p1">— Я ни в каких ваших объяснениях не нуждаюсь, — сказал Миша. — Красивее ваши действия не станут, не трудитесь.</p><p class="p1">— Это как сказать, но я же не ради красоты. — Никитин улыбнулся с непонятным самодовольством. — Меня интересует не моя красота, а ваша.</p><p class="p1">И он засмеялся каким-то безумным смехом.</p><p class="p1">— Я подумал, что было бы неправильно вам, человеку способному, оставаться в этом институте. Даже одаренному, — добавил Никитин, отхлебнув чаю. — И цыпленочку, — непонятно добавил он, отхлебнув еще.</p><p class="p1">— А вам — правильно? — спросил Миша, не подумавши.</p><p class="p1">— Мне что, я человек конченый, как говорил тут один. Мне надо где-нибудь находиться, я и нахожусь где попало. Но вы еще можете быть человеком, и я решил, что нечего вам торчать в этом паллиативе.</p><p class="p1">— С чего вы взяли, что у вас есть право что-то за меня решать? — очень спокойно, не повышая голоса, спросил Миша. Он думал при этом, что очень бы хорошо плеснуть липкой гадине кипятком в рожу.</p><p class="p1">— Ни с чего не взял, но человек должен иногда принимать решение. Сам я таких ситуаций создавать не могу, я человек больной, и у меня мало возможностей. Но если она сама создается, как вот вам устроила Крапивина, — неужели я должен был вам дать выйти сухим и дальше жить этой как бы жизнью? Я художник жизни, Гвирцман, это следующая стадия за литературщиной. Литературой сейчас все равно нельзя заниматься — так вот, я занимаюсь жизнью. Это единственный жанр, который тут у нас не возбраняется. Если хотите донести — донесите. Я могу громко все это сказать, мне ничего не будет. Знаете, что вы сейчас скажете? Что вы не доносчик, в отличие от меня. Ну и очень напрасно. Прекрасный, новый жанр, слабо разработанный пока в русской литературе. Чехов говорил: пишу все, кроме стихов и доносов. А между тем жанр налицо, и у него есть будущее. Когда нормальных жанров не станет, расцветут маргинальные. Если бы вы написали на меня донос, это могла бы быть литература. А не стишки.</p><p class="p1">— Я вам, Никитин, и даже тебе, Никитин, благодарен за совет, — сказал Миша, решительно заменяя пустое «вы» сердечным «ты», потому что хватит уже разыгрывать весь этот дуэльный балет; и странно: этим тыканьем он сразу снял налет пафоса с идиотской, в общем, сцены. — Но я сам как-нибудь… определюсь с жанрами. А тебе от меня, сам понимаешь, глубокая благодарность, но не потому, что ты мне якобы выдумал судьбу. А потому, что я хорошо увидел, чего стоишь ты и все ваше эстетство.</p><p class="p1">— Вот вы и увидели, и прекрасно, — широко и плоско улыбаясь, сказал Никитин. — И вы много еще чего увидите. И все это благодаря тому, что я вас вовремя высадил из состава, идущего в тупик. Другой ваш состав идет, может быть, в довольно сумрачные места, но это все-таки не тупик. И согласитесь, что человеком вы стали с того момента, как уволились из этой резервации. Там самое место для меня и для таких, как я, какие нигде больше не нужны, но мы больные люди, и нам там самое прибежище. А вы человек с будущим, и вам совершенно незачем эти игры в лицей. Я от вас многого ожидаю.</p><p class="p1">Он приступил ко второму бублику и понес совершеннейшую чушь, в которой Миша, даже если б и захотел, ничего не мог понять: ему было не до того, он был уже, в сущности, в армии, он стоял с Никитиным в низкопотолочной бубличной, а между тем являлся послезавтра помытым, имея при себе котелок, и ему не хотелось все это слушать. Никитин говорил про то, что народились новые люди, что Миша — один из них и что ему не следует прятаться от жизни, а надо прямо глубоко в нее погружаться, прямо въедаться… Он говорил про то, что искусство кончилось, что заниматься им больше не надо, а надо писать вещи, которые как сны, — но чтобы увидеть сон, согласитесь, Гвирцман, днем надо жить; и вот Миша должен жить, а он, Никитин, отсиживаться, потому что старый мир окончился в четырнадцатом году… Почему в четырнадцатом?! Почему не в семнадцатом? Но Никитин все нес этот свой западный бред, даром тут никому не нужный, нес только потому, что надо же ему как-то оправдывать свою мерзость; и вот он придумал себе миф, что не просто спасал свою личную липкую жизнь, а творил чужую. Все это было гадко, и Мише было не до того.</p><p class="p1">— Хорошо, Никитин, — сказал он, прервав его, когда тот в очередной раз откусил от бублика. — Сказал и душу облегчил. Мне тут завтра, — он нарочно приблизил, чтоб драматичнее, — в армию, и мне не до этих самоутешений. Будешь в институте — передавай привет.</p><p class="p1">— Но согласитесь, Гвирцман, — не смутился Никитин, — что добровольцем год назад было бы гораздо, гораздо лучше…</p><p class="p1">— И тебе было бы лучше не родиться, чем жить таким болезненным, — не удержался Миша. Он вообще теперь не умел сдерживаться, когда видел человека хуже себя: раз со мной так, почему же я должен иначе?</p><p class="p1">— Конечно, конечно, — заторопился Никитин, — мы с вами на брудершафт не пили, но разумеется! Просто исправлять это, понимаете, такой дурной тон…</p><p class="p1">Но Миша его не слушал, он вышел.</p><p class="p1">Домой не хотелось. А хотелось — вот странное дело — к Вале Крапивиной. Теперь ему предстояло как минимум два года, если не убьют в мирное время, а это случается запросто, обходиться без женской ласки. А женской ласки ему вдруг захотелось, и не такой снисходительной, какую могла бы ему подарить Лия, — а вот именно такой, подневольной, когда хочешь и нельзя, той, какую подарила бы Валя. И он подумал, что домой сейчас невыносимо, а вот к ней выносимо; и все было уже таким абсурдом с самого утра, что он решился.</p><p class="p1">Он проехал по Ленинградке на красно-рыжем трамвае и дошел до депо, когда уже темнело. Как во сне, свободно прошел в двухэтажный домик — хотя кому там было его останавливать? — и так же спокойно поднялся на второй этаж, и в приемной сидела, разумеется, Валя, совсем ему не удивившаяся.</p><p class="p1">— Чего приперся? — спросила она грубо.</p><p class="p1">— Завтра в армию забирают, попрощаться зашел, — так же грубо ответил он. — Уж ты жди, пожалуйста.</p><p class="p1">— Дело хорошее, — хохотнул мужичок, ожидавший приема; их много тут сидело, но Миша, как во сне, никого не замечал.</p><p class="p1">— Погоди, я щас, — сказала Валя и скрылась в начальственном кабинете. Через минуту легко выпорхнула оттуда — ей, видимо, многое теперь позволялось.</p><p class="p1">— Ну идем, — и она, стремительно накинув все ту же облезлую черную шубу, поманила его к лестнице.</p><p class="p1">— Куда это?</p><p class="p1">— Иди, не спрашивай, — сказала она и потащила вниз, в бездну.</p><p class="subtitle">— 18 —</p><p class="p1">Общежитие Метростроя, куда Валя стремительно вела его за руку, словно на буксире, стояло неподалеку все от того же «Сокола» и пленяло чистотой. Тут, кажется, еще пахло стройкой — его совсем недавно закончили и толком не обжили. Строители дивных подземных дворцов жили в царских условиях, по четверо. Женский корпус — желто-розовый, кирпичный, четырехэтажный, — был увенчан даже чем-то вроде мансарды, но кто там жил, куда вело круглое чердачное окошко? Миша всегда мечтал жить за таким окошком.</p><p class="p1">Валя явно пользовалась тут особыми правами. Она кивнула вахтерше — и их с Мишей пропустили без звука; о черт. Как же далеко зашло у нее с этим начальничком, почему он все еще не переселит ее к себе? В действительности у них с начальничком ничего не сдвинулось; Валя уже и была бы готова, Миша сильно ее раззадорил, но Ганцев, памятуя о былой полуудаче, больше не рисковал. Бытовало в их компании пользователей квартиры близ улицы Радио такое словцо — «антитело»; и Валя, похоже, при всей своей лакомой стати была для Ганцева то самое антитело, чувствовался барьер. Так что в ресторан он с ней один раз съездил, дабы не нарушать отношений, а в ту квартиру больше ни-ни. Но слухом земля полнится, и отношение к Вале сразу установилось особое; да еще она поколотила одну девушку, которая назвала ее сучкой, а этого Валя отнюдь не любила. Она ей врезала по-нашему, по-тамбовски. Кто умеет за себя постоять, к тому и вахтеры с пониманием. Да и время было детское, и тетя Нюра только сказала: смотри, Крапивина, в девять чтобы духу его не было. Да и в восемь не будет, усмехнулась Крапивина и потащила его по бетонной лестнице на третий этаж.</p><p class="p1">Здание было похоже на школьное, повеяло чем-то новогодним, спортзальным, вот-вот танцы; уже было совсем темно, из фонаря за окном сыпался снег, как из душа.</p><p class="p1">Но в Валиной комнате их ожидало разочарование — там были две девушки, им было сегодня в ночную смену; одна спала, другая завивалась. При появлении Миши та, что завивалась, взвизгнула и прикрылась, — однако Мише успела понравиться, и визжала она, кажется, для проформы, — а спящая проснулась, подскочила и сделала круглые глаза.</p><p class="p1">— Ты что, Крапивина, кого водишь, Крапивина! — все взвизгивала завивальщица.</p><p class="p1">— Вот земляк приехал, в школе учились.</p><p class="p1">— Так стучать надо!</p><p class="p1">— Вот еще, к себе в комнату стучать. Повидал он всякого, не пугай.</p><p class="p1">Заводить ссору с Валей было, видимо, себе дороже. Хорошо она их отстроила, а в институте — кто бы мог подумать. Но в институте поощрялись другие свойства характера, а подлаживаться она умела безупречно.</p><p class="p1">Валя вышла из комнаты, Миша за ней — на этот день столько всего случилось, что новая ситуация его только забавляла; между тем ничего забавного не было, до призыва оставалось все меньше времени, и тратил он его не слишком продуктивно.</p><p class="p1">Валя постояла с полминуты, соображая.</p><p class="p1">— Ну пошли.</p><p class="p1">Они поднялись еще выше — неужели туда, на чердачное оконце? — но оконце, как все таинственные оконца, вело в никуда, только обещало, а за ним ничего не было. Однако выше четвертого этажа была дверь с решеткой, а решетка была на замке, но замок таинственным образом открылся. Ключа у Вали не было, она исхитрилась открыть его то ли шпилькой, то ли отмычкой — Миша в темноте не разглядел. Что они там прячут — мужчин на время обхода? Водку?</p><p class="p1">— Давай наверх.</p><p class="p1">Наверху была еще одна дверь, уже без замка, обитая жестью и запертая накрепко; ее Валя открывать не стала, да и не могла. И здесь, на темной лестнице, между решеткой и дверью, в почти полной сказочной темноте, в запахе штукатурки, она опустилась перед Мишей на колени, расстегнула его брюки и начала делать то, что было слишком даже для сегодняшнего дня.</p><p class="p1">— Валя, — урезонивал он ее, — ну не надо, Валя, так не надо…</p><p class="p1">Она путалась в штанинах, он путался в словах, как-то все выходило совершенно не так, как должно быть при прощании, возможно, навеки.</p><p class="p1">— Ну Валя!</p><p class="p1">— Тебе что, стыдно? — В темноте странен и даже зловещ был ее тихий блядский смех. — Тебе стыдно так?</p><p class="p1">— Я не за этим… ну как тебе сказать? Я ухожу, мы, может, не увидимся больше…</p><p class="p1">— Так я и стараюсь для тебя поэтому, дурак. — Валя села на ступеньку и привалилась к стене. Миша стал застегиваться. — Ну что ты дурак такой, что ты такой телок! Хорошо, ты вот весь такой уходишь. А чего бы ты хотел, что мы должны сделать? Мы песню, может, должны спеть? Давай хором споем, да, Миш? Дан приказ ему на Запад, ей — в другую сторону!</p><p class="p1">— Да тише ты.</p><p class="p1">— А чего тише, тут слушать некому. Ты идиот, Гвирцман, кретин ты.</p><p class="p1">— Кретин, — согласился он беззлобно. — Но я так не хочу.</p><p class="p1">— А как ты хочешь? С песнями, да, с песнями?</p><p class="p1">Но тут он и сам уже засмеялся, поднял Валю на ноги и стал целовать в щеки и глаза — в губы как-то не решался, брезговал, что ли, после этого. И сразу, как только она стала покорно, обмякнув в его руках, все позволять, а потом и сама его быстро поцеловала, и он почувствовал, что вот она уже и плачет, — тут же он ощутил силу и готовность и даже сунул ее руку в собственные штаны.</p><p class="p1">— Ну а как тут? — зашептала она. — Как тут можно? Как ты хочешь?</p><p class="p1">— А не знаю, — отвечал он беспечно, — мы как-нибудь…</p></span>
