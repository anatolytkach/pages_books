<span><span><span><span><span id="id27"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Просыпаясь утром и глядя на Женьку, лежавшую всегда на спине, ровно, прямо, в том абсолютном покое, в каком никогда нельзя было ее застать днем, — Волохов думал иногда: почему умереть не сейчас? Смерть давно постоянным фоном входила в его мысли — то ли было виновато предчувствие войны, до которой оставалось тогда полтора года, то ли, историк, он привык подводить итоги; где гарантия, что умрешь не сегодня? Каждый год проживаешь день рождения и день смерти — эта мысль как поразила его в детстве, так с тех пор и всплывала время от времени; в Москве, где давно уже не было никакой жизни, но смерть медлила, — умирать не хотелось, хотелось посмотреть, чем кончится; но тут, рядом с Женькой, — право, хоть и в двадцать восемь лет, а не жаль было бы сдохнуть, чтобы не смазывать впечатления. Ужас — в приблизительности: соглашаешься на то и это — вместо того, что хочется, с допущением большим или меньшим, но всегда присутствующим, — за этот компромисс и цепляешься, в дурацкой надежде, что доживешь и до подлинности. Теперь дожил — куда дальше?</p><p class="p1">— К тебе или ко мне? — был ее первый вопрос, когда они остались вдвоем после долгого застолья в вечер его приезда. Сидели на улице, в открытом ресторанчике, спорили о размежевании, шутили, что вон тот, мимоидущий, похож на террориста, и тот, и тот, — но кто-то вдруг вспоминал о приятеле, погибшем или раненном в последнем теракте, и шутки стихали; они с Волоховым сразу приметили друг друга, и он еще себе не верил — неужели она в самом деле выбрала его? Но каждый ее взгляд говорил: да-да, все правильно, и посмотрим, что ты теперь будешь делать. Самым незатейливым его шуткам она одобрительно смеялась, а когда рассказывала свои бесчисленные журналистские истории — хорошо, коротко, нимало не упиваясь общим вниманием, — обращалась к нему одному. «Ладно, ребята, я пошла показывать гостю вечерний город», — все понимающе загудели, и Волохов даже поймал один ненавидящий взгляд: его прожигал глазами совсем молодой парень, многословный, скучно остривший, все старавшийся привлечь Женькино внимание; парня было жалко, и Волохов даже улыбнулся ему сочувственно, — извини, не виноват, так получилось, — но парень отвернулся и сплюнул. Что поделаешь, милый, не повезло. Ко мне, сказал он тогда. Ей это понравилось — мужчина должен показать, что ему есть куда пригласить девушку; но уже на вторую ночь переехали к ней — там был комп, книги, фотоаппаратура, и вообще она не любила ночевать вне дома — и так сплошные разъезды.</p><p class="p1">Он сразу вписался в ее сумасшедший ритм, ночные выезды, отлучки без предупреждения; не навязывался, много времени проводил один, работал, заявлялся к ней поздно, о причинах ее поздних возвращений не расспрашивал. «Ты не ревнуешь?» — «Что ты, с ума схожу». Ночами, а иногда и днем, в ленивый блаженный час, когда время тянулось, как нитка сладкой лукумной слюны, — ему перепадало столько, что о сопернике не могло быть и мысли. И когда она затихала, сразу вся — покой, вся — отдохновение, — он спрашивал себя: не слишком ли для него? Каким недобором в будущем придется платить за такой избыток? Или недобором было все прежнее?</p><p class="p1">Здешняя жизнь была яростно, невыносимо сгущена, и до полного счастья Волохову не хватало только одного — сознания своего на нее права. Все-таки он пользовался всем как турист, немного понарошку, — даром что мог взорваться на любой автобусной остановке, угодить под случайную пулю, попасть под машину, наконец. Они тут черт-те как носились, словно для того, чтобы непрекращающиеся взрывы были не единственной опасностью в стране: взрываете? — ради Бога, мы и сами себе на каждом шагу устраиваем экстрим! Женька в отроческие годы не слезала с мотоцикла. И чем дольше Волохов тут жил — а всего у него было два месяца, и три недели еще оставалось, — тем обиднее ему становилось, что не привел Бог родиться хазаром. Конечно, горжусь, ценю и ни на что бы не променял (без подобной риторики и в институте было уже не обойтись), но у этих все чувства были острей — в том числе и чувство Родины: потому, вероятно, что она меньше. Впрочем, о причинах этой остроты Волохов обещал себе еще подумать вчуже, по возвращении.</p><p class="p1">Он начал уже приучать себя к мысли, что через три недели действительно придется лететь обратно, в осеннюю Москву, а Женька останется тут и немедленно начнет делить раскладное низкое ложе Бог весть с кем, по прихоти обильной, как делила и до него. Прекрасная ненасытность, и не нам морализировать. Правда, о Москве, институте, братьях-альтернативщиках и даже о подругах дней своих суровых Волохов думал теперь с тоской, ибо там, на Родине, как раз и располагалось царство приблизительности, сплошная вязкая недомолвка, и ежели бы не сдерживаться каждую секунду, стоило все это без колебаний послать. Но не следует путать туризм с эмиграцией — здесь его принимали славно, но так же славно могли обойтись; разве что Женька… но у Женьки установка простая: каждая секунда — последняя. Принцип достойный, но эгоистический: хочу — и все, трава не расти. Пройдет месяц, для разнообразия понадобится еще кто-нибудь. Альтернативка тут развита слабо — господствует официальная, религиозная версия истории; любопытно, российские альтернативщики были хазарами буквально через одного, если не через половину. Тут опять была их фирменная двойная мораль — все, что охотно и с поощрением разрешалось другим, запрещалось в собственной среде. Удивительна была их тяга к свободе и горизонтали в любых чуждых сообществах, — и неотменимая вертикальная иерархия, которой подчинялась любая их группа; здесь Волохов чувствовал это особенно остро — даром что в газетах, в кнессете и в каждой компании, куда его затаскивала Женька, все беспрерывно спорили и с разных сторон ругали власть. Все это, в отличие от неутихающей российской склоки, было занятием милым и почти домашним.</p><p class="p1">Есть японский соус, сам по себе, говорят, не имеющий вкуса, но делающий рыбу — более рыбной, а мясо — более мясным; так и тут, в самом воздухе, было что-то такое, что делало споры — более спорными, солнце — более солнечным, и даже смерть, разлитую в воздухе, — более смертной: когда вскакивали ночами по звонку, неслись куда-то, где опять ухнуло (он так потом и вспоминал Женьку — босой, прыгающей на одной ноге, с чертыханием влезающей в джинсы), когда она с профессиональным хладнокровием (явственно любуясь собой, что поделаешь!) по мобильнику диктовала в номер на так и непонятном Волохову языке, когда с расспросами бегала по родственникам пострадавших, умудряясь никого не обидеть журналистской навязчивостью, с каждым поплакать и оправдать в глазах публики свое настырное и бесстыжее ремесло, — все это время Волохов чувствовал, что жизнь здесь, вот она, живей не бывает. Для себя он объяснял это присутствием Женьки, а что делало Женьку такой — не задумывался. Родится иногда такая сумасшедшая горячая девка, которой всего мало. И температура у нее всегда была тридцать семь с копейками, а когда в начале июля она поймала вирус и два дня валялась дома с тридцатью девятью, ей и это шло; никогда больше Волохов не видел ее такой гармоничной, легкой, тающей. Лежала целый день в кровати, мечтательно на него глядя, закинув руки за голову, рассказывала что-то из раннего, еще уральского детства. Как все такие девочки, страшно любила отца. Отец остался где-то в России, иногда слал мейлы — только ей, с матерью не общался принципиально. Странно, как мало она помнила о России и какой сказочной представлялась ей эта страна.</p><p class="p1">Иногда, конечно, Волохов думал: плюнуть на все, взять ее домой, устроится, журналисты ее класса не пропадают. Тут же опровергал себя: какой там особенный класс? Соображает быстрей среднего писаки, и только. Знание русских реалий — нулевое или близкое к тому. Но на первое время он прокормит — как-никак завсектором, — а потом она найдет занятие: дольше двух недель бездействовать — не про нее. И временами он почти не сомневался, что она поедет, — но заговаривать об этом боялся, потому что отказ неизбежно вогнал бы его в отчаяние, при самом искреннем желании внушить себе, что она совершенно свободна. «Ты сссовершенно сссвободна», — прошипел один поэт одной тоже поэтессе и уполз в Африку.</p><p class="p1">В Москве у Волохова даже была одно время невеста. Они прожили вместе два года, а потом он сбежал — от ее кроткой покорности, тихой задумчивости и вечной печали. Она была странная девушка, все время плывшая по течению и никогда ни с кем не спорившая. Он уж почти забыл ее. Как ее звали? Галя, филолог-фольклорист с соседнего курса, с филфака, располагавшегося этажом выше в первом гуманитарном. С Галей жилось спокойно, тихо и уютно, но Волохову не хотелось больше так жить. Он никогда не понимал, что происходит у Гали в голове. Иногда она привозила из экспедиций странные поговорки и повторяла их по любому поводу: «Айно густо, вайно хрусто. Оболокать картошно, растолокать оплошно. Черешень заступ колубал, ай чекуляку гордубал?». Где-то он уже слышал такую речь, но не помнил, где. Должно быть, что-то южнославянское.</p><p class="p1">Еще меньше он понимал ее сказки, в которых добро никогда не побеждало — его угнетали, а оно смирялось. Яснее прочих он помнил одну сказку — что-то про старика и старуху, у которых была волшебная меленка; меленка молола сама и называлась «жерновцы». Был еще петушок, он-то и навел их каким-то образом на эту меленку, а не то сам ее приволок из лесу, где собирал, наверное, грибы; полезный петушок, делавший все по хозяйству, петушок-добытчик в семье двух бедных поселян, которые и грибов не собирали из уважения ко всему живому… Ехал богатый барин, заглянул в избу и отнял жерновцы. Петушок полетел к нему, сел на ворота и кричит: барин, барин, отдай мои жерновцы — золотые, голубые! Барин приказал зажарить петушка, а петушок взвился из печи, вылетел да и опять просит: барин, барин, отдай мои жерновцы — золотые, голубые! Самое грустное было то, что он все продолжал нахваливать эти жерновцы; да кто же после такого отдаст? Барин его в воду, а петушок выпил всю воду и опять просит: барин, барин, отдай мои жерновцы, золотые, голубые! И не то чтобы поджечь дом барина или выклевать ему глаз — это петушку и в голову не приходило; он только все просил свою меленку, золотую и голубую, и конца у сказки не было, как не было конца новым испытаниям, которым подвергали петушка. А старик со старухой, лишившиеся теперь и единственного кормильца, все сидели, должно быть, дома, доедали последнее, доскребали по сусекам, а может, шли уже по дорогам, питаясь подаянием, да вспоминали, как был у них волшебный петушок да жерновцы, золотые, голубые; Волохов послушал-послушал про все это да и сбежал, потому что чувствовал, как слабость, покорность и жалость обволакивают его. В нем с детства была предрасположенность к этой слабости и жалости, и не научись он вовремя подавлять их, жалея каждого встречного нищего и любую собаку, робея перед каждым препятствием и опасаясь требовать свое, — его давно бы уже оседлали, особенно по нынешним временам.</p><p class="p1">С Женькой все было иначе. Женька была первой, за кого он мог не бояться. За три недели до отъезда он не выдержал-таки и спросил с полузабытой уже робостью (совершенно отвык тут стесняться себя, все было не по-русски отчетливо: да — да, нет — нет):</p><p class="p1">— Жень, поехали со мной, а?</p><p class="p1">Она уставилась на него с недоумением, улыбаясь сначала неуверенно, потом шире и шире.</p><p class="p1">— Ты что, предложение мне делаешь, морда?</p><p class="p1">— Типа того, — буркнул Волохов.</p><p class="p1">— Милый, я страсть как польщена, но я ведь ЖД. Ты разве не знаешь?</p><p class="p1">— Жэ Дэ? — переспросил Волохов. — В смысле национальность?</p><p class="p1">Первый его порыв был — утешить, в том смысле, что — подумаешь, ты же знаешь, у нас там далеко не так дремуче, а если кто посмеет тебя так назвать — я ему все оторву; но мужчинское это желание утешать и защищать тут же испарилось — не такова была Женька, чтобы чего-нибудь бояться. Она уже смеялась его непонятливости.</p><p class="p1">— Ага, национальность. Жи Ды. Живой Дневник. Jah Division. Женька Долинская. Ты что, правда не слышал? Как ты в страну поехал, ничего о ней не зная?</p><p class="p1">Такой снисходительности он не любил. Все-таки ей было только двадцать три года.</p><p class="p1">— Я, Женечка, знаю столько, сколько мне нужно. Этим историк отличается от журналиста.</p><p class="p1">— Ну не сердись, пожалуйста. Мордочка, я не могу выйти за тебя замуж, и ни за кого не могу. По крайней мере до известного момента.</p><p class="p1">— Когда Мессия придет?</p><p class="p1">— Не совсем. Когда миссия исполнится. ЖД — это Ждущие Дня, если хочешь.</p><p class="p1">— И когда день?</p><p class="p1">— Это уж ты почувствуешь.</p><p class="p1">— Хазарский заговор, — хмыкнул Волохов. Если честно, он был уязвлен. — А почему ты мне не рассказывала никогда?</p><p class="p1">— Дарлинг, я не знала. Я думала, ты в курсе и деликатно обходишь этот вопрос.</p><p class="p1">— С чего бы мне его обходить?</p><p class="p1">— Да с того, что ты не ме-е-естный, — она чмокнула его в щеку, — совсем не местный, ни на ген, хотя такой умненький, такой носатенький… Я обязательно приеду, Вол. Но тогда, боюсь, ты уже не захочешь брать меня замуж.</p><p class="p1">— Тебе будет девяносто?</p><p class="p1">— Нет, что ты, гораздо меньше. Подожди, вечером расскажу.</p><p class="p1">И она убежала на свое дежурство, к которому Волохов вечно ее ревновал, потому что никогда не мог понять, с кем в этой газете она спала, с кем — нет, с кем еще собирается спать после его отъезда и как все они относятся к нему. Тут все со всеми спали — страна маленькая, нация-семья; в ее компании разведенная девушка Лена, откуда-то из Средней Азии, рослая, с тяжелой грудью и губами Анджелины Джоли, спокойно общалась с бывшим бойфрендом, переметнувшимся к общей подруге, а тот бойфренд ласково здоровался с собственной бывшей пассией, помогал ей переезжать на новую квартиру… У Волохова были еще дела в городе, он собирался встречаться с коллегой из музея истории катастрофы и решил расспросить его про ЖД прежде, чем Женька вернется домой.</p><p class="p1">Этот коллега был Миша Эверштейн, — как говорил один московский знакомый, «хазар настолько, что это уже неприлично». Миша принадлежал к распространенной породе, подчеркивавшей и пересмеивавшей свое хазарство на каждом шагу; иногда Волохову казалось, что это обаятельней, чем изо всех сил встраиваться в русский тип, отпускать длинную бороду, говорить вальяжно, солидно, с ласковым московским аканьем, никогда не суетиться, радовать глаз русопята приятной округлостью движений… Эверштейн беззлобно и даже почтительно похохатывал над анекдотами про Рабиновича, пародировал газетный стиль, имитировал местечковый акцент — хотя у него был прекрасный, богатый и пластичный русский язык, без намека на провинциальность. Он и выглядел чересчур типично — маленький, смуглый, птичьеносый, с редкой черной бороденкой и быстрыми карими глазками, — и вел себя, как Рабинович из анекдота: мелко суетился, болтал, бравировал неряшливостью, быстро и неопрятно ел и все трогал себя: то потрет переносицу, то примется теребить мочку уха, то почешет под мышками и быстро понюхает пальцы; это, пожалуй, было у него не пародийное, а врожденное, и все остальное он подобрал по черточке, чтобы довести до совершенства гротескный образ, растворить природные черты — мелкую нервическую суету — в анекдотических, чтобы и собственные его мелкие пороки казались сознательно выбранной маской. Он все время нервничал, а себя трогал, вероятно, потому, что никак не мог поверить в собственную телесность: такое количество фактов и домыслов пролетало за минуту через его быструю птичью голову, что на нужды низкой жизни не оставалось времени, — и чтобы не воспарить совсем, он постоянно ощупывал свое тщедушное тельце: надо же, еще здесь. Впрочем, была и другая версия: как иные всем телом слушают, так он всем телом думал — животом, который поглаживал, лопаткой, которую почесывал. Иногда его руки блуждали вокруг причинного места, и он явно сожалел, что нельзя как-нибудь подергать за него: все-таки люди смотрят. Наверное, и оно было связано с какой-то зоной его сознания. Наедине с собой Эверштейн наверняка не стеснялся.</p><p class="p1">У Волохова никогда не было собеседника столь чуткого: сам Волохов думал основательней, формулировал осторожней, — Миша подхватывал всякую едва высказанную мысль, снимал с языка возражение и на ходу опровергал его, но за быстротой этих опровержений Волохов чувствовал тайную неуверенность: скоростью Эверштейн компенсировал поверхностность, блеском парадокса отвлекал от слабости тезиса. Волохов все время хотел ему сказать: помедленней, — но по статьям Эверштейна, которые читал с уважением и часто с завистью, знал, что думать медленно и глубоко он очень даже умеет; поверхностность, ложный блеск — все это было для диалога, экспортный вариант. Очень хотелось поговорить с ним по-настоящему, без обмена цитатами, без анекдота; но до себя Эверштейн не допускал. Волохов чувствовал явную симпатию с его стороны, а вместе с тем понимал, что и симпатия эта легка, необязательна: уедешь — забудет, станет откликаться на письма, содействовать консультациями… и все-таки в отношении местного населения к Волохову сквозила необязательность. С ним будто не говорили о главном.</p><p class="p1">Побеседовав для приличия и без особенного интереса о миссии Гесса в Англии (Эверштейн специализировался на раннем периоде второй мировой), Волохов со старательной небрежностью сказал:</p><p class="p1">— Кстати, Миша… я все хочу вас спросить… Что такое эти ЖД?</p></span></span></span></span></span>
