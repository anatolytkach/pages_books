<span><span><span><span id="id90"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Коренных населений было несколько; то есть оно было, в сущности, одно, потому что не особенно соблюдало границы, но разница между обитателями гор и степей, пустынь и побережий сказывалась, так сказать, антропологически. Они потому и сделаны были разными, чтобы их не путали, — потому что других различий у них не было, все были счастливые доисторические люди. Мирно возделывали они свои поля и бороздили моря, и никакой борьбы за право называться вождем у них не было: одни и так рождались земледельцами, другие — охотниками, третьи — скотоводами, четвертые — волхвами, пятые — вождями, и никто не мог исполнять чужую должность, нечего было и стараться. Долго продолжался доисторический век; ведь цель истории — как раз и разбить людей на страты, а если это с самого начала так, то и истории никакой не надо.</p><p class="p1">Однако что-то случилось.</p><p class="p1">В некоторых мифологиях это называется грехопадением, в других — падением неба на землю, но то ли в результате мутации, то ли вследствие глобального похолодания на земли коренного населения пришли другие люди. Может, они были всегда, но жили отдельно. А может, они народились, как новая ветвь эволюции. Так или иначе, доисторическое время кончилось, и началась эпоха захватов.</p><p class="p1">Одни захватывали грубо, другие хитро. Одни вырезали коренное население до последнего человека, другие порабощали его, а третьи прогоняли. От некоторых коренных населений ничего не осталось. Иные, умевшие договариваться со своей землей, предпочли уйти под воду, как атланты, и под землю, как пикты. Так пошли легенды о подземных жителях и пропавших расах. Может, под землей кто и живет, Василий Иванович этого не знал. Он знал точно, что от атлантов ничего не осталось. Правда, и завоеватели не спаслись.</p><p class="p1">— А Китеж? — спросила Анька.</p><p class="p1">— В Китеже я не был, — уклончиво отвечал Василий Иванович. — Это, Анечка, не совсем наша была земля. Это другое было племя. Может, ушли, а может, просто озеро.</p><p class="p1">Страннее всего Аньке было думать, что она, оказывается, не коренное население. К этому она не была готова. Еще страннее было думать, что настоящее население — васьки. Если бы гастарбайтеры, которых перед войной расплодилось такое множество, она бы еще поняла, но васьки — с этим было уже никак не смириться. Почему они дали такое сделать с собой? Как надо было пострадать во время войны, чтобы от всего коренного населения остались только эти беспомощные бродяги? А если не только они — где же остальные?</p><p class="p1">— Да нас много, — объяснял Василий Иванович. — Есть — которые васьки, есть — которые волки, и воины были, да воинов всех убили. Редко когда родится воин. Для нашего воина первое дело — долг, а эти же без правил воюют… Давно уж все воюют без правил.</p><p class="p1">— А что ж вы не сопротивлялись, Василий Иванович?</p><p class="p1">— Да мы думали — обойдется… Ну, придут они, пограбят, а у нас много. Придут и уйдут. А они не пришли. Потом другие пришли. Ну, как они стали друг друга-то заваливать — так уж нам, конечно, полегче стало. А то никакого продыху не было.</p><p class="p1">— Василий Иванович! А что, если они объединятся и вместе вас начнут давить?</p><p class="p1">— Ну что ты, Анечка, — простодушно удивлялся Василий Иванович. — Как же такое может быть, чтоб они объединились. Такого никогда не бывает. Во всем сойдутся, а не объединятся. Это судьба их такая: нельзя им сходиться — всегда сцепятся. У них ни в чем единства быть не может.</p><p class="p1">— Что ж ты раньше мне про все это не рассказывал, Василий Иванович?</p><p class="p1">Василий Иванович робко отвечал, что к слову не приходилось, но Анька понимала, что это отмазка. Дело было в том, что раньше она была не совсем своя. Он жил у них на положении домашнего животного, а с чужими о главном не говорят. Теперь она уравнялась с ним, так же кругами ходила по России и могла узнать главное.</p><p class="p1">— А почему кругами, Василий Иванович? Почему напрямую нельзя?</p><p class="p1">— Земля такая, Аня. Напрямую ходят, да не туда приходят. Ты не знаешь разве, как говорят? Туда окольного пути четыре километра, а по короткому пути туда и вовсе не дойти.</p><p class="p1">— А почему вообще круг? Ты же говорил, ваши всегда в Москве по кольцевой линии ездили. Я и сама видала, пока их не выловили. Это зачем?</p><p class="p1">— Это нам так удобней, Анечка. Мы так думаем лучше, и вообще… Каравай-каравай — слышала? Это же наша песня. И карусель — наша. Исконные народы, коренные, все по кругу пляшут. Это когда пришлые являются — тогда начинаются все эти ваши танцы неприличные…</p><p class="p1">Современных танцев — вальса, карамболя и мазурки — Василий Иванович не любил. Все это был один разврат.</p><p class="p1">Они бродили уже месяц, и Анька успела узнать, что такое голод, и холод, и самое страшное — бесприютность. Она успела понять, что самое страшное — смотреть на мир глазами брошенного щенка, выгнанного гостя, потерявшегося ребенка; но ведь она всегда знала, что это так. Она вообще всегда все знала, поэтому и удивлялась мало чему. Нельзя все время смотреть на мир так, — но в душе надо все время помнить, что так оно и есть. У каждого в душе живет потерявшийся в чужом городе мальчик, потому что никто из нас ни в одном городе не свой. Поэтому ей стало даже легче, когда вечно жившая в ней бездомность вышла наконец наружу. Нечего делать вид, что мы дома.</p><p class="p1">По родителям Анька скучала страшно, плакала каждую ночь и при первой возможности звонила. Она старательно шифровалась, отключила мобильник, тем более, что и денег на него не было, — им с Василием Ивановичем едва хватало того, что давали добрые люди. Добрых людей оказалось на удивление много, у Василия Ивановича были помощники и кормильцы в каждом городе, но много они дать не могли, им теперь приходилось опасаться слежки, поскольку васек взялись отлавливать всерьез, не за страх, а за совесть. Это как-то было связано с эффективностью — новым главным лозунгом. Сначала неэффективными были объявлены васятники, потом благотворительность, потом больницы — в общем, тут здоровым и оседлым гражданам не хватало, где уж было возиться с васьками! Передвигались они с Анькой большей частью по ночам, днем отсиживались по чердакам или парадным, а иногда у тех самых добрых людей. Люди уходили на работу, а Аньку с васькой оставляли. Василий Иванович спал, беспомощно открыв рот, а Анька смотрела телевизор, но по нему давно не говорили ничего нового. Выходило, что во всех бедах виноваты хазары и васьки: хазары — потому что воюют, а васьки — потому что обжирают. И с теми, и с другими обещали в ближайшее время разобраться. Что делают с арестованными васьками — не уточнялось, но по телевизионным интонациям Анька научилась догадываться кое о чем. Загнанные люди, привыкшие отовсюду ждать опасности, вообще очень понятливы.</p><p class="p1">Родителям она звонила два-три раза в неделю. Отец кричал, что объявил ее в розыск, но Анька знала, как разыскивают: она смотрела однажды передачу про трех сбежавших подростков, ее ровесников, и отлично знала, что милиция давно разучилась искать пропавших. Воевать с васьками было проще: ваську ни с кем не спутаешь, да он и не убежит. Так что она не возражала против объявления в розыск. Мать плакала и упрашивала вернуться, и Анька сказала, что обязательно вернется, как только препроводит Василия Ивановича в безопасное место. В самом деле, она думала вернуться домой сразу после Алабина, потому что там-то уж о Василии Ивановиче будет кому позаботиться. Не все же ей. Она очень устала за него отвечать. Василий Иванович ничего не умел сам, да вдобавок обленился, живя у них. Он уже плоховато видел, даже в очках, и Аньке самой приходилось оглядываться — нет ли патруля. Он быстро стал опускаться, как только они начали странствовать. Почти перестал мыться. Не менял одежду. Говорил, что страннику все это без надобности. Аньке было и противно, и стыдно ходить с ним, с таким. Его товарищи, которых он отыскивал в городах, в самых странных и неподходящих местах, были еще грязнее и зловоннее, и лица у них были желтые, и язвы по всему телу. Но ничего не поделаешь — васька другим быть не может. Васьки — хранители знаний, а за такой статус надо платить. Анька скоро перестала ими брезговать и научилась жалеть, и даже делала некоторым перевязки, как учили в школе на уроках противного, пригодившегося наконец ОБЖ.</p><p class="p1">Василий Иванович рассказывал ей уже не сказки, которых знал великое множество, но для которых было теперь не время. Он рассказывал историю — ту ее версию, которой придерживалось коренное население. Этому не учили в школе, этого не излагали даже по телевизору в программах типа «Цивилизации». Коренные населения знали эту тайну, но унесли ее с собой — в воду, в огонь, в землю. Чудом уцелело только наше коренное население, жившее в тихой долине между Волгой и Доном, а оттуда распространившееся по югу и востоку Европы. С севера на них пришли русы — варяжские захватчики, не имевшие своей земли, скитавшиеся в поисках битв и добыч. С юга — хазары, торговцы, ничего, кроме торговли, сроду не умевшие. В мирной долине между Волгой и Доном варяги схлестнулись с хазарами, а коренное население, пригнувшись, наблюдало. Ему перепадало, конечно, от тех и других, но главный интерес захватчиков был не в угнетении, а во взаимном истреблении. От угнетения они все время отвлекались друг на друга, и коренное население, как причудливая кистеперая рыба, умудрилось досуществовать до наших времен, донеся из древности чудные предания о золотом веке.</p><p class="p1">— Повезло, — говорил Василий Иванович, — ах, как повезло!</p><p class="p1">У Василия Ивановича выходило, что и Сократ пострадал за принадлежность к коренному населению, называвшемуся эллины, а греки — это захватчики. Греки всех пытались захватить, и тихих коренных троянцев тоже. Это они все наврали про Елену, не было никакой Елены, потому и описаний ее у Гомера нет — так, мол, прекрасна, что не опишешь. Какая же война из-за женщины, тем более на десять лет?!</p><p class="p1">— Василий Иванович, — спрашивала Анька, — а за что же они вас так не любят? Захватчики-то?</p><p class="p1">— Да как сказать, Анечка, — вздыхал Василий Иванович. — Наверное, сначала они даже и любили. Потому и захватили. А как увидели, что ничего с нами не сделаешь, — так и возненавидели. Северные — за то, что жить хотим. Они этого не любят, чтобы кто-то жить хотел. А южные — за то, что работать можем. Они не любят, когда кто работать может. Так и живем — то жизни нету, то работы.</p><p class="p1">Про яблоньку и печку он тоже рассказывал, потому что печка и яблонька были наши, настоящие, главное чудо нашей неутомимо рожающей земли. Стояли они в Дегунине, но не в самой деревне, а подальше, в лесу, — две главные святыни коренного населения; яблонька сама плодоносила, печка сама пекла… «Вот увидишь», — говорил Василий Иванович. Он обещал показать Аньке Дегунино, и они шли туда весь месяц, но приходилось все время прятаться — облавы следовали одна за другой. Василий Иванович вел Аньку долгим кружным путем. В Дегунине что-то должно было решиться. Почему — Василий Иванович сам не понимал. Он знал только, что там не пропадет.</p><p class="p1">А сказок у него хватило бы на самую долгую дорогу. И у всех васек было их много.</p><p class="p1">В некоторые Анька верила с трудом. Ей особенно трудно было поверить, что страной по очереди управляют двое захватчиков, но, поразмыслив, она поняла, что давно о чем-то подобном догадывалась, только формулировала это иначе. Какая-то родовая травма тут непременно была, иначе почему этот народ так стремился все время разделиться на два? Про западников и славянофилов им рассказывали в школе, причем выходило, что западники очень ужасны, а славянофилы во всем правы, но Анька понимала, что самое ужасное началось как раз после их окончательного разделения. Пока они здоровались при встрече и пили чай, все еще было нормально, а как они начали по очереди демонстрировать друг другу правильное государственное устройство — тут-то кровь и полилась. Но ведь еще до западников и славянофилов был раскол. Как-никак Аньке было четырнадцать лет, и она хорошо все помнила про раскольников. У нее не укладывалось в голове, как можно сжечь себя за веру. Эти люди убивали себя таким изуверским способом за что-то другое, столь же древнее и изуверское, а Бога и троеперстие подверстали к этому только за компанию. А еще до этого они столь же зверски раскололись на земщину и опричнину, и тоже никого не жалели, и все было, как во время гражданской войны, — причем всякая гражданская война тут очень быстро забывала о своем поводе и превращалась в чистое самоистребление, словно от отчаяния, что никакого выхода не предвидится и ничья победа не будет окончательной. Всякий раскол здесь прекращался только для того, чтобы тут же породить новый. А еще до опричнины было хазарское иго, про которое теперь в школе открыто говорили, что называть его татарским — грубая историческая ошибка, потому что татары были мусульманами, исторически нам дружественными, и даже пытались защитить нас от хазар, сражаясь на нашей стороне. Россия всегда раскалывалась, только этим и занималась, и раскол этот всегда шел по одной и той же линии: одни защищали прошлое, которого не было, а другие — будущее, которого не будет. Так что сказки Василия Ивановича были похожи на правду, даже если бродячие васьки все это выдумали для оправдания нынешнего своего положения.</p><p class="p1">Анька еще раз убедилась, что в газетах никогда не писали правды. Васьки не были выходцами из тюрем или ворами, и даже алкоголики среди них попадались не так уж часто. Спиртное было опасно главным образом для варягов или хазар, впадавших от него в буйство, а коренному населению водка помогала войти в транс, нагоняла тихую мечтательность и позволяла увидеть удивительные штуки. Васьки пили много, но без всякого вреда для организма. Вред им приносила бродячая жизнь, погода, побои милиции, — а в остальном им не было переводу, и ходить по своим кругам они могли бы вечно.</p><p class="p1">Больше всего Аньку удивляло то, что далеко не все васьки стремились в Алабино. Многие надеялись пересидеть зачистку по окраинам, или у добрых людей, или в лесах. Зачищали выборочно, авось всю землю не пройдут. Василий Иванович был у васек на особом счету. Его уважали, с ним советовались, да и на саму Аньку смотрели почтительно: все-таки она была не просто так, а с ним. Анька не понимала, как могут люди настолько не заботиться о себе. Синдром Василенко в том и выражался, что человек не мог элементарно себя обслужить, не думал о будущем, не заботился о ночлеге и гигиене, и у него были серьезные проблемы с принятием решения. Василий Иванович мог решить хоть что-то, а, например, васька Коля, с которым свела их судьба на одной брошенной даче, два часа стоял на распутье меж двух дорог, пытаясь решить, по которой идти. Он делал несколько шагов по одной, возвращался, переходил на другую — ничего в конце концов не решил, плюнул и пошел обратно.</p><p class="p1">Василий Иванович, конечно, уговаривал всех бежать либо в Алабино, либо уж через горы, в Азию. Но васьки были удивительно покорным народом: их ловили, а они не убегали. Кроме того, почти все они были изранены или больны: после того, как закрылись васятники, те, кого никуда не взяли, с трудом привыкали к прежней жизни. Они уже привыкли, что по утрам дадут каши, а в обед — жидкого супу, и добывать себе пропитание им было теперь трудно. А когда их начали ловить, сил у них совсем не осталось — от страха и обреченности. Она понимала теперь, что и Василий Иванович без нее точно бы пропал, не добравшись до Алабина: он уже много раз хотел свернуть с пути, вернуться в город, где они уже были, и обходить его кругом.</p><p class="p1">— Понимаешь, Анечка, — говорил он виновато, — не очень нам просто вот так, сразу…</p><p class="p1">— Какое же сразу, Василий Иванович?! — устало говорила Анька. — Какое сразу, когда мы и так идем кружным путем?</p><p class="p1">— А и правильно, и правильно, что кружным, — лопотал Василий Иванович. Он говорил теперь тихо и временами неразборчиво. — Мы люди кружные, Анечка, мы напрямую не ходим…</p><p class="p1">Сам Василий Иванович по старости и слабости пошел в васятник, а до этого так беспрерывно и нарезал круги по Москве и Московской области. Если верить ему, он так и стал васькой: ехал однажды с работы и вдруг почувствовал, что не может попасть домой. Но об этом он обещал рассказать в другой раз.</p><p class="p1">Кстати, Анька очень удивилась, узнав, что беспризорные дети — далеко не сплошь васята, и более того — едва ли не главные враги васек. Васятами были только те, кого беспризорники с их звериным чутьем выгнали из сообщества. Беспризорники распознавали чужаков безошибочно. Это они по ночам нападали на васек, били их и мучили, а васьки никуда не могли пожаловаться. Беспризорники были дети пришлого населения, которому до того надоело все на этой чужой земле, что и собственные дети казались чужими, ненужными. Тут никто ни о ком не заботился, и родители спивались, не думая о детях, и дети шатались по улицам, сбиваясь в страшные стаи. Этих Анька боялась больше всего: у взрослых были хоть остатки совести, а у этих совсем ничего.</p><p class="p1">— Василий Иванович, — спросила Анька однажды, — а я — коренное население?</p><p class="p1">— Не знаю, Анечка, — робко сказал Василий Иванович. — А сама ты как хочешь?</p><p class="p1">— Вот и я не знаю, — сказала Анька. Она действительно не знала. Ей до сих пор было странно, что она ходит с васькой, доставляя его в неведомую деревню Алабино, скитаясь по электричкам, заброшенным деревням и дачным поселкам. Ей очень не нравилась такая жизнь, часто негде было помыться, она успела один раз простыть, — ничего хорошего нет в том, чтобы принадлежать к такому населению, которое само не знает, чего хочет, и может два часа стоять на распутье, виновато почесывая в затылке. Но от Василия Ивановича исходила не совсем понятная сила, которая и делала это путешествие переносимым для хрупкой Аньки: что-то в нем было родное, роднее родителей, и в сказках его — что-то исконное, тайное, чего никто, кроме нее, не мог знать; Василий Иванович был безусловно свой, и Анька продолжала до слез жалеть его. Он был похож на Акакия Акакиевича, только лучше, потому что никогда не сидел в скучном департаменте. Впрочем, может быть, когда-нибудь и сидел.</p><p class="p1">Однажды, когда они с Василием Ивановичем ночевали на свалке близ города Тамбова, в котором не оказалось добрых людей, четверо васек — с Василием Ивановичем выходило пятеро — сидели у костра и рассказывали каждый свою историю, о том, как впервые ощутили в себе предназначение и ушли странствовать. Это ведь не просто так, это у каждого по-разному. Жил человек, и вдруг ушел. Костер горел жарко, и пахло от него не свалкой, а дымом, родным дачным запахом. Васьки любили костер — как раз за то, что он из зловония делает дым, а свалку окутывает уютом. Вокруг костра темно, и потому свалки не видно, зато лица сидящих ярко и причудливо озарены. И если на лице язвы или струпья, их можно принять за тени.</p><p class="p1">Первым рассказывал васька Михаил Егорович.</p></span><span id="id91"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Михаил Егорович, если верить его рассказу, спокойно прожил двадцать семь лет, пока в один прекрасный день, ранним июньским утром, его не вызвали в организацию, которой в России боялись больше всего. Организация эта бывала по очереди то варяжской, то хазарской, поддерживала то один, то другой тип государства, но к врагам этого государства бывала одинаково беспощадна. Вызов туда не сулил ничего хорошего, даром что время настало вроде как свободное, распад Союза. Михаил Егорович не был тогда васькой и многого не понимал. Ему казалось, что все движется ко благу.</p><p class="p1">Дом, куда его вызвали, был ничем не примечателен. Михаил Егорович сто раз ездил мимо него на работу, не обращая внимания на белую пятиэтажку. Вывески не было — мало ли, может, ведомственная поликлиника… Это и было районное управление, которое теперь упразднялось. Василий Иванович никогда еще тут не был. В кабинете 402, куда его вызвали, уже сидел посетитель, и пришлось подождать у двери. Наконец бородатый мужик вышел в коридор, прижимая к груди растрепанную папку. Глаза у мужика были огромные, насмерть перепуганные. Он мельком глянул на Михаила Егоровича и стремглав побежал к выходу.</p><p class="p1">Михаил Егорович робко вошел. Человек с неопределенной внешностью, стертый, но подтянутый, протянул ему папку. Хозяин четыреста второго кабинета был изысканно вежлив, как все плохо воспитанные люди. Хорошо воспитанный человек разговаривает просто, ему незачем прятать под изысканной вежливостью свою ужасную, кровожадную душу, занятую только подмечанием чужих пороков и слабостей. У него не такая душа, а у хозяина кабинета была именно такая. Он объяснил Михаилу Егоровичу, что операция, в которой они оба участвовали, — один в качестве куратора, другой в качестве объекта, — закончилась, и весь отдел в связи с известными переменами расформирован. Вы можете быть совершенно свободны, Михаил Егорович, сказал стертый человек с блеклыми глазами. Вот ваше личное дело. Оно списано и, согласно распоряжению новой демократической власти, поступает в полное ваше распоряжение.</p><p class="p1">— А за что на меня дело? — растерянно спросил Михаил Егорович.</p><p class="p1">— Почему обязательно за что-то? — пожал плечами изысканно вежливый хозяин кабинета. — Это была программа, в рамках которой, так сказать… Теперь, в связи с расформированием отдела и сокращением штатов…</p><p class="p1">— Но могу я узнать, что это за программа?</p><p class="p1">— Вы все узнаете из дела, — сказал стертый человек, давая понять, что разговор окончен. Михаил Егорович вышел и, прижимая папку к груди, отправился домой.</p><p class="p1">Он раскрыл ее еще в троллейбусе. Там была его фотография — строгая, как на документы, но он не помнил такой. Наверное, кто-то сфотографировал его скрытой камерой. Дальше была анкета, заполненная не его рукой, а из остальных документов с непреложностью явствовало, что вся биография Михаила Егоровича была результатом чужой направленной деятельности, тайной сосредоточенной воли, — и все, что казалось ему счастливой или несчастной случайностью, происходило не просто так. Его устроили именно в тот детский сад, и именно в ту школу, куда не взяли, между прочим, девочку, с которой он дружил в детском саду, после чего она с ним разругалась навсегда. Школа была английская, престижная. В свой институт Михаил Егорович поступил потому, что на мехмат университета его не взяли, и тоже по звонку из соответствующей организации: работу-то он написал прилично. И в школу его распределили по звонку. И даже жена его была подобрана специально, после конкурса. Она, правда, об этом не знала, но пригласительный билет на тот вечер, где они познакомились, ей подкинули через местком ее института.</p><p class="p1">Михаил Егорович долго не знал, что ему делать с этой папкой и со своей жизнью, выстроенной по чужой воле. Главное, что и спросить было не у кого. Всемогущая структура, затеявшая весь этот эксперимент с непонятными целями и темным исходом, была частично расформирована, а частично ушла в подполье. Когда Михаил Егорович, измучившись сомнениями, снова пришел в белое здание, похожее на поликлинику, там уже шел ремонт и никого не было. Михаил Егорович долго думал, рассказать ли ему жене обо всех этих странностях, но потом решил, что не надо. Папку он уничтожил — сжег на даче, на костре. Одна мысль днем и ночью глодала его: что, если и вручение ему папки было частью эксперимента, и вся его жизнь была по-прежнему детерминирована? Страшные вещи начали мерещиться ему. Поздний прохожий смотрел со значением. По ошибке попавшее в ящик письмо содержало тайный сигнал. Вся история с распадом Союза была затеяна ради Михаила Егоровича, которому теперь, чтобы съездить к украинскому дядьке по материнской линии, требовалось пересекать границу. И так далее.</p><p class="p1">Михаилу Егоровичу надоело жить чужую жизнь и захотелось прожить свою. Но чтобы прожить свою, надо было полностью отказаться от прежней. Он оставил жену и ребенка, переехал к другу, потом к матери. Ей-то его никто не подбрасывал. Правда, в папке содержалось темное указание на то, что мать собиралась делать аборт по медицинским показаниям, но врачу деликатно намекнули, чтобы не смел, даже не думал, — и Михаил Егорович родился. Стало быть, здесь тоже было не без умысла, — и Михаил Егорович съехал от матери. Правда, снимать квартиру ему скоро стало не на что, потому что с работы он тоже ушел. Это была не его работа, а впрочем, в это время работу меняла вся страна, и Михаил Егорович опять оказался в струе. Он уже не знал, где история, где паутина чужого замысла, а где его собственная воля. Эту часть его рассказа Анька понимала очень хорошо, потому что тоже этого не знала. Из истории давно исчез смысл, поэтому во всех фильмах и большинстве книжек ее стали представлять результатом заговора иллюминатов или масонов. В приключениях Михаила Егоровича была своя логика. Когда человек не знает, зачем живет, ему трудно понять, где он, а где заговор.</p><p class="p1">Михаил Егорович сменил несколько работ, вплоть до самых экзотических, но ни одна не казалась ему своей. Скоро он понял, что и страна не совсем его. Самым печальным оказалось то, что он не мог теперь довести до конца ни одной линии в своей судьбе: всякое завершенное действие казалось ему искусственно подстроенным. Надо было все время ломать чужой замысел: тайные кураторы ждут, что ты пойдешь налево, но ты в последний момент передумаешь и пойдешь направо. Анька и это понимала: она читала в одной книжке про человека, сошедшего с ума в концлагере. Там еженедельно расстреливали каждого четвертого, и он всякий раз оставался в живых. Он уцелел, но потерял рассудок. Ему тоже казалось, что весь мир — заговор, но можно его сломать, если все время менять какую-нибудь одну деталь. Например, заговор строится на том, что все граждане Советского Союза ставят тапки на ночь носами от кровати. Он же ежевечерне ставил их носами к кровати, допуская, что этот крошечный сдвиг может порушить всю конструкцию. Так и Михаил Егорович, уверенный, что каждое его действие предопределено. В последний момент он всегда включал свободу воли. Однажды он привел к себе женщину, которая ему нравилась, но в решительную минуту вдруг зажег свет и сказал, что ему надо срочно садиться за работу, — и женщина ушла, злая и недоумевающая. А Михаил Егорович ликовал. Он порушил замысел. Только одинокой ночью ему пришло в голову, что, возможно, эта-то его внезапная перемена в мыслях и была частью замысла — не просто же так ему дали папку. Может, так и было задумано, чтобы он теперь ничего не доводил до конца? Михаил Егорович обиделся и решил совсем уехать из города.</p><p class="p1">Он поехал на автовокзал, сел в ближайший автобус и поехал, куда фары глядят. Впрочем, на полдороге ему пришло в голову, что если он приедет в конечный пункт, это тоже может оказаться частью замысла. Была ночь. Он сошел на остановке среди пустого поля — когда-то здесь была деревня, но теперь чернело бесприютное сиротливое пространство, в котором ему предстояло жить до конца дней. Это пространство и было свободой воли. Надо было, однако, подумать о ночлеге. Вдалеке светились два слабых огонька. Михаил Егорович пошел на правый, но на полдороге свернул к левому. Он постучался в серую избу, стоявшую на окраине полупустой деревни. В избе старуха пряла бесконечную пряжу и пела бесконечную песню на незнакомом Михаилу Егоровичу языке. Все слова в нем были как будто привычные, русские, но стояли в странном порядке. Он узнал только одну строчку — «Не одна в поле дороженька». Дальше на дороженьку нанизывались новые и новые эпитеты, смысла которых Михаил Егорович не понимал, но странным образом это его не тревожило. Он понимал, что здесь его не обидят. Гораздо страннее было другое: он все время чувствовал чей-то взгляд. Старуха, впустив его, вернулась к пряже и на Михаила Егоровича не смотрела. Взгляд шел из угла. Там, на кровати, на груде тряпья, сидел хмурый бородач, которого Михаил Егорович сперва не заметил. Этот человек был очень худ и грязен, но по взгляду его еще можно было узнать. Это был тот самый бородач, который вышел из четыреста второго кабинета прямо перед ним, — вышел, испуганно озираясь и прижимая к груди растрепанную папку.</p><p class="p1">Михаил Егорович посмотрел ему в глаза и кивнул. Оба они пришли туда, куда нужно, и с этого дня скитались по пустому пространству, в попытке соответствовать более высокому замыслу, чем эксперимент всемогущей организации.</p><p class="p1">Следующим рассказывал васька Саша, человек еще не старый, лет тридцати пяти, и очень вежливый.</p></span></span></span></span>
