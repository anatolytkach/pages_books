<p class="p">2</p>
</div><p class="p1">Плоскорылов занимался. Надо было подготовиться к завтрашней лекции — вводной по теме «Нордический путь».</p><p class="p1">Он сидел за чисто выскобленным столом в избе молодой солдатки Марфы. Курсе на втором-третьем, во времена молодых заблуждений, о которых он вспоминал теперь со снисходительной улыбкой, видя в себе тогдашнем чуть ли не собственного сына — так много было прожито и передумано за последние семь лет, — он непременно усмотрел бы в таком поселении евангельский подтекст: его умилило бы то, что Марфа готовит ему с особенным тщанием, подает на стол расторопно и смущенно, с робкой улыбкой, а лекции его и советы по куроводству слушает внимательно, но явно ничего не понимает: откуда, в самом деле, простой крестьянке было понимать духовное куроводство! Теперь, отлично зная истинную природу христианских легенд, Плоскорылов отлично видел всю хазарщину этой веры, всю ее дешевизну и безвкусность с точки зрения великого холода; но на молодые умы и горячие сердца такие побрякушки иногда действовали неотразимо. Что же делать, если в оны времена мудрому варягу Владимиру пришлось в целях мимикрии среди враждебного окружения принять насильственную ЖДовскую веру! Нынешнему варягу нужно было созреть, чтобы сбросить ЖДовский бред, к которому сами ЖДы относились с нескрываемым пренебрежением. Гуров был прав: чтобы их победить, нам надо немного стать ими и хорошенько у них поучиться — и по части пренебрежения к собственной новозаветной придумке, и по части поразительной национальной монолитности (мы-то далеко не во всем солидарны), и по части воспитания детей: невротизация потомства, которое с первого класса учат быть лучше всех и ненавидеть враждебное конкурентное окружение, была отличной идеей — Плоскорылов и сам рос невротиком, с детства окруженным тысячью страхов и таинственных предчувствий, и только этому был обязан вундеркиндски быстрой карьерой. К христианству Плоскорылов относился теперь, как истинный хазар: внешне соблюдал пиетет, внутренне глубоко презирал. Поэтому он уже не умилялся Марфе и не говорил ей с отеческой улыбкой: «Марфа, Марфа! ты избрала худшую часть!» — как сказал бы лет семь назад, глядя, как она хлопочет по хозяйству. Нынешний Плоскорылов вообще не метал бисера перед коренным населением.</p><p class="p1">«Нордический путь» был основой правильного офицерского мировоззрения. С его помощью обосновывались тяготы и лишения, и в первую очередь холод. Вначале следовало объяснить, почему в армии принято говорить не «Север», а именно «Норд». Это было слово из родного санскрита, с далекой прародины. Пошлое и вдобавок ругательное «Север», почерпнутое у коренного населения, годилось только для простонародья, но не для воинской аристократии. «Нар» — древний, славный санскритский корень. Он обозначает воду, но не абы какую, а стремительно текущую. Нара — санскритская река, нары — санскритская кровать (обозначение, восходящее, вероятно, ко временам, когда арии спали в лодках во время долгих морских странствий), Нарцисс — юноша, залюбовавшийся своим отражением в воде; истинный воин обязан быть нарциссом, любить себя до дрожи, до сладкого возбуждения, — Плоскорылов был истинный нарцисс, не упускающий случая полюбоваться собою в зеркале. Он вел тайную тетрадь своих успехов — кто и что ему сказал, как и когда похвалил; плохого Плоскорылов не фиксировал — для чего запоминать ерунду? Нар, нор — гордое санскритское слово, наследие арийцев, выше всего ставящих Норд, норов, северную прародину Норильск, строгую воинскую норму и суровую минорную музыку.</p><p class="p1">Русские, или русы, — великий северный народ, согнанный с места похолоданием; но похолодание было неслучайно — у природы (упоминать чуждого христианского Господа в арийских лекциях Плоскорылов избегал) была особая цель. Истинной причиной оледенения было то, что срединные народы, живущие в глубине материка, нуждались в просвещении. Это просвещение и принесли им арии — русоволосые, высокие воины, проводившие дни в овладении боевыми искусствами и магическими ритуалами. Под руководством вождя Яра, о котором сообщала Влесова книга, русы вышли из Гипербореи и устремились на плодородные земли, где жили дикие племена. Племена уже умели обрабатывать эти земли, но не знали, зачем, то есть для кого.</p><p class="p1">«Дальняя Тула, — писал Плоскорылов круглым почерком, высунув язык и любуясь своей пухлой рукой, пухлыми буквами, пухлой тетрадью, — была вотчиной дальних северных оружейников, и, придя в новые благодатные края, они тотчас учредили здесь свою Тулу. Город прославился оружием и славится им до сих пор. Глубоко не случайно и отчество Соловья-Разбойника — Рахманович, а самые рахманы, как утверждают былины, были мудрецами и жили на краю земли. Не вызывает сомнения, что это брахманы — жрецы высшей расы, жившей на крайнем севере и исповедовавшей индуизм. Впоследствии они ушли с севера и основали вначале славянскую, а затем древнегреческую и индийскую цивилизации»…</p><p class="p1">Гуров, как всегда, возник словно ниоткуда — не предупредив, не давши Плоскорылову шанса как следует «прорубиться», то есть, в переводе с грязного солдатского сленга, выказать себя с наилучшей стороны. Плоскорылов видел особенный воинский шик в том, чтобы при встрече с личным другом — у него были все основания видеть в Гурове старшего брата, так явно выделял его московский инспектор, — соблюсти максимум воинского этикета; ловя в глазах Гурова признаки начальственного одобрения и даже любования достойным учеником, — а кое в чем Плоскорылов уже и превосходил инспектора, но даже наедине с собою не всегда признавался, что понимает это, — внешне он оставался скромнейшим войсковым политруком, знатоком солдатских нужд, тихим работником фронта, привыкшим к ежеминутному риску. Любо ему было аккуратно доложиться, откозырять, застенчиво подать руку для поцелуя (Гуров был все-таки лицо светское, при всех своих семи ступенях, и обязан был приветствовать капитан-иерея по всей форме), рапортовать о случившихся происшествиях и только потом по-братски, по-варяжски, влажно и троекратно расцеловаться с другом. Гуров, однако, часто пренебрегал ритуалом — вероятно, на седьмой ступени он уже не так нуждался в повседневной интеллектуальной дисциплине, а может, ритуалы там были настолько сложны, что не Плоскорылову было их понять. У декана богфака, например, была только восьмая, и то президент при встрече становился перед ним на колени. На пятой можно было то, чего нельзя на первой, на четвертой рекомендовалось то, что исключалось на третьей, и все это сочетание взаимоисключающих правил, когда одному можно одно, а другому — принципиально другое, Плоскорылову представлялось главной доблестью варяжства, той самой цветущей сложностью, о которой писал он когда-то первое курсовое сочинение, отмеченное бесплатной поездкой в Аркаим.</p><p class="p1">Гуров всегда входил неслышно, не стукнув дверью, не скрипя половицами, и отлично ориентировался в жилищах коренного населения, словно сам не один год прожил в избе. Плоскорылов обернулся, вскочил, оправил рясу и, приняв стойку «Смиренно», приступил к рапорту, но Гуров, как всегда, не дал ему блеснуть:</p><p class="p1">— Вольно, вольно, иерей. Здоров?</p><p class="p1">Плоскорылов, не зная, куда девать повлажневшие от радости глаза, сунул ему руку, к которой Гуров быстро наклонился, и радостно полез целоваться.</p><p class="p1">— Рад, — повторял он со слезами в голосе, — рад и тронут. Спасибо. Не поленился, приехал.</p><p class="p1">На передний край. Очень, очень рад.</p><p class="p1">От него не укрылось, что Гуров морщится скорее по обязанности, а на самом деле очень доволен, видя младшего друга в бодрых трудах.</p><p class="p1">— Как служба? — спросил инспектор, усаживаясь за стол, словно век прожил у Марфы. С коренным населением у него были особые отношения — если к Плоскорылову крестьяне относились уважительно и робко, никогда не признавая его своим, то Гурова они любили, как, должно быть, рабочие любили Ленина: признавая его врожденное право возглавлять и владеть. Так и теперь — Марфа вошла, увидела Гурова, в пояс поклонилась и принялась собирать на стол. Плоскорылов немедленно спрятал конспекты.</p><p class="p1">— Не надо, не надо, сыт. Что, Марфа, не забижает иерей?</p><p class="p1">— Как можно, — потупившись, сказала Марфа.</p><p class="p1">— От мужика твоего есть вести?</p><p class="p1">— Писал, — кивнула она. — Вроде живой.</p><p class="p1">— Добро. Эх, устал. Кости ломит. Шел баран по крутым горам, вырвал травку, положил под лавку. Кто ее найдет, тот и вон пойдет. А, Марфушка?</p><p class="p1">Марфа поклонилась и вышла. Плоскорылова всегда удивляло пристрастие инспектора к варварским считалкам и припевкам, изобличавшим всю плоскостность мышления коренного народа, — вероятно, на седьмой ступени предписывалось заигрывать с крестьянами и даже жалеть их с недосягаемой высоты; Плоскорылов свято соблюдал иерейские заповеди о дистанции, несмешании и снисхождении без послабления.</p><p class="p1">— Слышь-ко, иерей, — с великолепной воинской небрежностью сказал Гуров; седьмая ступень могла позволять и даже предписывать эту небрежность, тогда как на шестой требовались усердие, прилежание и то, что на солдатском варварском языке называлось «зубцовостью». — Смершевец-то наш все бдит?</p><p class="p1">— Да, знаешь, я доволен. Он хотя и простой малый, но чудесный специалист. Одного разложенца так выявил, что любо. Оказался хазарский агент, и какой! Ничем себя, мразь, не обнаруживал. Но пораженец классический. Жаловался матери, распускал пацифистские сопли. Завтра будем кончать.</p><p class="p1">— Пораженец? — промурлыкал Гуров. Он был теперь похож на большого довольного кота — полный, уютный, — но Плоскорылов знал, какое стальное у него тело и как мгновенно, пружинно он подбирается, заслышав внятный ему одному зов боевой трубы. — Пор-раженец — это хор-рошо… пор-рождение ехидны… Когда он его выцепил?</p><p class="p1">— Дня четыре назад. Долго колол, но ты же его знаешь — он нипочем не отступится…</p><p class="p1">— Хоть без рукоприкладства?</p><p class="p1">— Зачем ему, он спец. Так его обработал — крыса в ногах у него валялась, лизала сапоги.</p><p class="p1">В варяжских кругах особенно ценилось выражение «лизать сапоги», и Плоскорылов, зная любовь Гурова к традиционной варяжской фразеологии, не упускал случая упомянуть дорогие архетипы.</p><p class="p1">— Хор-рошо. Я его сам посмотрю. Ты Евдокимова не думаешь на посвящение представлять?</p><p class="p1">— Я бы его сразу на пятую представил, — доверительно сказал Плоскорылов, чуть понизив голос. Было неизъяснимым наслаждением на равных обсуждать с посвященным представления, награды и прочие карьерные подвижки. — Но ты же знаешь, он без высшего…</p><p class="p1">— Ну и зачем смершевцу высшее? Ты думаешь, у самого, — Гуров возвел глаза, — Академия за плечами? Все сам, своим горбом. Представляй, представляй. По нему пятая ступень давно плачет. Сам-то про инициацию думаешь?</p><p class="p1">Плоскорылов смутился. Он проклинал свою способность мгновенно, девически-нежно краснеть.</p><p class="p1">— Наш долг, инспектор, — служить нордическому Отечеству, а прочее в руках Одина…</p><p class="p1">— Ну ладно, перед своими-то, — ласково осадил его Гуров. — Ты еще каблуками щелкни. Каблуками пусть Пауков щелкает, а ты, иерей, готовься. Я ведь не просто так езжу, секешь?</p><p class="p1">Плоскорылов поднял на инспектора глаза, полные собачьего обожания.</p><p class="p1">— Да, да. Ты парень не из простых, я за тобой не первый день слежу. Такие знаешь теперь как ценятся? Сам видишь, настоящий варяжский дух в войсках — редкость почти неслыханная. А у тебя в штабе все уставники один к одному. Значит, внедряешь. Ты думаешь, тебе вечно в Баскакове болтаться? Подожди, еще преподавать в академию пойдешь. Без войскового опыта ничто не делается. Сам займусь. Не красней, не красней, нечего. Мне тебя повидать — праздник. Инициировать тебя будем в августе, лучший месяц для таких дел. Знаешь, кто посвятит-то?</p><p class="p1">— Не смею надеяться, — улыбнулся Плоскорылов. Он не допускал и мысли, что Гуров доверит инициацию кому-то другому.</p><p class="p1">— Корнеев, — сообщил инспектор, заговорщицки улыбаясь.</p><p class="p1">Такого шока Плоскорылов не испытывал давно. Корнеев был вечный дневальный — нерасторопный, огромный солдат с пудовыми кулачищами, тупой, как сибирский валенок, и категорически неспособный к воинской науке.</p><p class="p1">— Рядовой? — переспросил иерей.</p><p class="p1">— А какой же? — отечески улыбнулся Гуров. — Ты думаешь, все так просто? Нет, милый, седьмая ступень должна быть везде. И среди рядового состава есть наши… а как мы иначе узнаем о фактах недозволенного обращения? Кто за офицером присмотрит? Ты много не разговаривай об этом, но к Корнееву присмотрись. Он у нас такой… инициатор. Через него все лучшие прошли.</p><p class="p1">— И ты? — тупо спросил Плоскорылов.</p><p class="p1">— Почему я? — улыбнулся Гуров. — Меня… ну, узнаешь когда-нибудь. У меня вообще все не как у людей. Готовься, капитан. Числа восьмого и займемся. И вот еще что, — я, собственно, давно тебя спросить хочу… Тут девочки новой, из туземок, не появлялось?</p><p class="p1">Ни в лице, ни в голосе Гурова ничего не изменилось, но Плоскорылов привычным чутьем сразу угадал, что инспектор заговорил серьезно, и сквозь кажущуюся небрежность проступила наконец внутренняя сталь.</p><p class="p1">— Никого нового не замечал. А что?</p><p class="p1">— Ты присматривай, присматривай, — не вдаваясь в объяснения, как и подобало варяжскому командиру, продолжал Гуров. — Она может к вам прийти… причем не одна, улавливаешь? Она прибудет с таким мужчинкой лет сорока пяти, я тебе фотокарточку оставлю, — он полез в нагрудный карман френча и вытащил фото: представительный, с проседью, типичный чиновник уставился на Плоскорылова с тем тайным сознанием превосходства и вседозволенности, которое пробивалось у работников федерального уровня сквозь любой европейский лоск. — Ее фотоморды у нас покуда нет, но я уж расстараюсь. Если они куда и направятся, то к тебе. Либо в Дегунино, но уж там я ее лично перехвачу. Смотри, иерей, это очень серьезно. Если ты ее поймаешь — считай, полковничья звезда тебе обеспечена.</p><p class="p1">Плоскорылов второй раз за полчаса вспотел от неожиданности.</p><p class="p1">— Шахидка? — понимающе спросил он. — Предательство?</p><p class="p1">— Вроде шахидки, — кивнул Гуров, но Плоскорылов, отлично его изучивший, понял: все гораздо, гораздо серьезнее. — А предательство такое, что никакому Власову не снилось. Они, конечно, могут и поврозь, — но подозреваю, что явятся парой. Так уж ты, иерей, не пропусти. Я на Евдокимова надеюсь, но тут особая интуиция потребна. Не проморгай.</p><p class="p1">— Но, может, ты хоть объяснишь немного… в чем дело, чего от них ждать…</p><p class="p1">— А ничего не жди. Как увидишь новую туземку, так сейчас же мне и докладай. А ее под замок, всасываешь? Под хороший замок. Она может быть беременная, а может и не беременная. Если беременная — значит, сразу лично мне на мобилу скидывай. А как этого увидишь — так разрешаю тебе чпокнуть его на месте, своими руками. Ты человека когда-нибудь убивал?</p><p class="p1">Гуров привстал и наклонился близко-близко к лицу капитан-иерея. Плоскорылов взглянул в его птичьи серые глаза за круглыми стальными очечками и окончательно смутился.</p><p class="p1">— Вижу, — догадался Гуров; он вообще обо всем догадывался мгновенно. — Ну, ничего. Надо же начинать когда-то. Это хорошее будет начало, иерей. Полковнику без крови никак. Сам знаешь, дело прочно. В общем, много не болтай — кто знает, какие у них тут союзники… Я тебя предупредил.</p><p class="p1">— Ну конечно, — горячо сказал Плоскорылов.</p><p class="p1">— Не «конечно», а по форме! — вдруг прикрикнул Гуров. Плоскорылов вскочил, оправил рясу и после секундного позорного промедления взметнул руку:</p><p class="p1">— Служу!</p><p class="p1">— Да вольно, дурашка, — рассмеялся инспектор. Плоскорылов никогда не мог понять, серьезен он или только проверяет его. — Молодца. Любуюсь, сынок. Настоящий варяг… воинская косточка… — Он отвернулся, словно стыдился проявления отеческих чувств. Плоскорылов так любил его в этот момент, что, не колеблясь, послал бы на смерть. Это было высшим проявлением варяжской любви.</p><p class="p1">— Помолимся, инспектор, — предложил он от избытка чувств. Совместная молитва была лучшим, что он мог сейчас предложить гостю.</p><p class="p1">— Думаешь? — поднял глаза Гуров. — Прямо сейчас? Ну пошли.</p></span></span></span></span></span>
