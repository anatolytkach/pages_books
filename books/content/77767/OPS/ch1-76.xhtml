<p class="p">5</p>
</div><p class="p1">Громов с Вороновым шли по темному влажному полю. Летали странные ночные птицы: быстро перепорхнет, зашуршит в траве, перепорхнет снова, — словно и хочет устроиться на ночлег, но все не найдет подходящего места. Может, птицам тоже хотелось спать, но они не могли успокоиться: надо было все время странствовать, иначе можно во что-нибудь превратиться. Но странствовать им не хотелось, поэтому они и попискивали так жалобно: фють-пюить, фють-пюить.</p><p class="p1">Впереди горела, не догорала все та же болотная, зеленая, рыжая заря. Мимо Громова с Вороновым промчался неизвестно куда одинокий конь, мягко стуча копытами по траве. Земля долго еще вздрагивала от его бесцельного бега. Конь тоже не мог остановиться и все странствовал непонятно почему — наверное, хотел наконец осознать себя конем, не варяжским и не хазарским, а каким-то третьим или, допустим, двенадцатым. Лошадью Пржевальского.</p><p class="p1">Все странствовало ночью. Напрасно мы думаем, что ночь — время покоя. Оно, конечно, так, — но такова не всякая ночь. В июле, когда ночами еще светло и стоит над полями средней России долгая зеленая заря, мир таинственно мигрирует. Бродят вдоль железных дорог партизаны, закладывая свою бесполезную взрывчатку; бродят по их следам коренные жители, починяя пути, чтобы не прервалось круговое движение; шуршат ежи, ужи, летят комары. Расседланный конь в поисках седока пересекает призрачное пространство, полное дразнящих запахов. Запертые в монастыре монахи сходятся на строгие ночные дежурства. Ездят машины, а зачем и куда ездят, не знают. Ветер бегает по кругу, почему про него и говорят — на круги своя. Солдаты совершают перегруппировки из одной условной деревни в другую. Светлые облака идут по темному небу, и в разрывах облаков звезды меняются местами, стараясь соответствовать перемещениям земных судеб, чтобы не опозорились астрологи. Так мир представлялся рядовому Воронову, и потому рядовой Воронов не отвлекался ни на усталость, ни на стертую ногу. Он смотрел, как все движется, и ощущал себя частью всего этого сложного движения, у которого не было ни малейшего смысла в общепринятом — варяжском, хазарском или европейском — значении этого слова. Коренному населению вообще трудно было внушить понятия о цели. Ее не было. Коренное население умело упиваться процессом. Вот летают, например, комары. Громов идет и не видит, не чувствует комаров, в лучшем случае может прихлопнуть одного из них, — а ведь сколько вокруг всего! Вот, как дергунчики на веревочках, одни поднимаются выше, другие опускаются ниже, третьи стремительно пикируют, четвертые летят себе на зарю, пятые спиралью восходят вверх, чтобы, подобно шестым, роскошно спланировать в траву, — и еле слышный писк, почти ультразвук, сопровождает их виноватое копошение: простите, что мы вынуждены тут летать, но мы тоже часть з-з-замысла… Так же пищат мыши, водя свои полевые хороводы; Воронов слышал и мышей. Городской житель, он никогда прежде не гулял в ночном поле, хотя, само собой, выезжал на дачу — и там сразу чуть не терял сознания от количества разнонаправленных движений, от идущей вокруг сложной и бурной жизни. Так собака сходит с ума от множества запахов, на которые человек и внимания-то не обратит, как Громов.</p><p class="p1">Зато Громов слышал множество вещей, которые были недоступны Волохову. Привыкнув ждать опасности, он и теперь отслеживал тончайшие движения воздуха — и не упускал из виду ни коня, ни мелких ночных птиц. Конечно, такого внимания так просто в себе не воспитаешь — даже за три месяца учебки и почти два года боевых действий; но у него был опыт поэта, а от поэта до воина гораздо ближе, чем принято думать. Служба, служение… Во всяком случае, с чувством опасности все у него обстояло блестяще, — и потому он ушел от Волохова, потому что не хотел участвовать в его бреде. У него, может, был свой… Странным образом, давним опытом, — потому что поэзия в основном и фиксируется на таких разломах времени, — он чувствовал приближение границы, за которой могли начаться непонятные вещи. Могли не начаться, но скорей всего начинались. Конь прибежал как вестник из другого пространства; по идее еще не поздно было поворотить назад, но долг вел его вперед, к станции. Ни звука не доносилось оттуда, только ряд столбов обозначал железную дорогу. Провода паутинно темнели на фоне рыжей зари. Пахло травой и почему-то порохом, Громов знал и любил этот тревожный запах: словно бой прошел недавно. Но какой тут бой, у кого и с кем?</p><p class="p1">Ни одной живой души не было на станции. Громов и Воронов прибрели к ней в третьем часу светлой июльской ночи. Станция называлась Рюхино. Расписание висело в аккуратно выпиленной рамочке около входной двери: Рюхино — Шабалино, Рюхино — Забава, Рюхино — Васятино. Был один проходящий московский поезд, ушедший, судя по всему, пять часов назад. Ждать до следующего вечера Громову не улыбалось — может, на попутных электричках доберутся? Ближайшая должна была пойти в пять утра. Но на станции, судя по запустению, давно никого не было, и вряд ли останавливалась на ней хоть самая заштатная электричка. Только несколько ржавых паровозов стояли поодаль, да еще один, черный, древний, смутно виднелся впереди.</p><p class="p1">— Что ж тут, вообще ни одной живой души? — спросил Воронов, забыв, что ему не положено открывать рот без особой причины в присутствии старшего по званию.</p><p class="p1">Нет, кто-то здесь был: в пыльном окне на втором этаже красного, разбитого станционного здания еле желтел огонек.</p><p class="p1">— Посмотрю, — сказал Громов. — Оставайся на месте.</p><p class="p1">Он вошел в зал ожидания — пусто, ряды сломанных стульев, забитое окошко кассы… Сверху, однако, доносилось неуверенное постукиванье — словно кто-то одним пальцем печатал на машинке.</p><p class="p1">Громов осторожно поднялся по лестнице, опасаясь зажечь карманный фонарь, чтобы не спугнуть невидимого обитателя. Он двигался ощупью, держась стены. Лестница упиралась в обитую железом дверь. Громов толкнул ее и вошел в длинный коридор, слабо освещенный в конце. Там одна из дверей была приоткрыта, и оттуда-то доносилось неуверенное постукиванье.</p><p class="p1">Там за старинным телеграфным аппаратом, который Громов видел прежде единственный раз в жизни, в музее революции, — сидел красноармеец в островерхой суконной будёновке и, сутуло склонившись над столом, выстукивал неведомое сообщение. Рядом с ним лежал ворох желтых бумажных лент — видимо, с ответными сообщениями.</p><p class="p1">Это было так невероятно, что Громов отошел, ущипнул себя изо всех сил за локоть, снова заглянул в комнату и снова увидел телеграфиста. Он стучал ключом, потом просматривал ленту, выползавшую из допотопного аппарата, шевелил губами, бросал ленту на пол, где скопился уже целый ворох, и снова принимался стучать.</p><p class="p1">Громов не выдержал. Точно крыша едет, подумал он. Он стремглав сбежал по лестнице. Воронов послушно стоял у входа в красное станционное здание.</p><p class="p1">— Воронов, — забыв к чертям обо всякой субординации, сухими губами прошептал Громов. — За мной марш.</p><p class="p1">Воронов перепугался, с него мигом слетело лирическое настроение, — но он пошел за Громовым на второй этаж, стараясь не слишком топотать. Громов тихо приблизился к двери. Красноармейский телеграфист сидел на прежнем месте, выстукивая бесконечное сообщение.</p><p class="p1">Воронов, как ни странно, не удивился.</p><p class="p1">— И что, товарищ капитан? — прошептал он.</p><p class="p1">Громов обернулся. То, что Воронов ничуть не испугался, испугало его самого больше, чем призрак.</p><p class="p1">— Как — что? Ты не видишь, что ли?</p><p class="p1">— Вижу, — робко сказал Воронов. — Телеграфист.</p><p class="p1">— Это же гражданская война, дурак! — еле слышно прошептал Громов.</p><p class="p1">— Ну, — кивнул Воронов. — Так и есть гражданская война…</p><p class="p1">Для него, похоже, все это было в порядке вещей.</p><p class="p1">— Он что, с тех пор и сидит? — в ужасе спросил Громов.</p><p class="p1">— Так она с тех пор и идет, — кивнул Воронов.</p><p class="p1">— Ты что… ты знал, что ли?</p><p class="p1">— Ну… я слышал, — не очень уверенно сказал рядовой. — Говорили. Многие всадников видели. Даже книжка была про всадников со станции Роса. Это вроде летучего голландца, но настоящие. Они до сих пор кочуют, много лет. Потому что война не кончается. Когда кончится, они демобилизуются.</p><p class="p1">— Черт-те что, — сказал Громов. Нельзя было позволять этому бреду завладеть собой. Воронов был явно пьян, налакался, сволочь, пользуясь тем, что Громов совсем его распустил и сам отвлекся. Надо взять себя в руки. Откуда телеграфист? Откуда угодно. Может, кино снимают. Так, бред бреда бредовее. Какое здесь кино? Значит, кому-то просто не хватило обмундирования, и вот ему выдали обмундирование времен гражданской войны. Лежат же на складах консервы пятьдесят шестого года. Нет, ничего этого быть не может, этого нет и никогда не было. Черт бы их драл. Нет. Громов резко шагнул в комнату и тронул телеграфиста за плечо, ощутив под пальцами настоящий ворс настоящей суконной шинели.</p><p class="p1">— А? — телеграфист обернулся и уставился на него красными воспаленными глазами. — Смена, что ли?</p><p class="p1">Нет, смекнул Громов, ни в коем случае не смена. Нельзя, иначе я так и останусь здесь навсегда сидеть за телеграфным аппаратом, как Геркулес остался стоять за Атланта.</p><p class="p1">— Нет, не смена, — сказал он. — Сообщение срочное, браток.</p><p class="p1">— А, — разочарованно сказал красноармеец. У него было желтое, заросшее щетиной, старое лицо — а впрочем, могло ему быть и двадцать, и сорок. Бывают такие крестьянские печеные лица с печатью вечной усталости. — Некогда мне. Сам видишь, чего тут. Во всем недостача. И там нас бьют, и здесь бьют, а подмога не идет, не идет подмога, слышь ты…</p><p class="p1">— Так мне сообщение отправить, — удивляясь собственному спокойствию, сказал Громов. — Вэ че семьдесят пять сто пятнадцать, штаб, инспектору седьмой ступени Гурову. Можешь?</p><p class="p1">— Что, срочно? — устало спросил телеграфист.</p><p class="p1">— Молнию, если можешь.</p><p class="p1">— Валяй свою часть. Сколько там?</p><p class="p1">— Вэ че семьдесят пять сто пятнадцать, — повторил Громов. — Инспектору седьмой ступени Гурову. Ваше приказание не выполнено связи форсмажорными обстоятельствами. Готов нести ответственность. Следую Москву. Капитан Громов.</p><p class="p1">— Москву следуешь? — оторвался от ключа телеграфист. — Что в Москве-то?</p><p class="p1">— Не знаю, только следую.</p><p class="p1">Телеграфист простучал сообщение. Куда он его отправляет, думал Громов, откуда он знает адрес части? Или на этой станции мода такая — рядиться в красноармейское?</p><p class="p1">— Ушло, — сказал телеграфист. — Ответа будешь ждать?</p><p class="p1">— По возможности. Чего пишут-то?</p><p class="p1">— Много пишут, — зло сказал красноармеец. — Из Харькова нас выбили и с Волги подпирают, и на Дону бунтуют, сволочи. Голод в Поволжье, слыхал?</p><p class="p1">— Слыхал.</p><p class="p1">— И товарища Болотова убили, слыхал про такого товарища?</p><p class="p1">— Не слыхал.</p><p class="p1">— Потому и не слыхал, что убили, — мрачно ответил красноармеец. — На Москву через час поезд будет. На третий путь пойдешь, там поезд с углем. Угля надо дать Москве. Влезешь в вагон, через час пойдет. Стой, ответ тебе пошел.</p><p class="p1">Громов замер. Он готов был к любому гуровскому ответу и ждал разноса.</p><p class="p1">— Сле-дуй-те Моск-ву, раз-бе-русь, — прочел телеграфист. — Ин-спек-тор Гу-ров. Пы Сы. Ду-рак ты, ка-пи-тан, хотя и зу-бец. Не обижай-ся. Бы-вай.</p><p class="p1">— Ну что, все по делу, — сказал Громов. — Где, ты говоришь, третий путь?</p><p class="p1">— Найдешь, — сказал красноармеец. — Будешь проезжать Касимов — скажи там, что служу я исправно, и потому назад чтоб меня не ждали.</p><p class="p1">— Какую фамилию сказать?</p><p class="p1">— Там знают, — махнул рукой красноармеец. Аппарат опять застучал, и он углубился в чтение ленты.</p><p class="p1">Громов вышел, ступая неслышно, и за ним преувеличенно осторожно крался Воронов. На улице стоял все тот же зеленоватый свет июльской ночи, словно все листья, все травяные стебли огромной влажной земли сигналили друг другу через пространство: мы тут, мы живы, все еще лето. Вдалеке пыхтел, разогреваясь, огромный черный паровоз. Ему предстояло тащить пять древних вагонов. Створки одного были приоткрыты.</p><p class="p1">— Этот поезд в Москву пойдет, — сказал Громов. — Давай за мной.</p><p class="p1">Он первым полез в уютную темноту вагона. Никакого угля там не было, лежала только пара охапок сена, словно нарочно для случайного пассажира. Воронов растянулся на сене и тут же заснул, а Громов долго еще лежал, закинув руки за голову, глядя то в темный потолок, то в синевато-зеленый просвет.</p><p class="p1">На подъеме они замедлили ход. Проскакал мимо одинокий конь и пропал, и мягкий перестук копыт замер в отдалении. Много одиноких коней скачет ночью по степям, ищут новых всадников, не могут найти. Далекие зарницы, сырая пахучая трава, кони, поезда и звезды — хорошо в ничейных ночных степях времен гражданской войны.</p></span></span></span></span>
