<span><span><span><span id="id34"><div class="title5">
<p class="p">Глава третья</p>
</div><span id="id35"><div class="title5">
<p class="p">1</p>
</div><p class="p1">— Ну… Ты лучше мне не пиши, наверное, — сказал Волохов, когда она — ни слова не проронив — отвезла его в аэропорт и теперь стояла с ним у стеклянных дверей; у нее опять была какая-то не то редколлегия, не то пресс-конференция, не то дежурство, которого она, разумеется, отменить не могла, да никогда и не стала бы. Оба были великолепно сдержанны — хоть сейчас в самый паршивый фильм семидесятых годов. Молодой сибирский город, он командированный, она местная, три дня счастья, расстаются навек, она идет к выходу из аэропорта (советский семидесятнический дизайн: хлопцы в робах и штанах, молодицы с детьми на плечах, фоном — комсомольская стройка или космическая ракета).</p><p class="p1">— А чего писать? — Ей, в отличие от него, спокойствие давалось легко. — Разве что-нибудь непонятно? Пишут знаешь когда? Когда отношения недовыяснены. У нас с тобой все понятно, даже обидно. Ты любишь меня, я люблю тебя, это навсегда. Лично я сразу поняла. Правда, жуть?</p><p class="p1">В эту минуту он все ей простил — все прегрешения, бывшие и будущие; и во время их последней встречи, несколько лет спустя и при непредсказуемых обстоятельствах, стоило ему вспомнить эту минуту — как все тотчас стало чудесно, и прежняя любовь обдала его жаром, и он задохнулся от нежности, как тогда, в аэропорту.</p><p class="p1">— Ну да, жуть. Писать вообще — пошлость. Начинается какое-то иссякание. Слушай, я, может быть, вернусь.</p><p class="p1">— Наверное, да, — сказала она. — Я так полагаю, что вернешься. Ненадолго, но все-таки.</p><p class="p1">— Или ты к нам.</p><p class="p1">— Это вряд ли. — Она сказала об этом абсолютно ровно. — Придется подождать.</p><p class="p1">— Ты меня хоть предупредишь? О начале боевых действий?</p><p class="p1">— Это нескоро. Посмотрим, конечно, как у вас будет сыпаться.</p><p class="p1">— А я приеду, наверное, — повторил он. — Не знаю, когда. Ты это… я не должен этого говорить. Ревность — слабость, так? Женя, ты это… не спи тут очень уж много с кем.</p><p class="p1">— Почему? Буду, обязательно. Как мне иначе без тебя обходиться? Не хочешь же ты, чтобы я рехнулась.</p><p class="p1">— Это, знаешь, — он не выдержал и подавился смехом.</p><p class="p1">— Не помню, кто… чуть ли даже не Алек Болдуин… когда его кинула Наоми Кэмпбелл, он провел ночь с пятью мулатками. Но и пять мулаток, по его признанию, не заменили ему ея. Не думаю, что я похож на пятерых хазар…</p><p class="p1">— Не похож, — кивнула она серьезно.</p><p class="p1">— Я довольно заурядный любовник.</p><p class="p1">— Абсолютно. Это-то и обидно.</p><p class="p1">— Что обидно?</p><p class="p1">— Что заурядного любовника, которого любишь, можно вытеснить только десятком незаурядных. Не волнуйся, когда ты вернешься, я разошлю их на все четыре стороны. — Она хихикнула. — По два с половиной в каждую.</p><p class="p1">— Может, мне эмигрировать?</p><p class="p1">— Ну, подумай. Этого я тебе не могу запретить. Учти, тебе здесь будет трудно.</p><p class="p1">— Я уже понял.</p><p class="p1">— И вообще, ты такой патриот… менять Родину на бабу…</p><p class="p1">— Ты перестанешь меня уважать?</p><p class="p1">— Нет, я как раз зауважаю.</p><p class="p1">— А что, нормально. Русь — она всегда мать. Можно же поменять образ Родины. О Русь моя, жена моя. Все беды именно от того, что путают жену с матерью. Либо желают мать, либо чересчур уважают жену. Это будет такой новый патриотизм…</p><p class="p1">— Все очень мило, но я-то не Русь.</p><p class="p1">— Да, это точно. В общем, я подумаю. Женька…</p><p class="p1">— Я тебя тоже, очень и навсегда, — сказала она и убежала.</p><p class="p1">Из аэропорта он набрал ее номер — она отключила мобильный. Волохов догадывался, что она так сделает. Молодец девка, подумал он. Экая война самолюбий. Не завидую я Отечеству, если она все это всерьез.</p><p class="p1">В самолете он надрался до бесчувствия и ехал из Шереметьева со страшно тяжелой головой, клюя носом и плохо понимая происходящее.</p></span></span></span></span></span>
