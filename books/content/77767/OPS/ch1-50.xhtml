<span><span><span><span id="id67"><div class="title5">
<p class="p">Глава вторая</p>
</div><p class="subtitle">1</p><p class="p1">Анька радовалась, ложась спать, и радовалась, засыпая, и даже ночью, когда ей захотелось в сортир, шлепала туда радостно; однако утром ей вдруг стало тревожно. Чем ближе они подъезжали на своей «пятнашке» к длинному, серому бетонному васятнику, тем кислей становилось у нее во рту и горше — на душе. Здание было противное. Помнится, точно так же во рту у нее закипала кислая слюна, а к горлу подступала тошнота, когда ей первый раз в жизни пришлось идти в школу: все вокруг были праздничные, а она уже знала, что ничего хорошего их тут не ждет. В васятник она вошла, как в тюрьму; мать вела ее за руку и почувствовала, как у Аньки враз вспотели ладони. Правда, в коридоре их сразу встретила симпатичная тетя в белом халате: они за три дня, как полагалось, предупредили по телефону, что появятся, и потому их сразу провели к заведующей, в конец длинного коридора первого этажа.</p><p class="p1">В васятнике пахло, как в детской поликлинике: успокоительная составляющая этого запаха слагалась из лекарств, а тревожная так сразу не определялась. И такие же, как в поликлинике, веселые картинки были на стенах: жираф, зайчик, Белоснежка и семь гномов. У жирафа было почему-то пять ног.</p><p class="p1">— Подопечные рисуют, — весело сказала тетя в халате.</p><p class="p1">— Что вы говорите! — воскликнула мать. — Сами?</p><p class="p1">— Конечно, — кивнула тетя, — у нас кружок. У нас много кружков, сейчас подопечные покажут вам свое искусство… Вы же знаете, мы просто так никого не выпускаем. У нас все выходят, имея в руках дело.</p><p class="p1">Заведующая была толстой и добродушно-строгой, как все заведующие. Так же выглядела завстоловой в пансионате, куда Анька с матерью ездила на прошлые каникулы. Толстая внимательно просмотрела документы, особенно долго изучала копию дневника и вдруг улыбнулась Аньке совершенно по-человечески.</p><p class="p1">— Значит, учимся? — спросила она.</p><p class="p1">— Стараемся, — ответил за Аньку отец.</p><p class="p1">— Ну и славно. Если проблемы с математикой, то у нас есть один, он поможет…</p><p class="p1">— С математикой все хорошо, — сиплым от волнения голосом сказала Анька.</p><p class="p1">— Ну, еще лучше, — снова улыбнулась заведующая. — Вообще, если понадобится репетитор, у нас можно брать на время… Хорошо. Марь-Степанна, проведите товарищей к подопечным, пусть они посмотрят, а я пока приготовлю выписной лист.</p><p class="p1">Они пошли на второй этаж, в большую залу, на дверях которой висела заляпанная масляной краской табличка «Смотровая». Вероятно, табличку привинтили еще до того, как перекрасили дверь; вообще все в васятнике было сделано не очень аккуратно, кое-как, вроде пятиногого жирафа. Похоже, эти васьки только еще учились, а может, синдром мешал им как следует работать. Надо было обсудить эту проблему с отцом. Анька слышала, что васьки хорошо работают только за бутылку, но бутылку им нельзя, потому что она сводит на нет все достижения по их воспитанию. Биологичка говорила, что надрессировать можно любого, нужен только стимул и индивидуальный подход.</p><p class="p1">— Ну, вот, — сказала Марь-Степанна. — Подопечные вас уже ждут.</p><p class="p1">Она распахнула белую дверь, и с детских игрушечных стульчиков — привезенных, вероятно, из ближайшего детсада — повставали разновозрастные, бедно, но опрятно одетые васьки и машки. Анька никогда еще не видела столько васек в одном месте. Тут было несколько васят — почему-то сплошь черноглазых и гнилозубых, — несколько молодых, но в основном васьки были подержанные, смирные, лет сорока на вид.</p><p class="p1">— Здравствуйте, — сказали они нестройным хором.</p><p class="p1">— Что же так недружно? — укорила Марь-Степанна. — К вам пришли гости, одному из вас сегодня повезет. Постарайтесь им понравиться, покажите свое искусство. Ну, дружненько!</p><p class="p1">— Здравствуйте! — сказали васьки уже гораздо дружнее и заулыбались, обнажая беззубые десны.</p><p class="p1">Тут же в смотровой началось хаотическое движение: две пожилые машки принялись прыгать через скакалочку, еще две стали играть в резинку (видимо, обитателей васятника предупредили, что домашнего любимца выбирают для девочки; наверное, подумала Анька, если бы мы выбирали плотника, они показывали бы поделки). Один васька лет сорока лег на спину и стал смешно дрыгать ногами, изображая велосипед. Васенок взобрался на плечи другу, и они стали носиться по всей зале с гиканьем и разбойным присвистом. Молодой черноволосый васька с перебитым носом и широко расставленными вороватыми глазами влез на стульчик и начал читать:</p><div class="poem">
<div class="stanza">
<p class="v">— Как ныне взбирается вещий Олег</p>
<p class="v">Замстить неразумным базарам…</p>
</div>
</div><p class="p1">Ясно было, что он не понимает читаемого, но очень старается. Глаза его, однако, продолжали бегать, словно он и здесь надеялся что-то стырить.</p><p class="p1">Анька заранее знала, что выберет самого несчастного — не для того, чтобы тем вернее его подкупить и стать для него всем, а просто чтобы не благотворительствовать зря, помогать ведь надо тем, кому трудно; но тут все были несчастны и одновременно очень противны, так что она с трудом преодолела искушение уткнуться в мать, просто чтобы почувствовать родной запах и не видеть всего этого. Однако терять лицо перед васьками было нельзя — они очень старались, и каждый краем глаза косил на посетителей: нравится ли. Один жонглировал тремя мячиками, другой безуспешно пытался встать на руки, наконец подошел к стене и, упираясь в нее ногами, привстал-таки, но тут же опять рухнул. Двое немолодых васек задумчиво играли в шахматы, но Анька заметила, что фигуры они переставляют просто так — видимо, проклятый синдром мешал выучиться как следует этой умной игре. Еще две машки, каждая лет по шестьдесят, играли в ладушки, а одна пела русскую народную песню. Слов было не разобрать, но именно поэтому, да еще по уныло-разгульному мотиву, Анька сразу поняла, что песня была русская, народная.</p><p class="p1">Васят она отмела сразу — не за этим пришла. Ей понравился было очкастый васька лет тридцати пяти, с длинным лицом и крупными зубами, но он вдруг с такой ловкостью сделал кувырок через голову и так по-собачьи, снизу вверх посмотрел на нее, ожидая одобрения, что у Аньки пропала всякая охота с ним связываться. Наконец взгляд ее упал на пожилого, тихого ваську с редкими соломенными волосами: он тихо сидел себе в углу и клеил какую-то коробочку, не стараясь особенно никому понравиться.</p><p class="p1">— Ну что, выбрала любимца? — весело спросила Марь-Степанна. — Мы можем еще посмотреть выставку поделок, РВМ такие мягкие игрушки есть — удивительно. Вот у нас были работники с фабрики игрушечной, и даже они удивлялись. Качество почти китайское. Можете купить что-то, а потом мы вас познакомим с мастерами…</p><p class="p1">— Я выбрала, — тихо сказала Анька. — Вон тот, в углу. Марь-Степанна прищурилась. Стало видно, что она слегка близорука, но очки носить стесняется.</p><p class="p1">— Вон тот? — спросила она так же радостно. — Отличный выбор! Это Василий Иванович. Василий Иванович, подойди пода, пожалуйста!</p><p class="p1">Все васьки, как по команде, прекратили свои игры и уставились на Василия Ивановича.</p><p class="p1">— Это очень хороший подопечный, — не смущаясь присутствием выбранного васьки и наступившей тишиной, сказала Марь-Степанна. — Он у нас уже два года, раньше почти ничего не помнил, а сейчас знает все. Газеты читает, — гордо добавила она, словно чтение газет было бог весть каким даром, доступным немногим счастливцам. — Василий Иванович, скажи нам, когда человек полетел в космос?</p><p class="p1">— Двенадцатого апреля, — тихо ответил Василий Иванович приятным глуховатым голосом.</p><p class="p1">— А сколько будет пятью восемь?</p><p class="p1">— Сорок, — улыбнулся Василий Иванович.</p><p class="p1">— Ну что, нравятся тебе наши гости?</p><p class="p1">— Мы гостям всегда рады, — кивнул Василий Иванович.</p><p class="p1">— Вы наши правила знаете, — утвердительно сказала Марь-Степанна, — у нас рекламация принимается в течение месяца. Если не уживетесь, ничего страшного, мы другого подберем, а за этого вернем деньги, за питание… Но вообще должна сказать, что девочка сделала очень хороший выбор. Пациент смирный, доброжелательный, на прогулке защитит и вообще, если что…</p><p class="p1">— Василий Иванович, — осмелев, спросила Анька. — А что вы клеили… ну там, в углу?</p><p class="p1">— Коробочку, — тихо и как бы смущенно ответил Василий Иванович.</p><p class="p1">— А для чего? — желая подбодрить его, поинтересовалась мать.</p><p class="p1">— Ну… просто, — пожал плечами Василий Иванович.</p><p class="p1">— Он все время их клеит, — вставила Марь-Степанна. — У нас учат конверты клеить и коробочки; конверты — для тех, у кого пространственного мышления нет. А у него есть, он вам наклеит их столько — сможете все мелочи распихать! Он еще копилки может глиняные, у нас очень хороший мастер преподает керамику…</p><p class="p1">— Василий Иванович, — решительно сказала Анька. — Я хотела бы вас… пригласить к нам. (Слова «взять» она все-таки избегала.) Вы не возражаете… пожить у нас?</p><p class="p1">— Ваш выбор, — тихо сказал Василий Иванович, — вам решать.</p><p class="p1">— Я постараюсь, чтобы вам было у нас хорошо, — твердо закончила Анька. — Если можно, пожалуйста, пойдемте с нами.</p><p class="p1">— Пойди, Василь-Иваныч, соберись, — сказала Марь-Степанна. — Я за тобой зайду. А вы, товарищи, спуститесь сейчас со мной к заведующей, я дам вам инструкции, и все оформим.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p1">— Ну что, выбрали? — доброжелательно спросила заведующая.</p><p class="p1">— Василь-Иваныча взяли, — рапортовала Марь-Степанна.</p><p class="p1">— Ну, я очень рада. Давно ему пора, а то берут всё кто помоложе… Значит, Марь-Степанна, сходите за личным делом, а я пока проинструктирую в общем плане.</p><p class="p1">Марь-Степанна вышла.</p><p class="p1">— Ну, вы знаете, конечно, — начала заведующая, — что никакого алкоголя, никакого курения, пища строго по распорядку. Никаких жиров, у большинства подопечных плохо с печенью (Анька нервно хихикнула, заметив созвучие подопечных и печени). Подвижные игры, это и девочке хорошо, а то, я вижу, немножко астения… Одного свободно можно отпускать в магазин, если в нем спиртное не продается. Хотя этот подопечный очень дисциплинированный, и вряд ли он сам купит. Только если угостят… Обязательно прогуливать раз в день, это и девочке хорошо. Железа побольше, хлебушка черного, девочке тоже хорошо… — Анька в ужасе загадала, что, если девочке будет хорошо еще хоть что-нибудь из рекомендованного Василию Ивановичу, значит, у нее точно синдром Василенко, — но, по счастью, на этом заведующая прервала инструктаж, поскольку вошла Марь-Степанна с личным делом.</p><p class="p1">— Вот, можете посмотреть, — она открыла папку перед отцом, сразу поняв, кто в семье главный. Отец попытался пролистать дело, но все страницы, кроме первой, были тщательно заклеены.</p><p class="p1">— Там служебная информация, извините, — улыбнулась Марь-Степанна. — Это только для персонала.</p><p class="p1">— Что-нибудь важное? — забеспокоилась мать.</p><p class="p1">— Нет, не волнуйтесь, — мягко произнесла заведующая. — Там история… ну, после нашей терапии он почти не помнит весь этот ужас. Как дошел до жизни такой, как бродяжил, как подобрали… Мы эту информацию стараемся стирать, и напоминать ни к чему. Наш распределитель гарантирует здоровье подопечного и полную безопасность его проживания в семье. Он не нападет, не обидит девочку — не надо только его много расспрашивать про прежнюю жизнь. Она была, сами понимаете, не очень веселая… Ты же тоже не любишь вспоминать, как двойку получила?</p><p class="p1">— Я двоек не получаю, — сказала Анька, испугавшись еще одной параллели с васькой.</p><p class="p1">— Ну и отлично, — улыбнулась ей заведующая. — Марь-Степанна, приведите васю… Вы на машине? Очень хорошо! Пожалуйста, через неделю позвоните нам и расскажите, как идут дела. В экстренных случаях звоните дежурному, это круглосуточно.</p><p class="p1">Анька и сама была уже не рада, что затеяла все это. Но Василий Иванович со своим синим рюкзачком ждал у выхода, и отступать было некуда. В машине она заметила, что отец нервничает, а мать облизывает губы, как всегда, когда надо что-то сказать, а слов не находит. Так же она делала, когда Анька приводила домой кого-нибудь из подруг. Тогда она дежурно спрашивала про учебу или про любимую музыку: ничего не говорить ей было неловко, а притворяться она не любила.</p><p class="p1">— Василий Иванович, вы, пожалуйста, сразу говорите, если что не так, — сказал отец. — У нас, сами понимаете, опыта нет, даже родня редко гостит… у нас, собственно, и родни-то мало. Поэтому если какое неудобство, обязательно…</p><p class="p1">— Какое же неудобство, — тихо сказал Василий Иванович. — Я вам благодарен, постараюсь, чтобы без нареканий…</p><p class="p1">— Я тоже постараюсь, — сказала Анька, чтобы снять неловкость. — Со мной вообще трудно. У меня это, ночные страхи.</p><p class="p1">— А какие? — заинтересованно спросил Василий Иванович.</p><p class="p1">— Всякие. Летучих мышей я боюсь. Потом, иногда боялась, что змея заползет.</p><p class="p1">— Что ты несешь, какая змея?! — возмутилась мать.</p><p class="p1">— Обычная, — тараторила Анька. — Я специально замеряла, у нас большая щель под дверью или нет. Вдруг пролезет?</p><p class="p1">— Ань, откуда в городе змея?</p><p class="p1">— Почему, бывает, — вступился Василий Иванович, — например, у кого-то жила и уползла.</p><p class="p1">— А, — сказал отец. — Я читал, это бывает. Или попугай улетает.</p><p class="p1">Он расхохотался.</p><p class="p1">— Короче, Василий Иванович, у нас весело. Не соскучитесь. У нее и страхи, и ахи, и жалко ей всех… Она к матери в постель до семи лет прибегала по ночам и ревела.</p><p class="p1">— Пап! — возмутилась Анька.</p><p class="p1">— Честное слово. Ей, говорит, краба жалко. Я ей купил краба сушеного, привез из командировки. А она говорит — он же маленький. Его поймали, мама, наверное, плачет по нему… Представляете? Всех жалела вообще!</p><p class="p1">— Очень хорошо, — совсем тихо сказал Василий Иванович.</p><p class="p1">— Ничего хорошего. Я, знаете, не люблю, когда из-за всего ревут. Слышала, Анна?</p><p class="p1">— Слышала, — буркнула Анька.</p><p class="p1">— Меня, понимаете, часто дома нет, мать тоже у нас работает, время сами знаете какое. Так что я думаю, вы будете ей хороший и надежный друг. Дисциплинируете, так сказать, и вообще. В смысле учебы у нее все в порядке, ее подтягивать не надо, хотя лично я бы приналег на всякую алгебру… А насчет раннего вставания, зарядки, своевременного укладывания — это очень бы желательно. Читает до часу ночи, утром не добудишься. Страхи опять же дурацкие. В общем, пожалуйста, не особенно смущайтесь, вы человек взрослый и распускаться ей не дадите…</p><p class="p1">Судя по тому, что отец назвал Василия Ивановича человеком, он, кажется, был доволен приобретением.</p><p class="p1">В квартире Василий Иванович поначалу сильно робел. Ему казалось, что он всех стеснит, хотя какое же стеснение — ему выделили старую Анькину кровать, которая стояла теперь на кухне; она была ему, конечно, коротковата, но уж как-нибудь лучше приютской койки с железной сеткой. Анька подробно объяснила ему, где места общего пользования (хотя на двери в сортир и так был наклеен писающий мальчик, а на двери в ванную — моющаяся девочка, словно девочки только и моются, а мальчики только и писают). Он послушно зашел в уборную и ванную, осмотрелся, Анька чуть ли не силком заставила его выложить там красную зубную щеточку — такие всем выдавали в приюте. Василий Иванович наотрез отказался поставить ее в общий стакан с щетками, убрал в шкафчик. Мать купила новый набор белья — почему-то детский, расписной, с бегемотами («Другого не было!»). Василий Иванович кивал и за все благодарил. Анька захотела показать ему балкон.</p><p class="p1">— Так я знаю, знаю, — закивал он.</p><p class="p1">— Что знаете?</p><p class="p1">— Ну, где балкон… и какой вообще вид отсюда…</p><p class="p1">— А почему?</p><p class="p1">Она с ужасом подумала, что когда-то он жил здесь, что квартира была его, — бывают же такие совпадения, и чего-то такого ужасного она и ожидала с самого начала. Вот, берут они Василия Ивановича, привозят к себе — и тут же оказывается, что он тут жил, что они въехали в его квартиру, откуда его выжили каким-то страшным образом, мало ли бывает, она смотрела в передаче, злобные цыгане выманивают алкоголиков за город, покупают у них квартиры, а их селят по деревням, и привозят туда водку с клофелином, и там алкоголики спиваются окончательно… Может быть, и у Василия Ивановича была квартира именно здесь, и теперь, по роковому совпадению, она его сюда вернула?</p><p class="p1">— Да у меня похожий дом был, — сказал он.</p><p class="p1">— Похожий или этот? — страшным шепотом прошептала Анька. — Вы не отсюда?</p><p class="p1">— Не отсюда, не отсюда, — быстро заговорил Василий Иванович, — что ж ты, маленькая. Что ты сама придумываешь, да и веришь всему? Это хорошо, конечно, это ты и дальше так делай, но так не бывает, Анечка, не бывает…</p><p class="p1">— Но вы мне расскажете? — спросила Анька, тут же поняв, что совершила чудовищную бестактность и напомнила о том, о чем лучше забыть, — о том, что заклеено в истории болезни.</p><p class="p1">— Все, все тебе, Анечка, расскажу. Вот как вспомню, так и расскажу.</p><p class="p1">Но на балкон Василий Иванович вышел так уверенно и окрестности оглядел таким узнающим взглядом, что Анька веровала: он несомненно отсюда, и даже жил когда-то в их доме, выстроенном еще в семидесятые годы прошлого века, когда здесь была окраина. Она решила со временем все-таки выпытать у Василия Ивановича правду о том, как он здесь жил и почему ушел. Это было важно еще и потому, что ей обязательно надо было понять — как уходят. Одно дело, когда тебя крадут. Ходил слух — в газетах, конечно, ничего такого не писали, — что однажды недалеко от них, в так называемых генеральских домах, где жили генералы Генерального штаба, одного генерала украли ЖД, чтобы он выдал им секреты. Правда, другие говорили, что генерал сам сбежал, и не к ЖД, а в Америку, и хотел выдать там секреты, но его все равно не взяли, потому что секреты никому не были особенно нужны. Аньке, однако, запала в душу именно история с похищением. Она даже боялась некоторое время гулять одна. Хотя было что-то даже захватывающее в том, чтобы выйти ненадолго осенней ночью во двор, где так тревожно пахло листьями, горели желтые фонари и налетал порывами уже холодный, как на морском берегу, ветер, — выйти, постоять и стремительно кинуться в дом, прикидывая, добежишь ли до двери. Вдруг кто-нибудь кинется наперерез. Ее, конечно, похищать нельзя — ведь она не знает секретов, — но вдруг дело не в секретах? Вдруг она знает или умеет что-то другое, о чем сама не догадывается? Анька с ужасом представляла, как это страшно — ехать в чужой машине, откуда не можешь высунуться и крикнуть, и при этом видеть (а если накрыли мешком — то просто чувствовать) все знакомые места вокруг, и понимать, что мимо них тебя провозят в последний раз. Самое страшное было прощаться окончательно, и ведь никто ничего не знает. Ходят вокруг люди, мимо них едет машина, и они не знают, что в этой машине. Впрочем, они вообще ничего друг про друга не знают. Если бы кто-то узнал, что у нее в голове, ей стало бы невыносимо стыдно, но и облегчение какое-то получилось бы, да. Можно было бы с этим человеком: говорить совсем иначе, как с собой. Аньке представлялось неправильным, что люди умирают в одиночку, потому что такое трудное дело, как умирание, должно совершаться только сообща. Между тем сообща делали что попало — праздновали день рождения, встречали Новый год, — а умирали поодиночке, и это было неправильно. Легенда о конце света нравилась ей уже тем, что все по крайней мере умрут вместе. Вместе, конечно, не так страшно, а по отдельности совершенно невыносимо. Конец света представлялся ей чем-то вроде общего праздника, когда ничего уже не надо делать и некуда спешить.</p><p class="p1">Все это она посильно излагала Василию Ивановичу, к которому с первого дня почувствовала безоговорочное доверие — именно потому, что он постоянно нуждался в помощи и всецело зависел от Аньки. Анька впервые в жизни увидела существо, у которого не было никакой корысти. Он ничего толком не умел. Он порывался, конечно, помогать по дому, но вместо подметания только поднимал пыль, вещи клал не туда, шкафы после этого не закрывались; даже родители вскоре стали ему доверять во всем, поскольку убедились в полной его неспособности взять что-нибудь аккуратно и незаметно. Он, конечно, обстирывал себя, но и это делал неумело. Удавались ему только коробочки, которые он клеил без устали. Коробочки были самой причудливой формы. Некоторые раскрывались, как цветок, в других была масса отделеньиц, третьи были восьмигранные. В васятнике, объяснил он, кое-чему учили, но большинство форм он придумал сам, потому что чувствовал к этому делу талант. О прежней своей профессии он не распространялся. Анька не хотела бы расспрашивать его о прежней жизни, но ей обязательно нужно было понять главное: нельзя ведь жить с другим существом и не понимать о нем главного. Это главное было: как можно вот так вдруг уйти странствовать? Лишиться дома не принудительно, а добровольно? Она так боялась уйти, так мучилась при одной мысли, что может однажды ночью, стараясь не разбудить родителей, просто так закрыть за собой дверь, и это уже будет навсегда, — что в глубине души догадывалась: когда-нибудь она так и сделает. Так можно бояться только того, что уже в тебе есть. И ей надо было понять, что однажды вытолкнет ее из дома, из уютной жизни, вне которой она не могла себя представить. Ей казалось, что каждый выход из дома — надолго, навсегда — превратит ее в улитку без домика, в существо с сорванной кожей, со сплошной кровавой раной, которая вспыхивает болью даже от ветерка. Школа не считалась, школа была частью дома. И чем дольше Анька жила, тем яснее понимала, что когда-нибудь это с ней случится. Вот, может быть, зачем ей был нужен васька, а вовсе не затем, чтобы подарить дом еще одному живому существу.</p><p class="empty-line"/><p class="subtitle">3</p><p class="p1">Василий Иванович обжился у них довольно быстро. Больше всего он был похож на Акакия Акакиевича. Но и прожив у них первый месяц, после которого полагалось посетить васятник и предъявить подопечного для собеседования и осмотра; и оставшись на второй; и прожив первые полгода, во время которых к присутствию васьки привыкли даже гости, — Василий Иванович не обретал той вальяжности, что была у васьки Петьки, и не научился свободно садиться за общий стол. Он по-прежнему деликатничал, ел мало, просился выполнить какое-нибудь поручение, а вернувшись из магазина с хлебом, предъявлял всю сдачу до копейки, как будто кто-нибудь его подозревал. С этим ничего нельзя было сделать — он все время чувствовал себя в чем-то виноватым.</p><p class="p1">Анька к нему очень привязалась, а после полугода, пожалуй, и полюбила. Она никогда еще не видела столь деликатного, беспомощного и зависимого существа. Василий Иванович по-прежнему трогательно благодарил за каждое яблоко, которое она ему давала; провожал ее в школу и встречал оттуда — свои васьки были у многих, но никто не умел так радоваться появлению хозяина, как Василий Иванович. Он ходил с ней в кино и многое объяснял, если она не понимала. Познания Василия Ивановича были хаотичны, но разносторонни. Больше всего он знал об инженерном деле, но исключительно теоретически, поскольку сам не мог завернуть шурупа. Отец провел с ним несколько уроков по заколачиванию гвоздей, но все гвозди у Василия Ивановича гнулись, да и по пальцам он попадал с редким постоянством. Отец оставил эти попытки — не затем брали.</p><p class="p1">О себе Василий Иванович рассказывал скупо. Анька поняла только, что у него были жена и сын и что, когда у Василия Ивановича проявился синдром Василенко, то есть началась тяга к беспорядочным скитаниям и пропала память о повседневных обязанностях, ему было лет тридцать с небольшим.</p><p class="p1">— Мальчик был, да, — мечтательно говорил Василий Иванович. — Мальчик Мишенька. Я лодку ему делал.</p><p class="p1">— Вы умеете лодку, Василий Иванович?</p><p class="p1">— Когда-то умел, Аня, когда-то. Сейчас не сумел бы, наверное.</p><p class="p1">— Почему же вы ушли?! — в который раз спрашивала Анька. Она готова была услышать что угодно — страшную историю о тюрьме, или о квартире, отобранной обманом, или о государстве, которое подло засудило Василия Ивановича из-за отсутствия прописки, — но у него все было не так, как рассказывали в передачах другие васьки. Он ушел как-то вдруг, на ровном месте.</p><p class="p1">— А почему уходят? — переспрашивал в ответ Василий Иванович. — Ты много-то не слушай, когда говорят, что это из-за тюрьмы все или квартиру отобрали. Просто чувствуешь вдруг, что надо уйти. Ну и уходишь.</p><p class="p1">— Это болезнь?</p><p class="p1">— Болезнь, наверное, — говорил Василий Иванович. — Медики если говорят, то им видней. Меня тоже все спрашивали в приюте: почему ушел? А что я скажу? Я не помню даже, как ушел. Иногда помнят, а чаще не помнят люди. Меня, говорят, в Иркутске нашли. А как я попал в Иркутск, ежели в Москве жил? Меня потому и в Москву в приют отправили, что я про Москву-то помнил. Только адреса не помню. Но квартира похожая была, да, и вид похожий. Тоже на краю города где-то. Мне снится иногда, так живо снится, что вот хоть сейчас вспомню. Иногда кажется, что жену Оля звали. А иногда не знаю. Потом приснилось однажды: Сиреневый бульвар. Бывает, снова снится. Я очень хотел бы поехать на Сиреневый бульвар, посмотреть. Вдруг вспомню. Но это далеко, наверное.</p><p class="p1">— Почему?! — загорелась Анька. — Давайте поедем на Сиреневый бульвар!</p><p class="p1">Сиреневый бульвар располагался неподалеку от метро «Измайлово». Они выбрались туда в мягкий, серый весенний день. Был май, только что прошел дождь, светлые капли его скатывались по листьям. Василий Иванович прошел вдоль всего Сиреневого бульвара, но ничего не узнал. Анька специально завела его во двор — обычный московский двор со скрипучими качелями, — и он постоял там, около качелей и клумбы с недавно проклюнувшимися острыми ирисами. Он даже зажмурился от блаженства, вдыхая запахи, но ничего знакомого не обнаружил.</p><p class="p1">— Просто так приснилось, наверное, — сказал он. — Красивое название.</p><p class="p1">Во двор вышел мальчик с молодым сутулым васькой и принялся учить его играть в футбол. Васьки кивнули друг другу и обменялись чуть слышным приветствием, которого Анька не поняла.</p><p class="p1">— Что вы ему сказали, Василий Иванович? — спросила она по дороге в метро.</p><p class="p1">— Кому?</p><p class="p1">— А там был еще один ва… в смысле там помните, мальчик вышел с другим человеком и вы с ним поздоровались?</p><p class="p1">— Ну, сказал «здрасьте», — немного смутившись, признался Василий Иванович.</p><p class="p1">— А мне послышалось что-то вроде «кусок»… «кулок»…</p><p class="p1">— Да так, не помню. Может, «дружок»? Или «браток»?</p><p class="p1">У Василия Ивановича не было памяти даже на самые простые вещи.</p></span></span></span></span>
