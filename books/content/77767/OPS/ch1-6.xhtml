</div><p class="p1">К вечеру Громов со своей ротой взял Дегунино. Надо было торопиться: на ночную атаку не хватало сил, люди устали, а если бы со штурмом протянули до завтра, отпуск бы точно накрылся. Следовало любой ценой войти в деревню вечером семнадцатого июля, и он вошел, причем почти без потерь. На глинистом подъеме, на пресловутой шестнадцатой высоте, архитектор Краснов подвернул ногу и пополз к медику, который, наложивши повязку, вернул его в строй. Прочие были целы и определялись теперь на постой по давно выбранным местам: Дегунино брали двенадцатый раз, у каждого давно была баба.</p><p class="p1">Ливень как зарядил три дня назад, так и не прекращался — иногда только ослабевал на четверть часа, собираясь с силами, и тут же опять принимался низвергаться, откуда и бралось. Дресва разлилась и пенилась, тошно было лезть в желтый, мутный поток — в обычное время Громов бы запросто перепрыгнул проклятую речушку, в которой по жаре и выкупаться было нельзя; теперь это было целое форсирование водной преграды. Стоило указать в рапорте. При форсировании отличился ефрейтор Ганнушкин, неожиданно принявшийся петь и тем поднявший дух войска. «Йэх, он уехал в ночь на ночной электричке!» — заорал ефрейтор дурным голосом, оскользаясь по дну, и дальше спел неприличный вариант про яички.</p><p class="p1">— Чему радуемся, Ганнушкин? — брезгливо спросил Громов. Настроение было похабнейшее.</p><p class="p1">— Дак как не радоваться, тыщ старший лейтенант! — оскалился тот. — Сейчас Машку за ляжку, да и баиньки!</p><p class="p1">— Ты смотри, как бы тебя самого… за ляжку, — ругнулся Громов. — Рота, не растягивайся!</p><p class="p1">В последний раз их выбили из Дегунина неделю назад, когда вдруг нагрянул казачий атаман Батуга со своими орлами — сытыми, тугими ребятами, от которых вечно несло самогоном, мясом и анашой. Казаки прискакали утром, бесшумно сняли дозорных и нагайками погнали сонных бойцов с насиженных мест. Большинство громовских не успели дотянуться до оружия — батугинцы распахивали двери, врывались в дома и за шиворот стаскивали солдат с печей и лавок. Это был позор. Громов не спал — второй месяц мучился бессонницей в ожидании отпуска, который в любой момент могли отменить, — и действовал в том бою героически, при других обстоятельствах непременно получил бы хоть благодарность в приказе, но уж слишком по-идиотски выглядело само дело. Двоих он все-таки уложил, но отойти пришлось. Казаки их не преследовали. Громов окопался в трех километрах от Дегунина, среди ровного подсолнухового поля, и начал готовиться к ответному штурму. Сколько сил у Батуги — он толком не знал. Резерва командование не давало. От роты осталось пятьдесят человек — в принципе достаточно, чтобы попытаться выбить казаков, но кто его знает, сколько атаман навербовал за последнее время по окрестным деревням. Семнадцатого разведка донесла, что в селе все тихо — пятидневная гульба с пальбой окончилась. «Дрыхнут, кэп, — на правах близкого друга фамильярно доложил Редькин. — Мы их теперь, бедных с похмела, голыми руками возьмем». Громов, однако, медлил. Ему не нравилась эта тишина. На войне никогда нельзя было действовать по расчету — всегда по наитию. Он понимал, что люди устали сидеть под дождем в окопах, что деревню надо брать, пока казаки не протрезвели, что у него отпуск через три дня, — но еще день проторчал в палатке, играя в подкидного дурака с ординарцем Папатей, и только в двадцать ноль-ноль дал сигнал к атаке. В лиловой полутьме, под толстыми теплыми струями шумного ливня они всползли на шестнадцатую высоту, растянутой цепью подошли к деревне и не обнаружили в ней ни одного батугинца. Вышибать было некого — казаки погуляли и ускакали. Громов рад был, что обошлось без боя, но понимал и то, что Батуга просто так не ушел бы — его ребята явно съели и выпили все, что имелось в Дегунине мясного и горящего, и им не хватило. Теперь, надо полагать, они грабили в Хабарове или Переяслове, а громовцам, стало быть, оставалось сосать лапу. После казаков, как после Карлсона, мало что оставалось.</p><p class="p1">— Это что же такое, Редькин? — бесконечно усталым голосом спросил Громов злополучного разведчика, с гримасой боли и наслаждения стаскивая облепленные глиной сапоги. Он сидел на лавке в горнице, прямо под портретом толстого усатого мужика, смахивавшего на Буденного.</p><p class="p1">— Тихо было, товарищ капитан! — от стыда и страха переходя на официальный стиль, оправдывался младший друг.</p><p class="p1">— Ти-и-ихо… — передразнил Громов. — В бога, в мать, в глушь, в Саратов… Когда воевать научимся, сержант? Так и хочешь всю жизнь в москвачах проходить?</p><p class="p1">Москвачами дразнили москвичей. Впрочем, остальные воевали еще хуже. На третьем году войны национальная гвардия была в плачевном состоянии — теперь ее обращала в бегство любая банда.</p><p class="p1">— Государственнички, вашу мать… Разведка доложила точно… Что мне теперь наверх рапортовать? Деревня взята без боя ввиду отсутствия противника?</p><p class="p1">— Так… трщ-кптн… Доложим, что противник обращен в бегство!</p><p class="p1">— Давай лучше сразу доложим, что противник обращен в жабу. Скорее поверят. Фу, черт… Иди с глаз моих.</p><p class="p1">Редькин испарился. У него в Дегунине была красивая, рослая девка с соломенной косой — смешливая и придурковатая. Больше всего он боялся, что за такую разведку Громов закатает его на ночь в охранение и трогательная встреча не состоится, но в охранение Громов закатал Ганнушкина, которого терпеть не мог. Это было несправедливо, конечно, и в порядке компенсации пришлось отметить его в рапорте. Ганнушкин тоже собирался ночевать у своей дамы, именуемой Травка: родительница, наслушавшись опер из приемника еще в советские времена, назвала свою красавицу Травиатой. Ей никто не объяснил, что травиата — не имя героини, а профессия; Травка оправдывала имя, не отказывала никому, даром что собою была нехороша и ходила распустехой. Жила она неподалеку от дегунинского храма — странного архитектурного сооружения, подобного которому Громов не видел нигде: больше всего, вероятно, это было похоже на пень с грибами. Впрочем, кто-то уже называл так собор Василия Блаженного, — но на том по сравнению с этим было гораздо меньше грибов. Этот сарай был сплошь утыкан куполами, покрывавшими его, как опята; ни в одной другой деревне — а их Громов за войну повидал — не было такой смешной и уродливой церкви. Травка имела к ней какое-то отношение — то ли убиралась там, то ли, поговаривали, даже служила в отсутствии призванного в армию попа.</p><p class="p1">— Связь, товарищ старший лейтенант! — Папатя подал ему мобильник.</p><p class="p1">— Заря, заря! Я Земля, как слышно? — спросила трубка хриплым голосом полковника Здрока.</p><p class="p1">— Земля, слышу вас хорошо. Я в Дегунине, товарищ полковник.</p><p class="p1">— Какого хера ты там делаешь, Бонапарт долбаный? В войнушку поиграть захотелось? Населенный пункт взяли, ордена ждем? Будет тебе орден святого Геморроя первой степени, в жопу себе его засунешь, и затолкаешь поглубже, и четыре раза повернешь… — Здрока несло и могло нести еще долго, а мобильный у Громова садился, и карточек не подвозили уже неделю. — В Дегунине он сидит! Тебе русским языком сказано, что ты должен в Баскаково выдвигаться на соединение с Волоховым, чтобы совокупным ударом овладеть населенным пунктом Бобры, а они в Дегунине сидят и ордена ждут! (Во гневе Здрок от удовольствия путался в лицах и числах).</p><p class="p1">— Я не получал такого приказания, товарищ полковник…</p><p class="p1">— Не получал он… — Здрок медленно выкипал. — Не получал, так получишь, я для того и звоню тебе, чмо красноармейское… Вам надлежит немед-ленно, немед-ленно выдвинуться в населенный пункт Баскаково! Скрытно, под покровом ночной тьмы… Магом шарш… Как понял, капитан?</p><p class="p1">— Товарищ полковник, ночь на дворе, люди устали, — без всякой надежды возразил Громов.</p><p class="p1">— Чта такое?! — заорал начштаба. — Ты мне приказы обсуждать? Барр-дак! Регулярная армия… Ты у меня в двадцать четыре часа! Трибунал! Чамора московская! Люди у него устали! На хрена ты на ночь глядя под дождем гнал людей в Дегунино, блядь желторотая!</p><p class="p1">— Я имел приказ отбить населенный пункт Дегунино.</p><p class="p1">— Приказ он имел! Имеют бабу… — Здрок опять выкипел; в последнее время он быстро достигал пика наслаждения, опадал и так же быстро возбуждался вновь. — Три метра люди у него прошли и устали… Скоро люди будут уставать жопу подтирать… Я даю вашим квашням полтора часа на отдых! Чтобы через пять часов мне было доложено, что отряд старшего лейтенанта Громова достиг Баскакова и соединился с Волоховым под покровом ночной тьмы!</p><p class="p1">— Есть, — безжизненно сказал Громов.</p><p class="p1">— Есть на жопе шерсть! — начал было Здрок выходить на новый круг, но тут в трубке зашуршало, пошли помехи, и от очередной порции армейского фольклора Громов был избавлен. Он ненавидел Здрока. Именно из-за таких, как начштаба тридцать шестой гвардейской дивизии, и царил в армии бардак, который с начала войны усилился в геометрической прогрессии, и не было никакой надежды, что боевые действия что-нибудь в этом изменят. Таких, как Здрок, никогда не убивали. Этот человек с упорством идиота принимал наиболее бессмысленные решения — и добро бы дело ограничивалось только стратегической их нелепостью; начштаба всякий раз умудрялся сделать так, чтобы людям приходилось особенно гнусно. Создавалось впечатление, что его единственной целью на войне было максимально изобретательное истребление собственной армии: ну как, в самом деле, гнать сейчас роту за пятнадцать километров, ночью, по грязи, на соединение с мифическим Волоховым, которого нет и неизвестно? Хорошо хоть дождь утих — ослабевая и вновь припуская, он изводил их три дня, а теперь небо стало расчищаться, словно стоило только взять Дегунино, чтобы восстановить в природе благодать и гармонию. Дороги, однако, успело развезти до глинистого месива; Громов выругался сквозь зубы.</p><p class="p1">— Конышев, дайте Баскаково, — приказал он связисту. Связист был один из немногих приличных людей в роте, все коды держал в голове и быстро набрал двадцать цифр.</p><p class="p1">— Дежурный по полку слушает, — сказал измученный голос.</p><p class="p1">— Дайте Селиванова.</p><p class="p1">Дежурный щелкнул переключателем.</p><p class="p1">— Капитан Селиванов, — хмуро представился громовский однокашник по калашниковским курсам.</p><p class="p1">— Игорь, это я. Скажи, пожалуйста, Волохов у вас?</p><p class="p1">— С позавчера ждем, — подавив зевок, сообщил капитан. — Должен с кем-то соединиться и куда-то ударить. Задрал уже всех со своими орлами — никогда вовремя не приходит. Все говорят — Волохов, Волохов… Когда и что вообще сделал Волохов? Сроду никуда вовремя не дополз, элита, мля… Теперь он должен тут соединиться, мля… Жопкин хор.</p><p class="p1">— Это он со мной должен соединиться. Я к вам сейчас приду.</p><p class="p1">— Ты где?</p><p class="p1">— В Дегунине. Только что отбил, и вот тебе на.</p><p class="p1">— А… ну хоть пожрешь. У кого отбил-то? — Слышно было, что там, в баскаковском штабе, Селиванов ковыряет в зубах.</p><p class="p1">— У Батуги. Знаешь, казак этот?</p><p class="p1">— Не надо ля-ля! — захохотал Селиванов. — Слышь, Пьер, он там с тобой играет в шахматы! Батуга с утра в Литманове стоит, это от нас следующая станция! Гуди-ит — мама не горюй! Нет, Громов, слышь, про это надо в рапорте написать! Это как же ты у него отбил, что он драпал со скоростью света? Ты у него с вечера отбил, а он с утра в Литманове с Марусей гуляет! Силе-он, силен Громов, победитель пространства и времени! Погнал Батугу впереди собственного визга! — Селиванов долго еще разливался на эту тему, в последнее время в армии вообще очень много говорили.</p><p class="p1">— Ну ладно, — прервал его Громов. Селиванов уже не острил, а только мерзко хихикал, представляя, видимо, как Батуга бежит из Дегунина со скоростью света, а Громов преследует его на тачанке. — Он тут своих оставил, я ж не говорю, что его лично бил… Короче, я на рассвете выдвигаюсь.</p><p class="p1">— Выдвигайся, выдвигайся. Отметить нечем, все выжрали…</p><p class="p1">— Ладно, отбой.</p><p class="p1">Громов с тоской подумал о том, как он будет оповещать людей о предстоящем марше. Рота уже расположилась на отдых, грелась по дегунинским печкам, рассредоточивалась по равнодушно-щедрым, привычным ко всему дегунинским бабам, которые с одинаковой покорностью пускали на постой и в койку все воюющие стороны по очереди; уже, вероятно, доставали из погребов последнее, что удалось там наскрести после батугинской гульбы, — и сам Громов собирался задавить на массу в тепле и холе минут как минимум шестьсот, — но тут у Здрока случился его знаменитый вздрог, и надо было как-то поднимать роту. При мысли о предстоящем сборе, своем сообщении и общем ропоте Громову стало окончательно тошно. Он решил с вечера никому ничего не говорить, а в три часа поднять людей по тревоге. Самому, конечно, ложиться уже не имело смысла — он знал, что подняться в три ему будет трудней, чем прободрствовать пару лишних часов.</p><p class="p1">— Ладно, — отпустил он связиста. — Укладывайтесь вон в соседней комнате, если что-то срочное — будите. Папатя, скажи там Гале, чтобы чего-нибудь собрала по-быстрому…</p><p class="p1">Он всегда стоял в этой просторной, приземистой, широкой и плоской избе, у немолодой, такой же широкой и приземистой Гали. Больше всего его изумляла неиссякаемость Галиных запасов: сколько бы армий, банд и орд ни прокатывалось через Дегунино, для всех из подпола извлекались огурцы, квашеная капуста, всяческие соленые травы, которых москвич Громов никогда не пробовал — чабрец, тимьян, загадочный брандахлыст, — и густая дегунинская сметана, и ледяное молоко, и в печи всегда оказывался чугунок картошки, а то и пирог — «Поснедайте, освободители, как знала, только поставила». Все это было тем более изумительно в деревне, в которой четверть домов сгорела и уж точно половина получила увечья в боях — где окна выбиты, где целый бок избы снесло; была у Громова даже догадка о том, что все воюющие стороны неспроста так любили брать Дегунино. Несмотря на все лекции московского агитатора Плоскорылова о великой стратегической важности дегунинского района, на все его геополитические рассуждения о клине, которым мужественный Север врезается в женственный Юг в этом именно месте, до которого Гитлер в сорок втором так и не добрался, не то исход войны мог быть совершенно другой, — Громов подозревал, что бесчисленным освободителям Дегунина просто хотелось жрать. На войне это дело не последнее, и ни одна из окрестных деревень не предоставляла такой возможности накушаться, выспаться и понежиться на лежанке с пейзанкой. В разное время за три года войны он брал никак не меньше полусотни населенных пунктов, уцелел под Орлом, четырежды сдавал и отбирал назад Тросно, но нигде не встречал ничего подобного. Последние полгода, околачиваясь в дегунинском котле, громовская рота благословляла судьбу. В иных деревнях их проклинали, в других сдержанно радовались, успевши настрадаться под казачьей, а кое-где и под ЖДовской властью, — но нигде не видывал Громов того спокойного, кроткого удовлетворения, с которым Дегунино, подобно покорной любовнице, встречало новых и новых освободителей. Всех без разбору тут кормили, поили прелестным местным мятным самогоном и укладывали баиньки, — и сколько бы ни ярился Плоскорылов, требуя выявить и прилюдно расстрелять тех, кто сотрудничал с оккупационными властями, призывы его оставались без внимания; даже Здрок смотрел на таковое небрежение сквозь пальцы. В самом деле, где тут разберешь, какая власть оккупационная? А ежели расстреливать всех, кто кормил-поил казаков, ЖДов, братков, партизан и государственников, так в Дегунине скоро вовсе никого не останется, и прощайте наши вкусные постои. Даже советская власть не расстреливала тех, у кого немцы отбирали млеко-курку-яйки; а дегунинские бабы, похоже, и рады были всем давать, причем давать все, что имели. Таково было их предназначение. Громов подозревал (его слегка уже клонило в сон, после Галиной картошки и копченого сала в желудке чувствовалась приятная тяжесть и теплота), что если б даже и осуществился ублюдочный плоскорыловский план тотального расстрела всех дегунинских баб, и уцелела бы чудом, спрятавшись в огороде, какая-нибудь одна, — все равно при следующем взятии деревни у этой одной нашлось бы и водки, и сала, и картопли для счастливого победителя, и на печи она бы приласкала всех этих грязных, пахнущих тиной, истосковавшихся по ласке… Спать нельзя было, но он спал, положив голову на чисто выскобленный, крепко сколоченный стол — огромные эти столы, словно рассчитанные на богатырское пиршество, были непременной принадлежностью всякой дегунинской избы, нигде больше он не встречал таких, — и сквозь сон до Громова долетал странный разговор.</p><p class="p1">Он чувствовал, что это Галя говорит с Паней, соседкой, полного имени которой никто не знал — Паня и Паня, курносая, веселая баба без возраста — ей могло быть и тридцать, и сорок, и больше сорока, — но во сне Паня была другая, грустней и серьезней, чем в действительности. Сквозь сон и Галя казалась моложе, тоньше, словно наедине с подругой, недоступная для чужих глаз, она сбрасывала свое приземистое широкое тело и оказывалась тростиночкой, почти девочкой. Они переговаривались в Галиной комнате, где жила Галя когда-то с мужем, ныне, по ее уверениям, призванным в армию (Ганнушкин, впрочем, уверял, что все дегунинские мужики партизанят в окрестных лесах, а бабы их подкармливают). Теперь она спала там одна, Громов никогда на нее не посягал — что ему было делать с кряжистой сорокалетней бабой, молчаливой, хмуро-доброжелательной и в жизни слова ему не сказавшей, кроме «Повечерять» да «Попечевать» (так называлось у нее «поспать на печи»)? Сквозь сон он слышал, как Галя и Паня ровными, высокими девичьими голосами (такими же ровными и высокими ему представлялись их волшебно изменившиеся тела) смиренно жалуются на что-то и ласково друг дружку утешают. Говорили несомненно по-русски, но разобрать он мог лишь самый общий смысл произносимого — хотя слышал все так ясно, словно их и не разделяла бревенчатая стенка. Он не мог додуматься во сне, в чем была особенность этой речи — необыкновенно ясной и сильной, свободной от паутинного многословия, которым армейские чины все больше запутывали каждую свою мысль. Галя и Паня говорили именно то, что хотели сказать, без вечной приблизительности и путаницы, к которым Громов уже привык за военное и довоенное время, когда никто ничего не мог сказать прямо — из страха перед собой ли, перед начальством, — причем война не только не прояснила, а еще больше запутала положение, добавив к политической и бытовой путанице десятки бессмысленных уставных терминов и конспиративных геополитических построений. Речь, которую слышал сейчас во сне Громов, была, понятное дело, невозможна наяву — ему мерещилась его воплотившаяся мечта, прямой и точный язык без плоскорыловской водянистой, одышливой многоглагольности, без грязного солдатского трепа и развесистой казенщины рапортов; дегунинские крестьянки во сне говорили так, словно русский язык был им более родным — и они владели им с рождения в совершенстве, позволяющем всякую вещь назвать ее истинным именем. Некоторых слов он не понимал, о смысле других догадывался — настолько точен был звуковой образ предмета: называть ухват луницей, а курицу — коченькой было отчего-то до того удобно и естественно, что он и сам не понимал, как не додумался до этого раньше. Из ухвата уходила неприятная ухватистость, зато появлялась радостная готовность подать к столу тяжелый чугунок, на котором так и отсвечивал лунный луч. В курче-коченьке тоже была особая ласковость. Иные слова были ему знакомы, но употреблялись в странном, несвойственном им значении — он улыбнулся во сне, услышав, что строй солдат называют почему-то задницей… Вместе с тем он не мог себе уяснить, о чем шел разговор: ясно было только, что и Гале, и Пане несладко, и сейчас, изливая друг другу душу и бережно друг друга утешая, они словно набираются сил перед новыми бесчисленными сдачами и захватами Дегунина. Громову казалось, что обсуждается также способность земли родить себе и родить, когда ей никто не мешает: работать некому, война, а она — вот тебе диво! — родит лучше, чем при усиленной обработке, при всех властях, которые уродовали ее пахотой, мучили химией, а беспрерывными спорами и командами отбивали всякую охоту плодоносить. Во сне Громову это показалось так просто — конечно, не надо ничего делать, и она будет родить сама, тяготясь избытком, как печка, как яблонька, — поешь моих пирожков, сорви моего яблочка, — и разговор об этой неутомимо плодоносящей земле сам собою перерос в песню, смысла которой Громов не понимал уж вовсе. Понятно ему было только настроение радостной тоски, словно перед долгой разлукой, за которой будет встреча — непременно будет, но совсем не та, какой ожидаешь; мелодию вела Галя, а Паня сплетала и расплетала вокруг нее вторую тему, и выходила косичка. В этой песне столько было неизбывной тоски и неразрешимого счастья, что душа Громова, счастливая своим долгом и ненавидящая его, ходила за мелодией, как подсолнух за солнцем. Можно было различить отдельные слова, все трехсложные, с ударением на И, — кручина, рябина, крапива, — и от упоминания рябины и крапивы все перед глазами Громова было зелено, вся песня была как заброшенный, разросшийся церковный сад, распирающий ограду, как глухой парк, какие он часто видел в освобожденных среднерусских городах. Резун-трава, лопух, крапива, белена, бузина — все радостно перло из земли и грустило от того, что никому уже не было нужно. Грустно-радостный, густо-зеленый свет шел от песни, окутывал Громова, баюкал его, лечил изможденные больные глаза — и хотелось ему одного: чтобы рябина, крапива и кручина все сплетались в косицу, все не кончались; всю вечность проспал бы он под такую песню, но уже тряс его за плечо денщик Папатя, и с каждой новой встряской прекрасные, единственно правильные русские слова вылетали из громовской головы. Проснулся он, помня только, что Папатя — как раз и есть правильное название чабреца… потом встряхнулся, окончательно сбросил сон и глянул на часы. «Командирские» показывали без десяти минут три.</p><p class="p1">— Объявляйте тревогу, — бросил он вестовому и пошел в сени ополоснуть лицо ледяной водой из бочки.</p><p class="p1">— Тревога! — радостно заорал вестовой, предвкушая увлекательное зрелище. Папатя, в соответствии с уставом, радостно носился по главной дегунинской улице, производя беспорядочные выстрелы в воздух. Вестовой забегал в избы с оглушительным воплем «Подъеоом!», и громовская рота, живо помнившая недавний позор с нападением Батуги, слезала с печей и лавок, — не наматывая портянок, прыгала в сапоги, ибо не желала вторично обращаться в бегство под нагайками. Громов ждал перед сельпо, где всегда происходили построения. Через пять минут — ну, если быть вовсе точным, то через шесть, но для его орлов и двойное превышение трехминутного норматива было большой удачей, — заспанная, кое-как заправившаяся рота стояла перед ним в две шеренги. Небо расчистилось, и лишь пять-шесть дымных клочков разогнанной тучи растерянно висели над крышами. Пахло землей, травой, дымком — век бы не уходить отсюда; Громов вспомнил дачу, детство и подивился власти запахов над памятью. Столько всего было, одной войны три года, — а вспоминалась ему все равно дача, блаженная, радостная грусть при виде звезд в окне: вот он, пятилетний, с только что вымытыми босыми ногами, исхлестанными крапивой и искусанными подмосковным комарьем, стоит на коленях на старом венском стуле у открытого окна, и те же звезды, и так же пахнет, и сейчас мать почитает ему на ночь — он даже ощутил вдруг под ступнями прохладный дачный линолеум, по которому дунет в постель, чтобы его не застали так поздно глядящим в окно, тогда как давно уже пора под одеяло… Нельзя было позволять себе думать об этом, и Громов рявкнул:</p><p class="p1">— Рры-ота!</p><p class="p1">Все подобрались и вытянули руки по швам.</p><p class="p1">— Бар-р-дак… — с отрепетированной усталой брезгливостью, дабы не распускать людей, сказал Громов. — Воронин, как стоите? Воротник застегните… Баранников, команда не для вас подана? Огуреев, почему вы не нашли времени привести сапоги в приличный вид? Два наряда на службу! («Есть два наряда на службу!» — хрипло ответил нескладный верзила Огуреев и закашлялся). Даю установку. Через два часа нам предписано в районе деревни Баскаково соединиться с ротой капитана Волохова и объединенными усилиями нанести удар по противнику на указанном направлении, которое нам укажут в указанное время. Тьфу, блядь… Вы, вероятно, спросите — с каким противником? А хер его знает, с каким противником! Касающиеся люди вам доведут в указанное время! — издевательски отбарабанил он обязательную уставную формулировку. — До Баскакова переть пятнадцать километров, дорога раскиселилась на хер, идти бойко, прытко, тяготы переносить стойко, смотреть кротко, в случае непредвиденной сколькзости падать пОпко… в смысле на попку, дабы не измарать лицевой вид! Доступно ли я изложил, орелики комнатные?</p><p class="p1">Рота дружелюбно посмеивалась. Громова любили — он был, что называется, зубец, но не зверь.</p><p class="p1">— Нале-е-э… — с наслаждением потянул он и звучно выпалил:</p><p class="p1">— Во!</p><p class="p1">Рота повернулась и колонной по два двинулась в сторону Баскакова под покровом ночной тьмы.</p><p class="p1">— Араз! Араз! Араз-дво-три! — привычно командовал Громов. Он с удовлетворением замечал, что противогазные сумки у ореликов раздулись — хозяйки понапихали постояльцам сальца, хлебушка и яблок от щедрот своей бесхозно родящей земли. Шли поначалу резво. Далеко, на востоке, густая ночь уже начинала мутно разбавляться — как медленно прочищается заложенный нос, когда перевернешься на другой бок.</p></span><span id="id8"><div class="title4">
<p class="p">2</p>
</div><p class="p1">— Паня! Паня! — сипло позвал родной голос. Паня, только пришедшая от Гали и прилегшая было на лавку, вскинулась и подбежала к окну.</p><p class="p1">— Миша! — ахнула она.</p><p class="p1">— Впусти, Панечка.</p><p class="p1">Она метнулась к дверям, торопливо откинула засов. Муж сгреб ее в охапку, обнял и от избытка чувств хрюкнул.</p><p class="p1">— Ах, Миша! А я и баньки не топила…</p><p class="p1">— Да что банька… — шептал муж. — Повидать хоть тебя, доню моя… Ушли эти-то?</p><p class="p1">— Ушли, все ушли! — радостно кивала Паня. — Казаки еще когда ушли, а эти сегодня в ночь…</p><p class="p1">— Я вчера хотел, — объяснял Миша, не выпуская жену из объятий, — но вчера не рискнули. Погодь, маленькая, я отсигналю…</p><p class="p1">Он выскочил на улицу и три раза шмальнул из огромной ракетницы, висевшей у него за поясом. Вскоре из ближнего леса, подковой окружавшего Дегунино с трех сторон, стали медленно выкатываться бородачи в ватниках. Они походили на гигантских ежей. То было мужское население Дегунина, быстро расходившееся по избам. Возвращаться к родне они могли лишь тогда, когда деревня была свободна от постоя, — и при появлении новых гостей стремительно бежали назад в свои землянки.</p><p class="p1">Партизанство дегунинских мужиков сводилось к стойкому уклонению от армии. Каждый отряд освободителей, прокатывавшихся через деревню, норовил мобилизовать местное население, но бабы всем говорили, что мужики давно мобилизованы. Если иных интересовало, отчего молодайки брюхаты, — молодайки стеснительно объясняли, что освободителей много, есть среди них антиресные, не всякому и откажешь. Вербовщики плевали и махали рукой.</p><p class="p1">— Да привыкли уж, Панечка, — говорил муж, хлебая лапшу. — Как и родился в лесу. Кабы с тобой, так вовсе бы рай.</p><p class="p1">— Скучаю я, Мишенька, — улыбалась Паня.</p><p class="p1">— Ой, доню моя, — вздыхал Миша. — Ладно, сейчас на печеньку — и баиньки. Утречком самый сон…</p></span></span></span></span></span>
