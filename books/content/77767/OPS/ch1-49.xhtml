<span><span><span><span id="id66"><div class="title5">
<p class="p">Глава первая</p>
</div><p class="subtitle">1</p><p class="p1">После пятого класса Анька стала мечтать о ваське.</p><p class="p1">— Через мой труп! — сказал отец.</p><p class="p1">Своим трупом он распоряжался широко — укладывал его на пути у всех домашних инициатив: хотела ли мать сменить мебель, телевизор, шторы, просила ли Анька хомяка или крысу — все могло осуществиться только после смерти отца, при его скептическом загробном неодобрении. В результате после въезда в трехкомнатную так и жили со старой хозяйской мебелью, спали на полупродавленном диване с неудобной ложбинкой и смотрели пятилетний телевизор, который от показываемой мерзости словно ослеп и оглох, так что звуки пригасли, а краски выцвели.</p><p class="p1">Анька пыталась было объяснить, что васька ей нужен никак не для развлечения, а просто ему же так будет лучше — вид нескольких бездомных васек ежедневно надрывал ей сердце по дороге из дома в школу, она даже присмотрела одного, сравнительно здорового, усатого (благотворительность ее не простиралась так далеко, чтобы брать больного; для них, в конце концов, есть специальные приюты). Мать почти сдалась, мать она бы уговорила. «Только не с улицы», — скажет мать. Хорошо, пускай не с улицы. Можно из васятника, как у нее в классе называли приюты. Там выдавали уже отмытых, здоровых, вполне пристойного вида, некоторых даже с профессией (обучали в приюте, были специальные классы — им рассказывали об этом в школе, на уроке москвоведения, когда речь зашла о гуманности мэра). Например, родители ее друга Саши взяли ваську-столяра, он еще немного плотничал и за лето отлично подновил им дачу, а еще вырезал Саше качели, на которых поочередно взлетали два толстых бородатых существа. Саша очень огорчался, когда осенью, после ремонта дачи, ваську сдали обратно в приют. Он говорил, что васька к ним привязался — хотя Анькина мать после разговора с Сашиными родителями рассказывала иначе.</p><p class="p1">— Все-таки, — говорила она, — у них с эмоциональной сферой что-то не то. Безнадежная узость. Вера сказала, он даже не попрощался.</p><p class="p1">— Может, это шок, — кисло сказал отец. — Прикинь, они на лето взяли в дом живое существо, поили, кормили, семейная атмосфера. А осенью — наверняка не предупредив — говорят: спасибо, вы очень хорошо все сделали, можете возвращаться в приют.</p><p class="p1">— Ничего подобного! — возмущалась мать. — Они по договору обязаны были сразу сказать, он должен подписывать, если умеет…</p><p class="p1">— А если не умеет?</p><p class="p1">— Все равно его предупредили…</p><p class="p1">— Слушай, я отлично знаю, как это делается. У меня у парня на работе точно так же работал васька. Ему если скажешь, что берут только на лето, — все, он сделает как попало. Чтобы старался, он должен надеяться, что его оставят. Это, знаешь, как ослу под нос вешают морковь. Вот и они с ним так. Вообще Худяковы очень неприятные люди, я сто раз тебе говорил…</p><p class="p1">— Но Анька дружит с Сашей!</p><p class="p1">— И это зря, если хочешь знать…</p><p class="p1">Вообще поступка Сашиных родителей Анька не одобряла и сама, но здраво рассуждала, что если васька три месяца провел на даче, среди клубники и свежего воздуха, то это в любом случае лучше, чем все душное лето торчать в приюте. И то хлеб, как говорила бабушка. Но сама она, конечно, будет брать не на время, а насовсем. По крайней мере на год. А дальше — как получится: даже мышку завести — огромная ответственность. Очень бывает жалко, если сдохнет. Аня однажды три урока проплакала. Хорошо хоть, что васьки почти не дохнут: они закалены своей трудной жизнью. Правда, у Лены Фирсовой в третьем классе сдох васенок, Лена страшно огорчилась и даже пропустила неделю — она к нему сильно привязалась, он уже почти заговорил. Ее сочинение «Мой домашний любимец» даже послали на городскую олимпиаду, и тут на тебе. Васеринар сказал, что любимец, конечно, любимцем, но сладостями обкармливать нельзя. Первые девять лет жизни ее васенок провел в условиях далеко не комнатных, конфет вообще в глаза не видел — нельзя же так сразу. Потом на эту тему был классный час: даже взрослые васьки не всегда умеют ограничивать себя, что уж говорить о детях, поэтому надо следить за питомцем и не закармливать. Классная со слезами в голосе прочла отрывок из «Маленького принца» — вы в ответе за тех, кого приручили, и так далее.</p><p class="p1">Брать васенка Аня не хотела — в конце концов, маленьких вокруг нее и так полно. В пятом классе она вдруг вымахала до метра шестидесяти, стала выше всех (умнее всех была и так), и со сверстниками ей вдруг стало скучно. Нет, если брать ваську, то уже опытного, ручного. Честно говоря, молодых васят она боялась. У них были какие-то странные игры, они кусались, трудно приручались — старшие ели из рук и вообще делали все, что скажут. Бабушка говорила, что жизнь всему научит. У Светы Бабаш был васенок, смышленый, говорящий, с блестящими черными глазками, — но он оказался опасный, сманил Свету шляться, поймали ее уже на вокзале. Мать всю милицию на уши поставила. Васенка отдали в приют. Когда его уводили, он хохотал и кривлялся и кричал про Свету ужасные гадости, хотя до этого жил с ней, как говорится, вась-вась. Светина мама пошла добиваться досрочной стерилизации — ей казалось, что он уже мог научить Свету чему не следует, но в приюте ей сказали, что васенок еще незрелый и никакого ущерба девочке причинить не в состоянии. Ей даже показали злосчастного васенка, уже обколотого и совсем смирного, — но о том, чтобы брать его обратно, и речи не было, конечно.</p><p class="p1">Анька, однако, знала, что в принципе отца прошибить можно — если, во-первых, правильно выбирать моменты для атак, а во-вторых, не терять настойчивости. Большинство детей быстро забывают о своих просьбах и после первого родительского отказа начинают хотеть чего-нибудь другого, — но Анька была не такова, она даже задачку решала до тех пор, пока не сойдется с ответом, и мать не могла ее переупрямить: ребенок не засыпал, пока не добивался своего. Так что после окончания шестого класса с похвальным листом и дубовым венком (школьное нововведение, гордость директора) она с периодичностью пресловутой китайской капли долбила отцу темечко разговорами про ваську.</p><p class="p1">— Это кошмар какой-то, — пожаловался отец верхнему дяде Шуре, когда тот со своим васькой, чинным, говорящим, модно подстриженным, зашел к ним в гости пропустить рюмку коньяку.</p><p class="p1">— Ну, хочет ребенок — что тут такого? — равнодушно отвечал дядя Шура, снисходительно глядя, как его васька (его звали Петька — говорящим иногда давали имена) развлекал Аню, позволяя себя чесать.</p><p class="p1">— Как — что такого?! — кипятился отец. — Ты меня, Шура, прости, я человек старорежимный, но я не понимаю вообще, как это можно…</p><p class="p1">— Ну а что, раньше лучше было? — так же лениво спрашивал дядя Шура. — Когда они в метро по последним вагонам сидели? Когда в подземный переход было не войти? Ты сам тогда, я помню, в каждом номере писал: пора решить, пора решить! Вот тебе, пожалуйста, решили. И ты недоволен еще. Я эту оппозиционную интеллигенцию, моя бы воля… Всем недовольны, вообще всем, всегда!</p><p class="p1">Но дядя Шура говорил все это так снисходительно, что ясно было: ничего он не сделает оппозиционной интеллигенции, даром что работает известно где. Петька умильно жмурился: как все васьки, он быстро стал похож на хозяина — вальяжный, толстый. Впрочем, иногда он принюхивался, настораживал уши, стремительно мчался к двери — наверное, дядя Шура тоже в иные минуты подбирался и менялся до неузнаваемости; Анька не хотела в этом убеждаться.</p><p class="p1">— Но тебя самого ничто не коробит? — спрашивал отец. — В этом «Плане спасения»?</p><p class="p1">— Ну а что делать, Слава? Делать что? При Лужкове они на каждом углу стояли, а в подъездах — ты сам помнишь, что делалось. Что ты предлагаешь? На колбасу их пустить?</p><p class="p1">— Ребята! — умоляюще говорила мама, давясь македонским салатом и закрывая руками рот.</p><p class="p1">— Это ты не мне говори, Надя, это ты мужу своему говори, — распалялся дядя Шура. — Вам чего ни сделай — все будет не так! Вот скажи: что ты на цирки наехал в прошлом номере у себя?</p><p class="p1">— Читает! — радостно говорил отец; по мере того, как закипали окружающие, сам он помаленьку успокаивался, словно поделившись с ними избытком энергии.</p><p class="p1">— Да нипочем бы я не читал эту пачкотню, если бы не работа! Но вот скажи: цирки-то тебе чем не нравятся?! Если бы там убивали по-настоящему, я бы еще понял. Хотя скажу тебе честно, Слава, — если васьки сами на это согласились…</p><p class="p1">— А выход у них был?! — снова вскипал отец.</p><p class="p1">— Но ведь ты, или я, или любой, — дядя Шура показывал на окно, за которым виднелись бесконечные ряды других освещенных окон спального района Митяево, — мы же не на улице, так? Ты же не сбором бутылок зарабатываешь, так?</p><p class="p1">— Пленка, которая меня от этого отделяет, очень тонка, — угрюмо отвечал отец.</p><p class="p1">Такие споры случались у них регулярно, и васька Петька внимательно к ним прислушивался. — Аня чувствовала, как он напряжен, хотя и не препятствует ей учесывать себя, сколько угодно. Где дядя Шура взял Петьку — она не знала: мать как-то сказала, что он попался во время одной из облав и показал замурзанный диплом Горного института. Сделать из Петьки человека, конечно, было уже нельзя, но для мелких домашних поручений он годился, и дядя Шура, давно холостяковавший, взял его к себе. Петька чистил картошку, исправно мыл посуду и сторожил дом, когда дядя Шура уезжал в командировки.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p1">Цирков Аня тоже не любила, и ей не нравилось, когда мальчишки в классе бурно обсуждали будущие игрища и делали ставки. На День города уже третий год подряд устраивались представления в цирке на Вернадского, все как положено — с трезубцами и сетями, и хотя трезубцы были тупые, но сети зато самые настоящие. Саша болел за «Спартак». Спартаковцы на подбор были раскормленные, как для борьбы сумо; получалось это не нарочно — заставить васек как следует тренироваться не мог никто, побои они переносили с необычайной легкостью, потому что привыкли, вот вся еда и уходила в жир. Зрелище было некрасивое, Аня один раз увидела его по телевизору и почти сразу переключила. Дрались без правил, тыкали трезубцами то в глаз, то ниже живота (за это удаляли с арены), многие кусались (за это не удаляли). Один раз на поединок заехал президент и показал большой палец, — устроители боя поняли его неправильно и присудили победу не тому. Проигравших, конечно, никто не добивал — классная объяснила, что это было бы негуманно; просто отчисляли из команды и отправляли обратно в приют, а там кормили гораздо хуже. Гладиаторы получали много мяса, иногда даже ветчину (Аня читала статью в «Московской правде», там была фотография двух крупных котлет). В приюте мясо давали только по праздникам, так что в цирк просились все.</p><p class="p1">— Саша, — сказала Аня однажды, когда Худяков провожал ее домой после очередного москвоведения, всегда шедшего восьмым уроком. — Я все-таки не понимаю: неужели интересно смотреть на драку?</p><p class="p1">— Ну а бокс? — солидно спросил Саша. По росту он был пока меньше Ани, но солидности уже набрался и говорил басом.</p><p class="p1">— В боксе правила, и вообще это спорт. А это никакой не спорт, а издевательство.</p><p class="p1">— Ань! — снисходительно, почти как дядя Шура, стал объяснять Саша. — Ну ты что, не понимаешь, что ли? Ты биологию не учишь? Они же не совсем люди! С тех пор, как Василенко доказал, что у них даже генный набор другой, все иначе стало! Одни рождаются с умом, а другие без ума. Им же самим весело, ты не видела? Они потому и бродяжничают и пьют, что ущербные. Лучше же так, чем раньше…</p><p class="p1">Как раньше, Аня толком не знала. Иногда, на даче, ей случалось листать старые журналы (читать детское ей было давно неинтересно), и там встречалось загадочное слово «бомж», похожее на удар в басовитый гонг, который не только отзывается, но и производит долгое жужжащее эхо: боммм-жжж! Васьками их прозвали совсем недавно, когда и рамках гуманитарной программы вымытых, подлеченных и стерилизованных бродяг стали разбирать по домам. Между прочим, среди васек были далеко не только бродяги: иногда в приют просилась старушка, которой нечего было кушать, или беженец, которому негде жить. Тогда справку о принадлежности к васькам (научно это называлось «синдром Василенко») приходилось покупать за деньги у врачей: без нее в приют не брали. Несколько таких сделок вскрылось, и по телевизору долго обсуждали получившийся скандал. Но папа говорил, что еще больше историй остается в тени.</p><p class="p1">Однажды Анька спросила у матери, можно ли заболеть синдромом Василенко. Мать объяснила, что это врожденное, и если до ее возраста не проявилось, то теперь уж и не проявится. Василенко, кстати, иногда сам читал лекции по телевизору, объясняя, что заразиться его синдромом от васек никак нельзя, иначе бы все давно перезаражались, поэтому после стерилизации их можно брать домой совершенно безбоязненно. У него самого жило семь васек, двое на даче и пятеро в московской квартире, — точней, четверо васек и три машки, все очень ласковые и вполне обучаемые. Он показывал с ними удивительные штуки: васьки прыгали через стул, отвечали, сколько будет трижды пять, и ловили на лету куски ливерной колбасы.</p><p class="p1">Анька уже придумала все, чему она выучит своего ваську. Возможно, она даже вылечит его от синдрома Василенко, хотя синдром, говорят, неизлечим. Тогда это будет первый случай, и она прославится, — но важно же не прославиться, а подарить человечеству избавление.</p><p class="empty-line"/><p class="subtitle">3</p><p class="p1">Шестой класс она закончила вполне прилично (тройка только по основам выживания: Анька вообще не уважала этот предмет, считая, что выжить не главное, главное — сохранить лицо). Мать предложила на выбор неделю в Крыму или поездку в пекинский диснейленд — там бесплатно давали целый тюк пластмассовых игрушек, удобных тем, что на другой день все они ломались и везти их домой было уже не нужно. Анька, однако, гордо отказалась от обеих поездок: ей нужен был васька, она уже почти все придумала и даже разметила план экспериментов, о котором, однако, родители не должны были знать ничего.</p><p class="p1">— Ну что ты будешь делать! — совершенно по-бабьи сказал отец. — Ребенку хочется живого человека.</p><p class="p1">— Ей же не для игры, — осторожно пояснила мать. — Она хочет помочь… Знаешь, когда мне было лет шесть, я тоже мечтала подобрать бездомную девочку из сказки, сделать ее подругой…</p><p class="p1">— Это и есть ущербность, — тихо выговорил отец.</p><p class="p1">— Конечно, я всегда была ущербная…</p><p class="p1">— Да я не про это, — поморщился он. — Просто… когда человек чувствует, что он не стоит настоящей дружбы, он придумывает себе спасение обездоленного. Чтобы обездоленный его любил из благодарности. Меня это и тревожит: одноклассникам она неинтересна — может, потому, что они глупее, не знаю… Теперь она хочет купить себе друга. Чтобы она его кормила, а он за это выслушивал ее фантазии. Как ты не понимаешь: ваську же каждый заводит для какой-то одной роли. Кому чего не хватает. Шуре нужен свой Ватсон, глуповатый и надежный боевой товарищ. Худяковым нужен плотник. Калошину, это у нас в отделе общества есть такая скотина, требуется восторженный слушатель. Между прочим, половина редакции время от времени берет машек для известных целей…</p><p class="p1">— Но это же… — не поверила мать.</p><p class="p1">— Что «это же»? Издевательство над животными? Они же никому не скажут, их за это кормят. Галина, между прочим, с васькой в отпуск ездила — ты что думаешь, он ей только чемодан носил?</p><p class="p1">— Но они же обработаны…</p><p class="p1">— Можно и необработанного достать, сейчас все можно. Ты пойми, я только потому и не хочу, что это ведь… подмена отношений! Не может человек завести друга, или любовника, или самостоятельно поклеить обои — пожалуйста, на тебе ваську. Но так можно, знаешь, расслабиться окончательно!</p><p class="p1">— Зайцу будет гораздо полезнее съездить в лагерь, я могу достать «Дубраву», очень приличное место, сплошь дети президентской администрации…</p><p class="p1">Анька не все поняла в этом разговоре, но, судя по тому, что отец назвал ее Зайцем, он был в недурном расположении духа. То есть мысль о ваське уже не вызывала у него однозначного неприятия. Можно сказать, он даже привык.</p><p class="p1">Васьки вообще на диво быстро стали частью общей жизни. Шoy «Мой Вася», в котором они соревновались, таская тяжести и показывая всякие штуки, из ежемесячного стало еженедельным. Для тех, кто выезжал с васькой в отпуск — например, в короткий тур за границу, в Египет там или Таиланд, — появились льготы и скидки. В троллейбусах и метро для васек выделили места в конце каждого вагона. Даже американские «зеленые», в очередной раз посетив Россию, заметили, что обращение с васьками самое человеческое и, пока не найден способ лечения, следует признать русское решение проблемы оптимальным. Оставалось только понять, почему синдром Василенко так распространен именно в России (хотя, разумеется, свой процент васек наличествовал везде, самый большой — в Африке). Вышло даже «Очевидное — невероятное», в которой Петр Сергеевич Капица дискутировал с Гордоном о таинственных «мутагенных факторах» — один говорил, что во всем виноват климат, а другой винил историю.</p><p class="p1">Как бы то ни было, к августу отца доломали. Всей семьей они отправились сдавать анализы (процедура была не слишком приятная, особенно когда стеклянной палочкой лезли в попу, но Анька была готова и не на такие жертвы). Получили в жэке справку о достаточности жилищных условий. Отец, смеясь и ругаясь, сам на себя написал положительную характеристику, которую ему не глядя подмахнул пофигист-начальник. Мать принесла справку о том, что после школы окончила медицинские экспресс-курсы. Чтобы подстраховаться, Анька сняла копию с дневника: ей отчего-то казалось, что почти отличнице Ваську доверят охотнее. Ближайший васятник находился на Юго-Западе, рядом с огромным, так и не достроенным стеклянным карандашом, предназначавшимся когда-то для академии Аганбегяна.</p></span></span></span></span>
