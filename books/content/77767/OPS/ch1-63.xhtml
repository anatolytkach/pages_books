</div><p class="p1">Город Блатск располагался в северной, болотистой части среднерусской равнины, за что и получил прозвание, — но в последние десять лет оправдывал его иначе. В силу странной особенности умирающих государств — сплочения населения в изолированные кланы, — Блатск стал меккой российской блатоты, у которой был здесь мозговой центр, штаб и средоточие светской жизни.</p><p class="p1">Объяснить, почему в гибнущих сообществах население кучкуется по возрастному, земляческому или профессиональному признаку, почему на третий год войны пенсионеры сосредоточились в спальных районах, блатные в Блатске, а красивые бабы, рыжие люди и велосипедисты расселились по немногим функционирующим городам средней полосы, — никто не брался. Сознавать себя и задумываться о происходящем больной может лишь до тех пор, пока страдание его не переходит за некую границу; после того умирание становится его главным делом, и докладывать себе или окружающим о переменах он уже не в силе. Между тем тут было над чем задуматься: наиболее вероятная причина состояла в отсутствии цементирующего начала, когда всякий спасается в одиночку или с ближайшими товарищами, а товарищей выбирает по так называемым имманентным признакам. И если для незначительного меньшинства, которому диктует дух, а не тело, родня в такие именно минуты становится всего непонятней и чужей, то большинство соединяется в кучки, спаянные общностью древнего и земляного, а на деле внешнего и случайного. Высшие формы жизни в умирающем теле утрачены. Соединение в страну, в сплоченное войско, готовое умереть за абстракцию, мыслимо лишь в империи времен расцвета, и то ненадолго. Когда дело пахнет керосином, и даже не керосином, а гарью, — остаются горстки, у которых все меньше общего; распавшись прежде на центр и доминионы, империя принимается расслаиваться по вертикали, то есть на бедных, богатых, блатных, а после того, опускаясь все ниже, — на рыжих, толстых, больных, здоровых, покамест не доходит до простейшего деления на живых и мертвых. Те немногие, кто может еще что-то записывать, запишут эту особенность для будущего, и если найдется историк, которому не противно копаться в зловонном распаде, — он назовет эту стадию терминальным крекингом.</p><p class="p1">Блатск не всегда был средоточием блатоты: еще лет за десять до войны он был обычной русской провинцией, с хиреющим драмтеатром и музеем местных промыслов (тут мастерски валяли ваньку — шерстяного человека с руками, ногами и, по особому заказу, хуем; правда, про последнее все больше ходили легенды — есть, мол, тайный мастер, но пьет и в последнее время капризничает). Постепенно, однако, в город стали наезжать на свои загадочные толковища те, кого называли теперь настоящими хозяевами страны. Причиной тому послужила труднодоступность Блатска: хотя хозяева и легализовались, и уж по телевизору открыто рассказывали, что только в их сообществе и осталась еще честь, а менты все суки, — но тайным своим инстинктом места для главных встреч они старались избирать особые, подальше от людных магистралей. В этом смысле Блатску повезло сказочно: добраться туда по нынешним временам мог только очень упорный турист. Во времена оны Блатск был важным перевалочным пунктом на пути из варяг в греки, но с тех пор, как варяги окончательно завладели Русью, греки им стали без надобности. Такая уж здесь была удивительная земля, что никуда отсюда не хотелось, — и торговый путь сначала захирел, а потом и заболотился. Так город, называвшийся прежде Братском в знак греко-варяжской дружественности, сделался Блатском и под этим названием упоминался в летописях с двенадцатого века. На гербе его изображался шерстяной валяный человек, раскинувший руки как бы для объятия, на ровном зеленом фоне, означавшем собою то ли болото, то ли стабильность.</p><p class="p1">Все русские города делятся на две категории, неспешно продолжал рассказчик, брезгуя переходить к сути. Одни стоят близ больших проезжих дорог, и жизнь там неспокойная. Жители таких городов кормятся с потока путников, текущего сквозь них, и сами всю жизнь мечтают, что вот когда-нибудь уедут; в таких городах непременно поддерживается легенда об одном счастливце-горожанине, который не просто мечтал, а вот уехал же! Он возвращался потом — исключительно чтобы дать прочим представление о бессмысленности всякой суеты. Города, стоящие у дорог, неспокойны и суетны. В них думают, что можно сняться с места, и это что-нибудь изменит. Люди, живущие там, боятся заглянуть в себя — и думают, что в путешествии, из вагонного либо самолетного окна, можно увидеть что-нибудь другое. Трактирщики, портные и обувщики в таких городах обслуживают проезжающих с тем особым заискиваньем, которое пытаются выдать за панибратство: заходи, странник, мы ведь оба — при дороге, мы тоже тут как-то причастны к путешествиям… Всем ясно, что сорвется с места один из тысячи, да и он вернется домой с обломанными крыльями; а все-таки приятно думать, что, кроме города, есть дорога. В языке коренного населения, впоследствии почти забытом, противоположность понятий выражалась простой перестановкой букв — дорога и огород, то есть разомкнутое и замкнутое пространство. Так же противополагались рука и кура, гора и рога, добро и бодро — но подлинный смысл их забылся во времена первых оккупаций, когда захватчики наклеивали туземное слово, как этикетку, на первый попавшийся предмет: так кура перестала быть ногой и сделалась птицей, рога перестали быть оврагом и объявились принадлежностью скота, а бодрость из противоположности добра сделалась его странной принадлежностью, кто добр, мол, тот и весел. Мы давно уже пишем и говорим языком захватчиков, в котором слова все остались прежние, коренные, но смысл их непоправимо утрачен. Ах, корявая радость, громкий обморок передышки, угрюмство радужного выхода, раскосый булками взгляд бестелесной, скотски хромой обители, высоко убитой стенами недоверчивой хромоты, взрывы распухшей, обернувшейся жимолости, живописи, раскрученной сумеречной утраты в колченогой промоине грозно аукнувшейся стороны… только тайная струна какая-то вздрогнет в душе при звуках этой забытой речи, словно в бессмыслице отзовется вдруг древний смысл — и тут же милосердная память задернет занавеску: не смотри туда, там травма.</p><p class="p1">Но есть другие города — стоящие далеко от проезжих дорог: в них уже знают, что уехать некуда, и никуда не хотят. В городах этих живут, не сообразуясь с требованиями общепринятых условностей: улицы ходят распустехами, домишки давно не подновлялись, колодцы сгнили и покосились… Когда советская власть, замешанная на хазарском бунте и отвердевшая в виде варяжской мести, добирается до этих городов — она наводит кратковременный марафет, снося для порядку пару храмов и выстраивая магазин «Культтовары», в котором и по сию пору продаются уцененные грампластинки, но и это все быстро подергивается пылью, рутиной, тиной, будто и не было никаких перемен, а всегда стоял тут давно лишившийся мяча гипсовый баскетболист. Здесь не беспокоятся о чужом мнении — иметь его некому, все свои. Так жил и Блатск, привлекательный для блатоты именно тем, что здесь никому не пришло бы в голову искать ее. Что до местного населения, сразу опознававшего пришлых, — коренное население было смиренно и ко всяким гостям относилось по-братски, блатски, с равнодушием всепоглощающего болота. Бывали, конечно, и захватчики — то варяги, то хазары, — но с ними блатные всегда могли договориться, у них был уж подлинно общий язык, ибо блатная речь состояла из обломков хазарского и варяжского арго. Блатные всегда гордились подлинным интернационализмом — в их сообществах не было ни эллина, ни иудея, ибо на пределе падения все одинаковы, и в полной тьме не различают цветов. Блатные сочетали хазарский расчет с варяжским надрывом, варяжскую жестокость с хазарской хитростью — и гениально пользовались этой обоюдностью: хазар они приманивали на хазарское, а потом поступали с ними, как варяги. Случалось и обратное — даже и чаще. Варяги и хазары злились попервости, но потом восхищенно цокали языками — они уважали блатных за шикарную непоследовательность. В блатные шли самые отмороженные захватчики — те, для кого не было вовсе уже никаких правил; хазары, которые не прочь продать варягам оружие, варяги, готовые сдавать своих за деньги чужих. Славно жилось им! Отребья обоих воюющих лагерей пользовалось в этих лагерях неизменным почетом — ловили их больше для виду; варяги давно уже зачисляли в свои по принципу наибольшей отвратительности — кто мерзее, тот и наш, а хазары старались не отставать и даже превосходить — то есть мерзость в других поощряли, а в свои не зачисляли. Просто рядовые варяги, как и рядовые хазары, не дошли еще до той степени падения, при которой ненависть к роду человеческому становится сильнее ненависти друг к другу. Варяжские барды романтизировали блатоту и учились у нее — лучшие их патриотические песни были сочинены на блатные мотивы, а в кругах высшего варяжства ценились наколки и феня; хазары чтили блатных за отважное презрение к государству и называли их оплотом свободы. В подполье хазары пели блатные песни, а в короткие времена своего владычества внедряли блатные правила — даром что большинство хазар, попадая в лагеря, не поднимались выше сказителей и пяткочесов.</p><p class="p1">До недавнего времени в Блатске кое-кто еще работал. Все уже знали, что это нерентабельно, что в качестве обычного города Блатск неэффективен, а выжить может только как блатная Мекка, где прогуливают шальные бабки и проводят темные сходки, — но коренное население умело только работать, а от праздности в буквальном смысле вымирало. Работа была его воздухом — не средством забвения, как думали иные, не тупой скотской повинностью, а нормальным состоянием, без которого никак. Когда при очередном хазарском пришествии работы нигде не стало, закрылись обувная фабрика, цементный завод и кружок хорового пения при дворце культуры, — население быстро сбежало или вымерло, так что из коренных жителей Блатска очень скоро остался один-единственный фермер, который и содержал весь город, не особенно напрягаясь. Звали его Иван Заварзин. Почувствовав, что работы в Блатске больше не будет, он на жалком своем приусадебном участке завел рогатый скот, принялся торговать молоком и соленьями, постепенно расширил дело, всю семью приспособил под обработку бывшей колхозной, а ныне бесхозной земли — а поскольку коренные умели с землей договариваться и получали в год по три урожая, ферма его процвела, как процветал прежде его обувной цех. Заварзин кормил весь Блатск яблоками и картошкой, мясо его коров было сочным, козье молоко — жирным, и он даже радовался поначалу этой новой власти — ведь так и проработал бы обувщиком, не узнав истинного признания; но тут на него наехал рэкет.</p><p class="p1">Блатные в первое время вели себя в Блатске как гости, но со временем перешли на положение хозяев. В городе решались главные дела, стрелялись стрелки, терлись терки — надо было подгребать под себя зарвавшееся население, решившее было, что руководить им теперь некому. Очень есть кому! Не сказать, чтобы от блатных было одно разорение: после того, как коренные начали вымирать, в Блатске образовался детский дом, где жили осиротевшие дети, и блатные, по страстной своей любви к вдовам и сиротам, стали этот детский дом подкармливать и обогащать. Для детей построили сауну, и многие блатные заезжали в эту сауну погладить детей, приласкать их. Количество вдов и сирот в Блатске неуклонно увеличивалось, ибо блатным требовалось где-то жить — а население не всегда готово было добровольно предоставить квартиру, и приходилось со старшими разбираться, а младших отправлять в детский дом с сауной. Дом вскоре озолотился, там настелили ковры, выстроили при нем и часовенку, куда блатные захаживали после сауны, иногда прихватывая и детей; им нравилось ласкать их в часовенке, в этом было что-то особенное, почти как в сауне, только здесь грелся и парился дух. Постепенно руки у блатных дошли и до Заварзина — он явно не понимал, кто в городе хозяин. Его обложили сначала сравнительно легкою данью, но он, словно не поняв сигнала, только пуще расцвел. Тогда за него взялись всерьез. Заварзин платил готовно, не возражая, — как печь, норовящая угостить путника пирогами, — и главная цель рэкета оставалась не достигнута. Всякий рэкет, как знает всякий рэкетир, имеет главной целью вовсе не рубку бабок: бабки можно отнять у прохожего, вынуть из сейфа, вытрясти из государства тысячей тонких способов. Рэкет призван показать работяге, кто есть кто; сделать труд из радости — позором, ибо единственной целью такого труда становится прокорм рэкетира; обернуть счастье — унижением, ибо каждый Божий день начинается теперь с мысли о том, что через десять-девять-восемь дней приедет настоящий хозяин, пригнет, рыгнет, с довольным хохотком выгребет дань и осведомится напоследок, хорошо ли поспевает младшенькая, а то со старшенькой ему уже скучно. Рэкет для того только нужен, чтобы работяга знал свое место, понимал, что настоящая жизнь — не его прозябанье в навозе, а разгул в ресторане «Золотой Сочи», широкий, с ковырянием в зубах, с перестрелкой в конце и пышными похоронами под ружейно-шампанский салют. Но Заварзин никак не желал сечь фишку, труд его продолжал оставаться радостью — и его облагали все новыми и новыми данями, от души гогоча на стрелках над тем, как платит лох и тамбовским, и солнцевским, и ташкентским, которые все теперь были блатскими, — и только когда очередная крыша, бодро посулив защиту от всех остальных, отобрала у него все дочиста и сожгла амбар, Заварзин повесился у себя в сарае. Жена его, спасая дочерей, быстро куда-то съехала. Поначалу блатота ликовала, показав лоху его истинное место, — и забеспокоилась только на третий день, когда в городе стало нечего есть.</p><p class="p1">Блатные призадумались. Выскребли все, что было в магазинах, — но там обнаружилось одно хозяйственное мыло; кроме Заварзина, никто ничего не производил. Обыскали все заварзинские сусеки — чисто, словно с собой все забрал; и точно, глубоко в небесах плыло облако, похожее на корову, а облако, похожее на Заварзина, ласково доило ее. Блатные поняли, что начались голодные галлюцинации. Один из них, самый слабодушный, попытался ковырять землю заварзинской лопатой — но земля была твердой, не поддавалась, да и кой черт ковырять, ежели что-то вырастет не раньше как через месяц! Кто-то сбежал из города, но оставлять резиденцию было западло — порешили поесть человечины, начали с сироток, — сиротки были кормленые, нежные, — но их не хватало на всех, и не за этим, в конце концов, они были нужны!</p><p class="p1">Разумеется, все как-то устроилось — и даже стало лучше прежнего. В Блатске немедленно раскатали бетонную взлетно-посадочную полосу (слова «посадка» здесь, однако, не употребляли, говорили, что самолет заземляется), и в город хлынул настоящий импортный продукт. В местные магазины он не поступал, распределялся сразу в рестораны, которых в городке открылось видимо-невидимо — почти по числу домов. Остаткам населения сбрасывались объедки пиршеств. Сироток поднимали с кроватей ближе к утру и вызывали подлизывать тарелки. «Маленькая Одесса», «Бичи Брайтона», «Камелек», «Привал романтика» и «Охотничья избушка», варяжские и хазарские, с гуслярами и скрипачами, отдельными кабинетами и подвальными банями, стриптизом и минетом — заполнили Блатск в считанные месяцы, и блатные говаривали не без гордости, что обеспечили жителей рабочими местами; суть, однако, была в том, чтобы работа эта была особенного свойства. В понимании коренного населения она не была работой вовсе, поскольку не вела к производству новых сущностей или хоть подлатыванию старых: все это было обслуживание, которое, согласно хазарскому учению, заняло наконец место производства. Новая хазарская доктрина утверждала, что в новой эре производство товара уходит на второй план (или загоняется в самое глубокое подполье), тогда как главной силой общества становится реклама этого товара и потребление его. Героем считается не тот, кто лучше произвел, но тот, кто больше потребил. Доктрина эта была по сути не столько хазарской, сколько блатной, потому что именно блатные считали трудом только то, что было направлено к их комфорту и благу. Позорно было вкалывать на заводе или пахать в колхозе, и тружеником мог считаться только тот, кто накрывал поляну, пел посетителям «Избушки» во время трапезы и делал минет после. Все прочее производство в Блатске надлежало упразднить, что и было исполнено.</p><p class="p1">Постепенно блатные обосновывались, обрастали недвижимостью, строили в Блатске и вокруг гигантские особняки — это называлось инвестициями в экономику города, который и вправду обогащался невиданными темпами. Блатные были теперь хозяевами, а в гости наезжала публика из столицы да из областных центров — решать вопросы. В Блатске действовал особый этикет, изучению которого со специальными педагогами политики посвящали досуг. Не дай Бог было не так встать или обратиться — в Блатске строго спрашивали за базар, причем только с приезжих: блатные, согласно блатному кодексу, имели право вести себя как угодно. Некоторые политики, заезжая за консультацией или услугой, заказывали себе наколки, дабы доказать, что и они не лыком шиты, — но их в Блатске живо разоблачали: тут была своя компьютерная база — кто зону топтал, кто коронован, кто закашивает. У татуированного тут же снимали отпечатки пальцев, прогоняли его по базе данных и, не обнаружив судимости, опускали. Смыть клеймо он мог только очень серьезной суммой — тогда его, что называется, «поднимали» (процедура эта заключалась в том, что поднимаемый обязан был в знак своей благодарности совершить такой же акт мужеложства с кем-нибудь из специально привезенных сироток, а потом купить ему конфет).</p></span><span id="id82"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Громов с Вороновым прибыли в Блатск рейсовым автобусом — последним видом общественного транспорта в городе; местные жители давно, как в Америке, передвигались на машинах, даже таксисты съехали отсюда, потому что понадобиться могли только пьяным, а пьяные в Блатске с некоторых пор решительно садились за руль, потому что и милиция была из своих. Рейсовый автобус не отменяли только для виду, он и ходил-то сюда раз в неделю. Сразу же на площади перед автовокзалом начинался неутомимый лохотрон. Из желтых ларьков наперебой неслись песни «Лесоповала», «Колымского привета», «Конвоя», «Шмар» и «Шалашовок». О гастроли очередного состава «Шалашовок» извещала афиша на стене казино «Централ», названного так по причине центрального расположения. Семь наперсточников сидели в ряд посреди чахлого скверика. Наебывать в Блатске было некого — разве чудом забредет случайный лох, не знающий, что тут за город, — и они от скуки наебывали друг друга. В стороне артистически щипались трое щипачей. Еще трое жизнерадостных людей тотчас подошли к Воронову с Громовым и представились сотрудниками пятого канала, проводящими в городе беспроигрышную лотерею: приезжим страшно повезло, и теперь, заплатив по тысяче рублей каждый, они могли принять участие в розыгрыше призов: китайской мясорубки, китайской зубочистки и китайской мандавошки. Выигравший мандавошку после уплаты еще тысячи рублей получал право на участие в розыгрыше других призов, перечисления которых Громов не дослушал. Он с трудом сдержал желание сразу вырубить всех троих и спокойно, насколько мог, спросил, когда автобус на Копосово.</p><p class="p1">— Ай, нанэ-нанэ! Зачем тебе Копосово, братка? — спросил чернявый, с серьгой в ухе. — Оставайся тут, тут сладко!</p><p class="p1">— Автобус на Копосово когда? — громко, как глухому, повторил Громов.</p><p class="p1">— А в Копосово тебе зачем? — так же громко, под гоготание прочих, повторил чернявый.</p><p class="p1">— Я туда еду, — объяснил Громов.</p><p class="p1">— А едешь зачем? — Новый человек был в Блатске редкостью, и отпускать его без потехи здесь не собирались.</p><p class="p1">— Мне туда надо, — сказал Громов.</p><p class="p1">— А надо зачем? — спросил цыганистый. — У, ты скучный какой! Ты как мент. Ты мент, братка? Если ты мент, ты не братка.</p><p class="p1">Само собой, у Громова было оружие, но один против всех он бы тут не сладил: подтягивались наперсточники, заинтересованно приглядывались щипачи. В это мгновение Воронов снова удивил его:</p><p class="p1">— Нам бы к Руслану, братка, — сказал он просительно. — Маляву к Руслану имеем.</p><p class="p1">— Тю! — сказал цыганистый. — Что ж молчите? А говоришь, в Копосово. Какое Копосово, когда к Руслану?</p><p class="p1">— А потом в Копосово, — объяснил Воронов. — Повидаемся с Русланом, да и поедем. А?</p><p class="p1">— На Копосово давно нет ничего, — сказал цыганистый. — Это вам автобусом надо назад на Коноши, а из Коношей через день автобус ходит. Только на Коноши он нескоро пойдет, часа в четыре…</p><p class="p1">— Ну, а Руслан-то где, дяинька? — жалобно спросил Воронов.</p><p class="p1">— Руслан сейчас в сауне, — уважительно отвечал цыганистый. Громов с облегчением увидел, как наперсточники разочарованно возвращаются к своим наперсткам, а щипачи — к прерванному взаимному ощупыванию-ощипыванию. — А вот вечером Гоша Гомельский юбилей празднует в «Остапе» — там и Руслан будет, и все. Что за малява-то?</p><p class="p1">— Ой, такая малява, — сказал Воронов уважительно, — большая малява! Самому ему велено, в белы ручки. Спасибо, дяинька, — и потащил Громова за руку прочь с площади.</p><p class="p1">— Что за Руслан? — тихо спросил Громов, когда они отошли на безопасное расстояние.</p><p class="p1">— А вы не знаете разве, товарищ капитан? — изумленно переспросил рядовой. — Иерей Плоскорылов рассказывал.</p><p class="p1">— Я не слушаю лекции иерея Плоскорылова, — еле сдерживая ярость, ответил Громов. Сама мысль о том, что он, боевой офицер, мог таскаться на лекции штабного жирдяя, сроду не бывавшего в окопе, выводила его из себя.</p><p class="p1">— А… А то в Баскакове всех офицеров таскают.</p><p class="p1">— Это не офицеры, а штабисты.</p><p class="p1">— Да-да, конечно, — заторопился Воронов. — Он, короче, рассказывал — а они до солдат доводили, — что есть такой Руслан Блатский, спонсор православного воинства. Они в Блатске, конечно, не особо разбирают, кто за кого, но он очень в Бога верует. Поэтому спонсирует православное воинство. А Нодари Батумский не верует и спонсирует ЖД. Это у них игра такая, я еще дома слыхал. Вроде тотализатора. Но Руслан — он очень уважаемый в православном воинстве, он за границей консервы закупает и вообще, говорят, много помог.</p><p class="p1">— Надо было мне слушать Плоскорылова, — сказал Громов. — Интересные спонсоры у православного воинства…</p><p class="p1">— А для вас разве что-нибудь изменится? — простодушно спросил Воронов. — Вы же все равно долг исполняете. Так какая вам разница, на чьи деньги?</p><p class="p1">Громов хотел было сказать Воронову, что он много разговаривает, но вспомнил, что Воронов выручает его уже во второй раз. Вдобавок ему было стыдно перед ним — ведь это по его вине они вместо Копосова заехали в Блатск. Черт ногу сломит с этими названиями, бесконечными деревнями и автобусами, ходящими через день. Так они точно не поспеют в назначенный Гуровым срок и не встретят чертову девку с ее чертовым покровителем. Громов заблудился не по своей вине — он отлично ориентировался на местности, но все старые карты давно врали, а новых не составляли. Одних деревень не существовало уже к началу войны, другие спалили во время первых боев, когда еще стреляли по-настоящему, а третьи переименовывались захватчиками — одних Новых Иерусалимов и Китежей появилось по десятку. Правду сказать, уже на выходе из леса они взяли западней, чем надо, — или Черепанов нарочно указал неверный ориентир, — но вместо Копосова они вышли в Чумичкино, а в Чумичкине единственная старуха, доживавшая там век в серой избе среди засаленных тряпок, сказала им, что надо идти на бетонку, там ходит автобус. Автобус и завез их в Блатск — кто же знал, что там есть другой автобус, до Копосова? Чудом было то, что им встретился хоть какой-то…</p><p class="p1">— И что, теперь нам к Руслану? — спросил Громов.</p><p class="p1">— Нет, к Руслану не надо. У меня к нему нет никакой малявы.</p><p class="p1">— Я вот думаю, Воронов, — сказал Громов задумчиво. — Малый ты вроде неглупый, даже с реакцией. Что ж ничего не выдумал, когда тебя на дознание таскали? Тебя ж расстреляли без пять минут. Или нет?</p><p class="p1">— Почти расстреляли, — с готовностью произнес Воронов. Он даже не дергался, когда капитан прикасался к его главной болевой точке.</p><p class="p1">— Что ж ты, отмазаться не мог?</p><p class="p1">— Да я, как бы сказать… — замялся Воронов. — Они же меня не за что-то хотели расстрелять, а потому что.</p><p class="p1">— И почему же?</p><p class="p1">— Вот этого я, товарищ капитан, внятно не расскажу, — виновато сказал Воронов. — Что-то есть, наверное. Я и сам во время допроса, когда меня капитан Евдокимов вызвал, — что-то такое чувствовал с самого начала, а как сказать — не понимаю. В общем, мы разные с ним люди, совершенно разные. И рядовой Пахарев, который меня охранял, — тоже совершенно другой человек. И вот за это самое они меня, кажется, хотели расстрелять, потому что не мог же я, в самом деле, кого-то предать? Я и написать никому ничего не успел, кроме как домой. Они ведь не всех, это самое… А во мне, вероятно, что-то такое было…</p><p class="p1">— Может, именно реакция? — спросил Громов. — Они шустрых не любят, это я знаю. Если солдат соображает, СМЕРШевцы его всегда подозревают. — Ему неприятно, конечно, было ругать офицерство перед рядовым, тут было прямое нарушение воинской этики, — но Громов уже понял, что Воронов, вероятно, не совсем простой рядовой, и Гуров не просто так, для транспортировки в Москву, дал его Громову в дорогу. Не то чтобы он служил талисманом, но кое для каких ситуаций, в которых Громов пасовал, он безусловно годился.</p><p class="p1">— Да не реакция, — поморщился Воронов. — Какая у меня особенная реакция… Так, могу иногда что-то сказать к месту, а вообще-то я зоолог по образованию, и то незаконченный. Меня со второго курса призвали.</p><p class="p1">— Ну, с этой публикой только зоологу и разбираться, — сказал Громов. — Валить надо отсюда, да побыстрей.</p><p class="p1">— Автобус нескоро, — сказал Воронов. — Пообедать успеем. Можем мы пообедать, товарищ капитан?</p></span></span></span></span>
