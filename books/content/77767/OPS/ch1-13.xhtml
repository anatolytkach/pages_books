<span><span><span><span><span id="id16"><div class="title5">
<p class="p">4</p>
</div><p class="p1">В это же самое время в избе баскаковской жительницы Фроси, где вот уже три месяца размещалась канцелярия шестой роты, перед командиром этой роты капитаном Фунтовым сидела женщина лет пятидесяти, того неопределенного социального положения, в котором пребывала теперь вся отечественная интеллигенция — люмпенизированная, но все еще не забывшая манер. На голове у просительницы был пестрый кашемировый платок, какие часто носили в семидесятые, во времена дружбы с Индией; руки ее были смиренно сложены на коленях, а лицо изображало мольбу. Женщина сильно нервничала. Это была солдатская мать Горохова.</p><p class="p1">Ротная канцелярия отличалась необыкновенной унылостью. Всякий человек, попадая сюда, почему-то чувствовал, что любые усилия тщетны. Грустны были желтые табуретки, тощие книжечки уставов, угрюм маршал Жуков на портрете. Пол скоблили трижды в день, и все-таки он был грязен. С потолка свисали три клейких ленты, густо испещренные мушиными трупами. На окне сох ванька мокрый. Дневальные регулярно поливали его, но что-то неподвластное дневальным поселилось в самом воздухе. Оно выпивало влагу из горшка ваньки мокрого, плодило мух и покрывало пылью подоконник. Стоило укрепить на окне белую занавеску, как она немедленно желтела от тоски. Нечего было и думать о победе, если судьба армии решалась в таких канцеляриях. Кажется, если бы нарисовать на стене зайчика или, допустим, кротика — эта невыносимая тоска отступила бы; но и зайчик, и кротик наверняка получились бы кислыми и кривыми, как животные на стенах детских поликлиник или васятников. В канцелярии шестой роты всякому свежему человеку хотелось повеситься. Безысходную тоску усугублял голос Фунтова, монотонный, как мушиное жужжание, — но клейкая лента для капитана Фунтова не была еще изобретена.</p><p class="p1">Мухам при виде капитана Фунтова тоже хотелось покончить с собой. Некоторые из них не выдерживали и — вжжик! — с налету влипали в клейкую ленту, не в силах больше выносить безысходную скуку этой комнаты. Может быть, они просто завидовали Фунтову, комплексовали перед его мушиностью — ясно было, что он их пережужжал, переползал, переиродил Ирода. Как бы то ни было, от зависти или тоски мухи кидались на ленту, как на колючую проволоку, но даже смерть тут была долгая, липкая — красивой гибели не выходило, и они долго еще дергались на липучке. А нечего, нечего. Умирать надо когда прикажут, а не по личной инициативе.</p><p class="p1">— Ведь вот вы в третий раз приезжаете, — монотонно говорил Фунтов, короткий, почти квадратный человек, которому было на самом деле всего двадцать семь, но выглядел он на все сорок — полный, сонный, будто присыпанный пылью. Невозможно было себе представить, о чем можно говорить с Фунтовым на пятой минуте совместного пребывания в одном пространстве. Он мог похабно ухмыльнуться при упоминании о женщинах, мог посетовать на изнеженность и хилость молодого пополнения, мог сладко зевнуть и произнести любимую поговорку — «Эхма, была бы денег тьма, купил бы баб деревеньку да и драл бы их помаленьку», — но ничего другого в нем, казалось, не было вовсе. Особенно невыносимо бывает присутствие таких людей в минуты тоски или тревоги, когда жадно ищешь любого человеческого слова и готов благодарить за один понимающий взгляд — но Фунтов был в этом отношении совершенным кирпичом, лишенным эмоций с рождения. В школе он вечно дремал на задней парте, но славился тем, что умел быстро и решительно откручивать головы голубям. Офицер он был никакой — вялый, безынициативный, с нулевыми представлениями о тактике и технике, но именно полное равнодушие к судьбе солдат, которые в его понимании вообще не были людьми, делало его бесценным в глазах начальства. Фунтова вечно ставили в пример на офицерских собраниях, на которых Здрок произносил свои часовые кастровские речи. Фунтов был никаким строевиком, ничего не смыслил в геополитической подготовке и вряд ли толком понимал, с кем и зачем воюет, — но в нем с некоторой даже избыточностью было представлено главное офицерское качество, а именно тупость; она настолько заполняла все его существо, что не оставляла места ни для чего другого, и за это Здрок любил его отеческой любовью, и даже Пауков сказал однажды, что Фунтов способный офицер.</p><p class="p1">— Вот вы в третий раз приезжаете, — лениво тянул он, — и что? Зачем вы приезжаете? Сын ваш, это самое, ваш сын, это самое, присмотрен… Он подконтролен, это самое… Вы приезжаете, а другим обидно, к которым не приезжают. Он, это самое, не прослужил еще полгода, он имеет взыскания, он, это самое, еще не обсохло гражданское молоко на нем… Он не солдат еще, а это самое, огурец… капуста… А вы приезжаете. И что вы приезжаете?</p><p class="p1">— Понимаете, — нервно говорила солдатская мать Горохова, искренне веря, что если она сейчас найдет какие-то убедительные, единственно нужные слова, Фунтов сумеет облегчить положение ее сына; нет, конечно, он не отпустит его с фронта, — военное время, ее и в часть-то пускали все неохотнее, требовалось включать все связи, звонить бывшему однокласснику, он отвечал все отрывочнее, унижение, ужас, — но, может, хоть найдется какая-нибудь тихая должность, что-нибудь в штабе, или, может быть, в тылу, поближе к дому… Она не сомневалась, что у сидящего перед ней офицера должна быть душа — надо только до нее достучаться, но как это сделать, Горохова не понимала. Она приезжала в Баскаково в третий раз за четыре месяца, потому что сын изводил ее жалобами и просьбами, — но не могла ему ничем помочь, а впереди был еще год и восемь месяцев этой пытки. За три года, предшествовавшие призыву, и первые четыре месяца его службы она состарилась на двадцать лет, и на лице ее установилось то вечно-жалкое, просительное выражение, которое сразу позволяет определить человека, махнувшего рукой на собственное достоинство. — Понимаете, он пишет, что у него флегмона… что он не может ходить, а его заставляют бегать…</p><p class="p1">— Они все пишут, что у них флегмона, — тянул Фунтов. — Никого не заставляют бегать, есть тапочки, все ходят в тапочках. Есть медпункт, в медпункте, это самое, все необходимое. Вы его не подготовили, это самое, служить, вот он и пишет. Если бы вы его подготовили, это самое, служить, он бы, это самое, не писал. Но вот он пишет, и вы едете, зачем вы едете?</p><p class="p1">— Он просил разрешить носки, — зачастила Горохова, — он не может, не умеет заматывать портянки, ну можно же, наверное, носки? Хотя бы на первое время…</p><p class="p1">— Портянка, это самое, — сказал Фунтов. — Портянка дает дышать ноге. Нога потеет, потная нога. В сапоге она гниет. Гниет в сапоге потная нога. Она гниет от пота, вы понимаете? И чтобы ей от пота не гнить, применяется сообразно устава портянка воинская суконная, также хабе, определенного образца. Она позволяет ноге дышать, и потом предки.</p><p class="p1">— Что предки? — в ужасе спросила солдатская мать.</p><p class="p1">— Предки наши, — вяло повторил Фунтов, по-бабьи пригорюнясь. — Наши предки воевали в портянках всегда. От слова порты, портянка. Еще Суворов: служи по уставу, заслужишь честь и славу. Сталинградская битва в портянках, Курская в портянках. Нога не гниет, и можно что угодно. Хоть маршировка, хоть это самое. Но надо уметь. Там хитрость в чем? Надо поставить стопу, ступню, на угол, потом натянуть, чтобы не морщило, и быстро обернуть. Потом еще обернуть, чтобы облегала стопу, давала дышать потной стопе. Тогда потом вот еще так подворачивается, — он лениво показал в воздухе, как именно, оборачивая при помощи одной короткопалой руки другую, будто солдатской матери Гороховой прямо сейчас, в ротной канцелярии, предстояло обернуть свои стопы портянками и направить их на физподготовку. — И это, и все. Тут делов на пятнадцать секунд по нормативу. Потопать еще для уплотнения. Носок не дает дышать ноге, она гниет в нем, начинаются нарывчики и это… (Сам Фунтов в училище ходил в носках, получал за это наряды, но толком наматывать портянку так и не научился). Портянка — русский солдат, это такое русское наше изобретение. Если русский солдат, то портянка. Это знают все, Европа знает, Австралия. — Он помедлил, вспоминая, что еще есть. — Африка знает.</p><p class="p1">— Но понимаете, — все безнадежнее повторяла Горохова, — он не может… Это, может быть, не всем дано… Он не может бегать. Он хорошо пишет, каллиграфически… Может быть, вы подберете ему должность какую-то, я не знаю, я не военная женщина, какие у вас есть должности… Может быть, что-то с биологией, он биолог, со второго курса…</p><p class="p1">— Я говорю вам, — пресно сказал Фунтов, — он на общих основаниях должен. Какая у нас, это самое, биология? Отслужит на общих основаниях, и будет биология. После как отслужит на общих основаниях, хоть, это самое, демагогия. Что хотите. У нас тоже народ умный, студенты, у нас один прапорщик такие, это самое, знает слова, что ваш сын наверняка таких не слышал. Современная армия, это самое. Дружная семья, солдаты вместе кушают, вместе спят… Это мужской коллектив, необходимо. А что флегмона, то у них у всех флегмона. Когда зарядка, то у всех флегмона, а как в чипок, то у них просто хоть танцы танцуй. Как, это самое, Маресьев.</p><p class="p1">— Что такое чипок? — оцепенело спросила солдатская мать Горохова.</p><p class="p1">— Чипок, солдатская чайная, — пояснил Фунтов, — так называется, чипок. Чпок. Там культурно, пряники, сахару купить если когда… Мы же не против, это самое. Но прежде чипка надо же, это самое, Родину — так? Надо Родине служить. Ты побегай утром на свежем воздухе, и тогда и чипок тебе, и вечерняя прогулка. А если мать все время, это самое, приезжает с каструлями, то какой ты будешь солдат? В военное тем более время.</p><p class="p1">Услышав о военном времени, Горохова вышла из оцепенения и потеряла всякую власть над собою.</p><p class="p1">— Военное время! — закричала она. — У вас солдат из автомата выстрелить не может, в военное время! Мне сын рассказывал, что служит уже четыре месяца, а на стрельбище был один раз! У вас солдаты картошку чистят в военное время и в роте моют пол, и бегают по кругу, пока ноги не сотрут до кости! Вы все говорите, что мы плохо подготовили наших сыновей, а вы кого готовите! Вы четвертый год воюете, что вы навоевали?! И не надо нам, что мы плохо подготовили! У моей соседки мальчик был разрядник, его на второй месяц убили! Вам не надо, чтобы хорошо готовили! Вам надо, чтобы было быдло бессловесное, куда послали, туда пошел!</p><p class="p1">В эту секунду солдатская мать поняла, что окончательно лишила своего сына шансов на перевод в штаб или на другую халявную работу, потому что совершила неположенное, невозможное — подняла голос на офицера, от которого все зависело. Она сползла со стула, встала на колени и принялась стучать лбом в грязный, хоть и перманентно скоблимый пол ротной канцелярии.</p><p class="p1">— Простите меня, я вас умоляю, — завыла она. — Я вас умоляю, простите. Отец болен, не встает, мой муж, его отец! Я все что хотите, у нас один сын, ради Бога, что скажете, как скажете… Простите, ради Бога, я больше не могу…</p><p class="p1">— Женщина, — не пошевелившись, тянул Фунтов. — Мать Горохова! Встаньте, это самое, что вы! Вы как это, как у себя дома. Это военное место. Что вы говорите, отец не встает, — у всех не встает, вам тут любой такого наговорит… Что вы, это самое, как будто здесь вам цирк… Здесь не цирк, а канцелярия боевой роты… Что вы, это самое, как будто в первый раз замужем… Давайте, это самое…</p><p class="p1">— Я никуда не уйду, — пролепетала мать Горохова. — Я что хотите буду, я сапоги вам буду чистить. Я любые деньги. Я умоляю вас, я никуда…</p><p class="p1">— Дневальный! — крикнул Фунтов. Вошел дневальный, толстый солдат Дудукин, с лица которого не сходило выражение тупого счастья. Дудукин считался образцовым солдатом, невзирая на толщину. Он плохо бегал, но его часто ставили в наряды, — он обожал мыть полы, ловко выжимал тряпку и вообще по-женски легко справлялся с непрерывным наведением порядка. Постричь кого-нибудь, побрить сзади шею, вырезать ножичком мужика с медведем Дудукин тоже был мастер.</p><p class="p1">— Тыщ-капитан-дневальный Дудукин по вашему приказанию прибыл! — рявкнул он с наслаждением.</p><p class="p1">— Это самое, — сказал Фунтов. — Поднимите мать и это. Препроводите там. Воды дайте. На тумбочке оставите отдыхающую смену. И нечего. Скоро вообще будет не канцелярия роты, а бардак номер четырнадцать. — Почему номер четырнадцать, никто не знал. Такая у капитана Фунтова была народная поговорка.</p><p class="p1">Солдатской матери Гороховой стало невыносимо страшно. Она впервые в жизни поняла, что внутри у этого человека нет совсем ничего, и именно поэтому он командовал сейчас ее сыном. Она поняла, как жутко должно быть ее сыну, окруженному этой совершенно нечеловеческой массой, кушающей вместе, спящей вместе, наматывающей портянки. Так же должна была чувствовать муха, убедившаяся, что к человеческим или мушиным чувствам липучки взывать бесполезно. Просить было нельзя. Надо было убивать, если получится, но солдатскую мать Горохову никто этому не учил. Оставался единственный выход — дать сыну превратиться в такую же биомассу, потому что выжить иначе было нельзя. Он должен был стать, как они, иначе он так и будет стирать себе ноги, рыдать, писать жалобные письма. Отпустить сына в биомассу было еще страшней, чем проводить в армию, но ничего другого не оставалось — солдатская мать почувствовала себя так же, как чувствует себя домашний подросток, впервые избиваемый шпаной. Он понимает, что его мольбы не возымеют никакого действия, что все всерьез, что его действительно хотят и будут бить и отвратить этого нельзя никаким поведением. Солдатская мать, шатаясь, вышла из ротной канцелярии. Приезжать сюда больше было незачем. Ее сын Горохов ничего еще не знал, надеялся на послабление, сердился на мать, что она так долго, и на себя, что ей приходится унижаться из-за его неумения быть как все. Кроме того, Горохов надеялся на гостинец. Он знал, что мать привезла пирожки и прямо с пирожками пошла к ротному. На гражданке он никогда не думал, что в день приезда матери, в час, когда в ее разговоре с ротным решается его солдатская судьба, его будут занимать пирожки. Но они занимали, он видел их ясно: если даже ротный ни на что не согласится, а такое возможно, хотя мать очень настойчива, — можно будет утешиться по крайней мере едой, только съесть надо быстро, ни в коем случае не брать с собой в роту. Все можно было перенести, только не зрелище материных пирожков, уплетаемых боевыми товарищами. Горохов верил, что мать сейчас к нему придет и его отпустят под это дело с геополитики, и, может, даже не запихнут назавтра в наряд по роте.</p><p class="p1">Он не знал, что мать его в это время, согнувшись, бредет по Баскакову в сторону автобусной остановки, дальше, дальше от бывшей школы, где стояла рота. У солдатской матери Гороховой не было сил еще раз видеть сына, смотреть в его глаза и обещать перемены к лучшему. У него не должно быть надежд. Если он сюда попал, он должен стать биомассой. Сумка с пирожками била ее по ногам. Автобус пришел через полчаса и, воя, повез солдатскую мать Горохову в райцентр, откуда ей предстояло сутки добираться до Москвы единственным поездом. Выл автобус, выла Горохова, выл ослизлый пейзаж за окном.</p></span></span></span></span></span>
