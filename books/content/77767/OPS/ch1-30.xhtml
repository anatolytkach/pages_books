<span><span><span><span><span id="id40"><div class="title5">
<p class="p">6</p>
</div><p class="p1">— Вот так оно все и выглядит, — закончил Гуров, аппетитно затягиваясь сигареткой. Он все делал аппетитно и везде выглядел, как хозяин, — даже на волоховской кухоньке, где сидел впервые. Лысая его голова уютно блестела под лампой.</p><p class="p1">— Дурак я, — без выражения сказал Волохов. — Такая простая вещь, а…</p><p class="p1">— Почему сразу дурак? Ты просек ровно половину, а многие и этого не понимают.</p><p class="p1">— Половину, и о той в Каганате рассказали.</p><p class="p1">— А ты поверил, и правильно. Значит, сам чувствуешь что-то такое. Уже полдела.</p><p class="p1">— Подожди. Когда, ты говоришь, они пришли?</p><p class="p1">— Хазары? Примерно в шестом веке.</p><p class="p1">— А варяги? В девятьсот шестьдесят втором?</p><p class="p1">— Да, когда Итиль пожгли. Кстати, Кестлер цитирует прелестную запись одного путешественника: русы, утверждает он, всегда по трое ходили испражняться. Один испражнялся, а двое караулили. Боялись внешнего нападения. Дурак, да? Он просто никогда не жил здесь и не знал, что русы все делают по трое. Это обычай.</p><p class="p1">Волохов очень любил Гурова в этот момент. Гуров был первым, кто наконец избавил Волохова от главного проклятия — от любви-ненависти к своим. Теперь их можно было спокойно ненавидеть и не считать своими, и так же спокойно можно было ненавидеть хазар, имевших на эту землю не больше прав, чем его родной гнусный народ. Волохов сам не понимал, почему так легко поверил незнакомому человеку. Гуров говорил то, о чем сам Волохов давно догадывался, добавлял последний штрих в картину мира — что ж было не верить ему?</p><p class="p1">— Хазарский каганат — то самое тринадцатое колено, так что все правильно. Они пришли и довольно быстро построились. Это же пора великих переселений, сам должен знать. Шестой-седьмой века. Мир трещит, все по новой. Бродят народы, ищут непонятно чего, срываются с места… Все борются за лакомый кусок. И тут мы — сам видишь, место злачное, народ кроткий, что ж не захватить? У них это быстро. Но только недолго музыка играла — шаталось тут еще одно безземельное племя, только северное. Не знаю уж, за что их погнали, — тоже, наверное, согрешили, а может, просто бродяги, вроде цыган. У меня даже знаешь какая была теория? Что первородный грех — он не один. Его каждое племя совершило и за это было изгнано, и поэтому теперь все живут не на своей земле. А хотят на свою, только не помнят, где она. Вот и скитаются в поисках. Веке в шестом-седьмом точно что-то такое было, все как с цепи сорвались. Галлы пришли в Рим, монголоиды — на Чукотку… А эти к нам. Ну, насчет первородного греха — сам понимаешь, завиральное.</p><p class="p1">— Но красиво: каждый ищет свою землю — элегантная мотивировка. Надо было тебе к нам идти.</p><p class="p1">— Мне в моем Генштабе неплохо. А дальше смотри: приходят варяги, выдумавшие потом, что их призвали. Я, кстати, не исключаю даже, что действительно призвали — потому что уж очень надоело под этими сидеть. Они пришли — видят, народ действительно незлобивый. «Попытка ведь не шутка — пойдем, коли зовут!». Ну и вот, и остались. Тех пожгли, они обиделись — пришли и опять захватили. А мы молчим, ждем, пока они друг друга перебьют. Никак. Ладно, в восемьсот сорок пятом вроде бы опять хазары победили, а сто лет спустя — варяги, и уже окончательно. Владимир, как ты знаешь, специально от хазар запер русские земли. Попытки реванша, само собой, были — в воззвании Минина упоминаются наряду с поляками именно хазары, под игом которых подыхает народ…</p><p class="p1">— Да воззвание-то поддельное.</p><p class="p1">— Какое? «Мужие, братие»? Самое что ни на есть подлинное. А дальше все по заведенному образцу. Действительно по кругу, тут ты уловил, и объяснение наглядное. Где никто ни во что не верит — там, кроме круга, никакого пути нет. А почему не верит — ты и сам понимаешь. У варяг с хазарами общей веры не бывает, а нашу они и вовсе вытаптывали.</p><p class="p1">— Что за наша?</p><p class="p1">— Будет время, расскажу. Все сразу нельзя. Это ведь тоже так, знаешь… травматично. Я в тринадцать лет все узнал от отца, и то чуть с ума не сошел, хотя ребенку легче. Нас мало, беречься надо.</p><p class="p1">— И почему мы их терпим?</p><p class="p1">— Тут сложно, — сказал Гуров. — Не так однозначно, по крайней мере. И ты мечом не маши, а то некоторые сразу начинают… тех свергать, этих гнать… Я иногда думаю, что мы их не терпим. Мне кажется даже, что мы их разводим — не в бандитском смысле, а примерно в том, в каком муравьи разводят тлей. Тлям, вероятно, тоже кажется, что они угнетатели. Я допускаю даже, что так кажется коровам. Не жалким, колхозным, а нормальным таким коровам, типа голландских. Корове кажется, что она священная. Верховное божество, все ее обслуживают, делать ничего не надо, знай доись. Как тебе, альтернативщик?</p><p class="p1">— И что мы имеем с гуся? — спросил Волохов цитатой из любимого анекдота. — Чем доятся эти коровы, которых мы тут на себе развели?</p><p class="p1">— Ну, во-первых, они друг друга убивают, — ответил Гуров.</p><p class="p1">— А нам какой прок?</p><p class="p1">— А иначе кто-нибудь убивал бы нас. Или мы друг друга. Я бы даже сказал, что они за нас живут и умирают. А мы, избавленные от нужд низкой жизни, делаем что-то гораздо более важное. Живем высшей формой жизни, в которой нет ни захватов, ни аннексий, ни контрибуций, ни революций, ни терроров. То есть находимся практически в ангельском состоянии.</p><p class="p1">— Ну уж и в ангельском? — не поверил Волохов.</p><p class="p1">— Во всяком случае в лучшем, чем они. И то, что их двое, — большое наше преимущество. Они все время отвлекаются друг на друга. Захватывают, тузят. Нам при этом, конечно, тоже достается, но не в такой степени. Любой другой захватчик нас с нашими данными давно бы уже… под корешок.</p><p class="p1">— Погоди. Мы, стало быть, их действительно позвали? Как бы наняли? Как нанимают одних бандитов, чтобы они защищали от других?</p><p class="p1">— Это похоже, — усмехнулся Гуров. — Очень похоже. Только мы наняли двух бандитов, враждующих. Они защищают нас от всех внешних — потому что в мире знают, что мы под ними ходим… И при этом друг друга мочат, и никогда не могут замочить до конца. Чрезвычайно удобная схема, ты не находишь? Так что это еще кто кого терпит…</p><p class="p1">— Мне одно непонятно, — задумчиво произнес Волохов. — Почему при такой истории — с ее кругами, неверием ни во что, угнетением и прочая, — такая культура? Уж никак не захватническая, верно?</p><p class="p1">— Отчасти захватническая. Нашей настоящей ты, небось, и не знаешь почти — ее в книгах мало печатают. Меня тут знаешь что больше всего умиляет? — доверительно сказал Гуров, сам, кажется, очень довольный тем, что нашел нового соотечественника. Вероятно, ему нечасто случалось вот так трепаться с безоговорочно своим. — Что у истоков так называемого золотого века стоят две хрестоматийные фигуры — раскаявшийся хазар и раскаявшийся варяг. Оба двигались друг другу навстречу и могли пересечься в некоей точке — но Бог не дал. И, может, к лучшему. Вдвоем-то они живо сдвинули бы дело… С одной стороны — Пушкин, классический хазар, атеист, смещавшийся всю жизнь к варяжству, государственничеству, северу… и на этом погиб, потому что кому велено чирикать — не мурлыкайте. Что интересно, убили не свои, а именно чужие: не примазывайся. То же и с Лермонтовым: начинал как классический варяг. Патриот, культ гибели, могучие северные образы, антихристианство, дурной вкус, Бородино — а в конце: «Прощай, немытая Россия». Они вечно стараются доказать, что это не он написал. Но «Люблю Отчизну я» — это-то явно он? «Ни слава, купленная кровью… ни темной старины заветные преданья» — все, что его так волновало в оны времена. Ведь и в военные-то пошел почему? Он искренне упивался всей этой романтикой, а потом, как пошла муштра, фуражировка-маршировка… В отставку захотел, покаялся. Я думаю, это его на Кавказе перевербовали. Был у него такой кунак — явно хазарский. «Чеченец посмотрел лукаво и головою покачал».</p><p class="p1">— Ну, про чеченцев ты мне не вкручивай.</p><p class="p1">— Я и не вкручиваю. Сам поймешь. Языки нормально посравниваешь — и поймешь.</p><p class="p1">— Да ладно, не в чеченце дело, — мечтательно сказал Волохов. — Красиво получается. Действительно, раскаявшийся варяг и раскаявшийся хазар… И потом — эта парочка всегда соблюдается. С Толстым и Достоевским, например.</p><p class="p1">— Точно. Сообразительный.</p><p class="p1">— Погоди, погоди, — Волохов с наслаждением развивал теорию. — Толстой: его любовь к Лермонтову — «Пришел как право имущий»… Общий интерес к Бородину… Начинал как офицер… Упивался аристократизмом, кичился дворянством… После — резкий перелом, ненависть к государству, любовь к хазарству и защита его, вплоть до изучения древнехазарского… И с другой стороны — Достоевский, начинавший как бунтовщик, а закончивший гостем и другом царской фамилии. Да? И эта его пушкинская речь в конце, про такой же предсмертный каменноостровский цикл… Слушай, как все сходится!</p><p class="p1">— Ну, это просто. — Гуров все время улыбался, и Волохов ловил себя на той же беспричинной улыбке: так радуются только своим. Он чувствовал себя так, словно попал в теплую ванну из ледяного заснеженного пространства. — Как только варяг или хазар начинают немного соображать, они тотчас ссорятся со своими. Вся так называемая великая культура стояла на раскаявшемся варяжстве и раскаявшемся хазарстве.</p><p class="p1">— Кстати, Толстой же говорил о Достоевском: «Что-то хазарское было в нем!».</p><p class="p1">— Точно, Горькому. Этот, кстати, был из классических раскаявшихся варягов. Культ силы, Ницше, сантиментальность — только под конец начал что-то понимать. А напротив него — раскаявшийся хазар Андреев, чистый ученик Достоевского, закончивший патриотической «Русской мыслью», государственничеством и всяким угарным квасом.</p><p class="p1">— Страшное дело, страшное дело, — радостно кивал Волохов. — Сходится! И все-таки… Мне знаешь, унизительно было бы думать, что все детерминировано только национальностью. Или историей, хоть это и мое прямое дело. Родился хазаром — и осуществляешь хазарскую программу, родился варягом — варяжскую… от личности-то хоть где-то зависит или нет?</p><p class="p1">— Обязательно, — кивнул Гуров. — У нас.</p><p class="p1">— У коренного населения?</p><p class="p1">— Да. Самоназвание я тебе со временем скажу, а слово «славяне» забудь. Оно гнусное, клейменое. Происхождение его сам знать должен.</p><p class="p1">— И в чем критерий?</p><p class="p1">— Да очень простой. Если тебе не подходят ни хазарство, ни варяжство — стало быть, ты и наш. Они детерменированы, да, им деваться некуда. Если ты хазар или рус — это клеймо в чистом виде. А если тебе и с теми не по дороге, и от этих воротит — стало быть, наш и есть. У меня, брат, чутье на это дело. А уж у них какое чутье! Нашего каждый чует. И — либо убить, либо припахать.</p><p class="p1">— Но ведь нас в результате почти нет? От нас, от третьих… то есть первых… хоть что-то осталось?</p><p class="p1">— Довольно много, — пожал плечами Гуров. — Кстати, ты в Москве их видишь каждый день. Как правило, на Кольцевой линии метро. Догадался, почему?</p><p class="p1">— Нет, — удивился Волохов. — Почему?</p><p class="p1">И Гуров объяснил.</p></span></span></span></span></span>
