<p class="p">Глава четвёртая</p>
</div><span id="id20"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Плоскорылов весь день чувствовал, что вечером его ожидает нечто приятное; он носил это приятное глубоко в душе, опасаясь бередить и тем обесценивать. На самом деле, конечно, он боялся себе признаться в одной штуке, то есть еще не придумал для штуки такого объяснения, которое позволяло бы уважать себя еще и за нее. Дело было в том, что вечером ему предстояло соборовать Воронова, — напутствовать казнимых входило в прямые обязанности капитна-иерея, и всякое честное исполнение своей обязанности было Плоскорылову отрадно; но ни к одной из своих многочисленных обязанностей не относился он с такой интимной, почти стыдной нежностью. Всякий раз, как кого-нибудь казнили, это наполняло душу Плоскорылова восторгом, умилением и еще той не вполне понятной истомой, которую он чувствовал при звуках пения девы Иры. Эта истома была недвусмысленно любострастного свойства, и потому-то капитан-иерей боялся вдаваться в самоанализ.</p><p class="p1">Он впервые почувствовал темное влечение к приговоренным именно при соборовании молодого солдата Калинина, попавшегося на попытке самострела. Калинин кричал на трибунале, что автомат сам выстрелил, что он отработает и отслужит, и глубоко осознал, и что он единственный сын у матери, — в какой-то момент для него забрезжила надежда: время было относительно мирное, затишье между боями, взысканий он не имел, отличался даже наглостью, с которой строил молодых, — то есть мог, мог еще исправиться; известен был случай, когда он накормил молодого говном, а стало быть, вполне тянул на сержанта, — Плоскорылов на трибунале любовался этим красивым, наглым парнем с сочным ртом и широко посаженными глазами. Однако, когда Калинин профессионально разрыдался и дал несколько прочувствованных клятв отслужить и загладить, капитан-иерей ощутил легкий страх и разочарование. Ему показалось, что Калинина оправдают и он, Плоскорылов, вследствие этого лишится важного и поучительного зрелища. Он никогда еще не соборовал приговоренных и был охвачен лихорадочным возбуждением. Конечно, сохранить отважного строевика для будущей службы тоже хотелось, — но почему-то Плоскорылову казалось, что мертвый Калинин лучше, полезнее живого. Он воспользовался обычной своей прерогативой — взял слово и в два счета убедил суд, что даже если Калинин выстрелил себе в ногу по чистой случайности, это еще опасней, чем самострел. Много ли навоюет солдат, у которого автомат сам собой стреляет в ногу своему обладателю? Это ли зовем мы правильным, вдумчивым отношением к табельному оружию? И не будет ли в высшей степени равновесно, если Калинин за случайный, пусть так, и одиночный выстрел в ногу расплатится закономерным залпом в грудь? В казни ведь важна эстетическая соразмерность, адекватность искупления; «Сим провинился, сим казню, сим очищение свершается, аще же кто помилования взыскует — на хер, на хер!», — процитировал он с особенным наслаждением глас осьмый из свода песнопений «Нельзя помиловать». Стоило Плоскорылову зажурчать своим ласковым голосом, который сам он про себя сравнивал с плавно текущей мягкою сталью, — как и Калинину, и всем его судьям стало ясно, что надеяться не на что. Плоскорылов был не из тех людей, что упускают возвышенные удовольствия. Их в действующей армии и так немного.</p><p class="p1">Вечером он должен был приобщать святых таин рядового Воронова, провинившегося отсутствием варяжского духа и капитулянтскими разговорами. Воронов не успел особенно напортить — слава Велесу, вовремя разоблачили, — но воин из него все равно был никакой, а для воспитательных целей он годился. Собственно, большинство неварягов или смешанных особей были никакими воинами, а потому от их публичных расстрелов было много больше пользы, чем от гибели в бою. Плоскорылов должен был подготовиться. Он переоделся во все чистое, понюхал себя, нашел свой запах приятным и здоровым, истинно варяжским, и слегка побрызгался «Юнкерским». Следовало повторить святые тайны. Варяжская вера отличалась от подлого хазарского наваждения еще и тем, что умирающему не просто предлагался хлеб и вино, но сообщалась некая информация. Информацию эту все встречали по-разному — Калинин, например, чуть не обмочился от изумления (если б не это, он бы встретил смерть без всякого достоинства и, верно, визжал бы, как свинья, — но святые тайны поразили его до того, что на расстрел он пошел в тупом животном изумлении. С варяжской точки зрения, лучше было умирать по-коровьи, нежели по-свински). Другие говорили, что догадывались давно. Третьи ничего не понимали, принимая Последнее Откровение за фигуру речи. Но Плоскорылов был выпускником богфака и знал, что все так и есть. Сам он отреагировал на святые тайны как истинный избранник Велеса, ощутив не ужас, но священный восторг. Задача варяжства представилась ему столь величественной и чудесной, что он вытаращил глаза и позабыл закрыть рот. «Добре», — с суровой лаской отметил его преосвященный Игнатий Сибирский, коему выпало проводить первую инициацию Плоскорылова. Вид пухлого иерея, обалдевшего от восхищения, был так забавен, что преосвященный почтил его легким шлепком по филейной части. У варягов это считалось серьезным поощрением.</p></span></span></span></span></span>
