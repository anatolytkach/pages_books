</div><p class="p1">В этот же вечер, пока Волохов, ни о чем не догадываясь, совокуплялся с Женькой в последний раз перед очередной долгой разлукой, Эверштейн в своей избе осуществлял колонизационную политику по каганатскому сценарию.</p><p class="p1">Эверштейн, само собой, никогда не принадлежал к ЖД — наивной подростковой организации, годившейся для воспитания молодежи, но категорически непригодной для строительства нового мирового порядка. Варяжская пресса, обзывавшая хазаров ЖДами, играла на сходстве аббревиатуры с традиционным уничижительным обозначением. Войну вели вовсе не ЖД. Война была делом людей серьезных, знающих, чего они хотят, и не питавших никаких иллюзий насчет своих изначальных прав на эту землю. Право было, но куда более тонкое, нежели врожденное. Это было право сильного, и земля обязана принадлежать не тому, кто на ней родился, — к черту глупые имманентности! — а тому, кто с нею лучше справится. Воевать за принцип труднее и почетнее, чем воевать за Родину. Эверштейн понимал это с рождения.</p><p class="p1">Правда, он не совсем понимал другое. Вся их наука, все разновидности каббалы, толкований и руководств учили только одному — брать власть, выживать в мире, где им изначально не было места; все их законы регулировали только их собственную жизнь, уча их быть угодными непредсказуемому Богу, но ни в Торе, ни где-либо еще не было сказано ни слова о том, что же наконец делать, когда они овладеют миром. Мир, положим, сейчас бушевал где-то за российскими границами, медленно самоистребляясь, и заниматься им было теперь не время; Эверштейн, однако, не понимал, что делать теперь с этой Россией, которая досталась в полное их распоряжение. Он отлично понимал, как разбираться с варяжством, не доводя дело до открытого военного противостояния (которого, кстати, хазары до последнего пытались избежать — и все получилось бы гораздо лучше); однако раз уж случилась война — надо было как-то обеспечивать идеологией захваченные деревни, разбираться, что ли, с коренным населением, черт бы его побрал совсем… В пятом веке было, конечно, проще. Что они тогда делали? Установили власть, четкую структуру… построили крепости… дальше? Навык завоеваний, к сожалению, утрачен. Что поделать, полторы тысячи лет мы были поставлены в такие условия, когда не очень-то повоюешь. Приходилось самоутверждаться хитрыми путями.</p><p class="p1">Так, например, Эверштейн отлично понимал, что делать с местным искусством. Он даже немного занимался этим, пока не уехал в Каганат, разочарованный легкостью задачи. Так называемые люди искусства абсолютно не умели защищаться, поскольку это препятствовало их основным занятиям; парадокс заключался в том, что весь их инстинкт артистического самосохранения сводился к ослаблению самосохранения человеческого. Для начала хазары доказывали — причем весьма изобретательно, с помощью тонких теорий, — что предметом искусства является все и заниматься им может каждый; главным инструментом, как всегда, служила терпимость. Терпим же мы ваши отвратительные картины, на которых рабски, тупо копируется реальность; терпите и вы наши эксперименты. Мы готовы даже признавать ваши таланты — в обмен на то, что вы признаете наши. (Что-что, а не признавать хазары умели; их травля всегда бывала столь рьяной и дружной, что в обмен на временное милосердие иной художник готов был признавать искусством любую мазню противного лагеря, лишь бы его самого никто не обвинил в ретроградстве). Добившись равноправия, хазары начинали медленно, но верно побеждать — ибо не-искусство берет верх над искусством с предсказуемой легкостью: оно быстрее делается, не вызывает споров (ибо ничего не означает) и лучше продается. Таким образом хазары низвели до положения ремесленников всех, кто был с ними не согласен, и получили неограниченное право называть искусством все, что им было надо; правда, спросом среди глупой публики такое искусство не пользовалось, но кто же обращал внимание на публику! Точно таким же образом хазарство обходилось со всеми иными видами человеческой деятельности — кроме разве сельского хозяйства, потому что в сельском хозяйстве яйцо есть яйцо, а мясо — мясо, и сделать его супрематическим или абстрактным нет никакой возможности: тут все было по-честному. На войне, к сожалению, тоже приходилось действовать напрямую, потому что пуля есть пуля. Отлично ориентируясь в вещах тонких и сложных, в простых хазарство терялось.</p><p class="p1">Некоторый навык военных противостояний вернулся в шестидесятые, Семидневную выиграли с блеском — но и тогда речь шла о самозащите, а не о колонизации. В крайнем случае мы выступаем как работодатели. Получалось, что единственной задачей хазар в России будет порабощение коренного населения, с постепенным сведением его к обслуживающему минимуму, — но ему как идеологу нечего было тут делать. Ценности, которые он исповедовал, не было нужды кому-либо прививать: это были ценности победителей, которые побежденным ни к чему. Оставалось создавать музеи истребления и закрывать школы.</p><p class="p1">В каждой новой захваченной деревне Эверштейн первым делом создавал музей истребления, то есть вывешивал в каждой сельской школе один и тот же набор фотографий, заблаговременно растиражированных еще в каганате. Это была по возможности полная история бедствий хазар, много потерпевших в том числе и от коренного населения, никогда толком не умевшего защитить хазар от варягов. Развесив по стенам чудовищные фотографии, Эверштейн начинал действовать как бы от лица бесчисленных жертв. Получалось, что все хазарам должны. С этой высоты легче было закрывать школы, все равно нерентабельные, поскольку детей не набиралось даже на один класс. Попутно Эверштейн занимался поиском чудофобов — так он давно уже называл про себя антихазарски настроенные элементы. Элементы эти среди коренного населения были распространены крайне широко: при полной неспособности организовать собственную жизнь они обязаны были завидовать хазарам! Не может быть, чтобы дикари оказались настолько тупы и ни к чему не способны, чтобы даже не замечать чужой избранности. Несомненно, их должны были ненавидеть — несмотря даже на то, что хазары несли России освобождение от варяжского ига; здесь наверняка уже поняли, что волка на собак в помощь не зовут. Даже круглый идиот должен был уже сообразить, что общечеловеческие ценности актуальны ровно до тех пор, пока не пришли истинные хозяева, хазарове — видите, сама этимология за нас; именно в уничтожении антихазарского элемента видел Эверштейн свою главную задачу. На его беду, антихазарский элемент никак себя не проявлял. Тут следовало воспользоваться любимой тактикой преждевременных родов, — что-что, а провоцировать противника хазары умели; прямых чудофобских выступлений пока еще не было, святынь не оскверняли, фотографий не срывали, — но это дело времени, успокаивал себя Эверштейн. Если не начнут, сами начнем, а там и местные подтянутся. Вот тогда мы и окажемся в столь любезной нам ситуации выживания и борьбы — которая, в сущности, оптимальна для оккупационных сил, чтобы не успокаивались за отсутствием видимого сопротивления.</p><p class="p1">В Грачеве он для начала прикрыл местную ячейку Гражданского общества — просветительской неправительственной организации, готовившей почву для Миссии. Ячейками Гражданского общества на местах руководили верные люди, большей частью из местных, но глубоко проникшиеся идеями хазарства. Идеи эти до поры состояли в том, что у столь преступного и безжалостного государства, как варяжское, не должно быть армии — особенно в условиях, когда всем внешним врагам столь явно не до нас. Не пускать детей в эту преступную армию (действительно преступную — он отлично знал, что там вытворяли с новобранцами). Потом, само собой, — изначально критичное отношение к любым установлениям преступного государства. За что мы платим налоги? Они идут на содержание милиции, которая нас только избивает, и чиновничества, которое нас грабит. Наконец, страна, в которой нет денег на лечение больных детей, не имеет морального права вывешивать флажки по праздникам, ибо каждый флажок — это еще одна загубленная жизнь, на спасение которой им сейчас, видите ли, не хватает средств. Срывание флажков, правда, не прибавляло денег больным детям, но отлично работало на идею. Гражданское общество сделало свое дело. Именно оно активно выступало в защиту любого арестованного вора — потому что этот вор, по указанию все того же ГО, много жертвовал на благотворительность. Ведь нам неважно, какими путями он сколотил капитал! Преступное государство не имеет права устанавливать законы. Нам важно, что очередная жертва варяжского правосудия много делала для детей. Так забудем все претензии к нему — ради деток и мамочек! Прокурора называли не иначе как матереубийцей, и рожа у него, надо признать, была соответствующая. Все это было очень славно придумано, но теперь в Гражданском обществе — по крайней мере на территории, контролируемой Каганатом, — не было уже никакой нужды. Это общество себя исчерпало, спасибо, достаточно.</p><p class="p1">Перед Эверштейном сидел Вова Сиротин — действительно очень сиротливый, небритый, грязный молодой человек, столь глубоко проникшийся идеями хазарства, что впору было принимать его в ЖД, где сидели такие же розовые идиоты.</p><p class="p1">— Благодарю вас за службу, Вова, — проникновенно говорил Эверштейн, контролировавший деятельность Вовы еще из каганата. Вова смотрел на него счастливыми собачьими глазами. — Я очень вами доволен. Теперь ваша миссия выполнена. Можете поискать себя в чем-нибудь другом. Ну, во-первых, землепашество — забирайте любой участок и возделывайте, людей в помощь я вам дам. Во-вторых, само собой, когда дойдем до Москвы, я вас приглашу, и место советника вам обеспечено. Идеологическая работа — ваш козырь, я в этом не сомневался. У нас каждый наконец отыщет место по заслугам, вертикальная мобильность, все по-людски. Ну и, само собой, если вас еще что-то заинтересует… исторические, например, разыскания… или автомеханика… У вас есть автомобиль?</p><p class="p1">— Нет, — преданно отвечал Вова.</p><p class="p1">— Ну, дадим вам… В общем, подумайте, в чем вам теперь лучше всего себя реализовать, а Гражданское общество осталось в прошлом. Мы не забудем, конечно, и впоследствии в Москве обязательно будет мемориал… Просто в память о людях, которые, так сказать, подготовили и осуществили…</p><p class="p1">Боже, думал Эверштейн, какой безнадежный идиот. Хоть бы он перестал кивать и улыбаться, я же его, в сущности, посылаю ко всем чертям!</p><p class="p1">— Скажите, — говорил Вова, заглядывая Эверштейну в глаза, — а как же комитет матерей? Ведь я убежден, что и теперь, когда призывать в армию будете вы, останется необходимость в общественном контроле?</p><p class="p1">— Ну что вы, Вова, — устало отвечал Эверштейн. — Какой же общественный контроль? Или вы нашей армии не знаете? В нашей армии нет дедовщины, Вова. Это касается и собственно хазар, и граждан оккупированной территории. У нас никогда не бывает дедовщины. У нас мороженым кормят. У нас все солдаты по выходным домой ездят, и никто не уедет из дома дальше, чем на пятьдесят километров. Это святое, Вова. Это принцип. Сами посудите, зачем нам общественный контроль над армией, если со всеми контрольными функциями у нас отлично справляются офицеры? Это же наши офицеры, Вова, нормальные. Они умеют заниматься не только шагистикой. Они психологи, Вова. Они поэты… — Черт его знает, подумал Эверштейн, этак я совсем заговариваться начну. Вова все еще смотрел на него по-собачьи.</p><p class="p1">— Позвольте, — все так же улыбаясь, говорил он. — А как же с «Голосом общества»? Как же с «Набатом»?</p><p class="p1">— Поймите, — ласково сказал Эверштейн, — «Набат» имел смысл, когда было бедствие. Во время бедствия бьют в набат, понимаете? А какое же теперь бедствие, когда общечеловеческие ценности? Пришла нормальная власть, Вова, не оккупационная, а родная, исконная власть. Пришли люди, умеющие управлять. Нормальный политический менеджмент. Мы не нуждаемся в насилии, Вова, у нас другие принципы. Зачем же бить в набат, когда все прекрасно?</p><p class="p1">— Но, знаете, — пролепетал Вова, — контроль прессы над обществом…</p><p class="p1">— Ну какая пресса, Вова! — отечески увещевал его Эверштейн. — И какое общество? Сколько у вашего «Набата» было тиража?</p><p class="p1">— Пятьдесят экземпляров! — гордо ответил Вова. — По числу дворов!</p><p class="p1">— Ну да, вы его размножали на моем же принтере, который я вам же прислал…</p><p class="p1">— Вспомните о подвиге Фуфлыгина! — возопил Вова, поднимая палец. Он не мог говорить о Фуфлыгине спокойно. Фуфлыгин в самом деле на короткое время стал в России символом свободной печати.</p><p class="p1">— Вова! — не выдержал Эверштейн. — Вы же отлично знаете, что Фуфлыгин замерз по пьяни. Да, нам надо было — стратегически надо, подчеркиваю, — написать о том, что он отважно разоблачал и все такое. Но кого он разоблачал-то, Вова? Он же и спецкором вашим не был, вы сами писали все, что подписывали его именем! Нельзя же так верить всему, что пишешь в собственной газете!</p><p class="p1">— Но… но… — заметался Вова, до которого начало наконец доходить. — Вы хотите сказать, что у оккупационной власти не будет ошибок? Которые надо разоблачать Гражданскому обществу?</p><p class="p1">— Я вас просил не называть эту власть оккупационной, — сказал Эверштейн уже несколько жестче. — Вова, зачем заниматься бесоизгнанием в раю? В раю, Вова, бесов не бывает. Или вы хотите быть святее Папы римского? Или думаете, что вы, человек, скажем так, нехазарского происхождения, можете научить хазар соблюдать права человека? Это смешно, Вова, друг мой. Это самонадеянно. Это все равно как если бы разведчик дождался прихода своих — и все равно продолжал собирать разведданные, уже про них, понимаете? Это совершенно, совершенно не нужно. Вы свободны, короче, Вова. У меня еще много дел. А в помещении Гражданского общества будет теперь новая администрация, понимаете?</p><p class="p1">— Но права человека… — сказал Вова совсем тихо.</p><p class="p1">— Я теперь соблюдаю права человека! — прикрикнул на него Эверштейн. — Мы, мы теперь гаранты прав человека! Каких вам надо прав, человек вы этакий? Я вас пять лет пою-кормлю! Кто бы вы были без каганата? Хуже Фуфлыгина были бы вы! А так вас три раза Си-Эн-Эн показало, когда вы с крыши навернулись и руку сломали! Марш отсюда, пока я вам не показал ваши действительные права. Совершенно невозможно работать, никто уже по-русски не понимает! Свобода — это что, самоцель? Свобода — только средство для установления окончательной справедливости, и будь у вас хоть какое-то образование, вы бы понимали… Знаете, в чем главная беда туземцев, Сиротин? Вам можно что угодно внушить, и вы будете повторять. Но усвоить, переварить, пять минут подумать — это уже выше ваших сил. Какая свобода нужна людям, которые умеют только повторять за другими? Вот вам лично, Сиротин, какая свобода нужна, если я вас столько лет учил простым вещам, а вы до сих пор не поняли, зачем нужны общечеловеческие ценности?</p><p class="p1">— Я пожалуюсь, — прошептал Вова. — Я в конгресс США напишу.</p><p class="p1">— Пишите, Вова, пишите. Конгресс США только этого и ждет. Лучше сразу пишите в Китай, это теперь более влиятельная сила. Только меня больше не утомляйте, у меня от вас голова болит, и у вас изо рта пахнет.</p><p class="p1">Вова густо покраснел, еще немного помялся и вышел.</p><p class="p1">Следующим на прием к Эверштейну был записан местный учитель, он же директор сельской школы, преподававший тут все предметы. Учителю надо было деликатно объяснить, почему школа больше не нужна. Вошел изможденный сельский интеллигент, отброс варяжства, явный неумеха — кого и чему способен был научить такой человек? Эверштейн не поверил бы ни одному слову такого человека.</p><p class="p1">— Здравствуйте, Иван Андреевич, — сказал он мягко, вставая навстречу вошедшему. — Я хочу от имени командования поблагодарить вас за многолетнюю работу по просвещению, так сказать, учащихся. Так сказать, спасибо вам большое.</p><p class="p1">— Школу, я так понимаю, вы закрываете, — не отвечая, сказал учитель. Рукопожатие у него было вялое, чеховское, чахоточное. — Это правильно, наверное, потому что действительно мало народу… Сказать же я вам хочу, что есть очень талантливый мальчик, Андрюша Дылдин, фамилия, может быть, не совсем благозвучная, но мальчик крайне одаренный, играет на баяне.</p><p class="p1">— Очень, очень хорошо, играет на баяне, — говорил Эверштейн. — И мальчик, так сказать, что играет на волынке. Разумеется, мы все это учтем, милейший Иван Андреевич. У меня, однако, есть к вам несколько принципиальных вопросов. Присаживайтесь. — Эверштейн с наслаждением передразнивал варяжскую интеллигенцию — эту плесень на болоте, уродливый нарост на теле бронтозавра, колонию микробов, страдающих половым бессилием. Они, конечно, любили хазар, но не по убеждению, а из трусости; как всякая слабая, вырождающаяся особь, они тоньше чувствовали опасность, только и всего. Они понимали, что с этими надо ладить, потому что в случае чего ждать от них жалости — напрасный труд. В душе, конечно, все они были законченные чудофобы, как и этот их пресловутый Чехов, геморроидальный чахоточный медик, ходячее исцелися-сам, автор прочувствованной новеллы «Хазарка». Вся их скромность, тихость, деликатность происходила исключительно от слабости и вырождения, — и по этим же причинам они защищали нас, устраивали митинги в нашу защиту, нанимались в нашу печать… Что еще они умели, кроме как писать свои многословные колонки? Эти — самые слабые из завоевателей; и они еще надеются на милосердие? Самые слабые почему-то всегда надеются на милосердие. Нет уж, Эверштейну был милее какой-нибудь искренний воинственный враг, годный хоть на пахоту в случае порабощения: эти, со своими общечеловеческими принципами, вовсе уж никуда не годились. Только варяги могли называть интеллигенцией самых нежизнеспособных, несчастных, ипохондрических, годящихся только молоть языками: сравните их с хазарской интеллигенцией, плотной, жовиальной, крикливой, женолюбивой! Ни одна армия мира не любит предателей, даже если пользуется ими; предателя кормят брезгливо, из милости, ибо ни один перебежчик не перебегает по идейным мотивам, нам ли не знать.</p><p class="p1">— Слушаю вас, — насторожившись, сказал Иван Андреевич. Казалось, он даже поднял одно ухо.</p><p class="p1">— Вы, милейший Иван Андреевич, преподаете ведь около тридцати лет? Не так ли?</p><p class="p1">— Тридцать два, — все так же настороженно отвечал учитель.</p><p class="p1">— Ага. Так-с. Следовательно, большая часть вашей карьеры прошла при варяжской оккупации?</p><p class="p1">— Я работал при той власти, которая была, — растерянно сказал учитель.</p><p class="p1">— Очень хорошо-с, назовите это так. Но ведь та власть, которая была, — насаждала и соответствующую идеологию, разве не так?</p><p class="p1">— Я учил детей грамоте и счету, — сказал Иван Андреевич с некоторым даже вызовом, весьма забавным в устах человека, шатаемого ветром.</p><p class="p1">— О да, и письму, — подхватил Эверштейн. — Учат нас и грамоте, и письму, а не могут выучить ничему. Но ведь и истории, верно? И основам права, не знаю уж, как это у вас называется после очередной реформы? И вдалбливали детишкам, что это их земля?</p><p class="p1">— Это их земля, — эхом отозвался учитель.</p><p class="p1">— Вы отлично знаете, Иван Андреевич, что это не их земля, — спокойно сказал Эверштейн. — Что и подтверждается фактами. Большая часть населения сбежала, стоили приблизиться настоящим хозяевам. Все это были варяжские оккупанты, не умевшие элементарно обработать поле. Те, кто остались, — допускаю, да, очень может быть, действительно давние жители этой территории. Но они никогда не были тут хозяевами, потому что вообще ничем не умеют управлять. В силу полного, полнейшего отсутствия исторической воли. А теснимыми, изничтожаемыми, всячески репрессируемыми хозяевами этой земли были, вот именно, те самые, которые наконец сюда добрались. Представьте себе. Такая история.</p><p class="p1">— Если угодно, вы можете сами объяснить это детям, — сказал Иван Андреевич после некоторого раздумья.</p><p class="p1">— Не хотим, Иван Андреевич, потому что это совершенно не нужно. У вас нету здесь такого количества детей, чтобы содержать школу. Это понятно, я надеюсь? Я совершенно не хочу ничего никому объяснять, милейший Иван Андреевич. Я настаиваю только на том, что и вы не имеете больше права увеличивать свой педагогический стаж. Тридцать два годика, и будет. Поработали ретранслятором, повнушали деткам варяжскую версию истории, порассказали о великом собирателе земель князе Владимире, при котором нас окончательно выгнали с нашей земли, — и спасибо вам большое, пожалуйте на почетную пенсию. Полагаю, вы не станете претендовать на слишком большие суммы? Потому что, сами понимаете, ежели у вас один способный Андрюша Дылдин на все село — уровень вашего преподавания становится ясен сам собой, разве нет?</p><p class="p1">— Я ничего другого не ждал, — прошептал Иван Андреевич.</p><p class="p1">— Правильно, что не ждали. Учителю трезвая самооценка даже и положена, не правда ли? А на досуге — у вас теперь много будет досуга — подумайте, как и чему надо было учить подопечных, чтобы получались нормальные люди. В музей истребления зайдите. Вам полезно будет посмотреть, что проделывали с настоящими хозяевами земли ее захватчики. Те самые захватчики, Иван Андреевич, чью политику вы здесь осуществляли. Растлевая — не побоюсь этого слова — детей. Детей растлевая, вы понимаете? Вы понимаете вообще, что такое дети?!</p><p class="p1">Здесь голос Эверштейна взлетел, — дети были любимым хазарским козырем, и в самом деле трудно было найти другой народ, который бы относился к ним так серьезно, — но учитель не испугался, хотя обычно крики Эверштейна пугали собеседников. Иван Андреевич спокойно сидел на шатком стуле, глядя куда-то в угол.</p><p class="p1">— Мы, конечно, все это заслужили, — сказал он тихо. — Но я одного не понимаю: вы что же все это, всерьез?</p><p class="p1">— Что именно? — полюбопытствовал Эверштейн, быстро переходя на деловито-спокойный тон, поскольку истерика явно не прохиляла.</p><p class="p1">— Ну… вот это все… про вашу власть… Неужели вы действительно думаете, что это теперь — навсегда? Что у вас получится?</p><p class="p1">— У нас всегда получалось, — сказал Эверштейн. — На своей земле, да чтоб не получилось? Или вы опять думаете победить при помощи генерала Мороза? Так мы, знаете, и на Колыме не дохли, что нам ваши нынешние морозцы…</p><p class="p1">— Я не к тому, — отмахнулся учитель. — При чем тут мороз, пространство… Вы что, в самом деле не понимаете, что никому из вас никогда не взять верх? Ни вам, ни нашим? Вы же неглупый человек, наверное. Ну, закроете вы школу. А дальше что?</p><p class="p1">— А дальше — доведем до конца то, что вы нам своим варяжским реваншем не дали сделать в семнадцатом, — сказал Эверштейн. Он не был настроен на историософские прения, тем более что на вопрос «А дальше?» у него самого не было стопроцентно вразумительного ответа.</p><p class="p1">— А что, без варяжского реванша у вас все получилось бы? — спросил Иван Андреевич. — Я же немного знаю вопрос. Я знаю, что у вас уже к двадцать третьему году все посыпалось из рук. Ничего не прижилось, буквально ничего! Поймите, вам можно сколько угодно бороться за власть, но брать ее нельзя. Мы-то выживем, но вы очень скоро перережете друг друга — как этого-то не понять, я не знаю! Ведь сколько попыток уже было, сколько крови пролито своей и чужой…</p><p class="p1">— Варягам вы, вероятно, этого не говорили? — осклабился Эверштейн. — Они бы вас за такие речи — живо чик-чик?</p><p class="p1">— Говорил и варягам, — закивал учитель, — и Здроку ихнему говорил — он у меня всех детей с уроков снимал, на марш-броски гонял… Толку-то? Я это кому хотите скажу, и ничего мне не будет, потому что старый учитель никому не нужен. Но как вы сами-то не видите?</p><p class="p1">— Что же вы нам предлагаете? — спросил Эверштейн, чувствуя, что сам этот вопрос — уже поражение.</p><p class="p1">— Что? Я не знаю, что вам предложить… Может быть, и им, и вам попробовать взять немного земли и начать работать на самих себя? Но ведь вы не можете жить, никого не захватывая. Это ваша сущность, судьба. Значит, я ничего не могу вам посоветовать. Я вам только могу сказать, чем все кончится.</p><p class="p1">— Кончится все тем, старая блядь, — сказал Эверштейн, — что ты сейчас пойдешь к себе в избу и там останешься, и скажешь мне спасибо за то, что я тебя не шлепнул, как собаку. В метафизические прения он со мной будет тут входить, Лоханкин фигов. Я тебе не интеллигенция, понял, сопля зеленая? Я твою интеллигенцию на очке видал. И место ваше будет теперь на очке, интеллигенция сраная. Увижу, что детей у себя собираешь, — самого выгоню, дом попалю. Разводить мне тут антимонии. Пшел!</p><p class="p1">Учитель встал и бочком вышел, избегая поднимать глаза. Некоторое время Эверштейн молча курил, возвращая себе утраченное душевное равновесие. Смешно, в самом деле. Кто смеет давать мне советы? Несчастный отпрыск народа, умеющего только запрещать? Ведь они любой свой успех использовали только для самоистребления; ведь вся их программа — возьмем власть и расстреляем! Ничего другого не надо — только расстрелять врагов, и сразу же наступит благоденствие; а врагов они наживать умели, это точно! Впору нам поучиться. Нет врага — сделаем, воспитаем, под пыткой заставим признаться, что враг! И представитель этого народа — слабый, болезненный, хилый представитель, но терпели же его, не убили, не попался на зубок к своим! — будет мне тут рассказывать про непобедимость этой земли. Они думают, что эта земля покорится только им, слушается только кулака и сапога — ничего, мрази. Бывает другой кулак и другой сапог… Он выбросил окурок и улыбнулся. Надо было срочно войти в образ весельчака, своего парня, — следующим на прием был у него назначен местный хулиган Паша Звонарев.</p><p class="p1">— Здорово, Паша! — произнес Эверштейн, когда в дверь просунулся ладный, гладкий Паша. Паша после каждого движения делал любующуюся паузу: вошел, полюбовался тем, как вошел, прикрыл дверь, полюбовался тем, как прикрыл. Отошел, еще полюбовался. Он был то, что называется справный: классический варяг с его белокурой варяжской красотой, которую ни с чем не перепутаешь. Баской, басковитый. Другим варягам при хазарском приближении стоило бежать, потому что хазары, по слухам, с ними не церемонились. Эти слухи были так устойчивы, что хазарам даже и не нужно было проявлять особенного зверства — варяги разбегались сами, и только коренное население встречало захватчиков спокойно, привычно. Однако Паша Звонарев, истый варяг, никуда не убегал — он не первое нашествие переживал и отлично знал, что такие, как он, будут нужны всегда. В этом и заключался ответ на вопрос: что будут делать хазары с варягами, если победят. Варяги, например, взяли бы да выгнали всех хазар, как они это часто и делали. Но хазары до такого примитивного варианта не опускались, о нет.</p><p class="p1">Варяги — народ простой, и хазары им, так сказать, глаза кололи. Варяги не переносили никакой конкуренции, поскольку где конкуренция — там прощай воинская дисциплина, основанная на железной безальтернативности. Хазары являли абсолютно иной случай. Им всегда был необходим наглядный, готовый для демонстрации враг: не хотите по-нашему? — отлично, будет по-ихнему. Основой хазарской тактики как раз и было это бесстрашие перед поверженным врагом: ни в коем случае не изгонять, держать для самоутверждения от противного. Варяги для этого годились идеально: грубые, прямолинейные любители расстрелов перед строем проигрывали адептам общечеловеческих ценностей в глазах любого сообщества. Совершенно ведь необязательно было заявлять во всеуслышание, что общечеловеческие ценности действительны для всех, кроме избранных: в своем кругу хазары, естественно, называли эту идеологию растлительской и следовали совершенно другим правилам. Но чтобы окончательно убедить всех, будто общечеловеческое — единственная альтернатива зверскому, следовало вырастить действительно хорошее, грамотное зверство; и потому немногие продвинутые варяги, вроде Паши Звонарева, отлично понимали, что им при хазарах ничего не будет. Раньше они били и насиловали из любви к искусству, а теперь — ради наглядной агитации, да еще и за общечеловеческие деньги; вот, собственно, и вся разница. Это все равно как если б при немецкой оккупации несколько комиссариков были оставлены комиссарить для скорейшего привлечения населения к немецкому порядку — но немцы были ребята плоские, где им дотумкать.</p><p class="p1">— Доброго здоровьичка, — приветно поздоровался Паша и протянул Эверштейну ладошку дощечкой. Эверштейн ладошку пожал, неприятно дивясь ее шершавой твердости.</p><p class="p1">— Как спали-почивали? — заговорил Паша округлым, ладным говорком. — На пуховой-то подушечке больно хорошо: ровно как бы мамка тебя в люльке укачивает! Сладко эдак дремлется. Каково кушали?</p><p class="p1">— Не жалуемся, не жалуемся, — тем же говорком ответил Эверштейн. — У вас-то самих каких жалоб нет ли? Не забижают ли наши солдатики, не утесняют ли законные власти?</p><p class="p1">— Никак нет-с, никаких жалоб не имеем, хозяйским доглядом оченно довольны, — ласково рапортовал Паша.</p><p class="p1">— А скажи, Паша, не странно ли тебе, русскому человеку, что вдруг развелось столько ЖДов? — прямо спросил Эверштейн. — Ведь они вас, русских людей, споить могут, очень свободно. Ась?</p><p class="p1">Паша уже просек, как его, русского человека, будут сейчас использовать, но для порядку выразил изумление.</p><p class="p1">— Да это как же-с, как же такое возможно-с? — расшаркнулся он. — Веселие Руси есть пити, не можем без того писати!</p><p class="p1">— Э, нет. Это ты мне не вкручивай. Нешто стали бы на Руси пить, кабы не ЖДовские шинки? — тем же дурашливым распевом принялся уговаривать Эверштейн. — Энто все мы, сердешные.</p><p class="p1">— Точно вы? — как бы в недоумении спросил Паша.</p><p class="p1">— Дык! И я больше скажу тебе, Паша. Ежели бы ты и остальных подсобрал, да напомнил бы им, откуда пошло главное зло, иродище хазарское, — то это и было бы самое что ни есть благое дело. Ась?</p><p class="p1">— Да ведь ежели мы вас, пожалуй, побьем, — рассудительно заговорил Паша, — то вы нас теперь, пожалуй, убьете!</p><p class="p1">— Отнюдь нет, — еще ласковей сказал Эверштейн. — Вы надобны. Вы разбойнички лихие, люди удалые, ушкуйные. Что ж дух томить, в затворе перепревать? Вам надобно разгуляться, раззудеться, потешить силушку. Конечно, времена таперича не прежния, так что вы особо-то, голуби мои соколы, не ушкуйтеся. Слегка тушуйтеся. Но пошумливайте, пошумливайте. Иначе оккупационная власть обнаглеет уже совершенно. Со своей же стороны могу пообещать вот это, — и Эверштейн вручил Звонареву стилизованный кожаный кошель с червонцами.</p><p class="p1">— Без, говорите, членовредительства? — с некоторым злорадством поинтересовался Паша.</p><p class="p1">— Без, говорю, — кивнул Эверштейн. — А то ведь и мы членовредить можем, ай не слышали?</p><p class="p1">— Так-то оно так, — сказал неисправимый варяг, быстро переходя с дурашливого на общечеловеческий. — Однако мировому сообществу, как могу наблюдать, сейчас не очень-то до вас, милые, да и не до нас, сирых. Так что ежели что вдруг ненароком того-сего случится, то и жаловаться будет особенно некому. Я хоть и коллаборационист беспринципный, вырожденец алчный, а все ж таки варяг природный, и если мы вас, хазарские морды, чуток пощиплем на оккупированных территориях — война нам все это дело спишет, не находите?</p><p class="p1">— А мировому сообществу, думаешь, теперь без разницы? — подначил Эверштейн.</p><p class="p1">— Точно так и думаю-с, ваше препархачество. Ежели бы оно не так, все мировое сообщество давно бы уже тут кучковалося, нашей землей наслаждалося, трудовым нашим потом питалося. Но поколику мы более никому не надобны, а место наше пропащее, погиблое, то и мировому сообществу до всего тут делающегося никакого дела более нет, ему бы с муслимами разобраться. Надоели вы, скажу, всему мировому сообществу по самое не могу, оттого и каганата вашего никто уже не спонсирует, и нет более никакого каганата, если начистоту. Ась?</p><p class="p1">— И то резон, — легко согласился Эверштейн. — На черта нам теперь каганат, когда мы на свою землю вернулись?</p><p class="p1">— Ну, какая она вам своя, про то мы хорошо знаем, — мрачно заметил Звонарев. — И ты смотри у меня, рожа хазарская, не бери на себя много, а то покоцаю. Будешь руководить патриотическим движением — так в тыкву дам, что семечки посыплются. Патриотическое движение есть самочинный порыв народных масс, а не хрен хазарский обрезанный. Понял ли?</p><p class="p1">— Как не понять, — слаще сахару осклабился Эверштейн и вытащил второй кошель.</p></span></span></span></span>
