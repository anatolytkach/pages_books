<p class="p">7</p>
</div><p class="p1">Вдоль главной среднеазиатской транспортной артерии, носившей имя Рус, в первом тысячелетии нашей эры селилось множество племен, сведения о которых частью ненадежны, а частью нарочно перепутаны. Западноевропейское раннее средневековье известно нам в мельчайших деталях, жизнь и география Ближнего Востока тех же времен тщательно задокументированы, а огромное пространство Южной и Восточной Европы, Придонье и Приволжье выглядит не то белым пятном, по которому хаотически бродят кочевые племена, не то лоскутным одеялом, которое никак не могут поделить между собой сторонники разных версий. Существует четыре концепции возникновения русской государственности — хазарская, русская, норманнская (варяжская) и истинная.</p><p class="p1">Согласно хазарской версии, так называемая салтово-маяцкая культура с ее белыми замками и многочисленными ремеслами была государственной культурой обширного государства — Хазарского каганата, занимавшего большую часть Южной Европы вплоть до левого берега Днепра. Славяне платили дань каганату (упоминания об этой дани содержатся в «Повести временных лет»), а русы воевали с ним. Некоторые исследователи отождествляют славян и русов, тогда как в анонимном арабском трактате «Пределы мира от востока к западу» (предположительно X век) ясно сказано: река Рута — приток Руса — «от русов течет к славянам». «Пределы мира» целиком на русский язык не переводились и по-русски издавались только фрагментарно, в переводе с английского (на который переведены В.Минорским). До последнего времени анонимная рукопись, обнаруженная в 1892 году, вообще считалась подделкой английских русофобов. Сами русы в «Пределах мира» охарактеризованы так: «Это огромная страна, и обитатели ее плохого нрава, непристойные, нахальные, склонны к ссорам и воинственны. Среди них есть группа славян, которая им служит. Кияба — город русов, ближайший к мусульманам. Это приятное место и есть резиденция царя. Слаба — приятный город, и из него ведется торговля со страной булгар. Уртаб — город, где любого чужеземца убивают». Среди жителей страны русов выделяется отдельная группа Мирват (мурруват, морроват): «Они пришли сюда, завоевали эту страну и поселились здесь». С этим, возможно, связано происхождение глагола «замуровать», означавшего первоначально «поглотить», «захватить». Мурруват пришли «из безлюдных земель Севера».</p><p class="p1">Восточнее страны русов находится страна хазар. «Это очень приятная и процветающая страна с большими богатствами. Оттуда поступают коровы, овцы и бесчисленные рабы. Атиль — город, разделенный рекой Атиль (Итиль, позднее Волга, — пер.). Это столица хазар и место пребывания царя, который называется Таркан каган. Тула и Лугх — два региона страны хазар. Люди здесь воинственны и обладают большим количеством оружия».</p><p class="p1">Главным источником сведений о Хазарии является так называемая еврейско-хазарская переписка. Состоит она всего из двух писем: обращения министра финансов омейядского халифа в Испании Абдуррахмана Второго Хасдаи ибн Шафрута к хазарскому царю Иосифу и ответа царя Иосифа. Эта переписка датируется серединой десятого столетия. Краткая версия ответа Иосифа сохранилась в сочинении еврейского писателя одиннадцатого века Иехуды бен Барзиллая (Барселонского). Ее обнаружил и впервые опубликовал Исаак Акриш в 1577 году. Более полная и содержательная версия была обнаружена Абеном Решефом (Авраамом Фирковичем) в рукописном хранилище при каирской синагоге. Сложность заключается в том, что Решеф был караимом — представителем иудейской секты, отрицающей Талмуд и обращающейся непосредственно к Библии. После смерти Решефа-Фирковича его коллекция попала в руки еврея-талмудиста А. Гаркави, и Фирковича назвали фальсификатором, поскольку документы его коллекции свидетельствовали о том, что хазарские евреи тоже были не талмудистами, а караимами. Полная версия письма царя Иосифа надолго оказалась под вопросом. Однако крупный советский востоковед П.Коковцов в своей публикации «Еврейско-хазарской переписки» (Ленинград, 1932) обосновал ее подлинность.</p><p class="p1">В своем письме Хасдаи ибн Шафрут интересуется, правда ли, что на востоке Европы есть страна, где свободно исповедуют иудейскую веру. «Я живу у реки по имени Итиль, — отвечает Иосиф. — Я еще сообщаю размеры пределов моей страны, в которой я живу. В сторону востока она простирается на 20 фарсахов пути до моря Гарганского, в южною сторону на 30 фарсахов пути до большой реки по имени Угру, в западную сторону на 30 фарсахов до реки по имени Бузан, вытекающей из Угру, в северную сторону на 20 фарсахов пути до Бузана и склона реки к морю Гарганскому». Перечисляя племена, платящие ему дань, Иосиф упоминает эрьзя («арису») и черемисов — восточных славян, живущих в Поволжье. Один фарсах, то есть час, пути равен 5–6 километрам. В начале тысячелетия хазары кочевали по Предкавказью от Каспия до Дербента, в пятом веке осели на Волге и в Крыму, после чего царь Булан принял иудаизм. Сведения Иосифа относятся к позднему, последнему периоду хазарской истории. В 962 году киевский князь Святослав захватил и разграбил столицу Итиль, и Каганат перестал существовать.</p><p class="p1">Противники хазарской версии утверждают, что она не подкреплена археологическими аргументами. В частности, на обширной территории салтово-маяцкой культуры обнаружены рунические надписи, принадлежащие к средневековой осетинской (аланской) системе письма, не имеющие никакого отношения к письменности хазар. Царь Иосиф, видимо, преувеличил процветание своего государства: Географ Мукаддаси упоминал его исключительную бедность — «Ни скота, ни плодов»; известно, правда, что на территориях Хазарии были поля, сады и виноградники — но, как подчеркивают источники (Истахри, Ибн Хаукаль), все это было в этом районе и до хазар. «Хазары не производят и не вывозят ничего, кроме рыбного клея», — сообщают источники. Некоторые атихазарские исследователи считают, что «рыбный клей» в этом контексте — фразеологизм, нечто вроде рыбьего меха, означающий, что хазары неспособны ни к какой работе, а только к угнетению; при всем уважении к чувствам антихазар нельзя не заметить, что рыбный клей существовал реально и стоил дорого. Правда, Хазария поставляет рабов, как утверждается в «Пределах мира».</p><p class="p1">О зависимости русов от хазар не упоминает ни один арабский автор, зато «Генеалогия тюрок» свидетельствует о конфликте между хазарами и русами: «Русы вторглись в земли хазаров и поселились там». Конфликт этот восходит якобы к древней вражде Руса и Хазара — основателей племен, но это интерпретация сугубо мифологическая.</p><p class="p1">Противники хазарской версии считают, что Хазарский Каганат был небольшим государством в восточном Предкавказье и дельте Волги, захватившим в девятом веке низовья Дона. Господствующим народом между Доном и Днепром считают русов и асов, которые кочевали по юго-востоку Европы и пришли в равнину между Доном и Днепром в шестом веке. Некоторые указывают, что асы — вариант самоназвания русов, другие считают их родственными племенами. Асы обладали европеоидной внешностью и передавали из поколения в поколение легенды о своих «светлых», «царственных» предках, что дает сторонникам «гиперборейской теории» причислять их к потомкам таинственно исчезнувших истинных арийцев, обладавших сакральными знаниями и ушедших с Севера в силу географических катаклизмов III–IV веков. Асам был присущ культ оружия (без оружия хоронили только старцев). Русская историография ссылается на странное сообщение Маврикия Стратега: рабы у русов живут на правах «свободных и друзей». Е.Галкина даже называет славяно-русский союз «взаимовыгодными отношениями». Между тем арабские источники ясно свидетельствуют о том, что «постоянно по сотне или двести они ходят на славян, насилием берут у них припасы… Многие из славян служат русам». Славяне, в отличие от русов, знали множество ремесел. В основе их культуры лежала идея круга: круглые жилища, «круговая керамика», круглые головные уборы. Тезис о «дружбе» и «взаимном влиянии» двух племен — славянского и русского — не подтверждается ничем, кроме сообщения географов школы Джайхани о том, что многие русы похожи на славян, а стало быть, между ними бывали смешанные браки. Чтобы славянка родила от руса, равноправие совершенно необязательно. Сомнительно, чтобы арабы школы Джайхани этого не понимали.</p><p class="p1">Согласно русской версии, именно русы были наследниками мудрецов и воинов — северных волхвов, живших в Гиперборее и обладавших запасом оккультных знаний. Во время великого оледенения они отправились в глубь материка, покинув родной Север. Отдельные сторонники русской государственности полагают, что легенда об Атлантиде сложена как раз о великом оледенении, а атланты — легендарные люди «из Алтынской земли», пришедшие к славянам и научившие их письменности. Отсюда, возможно, и поговорка, в истинном своем варианте звучащая как «Не было ни гроша, да вдруг Атлант». О мере добровольности славянского приобщения к ведическим ценностям спорят даже сторонники русско-атлантической гипотезы: одни полагают, что воинственные жрецы-атланты покорили славянские племена, другие же — что подчинили их мирно, силой арийского авторитета. Наконец, есть самодеятельные авторы — большею частью из числа геофизиков и яхтсменов, — уверенные, что асы и есть новое самоназвание атлантов, образованное, вероятно, как аббревиатура: «Атланты Славянские».</p><p class="p1">Наиболее близка к истине гипотеза Иловайского, впоследствии развитая Львом Гумилевым: согласно ей, территория восточных славян делилась между двумя могучими государствами — варягами на северо-западе и хазарами на юго-востоке. Варяги явились с севера в результате некоей геофизической катастрофы и исповедовали суровые воинские ценности, хазары принадлежали к гедонистической культуре юга и более всего увлекались торговлей, а производством не интересовались вовсе. Некоторые реакционные историки пытались обнаружить общие корни у британского «раб» (slave) из самоназвания славян — мол, славяне назывались так потому, что они рабы; прогрессивные историки аргументированно возражали, что это рабы назывались так потому, что они славяне. Варяжская историческая школа настаивает на том, что славян называли так за их воинскую славу (в варяжстве отрицается любая слава, кроме воинской): к этому аргументу прибегали, когда коренное население надо было в очередной раз заставить умирать за варяжские ценности. Хазары утверждали, что название славян происходит от названия второй хазарской столицы — «Слаба», упоминаемой не только в «Пределах мира», но и в ряде других источников. Согласно хазарам, никаких славян не было, а были безымянные кочевые племена, которым хазары принесли культуру и сельскохозяйственные навыки. Сами они, правда, сельским хозяйством не занимались, ограничиваясь тонкими ремеслами вроде варки рыбного клея. Создается впечатление, что они валандались по Южной Европе в поисках племени, которое согласилось бы на них работать, — и наконец на такое племя набрели.</p><p class="p1">От «круговой», циклической и концентрической культуры славян уцелело очень немногое — сначала она старательно вытаптывалась, а потом, когда коренному населению Приволжья и Придонья стал очевиден сугубо захватнический характер насильственной колонизации, эту культуру унесли глубоко в подполье, передавая только своим. Язык славян подвергался такой же колонизации — слова меняли смысл, ибо захватчики употребляли их, не понимая. Тонким и сложным языковым аппаратом славян они пользовались по-захватнически, грубо и поверхностно. Не в силах сопротивляться колонизации, славяне стонали то под варяжским, то под хазарским игом. Упоминания о стычках варягов и хазар сохранились во многих источниках. Согласно некоторым историкам, все они носили характер не только территориальный, но, так сказать, принципиальный: вертикальные иерархии севера сражались с горизонтальными установками юга. В действительности варяги никогда не исповедовали собственных вертикальных установок, что подтверждается и варяжским образом загробного мира, в котором идеальные воины знай себе дерутся да пируют без всякого повода; иерархии соблюдались только в захваченных варягами сообществах, тогда как между самими варягами царили взаимопонимание и равенство, а воинские добродетели вроде отваги и аскетизма вообще навязывались лишь побежденным: никто из поклонников Одина не отличался воздержанностью. Точно так же и никто из хазар не соблюдал приписываемых им правил: хазарское сообщество было жестко структурировано, не отличалось ни гедонизмом, ни леностью (бешеная энергия хазар вошла в пословицу) — а отсутствие вертикальных иерархий, свобода и распущенность предназначались для побежденных, чтобы воля их сломилась и душа растлилась. Варяги и хазары сражались не за свои ценности, а за славянскую территорию и кроткое славянское племя, обслуживавшее их по очереди. Ценностные различия служили всего лишь предлогом, ибо в жизненной практике нет большего варяга, чем хазар, и лучшего хазара, чем варяг.</p><p class="p1">От коренного населения России к началу двадцать первого века осталось очень немногое. Вот почему почти никто в стране не умел и не хотел работать, а главные споры шли между теми, кто желал воевать, и теми, кто хотел торговать. Но немногие уцелевшие славяне по-прежнему исповедовали культуру круга, и потому…</p><p class="p1">— Ты понимаешь теперь, кто остался от нашего племени? — спросил Гуров.</p><p class="p1">— В смысле?</p><p class="p1">— Те, кто ездят по кругу. Те, кто удерживают мир от окончательной гибели. Те, кто не имеют права покидать Кольцевую.</p><p class="p1">— Васьки, — прошептал Волохов. — Этого не может быть.</p><p class="p1">— Может, — сказал Гуров. — Такое может быть, знаешь…</p><p class="p1">Очень скоро то, чего не может быть, началось.</p></span></span></span></span></span>
