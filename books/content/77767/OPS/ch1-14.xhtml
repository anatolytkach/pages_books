<p class="p">5</p>
</div><p class="p1">В это же самое время на плацу, раскисшем после трехдневного дождя, проходила строевая подготовка писателей, прибывших в Баскаково по разнарядке газеты «Красная звезда».</p><p class="p1">Писателей прислали к Паукову по двум причинам. Во-первых, он числился в лучших боевых генералах и обладал, помимо несомненного воинского таланта, идеологической выдержанностью. Он мог серьезно, обстоятельно рассказать о целях войны, о настроениях солдат и о неизбежном торжестве русского дела. Во-вторых, Баскаково было местом сравнительно безопасным — конечно, с писателями давно не церемонились, но империя не может считаться империей, если не бережет своих бардов. Война войной, а культурка культуркой. Писательскую бригаду сформировали в Москве и отправили на южнорусское направление, где они и застряли после начала боев — верховное командование категорически запрещало отпускать их назад. Конечно, прямой опасности не было — как-нибудь не убили бы, но ЖДы могли их перехватить, а этого главнокомандованию не хотелось категорически. К ЖДам и так перебежало слишком много мелкой литературной сволочи, купившейся на посулы свободы. Никакой свободы не дали, да и вообще к этнически чуждому элементу в ЖДовской армии относились недоверчиво, — по первому каналу прошел даже сюжет о том, как перебежчики живут у них на положении военнопленных, — однако среди писателей бытовал миф о хазарской вольности, и потому немногих преданных людей следовало беречь. В результате бригада патриотически ориентированных писателей в количестве восьми душ третью неделю сидела у Паукова на шее, жрала армейский паек и встречалась с рядовым составом.</p><p class="p1">Писателей хотели было поселить всех вместе, при штабе, но из Москвы пришла директива окунуть их в жизнь. После директивы гостей рассредоточили по избам, познакомили с ротными командирами, а командирам приказали обеспечить доступ московских литераторов к наиболее героическим рядовым. Ротные оказались в недоумении — выискать героев, достойных попасть на страницу «Красной звезды», в пауковской дивизии было трудно. Армия занималась по преимуществу шагистикой, геополитикой, чисткой оружия да разнообразила будни учащавшимися расстрелами своих.</p><p class="p1">— Вот, пожалуй, рядового Краснухина возьмите. Хороший рядовой, — смущенно улыбаясь, советовал взводный, старший сержант Касаткин. — Он подвигов больших не совершал пока… но находясь на посту, в карауле, произвел предупредительный выстрел, когда проверяющий намеренно не назвал пароля. Чуть проверяющего не застрелил, хороший солдат.</p><p class="p1">— Здравствуйте, — заискивающе говорил писатель Курлович, по происхождению полухазар, но убежденный государственник. Перед ним в Ленинской комнате сидел, положив огромные руки на круглые колени, красно-рыжий, краснорожий рядовой Краснухин. — Расскажите мне, пожалуйста, о вашем подвиге.</p><p class="p1">— Да чего ж, — смущенно говорил Краснухин. — Ну это… стою. И как-то что-то мне дремлется. Но думаю: нет, нельзя!</p><p class="p1">— А что вы охраняли? — спешил уточнить Курлович.</p><p class="p1">— Да это, как его… Грибок я охранял караульный!</p><p class="p1">— А, да-да, конечно, — мелко кивал писатель Курлович, спеша продемонстрировать знакомство с воинским бытом. Однако в очерке требовалась дотошность, а зачем нужен караульный грибок, Курлович понятия не имел. Может быть, речь шла о заболевании ног, поразившем караул, который теперь надо было охранять, чтобы грибок не принял эпидемического характера?</p><p class="p1">— Простите, — уточнил писатель после недолгого колебания, — а зачем все-таки нужен грибок?</p><p class="p1">— Ну это, — нехотя пояснял рядовой Краснухин, опасаясь уже, нет ли тут какого подвоха — может, его просто таким хитрым образом проверяют на знание устава? — Согласно пункта пятого Караульного уложения… Населенный пункт в сельской местности при постое взвода, роты, полка или иного воинского формирования должен охраняться ночным дозором часовых с интервалом в пятьдесят метров один от другого, снабженных караульным грибком каждый согласно параметрам грибка. Параметры грибка согласно устава пять в длину на три в ширину, высотой караульного столба два метра, для создания защиты охраняющего караульного от возможного дождя и шквалистого ветра, бурана, снежных хлопьев и жестокого града, в целях желательного предохранения личного состава от простуды, гнойных нарывов и иных форс-мажорных обстоятельств. — Краснухин перевел дух, Курлович неустанно строчил. — Ну и вот, и стоит грибок. Согласно параметров, сами выпиливали. А дождь хлещет — просто в душу и в мать!</p><p class="p1">— Любите мать? — с доброй улыбкой спросил Курлович.</p><p class="p1">Краснухин опять заподозрил подвох.</p><p class="p1">— Извините, это выражение такое…</p><p class="p1">— Я понимаю! — воскликнул Курлович. — Что же я, не русский?! (Как уже сказано, он был нерусский). Но мне хотелось бы деталь, понимаете? Что вы стоите под дождем на посту и вспоминаете мать.</p><p class="p1">Рядовой Краснухин в ту ночь и точно часто вспоминал мать, но к его собственной родительнице, рослой мосластой женщине из-под Воронежа, это не имело никакого отношения. Скорей уж его слова относились к таинственной матери всего сущего, которая и породила эту ночь, дождь и караульный грибок с его уставными параметрами.</p><p class="p1">— Мать моя в больнице санитарка, — смущенно пробасил Краснухин. — Отца с нами нету, а мать ничего, пишет.</p><p class="p1">— Ну и что вы вспомнили? — наседал Курлович, почувствовав живинку, яркую и сочную деталь. — Может быть, запах домашних котлеток? Не стесняйтесь, домашние котлетки — это же тоже часть нашего дома, нашей любви к малой Родине!</p><p class="p1">— Нет, мать все больше по картофельным, — признался Краснухин. — Лепешки такие, знаете, драники?</p><p class="p1">— Знаю, конечно! — радостно закивал писатель; драники — не грибок, материя знакомая.</p><p class="p1">— Ну вот, — задумался рядовой. — Голубцы еще иногда.</p><p class="p1">— Скажите, а помните вы руки вашей матери?</p><p class="p1">Краснухин вспомнил длинные руки своей матери с распухшими суставами и плоскими ногтями. Ему стало жалко мать, от которой он, конечно, мало видел ласки, но обиды на нее не держал. Все-таки она его не била, хотя следовало бы. Несколько раз он по молодой дурости залетел в детскую комнату милиции, один раз поучаствовал в ограблении ларька и чудом не попался, — в общем, если бы не армия, запросто мог бы загреметь в места не столь отдаленные; мать была как мать, не хуже, чем у остальных, — чего эта очкастая гнида прицепилась?</p><p class="p1">— Ну, вспомнил, — сказал он с раздражением. — А чего руки матери? При чем вообще мать?</p><p class="p1">— Но вы же сами упомянули…</p><p class="p1">— Я в том смысле, что дождь в бога и в мать! — сердито повторил Краснухин.</p><p class="p1">— Скажите, а в Бога вы верите?</p><p class="p1">— В Бога? — переспросил Краснухин. — Согласно устава, Русь Святая есть боговыбранная держава, выгодно и симметрично расположенная повдоль шестой части суши и красно украшенная от щедрот Отца, Сына и Святого Духа, защита же ее есть священная обязанность православного воинства, поставленного для того, чтобы сохранять, сдерживать, препятствовать, бдить и неукоснительно блюсти.</p><p class="p1">— Это вы сами? — взволновался Курлович. — Это, вот сейчас, — ваши собственные слова?!</p><p class="p1">— Зачем мои, — смутился Краснухин, — это глас шестый общевоинского устава от Софрония Пустынника. Вы не читали разве?</p><p class="p1">— Читал, конечно, читал! — засуетился Курлович. — Просто… понимаете, вы так искренне сказали… Я подумал, может быть — вы тоже пишете что-то… стихи, поэмы?</p><p class="p1">— Нет, я не по этой части. Я караульного взвода. Устав там, пол драить, себя подшить… грибок поставить, если чего…</p><p class="p1">— Ну хорошо, — разочарованно говорил Курлович. — Вот вы стоите, и что?</p><p class="p1">— И слышу шорох, — медленно выговаривал Краснухин. — Я кричу: стой, кто идет? На это согласно устава мне должен быть отзыв, «Конь в пальто». Но как я отзыва не получаю, то я произвожу досыл патрона в патронник и вторично задаюсь вопросом: кто идет? Не получая ответа после третьего повторения, я произвожу выстрел в воздух, и тогда проверяющий разводящий сержант Глухарев открывается мне, произнося команду «Смиренно». Но так как я не получаю отзыва, то и навожу на сержанта Глухарева личное оружие и досылаю патрон в патронник вторично, требуя парольственное слово. И тогда сержант Глухарев произносит отзыв, после чего я опускаю оружие и докладываюсь по форме.</p><p class="p1">— Скажите, — с некоторым испугом спросил Курлович, — а если бы сержант Глухарев и тогда не произнес отзыва?</p><p class="p1">— Тогда, — словно удивляясь самому себе, недоуменно выговорил Краснухин, — я произвел бы выстрел в грудную часть тела сержанта Глухарева, согласно устава, вплоть до окончательной смерти данного последнего.</p><p class="p1">— Но ведь это ваш разводящий, вы же его прекрасно знаете. Неужели…</p><p class="p1">— А что ж, что разводящий? — в том же недоумении переспросил Краснухин. — Ну, разводящий. А враг может прикидываться и проникать. А ежели его завербовал кто. Или он пьяный, что отзыва не помнит. Он нарушил, так? Нарушение означает стрельбу. И потом, я три раза обратился. Я патрон в патронник дослал. Если он сержант Глухарев, то мог среагировать, а если зомби? У нас «Ночь живых мертвецов» показывали. Видели «Ночь живых мертвецов»?</p><p class="p1">— Видел, — упавшим голосом сказал Курлович. — Но ведь сержант Глухарев на вас надвигался не с внешней стороны? Ведь он из села шел, так?</p><p class="p1">— Так, — кивнул Краснухин, не понимая, какое отношение это имеет к теме.</p><p class="p1">— Значит, — подробно, в стиле устава принялся объяснять Курлович, — он двигался в ваше расположение не из внешнего пространства, а из вашей собственной части, не имея целевого намерения захватывать кого-либо куда-либо?</p><p class="p1">— Ну, — кивнул Краснухин. Речь шла об очевидных вещах.</p><p class="p1">— Ну так за что же было его убивать?</p><p class="p1">— А мне какая разница, идет он из расположения части или из внешнего пространства? Он не выполняет уставное требование, значит, я должен действовать согласно уложения. Может, он хочет совершить побег из расположения. Так?</p><p class="p1">— Действительно, — сказал Курлович, — об этом я не подумал. И что, если бы вы его убили?</p><p class="p1">— Отпуск бы дали, — улыбнулся Краснухин, растягивая толстые, словно резиновые губы.</p><p class="p1">В таких расспросах писатели провели две недели, после чего Здроку и Паукову надоело, что люди живут рядом с солдатами, но встают когда им заблагорассудится и вообще нарушают боевой распорядок. Их было сказано окунуть в жизнь, а это получается не окунание, а так, слегка макание. К тому же из Москвы прислана была директива устраивать писательские вечера вопросов и ответов для личного состава, но личный состав не читал произведений данных писателей и потому истощил все свои вопросы уже в первый день. Уже он спросил у писателей, сколько им платят и почему, и поинтересовался творческими планами, но разнарядка была — по одному вечеру вопросов и ответов на каждого писателя, а их в бригаде было, как мы помним, целых восемь. С писателями надо было что-то делать, — судя по всему, они застряли надолго, — и генерал Пауков принял решение, какому позавидовал бы и ЖДовский легендарный персонаж Соломон. Первую половину дня писателям надлежало маршировать, ходить в наряды, выполнять погрузочно-разгрузочные работы — словом, по полной программе тянуть солдатскую лямку. Во второй же половине дня, когда солдаты занимались геополитической подготовкой или готовились к заступлению в наряд, они возвращались в свой писательский статус — встречались с рядовым составом, задавали им вопросы о службе или давали ответы о своей литературной работе.</p><p class="p1">Через неделю строевых занятий писатели перессорились. Они и до этого не особенно друг друга любили, как то и предусмотрено их гниловатым ремеслом, — но после первых же занятий по шагистике и химзащите, когда пришел конец их относительно вольной командировочной жизни, возненавидели друг друга окончательно. Ослушаться полковника Здрока и тем более генерала Паукова им и в голову не приходило — они были нормальные мобилизованные культработники военного времени, приписанные к «Красной звезде» и наделенные спецпайком, и у каждого было соответствующее воинское звание, специально введенное для культработников после начала боевых действий: краб второй статьи (первую статью присваивали только работникам зрелищных искусств — киноартистам, театральным комикам и анекдотчикам, ездившим по фронтам со специально утвержденной программой про ЖДов). Писатели честно маршировали, надевали химзащиту и бегали кроссы с полной выкладкой, начиная задыхаться после первых ста метров. Сержанты отечески подбадривали их пинками, а когда заслуженный писатель Осетренко упал на землю и захрипел, что больше не может, — остальным пришлось тащить его на себе, как то и практиковалось во время обычных кроссов. После этого писатели измутузили Осетренко не хуже, чем сержанты, и вообще в них начал проявляться здоровый варяжский дух. Полковник Здрок одобрительно выслушивал донесения сержантов о писательских маршировках и взъеб-тренажах, как назывались в армии занятия по химзащите. Во второй половине дня едва пришедшие в себя писатели снова встречались с личным составом и отвечали на вопросы тех самых сержантов, которые только что дрючили их на плацу. Так достигалось равновесие между воинской обязанностью и служением музами.</p><p class="p1">Как раз сейчас сержант Грызлов дрессировал писательскую бригаду перед зданием баскаковской школы, рядом с покосившимися баскетбольными стойками и накренившимися шведскими стенками.</p><p class="p1">— Носочек тянем! — грозно прикрикивал он. — Жопы втянуть! Втянуть жопы, интеллигенция! Нажрали тут себе на гражданских харчах… Здесь армия, а не колхоз! — как будто все остальное время писатели провели в колхозах. — Что вы смотрите на меня глазами срущей собаки?! Смирно! Напра-во! Кру-гом! Левое плечо вперед, шагом марш! На месте стой, раз, два! Начинаем сначала! Левую ногу по-днять! Опустить… У вас нога или кусок говна, краб второй статьи Струнин? Ответа не слышу!</p><p class="p1">— Нога, — одними губами повторял пожилой писатель Струнин.</p><p class="p1">— Не вижу ноги! Вижу кусок говна! — с удовольствием повторял сержант Грызлов. — Всем на месте, Струнин выполняет команду один! Ногу по-днять! Вытянуть! Носочек тянем! Стоять! Стоять, сука!</p><p class="p1">Струнин покачнулся на одной ноге и рухнул в грязь. Никто из писателей не поддержал его. Все брезгливо посторонились. Струнин, если честно, был плохой писатель, никто из коллег его не любил, а сборник его очерков «Соловьи генштаба» — о российских военных литераторах — считали чересчур льстивым даже в патриотическом лагере.</p><p class="p1">— Поднимитесь, — брезгливо говорил Грызлов. — Что это такое, краб Струнин? Если бы ваша жена вас сейчас видела, что бы она сказала? Небось когда на жену лезете, не падаете? Ногу по-днять!</p><p class="p1">— Все-таки это черт знает что, — тяжело вздыхая, говорил сановитый, крупный писатель-патриот Грушин, поедая вместе с солдатами жидкий, пересоленный борщ, то есть свекольный отвар с редкими листьями гнилой капусты. — Сколько нам еще терпеть? Давно бы в Москве были!</p><p class="p1">— А кто нас в эту бригаду втянул? — с ненавистью спрашивал Грушина желчный, тощий фельетонист Гвоздев. — Кто всех собрал?</p><p class="p1">— Ну, знаете, — пожимал плечами Грушин. — Я всегда считал, что место русского писателя — в воинском строю.</p><p class="p1">— Так чем же вы недовольны? Каждое утро ходите в воинском строю, — замечал Гвоздев.</p><p class="p1">— Но каждый служит по-своему… Я служу пером…</p><p class="p1">— Вот и будете пером в заднице Здрока, — говорил Гвоздев. Грушин смотрел на него с немым укором и прикидывал, в каких выражениях вечером, когда подошьется, напишет на него донос. Все писатели писали доносы друг на друга, у особиста Евдокимова они лежали в отдельной папке и составляли перл его коллекции. Писатели умели писать, выражения у них были извилистые, цветистые, — первенствовал Грушин, называвший Гвоздева то цепной гиеной, то бешеной лисицей. Еще хорошо писал драматург Шубников, у него был крепкий круглый почерк и чеканный слог, отточенный сериалами. Слова были все больше односложные, — гад, тварь, мразь, — в сериалах двусложные давно стали редкостью, а трехсложные вымарывались продюсерами.</p><p class="p1">После обеда, как водится, писатели отвечали на вопросы. Тот самый сержант Грызлов, который только что сравнивал ногу Струнина с куском говна и интересовался его способами залезания на жену, спрашивал с самым искренним подобострастием:</p><p class="p1">— Товарищ краб второй статьи! Расскажите о ваших творческих планах!</p><p class="p1">Никакого притворства в таком поведении не было. Сержант Грызлов был то, что называется «зубец», то есть служил по уставу с намерением заслужить честь и славу. Согласно устава и сержантских правил, в первой половине дня он обращался с писателями как с молодым пополнением, которое надлежало всемерно уничижать, дабы пополнение понимало, куда попало, — а во второй смотрел на них как на писателей, приехавших в часть. В сущности, главной воинской добродетелью, которую Грызлов, конечно, не формулировал для себя по незнанию некоторых слов, но чувствовал печенью, — как раз и было такое стопроцентно ролевое поведение, когда все связи, кроме предусмотренных субординацией, упраздняются. Грызлов наверняка был бы нежен со своей матерью, прибудь она в расположение роты на так называемый родительский день, когда родители раз в год допускались к солдатам официально, — но попадись она ему в качестве молодого пополнения, он бы и ее заставил заниматься шагистикой и подтягиваться на турнике, поскольку в этом контексте она была бы уже не мать, а человеческий материал; этот сержант нравился Плоскорылову, замполит обращал на него самое серьезное внимание, хотя Грызлов и не принадлежал к варяжскому роду. Грызлов, несомненно, был из самого что ни на есть коренного населения, кондового и неразвитого, но он обладал солдатской жилкой — не косточкой, подчеркивал Плоскорылов, косточка бывает только у варяжского контингента, но жилкой. Грызлов умел принимать ту форму, в которую его залили — или, в данном контексте, затянули; далеко не все коренное население обладало такими способностями, но оставить от него стоило только эту, гибкую и сознательную часть.</p><p class="p1">На вопрос о творческих планах Струнин в последнее время отвечал часто. Других вопросов ему почти не задавали. Он откашлялся и солидно начал:</p><p class="p1">— Знаете, в моем творчестве всегда большую роль играла наша армия. Я считаю, что если поставить рядом педагога, допустим, и офицера, — то лучшим педагогом окажется офицер. Или если водителя и офицера. Или, допустим, дрессировщика и офицера. Во всех отношениях лучше окажется офицер. Я всегда любил русское офицерство. В нем есть, согласитесь, какая-то особенная выправка, выпушка. И вот я думаю написать сейчас книгу об офицерстве, как оно сложилось, как стало настоящей воинской аристократией, — о лучших русских офицерах со времен Ивана Грозного. Хотелось бы дать такой, знаете, групповой портрет или даже венок, хотелось бы возложить его на русское офицерство, которое грудью пробило России дорогу к морю, которое прикрыло всем телом братские славянские народы, которое отличается всегда удивительной чистоплотностью… Вот если я сочту себя достойным, то приступлю немедленно к этой книге. Думаю, что достойное место в этой галерее блестящих русских офицеров займет генерал Пауков, руководящий той самой дивизией, которая сейчас гостеприимно встречает нас. Я ответил на ваш вопрос?</p><p class="p1">— Так точно, — радостно отчеканил Грызлов. — Р-рота! Еще вопросы!</p><p class="p1">— Товарищ краб второй статьи, — неуверенно произнес рядовой Сапрыкин, — расскажите, пожалуйста, о ваших творческих планах.</p><p class="p1">Струнин откашлялся.</p><p class="p1">— Знаете, — начал он, — в моем творчестве всегда большую роль играла наша армия. Я считаю, что если поставить рядом, скажем, врача и офицера, то лучшим врачом окажется офицер. Или если, допустим, престидижитатора и офицера, то лучшим престидижитатором окажется офицер. Офицер умеет все, его этому учили. В русском офицерстве есть какая-то особенная мастеровитость, ухватчивость. И вот я думаю сейчас написать книгу об офицерстве, как оно сложилось в особенную касту, в орден меченосцев. Как вообще становятся офицером, почему не всякий, а только избранный достоин этого звания. Хотелось бы, знаете, сплести такой венок или даже косичку, и возложить это на русское офицерство, которое лбом пробивало России дорогу к морю, которое прикрыло грудью братские славянские народы, которое отличается всегда удивительно приятным запахом… Вот если я почувствую в себе силушку, то я приступлю немедленно к этой книге. Думаю, что одно из первых мест в галерее блестящих офицеров займет генерал Пауков, которому вверена сейчас наша писбригада. Я ответил на ваш вопрос?</p><p class="p1">— Так точно! — ответил за Сапрыкина Грызлов, которому было видней. — Р-рота! Вопросы товарищу крабу!</p><p class="p1">— Товарищ краб второй статьи, — отчеканил другой зубец, явно будущий сержант рядовой Сухих. — Ваши творческие планы!</p><p class="p1">— А волшебное слово? — грозно произнес Грызлов.</p><p class="p1">— Пожалуйста! — отчеканил Сухих.</p><p class="p1">Струнин откашлялся.</p><p class="p1">— Знаете, начал он, — в моем творчестве всегда большую роль играла наша армия. Я считаю, что если поставить рядом, скажем, мать и офицера, то лучшей матерью окажется офицер. Или если, допустим, верблюда и офицера, то лучшим верблюдом окажется офицер. Офицер умеет все, он так обучен. В русском офицерстве есть какая-то особенная округлость, уютность. И вот я думаю сейчас написать книгу об офицерстве, как оно сложилось в теремок, в сундучок. Как вообще становятся офицером, почему не всякий, и хотелось бы сплести сеть, вязь… которое ногой открыло России дверь к морю и попой, попой своей прикрыло славянские народы… Вот когда меня как следует разопрет, то я тут же. Думаю, что не обойдется без генерала Паукова… ххо! Когда же обходилось без Паукова? Весь наш писдом ему признателен… Я ответил на ваш вопрос?</p><p class="p1">— Так точно! — очнувшись от короткого сна (в русских войсках все умели засыпать в любую свободную минуту), бойко ответил Сухих.</p><p class="p1">— Р-рота! — скомандовал Грызлов. — По одному на выход! Благодарю вас, товарищи писатели!</p></span><span id="id18"><div class="title5">
<p class="p">6</p>
</div><p class="p1">Вечером, перед сном, писатели ссорились.</p><p class="p1">— А ведь вы еще в девяносто девятом году, — начинал Грушин.</p><p class="p1">— Эка вспомнили! — зевал Гвоздев. — Если вспомнить, что вы про Банана писали…</p><p class="p1">— А я помню, помню. И что я писал, и что вы писали. И вот господин Струнин что писал. Помните, Струнин? Я особисту-то могу и номерочек указать, и журнальчик…</p><p class="p1">— Вы всегда мне завидовали! — с надрывом выкрикнул Струнин. — Всегда! Вы не отличаетесь чистоплотностью, у вас от ног пахнет!</p><p class="p1">— Вы больно отличаетесь… Я знаю, что ваша фамилия Стрюцкий.</p><p class="p1">— Господа, — пытался всех урезонить Курлович. — Мы интеллигентные люди… Мы творческие люди, господа…</p><p class="p1">— А вы молчите, не лезьте в русский спор! — прикрикивал на него Грушин, тотчас забыв, что Струнин тоже не совсем чист. На фоне Курловича он был все-таки свой. — Я вот доложу особисту, что вы писали о хазарстве в девяносто шестом году…</p><p class="p1">— Прекратите, стыдно! — вступал в спор Козаев, один из творческого тандема КозаКи, сочинявшего боевики о похождениях русского спецназа.</p><p class="p1">— Мы на фронте все-таки, — поддакивал его соавтор Кириенко.</p><p class="p1">— На фронте вы… — ворчал Грушин. — Боевички… Поставщики бульварного чтива…</p><p class="p1">КозаКи его не слушали и удалялись в свою избу. Там им предстояло до утра ваять шестнадцатый роман о похождениях своего сквозного персонажа, офицера спецслужб Седого. «Мы люди государевы, — приговаривал Седой, топча ослизлые внутренности шахидки, — люди служилые…». Книга должна была уйти в издательство не позднее пятнадцатого августа — за опоздание КозаКов могли открепить от пайка.</p><p class="p1">А Грушин, Гвоздев и Струнин долго еще переругивались в темноте — и, словно вторя им, лениво брехали и чесались баскаковские собаки.</p></span></span></span></span></span>
