</div><p class="p1">В это время майор СМЕРШа Евдокимов уже второй час допрашивал рядового Воронова.</p><p class="p1">Воронов был худ, черноволос и страшно нервен. Может быть, именно по этой причине выбор Евдокимова и пал на него. Бессмысленно было допрашивать тупую деревенщину, изгаляться над крестьянами с их однообразными ответами и полным неумением выкручиваться. Воронов, напротив, уже извивался ужом. Евдокимов не знал за ним никакой вины и с интересом наблюдал за тем, какую вину сейчас наговорит на себя он сам. Это было самым увлекательным в работе с интеллигенцией.</p><p class="p1">Воронов, в свою очередь, знал за собой слишком много провинностей и сейчас лихорадочно выбирал, в какой из них сознаваться раньше. Он не мог угадать, какая покажется Евдокимову более тяжкой. Наверняка все про него знают, запираться бессмысленно, — но надо еще выбрать, в чем каяться. В первые десять минут допроса Евдокимов был добр; Воронов уже примерно представлял, как он вдруг переключится с этой доброй тактики на яростную, — как-никак, это был уже третий допрос. Однако угадать, когда это произойдет, — не смог бы и сам майор, не то что его очередной пациент.</p><p class="p1">Основой следовательской тактики Евдокимова как истинного СМЕРШевца было приведение жертвы к сознанию своей греховности. Мало расстрелять, расстрелять всегда успеется: следовало растоптать, внушить мысль о том, что кара заслужена. Воронову предстояло всех предать и оговорить, отречься от матери, заложить командира — и только после этого отправиться на казнь с твердым убеждением, что люди вроде него не достойны жизни. Если угодно, это было даже и гуманно: непростительная жестокость — убивать человека, уверенного в своей правоте. Прежде чем ставить кого-либо к стенке, следует сделать так, чтобы жертва сама себя приговорила — и по этой части у майора Евдокимова конкурентов не было, по крайней мере в штабе тридцатой пехотной.</p><p class="p1">Он был из заслуженных СМЕРШевцев, о которых слагались легенды: дзержинец, наследник подлинного чекизма, способный выбить из бойца любое признание, за три дня превратить здорового малого в трясущуюся, кающуюся мразь — и все это почти без физического воздействия. Евдокимов прибегал к нему, разумеется, — но крайне редко: маменькины сынки кололись сами, и только это он любил по-настоящему. Евдокимов любил утонченность. Он приметил Воронова давно, с тех самых пор, как привезли пополнение. Две недели ходил вокруг да около, выжидая. Приставил к нему осведомителя — слушать разговоры. Воронов был то, что надо: скучал по дому, жаловался на портянки, один раз даже сказал, что вообще не понимает, почему и с кем они воюют… Любому другому это сошло бы с рук — да и среди офицерства велись подобные разговоры, — но Евдокимов вцепился в улику не шутя. Это был шанс. Вдобавок и Плоскорылов заказал расстрел перед строем — боевой дух вследствие дождей совсем разложился, — Евдокимов взял Воронова тепленьким, вызвав якобы для вручения письма из дома. Евдокимов знал, что значит для человека вроде Воронова письмо с приветом из дома. Он подробно изучил дело новобранца и знал, что тот взращен матерью-одиночкой, отца не видел, в мужественных играх не участвовал и вообще, несмотря на приличную физподготовку, был в душе сущая красная девица. Он отправил матери уже два письма. Евдокимов на всякий случай перехватил оба. В письмах не было ничего особенного, кроме телячьих нежностей и уверений, что Воронов устроился отлично, так что беспокоиться матери не следует.</p><p class="p1">Россия вообще была самая интересная страна, потому что главная ее история происходила внутри, а не вовне, и главные войны опять-таки были внутренними. Самое интересное начиналось в случае войны, хотя бы и гипотетической; главные конфликты в солдатской жизни разворачивались вовсе не с вероятным или невероятным противником, а с тем самым сержантом или иным вышестоящим командиром (просто сержант был ближе, почти родня). Считалось, что сержант и вся стоящая над ним пирамида, включая обязательного СМЕРШевца, вырабатывают таким образом из солдата настоящего мужчину, хотя настоящего мужчину они как раз выдавливали из него по капле, как раба, а вместо того вещества, из которого делаются мужчины, вливали в его жилы и кости тухлую, рыхлую, дряхлую субстанцию, парализующую всякое осмысленное сопротивление. Обработанный таким образом солдат только и способен был воевать истинно варяжским способом — то есть ничего вокруг не сознавая и боясь своих больше, чем чужих. Солдаты варяжской армии маршировали в пекло с облегчением — ни один враг не мог унизить и вздрючить их так, как сержант или СМЕРШевец.</p><p class="p1">Но что же командиры? Что же СМЕРШевцы? В том и заключалась особенность варяжской армии, что они никогда не были солдатами и не могли ими стать, будучи рождены для другого. Любой офицер, заставь его кто-нибудь проделывать то, что требовалось от солдата, обнаружил бы полную профнепригодность, — как и любой менеджер в варяжском бизнесе, поставь его прихотливая судьба на место того, кем ему выпало управлять, оказался бы не способен ни на что, кроме приготовления и распития кофия. Варяжское начальство ни в чем не могло подать примера, ибо не владело ни одним из руководимых ремесел, с одинаковой легкостью руля то нефтянкой, то мобильным бизнесом, то ротой, то госпиталем; варяжский прораб не умел строить домов, варяжский генерал не умел строить оборону, варяжский дирижер не умел строить скрипку — все они умели строить только подчиненных, предпочтительно по ранжиру. Ни один истинный варяг не имел навыка ни в каком деле, кроме насилия над непосредственным подчиненным, и всякий варяжский бизнес строился по тому же принципу — здесь орали на тех, кто работал, и не могли ничего другого. Во всяком другом бизнесе в начальство выбивался тот, кто нечто умел и в чем-то преуспел; только в варяжском начальство было особой кастой, куда никто не мог проникнуть извне. Варяжскими начальниками рождались — и годились на эту роль только те, кто не был способен ни к какой деятельности, но виртуозно умел топтать способных. Евдокимов был прирожденный СМЕРШевец, элита элит: он вообще ничего не умел. И он был некрасивый. Он был словно топором рубленный. Он был неуклюжий. Он был плечистый, нечистый. Блевотное он был существо, прямо говоря. Мало кто был хуже Евдокимова. Варяги любили Евдокимова, ценили Евдокимова.</p><p class="p1">Когда Воронов явился в СМЕРШ за письмом из дома, он не заподозрил никакого подвоха. Мало ли, может, во время войны все письма должны приходить только через СМЕРШ. Евдокимов уже знал, как будет его колоть. В таких случаях главным было — убедить себя, будто подозреваемому есть что скрывать; проще докапываться до истины. В СМЕРШе, еще в академии Дзержинского, всем внушали: невиноватых нет. Задача исключительно в том, чтобы найти вину. Народ прав, говоря, что у нас просто так не сажают. Выдерни из народа любого и сажай — и будет за что. Настоящий военный психолог должен был тщательно разобраться в прошлом и настоящем объекта, чтобы отмести случайные и побочные вины, сосредоточившись на главной. Воронов был удобен. Он был настолько виноват, что у Евдокимова через два дня оказался в руках букет расстрельных статей.</p><p class="p1">— Рядовой Воронов по вашему приказанию прибыл! — четко рапортовала жертва, еще не подозревая о своем новом статусе.</p><p class="p1">— Так-так, — медлительно сказал Евдокимов. — Так-так… (Это тоже была азбука СМЕРШевца — тянуть время, чтобы жертва пометалась). — Ну что же… ммм… Воронов, да? Значит, письмеца ждете?</p><p class="p1">— Так точно.</p><p class="p1">— От кого же, любопытно узнать?</p><p class="p1">— От матери, товарищ майор.</p><p class="p1">— Мать — дело хорошее. Один у матери?</p><p class="p1">— Так точно.</p><p class="p1">— А почему ждете письма? Адрес сообщили уже?</p><p class="p1">— Так точно.</p><p class="p1">— Ага. Ну, ладно. А почему вы думаете, что мать вам сразу напишет?</p><p class="p1">Воронов растерялся.</p><p class="p1">— Потому… потому что волнуется, товарищ майор.</p><p class="p1">— Волнуется? А почему она волнуется? Вы что, сообщили ей в письме что-то такое, от чего она может разволноваться?</p><p class="p1">— Никак нет, товарищ майор, — густо покраснел Воронов. — Просто… ну… я подумал, что она будет волноваться. Война же.</p><p class="p1">— А вы сообщили матери, что находитесь в районе боевых действий? — Голос Евдокимова начал наливаться свинцом. Попадая на фронт, солдаты не имели права об этом сообщать. Такова была особенно хитрая, иезуитская установка Генштаба: родители знали только номер части. Любая информация в письме, из которой можно было почерпнуть намек на истинное местонахождение солдата, расценивалась как измена и немедленно каралась.</p><p class="p1">— Никак нет, товарищ майор. Просто написал, что прибыли в часть.</p><p class="p1">— Так что ж она тогда волнуется? Нервная, что ли? Может быть, больная какая-то?</p><p class="p1">— Никак нет, товарищ майор.</p><p class="p1">— Я сам знаю, что я товарищ майор. Что вы мне все время — товарищ майор, товарищ майор? Вы, может быть, думаете, что в СМЕРШе дураки сидят?</p><p class="p1">— Никак нет, това… Никак нет, я так не думаю.</p><p class="p1">— А. Интересно. А как думаете?</p><p class="p1">— Я про СМЕРШ никак не думаю, това…</p><p class="p1">— «Товарищ майор», надо добавлять. Вы в армии находитесь или где? Вы, может быть, забыли основы субординации?</p><p class="p1">— Никак нет, товарищ майор.</p><p class="p1">— Я сам знаю, что я товарищ майор! — заорал Евдокимов. Воронов дошел до кондиции. Момент для перемены регистра был выбран безошибочно. — Значит, сначала волнуем мать, доводим ее, можно сказать, до нервного стресса, — а потом вот так запросто являемся в СМЕРШ за письмецом? Я правильно вас понял, товарищ рядовой? — Это тоже был любимый прием: перечислить с грозной интонацией несколько невинных фактов, из которых сейчас будет сделан неожиданный и убийственный вывод.</p><p class="p1">— Я не являюсь, товарищ майор… то есть самовольно не являюсь… я явился по вашему вызову…</p><p class="p1">— Я знаю, что по вызову! — громко прервал Евдокимов. — Не в маразме еще, слава Богу! Или вы полагаете, что у нас в СМЕРШе служат маразматики? Отвечать!</p><p class="p1">— Никак нет, товарищ майор!</p><p class="p1">— Что никак нет?</p><p class="p1">— Никак не маразматики служат в СМЕРШе, товарищ майор.</p><p class="p1">— А вы откуда можете знать, кто служит в СМЕРШе? Вы, может быть, уже имели вызовы? Приводы? (В лучших варяжских традициях Евдокимов предпочитал ставить дактилическое ударение, хотя слова такого не знал, ибо академиев не кончал: «фуражку к осмотру», «приводы», «возбуждено», «осуждено»; «возбужденный палач взобрался на осужденную женщину»).</p><p class="p1">Так, мысленно поворачивая перед собою Воронова, как деревянный шар, ища на нем зацепку, заусеницу, шероховатость, — майор Евдокимов к концу второго дня был сполна вознагражден. Воронов впал в истерику. Биясь в майорских сетях, как обреченная муха, мечтая хоть о часе передышки (Евдокимову уже два раза подали чай, Воронов еще ни разу не получил даже разрешения пойти на двор), рядовой был уже готов каяться в чем угодно. Евдокимов припомнил ему разговор с однополчанином о тяготах и лишениях воинской службы, сетования на то, что устав трудно запомнить из-за бессмысленных повторений, и пригрозил очной ставкой с рядовым Кружкиным, донесшим, что Воронов не обнаруживал смысла в войне.</p><p class="p1">— Значит, не видим смысла в войне? — спросил он хмуро.</p><p class="p1">— Никак нет, товарищ майор.</p><p class="p1">— Не видим, значит?</p><p class="p1">— Никак нет, видим, — повторял Воронов.</p><p class="p1">— Ты издеваться надо мной, засранец?! — вскочил Евдокимов. — Я душу из тебя выбью, понял, щенок?! Ты издеваться над боевым офицером?! (Внутри у Евдокимова все пело. Он даже забыл, что ни разу не был в бою: был приказ — СМЕРШевцев в бой не посылать, ценные кадры, вдруг чего!). У меня тут такие сидели и кололись, что не тебе чета, а ты издеваться надо мной?! Никак нет видим или никак нет не видим?</p><p class="p1">Перепуганный Воронов некоторое время соображал, но мозги ему еще не отказали.</p><p class="p1">— Никак нет, видим смысл, товарищ майор!</p><p class="p1">— Кто видит?</p><p class="p1">— Мы видим!</p><p class="p1">Это была необходимая проговорка.</p><p class="p1">— Запротоколировал? — спросил Евдокимов у высокого бойца Бабуры, своего секретаря, вялого малого несколько педерастического вида.</p><p class="p1">— Так точно, — небрежно отвечал Бабура. Он был тут свой парень и давно понял, что Воронова живым не выпустят.</p><p class="p1">— Так кто это мы? — нежно, вкрадчиво спросил Евдокимов.</p><p class="p1">— Мы все, товарищ майор. Все видим смысл.</p><p class="p1">— А ты за прочих не расписывайся! Что, уже и мысли читаешь? Признался бы сразу: мы есть тайная организация, действующая в войсках противника для приведения их к небоеготовности!</p><p class="p1">— Никак нет, товарищ майор, — вскочил Воронов, — никакой тайной организации!</p><p class="p1">— Проговорился, проговорился, — глядя в стол, словно жалуясь ему на чужое вероломство, заговорил следователь. — Предал мать. Всех предал. Себя предал. Но себя — что? Кто ты есть? Ты никто, ты понял? Но мать! Как ты смел предать свою мать!</p><p class="p1">— Никак нет, я не предавал матери, — сказал Воронов, собрав остатки мужества.</p><p class="p1">— Да? А Родина тебе уже не мать? Ты запротоколировал, Бабура?</p><p class="p1">— Тык-точно, — небрежней прежнего рапортовал Бабура.</p><p class="p1">— Не считать Родину матерью! Отречься от Родины! Где вы выросли, Воронов? — Евдокимов перешел на вы, словно рядовой только что бесповоротно пересек тайную грань, отделявшую пусть провинившегося, но гражданина Родины от изменника, недостойного звания человека.</p><p class="p1">— В Москве, товарищ майор.</p><p class="p1">— Что есть Москва? По уставу! — завопил майор.</p><p class="p1">— Москва… Москва есть столица Русской земли, стольно-престольный град, исторический центр ее объединения вокруг себя, мать русских городов и национально очищенный от всякого мусора краснобелокаменный город-герой, неоднократно отстоявший свою честь от иноплеменных захватчиков! — пролепетал Воронов формулировку гласа второго Устава российской истории и местоблюстительства.</p><p class="p1">— Ну вот, — удовлетворенно проговорил Евдокимов, и в истерзанной душе Воронова проснулась надежда. — Сами же говорите: мать русских городов. И от этой матери вы отреклись, создав боевую организацию и обсуждая в ее рядах, осмысленную или бессмысленную войну ведет ваша Родина. Хотя сама такая постановка вопроса, рядовой Воронов, есть уже государственная измена! Вы понимаете теперь, что с вами будет? Вы понимаете, что будет с вашей семьей? Купить жизнь своей семье, — отчеканил майор, — вы можете только полной сдачей всего личного состава вашей организации, поименно, тут! Мы слушаем вас, рядовой Воронов.</p><p class="p1">Рядовой Воронов молчал. Тогда Евдокимов лениво встал, поднял его за грудки так, что отлетели пуговицы гимнастерки, и несколько раз ощутимо, хоть и не в полную силу, ударил в живот.</p><p class="p1">— Я так долго могу, — предупредил он.</p><p class="p1">Воронов молчал весь следующий день и всю ночь, когда над ним трудились еще трое подручных Евдокимова — добровольцев, которым все равно было, кого бить, — но когда Евдокимов показал ему представление на арест всех его родственников, направляемое по месту жительства в связи с разлагающей пропагандой в военное время (представление было отпечатано на специальном бланке, такой метод воздействия официально разрешался Генштабом), Воронов признался в существовании тайной организации и назвал весь списочный состав своей роты. Он помнил не всех и потому попросил список.</p><p class="p1">— Все?! — спросил Евдокимов, не ожидавший такой удачи.</p><p class="p1">— Так точно, все.</p><p class="p1">— Вы издеваться надо мной?! — снова заорал майор и еще немного побил Воронова, который и так уже не очень крепко держался на стуле; однако Бабура успел запротоколировать признание, и расстреливать теперь можно было любого.</p><p class="p1">— Встать! — приказал Евдокимов. — Что ж ты, гадина… дрисня… Своих сдал, да? Всех как есть? Всю роту? А ведь у всех тоже матери!</p><p class="p1">Воронов молчал.</p><p class="p1">— Ты понимаешь, что из-за тебя все под трибунал пойдут?! Сейчас?! Сегодня?!</p><p class="p1">Воронов не отвечал. Он надеялся, что его абсурдное показание вызовет новый приступ майорского гнева, но по крайней мере в те полчаса, что он будет диктовать список, его не будут бить и, возможно, даже дадут попить. Он знал, что во время допросов тридцать седьмого некоторые тоже называли в числе заговорщиков всех, кого помнили, надеясь, что явная абсурдность показаний скоро приведет к ступору карательной машины, просто неспособной переварить столько народу; но машина была способна переварить этот народ несколько раз, с детьми, чадами и домочадцами, а хватать всех ей было вовсе не обязательно. Она уже умела растягивать удовольствие. Но еще лучше она умела внушать пище, что эта пища — дрянь, не заслуживающая ничего, кроме поглощения. Это у них очень хорошо получалось. Мало было сожрать — надо было внушить, что это еще самое лучшее, самое милосердное и гуманное, что можно сделать с такими отвратительными людьми, готовыми, вот видите, при первой же опасности сдать чад, домочадцев, сотрудников и сослуживцев, однополчан и единоверцев: мы бы небось не сломились, если бы вы хоть раз попытались напасть на нас в отместку… но где вам, скотам!</p><p class="p1">— Унести это дерьмо, — брезгливо сказал Евдокимов. Бабура и личный денщик Евдокимова, весельчак и непревзойденный массажист Старостин, чесавший пятки так, что с этим не мог сравниться никакой минет, поволокли Воронова в сарай.</p><p class="p1">— Завтра и употребим голубчика, — сказал себе Евдокимов. Оставалось главное, ни с чем не сравнимое наслаждение. Он достал из скоросшивателя письмо рядового Воронова домой и перечел его с начала до конца. «Дорогая мамочка, маленькая моя! Пожалуйста, не волнуйся. Здесь все ко мне очень добры, я все время занят, боевых действий нет и не предвидится, и если бы не тоска по всем вам, мои дорогие, было бы совсем хорошо. Пожалуйста, не напрягайся слишком насчет посылок, у меня есть все, что надо, и даже с избытком…».</p><p class="p1">По телу смершевца пробежала приятная судорога — не эротическая, конечно, но что-то сродни пароксизму наслаждения, который всегда испытывают крупные земноводные в момент насыщения. Интеллектуальная отрыжка, если угодно, — твердое сознание исполненного долга и легкая приятность полного, безостаточного поглощения. Жертва лежала в сарае. Сарай исполнял роль желудка. Майор Евдокимов изобличил своего сто тридцать первого внутреннего врага.</p></span></span></span></span></span>
