<span><span><span><span id="id98"><div class="title5">
<p class="p">3</p>
</div><p class="p1">После недолгого, но освежающего сна на подушках, набитых душистыми травами, под стегаными одеялами, на темной веранде настоятельского дома, Громов и Воронов проснулись почти одновременно. Из-под двери пробивался слабый свет: видимо, отец Николай готовился к дежурству. Что за дежурство — он не объяснял.</p><p class="p1">Громов привстал на кровати. Обстановка вокруг никак не напоминала монастырскую. Он чувствовал себя, словно в гостях у однокурсника, собравшего друзей на выходные у себя в дачном доме-курятнике. На крыльце послышались шаги. Пожилой монах с фонариком — стеклянная сводчатая башенка с белой плоской свечкой внутри — стучался в двери отца Николая.</p><p class="p1">— Да! — крикнул настоятель.</p><p class="p1">— Брат Никодим к тебе, брат Николай.</p><p class="p1">— Тихо, гостей разбудишь.</p><p class="p1">— Мы не спим, — робко сказал Воронов.</p><p class="p1">— А и правильно, — ответил настоятель, выходя на веранду. — Я хотел вам дежурство показать. Это любопытно, для свежего человека в особенности.</p><p class="p1">Монахи один за другим входили на веранду и рассаживались вокруг шаткого стола. Отец Николай разливал чай с донником. Все вошедшие приветливо здоровались с гостями.</p><p class="p1">— Простите, капитан, — сказал один монах помоложе, пристально вглядываясь в лицо Громова. — Мне кажется, вы одно время жили в Воронеже и мы могли там встречаться…</p><p class="p1">— Я никогда не бывал в Воронеже, — признался Громов.</p><p class="p1">— И я также, — кивнул монах. — Должно быть, это были двое других христиан.</p><p class="p1">Все заулыбались, и Громов тоже, но больше из вежливости. Он никогда не одобрял дзенских штучек.</p><p class="p1">Монахи негромко разговаривали между собой — Громов против воли, по привычке прислушивался, подозревая умысел. Ему было слишком хорошо тут, чтобы вот так сразу расслабиться. Здесь никто ничего от него не хотел, и тем, кто здесь жил, хватало забот без него. Может быть, желая расслышать что-нибудь относящееся к себе, он втайне ревниво надеялся, что играет какую-то роль в жизни этих людей.</p><p class="p1">Когда на веранде собралось десятеро, не считая гостей, настоятель снова подкрутил фитиль, чтобы светил поярче, и предложил собравшимся приступить. Все расселись вокруг стола, разом посерьезнев. Громов испугался было, что собравшиеся возьмутся сейчас за руки, и начнется спиритический сеанс, но ничего подобного, к счастью, не произошло, хотя все и положили руки на столе перед собою; отец Николай сцепил их в замок.</p><p class="p1">— Что же мы видим, братие? — спросил он буднично.</p><p class="p1">То, что последовало за этими словами, больше всего напомнило Громову даже не дежурство по полку, а скорее ночной эфир в радиостудии: давно, в незапамятные времена, в прошлой и даже позапрошлой жизни он хаживал гостем на такие эфиры, отвечал на звонки, что-то читал. Никогда потом не было у него столь острого чувства связи с миром, тонкой, не радийной или телефонной: ночью из Останкина виделась вся страна, на которую таинственные наблюдатели набросили незримую сеть. В ночи бодрствовали бесчисленные дежурные: кто-то не спал в ночной машине на пустом шоссе, стремительно летя к югу, кто-то следил за контрольной полосой на границе, кто-то сидел у постели больного — и это братство бессонных, не имеющее ничего общего с защитой государственных интересов, странным образом гарантировало человечеству выживание. Эти люди не знали друг о друге: они друг друга чувствовали. Полное знание о мире обеспечивалось их неосязаемой связью: только и было достаточно — проснуться в ночи. Днем они не узнали бы друг друга. Это чувство восходило к давнему, многажды забытому детству: память наша — как земля, новые слои скрывают прежние, но иногда внутри что-то аукнется, и увидишь свою жизнь как бы сквозь толщу стекла. Потом оно снова станет непрозрачным, закопченным, — но на секунду Громов в страшной глубине увидел себя, маленького, в ночной рубашке, у ночного окна, в страшном и радостном возбуждении. Иногда он просыпался ночью от страха, но это было совсем другое дело. Тут его вдруг охватила радость и сознание своего участия в великом и важном деле: может быть, провода невидимой связи как-то вдруг прошли через их квартиру. Не каждую же ночь такое бывает, ведь ночные сторожи перемещаются, и нити, связующие их, проходят через разные дома… В небе двигалась звезда — Громов знал, что это спутник, и спутник тоже был вовлечен в мистерию. Все держали мир на весу, в сетке, которую сами сплетали, — через минуту Громов уже вернулся в постель и заснул счастливым сном, в полной безопасности. Чувство безопасности уже и в детстве редко посещало его: всегда казалось, что надо куда-то идти, что-то делать… Спокоен он был только в армии — вот, уже пошел и делаю; но и там было небезопасно. Он не был уверен, что делает именно то и так. Чувство полной безопасности, страшно сказать, посетило его только в монастыре — вот почему ему так здесь нравилось: тут тоже все были мобилизованы, но в другую, собственную, явно родную армию.</p><p class="p1">— В Варсонофьевском монастыре болен отец Никон, — негромко отозвался коренастый монах с крупными волосатыми руками. — Болезнь его не тяжелая, но обременительная. Полагаю, суставы.</p><p class="p1">— Есть чем лечиться-то? — спросил монах, сидевший между коренастым братом и Вороновым.</p><p class="p1">— Травами лечится, — пожал плечами коренастый.</p><p class="p1">— Травами-то много не налечишься…</p><p class="p1">— А что делать, брат Иоанн?</p><p class="p1">— Может, мази выслать…</p><p class="p1">— К варсонофьевцам почта не проходит.</p><p class="p1">— Я придумаю, — сказал монах помоложе. — Есть человечек у меня на примете, может, с ним передам…</p><p class="p1">— Помолимся о брате Никоне, — сказал Николай, и все на минуту замолчали, сосредоточенно думая о далеком брате Никоне и его суставах.</p><p class="p1">— В Туруханском монастыре отец Андрей совершенно утратил смысл жизни, а может утратить и веру, — глухо сказал высокий худой монах, кашлянув в кулак. — Ему кажется, что вся эта канитель никогда не кончится и что от нас никакого толку.</p><p class="p1">— Ну и правильно, — сказал его толстый сосед с носом-картошкой и редкими зубами. — Нормальное самоощущение мыслящего христианина.</p><p class="p1">— Не совсем, — сказал Николай. — Если б он еще радовался такому ощущению, тогда конечно.</p><p class="p1">— Не соблазн ли это, отче? — спросил молодой робкий монашек. — От этого один шаг до того, что чем хуже, тем лучше.</p><p class="p1">— А что, не так? — обиделся толстый.</p><p class="p1">— Но жалость-то к миру? — спросил коренастый. — Нельзя же просто — гори все огнем… После того, как оно сгорит, нам и предстоит самое интересное. Надо дожить в пристойном состоянии, не впадая в тяжкий грех злорадования.</p><p class="p1">— Да мы еще доживем ли? — спросил хмурый монах, чьего лица Громов почти не видел — он сидел далеко от лампы.</p><p class="p1">— Если не доживем, то, может, и к лучшему, — заметил молодой. — Я бы не хотел…</p><p class="p1">— Тем не менее уже скоро, — подытожил Николай. — Ты-то, брат Георгий, доживешь наверняка. Не думаю, чтобы тебя скосила преждевременная дряхлость. Ты весьма здоров, брат Георгий.</p><p class="p1">— И прожорлив, — ехидно добавил высокий.</p><p class="p1">— Что до Андрея в Туруханске, — продолжал Николай, — скажи ему, брат Борис, что утрата смысла есть вещь, безусловно, хорошая. В мире, имеющем смысл, нам нечего было бы делать.</p><p class="p1">Брат Борис кивнул и сосредоточился. Все молчали.</p><p class="p1">— Сказал, — выговорил он наконец.</p><p class="p1">— И что?</p><p class="p1">— Сказал, что подумает.</p><p class="p1">— Подумать есть дело благое.</p><p class="p1">— Брат Игорь в Новосибирской обители передал, что впадает в тяжкий грех уныния, — сообщил очкастый монах с внешностью физика-Шурика.</p><p class="p1">— Передай ему следующее, брат Вячеслав, — радостно отвечал Николай. — Всякий раз, как впадаю в грех уныния, я испытываю огромную радость, улегшись на постель в своей келье и при открытом окне, в которое доносятся запахи монастырского луга, созерцая трещины в потолке. Они слагаются в причудливые узоры, я уношусь мечтаниями в удаленные обители и либо впадаю в благодетельный сон, либо придумываю забавный сюжет. Проделай то же, и сии трещины окажут на тебя не менее благое действие.</p><p class="p1">Брат Вячеслав задумался.</p><p class="p1">— Передал, — сказал он.</p><p class="p1">— И что созерцает брат Игорь?</p><p class="p1">— Брат Вячеслав сообщает, что, видимо, потолок в твоей келье давно не белен, — скрипучим голосом отвечал брат Вячеслав.</p><p class="p1">— Брат Игорь впадает в тяжкий грех занудства, — сказал настоятель. — Передай ему, что со своим потолком я сам разберусь, а он пусть перечтет «Женитьбу Фигаро».</p><p class="p1">— Брат Константин в Староволжской обители просил передать, что в окрестностях был бой, имеются раненые. Просит благословения на оказание первой помощи. Федералы отошли, раненых расквартировали у местных.</p><p class="p1">— А как он из монастыря выйдет? — спросил брат Борис.</p><p class="p1">Этого вопроса Громов не понял. Выйти из монастыря — легче легкого, так казалось ему.</p><p class="p1">— Но, может, он даст знать местным, и они привезут в монастырь особо тяжелых…</p><p class="p1">— Если повезут, — мрачно сказал монах, сидевший справа от Громова. От него приятно пахло «Золотой звездой» — он тер ею виски, страдая, видимо, от мигрени.</p><p class="p1">— Скажи брату Константину, что я его порыв одобряю, — после недолгого размышления выговорил Николай. — Что получится — решать не нам, а попробовать стоит.</p><p class="p1">Громов почувствовал, что Воронов смотрит на него вопросительно, но покачал головой: мол, сам не понимаю.</p><p class="p1">Николай с братьями обсудили еще несколько спорных случаев — кто-то болел, кто-то получил печальное письмо из дома, отец Марк в Бирюлевской обители влюбился и спрашивал совета (монахи долго хихикали, предлагая советы один непристойнее другого, — Николай строго осадил их, посоветовав брату Марку как можно скорее уйти к предмету своей страсти, а если не получится — усиленно молиться). Связь с братьями осуществлялась тут же, без всяких мобильных и иных телефонов, причем каждый из собравшихся имел на связи единственный монастырь. Громов подивился, что их на Руси осталось так мало.</p><p class="p1">— Ну-с, и что же мы видим? — спросил Николай, когда с монастырскими делами было покончено.</p><p class="p1">— Старик с девочкой идут на юг, — грустно сказал высокий. — Девочку жалко.</p><p class="p1">— Плохо девочке, — кивнул брат Георгий. — Девочке очень грустно.</p><p class="p1">— Слышит ли она нас?</p><p class="p1">— Иногда.</p><p class="p1">— Укрепите ее, чем сможете.</p><p class="p1">— Будем пробовать.</p><p class="p1">— Слышит ли нас старик?</p><p class="p1">— Не слышит, но знает.</p><p class="p1">— Старик не нравится мне, — твердо сказал толстый.</p><p class="p1">— Ты ему тоже не нравишься, — отрезал Николай. — Какая разница? Что с разочарованным?</p><p class="p1">— Разочарованный со своей дикаркой бегут в Дегунино, как и было сказано, — заметил брат Борис. — Тут кое-кого послали их остановить, но кое-кто не туда попал.</p><p class="p1">— Кое-кто попал как раз туда, — решительно заметил настоятель. — Бывает штабной умысел, а бывает и Божий промысел.</p><p class="p1">— Разочарованный до того уж разочаровался, что думает перебежать к хазарам, — хихикнул толстый.</p><p class="p1">— Ага, он им очень нужен, — сказал высокий.</p><p class="p1">— Я за него, кстати, боюсь, — тревожно сказал Борис.</p><p class="p1">— Думаешь? — резко спросил настоятель.</p><p class="p1">— Что-то больно быстро очеловечивается. А тогда ему не жить.</p><p class="p1">— Ну, совсем-то не очеловечится. А, брат Борис?</p><p class="p1">— Не знаю, буду следить.</p><p class="p1">— Следи. Что с нашим лесоводом?</p><p class="p1">— Пошел догонять девушку.</p><p class="p1">— Что с нашей девушкой?</p><p class="p1">— Сие нам неведомо. В тех местах, сам знаешь, брат Николай, плохо видно.</p><p class="p1">— Но наша девушка жива? — тревожно спросил брат Николай.</p><p class="p1">— Это да, — уверенно сказал монах, лица которого Громов не видел. — Пока точно.</p><p class="p1">— Помни, брат Мстислав, ты видишь дальше других, — строго сказал настоятель.</p><p class="p1">— Пока смогу, буду смотреть, — кивнул Мстислав.</p><p class="p1">— Ай, инспектор, инспектор, — сказал Николай. — Правильно ждешь, да не оттуда.</p><p class="p1">— А откуда? — спросил вдруг Воронов.</p><p class="p1">— Инстинкт выживания, юноша, силен у вас чрезвычайно, — одобрительно заметил Николай. — Придавая вас в спутники капитану, наш общий знакомый поступил чрезвычайно дальновидно. В огне вам не гореть, в воде не тонуть. Должен заметить, что местные вообще очень ловко избегают опасности и отлично чувствуют ее. Но что предсказано, то предсказано: не знаю, как будет, но знаю, чем кончится.</p><p class="p1">— Не хочу, — тоскливо произнес Воронов.</p><p class="p1">— А почем вы знаете, юноша? Вдруг это совсем не то, чего вы ожидаете? Вы думаете, Бог — вроде воинского начальника, который вас чуть под монастырь не подвел? А монастырь — вот он, ничего страшного.</p><p class="p1">— Боюсь, — так же тоскливо проговорил Воронов.</p><p class="p1">— Ничего не надо бояться, вон девушка не боится, и вы не бойтесь. Девочка со стариком идет, тоже не боится. Капитан ваш едет останавливать неизвестно кого, и то не боится, хотя сроду в гражданских не стрелял. А стрелять-то ему и не придется, ушли они из Копосова, капитан. Не то б вы, чего доброго, и правда пальнули, — нет?</p><p class="p1">— Откуда вы все это знаете? — только и смог спросить Громов, окончательно переставший что-либо понимать.</p><p class="p1">— А откуда вот он догадывается? — кивнул Николай на Воронова. — Знаю, и все. Завтра поедете с миром в Москву, отвезете рядового да и отправитесь, куда собирались. Хотите посмотреть, как там Москва?</p><p class="p1">— А как? — спросил Громов совершенно по-детски. Он уже готов был поверить, что ему сейчас покажут Москву.</p><p class="p1">— Да вот так, — пожал плечами настоятель, и в тот же миг Громов почувствовал Москву. Она напряженно пульсировала где-то к западу от монастыря, и Громов чувствовал, как через весь город мучительно пробирается, увязая в бесконечных пробках, «скорая помощь». Он понимал при этом, что она успеет. Ничего больше во всей Москве не привлекало его внимания, да он и не видел ничего. В голове у него оглушительно завыла сирена. Он знал, что фельдшер в кабине кусает кулак от нетерпения. Это был хороший фельдшер, не из тех, что выезжали по вызовам в последнее время, — больной ему был небезразличен, и он хотел успеть, и должен был успеть. Громов чувствовал, что с пробками ничего сделать не может, но способен каким-то образом утешить фельдшера, внушить ему, что все кончится нормально; и фельдшер успокоился, он знал это.</p><p class="p1">— Интересно, — сказал Николай. — Вот бы не подумал. Я бы, честно говоря, решил, что какие-нибудь учения… Вам что, про войну неинтересно?</p><p class="p1">— Про войну я и так все знаю, — машинально ответил Громов, но тут же спохватился:</p><p class="p1">— Вы что, и это видите?</p><p class="p1">— Ну, примерно, — неуверенно ответил Николай. — Скорее догадываюсь.</p><p class="p1">— Способный, — завистливо сказал брат Георгий.</p><p class="p1">— Абы кто и не придет, — загадочно ответил Николай. — Есть ли у вас вопросы, брат капитан?</p><p class="p1">— Много, — сказал Громов. — Но для начала один: почему этот ваш брат Константин не может выйти из монастыря?</p><p class="p1">— Брат Константин в затворе, — пояснил Николай. — У некоторых есть такая клятва, вроде, знаете, барбудос. У нас же тоже бороды приняты, кстати… Брат Константин не может выйти из монастыря, пока не кончатся эти ваши чертовы качели. Он не сам это выбрал, просто в каждом монастыре должен быть затворник. Получилось так, что у староволжцев это именно Константин, а он врач.</p><p class="p1">— А у вас кто затворник?</p><p class="p1">— Брат Мстислав, — вздохнул Николай. — Ему отсюда хода нет даже к реке. Пока все не кончится — или, соответственно, не начнется.</p><p class="p1">— Просто нельзя — или он не может выйти? — уточнил Громов.</p><p class="p1">— У нас это одно и то же, — сказал Николай. — Но, в общем, даже если бы захотел — не сможет.</p><p class="p1">Громов пригляделся к Мстиславу, и тот, угадав его мысль, придвинулся к свету. Громов увидел необыкновенно кроткое и печальное лицо человека, давно смирившегося со своей участью. Затворнику было лет пятьдесят, он был светловолос и зеленоглаз.</p><p class="p1">— Ничего, — сказал брат Георгий. — Может, действительно уже скоро…</p><p class="p1">— Это не от нас зависит, — сказал Мстислав.</p><p class="p1">— Но мы это увидим, — твердо закончил Николай. — Благодарю, братие, все свободны.</p><p class="p1">Монахи поднялись и вышли, тихо переговариваясь.</p><p class="p1">Некоторое время Громов молчал.</p><p class="p1">— Ну, как вы это делаете — спрашивать не буду, — сказал он наконец.</p><p class="p1">— Вы же и сами это делаете, как только что убедились, — мягко сказал настоятель.</p><p class="p1">— Да, хотя тоже не совсем понимаю, как именно. Но почему это распространяется только на монастыри?</p><p class="p1">— Да вовсе нет, — удивился настоятель. — Это обсуждаем мы только монастырские дела, а видим больше. Почти все, если угодно. Есть некоторые области, принципиально для нас закрытые, но там, я думаю, ничего важного не происходит… Вот — Блатск, но там, как бы выразиться…</p><p class="p1">— Защита? — догадался Воронов, впервые вступивший в разговор.</p><p class="p1">— Нет, что-то вроде болевого порога. Сил же нет, какое омерзение. Ну так в Блатске и не может быть никаких событий.</p><p class="p1">— А будущее вы видите? — спросил Воронов.</p><p class="p1">— Только в самых общих чертах, — смущенно сказал настоятель. — Ну так у нас, собственно, в общих-то чертах и написано… Чего тут выдумывать, все понятно. Я вас должен огорчить, вы славный юноша, и выживаемость у вас чрезвычайно высокая. Эти ваши знают, что делают, отправляя вас в качестве спутников на серьезное задание. Один такой устремленный, другой такой бессмертный… Но есть сила, которую у вас там все равно не могут учесть. Например, пошли туда, зашли не туда. За всем не уследишь, дырок-то все больше. Это вас Господь оборонил, — обратился он к Громову. — Вы бы, чего доброго, действительно убили. А там убивать решительно незачем.</p><p class="p1">— А что там вообще такое? — спросил Громов. — Это-то хоть могу я знать?</p><p class="p1">— С девушкой и чиновником? Там одна древняя закономерность, про которую я вам ничего определенного сказать не могу. Это здешние какие-то дела. Существует поверье, — очень может быть, вполне обоснованное, в языческих обществах это дело хорошо поставлено, умеют предсказывать… Если, в общем, некий потомок древнего местного рода полюбит девушку из рода хазар, или, напротив, девушка древнего рода полюбит юношу из рода варягов, то будет волшебный ребенок и конец света. Глупость, в общем, полная, но именно такая глупость может сбыться. Тут для меня, что называется, темна вода. Христианство так много поставило на человека, что отвергло почти все мистическое знание. Хтонических всяких божеств или как это называется… Есть же вещи, от человеческой воли не зависящие. Они нас не интересуют, как и вся магия, как и все внечеловеческое вообще. Я об этом знаю не больше, чем о строении материи. Что мне вообще материя? Мне она неинтересна. Какое-то роение, мельтешение… Но до христианства много умели всяких штук. Некоторые архаические сообщества их и до сих пор умеют. Предсказания там, исцеления наложением рук… Вот тут подобная ерунда, и очень может быть, что этот ваш рыжий Гуров имеет о ней представление. Но он человек, обычный человек, и потому не совсем там ищет. Это бывает с людьми, предусмотревшими все. Все предусмотрели, а детский какой-нибудь мячик забыли. Объясняется это просто: главная черта дохристианских божеств — ирония. Вам это должно быть понятно, или будет понятно очень скоро. Не сочтите за высокомерие, просто я представляю ваш опыт.</p><p class="p1">Николай разлил заварку и продолжал, глядя на Громова с уважением и состраданием, как врач на больного, героически и по доброй воле привившего себе опасную, но излечимую болезнь.</p><p class="p1">— Ну и вот. И потому есть такая важная особенность здешнего мироустройства — обязательный крах тщательно продуманных планов, в которых все учтено. Все, да не все. Если полагаешься на Господа, то как-то Господь устраивает по своему разумению. Но если полагаешься на себя, то непременно лажаешься, это закон вроде ньютоновского, только не все понимают. Он простой на самом деле. Человек выстроил все, просчитал по законам математической логики, высшей математики, какого-нибудь квантового сопромата, не знаю, — а у него под ногами лежал детский мячик, которого он не учел, а в мячике бомба, и в задницу весь сопромат, простите за грубость. Местные боги вообще были очень ироничны, и именно это имеют в виду отдельные персонажи, говоря, что в христианстве нет чувства юмора. Оно есть, но нет там этого Бога, знаете, который смотрит на усилия людей и хихикает. Гуров поставил на другого Бога, этот Бог над ним обязательно посмеется, хотя Гуров очень умный, очень. Я не желал бы с ним вступать в теологические дискуссии. Он бы меня побил обязательно, разом бы мне доказал полную несостоятельность христианства, и я бы ушел формально посрамленный. Но потом он бы поперхнулся, или пукнул, и вся эта победа была бы немедленно дезавуирована — потому что Гуров со своей победой совершенно не нужен своему Богу, понимаете, какая ирония? Он так все отлично рассчитал, дал вам спутника, способного вылезти из любой переделки и не знающего об этом, маршрут расписал, везде посты расставил, — и смотрите, какая двойная насмешка судьбы. Пункт первый: девушка все равно пошла не туда. Пункт второй: тот, кого он послал по девушкину душу, завернул в противоположную сторону. Пункт третий: если бы даже вы и пересеклись с девушкой и всадили в нее пулю, а вы человек последовательный и приказы выполняете, — никакого толку от этого не было бы все равно, потому что не в девушке дело. Но Господь, наш Господь, у которого с иронией туго, а юмор скорее английский, — сделал все очень изящно, потому что вы ему, значит, небезразличны. В результате девушка идет себе, куда ей надо, а вы движетесь собственным маршрутом, который, теперь уж не сомневаюсь, тоже доставит вас в нужную точку. И если Гуров до этого момента еще не будет раздавлен своим ироническим божеством, будет у него шанс отлично повеселиться, когда вы в эту точку прибудете.</p><p class="p1">— Ничего не понимаю, — раздраженно сказал Громов.</p><p class="p1">— Ну и правильно, и не надо. Будет время — поймете. Это я разболтался, а вам спать пора.</p><p class="p1">— Все, что вы говорите, можно счесть законченным бредом, — сказал Громов. — Мне вообще интересно было бы спросить хоть одного честного священника: есть у него абсолютное доказательство бытия Божия, которое нельзя было бы списать на личный мистический опыт, непознаваемое, неописуемое, неназываемое и прочую демагогию?</p><p class="p1">— Нету, — развел руками отец Николай. — Это и есть основное доказательство. Если б оно было, у нас был бы не Бог, а воинский начальник. Я хочу, чтоб было, а его нет. Тяга к нему так настоятельна, так неизбывна, что обязательно что-то угадывается. Там такое большое пустое место, что очистить его кто-то мог только сознательно, дабы оставить пространство для домысла и нормальной жизни. Вы и сами понимаете…</p><p class="p1">— Тогда все — трусость, — подытожил Громов.</p><p class="p1">— Ясное дело, ясное дело. Трусость и глупость, а вы один хороший и правильный, только не ценит никто. Если б кто-то ценил, подвиг был бы уже не подвиг. Это и есть религиозное чувство в казарменном варианте, но лучше такое, чем никакого. Понимаете, все до того просто, что я себя всякий раз неловко чувствую, растолковывая. Ваши воинские священники вечно пытаются вам объяснить христианство как отказ от человечности, — знаете, вся эта сверхчеловечность, как бы Ницше… Вот у вас, положим, сверхсекретная миссия. Не возражайте, знаю, на лбу написано, — настоятель усмехнулся с ласковой снисходительностью. — Но сверхсекретность — это же не значит рассекречивание и рассказывание каждому встречному, что вы идете остановить мужчину с девушкой? Нет, это означает глубочайшее возмущение при виде любой попытки прикоснуться к вашей тайне. Так и сверхчеловечность — просто особая человечность, доведенная почти до абсурда путем ее бесконечного усиления. А вовсе не бесчеловечность в северном варианте — долг, долг, марш, марш, тьфу, тьфу… Знаете, почему среди христиан мало хороших проповедников? Потому что скучно объяснять очевидные вещи. Спите, дорогие друзья, вы устали, а я еще почитаю.</p><p class="p1">Настоятель по очереди перекрестил Громова и Воронова и удалился к себе, прихватив керосиновую лампу и какой-то из журналов с полки.</p></span><span id="id99"><div class="title5">
<p class="p">4</p>
</div><p class="p1">Ночью Громов проснулся — он часто в последнее время просыпался от грустных и тяжелых снов — и вышел на улицу курить. Окно у настоятеля все еще светилось, и Громова это обрадовало: ему хотелось даже, чтобы настоятель вышел к нему поговорить. Ночью броня наша уязвимее, она не сразу успевает нарасти, и в первые минуты после пробуждения хочется ласкового слова; в России всегда заставляют вставать рано, бежать быстро, в громовской учебке в свое время не давали даже оправиться перед утренним бегом на три километра — делается это затем, чтобы человек не успел понежиться в сонном тепле и обеспечить себе спокойный переход к дневным трудам: сейчас, когда на нем нет коры, когда он открыт всем влияниям и только глаза открыл, — надо вкачать в него лошадиную дозу дневной жестокости и бесприютности, чтобы с этим чувством он и прожил день. Ночной человек уязвим, и только по ночам Громову продолжали сниться стихи и девушки из его прошлой жизни, а иногда родители; он сразу старался гасить эти мысли, и все-таки ему хотелось, чтобы настоятель вышел к нему. И настоятель вышел — потому что в монастыре все желания исполнялись мгновенно.</p><p class="p1">— Не спится, — сказал он виновато вместо того, чтобы утешать Громова; Громов так себя воспитал, что любое сочувствие казалось ему унижением, и жалость он мог принять только под маской жалобы.</p><p class="p1">— Да, мне тоже, — сказал он благодарно.</p><p class="p1">На далеком левом берегу играла музыка — в Блатске веселилось казино «Царская корона». На далеком правом берегу мычала корова. Прокричали вторые петухи. Вокруг монастырского острова невидимо плескалась река, от нее мирно пахло тиной, шелестела прибрежная трава да мигал километрах в трех одинокий бакен.</p><p class="p1">— Подумав, — произнес отец Николай с несколько нарочитой комической важностью, — я ваш выбор одобряю, если вам это интересно.</p><p class="p1">— Какой именно выбор? — насторожился Громов.</p><p class="p1">— Ну, насчет пойти в армию. Достойный выход. Иначе можно дров наломать. Я знал человека, — я даже вам скажу, что я и был этим человеком, — который в некий момент стал все вокруг себя рушить. Очень неприятное ощущение.</p><p class="p1">— Что-то такое было, — сказал Громов.</p><p class="p1">— Да не что-то, а наверняка. По себе помню. Я тоже некоторым образом пошел в армию, но все-таки не в такую, как ваша. Вы, наверное, решили, что надо уж до конца — долг так долг, и чем дискомфортнее, тем лучше. Очень убедительно. У меня знаете как было? В какой-то момент начал чувствовать, что все вокруг меня разваливается, и не без моей вины. Прихожу куда-то работать — и через полгода все накрывается, влюбляюсь в замужнюю — распадается ее брак, собственный мой брак тоже недолго продержался, ну и вообще… И чувствую вроде, что я орудие Божье, — у меня, кстати, и до монастыря не было особенных иллюзий насчет того, что мы одни на свете. Умом понимаю, что Господь меня избрал раскалывать всякие несовершенные вещи. Они ему мешают, а кто-то же должен… Заметьте, для вещей хороших и прочных я никакой опасности не представлял. Вот, пришел в церковь — ничего не сделалось церкви; живу в монастыре — ничего не делается и с монастырем. Но вся эта десятисортность, державшаяся уже на очень хрупких конвенциях… Я так рассудил, — доверительно продолжал отец Николай, — либо надо быстрей все это под корень, чтобы уже что-нибудь началось, либо по возможности продлить агонию, потому что люди-то живые, жалко! Поразмыслив, пришел к выводу, что чем скорее, тем лучше, — но мне такая жизнь не подходит, я ведь тоже пока живой, тяжко! Нет, думаю, такое предназначение не по мне, я лучше уйду, ибо сказано: кто может вместить, да вместит. А я не вмещаю. Но от предназначения не очень сбежишь — то, что все мы здесь, тоже, наверное, как-то влияет… Я ведь вижу Блатск издали — он уже почти никакой, на соплях держится, уже и стрелять разучились… Господь управил по-своему: ведь если все мы — такие, как вы, как я, — из мира уйдем вовсе, не желая его рушить, так он обрушится еще быстрей, без нас-то. Видите, как хитро все устроено?</p><p class="p1">Громов понимал, о чем речь, и слушал с напряженным вниманием. Если бы он не запретил себе думать, то думал бы, верно, в тех же терминах.</p><p class="p1">— Потому что все разрушение, нами производимое, — только от того и происходило, что нас не устраивала существующая конвенция. Давайте все делать вполруки, и мир продлится. Есть люди — не считаю это доблестью, считаю проклятием, — которые вполруки ничего делать неспособны, вот и рушится вокруг них все это домино. Но тут я понял удивительную штуку: разрушение-то разрушению рознь. Мы опасны для мира в его нынешнем виде, да, — но мы по крайней мере удерживаем критерий; все рухнет — но останется среди этого стоять какая-то палка, вокруг которой в будущем и можно построиться. А сейчас оно осыпается просто так, кучкой, и что вокруг этого выстроится — вопрос. Я потому с такой радостью и думаю о том, что вы все-таки остались в миру; вы — и еще один человек, в котором я заинтересован крайне.</p><p class="p1">— Инспектор? — догадался Громов. Тут что-то закручивалось, он чувствовал это, и во всей этой смутной покамест фабуле инспектор явно играл какую-то роль, он был персонаж таинственный и многое на себе державший.</p><p class="p1">— Да я вам говорил уже про вашего инспектора. Он ни при чем. Он очень умный человек, но только человек, и логика его довольно детская: вот, ходим вокруг котла, ставим заклепки. Нет, есть еще одно странное существо, очень последовательное. Я думаю, последовательность — не главная, но чрезвычайно важная добродетель. Бывает, конечно, высшая непоследовательность милосердия, об этом любят поговорить люди слабые, слезливые, — но и в милосердии нужна железная логика, абсолютное упорство: сказал — сделаю. И вот эта… этот человек — там как раз тот самый случай. Я не столько знаю о его существовании, я его чувствую. Я почти физически ощущаю движение этого человека по земле, в ту точку, где исполнится предназначение. Я ничего не знаю тут, мы никуда не выходим… но тогда, знаете, обостряется другое чутье. У Мстислава, которому вовсе нельзя отсюда выйти, оно доведено почти до крайней степени. Он-то, кстати, и предупредил, что сегодня можете прийти вы. Вы и дальше пойдете, разрушая эту гнилую ткань, но когда она вся разлезется — с кого-то же должно начаться новое? Предпочтительнее, чтобы с вас… или с этого второго существа, относительно которого мне многое неясно.</p><p class="p1">— Это не та женщина, которую я должен был убить? — вспомнив дежурство, спросил Громов.</p><p class="p1">— Да нет, — беспечно отмахнулся настоятель, — та женщина неинтересна. Не знаю, как вы, — я никогда не любил язычников. Не вера, а какая-то кухня: вместо богов сковородки висят, ухваты по углам… Этот бог для того-то, эта сковородка для картошки… Неинтересно.</p><p class="p1">— Вы много дельного говорите, — кивнул Громов. — Я одного не понимаю: как вы, при такой прямоте, никак не хотите признать, что и Бог ваш — тоже конвенция?</p><p class="p1">— Я этого никогда не скрывал, — пожал плечами настоятель, — но за этой конвенцией кое-что стоит, а за остальными — давно уже ничего.</p><p class="p1">— Что же?</p><p class="p1">— Да то, что он есть, и все, — сказал настоятель и зевнул. — Свежо, однако. Я спать пойду.</p><p class="p1">— Вы уходите от разговора, — усмехнулся Громов.</p><p class="p1">— Да никуда я от него не ухожу, просто во всякой вере есть одна ступенька, которую каждый берет в одиночку. Я могу вас провести, если захотите, по всем ступенькам до нее и после нее, потому что вся лестница мне отлично известна. Но у каждого эта ступенька своя, поэтому не знаешь, на какой споткнешься. Один уверовал после чуда или исполнившейся молитвы, это вариант простой. Другого восхитила красота творения, и он уверовал из благодарности. Третий логически умозаключил, что без Бога ни до порога. А как будет у вас — я понятия не имею, скорее всего, вы придете через образ жизни.</p><p class="p1">— Как это?</p><p class="p1">— Ну, как артист перед комедией: он пришел в дурном настроении, а тут надо играть, зал веселить. Он запирается в гримерке и полчаса улыбается, один, сам себе — и от движения мышц идет обратный сигнал в мозг, и вот он уже ликует. Так же и здесь: вы ведете монашеский образ жизни — при таком образе жизни как не уверовать? Вы, собственно, и уверовали уже, но хотите последнего доказательства. А на себя оборотиться?</p><p class="p1">— В смысле?</p><p class="p1">— Спать пора, вам завтра в дорогу, — сказал настоятель и, зевая, пошел к себе. Громов еще постоял на крыльце, вернулся на террасу и немедленно провалился в сон.</p></span><span id="id100"><div class="title5">
<p class="p">5</p>
</div><p class="p1">— Вы все говорите о местных, — сказал Громов, когда они утром стояли на пристани, готовясь к отплытию. — Кого вы, собственно, имеете в виду? Ведь местные — это русские, почему не назвать вещи прямо?</p><p class="p1">— Потому, что русские не местные, — удивленно ответил настоятель. — Я думал, вы знаете. У вас разве не объясняют этого, в войсках?</p><p class="p1">— У нас в войсках все и так знают, что местные — это мы.</p><p class="p1">— Ну, а в тех войсках знают, что они. Скучно, — сказал настоятель. — Вы бы хоть сами себя спросили: хорошо вам на этой земле? Коренное население — то, кому здесь хорошо. А у вас каждый вечер тревога, все вас гонит отсюда… Вы тут — как душа в чужом теле. Посмотрите, какую жизнь ваши тут устроили себе и другим… Разве может коренное население так себя вести, как русские на этой земле? Да тьфу…</p><p class="p1">— А вы разве не русский? — неприязненно спросил Громов. Ему досадно было, что Воронов слушает все эти разлагающие разговоры.</p><p class="p1">— Не помню, — пожал плечами настоятель. — Вероятно, был русский, но теперь уже, конечно, нет. Сколько можно? Я удивляюсь, как вам еще не надоело.</p><p class="p1">— Отречься от своей крови — самое легкое, — сказал Громов резко.</p><p class="p1">— Да, да, это все предсказуемо… Еще вы можете сказать, что за земную родину надо умирать, а за небесную не требуется, вот я и дезертировал в монастырь.</p><p class="p1">— Я этого не говорил.</p><p class="p1">— Но подумали. Да мне-то что, я ведь понимаю, что при вашей установке любой живой — дезертир. Это симпатично, достойно уважения, но скучно. Самое коренное население — мы, потому что нам бывает хорошо везде, но вам это пока чуждо. Суть не в том. Я тут подумал, — стеснительно продолжал настоятель. — Ночью. Все равно не заснул. В общем, насчет вашего вопроса: одно доказательство у меня точно есть.</p><p class="p1">«Значит, не снилось», — понял Громов. Настоятель ему подмигнул.</p><p class="p1">— Одно есть, да. Банальное, от противного. Я слишком четко вижу работу дьявола — и тот факт, что он не совсем еще преуспел, и вряд ли преуспеет окончательно, наводит на мысль о божественном начале. В идеале, конечно, надо видеть это начало просто так и общаться с ним, если получается. Но если нет биографической или другой предрасположенности… Мне представляется, что когда Господь запустил всю эту историю, он создал разделение на два пола, для продолжения жизни. А дьявол, то есть возгордившийся ангел, сноб в высшей степени, запустил разделение на эти две группы, каждая из которых недостаточна. Одни превыше всего ставят ценности одной личности, другие — ценности всего стада, и оба друг без друга ни на что не годятся. Разделение это ложное, как вы, вероятно, понимаете. Христианство пущено было в мир, чтобы его преодолеть. Для того и придуман крест, чтобы вертикаль сопрягалась в нем с горизонталью, и все это такая азбука, что стыдно повторять. Местное же население притерпелось к дьяволу, и это совсем не то, что преодолевать его. Вы воин, и вам это скоро станет понятно. От вашего самурайского понятия о воинском долге один только шаг от того, чтобы переменить вассала…</p><p class="p1">— Это будет уже не долг, — сказал Громов.</p><p class="p1">— Да откуда же вы взяли, что долгом может быть только от рождения определенная вам данность? Почему вы обязаны воевать только на той стороне, на которой родились? Вы воюете за одну из сторон и, следовательно, помогаете дьявольскому замыслу, а между тем на свете достаточно вещей, которым стоит послужить с вашей прямотой… Ну, ладно, я впадаю в грех поучительства. Если хотите, еще одно доказательство, очень простое, физическое. Заметьте наглядную вещь. В краткосрочной перспективе всегда побеждает зло. Это закон, такой же ясный, как физика: выигрывая в силе, проигрываем в расстоянии. Но в долгосрочной добро неизбежно одерживает верх, потому что эффективность зла — она ведь, понимаете ли, кажущаяся. В ней уже заложено самоубийство. Зло непременно переигрывает само себя. Я думаю, — хотя не вдавался, потому что очень уж далеко можно зайти, — что так вышло и с христианством. Есть такая версия — ее сейчас очень часто развивают федералы, мы же телевизор смотрим иногда, — что христианство вброшено в мир хазарами, чтобы растлить воинский дух северян и прочих боевитых народов. Ну вот, и вбросили, и сами себя перехитрили. Я не думаю, конечно, что это так. Но если бы это было так, это было бы в традиции, что ли. Перехитрить себя — это нормально. Все христианство — это выигрыш на длинной дистанции, и если вы понимаете, о чем я, то каких же вам еще доказательств? Бог не то чтобы на стороне больших батальонов, но он мыслит длинными периодами. Подумайте на досуге, это так ясно, что смешно не видеть. Ладно, спасибо за терпение, плывите с Богом.</p><p class="p1">Громов и Воронов отправились к лодке. Брат Артемий сел на весла.</p><p class="p1">— Ну, — сказал настоятель Воронову, — с вами-то мы вряд ли увидимся. Удачи, молодой человек. А вот вы заходите, если что, — сказал он Громову и, резко повернувшись, пошел в гору, к монастырю.</p></span></span></span></span>
