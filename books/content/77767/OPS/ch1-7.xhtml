<p class="p">Глава вторая</p>
</div><span id="id10"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Генерал-майор Пауков был горд, что у них с его кумиром родственные фамилии. Сходство по признаку насекомости казалось ему ничуть не забавным и даже символическим. В разнице же фамилий сказывалась новая тактика современной войны: великий предшественник, как жук, катил на сияющую вершину победы навозный шар солдатской массы, — генерал Пауков, как паук, сплетал и раскидывал по стране хитрую паутину коммуникаций и ловил врага в сети неисследимых дозоров. Нынешний враг был коварен, и весь он был внутренний. Внешний давно не совался в это заколдованное пространство, опасаясь, должно быть, паутины. Внутреннего врага следовало вычленять, окружать, оплетать, караулить, обездвиживать и размозжать. Так формулировались шесть пауковских пунктов — главных правил, сформулированных им в новом боевом уставе. Сейчас они с Плоскорыловым доводили этот устав до ума.</p><p class="p1">Двадцатисемилетний, пухлый, одышливый капитан-иерей Плоскорылов был, с точки зрения Паукова, идеальный политрук. Он понимал священное — или, как он любил говорить, сакральное — значение каждой буквы в уставе. То, что могло неармейскому человеку показаться бессмыслицей, — на самом деле бессмыслицей и было, но эта великая тайна не для всех. Могучую, системообразующую силу бессмыслицы — ибо все смыслы могут когда-нибудь оказаться неверны, бессмыслица же никогда, — понимали по-настоящему только военные люди, и Плоскорылов был, несомненно, военная косточка при всем своем штатском виде, ласковом голосе и патологической неспособности к стрельбе. Дед его был штабист, прапрадед — белый генерал, перешедший на сторону красных. Он благополучно пережил террор и погиб на охоте, от клыков кабана — «идеальная офицерская смерть», говорил Плоскорылов. Он считал неприличной гибель в бою: генералов не убивают. Кроме того, Плоскорылов знал Философию Общего Дела. Эта высшая штабная дисциплина, преподававшаяся только на богословском факультете военной академии, была Паукову недоступна, но Плоскорылов уверял, что генерал постигает ее интуитивно. Все распоряжения Паукова столь явно служили Общему Делу, что Плоскорылов, попросившийся к нему в штаб после выпуска, теперь постоянно благословлял свою дальновидность. Несомненно, в армии был сегодня только один блестящий русский генерал, и этот генерал был Пауков.</p><p class="p1">Пауков был блестящ, о, блестящ. Сладостен был запах «Шипра», исходивший от него; квадратный, топорно топорщащийся, это самое, китель нескладно облегал его скособоченную, словно обрубленную фигуру. Пауков говорил резко, отрывисто, команды подавал с такой яростью, словно от рождения ненавидел всех своих офицеров и солдат, — в этом смысле он был истинный варяг, природный северянин, чья генеральная цель — не столько захват земель или обращение в бегство противника, сколько максимально эффективное истребление собственных войск. Плоскорылов, будучи младше комдива двадцатью годами и лишь недавно получив капитан-иерейские звездочки, чувствовал даже некоторую неловкость от того, что знал больше. Но Пауков, казалось, догадывается обо всем — даже и о том, чего сам Плоскорылов на своей шестой ступени еще не постиг.</p><p class="p1">Седьмая ступень окончательного посвящения считалась в армии большой редкостью. Она и на высших этажах государственной службы была не у всех. Коротко знаком Плоскорылов был только с одним ее носителем — военным инспектором Гуровым, нет-нет да и посещавшим штаб тридцатой дивизии с личной проверкой. Гуров явно выделял Плоскорылова, был с ним откровенен и при встречах цаловался. Как все тевтонцы седьмой ступени, инспектор был наголо брит, носил очки, френч и отпустил небольшую клочкообразную бородку. Плоскорылов уже предвкушал, как сам заведет такую же, — пока, в капитан-иерейском звании и на шестой ступени, борода ему не полагалась. Гуров обещал устроить ему инициацию в начале августа, и Плоскорылов думал об этом дне с радостной детской тревогой. Он не знал, в чем заключалась инициация, но ждал чуда. Ему представлялось, что весь мир хлынет в его распахнутую грудь и одарит своими тайнами, которые после раскрытия не покажутся простыми и бедными, о нет! — а лишь яснее выявят свою звездоносную мистическую глубину. Иглы мирового льда представлялись ему; острые кристаллические грани; полярное сверкание, скрежет и хруст, фиолетовая бертолетова соль. Далеко, на истинном полюсе, куда сходились силовые линии мировых судеб, воздев к черному небесному бархату лопаты ладоней, застыл Верховный Жрец, отец народов Севера, звездный тевтон с картины Константина Васильева; покорить ему моря и земли, сложить к его ногам пестрые флаги мира, заменив их одним, черно-голубым, доложить ему о Конце Концов, с которого начнется новая эпоха титанов… о, Плоскорылов знал, что доживет до этого черно-голубого дня.</p><p class="p1">Пока же политрук тридцатой дивизии читал офицерам лекции, в которых осторожно намекал — не проговариваясь, конечно, прямым словом, — на истинную цель войны и сверхзадачу армии; тех, кто догадается, следовало выделить и незаметно продвинуть в академию. Увы, истинных варягов было в армии немного, и не то чтобы всех перебили в первые три года войны — варяги были не дураки бросаться в гущу боя. Элита не гибнет, она не вправе отступать от высшего долга — командования жалким, не понимающим своего назначения мясом. Даже и в критической ситуации офицер обязан был первым делом думать о спасении собственной жизни, а уж потом — о своих людях; людей много, офицер один. В этой формуле — тайном варяжском девизе «Вас много, я Один» — отражалось классическое соотношение оккупационных войск и коренного населения; правильное ударение в имени верховного божества было, конечно, на втором слоге, — не зря с этого имени начинался варяжский счет. Бог наш Один, он же Влес, и другого не дано; «велик Один наш бог, угрюмо море». Собственно, в классическом языке древних россов было всего два числа — Один и Много, то есть вождь и остальные. Варяг, рожденный повелевать массой, попросту не имел морального права рисковать собой. На лекциях перед офицерским составом изобретательный Плоскорылов пояснял это так: «Представьте себе, что мать с ребенком крадется ночью через лес, полный опасностей. Напали волки. Что делать? В идейно сомнительном рассказе для детей, выдержанном в антирусской гуманистической традиции, мать отдается на съедение волку, а ребенка заставляет бежать к людям через лес, полный опасностей. Разумеется, ребенок, оставшись без надзора, немедленно погибнет в лесу, полном опасностей, а если даже и спасется — то неизвестно кем еще вырастет без матери. Тогда как отдав на съедение волкам ребенка, сама мать еще могла бы спастись в лесу, полном опасностей, и впоследствии послужить Родине. Так и офицер, как истинная мать, не имеет права оставлять солдата одного в полном опасностей мире, а должен прежде всего озаботиться собственным спасением, чтобы сохранить в неприкосновенности офицерский корпус. Подумайте, сколько сил потратило государство на воспитание истинного офицера — и каким возмутительным разбазариванием средств была бы ненужная самоотверженность, навязанная нам хазарскими извращениями христианства!». О том, что христианство — вообще подлая хазарская выдумка, запущенная в мир для его погубления, говорить пока не следовало: даже на богословском факультете это сообщали только на третьем курсе.</p><p class="p1">Нет, причина падения боевого духа была не в том, что варягов убивали. Во всех войнах, которые вела Россия, популяция северян оставалась почти нетронутой: варяг как истинный воин Одина мог погибнуть на пирушке, на охоте, на бабе, как славный генерал Скобелев, — но умереть в бою было бы для него еще постыднее, чем околеть за плугом или, не приведи Один, шитьем. Увы, слишком долго и безответственно сходились воины Севера с дряблым коренным населением; податливость и безволие проникли в кровь северян. Актуализация древнего зова удавалась не всегда. Обычно нацию очищали и обновляли войны, но эта новая война радикально отличалась от предыдущих. Все вырождалось. Офицеры не только с трудом, чуть ли не пинками поднимали солдат в бой, но и сами шли в атаку без особой охоты. Плоскорылов, наблюдая за боевыми действиями с почтительного расстояния через стереотрубу, приходил в отчаяние. Не самому же политруку с высшим военно-богословским образованием было хвататься за оружие! Все попытки поднять боевой дух войска регулярными расстрелами перед строем заканчивались ничем: в первый год войны Плоскорылов мог собой гордиться — от рук его расстрельной команды пало в полтора раза больше народу, чем государственники потеряли в столкновениях с хазарами и горцами. Наглая ЖДовня в разлагающих листовках приводила чудовищные факты — солдаты русской армии гибли главным образом от рук соплеменников; Плоскорылов лишь усмехался — знали бы они истинные цифры! Женственный Юг, ценивший комфорт и уют, дрожавший за жалкую человеческую жизнь, — как мог он воевать с титанической варяжской армией, для которой физическое бытие солдата было не дороже ячменного колоса! Но в последний год осуществлять варяжскую стратегию было затруднительно — солдат не хватало даже на кухонный наряд; не самому же Плоскорылову, в конце концов, было становиться на раздачу пищи! Расстрелы приходилось производить лишь по праздникам, в дни особенно почитаемых святых, — и боевой дух войска неуклонно падал. Стрелялись и вешались чуть не вдвое реже, чем в мирное время. Армия была не та, и с каждым днем становилась все более не той. Только Пауков воплями и разносами мог еще внушить войскам священный ужас, но и он в последнее время как будто был не прежний.</p></span></span></span></span></span>
