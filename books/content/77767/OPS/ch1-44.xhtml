</div><p class="p1">Во Внукове-2 его встретили у трапа, как и предполагалось; здесь тоже не было заметно опалы — как всегда, провели через вип-зал (он набрал газет — в Сибирь к нему доходили только правительственные, выписывать прочие он не видел смысла, в правительственных хоть какая-то информация, пусть между строк; читать прочие — глаза сломаешь). Машина уже ждала. Архангельское было расположено в часе езды от Москвы и получасе от Внукова. Устроившись на заднем сиденье, губернатор немедленно набрал Григория — межгород жрал страшные деньги, но надо было убедиться, что Аша в порядке.</p><p class="p1">— Девушка у вас? — спросил он.</p><p class="p1">— У меня, у меня, — проворчал Григорий. — Вернетесь — я с вами хочу повидаться.</p><p class="p1">— Случилось что-то?</p><p class="p1">— Ничего особенного. Привет Москве. Вы в городе?</p><p class="p1">— За городом, на совещании.</p><p class="p1">— Все равно привет. Будете на Тверской — расскажете, как и что.</p><p class="p1">Несколько успокоившись насчет Аши, губернатор развернул газету. Это были неправительственные «Известия», по-своему боровшиеся с государственной монополией на русский письменный, введенной еще в позапрошлом году (налог на русский устный был применен ко всем пользователям языка за год до этого). Из-за этой-то монополии ему и пришлось отказаться от чтения всех изданий, кроме «России» и «Российской газеты», да еще «Парламентский вестник» приносили в нагрузку, — но как государственный человек он понимал и тех, кто ввел эту монополию. Стране надо было на чем-то навариваться. Попытки брать деньги с Запада за употребление слов «Россия», «русский», «консервативная модернизация» — ни к чему не привели, да если бы и привели — о России там почти не упоминали, ибо в ней не происходило даже катастроф. Пришлось вводить монополию сначала на все государственные понятия — «президент», «парламент», «Отечество», — но это поначалу привело лишь к тому, что газеты отказались писать о власти либо стали пользоваться эвфемизмами; тогда собственностью объявлен был язык как таковой. Для книг делались существенные скидки, учебники издавались на государственный счет, благо и высшее образование свелось к пятиклассному; но периодика платила по полной, отчего стремительно сокращалась в количестве. Газет в Москве осталось не более шести, плюс две правительственных, совпадавших почти полностью. Каждая искала свой способ обойти монополию. Так, «Известия», ныне читаемые губернатором, изменяли одну букву в каждом слове, причем всякий раз разную, так что законодательство за ними не поспевало; читатель все понимал, но слова не попадали под налогообложение, ибо в фундаментальном словаре Ушакова, принятом за языковую норму, не содержались. «Крупномасштубное наступрение крайнелеберальных сыл нна йужном наплавлении захлюбнулось вслядствие отсуздзтвия уу противняка достапочно разфитых коммуникуций. Чрезвычяйное полошение, фведенное ф Фолхове ф сфязи з утэчкой химыческих вешшеств з коммбината имяни Солокалетия Октябля, отминено. Племьера блокбустера „Ф лясах“ ф киноконцептном сале „Охтябрь“ зобрала везь столличный момонд, срети кодорого блястали…» — следовал перечень, знакомый губернатору до последней буквы, ибо столичный момонд оставался неизменен уже лет тридцать. «Власть» выходила из положения хитрей — там выдумывали целые слова, могли себе это позволить, поскольку выходили еженедельно, и весь штат был занят придумыванием альтернативного словаря. Почти все это новое эсперанто состояло из русифицированных заимствований: «Чейнджи, шейкинги, транзакции гавернмента мастуют эвидентствовать интенсификайшен сеарча инхеританта, дьютого стопить милитарию, брингующую мэссовые шединги маний». Патриотические издания, чей патриотизм, однако, не простирался так далеко, чтобы платить правительству за каждое слово, шли иным путем, изобретая своеобразное антиэсперанто — новый русский язык с безусловно родными корнями и смутно брезжущими смыслами: «Хитроумудреннейший возглавитель управительства возгласовал перенаправленность усиливаний ко преускореннейшему распровыполнению восторгательно провоспринятых перенаселением планирований созидательства прожилого распространства во рамульках национальненьких проектищ». Разумеется, такое изложение отнимало много времени, но поскольку в стране почти ничего не происходило, выпускать газету не составляло труда — в редком еженедельнике набиралось теперь четыре страницы собственно газетных метариалов, а ежедневки ограничивались одной. Прочий объем газет составляла реклама — она преобладала теперь во всем: в фильмах, состоявших на девяносто процентов из продакт-плейсмента, в литературе, герои которой только и делали, что питались продуктами от «Русойла»… «Русойл» заполонил своей рекламой все аэропорты, прессу и телепрограммы; по дороге от Внукова-2 к Архангельскому все было уставлено их билбордами. «Известия» сообщали о трых новух мясторождениях, отклытых «Русойлом» (это слово шло без искажений — иначе «Русойл» по суду отсудил бы штраф втрое больший, нежели экономия на монополии). Месторождения плодились, как грибы. Из нефти делали уже и колбасу, и масло, и свиную тушенку, все вполне питательное, несмотря на запах, — на ж/д строительстве в крае только этим и кормили. Губернатор на открытии первого участка дороги лично пробовал нефтяной обед — ничего, проглотил три ложки. Рекламой нефтяного кофе «Черное золото», нефтяного хлеба «Тюменский» и нефтяного молока «Дар земли» была переполнена вся «Комсомолка», и эти тексты шли без ошибок — пусть за все слова приходилось уплачивать налог, рекламщики башляли щедрей. Прессу читали исключительно в силу привычки, да еще потому, что интернет регулярно действовал только в Москве и Петербурге. Газетный Финнеган второй год оставался одним из немногих развлечений населения. Распрознав, что испускательство автоматичнейшей мобилы «Москвитянин» превоскращено во всевремении, причинностию чаво изъявилось спадение высококачества машинушки, гублинатор помыслякал, что жить на окруине импарии в самым делле во многих релейшенах преферабельнее.</p><p class="p1">Они подъехали к Архангельскому — правительственной резиденции, где происходили заседания и отчеты Губернаторской палаты. С тех пор, как многократно умножилось количество округов, губернаторы перестали входить в Совет федерации и составляли особую палату, контактами с которой ведал спецпредставитель правительства; в последний год это был Тарабаров, приземистый, краснорожий, вовсе уж неотличимый от обкомовского секретаря где-нибудь в хлебородном крае на юге России лет сорок-пятьдесят назад. Все советские типы оказались неистребимы, как, впрочем, и все русские: это служило лучшим доказательством непрерывности истории, и если Аша в чем-то и была права насчет циклов, то по крайней мере в этой форме бессмертия. В царской России Тарабаров был бы кучером, ибо все в его характере и облике располагало к добиванию и без того загнанных кляч. Губернатор презирал таких чиновников, но как государственный человек понимал, что если бы не они, быть омерзительными пришлось бы нам. Он и мысли не допускал, что Тарабаров вызовет его из-за Аши: главный региональщик до такой степени не верил ни во что трансцендентное, что разносить губернатора из-за легенды не мог бы и в кошмарном сне. Вдобавок погода в Москве была прелестная, после вчерашнего дождя благоухали придорожные хвойные леса, в Архангельском щебетали уже почти забытые губернатором птицы средней полосы — в Сибири все было другое, да и погода этим летом стояла отвратительная. Губернатор вышел из машины, барственно кивнул шоферу — он умел держать дистанцию с чужой прислугой — и легко взбежал на крыльцо трехэтажного новостроя, где заседали теперь вызываемые в Москву наместники.</p><p class="p1">Это был типичный квазидворянский, классицистский особняк эпохи второй стабилизации — стилизация и стабилизация не случайно различались всего двумя буквами; правда, при воспроизведении усадебного стиля начисто выпадало главное в нем, а именно удобство. Особняк в Архангельском выглядел как жилище помещика, задумавшего любой ценой доказать свою преданность державности. Сам особняк был велик и широк, к нему были пристроены два невысоких и узких крыла — левое и правое, долженствовавшие, вероятно, символизировать торжество центризма над крайностями; центризм вообще преобладал в визуальных искусств последнего времени, даже и бабочек в детских книгах изображали с маленькими крыльями и непомерно развитым, мускулистым тельцем — не бабочка, а прокладка с крылышками. В особняке размещался зал заседаний, тоже непомерно огромный — всех губернаторов не набиралось и восьмидесяти человек, даже и при самом полном сборе, случавшемся только в день Родины (главный государственный праздник, установленный взамен Дня независимости вот уже пять лет как и отмечавшийся в день обретения Влесовой книги). Зал вечно пустовал, а бесчисленным службам, всему аппарату федерации и консультантам Тарабарова приходилось ютиться в крошечных комнатках второго этажа. Иррациональность хороша, но зачем еще и неудобства? Охраны у здания было мало — двое курсантов да швейцар; оно и понятно — главный фильтр стоял на въезде в Архангельское; те, от кого стоило защищаться, внутрь не попадали.</p><p class="p1">На втором этаже, в приемной Тарабарова, пришлось долго ждать, хотя назначено было строжайше. Прочих посетителей не наблюдалось вовсе. Вероятно, Тарабаров разгадывал кроссворд. Бесшумный секретарь (на известном государственном уровне вся прислуга была мужская) предложил посмотреть телевизор. Губернатор без энтузиазма согласился. Мужской прислуги он терпеть не мог: во всех этих пожилых вышколенных мужчинах чувствовалось невыносимое двуличие. Ясно было, что истинное их предназначение — вовсе не стаканчики подносить и телевизор включать, а пытать несогласных в случае необходимости, охранять хозяина от покушений, пробовать за него пищу; ясно было, что это не столько прислуга, сколько охрана, — и в их мягких движениях, в абсолютной бесшумности, в покорности, которую не всякая горничная изобразит, чувствовалась скрытая жестокая сила. Так, вероятно, отвратительны руки брадобрея — сильные, но вынужденно нежные; вообще в этих секретарях-мужчинах было нечто педерастическое. То ли дело Никита — Никита был совершенно иное дело, и не секретарь, а камердинер, почти друг. Он позволял себе ворчать, как ворчал Савельич на Гринева, и смотрел на губернатора без подобострастия. Его придали не из Москвы — губернатор сам нанял на месте и школил полтора года, пока не вытравил рабства и не насадил достойного, сдержанно уважительного отношения к себе: что значит полтора года общения с внутренне свободным человеком! Здесь же, в придыхательном произнесении формулы «Обождите, Савелий Иванович занят», во всем облике подтянутого пожилого служаки чувствовалась такая нега, почти страсть — что губернатор почувствовал неловкость, словно подглядел акт любви или, того хуже, мастурбации.</p><p class="p1">Секретарь включил телевизор; шло ток-шоу — толпа в останкинской студии живо обсуждала вопрос, вредна ли ребенку пустышка. Ломались копья. Губернатор пощелкал кнопками и попал на другое ток-шоу: сторонники ежедневного секса оголтело спорили с приверженцами еженедельного. На третьем больше часа длился прогноз погоды, в целом комплиментарный, хотя и не свободный от некоторой здоровой критики. В адрес погоды было можно, хотя и она все чаще нравилась дикторшам. Ее было почти не в чем упрекнуть. На четвертом канале шел экономический обзор — объясняли, почему бензин дорожает, несмотря на то, что во всем мире нефть стремительно дешевеет и годится теперь лишь на смазку, да и та по большей части искусственная. Выходило, что для переработки нефти надо было очень много валюты, а взять ее было негде, ибо нефть больше никто не покупал; таким образом, водители оплачивали всю деятельность «Русойла», насобачившегося варить из нефти еду, пиво и мыло. Попутно показали митинг в Крыму: население протестовало против флогистона. На русском газе им жилось лучше. На трубах бывшего газопровода, местами проходившего над землей, писали теперь всякие гадости, скучали по газу только в Крыму — но и там митинговали как-то вяло. Губернатор разглядел несколько знакомых лиц — эти гастролеры почти не скрывались: в прошлом году один из них на прямой линии спрашивал президента, почему тот похудел, а другой, то есть другая — ядреная баба со свекольными гипертоническими щеками — только что рассказывала в ток-шоу на первом канале о том, что пустышка есть отмазка ленивых матерей, а ты поди-тко покачай-ко! Никто уже особенно не скрывался, в этом бесстыдстве было даже что-то обаятельное.</p><p class="p1">На минуту губернатор задумался о том, почему со времен первой стабилизации, когда нефть еще была нужна всему человечеству, а о флогистоне никто не подозревал, — им и некоторыми другими бесспорно патриотичными, лояльными людьми, любящими Родину не для фразы, так синхронно овладело одно чувство, которое проще всего будет назвать тошнотой. Тошнотворность происходящего была особенно очевидна по контрасту — во дни, когда нефть стоила по семидесяти долларов за баррель и у страны постепенно начало появляться все, что она, в силу хамской и рабской своей природы, считала настоящими признаками свободы. Первым таким признаком она объявила стабильность и довольство, тогда как стабильность — первый признак гибели, остановка сердца; счастливые общества не бывают стабильны — они стремительно, бурно развиваются. Главное же — губернатор отлично чувствовал, что стабильность эта достигается ценой активизации худших качеств населения и отказа от всего лучшего, на что это население было способно. Разумеется, такие мысли приходили ему только в приемной у нелюбимого Тарабарова, чиновника того востребованного типа, который был губернатору априори враждебен; разумеется, дело осложнялось беспокойством за Ашу. Как она там? Но как раз это беспокойство было чувством человеческим, а ничто человеческое не требовалось. Чтобы поддержать стабилизацию, каждый, включая правительство, губернаторов и военных, обязан был ориентироваться на посредственность, работать вполсилы, душить в себе интеллект, что отлично удавалось при помощи такого вот телевизора, — потому что любое сильное государственное решение или даже талантливая книга уже означали бы дестабилизацию. Ясно было, что Россия постсырьевой эпохи, Россия во времена флогистона — не выдержит ни малейшего яркого события, и даже простое чувство самоуважения в людях ей уже невыносимо. Платой за стабилизацию была всеобщая ориентация на посредственность; чтобы жить лучше, требовалось стать хуже, и этого губернатор не любил. Он обожал прекрасную бессмысленность, но бессмысленность в действии, а не в тупом ожидании: прекрасно освоение космоса или строительство вавилонской вертикали в небеса — но нет ничего глупее строительства ж/д в тайге или многочасовых ожиданий в приемных. Он был, кажется, государственник без государства; рад был послужить, но знал, что истинное служение немедленно скомпрометирует его перед высшей властью, а то и убьет всю стабилизацию. Здесь теперь все надо было делать спустя рукава, вполсилы, лучше бы медленно — чтобы все вновь не сорвалось в хаос; в результате первая стабилизация привела к формированию небывалого класса — посредственностей, которым очень хорошо жилось. Губернатор отнюдь не завидовал новому классу — он просто знал, что в результате такой селекции государством скоро будет управлять кухарка; более того, безграмотность этой кухарки станет залогом самого существования государства, потому что любой грамотный правитель начнет что-нибудь делать, а это и есть главная угроза. Губернатор представил себя десять лет спустя. Должность сведется к чтению почты. Он вышел на лестницу и отзвонил Никите.</p><p class="p1">— Ну что, без происшествий?</p><p class="p1">— Все штатно, не извольте беспокоиться.</p><p class="p1">— Ладно.</p><p class="p1">Пожалуй, в Сибири ему и впрямь было лучше — там хоть не так замечалось убожество. Он взглянул на расписные, под хохлому, потолки, на самовар, украшавший приемную, на березовые и ягодные мотивы в орнаменте, — приемная по росписи походила то ли на палехскую шкатулку, то ли на жостковский поднос; со всем этим никак не гармонировала могучая северная живопись настенного календаря. Тяжеловесные грудастые Брунгильды, ожидающие жениха (конечно, с сечи — чем еще может заниматься правильный жених?); готические леса; рыцари с ястребами, филинами и только что не альбатросами на плечах. Варяжский мотив по-настоящему не был увязан с фольклорным, — чтобы их сочетать, надо было иметь вкус, а чтобы иметь вкус, надо было родиться не Тарабаровым. Губернатор подробно осмотрел календарь, выпил две чашки чаю из самовара и съел конфету «Коровка».</p><p class="p1">— Просят, — прошелестел секретарь, мягко ступая огромными, павианьими ступнями в войлочных тапочках и бесшумно распахивая дверь.</p><p class="p1">Тарабаров сидел за столом карельской березы, под инкрустацией, изображавшей девушку на берегу реки. Кабинет был весь деревянный, как и сам Тарабаров. Дул ветер, но какой-то странный: березы отдувало в одну сторону, а платок, которым девушка помавала непонятно кому, — в другую. Вероятно, дули два ветра. В начальственных кабинетах постсырьевой эпохи часто вешали или вырезали на стенах изображения вот таких девушек (впрочем, преобладала чеканка). Девушки всегда были полногруды, спелы, увесисты и необыкновенно, по-телячьи грустны. Тут было не без садомазо. В учебнике истории для пятого класса, где подробно излагалась норманнская теория образования российской государственности, сочувственно сообщалось, что многие русские девственницы добровольно давали зарыть себя под сторожевыми башнями родных городов, ибо башня, возведенная на девственнице, никем не могла быть взята; города брали сплошь и рядом, но поверье держалось. Здесь же, на картинке, изображалась патриотичная девственница, вся в белом, добровольно вызывающаяся лечь в основание будущей Девичьей башни; лицо ее выражало отважную покорность судьбе и любовь к родному городу, который коллективно совокуплялся с ней этим непорочным и несколько варварским способом. На эту девственницу-доброволицу были похожи все женщины в начальственных кабинетах — вероятно, такой на верхних этажах власти воображали Россию.</p><p class="p1">Тарабаров что-то писал, обмакивая перо в большую лиловую чернильницу. Это был ритуал. Губернатор стоял в дверях, ожидая, пока уполномоченный допишет. Он был почти убежден, что Тарабаров пишет что-нибудь вроде «Хорошая погода».</p><p class="p1">Наконец уполномоченный поднял на губернатора белесоватые глазки — цвета бутылки из-под кефира, кефир только что выпили, бутылка осталась.</p><p class="p1">— Присаживайся, Алексей Петрович, — сказал он, не здороваясь. Губернатор сел к темно-коричневому полированному столу.</p><p class="p1">— Чайку хочешь?</p><p class="p1">— Спасибо, пил.</p><p class="p1">— С чем пожаловал?</p><p class="p1">— По вызову, — спокойно ответил губернатор.</p><p class="p1">— Я знаю, что по вызову, — посуровел Тарабаров. Вероятно, в этот момент он сам о себе подумал именно этими словами: посуровел. От него попахивало. От всех чиновников этого ранга и типа попахивало каким-то недавно съеденным бутербродом, недавно выпитым кофием с молоком… — Я думал, ты сам доложишь чего. Как твой край, как жизнь краевая…</p><p class="p1">— Жизнь краевая в норме, Николай Филиппович. Отчеты шлю, вы читаете, разве нет?</p><p class="p1">— Отчеты я читаю, — еще больше посуровел Тарабаров. — Но отчет — мертвая бумажка, так? — Он покашлял, в горле булькнула мокрота. — Мне интересно послушать, как ты, Алексей Петров Бороздин, мне расскажешь жизнь краевую. (Манера говорить «Петров» или даже «Петров сын» вместо «Петрович» тоже была в аппарате неискоренима).</p><p class="p1">— Жизнь краевая в норме, — повторил губернатор. — Население не жалуется, дороги строятся, нацпроекты выполняются, анемометры устанавливаются.</p><p class="p1">— Как ты сказал?</p><p class="p1">— Анемометры, — раздельно повторил губернатор.</p><p class="p1">— Гм. Добре. Добре, добре. — Тарабаров выдержал паузу. — А что моральный облик в крае, как ты об этом думаешь?</p><p class="p1">Губернатор похолодел. Происходило то, во что он отказывался верить.</p><p class="p1">— Моральный облик в крае наличествует, — сказал он. — Я на него не жалуюсь.</p><p class="p1">— Да? — Тарабаров в упор уставился на него кефирными глазками. — А вот на тебя жалуются. Пишут, что твой моральный облик, Алексей Петров, оставляет желать, так сказать. Мы и письма трудящихся читаем, не только отчеты ваши. От вверенного края, так сказать, нашему столу. Догадываешься, к чему веду?</p><p class="p1">— Никоим образом, — спокойно ответил губернатор.</p><p class="p1">— Гм. Разрешите не поверить, губернатор Бороздин. И знаете, и догадываетесь. Дело молодое и все такое, и отсылая вас на данный пост, имели в виду и допускали. Учитывая, что не женат и многие другие аспекты. И я со своей стороны предупреждал, когда меня там, — он многозначительно ткнул в потолок, — спрашивали. Я там сказал: уважаю способности, но зная, так сказать, моральный облик, я усомнился бы. Тогда сказали: справится. Сегодня говорят: не справляется. И я должен подтвердить: при всей симпатии — не справляется. Я имею сигнал, не один сигнал. Вы живете с местными, губернатор Бороздин, не особенно даже скрываясь, губернатор Бороздин. Без тени смущения.</p><p class="p1">— Я должен это скрывать? — с ледяной надменностью осведомился губернатор.</p><p class="p1">— Вы не можете себе позволять! — взорвался Тарабаров. — Вы что, вы с кем! Куда вы роняете, это самое, образ представителя власти! Вы говорите — анемометры. Вы вот выучили разные слова, Алексей Петров Бороздин, но вы посмотрите на губернатора соседнего края! Этот человек шестой десяток разменял, и тоже, наверное, кое-что имеется в штанах! Старый боец не портит борозды, извиняюсь, конечно. Тоже знаем, всякое было. Но кто видел, чтобы Сергей Михайлов Батюшкин жил с девушкой из вверенного края? Русскую баню любит человек, молодец, боец, пускай любит русскую баню. Это наше, русское, выбежать, похлопать себя… похлестать веничком, шваброй… наладить всяко… Сергей Михайлов, может быть, не ставит себе анемо-ометров, — он передразнил губернатора, растягивая ненавистное слово. — У него без анемоментов в крае порядок. У него партизан ловят, план по весеннему призыву выполняется, зерновые у него значительно лучше, чем у соседей. И при этом Сергей Михайлов Батюшкин не позволяет себе, как вы! Вы думаете — кругом безграмотное быдло, и оно не напишет куда надо. Оно, может, и не шибко грамотное, но написать то, что надо, оно очень может. И если губернатор недооценивает свой народ, то завтра он может недооценить… понятно?</p><p class="p1">— Моя личная жизнь, Николай Филиппович, — не повышая голоса, произнес губернатор, — касается только меня. Мы государственные люди, и не наше дело копаться в белье друг друга. — Он отлично знал, что дать слабину в этой ситуации нельзя: еще немного, и ему начнут предписывать, чем питаться и сколько раз в день испражняться.</p><p class="p1">— У вас нет личной жизни, губернатор Бороздин! — крикнул Тарабаров. — Вы будете личную жизнь иметь, когда лишитесь государственного поста, и я вам обещаю, что вы ее поимеете, потому что будете его лишены! Вы поедете сейчас в свой край, полетите, вы полетите и поедете, и отошлете девушку в ее родное место, ей присущее! И будете там готовить дела к сдаче, а мы посмотрим на ваше поведение. И если мы ваше поведение найдем и впредь аморальным, и неудовлетворительным, и недостаточно полноценным, то вы и сдадите дела, а мы найдем присущую данному случаю замену! Если я получу еще один хотя бы сигнал о том, что вы с местной девушкой, с этой или с другой, я приму по всей строгости! (Слово «меры» он пропускал; на совещаниях часто рекомендовал просто «принять» — губернаторы между собою посмеивались). Вы можете идти сейчас.</p><p class="p1">— Вы вызвали меня из Сибири на казенный счет, чтобы сделать мне это внушение? — спросил губернатор.</p><p class="p1">— Я? — опешил Тарабаров. — Я вам внушение? Я не внушение вам делаю, Алексей Петров, я тебя отечески предупреждаю. — Он сразу сбавил тон, перейдя с официального на так называемый кумовской — внутренний жаргон чиновничества, обозначающий, что все мы тут свои. — Мы свои здесь люди. Я не хочу тебя натыкать, как щенка, но ты пойми, ты поимей себе в виду, как это выглядит. Ты представь, Алексей Петров, какой ты подаешь и все такое. Куда ты опускаешь власть в регионе. Как, кому ты сможешь приказывать, когда тобой девка вертит. При этом я проверял, девка сомнительного роду. Это род бунташный. — Откуда проникали в речь чиновничества подобные архаизмы, губернатор представить не мог. — Бунташный род, давно всех там бутетенит. Они особенные, говорят они. Я знаю, какие они особенные. Ты лучше там не мог найти? Посмотри, в чем душа держится. Это сопля, так сказать.</p><p class="p1">— Не забывайтесь, Николай Филиппович, — тихо сказал губернатор.</p><p class="p1">— Чего?! — взвился Николай Филиппович. — Кому ты говоришь? Ты где, вообще? Ты понимаешь, где ты и кто ты?</p><p class="p1">— Я-то понимаю, — кивнул губернатор. — А вот понимаете ли вы, как далеко заходите сейчас за рамки своих полномочий, — это можно обсудить.</p><p class="p1">— Ты мне не очерчивай мои полномочия! — орал Тарабаров. — Мои полномочия — это все, это последняя собака в крае! Васька последний! Ты до чего довел, на тебя васьки уже с топорами бросаются! (Ого, отметил губернатор, здесь и это знают — не они ли и скоординировали?). Я рассусоливать не буду с тобой, Бороздин, ты в двадцать четыре часа вылетишь к себе и приведешь ситуацию в пристойность, и чтобы доложил мне ее сегодня же! Вечером по Москве чтобы я имел доклад от тебя, если ты не хочешь своей девке сурьезных неприятностей! Мы можем ей так сурьезно сделать, что из Сибири в Сибирь повезут, и следов не найдешь! Ты думаешь, край света, — а за краем столько еще краев, что не считано! Я повторять тебе не буду, губернатор Бороздин, и на анемометры твои смотреть не буду. А слетишь ты у меня как два пальца, и нечего смотреть на меня! На меня уж так, милый мой, смотрели, и такие смотрели, что ты! (Тут Тарабаров не врал — он был когда-то районным прокурором в Москве и выдвинулся на разгроме олигархических империй). Иди, губернатор Бороздин, и вечером желаю иметь отчет.</p><p class="p1">— Я вам хочу напомнить, Николай Филиппович, — тихо сказал губернатор, — что ваши полномочия так далеко не простираются. Не вы нас назначаете, не вы будете снимать, а с кем нам спать — это наше дело. Государственный престиж, Николай Филиппович, надо укреплять на других фронтах. У меня в крае школы работают, дети не нищенствуют и в поликлиниках рентгеновские аппараты стоят. Покажите мне другой край в Сибири, о котором можно сказать то же. А кто у меня при этом бывает по ночам — это дело мое и моей совести. Анонимки читать — не дело для человека вашего ранга, верьте слову. И простите за резкость, но ворошить мою личную жизнь я с молодости никому не позволял. Не надо пошленький свой интерес к чужой постели выдавать за интерес государственный. Сам понимаю, возраст такой, — но уж отнеситесь вы и к моему возрасту с пониманием.</p><p class="p1">Против ожидания, Тарабаров не стал устраивать истерику после этого выступления (дерзкого, как понимал губернатор, но необходимого). Он посидел за столом карельской березы, уставившись в его скучно-желтую поверхность, а потом встал, давая понять, что аудиенция окончена.</p><p class="p1">— Губернатор Бороздин, — сказал он официальным голосом. — Сегодня в восемнадцать ноль-ноль по московскому времени ожидаю вашего прибытия на место постоянного прохождения должности, а в двадцать ноль-ноль желаю получить от вас по настоящему факсу, — он кивнул на факс, стоящий на тумбочке, — рапорт об исполнении моего распоряжения. Директива отдана в… — он посмотрел на массивные часы с гирями, тоже в стиле второй стабилизации. — Тринадцать часов ноль семь минут. Предлагаю выбыть по назначению, автомобиль ожидает.</p><p class="p1">Губернатор сухо поклонился и вышел. Все в нем так дрожало от бешенства, что включить мобильный он догадался только в машине. Сразу же пришли три сообщения подряд от Григория, во всех содержалось требование немедленно позвонить. Когда губернатор набрал его номер, телефон Григория не отвечал. Отключен был и телефон Аши — его, впрочем, губернатор лично потребовал выключить на весь сегодняшний день, чтобы никто не вычислил ее по сигналу. Чем черт не шутит, может быть, ее и вправду уже ищут. Зачем его вызывал Тарабаров? Что ему за дело до морального облика того или иного губернатора? Все это было похоже на отвлекающий маневр — его явно решили на день оторвать от Аши, чтобы за этот день успеть сделать с ней что-то ужасное; он понял, что на этот маневр почти попался, ибо не было никакой гарантии, что Григория уже не вычислили. Что им всем далась девушка? Почему из-за одной девушки в отдаленном краю, в военное время, затеялось столько хлопот? Губернатор полагал, что он сходит с ума. Он вовсе не собирался прощаться с должностью: его ценили наверху, у него были связи в кабинете, и если захотеть — он мог бы при желании побороться и с самим Тарабаровым, которого наверху откровенно считали дундуком. Не понимал он одного: ради чего вся эта мерзкая суматоха?</p><p class="p1">Страннее всего, однако, было то, что молчал телефон резиденции. Он позвонил в свой секретариат. Ответил грубый мужской голос, которого губернатор не узнавал:</p><p class="p1">— Аппарат краевого управления.</p><p class="p1">— Это Бороздин. С кем я говорю?</p><p class="p1">— Курьер, — после недолгой паузы ответил голос.</p><p class="p1">— А что, из сотрудников подойти некому?</p><p class="p1">— Обед, — не очень уверенно сказал голос.</p><p class="p1">— Что происходит?! — прикрикнул на странного курьера губернатор.</p><p class="p1">— Штатно все, — сказал курьер и повесил трубку.</p></span></span></span></span></span>
