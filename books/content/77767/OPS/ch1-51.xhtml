<span><span><span><span id="id68"><div class="title5">
<p class="p">Глава третья</p>
</div><p class="subtitle">1</p><p class="p1">Каждое утро Василия Ивановича надо было выводить гулять. Вообще-то он был не собака, чтобы ежедневно его выгуливать, но, во-первых, ему при его слабости полезны были прогулки, а во-вторых, Аньке при ее слабости они были просто-таки необходимы. Поскольку выгнать ее из дома на свежий воздух, оторвав от книжки или компьютерной игры, не представлялось возможным, родители взяли с нее слово, что после обзаведения васькой она будет ежедневно с ним гулять, и слово приходилось держать.</p><p class="p1">В Москве многие гуляли с васьками, это было удобно — можно было зайти в магазин и навьючить на них сумку, или, допустим, припахать ваську для мытья машины, или попросить его присмотреть за детьми, пока родители судачат друг с другом в сквере. Васьки были, конечно, неважными наблюдателями и сторожами, но им так не хотелось обратно в приют, что они старались изо всех сил. Да и вообще, мода на васек укоренялась, за них даже начали платить пособие, «Русойл» в порядке благотворительности выплачивал единовременную стипендию семьям, где было больше одного васьки (за машек платили даже больше, поскольку машки труднее поддавались перевоспитанию) — поэтому в скверике рядом с Анькиным домом по утрам прогуливались не меньше пяти васек. Иногда случались инциденты — васьки дрались, но было это очень редко. Гораздо чаще они чинно здоровались, даже слегка раскланивались и тихо разговаривали между собой.</p><p class="p1">Иногда с ними заговаривали посторонние. Несколько раз Анька приметила одного и того же человека — невысокого, лысого, очень крепкого, с аккуратной рыжей бородкой и в очках. Он разговаривал с Василием Ивановичем подолгу и смотрел на него чрезвычайно уважительно.</p><p class="p1">— Вы с ним знакомы? — спросила Анька однажды.</p><p class="p1">— Нет, — поспешно сказал Василий Иванович, — он просто так приходит. У него в нашем приюте знакомый был. Ему интересно узнать, как там, вот и спрашивает.</p><p class="p1">— А вы знали этого его знакомого?</p><p class="p1">— Да не помню, — сказал Василий Иванович. — Я много кого знал. Он человек неплохой, ты не бойся.</p><p class="p1">Анька и не боялась, ей просто было непонятно, почему это с ее васькой разговаривает посторонний, да еще так уважительно. Она замечала, что лысый появляется не чаще раза в две недели и понемногу расспрашивает всех, но охотнее всего проводит время именно с Василием Ивановичем. Стоило Аньке подойти и прислушаться к разговору, лысый улыбался и нарочито громко спрашивал:</p><p class="p1">— Ну, а масла-то, масла сливочного дают?</p><p class="p1">— Дают, — кивал Василий Иванович с несколько искусственной басовитостью. — Обязательно, по утрам, а в выходные и по вечерам тоже.</p><p class="p1">— Ну, прекрасно. Я еще зайду.</p><p class="p1">— Василий Иванович, — сказала однажды Анька, — может, он хочет вас похитить?</p><p class="p1">Василий Иванович улыбнулся.</p><p class="p1">— Кому я нужен, Анечка? — спросил он, глядя на нее честными голубыми глазами.</p><p class="p1">— А тогда зачем?</p><p class="p1">— Я, знаешь, когда бродил, очень много выучил стихов, сказок, всяких прибауток… Он собиратель, так вот ему интересно.</p><p class="p1">— Собиратель? — Анька никогда не видела, чтобы собирали стихи и сказки.</p><p class="p1">— Да, специалист.</p><p class="p1">— Как Афанасьев?</p><p class="p1">— Вроде Афанасьева, да. Я же тебе рассказываю, вот и ему интересно.</p><p class="p1">— А откуда он знает?</p><p class="p1">— А он всех нас расспрашивает. Просто я побольше других помню.</p><p class="p1">И это было правдой. Сказок Василий Иванович знал великое множество, и именно за эти сказки Анька любила его больше всего. Можно даже сказать, что она без них уже не могла.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p1">Это были очень странные сказки. Анька никогда не слышала ничего грустнее.</p><p class="p1">Он приходил по вечерам и робким, тихим голосом, но грамотными и словно давно сложенными фразами рассказывал бесконечную сагу об игрушках, которые остались в брошенном доме. Это была деревенская изба, из которой переехали хозяева. Им дали квартиру в городе. Дети забыли взять игрушки, потому что уже выросли, и игрушки жили в старом ящике. Когда хозяева съехали, плюшевый пес сумел отодвинуть крышку и выпустить остальных. Потом избу снесли, чтобы построить на этом месте новый квартал, и игрушки остались под дождем. Сначала они жили в картонной коробке, а потом наступила зима, в коробке стало холодно, и они пошли в город искать своих хозяев.</p><p class="p1">Анька старалась прятать зареванные глаза, чтобы родители не увидели и не подумали чего. Они обязательно устроили бы Василию Ивановичу серьезный втык за неправильные сказки. Их и так раздражало, что Анька плачет над книгами и жалеет даже бандитов, когда их убивают по телевизору. Им это казалось безволием, отсутствием нравственного стержня и много еще чем — отец в минуты гнева забывал, что ругает семиклассницу, и начинал употреблять всякие мудреные слова. Анька, впрочем, хорошо их понимала, поскольку прочитала много больше, чем полагалось по программе. Она знала, что родителям не нравится ее жалость, и самой ей, честно говоря, она тоже не слишком нравилась.</p><p class="p1">Сага об игрушках тянулась почти полгода. У всех в ней были свои характеры, своя речь, и Василий Иванович никогда не забывал, о чем говорилось в предыдущей серии. На это у него почему-то память была отличная. Правда, в его сказках почти ничего хорошего не происходило. Игрушки все время от кого-то убегали. Их пыталась арестовать милиция, их хотели присвоить жадные дети, а наиболее прилично выглядящую куклу одна жестокая девочка даже взяла к себе, но выбросила, когда кукла отказалась играть в ее жестокие игры. Еще там был бобренок, добрый дух того самого дома, который снесли. Этот бобренок хуже всего себя чувствовал во время скитаний, потому что его предназначение было — хранить очаг, а вне дома ему было очень страшно. Он все время просился в какой-нибудь дом и непременно принес бы этому дому счастье, но его никто не брал, потому что он был уже достаточно потертый. Наконец его взял какой-то мальчик, но бобренка выкинули родители. Тогда бобренок вернулся, потому что хотел отблагодарить мальчика, — но в доме в ту же ночь случился пожар. Бобренок уцелел, он не спал и успел сбежать, но дома у него теперь опять не было. Заодно дома лишился и мальчик, и бобренок обязательно спас бы его, но мальчик его не заметил. В общем, в этих сказках никто никого не находил, все со всеми умудрялись разминуться, и даже бывшие владельцы игрушек не узнали их, когда игрушки пришли наконец в их новый городской дом. Тут Анька засмеялась, потому что с самого начала ждала чего-то подобного. Когда слишком грустно — уже смешно.</p><p class="p1">— Это ты, Василий Иванович, пересолил, — сказала она. Как-никак ей было уже тринадцать лет, и она давно была с Василием Ивановичем на «ты».</p><p class="p1">— Взрослая стала, — обиженно сказал Василий Иванович, но тут же улыбнулся.</p><p class="p1">— Я теперь сама так умею. Я сначала не понимала, как это у тебя так грустно получается, а теперь сама могу. Хочешь, я тебе завтра расскажу сказку про бедный мячик, которого все во время футбола пинали, а он всех любил, но никому не мог про это сказать?</p><p class="p1">— Хорошая ты девочка, Анечка, — сказал Василий Иванович, но в душе, кажется, все равно несколько обиделся.</p><p class="p1">После саги об игрушках было еще несколько таких же печальных историй, в которых главные герои всегда были беспомощны и никогда ничего не могли сделать с торжествующим, наглым, сознающим себя злом. Зло приходило и отбирало, что ему нравилось, и никто не мог остановить его, и даже само оно не лопалось, как бывает в некоторых историях, а только росло и пухло, как на дрожжах, наслаждаясь абсолютной безнаказанностью. Бывало, в сказках не было зла, а только бесконечная грусть. Была история о мальчике, который побежал за разноцветной бабочкой и не вернулся, потому что бабочка увела его куда-то далеко-далеко, за каменную стену, а мама все ждала его у калитки и горевала, и плакала: «Ты опять заигрался, ты опять забегался и забыл про меня». Потом мальчик шел и шел вдоль каменной стены, рос, старел и возвращался к матери пожилым, усталым человеком, а она укладывала его спать и пела над ним. Эта сказка добила Аньку окончательно. Это было грустней и страшней, чем все, что рассказывал Василий Иванович про игрушки.</p><p class="p1">— Ты сам это сочинил, Василий Иванович? — спросила она.</p><p class="p1">— Нет, где же мне так сочинить. Это старая сказка, ее один из наших написал.</p><p class="p1">— Тоже из ва… из ваших?</p><p class="p1">— Нет, он не ходил, — понял Василий Иванович. — Не ходил, нет. Наши разные бывают. Но язык знал замечательно, он один так умел писать нашим языком.</p><p class="p1">— А у вас другой язык? — Анька даже перестала хлюпать.</p><p class="p1">— Немножко другой. Почти как обычный, только слова чуть иначе стоят.</p><p class="p1">— Это как же?</p><p class="p1">— Ну, вот так: «Людей так много, что существовать необязательно — без того найдется кому сделать необходимое и достойное».</p><p class="p1">— Ну и ничего особенного.</p><p class="p1">— Это только кажется. Спи, я тебе завтра еще расскажу, — и Василий Иванович, не слушая никаких просьб и уговоров, отправился к себе на кухню, где долго еще скрипел и кряхтел на старой кровати.</p><p class="p1">С этого дня он начал читать Аньке стихи на своем языке. В стихах этих почти все слова были как обычные, но другой была, если можно так выразиться, сама мелодия языка: слова стояли не прямо, в ряд, а как бы слегка под углом друг к другу, образуя изломанную, но единственно естественную линию. «И когда легла дубрава на конце глухом села, мы сказали „Небу слава“ и сожгли своих тела». Иногда это были довольно воинственные стихи, но и в них речь шла о поражении, о битве, в которой певец проиграл и теперь отпевал павших. «Чу, последний, догоняя, воин, дальнего вождя, крикнул: „Дам, о, князь, коня я — лишь беги от стрел дождя!“» О том, как воевали, не говорилось ни слова. «Это не наше», — коротко объяснял Василий Иванович.</p><p class="p1">— Откуда ты все эти стихи помнишь?</p><p class="p1">— Как же мне родной язык не помнить, — говорил Василий Иванович.</p><p class="p1">— Ну, скажи что-нибудь по-вашему!</p><p class="p1">— Подожди, будет время — скажу.</p><p class="p1">— Скажи: Анечка, девочка.</p><p class="p1">— Так ведь так и будет: Анечка, девочка. Слова все те же самые, только смысл иногда другой.</p><p class="p1">Этого Анька понять не могла и решила, что у Василия Ивановича в долгих скитаниях несколько, как говорили в школе, снесло крышу, — но древние песни ей нравились, а сказки у Василия Ивановича были лучше, чем у Афанасьева. Больше всего она любила историю про петушка и жерновцы.</p><p class="p1">— Что такое жерновцы, Василий Иванович? — спрашивала Анька.</p><p class="p1">— А это… ну, как бы… Завтра сделаем тебе, — пояснял он. И точно: на другой день по просьбе Василия Ивановича васька Леша с соседнего двора сделал ей деревянные жерновцы, такую меленку, которая вертелась, а от этого терлись друг о друга, перетирая в пыль невидимое зерно, две чурочки покрупней. Так вот, нашел петушок жерновцы, и для того, чтобы делать муку, не нуждались они ни в зерне, ни в ветре. Так и сыпалась сама собою мука, крутилась сама собой меленка, и была та меленка золотая, а сами жерновцы голубые. Ехал мимо злой барин немецкий, увидел жерновцы и отобрал. Почему барин был немецкий — Василий Иванович объяснить не мог.</p><p class="p1">— А в школе говорят, что всех иностранцев называли немцами, — сказала Анька.</p><p class="p1">— Нет, это ерунда. Немцы — это немцы. Ну, слушай. Полетел за барином петушок, сел на барские ворота и кричит: «Барин, барин! Отдай мои жерновцы, золотые, голубые!» Барин приказал кинуть петушка в колодец. Петушок сказал: «Носик, носик, пей воду!» Клювик выпил воду, петушок — видимо, весь раздувшись, но об этом сказка умалчивала — вспорхнул на барские ворота да как закричит: барин, барин, отдай мои жерновцы, золотые, голубые!</p><p class="p1">Приказал барин бросить его в печку, а тот закричал: «Носик, носик, лей воду!» Вся вода и вылилась, и погасло пламя, и барин, убоявшись таковой мощи сообразительного петушка, отдал ему жерновцы. Петушок опять победил не силой, а кротостью. Правда, по логике васькинских сказок петушок обязан был вернуться на пепелище — скажем, за это время барские холопья пожгли избу, а деда с бабой пустили по миру, так они и ходят, и ищут своего петушка, а он вечно скитается, не в силах их найти, чтобы отдать жерновцы. Анька стала рассказывать Василию Ивановичу этот свой вариант продолжения в сквере, где они как раз гуляли с жерновцами, — и васька Леша, который все это слышал, усмехнулся:</p><p class="p1">— Что, Василий Иванович, а славно ты девочку выучил. Еще чуть — и…</p><p class="p1">— Ладно вам, Леша, — сказал низкий веселый голос откуда-то сзади. Анька обернулась — и увидела лысого, очкастого.</p><p class="p1">— Это кто же такие жерновцы сделал? — сказал он, оглядывая Анькину игрушку.</p><p class="p1">— Это Леша, — тихо сказала Анька. — А кто вы? Я вас часто тут вижу.</p><p class="p1">— Это друг наш, это друг, — залопотал Василий Иванович, на глазах съежившись и почему-то испугавшись.</p><p class="p1">Анька не понимала, с какой стати он боится лысого. Вид у лысого был самый мирный, и разговаривал он с васьками почтительно — совсем не так, как некоторые тетки в подъезде.</p><p class="p1">— Я вас тоже давно приметил, Аня, — сказал лысый. — Я вам в следующий раз принесу соколок. Знаете, что такое соколок?</p><p class="p1">— Да я сам сделаю, — закивал Леша.</p><p class="p1">— Не знаю, — честно сказала Анька.</p><p class="p1">— Напрасно, очень интересная вещь. Такое как бы яблочко на блюдечке, слышали об этом? Но яблочко не простое, вроде волчка — так по кругу и бегает, удивительные штуки показывает. Сейчас почти уж и перевелись мастера-то. Не у всякого показывает, не всякий и видит.</p><p class="p1">Леша понурился, словно он-то как раз был не из мастеров.</p><p class="p1">— А как вас зовут? — спросила Анька.</p><p class="p1">— Зовут меня Петр Гуров, — сказал лысый. — И если я вам когда-нибудь понадоблюсь, то вот, — он вытащил визитку с фамилией и телефоном, без указания должности или адреса.</p><p class="p1">— Вы фольклорист? — выговорила Анька, гордясь знакомством с трудным словом.</p><p class="p1">— Иногда и фольклорист. В общем, завтра же принесу соколок.</p><p class="p1">Гуров не появился ни назавтра, ни через неделю, но ближе к осени, когда Аньке предстояло идти уже в восьмой класс, вдруг возник ниоткуда, по своему обыкновению. Он извлек из потрепанного портфеля деревянное блюдце, а потом — деревянный шар.</p><p class="p1">— Что, Василий Иванович, — сказал он ваське, смотревшему на него робко и уважительно. — Запустим?</p><p class="p1">Дело в том, что Анька прогуливалась на этот раз не одна, то есть не только с Василием Ивановичем, но и с двумя подругами. Василий Иванович на них покосился, но Гуров все понял.</p><p class="p1">— А что ж, нам посторонние не помеха. Здравствуйте, девочки. Я Анин приятель, правда, Аня?</p><p class="p1">Анька кивнула. Почему-то ей казалось, что Гуров человек неопасный.</p><p class="p1">— Вот и запустим соколок, пусть побегает да покажет чего, — сказал Гуров и ловко запустил шар по блюду.</p><p class="p1">Василий Иванович внезапно подобрался и пристально уставился на шар, хотя Анька ничего особенного не видела — бегает и бегает одна деревяшка по другой. Гуров между тем смотрел на Василия Ивановича пристально и даже как-то сердито, словно ожидал услышать от него неприятное.</p><p class="p1">— Ну и что видим, Василий Иванович? — спросил он с несколько нарочитой бодростью, когда шар остановился.</p><p class="p1">— Ничего почти не видим, — одними губами ответил Василий Иванович.</p><p class="p1">Девчонки прыснули, и Анька вместе с ними (за эту усмешку она долго корила себя потом — получалось, что она ненадолго предала Василия Ивановича).</p><p class="p1">— Ну а все-таки? — не отставал Гуров.</p><p class="p1">— Уходить надо, — пролепетал Василий Иванович.</p><p class="p1">— Ну, ну. Так уж сразу.</p><p class="p1">— Не сразу, — сказал Василий Иванович. — А больше не спрашивайте меня.</p></span></span></span></span>
