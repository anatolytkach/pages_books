<p class="p">2</p>
</div><p class="p1">Генерал-майор Пауков и точно был не прежний, хотя порывался еще сохранить обычаи и манеры блестящего офицера в лучших традициях варяжского генштаба. Утром девятнадцатого июля он встал, по обыкновению, в половине седьмого, приказал окатить себя ледяной водой из баскаковского колодца, сделал легкую гимнастику по офицерскому руководству, приложение пять, — двадцать наклонов влево, двадцать вправо, «ласточка», «крылышки», пятнадцать приседаний, — побрился тупой бритвой «Нева», обрызгался «Шипром», облачился в отутюженную ординарцем форму и направился с обычным утренним визитом к актрисе Гуслятниковой.</p><p class="p1">Сорокалетняя, толстеющая актриса Гуслятникова сохраняла следы былой красоты. Она оказалась в Баскакове с актерской бригадой. Пока на фронтах была передышка, в штаб тридцатой дивизии постоянно наезжали столичные гости в рамках программы политического воспитания войск. Сначала нагрянул «Аншлаг», распотешивший солдатню до звонкого солдатского пуканья; особо знатно изображали ЖДов — жирных, с портфелями. Потом невесть с чего нагрянули писатели — тоже целая бригада, прикомандированная отчего-то именно к Паукову; писатели задержались до сих пор — из Москвы их забирать отказывались, мотивируя отказ необходимостью своевременного освещения армейских будней в печати; тщетно объяснял Пауков, что не у него одного армейские будни, что писателей можно бы откомандировать и в другую дивизию, вон в Чехвостове стоят танкисты, а под Трухиным десантники; из Москвы упорно долдонили, что Пауков — знаменосец, орденоносец, а потому и писатели должны кантоваться у него, регулярно встречаясь с бойцами и отправляя отчеты в «Красную звезду». Пауков не знал, что делать с писателями. В конце концов ему надоели гражданские очкарики в плохо пригнанной, давно не стиранной форме, осточертели их виноватые улыбки и все более откровенные вольности в разговорах с солдатами и в спорах с политруком, — и он принял решение поделить их день на две части: в первой половине дня писатели, как положено военным, занимались строевой подготовкой под руководством сержантуры, наводили порядок в расположении и зачищали картошку вместе с нарядом, а во второй — встречались с теми же солдатами уже как писатели, то есть отвечали на вопросы, задавали в ответ собственные, вели пропаганду и сочиняли очерки об отличниках боевой и геополитической подготовки. С писателями, таким образом, он разобрался — но тут на него свалились гастроли Нижегородского театра Русской Армии. Это получалась уже не служба, а одно бесконечное культмассовое мероприятие; может, им еще и бордель из Москвы привезти? И так уже не осталось во всех окрестных деревнях девки неотжаренной; и так подворотничков не меняли по три дня, забыли солдатскую гигиену, ходят в чирьях, — нет, им прислали театр с обязательным предписанием смотреть спектакли и все это время кормить артистов. Артисты приехали в самом деле голодные — в Нижнем, как и в прочей провинции, театры давно закрывались за ненадобностью, единственный шанс выжить во время войны был именно давать концерты в войсках; но и концерты у них были, прямо сказать, псивые, не то что «Аншлаг». Одно название, что театр. Сначала читали какие-то басни, изображали медведя и лису, потом показали солдатам отрывок из сказки «Колобок», с переделанным про ЖДов текстом, потом разыграли целое действие из пьесы «Солдатская мать» — про дезертира, который сбежал под мамкину юбку, а мамка его заложила военкому и закатала обратно на фронт; пьеса была хороша в политико-воспитательном отношении, особенно выразительна была солдатская мать — тугая, сочная женщина. У солдат это вызвало нездоровые реакции — среди рядового состава многие неприлично громко обсуждали, что хотели бы иметь такую мать и показали бы ей много интересного; в целом пьеса не вызвала нужных эмоций. Артисты отыграли три концерта и должны были наконец свалить, но захотели остаться — в Нижнем, говорили они, давно жрать нечего, а тут все-таки войсковое довольствие. Особенно нагло вел себя нерадивый сын солдатской матери, он же постановщик пьесы — уминал, сволочь, тушенку так, что ряха трескалась; Пауков побежал к политруку, тот запросил Москву — но Москва подтвердила, что артистов надо принимать, иначе сорвется план воспитательной работы. Артисты харчились у них еще неделю, переиграв весь классический репертуар. На прощание — от радости, что свалят наконец, — Пауков приказал всем выдать по стакану спирта и сам выпил, а выпив — принялся почему-то гусарить. Стыдно вспомнить. Блестящий русский офицер. Пил спирт из туфельки (не очень чистой, тридцать девятого размера). Чуть не задохся от натуги, поднимая на руки солдатскую мать Гуслятникову, и даже стал перед нею на одно колено, а уж каблуками щелкал так, что сбил набойки к чертовой бабушке. Сулил поставить на все виды удовольствия. Читал стихи — сначала из «Офицерского письмовника» («Жасмин хорошенький цветочек, он пахнет очень хорошо»), потом, по просьбе артистов, — из «Офицерской азбуки»: «Давид играл на арфе звучно, дрочить в сортире очень скучно». Распустил хвост, показал настоящий армейский шик — было бы перед кем метать бисер! В ту же ночь Гуслятникова ему отдалась, а когда все уехали — осталась.</p><p class="p1">Паукову поначалу льстило, что настоящая артистка, хоть и из Нижнего Новгорода, будет жить теперь при нем в расположении его штаба — и у него, вот уже три года как оторванного от родной семьи, толстой жены и двух уродливых дочерей, будет своя полевая спутница, как и положено на настоящей войне. Он что-то читал подобное. Гуслятникова вызвалась каждый день декламировать стихи по деревням, где были расквартированы солдаты из его дивизии, — и в самом деле, надев единственное концертное бархатное платье, терзая потный платочек, читала солдатам по вечерам, вместо телепросмотра информационной программы:</p><p class="p1"><em>Касаясь трех великих океанов,</em></p><p class="p1"><em>Она лежит, раскинув города…</em></p><p class="p1">Солдаты уже не решались отпускать шуток про то, как она лежит и как бы хорошо ей всунуть пушечку куда-нибудь в Кушечку, — потому что Гуслятникова была теперь уже не приезжая артистка и не солдатская мать, но полевая жена генерала Паукова, отнюдь не любившего шутить. Программа «Время», конечно, была бы интересней. Все-таки краешком глаза посмотреть на гражданскую жизнь — тетки в летнем, мороженое… За месяц актриса успела не по одному разу выступить во всех деревнях вокруг Баскакова. В услужение ей Пауков назначил солдатика — по рекомендации собственного ординарца, который обрадовался возможности пристроить земляка. Первую половину дня Гуслятникова проводила в избе, томно нежась, ежась, красясь, жалуясь на судьбу то хозяйке, к которой ее определили на постой, то денщику Тулину. Пауков с нею уже две недели не ночевал — при трезвом рассмотрении солдатская мать оказалась толстой, неловкой и совершенно ненасытной. Паукову в сорок восемь лет было трудно удовлетворять ее прихоти, да и перед офицерами неудобно было постоянно ночевать у сомнительной бабы. Поэтому спать с ней Пауков не желал, а лишь иногда навещал. Сначала это казалось Гуслятниковой проявлением особого армейского шика. Пауков в ее глазах обрастал новыми совершенствами. Потом ее это насторожило и даже обидело. Теперь, после двух недель раздельного проживания, она говорила с ним низким, грудным голосом, с многозначительно-трагическими интонациями, выкатывая коровьи сливовые глаза, — и так, словно он ее соблазнил и бросил. Паукову страшно хотелось послать ее подальше, но блестящий офицер не мог кричать на женщину и отказывать ей в приюте. Он проклинал день и час, когда под действием спирта пристал к солдатской матери. Он уже не знал, куда от нее деваться, а она и не думала съезжать из Баскакова. Утром девятнадцатого Пауков зашел к ней, как всегда, — деликатно постучавшись согнутым пальцем.</p><p class="p1">— Ах, минутку, я не одета, — простонало из горницы.</p><p class="p1">Пауков пять минут прождал у двери.</p><p class="p1">— Что она там, химзащиту надевает, что ли, — буркнул он про себя и постучал снова.</p><p class="p1">— Да, войдите, — ответила Гуслятникова, чем-то шурша. Пауков вошел. Гуслятникова в пестром халате китайского шелку в изысканной позе лежала на широкой деревенской кровати, среди живописно разбросанного тряпья. Неряшливость ее была чудовищна.</p><p class="p1">— Здравствуйте, генерал, — томно произнесла она. Несмотря на ранний час, на лице ее Пауков обнаружил сизоватый слой грима. — Я польщена вашим посещением. В последнее время вы меня нечасто балуете. Все дела службы?</p><p class="p1">— Война, — сурово сказал генерал. — Война — наша работа, Катерина Николаевна, и требует всечасного напряжения всех сил.</p><p class="p1">— Да, да, и не говорите… Но когда же, по-вашему, кончится эта ужасная война?</p><p class="p1">— Этого я как человек военный не могу знать и разглашать, — ответил Пауков в своей манере, в которой был написан и его проект устава. — Военный человек, хотя бы даже и имея секретное сведение, не может его разглашать никому. Дата окончания войны, она же время «Щ», не может быть разглашаема ни при каких обстоятельствах, равно как и численность, снаряжение и наименование вероятного противника, а также и самое его наличие.</p><p class="p1">Пауков не мог упустить случая блеснуть перед штатским существом формулировкой из своего проекта.</p><p class="p1">— Я так боюсь за вас, — протянула актриса.</p><p class="p1">— Что же делать, это так положено. Но русской актрисе не следует бояться за русского генерала. Я при первой встрече особенно оценил вашу выправку, — подпустил генерал обязательного ежеутреннего комплимента.</p><p class="p1">— В русском классическом театре это называют стáтью, — кивнула Гуслятникова.</p><p class="p1">— Да, да. Классическая женская выправка. Вы не должны поддаваться бабьим страхам. Всем этим, знаете, истерикам. Мы солдаты, и если нужно, то не раздумывая и грудью. И так же вы. Это такое наше русское дело.</p><p class="p1">Повисла пауза. Набор офицерских комплиментов был высказан, почтение к русскому классическому театру продемонстрировано. Паукову пора было идти к войскам, но Гуслятникова продолжала пялиться него многозначительным, влажным и не отпускающим взором.</p><p class="p1">— Но хотя бы где противник, вы можете сказать? Предвидятся ли атаки? Я страшно боюсь стрельбы… Вы должны будете предупредить меня загодя. Ваше общество мне дорого, — она многозначительно потупилась, — и я успела полюбить ваших солдат…</p><p class="p1">— Солдат есть да, да, — сказал Пауков. — Солдат есть да, инструмент любви к Отечеству. Тонкие энергии и все это. Возвышенное чувство проницает и направляет, и торсионные поля. — Упомянув торсионные поля, он окончательно исчерпал свой светский репертуар, но подлая баба не затыкалась.</p><p class="p1">— Что же вы стоите, садитесь, прошу вас, — глубоким контральто сказала Гуслятникова. — Мне очень нравится военная жизнь, но все-таки я прошу вас хоть за два дня предупредить меня, когда начнется наступление. И, может быть, вы дали бы мне тогда машину до станции… Сейчас, конечно, я не хотела бы еще уезжать, общение с солдатами… и с офицерами… так много дает мне… Отчего вы редко у меня бываете?</p><p class="p1">«Еще бы тебе не нравилась военная жизнь, — подумал Пауков. — Хаваешь ты, как целое отделение, трясешь перед солдатами своими телесами, прислуга у тебя опять же…»</p><p class="p1">— Мы ценим ваше мужество, Катерина Николаевна, — сказал он, как должен был в его представлении говорить блестящий офицер: отрывисто, лающе, с ледяной вежливостью рьяного служаки. — Но рекомендую вам в самое ближайшее время покинуть расположение штаба, потому что война есть непредсказуемое занятие, в котором каждый из нас не может сегодня знать того, что надо было делать вчера.</p><p class="p1">Это тоже была славная армейская мудрость, которую он намеревался со временем обнародовать в записках.</p><p class="p1">— Вы только и можете повторять одно, — сморщившись, брюзгливо заговорила Гуслятникова. — Можно подумать, что вы мной тяготитесь.</p><p class="p1">— Никак нет, этого не может быть ни при каком угле рассмотрения, — выдавливал из себя Пауков последние запасы воинского красноречия. — Как не может цветок тяготиться пчелкою, так не может старый солдат тяготиться присутствием прекрасной половины человечества, пышным букетом украшающей этот ломящийся от яств стол… (Пауков сам не заметил, как перешел на классический офицерский тост; пока офицер в силах был произнести эту фразу, полную хитрых шипящих согласных, он считался еще не пьяным).</p><p class="p1">— А между тем ради вас я оставила любимого человека, да! — не останавливалась Гуслятникова. — Святой человек, беззаветный служитель искусства. Вы говорили, что истинный ценитель женщины — только офицер. Теперь я вижу, как вы меня цените! Вы обещали мне заботу и внимание. Но вас я почти не вижу, и все это вы мотивируете делами службы! Какие могут быть дела службы в перерыве между военными действиями! Вы наверняка пьянствуете где-то со своими подчиненными и с нетребовательными местными девками, а женщина культурная вам уже не под силу, ибо в ее присутствии вы ощущаете себя бурбоном! Да, да, бурбоном! Я целыми днями заперта в грязной избе, со мной все время только этот тупой Тулин, мы не развлекаемся, у нас нет балов! Вы не можете обеспечить даже, чтобы солдаты хорошо слушали, когда я им читаю! Я несу им свою душу, а они в задних рядах подшиваются! Я не понимаю, почему, в конце концов… Я вправе требовать…</p><p class="p1">— Молчать! — заорал Пауков, багровея. Он долго был блестящ, но всему есть предел. Из-под тонкой ледяной брони воинской галантности поперла офицерская сущность. — Мне, боевому генералу! Сука! Блядь! Встать! Сесть! Я покажу тебе раскинув города, старая пердунья! — и, запустив в Гуслятникову ведром, выскочил на улицу.</p><p class="p1">В это же самое время Плоскорылов читал первую утреннюю лекцию офицерам дивизионного штаба. Пока рядовые под наблюдением сержантов занимались уже третьим за утро подметанием дворов и выравниванием плетней по бечеве, офицеры собирались на занятия по геополитической подготовке.</p><p class="p1">Плоскорылов с детства любил варяжский воинский дух, офицерскую прямоту стана, презрение к работе, отношение к солдату как к неодушевленному предмету — ибо если видеть в нем одушевленный, перестает срабатывать норманнская концепция великой жатвы. Сама мысль о наемной армии была в плоскорыловской среде невыносима: она оскорбляла воинскую идею. Единственная думка солдата должна быть не о семье, не о денежном довольствии и даже не о Родине, но исключительно о посмертной славе — каковую славу и призван был обеспечивать Плоскорылов; тут он бы не подкачал. Плоскорылов обожал мертвого солдата. Только мертвый солдат, установленный на площади в виде памятника, назидательно поминаемый во время молебствий, торжественно называемый Неизвестным, — был абсолютным воплощением норманнского духа, ибо утрачивал личность, на войне излишнюю. Личностью мог обладать командир, она наличествовала у политрука и являлась важным компонентом СМЕРШевца, — но личность солдата упразднялась идеей варяжской доблести. Единственное устремление маленькой, некрасивой воинской единицы в серой шинели, с неумело замотанными портянками (Плоскорылову отчего-то именно таким, слегка трогательным, представлялся типичный рядовой) должно было направляться к гибели, возможно более скорой; не героическими деяниями и не совершенно излишней в воинском деле смекалкой (какая может быть смекалка, если есть твердо поставленный приказ!), но исключительно живой солдатской массой можно было завалить любого врага, решая тем самым обе генеральные задачи: порабощение противника и сокращение собственного войска. Дорогу к победе следовало мостить телами — это понимали немногие избранные военачальники, кумир Паукова и сам Пауков были из их числа. Всякое дело прочно лишь постольку, поскольку под ним струится кровь — разумеется, не драгоценная кровь элитного варяжства (Плоскорылов вел род от личного сокольничего рюриковых сыновей), а черная кровь земли, нефть войны, щедро отжимаемый сок рядовых. Солдат, солдат — есть тот же виноград; не жать из него сока — не будет и прока, гласила армейская мудрость из сборника речений преподобного Евстахия Дальневосточного, архиполковника ДальВО. Из ДальВО редко кто возвращался живым даже и в мирное время.</p><p class="p1">К сожалению, довести население до идеальной численности не удавалось никак: оно всякий раз умудрялось быстро восстановиться, и Плоскорылову виделся в этом несомненный пережиток варварства. После очередной чистки в стране становилось легче дышать — в юности, готовясь в историки, он с особенным наслаждением перечитывал источники, относящиеся ко временам таких разрядок; но как же быстро все засорялось! Как скоро опять начинали кишеть по углам какие-то дети, ныть — какие-то старики; как быстро жизнь плебса входила в колею, отторгая великие воинские добродетели! Сопливые детсадовцы, старушечьи очереди в поликлиниках, продовольственные магазины… всякому хотелось жить, жрать и испражняться, как будто в жизни не было более высокой цели! Скоро каждый из населения начинал воображать себя личностью, и элита, призванная направлять и благословлять, растворялась в слепой, шевелящейся, жаждущей зрелищ и размножения людской массе; в этом разложившемся, гнилостном субстрате вовсю хозяйничали невыводимые хазары, и приходилось вновь и вновь изыскивать поводы для великого похода. Чем дольше был мирный промежуток, тем неохотнее мобилизовывалось население; ЖДы за деньги готовы были предоставить любую справку о нездоровье (меж тем как сами воевали все отчаяннее) — короче, война назрела; не совсем ясно было, как объяснить ее необходимость обычным офицерам, академий не кончавшим и вообще по большей части получившим военное образование на спецкафедрах гражданских институтов, где не умели внушить правильного мировоззрения. Плоскорылов тщательно готовился к лекциям, подбирал слова, намекал — но всякий раз пасовал перед откровенной скукой на лицах слушателей, а рассказать всю правду не мог. Даже о варяжской оккупации сообщалось только на пятой ступени — до нее все обучавшиеся искренне считали русских коренным населением.</p><p class="p1">Несмотря на все эти трудности, Плоскорылов любил читать лекции. Он чувствовал себя отцом всех этих людей — и даже немного матерью. Как известно, любой мыслитель предпочитает выстраивать то мироздание, в котором ему, с его комплекцией и темпераментом, наиболее комфортно; Плоскорылов рожден был благословлять идущих на смерть. Он любил мертвых нежной, тонкой любовью; ему было среди них отлично. Они не могли ему возразить и не скучали, слушая его. Им он мог бы бесконечно объяснять, как велик их подвиг и как грандиозно дело. Ради приведения всего населения к совершенному состоянию стоило трудиться. Ему особенно удавались проникновенные, несколько бабьи интонации; его голосом могла бы говорить Родина-мать с известного плаката, неумолчно зовущая в могилу вот уже которое поколение бессовестно расплодившихся сыновей. Призывая отважно погибнуть во имя Русского Дела, Плоскорылов уже немного и оплакивал погибших, которые пока еще в живом, несовершенном виде сидели перед ним в душной избе, переоборудованной им в Русскую Комнату. Он немедленно вывесил в ней портреты Леонтьева, Шпенглера, Вейнингера, Меньшикова, Ницше и других милых его сердцу истинных норманнов, а на доске, экспроприированной в сельской школе, рисовал геополитическую схему борьбы Севера с Югом. Школа давно уже пустовала и наполовину развалилась.</p><p class="p1">Предметом нынешней его лекции была очередная годовщина великого танкового сражения. Излагать норманнскую концепцию последней войны надо было осторожно — даже среди офицеров не все правильно понимали подлинные задачи воевавших сторон и глубокую единоприродность норманнского духа, управлявшего обеими армиями. Плоскорылов лишь намекал на подлую роль Англии, которая в последний момент поссорила двух титанов, подписавших пакт о вечной любви. На стороне Англии активно действовали ЖДы, отлично понимавшие, что после воссоединения арийских сущностей им окончательно не жить. К этой лекции Плоскорылов готовился особенно тщательно, подбирая такие слова, чтобы думающее офицерство поняло, а обычное ничего не заметило.</p><p class="p1">— Господа офицеры! — крикнул дежурный по Русской комнате, прапорщик Круглов; все встали. Плоскорылов в длинной рясе с золотым аксельбантом протянул дежурному полную влажную руку для поцелуя и милостивым кивком благословил собравшихся. По сердцу его прошла теплая волна. Было необыкновенно приятно, хотя и чрезвычайно ответственно, в двадцатисемилетнем возрасте уже пасти народы; не зря на богословский факультет Военной академии Генштаба конкурс был до двадцати человек на место.</p><p class="p1">— Дорогие собратья, сегодня мне хотелось бы побеседовать об идее Севера, — начал он уютным богословским распевом. — Долгие годы хазарские историки-наймиты отвлекали наше внимание от главного противостояния — борьбы Севера с Югом, — навязывая русскому сознанию искусственную борьбу Востока с Западом. Восток и Запад якобы противостояли друг другу и в последней великой войне, в этой битве народов, о которой и поныне благоговейно помнят правнуки победителей. Между тем это было не противостояние мифических западников со столь же мифическим востоком, а смертельное объятие двух могучих титанов Севера, великих братьев, которым стало тесно в одном мире. Глубокая единоприродность связывала борющихся, русский дух противостоял могучему немецкому, — так сталкиваются в небе две тучи, производя гром и блистание и заставляя потрясенных зрителей дивиться силе Божией. Русский брат прильнул к устам тевтонского смертельным поцелуем — и мускулистый титан задохнулся в стальном объятии. Плодами победы пытались воспользоваться враги обоих режимов, и прежде всего мировое хазарство, поднявшее голову, — но дальновидным решением русского вождя хазарам была отведена отдаленная резервация, и русско-тевтонское дело продолжилось на сорок лет. За эти сорок лет было достигнуто многое — осуществился космический полет, человек шагнул в ледяную благодать Космоса, — но хазарский реванш остановил триумфальное движение русской судьбы. Сегодня мировой Юг снова тщится отнять у человечества понятие ценностей, подменив все ценности примитивной, растительной жаждой жизни, он растлевает и разлагает миллионы, и прежде всего метит в нас — в последний оплот мирового духа. История делается сегодня здесь, в дегунинском котле, где Север и Юг сошлись лицом к лицу. Под Пермью есть обелиск, отмечающий границу Востока и Запада — противостояние их нам навязано, дабы отвлечь внимание от истинного. Дегунино же — геополитическое сердце Евразии, и тот, кому оно будет принадлежать, получит власть над миром…</p><p class="p1">Так он говорил еще минут примерно двадцать, зная, что последние десять лучше всегда оставлять на вопросы. Офицеры проявляли удивительную изобретательность в придумывании вопросов. Если вопросов не возникало, Плоскорылов ябедничал в штабе, и тогда все участники политзанятий получали взыскания за незаинтересованность — прощай отпуск.</p><p class="p1">— Господин капитан-иерей, — спросил капитан Селиванов, — а как с точки зрения борьбы Севера и Юга закончился конфликт ислама и Соединенных Штатов? А то, знаете, солдатики интересуются, кто все-таки победил…</p><p class="p1">— Солдатикам, — посуровел Плоскорылов, — следовало бы больше интересоваться строевой подготовкой как основой воинской дисциплины в русском духе. Но если вы позволяете солдатам задавать вам общеполитические вопросы, рекомендую отвечать кратко: читай устав, в нем есть все. Согласитесь, господин капитан, что при вдумчивом чтении устава в нем можно найти исчерпывающий ответ на любые вопросы, от бытовых до богословских. Сошлитесь, например, на параграф пятнадцатый строевого завета, от Паисия Закавказского: «Аще же кто усомнится в своей воинской мощи, убояся вероятного противника, тому позор и поругание перед лицом товарищей и три наряда на службу».</p><p class="p1">Селиванов испуганно умолк. На самом деле у Плоскорылова не было никакого ответа на каверзный вопрос. Ислам был наш форпост на юге, друг и партнер, терпящий бедствие, но не признаваться же в этом публично! С тех самых пор, как был открыт флогистон и перестала что-либо значить черная кровь земли, — у ислама не было уже никаких шансов противостоять каганату и насквозь прохазаренным Штатам. Полная изоляция России от прочего мира, позволившая ей наконец без помех разыгрывать свою торжественную мистерию, — происходила единственно оттого, что она оказалась в числе государств, не имевших флогистона. Непонятно, как в стране, столь богато оделенной от Господа лесами, реками, нефтью, юфтью, финифтью, пенькой и ворванью, — не оказалось пустякового газа, которого никто никогда не видел и на котором таинственно держалась теперь вся мировая промышленность. На флогистоне ездили автомобили, бездымно работали фабрики, делались бешеные деньги — а Россия по-прежнему ездила на бензине, которого у нее стало залейся, ибо нефти давно никто не покупал. Можно было, конечно, делать из нефти много чего другого. Говорил же Менделеев, что топить нефтью — все равно что ассигнациями. Однако цена на эти ассигнации не поднималась теперь выше десяти долларов за баррель, и хватало ее у остального мира без всякой российской помощи. Запасы флогистона оказались везде — в Штатах, в Африке и даже в Антарктиде; в хазарском каганате его было столько, что в стране не осталось участка земли без скважины, — не было его только на исламском Востоке и на всей российской территории, строго по границе; оскорбительное издевательство природы начиналось немедленно за российскими пределами, в презренной Польше, где флогистон обнаружили почти сразу. Из-за проклятого газа прекратилась столь перспективная было война на Ближнем Востоке, где Штаты увязли накрепко; после открытия флогистона Ближний Восток вообще перестал быть кому бы то ни было интересен, и лишь раз в полгода одинокий шахид, купленный на последние гроши, бессмысленно взрывался где-нибудь в американской подземке. После того, как нефть перестала быть основой промышленности, ислам из мировой религии сделался чем-то провинциальным и почти вегетарианским. Честно сказать, Плоскорылов ненавидел флогистон. Он не до конца в него верил. Это явно было подлое хазарское изобретение, и конспирологическая теория выходила на диво стройной; оставалось понять, как на этой грандиозной ЖДовской лжи крутятся моторы.</p><p class="p1">Плоскорылов и сам сознавал, что ответ его вышел неубедителен, но основой варяжской контрпропаганды как раз и была неубедительность — поскольку солдат и младший офицер должен был верить не аргументам, а мощи. Слаб контр-пропагандист, который на вопрос об успехах вероятного противника или преимуществах хазарского образа жизни начинал отвечать всерьез и с цифрами. Истинный политрук в ответ на такой вопрос либо заносил солдату звездюлину в грудак, либо — если был брезглив или, подобно Плоскорылову, страдал одышкой, — сдавал его в СМЕРШ, где солдату быстро все становилось понятно, ибо перед смертью, говорят, человек сразу все объемлет умом, только не успевает поделиться. Офицеры понимали, что задавать вопросы следует осторожно, — их, конечно, Плоскорылов сдавать бы не стал, как-никак офицера надо беречь, сам же учит, но стукануть в штаб может, а там попасть под раздачу несложно, сыскался бы предлог. Ни о чем интересном больше не спрашивали — интересовались, например, следует ли наказывать нерадивого солдата лишением переписки с семьей или эта мера отметена как способствующая бегству; Плоскорылов радостно сообщил, что процент беглецов за последний год снизился почти в полтора раза, а бежавшая из заключения глава комитета матерей Стрельникова поймана на китайской границе и водворена в читинский лагерь усиленного режима. Эту благую весть он приберег под конец, но был у него для господ офицеров и еще один сюрприз — дева Ира.</p><p class="p1">Пятнадцатилетнюю деву Иру возили по дивизиям больше полугода. До пятнадцати лет она развивалась нормально, но в начале третьего года войны у нее начались видения, она услышала голоса и ушла из дома. Первое время она проповедовала на улицах, ее сдуру схватили, начали проверять — тут-то о ней и стало известно в Генштабе, а мимо такой возможности проходить было нельзя. Плоскорылов присутствовал на ее первом концерте в клубе богословского факультета. Это была любовь с первого взгляда, единственная и окончательная. Дева Ира не блистала красотой, как и дева Жанна; у нее была худенькая подростковая фигурка, мелкие черты лица и бесцветные волосы, но все искупали огромные серые глаза и надтреснутый металлический голос — голос патриотического ребенка, истинной души варяжства. Она исполняла старые песни, которые почерпнула из приемника, из ночных ностальгических радиопередач — «Огонек», «На солнечной поляночке», «Темную ночь»; правду сказать, сам Плоскорылов не очень высоко ценил эти народные песнопения, сочиненные в окопах, — то ли дело «Война народная» с ее тевтонской поступью! — но в исполнении девы Иры они приобретали почти достоевский надлом. Так могло бы петь варяжское дитя, умученное хазарами, испускающее последнюю слезинку перед закланием; сложного музыкального сопровождения дева Ира не признавала — она лишь слегка пощипывала струны старенькой гитары. Любая другая музыка могла заглушить этот слабый жестяной голос, который походил бы на дребезжание дачной флюгарки, когда бы не надрыв и не подспудная сила, таившаяся в нем. Таким голосом можно было выкрикнуть прощальную речь перед расстрелом, а можно и скомандовать «Пли!» — если расстреливали внутреннего врага. Жертвенно-палаческая оборачиваемость была особенно мистична, в ней выражалась главная идея варяжства; ребенок постиг ее интуитивно, ибо на богословском факультете не учился, а больше взять ее было неоткуда. Только голоса могли трансцендировать из ледяного мира абсолютных сущностей этот детский мученический надрыв в сочетании с приказом; ломкий альт девы Иры, записанный на три немедленно выпущенных диска, разлетелся по всей стране и стал обязателен для слушания в армии. Попев, дева Ира входила в транс и начинала рассказывать:</p><p class="p1">«Вижу… вижу…». Видела она то самое, что надо: черную бархатную тьму с колючими звездами, полюс абсолютной силы, суровые островерхие ельники на малиновом закате, пустынные неприступные горы с парящим над ними орлом, ополоумевших от восторга и страха дикарей, молящихся непостижимому каменному идолу — любимцу вымерших гигантов… Дева Ира жарила вслух прямо по Горбигеру, которого, к слову сказать, не читала; давным-давно, в эпоху мирового льда, земля населена была титанами, проводившими время в могучих единоборствах, — следами их игрищ лежат перед нами Альпы; титаны жонглировали горами, шутя разбрызгивали озера, шагая через щетинистую поросль лесов… но после геологической катастрофы могучие люди севера вымерли в теплом климате, а великое их наследие было извращено и оболгано низкими людьми тепла, скучными служителями пользы.</p><p class="p1">Плоскорылов подбежал к деве Ире знакомиться сразу после ее выступления на богфаке. Она еще не вполне вышла из транса и долго не могла сфокусировать на нем блуждающий серый взор. Все лицо ее было в бисеринках пота, она покачивалась. Плоскорылов поддержал ее за талию: от девы веяло холодом, словно, побывав в надмирных областях, она набралась ледяной благодати и теперь неохотно ее отдавала. Дева Ира внимательно взглянула на Плоскорылова, рассеянно лепетавшего что-то вроде о потрясающем впечатлении, о небывалом откровении, — и ломким бесцветным голосом произнесла:</p><p class="p1">— Ты — избранный, но нам нельзя.</p><p class="p1">Плоскорылов не сразу понял, о чем речь. Лишь через полминуты до него дошел смысл сказанного: дева Ира сразу признала в нем небесно-избранного спутника, но отмела саму возможность плотских отношений — ибо для продолжения своего служения должна была оставаться девою. Правду сказать, молодой выпускник и сам не спешил расставаться с девством, ибо не видел достойной, а также опасался неизбежных нагрузок: все-таки сердце, сердечко, как ласково называл его истинный варяг. Он также любил слово «моторчик». Почти материнская нежность к мертвому солдату естественно распространялась у Плоскорылова и на себя, такого больного, на свои серые глазки, пухлые влажные губки. Плоскорылов обожал рассматривать свои детские фотографии и с теплым умилением обнаруживал черты величия даже и в себе шестилетнем: истинно варяжский ребенок ангелом парил над стойкими оловянными солдатиками в русских национальных кольчужках, словно говоря им: прощайте, болезные, Отечество вас не забудет! Сердце его при этом заходилось неведомым сладким возбуждением. Моторчик следовало беречь. Осознав смысл сказанного девой Ирою, Плоскорылов преисполнился благоговения: что могло быть выше чистейших бесплотных отношений, не омраченных ревностью, похотью и неизбежными унизительными деталями, которые есть в физической стороне любви даже при полном взаимопонимании! Непонятно было, как можно сжимать в объятиях это хрупкое, жестяное или стеклянное тело, натянутое, словно струна на варяжских гуслях. Дева Ира была уже словно немного мертва. Более идеального объекта для иерейской любви не существовало.</p><p class="p1">Они виделись редко. Плоскорылов убыл к месту службы, дева Ира разъезжала по всем фронтам в сопровождении приставленной к ней суровой мамки — она кормила и обстирывала русское чудо, совершенно беспомощное в быту. В последнее время Ира все реже выходила из транса, не отвечала даже на простые вопросы и смотрела сквозь всех прозрачными серыми глазами. Плоскорылов устремлялся к ней во время кратких отпусков, а на дегунинское направление сумел залучить только сейчас, после упорной бомбардировки Генштаба сдержанно-скорбными письмами о падении боевого духа. Наконец Генштаб внял. Дева Ира с мамкой Ефросинией прибыла в Баскаково. Всю первую ночь капитан-иерей просидел около ее кровати, сжимая ее ледяную руку. Дева молчала, глядя в потолок. Ее утомило странствие. Утром ей предстояло петь перед офицерами после геополитической информации.</p><p class="p1">— Сегодня, — произнес Плоскорылов с интонациями ласковой няньки, подводящей малыша к сюрпризу (например, к бочонку с рассолом, в котором отмокают отменные гибкие розги), — мы увенчаем нашу беседу истинным чудом. Об этом чуде все вы, конечно, наслышаны, но немногие из вас, я уверен, видели его своими глазами. Сегодня для нас поет русское диво, юная муза войны, голос русского сопротивления — дева Ира!</p><p class="p1">Господа офицеры шумно встали и вытянулись. Ефросиния неслышно распахнула дверь и вошла, подталкивая перед собою бледную деву Иру на подгибающихся ногах.</p><p class="p1">Мамка была высокая, несгибаемая женщина неопределенного возраста, тяжелая, с серым лицом и скорбно сжатым ртом: идеал варяжской вдовы. В левой руке она несла за гриф детскую гитару. Ира перед очередным трансом потерянно блуждала глазами по стенам. Ефросиния подтолкнула ее к доске, Плоскорылов услужливо подвинул стул и отошел в угол, готовясь слушать божественные звуки. Ира несколько раз сонно провела по струнам, тряхнула головой и жестяным альтом запела:</p><p class="p1"><em>— Ми… и… мо берега крутого,</em></p><p class="p1"><em>Ми… мо… хат…</em></p><p class="p1"><em>В се… рой шинели рядового</em></p><p class="p1"><em>Ше-о-ол со-о-лдат…</em></p><p class="p1"><em>Шел солдат, слуга Отчизны,</em></p><p class="p1"><em>Ше-о-ол солдат во имя жизни,</em></p><p class="p1"><em>Землю спасая,</em></p><p class="p1"><em>Мир защищая,</em></p><p class="p1"><em>Шел впере-од сол… дат…</em></p><p class="p1">Плоскорылов закрыл глаза. Ему представился бескрайний русский простор, серый прибрежный песок, серая река и вдоль всего этого идущий серый солдат, насекомое войны, бесконечно малая человеко-единица. Солдат несомненно шел умирать, маленький, в старой шинелишке, слуга Отчизны, его было необыкновенно жалко, и утешиться можно только тем, что сейчас его наконец убьют — и он тотчас обретет гранитное бессмертие. Голос девы Иры окреп:</p><p class="p1"><em>Ше-е-ол солдат, слуга Отчизны,</em></p><p class="p1"><em>Ше-е-ол солдат во имя жизни,</em></p><p class="p1"><em>Землю спасая,</em></p><p class="p1"><em>Мир защищая,</em></p><p class="p1"><em>Шел вперед солдат…</em></p><p class="p1">Она сделала паузу (офицеры не нарушили молчания ни единым бестактным хлопком) и вновь провела по струнам большим пальцем — Плоскорылов обожал этот детский большой палец с вечно обгрызенным ногтем:</p><p class="p1"><em>— С берез… неслышим… невесом</em></p><p class="p1"><em>Слетает желтый лист…</em></p><p class="p1"><em>Старинный вальс «Осенний сон»</em></p><p class="p1"><em>Играет… гармонист…</em></p><p class="p1"><em>Вздыхают, жалуясь, басы,</em></p><p class="p1"><em>И словно… в забытьи…</em></p><p class="p1"><em>Сидят и слушают… бойцы…</em></p><p class="p1"><em>Товарищи мои!</em></p><p class="p1">Пока дева Ира детской лапкой с заусенчиками старательно зажимала басы, Плоскорылову представилась осенняя поляна в русском лесу и он сам, почему-то с баяном, хотя он сроду не умел играть ни на одном музыкальном инструменте; сейчас он доиграет вальс «Осенний сон», и его бойцы уйдут с поляны, растворятся в запахе прели, в желтой листве, просто исчезнут, как и надлежит пропадать без вести истинному солдату: молча, безропотно, не обнаруживая себя даже криком «За Родину!». Они будут уходить, истаивать в желтом осеннем свете, а Плоскорылов все будет играть, играть… словно сама эта музыка, как «Прощальная симфония» Гайдна, тихо растворяет солдат в воздухе: с каждой нотой все меньше, меньше… и вот он доиграл, переведя их всех в состояние печального совершенства, и остался на поляне один. Ползут сумерки, и желтые листья на глазах теряют свой цвет, ибо в сумерках цвета равноправны; в сгущающейся серо-лиловой тьме одинокий капитан-иерей с уже ненужным баяном сидел среди осеннего русского леса — ему нельзя исчезать, они с баяном теперь последняя память о доблестно погибшем подразделении; здесь Плоскорылову стало себя так жалко, что он зажмурился, и по круглым его щекам скатились две слезы. Офицеры, глядя на него, осторожно крутили пальцами у виска. Пение девы Иры производило на них унылое, тошнотворное впечатление. Добро бы Ира возбуждала желание — но при взгляде на нее хотелось одного: немедленно накормить и уложить спать, чтобы прекратился этот тонкий патриотический скрип на одной ноте.</p><p class="p1">Между тем обязательный репертуар не был еще исчерпан: дева Ира запела теперь гимн собственного сочинения. По сочетанию хрупкости с воинственностью песня «Звезды Севера» не имела себе равных.</p><p class="p1"><em>То Север, сугробами светел,</em></p><p class="p1"><em>С царицей на каменном троне.</em></p><p class="p1"><em>Там сосны, и волны, и ветер,</em></p><p class="p1"><em>Там блеск самоцветов в короне.</em></p><p class="p1"><em>О, дети слащавого юга,</em></p><p class="p1"><em>Где слишком все ярко и пестро!</em></p><p class="p1"><em>В преддверьи полярного круга</em></p><p class="p1"><em>Огнем колдовским светят звезды!</em></p><p class="p1"><em>Нет сказок чудесней на свете,</em></p><p class="p1"><em>Чем Север расскажет, я верю,</em></p><p class="p1"><em>И нет ничего на планете</em></p><p class="p1"><em>Прекрасней, чем Гиперборея!</em></p><p class="p1">Плоскорылов вообразил Гиперборею, ее суровые пейзажи и торжество вертикали — сосны, скалы, человек с филином. Дрожь священного восторга прошла по его спине и дыбом подняла волосы. Ах, ведь и дыба — то же торжество вертикали; не мучают, но возносят… Он вытянулся и хотел уже отдать честь, но понял, что сейчас вслед за ним поднимутся все офицеры, щелкнут каблуками и испортят песню; нет, пусть допоет…</p><p class="p1">— Товарищи! — вдруг воскликнула дева Ира, вскочив со стула и невидящими глазами уставившись в дальний угол Русской комнаты. — Товарищи! Все как один пойдем и умрем! Умрем за то, что свято! Умрем за то, что чисто! Умрем все! Сталь… сталь входит в тело… блаженство… — и рухнула на пол, как подкошенная.</p><p class="p1">Плоскорылов бросился к ней, — но к чувству страха за божественную возлюбленную примешивалось нечто новое, труднообъяснимое. К счастью, ряса хорошо скрывала причину его беспокойства: как только Ира рухнула, уронив гитару и раскинув руки, — капитан-иерей ощутил невероятное возбуждение, прежде накатывавшее только во сне. Он боялся прикоснуться к возлюбленной, ибо вместо того, чтобы оказывать первую помощь, хотел мять и обнимать обмякшее, а может, уже и мертвое тело. Кажется, Ефросинья что-то почувствовала. Она решительно отстранила иерея и поднесла к носу девы флакон с нашатырем. Ира медленно открыла глаза.</p><p class="p1">— Сталь, — прошептала она.</p><p class="p1">— Ирина, я здесь, — повторял Плоскорылов, — я здесь… Господа офицеры, — обратился он к слушателям, — можете быть свободны. Надо очистить помещение. Дежурный, откройте окна…</p><p class="p1">За окном начал накрапывать дождь. В комнату ворвались запахи земли, травы и навоза.</p><p class="p1">— Ира, что с тобой? — лепетал Плоскорылов, припадая ухом к ее груди, хотя и так отлично было видно, что дева ожила.</p><p class="p1">Она обняла его голову ледяными руками.</p><p class="p1">— Я увидела, — услышал он слабый шепот.</p><p class="p1">— Что? Что ты увидела?</p><p class="p1">— Они инициируют тебя. Не делай этого.</p><p class="p1">— Но я должен… мне пора… почему, собственно…</p><p class="p1">— Я видела. О! Не дай, не дай им этого!</p><p class="p1">— Ирина, не бойся, это всегда так делается…</p><p class="p1">— Хорошо, — она закрыла глаза. — Помоги мне подняться.</p><p class="p1">Держась за стол и покачиваясь, она долго еще смотрела в его глаза.</p><p class="p1">— Теплая сталь, — произнесла она наконец. — Георгий, не дай. Не дай им этого.</p><p class="p1">— Успокойся, все будет, как ты хочешь, — прошептал он.</p><p class="p1">Опираясь на его руку, дева Ира пошла к выходу. Сзади тяжело ступала мамка Ефросиния.</p></span></span></span></span></span>
