<span><span><span><span id="id114"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Он долго представлял себе, какими увидит родителей, и больше всего боялся увидеть их постаревшими, слабыми — но увидеть их ничуть не изменившимися было еще страшней. Какие часы лучше, спрашивал Кэролл у испуганных студентов, ничего не понимавших в лекциях чудаковатого профессора, — те, которые показывают правильное время дважды в сутки, или те, которые не показывают его вовсе? Первые, лепетали студенты. Вторые, торжествующе кричал Кэролл! Вторые, ибо первые стоят! Родители стояли в своем застывшем времени, как те часы: способность изменяться, хотя бы и к худшему, — примета живого. Родители были, слава Богу, живы, но существовали в особенном, не совсем человеческом пространстве, — Громов никак не мог освоиться в нем. Так, говорят, командировочный при возвращении не сразу вписывается в домашнее время. Столько всего с ним случилось, столько пространства пересек — а тут болото. Еще труднее вернувшимся с войны — когда Громов еще читал стихи, он прочел у одного поэта, как странно тому влезать в штатский костюм и в кармане находить бумажку с довоенным телефоном. Но солдату победившей армии проще не только выздоравливать — ему и в мирную жизнь легче вписываться; а Громов чувствовал себя как Иван-царевич, которого отправили за тридевять земель, а ни Кащей, ни Василиса так и не дались в руки. Отпуск после долгой и трудной работы — вещь хорошая, но что, если работа вдобавок совершенно бессмысленна? Громов научился ее, вместе с ее бессмысленностью, переносить — и находил в этом даже наслаждение, хоть и необъяснимое; однако вернуться из такого мира в нормальный было почти невыносимо. Жизнь без цели и смысла приемлема только тогда, когда до отказа набита страданием, грязью, копошением в армейской неразберихе; страдание — само себе смысл, оправдание и награда. Но жить без смысла в комфорте — мука, которой не вынесет никакое сознание; и в первые же минуты дома Громов мучительно захотел на войну.</p><p class="p1">На войне можно было не спрашивать, зачем он карабкается на ослизлую высоту, пинками поднимает солдат в бой, спит не раздеваясь, вскакивает в полтретьего ночи и уводит роту под дождь. Война есть война, и в нее-то он сбежал, устав жить без цели и оправдания. Война списывала все и всему придавала значение: это было какое-никакое, но дело, и ему оно подходило именно потому, что истинный подвиг не должен иметь ни причины, ни награды. Однако сидеть за столом и хлебать суп, глядя на родителей, значило возвращаться в предвоенный ад, где все требовало немедленной оплаты: и родители, и суп, и крыша над головой. Если ты всем этим пользуешься — изволь делать хоть что-то, а делать давно уже было нельзя ничего; не стишками же оправдываться. Стоило вернуться в довоенную молодость, в которой Громову было двадцать семь, — как тот же душный ужас навалился и уже не отпускал: что дальше и для чего все? Невыносима была хрупкость родительского очага, родительская безразличная ласковость — безразличная именно потому, что им годился любой Громов, они бы любили его всякого, вне зависимости от заслуг; так же, не спрашивая о сделанном, не требуя отчета, к нему кидалась его собака, так же не переводились в доме жалкие, но неизменные деньги, дававшие возможность хлебать все те же супы, — длилась жизнь без цели, оправдания и причины, жизнь, о которой никто не заплакал бы, когда она все-таки кончится, если она кончится вообще. Что не имеет конца — не имеет смысла, учил ЖДовский теоретик Лоцман; но что не имеет смысла — не имеет и конца. Не об этом ли говорил сумасшедший Волохов?</p><p class="p1">— Хлебушка кусай, — говорила мать, сидя напротив Громов и не сводя с него умиленных глаз. Ее умиляло то, что он ест. Когда-то, верно, ее умиляло то, что Громов зевает, чихает, улыбается; его любили тут просто так, и это было ужаснее всего. Он оттого и сбежал, что невыносима была жизнь просто так. Еще невыносимее было слышать, что он должен кусать хлеб. Он слышал это с детства — мать отчего-то уверилась, что суп надо есть с хлебом, что хлеб необходим для пищеварения. Отец сидел в углу и тоже смотрел на Громова. Он понимал, что надо бы спросить Громова о военных действиях, но ничего о них не знал, потому что по телевизору не говорили, а в газетах писали неразборчиво. Их, может, и не было — действий. Громов просто служил в армии, без всяких огневых контактов с противником. Громов сам им когда-то так написал в первый, самый страшный год своей службы, когда огневые контакты еще были, и какие, — но грустнее всего было то, что родители поверили. Они поверили бы теперь всему, что успокаивало их, и считали своим правом пожить наконец спокойно — ведь такая была жизнь, еще советскую застали, потом все рухнуло, потом рухнули и руины, теперь было вообще непонятно что, и когда все так тревожно — нельзя волноваться еще и о сыне. В родителях проснулся здоровый старческий эгоизм: Громов привык, что они беспокоятся о нем — и с этим легче было жить, — но теперь они беспокоились уже только о себе, потому что сознание старика сужается и на двоих его душевных сил уже не хватит. Они и друг за друга уже не особенно переживали, каждый все глубже уходил в себя. Это был старческий инстинкт самосохранения, всегда более сильный, чем у молодых: молодые не верят, что могут исчезнуть, а для старика это уже не вера, а точное знание. Родителям, сколь ни грустно, было не до Громова. Они внушили себе, что он где-то на далекой, но неопасной работе; теперь он приехал, и это очень хорошо, а потом уедет опять, потому что все дети рано или поздно вылетают из-под родительского крыла, и это тоже нормально. Нельзя было думать, что Громова могут убить: родители ничем этого не заслужили. У них сил уже не хватало на такие мысли. Приходилось беспокоиться о слишком большом количестве вещей — беспрерывных очередях, покупках, страховках; у стариков так много забот, так мало сил! О том, чтобы у них всегда были заботы, государство думало в первую очередь. Мирное население надо было чем-то занять. Все время приходилось держать в голове бесчисленное количество обязанностей: не забыли ли заплатить за свет, за газ, за медицину, за жилище, одну страховку, вторую страховку, за телевизор, за кабельную сеть, за консьержку в подъезде… Все это, включая консьержку, могли отключить, и родители, с умилением глядя на Громова, ни на секунду не забывали о том, что надо зайти туда и сюда. Громов понятия об этом не имел, хотя мог бы догадаться. Чтобы занять солдата при отсутствии боевых действий, командование придумало миллион упражнений по шагистике и по наведению порядка в расположении: замывать с мылом ножки кроватей, газеткой протирать зеркала в сортире… Чтобы занять население при отсутствии цели и смысла, который был намеком на конечность существования и потому отвергался с порога, российское государство измыслило бесчисленные занятия, которыми обставлялись простейшие действия: за этими занятиями начисто забывался смысл, и людям очень быстро становилось ни до чего; тем более им не было дела друг до друга. Громов мог бы это заметить и раньше, если бы не так мучился собственными проблемами. Родители отделывались ритуальными приветствиями — «Осторожненько», «Пиши», «Не ешь холодного на морозе», ритуальными давно были и их письма — если бы Громов мог об этом задумываться в армии, он заметил бы это, но там он себе думать о родителях запретил. Это расслабляло.</p><p class="p1">— Ты знаешь, что тебе надо зарегистрироваться? — спросил отец.</p><p class="p1">— Нет, а зачем?</p><p class="p1">— Да что ж у вас, в отпуск никто не ездит? Тебе не рассказывали?</p><p class="p1">Громов чуть было не сорвался: в отпуск действительно почти никто не ездил; родители впрямь уверились, что у них там обычная работа, не хуже всякой другой, все вовремя уезжают на месяц куда-нибудь к морю…</p><p class="p1">— Не рассказывали, — ответил он.</p><p class="p1">— Нет, теперь новое правило. Теперь тебе обязательно надо зарегистрироваться.</p><p class="p1">— Я в комендатуре отмечусь завтра, этого достаточно.</p><p class="p1">— Нет, нет. Ты не знаешь. По радио говорили. (Это «По радио говорили» давно уже было для матери непререкаемым аргументом). У нас у одной женщины в подъезде сын не зарегистрировался, и их потом чуть не выселили. Обязательно завтра же с утра пойди зарегистрируйся, еще до комендатуры. Ты уедешь, а у нас потом неприятности.</p><p class="p1">— Где это?</p><p class="p1">— В паспортном столе. Обязательно пойди, и еще нужна справка из поликлиники.</p><p class="p1">— Какая справка? — Громов даже перестал сердиться, настолько это было смешно.</p><p class="p1">— Надо флюорографию. Обязательно сделай флюорографию, потому что без этого тебя снимут с учета. А если ты в поликлинике не на учете, могут снять и нас. У отца на работе один человек не прошел флюорографию, и всю семью сняли с учета, а потом чуть не выселили. (Во всех родительских историях про коллег и соседей обязательно возникало счастливое чудо в конце: чуть, а все-таки не выселили; истории с печальным концом были для них уже тяжелы).</p><p class="p1">— Но я же в армии, неужели они не знают?!</p><p class="p1">— В армии ты там, а на учете здесь, — назидательно сказал отец. — У Каповичей сын живет в центре, потому что купил квартиру, а прописан здесь. Он туда прописал жену. И хотя он по факту живет там, ему здесь надо было пройти флюорографию. Он не прошел, и их чуть не сняли с учета. Только когда старший по дому вмешался и подтвердил, что Костя по месту жительства прошел, тогда их оставили. Но ему все равно пришлось сделать и здесь, и там.</p><p class="p1">— Ну, — сказала мать, подавая сковороду с жареной картошкой, — ты хоть расскажи, как там. А то ты не рассказываешь ничего.</p><p class="p1">Это тоже была дежурная претензия, потому что ей вовсе не хотелось, чтобы Громов что-нибудь рассказывал. Более того, она боялась, что он начнет рассказывать. Этот рассказ мог пробить ее скорлупу, разворошить кокон, в котором она жила. Но расспросы о том, как там, на войне, входили в ритуал — ритуалами давно уже обходились тут все, от государственных мужей до васек. Потом, два-три века спустя, следование ритуалам можно было изобразить как подвиг. Отцу в разговоре с сыном полагалось сказать «Служи, сынок!» и добавить, что и сам он в свое время преодолевал тяготы и лишения воинской службы; сыну полагалось сказать «Служу, батя» — и потеплеть суровыми глазами. Матери полагалось пригорюниться.</p><p class="p1">— Да чего рассказывать, — ответил Громов. — Ничего не происходит почти. Гарнизон и есть гарнизон.</p><p class="p1">— Кормят хоть нормально? — спросила мать.</p><p class="p1">— Ну видишь, я даже пополнел.</p><p class="p1">— Ничего ты не пополнел. Как был шкелет, так и остался. — «Шкелет» было бабушкино слово; при упоминании о бабушке полагалось тихо прослезиться. — Почему ты пишешь так редко?</p><p class="p1">— Мам, когда будет о чем, я сразу напишу.</p><p class="p1">— Ты знаешь, что Шелапутина развелась? — Шелапутина училась когда-то с Громовым в одном классе. Убей Бог, Громов не помнил, как она выглядела.</p><p class="p1">— Серьезно? — переспросил он.</p><p class="p1">— Да, да. И уехала.</p><p class="p1">— Куда?</p><p class="p1">— Не знаю. Мне ее мать рассказала, мы встретились в троллейбусе.</p><p class="p1">— А что, они тоже теперь здесь? Они же там у нас жили, в том районе, где раньше…</p><p class="p1">— Нет, нет. Родители переехали. Почти все родители из вашего класса переехали сюда. Дети почти все в центре, а родители сюда.</p><p class="p1">— Почему?</p><p class="p1">— Ну, чисто, зелено. Район хороший.</p><p class="p1">— Инфраструктура, — с важностью сказал отец.</p><p class="p1">— Магазины все рядом, — сказала мать. — Поликлиника хорошая.</p><p class="p1">Громов не знал, о чем еще спросить. Еще немного, и он спросил бы о погоде. Мать сказала бы, что погода хорошая.</p><p class="p1">— Если завтра регистрация, я сегодня схожу в комендатуру, — сказал Громов.</p><p class="p1">— Сходи, сходи, — кивнул отец.</p><p class="p1">Громов встал из-за стола и хотел помыть посуду, но мать не дала, с преувеличенной энергией тут же взявшись за мытье. Громов поймал себя на том, что чувствует себя как в компьютерной игре, квесте, где надо в каждой определенной комнате сделать что-то одно — а потом можно идти дальше, хотя можно и задержаться в этой комнате до бесконечности. Задание выполнено, и что будут говорить нарисованные фигурки — давно известно. Они тебя не гонят, оставайся, сколько влезет, — но ты больше ни за чем тут не нужен, да и сами они не нужны. Можно подойти к любой, задать вопрос, услышать ответ. Все, что полагалось сделать в этой кухне, Громов уже сделал. Можно было поговорить с отцом, можно с матерью, но и они, казалось, с молчаливым укором ждали, что он перейдет на следующий уровень.</p><p class="p1">Мать вышла проводить его в прихожую. Эта квартира была один в один похожа на прежнюю, но гораздо жальче, обшарпанней; зеркало затуманилось, поплыло.</p><p class="p1">— Расчеши головушку, — ласково сказала мать.</p><p class="p1">Господи, что расчесывать, что еще за головушка! Он был ротный командир, боевой офицер, схоронивший многих товарищей, поднимавший роту в бой, выдерживавший мат начальства, дебоши казаков, лень и тупость подчиненных; он несколько раз едва не погиб, забыл, что значит спать на чистом белье, сутками, случалось, ничего не ел, кроме неугрызаемого ржаного сухаря, — и мать обращалась к нему с той же фразой, какой провожала его когда-то в школу; может, когда-то она имела какой-то смысл, — что ему было теперь расчесывать, стриженному почти под ноль, как полагалось в русской армии?! Вероятно, ему следовало умилиться, — но, к ужасу своему, он ничего не почувствовал, кроме глухого раздражения.</p><p class="p1">— Осторожненько, — сказала мать ему вслед.</p></span></span></span></span>
