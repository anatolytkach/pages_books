<p class="p">От автора</p>
</div><p class="p1">Автор приносит свои извинения всем, чьи национальные чувства он задел.</p><p class="p1">Автор не хотел возбуждать национальную рознь, а также оскорблять кого-либо в грубой или извращенной форме, как, впрочем, и в любой другой форме. Но это, конечно, никого не колышет. Определенной категории читателей это неинтересно.</p><p class="p1">Патриотами обычно называют себя готтентоты, исповедующие классическую готтентотскую мораль: хорошо все, что хорошо для нас; так действуют наши враги, и следовательно, так должны действовать мы; чем меньше ценится человеческая жизнь, чем невыносимее условия существования в возлюбленном Отечестве — тем ближе оно к идеалу. Смешно и странно, что эта суицидальная садомазохистская концепция все еще смеет претендовать на роль государственной идеологии. Однако она смеет. И любая попытка ниспровергнуть ее называется разжиганием национальной розни.</p><p class="p1">Автор приносит свои извинения всем, чью межнациональную рознь он разжег.</p><p class="p1">У меня нет определенной, обязательной для читателя расшифровки аббревиатуры «ЖД». Читатель волен выбрать любую или предложить свою: железная дорога, живой дневник, желтый дом, жирный Дима, жаль денег, жизнь дорожает, жидкое дерьмо, жаркие денечки, жесткий диск, Живаго-доктор. Для себя я предпочитаю расшифровку «Живые души».</p><p class="p1">Русская история еще не началась, как и русское христианство. Автору хотелось бы верить, что его книга послужит одним из многочисленных и весьма чувствительных в последнее время толчков к ее запоздавшему началу. В противном случае нас ждет многолетнее медленное осыпание, ибо дурная бесконечность существует лишь в теории. На практике она оборачивается неуклонной деградацией, не замечать которой в наше время может только захватчик, втайне мечтающий о сокращении коренного населения до размеров скромного обслуживающего персонала. Все споры последнего времени, не выходящие за пределы парадигмы «славянофильство vs западничество», идут исключительно о темпах этой деградации, превращающейся либо в бурный развал, либо в сонное гниение. В некотором смысле развал может оказаться благотворнее, ибо если в огне способно уцелеть хоть что-то огнеупорное, то в болоте разлагается все.</p><p class="p1">Истина открывается не для того, чтобы прятать ее в столе. Истина поднимает вокруг себя бурю исключительно для того, чтобы дальше разбросать свои семена. Я родился для того, чтобы написать эту книгу, и придумывал ее в последние десять лет. В ней сошлись мои любимые сюжеты и главные мысли, которые всегда были об одном и том же, а именно о бесприютности — самом страшном моем страхе. В моей стране мне тоже бесприютно, и это не только мое ощущение.</p><p class="p1">Это во многих отношениях неправильная книга. Я хотел бы написать ее иначе, но не думаю, что это возможно. Мне не так уж важно было написать хорошую книгу. Мне важно было написать то, что я хотел.</p><p class="p1"><em>Дмитрий Быков</em></p><p class="p1"><em>Москва, август 2004</em></p></span>
