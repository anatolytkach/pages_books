<span><span><span><span><span id="id62"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Губернатор едет к тете, губернатор едет к тете… Васильич встретил его хмуро.</p><p class="p1">— Сначала к Григорию, — сказал губернатор.</p><p class="p1">— Может, в резиденцию сперва?</p><p class="p1">— А что такое?</p><p class="p1">— Да увидите.</p><p class="p1">— Нет, ты выкладывай.</p><p class="p1">— Да приезжали там…</p><p class="p1">— Кто?</p><p class="p1">— Да Хрюничев со своими…</p><p class="p1">— И что?</p><p class="p1">— Обыск был.</p><p class="p1">— Хрюничев? У меня? Обыск? По чьей санкции?</p><p class="p1">— Ну не знаю я, Алексей Петрович. Не предъявляли мне санкции.</p><p class="p1">— Нет, но что это такое?! В моем отсутствии?</p><p class="p1">— Да, без вас. А они и нарочно так сделали, без вас. Понятно же, чего искали.</p><p class="p1">— Чего?</p><p class="p1">— То есть кого, — со значением сказал Васильич.</p><p class="p1">Губернатор набрал Хрюничева.</p><p class="p1">— Михаил Николаевич, — сказал он строго. Машина неслась среди леса из аэропорта в город, пахло хвоей, сыростью, небо было лиловое, зловещее, и никогда еще губернатор не чувствовал себя до такой степени чужим в собственном крае. — Мне доложили, что вы обыскивали без меня мою резиденцию.</p><p class="p1">— Кто доложил? — неприветливо спросил шеф МВД.</p><p class="p1">— Какая разница?! Это так или нет?</p><p class="p1">— Вы на месте? — не отвечая, спрашивал Хрюничев.</p><p class="p1">— Я еду туда. Я был у Тарабарова по вызову.</p><p class="p1">— Что вы были у Тарабарова, я знаю, — досадливо сказал Хрюничев. — У вас не было никакого обыска. У вас было рядовое, это, рутинное было у вас розыскное мероприятие.</p><p class="p1">Им все казалось, что если они переименуют серьезную вещь, она сделается несерьезной: контртеррористическая операция, локальный конфликт, снижение жизненного уровня…</p><p class="p1">— С какой стати? Я что, партизан укрываю?</p><p class="p1">— Вы партизан не укрываете, вас лично никто не обыскивал. Вас досматривали? Нет, не досматривали. У нас лично к вам претензий нет, — одышливо, с паузами говорил Хрюничев.</p><p class="p1">— Это черт знает что! — заорал губернатор. Ситуация до такой степени выбила его из колеи, что он не думал сейчас даже об Аше и о Григории, которому позвонил еще из самолета — и опять тщетно. — Какие мы? Кто такие мы?!</p><p class="p1">— Соответствующие ведомства, — важно сказал Хрюничев. — Что вы меня спрашиваете, Алексей Петрович? Я человек подневольный. Вам следовало с Тарабаровым. Вы же были у Тарабарова. Вы могли спросить лично.</p><p class="p1">— Это что, с его санкции?</p><p class="p1">— Я не знаю, с какой санкции. У нас свое ведомство и своя санкция. Вы доедете до места, Алексей Петрович, и тогда позвоните. У вас не пропало ничего. Если у вас что пропало, то вам надо заявление по форме. Но я вам отвечаю, что ничего не пропало. Если пропало, то это обслуга потом это, пользуясь случаем… Вы приезжайте на место и дайте знать.</p><p class="p1">Черт-те что, думал губернатор, черт-те что. Губернатор едет к тете. Приехали. Здравствуйте, тетя. Я не понимаю: губернатор я или кто? Что здесь еще входит в мои обязанности? Кто в моем распоряжении — только туземная шваль? Значит, силовые ведомства мне уже не подотчетны — да и были ли когда? Санкция явно не тарабаровская; Тарабаров требовал, чтобы я убрал Ашу, — а здесь в это время уже ищут Ашу без меня; значит, Тарабаров вызвал меня с их же санкции, чтобы развязать им тут руки; значит, это люди, которые могут приказывать Тарабарову… Получается, что никакой защиты на самом верху у меня теперь нет; а ведь я хотел, хотел позвонить Калядину. Калядин руководил пресс-службой всего совмина, обычно они с губернатором обедали в Москве, когда наместников собирали на рутинные совещания, — в этот раз губернатор ему даже не позвонил, не было секунды толком поговорить, прилетел за взбучкой, получил и с накрученным хвостом вернулся… Но что может Калядин, если включились такие силы? И почему они включились? Если они ищут Ашу, все еще как-то понятно; но что, если они ищут не Ашу? Что на мне есть? Он стал вспоминать — и не мог вспомнить; воровать в крае было нечего, золото давно выковыряли, нефти не больше, чем везде, и что ему делать с этой нефтью, которой давно уже захлебывалась вся страна? Но если все эти силы включились из-за нее… и если на самом верху, с этими их друидическими гороскопами и цитатами из Конфуция, верят теперь в туземную легенду о девушке из рода волков, понесшей от северного наместника… значит ли это, что все окончательно сошли с ума?</p><p class="p1">После звонка Хрюничеву он ожидал многого, но все же не того, что застал в резиденции. Резиденции, собственно, больше не было. Снаружи она еще сохраняла прежний, уютный и мирный вид, — но вверху все было перевернуто вверх дном, с явным намерением не просто отыскать кого-то, но и навести максимальный беспорядок. Это было сделано не просто так, с несколько виноватым усердием, с надеждой не потревожить, — нет, так могли себя вести только с человеком, с которым больше не считались; первого чиновника в крае так обыскивать не могли. Обыск был произведен нагло, с вызовом, — и главное, что к поиску Аши дело далеко не сводилось. Не в ящиках же стола они искали ее! Он, конечно, нигде не хранил ничего лишнего — ЖДовских брошюр в доме и так не водилось; но личные вещи… Весь его безупречный гардероб, галстуки, сорочки… Он арестовал бы за такое любого — стоило позвонить Хрюничеву, но не звонить же Хрюничеву с тем, чтобы он сам себя арестовал!</p><p class="p1">Номер он, однако, набрал, не удержался.</p><p class="p1">— Что вы у меня искали, Хрюничев?</p><p class="p1">— Я вам уже докладывал, — засопел чертов боров, — я уже докладывал вам все…</p><p class="p1">— С чьей санкции вы посмели все это устроить?!</p><p class="p1">— С санкции министра внутренних дел.</p><p class="p1">— Какого министра?</p><p class="p1">— Нашего министра, российского министра. Никакие другие мне пока, слава Богу, санкций не выписывают.</p><p class="p1">— Там была санкция именно на весь этот бардак?!</p><p class="p1">— Вот у меня здесь сказано, — Хрюничев зашуршал бумажкой, — у меня здесь сказано: розыскное мероприятие под шифром бе пять, по первому разряду. Это на языке должностной инструкции означает: полный розыск, с досмотром личных вещей. (Как все они, он говорил «дОсмотром», с ударением на первом слоге). Я вам могу предъявить, это все не самодеятельность, я не в игрушки играюсь. Я действую, как мне предписано.</p><p class="p1">— Почему меня никто не ввел в курс? Я должен присутствовать при таких мероприятиях, вы же рылись в моих вещах!</p><p class="p1">— Никак нет, это нигде не предписано, что вы лично. Это можно с вами, а можно без вас. Понятые были, спросите камердинера вашего и кухарку. («Господи, они все выворачивали при них! Как я буду им приказывать после этого?!»).</p><p class="p1">— Пришлите по крайней мере людей навести здесь порядок!</p><p class="p1">— Этого нигде не написано, — сказал шеф МВД. — Они ничего не взяли, и это я отвечаю. А присылать их все рассовывать по местам — это, извините, не наше, это вы можете лично силами прислуги.</p><p class="p1">— Вы с завтрашнего дня здесь не работаете, Хрюничев, — бесцветным ломким голосом сказал губернатор. — Я доложу в Москву. Я вас отстраняю.</p><p class="p1">— Никак нет, — засопел Хрюничев, — вы не отстраняете меня и никакого права, вы полномочий не можете иметь даже на расспросы, это я вам лично по человеческому отношению… Если вы так будете разговаривать, мы можем по-другому разговаривать… Если у вас розыск по категории бе пять, то вы под подозрением, и вам может быть предъявлено! Вы обязанности свои исполняйте, а на чужие вы посягать не можете! Я лично, если хотите, вам могу продемонстрировать, решайте свои вопросы наверху, а меня вне рабочего времени трогать не можете, и я не обязан вам тут!</p><p class="p1">Он нажал отбой. Это была наглость неслыханная, небывалая. Губернатор всегда допускал, что у МВД может быть отдельное руководство, но в разговоре с ним, личным наместником, который пусть раз в год, но принимал от президента ежегодную верительную грамоту… в разговоре с ним самолично отключиться… Это было неслыханное нарушение служебной этики, плевок в лицо, и этот тон! Что-то переменилось, переломилось, он хотел проснуться.</p><p class="p1">Он вызвал заместителя по общим вопросам — по сути, шефа своей канцелярии, занимавшегося должностной перепиской и готовившего отчеты для Москвы.</p><p class="p1">— Константин Васильевич! Распорядитесь там, пожалуйста, чтобы люди навели порядок в резиденции.</p><p class="p1">— Сейчас, — ласково отозвался заместитель; по крайней мере этот еще его не предал. — Они только в офисе закончат…</p><p class="p1">— А что, в офисе тоже обыск?</p><p class="p1">— Так, небольшой. Они тут сделали беспорядочек слегка, но ребята уже опять сделали порядочек. Они требовали, чтоб я им компьютерные пароли сдал, но я не сдал. Не имеете права и все. Они сказали, что завтра с вами поговорят.</p><p class="p1">— Завтра я с ними поговорю так, что они у меня никакого пароля не захотят, — пообещал губернатор. — Из Сибири в Сибирь, а? — проговорил он, обращаясь уже к самому себе. — Я знаю, кто поедет из Сибири в Сибирь…</p><p class="p1">Совсем стемнело. Он стоял один среди разоренной спальни, в которой еще сегодня утром прощался с Ашей. Аша, да, Аша. Надо забрать ее немедленно и везти куда угодно. Видимо, все действительно очень серьезно. Если завтра не примут мер по его жалобе и не уберут Хрюничева с командой, он тут же подаст в отставку. Приземлиться есть где. В конце концов, чем терпеть все это… Он давно уже чувствовал, что не может больше встраиваться в государственную пирамиду, где ни один его плюс не требовался, а минусы горячо приветствовались; где у него были все основания для успешной карьеры, кроме единственно необходимого — бездарности. Губернатор едет к тете.</p><p class="p1">— Никита!</p><p class="p1">— Слушаю-с, — Никита возник по первому зову.</p><p class="p1">— Сейчас сюда Мстиславский пришлет людей наводить порядок, проследи. Я поехал за Ашей, приеду с ней. Распорядись насчет ужина.</p><p class="p1">— Сделаю.</p><p class="p1">Губернатор стремительно вышел из разоренной спальни и приказал Васильичу гнать на Саврасовскую. Охрану он на всякий случай прихватил.</p><p class="p1">— Что ж вы, сволочи, — горько сказал он телохранителю в машине. — У вас на глазах такое творили в доме, а вы?</p><p class="p1">— Что ж нам, отстреливаться было, Алексей Петрович? Мишка полез к ним, да они его положили мордой вниз… («Ответят и за Мишку», — отметил про себя губернатор). Они бумагу предъявили. Сами знаете, мы люди служилые.</p><p class="p1">Служилые, знаем. Это универсальное местное оправдание для всех, кто не хочет ни за что отвечать. Я и сам до последнего времени был такой служивый: надо пороть — порол, дезертиров ловить — ловил, и правильно. Что будет, если служивый забудет службу?</p><p class="p1">— Но могли вы хоть сказать, чтобы они не свинячили так?</p><p class="p1">— А кто видел? Нас всех услали вниз, в служебку, там мы и пересидели, пока они тут… Хрюничев сам был. Сказал, вам все объяснит и чтобы не злились.</p><p class="p1">— Ну, объясню я ему и сам кое-чего…</p><p class="p1">В окнах Григория не было света. Губернатор взбежал на третий этаж, за ним тяжело топотал телохранитель.</p></span></span></span></span></span>
