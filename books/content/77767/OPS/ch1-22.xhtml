<span><span><span><span><span id="id28"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Он ожидал мгновенной перемены в тональности разговора, — удивления, испуга, если угодно, все-таки он прикасается к главному, о чем с ним не говорят, — но даже если Эверштейн и удивился, то ничем этого не выдал. Он комически схватился за голову:</p><p class="p1">— Ой, вейзмир! Таки они его уже вовлекли. Скажите же, Воленька (он смягчал «ж», как французское j): вас уже хотят туда принять? Вам-таки уже совсем скоро отрежут? (Обрезание было его излюбленной темой).</p><p class="p1">— Да я вообще не знаю, кто они такие. Мне очень стыдно.</p><p class="p1">— Ой, Боже ж мой, шо вы стыдитесь, мальчик. Я расскажу вам за ЖД, а все-таки этой вашей Долинской надо укоротить язык. И шо она болтает с этими гоем, я вам скажу… А скажите, вы-таки, когда ехали, совсем ничего не знали? И никакая тетя Циля из Житомира вам-таки ни разу не объяснила, шо это за ЖД? Тетя Циля из Житомира всегда очень многословна, ви знаете почему? Ви заметьте, шо между собой мы никогда так не разговариваем, а только с вами. Это нас пробивает на словесный понос от счастья, шо не бьют сразу по морде. И от того, шо отпустило, мы сразу начинаем рассказывать все, всю свою жизнь, и еще вербуем вас в союзники; всякие эти обороты — «ну, вы же ж понимаете», или «ну, вы же ж сами пострадали от царизма»… И при этом так, знаете, не без заискиванья подмигиваем, типа мы свои. А? Когда я перееду в Россию от этой ужасной страны с ее идиотскими левыми, вы же ж защитите меня от уличного хулигана? Потому шо я сразу же начну ему рассказывать анекдоты, шобы не убил… (Тут он вспомнил об акценте, от которого в середине своей речи, увлекшись, совершенно избавился).</p><p class="p1">— По-моему, вы преувеличиваете, — хмуро сказал Волохов, которому успели надоесть жалобы на притеснения и генетическую русскую хазарофобию. — Если вы болтаете, только когда вас бьют, — в России все ваши уже лет двадцать как должны дать обет молчания.</p><p class="p1">Эверштейн визгливо захохотал, откидываясь назад. Они сидели в белой прохладной комнате городского музея. За окном медленно плавилось, растекаясь в золотую лужу, огромное солнце.</p><p class="p1">Со всеми непременными ужимками Эверштейн поведал, что ЖД — контора знаменитая, но взглядов ее на многие вещи он не разделяет, это Женечка у нас радикал, а я скромный историк… Когда он перешел наконец к сути и вывалил на Волохова правду, уместившуюся в одно предложение, — Волохов в первый момент принял это за обычную местную теорию, каких наслушался уже во множестве: подумаешь, в Армении тоже вдруг выяснялось, что армяне изобрели почту и именно так следует понимать известный эпизод с голубем из библейского предания о ковчеге. На языке юкагиров слово «юкагир» вообще значило «человек», то есть все неюкагиры как бы и не брались в расчет… Волохов уже готовился было сказать — да, Миша, я всегда догадывался, что вы славный альтернативщик, — но что-то его остановило. Волохов сидел против солнца и не видел толком Эверштейновского лица, но Мишин голос посерьезнел, местечковые интонации исчезли, лексика сделалась строже — чем дольше он говорил, тем меньше дистанцировался от ЖД. Волохов много раз потом хвалил себя за аккуратность: состри он что-нибудь — Эверштейн бы мгновенно замкнулся и никогда уже не заговорил с ним всерьез.</p><p class="p1">Стоило, однако, на секунду принять идею ЖД не за обычную придурь радикалов, а за серьезную версию, — как картина мира неузнаваемо менялась. Слишком многие вещи получали исчерпывающее объяснение, а теорию, обладающую такими свойствами, отделял от массового признания один шаг. Волохов занимался альтернативкой двенадцать лет из своих двадцати восьми и знал, что никакой истории нет — всякое событие известно в бесчисленных пересказах, и час спустя не поручишься, что сидел с Эверштейном на закате в прохладной белой комнате, слушал его болтовню и заметил вдруг, как он перестал суетиться и хватать себя за что попало, а принялся вещать, что твой оракул… Было, не было — никогда не поймешь. В зависимости от собственной концепции каждый выделял одни факты и отметал другие. Гумилев вообще кроил историю и географию, как хотел, искусственными сближениями и натяжками компрометируя здравую догадку. Весь Московский институт альтернативной истории для того и существовал, чтобы классифицировать и учесть хотя бы главные версии, и та, которую излагал Эверштейн, была лучше многих. Больше всего удивляло, что Волохов слышал о ней впервые: сейчас, через десять минут после первого с ней знакомства, он уже не поручился бы, что втайне не догадывался о чем-то таком всю жизнь.</p><p class="p1">Простая и гармоничная теория сводилась к тому, что русские не были коренным населением России.</p><p class="p1">— Под коренным населением, — сразу уточнил Эверштейн, опять снимая возражение с языка собеседника, — я никоим образом таки не имею в виду тех, кто поселился на территории раньше всех. Уговоримся сразу о том, что под коренным населением мы понимаем титульную нацию, или тех, кто считает эту землю своей. Согласитесь, Воленька, что простым большинством это не определяется.</p><p class="p1">— Конечно, не определяется, — кивнул Волохов. — Кто такие русы — вообще никто до сих пор не знает. Так называли штук десять племен на юге, севере и востоке.</p><p class="p1">Эверштейн удовлетворенно засмеялся: основное допущение прошло.</p><p class="p1">— И если вы внимательно посмотрите на вашу жизнь последних лет пятисот, — заговорил он уже без всякого акцента, — вам станет недвусмысленно ясно, что русские вели себя так, как только и может вести себя некоренное население на чужой земле. Главное, что у вас происходит, — истребление и колонизация народа, при том, что никакого прогресса в собственном смысле при этом нет. Как, впрочем, и в Северной Америке, в которую колонизаторы не принесли ничего, кроме огненной воды и костров из людей. Это вам не англичане на Цейлоне, которые лечили от лихорадки и расчищали местные древности… Знаете, когда я впервые посмотрел «Рублева», мне пришла та же мысль: отчего никакие татары не делают с русскими того, что делают с собой они сами? Архетип ведь прослеживается. Так поступать с землей, так истреблять народ, так выкорчевывать любые ростки культуры, чуть она поднимет голову, — коренное население не в силах. Эта земля вам чужая, и только гордость завоевателей вам мешает это признать. А чем особенно гордиться, скажите, Воленька? Вам же и сопротивления особого таки не оказали… (Судя по тому, что Эверштейн опять начал юродствовать, он подошел к важному пункту в изложении, и надо было рассеять внимание собеседника новой порцией ужимок и прыжков).</p><p class="p1">— А кто должен был его оказывать? — спросил Волохов.</p><p class="p1">— Как кто? — удивился Эверштейн. — Те, чья земля… Ви же умный мальчик, Воленька, ви же знаете, что не было никакого ига. Ига, фига… Дешевая подтасовка, в летописях куча противоречий. Или ви действительно думаете, что на Куликовом поле сходились русские с татарами? Что это были за татары, откуда они взялись, интересно? Нет, дорогой мой, дрались там ваш Челом-бей и наш Пэрец-вет…</p><p class="p1">— Ну да, — кивнул Волохов. — Я давно догадался.</p><p class="p1">— О чем догадались? — насторожился Эверштейн.</p><p class="p1">— Что вы этим кончите. Конечно, коренное население — вы. Очень изящно.</p><p class="p1">— А вы не иронизируйте! — Это было сказано с неожиданной горячностью. В комнате темнело — стремительно, как везде на Юге; света они не зажигали. — Вы проследите хотя бы советскую историю, и все станет ясно! Посмотрите на ваших почвенников, простите уж меня за это слово, оскорбляющее невинную почву, — где у них хоть один талантливый текст? Так можно писать только по указке, о безнадежно чужой земле… все эти березки… «Поезд ушел. Насыпь черна. Где я дорогу впотьмах раздобуду?» — чувствуете, как пишут о своем?!</p><p class="p1">— Пастернак ненавидел свое происхождение и стыдился его, — угрюмо сказал Волохов.</p><p class="p1">— Это он сам вам сказал? — язвительно осведомился Эверштейн. — Или он таким образом покупал себе таки лишний годик жизни? У него перед глазами была судьба Иосифа Эмильевича, который очень даже не скрывал, что его кровь отягощена наследием царей и патриархов. Вот и получил. А вы вслушайтесь: «Ах, я видеть не могу, не могу берега вечнозеленые: бродят с косами на том берегу косари умалишенные», — может так писать чужой человек? Нет, только тот, кто чувствует язык в его подводном течении… И сравните вы это с ужасным паном Твардовским, с частушечным Исаковским, я не говорю уже про бардов из газеты «Позавчера»… Вспомните, кто писал лучшую патриотическую лирику двадцатого века, когда нам после семнадцатого года стало наконец можно любить нашу Родину!</p><p class="p1">— О да, — кивнул Волохов. — «Там серые леса стоят в своей рванине. Уйдя от точки А, там поезд на равнине»…</p><p class="p1">— Это крик оскорбленного патриотического чувства! — не дал договорить Эверштейн. — Это вопль изгнанника, проклинающего свою землю и не могущего от нее освободиться! То же самое, что «Отвяжись, я тебя умоляю!» у Веры Евсеевны.</p><p class="p1">— Какой Веры Евсеевны? — тупо изумился Волохов.</p><p class="p1">— Ну, не прикидывайтесь младенцем. Вы отлично знаете, что за него писала она. Он был типичный балованный аристократ, продукт многолетнего вырождения, а она его без памяти любила, дура, и дарила ему всю себя, свой талант. Сравните только, как он писал до женитьбы и как после. Ведь и проза вся началась только в двадцать шестом. По-английски — это он сам, не оспариваю, потому и выходило так пусто, безжизненно. Вы серьезно допускаете, что «Дар» и «Лолиту» написала одна и та же рука? Вырожденец, эротоман… А все стихи о России — это, конечно, она. В текстах множество намеков на это, анаграммы так и рассыпаны, история рода Слоним зашифрована в биографии Цинцинната… Прочтите у Плейшмана, у него есть подробно. Я, собственно, не к тому. Вспомните эти жуткие резервации, куда под видом нашего же сохранения загнала нас ваша власть. Вспомните дикую черту оседлости. А когда мы оттуда вырвались, они придумали это, — он кивнул на окно, на сгущающуюся лиловую ночь. — Нет, ничего не скажу, ход достойный… иезуитский… Ступайте в вашу пустыню, на родину предков! Вы же знаете, что рассматривался вариант с Дальним Востоком? Уже застолбили Биробиджан, но потом он резонно подумал: зачем они мне под боком? Ведь рано или поздно все равно вырвутся! И тогда все опять по новой? Не-ет, пусть сдохнут в пустыне… без воды, среди враждебных арабов! Но только не вышло! — Эверштейн радостно захохотал. — Построились, разбили сады, подняли города, ужились с арабами, — посмотрите, скольким из них мы даем работу, — это вам не яблони на Марсе! Потом, конечно, ваши спохватились, сделали Арафата, стали тренировать у себя террористов… Не думайте, есть факты. Семидесятые годы, тренировочный лагерь под Ташкентом, в условиях, приближенных к нашим. Фотосъемка, «Вести» печатали, спросите Женьку! Но поздно. Теперь уже, батенька, не задушишь, не убьешь.</p><p class="p1">— Это все очень гладко. — Волохов говорил медленно, подбирая слова: он знал, что некоторые темы из числа архаических — нацию, родство, — лучше не поднимать и в разговорах с самыми продвинутыми постмодернистами, для которых давно нет ничего святого. — И тем не менее я тоже немножко историк, Миша. Я все больше, конечно, по Второй мировой, но первый курс кончал и знаю, что Каганат был сравнительно небольшим приволжским государством, отнюдь не состоявшим из этнических хазар. В Каганате приняли иудаизм, причем даже не в талмудическом, а в караимском варианте. Никаких следов Каганата в русской культуре нет, если не считать поединков Муромца с жидовином, и то вопрос, не позднейшая ли это былина, сочиненная в порядке стилизации кем-то из собирателей. Никаких следов хазарской государственности, кроме нескольких крепостей, опять-таки нет. И говорить, что с нее началось русское государство…</p><p class="p1">— Нет, конечно! — снова закривлялся Эверштейн. — Мне особенно нравится про этнических хазар. Кто вам вообще сказал, что бывают этнические? Много общего внешне у сефардов с ашкеназами? Много вы наблюдаете похожих типажей тут, в Каганате? Может, Женька похожа на хазарку? Следов им нет… Их-то и вытаптывали в первую очередь! Да у нас даже и эти крепости пытаются оттяпать, до сих пор. Представляете, какое упорство? Некоторые утверждают, что эти крепости имеют сейсмостойкий фундамент, а значит, строили их не хазары, а аланы! В чьих краях бывают землетрясения! Это они, значит, пришли и построили, а хазары даже строить не умели. И не было никаких хазар, это Пушкин все придумал. Знаем, знаем… Вы меня, Воленька, простите миллион раз, вы отлично знаете Вторую мировую и все вокруг, но свой первый курс вы оканчивали во времена очередного крушения варяжской империи, в которой, заметьте, давали жить всем народам, кроме нашего. У нас это называется формулой ИИ — Избирательный Интернационализм. Все объединяемся и идем бить ЖД. Так вот, в этой вашей полудохлой империи учили соответственно — вы же и марксизм изучали, разве нет?</p><p class="p1">— Он на нас закончился, — угрюмо пояснил Волохов. — В середине девяностых похерили весь марксизм. А зря — в нем есть здравые мысли. Особенно насчет того, что каждый препарирует историю сообразно своим интересам.</p><p class="p1">— Классовым, Воленька, классовым!</p><p class="p1">— Не обязательно. Классовое — это так, псевдоним.</p><p class="p1">— Ну конечно, у нас свои интересы! Главная цель нашей еврейской науки — охмурять ваших жен и разрушать вашу государственность! — хихикал Эверштейн. — И шоб я стал это отрицать! Вы таки никогда не задумывались, почему мы так любим разрушать вашу государственность, а вы так ненавидите нашу? Или вас устраивают эти черчиллевские пошлости насчет того, что англичане не считают себя глупее евреев? Да англичане вообще очень мало про них думают, если хотите знать. А у вас мы виноваты даже тогда, когда нас нет. Почему, как вы думаете? Почему вы устраиваете погром из любой своей революции?</p><p class="p1">— Само собой, — сказал Волохов. Этот аргумент был, если вдуматься, сущими подарком. — Не забывайте только, что революцию делаете вы, а погром является посильным ответом. Вроде как в тридцать седьмом ответили на семнадцатый. Правда, в органах…</p><p class="p1">— В органах с революции сидели в основном наши! — триумфально, словно это не опровергало, а подтверждало его версию, воскликнул Эверштейн. — Конечно! Их вычищали, разумеется… потом, ближе к войне. Но в первое время, естественно… Скажите, Володя, — он отбросил наконец этого идиотского «Воленьку», — если бы вас двести лет хлестало плетками казачество, вы не провели бы первым делом расказачивание? Если бы вам пятьсот лет не давали работать на вашей земле, вы не согнали бы со своей земли тех, кто губил ее бездарным хозяйством? Вспомните, как после черты оседлости, уже в девятнадцатом, по всему Поволжью расцвели еврейские коммуны. Не знаете? Конечно, в ваших учебниках об этом не писали, — выговорил он с невыразимым презрением. — «Дер Эмес», «Дер Вайнес», «Вольный Хлеб» — это все под одним Саратовом! И когда на Волге был голод, только там всегда был хлеб, и мясо, и молоко — потому что на земле надо уметь работать, да! За это их и пожгли в двадцать втором, и потом, в двадцать девятом… Что, вы полагаете, с поджигателями надо было нянькаться? Титю им давать?</p><p class="p1">— Так за что же эти ваши брали своих? — не выдержал Волохов. — Почему тысячи евреев гребли в тридцать седьмом?</p><p class="p1">— Наши?! Их брали наши?! Почитайте вашего Солженицына! Наши, если где и оставались на командных постах, всячески вытаскивали своих, — а вот ваши были друг другу как волки, потому что инстинкт истребления народа вошел уже в русскую кровь и плоть! А в тридцать девятом наших вычистили из органов по-го-лов-но, и настал окончательный русский реванш за наш семнадцатый год… Между прочим, из того, что напридумывал Ленин, очень многое могло-таки сработать. Он был сомнительный стратег, плохо видел будущее, — слишком, знаете, прозаик для этого, прагматик, недооценивал власть утопии. Но тактик был гениальный, и у него могло неплохо получиться — если бы сразу не началась чудовищная усобица. А кончилось все прямым национальным реваншем — революция ведь была не только социальная, социальные никогда не поднимают такой бучи. Речь шла о нации, возвращавшей себе свое. Ваши же, не скрываясь, называют тридцать седьмой русским реваншем! В войну наших сдавали немцам сотнями, и когда еврейских девочек увозили на расстрел, им вслед улюлюкала толпа: чесночниц повезли! Чесноком больше не будет пахнуть… — Он опустил голову и замолчал. — Не говорите со мной лучше, Володя, про это. Я и так жалею, что слишком перед вами распространился.</p><p class="p1">— Скажите хотя бы, — заговорил Волохов после паузы, — почему, собственно, ЖД… и почему она отказывается ехать со мной?</p><p class="p1">— Вы уже предложили? — вскинулся Эверштейн.</p><p class="p1">Не надо было этого говорить, понял Волохов. Миша, вероятно, и сам тут не вполне посторонний.</p><p class="p1">— Не то чтобы предложил. Сказал, чтобы съездила со мной… в гости…</p><p class="p1">— А у них правило такое. Они как барбудос, — помните, Кастро и прочие: пока не будет мировой революции, не побреемся. Так и эти: они вернутся только в свою Россию. Когда там начнется.</p><p class="p1">— Что начнется?</p><p class="p1">— Последняя битва, — усмехнулся Эверштейн. — Пока идет только подготовительный этап.</p><p class="p1">— Давно?</p><p class="p1">— С восемьдесят девятого. Как дали сигнал, так и началось.</p><p class="p1">— Что за сигнал?</p><p class="p1">— Да вы его знаете. Помните — «Над всей Испанией безоблачное небо»? Вот и тут что-то вроде. «Пора вернуть эту землю себе».</p><p class="p1">— БГ? — не поверил Волохов.</p><p class="p1">— Вы знаете, что такое Б-г в нашей транскрипции? — вопросом на вопрос ответил Эверштейн.</p><p class="p1">— Если это и выдумка, — после новой паузы проговорил Волохов, — то вполне убедительная.</p><p class="p1">— Может, и выдумка, — устало сказал Эверштейн. Из него словно выпустили воздух. — Но знаете… Я не принадлежу, конечно, к ЖД, я таки ни к кому не принадлежу, я всегда немножко сбоку, потому что уже такой у меня характер, испорченный долгим рассеянием. Хазарское неверие мое. Но когда вы вернетесь-таки в свою Россию, вы все-таки вот на что обратите внимание. Вот ви приезжали сюда. Ви могли пойти к врачу — и у вас не было чувства, что этот врач ненавидит вас. Ви могли подозвать полицейского — и не боялись, что он вас за просто так схватит и отправит в участок, и там отобьет вам почки, и ви кровью будете писить три дня… А когда ви приходите там к врачу — вам с порога внушают мысль о том, что лучше бы ви уже умерли, чем отнимать время у такого занятого человека, у которого на участке еще пятьдесят глухих старух, которые смотрят на него, как на Господа Бога, а он только и думает: хоть бы ви все передохли… И когда ви служите там у вас в армии, — я знаю, ви проходили эти ваши сборы, — ви отрабатываете тупую повинность, а не защищаете вашу землю, потому что эта земля не ваша; вот почему в нашей армии никто не занят бесполезным мучительством и вышибанием мозгов, а наоборот, умные становятся главными. И поэтому наша армия воюет, а ваша жрет перловку и пускает ветры, и воевать ей давно уже не за что. Поезжайте домой, Воленька, посмотрите на все здешними глазами. Вспомните, как умеют любить наши девушки, и посмотрите, как по особой милости, в порядке особого снисхождения, отрабатывают любовь ваши. Посмотрите, как не хочется им рожать новое поколение чужих людей на этой земле. И подумайте, что мы могли бы сделать с ней, если бы в самом деле вернули ее себе.</p><p class="p1">— Элегантно, элегантно, — спокойно сказал Волохов. — Вы упустили одно. Вас ведь уже почти не осталось… там, у нас. (Он почему-то не хотел в разговоре с Эверштейном употреблять слово «Россия» — словно уже почувствовал себя оккупантом: наверное, когда-то эта страна называлась иначе, и Эверштейна ее нынешнее название оскорбляет так же, как коренного петербуржца оскорблял «Ленинград», а старого москвича — Кропоткинская вместо Остоженки). Почему же продолжается… это истребление населения? Ведь плохо у нас не только хазарам, и если позволите — если мы не будем затевать вечный матч за первенство в страданиях, — русские потерпели от собственных властей уж как-нибудь не меньше… Все наши старухи в очередях у врачей, все избиения в милиции… волна расправ с олигархами…</p><p class="p1">— Знаю даже прелестную шутку про ходоркост.</p><p class="p1">— Если бы дело ограничивалось ходоркостом, — терпеливо продолжал Волохов, — я бы принял вашу версию без возражений. Но берут далеко не только хазар, и в российскую армию — со всем, что вы о ней говорили, соглашаюсь, — призывают главным образом своих; вы не находите?</p><p class="p1">— О, конечно! Но ведь вы сами не замечаете, как добавляете мне аргументов, — радостно кивнул Эверштейн. Он зажег настольную лампу, и Волохов поразился мягко-сочувственному, почти отеческому выражению его лица. Или это тени так легли, и лампа была специальная, лживая, хазарская? — Почему ваша армия не хочет воевать? Потому что не чувствует эту землю своей. И в самом деле, вам же там ничего не принадлежит! Власть — не ваша, промышленность — не ваша, закона о собственности на землю до сих пор нет! Это вам случайность? Или можно уже вслух наконец признать, что для вашего правительства страшны сами слова «собственность на землю»? Как можно умирать за чужое, это я вообще не понимаю! Даже у Галкиной, главной вашей специалистки, сказано: захваченное население не ставят оборонять рубежи! Во время последней войны ведь можно было поднять в атаку только при помощи заградотрядов — что, нет?</p><p class="p1">— Слышал я и про это, — хмуро сказал Волохов. — Но вы историк, Миша, и уж к таким откровенным спекуляциям прислушиваться…</p><p class="p1">— А что, вы скажете, этого не было? Не было? Есть тысячи свидетельств, тысячи…</p><p class="p1">— Было и это, было и другое.</p><p class="p1">— Было, кто же спорит! И героизм случался, нет слов, — но почему этот ваш героизм всегда такого самоубийственного толка? Вам не приходило в голову, что люди бросались на амбразуры потому, что начинали ненавидеть свою жизнь? Вы, может быть, не знаете, кто на самом деле был Матросов?</p><p class="p1">— Замученный русскими хазар? — не удержался Волохов.</p><p class="p1">— Гораздо, гораздо хуже, — не принял шутки Эверштейн. — Он был замученный русскими русский. Детдомовец, маленький, плюгавый, которого в армии все били. Вот он и кинулся тощим животом на пулемет, с отчаяния… Или ваш русский Астафьев не писал о том, как люди искали смерти с голодухи, с холоду, надеясь хоть в земле выспаться? Русская власть все сделала для того, чтобы и жизнь самих русских превратилась в ночной кошмар. Потому что никакого другого стимула умирать за чужую Родину у них не было. Вся стратегия вашей власти применительно к своим людям — полное обесценивание жизни, чтобы на гибель смотрели как на избавление. Вы думаете иначе? И у вас есть на то основания? Может, вы там, в вашем альтернативном институте, не знаете, как девушки шли добровольно на фронт, чтобы искупить грехи отцов? Имя Нины Костериной, зэковской дочки, оставившей дневник, — вам ни о чем не говорит?</p><p class="p1">— Говорит, — кивнул Волохов. — Продвинутый вы человек, Миша. Хорошо читали продукцию издательства «Молодая гвардия».</p><p class="p1">— А как же ж! Из нее же ж сделали ж героиню! И она была-таки героиня, но умирала не за родину, которая была чужая, а за папу, который был свой! И таких было много, много — у каждого своя причина скорей умереть, чем дальше так жить! Был, не скрою, небольшой процент идеалистов, искренне считавших, что это их земля. Любивших елочки, березочки. Но эти-то люди как раз и были в основном из числа интеллигенции, нет? Я не говорю вам даже, что вся интеллигенция в России была хазарская. Боже паси, сколько было настоящей русской! И эта русская интеллигенция, кстати, всегда догадывалась о том, кто настоящее население России, — отсюда ее дружелюбие к нам, хазарофильство, обструкция всяким мишигинерам вроде Розанова… Ну так ведь этой интеллигенции в войсках и приходилось хуже всего! Кто шел добровольцем по идейным мотивам — того и мучили в войсках отцы-командиры и свои же братцы солдатики из крестьянства! Почитайте Гроссмана, у него в первой части романа об этом подробно. Почему-то только Гроссман написал всю правду об этой войне, вы не находите? В том числе о том, как городской мальчик Сережа, очень идейный и вообще большой патриот, терпит утеснения от крестьянства. Тем, кто считал эту землю своей, было еще хуже: им на каждом шагу напоминали, что она чужая. Потому и крестьянство у вас, кстати, такое тупое и злобное: я не поверю, Воленька, что вашу маму или вашего папу не возили в свое время «на картошку». А может, вам повезло и вы сами как-нибудь соприкасались с вашими земледельцами? Почему ваша земля — находящаяся, между прочим, на широте Канады, — не родит так, как в Канаде?</p><p class="p1">— Вероятно, ждет, пока вернетесь вы, — хмыкнул Волохов.</p><p class="p1">— Ну зачем эта мистика? Я понимаю вашу иронию, но не я начал этот разговор. Вам обидно, конечно. Голос крови ой какая страшная штука! Но земля не родит потому, что вы не хотите на ней работать. Работать на чужой земле — совсем не то, что на своей. Вы, конечно, думаете, что она теперь ваша, — но есть же генетическая память о земле предков. В России все не ваше, и потому она при всех своих богатствах так неохотно у вас родит и производит. Вспомните, какие леса и недра, посчитайте, сколько земли не возделано… Я ведь бывал в Москве, видел ближнее Подмосковье: бесконечные свалки, череда недостроенных домов, брошенных воинских частей, заросших пустырей… Всю эту землю ни заводами, ни коттеджами не застроишь. Куда вам столько?! Откусили больше, чем можете по своим способностям проглотить, — вот и застряло. Потому и нет никакого движения, никакой истории, как здраво рассудил наш общий друг Чаадаев. Или вы тоже считаете его сумасшедшим?</p><p class="p1">— Нет, сумасшедшим он не был. У него геморрой был, потому он и смотрел на вещи так мрачно.</p><p class="p1">— Ну да, конечно, у всех, кто мрачно смотрит на вещи, был геморрой. А у вас все хорошо, у вас нет геморроя, с чем я вас и поздравляю. Хватит, может быть, на первый раз? Я чувствую, что вы обиделись, а вы мне, ей-Богу, симпатичны, не хотелось бы портить так успешно завязавшийся контакт…</p><p class="p1">— Нет, что вы. — Волохов был сильно задет и сам на себя за это злился. Уж ему-то, манипулятору со стажем, следовало обладать устойчивостью к чужим спекуляциям. — Я одного не пойму: ну ладно, солдаты не хотят воевать за свою землю. Но остальные… остальных изводить зачем? Только ради грядущей войны? Чтобы легче отдавали жизнь за чужую землю? Но никаких новых войн не предвидится… Больших конфликтов нет уже семьдесят лет…</p><p class="p1">— Да? А то, как ваши чуть не устроили войну из-за Кубы? А как они влезли в Афганистан? Сравните это с тем, что сделали там америкосы — тихо, без истерики и за три месяца. А ваши лезли с явным расчетом на хорошую, большую мировую войну! Поживи Сталин еще годик, а Андропов — еще годика два… Ваши ребята воинственные, им без войны не житье! Хорошо, в восемьдесят пятом наши ненадолго смягчили ситуацию, — но за этот кратковременный приход к власти им теперь воздается ого-го. Вы думаете, мы не знаем, кто поддерживает наш терроризм? Я же не говорю, Воленька, что вы крайний. Я просто ставлю вас в известность, что ничего тайного на самом деле нет. Понимаете? Плохому пахарю плуг мешает. Вы пустите нас на эту землю — и вы увидите, как она будет родить.</p><p class="p1">— Может, и флогистон найдете?</p><p class="p1">— А что вы себе думаете, и очень может быть, что найдем! Флогистон ведь где появляется? — вы не думали об этом? Он там, где дышит дух истории. У вас история стоит, вот и флогистона нет. А пустите нас, и сразу будет и флогистон, и апейрон, и что хотите.</p><p class="p1">— Что же вы на этой земле не работали? — съехидничал Волохов. — Солженицын на огромном материале доказывает, что у вас были все возможности для возлюбленных сельскохозяйственных трудов! Организуйтесь, и вперед! Но что-то пахать никто не рвался! — Он замолчал и перевел дух. Что-то страшное лезло из него, что-то, к чему он сам не был готов; еще немного — и он, казалось, ударит Эверштейна, которому происходящее доставляло массу удовольствия.</p><p class="p1">— Наблюдаю пробуждение национального духа! — с восторженной улыбкой кивнул он. — Видите, как это легко? Убедились, что генетическая память о захвате жива и в вас, доброжелательном интеллигентном человеке, захватчике в пятьдесят каком-нибудь поколении? Предупреждаю вас, Воленька, что драться со мной не нужно, я-таки немножко служил, и кое-чему меня учили…</p><p class="p1">Злорадство его было так откровенно, он так явно вызывал на драку, что до нее и в самом деле оставалось полшага.</p><p class="p1">— Хватит! — прикрикнул на него и на себя Волохов. — Хватит, — повторил он уже тише. — Хотите вы того или нет, бить я вас не буду. Я тоже кое-чему учился… в нашей плохой армии. Еще не хватало тут… в музее катастрофы… вы из этого потом такое сделаете…</p><p class="p1">— Я тоже думаю, что хватит, — миролюбиво кивнул Эверштейн. — Тем более, что на ваш вопрос мне ответить легко и приятно. А вот что вы ничего не слышали о сорочинской клятве, это вам чести не делает. Могли бы и поинтересоваться вместе с вашим Исаичем. Вы, может быть, слышали, где Илья Муромец схватывался с богатырем-жидовином?</p><p class="p1">— Слышал. В степи Цецар, под горой Сорочин. Где она была — никому не известно.</p><p class="p1">— Во всяком случае, к Сорочинской ярмарке это не имеет прямого отношения. То есть местность, конечно, носит название именно в честь этого события, и ярмарка в ней проводится по той же причине. Знаете, сколько по великия и малыя Руси всяких Сорочинов, Сорочинсков и Сорокиных? Все не можете забыть, как наш Элия Эмур-омэц перешел на вашу сторону и предательски напал на своих?</p><p class="p1">Волохов расхохотался.</p><p class="p1">— Среди трех богатырей Илья-Муромец еврей, — выговорил он сквозь хохот.</p><p class="p1">Эверштейн смотрел на него невозмутимо:</p><p class="p1">— Вы полагаете, это возникло на голом месте? И Васнецов просто так сделал ему откровенно семитическую внешность? Вы знаете, с кого он его писал? С выдающегося толстяка Якова Толмачевского, адвоката-выкреста. Васнецов-то знал историю. Простите, я не в упрек вам говорю. Собственно, в «Богатырях» многое зашифровано — но вы, может быть, потом сходите к специалисту? Русская историческая живопись и литература — это же отдельная тема. Там тьма намеков. Обратите внимание на сбрую, убор коня, хазарскую палицу… Вы никогда не замечали, что Муромец начал свою деятельность только в тридцать лет и три года? До этого он, стало быть, сидел на печи — ситуация вполне мифологическая. Мимо шли три проходимца, как пишут ваши русские школьники в своих сочинениях… Вы обращали внимание, кстати, до какой степени эти школьники не владеют так называемым родным языком? Неграмотность поголовная; упразднили сложный ять, оставшийся в наследство от хазарской письменности, убрали всякие юсы, перезабыли половину правил — и все равно по нулям. Проходимцы, да… Загадочные калики перехожие его чем-то таким напоили, тут он возьми да и вскочи: спасибо вам, калики перехожие! А знаете вы, Воленька, что такое на древнехазарском печь? Степь, дорогой друг; слово «печь» потому и вошло в русский язык — вообще полный хазарских заимствований, — что обозначает, в русском представлении, плоское жаркое место. Отсюда русский миф о путешествиях НА печи, хотя в хазарском подлиннике речь идет всего лишь о том, что герой пересек степь, прошел ПО печи… Отсюда и печ-эн-эг, степной житель. Так вот, Элия Эмур-омэц до тридцати трех лет был степным воином, начальником стражи кагана, пока не рехнулся и не перешел в навязанную русами веру. Ему вечно казалось, что его зажимают по службе: он государственную мудрость в голове имеет, а его все в стражниках держат. А тут русские лазутчики вовремя сыграли на тщеславии: переходи к нам, Элия, мы тебя сделаем начальником над всем войском! Да и возраст у тебя такой — наш Бог в этом возрасте вознесся; дерзай! Что ви думаете? Принял христианство, хотя до этого был яростным его противником. Видали картинку Константина Васильева «Илья Муромец сшибает кресты с христианских церквей»?</p><p class="p1">— Видал, — признал Волохов. — Вы-то откуда знаете Васильева?</p><p class="p1">— Ну, как же не знать Васильева! Врага надо знать, особенно такого откровенного… Его ваши же и убрали в свое время, потому что слишком о многом проговаривался. Нельзя так откровенно рисовать, ну и попал под электричку… хотя на насыпь ему было совсем не нужно… Не знаете, как его туда занесло? или кем принесло? Ну, о нем я вам подробно не буду, в России прочитаете: убили и тут же канонизировали. Не успел он своего главного дописать, — расспросите на так называемой родине про его «Полет орла» неоконченный. Элия Эмур-омец посшибал немало крестов с русских церквей, пока калики перехожие — а перехожими, или перебежными, называли у вас именно разведчиков и прочих засланных казачков, — не объяснили ему, что пришло его время. Тридцать три года — наилучший возраст для перехода в христианство и начала славных дел. Смотри, Эльюша, тот тоже был хазар — и вознесся! Приходи, будешь наш мессия! Да еще вдобавок — последняя капля — на пиру у кагана чарой обнесли. «Но обнес меня ты чарой в очередь мою — ну, шагай же, мой чубарый, уноси Элью!».</p><p class="p1">— И Алексей Константиныч, выходит, знал?</p><p class="p1">— Алексей Константиныч вообще много знал. Если вы внимательно перечтете «Князя Серебряного», то ведь там все понятно насчет тех, кого истреблял Грозный. Князь Серебряный, он же Зильбер… ну, если хотите, я вас к потомку отправлю. Но чтобы закончить про Элью: он перешел-таки к вашим, да. И крестился. И его даже не распяли — его наши достали, потом. Мы же всегда достаем, никто еще не ушел. Это у нас, если хотите, национальная гордость. Но под Сорочином нас разбили великолепно. Каган ушел чудом. Столицу пожгли. Цецар — это ведь столица, степь тут совершенно ни при чем… Цецар — старое хазарское слово, его и римляне у нас взяли для обозначения своих царей. Обозначает не столько «главный», сколько «богоданный». Знали, сволочи, что спереть…</p><p class="p1">— Минутку, минутку. Вы хотите сказать, что и Рим…</p><p class="p1">— Ну, что Иудея была провинцией Рима, вы знать обязаны, — с изумлением воззрился на него Эверштейн.</p><p class="p1">— Да, знаю, знаю… но не хотите же вы сказать, что вся территория римской империи изначально была…</p><p class="p1">— За всю территорию не скажу, — сокрушенно покачал головой Эверштейн. — Но таки значительная ее часть… Ведь до римской цивилизации была хазарская, достигшая беспримерного культурного уровня. И это сейчас никем не отрицается, благо мы, хазары, хорошо умеем хранить свои документы. У нас есть Ветхий Завет — прекрасно разработанная история. Все нас завоевывали — все, кому не лень. Потому что, начиная с известного культурного уровня, нация уже не может зверски сопротивляться — она, если бы даже и хотела, не способна отступить на предыдущую ступеньку эволюции. В этом вся досада, вся трагедия истории… Но ирония ее в том, что нацию, достигшую такой высоты, до конца тоже не истребишь. У Господа все предусмотрено. В такой нации достигается высочайшая внутренняя солидарность — основанная не на этнической, а на этической близости. Ты мне брат не потому, что мы родились в одном месте, — так рассуждать умеют и ваши примитивные землячества, — а потому, что у нас одна культура. Зов культуры сильнее зова крови, понимаете вы это? Когда нация этого достигает, уровень взаимопомощи в ней исключительно высок — вот Исаич и завидует. Римляне нас поработили, не скрою. Римляне попытались нас искоренить, свалив на нас казнь бродячего проповедника, которого они же и распяли. Видели вы «Страсти Христовы»? Это, значит, мы Христа распяли… Из этого потом целая религия выросла, любимая религия завоевателей, вера для рабов: терпи, и воздастся. На том свете. А здесь не ропщи. Ее все завоеватели быстренько приняли — римляне, гунны, ваши любимые русы… Знаете, как Владимир крестил Русь? Дело было в хазарской столице Цецар, километров на двести по Днепру выше нынешнего Киева. Загнали всех в воду — женщин, стариков, детей… И не выпускали, пока не согласились перейти в новую веру. Называлось «крещение». Некоторые так и утонули.</p><p class="p1">Волохов уже не знал, смеялся ему или плакать. Он отлично представлял себе способы подгонки летописей и свидетельств под любую требуемую версию — в конце концов, ему за это платили деньги. Он все ждал, что Эверштейн засмеется или потрет ручки в своей манере — «Ловко? Смотрите, Штирлиц, как старина Мюллер перевербовал вас за пятнадцать минут и без всяких этих штучек!» — но ничего подобного не происходило. Эверштейн был серьезен, как проповедник. И об очередной катастрофе хазар, частично потопленных в Днепре жестоким русским князем Владимиром, он рассказывал с тем же скорбно-многозначительным лаконизмом, с каким говорил о прочих трагедиях своего народа, слишком культурного, чтобы сопротивляться варварству.</p><p class="p1">— Ну, а что все-таки насчет сорочинской клятвы? — спросил он, хотя все ему уже было понятно.</p><p class="p1">— А насчет сорочинской клятвы — в тот самый год, после первого разгрома хазаров руссами, порабощенные хазары поклялись под горою Сорочин никогда больше не работать на этой земле, пока она будет чужая. Прекратить сопротивление, коль скоро оно бессмысленно, — незачем губить свои и чужие жизни, нас и так немного оставалось, — и искать любые лазейки для выживания и сохранения своей веры. Но на чужой земле — не работать: не пахать, не сеять, не строить. Какие у хазар землепашцы — вы, может быть, видели в кибуцах. Но пахать, пока там хозяйничаете вы… Сами пашите, это теперь ваша земля. В тысяча девятьсот девятнадцатом нам было показалось, что на этот раз — победа… И тогда, если помните… Меморандум от 20 декабря читали?</p><p class="p1">— Я 20 декабря родился, — хмуро признался Волохов.</p><p class="p1">— Таки я вас поздравляю с таким совпадением! В один день с Ве-Че-Ка, какая честь! — кривлялся Эверштейн. — Но позвольте вам заметить, что 20 декабря случилось еще как минимум одно великое событие. Так называемое Главбюро евсекций при ЦК КП(б) приняло постановление о том, что еврейского вопроса не существует. Не существует, и все! Я вам процитирую, — он взгромоздил на нос тяжелые очки и жестом фокусника извлек из ящика стола зеленоватую брошюру с закладками на нескольких страницах, словно такие просветительные беседы ему приходилось проводить уже не раз. — Так, так, так… это все бла-бла-бла… вот: «РСФСР стала Родиной для еврейских трудящихся, защищавших ее с оружием в руках, — никакой другой страны им не нужно. Права на Палестину полностью принадлежат трудящимся массам арабов и бедуинов». Не читали? Газета «Правда». И до самой середины тридцатых искренне ведь полагали, что сумеем возродить национальное государство, как вам это понравится! Нас, конечно, пугали. Раввин Мазе даже сказал, что революции делают Троцкие, а расплачиваются за них Бронштейны. Что вы хотите, тысяча лет под пятой. Таки перепугались. Но боевитые ребята не перевелись — пятнадцать лет мы держали страну, и это были не самые плохие пятнадцать лет. Вся индустриализация, вся коллективизация…</p><p class="p1">— В результате которой вымерла половина крестьянства, — вставил Волохов.</p><p class="p1">— Ну батенька, ну что за перестроечные штампы! Как в вас вбивал свою ложь этот ваш позднесоветский агитпроп! Вымирали те, кто работать не хотел. Кто по своему русскому обыкновению нанимал рабочих, обирал их и жировал. У русских ведь не принято было обеспечивать батракам пристойную жизнь. Воинственный народ, со слугами привык обращаться как с пленниками! Так, собственно, и было… Что ж, вечно терпеть? Или вы думаете, революцию мы одни сделали? Нас столько уже не было, мы только попытались поучаствовать. Небезуспешно, как видите. Был такой КомЗет — Комитет по земельному устройству еврейских трудящихся. В девятнадцатом было решение о том, чтобы отдать нам Северный Крым (Южный, пожалуйста, берите себе, отдыхайте, вы ведь так устали!) — и часть Белоруссии. Не вышло. Отдали Поволжье, таки мы и там неплохо себе пахали. А в тридцать шестом ваши решили, что хватит. Что лучше нас переселить в Биробиджан. И очень удивлялись — почему мы не хотим туда ехать? А нашим гаврикам урок: не договаривайся с захватчиком! Думали, что вместе победили, помирились, теперь все будет по-другому… Не вышло! Полезла хваленая захватническая сущность, вот как сейчас из вас. Землю, пожалуйста, берите — но на Дальнем Востоке, в малярийных болотах. И на госслужбе, пожалуйста, не служите, это для вашего же блага, иначе сделают погром. В пятьдесят третьем совсем задумали извести — да спасибо, черт прибрал вашего Сосо…</p><p class="p1">— Черт прибрал? Или доктора помогли? — прищурился Волохов.</p><p class="p1">— Ну, про заговор еврейских врачей ваши давно изобрели, — безнадежно махнул рукой Эверштейн. — Я все-таки лучше о вас думал…</p><p class="p1">— Шучу, шучу. Но скажите, Миша… Сами видите, я стараюсь воспринять вашу версию без моральных оценок, как специалист… Разве русское население не потерпело от вас как следует?</p><p class="p1">— Потерпело! — с вызовом и чуть ли не с удовлетворением сказал Эверштейн. — И очень! Потому что сопротивлялось, до последнего не желало признать, что земля эта наша и им она даром не нужна. Не освоена, запущена, разграблена… Мы говорили: отдайте нам добром. Не хотели. Массовый саботаж. Антисемитские выходки. Ну и — сами понимаете. Война. В белых перчатках революция не делается. Однако даже самый красный террор никогда не достигал таких масштабов, в каких русские принялись истреблять участников революции в тридцать седьмом. Всех гребли — и наших, и, не в силах остановиться, своих.</p><p class="p1">— А ведь после восемьдесят пятого вы тоже хорошо погуляли, — медленно сказал Волохов. — Потери населения за следующие двадцать лет, по самым скромным подсчетам, составили никак не меньше, чем за все сталинские годы… Такое шло вымаривание, что любо-дорого смотреть…</p><p class="p1">— Ну а вы как полагали? — осклабился Эверштейн. — Мы, между прочим, открыли границы — пожалуйста! И дали все возможности зарабатывать — сколько хотите! И никогда не было такого, чтобы мы закрывали вам дорогу к образованию, как вы нам…</p><p class="p1">— Почему все физматшколы в семидесятых и были наводнены хазарами — будущими владельцами «Бета», «Гамма» и «Дельта»-банков! — не выдержал Волохов.</p><p class="p1">— А куда им было податься? К управлению страной путь закрыт, один путь был — в науку! И то приходилось менять фамилии при поступлении — поскребите половину Сидоровых, такой каганат откроется! Немудрено, что они устремились к власти — и заметьте, у них получилось. Потому что страна — наша, чего вы в упор не желаете видеть. И показатели у нее сразу стали превосходные — мир залюбовался. Просто очередной захватнический реванш не заставил себя ждать. Сначала в девяносто первом попробовали, потом в девяносто третьем, а в девяносто девятом все получилось. Только горцы наши не сдаются, так что вы еще с ними помучаетесь…</p><p class="p1">— Какие горцы?! — Волохов уже ничему не удивлялся, но это «наши» его все-таки встряхнуло.</p><p class="p1">— Обычные, Воленька. Не приходило ли вам в голову, почему тихий советский летчик Алексей Шварц вдруг взял себе псевдоним Жохар Дудаев? Что в итоге дает нам столь знакомую аббревиатуру ЖД? Только вы, русские, «Жохар» произносите слишком твердо. Джо-хар. Джон О’Хара. Хихи. Чеченцы — последний отряд тех, настоящих хазар, наследники каганата. Их оттеснили в горы — они и там умудрились цветущие города построить. После семнадцатого задружились было с вами, но поняли все еще быстрей нас. Как вы сами-то не догадались, честное слово? Посмотрели бы на эти носы и усы, послушали бы язык, в конце концов… Ничего ведь общего с грузинами. Грузины, адыги, армяне — совершенно другие племена. А чеченцы, с их рыцарственным духом и откровенным самурайским зверством, — последние остатки той стражи, которую предал Элия Эмур-омэц. Один из них его и достал потом. Некто Саул Ой-Вэй, в вашей транскрипции — Соловей. Свистом он был действительно знаменит, а вот насчет разбойника — это ваши сказители погорячились. Разбойником он только прикинулся: пять лет с отрядом вернейших скрывался в окрестностях бывшего Цецара, выслеживая Элию. Был когда-то его правой рукой. Стал грозой окрестностей, а уходил от ваших виртуозно. Часто спасался чудом, почему его и прозвали — угадайте как?</p><p class="p1">— Чудо-юдо, — покорно кивнул Волохов. — Был анекдот такой. «Я чудо-юдо!» — «Юде, юде? Ахтунг, фойр!».</p><p class="p1">— Может, у вас есть своя гипотеза происхождения этого прозвища? — любезно осведомился Эверштейн.</p><p class="p1">— Нет, нет, конечно! Богатыри-жидовины, чудо-юдо… все сходится…</p><p class="p1">— А знаете, что сделал Саул Ой-Вэй с Элией?</p><p class="p1">— Обрезание по самый корень, — хмыкнул Волохов.</p><p class="p1">— Нет, это скорей в манере вашего нового вождя. Он подъехал к нему на коне, близко-близко, вот как сейчас я подхожу к вам… — Эверштейн встал с кресла и приблизился к Волохову. Волохов отчего-то захотел встать, учитывая, что ли, торжественность момента, — но тот властным жестом руки остановил его. — Сидите, сидите. Он сказал ему всего одну фразу — но ее хватило. Ее не все знают. Это серьезные слова, Володя, и то, что я вам сейчас их скажу, подтверждает, как серьезно я отношусь к вам на самом деле.</p><p class="p1">Волохову стало не по себе.</p><p class="p1">— Было очень тихо, — понизив голос, таинственно и властно продолжал Эверштейн. — Только лес и звезды, и два бывших друга-соратника. Шайка Саула молча смотрит, встав полукругом. И тогда Саул Ой-Вэй сделал то, что хазары редко делали даже со злейшим врагом. Он отчетливо сказал, глядя в глаза Элии: «Ты пойдешь в Жадруново» — повернулся и ушел прочь с поляны, на которой его солдаты подстерегли Элию. Элия упал на колени и кричал ему вслед: «Отмени! Отмени проклятие!» — но он был хазар, хоть и выкрестившийся, и должен был помнить, что это проклятие не отменяется.</p><p class="p1">— И что? — стремясь сбросить оцепенение, спросил Волохов. — Пошел в Жадруново?</p><p class="p1">— Вероятно. Во всяком случае, больше его никто не видел.</p><p class="p1">Эверштейн вернулся на место и захихикал.</p><p class="p1">— Эффектно, да? Красивая легенда.</p><p class="p1">— А что такое Жадруново?</p><p class="p1">— Понятия не имею. Никогда там не был. Звучит похоже на какой-то населенный пункт, да? Вернетесь в Россию — изучите.</p><p class="p1">— Интересно, а Соловья-Разбойника кто-нибудь видел? Или такое проклятье даром не проходит?</p></span></span></span></span></span>
