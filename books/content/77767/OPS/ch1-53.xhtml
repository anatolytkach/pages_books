<span><span id="id70"><div class="title5">
<p class="p">Книга вторая</p>
<p class="p">Прибытие</p>
</div><span id="id71"><div class="title5">
<p class="p">Интерлюдия</p>
</div><p class="p1">— Что же спеть тебе? — говорил как бы в задумчивости как бы слепой как бы старец с бандурой в руках. Он сидел на лавке в избе подполковника Лавкина, офицера, блин, ух, какого офицера! Такой офицер. В первый год войны, когда еще стреляли по-настоящему, Лавкин лично расколол на допросах до пятидесяти ЖДов. Сам он был собою контрразведчик. В нем было даже немножко варяжского духу, то есть стрельбе по своим он все еще предпочитал стрельбу по чужим. Были ведь когда-то времена, когда варяги не угнетали, а кочевали и убивали. Годы угнетения несчастного захваченного племени, которое, кажется, не больно-то и горевало по случаю несвободы, испортили варяжство, как портит это занятие любого приличного человека. Одно дело — завоевать, другое — удерживать. Завоеватель может быть и правым, и неправым; в конце концов, шел, увидел, захватил, в схватке оказался сильней — обычное дело. Стоит тебе, однако, сделаться полноправным угнетателем — и ты уже не воин, а надсмотрщик со всеми вытекающими; именно поэтому всякий нормальный солдат ограничивается победой, а добивать побежденных и распоряжаться ее плодами предоставляет другим. У варягов, к сожалению, ничего с этим не получилось. Им так понравилась захваченная территория, что они перестали кочевать и покорять прочие места. Иногда, конечно, им приходилось сражаться с ЖДами, потому что вовсе без этого варяги обходиться не могли; но в их жизни появилось равновесие, а это для подлинного воина смерть. Есть своя земля, есть рабы, которых надо удерживать в повиновении (а они никуда и не рвутся), есть постоянный враг, с которым раз в сто лет выясняешь отношения, — и так оно идет уже полторы тысячи лет; знамо дело, исчезает главное, что есть в битве, — свежесть. Какая свежесть, когда все выродилось? Какими-то своими флюидами их растлил несчастный покорный народ — как рядом с трупом, говорят, охватывает иногда живого странный сон, вялость, нежелание шевелиться. Так русалка сманивает руса — иди, мол, ко мне: спокойно… прохла-а-адно… Что-то в них стало не то.</p><p class="p1">— Про войну спой, — небрежно заказал Лавкин. Он сидел напротив старца и по-варяжски глодал кость — надо ж беречь хоть какие-то воинские традиции. С утра приказал сварить козу и вот глодал. В боевых действиях настало затишье. Да оно, в сущности, уже два года длилось. Противники бегали друг от друга, иногда захватывая лазутчиков и всласть на них оттягиваясь — пытая, подвешивая на крюк; в остальном давно перешли каждый к излюбленным занятиям. Варяги расстреливали своих, хазары колонизовали местных, — ни те, ни другие в этом не преуспели. Расстреливать всех бессмысленно, а колонизовать, как знало варяжство по долгому опыту, бесполезно.</p><p class="p1">— Что же спеть тебе про войну? — как бы в задумчивости как бы спрашивал как бы слепец, а на деле зоркими глазами из-под мохнатых бровей постреливал по углам избы. — Или про Анику-воина, или про Добрыню-воина, или про Иулиуса Кесаря, тоже воина, или же про вавилонянина Мардохея-воина, по древним вавилонским писаниям?</p><p class="p1">— Про Мардохея давай, — ковыряя желтым ногтем в зубах, откликнулся атаман Батуга, угощавшийся козою в лавкинской избе. Он дружил с контрразведчиком, в контрразведчике был хоть какой-то дух.</p><p class="p1">— Ой, трудно, трудно, — говорил бандурист, перебирая струны. — Древняя то песня, и не всю я ее припомню.</p><p class="p1">— Ништо, валяй, — рыгнув, разрешил Батуга. Он знал, что истинный воин любит послушать музыку, в особенности народную.</p><p class="p1">— Как во городе то было Вавилоне, — начал старец раздумчивым речитативом. — Во граде Вавилоне, да. Вот, песня Мардохея-воина. Пошел я войной на супротивников, на злых слуг Аштарота, да. На них я пошел войной, и грохотали мои колесницы, да. Всех же моих колесниц было двадцать десятков и одна.</p><p class="p1">— Много, — ухмыльнулся Батуга.</p><p class="p1"><em>— Двадцать десятков было их и одна, —</em></p><p class="p1">уже не слушая, продолжал слепец. Он нащупал наконец мотив, поначалу подозрительно похожий на «Подмосковные вечера», но с каждой спетою строчкой от них отдалявшийся. Это было нечто странное, ни на что не похожее, лишенное гармонии, но звонкое, боевитое.</p><p class="p1"><em>— В первой сам я восседал, имея шлем на мне,</em></p><p class="p1"><em>Шлем имея золотой, с изображением причудливых вещей,</em></p><p class="p1"><em>Называть которые и перечислять было бы долго.</em></p><p class="p1"><em>В руке имел я копье весом три меры веса,</em></p><p class="p1"><em>Длина его была пять мер длины и еще другую меру длины,</em></p><p class="p1"><em>В другой щит шириною шесть мер ширины,</em></p><p class="p1"><em>Такой щит, что за ним могло бы защититься много народу, да,</em></p><p class="p1"><em>Потому что царь подобен множеству, да!</em></p><p class="p1"><em>И я ехал, ехал, и колесница моя была как бы сноп,</em></p><p class="p1"><em>Сноп как бы лучей, упавших от солнца на воду</em></p><p class="p1"><em>И от воды упавших назад на солнце, да!</em></p><p class="p1"><em>Как просо, были мои воины, как пятнадцать и одна сотня горстей,</em></p><p class="p1"><em>И всеми ими руководил я, и в каждом был я,</em></p><p class="p1"><em>Сердце я имел коровы, воинственной коровы, да!</em></p><p class="p1"><em>Хитрость ящерицы я имел и много голубиных желудков,</em></p><p class="p1"><em>Внушающих проглотившему стойкость, да, твердость, да!</em></p><p class="p1"><em>Мясо мое было мясо льва, мускул мой был мускул коня,</em></p><p class="p1"><em>Зубов я имел до нескольких тысяч и каждым кусался я!</em></p><p class="p1"><em>Автор имеет в виду ножи своих воинов, да!</em></p><p class="p1"><em>И я ехал, ехал, и мы громыхали, в натянутые шкуры мы били, ага!</em></p><p class="p1"><em>Били, били, земля дрожала, копыта стучали, ну! ты представляешь! Вообще.</em></p><p class="p1">— Чего-то долго едет, — сказал Лавкин. — Пусть бы уже дрался.</p><p class="p1"><em>— И тут нас увидели враги, слуги Аштарота, дети червей,</em></p><p class="p1"><em>Склизкие клубки змей, пивная слизь, мешки потрохов,</em></p><p class="p1"><em>И от вида моего их ноги стали как ноги дев,</em></p><p class="p1"><em>И от дрожи земли их руки стали как огурцы,</em></p><p class="p1"><em>И как плети пивного хмеля стали их мускулы, да,</em></p><p class="p1"><em>И как жгуты волос стали их жилы, да,</em></p><p class="p1"><em>И как дрожь листвы стали их души, да,</em></p><p class="p1"><em>А я все ехал и грохотал, ехал и грохотал.</em></p><p class="p1"><em>Ты, поклонник Аштарота, жалкий жрец Манамуна, убогий слуга Бататута, да!</em></p><p class="p1"><em>Думал, ты будешь рулить, а я буду сосать, да?</em></p><p class="p1"><em>Нет, не я, не я буду сосать, воинственный я муж,</em></p><p class="p1"><em>А ты, ты будешь сосать по моему хотению, да!</em></p><p class="p1"><em>Еще чего думал, я буду сосать, а ты рулить!</em></p><p class="p1"><em>Никогда так не будет, чтобы ты рулил, а я сосал.</em></p><p class="p1"><em>Так будет, чтобы я рулил, а сосал ты, ты,</em></p><p class="p1"><em>Я буду рулить, а ты будешь сосать,</em></p><p class="p1"><em>А то выдумал еще — каждый такой будет рулить, а мы сосать,</em></p><p class="p1"><em>Мы сосать не имеем охоты, воины мы,</em></p><p class="p1"><em>Имеем мы охоту рулить, а сосать не мы,</em></p><p class="p1"><em>Не мы будем сосать, но ты, ты будешь сосать!</em></p><p class="p1">— Ишь, — обрадованно сказал Батуга. — Все как у нас.</p><p class="p1"><em>— И он понял, что будет, будет сосать,</em></p><p class="p1"><em>И повернул свои колесницы, и пошел обратно,</em></p><p class="p1"><em>В смрадные норы свои пошли они, а я настигал,</em></p><p class="p1"><em>Двадцать колесниц и одна ехали как одна,</em></p><p class="p1"><em>И в одной сидел я, и колебал копьем,</em></p><p class="p1"><em>И доехал до жреца Манамуна, и заколебал,</em></p><p class="p1"><em>Совершенно его заколебал, веришь, нет?</em></p><p class="p1"><em>И отрубил ему руки, как отрубают початок, да,</em></p><p class="p1"><em>И отрубил ему ноги, как отрубают капусту, да,</em></p><p class="p1"><em>И отрубил ему уши, как отрубают уши, когда хотят отрубить уши, да!</em></p><p class="p1"><em>И бросил псам его уши, как бросают уши псам,</em></p><p class="p1"><em>И отрубил ему зубы, как отрубают еще что-нибудь,</em></p><p class="p1"><em>И то отрубил, чем он думал рулить, а я чтобы сосал,</em></p><p class="p1"><em>И вложил ему вместо зубов, чтобы сам сосал,</em></p><p class="p1"><em>И сказал ему: «Вот, да! Видишь, что такое война!</em></p><p class="p1"><em>Война — дело молодых, лекарство против морщин,</em></p><p class="p1"><em>Хорошее времяпрепровождение для того, кому делать нечего, ну!»</em></p><p class="p1">Глаза старца, как бы незрячие, перестали хаотически перебегать с предмета на предмет и осмысленно уставились на Батугу, а потом на Лавкина.</p><p class="p1"><em>— И мы взяли всех их дев и сделали их женами, да,</em></p><p class="p1"><em>И взяли всех их жен и сделали рабынями, да,</em></p><p class="p1"><em>И сделали всех их рабынь и сделали котлетами, нет,</em></p><p class="p1"><em>Потом передумали и тоже сделали рабынями, да!</em></p><p class="p1"><em>И мы взяли всех их воинов и сделали наложниками, да,</em></p><p class="p1"><em>Потом передумали и сделали наложницами, да,</em></p><p class="p1"><em>Потом передумали и сделали гладиаторами, ну,</em></p><p class="p1"><em>Потом надоело и сделали дворниками, слышь,</em></p><p class="p1"><em>Потом взяли дворников, скормили их собакам, а то,</em></p><p class="p1"><em>Потом взяли собак и трахнули в задницу, эге,</em></p><p class="p1"><em>И трахнули кошек, и трахнули овец, ну,</em></p><p class="p1"><em>И всех тараканов отымели в их владениях, веришь, нет?!</em></p><p class="p1"><em>А потом передавили, потому что остановиться не могли,</em></p><p class="p1"><em>И собак передавили, и кошек, и наложниц, вообще,</em></p><p class="p1"><em>Всех передавили, а кого не успели, скормили ежам,</em></p><p class="p1"><em>А потом ежей передавили слонами, потому что иначе никак,</em></p><p class="p1"><em>Потом передавили слонов, потому что достали трубить,</em></p><p class="p1"><em>Конь лучше слона, лучше, лучше слона!</em></p><p class="p1"><em>Но и коней передавили, потому что война такая вещь,</em></p><p class="p1"><em>Пока всех не передавишь, не можешь остановиться никак!</em></p><p class="p1"><em>Сначала трахаешь, потом давишь, все дела!</em></p><p class="p1"><em>Пусть знают все вокруг, какой есть славный город Вавилон!</em></p><p class="p1">Старец пел все более грозно. Когда дело дошло до перетраханных собак, по спине Лавкина пробежал священный озноб. Он вспомнил, что такое война, и проклял себя за многодневное сиденье в тупой крестьянской избе, где он для чего-то мучил уже пойманных людей. Сам дух войны пел перед ним, живой, свежий дух варварства.</p><p class="p1"><em>— Вот что такое город Вавилон, а не то что говорят!</em></p><p class="p1"><em>Не то что какой-нибудь другой, про который не говорят!</em></p><p class="p1"><em>Город Вавилон когда кого-нибудь идет воевать,</em></p><p class="p1"><em>То живой души не останется, трахнут всех,</em></p><p class="p1"><em>И овец, и тараканов, и себя, и весь город Вавилон!</em></p><p class="p1"><em>Кровью перемажемся и так прыгаем, да!</em></p><p class="p1"><em>А вы не Вавилон и вообще непонятно кто,</em></p><p class="p1"><em>Вы так себе воины, и мне, грозному духу войны,</em></p><p class="p1"><em>Стыдно смотреть на вас, стыдно трахать вас, стыдно давить!</em></p><p class="p1">Старец выпрямился и отшвырнул бандуру.</p><p class="p1"><em>— Да, я грозный дух войны, Мардухей и сколько нас еще,</em></p><p class="p1"><em>И я гляжу тут на вас и стыжусь, какое вы фуфло!</em></p><p class="p1"><em>Нету в вас силы духа, нету в вас силы брюха, нет у вас зубов,</em></p><p class="p1"><em>Вы не можете ни рулить, ни сосать, а только жрать козу!</em></p><p class="p1"><em>Полное вырождение, распад сознания, не знаю что,</em></p><p class="p1"><em>Ухожу от вас на фиг, воюйте сами, большой привет!</em></p><p class="p1">Он с негодованием топнул ногой и растаял в воздухе.</p><p class="p1">— Черт-те что, — после долгой паузы выговорил атаман Батуга, пытаясь успокоить себя звуком собственного сиплого голоса. — Что за ерунду он тут нес? Прямо сорок бочек арестантов, а не старик.</p><p class="p1">— Нет, он дело говорил, — мрачно сказал Лавкин, отшвыривая кость. — Ни хрена это не война, Батуга. Он настоящий дух войны, он понимает.</p><p class="p1">— А куда он делся-то? — испуганно спросил атаман.</p><p class="p1">— Не знаю, — сказал Лавкин. — А какая разница? Куда вообще все делось?</p></span></span></span>
