<span><span><span><span><span id="id23"><div class="title5">
<p class="p">4</p>
</div><p class="p1">Он все еще не верил, что уедет. Может, тоскливый сон и был выражением тайной тревоги — Громов не признавался в ней даже себе, но так до конца и не выучился самурайскому равнодушию. Он научился ходить в атаку, почти не думая о смерти, — да вдобавок и атаки были так омерзительны, что смерть представлялась чуть ли не избавлением; однако легко относиться к отмене отпуска и сопутствующим издевательствам не мог до сих пор. Набор местных воинских добродетелей образовывал кодекс пожестче самурайского — требования подобрались взаимоисключающие и потому невыполнимые; самурай мог бравировать презрением к смерти, ибо утешался величием собственной личности, обожествлял честь и никому не позволял обходиться с собой, как с собакой. Если забывался феодал — он мог снести башку и феодалу, предупредив сквозь зубы: «Господин, я исполнен решимости». Местному солдату и младшему офицеру вменялось рисковать собой, презирать опасность и быть при этом готовым к любой выволочке от начальства — вероятно, таким образом солдата приучали не бояться противника, потому что было еще неизвестно, кто страшней. Противник был зол, коварен, хитер, но расстреливал пленных куда реже, чем свои своих. Солдаты не сдавались толпами только потому, что после этого их родне, оставшейся в тылу, оставался один путь — в лагерь; если бы у этой армии не было заложников, никто уже не поднял бы ее в бой. Некоторые горячие головы из партии с гомерическим названием «Легион доблести», покрывшей всю Россию сетью молодежных тренировочных лагерей, где организовывались языческие игрища в честь громовержца нашего Перуна, вообще предлагали универсальную программу: призывника — в армию, а всех родственников — в лагерь. Призывник плохо служит — удвоить родственникам норму выработки и срезать пайку, призывник перебежал — расстрелять, а лучше повесить перед строем. Население поделилось бы на тех, кто воюет, и тех, кто сидит, с небольшой верхушечной надстроечкой из тех, кто регулирует потоки. Три касты: жрецы, воины и зэки. Непонятно было, правда, куда девать бездетных — некого призвать и соответственно не за что сажать: верно, на сельхоз-работы… или сразу в расход, чтоб не жрали лишнего. Один русский витязь из одноименного блока, спецназовец, мастерски раскалывавший на трибуне кирпичи, серьезно предлагал расстреливать за бездетность: саботаж роста славянского населения! пособничество азиатам! После того, как испарилась исламская опасность, бездетность стали приравнивать к пособничеству Европе, которая и сама вымирала быстрей России.</p><p class="p1">Громов знал, что долг повелевает ему служить, но знал и то, что выслушивать бесконечные нотации и терпеть позорные выволочки никак не входит в его обязанности. Здрок обожал отпустить офицера и вернуть его с порога: постой, постой, я не все твои документы видел. Это что? Это что, я спрашиваю вас, товарищ капитан?! Я вижу, что это членская книжка добровольного спортивного общества «Буревестник», но я спрашиваю вас, почему у вас не плочены взносы с января месяца?! Вы боевой офицер, вы, может быть, за ребенка нас всех тут считаете? Кррругом, я вам объявляю взыскание, и отпуск ваш вы будете иметь в дежурствах по части! В дежурствах по части вы будете его проводить, товарищ ка-пи-таннн, нерадиво относящийся к своим обязанностям члена! И офицер заступал дежурным, и еще три недели его имя полоскали на ежеутренних собраниях, которые давно уже из одних этих полосканий и состояли. Громов не знал, ради чего должен тянуть лямку офицер и тем более рядовой, которого могут убить чужие и ежедневно гнобят свои; он не знал, как можно любить Родину, видящую смысл исключительно в уничтожении собственной живой силы. Может быть, Громов потому и пошел в армию, чтобы поменьше видеть эту Родину, — как один француз, он не помнил уже кто, постоянно ходил обедать в Эйфелеву башню, ибо это было единственное место в Париже, откуда ее не видно.</p><p class="p1">Он проверил промокшего солдатика у склада боеприпасов, — в случае нападения такого солдатика хватило бы только на то, чтобы крикнуть по-заячьи, — осмотрел пост у продсклада и направился к штрафному бараку на окраине Баскакова, когда заметил, что его уже кто-то опередил. Около барака, поблескивая мокрой лысиной, стоял Гуров.</p><p class="p1">— А, капитан, — сказал он устало. — Чего не спится, капитан? Боишься в отпуск не уехать?</p><p class="p1">Громов пожал плечами.</p><p class="p1">— Уедешь, уедешь, — рассеянно сказал Гуров. — Ты москвич сам-то?</p><p class="p1">— Да.</p><p class="p1">— К родителям поедешь?</p><p class="p1">— Никак нет, товарищ инспектор. В Махачкалу, к невесте.</p><p class="p1">— В Махачкалу? Дело хорошее. Кстати, это… — Гуров неожиданно посмотрел на Громова с интересом. — Ты в Москву-то заезжай все-таки, а? Как? Я тебе лишних деньков пять нарисую. Тебя прямо Бог принес. Дело к тебе будет, милый. Ты это, — отнесся Гуров к часовому, — иди валяй. Можешь быть свободен.</p><p class="p1">— Оставление поста, товарищ инспектор, — робко начал часовой.</p><p class="p1">— Р-разговорчики! — тонко прикрикнул Гуров. — Совсем оборзели, с инспектором шестой степени пререкаются! Фамилия!</p><p class="p1">— Малахов, — обиженно сказал часовой.</p><p class="p1">— Трындите много, рядовой Малахов! Вы будете у меня пять, шесть, пятнадцать караулов подряд вне всяких очередей ходить! К вам из Москвы приехал хер моржовый или кто? Я спрашиваю вас: я хер моржовый?!</p><p class="p1">— Никак нет, — испугался Малахов.</p><p class="p1">— Слава тебе, Господи, признал. Не хер я. А может быть, товарищ рядовой, я ваш боевой товарищ? По соседству сплю, во сне пержу? Я, может быть, ваш сосед по казарме? Смирно стоять, не расслабляться! — громче прежнего заорал Гуров, да так, что Громов машинально вытянулся и расправил плечи. — Я, может быть, вам солдатская мать или баба ваша, что вы можете тут панибратство разводить? Отвечать, когда спрашивает инспектор шестой ступени!</p><p class="p1">— Никак нет, — пролепетал рядовой.</p><p class="p1">— Кру-гом! Кру-гом! Кру-гом! К бою! Лег, отжался! (Малахов плюхнулся в грязь). Еще отжался! По-пластунски в караульное помещение ползком шагом марш! На брюхе, падла! Увижу, что встал, сука, — будете у меня сейчас окоп отрывать полного профиля, рядовой Малахов! Отдыхать, бля! Отбиваться ползи!</p><p class="p1">Малахов, смешно задирая тощий зад, пополз под дождем в сторону караулки.</p><p class="p1">— Поползло чмо варяжское, — непонятно выругался Гуров. — Ты, капитан, тоже чмо варяжское, ты в курсах?</p><p class="p1">— Никак нет, — сказал Громов. — Во-первых, товарищ инспектор, я не чмо, во-вторых, не варяжское, а в-третьих, я вам не рядовой Малахов, который от инспекторского крика обсирается. Я боевой офицер и на вас, крысу московскую, кладу. Внятно ли я выразился, товарищ инспектор?</p><p class="p1">Если бы ему не приснились стихи и не вспомнилась Маша, он бы, конечно, не сказал ничего подобного, но после мыслей о Маше терпеть гуровское хамство не мог ни в коем случае. Его внезапно подхватила и понесла та же волна, которую он знал по атакам. Громов сейчас не боялся ничего, вдобавок он оскорблял Гурова без свидетелей, и пойди что докажи. Инспектор инспектором, однако пробрасываться боевыми офицерами в штабе явно не были готовы. А хоть бы и были, Громова это сейчас в самом деле не волновало.</p><p class="p1">Гуров посмотрел на него с любопытством, еще более живым, чем прежде.</p><p class="p1">— Молодец, капитан, — сказал он с улыбкой. — Достойный ответ боевого офицера. Инспектор проверяет как? Инспектор проверяет разнообразно. Солдат, который не подчиняется, есть плохой солдат, говно солдат. Но офицер, который позволяет на себя тявкать хоть бы и инспектору, есть плохой офицер, дрисня офицер. Заслужил себе пять суток к отпуску, заслужил. Инспекторская проверка — такое дело, не всякий и поймет. Ты мне скажи-ка, некось на голубу дорого возбить оболок?</p><p class="p1">— Как? — переспросил Громов.</p><p class="p1">— Я тебе айно аю, расколыть переголяк ли ай за крыльцо перетоптать? — строго спросил Гуров, и Громов, кажется, узнал звуки той речи, которая долетала до него в Дегунине, пока он спал в Галиной избе. — Черешень заступ колубал, ай чекуляку гордубал? Аю ты ни упороса не продавишь, ни сумерек не разломишь?</p><p class="p1">— Не понял, товарищ инспектор, — пробормотал Громов.</p><p class="p1">— Добре, — сказал инспектор. — А то, знаешь, доверяй, но проверяй. Мне именно такого, как ты, в данную минуту и нужно. Варяг, как есть варяг, достойный сын Одина, только с легкой человечинкой. Примесь какая-то была, нет? У тебя есть примесь, капитан?</p><p class="p1">— Не понял, товарищ инспектор.</p><p class="p1">Громов пристально посмотрел на Гурова. Он явно был пьян и говорил, как пьяный, но спиртным от него не пахло.</p><p class="p1">— Не понял, и не надо. Не всем понятливыми быть, верно? Зачем в армии столько инспекторов? Слушай меня теперь внимательно. Я выведу сейчас отсюда рядового Воронова, которого по моему личному, — ты понял? личному! — приказу майор Евдокимов приуготовлял к специальному боевому заданию. Ты возьмешь рядового Воронова и доставишь его в город Блатск, что на московском направлении. Оттуда поедете в деревню Копосово, Плахотского района, оттуда в пятнадцати километрах к северу. Не записывай, я инструкцию распечатал, Воронову лично вручу. И там, ежели Воронов все сделает, как надо, ты его возьмешь под мышку и в Москву доставишь к его родителям. После чего действуй по собственному распорядку, никто тебе не препятствует. Хорошо меня понял?</p><p class="p1">— Так точно, — ответил ничего не понявший Громов.</p><p class="p1">— Но учти, — сказал Гуров тихо и чрезвычайно серьезно. — Ты помни, капитан, такую вещь. Вы должны быть в Копосове быстро, понял? Вам надо послезавтра там быть кровь из носу, не то поздно будет, капитан. Тогда и Воронов никакой ничего не сделает, если вы там не будете двадцать первого. Поезд туда сутки идет, должны успеть. Должны, Громов, понял ты меня? Встретится тебе там, Громов, вот этот мужчина с девушкой, — Гуров достал фотографию и навел на нее карманный фонарик. Фотографию он держал бережно, прикрывая рукавом, чтобы не намокла. — Ближе рассматривай, не стесняйся. И теперь, Громов, особо внимательно меня слушай, потому что я тебе задание даю. Тебе конкретно, понял меня? Воронова сопроводить — это так, не по делу, ты мне головой, конечно, отвечаешь за Воронова, но это все так. А это уже не так, а суть. Если Воронов придет к тебе и скажет, что извини, мол, товарищ капитан, но никак — ты должен будешь этого мужчину и эту девушку застрелить на месте, понял меня?</p><p class="p1">— Никак нет, — сказал Громов. — Я вас не понял, товарищ инспектор шестой ступени, и расстрелами мирного населения как боевой офицер заниматься не буду.</p><p class="p1">— Будешь, капитан, — сказал Гуров. — Обязательно будешь, иначе в Жадруново пойдешь. Слыхал про Жадруново? Макар телят туда не гонял, куда ты пойдешь.</p><p class="p1">Гуров стоял очень близко, и Громов прямо перед собой видел его круглые очки, круглые маленькие глаза за ними и блестящую лысину.</p><p class="p1">— Я тебе приказ на бланке сделаю и к ордену представлю, и будешь у меня в масле кататься. А если не сделаешь, я тебя, Громов, под землей найду и за яйца повешу, понял меня, капитан? И невесту твою найду в ее Махачкале, хотя и не будет к тому времени никакой Махачкалы. Или ты не знаешь меня, капитан? Не слыхал про инспектора Гурова? Ответа не слышу!</p><p class="p1">— Я по штатским не стреляю, товарищ инспектор, — повторил Громов.</p><p class="p1">— Ты присягу давал? — спросил Гуров и вдруг подобрался, с доверительного полушепота перейдя на командный голос. — Капитан Гуров! Слушайте приказ: в деревне Копосово обнаружить данного мужчину и его спутницу и по сигналу рядового Воронова уничтожить объекты. Приказ ясен?</p><p class="p1">— Так точно, — ответил Громов.</p><p class="p1">— Выполнять. Сейчас возьмешь Воронова и с ним немедля отбудешь на станцию. Машину дам мою. Первый поезд на Блатск — в шесть пятьдесят три. Стой здесь, жди.</p><p class="p1">На секунду он умолк, глядя в землю. Дождь усилился.</p><p class="p1">— Мало нас, вот что, — сказал Гуров. — Очень мало, пять процентов. Кабы чуть побольше, так и без тебя бы обошлись. Ну да ладно. Я не говорил, ты не слышал.</p><p class="p1">Гуров вошел в барак. Громов стоял под дождем, не понимая, снится ему все это или происходит на самом деле. Через пять минут Гуров вышел с высоким, тощим и взлохмаченным рядовым. Ремня на рядовом не было. Гуров вручил ему мешок:</p><p class="p1">— Тут все. На станции оденешься. Документы все на тебя выписаны. Потом останешься в Москве, сиди и не рыпайся. Если в Копосове у тебя не выйдет, доложишься ему, — Гуров кивнул на Громова. — Он тебе во всем первая защита. Ну, алатырь на поступь.</p><p class="p1">— Доломянем на приступок, — ответил рядовой. — Здравия желаю, товарищ капитан.</p><p class="p1">— Машина моя у штаба, — сказал Гуров. — Оба марш туда, я сейчас шофера пришлю.</p><p class="p1">Громов и Воронов медленно направились под дождем к штабу.</p><p class="p1">— Меня вообще-то Ильей зовут, — сказал Воронов. Он, кажется, все еще не очухался от внезапного спасения и теперь в избытке счастья готов был фамильярничать со старшим по званию.</p><p class="p1">— Вас вообще-то зовут рядовой Воронов, — сказал Громов, — и будьте любезны вести себя по уставу.</p></span><span id="id24"><div class="title5">
<p class="p">5</p>
</div><p class="p1">Поезд стоял на станции Баскаково две минуты. Вагон был пустой, только несколько мешочников нахохлились на желтых деревянных лавках, прижав к себе жалкий скарб, словно обернувшись вокруг него.</p><p class="p1">Воронову очень хотелось разговаривать. Он только что чудесно спасся и все еще не мог прийти в себя от радости. Громов смотрел на него брезгливо, хотя в душе и понимал, что парня чуть не расстреляли без вины, а потому предъявлять к нему претензии жестоко.</p><p class="p1">— А вы сами москвич, товарищ капитан? — спросил Воронов.</p><p class="p1">Громов хотел отрезать, что это не его рядовое дело, но вместо этого сухо кивнул.</p><p class="p1">— Я в Москве уже полгода не был, — мечтательно сказал Воронов. — Мать не видел, девушку не видел… — Ему казалось, что упоминание о девушке разжалобит сурового капитана. Человек, у которого есть девушка, все-таки уже не выглядит полным ничтожеством.</p><p class="p1">Громов молчал. Он не понимал, почему должен тащить с собой в давно вымечтанный отпуск болтливого труса, да вдобавок с заездом в Блатск, где он вовсе не планировал задерживаться.</p><p class="p1">— Я сейчас заткнусь, товарищ капитан, — радостно сказал Воронов. — Мне просто, понимаете… я сейчас видел очень хорошего человека. Я и не знал, что такие бывают. А после этого в первое время, сами знаете, очень трудно опять думать, что все кругом вот такие, — он постучал по спинке сиденья. — Ну и разговариваешь, хотя нельзя. Я же понимаю, вы тоже не вот такой. Так что можно бы и сказать какое-нибудь человеческое слово.</p><p class="p1">Громов обалдел от этой наглости и посмотрел на Воронова молча, в упор, как он хорошо умел. Это был натренированный командирский взгляд, но Воронов не отводил глаз, словно пребывание в соседстве смерти навеки отбило у него страх перед земным начальством. По первому году боев — когда, собственно, еще бывали бои, — Громов знал эту солдатскую храбрость. По большому счету командовать можно было только необстрелянными — обстрелянные не боялись крика и уважали только компетентность. Поэтому Громов не стал кричать на Воронова, а молча посмотрел на него и наконец сказал:</p><p class="p1">— Видите ли, рядовой Воронов. Человек, которого чуть не убили, — еще не герой. Это вам понятно? Если бы вы побывали в бою, я бы мог с вами разговаривать по-человечески. А пока мне ваши подвиги неизвестны. Пока весь ваш подвиг — в том, что вы зачем-то нужны инспектору Гурову. А инспектор Гуров для меня — только старший по званию, не более того.</p><p class="p1">— Я понимаю, понимаю, — с готовностью закивал рядовой. — Я никакой не герой, точно. Но ведь с человеком иногда можно поговорить просто так, нет? Или вы только с героями?</p><p class="p1">— С человеком на фронте говорят так: смирно, вольно, разойдись, — раздельно произнес Громов. — С солдатом — другое дело. Но вы мне еще ничем не доказали, что вы солдат. То, что на вас форма, — вас солдатом не делает. Понятно я говорю?</p><p class="p1">— Так точно, — тускло сказал Воронов. Радость его словно выцвела. Вероятно, ему казалось, что человек, с которым Гуров отправил его в Блатск, — тоже должен быть чем-то сродни Гурову, родной, нормальный и правильный, видящий в других людей, а не только солдат. Но, наверное, такого человека у Гурова не было, и он просто выбрал случайного офицера, шедшего мимо, — не зверя, но и не живую душу; просто хорошо работающую машину, редкую среди ржавых и плохо смазанных машин варяжского войска.</p><p class="p1">Поезд тронулся, скрипучий и дребезжащий, как всякая варяжская машина. Медленно светало. За окном тянулись провода в каплях: плавный подъем — плавный спуск… кусты, овраги, длинная серая река с песчаными отмелями…</p><p class="p1">— Разрешите отлучиться в тамбур с целью перекурить, — попросился Воронов.</p><p class="p1">Громов окинул его с ног до головы.</p><p class="p1">— Ремень поправьте. И пилотку. Гражданские смотрят.</p><p class="p1">Воронов вышел в тамбур и уперся лбом в стекло. Курева у него не было, ему хотелось побыть одному с проплывающими кустами и реками.</p><p class="p1"><em>— Не одна в поле дороженька,</em></p><p class="p1"><em>Не одна самодельная…</em></p><p class="p1">— не запел даже, а заговорил он почти про себя. Дымящий в тамбуре мужик, черноволосый, заросший бородой по глаза, поглядел на него с подозрением, и дальше Воронов пел любимую дорожную песню только про себя. Он сам не знал, откуда взял ее, — наверное, услышал по телевизору, в старом фильме, где тоже все ехали мимо серых пейзажей в медленном поезде, и еще мальчишки махали проезжающим из оврага.</p><p class="p1"><em>— Не одна в поле дороженька,</em></p><p class="p1"><em>Не одна беспредельная.</em></p><p class="p1"><em>Не одна в поле дороженька,</em></p><p class="p1"><em>Не одна самокатная,</em></p><p class="p1"><em>Не одна в поле дороженька,</em></p><p class="p1"><em>Не одна сыромятная…</em></p></span></span></span></span></span>
