<p class="p">3</p>
</div><p class="p1">Весь район, по которому шел Громов обратно к метро, не пробыв дома и двух часов, — поражал его теперь той же второсортностью и обшарпанностью, которую он приметил у себя в квартире. Даже публика вокруг была облезлая, и вовсе не было молодежи; единственным молодым человеком, который встретился Громову за все время, был огромный, двухметровый, страшно толстый идиот, который иногда встречался ему еще рядом с прежней квартирой, на Университетском рынке. Рынок давно снесли, выстроив вместо него уродливую библиотеку, — но идиота Громов запомнил: его крошечная мать ходила с ним по рынку, навьючивая на него тяжелые сумки. Покупать приходилось очень много, он все время жрал. Покупали они в основном хлеб и печенье «Юбилейное», на другое не хватало денег, и поэтому идиота так разносило. Он и теперь шел рядом с матерью, трагически мыча, — трагизм относился, конечно, не к осознанию собственной участи, а к тому, что ему опять хотелось жрать. У всякого в жизни было тут свое наполнение, у идиота это был хлеб и печенье «Юбилейное». Пережеванным до жидкого мякиша печеньем «Юбилейное» он был весь набит внутри. Весь мир вокруг был набит тем же самым — паутиной, скатавшейся пылью, старыми ботинками, пахнущими так, как всегда пахнет старая обувь: засохшим потом, засохшим гуталином. В этот район свезли все московское старье, и здесь, в дальнем ящике, оно лежало, никому не мешая. Все тут было, как они привыкли: очереди в магазинах за колбасой в полиэтиленовой обертке, поликлиники с флюорографиями, административная ответственность за несвоевременно пройденную диспансеризацию, справки на все случаи жизни, старческая мокрота, клокочущая в легких при каждом вздохе. Тут им всем было чем жить. Старики, изредка дети: вот старуха прошла, выгуливая внучку, внучка ехала на трехколесном велосипеде, старуха каждые две минуты останавливала ее и сморкала, и внучка, покорно высморкавшись, ехала дальше.</p><p class="p1">О поездке в комендатуру Громов думал уже чуть ли не с облегчением — все-таки там было что-то военное, не то чтобы осмысленное, но по крайней мере военная бессмысленность возводилась в принцип, служила условием игры; здесь же она была неосознаваемой частью жизни и потому казалась столь же отвратительной, как апокрифический пахарь, пашущий в субботу. «Горе тебе, если нарушаешь закон по незнанию, и благо, если ведаешь, что творишь», — сказал ему Христос, и этот апокриф, в отличие от множества прочих, убедителен. В армии по крайней мере знали, что творили: там бессмысленность была фундаментом всего и достигалась нарочито, — а в быту текла и ширилась сама собой. Громов, однако, не учел, что и комендатура была московская, далекая от войны, а потому все здесь делалось вовсе не так, как на фронте.</p><p class="p1">Комендатура располагалась в административном районе, неподалеку от Красных Ворот — туда сами собой постепенно переехали, скучковавшись, все государственные учреждения. Район к тому располагал — здесь много было сталинских домов, хватало и уцелевшего московского конструктивизма ранних тридцатых. В конструктивизме размещались воинские, карательные и судебные инстанции, в сталинском ампире — административные, регулирующие и распределяющие. Единственным неадминистративным сооружением в районе осталась детская площадка аккурат напротив комендатуры — ее никто не трогал: видимо, дети должны были любоваться солдатиками и следовать их примеру. Впрочем, и на площадку пускали по пропускам, распределявшимся среди жителей окрестных домов. Жилых домов, правда, было всего пять, и населяли их чиновники. Каждый носил с собой из дома термос и бутерброды. Можно было, конечно, зайти домой пообедать, — но тогда посетитель в обеденный перерыв наталкивался бы на запертую дверь, а так он мог заглянуть, увидеть обедающего чиновника, разглядеть выражение гнева и презрения на его жующем лице — и в ужасе ретироваться, чтобы с благоговением ждать за дверью, пока закончится священнодействие.</p><p class="p1">Громов ткнулся в одну дверь — перерыв; постучал в другую — заперто; в третьей ему указали на десятый кабинет, он сунулся туда, там штатский чиновник придирчиво осмотрел его форму, замерил для чего-то расстояние между звездами на погонах, осмотрел стрелки брюк, — Громов чувствовал себя, как лошадь, которую на базаре щупает цыган. Когда чиновник пожелал осмотреть его белье — уставное ли, нет ли запретных цветов и фуфайки под кителем, — он взбунтовался.</p><p class="p1">— Я пришел на учет, а не на медосмотр.</p><p class="p1">— А откуда вы можете знать? — бабьим базарным голосом отвечал ему чиновник. — Кто вы такой, чтобы распоряжаться? Я вам скажу ягодицы раздвинуть, вы должны раздвинуть ягодицы. Я скажу сдвинуть, вы сдвинуть ягодицы. Я вам скажу сесть на ягодицы и ехать, вы ехать на ягодицах. Кто такой?</p><p class="p1">— Ты как с офицером разговариваешь, крыса? — тихо спросил Громов. Он умел так спрашивать — тихо, но убедительно.</p><p class="p1">— Знаю, какой ты офицер, — совсем уж по-бабьи завизжал чиновник. — Боевые офицеры, кровь проливаем. Знаем, какую вы проливаете кровь. Мы тут сиди за вас впахивай целый день, а вы там на лежанках с дуньками. Вояки. Вон что навоевали, — чиновник махнул на карту, утыканную вперемешку красными и желтыми флажками. — Не знает никто, где наша земля, где не наша. Вояки запечные. Я вас сейчас так поставлю на учет, что вы здесь все время своего отпуска будете плац мести и делать шагом марш. Я вам сказал заголить трусы, значит, заголите трусы. Я вам скажу обнажить головку, вы обнажить голов…</p><p class="p1">Громов мог бы обездвижить его одним ударом, но нарываться на конфликт в комендатуре ему не улыбалось. Он вышел, хлопнув дверью. Чиновник за ним не пошел — он вовсе не был заинтересован в том, чтобы наказывать странного посетителя. Ему надо было его отфутболить, и только.</p><p class="p1">На этот раз самая первая дверь — с табличкой «Учет личного состава» — была открыта. Там сидела горбатая старуха с очками на горбатом носу.</p><p class="p1">— Я хочу встать на учет, — сказал Громов.</p><p class="p1">Старуха молчала. Глухая, сволочь, подумал Громов.</p><p class="p1">— Я хочу встать на учет, — повторил он громче.</p><p class="p1">Старуха подняла на него глаза и посмотрела, как солдат на вошь.</p><p class="p1">— Я слышу.</p><p class="p1">— И что? — спросил Громов.</p><p class="p1">— Я слышу вас, — торжествующе повторила старуха, соскочила со стула и выпрямилась. На стуле горбунья казалась выше — стоя на полу, она едва была Громову по пояс.</p><p class="p1">— Он хочет встать на учет! — воскликнула она. — Он хочет, вы слышали?! Барин, хозяин всей здешней земли, помещик Кислодрищенский желает встать на учет! Вы русский офицер? Вы смеете называть себя русским офицером?! В мое время русские офицеры были не таковы. Выйдите немедленно и войдите по форме, и войдя, обратитесь ко мне так, как должен русский офицер обращаться к женщине!</p><p class="p1">Громов не двигался с места.</p><p class="p1">— Ну же! — Горбунья притопнула ножонкой. — Вы, вы! Я к вам обращаюсь, пень новомихайловский! (Смысла этого выражения Громов не понял, да он и вообще ничего уже не понимал). Вы должны сделать кругом, показать мне ружейный прием, да, ружейный прием! Я требую этого. Вы смеете называть себя интеллигентным человеком, вы! А перед вами, между прочим, стоит женщина, и вы не предлагаете мне сесть! Как вы смеете, как можете?! Я понимаю теперь, почему наша превосходная, превосходная армия сдает позицию за позицией. Вот наша армия, извольте полюбоваться. В то время как старики и дети в тылу до кровавых мозолей шьют шинели вот этому самому фронту…</p><p class="p1">Дверь открылась, и вошел толстый рослый подполковник; Громов с облегчением вздохнул, увидев человека в форме.</p><p class="p1">— Что ты разбушевалась, Клавдия Ивановна? — устало спросил подполковник. — Что ты здесь сидишь?</p><p class="p1">— Я зашла за справкой, — с достоинством отвечала старуха. — Да, да, за справкой! Мне для делопроизводства нужна форма шесть. Я вижу — вас нет, и тут этот подозрительный молодой человек. Я должна была с ним объясниться…</p><p class="p1">— Я только что вошел, — объяснил Громов.</p><p class="p1">— Да понимаю, — махнул рукой рослый. — Не обращай внимания, капитан, это наша архивистка Клавдия Ивановна. Она женщина патриотическая, но немного с прибабахом. Иди, Клавдия Ивановна, нет у меня формы шесть.</p><p class="p1">— То есть как это нет формы шесть? — Старуха была склонна к долгим самонакручивающимся монологам, что твой Здрок. — Как у вас, русского офицера, может не быть формы шесть? Может быть, у вас нет и формы семь? Почему вы вошли, не поздоровавшись? Разве так русский офицер входит к женщине? Русский офицер входит к женщине вот так! — Горбунья попыталась изобразить строевой шаг, рухнула, уронила очки и стала ползать по полу, ища их, как ползает по полу русской офицер в поисках женщины. Подполковник не помогал ей. Вероятно, любое прикосновение старуха восприняла бы как посягательство. Громов хотел ее поднять, но подполковник жестом остановил ее.</p><p class="p1">— Вставай, Клавдия Ивановна, — сказал он равнодушно. — Вставай, хорош ползать. Иди отсюда, как женщина к русскому офицеру, не тяни кота за яйца, сделай милость.</p><p class="p1">Горбунья нашарила очки, тяжело поднялась и, пристукивая клюкой, удалилась. Проходя мимо Громова, она демонстративно отвернулась и зажала нос двумя пальцами.</p><p class="p1">— Суконное рыло, — прошептала она сквозь зубы.</p><p class="p1">— Видишь, капитан, с кем приходится работать? — спросил подполковник, когда она слабо хлопнула фанерной дверью. — Из ума выжила, ей дома на привязи сидеть, а она в архиве работает, справки людям выписывает. Я говорил — пришлите молодую, нет молодой! Не комендатура, а букет моей бабушки. Какого полка?</p><p class="p1">Громов показал документы.</p><p class="p1">— Завтра придешь со справкой по медучету, — вяло сказал подполковник, — переведешь на счет комендадуры взнос пятнадцать рублей, номер счета спишешь на двери семнадцатого кабинета.</p><p class="p1">— Я на два дня всего, — сказал Громов. Он надеялся, что хотя бы свой брат офицер не станет мурыжить отпускника попусту.</p><p class="p1">— И какая разница? — равнодушно спросил подполковник. — Мне что на два дня, что на три дня, что мамку за титьку. (Этого выражения Громов тоже не понял, он не слыхал его раньше). Спишешь номер счета, переведешь деньги, придешь с квитанцией об оплате и со справкой о флюорографии, а потом хоть на два дня, хоть на четыре. Остановиться есть где?</p><p class="p1">— Я москвич, тут написано.</p><p class="p1">— Мало что москвич. Возможны обстоятельства, родители там в эвакуации или что. Все как у людей, где прыщ, где кукла… Давай, капитан, не затягивай, ты по форме должен в день приезда регистрироваться. Это я тебе послабление делаю, потому что ты от Клавдии Ивановны пострадал, — подполковник хохотнул. Громов откозырял и вышел.</p><p class="p1">Начался мелкий дождь. Домой не хотелось. В скверике напротив комендатуры запахло тополями. Этот город знал лучшие времена, и Громов их помнил: тогда запах мокрого асфальта, пыли, тополей каждое лето напоминал о том, что кончилась нудная, двухцветная, недоверчивая поэтика зимы, настала поэтика весны, пришло время думать другими словами, двигаться в другом ритме, доверяться всему, зная, что опять обманут, — теперь все выцвело, даром что июль, и самый запах был эрзацем того запаха. Возрастное, подумал Громов. Он столько раз мечтал попасть в Москву и вдохнуть все, чем дышал здесь когда-то, — но теперь здесь нечем было дышать. Мы каждый раз хотим вернуться — и забываем, что, пока нас не было, возвращаться стало некуда. Это и есть самая страшная насмешка. Это все равно что в учебке все время мечтаешь о еде — а потом привыкаешь, и ничего уже не надо. Любой, кто уехал, должен знать, что вернуться нельзя. Вот и от последнего человеческого заблуждения он избавился, но легче не стало. Надо было срочно чем-то утешиться, найти хоть один плюс в своем нынешнем положении. Громов оглянулся: он медленно шел в сторону центра, тут неподалеку было в незапамятные времена литературное кафе, где он иногда читал, пока еще писал, — стоило зайти, если оно цело: не для того, конечно, чтобы ностальгически умиляться, — но чтобы хоть где-то на него, боевого офицера, взглянули уважительно.</p></span></span></span></span>
