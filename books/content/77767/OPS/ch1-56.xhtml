<p class="p">2</p>
</div><p class="p1">Искры костра взлетали в сырое небо, чертя огненные зигзаги. Вокруг костра располагалась боевая организация «Революционная альтернатива». Воронов с Громовым на правах почетных гостей допивали двойные порции рома. Было три часа ночи. Высокая темноволосая девушка длинными пальцами перебирала струны обшарпанной гитары, явно побывавшей во многих походах еще в бардовские времена.</p><p class="p1">— А я вас читал, если вы тот Громов, — неожиданно сказал командир отряда Черепанов, высокий, носатый и непримиримый. Ему было лет пятьдесят. Он был из тех гуру, учителей-новаторов, сектантов-подпольщиков, что заражают детей поголовной ненавистью к миру взрослых и в конце концов уводят в леса. Начинается все с театра-студии или кормления бездомных собак, а кончается растлением или волной самоубийств. — У вас что-то было про первую любовь. Та-та-та первая любовь. Очень музыкально, только с надрывом. Я тогда подумал, что этот автор точно долго не выдержит, обязательно бросит. Вы до каких лет писали?</p><p class="p1">— Я не помню сейчас, — сказал Громов. — Это все глупости.</p><p class="p1">— Почему — глупости? У нас тоже свои поэты. Вот, Ваня. Вань, прочти.</p><p class="p1">— Да ладно, — буркнул Ваня.</p><p class="p1">— Да прочти! Не каждый день поэт в гостях.</p><p class="p1">Ваня прочел что-то о том, что он всегда будет против. Стихи были резкие и бутафорские, будто автор опасной бритвой резал куклу.</p><p class="p1">— Ну как? — гордо спросил командир.</p><p class="p1">— Не знаю, — сказал Громов. — Я ничего теперь не понимаю в этом. Наверное, хорошо.</p><p class="p1">Черепанов был разочарован, а Ваня, кажется, подмигнул.</p><p class="p1">— Я другое хочу понять, — продолжал Громов. — Почему надо взрывать пути?</p><p class="p1">— А вы не знаете? — недоуменно спросил Черепанов. — Вы же федерал…</p><p class="p1">— Не только федералы ездят. У нас весь вагон был — простые люди, кто-то ехал с похорон, кто-то к отцу в другой город… Если бы вы эшелоны взрывали, я бы понял. Но это ведь совершенно штатский вагон.</p><p class="p1">— Так мы вагон и не трогаем. Мы пути взрываем.</p><p class="p1">— А смысл?</p><p class="p1">— Вы правда не знаете? — спросил Черепанов. Он даже обратился к Воронову: — Что, серьезно не в курсе?</p><p class="p1">— Глупости это все, — сказал Воронов. — Это ты, Че, придумал, а ребятам вкручиваешь. Я тебе когда еще говорил.</p><p class="p1">— Испортили они тебя в армии, — разозлился Черепанов. — Тупой ты стал, как все они, извините, конечно, поэт… Вы про ЖД слышали?</p><p class="p1">— Я с ними воюю, — ровно сказал Громов.</p><p class="p1">— Да не про тех, Господи! Я говорю про железнодорожный проект.</p><p class="p1">— Какой именно?</p><p class="p1">— Видите ли, — начал Че, — это все общие места. Я этой историей давно занимаюсь. Я по первому образованию железнодорожник, окончил московский институт инженеров транспорта — знаете такой?</p><p class="p1">— Я там работал недалеко… на первой работе, — кивнул Громов.</p><p class="p1">— Нам там не говорили, конечно, ничего. Я просто сам додумался: зачем было строить весь этот БАМ и массу других магистралей, еще при позднем совке? Почему они сейчас с такой силой тянут ветку по Дальнему Востоку? Там же одни китайцы давно, только администрация наша, и то не везде. И вдоль Ледовитого океана зачем железная дорога — особенно сейчас, когда только шоссе бы и строить, потому что нефти залейся?</p><p class="p1">— Да, может, там нельзя шоссе, — не очень уверенно сказал Воронов. — Там же мерзлота. Там только рельсы, рельсы, шпалы, шпалы…</p><p class="p1">— Да? А столкновение на КВЖД из-за чего было? — без всякой связи продолжал Че. — А почему в войну поезда под откос пускали? Что, немцы столько вывозили всего? Да они взрывали иногда в таких местах, где никакие немцы не ездили. А мужики во всех деревнях почему по лесам прячутся?</p><p class="p1">— От армии бегут, — объяснил Громов. — От мобилизации.</p><p class="p1">— Вы хоть видели, что они делают в этих лесах? А я видел! Они все строят железную дорогу! Здесь вообще никто ничего другого не делал. Вся промышленность работала только на железнодорожный транспорт. Вы посмотрите, сколько инженеров-железнодорожников один наш вуз готовил. Столько ни в одной стране не надо! Нигде столько не было!</p><p class="p1">— И зачем эта железная дорога? — терпеливо спросил Громов.</p><p class="p1">— По кругу, — полушепотом сказал Черепанов. Стало очень тихо. Слышался только треск костра. Даже темноволосая скво, смуглая в красноватых отсветах, перестала щипать гитарные струны. — Они придумали железную дорогу вокруг всей страны!</p><p class="p1">— Зачем?! — не понял Громов.</p><p class="p1">— А, ну конечно. Вы же не инженер… Понимаете, они хотят пустить поезд. Это давно, с самого начала. Этот план восходит к последним годам царствования Николая Первого. При нем, если помните, чугунки и начались. Ни в одной другой стране нет столько железных дорог. Все в конце концов пересели на автомобили и стали строить шоссе. А в России на автомобилях ездят только на рыбалку. Попробуйте проехать по шоссе из Москвы в Казань — это не шоссе, а черт-те что! Здесь все делается для того, чтобы люди ездили только по ЖД. Потому что ЖД — это предопределение, понимаете? С нее нельзя свернуть. Она железная.</p><p class="p1">Ковалев сделал паузу, давая неофиту переварить услышанное.</p><p class="p1">— Именно поэтому, — продолжал он важно, — хазарские отряды и называют себя ЖД. И если вы не знаете… хотя я уверен, что это-то вы обязаны знать… тайный боевой отряд ваших федеральных сил, ОМОН нового поколения, называется Жароносная Дружина!</p><p class="p1">— Как? — переспросил Громов, стараясь не расхохотаться. — Жароносная?</p><p class="p1">— Ну, значит, вы не из академии, — разочарованно протянул Ковалев. — Высшее офицерство все в курсе…</p><p class="p1">— Да, — подтвердил Громов. — Это, наверное, очень секретный отряд, если даже я, капитан федеральных сил, никогда о нем не слышал.</p><p class="p1">— Или не хотите колоться, — равнодушно добавил Ковалев. — Это бессмысленные прятки, всем давно все известно.</p><p class="p1">— Хорошо. И почему все они называются ЖД?</p><p class="p1">— Да потому, — громко, с силой и жаром закончил Черепанов, — что все это название одного проекта! И то, что хазарские вооруженные формирования и русские федералы называются одной этой аббревиатурой, подчеркивает, что в главном у них расхождений нет! Они борются только за то, чья это дорога. А что она должна быть, никто из них не сомневается!</p><p class="p1">— Да зачем она нужна-то?! — не выдержал Громов.</p><p class="p1">— Она нужна затем, чтобы ни при тех, ни при других тут ничего не менялось, — торжествующе проговорил Черепанов. — И местному населению все это очень нравится. Пусть угнетает кто хочет — лишь бы самим не думать. Кстати, очень многие и при немецкой оккупации прекрасно себя чувствовали, и вспоминали потом, что при немцах был порядок… Они всю жизнь хотят строить железную дорогу! Чтобы она их отсекла от всего остального мира, от любых соседей. Это местный вариант великой китайской стены, если вы не в курсе.</p><p class="p1">— И что, она должна обходить всю страну? — начал догадываться Громов о пуанте этого бреда.</p><p class="p1">— Дошло наконец! — расхохотался партизанский командир. — Как ни тужилась, а родила.</p><p class="p1">Партизаны добродушно заулыбались.</p><p class="p1">— Они пустят по ней вечные поезда, почти без интервала. Это будет как бы один замкнутый поезд по всему маршруту. А внутри пространства, по границам которого бегает такой поезд, возникают токи Максвелла — это-то вы знаете? После этого у всех, кто здесь живет, отрубятся последние мозги, и с людьми окончательно можно будет делать что угодно. Они хотят, чтобы история вечно шла по кругу, понимаете? Весь мир погибнет, а эти останутся. Я до этого круга, кстати, сам не доходил. Мне приятель рассказал, историк московский. Он сейчас тоже в армии, как раз в каком-то секретном летучем отряде… Волохов его фамилия. Не встречали?</p><p class="p1">— Слышал, но никогда не видел, — покачал головой Громов. — У него настолько летучий отряд, что его, по-моему, вообще никто не знает. Вроде как вашу Жароносную дружину. Я должен был выйти на соединение с ним, но он в очередной раз пропал.</p><p class="p1">— Рано или поздно он к нам присоединится, — сказал Че. — Он же сам понимает, что все идет по кругу. Только не понимает, почему. А я понял. Они хотят обвести Россию гигантской окружной дорогой, буквально вокруг пальца — в этом и смысл поговорки. Вы никогда не замечали, что русские в любом городе первым делом начинают строить окружную дорогу? На Московское кольцо знаете сколько истратили? И это не потому, что мэр воровал или надо грузовики пускать в объезд… Любое село начинает с того, что строит околицу — круговой забор.</p><p class="p1">— Во всем мире так, — возразил Громов.</p><p class="p1">— Да? Серьезно?! Вы были во всем мире? Вы еще где-нибудь, кроме России, видели околицу? Главное местное занятие — городить огород, отсюда слово «город». А когда додумались до железной дороги и узнали про токи Максвелла, первая их мысль была — отгородиться от всех поездами, бегающими по кругу. Замечали вы у какого-нибудь народа такое количество хороводных танцев?! Нигде больше этого нет! Я был в Швеции: там пары сбегаются и разбегаются. Был в Германии: там парень девку догоняет. И только в России по любому поводу — каравай, каравай, кого хочешь выбирай! А чего выбирать-то, если дорога — железная?</p><p class="p1">Громов с самого начала понял, что партизаны рехнулись, что нормальный человек не станет ходить в оранжевой повязке и взрывать рельсы под носом у паровоза, — но только теперь увидел систему этого безумия и несколько испугался. Черепанов самым искренним образом верил в то, что говорил.</p><p class="p1">— А мне надоело по кругу! — повторял он с жаром. — Мне надоело без выбора! Я не могу жить и растить детей в ощущении, что все предопределено! Мне неважно, какие ЖД победят в конце концов. Понимаете, за что эта война? Эта война — за вечную власть во внеисторическом пространстве, за порабощение народа, который сам только и хочет, чтобы его поработили! Поэтому они сами, сами строят ЖД. Воевать не хотят, только дорогу строят. Они думают, что когда она достроится, здесь наступит вечность. А я не хочу этой вечности! Они всю жизнь надеялись — то железный занавес, то железная дорога… А я не дам! Это сейчас мы взрываем рельсы. А будет время — начнем взрывать все эти бесконечные московские кольца! Я покончу с этим язычеством, я этот круг порушу. И вы еще к нам придете, вот увидите. Все мыслящие люди — непременно придут, потому что нельзя вечно вот так, вот так, — он в экстазе замотал головой. — С братьев Черепановых вся эта ЖД-история началась — Черепановыми и кончится. Круг замкнется… и разомкнется!</p><p class="p1">Он показал на двух своих сыновей — восьми и двенадцати лет, — робко смотревших на гостей круглыми черными глазами.</p><p class="p1">— Да ладно тебе, Че, — сказал Воронов. — Ты и нам все это рассказывал…</p><p class="p1">— А ты бы, дурак, слушал, — сказал Черепанов. — Тогда бы и в армию свою дурацкую не пошел.</p><p class="p1">— Ага. Так бы с тобой по лесам и валандался.</p><p class="p1">— А чем плохо? Свободная жизнь, свободные люди!</p><p class="p1">— Вы его не слушайте, товарищ капитан, — снисходительно, на правах старого знакомого сказал Громов. — Я его очень люблю, конечно. Че — замечательный, он меня классным вещам научил. Костер вот разводить… Мы столько в походы ходили! Меня к нему Каланча привел. Время-то было — сами помните. Все как сговорились спать. Ничего не происходит. Разве похолодает иногда или сгорит что. То есть сыпалось уже, конечно, помаленьку, но как-то решили про это не думать. Спят и спят. А Че — он замечательно будил, спасибо ему, у меня до него вообще вместо мозгов каша была.</p><p class="p1">— У тебя и сейчас каша, — плюнул в костер Черепанов.</p><p class="p1">— Я тогда понял… да он не очень и скрывал, правда, Че? Это все про железную дорогу — выдумка пацанская, нам ведь всем по двенадцать лет было. У нас рядом с домом была желездорожная ветка, он нас к ней водил и рассказывал. Что вот, это часть огромного кругового движения, благодаря которому страна ограждена от всех. А на самом деле он просто людей воспитывает, нормальных. Кому больше нравится жить в лесах. И я считаю, он правильно делает. Я в педагогическом когда учился — сразу понял: настоящая педагогика — вот она. Это просто я в коленках слаб, а то обязательно бы с ним в леса ушел.</p><p class="p1">— Где тебе, рыбья кровь, — беззлобно заметил Черепанов. Он, кажется, не особенно огорчался, что бывший воспитанник разоблачает его.</p><p class="p1">— Он таким образом воспитывает храбрость, — продолжал Воронов. — Если человек может железную дорогу взорвать, то он и власти не боится. Мы еще склады боеприпасов в последнее лето перед войной немножко грабили… Так что если не убило кого, может, это благодаря нам. В общем, это воспитание такое.</p><p class="p1">— Догадываюсь, — сказал Громов.</p><p class="p1">— Ну, а хоть бы и воспитание? — горячо заговорил Черепанов. — Пусть это даже игра в войну, вы можете придумать сейчас более осмысленную игру? Может, вот эта война ваша? Да по мне, пусть дети толпами идут в партизаны, а не в эту вашу поганую, извините, армию, где из них сапогами выбивают все человеческое!</p><p class="p1">— Может быть, — сказал Громов. — Ну, а зимой вы тоже по лесам?</p><p class="p1">— Че — по лесам, — ответил за учителя Воронов. — И когорта славных тоже с ним. А остальные по домам, холодно.</p><p class="p1">— А армия воюет всегда и не понарошку, — сказал Громов. — Вот и вся разница.</p><p class="p1">— И за что вы воюете? — вскинулся Черепанов. — Лично вы? Чтобы угнетать самим и не давать другим?</p><p class="p1">— Нет, — сказал Громов. — Я воюю за свой долг. Я здесь родился, это накладывает определенные обязанности. И это единственный способ разорвать круг, если вы этого действительно хотите. Здесь действительно многое по кругу, но это из-за того, что каждый уклоняется от своих прямых обязанностей. В результате и получается круговое движение, которое вы ненавидите. Должен быть человек, который, не задумываясь, не оглядываясь, не спрашивая о смысле, просто выполняет свой долг. Если служебный — то служебный, если воинский — то воинский. Меня призвали, я пошел, я иду по прямой, ни на что не отвлекаясь. А без чувства долга не может быть ничего. Я ценю вашу романтическую затею, хотя и не одобряю взрывания поездов — все равно ведь починят, только люди время потеряют. Но в этом нет свободы. В этом есть произвол, а что такое свобода — я вам не могу объяснить.</p><p class="p1">— Свобода — в армии служить, — усмехнулась скво с гитарой.</p><p class="p1">— Свобода — не бояться смерти, потому что ты презираешь и ее, и все привходящие обстоятельства, — ответил Громов. — Твой долг больше жизни, больше смерти, больше всего. И ничего с этим нельзя сделать. Ты свободен, потому что ты лучше всех делаешь свое дело, и плевать на то, как делают его другие. Это их проблемы, а лучше всех должен быть ты. Но до этого надо дорасти — я не исключаю, что когда-то дорастете и вы.</p><p class="p1">— Как же, как же, — протянул Черепанов. — Насилие — это свобода, ложь — это правда… Граждане вроде вас очень удобны для любого режима. Это их руками построены все Освенцимы.</p><p class="p1">— Про Освенцимы говорит тот, кто ничего не умеет, — устало ответил Громов. — Я не буду с вами спорить, потому что слишком хорошо знаю демагогию всех партизан во все времена. И все эти ваши «Я всегда буду против» мне тоже очень хорошо известны. Вы купили себе правоту, вам очень легко себя уважать, и все, что вы делаете, — тоже ради чистого самоуважения. Подросткам, наверное, это нужно. А взрослому человеку — скучно.</p><p class="p1">— Вы не взрослый человек, вы мертвый человек, — высокомерно сказал Черепанов. — И долгом своим маскируете обычную трусость. Вам страшно лишиться государственной опеки.</p><p class="p1">— Ага, я трус и именно поэтому пошел на фронт.</p><p class="p1">— Пойти на фронт — не храбрость, а тупость. У вас нету силы взять и перестать заниматься бессмысленными убийствами. Просто сказать: я не хочу воевать ни на чьей стороне.</p><p class="p1">— Ага, — повторил Громов. — Очень знакомо. Занимайтесь любовью, а не войнами. Че Репанов. Боливийские леса под Блатском. Будьте реалистами, требуйте невозможного, совокупляйтесь в сельве. Вы-то и запускаете мир по кругу. Кто-то строит, а вы взрываете, и поэтому все всегда не достроено.</p><p class="p1">— Каждому свое, — сказал Черепанов. Видимо, он тоже часто вел такие споры. — Тут никто никого не переспорит. Лучше просто не пересекаться.</p><p class="p1">— Не пересечешься тут, как же, — сказал Громов. — Едешь по заданию, а тут вы…</p><p class="p1">Самая темная ночь бывает перед рассветом. Было темно, и потрескивал костер. Скво сыграла красивый проигрыш и низким голосом запела старинную партизанскую песню «Белла чао».</p><p class="p1">Это была песня итальянских партизан, сочинявших ее в куда более драматических обстоятельствах. Но так она была хороша, что и эти обстоятельства — сырой лес с поддельными партизанами в выродившейся стране — дотягивала до себя, придавая им нечто героическое. Партизаны всех мастей умудрились сделать так, что им оказалось посвящено все лучшее в мировом искусстве. Партизаны — это красиво. О чем может петь регулярная армия? В худшем случае о Родине, в лучшем о том, как дотянется до ближайшей деревни и отжарит там всех девок. Регулярная армия скучна, как все регулярное. Партизан — прелесть беззаконного и неразрешенного; партизанские песни лучше всего поют в Италии, Испании и Латинской Америке, в благодатных землях, где никто ничего не умеет делать, потому что все немедленно отбирают. Партизанский фольклор рождается там, где идет борьба за независимость, а борьба за независимость всегда идет в пышных, ботанически цветущих местностях, где не надо работать, потому что земля родит сама или население умеет с ней договариваться. Там-то появляются захватчики, вроде как в центре Мезоамерики, где жили сначала тихие земледельцы, потом пришли воинственные ольмеки, их выгнали воинственные тольтеки, тольтеков погнали ацтеки, ацтеков покорили инки, а на инков нашлись испанцы, которых потом, впрочем, тоже колонизировали американцы при молчаливом злорадстве коренного населения. Те же из коренного населения, кому надоело ничего не делать, — потому что делать что-либо значило немедленно отдавать все хозяину, — подались в партизаны, уничтожая всех захватчиков по очереди; вот почему в Латинской Америке так много партизан.</p><p class="p1">Партизанские песни поются о быстрых, слезных расставаниях под крупными звездами; о ночлегах в горах и о походной любви с маленькими, смуглыми, отчаянными партизанками, которым жить осталось недолго. Да, впрочем, всем жить осталось недолго, поэтому в партизанских песнях есть гордая жалобность, заранее ощутимое сострадание ко всем участникам сюжета. Партизанская песня всегда поется об истерзанной Родине, которую нам никогда не вернут. И в самом деле, когда коренному населению удавалось ненадолго вернуть свою истерзанную Родину, оно первым делом переставало работать, так что железные дороги, дворцы и теннисные корты захватчиков немедленно приходили в упадок. Некоторая часть коренного населения, привыкшая к войне, не удовлетворялась тихой жизнью на Родине и принялась устраивать военные перевороты, в которых все свергали друг друга. Захватчиков было столько, что никто уже не помнил, кто первый, а потому главным населением каждое считало себя. Девятнадцатилетние генералы входили в разрушенные дворцы и вырезали прислугу, а пожилые писатели из бывших журналистов писали об этом короткие романы длинными фразами. Остатки свергнутого режима уходили в горы партизанить и тем покупали моральную правоту. Президентский дворец горит, в роскошном саду при дворце не смолкает перестрелка, американские вертолеты обстреливают окрестности, отряд уходит в горы, у меня пятнадцать минут, ночь, океан, бетонная набережная, запах гнили и водорослей, прощай, Росита, больше мы никогда. Смуглая скво еще перебирала струны, и партизаны, продолжая петь, поднимались, затаптывали костер и строились в ряды.</p><div class="poem">
<div class="stanza">
<p class="v">— Наш час! Настал! К оружию, мой друг!</p>
<p class="v">Студент! Шахтер! Крестьянин, металлург! —</p>
</div>
</div><p class="p1">пели они по-испански, потому что по-испански красивее. Все так же, не умолкая, они построились в колонну по три и ушли куда-то в глубь леса. Почему партизанские песни всегда прекрасны? Потому что партизаны всегда правы. Партизаны, черт бы их побрал, хорошо устроились. Ни у кого из людей более мирных и легальных профессий нет такой увлекательной мифологии. Девушки любят партизан — вероятно, еще и потому, что партизаны всегда ненадолго, не успеваешь соскучиться, как уже убили или спрятался.</p><p class="p1">— Вот едут партизаны подпольной луны, — сказал Громов, когда они с растерянно улыбающимся Вороновым остались вдвоем около догорающего костра. — Пускай их едут. Черепанов мне объяснил, что Копосово отсюда в десяти километрах на восток. Подъем, Воронов. Ино еще побредем.</p></span></span></span></span>
