<p class="p">1</p>
</div><p class="p1">Прямо за домом, в котором Громов жил ребенком, начиналось капустное поле. Там уже был колхоз, а за колхозом кольцевая дорога. Прямо перед кольцевой дорогой стояли три высокие толстые трубы — то ли ТЭЦ, то ли бетонный завод. Он так и не узнал этого никогда, и не хотел узнавать. Если узнаешь, трубы потеряют все свое очарование. Еще на закате был хорошо виден колхозный элеватор — загадочная Лобразная конструкция. Там кончалась Москва. Квартира выходила окнами на поле и три трубы, а балкон лестничной клетки — на окраинный спальный район. Громов любил туда выходить и смотреть, как люди возвращаются с работы. Почему-то все время была весна, небо было зеленое. Вероятно, он запомнил один-единственный вечер, самый первый, с горьким запахом пыли и почек, — и все остальные поместились в него. Мы ведь о каждом периоде нашей жизни помним что-то одно: одно пробуждение зимой, ознобный путь в школу, тошнотный контрольный свет зудящей лампы; один весенний вечер на балконе; один просторный июньский день со шторами на сквозняке и блаженной прохладой, гладящей разгоряченное тело.</p><p class="p1">Прямо к дому подходила железная дорога, и паровозы призывно трубили за капустным полем. Они там маневрировали, железный диспетчерский голос доносился до балкона, иногда поезд проходил мимо самого подъезда. Он шел очень медленно, таща за собой два-три грузовых вагона, и нетрудно было в них вскочить. Некоторые мальчишки вскакивали и уезжали навсегда. Об этом во дворе рассказывали шепотом. Никто не знал, куда уводит железная дорога. Однажды, уже десятилетним, Громов решился пройти по ней дальше обычного — она уходила на шаткий железнодорожный мостик, казалось, готовый развалиться от первого толчка, но выдерживавший весь этот гигантский чугунный груз; дальше шла по мокрым полям, вдоль рощи — и упиралась в тяжелые, наглухо запертые бетонные ворота. Конечно, их открывали перед паровозом, но что там — Громов не видел. Он пошел в другую сторону — там была грузовая станция, красное здание с белыми фонарями в жестяных конусах. Откуда поезд приходил на эту станцию, Громов не знал и никогда не хотел узнать. Он догадывался, что когда-нибудь ему это откроется.</p><p class="p1">Если сесть на этот поезд, можно было попасть в удивительные места. Громов понимал, что сетью железных дорог опутана вся его страна, и пересечения их непредсказуемы, а пункты назначения условны. По железной дороге можно уехать куда угодно, причем вопрос о конечной цели решает она сама — огромный чугунный, латунный стальной механизм, работающий по собственным законам. Можно ехать на юг, а приехать на север, причем дорога сама переводит стрелки. Громову купили игрушечную железную дорогу, но он никогда не любил в нее играть, потому что настоящая была интересней. Он мог ее представлять до бесконечности. На всех пунктах пересечений, поворотов и лучевых сгущений множества сходящихся путей дежурили таинственные, никогда не спавшие по ночам диспетчеры. Они жили в уютных будках, днем ненадолго ложились на топчаны, покрытые промасленной ветошью, и забывались коротким тревожным сном. Есть вещи, впивающие многолетнюю человеческую усталость — оттого на них так уютно спать, так хорошо ими укрываться; в учебке Громов иногда ходил помощником дежурного по батальону и, присаживаясь на топчан, на котором спал три часа этот дежурный, ощущал впитавшееся в него утомление; на таких же топчанах, на которых мгновенно засыпаешь, отдыхали в свои три часа и железнодорожные дежурные, но и во сне их сознание отсчитывало стыки, переводило стрелки, и снились им только паровозы. Ночами они пили черный чай из тонких стаканов с железными подстаканниками, грызли железнодорожный сахар, нажимали красные кнопки. Человек, севший на поезд, который тяжело, с железным скрипом полз мимо громовского дома, выпадал из обычного пространства и попадал в особое. Его время начинало подчиняться железнодорожному расписанию. Железная дорога снимала с пассажира всякую ответственность, но он зачем-то был нужен. Все было ради него. Можно было не раздумывать о всяких глупостях — куда повернуть, где остановиться. Можно было сосредоточиться на главном, заложив руки за голову и покачиваясь на стыках. Железная дорога, ж/д, раз и навсегда кем-то запущенная, решала тут все.</p><p class="p1">Громов всегда знал, что когда-нибудь приедет домой по этой дороге. Он не знал только, что дом будет тогда в совершенно другом месте. Москва переменилась, и закон, по которому население в эпохи катастроф и оскудений сбивается в тесные страты, сбылся и на ней. Она разделилась на элитные, спальные и трущобные кварталы, и район, в котором прежде жил Громов, стал теперь элитным. Колхоза больше не было, поле еще в девяностых застроилось коттеджами — тут был теперь очередной квартал «Золотые ключи», куда сползлись магнаты со всех нефтедобывающих регионов. После открытия флогистона и разразившейся катастрофы единственным видом вложений осталась недвижимость — все остальное уж вовсе никуда не годилась; постепенно главный элитный квартал оказался именно тут, а коренным жителям района новая жизнь оказалась не по карману. Отец и мать Громова продали квартиру на восьмом этаже и переехали на новую окраину — их собственная считалась теперь центром. Они жили уже за кольцевой, впритык к ней, и добираться до них от прежнего жилья, к которому вывез Громова и Воронова скрипучий, черный от копоти паровоз времен гражданской, надо было не меньше часа на метро и автобусе.</p><p class="p1">— Ну что же, бывай, Воронов, — сказал Громов, подавая спутнику руку. — В Москву я тебя доставил, дальше сам сориентируешься. Отвозить тебя непосредственно к мамке приказа не было.</p><p class="p1">— Разберусь, товарищ капитан, — радостно кивнул Воронов. Он глазам не верил, что оказался в Москве. Как это так — ехали-ехали, и вдруг Москва.</p><p class="p1">— В армию, я так полагаю, ты больше не вернешься, — полуутвердительно заметил Громов.</p><p class="p1">— Мне товарищ инспектор сказал — больше нет во мне необходимости до особого распоряжения, — ответил Воронов, испытывая легкое смущение.</p><p class="p1">— Ну и к лучшему. Зачем в армии солдат с даром выживания? Там другие таланты нужны. Впрочем, ладно. Личных претензий к тебеp не имею, спасибо, что выручал. Будь здоров.</p><p class="p1">— Спасибо, товарищ капитан! Я позвоню, — сморозил Воронов явную глупость, потому что телефона громовского не знал, да Громов бы и не дал. Наверное, он хотел позвонить ему в часть. Но он уже не очень хорошо соображал. Видно было, что душой он давно дома и что, сделав первый шаг к троллейбусной остановке, в ту же секунду забудет о Громове навсегда, насовсем. Он был удивительно отходчив — Громов вспомнил, как, едва избежав гибели, он принялся болтать с ним в поезде. Удивительно пластичная психика была у этого солдата. Наверное, это и казалось сумасшедшему Волохову приметой коренного населения — «смотри, они же ничего не помнят, ничему не учатся, капитан…».</p><p class="p1">— Свободен, — с легким презрением сказал Громов, и Воронов помчался к остановке. Громов не стал смотреть ему вслед. Он поправил фуражку и вещмешок, постоял, вдыхая московский воздух, и под мелким дождем направился к метро. Запахло мокрым асфальтом и пылью. Много раз представлял он себе, как вернется и вдохнет этот запах. Теперь он его вдыхал — и почти ничего не чувствовал. Дело, наверное, было в том, что он вернулся не с победой, и радоваться было нечему. Без победы его частное возвращение не имело никакого смысла, да и не возвращение это было, а отпуск, и до конечного его пункта — Средней Азии — он совсем еще не добрался. Тут был пункт перевалочный, промежуточный, — несколько дней у родителей, и только. Впрочем, от Маши давно ничего не было, и Громов не знал, задержится он у родителей или поедет дальше. Надо было осмотреться.</p><p class="p1">Резиновый запах метро не изменился, и те же белые и голубые поезда бегали по кольцевой, только васек в последних вагонах уже не было — правительство, надо полагать, взялось за серьезную чистку города. И правильно, а то что же за бардак. Почему-то и метро, и множество красивых девушек в летних платьях, легких плащах, с прозрачными сложенными зонтами, — тоже вовсе не радовали Громова. Наверное, он не успел прийти в себя, а может, слишком резким оказался переход от красноармейского телеграфиста и странного вагона к нормальному городу, каким даже в военное время была Москва. А может, он подспудно злился на нее за то, что она такая нормальная — он не мог бы сказать «мы там кровь проливаем», и на это злился вдвойне, но мы там в грязи копошимся, по окопам сидим, бессмысленно берем и сдаем деревню за деревней, а тут — словно и не делается ничего, словно это так и надо: они в своих ролях, мы в своих. Им достались роли москвичей, нам — окопной грязной швали, и что самое интересное, я выбрал эту роль сам, потому что москвича мне играть разонравилось. Какие же претензии? В том и беда моя, что я никому не могу предъявить претензии, потому и не радуюсь ничему. Никто не виноват, и никому я не благодарен. Нельзя воспитать душу, не утратив способности к сильному страху, отчаянию и радости: что же мне теперь удивляться, что моя воспитанная душа не выпрыгивает из груди при виде родного города? Я не знаю даже, обрадуюсь ли, увидев отца и мать. И не представляю, узнают ли они меня.</p><p class="p1">Он вышел на своей станции и принялся ждать маршрутку, прождал двадцать минут, пока случайный прохожий не объяснил ему с тайной радостью, что маршрутки здесь больше не ходят — либо лови такси, офицер, либо иди пешком. Денег у Громова не было, да он и не хотел ловить такси. Пройтись пешком даже лучше, решил он, можно успокоиться. Он не стал звонить родителям, да и мобильный разрядился. Можно, конечно, по автомату — мелочь-то найдется, — но он никого не хотел предупреждать: сначала — потому что не был уверен в отпуске, потом — потому что не был уверен, что доберется, а теперь — потому что не хотел портить радость. Счастье, о котором ты предупрежден, всегда обманывает. Надо явиться вот так, без звонка, — правда, он не знал, застанет ли родителей дома. Было около трех. Мать в это время обычно уже приходила из школы, а отец давно перешел на неполный рабочий день.</p><p class="p1">Громов шел по Москве и все отчетливее понимал, что именно его в ней смущает. Они с родителями переехали в этот район незадолго до войны, и район был тогда совсем другой — казалось, вместе с ними сюда переехала память громовского детства, ушедшего в самые глубокие, почти неощутимые слои памяти. Эта часть Москвы — сравнительно новый район, выстроенный в последние лет пять, — должна была походить на современный мегаполис, а походила больше всего на спальный район конца семидесятых. Тут даже стояли газетные стенды с ободранными газетами и афишами, по которым Громов когда-то учился читать. Кажется, он какие-то даже помнил по детству. Родители собрали вокруг себя все черты и приметы громовских первых лет, все скаталось на московской окраине, как тополиный пух скатывается в грязные валики. Словно не по городу путешествовал он, а по собственному мозгу, опускаясь глубже и глубже. Вообразим себе город, в котором гаснут огни, отключается канализация, темнеют и заселяются неведомыми сущностями окраинные улицы: старый, старый сюжет, нарисовавшийся ему еще в то время, когда он запоминал сюжеты. Что останется последним? Детский сад. Все, кроме детской памяти, сожрано безумием. Громов не ходил в детский сад, он был балованным ребенком.</p></span></span></span></span>
