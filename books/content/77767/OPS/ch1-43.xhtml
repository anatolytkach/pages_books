<p class="p">2</p>
</div><p class="p1">В его спальне на первом этаже она как будто немного успокоилась. Ушла эта жреческая страстность, она снова была его Аша — покорная и медленная.</p><p class="p1">— И что ты скажешь? — спросил он мягко. — Как мне понимать всю эту ерунду?</p><p class="p1">— Да чего уж теперь понимать, — сказала она. — Вытравлять его поздно, да и не дам я. Волкам нельзя вытравлять. А у меня другого не будет, сама знаю. Надо мне в Дегунино идти.</p><p class="p1">— В Дегунино? — переспросил он, не понимая. Что-то он сегодня уже читал о Дегунине. — С какой радости?</p><p class="p1">— Старшие наши там живут. Тетка моя там. Если скажут, чтоб осталась, — значит, можно, значит, не сбудется еще. А если нельзя, уйду отсюда. Может, если куда в горы уйти, тихо жить, то не страшно.</p><p class="p1">— Подожди. Можешь ты мне объяснить все с самого начала, как оно есть?</p><p class="p1">— Ох, — она села на кровать. — Что ты еще не понял? Я сама не знаю ничего. Кто родится, чего натворит — этого мы никогда не знаем. Мы про детей своих одно знаем: волк будет или не волк. А этот будет всем волкам волк, и от него всем конец. Я и чуяла, что конец. Думаешь, знамений нет? По всему видно — все из последних сил скрипим, по дну скребем. Но как-то я верила все, что обойдется. Столько раз обходилось.</p><p class="p1">— Подожди. Кому от этого конец? Нам, вам, всему свету?</p><p class="p1">— Нет, свету-то ничего не будет. Мы же не свет, как ты не понял-то, губернатор? Это я всю жизнь тут сижу, колесу молюсь. Ты ездил, мир видел, — должен как-никак понимать, что здесь все не так. Третью тысячу лет бережемся — все думаем, не будет ничего, если с круга не соступать. Весь-то мир сколько раз уж кончился да начался, а у нас все то же. Одного только нельзя — нельзя, чтобы один из ваших любил одну из наших; это старая тайна, наши все знали. Это с Рюрика еще. Как пришел Рюрик, так и запретили.</p><p class="p1">— А от хазар? — поинтересовался губернатор. Он не мог бороться с суеверием, пока не уяснил его вполне; надо было выспросить у нее все об этом странном предрассудке. Наверняка отголосок древнего табу на близость с захватчиком. — От хазар вам можно рожать?</p><p class="p1">— Я про хазар не знаю, я свой запрет знаю. Он у нас давно наложен. Мне с тобой нельзя, с человеком северного государя. У других, может, другой запрет. Может, от нашего волка хазарка родит — и конец всему.</p><p class="p1">— Вот странность, — улыбнулся губернатор. — Почему так? Почему хазарка? Они что, женственная нация? Я читал такое…</p><p class="p1">— Ни при чем тут женственная нация, это старый запрет, что ты хочешь от меня? — Она подняла на него глаза и посмотрела с такой тоской, что он почувствовал полное свое бессилие перед этим древним унылым бредом. — Как хазарка от волка родит, так и всему конец; и уж верно, сейчас какая-нибудь хазарка уже в тягости… Бабушка говорит, беда одна не ходит. У нас все парами — может, и там уже конец… Ты что же, сам не видишь, человек государев?</p><p class="p1">Сказать, чтобы губернатор вовсе этого не видел, — было нельзя; но он и подлинно был человек государев, ставящий долг выше разума. Разум лукав, обманет; глупы те, кто противопоставляет разум и тело. Разум — верный слуга тела, ищущий обходных путей и хитрых ходов для реализации главных телесных потребностей: сладко есть, мягко спать… Все, что понимается разумом, — чуждо и враждебно духу; губернатор знал, что и в православии — органически русской, государственной религии, — дух выше разума, а разуму не оказывается ни малейшего уважения. Пусть его любят позитивисты, просвещенцы, плоско мыслящие европейские демократы, дошедшие ныне до последней степени вырождения; разумом он понимал, что время близко, — но дух подсказывал ему, что оно близко всегда, что Россия никогда не жила иначе, а потому не следует поддаваться слабости. Как политик он начал думать и действовать в эпоху, получившую название первой стабилизции — эпоху дорогой нефти, накануне того самого момента, как в мире запахло флогистоном. Кто из верящих разуму смог бы предсказать тот сказочный период, вожделенный российский подъем, взявшийся ниоткуда, из высоких нефтяных цен? Все уж и надеяться перестали на стабильность, и на тебе — зарплаты, кредиты, планирование жизни на десять лет вперед, словно и катаклизмов никаких не предвидится впереди… И какой разум предсказал бы, что пять-шесть лет спустя никакая нефть не будет уже никому нужна, а отапливаться весь мир станет тем, чего у России нет и никогда не будет? Кто подумал бы, что какой-то чертов зеленоватый газ, фонтанами бьющий по всей Европе и по Штатам, найденный, говорят, даже в Гренландии, глубоко залегающий, но заменяющий собою любое прочее топливо, — резко переменит конъюнктуру и оставит Россию наедине с эпохой второй стабилизации, то есть с нынешней, когда нефти стало хоть залейся и не осталось ничего, кроме нефти? Никаким разумом нельзя было предугадать этот путь; пусть разум его отлично сознавал, что никакой стабильности на самом деле нет и что под тонкой коркой по-прежнему зеленеет зыбкое болото, — но люди ходили по этому болоту, не замечая, как оно булькает, качается, вздувается пузырями. И способность их не задумываться была залогом того, что русское чудо — ходьба по трясине — будет возможна и впредь. Для губернатора не было знамений. Знамения — удел пошляков и тупиц, уклоняющихся от выполнения своего дела; точно так же ищут оправдания своей лени все, кому нужен зачем-нибудь смысл труда. Труд сам себе смысл, и не надо спрашивать о целях. Работай — и все; и болото будет тебе тверже мрамора, а песочный замок простоит вечно.</p><p class="p1">— Знамений нет, Аша, забудь о них. Я слов таких слышать не хочу.</p><p class="p1">— Ну, не слушай. У вас, северных, всегда так: чего я не слышу, того нет.</p><p class="p1">— Что ты намерена делать?</p><p class="p1">— Сам посуди, — тихо сказала она, не глядя на него. — Тут мне жизни не будет, наши везде достанут. Они куда хочешь просочатся, это просто ты не знаешь еще. Ничего, узнаешь. Я в Дегунино пойду, и если там примут меня — там останусь. А не примут, скажут — нельзя, так в Азию пойду. Волки, когда их свои выгоняют, в горы уходят. Там буду ребеночка растить, выращу — погляжу. Увижу, что и вправду злой, — не выпущу оттуда. Но я так выращу, что у меня злого не будет.</p><p class="p1">— Подожди. Они же все говорят, чтобы я уходил.</p><p class="p1">— Они говорят, потому что думают: ты уйдешь, а они у меня ребенка вытравят. Вытравлять нельзя, поздно, он живой уж, — а они свое: вытравим. Я бабке говорила, ее ничем не собьешь.</p><p class="p1">— Как же она тебя отпустила ко мне?</p><p class="p1">— А чего ей бояться. Она же знает, что наши везде пройдут, если надо. Это убить меня они не могут, силы у них нет на это, — на такое сила не у всякого волка есть. Это им нанимать кого-нибудь надо… Ну, наймут. Всегда находили, когда им надо было.</p><p class="p1">— А если я не уеду?</p><p class="p1">— Значит, при тебе все сделают. Ты им не такая большая помеха.</p><p class="p1">— А вместе нам никак нельзя остаться?</p><p class="p1">— Разве если ты со мной в горы уйдешь. — Она впервые усмехнулась — как ему показалось, неприязненно. — Уйдешь со мной в горы, гублинатор? Будем там вдвоем ребеночка растить?</p><p class="p1">Даже если бы он был готов ей ответить «С тобой — на край света», даже если бы возможна была эта пошлость, он никогда не произнес бы этого вслух — вся его долго воспитываемая сдержанность противилась открытому выражению чувств; но он отлично знал, что никуда и никогда с Ашей не уедет. Он любил ее, в том сомнений не было, и даже хотел, пожалуй, чтобы она родила ему ребенка, но бежать куда-то с туземкой? Да главное — бежать не пойми от чего, поверив в идиотскую легенду; вступить статистом в чужую игру! Он и ее, конечно, не отпустит никуда, — но сама мысль, что она допускает его бегство… Положительно, он ее распустил!</p><p class="p1">— Да знаю, — сказала Аша устало. — Никуда не пойдешь. Где тебе. Будешь тут сидеть, дела делать, бумаги перекладывать.</p><p class="p1">— А ты бы хотела, чтоб пошел?</p><p class="p1">— А то нет. Страшно одной, в горах-то. Я с тобой привыкла, жила, как за стеной, кормили опять же. А туда пойдешь — что делать будешь? До Дегунина-то, и то далеко.</p><p class="p1">— Скажи на милость, какое Дегунино? Прямо как сговорились все. В газетах каждый день — Дегунинский котел, у тебя тот же бред… Ты газет, что ли, начиталась?</p><p class="p1">— Сам бы съездил, все бы понял, — сказала Аша. — Дегунино — место непростое, потому туда все и едут. Все едут, всех принимают, да не все задерживаются. Там надолго не задержишься — другие едут, надо их принимать, а всем места нету. Дегунино — это где Даждь-бог живет, так наши говорят. Ну, навряд он там живет, но храм его там, это я тебе, губернатор, точно говорю. Главный наш храм, красоты необыкновенной. У Даждь-бога мало храмов, до сейчас достоял один всего. Знаешь, почему мало?</p><p class="p1">— Догадываюсь, — сказал губернатор. Он знал, какие из коренного населения вырастали строители, и ненавидел убожество сельских построек, сараюх, развалюх — всего национального зодчества. Особенно его бесила манера строить без гвоздей: все разваливалось, но жителям, кажется, этого и нужно было. Аша говорила, что щелями дом дышит.</p><p class="p1">— Ни о чем ты не догадываешься. Гадатель тоже. — Она засмеялась, уже без злости, и он с облегчением подумал, что, кажется, оттаяла. — Беспокоить его не хотим. Ему от храмов беспокойство одно, они у него как приемная. Ты бы небось с ума сошел, если б у тебя в каждой деревне приемная была. И всюду езди, всех слушай… Это ваши как пришли, сразу — давай храмы строить. Подсмотрели у наших, что мы луковки делаем, и стали свои купола лепить. Ведь нигде больше луковок нет, это наше, сами придумали. И мир весь — луковица, знаешь почему?</p><p class="p1">— Тоже догадываюсь. Ваши, чтобы начальство разжалобить, очень любят лук разводить. Разведут, глаза им потрут — и бах на колени, просить о чем-нибудь…</p><p class="p1">Этой шутки она не приняла.</p><p class="p1">— Много у тебя плакали в приемной?</p><p class="p1">— Бывало.</p><p class="p1">— По такой жизни, какую вы устроили, побольше надо плакать, губернатор.</p><p class="p1">— Ладно, ладно. — Он мог бы поспорить, но не хотел: знал, что чувства благодарности тут не ведают, а потому и незачем перечислять благодеяния.</p><p class="p1">— Луковица — это потому, что так все устроено. Человек — луковица, земля — луковица… Сдираешь, сдираешь, раз слой, два слой — а там ничего. Пусто там. Потому что не в человеке смысл, а там, — она показала на потолок, в свое низкое коренное небо. — Туда и луковица тянется. Ее закопаешь, а она прорастет. И репка так же. Потому и человека закапывают. Если не закопать, он так просто сгниет, и все. А если зарыть, то из него душа прорастает. Это все, зеленое, что растет, — это души растут, понимаешь теперь? Вот почему без погребения оставлять нельзя.</p><p class="p1">— Что ж ты мне говорила, что у вас бессмертия нет?</p><p class="p1">— А его и нет, — сказала она, — какое же бессмертие? Помер, и все. А что из человека растет — это ведь уже не человек, это дерево. Ни поговорить, ничего. Спилить можно, срубить можно… А растет при любой погоде и не жалуется. Это и есть душа, самое в тебе ценное. Из одних ель растет, из других дуб. Из кого-то яблонька. Из тебя, губернатор, будет расти лопух, потому что ты простых вещей не знаешь.</p><p class="p1">Это она говорила прежним ласковым голосом, и он уже подумал, что наваждение прошло; в качестве жрицы, приказывающей прыгать на месте, она никак его не устраивала.</p><p class="p1">— Ты сама придумала — про деревья?</p><p class="p1">— Да как же такое придумаешь? Это просто так и есть. Человека почему зарывают? Можно сжечь, как ваши делали. Ваши никогда не зарывали. Это для того, чтобы из него не выросло ничего. Ваши боятся, что вырастет. Сожгут, и прах по ветру. А так нельзя. Из человека должно дерево вырасти, для того, может, и люди нужны, чтобы деревья не переводились.</p><p class="p1">Очень логичная мифология, подумал он. Человек родится для того, чтобы стать деревом: утратить душу и речь, превратиться в молчаливую растительную сущность; христианство считает главным в человеке человеческое, а потому все природное отмирает и делается глиной, — а эти придумали в своем духе: душой, то есть лучшим в человеке, как раз и называется растительное. Все людское сгниет — и культура, и долг, и память, — а то, что здесь зовут душой, как раз и есть слепая, тупая растительная сила. Друидическое обожествление деревьев, предпочитание деревянного зодчества, попытка соблюдать растительный цикл жизни — зимой спать, летом совокупляться и плодоносить… Потом настроят домов из этих душ, другие души сожгут в печке — и нормально: послужил человек.</p><p class="p1">— И что, ваших подлинных храмов только и осталось, что в Дегунине да в паре других мест?</p><p class="p1">— Ну. А Жаждь-богу и храмов не ставят. Чего ему молиться? Сам придет и свое возьмет, просить не надо.</p><p class="p1">Губернатор и здесь поразился точности мифа. Добро нуждалось в постоянных подсказках, молитвах и разъяснениях — вдруг не того облагодетельствует?! — тогда как зло приходило само и действовало без указаний. Жаждь-бог был ветхозаветней, жестковыйней Даждь-бога. Он, вероятно, и появился раньше, но туземной версии происхождения мира Аша ему пока не рассказывала. Он и о душах-деревьях никогда не слышал, но, вероятно, теперь ему как отцу ребенка было положено знать побольше; кажется, в последнее время она и впрямь с ним откровеннее, чем прежде, вот и плавала при нем…</p><p class="p1">— Но он же обитает где-то? — спросил губернатор.</p><p class="p1">— Обитает, — серьезно сказала Аша. — Две главных деревни у нас. Дегунино — Даждь-божье, а еще второе должно быть. Видишь, ты сам и догадался.</p><p class="p1">— Москва! — победоносно крикнул губернатор. — Угадал, да?</p><p class="p1">Аша не поддержала и этой шутки.</p><p class="p1">— Жаждь-бог в своей деревне живет. Мы ее вслух называть не любим, а чужой и не доберется туда. А и доберется — ничего ему не будет, на него наши законы не действуют. Та деревня глубоко в лесах, и знать про нее тебе не надо.</p><p class="p1">— Ладно, не томи. — Ему казалось, что она успокаивается, рассказывая ему свои сказки.</p><p class="p1">— Не скажу, губернатор. Не надо тебе этого знать. Такое может быть — кому мы, волки, про это скажем, тот туда и пойдет. А оттуда никто не приходил еще.</p><p class="p1">— Ты мне скажи хоть — где она? Не у меня в округе?</p><p class="p1">— Успокойся, не у тебя. Она далеко отсюда, и леса кругом. Туда так просто не зайдешь.</p><p class="p1">— А как зайдешь?</p><p class="p1">— Надо, чтобы кто-то слово тебе такое сказал. Тогда ты по этому слову сразу туда и попадешь. Понял?</p><p class="p1">— Даже догадываюсь, какое слово, — кивнул губернатор. — Надо западный ветер попросить.</p><p class="p1">— Шути, шути.</p><p class="p1">— Слушай, ну а чем оно так хорошо-то? Дегунино это?</p><p class="p1">— О! — Тут она снова повеселела. — Я там один раз всего была, бабка меня возила. Даждь-богу посвящала, в храм носила. Ты не знаешь, как там! Это самое красивое место, верно говорю. Оболочное, постолочное, колокольное. Я там и печку видела, слыхал про печку?</p><p class="p1">— Что за печка?</p><p class="p1">— Такая печка, наша, пироги печет. Мне с ревенем испекла. Она не каждому ребенку печет, даже волку не всякому. А мне взяла и испекла, это, говорят, особая судьба. А если кому в пироге боб, тот самый великий волк, но из наших давно никому боба не было.</p><p class="p1">Бедная девочка, подумал он. Старуха повезла ее в гости к дальней деревенской родне, и там, среди сельской скудости, чтобы хоть как-то скрасить жалкую жизнь, ей рассказали сказку про волшебный пирог с ревенем. Мало же было в ее жизни сказок, мало чудес — если пирог с ревенем до сих пор для нее чудо, а несчастная деревня в средней полосе выглядит островом изобилия!</p><p class="p1">— И яблоньку видела, — продолжала Аша. — Прямо в лесу стоит, ветки до земли. Сама растет, сама плодоносит, не поливать, ни копать — ничего! Мне яблоко дали, ох, какое яблоко! Вот такое, с голову твою. — Она обняла его голову и прижала к груди. — Ах, хорошо в Дегунине, как хорошо в Дегунине! Если выпадет мне уходить, я хоть посмотрю напоследок.</p><p class="p1">— Что ж ты туда каждый год не ездила?</p><p class="p1">— А нельзя, — просто ответила она, удивляясь, как он может не знать таких несложных вещей. — Если каждый все будет — в Дегунино да в Дегунино, остальная земля совсем запаршивеет. Люди на своей земле должны жить. Туда и так все едут, вот и на войне вашей все только туда… Сколько деревень кругом, ты погляди, — ни за одну больше не дерутся! Ее и на той войне десять раз штурмом брали да обратно отбивали, почитай, написано.</p><p class="p1">Все-таки надо почитать, подумал он. Бред бредом, а кое-что его точило: положим, Аша все врет, все это дурацкие выдумки от начала до конца. Но отчего в самом бессмысленном населенном пункте, чье стратегическое значение стремится к нулю, образовался дегунинский котел? Почему это несчастное Дегунино берут и отбирают, с какой радости? Или это в ашиной голове, после чтения официальных реляций, возникла эта причудливая версия — раз берут, значит, надо, значит, там рай? Наложилось как-то на детские представления? Тоже странное совпадение: бабка ведь возила ее именно в Дегунино… Но это была единственная возможность рационально объяснить странный миф о даждь-божьей деревне: наверняка она все придумала сама, думать так ему было проще и спокойней. Нормальная компенсация дурной, нудной, холодной жизни: где-то там есть правильная деревня…</p><p class="p1">— И ты туда поедешь? Со мной не останешься?</p><p class="p1">— Завтра же поеду. Если только земля не встанет. Может и земля не пустить. Хотя такое — вряд ли. Вряд ли, сам посуди, — кажется, она уговаривала не его, а себя. — Пока в Дегунине не решат, как ей встать? Неизвестно же еще. Мало что старики говорят. Пусть в Дегунине посмотрят, да?</p><p class="p1">— Да, да. — Он погладил ее по спине — и поразился тому, как сведены у нее все мышцы, в каком страшном напряжении остается она до сих пор, хотя вот уж час как они лежат рядом и он пытается ее разговорить. — Спи, тебе надо много спать. Я не знал, а то бы давно уже не…</p><p class="p1">Он хотел сказать, что не допускал бы никакой близости, признайся она ему, что беременна: на четвертом месяце, знал он, уже опасно, да ей и не до того сейчас. Она все поняла.</p><p class="p1">— Мне от тебя никакого вреда не будет. Мне от другого вред будет.</p><p class="p1">— От чего?</p><p class="p1">— Узнаешь еще. Погоди, много всего узнаешь.</p><p class="p1">Губернатору казалось, что они проспали всего час, но когда его разбудил оглушительный, показалось ему, телефонный звонок — уже светало. Снов не было, спал он путано, часто просыпался, мерз, смотрел на Ашу — все казалось, что сбежала; прыгнув к телефону, взглянул на часы — половина седьмого. Вызывала Москва.</p><p class="p1">— Слушаю, — буркнул он, не заботясь принять этакий бодрый и гордый вид, как бы еще не ложился, весь в государственных делах. Напротив, ему хотелось показать, что ради Москвы он не станет притворяться чрезмерно деятельным — стесняться нечего.</p><p class="p1">— Примите распоряжение, — равнодушно сказал секретарь. — Бороздину Алексею Петровичу, от пятнадцатого июля. Цитата дня: от святителя Евстахия Дальнобойного глас шестый. Аще же кто не чтит белоснежныя памяти предков, кровью своею поливших землю Отечества, широко распространенного во все пределы, того отрыгнем из уст своих, как отхаркиваем склизкую мокроту. Слово дня: консервативная модернизация. Солнце в овне, Венера благоприятствует эксперименту. По друидическому календарю день традесканции, благоприятствует гаданию. Вам надлежит сего дня двенадцать часов Москвы прибыть Архангельское получения дальнейших указаний самолет выслан категория срочно, срочно, как поняли, прием.</p><p class="p1">— Вас понял, — севшим голосом сказал губернатор. Вызов в Москву после всей этой непременной гороскопно-цитатной пурги, в последнее время открывавшей все распоряжения, был для него как удар обухом. Он мысленно приготовился к идиотскому распоряжению вроде анемометров, но дело было серьезнее. Он отчего-то с самого начала знал, что ситуация связана с Ашей, и тут же вспомнил ее слова о том, что волки пролезут, коли понадобится, в любую щель; однако допустить самую мысль о том, что на самом верху знают о туземцах и беспокоятся об их смутных верованиях, он не мог ни при какой погоде. Если наверху солидарны с Рякиным и Стешиным, это означает конец безоговорочный и бесповоротный.</p><p class="p1">Аша проснулась и села на кровати.</p><p class="p1">— Вызвали, да? — хрипло спросила она.</p><p class="p1">— Да, — он не видел смысла врать.</p><p class="p1">— Ну, я ж говорила. Значит, и они знают.</p><p class="p1">— Аша, ну что такое! — закричал он, перестав сдерживаться. — Ты же не дура, не дикарка, в конце концов! Вас же всех учили чему-то! Ты всерьез веришь, что меня вызывают в Москву, потому что ты можешь родить антихриста?!</p><p class="p1">— Я не верю, я знаю, — почти беззвучно ответила она.</p><p class="p1">— Ты полетишь со мной.</p><p class="p1">— Никогда. Они меня прямо там заберут.</p><p class="p1">Господи, как в них укоренился страх, что заберут, подумал губернатор. А с другой стороны, что еще с ними тут делали?</p><p class="p1">— Хорошо. Что ты предлагаешь?</p><p class="p1">— Прямо сейчас в Дегунино меня отправь. Или на поезд посади, или машину дай.</p><p class="p1">— Где твое Дегунино?</p><p class="p1">— От Курска будет километров двести, но там петлять надо. Я дорогу знаю.</p><p class="p1">— Если там действительно боевые действия, ты никак туда не попадешь.</p><p class="p1">— Я-то попаду, — сказала она, глядя в сторону. — Я туда всяко попаду. Мне лишь бы по дороге никто зла не натворил.</p><p class="p1">— Что, могут?</p><p class="p1">— Ой, могут. Все уж знают небось. Наша почта быстрая.</p><p class="p1">— Я сам отвезу тебя.</p><p class="p1">— Далеко везти, губернатор. Тебе нельзя отлучаться настолько. Ну, а скажут мне, чтоб я в горы шла? Ты куда денешься — со мной пойдешь?</p><p class="p1">— Ничего тебе не скажут, брось глупости.</p><p class="p1">— Ладно, не о том речь. Как ты отправишь меня?</p><p class="p1">— Мне сейчас надо вылетать, самолет выслали. Я тебя отправлю, когда вернусь, а пока ты здесь пересидишь под охраной.</p><p class="p1">— Нет! — крикнула она. — Здесь я ни под какой охраной сидеть не буду. Здесь без тебя что угодно сделают. Есть у тебя в городе где прятать меня?</p><p class="p1">— А у своих тебе негде пересидеть?</p><p class="p1">— К моим мне нельзя теперь, я для своих теперь зачумленная.</p><p class="p1">— О черт. — Губернатор принялся лихорадочно одеваться. Прятать Ашу ему никогда не приходилось, да и не от кого было. Черт бы их побрал с их древними поверьями. И тут он вспомнил о Григории — безобидном местном алкаше, не из туземцев, который приторговывал изделиями местных промыслов и пару раз консультировал губернатора по истории края, когда требовалось выступать на городских праздниках. Знания у Григория были самые поверхностные, о волках он только слышал и личным знакомством похвастаться не мог, но город и его окрестности знал, как свои пять пальцев. Как его занесло в эти края — никто толком сказать не мог; сам он смутно намекал, что жил когда-то в Москве и работал на расхазаренного впоследствии олигарха; «расхазаренный» — был его собственный неологизм, по аналогии с раскрестьяниванием и расказачиванием. Еще до того, как олигарх был взят к ответу со всей семьей, пиарщик бежал в леса: закатиться в Сибирь, в щелку дальнего и темного округа, представлялось ему единственным спасением, и он не ошибся. Его, быть может, искали в Москве, а может, он преувеличил опасность, — но в Сибири ему жилось славно, он взял в жены туземку из простых, полуграмотных и по-гогеновски смуглых, с блинообразным, но не лишенным миловидности лицом; жил на окраине, в разваливающейся хрущобе, работал на разбитом рядом с нею огороде, печатался за копейки в местной газете — словом, вел нормальную жизнь провинциального интеллигента, отличаясь от такого интеллигента только тем, что было у него кое-что припрятано с пиаровских времен. Губернатор любил пообщаться с Григорием, потому что больше разговаривать в городе было особо и не с кем — а тут все-таки столичный житель, вращавшийся некогда «в кругах». Удивительней всего в бывшем пиарщике была его бытовая непритязательность: судя по его рассказам, он должен был привыкнуть к роскоши, — но то ли в профессиональный кодекс людей его круга входила полезная способность быстро привыкать и отвыкать, приспосабливаясь к любым обстоятельствам, то ли он так уж был рад уцелеть, что и хрущобу на сибирской окраине считал счастьем. По всему выходило, что Григория напугали крепко; его олигарха расхазарили уже в те времена, когда нефть не была никому особо нужна, и потому отбирать ее не имело смысла — сами отдавали, приплачивая; но дело было, как всегда, не в нефти, а в показательном наказании зарвавшегося хазара. О том, что с ним сталось, Григорий умалчивал, да и губернатор знал не больше — с укреплением вертикали на нижних ее этажах все меньше узнавали о том, что делалось на верхних. У Григория Ашу точно никто не стал бы искать: он умудрился так хорошо закатиться в щель, что о нем в самом деле забыли. Он и губернатору не раз советовал поступить так же: «Погодите, сейчас всех будут менять, дойдет и до вас. А если вы просто так отползете в сторону, вашего отсутствия в первый год никто и не заметит. Поставьте за себя хоть Никиту — он этикет знает. Помяните мое слово: сейчас уже ничего никому не нужно, кроме как сажать. Иначе государство просто не прокормится. Оно тихо жрет само себя, и вас обязательно схарчат — потому что надо же брать и начальство, чтобы народ не возроптал».</p><p class="p1">Губернатор выслушивал все это с легкой усмешкой — Григория так напугали, что он теперь только и ждал, когда возьмут всех; возможно, общение с ним было приятно еще и потому, что подтверждало правоту государственной линии. Если такие трусы и приспособленцы, не лишенные обаяния, но начисто лишенные аналитических способностей, когда-то рулили тут судьбами крупных корпораций — все делалось правильно; не уничтожать, конечно, но вытеснять… Странно, однако, что теперь Григорий со всей его беспринципностью был единственным человеком, на которого губернатор мог положиться, — но с другой стороны, бывшие люди всегда надежны, им нечего терять. Оставлять Ашу в резиденции в самом деле что-то мешало: эти ее волки знали, что она здесь. Жена Григория была стопроцентно надежна, умела молчать и никому бы Ашу не выдала, да и сколько ей тут быть без него — полдня, день… Губернатор поднялся в кабинет (стекло уже вставили, славно, не распускаю), распечатал на всякий случай показатели последнего месяца, сложил их в портфель и вызвал водителя. Тот явился незамедлительно, словно и не спал.</p><p class="p1">— Васильич, через четверть часа поедем в аэропорт. Ашу возьмем с собой. Меня высадишь там, а ее кружными путями, на всякий случай, чтоб никто не засек, отвезешь к Григорию Емельянову, мы у него были, на Саврасовской.</p><p class="p1">— Знаю, — кивнул шофер.</p><p class="p1">— Там высадишь, проверишь, чтобы все чисто, — я ему позвоню, предупрежу. Не болтай особенно. Из Москвы позвоню, встретишь.</p><p class="p1">Шофер снова кивнул. Пожалуй, из всей обслуги это был человек наиболее надежный — привык иметь дело с механизмами и сам почти превратился в машину.</p><p class="p1">Губернатор позвонил Григорию, извинился за ранний звонок и с места в карьер приступил к главному:</p><p class="p1">— Григорий, у меня просьба к вам. Можете взять к себе на сутки девушку? Ее надо спрятать, туземцы принимают ее за ведьму и угрожают убить.</p><p class="p1">— Почему ко мне? — испугался Григорий. — Посадите куда-нибудь к себе в каталажку…</p><p class="p1">— Я не могу оставлять ее под присмотром местных. Они по сарафанному радио живо разузнают, где она, и будет погром. А своих кадров у меня — только обслуга. Не в резиденции же мне ее держать. Люди подумают черт-те что.</p><p class="p1">— А потом куда вы ее?</p><p class="p1">— Отправлю в соседний округ, неважно. Вы же знаете, они в последнее время верят любой ерунде. Колдуны, знахари. Не волнуйтесь, ее к вам осторожно подвезут, никто вас громить не будет. Я охрану дам.</p><p class="p1">Некоторое время в Григории боролись два страха — он одинаково боялся ссориться с любым начальством и ввязываться в любые истории.</p><p class="p1">— А охрану точно дадите? — спросил он наконец.</p><p class="p1">— Обязательно, из моих. Сами понимаете, я первый не заинтересован, чтобы в городе были волнения. А цивилизованных людей, на которых можно полагаться, у меня тут раз и обчелся.</p><p class="p1">— Ну, черт с ней, пусть везут. Я отошлю свою к родне, нечего ей смотреть на колдуний.</p><p class="p1">— Очень здравое решение, — похвалил губернатор.</p><p class="p1">Бледная и напряженная Аша в машине молчала.</p><p class="p1">— Васильич тебя отвезет к надежному человеку, — сказал губернатор. — Там тебе бояться нечего, а я к ночи прилечу, тебя заберу.</p><p class="p1">— Никуда ты не прилетишь, — сказала она спокойно.</p><p class="p1">— Почему, интересно?</p><p class="p1">— Потому что никто тебя сюда больше не отпустит.</p><p class="p1">— Что, заберут? — поддразнил он ее.</p><p class="p1">— Забрать не заберут, а куда услать — найдут. Хоть на войну, хоть еще куда. Им главное — выманить тебя отсюда. Без тебя тут со мной…</p><p class="p1">— Но пойми, я не могу тебя брать в Москву. Там меня встретят у трапа, куда я тебя дену?</p><p class="p1">— Я не говорю, чтоб ты меня брал. В Москве они меня сразу…</p><p class="p1">— Пережди сутки, я приеду и отправлю тебя в твое Дегунино.</p><p class="p1">— Я сама в Дегунино уйду, — упрямо повторила Аша. — Мне другого пути нет.</p><p class="p1">— Хорошо, хорошо! Подожди один день. — Он не сомневался, что сумеет по возвращении уговорить ее остаться или хоть выработает оптимальный маршрут для бессмысленной поездки в Дегунино к неведомой тетке. Быть не может, чтобы Москва вызывала его из-за Аши. Да откуда в Москве и знать про Ашу? Кто из туземцев способен был написать донос? «Во первых строках моего письма доводим ваше сведение, что гублинатор живет с девушкой как с жиной примите экстрыные меры»? В Москве давно уже не читали доносов, потому что все доносили на всех; брали не тех, на кого писали, а тех, кого нужно было.</p><p class="p1">Правительственный самолет ждал его на взлетной полосе; ничего удивительного, внутренних рейсов давно не было из-за износа самолетов, хоть горючего теперь было залейся. Летали редко и по крайней необходимости; на московские совещания за губернаторами высылали несколько самолетов из кремлевского авиапарка, да и совещания бывали раз в году, больше для проформы. Никаких признаков опалы не наблюдалось: стюард спокойно приветствовал его, отдал рапорт, о причинах вызова, естественно, ничего не говорил, потому что не знал. Губернатор оставил Ашу в машине, даже не поцеловав на прощанье: вечером вернусь, долгие проводы — лишние слезы. Васильич резко стартовал и скрылся. В восемь утра по местному и в пять по Москве они были уже в воздухе.</p></span></span></span></span></span>
