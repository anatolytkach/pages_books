<p class="p">3</p>
</div><p class="p1">Громов проснулся от слезной тоски, какой давно у него не бывало. Ему снились стихи, и этого тоже давно не было. Слава Богу, чужие — «Ты помнишь, в нашей бухте сонной». Он полежал в темноте, постепенно вникая слухом в разные, но одинаково скучные звуки сельской ночи: тикали ходики, тоненько сопела хозяйка в своей комнате, постукивал дождь в окно, и страшно было подумать, что возможны какие-то стихи.</p><p class="p1">Когда-то он и сам писал их — это было в другой жизни, от которой за два года войны, а пожалуй, что и за три предвоенных ничего не осталось, кроме Маши и призрачной переписки с ней. Память о другой жизни была запрещена, все самосознание Громова свелось к крошечному пятачку мыслей о повседневности, о том, чтобы целы и сыты были солдаты, чтобы не озлилось лишний раз начальство, не бросили в бой, не отняли отпуска, — но в огромном темном поле его души и памяти шла своя разрушительная работа, какая происходит, может быть, в брошенном доме, или, если уж мыслить в привычных ему теперь фронтовых терминах, в брошенной части, оставшейся глубоко в окружении. Армия ушла дальше и забыла об окруженцах, а они еще где-то бьются, прорываются к своим, посылают бессмысленные сообщения, пропадающие на полпути, потому что прерваны все коммуникации, — и лучше не оглядываться на то, как без пищи и подкрепления вымирает обреченный полк. Иногда от них доходят смутные, еле различимые сигналы — непонятно уже, о чем и зачем. Ты помнишь, в нашей бухте сонной… Громов совершенно забыл, о чем эти стихи. Он проснулся в слезах, но сам не сказал бы, о чем плачет. Конечно, не о глупых детях, которые радоваться рады. Дело было не в словах, не в стихах вообще, а в страшной, красно-черной спекшейся массе, в которую превратилась его довоенная жизнь, и в робких голосах, все еще доносившихся из-под корки.</p><p class="p1">Постой, ведь были еще ласточки. Стихи во сне как-то с ними связывались. Громов сел на лавке и закурил. С каждым глотком дыма мир обретал знакомые, успокоительно-мерзостные очертания. Все недостаточно отвратительное давно уже выводило его из себя, как бесит бархатный, бисером вышитый покров на гнойной ране. В громовском мире давно уже не было места сантиментам — смешон и гадок палач, плачущий над жертвой, да и жертва должна держать себя в руках; а поскольку в мире, кроме палачей и жертв, давно ничего не было, Громов раз навсегда, еще до войны, запретил себе всякую лирику. Отчего-то садисты всегда сентиментальны — это касалось не только немцев с их страстью к рождественским открыткам и песням про елочку, но и родных воинских начальников, и родной империи, с особенным наслаждением снимавшей нежнейшие детские мультики с добросердечными зайцами и верными долгу ежами. Наверняка тут был дополнительный оттенок мучительства — нарочно готовить детей к жизни в совершенно другом мире, с тем, чтобы они тем больнее хлопнулись мордой об истинную реальность. В тридцатые таких мультиков не делали, это началось в шестидесятые, когда на чугунную гирю стали натягивать резиновую маску человеческого лица. Громов ненавидел эту розовую резину. Он научился со временем различать те же потуги набросить расшитый покров на язву даже в цветении липы, даже в изумрудном сиянии листьев в фонарном луче — все служило прикрытием для отвратительного мушиного роения, жадного размножения и не менее жадной гнили. Все только жрало и гибло, нацепив для приличия маску идиллического благолепия, — и любой закат, любой цветущий луг был теперь Громову еще отвратительней, чем слюнявая улыбка идиота, только что укокошившего пестиком всю семью.</p><p class="p1">Конечно, прежняя жизнь где-то была. Она продолжалась помимо его воли. Он утратил связь даже с собственным телом, которому, несмотря ни на что, хотелось жить, есть, пить — хотя и еда, и питье были только съедобной гнилью; гнилью было все, к чему он прикасался и на что смотрел. Мир делился на гниль и сталь, и сталью был только долг — все, что Громов себе оставил; прочее врало, изворачивалось и сулило несбыточности, чтобы тем злораднее торжествовать на обломках очередной судьбы. Но телу нельзя было запретить радоваться, и оно радовалось обеду и привалу, хотело жить и не желало привыкать к повседневному риску; душа, лишенная всех прав и радостей, по ночам жила, как хотела, — и по ночам то приходили стихи, то вспоминалось что-то из детства, невыносимое, недопустимое, расслабляющее. Как теперь эти ласточки. Ласточки прилетали два лета подряд, построили гнездо на дачной кухонной террасе, высиживали птенцов, Громов вместе с матерью наблюдал за птенцами и зарисовывал их, — а на третье лето к террасе приделали дверь; ласточки прилетели на прежнее место, но дверь их пугала, ее запирали на ночь, и они оставили гнездо, переселились неизвестно куда. Где теперь эти ласточки? Где теперь перышки, косточки, пух — куда-то же все это делось, проклятая материя никуда не может исчезнуть, и атомы, из которых все это состояло, развеяны теперь где-то в мире, и эта мысль почему-то была страшнее всего. Если бы что-то исчезало бесследно, жизнь была бы возможна: бесследное исчезновение указывало бы на дырку, в которую, глядишь, как-то можно сбежать, просочиться отсюда. Но деваться было некуда, в замкнутом пространстве одна и та же материя переходила из гнили в плоть, из плоти в гниль — как в Антарктиде один и тот же снег переносится ветром с места на место, потому что нового почти не выпадает, а старому некуда деваться. Где теперь эти ласточки? На даче, наверное, все сгнило. Громов запрещал себе помнить и дачу. Он сам не знал, откуда выползло воспоминание, из-под какого спуда прорвалась детская неутолимая тоска. Изгнать ее можно было только омерзением, и он жадно, как пьют пиво с похмелья, напитывался окружающей гадостью: сырое, грязное белье, низкий потолок, шуршание в углу — мышь? тараканы? — посапывание хозяйки, дождь, размывающий бесконечные глинистые дороги за окном… Так в детстве, проснувшись среди ночи от страха смерти или от ужаса перед собственным «я», он сразу вспоминал о школе и успокаивался. Был такой страх, о котором он не мог рассказать родителям ничего внятного, главный ужас детства, особенно ужасный потому, что ни с кем нельзя было им поделиться: обо всех мы читаем в книгах или разговариваем с другими, но я — это я, и сейчас это я, и вот сейчас я. В каждую следующую секунду ужасное продолжалось, от него не было избавления. Любой кошмар можно вообразить и забыть, но от мысли, что все происходит именно с тобой, некуда было деваться. «Я» продолжало быть «я», не кто-то другой, с которого спросу нет и взятки гладки, а именно он, Громов. В этот ужас можно было провалиться, как в болото, и приходилось цепляться за школу, которую Громов ненавидел — ненавидел днем и любил ночью, потому что «я» было страшней школы.</p><p class="p1">Теперь его опять затягивала детская память и детская тоска, мучительная жалость ко всему на свете, от которой он тоже просыпался по ночам, в отчаянии глядя на вертикальный ряд голубовато светившихся окон в доме напротив — он думал, что друг над другом живут несчастные, страдающие такой же, как у него, бессонницей, пока мать не объяснила ему, что это лестница. Его кровать стояла тогда у окна, окно было разрисовано к новому году. Главное — нельзя было вспоминать дальше. Все, что не отсюда, заставляло дергаться, как от ожога. Мир состоял из несвежего запаха, шуршания, чавканья глины — существование в нем стихов и детских воспоминаний было обманом, куда более отвратительным, чем откровенное зверство. Ты помнишь, в нашей бухте сонной… Кому, чему они радовались? У Блока все ждали каких-то кораблей, вот и дождались, пришла военная эскадра, означающая начало первой мировой войны. Но в стихах ведь об этом ни слова. Что он находил в этих стихах? Очевидные же глупости: зарылись в океан и в ночь — и в следующей же строфе: тоскливо стало море. Море или океан? Молодой человек, или туда, или сюда, газ выходит! И какой семафор в порту? Это наверняка называется иначе. Но он ничего не мог сделать с этими шестью четверостишиями — не помогала и сигарета. И ласточек, неразумных ласточек, жаль было все равно. Господи, если бы он знал тогда, где и как будет их вспоминать! Кто мог тогда подумать, что будет какая-то война? Впрочем, войны боялись все, ждали то нейтронной, то психотронной бомбы, — но чтобы вот так? Мысль о даче тянула за собой ворох ненужных, запретных воспоминаний: запах нагретой смородины, клубничина с приставшим мелким песком, иногда с муравьиной розовой норкой; желтые облака на дождливом закате… Все это было где-то, не могло же исчезнуть, только клубника небось окончательно заросла; но во всем этом Громов видел теперь соблазн и обман, и ничего не хотел знать, кроме этой ночной избы, и завтрашнего серого дня, и никому не нужной войны, на которой он отдавал каким-то абстракциям бессмысленный, только бессмысленностью и оправданный долг. Все вещи, обладавшие прикладным значением, давно представлялись Громову мусором, а люди, служившие этим вещам, были хуже откровенных бездельников. В бездельнике, не желавшем трудиться даже под угрозой смерти, было что-то героическое, — он и Машу особенно любил за принципиальный отказ участвовать во всей этой имитации бурной деятельности. Перед войной, в сущности, уже никто не работал. Маша потому и не удерживалась ни на одной из своих работ, что везде занимались черт-те чем и получали за это последние, по сусекам доворованные деньги, — а ей с ее истовым отношением к любому делу это было не по нутру, и откуда-то она вылетала через неделю при первом же сокращении, а откуда-то на третий день уходила сама. Под конец она решилась вовсе ничего не делать и, что называется, гибнуть откровенно. Он застал ее в положении вовсе уж бедственном, хотя и его собственное было немногим лучше. Вся разница была в том, что Громов работал, он и тогда уже был одержим идеей дисциплины, — но искать работу, совместимую с самоуважением, было все трудней, и потому он с облегчением и радостью пошел на войну.</p><p class="p1">Он стал думать о Маше — единственном компромиссе между этой жизнью и собственной душой, которой он почти все запретил, кроме тоски по Маше и любви к ней. Это была странная любовь, Громов толком не знал эту девушку и только поэтому любил уже четыре года, два из которых они почти не виделись. Что-то и он, видимо, для нее значил, — не только же за неимением лучшего приезжала она к нему, писала письма, держала в курсе своих неприятностей и перемещений. Машу можно было любить, потому что ее не было жалко. Ее нельзя было представить в унижении. Мир, конечно, в любой момент мог ее размолоть — но она была бы этому только рада. Машу, как и Громова в ее годы, а может, и больше, чем Громова, — уязвляло все, и с такой силой, что к двадцати годам, когда она с ним встретилась, ее решительно ничем нельзя было обольстить. Она томилась в компаниях ровесников, с отвращением выслушивала разговоры, комплименты, признания, — и даже с Громовым позволяла себе только редкие встречи, всегда по собственной инициативе. Она не хотела привязываться, он не настаивал. Хотя именно такая свобода связывает сильнее всего — это, кажется, они оба поняли в последнюю ночь перед громовским призывом, когда она провожала его.</p><p class="p1">Познакомились они весной, за два года до войны, на Тверском бульваре. Громов шел мимо Литинститута, к которому, слава Богу, сроду не имел отношения, — но все, кто что-нибудь писал и где-то выступал, знали друг друга, и его затащили в случайную компанию, уже порядочно охмелевшую от пива. Спешить ему было некуда, он сел к ним на лавку и стал участвовать в общем трепе ни о чем. Причина была, конечно, в Маше — без нее он сроду не вовлекся бы в эту бессмысленную попойку, каких в его молодости было много больше, чем надо. Машу он заметил сразу, и долго потом изумлялся, что не все встречные мужчины падают к ее ногам. Больше того: на его счастье, не все и замечали ее красоту, казавшуюся ему идеальной. В ней все было крупно: большие зеленые глаза, прямой нос, рот с пухлыми, обветренными, никогда не накрашенными губами.</p><p class="p1">Она жила в Медведкове, у черта на рогах, в доме барачного типа. Дом построили годах в тридцатых, теперь он весь проваливался снизу и осыпался сверху, и попав к ней в первый раз, Громов чуть с ума не сошел — настолько она не вписывалась в это желтое, двухэтажное, исписанное матом убожество с вечно пьяными соседями и бесчисленной их родней. Как ни странно, количество этой родни, заселявшейся в Машину коммуналку без спросу и документов, часами занимавшей кухню, ванную и сортир, — добавляло соседям наглости: не то чтобы они чувствовали свою неправоту и винились за причиняемые неудобства — напротив, родня придавала им силы; и хотя в Москве они были точно такими же приживалами, как Маша с матерью, — в самой своей многочисленности они видели залог успеха, заранее празднуя триумф грядущего завоевания. Необычайно трогательна была взаимная любовь всех этих людей: приезжал брат Коля, долго сидел с братом Мишей на кухне, они тепло смотрели друг на друга, не произнося ни слова — так только, изредка урчание или междометие; Громов нарочно три раза кряду, с получасовыми интервалами, выходил на кухню — якобы вымыть чашку, взять банку варенья, — и всякий раз видел одну и ту же картину: сидели друг напротив друга, не шевелясь, только в бутылке убывало. «Брат! — гордо кивал сосед на гостя. — Коля!». Коля лучился, как самовар. Его жена, беременная, желто-коричневая, в ситцевом халате, почему-то все время попадалась Громову в коридоре, ее было не обойти, она с горделивой нежностью показывала глазами на свой живот. Они не дрались, не скандалили, но эта молчаливая, полная до краев взаимная нежность была еще хуже беспрерывных драк соседей сверху, которые то и дело ломились к Маше и ее матери — самым беззащитным существам во всем подъезде; когда однажды Маша отпихнула пьяного соседа и захлопнула дверь перед его носом, он пошел в милицию, заявил, что она его избила, — и милиция долго приходила, разбиралась, допрашивала, проверяла документы; Громов приехал в разгар разбирательства по звонку Маши, еле говорившей, с трудом выталкивавшей слова. Она сидела у стола вся белая и показывала свои документы, договоры, обтерханные справочки, — мать с сердечным приступом лежала в постели; появление Громова ничего не изменило, да и не было у него никакого документа, способного перепугать мента. Пьяная сволочь наверху все это время буянила, и хоть бы кто бровью повел.</p><p class="p1">В ванне было шершавое дно, прямо над ней ржавчиной капала труба, и по стене, повторяя изгиб трещины, змеился рыжий потек. Прямо над ванной висели бесчисленные черные ситцевые трусы, халаты, тренировочные штаны. Под сенью всего этого березового ситца Громову приходилось отмокать, вода была чуть теплая — плохо работала газовая колонка, с которой ни Маша, ни мать, ни Громов не умели толком сладить. Через десять минут в дверь начинали колотить соседи. Когда Машина мать вернулась с дачи, куда уехала бибиситером с умеренно новорусским семейством, впоследствии разорившимся вовсе и отказавшимся от ее услуг, — соседи долго ей пеняли, что у дочери ночует чужой человек. Они боялись, вероятно, что по ночам Громов на кухне жрет их соленья — закатки, как называлось это на их языке. Сами они щедро угощали консервами, но постоянно подозревали, что этих добровольных даяний Громову и Маше мало, непременно по ночам еще жрут, подлецы. Делать им больше было нечего по ночам.</p><p class="p1">Эти ночи Громов вспоминал с чувством счастья, тем более острого, что рядом все время ощущались теплые братья, дружные с милицией алкоголики и подростковые банды из окрестных пятиэтажек, оравшие до трех часов утра; а из открытых окон тянуло сиренью, влажной землей, дождем, а в комнате они с Машей были вдвоем, мать на новорусской даче, счастье ютилось на крошечном пятачке, осажденное со всех сторон и доведенное до невообразимой насыщенности. «Соскучилась, соскучилась», — бормотала она, тычась в него, и душа Громова выла, когда он вспоминал, что ее дом сгорел в первые же дни после ее нелепой, скоропалительной эвакуации. Она никогда ничего не боялась, а тут испугалась — потому, вероятно, что давно ждала конца света, и когда война наконец началась, немедленно увидела в ней признак последних времен. У ее матери была какая-то родня в Средней Азии. Туда они и побежали, как многие в первый месяц побежали из Москвы — а потом вернулись, поняв, что Москве-то ничего не угрожает: Громов знал из нечастых родительских писем и фальшиво-бодрых газет, что Москва живет обычной жизнью, и если газеты наверняка врали, то родителям это было без надобности. А Маша уехала, и не могла теперь вернуться, потому что занесло ее далеко, да и дом сгорел, подожженный верхними алкашами, — словно она только и хранила его.</p><p class="p1">Обычно Громов шел к ней дворами, мимо странного красного здания за бетонным забором; Маша жила тут шестой год, но что делается за этим забором — понятия не имела. Как-то он предложил ей влезть в пролом, сам протиснулся следом, — и тайна раскрылась, как раскрывались в последнее время все тайны: обнажилось гнойное скрытое безобразие. Там был интернат для оставленных детей с врожденными уродствами — не успели они войти во двор красного здания, как невесть откуда выбежали на них эти страшные дети, те, кого не разбирали даже на выходные, — все в одинаковых синих свитерках, кто с соплей под носом, кто с бессмысленно открытым ртом, кто с заячьей губой, и еще, еще какие-то, совсем уж дикие; окружили их кольцом, задирали головы, мычали и домогались любви. Так встречали тут любого посетителя. Маша пошатнулась и, верно, рухнула бы, если б он ее не подхватил.</p><p class="p1">Почему они не поженились? И мысли такой не было. Сам этот вопрос казался кощунством. Как можно было жениться, когда все кончается? Оба жили с этим чувством и не ошиблись, как показала война. Любовники в гибнущих Помпеях — красиво, но брачная церемония под пеплом… Громов жил один, снимал комнату неподалеку от родительской квартиры, и привести Машу было куда, но жить с Машей? Заставлять Машу хозяйствовать? Просто притираться друг к другу, как делали до них бесчисленные пары? Он и теперь хотел поехать к ней, добивался отпуска только ради нее, а вовсе не ради родителей, которых вообще намеревался миновать, чтобы не травить душу себе и им: в конце концов, из Баскакова до Средней Азии можно было добраться и мимо Москвы. Но приехать в отпуск — совсем не то, что жить вместе. Она могла брезгливо, почти презрительно брать у него деньги, — он понимал эту детскую самозащиту, — но жить с ним не смогла бы никогда, и сам он не пошел бы на это. В браке было что-то недостойное их обоих. Тут стиль был другой — короткие встречи. Жить рядом и притираться значило бы врать, а Маша настолько не совмещалась ни с какой ложью, что после одной его неверной интонации, случалось, отнимала руку, а то и вовсе сбегала со свидания. И ему в голову не приходило сердиться на это — тем более, что свое он обычно успевал получить. Все происходило так: они выбирали момент, когда ее матери не было дома, или сама Маша приходила к Громову, хотя не любила его квартиру и район по каким-то своим причинам, о которых не распространялась; они кидались друг к другу, и в этом соврать было просто невозможно, и слов почти не было, — а потом, когда Громов успокаивался, начинал расспрашивать ее или рассказывать о чем-то своем, она часто начинала сердиться, замыкалась, отворачивалась. Иному пошляку показалось бы, что дело тут известно в чем, а остальное — так, бесплатное приложение; но пошлость потому и пошлость, что всегда останавливается, не доскребаясь до дна и довольствуясь половинчатостью. Да, пусть дело было только в этом, — но ведь и это было так нужно обоим потому, что здесь была правда, а все остальное неправда; эта неправда была даже в них, когда они делали вид, что продолжается обычная жизнь, в которой можно разговаривать, обмениваться новостями, рассказывать о подругах. Ложью не были их редкие выходы в кафе «Маки» — когда были деньги, Маша любила есть, ела много и с наслаждением, не стесняясь этого, и он всегда любовался ею. По тому, как она ест, или выбирает одежду, когда опять-таки случались деньги, или чинит ему рубашку, когда рвалась, — видно было, как она могла бы жить, если бы нашлось где и на что. «Где» — конечно, не в мерзком квартирном, а в более широком смысле: в мире, который не умирает каждую секунду, а если и умирает, то хотя бы чуть достойнее. Все, за что бралась, она делала хорошо, и потому почти ни за что не бралась: хорошее тут было не только не нужно, — оно ускоряло гибель этого мира, потому что вырывалось из его рамок, рвало истончившуюся ткань, и чем хуже было все, что предлагалось, — тем горячей оно приветствовалось, ибо затягивало агонию, длило полу-жизнь. Все привыкли соглашаться сначала на «не совсем так», потом на «вовсе не так», потом на «вовсе никак» — и не было уже ничего, с чем эти притерпевшиеся полулюди отказались бы мириться, лишь бы их оставили еще немного подышать полувоздухом, пожевать еле пахнущий хлебом жмых, послушать раздребезжавшуюся какофонию, уже почти и не выдающую себя за музыку сфер.</p><p class="p1">Она любила одеваться красиво и ненавидела одеваться по средствам; она предпочитала обходиться вовсе без денег, чем довольствоваться небольшими и вдобавок доставшимися с бою. Другие об этом разглагольствовали, не брезгуя повторением избитостей про «все или ничего», — она так жила, как жила бы королева в изгнании, по древнему кодексу королев не имеющая право пить морковный кофе, если нет настоящего, и потому пьющая по утрам холодную воду — разумеется, из последней чашки, уцелевшей от фамильного сервиза. Он рассказывал ей эту историю и удостоился молчаливой улыбки. Маша вообще говорила мало. Может быть, тогдашний Громов, еще не закалившийся до последней стойкости, и поругивал ее за это презрение ко всем и всему — он толком не помнил сейчас, мысленно дивился этому или пару раз отчитал ее вслух; кажется, вслух. Да, на Воробьевых горах. Она не убежала тогда и даже не обиделась — вероятно, потому, что сердился он по-настоящему: да, это был настоящий гнев настоящего, никем не притворяющегося получеловека, каждодневно ходящего на работу и видящего в этой никому не нужной каторге особую заслугу. А ты не делаешь ничего, и еще кочевряжишься! Он тогда в первый раз купил ей брюки, без ее ведома, в порядке сюрприза, — она довольно резко отказалась их взять, сказав, что не одевается на рынках. Ну ты подумай! Ничего не делает и не одевается на рынках! Он принялся издеваться, а она с неожиданной серьезностью, без всякой обиды начала оправдываться: пойми, я не могу в этом… лучше совсем никак… Он быстро успокоился, поняв, что совсем никак — в ее случае действительно было лучше: на такую наготу надевать блошиные тряпки… Брюки эти он выбросил за парапет смотровой площадки — и тут же к пакету поспешил пьяненький бомж, штатный местный васька, подбиравший бутылки на склоне. Бутылок было много, но неформатные, шампанские, — в пунктах приема их брали неохотно; перед войной вообще стало очень много пунктов приема вторсырья — так умирающий обирается, собирается перед смертью, шарит по одеялу, по рубахе, словно подводя жалкий итог: вот я с чем остался. Этот мир уже обирался, шарил по сусекам, подбирал бутылки, тряпки, старые книги, которые около метро скупали на вес. Во что превращался потом весь этот утиль? Вероятно, в солдатское хабе, рвущееся при малейшем натяжении; ну конечно, они готовились к войне — и шили для солдат обмундирование, какого постыдился бы китайский крестьянин. Васьки в основном и жили сбором вторсырья, и сами были таким вторсырьем, которое перед самой войной тоже начали куда-то собирать — они вдруг исчезли из города: одни сбежали, других переловили. Громов и тогда, на Воробьевке, с ужасом сказал ей что-то про человеческое вторсырье, про то, как больше всего боится стать им.</p><p class="p1">— Нет, — решительно сказала она, — это как раз самый первый сорт.</p><p class="p1">— В смысле?</p><p class="p1">— Абсолютная чистота порядка. Только эти не врут.</p><p class="p1">— А я?</p><p class="p1">— Ты врешь иногда. Мы все врем. Не сердись, — прибавила она. — Знаешь, как в Индии с кастами обстояло на самом деле? Их было три. Жрецы, воины и все остальные. Все остальные заботятся о нуждах низкой жизни. Потом купцы и торговцы всяким рисом сбросились и внесли коррективы. И каст стало четыре: жрецы, воины, просто люди и неприкасаемые. Им было, вишь ты, западло в одной касте с нищими. В каком-то смысле это справедливо. Представление о жизни имеют жрецы, воины и нищие. Все остальные врут. Фальшиво звучит, но чесслово, так оно и есть.</p><p class="p1">Она и здесь больше всего заботилась о том, чтобы не звучать фальшиво.</p><p class="p1">Тогда он причислял себя к жрецам, потому что марал бумагу и пытался разобраться в происходящем; потом понял, что пора записываться в воины. Не то чтобы Громов разочаровался в своих жреческих данных: кое-что он понимал и умел, но время было не жреческое. В Помпеях не гадают по звездам: пелена опустилась, и звезд уже не было видно.</p><p class="p1">Перед войной настолько не было смысла ни в какой деятельности, что все, у кого был доступ к компьютерам, либо писали бесконечные и бессмысленные ЖД, либо раскладывали пасьянсы. Живой дневник был Громову не нужен — он вообще не понимал, к чему исповедоваться на публику, — а пасьянсов разложил великое множество. Все — и он со всеми — словно спрашивали ответа, что будет, но ответ каждый раз выходил разный. Перед войной в воздухе бродили и сталкивались почти видимые, скользкие, туманные сущности, из которых вот-вот должно было оформиться конкретное — но все никак не оформлялось; ясно было, что на глазах свершается поворот в сторону чего-то жалкого и грозного, кровавого, но страшно неумелого, такого же половинчатого и пошлого, как палач-недоучка. Ясно было, что на полноценный террор не хватит ни времени, ни сил, а тот, который получится, будет смешон и жертвам, и исполнителям — так и будут хохотать, глядя друг другу в глаза у пресловутой стенки; роли были расписаны, но актерам давно надоели, и притом эти актеры не знали никаких других. Надо было или ломать театр, или срочно тренировать в себе святую ярость. И для того, и для другого лучше всего годилась война. Не учли только того, что и война будет соответствующая — выродившаяся: ярость нарастала, театр разваливался, а гниль никуда не девалась. Громов знал, что должен доиграть эту пьесу, и доигрывал честно — с тем же чувством, с каким актер в проваливающемся спектакле раз за разом честно повторяет «кушать подано», отлично видя, что премьер пьян, трагик забыл текст, суфлер сбежал еще позавчера, а зрители постепенно, с нагловатой застенчивостью разворовывают бархатные портьеры и обдирают кресла. Роль была простая: встать, сесть, правое плечо вперед, в случае чего умереть по команде или в порядке проявления разумной инициативы.</p><p class="p1">Маша писала ему из Махачкалы скупо — прямым, мелким, плотным почерком; жизнь там, судя по всему, была несладкая. Она несколько раз ездила туда девочкой и неплохо уживалась со среднеазиатской родней, местное население относилось к русским с легким презрением, но впрямую пока не нападало, и даже работа была — какая-то канцелярщина, связанная с прижизненным увековечением местного князька. Население все равно знало русский лучше, чем родной, и требовалось редактировать русские тексты его бесконечных речей и километровых поэм. Мать уже не работала, трудно переносила жару, расклеилась, и Маше пришлось браться за эту поденщину, хотя если бы речь шла о ее личном выживании — она ни за какие лукумы и дыни не притронулась бы к редактуре поэмы «Сорок поучений кочевника домоседу» и умерла бы с голоду, улыбаясь. Громов с первого взгляда, с первого ее слова знал, что она найдет в себе силы улыбаться в последнюю минуту. Ненадежная в простейших обязанностях, в выполнении пустяшных и суетных поручений, она была непробиваемо надежна в главном, и сколь бы ни было трудно жить с ней — умирать лучше всего было в ее спокойном и дисциплинирующем присутствии. Ни в какую загробную жизнь Громов не верил с детства, и никакого утешения, кроме последней усмешки на память всему этому гнилому цирку с недокормленными тиграми представить себе не мог.</p><p class="p1">Постукивало, сопело, тикало. Он стал вспоминать Машу, вызывать ее в тысячный раз, понимая, что при встрече все будет другим, и сама она, наверное, другая (единственный раз прислала фотографию, которую он тут же порвал — фотография была компромиссом, а компромиссы они ненавидели). Она посмуглела, сильно похудела, снималась в ситцевом цветастом халате. Снимок был блеклый, словно выцветший от жары. Волосы — как всегда, коротко остриженные, — выгорели, стала заметней складка у рта, а выражение лица он хорошо знал: ну, посмотрим, что вы все еще придумаете. Пока не придумали ничего, о чем я не догадывалась бы заранее, к чему не готовилась бы с детства, с первого класса, повторяя про себя по ночам: я могу и без этого, и этого, и этого.</p><p class="p1">Он помнил ее на Тверском бульваре, в шерстяной красной кофте в белую полоску, — помнил, как среди долгого, бессмысленного, полупьяного спора — о судьбах и перспективах, разумеется, — она вдруг подошла к нему сама, резко потянула за руку и сказала «Пошли», и судьбы с перспективами перестали что-либо значить. Помнил ее напряженные ноги и спину, когда она стремительно задергивала занавески на окнах. Помнил ее исчезновения на рассвете, бесшумные, без прощальных поцелуев и тем более записок: иногда он просыпался, но не подавал виду. Помнил весь ее гардероб — очень хороший и очень небольшой. Когда она уходила, сразу становилось невозможно поверить, что она существует, и он еле мог дождаться вечера. Иногда она пропадала на неделю, однажды даже на месяц — и, появляясь, скупо и хмуро признавалась, что опять попробовала жить без него, без всех, но на этот раз еще не смогла; когда-нибудь сможет непременно. Этого он боялся больше всего, хотя и готовился подспудно именно к такому исходу: однажды вдруг выяснится, что ее просто не было. Она слишком была сделана по его мерке, чтобы такое совпадение могло быть правдой. Ему нравилось ее угрюмое немногословие, ее нелюдимость, избавлявшая его от мелочной ревности, до конца все равно не исчезавшей, но хоть не такой острой, как в первые дни; нравился низкий голос с переливом, хотя музыкальность его она всячески прятала и никогда не пела при нем — потому что серьезно занималась пением лет до пятнадцати и бросила, а все, что бросала, — бросала бесповоротно; нравилось, как она нехотя, не сразу, глухо сопротивляясь — забывалась рядом с ним, ослабляла защиту, начинала смеяться, а во сне, когда не могла запретить себе это, все-таки прижималась к нему. Он вспомнил все это опять и понял, что спать больше не будет. К утру, может, сон и вернется, но сейчас было только три. Громов натянул сапоги и отправился проверять посты.</p></span></span></span></span></span>
