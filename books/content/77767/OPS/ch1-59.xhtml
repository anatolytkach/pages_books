<span><span><span><span id="id77"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Да, август, скоро август. Женька огородами возвращалась в штаб и думала, что все плохо, то есть все никак. Критерии исчезли окончательно, а главное, ей было страшно. Она шла по чужой земле с чужими запахами, как пробирался бы колонизатор по острову, полному змей, тарантулов и воинственных туземцев. И самое удивительное, что во время русского детства эта земля была ее собственной — она могла поверить, что это и впрямь ее Родина. Это и заставило ее вступить в ЖД — святая вера в то, что она тут на месте. Почему-то при последних судорогах империи, которую она еще застала, ей можно было считаться тут своей, хоть и теснимой со всех сторон: люди вредили, но земля была родная. С березками, блин. Теперь эти самые березки, как назло, плакучие, страшными черными силуэтами выделялись вокруг, пахло травой и сыростью, под ногами хрустело и чавкало, и все, решительно все гнало ее отсюда — причем та самая природа, у которой она в детстве находила столько целебных секретов и ненавязчивых утешений, особенно усердствовала.</p><p class="p1">Самоубийственней всего было признаться, что ЖД тут не на месте, что и ей, и прочим давно пора поворачивать оглобли. Выходит, все было зря — ожидание, подготовка, многолетнее изучение местной истории, привязка к местности будущих роскошных зданий и грандиозных кибуцных оранжерей, утопические проекты, насаждение просвещения и свобод. Иногда, впрочем, ей и в каганате случалось спорить об этой программе: там говорили, что вернейший путь погубить Россию — дать ей то самое просвещение и свободы; но она отлично знала, что это все демагогия и что осуждать колонизацию гораздо легче, нежели нести цивилизацию. ЖД никогда не предполагали истреблять население России, кто бы и сколько бы ни клеветал на родное движение. Солдаты — другое дело; но мстить мирным жителям, отдаленным потомкам тех завоевателей? Женька и в мыслях не держала морить кого-то голодом, лишать работы, высмеивать ценности: это была не ее практика! Получалось, однако, что ЖД вели себя как буквальные захватчики, а вовсе не как уроженцы, вернувшиеся на родные земли. В пустыне и яблони цвели, и картошка урождалась — в сыром климате России, на идеальном черноземе Дегунина ничего не желало всходить. Все уходило в болото, гнило, размокало, амуниция на солдатах рвалась, автоматы не стреляли. Вдобавок Женька сама уже не представляла, — позор для комиссара, вечный источник комплексов! — какую часть страны они в конце концов контролируют: вроде бы Воронеж только что был наш, а вот уже и не наш; из Вологды были такие оптимистические сводки — но оставлена и Вологда… Во всем этом не было и тени логики: обычно города оставляются после битвы, так? Но здесь так называемые федералы и ЖД перемещались по стране хаотически, и никакое командование не могло точно сказать, по каким мотивам оставляется тот или иной город. Они входили в деревни, не оказывавшие сопротивления, и уходили из них, не встретив ни федералов, ни партизан. Так импотент слезает с бабы — не потому, что она его сбросила, она-то как раз ждет, что он начнет что-нибудь делать, а потому, что ему стыдно. Так и им было стыдно — ходили-ходили, что-то пытались совершить, терпели сокрушительное, сугубо мирное поражение и шли себе дальше, не нужные никому. Федералы давно избегали столкновений, поскольку мало к чему были способны, — демонстрировали вечную кутузовскую тактику: не надо никаких боев, пространство само сожрет… Женька думала раньше, что это будет родное, дружественное пространство. Но оно было чужим, алчным, ненасытным. Оно глотало их и глотало, а они, как бродячие артисты, шли в глубь России все дальше и дальше, показывая одни и те же фокусы: свобода, предпринимательство, пресса… ну? Нерентабельное закрывалось, новое не открывалось, крестьяне покорно выходили на работу, ничего не ладилось, все слушались — но так, как слушается кисель, принимая форму стакана и оставаясь неизменным по сути. Женька не знала, что ей тут делать, а деваться ей было некуда.</p><p class="p1">Вероятно, Волохов был прав. Вероятно, они годились на то, чтобы всегда быть против, но не на то, чтобы хоть изредка предлагать позитив. У них не было своей земли, потому что на своей земле они тут же утратили бы главную функцию. Идеальные посредники, раскрутчики, пересмешники чужих ценностей, они не могли предложить своих, потому что все их ценности были предназначены только для них, единственных, избранных. Другим они не годились. Вся их колонизация могла сводиться только к уничтожению противника, в лучшем случае вытеснению его куда-нибудь подальше — предложить навынос им было нечего. Черт побери, а единобожие? Первая в мире монотеистическая религия, священные тексты небывалой глубины и многослойности, давшие повод для тысячетомных комментариев бесчисленных мудрецов из закатно-розовых, душно-пыльных, окраинно-имперских штетлов… Но честным и быстрым журналистским умом она лучше Волохова понимала, как наивны, плоски и рациональны эти толкования, как природна и кровожадна вера, сколь очевидна энтропия этого монотеизма по сравнению с разветвленной, гибкой, равновесно-подвижной системой античного многобожия; ей никогда не нравился жестковыйный, почти исламский по духу Ветхий Завет. Она не могла заставить себя любить это, хотя честно училась каббале. Все это годилось как учебник выживания, воплощенное ОБЖ, которому учили их в русской школе и по которому она всегда была отличницей; но обожествлять ОБЖ она никогда не умела. Это была их, только их вера, свято оберегаемая, не годящаяся ни для кого другого; для других они придумывали экспортные варианты, но своим не делились ни с кем. И один из этих экспортных вариантов оказался сильней, чем они предполагали, завоевал мир, но им могущества не принес… а собственный Бог, каравший по прихоти, не снисходивший до объяснения мотивов, превыше всего ценящий верность себе, любимому, — был ей так же мало нужен, как и сама она — ему. В ветхозаветном мире ей было бы не прожить и дня, и сама она ненавидела себя за ту страстную, ненасытную силу, которую так любил Волохов. Что вы хотите, северное, анемичное племя, — они ценят быстроту и натиск, силу и алчность, но как сама она презирала свое быстродействие, поверхностность, жадность, журналистское стремление побывать всюду и узнать обо всем, скороспелость суждений, любовную пылкость! Ей казалось, что все это наносное и куда-то денется, стоит вернуться на родную землю: сразу придет ответственность, основательность… ни черта подобного! Страшно сказать, на комиссарской должности она тосковала по журналистике. Темперамент, который она чувствовала в себе, ненасытность, пожиравшая ее изнутри, — все было захватническим, идеальным для экспансии, но кроме этой экспансии, ничего не было. Может, оттого ее и тянуло к Волохову с его тугодумием, медлительностью, молчаливой, не сознающей себя тяжелой силой — вместе они составляли поистине идеальное единство, но этого-то единства им и не разрешалось. Может, прав он и надо быстро договариваться с варягами, чтобы вдвоем создать универсальное русское правительство? Нет, вместе мы ничего не можем. Только взаимно уничтожаться. Господи, кто же так проклял эту землю, что никто и никогда на ней не чувствует себя своим?</p><p class="p1">Она торопилась в штаб, ей страшно было среди сырой ночной России с темно-синим небом, сырой травой, недавно отшумевшим дождем; ей все казалось, что вот сейчас она провалится в болото — и никто не хватится. В штабе горел свет, топилась печь, издали пахло уютным березовым дымом. Женька вошла и села к столу. Ее томили всяческие дурные предчувствия.</p><p class="p1">За столом сидел очкастый полковник, известный всем под кличкой Гурион — из бывших нелегалов, загодя готовивших вторжение; теперь он был крупная шишка, но контрразведка избегала выдавать имена и звания своих. Фактом оставалось то, что у очкастого откуда-то были серьезные полномочия. Он присутствовал на советах, сообщал, надо признать, ценные сведения о рельефе и численности населения встречных деревень, бесцеремонно прерывал Эверштейна, когда тот заносился в мечтаниях, — словом, вел себя по-хозяйски. Женька не знала, кто за ним стоит и что ему в действительности можно. Иногда он казался ей уютным и надежным, но чаще — хитрым и опасным; его маленькие белесые глазки из-под очков глядели на нее, прямо скажем, без любви и даже без вожделения. Кажется, он не принимал ее всерьез. Женька машинально выпрямилась и проверила верхнюю пуговицу гимнастерки: под его взглядом ей всегда хотелось подобраться, и она ненавидела себя за это. Гурион был чужой, это она чувствовала отлично. В нем не было ничего хазарского — лысый, круглый, весь белесый, идеальный для нелегальной работы здесь; таким, вероятно, и следует быть настоящему разведчику — чужой всем, в том числе своим. Женька охотней поверила бы, что он варяжский нелегал в хазарском стане.</p><p class="p1">— Прогулялись? — спросил он, как показалось ей, со скрытым ехидством.</p><p class="p1">— Да, гуляю. Сна ни в одном глазу. — В армии каганата, в отличие от варяжской, не было всех этих штучек с так называемой «воинской вежливостью»: капитан вроде нее мог разговаривать с высшим офицерством запросто.</p><p class="p1">— Дело, дело. Мне вот тоже не спится. Литературку почитываю, — он показал ей обложку сборника афанасьевских сказок.</p><p class="p1">— Не скучно?</p><p class="p1">— Что вы, удивительное чтение. Ничего не знаю откровеннее местных сказок. Вы хоть в детстве-то читали их?</p><p class="p1">— Читала, но не любила. Мне Толкин больше нравился.</p><p class="p1">— Отравленное поколение. Я бы вам хоть как комиссару посоветовал ознакомиться — вы же гораздо лучше будете понимать, с кем имеете дело. Безнадежный народец, скажу вам.</p><p class="p1">— Ну, это не народец безнадежный. Это условия такие. Варяжская оккупация сковала инициативу, а мы разбудим.</p><p class="p1">— Да? И много уже разбудили?</p><p class="p1">— Порядочно, — сухо сказала она. — Люди хотят работать. Верят, что результаты их труда теперь не будут от них отчуждаться. Кстати, вы лучше меня должны знать, что сказки Афанасьева — грубейшая фальшивка.</p><p class="p1">— В самом деле? — Гурион, казалось, заинтересовался. — Кто же ее изготовил?</p><p class="p1">— Афанасьев, как вам известно, работал по личному поручению царя и организовывал все экспедиции на деньги варяжского правительства. Подлинный хазарский фольклор был под строжайшим запретом. И в этих настоящих сказках — если вы их читали — главными чертами героев выступает как раз инициативность и ненависть к угнетателям. К попам, к военачальникам…</p><p class="p1">— Как же, как же. «Русские заветные сказки». Вы это имеете в виду?</p><p class="p1">— И это тоже, хотя Афанасьев записал только самую непристойную их часть. Прочее опубликовано только в Каганате.</p><p class="p1">— А, ну да. Это я читал, конечно. «Хазарские сказания». Женя, вы меня простите за вопрос, — он снял очки и, не глядя на нее, стал протирать их, — вы давно в ЖД?</p><p class="p1">— С шестнадцати лет.</p><p class="p1">— И вы что же, действительно полагаете, что мы с вами и есть истинное население данной страны?</p><p class="p1">— Никогда не сомневалась в этом. Я тут родилась. — Она не понимала, к чему он ведет, и демонстрировала весь набор правоверных убеждений, обязательных для комиссара.</p><p class="p1">— Дело, дело, — повторил Гурион любимое бессмысленное выражение. — Я вас на твердокаменность не проверяю, не подумайте. Просто есть такая чрезвычайно распространенная ересь. И я отлично знаю, где ее корни. Ересь эта сводится к тому, что варяги и хазары — в равной степени угнетатели. А здесь якобы живет прекрасный народ, которому что наша цивилизация, что варяжская — в равной степени враждебное, чуждое угнетение. Слыхали?</p><p class="p1">— Слыхала.</p><p class="p1">— От кого? — цепко спросил Гурион.</p><p class="p1">А вот интересно, мелькнуло у Женьки в голове: скажу-ка я ему, что от Волохова, командира варяжской летучей гвардии, только что, в бане, лежа с ним на досках буквально без всего. Интересно, как он отреагирует. Никак он не отреагирует, чудь белоглазая.</p><p class="p1">— Ну, это не новое учение, — сказала она суше прежнего. — В каганате многие занимались такими играми…</p><p class="p1">— Да, да, — кивнул Гурион. — Я, вы знаете, давно уже здесь, но кое-какие публикации до меня доходили. В каганате в последнее время развелось слишком много свободных дискуссий. Это сильно снижает боеспособность, вы не находите?</p><p class="p1">— Я нахожу, что вы меня в чем-то подозреваете, полковник, и предпочитаю играть в открытую, — сказала Женька, закуривая. — Чувствую себя, понимаете, как в дурном варяжском боевике. Спросите меня еще, чту ли я Тору и как отношусь к христианству. Если у вас на мой счет какие-то подозрения, доложите контрразведке, и пусть меня допрашивают официально. А все эти прощупывания…</p><p class="p1">— Бог с вами, Женя, никто вас не прощупывает, — широко улыбаясь, сказал Гурион. — Еще чего придумали. Применительно к вам само слово «прощупывать» звучит ужасной двусмысленностью, — он гнусно захихикал, но Женька чувствовала, что и это он делает понарошку, что ему совершенно не до шуточек и шутит он их только ради непонятной покамест маскировки. — Мне надо понять ваше мировоззрение, потому что от этого зависит исключительно ответственное задание. Исключительно. Я не могу рисковать людьми. Если у вас нет настоящей веры, вы и сами погибнете, и дела не сделаете. И я должен четко понимать — как вы, например, относитесь к мнению, будто каганату повредила толерантность? Может, в самом деле не надо бы следовать принципам, которые мы навязываем другим? Вы же отлично знаете, что нас в этом упрекают.</p><p class="p1">— Да, знаю. Нас в этом упрекают столько, сколько мы вообще существуем. И не только нас — если помните, любого проповедника прежде всего ругают за то, что он не следует собственному учению.</p><p class="p1">— Это-то меня и занимает. Вам не кажется, что боевому духу каганата сильно повредили все эти дискуссии? Надо ли оставлять территории, вторгаться в Россию, изгонять варяжство?</p><p class="p1">— Ни одна дискуссия ничему не вредит, — устало сказала Женька. — Если хотите, я могу вам еще раз повторить все эти прописи. В троянской войне победили ахейцы — потому что они не запрещали своим воинам оплакивать павших товарищей. Троянцы запретили и на этом проиграли — им казалось, что от этого страдает боевой дух. Любые запретители вредят боевому духу больше, чем дюжина дискуссий, это азбука демократии…</p><p class="p1">— Ага, — кивнул Гурион. — Очень рад это слышать. Мне кажется, Женя, что вы лучший комиссар, кого я видел с начала вторжения. Или вы предпочитаете слово «Миссия»?</p><p class="p1">— Я предпочитаю слово «Миссия», — вяло ответила Женька.</p><p class="p1">— Ожидание Миссии, да. Тоже красиво. Женя, я тоже предпочитаю играть с открытыми картами. К сожалению, мы столкнулись с прямой изменой.</p><p class="p1">Женька вздрогнула.</p><p class="p1">— Не бойтесь, речь не о вас, — очень спокойно сказал Гурион. — Ваш случай не имеет с изменой ничего общего.</p><p class="p1">— Какой мой случай?</p><p class="p1">— Мы же играем в открытую, — пожал плечами Гурион. — Если вы любите мужчину, это ваши личные проблемы и никак не сказывается на боеготовности. Наша армия тем и отличается, что не запрещает солдатам быть людьми, вы сами это только что сказали. Восстал Жадруновский гарнизон. Солдаты кричат, что им надоела война и что они не подписывались быть оккупантами. Я не знаю, кто разлагает войска, но уверен, что это не варяги. У варягов хитрости не хватит. Это свои, Женя, только свои. Из тех мразей, которые уже и в каганате заняли капитулянтские позиции. Очень трудно воевать на два фронта, Женя, но у нас никогда не было борьбы с инакомыслием. Поэтому-то мы не расстреливаем Жадруновский гарнизон, хотя могли бы. Я надеюсь, вы справитесь. На флоте в подобных ситуациях хватало одной женщины-комиссара.</p><p class="p1">Женька была так потрясена его заявлением насчет любви к мужчине и личных проблем, что остальное слушала вполуха. Гурион это заметил.</p><p class="p1">— Вы меня слушаете, Женя?</p><p class="p1">— Да, полковник, да. Конечно.</p><p class="p1">— Вы должны выехать в Жадруново, Женя. Немедленно. Мы теряем гарнизон. Никакой силой оружия их переубедить нельзя. Вы должны поехать туда, объяснить им ситуацию и вернуться. Я слушал ваше обращение к солдатам позавчера. Это именно то, что нужно.</p><p class="p1">— Немедленно? — спросила Женька.</p><p class="p1">— Немедленно, Женя. Это недалеко — километров семьсот отсюда. Естественно, я придам вам отряд. Без защиты отправлять туда женщину — чистое самоубийство. Я уверен, что кроме вас, с этим заданием не справится никто, и только поэтому прошу вас. Это не приказ, Женя, это просьба, но вы должны понимать, что в нашей армии и в наше время просьба полковника разведки значит больше приказа.</p><p class="p1">Он говорил мягко, но был страшно напряжен — Женька почти физически ощущала концентрацию воли, с которой он не оставлял ей ни малейшего отходного пути.</p><p class="p1">— Я понимаю, полковник, — сказала она.</p><p class="p1">— Думаю, вы понимаете не все. Это миссия совершенно секретна, Женя. Я не шучу. Поэтому вы не сможете предупредить Волохова об отъезде.</p><p class="p1">Ну да, поняла Женька. Последняя надежда рухнула: он знает все. Он не думает ни на Эвера, ни на кого-либо из штабных, заигрывающих со мной без толку и без надежды. Выследил, жирная морда. Это его работа, он полковник, нелегал и кто угодно. Доигралась, дитя мое. Теперь они выманят меня отсюда, дождутся, пока Вол, как идиот, припрется в эту чертову баню на следующую ночь и возьмут его теплым, и виновата буду я. Они не могли брать его, пока там была я, я им еще зачем-то нужна, а при мне убить его никак бы не вышло. Вот мы и попались, да как глупо.</p><p class="p1">— Никто не собирается брать вашего Волохова, — с некоторой брезгливостью сказал Гурион, явно обучившийся тут еще и читать мысли. — Он никому не нужен со всей своей летучей гвардией. Думаете, нас не устраивает такая летучая гвардия? Да это идеал спецназа. Я очень рад, что он ходит с ними по среднерусской пустыне, старательно избегая столкновения. Или вы действительно полагаете, что отряд из сорока вооруженных варягов может безнаказанно шариться вокруг Баскакова, а я сижу тут и не знаю ни хрена? Глупышка, — добавил он по-хазарски, хотя и с небольшим местным акцентом, от которого Женька сама так и не избавилась в каганате.</p><p class="p1">— Но… почему тогда…</p><p class="p1">— Потому что Волохов давно уже попал под влияние тех же растленных сил. Во всем мире есть так называемые пацифисты, ненавидящие войну. Они внушают варягам и хазарам, что никакой войны не надо, что все захватчики стоят друг друга, что коренное население — это не мы и не они, а какие-то третьи… Волохов ведь пытался навешать вам этой лапши?</p><p class="p1">Женька молча кивнула. Врать этому человеку было бесполезно.</p><p class="p1">— Ну вот. Я не исключаю, что он связан с жадруновцами. Или, по крайней мере, что все это одна сеть. Вы уже видели, во что превращает эта ересь нормального боевого офицера, вот уже два года таскающегося со своими людьми по лесам вместо того, чтобы нормально драться с нами. Теперь этим охвачен целый гарнизон. Наш гарнизон, Женя. Я приветствую, когда на это ловится варяг, но не могу терпеть, что на это ловят хазарскую гвардию. Вы согласны?</p><p class="p1">— Согласна, — шепнула она. Во рту у нее пересохло.</p><p class="p1">— У вас полчаса на сборы, Женя. Моя машина вас отвезет на станцию. С вами отправятся пять охранников, которых я отобрал лично. Это абсолютно надежные люди. Уверен, что в Жадрунове с вами ничего не случится. Постарайтесь распропагандировать гарнизон предельно быстро. Там есть мой человек, от него я и получаю сведения. Гарнизон расквартирован в деревне Жадруново под Казанью, это наша резервная часть, вы на вашей должности могли о ней не знать. Никогда не слышали про Жадруново?</p><p class="p1">— Название где-то слышала, не помню.</p><p class="p1">— Ну, мало ли. Обычная деревня недалеко от Волги. Чем скорее вернетесь, тем лучше. И даю вам слово офицера, что Волохов не пострадает. И никто ничего не узнает — это моя вам личная гарантия. Контрразведка своим не врет. Что, договорились?</p><p class="p1">Женька понимала, что происходит нечто неправильное, что ее отсылают на гибель или на заведомо невыполнимое задание, а может, просто подальше от Волохова, которого она, глядишь, в самом деле больше никогда не увидит, — но понимала и то, что деваться ей некуда.</p><p class="p1">— Отказаться я, наверное, не могу, — сказала она с последней надеждой.</p><p class="p1">— Не можете, — кивнул Гурион. — Никак не можете. Я не стану вас шантажировать судьбой Волохова, Женя, но если придется — сами понимаете, его со всей этой летучей гвардией взять не проблема. Он думает — война, в стране хаос, но и в хаосе, видите ли, остались люди, на что-то способные.</p><p class="p1">— Ну, а если… если я усмирю этот ваш мятеж? Если я вернусь благополучно и с выполненным заданием?</p><p class="p1">— Тогда, — сказал Гурион с гнусной улыбочкой, — вам будет предоставлено куда более комфортабельное помещение, чем эта ваша банька. Встречайтесь с ним хоть в Баскакове. Правда, они с Эверштейном виделись еще в каганате, — кажется, вы в курсе… Но с Эвером я как-нибудь договорюсь.</p><p class="p1">— Я могу оставить для него письмо?</p><p class="p1">— Нет.</p><p class="p1">— Хорошо, — сказала Женька, встала и оправила гимнастерку. — Я буду готова через полчаса.</p><p class="p1">— Вот и славно, — сказал Гурион. — Мобильничек сдайте, пожалуйста. Не мне, не мне, — штабес-гою. У меня уже есть мобильничек.</p><p class="p1">— Гурион, — сказала Женька. — Я, конечно, понимаю субординацию и все такое. Но я вам, вам лично клянусь, — а у ЖД, как вы знаете, ложная клятва считается серьезным грехом, — что если с Волоховым без меня тут что-то случится, я вас под землей найду и голыми руками удавлю, понимаете, полковник?</p><p class="p1">— Женя, — холодно сказал Гурион, — вы теряете время. Поезд в половине седьмого, пересадка в Копосове. А угрожать будете Жадруновскому гарнизону. Поняли меня? Кру-гом!</p></span></span></span></span>
