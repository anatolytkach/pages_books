<p class="p">Глава четвертая</p>
<p class="p">Белая сила</p>
</div><span id="id86"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Денег у Бороздина было в обрез. Пора жесткой экономии еще не пришла, но он к ней уже готовился. Ашины утешения на него не действовали: «мои прокормят», «волки не оставят» — брать деньги у волков он хотел меньше всего. Еще бы не хватало: губернатор на иждивении туземцев. В страшном сне не могло привидеться. А между тем он сам был теперь на положении туземца, а то и хуже: туземец по крайней мере ни в чем не виноват. А Бороздин был виноват — он приближал конец света.</p><p class="p1">Бегство оказалось куда более дорогим занятием, чем он предполагал. Еда — ладно, это последняя расходная статья: Аша почти не ела, у него тоже не было аппетита среди сплошных беспокойств. Надо было платить за ночлег, потому что волки водились не во всякой деревне; переплачивать таксистам, потому что городской транспорт почти не ходил (в Сибири губернатор передвигался на личном автомобиле); в каждом новом городе платить въездную подать… Одежда — отдельная тема: они сбежали в чем были. Аша оказалась выносливей, чем он думал, но все время зябла, словно в этом сказывался вечный неуют бегства. В общем, тратил он больше, чем рассчитывал, и не знал, где в ближайшее время пополнить ресурс: устраиваться на работу он пока не хотел. Да и некогда было — они все время ехали, преодолели уже больше половины расстояния до таинственного Дегунина, где все должно было решиться. При этом губернатор трезво понимал, что проблема Аши, может, и впрямь решится, но его собственная — едва ли: не в разрешении волков оставить ребенка состояло его спасение. А повлиять на власть волки вряд ли могли — разве что хором спеть «Не одна в поле дороженька».</p><p class="p1">Во время бегства губернатор подивился тому, как мало он умеет. Управлять в России оказалось самым легким и необременительным делом, никакого специального навыка это не требовало, и чем ниже находился труженик в общественной иерархии, тем выше была его квалификация. О чем-то таком губернатор всегда догадывался, хотя и запрещал себе формулировать это вслух: он знал, что за самый нужный и сложный труд в России платят меньше всего. Впрочем, он утешал себя, что так везде. Начальник не должен работать: его дело — персонифицировать систему, служить ее наместником на земле и вести себя как можно менее рационально, намекая тем самым на иррациональность миропорядка. Такова была государственническая концепция труда — всему осмысленному в ней отводилось последнее место, но жизнь по-прежнему состояла из вещей осмысленных — а все, о чем он любил подумывать когда-то за обедом, в реальности ничего не стоило. Губернатор боялся даже представить, что рано или поздно придется трудоустраиваться.</p><p class="p1">Искали его серьезно, хотя и с неизбежной поправкой на распад. Но если даже с этой поправкой ему и Аше старательно перекрывали все отходные пути, если в каждом городе уже был развешан фоторобот, если началась газетная кампания (его обвиняли в громадных хищениях и разврате, вся область его знала, даже туземцы, если читают газеты, наверняка смеются) — значит, надежды на легализацию тщетны. Он совершил главный грех — нарушил тайный уговор, покинул чиновничью касту, сословие государевых людей, куда и впускали туго, а выпускать избегали вовсе. Все верно, он так и предполагал. Тот, кто увидел изнутри главную тайну государства — его полную и окончательную бессмысленность, стояние на честном слове; тот, кто жил этой бессмысленностью, воздвигая замок государства не на сыпучем даже песке, а на девственно пустом месте, — никому не смел проговориться об этом. Государственная тайна заключалась в ее отсутствии, и приобщившемуся этой святой тайны, как всякому умирающему, не было хода назад. Только поэтому святые тайны и сообщались в последний момент. Государственный человек умирал для мира. Продумано было все: оставаясь в статусе чиновника, он мог выбалтывать эту тайну кому угодно — ему бы все равно никто не поверил; в России не принято было верить чиновнику — как, впрочем, и попу. Чиновнику потому и нельзя было становиться частным лицом, что в этом статусе он мог бы разболтать всем, и его бы услышали. Губернатор был опасен и сам это понимал. Больше того — оставаясь в пределах государственной системы, глядя на вещи изнутри, он и подумать не мог, что государство стояло на пустом месте; но стоило ему взглянуть на систему извне — он тотчас понял, что охранял сундук самой отборной, самой торричеллевой пустоты, и весь смысл сундука был не в содержимом, а в охране. Никому нельзя было этого говорить. Все тотчас разбежались бы. О гениальная гостайна, смысл которой внятен только тому, кто побывал в государственной системе и ушел оттуда! Даже снаружи, с Востока и Запада, ничего не было видно: ведь чтобы понять — надо было попробовать, а кто бы их пустил?! Вот почему в России власть так редко менялась: правитель либо умирал, либо бывал убит подданными, а в единичных случаях, когда смещался живым, — его прятали за семью замками. Поистине русской государственной системе нечего было опасаться: раскрыть ее главный секрет мог бы только тот, кто познал и покинул ее, — а покидали ее только мертвые. Кто же уйдет по доброй воле из единственной сферы, где ничтожество было гарантией всемогущества, а неспособность ни к какой осмысленной деятельности — высшей добродетелью? Кто добровольно выскочит из системы, где смысл упразднен, цель отсутствует, а бездеятельность служит залогом процветания? И что самое поразительное — пока сам он крутился в этом колесе, именно такое мироустройство представлялось ему образцом разумности, торжеством альтруизма: непрагматические ценности, высшие, бескорыстные смыслы! Теперь, варясь в низкой жизни и подчиняясь ее нуждам, он поневоле оскотинивался, начиная ненавидеть абстракции, ценя простые вещи вроде ночлега и пищи; то, что губернатор теперь называл про себя чиновничьим абстракционизмом, было уже почти недоступно ему.</p><p class="p1">Нечего было и надеяться на оправдание или последующею легализацию. Аша, против его ожиданий, вела себя сдержанно, не плакала, не жаловалась: все ее существо было теперь посвящено главной задаче.</p></span><span id="id87"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Губернатор прошелся по базару, посмотрел кой-какого товару, привычно послушал причитания туземцев о том, что никто ничего не берет, а кто и берет, норовит не заплатить, — он слышал нечто подобное в азиатских странах, где бывал еще во время практики: те же приставучие грязные люди с сомнительным, а чаще и несомненно гнилым ассортиментом, заученными жалобами, спекуляциями на горе, в котором они сами виноваты и которого давно не считают горем, потому что не видели другой жизни и не выдержали бы ее… Он уже по Азии знал эту туземную манеру немедленно забывать о покупателе, перед которым только что произносились причитания, жалобы, мольбы, проклятия: покупатель отошел — проигрыватель отключился; другого способа остановить туземный вой не было. Так же и с цыганами: вступить в диалог — значит пропасть. Взгляни — и мимо, а лучше и не гляди. Туземец тут же приходил в обычное свое состояние — дремотное оцепенение, и делал это с той же легкостью, с какой переходят с иностранного на родной. Они выучили иностранный — язык плача, жалоб, проклятий, — но в обиходе этим не пользовались, ибо человеческих чувств не знали. Они жили иной, природной, более простой, но и бессмертной: с ними ничего нельзя было сделать. Торговец яблоками уж так распинался, чтобы губернатор купил мелкие, кислые, раннего летнего сорта, явно недозрелые яблочки, — настоящий белый налив, как уверял потрепанный, пыльный, желтый мужичонка; но стоило губернатору отойти — он с прежним каменным спокойствием уставился в пространство. Все-таки власть все делала правильно: невозможно их выучить, бессмысленно просвещать, не стоит и лечить — дерево само себя лечит; в лучшем случае обеспечивать работой, в худшем — милостыней. Они ничего не хотели, вот в чем штука. Теперь эта природная сила ополчилась на Ашу так же беспричинно и слепо, как природа, ни в чем не дающая отчета. Странно было одно — что на стороне этой силы отчего-то выступала и власть. Ей-то Аша со своим ребенком чем опасна? Неужели все дело только в том, что чиновник связался с туземкой и потому выпал из касты? Но мало ли было подобных связей! Он, кажется, даже слышал что-то подобное… Все мог понять губернатор, но этого предательства не понимал: чем он повредил системе, которую с ранних лет признал и принял как свою? Неужели вся вина его была в том, что он позволял себе не просто тупо выполнять ее установления, но и подводить под них интеллектуальные оправдания?</p><p class="p1">Губернатор всю жизнь принадлежал к так называемой русской партии, но не к почвенному, всегда побеждающему ее крылу, а к европейскому изводу. Собственно, истинные славянофилы всегда были в России большими европейцами, чем самые оголтелые западники: западники нерегулярно мылись, жили в запустении, не ценили хорошего белья и тонкого вина, — а умные и волевые славянофилы вроде Самарина знали себе цену, не замыкались в абстракциях, умели холить и баловать себя… Каждая фраза в их трудах была написана со здоровым аппетитом, словно во время вкусного сельского обеда в летней усадьбе: на первое окрошка, на второе дичь, и рюмочка запеканочки. Эта русская партия отзывалась подчас о России с брезгливостью, какой ни у одного либерала не найдешь: третий раз горит Тамбов из-за печного отопления, третий раз перестраивают город — и все не построят паровых труб! К этим-то почвенникам, истинным, а не мнимым, почвенникам по убеждению, а не от невежества, власть никогда не желала прислушиваться. Они живали за границей не по одному сезону, читывали французов и немцев в подлиннике, им было с чем сравнить — и потому их почвенничество чего-то стоило; но именно власти оно никогда не было нужно. Лучшее, на что они могли рассчитывать, — отдаленная губерния в мирное время, бегство и преследования в военное. К власти в России всегда приходили только те патриоты, которым для обустройства ее не надо было ни паровых труб, ни пульмановых вагонов, а только искоренение неруси как быстрейшая и доступнейшая мера; и начинались погромы, и летели головы — а Тамбов так и отапливался печами… Губернатор сам не понимал, почему именно его умная любовь к России всегда оказывалась никому не нужна; более того — она была вынужденно бездейственна. В любой стране — наша не исключение — ничего не сделаешь в одиночку, а для массового призыва во власть умных патриотов попросту не хватало. Теперь ее снова захватили бездари — и вместо того, чтобы обрушить все силы на ЖДов, они, как всегда, предпочитали разбираться со своими: ближе, доступней, да и не так страшно… Видимо, окончательной победой «зверски-патриотической партии», как называл он про себя всех этих вечно обиженных, агрессивно глупых людей, и объяснялся крах его карьеры, а теперь и это бегство.</p><p class="p1">В деревне, где они остановились и где была у Аши дальняя родня, они занимали комнату в темно-синем, ветхом деревянном доме, где царил первобытный беспорядок, строго и придирчиво организованный. Таким же хаосом кажутся человеку горы — а ведь Господь, наверное, что-то имел в виду, громоздя их; краем сознания губернатор подумал, что и дикарю часовой механизм покажется хаосом… Все в этом доме стояло не на своем месте, посуду никогда не мыли, с хозяйской кровати не убирали каких-то засаленных тряпок — в них и заворачивались, когда падали спать. Страшно сказать, губернатор, некогда полновластно управлявший туземным краем, впервые жил в туземной избе. Почему сделана вот эта приступочка вдоль стены, вроде плинтуса? Отчего в углу грязной комнаты всегда стоит эмалированная кружка с водой — домовому, что ли, наливают? Зачем рассыпана по столу крупа — всегда одной и той же кривоватой горкой, горсткой, которую небрежно сметают каждое утро на пол — и каждый вечер насыпают опять? Дом был полон невидимых существ, которым приносили сложные жертвы; во всех этих ритуалах смысла не было и на копейку, и вдобавок от них разводилась страшная грязь, — но, мнилось, именно это и поддерживает рассохшийся, стонущий дом, не давая ему рассыпаться окончательно. В комнате, отведенной губернатору и Аше, громко тикали часы, а на окнах висели кружевные занавесочки — желтые, грязные.</p><p class="p1">Он купил всякой моченой овощи — больше ничего пристойного на базаре не нашлось, все местное население, кажется, питалось семечками, семочками, как они с невыносимой мокрой ласковостью, причмокивая, называли этот саднящий продукт. Вошел в избу — первое время стыдился, что все работают, а он нет, шляется днем, мешает всем, как любой государственный человек, насильственно погруженный в пучину обычного быта: ведь работа государственного человека совсем не такая, как у туземцев и низших служащих; на их взгляд, он вообще ничего не делает, знай себе перекладывает бумаги, — а между тем только в его работе и есть подлинное напряжение, только ею и держится мир… Но очень скоро всякий стыд прошел: они тоже ничего не делали. Правда, ему так и не пришла в голову мысль о некоей симметрии — о том, что государственному человеку их деятельность также не видна, а между тем именно ею все и держится; все-таки он был чиновник и такого допустить не мог. Старуха, сидевшая у стола в кажущейся неподвижности, на самом деле управляла ростом всех зерновых в окрестностях и вела с ними напряженный безмолвный диалог (что же, вы хотите, чтобы она вслух разговаривала с зерновыми? Но ведь зерновые не говорят по-человечески!); старик в углу, глядевший себе под ноги, шинковал гоноши, без которых никак, и невозможно даже объяснить свежему человеку, что такие гоноши, в чем их окурка. Даже мальчик, гонявшийся по двору за курами, не просто будковал, а грапал, но это вещь столь тонкая, что не всякий огурь отличит будкаря от грапаря. Губернатор, посетовав на неискоренимую туземную праздность, прошел в горницу, лег на кровать и включил телевизор.</p></span></span></span></span>
