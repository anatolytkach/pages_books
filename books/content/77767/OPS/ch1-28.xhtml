</div><p class="p1">Волохов вернулся в Москву в начале октября, и скоро ему стало куда как худо.</p><p class="p1">Он проглядывал иногда женькин ЖД — живой дневник, с особенным сладострастием залезал в подзамочные записи, но и там не находил ничего сверх обычного. Личная жизнь у нее, вероятно, была — как не быть, — но либо не затрагивала женькиной души, либо не предназначалась для обсуждения. Женька писала о терроре, политике, новых людях и местах, подробно расписывала свои бесконечные разъезды, вывешивала фотографии — жизнь ее без Волохова шла совершенно как при Волохове и до него, и это его уязвляло, но и исцеляло. Он не мог позволить себе сходить с ума по женщине, так легко без него обходившейся. Через неделю он все-таки ей позвонил.</p><p class="p1">— О-о! — пропела она спокойно и ласково. — Здравствуй, зверь!</p><p class="p1">— Здорово, — сказал он хмуро, поскольку не любил признаваться в слабости. — Как ты?</p><p class="p1">— Как обычно. Ну, скучаю, конечно.</p><p class="p1">— Одолжений мне только не делай, — буркнул он.</p><p class="p1">— А никто и не делает. Давай, пообижайся на меня, это помогает.</p><p class="p1">— И советов не давай! — вконец вызверился он, но тут же сменил тон. — Я чего звоню-то, собственно. Ты все-таки… Ну, не знаю. Жень, может, мы бросим весь этот бред к черту и ты приедешь сюда?</p><p class="p1">— Вол, я тебе все уже так красиво рассказала, а ты все думаешь, я шутки шучу. Приезжай лучше ты, я всегда тебе буду страшно рада.</p><p class="p1">— Это успеется, — сказал Волохов. А какого черта, подумал он, я никогда с ней не лукавил, почему должен сейчас изображать непонятно что?! — Я вообще тоскую очень сильно, и больше того — ревную.</p><p class="p1">— Ну а как же, — сказала она. — Ты же меня любишь, наверное.</p><p class="p1">— А ты меня?</p><p class="p1">— Никогда об этом не спрашивай. Я дала тебе все доказательства.</p><p class="p1">По голосу Волохову показалось, что она торопится.</p><p class="p1">— Ты на задание бежишь?</p><p class="p1">— Почему, по номеру дежурю. Говори, говори.</p><p class="p1">— Кто там тебе сейчас целует пальцы?</p><p class="p1">— В данную минуту — никто. А вообще мы договорились, что это не обсуждается.</p><p class="p1">— Мало ли мы о чем договорились.</p><p class="p1">— Мало. О двух вещах. Можно бы и соблюсти.</p><p class="p1">— То есть ты не едешь сюда и живешь там, с кем хочешь?</p><p class="p1">— У-умница, — ласково протянула она. — Правда, с кем я хочу — ты знаешь, но моя одинокая трудная жизнь тебя не касается. Уговор есть уговор, эту сторону жизни мы не трогаем.</p><p class="p1">— Вот об этом я с тобой не договаривался.</p><p class="p1">— Ну, можешь в одностороннем порядке отчитаться о своих успехах.</p><p class="p1">— О да, — сказал Волохов, — я успешен.</p><p class="p1">— Что у тебя с работой? Понял теперь, кто коренное население?</p><p class="p1">— Не твое дело, — сказал он. — Это будет третья вещь, которая не обсуждается. Война есть война, а в ней военная тайна. Я, наверное, выберусь ближе к весне.</p><p class="p1">— Давай.</p><p class="p1">Он повесил трубку. Была еще пара писем, таких же гладких и безликих, с парой утешительных признаний, которые она, скорее всего, подпускала нарочно, из чистого человеколюбия.</p><p class="p1">Гораздо серьезней оказалось другое — обычно, возвращаясь в Россию, Волохов испытывал род злорадного удовольствия. Что говорить, он поездил, но всякий раз по приезде с тайным наслаждением думал: а вот посели сюда любого из тех, с кем я только что так мило проводил время, обсуждая альтернативку или сочиняя прогнозы, — и все эти люди спекутся на другой день, а я, слава тебе Господи, чувствую себя как глубоководная рыба в родной, илистой, мутной воде. Он никогда не брал такси из Шереметьева, чуть ли не с национальной гордостью втискивался в маршрутку, а то и вовсе в автобус, не поддерживал разговоров о том, как Родина-мать с порога встречает детушек грязью и бардаком, злобой первого же таможенника, вонью первого же сортира, — ему нравилось думать, что в нетепличных условиях вырастают приличные люди, умеющие думать о великих абстракциях (потому что думать о конкретике в таких условиях выходило себе дороже). В Штатах, где о почетном госте заботились, как о родном, — ему все время было неловко, казалось, что за все это радушие придется платить Бог весть чем, его больше устроило бы честное безразличие и минимум комфорта, с номером без отопления и обедами в китайской забегаловке. Ему вечно казалось, что взамен удобной и надежной жизни Россия способна предложить уроженцу что-то не в пример большее — масштаб, если угодно; долгое сырое эхо, подзвучивающее каждое слово. Сами неудобства и гнусности местной жизни представлялись ему непременным условием честного и осмысленного бытия. Именно поэтому возвращение всегда бывало для него грустным, строгим, но желанным праздником — и только после Каганата что-то в этой системе эмоционального самообеспечения вдруг нарушилось. Сколько бы он сам ни издевался над теорией Эверштейна, — придумал которую, впрочем, не Эверштейн, — в этот раз все в Москве подтверждало эту спекулятивную чушь, и скоро Волохов сам — бессознательно, а потом и сознательно — отыскивал новые и новые доказательства в пользу того, что родился и прожил жизнь в захваченной стране.</p><p class="p1">Ничем другим нельзя было объяснить местного отношения к собственной земле, избыток которой словно раздражал обитателей — непонятно было, что с ней делать; всякий раз, как урожай превосходил ожидания, его стремились сгноить, злясь на пресловутые лишние центнеры с гектара: так в бедной семье смотрят на нежеланного ребенка, от которого все равно никакого толку, а теперь корми! Никто не чувствовал своими ни улицу, ни двор — и оттого все загаживалось с тем же гордым, сладострастным наслаждением, с каким сам Волохов, бывало, ломился в вагон метро в разгар часа пик: он словно доказывал невидимому соглядатаю, что может жить и даже мыслить в этой банке сардин, где каждый с ненавистью смотрел на соседа, умудрявшегося вдобавок читать книгу или тереться носом о щеку спутницы — не смей отвлекаться, страдай! Непонятно было одно — почему Волохов всегда чувствовал над собою этого соглядатая; даже те, кто затаптывал клумбы во дворах или опрокидывал урны, делали это для того же невидимого Бога. «Вот!» — как бы говорили они, а что «вот» — Волохов никогда не задумывался.</p><p class="p1">Он только теперь заметил за собой эту постоянную оглядку: еще в армии ему все время приходилось доказывать свое право на существование людям, которые ни при каком раскладе сами такого права не имели. В армии им помыкал сержант, сержантом — майор, майором — комбат-полковник, и по всем параметрам — от интеллекта до человеческих качеств — полковник был хуже сержанта. Святой и неизменный принцип отрицательной селекции являлся во всей своей красе: всякий начальник в России обязан был понимать ситуацию хуже подчиненного, превосходя его в жестокости, тупости и хамстве, но уступая в компетентности и трудолюбии. Даже взбегая по лестнице и с неудовольствием замечая усилившуюся одышку, даже заготавливая дрова на даче и сетуя, что не всегда с первого раза раскалывает сырую липовую чурку, — Волохов все время отчитывался перед незримым сержантом, наблюдавшим за ним с истинно начальнической брезгливостью, и притом заранее знал, что сержант не одобрит его: таковы условия игры. Ни один начальник в России не преследовал цели помочь подчиненному или наставить его на путь истинный: начальник-гуманист расписывался в слабости, а слабость была всего непозволительней, ибо ничто, кроме страха, не могло заставить подчиненного трудиться на такую харю и в таких условиях. Любой стимул, кроме ужаса, отсутствовал, — ибо все заработанное либо немедленно отбиралось, причем демократы и тоталитарии словно соревновались по этой части, либо обесценивалось унижениями, которые пришлось претерпеть.</p><p class="p1">Штука в том и заключалась, что работать никому не хотелось. Те немногие, для кого это было потребностью, считались идиотами и возбуждали в лучшем случае сочувствие, а в худшем ненависть, с какой профессиональный лентяй-забастовщик, наевший ряху на профсоюзных протестах, смотрит на трудягу-штрейкбрехера. Всякая работа была работой на дядю, никто ничего не делал для себя — и это было первым признаком жизни в захваченной стране, признаком, в котором Волохов не мог ошибиться, ибо изучал жизнь захваченных народов и понимал, как она устроена. Не хватало последнего толчка, крошечной логической связки, — чтобы прикинуть все это на собственную российскую жизнь и сделать выводы… а может, он давно уже их сделал и злился на Эверштейна только потому, что он это выговорил вслух.</p><p class="p1">Главной приметой подневольного человека была ярость с утра и умиротворенность к вечеру: раб злился на каждый новый день за то, что он нес с собой новые труды и унижения, — и радовался всякий раз, когда от его бесконечного срока откалывались еще сутки, а значит, предстояли шесть часов рваного, тяжкого сна в вечном ожидании окрика. Обиднее всего было, что и начальство от своей начальственности не получало никакой радости — Волохов отлично видел, что с утра в России злы решительно все, вне зависимости от чинов и рангов. Над начальниками были другие, над другими третьи — и все они служили таинственному племени, которое тоже, казалось, уже не радо, что захватило столько земли и живущего на ней народа. Над захватчиками, наверное, тоже кто-то стоял — не своею же волей пошли они войной на эти леса и болота, покорили их себе, а теперь не знали, куда деть; и стоявший тоже не получал от своей верховности никакого удовольствия — наверняка захватил у кого-то эту слишком большую Вселенную, выгнал истинных владельцев, а теперь вымещал разочарование на подчиненных. Слишком ясно было, что Россией он правил без любви.</p><p class="p1">Никто в России не чувствовал своей ни землю, ни квартиру, ни женщину. Все могло быть отнято в любой момент, и в глубине души никто не удивился бы такому исходу. Волохов — вечный противник революций, отлично знавший, как они делаются, в любом бархате распознававший наждак, а в любой вольнице оргию, — начал даже задаваться вопросом: почему, собственно, терпят?! — но тут же ответил сам себе: терпят, потому что так надо, потому что заслужили, черт возьми, и прав был некто (таких авторов, впрочем, нашлось не меньше дюжины), заметив, что если заклепать во узы любого россиянина или вдруг лишить его всего имущества — он, возможно, и поропщет для виду, но в душе не удивится. Если же вдобавок не сказать ему причины — он таковую причину немедленно найдет, самостоятельно подобрав исчерпывающие мотивировки для своих мучителей. Все было по заслугам, по давным-давно заведенному порядку; захватчик не нуждался в том, чтобы доказывать свои права. Он захватил эту землю раз и навсегда, и рабство успело войти в кровь всех, кто выжил под железной пятой.</p><p class="p1">И еще в одном был прав Эверштейн — прав настолько, что отступали любые логические возражения: можно было еще оспорить предположение насчет хазарских прав на Россию, отыскать источники, опровергнуть домыслы, — но никто не мог объяснить, почему задачей любой русской власти, вне зависимости от ее происхождения, характера и продолжительности, было в первую голову уничтожение собственного народа, и уж потом все остальное, не более конструктивное. Именем народа совершались революции, начинавшие с масштабных истреблений, и реформы, превращавшиеся в гекатомбы; народ уничтожали закрепощениями и свободами, нищетой и шальным богатством, десятками экзотических способов — и все при прямом соучастии народа, не без мазохистской готовности кидавшегося в новые и новые затеи, лишь бы оборвать это невыносимое насильственное существование. История захваченной страны в точности копировала хроники древних победоносных армий, в которых жизнь солдат, изнуренных походами, холодом и скудостью рациона, была настолько невыносима, что они радостно бросались в бой навстречу всеобщей избавительнице. Так вела Россия и все свои войны — побеждая пространством и жертвенностью, выдумав даже специальное обоснование на предмет этой жертвенности, называя православное воинство жатвой под серпом творца… Угнетенные кидались на врага или друг на друга с той же яростью, с какой дрались гладиаторы, — правда, освобождался как раз побежденный, а победитель возвращался в клетку. Тем восторженней он расставался с жизнью в следующем бою.</p><p class="p1">Эта ненависть к жизни, к ее продолжению, к робкой, рабской надежде как можно дольше влачить тоскливую неволю, — в России прежде всего обнаруживалась в повадках трех главных воспитателей и утешителей человека: священников, врачей и учителей. Волохов отлично помнил свою первую учительницу, оравшую на перепуганных, а потом и озлобленных детей так, что стекла дрожали; Бог миловал его от частых обращений к врачам — но заходя иногда в поликлинику ради справки для дальней поездки, он наблюдал интонации и манеры несчастных участковых медиков, чьего пятиминутного гневного приема по многу часов дожидались отвратительные и жалкие старики. Тут Эверштейн был прав неоспоримо — дети мешали учителям, отвлекая их от чего-то главного, больные препятствовали врачам заняться настоящим делом, и даже попы с отвращением крестили новорожденных и отпевали усопших, торопясь поскорее вернуться к заветному, от чего их оторвали ради нужд низкой жизни. Каждый врач, учитель и священник всем своим видом говорил любому, кто обратился к нему в поисках пути или утешения: «Вас много, а я один», — главное же, что и утешить несчастного ему было нечем, ибо и над ним стоял учитель-мучитель, врач-палач и священник-мошенник. Хуже всех было попу — прямо над ним нависал непреклонный русский Бог. Бог, которого навязывали захватчики, ничем не отличался от сержанта. В отличие от прочих, иногда милосердных и даже сентиментальных, русский Бог умел только требовать и никогда не бывал доволен: любые жертвы были недостаточны, любые просьбы — обременительны. Этот русский Бог мог быть придуман только для угнетения пленного народа — никакая низовая религиозность, ничья сердечная тоска по иной жизни не могла бы породить этого монстра с пронзительным взором; ни один народ не в силах был бы молиться черной доске — закоптелому прообразу черного квадрата; а если вдуматься, русский Бог именно и был черным квадратом, и напрасно реставраторы тщились расчистить наслоения черноты, под которыми якобы сияли божественные краски. Под одной чернотой зияла другая, еще черней. За долгой жизнью в плену должна была наступить такая же несвободная смерть, и в загробном пространстве вся разница между грешниками и праведниками состояла в том, что праведники маршировали на плацу, горланя строевые псалмы, а грешники занимались их жизнеобеспечением в жарком и смрадном кухонном наряде или бесконечно чистили сортир, дежуря по роте.</p></span><span id="id37"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Каждый в России самоутверждался и ничего другого, в сущности, не делал. Самоутверждались на дороге, в очереди, на парковке, — о работе и семье нечего говорить: каждый стремился доказать, что он лучше, словно избывая давнюю травму, несмываемый позор, напоминание о собственной рабской природе или страшном историческом поражении. Каждый расталкивал остальных, ненавидел всех, кто впереди, и презирал всех, кто сзади; это равно проявлялось в русском бизнесе и в русской очереди, змеящейся по супермаркету для бедных. Покупатель давал продавцу понять, что он, покупатель, тут хозяин, а продавец — обслуга; продавец давал понять, что он тут владыка, а покупатель — недочеловек. Этот пир самоутверждений и взаимных истреблений продолжался только потому, что у всех этих людей, стоящих в очереди, выдающих кредиты или качающих нефть, — не было ничего объединяющего, кроме сознания собственной неправоты, от которого распри становились только яростнее. Все были неправы, все не имели права ни на свою нефть, ни даже на пакет яблок в супермаркете для бедных. В любом другом обществе людей объединяла хотя бы страна, которую они в какой-то момент переставали губить раздорами и начинали вытаскивать коллективным трудом, — но в том-то и штука, что здесь страна была всем чужой, а потому никаких платформ для объединения не существовало. Каждый был сам за себя, а Бог-завоеватель — против всех.</p><p class="p1">Русский террор причудливым образом нарастал снизу, по первому толчку: стоило власти убить или убрать десятерых, как народ начинал самоистребляться сотнями. Первый же арест заговорщика порождал лавину доносов о том, что все — заговорщики; революция, начавшаяся на диво бескровно, немедленно превращалась в вакханалию бессмысленных убийств — и если любая другая нация выходила из кровавой купели обновленной и не желающей повторять ошибки, в России пароксизмы самоистребления ничего не меняли. Гражданская война никого не сделала свободнее, репрессии не застраховали от их повторения, ибо нарастали снизу; приватизация и все, что за ней последовало, не избавила ни от одного социалистического проклятия и уничтожила все социалистические преимущества; при первом веянии свободы братки кинулись самоистребляться, а рэкетиры вели себя ровно как в тридцать седьмом. В сущности, любая перемена выражается прежде всего в том, что меняется способ назначения в начальники: если раньше им становился самый богатый и самый идейный, то теперь в идеале им должен стать самый умный или храбрый; но и при Петре олигархом номер один становился самый вороватый — лучший захватчик вместо лучшего труженика. Любой, кто преуспевал в России, обладал всем набором черт захватчика — и неважно, что победители давно уже захватывали друг друга. На чужой земле иначе нельзя.</p><p class="p1">В России единой нации не могло быть по определению: у захватчиков и захваченных не бывает общих принципов. Им ни о чем не договориться, да они и не хотят договариваться. Их главная цель — взаимное истребление; и поскольку хазар в обозримом пространстве почти не осталось, они истребляют теперь того, кого назначают в туземцы самостоятельно.</p><p class="p1">Для начала в надсмотрщики и командиры попадали худшие из захватчиков — самые решительные и жестокие; потом правой рукой такого надсмотрщика становился человек из туземцев, наиболее злобный и беспринципный. Так формировалась та самая отрицательная селекция: наверху оказывались худшие, а вниз вытеснялись все, кто хоть что-нибудь умел. Скоро население делилось уже не на русских и хазар, — это членение, надо полагать, перестало быть актуальным уже веку к одиннадцатому, когда хазар окончательно выгнали. Деление стало иным — на захватническое начальство и подчиненное большинство, которое могло подняться наверх только ценой предательства или полной утраты всех дарований. Такова была судьба всех захваченных государств: истребив или выжив с захваченной земли коренное население, агрессоры принимались по той же схеме губить друг друга, ибо в их сознании уже существовала ниша туземца — и кандидатом в эту нишу был любой, кто по душевным качествам не подходил на роль надсмотрщика.</p><p class="p1">Первый закон захваченных территорий можно было сформулировать так: «Временная администрация покоренной территории, назначаемая из туземцев, копирует манеры и приемы захватчиков, продолжая осуществлять их цели. Исключения, когда туземная администрация пытается добиться послабления для коренного населения, единичны и плохо кончаются для всех сторон конфликта». Чтобы вывести этот закон, не обязательно было читать римскую историю или американскую фантастику. Достаточно было отыскать мемуары уцелевших обитателей гетто или свидетельства о концлагерях.</p><p class="p1">Отсюда с неопровержимостью явствовало, что любая страна, администрация которой, даже принадлежа к самому что ни на есть раскоренному населению, полагает главной целью истребление и унижение собственного народа, — в недавнем прошлом была захвачена; если же в этой стране воруют и мародерствуют, как в поверженном Багдаде или захваченном Берлине, — это означает, что вместе с былой властью рухнули и законы, и захватчик тщательно следит за тем, чтобы побежденное население не сумело сформулировать их заново. Захваченные должны были жить не по законам, которые написали сами для себя, — а по правилам, которым им спустили сверху, и составлены эти правила были так, чтобы число уцелевших противников сократилось со временем до размеров среднего штата вышколенной прислуги. В слишком большом количестве рабов победитель не нуждался. Сам он, разумеется, следовал каким-то законам и даже, рискнем сказать, принципам — но население на принципы не имело права: чтобы оно не успело их выработать — и взбунтоваться, — следовало каждые десять лет внушать ему новую веру, и в русской истории именно так и делалось: все ее причудливые зигзаги получили вдруг исчерпывающее объяснение. Людям годами внушали, что они боги, а потом так же старательно вдалбливали, что они твари, — с единственной целью: добиться, чтобы они окончательно утратили понятие о богах и тварях и никогда не объединились на простейших базовых принципах, дабы раз и навсегда опрокинуть гнет. Каждый новый захватчик для начала вымаривал даже те немногочисленные культурные установления, которые чудом уцелели при предыдущих: немецкий запрещал русские драматические театры, вернувшийся русский закрывал журналы и пускал под нож книги, а совсем уж новая генерация туземной администрации, гордо называвшая себя даже не надсмотрщиками и не капо, а менеджерами, имела целью прикрыть все популяризаторские издания, дабы в изобилии расплодить комиксы. Населению не полагалось теперь даже грамоты.</p><p class="p1">Нынешнее население не верило уже ни в одни закон, божеский или человеческий, — а потому и надеяться на то, что оно выгонит обнаглевших завоевателей, более не приходилось. Нечто подобное наблюдалось в Латинской Америке — да, в сущности, и на любой территории, население которой покоряли и истребляли с особенной жестокостью. На континенте, где вплоть до пятнадцатого века хозяйничали майя, — не удавалось ничто, кроме сериалов: пресловутое сходство России с Бразилией или Аргентиной, как понял Волохов, держалось именно на этом. Воровали все, кто умудрялся дорваться до власти; военные перевороты и смены национальных мифологий происходили раз в десятилетие, если не чаще; ни одна революция не меняла положения народа, ибо все начальники вели себя как захватчики, а все подчиненные — как рабы. Главный ужас заключался в том, что земля, которую захватили, сама диктовала захватчикам воспроизведение одного и того же убийственного стереотипа. Можно было уничтожить все коренное население, сжечь его памятники, забыть письменность, можно было огнем и мечом выморить или выгнать всех, до последнего человека, — но посмертная месть несчастных жителей заключалась в том, что захватчики уже не могли остановиться: они начинали колонизировать сами себя, безжалостно угнетая всех, кто умел работать, и возвышая исключительно тех, кто умел убивать. И у власти не было больше совести, а у захваченных ею жителей — надежды. Схема воспроизводилась на новом материале: в захваченной россами Хазарии хазаром становился любой, кого стоило называть человеком, а гордое право называться русским доставалось тому, кто первенствовал по части жестокости и бездарности. Все это было столь типично для закрытых подневольных сообществ, в которых хозяйничают чужие, — что Волохов проклинал собственную недальновидность: как он с первого взгляда не понял, что живет в колонии?</p><p class="p1">Что обмануло его? Литература, вечно бившаяся над тем же неразрешимым противоречием: мы живем здесь, но ничто не наше? Пейзажи, наводившие всю на ту же мысль о бесконечном и бессмысленном кротком терпении? Само население, от любой власти ожидавшее прежде всего массовых отъемов нажитого? Все говорило об одном, все указывало на то, о чем Волохову сказали в каганате; не может же быть, чтобы другие в упор этого не замечали!</p></span><span id="id38"><div class="title5">
<p class="p">4</p>
</div><p class="p1">Но даже это не было еще главным.</p><p class="p1">Самым грозным выводом из открывшегося ему закона было то, что у захваченной страны нет линейной истории. Население ее привыкло жить в уютной и попустительской исторической безответственности. Это было страшнее всего, и об этом Волохов думать не хотел. Цикл русского развития нарисовался ему мгновенно, с той убедительностью, с какой обнаруживаешь вдруг убийственную закономерность в хаосе линий собственной судьбы. Ни одно русское преобразование, будь оно революционным или реформаторским, не могло дойти до конца, потому что логическим концом было бы изгнание из России русских — а они держались за эту землю крепко, привыкнув жировать за счет порабощенного большинства.</p><p class="p1">Страна, у которой не было человеческого закона, обречена была жить по законам природы. Примерно раз в век, в начале столетнего цикла, случалась очередная революция, не ведущая ни к чему: оно и понятно, Россия так и оставалась колонией, власти которой выслуживаются перед незримым Куком. Вслед за революцией наступал заморозок, вслед за ним — легкое послабление для выпуска пара, называемое «оттепелью». После этого режим впадал в маразм, и никакого способа преобразовать его, кроме революции, не было: он давно не реагировал ни на что, кроме топора. Всякая новая топорная революция отбрасывала страну на полвека назад, отнимала немногие завоевания и губила тех, чьим именем затевалась; после чего новое закрепощение порождало новых правителей и протестантов, — протестанты взрослели и умнели, правители старели и тупели, власть падала, протестанты в хаосе вымирали с голоду, и новый тиран на руинах прежнего противостояния запускал часы по новому кругу.</p><p class="p1">У каждого из этих четырех секторов русского круга обнаружились особые приметы. Революция всегда заканчивалась военным путчем — иногда отсроченным, но неизбежным, как стрелецкий. Заморозок совпадал с большой внешней войной, которая и позволяла придать ему видимость перестройки общества на военные рельсы; если войны на горизонте не было — ее инспирировали. Оттепель сопровождалась расцветом искусств, тогда как при тиране-морозильнике талантов было меньше, а сами они — больше. В конце оттепели обязательно высылали или сажали того, кто горячее в нее поверил и больше себе позволил: Радищев ехал в Илим, Чернышевский — в Вилюй, Синявский — в Потьму. Главное же — эта закономерность не зависела ни от одной личности, и роль этой пресловутой личности в истории стремилась к нулю. Единственное, что оставалось, — спасать лицо. Очень немногие догадывались, что любая деятельность по преобразованию страны успешна лишь постольку, поскольку совпадает с ее собственным циклом — так женщина в известное время неспособна забеременеть, хотя бы над нею трудился сам Казанова, а неделю спустя может понести даже от ваты из матраса матроса. Когда Россия в очередной раз пребывала в маразме — революцию могла сделать горстка маньяков во главе с посредственным публицистом, понятия не имевшим о русской реальности; в любое другое время подпольными кружками могла кишеть хоть вся страна, и во главе их могли стоять хоть Желябовы, хоть Рютины, — и все их усилия ни к чему не приводили, ибо было еще, по излюбленному российскому определению, «не пора». Во времена заморозка можно было устроить народные волнения или случайное цареубийство, но царь, приходящий на смену, оказывался таков, что убитый рядом с ним выглядел агнцем; в канун оттепели можно было пропихнуть во власть законченного самодура — и он оказывался обречен на благие дела, массовые амнистии и чуть ли не публичный гопак. Всего занятнее было наблюдать эти закономерности на примере конкретного лица, которое в одном секторе круга действовало как заправский революционер, а в другом, сохраняя прежние черты, принималось за выжигание каленым железом всего, что еще торчало над поверхностью льда. Иван Грозный, чью канонизацию Волохов с омерзением пронаблюдал вскоре после возвращения, начинал как революционер, кончил как душитель и даже, кажется, планировал оттепель — осуществлять которую пришлось Годунову; только смерть Петра спасла его былых соратников от высылки и опалы, — однако выслать их успели наследники; Александр Благословенный, с чьего благословения устраивались в шестнадцатом военные поселения, был тот же самый Александр, который затевал скромную революцию своих первых лет, чуть было не увенчавшуюся освобождением крестьянства, и даже тот, в чье царствование открылась Волохову истина, провел девяностые годы в самом что ни на есть демократическом стане, искренне удивляясь, как его критики могли настолько не понимать причин перерождения.</p><p class="p1">Попасть в русскую власть мог любой, кто в предложенной ситуации принимал наихудшее решение, — а подняться до высшей ступеньки способен был всякий, кто чувствовал, куда ветер дует, и не пытался зимой собирать грибы, а летом играть в снежки. Главный же парадокс состоялся в том, что достижение высшей ступени власти как раз и означало переход к полному бессилию, ибо если политик в России мог еще что-то сделать с собственной карьерой или с горлом ближайшего соперника, — то уж сделать что-либо с Россией не мог ни при каких обстоятельствах: в ней все делалось само, и убежденный демократ превращался в душителя, а отчаянный противник государства вроде Ленина начинал выстраивать самую византийскую из всех государственностей, которые видывала страна. Выходило, что престолонаследие давало правителю шанс просидеть у власти лет двадцать, а то и более, и не сойти с ума: любой, кто завоевывал власть своими руками, испытывал такой шок от ее иллюзорности, что почти сразу умирал от удара, подобно Ленину или Годунову.</p><p class="p1">Разумеется, если бы страна принадлежало населению, сознающему ее своей, — она бы давно порвала этот круг и двинулась путем всея земли, колеблясь периодически от чересчур наглой личной свободы до слишком сильной государственности, — петляла бы, взлетала и съезжала по синусоиде, но в любом случае не повторяла круга дословно. Захватчики же шествовали даже не по опрокинутой спирали, а по дантовой модели ада — сужающимся концентрическим кольцам, последним из которых было девятое: полный мрак и вечная мерзлота. От момента создания империи Россия прошла уже пять кругов — круг Грозного, завершившийся маразмом семибоярщины; круг первого Романова, сменившийся революцией Петра; петровский круг с заморозком времен «Ледяного дома» и двадцатилетней оттепелью Екатерины; золотой круг, начавшийся реформами Сперанского и окончившийся реформами Столыпина; ленинский круг, завершившийся в восемьдесят пятом… начинался шестой, очень простой, с постепенным и неукоснительным сокращением всех, кто знал длинные слова и иностранные языки. По Данту, до окончательного конца оставалось еще три круга, — но кто сказал, что дантова девятка срабатывает в истории? Волохову все чаще казалось, что этот цикл — последний; точней, ему хотелось так думать, ибо после него могло начаться нечто новое. Он страшно устал от этой печальной карусели, на которой почти тридцать лет кружился, не замечая того.</p></span></span></span></span></span>
