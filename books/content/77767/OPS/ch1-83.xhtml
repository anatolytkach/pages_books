<span><span><span><span id="id117"><div class="title5">
<p class="p">5</p>
</div><p class="p1">Он медленно шел по теплой ночной Москве. Господи, есть ли что-нибудь на свете грустнее московской ночи? Мы забыли смысл слова «грустный». Мы называем грустным и грозное, и страшное. Что-то случилось с нашим языком, мы забыли язык, на котором говорили, и выдумали другой, умудрялись даже писать на нем стихи, отлично понимая, что этим искусственным наречием выразить ничего нельзя… Где-то есть настоящие слова, слова, которыми говорят в Дегунине. Грустно — одно из таких слов. Оно не означает ничего грубого, ничего страшного. Это светлое, невыносимо острое чувство. Это чувство, что все уже было и ничего больше не будет; что это итог всякой жизни; что никому ничего не нужно. В переулках, где мы отлюбили, тишины стало больше и мглы. Постояли, пожили, побыли, разошлись за прямые углы. Сколько же лет он не вспоминал эту песню? И почему вспомнил ее теперь?</p><p class="p1">Надо было позвонить родителям. Домой не хотелось, хотелось бродить. Он набрал на мобильнике домашний номер — из армии звонки не разрешались; все, конечно, звонили все равно, мобильники сдавали только на передовой, чтобы никто не посмел нарушить секретность, — но тут, в городе, можно было хоть не прятаться от особистов.</p><p class="p1">— Я в центре.</p><p class="p1">— Осторожненько, — сказала мать. — Ты не забыл, что комендантский час? Патрули кругом.</p><p class="p1">— Да я ни одного патруля еще не видел.</p><p class="p1">— Это сейчас, а с полуночи уже нельзя.</p><p class="p1">— Я у Лузгина заночую, — соврал он.</p><p class="p1">— Ну хорошо. Утром приходи сразу. Осторожненько, — повторила мать.</p><p class="p1">Комендантский час, выругался Громов. Тоже мне. Человек приехал с фронта и не может погулять по ночной Москве. Плевал я на ваш комендантский час. Он спрятал мобильный и отправился домой пешком.</p><p class="p1">Странно, что мысль о подложности этой войны не явилась ему раньше. Большой мальчик, мог бы и догадаться. Волохов предупреждал, что война договорная, — он все счел пьяным бредом, но нет такого пьяного бреда, что не мог бы здесь осуществиться. Родители еще в первый год писали ему, что кавказцы постепенно возвращаются. Беспощадно выселенные в первый год, после нескольких серьезных побоищ со скинхедами, они отъехали подозрительно недалеко и уже полгода спустя окопались в Подмосковье, а потом стали заезжать на московские рынки, и никто их уже не бил — все выдохлось. Москва страшно опухла, болезненно разрослась — окрестные колхозы выселили, застроили элитным жильем, Подмосковье начиналось теперь аж в Серпухове, но зато уж за ним тянулись пустынные, безлюдные земли — в них-то и росли кавказские и цыганские поселки, своеобразный кавказский пояс вокруг города. То ли южане дали взятку городскому начальству, то ли центр тяжести в борьбе перенесся на ЖД (кстати, кавказцы и сами их не жаловали); скоро по телевизору стали говорить, что на Западе белую расу называют кавказской, а потому исторически мы дружим, это поганые хазарове нас рассорили, ловко спекулируя на российских геополитических разломах (разломы тоже были из нового лексического набора бахаревцев и иных юных идеологов, навербованных на пространствах Живого Дневника). На Кавказе, понятное дело, продолжались приграничные стычки, — но ведь Кавказ давно жил сам по себе, тамошние дела уже лет семь никого в Москве не волновали. Идея отдать ЖДам весь юг была по-своему иезуитской — кавказцы ЖДов не жаловали, а район был приграничный, трудный, наполовину заселенный дагестанцами; конечно, их решили стравить… Возьмут ли еще ЖДы эту территорию? А с другой стороны, что им останется? Каганата давно нет… Вместо окончательного решения вопроса получилась очередная тактическая передышка; что за черт, неужели они никогда не разберутся друг с другом и успокоятся только после полного взаимного истребления?!</p><p class="p1">Громов шел по Москве, прежней и все же не прежней, замечая, что все здешние перемены фатально вели к одному: то, от чего только что брезгливо отмахивались, после нескольких лет распрей и разрухи начинало казаться небесной манной; так рабочие, сбросив самодержавный гнет, через десять послереволюционных лет радовались и половине тех послаблений и привилегий, которыми когда-то так брезговали. Так убожество позднего социализма вскоре стало казаться пределом мечтаний, образцом социального государства, могучей империей с верными сателлитами. Теперь уже и предвоенная действительность выглядела предпочтительней — оставался минимум свобод, теперь ликвидированных по соображениям военного времени; старики не ютились по окраинам, державная пошлость все-таки была еще не так тупа… Можно было думать о причинах этой неуклонной деградации: то ли существовал секретный план, согласно которому компрометировались любые реформы, то ли сами эти реформы вели куда-то не туда, ограничиваясь истреблениями, редукциями и запретами. Если было здесь развитое и даже культурное государство, в котором, однако, попирались свободы, — первым результатом реформ становилось истребление культуры без всякого увеличения свобод; если была относительная вольница с неизбежным при беззаконии воровством и понятными перехлестами, первыми истребляли именно тех, кто не успел ничего украсть, а просто наслаждался временной передышкой в гнете, тогда как воры благополучно избегали наказания и радостно присоединялись к душителям вольности, щедро делясь нахапанным. Всякая русская реформа возвращалась к статусу кво, ухудшенному еще на несколько порядков; вот, стало быть, и мы после решительной схватки с ЖДами получили то же самое, только хуже. И я посильно поучаствовал, спасибо большое. Нет, тут была не обида — Громов отлично понимал, что следование долгу и при этом раскладе оставалось лучшей участью; какая разница, к чему все пришло? Важен не результат — он во все времена одинаков, — а честность перед собой: я выбрал единственный вариант судьбы, при котором такая честность достижима. И все-таки здесь, вне армии, заставлявшей каждый день думать об одном и том же наборе неизбежных, суженных, предсказуемых вещей, — он не мог не задаваться вопросом о причинах и целях; здесь ему еще ясней становилось, что в армию он сбежал не ради долга, а просто чтобы не думать, ибо жить здесь можно, только ничего не понимая, оглушая себя шагистикой, голодом, пальбой…</p><p class="p1">Стоило ему подумать о пальбе, как послышался нарастающий гул. Громов оглянулся. Он шел уже по ночному Ленинскому проспекту — здесь никогда не бывало летом так пустынно; сейчас, вот уже минут десять, ему не встречалось ни одной машины, что за черт! Теперь мчалась целая кавалькада — на страшной скорости мимо него пронеслось несколько десятков иномарок; он еще успел застать начало этих гонок — главного развлечения московской молодой элиты. На фронтах никого из них сроду не видали, зато на ночных московских магистралях они готовы были рисковать сколько угодно. Громов подумал, что охотно передушил бы их — и что, если солдатики по возвращении с подложной войны обратят оружие против власти, он к ним примкнет не без удовольствия. Беда, однако, в том, что они либо не обратят — либо, обратив и добившись своего, выстроят мир хуже и жальче нынешнего, и это будет новым наглядным подтверждением вечного здешнего закона. Что это будет за мир? Стариков выселят в поле, а новая элита, из бывших воинов, устроит в центре гонки уже на танках — шутка ли, после войны им понадобятся ощущения поострей…</p><p class="p1">В переулках, где мы отлюбили. Нет, сейчас все-таки еще не настоящая грусть. Совсем горько тут станет, когда начнет скрестись по асфальту сухая листва, побегут пятилапые кленовые листья, карябая истрескавшийся тротуар, словно пытаясь удержаться. Странно, он редко бывал счастлив в любви и еще меньше счастья приносил тем, кто любил его, — а вспоминает обо всем этом как о лучших временах: неужели и здесь исполнилась общая закономерность, и нынешняя его жизнь еще хуже прежней? От того и сбежал в свою армию: не умел с людьми. Хотел чистоты, которой не бывает, а жизнь — искусство возможного. Может, и Россия всю жизнь делает себе хуже, потому что перестает удовлетворяться возможным, а лучшего построить не в силах — и потому все рушит, все начинает с нуля и вынужденно удовлетворяется времянкой там, где только что высилась высотка, в которой, видите ли, дуло, поэтому и снесли… Черт его знает, чем кончит он сам. Сбежал воевать, потому что ему не годилась такая жизнь, — а поскольку вечных войн не бывает, он будет теперь довольствоваться послевоенным убожеством, от которого раньше брезгливо отворотился бы. Приспосабливаться придется все равно — но уже к другому, худшему; вывод — бери, пока дают. Впрочем, что он окрысился на Россию? Так было у всех, после всех революций…</p><p class="p1">Он дошел до поворота на Кравченко, прошел мимо пустых, спящих троллейбусов автопарка — некоторые спали с открытыми дверьми, как люди дремлют с открытыми ртами. Неожиданно во дворах послышался топот и свистки. За кем-то гнался ночной патруль. Громов вжался в стену.</p><p class="p1">— Стоять, бля! — заорали во дворе. В следующую секунду раздался выстрел. Похоже, патруль шутить не собирался. Рядом с Громовым распахнулось окно.</p><p class="p1">— Лезь сюда, идиот, — прошептал невидимый жилец.</p><p class="p1">Громов на заставил себя уговаривать. Он подтянулся и перевалился через подоконник.</p><p class="p1">— Обалдел совсем, да? — сказал шепот. — По ночам шляешься. Сейчас бы шлепнули к черту…</p><p class="p1">Громов присмотрелся к нежданному спасителю. В первый момент он не понял, мужчина перед ним или женщина. Кажется, юноша, бритый наголо, напоминающий новобранца. Спаситель решительно шагнул к окну, закрыл его, опустил штору, и Громов ясно увидел, что это девушка, худая, высокая и носатая; конечно, все это было сном, потому что это была Катя Штейн, а Кате Штейн неоткуда было взяться в городе в разгар войны.</p><p class="p1">— Чего уставился? — сказала она зло.</p><p class="p1">— Катя, — прошептал Громов.</p><p class="p1">Она подошла ближе и вгляделась.</p><p class="p1">— Громов?</p><p class="p1">— Да.</p><p class="p1">— Что, с фронта сбежал?</p><p class="p1">— Да нет, в отпуске.</p><p class="p1">— А, — сказала она вполголоса. — Доигралась.</p><p class="p1">— Почему доигралась?</p><p class="p1">— Сдавать пойдешь.</p><p class="p1">— Почему сдавать? Ты с ума сошла?</p><p class="p1">— А чего ты со мной будешь делать? Ты же офицер, нет? Служебный долг, присяга, все дела.</p><p class="p1">За окном топотал и свистел патруль.</p><p class="p1">— А что ты вообще здесь делаешь?</p><p class="p1">— А ты?</p><p class="p1">— Я в отпуск приехал, домой иду.</p><p class="p1">— В комендантский час?</p><p class="p1">— Я думал, его нет давно.</p><p class="p1">— В центре нет, а тут есть.</p><p class="p1">— Черт, — сказал Громов. — Катька, но ты же…</p><p class="p1">Меньше всего он ожидал увидеть в Москве эту девочку из своей прежней жизни, ЖД, каких мало было даже в тогдашней московской стихотворческой братии.</p><p class="p1">— Что я? — резко спросила она. — Договаривай, Громов, договаривай.</p><p class="p1">Прокурорский тон — это было что-то новое. Ей, значит, теперь что-то лет двадцать шесть. Громову никогда не нравились ее стихи, не нравилась и она сама — девочка из типичнейшей московско-хазарской семьи, с папой-урологом, с мамой — бывшей красавицей в восточном стиле, с сестрой, чьим талантам принято было умиляться, девочке пять лет, а уже и танцует, и рисует… Рисовала сплошных балерин на пуантах, в огромных пачках. Это была неприятная семья, что говорить, — самодовольная, местечковая, в таких семьях часто вырастали пишущие девочки, подражавшие то Бродскому, то Мандельштаму, сочинявшие, потому что принято. Громов однажды был у Кати Штейн на дне рождения, ему страшно не понравилось там, но вместо того, чтобы уйти, он с болезненным любопытством наблюдал эту среду: так со смесью отвращения и восторга рассматривают насекомое, распятое под стеклом. Катина семья была настолько типична, что в этом просматривалось уже нечто героическое: чистоту жанра Громов уважал в чем угодно, даже и в пошлости.</p><p class="p1">Катя была тогда удивительно мягкой и во всех отношениях пушистой девочкой. Конечно, в этом тоже чувствовалась внутренняя фальшь, без которой хазар непредставим — еще бы, ведь он вечно мимикрирует; наверное, та же фальшь мерещилась Западу, когда с дипломатической миссией в Европу прибывал бывший матрос. Он пробовал говорить не по-нашему и даже пользоваться столовыми приборами, но в душе явно желал передушить контру; так и пушистые девочки из хазарских семей могли быть сколь угодно мягки и гостеприимны, но в самом духе этих семей, в застольных разговорах, в перемигиваниях угадывалась стальная тайная власть, непобедимое чувство превосходства. Теперь эта внутренняя сталь вылезла наружу, хотя уж в ком, в ком, а в Кате Штейн Громов не заподозрил бы вражеского лазутчика. Она так любила играть в хрупкость, уязвимость, колеблемость любым ветром, что маска срослась с лицом. Громов не любил Катю Штейн и терпеть не мог ее стихи — культурные, но при этом безграмотные, сочетание частое для хазарской поэзии, насыщенной русскими реалиями, но не связанной с русской почвой. Так путешественник, многое прочитавший о стране, но не знающий ее быта, — легко поддерживает разговор в местной гостиной, но затрудняется поймать такси или купить булку. Катины вирши были старательны, плоски, заемны. Она много писала о любви к родителям и сестре, ей нравились желтые московские окна и мокрые деревья, — только окна и только деревья; да и вся хазарская поэзия на русском была об уютных и поверхностных вещах — глубже никто не заглядывал. У семьи было много родственников в каганате, от окончательного отъезда Штейнов удерживала, кажется, только богатая практика отца да катино стойкое желание доучиться на филфаке.</p><p class="p1">— Почему ты здесь? — спросил Громов.</p><p class="p1">— А где мне быть?</p><p class="p1">— В Штатах, например.</p><p class="p1">— Я здесь родилась, — сказала Катя с вызовом. — Это моя страна, и я никуда не денусь отсюда.</p><p class="p1">— Но это сейчас опасно, — сказал Громов неожиданно мягко. Он чувствовал к ней странное уважение — куда большее, чем три года назад, когда эта девочка так старательно демонстрировала мягкость и хрупкость.</p><p class="p1">— Опасно, — сказала она.</p><p class="p1">— Почему ты здесь? — Громов отлично помнил их квартиру на Кропоткинской, в другом районе.</p><p class="p1">— Есть добрые люди.</p><p class="p1">— А все твои?</p><p class="p1">— А мои в Штатах.</p><p class="p1">— Ага, — сказал Громов. Он не знал, о чем еще говорить. Он вообще разучился говорить с людьми.</p><p class="p1">— Ну, спрашивай, — подначила она. — Ты ж у нас федеральный офицер. Или сразу сдашь?</p><p class="p1">— Я боевой офицер, — сказал Громов с нажимом. — Штатских не сдаю.</p><p class="p1">— Тоже трогательно. Сразу убиваешь.</p><p class="p1">— Я убиваю на войне, — сказал Громов.</p><p class="p1">— Ай, да какая разница, — она махнула рукой и отвернулась.</p><p class="p1">Громов молча курил, разглядывая ее. В нынешней Кате Штейн почти ничего не было от той уютной девочки, и теперь она не врала. Это нравилось ему. Он начал догадываться о причинах ее безумного упрямства, но обсуждать их пока не решался.</p><p class="p1">— Никогда так не будет, чтобы все наши уехали, — сказала она. — Понял?</p><p class="p1">— Я и не против.</p><p class="p1">— Это моя страна и мой язык, ясно?</p><p class="p1">— Ясно.</p><p class="p1">— У меня на все это не меньше прав, чем у тебя.</p><p class="p1">— А я и не спорю.</p><p class="p1">— Ну и не спрашивай тогда, что я здесь делаю.</p><p class="p1">— Диверсии устраиваешь?</p><p class="p1">— Да какие тут теперь диверсии. Скоро само все рухнет.</p><p class="p1">— Может, и так.</p><p class="p1">— Громов, — сказала она, уставившись на него в упор. — А ты мне нравился, между прочим.</p><p class="p1">— Да ну. Вот бы не подумал.</p><p class="p1">— Я тебе хамила от смущения. Дура была.</p><p class="p1">— Я тоже хамил, наверное.</p><p class="p1">— Ты не хамил. Ты молчал и не снисходил. А писал прилично, мне нравилось. Если бы тебя не было, а только стихи были, — ты бы много выиграл.</p><p class="p1">— Ну, а теперь и стихов нет, — сказал он. Действительно, он подходил стране даже в мелочах: был неловкий, неуклюжий, не умеющий жить с людьми человек, сочинявший приличные стихи. Теперь и с людьми не живет, и стихов не сочиняет.</p><p class="p1">— И как оно на войне? Много наших убил?</p><p class="p1">— Немного.</p><p class="p1">— Почему?</p><p class="p1">— Не пришлось. Война сейчас позиционная.</p><p class="p1">— Было бы в Москве подполье, я бы тоже ваших убивала, — сказала она. — Но подполья нет. Мало нас, Громов, понимаешь?</p><p class="p1">— Понимаю. Я вообще тебя первую вижу.</p><p class="p1">— Ты Володьку Усова помнишь?</p><p class="p1">— Помню.</p><p class="p1">— Ну вот, он меня и спрятал. Его призвали, он мне ключи отдал. Он один жил.</p><p class="p1">Володька Усов был полусумасшедший графоман, — кто его такого мог призвать?! Здоровое молодое хамье раскатывало по улицам в джипах, гоняло наперегонки, искало острых ощущений, — а убогий Володька Усов, не умевший отжаться от пола и ничем, кроме стихов, не интересовавшийся, где-то служил; вот уж кого Громов не мог представить в окопе!</p><p class="p1">— Тут патрулей мало, район спокойный, — сказала Катя Штейн. — Но это пока. Скоро наведаются, это уж как пить.</p><p class="p1">Она села к столу и закурила.</p><p class="p1">— Это чудо еще, что из соседей никто не сдал. Видишь, башку обрила, думаю — не узнают. Обязательно узнают в конце концов.</p><p class="p1">— Кать, — осторожно сказал Громов. — А чего ради все-таки?</p><p class="p1">— А чего ради мне валить отсюда? С какой стати? Пусть эти ваши суки едут в свою Гиперборею, понял?</p><p class="p1">— Ну, шла бы на фронт, в конце концов…</p><p class="p1">— Да чего мне твой фронт, Громов? Фронт, в рот… Сам иди на фронт, если тебе так нравится.</p><p class="p1">— Я и пошел.</p><p class="p1">— А я не хочу! Я не хочу убивать людей, понял, Громов?</p><p class="p1">— Ну так уехала бы…</p><p class="p1">— Никуда я отсюда не поеду, — зло сказала она. — Я хочу тут жить. Ты совсем, что ли, одурел там у себя на войне? Есть люди, Громов, которые не хотят никуда отсюда ехать. Я люблю этот город и этот язык, и этот район, кстати.</p><p class="p1">— Нет, я понимаю, — сказал Громов. — Но видишь, как вышло. Этот город и язык не любят тебя.</p><p class="p1">— А, — снова махнула она рукой. — Ну да, конечно. Ты же теперь тоже хазарофоб, вояка хренов. Вот такие, как ты, нас и сдавали всегда.</p><p class="p1">— Слушай, хватит, а? Я пока тебя никому не сдал.</p><p class="p1">— Пока? Спасибо тебе, Громов! Низкий поклон! Пока не начинается война — вы все милейшие люди, а приходит гестапо — и вы нас сдаете списочно, по подъездам, а когда нас уводят в гетто — говорите, что воздух стал чище, чесноком не пахнет…</p><p class="p1">— Катя, — спокойно сказал Громов. — Есть у тебя аргументы, кроме гетто?</p><p class="p1">— У меня для тебя, дурака, вообще аргументов нет. Иди, стучи.</p><p class="p1">— Катя!</p><p class="p1">— Заткнись, Громов. Зря я с тобой вообще трепалась. Просто насиделась дома в углу, говорить не с кем, вижу — живой человек, знакомый.</p><p class="p1">— А как ты меня впустила?</p><p class="p1">— А чего мне тебя не впустить? Вижу — стоит идиот, сейчас повяжут. Меня тоже однажды спасли, когда я днем в магазин вышла. Мне же редко кто продукты приносит, Громов. Осторожные все стали, и напрягать неудобно. Соседи приличные, грех жаловаться, но я сама стараюсь закупаться. Ночные-то лавки позакрывались все. Выхожу днем вся закутанная, платок, юбка длинная… А один мент все-таки заподозрил: документы. Я — бежать, хорошо, мужик какой-то в троллейбус втащил. А то взяли бы — и все, сидеть. Это в лучшем случае.</p><p class="p1">— Ну уж не расстреляли бы…</p><p class="p1">— А кто знает? Тут раз на раз не приходится. В общем, когда облавы, многие впускают. А то гребут кого ни попадя. Недавно врача загребли, он шел к однокласснице. Ей плохо, скорая не едет, она позвонила другу, он к ней пошел, а его загребли. Сюжет был по телевизору. Типа правильно сделали, бдительность. Он молдаванин оказался. Ты представляешь, Громов?</p><p class="p1">— С молдаванами-то мы не воюем.</p><p class="p1">— Не воюем, а все равно дело нечисто. Чужая кровь. Тут теперь такая борьба за чистоту расы, ты что.</p><p class="p1">— Ну, не знаю, какая такая борьба, — сказал он не очень уверенно. — Гастарбайтеров разрешили призывать, в обмен на гражданство…</p><p class="p1">— Это гастарбайтеров. Они нанятые, за гражданство что хочешь сделают. А которые живут тут всю жизнь, но не русские, — те все под подозрением. Хорошо, они по квартирам не ходят.</p><p class="p1">— Помню.</p><p class="p1">— Ну и вот.</p><p class="p1">Они замолчали. Громов удивлялся ее новой речи — резкой, рубленой; прежняя Катя была многоречива, медоточива, любила мурлыкающие интонации, кошек, фотографировалась на фоне моря. Родители с детства вывозили девочек к морю: слабое здоровье, ангины. У всех хазарских детей были беспрерывные ангины; интересно, в каганате тоже так — или спасает благословенный обетованный климат? Еще она любила мягкие игрушки, сложные коктейли и пироги, бесконечные разговоры о способах варки кофе — с тмином, с кардамоном; все вместе было ужасно скучно, и пошло, и предсказуемо, хотя несчастная Катя Штейн была обычной доброй девочкой, ни в чем не виноватой. Громов понял наконец, что его в ней раздражало. За всеми этими кофиями, фотографиями на фоне пляжей, босоногими прогулками под дождем, мягкими игрушками, любовью к каминам, дачам и кисам чувствовалась незыблемая твердость, проявлявшаяся разве что в бешеной энергии, с которой Катя кидалась защищать авторов, которых любила, и друзей, которых, по ее мнению, недооценивали; тогда Громов не верил ни одному ее слову. Теперь эта сталь вышла наружу, и появилась чистота порядка — единственное, что он ценил по-настоящему.</p><p class="p1">— Чаю дать? У меня ничего к чаю нет.</p><p class="p1">— Да мне не надо. Расскажи хоть, как ты тут.</p><p class="p1">— Никак. Иногда по суткам людей не вижу.</p><p class="p1">— А чего не уедешь?</p><p class="p1">— Поздно, Громов. Поздно. Дура была. Думала, что можно будет остаться. А потом оказалось, что им неважно, любишь ты страну или не любишь. У них теперь расовый принцип.</p><p class="p1">— Как же тебя родители оставили?</p><p class="p1">— Папа умер. А мама после его смерти совсем с ума сошла, ей главное было вывезти Лорку. — Лоркой звали младшую сестру, кладезь разнообразных дарований. — Я ей соврала, что выхожу замуж.</p><p class="p1">— И она поверила?</p><p class="p1">— А ей думать некогда было, Громов. Ты же помнишь, как тогда уезжали.</p><p class="p1">— Да, — сказал Громов. — Быстро.</p><p class="p1">— Ну вот.</p><p class="p1">— Слушай, — не понял он. — Ну, если бы какая-то дикая любовь… другое дело. Но ведь ты одна.</p><p class="p1">— А ты думаешь, Громов, бабы только из-за вас могут что-то делать, да? — Она склонила голову набок и сощурилась. Жаль, он не мог разглядеть ее как следует, — нельзя было зажигать свет, квартира считалась пустой, увидят — донесут…</p><p class="p1">— Нет, почему же.</p><p class="p1">— Думаешь, ясное дело. Ты всегда у нас не верил в человечество. Так вот, Громов, заруби себе на носу: ни из-за какой любви я бы тут не осталась сроду. Я бы сроду не влюбилась в местного человека, Громов, запомни это. Тут есть приличные люди, не более того. Максимум, на что они способны в смысле человечности, — это не сразу сдать разыскиваемого в гестапо. Большего от них никто не требует. Но у них замечательный язык, Громов, и незаслуженно хорошие пейзажи. И я не понимаю, какого черта должна все это уступать. А?</p><p class="p1">Он не знал, что возразить, да и не хотел возражать. Пожалуй, в эту секунду он любовался Катей Штейн.</p><p class="p1">— А есть у тебя на что жить-то?</p><p class="p1">— У нас было отложено. Мать оставила.</p><p class="p1">Он не поверил. Прожить на сбережения больше двух лет нереально при самой жесткой экономии, особенно после запрета доллара, хоть и ходившего на черном рынке, но Кате и так приходилось рисковать, высовывая нос на улицу, — спекуляции явно не могли кормить ее. Громов решил не расспрашивать, но понял, что мир не без добрых людей.</p><p class="p1">— И подрабатываю, — сказала она с вызовом. — Детей по-прежнему надо в институт готовить. А русского языка ваши как не знали, так и не знают. Есть пара надежных детей, родители не сдадут, я дешево беру.</p><p class="p1">— Дело хорошее.</p><p class="p1">Он опять замолчал.</p><p class="p1">— Я пойду, наверное, Кать. Они убежали вроде.</p><p class="p1">— Оставайся, я тебе здесь постелю. Утром уйдешь. Расскажи хоть, что на войне.</p><p class="p1">— Ничего на войне. Бегаем друг от друга.</p><p class="p1">— Никогда не понимала, с чего ты туда пошел.</p><p class="p1">— Ну вот видишь. Ты не понимаешь, зачем я туда, я не понимаю, зачем ты сюда…</p><p class="p1">— Я-то никуда не ушла. Где была, там и осталась.</p><p class="p1">— Ну, а я… тут сложно. — Громов сам радовался возможности проговорить это вслух, — в разговоре оформляется то, чего самому себе не скажешь; все-таки другой человек нужен, хоть ты тресни. — Бывают обстоятельства, когда стихи писать нельзя. Вообще ничего писать нельзя. А когда человек пишет — ты должна понимать, сама писала, — у него масса черт, с которыми просто жить немыслимо. Мнительность там, я не знаю, подозрение, что все вокруг врут, включая пейзажи; что надо все время докапываться до какой-то истины… Не будешь работать — или помрешь, или рехнешься. Вот я и почувствовал, что обычная жизнь — уже не мое, и надо куда-то себя деть. Оказалось, это не худшее. Не так тошно, как здесь стало в последние годы. И главное — там, понимаешь ли… Там некогда думать, что я не могу больше писать.</p><p class="p1">— А ты не можешь? — спросила она с живым интересом. Все-таки кое-что общее у них было.</p><p class="p1">— Не могу.</p><p class="p1">— Обстановку сменить не пробовал?</p><p class="p1">— Видишь, сменил, — усмехнулся он.</p><p class="p1">— Нет, я в другом смысле. Может, тебе надо было уехать?</p><p class="p1">— Может. Здесь, по крайней мере, что-то такое случилось, как будто весь воздух выкачали, вообще. Какое там писать — вообще все смешно стало. Любить, думать… У меня и до сих пор чувство, что это здесь никогда не будет нужно. А чем это заменить — я не знаю. Иные идут в солдаты от несчастной любви, вот и у меня нечто вроде. Я вообще не мог на людей смотреть, понимаешь? Я не понимал, чем они занимаются.</p><p class="p1">— «Порой во сне я думаю, зачем живут они, но смысла не нахожу», — пропела она полушепотом.</p><p class="p1">— Да, близко к тому. «И не мог им простить того, что у них нет тебя и они могут жить». Вот и я смотрю — они не пишут и живут, а как я могу жить и не писать? Для чего я еще гожусь? Ты по себе должна знать, что это заменить нечем. Никакая любовь не помогает.</p><p class="p1">— Да, да. Любовью вообще бесполезно замещать… Если бы я уехала и влюбилась, у меня все равно было бы чувство… ну, не знаю. Картон вместо хлеба.</p><p class="p1">— Я одного не понимаю, — сказал Громов. — Что ты здесь так любишь?</p><p class="p1">— Ну… вот это все, — она указала на зашторенное окно, за которым смутно белел фонарь. Во всех здешних фонарях было что-то тюремное, казарменное — в учебке таким же белым цветом освещался ночной плац. И это правильно, и это хорошо, откровенно — вся жизнь ничем неотличима от казармы, такова ее тайная суть, надо отбросить все украшательства, ширмочки, соцветия, чтобы обнажился голый плац, залитый белым светом. Потому что ничего другого все равно нет. Этот город, эту страну, пожалуй, стоило любить за то, что все здесь было настоящее — белый тюремный фонарь, ночные патрули, доносящие соседи; жизнь без вранья, чистая изнанка, стопроцентная истина. Зимой, возвращаясь домой по железному и каменному холоду, он хорошо это понимал.</p><p class="p1">— Это стоит любить, да.</p><p class="p1">Ей почудилась в его словах насмешка, и она вспылила:</p><p class="p1">— Конечно, вам это все чужое!</p><p class="p1">— Нет, что ты, — мягко сказал Громов. — Самое настоящее наше. Я за это воюю, ты за это жизнью рискуешь, — пожалуй, только мы с тобой это и заслужили.</p><p class="p1">— Ну ладно. Я тебе чаю сделаю все-таки.</p><p class="p1">Она пошла на кухню, зажгла газ под чайником и вернулась.</p><p class="p1">— Усов как питекантроп жил. Даже электрочайника нету.</p><p class="p1">…Потом они разговорились — он выложил кое-какие подробности первого года войны, она рассказала о патрулях, облавах, бесконечных предосторожностях, с которыми покидала убежище. Он начал догадываться о быте немногих ЖД, оставшихся тут; в сущности, ей нечего было бояться — Громов мало был похож на человека, готового сдать нелегала в обмен на ночной приют. Они занимались чем-то вроде диверсий, но сугубо ЖДовских, жалких, не слишком опасных: им до сих пор казалось, что в нынешней цивилизации все решают компьютеры. Хакерствовали, влезали в сеть, развешивали правду о военных действиях (то есть брали официальные сводки и переписывали наоборот) — все это никому не мешало, но разыскивали их, конечно, всерьез, как молодогвардейцев.</p><p class="p1">— Кстати, — сказал Громов со смехом. — Ты знаешь, что они договорились?</p><p class="p1">— Кто?</p><p class="p1">— Кто-кто, наши с вашими. Я от Бахарева слыхал, он теперь шишка. Раскидала нас судьба, Василь Иваныч.</p><p class="p1">— Как договорились? — не понимала она.</p><p class="p1">— Обычным образом. Наши с вашими. Договорная война.</p><p class="p1">— Этого не может быть, — сказала она с такой страстной убежденностью, что Громов устыдился собственного легковерия.</p><p class="p1">— А почему?</p><p class="p1">— Ваши еще могут. А наши никогда.</p><p class="p1">— Как же, как же. Ваши ведь чистые. Это наши за грош Родину продадут.</p><p class="p1">— Наши всякие, — сказала она. — Пойми, я не хочу сейчас наезжать… или что-то… Будем считать, что перемирие, два человека на голой земле. Я просто знаю. Наши могут быть плохие и хорошие, но они не будут договариваться.</p><p class="p1">— Видишь, я тоже думал, что наши не будут.</p><p class="p1">— Ты не понимаешь. Это в крови.</p><p class="p1">— А наша кровь — водица? — спросил Громов.</p><p class="p1">— Не знаю. Ваши столько раз…то есть никаких принципов, вообще. Угнетатель всегда — трус. Ваши, кроме этого, ничего не умеют.</p><p class="p1">— А ваши что умеют?</p><p class="p1">— Неважно. — Она хотела сказать что-то еще, но был барьер, которого в разговоре с чужими ЖД не переходят. — Наши не помирятся.</p><p class="p1">— А что они сделают? Переубивают друг друга? Вот мы с тобой сейчас вдвоем — что можем друг с другом сделать?</p><p class="p1">— Не знаю. Мы — другое дело, мы уроды. Выродки. А это… ну, оно должно как-то разрешиться. Не может так вечно быть. Кто-то из двух останется. Я же не говорю — переубивать. Пусть остальные уедут. Но надо как-то решить, потому что вечно это не бывает.</p><p class="p1">— Никогда так не будет, чтобы все уехали. Кто-то останется, вот как ты.</p><p class="p1">— Хорошо, останется, но тогда уже признает правоту победителя. Надо выработать закон, потому что иначе — это не жизнь. Пусть возьмет чья-то, чья-нибудь, но только чья-то одна.</p><p class="p1">— Слушай! — Он встал и подошел к Кате Штейн. — А не может быть такого закона, при котором мы как-то уживались бы? Я честно не знаю, самому интересно.</p><p class="p1">— Нет, — твердо сказала Катя Штейн. — Такого закона быть не может.</p><p class="p1">— Почему? Мы же с тобой уживаемся!</p><p class="p1">— Уже два часа целых уживаемся. Но это временно. И потом, всех же не сделаешь поэтами, да?</p><p class="p1">— Да какие мы поэты, к черту. Поэты были и все вышли.</p><p class="p1">— Нет, нет. У тебя было ничего себе. Вот это, про первую любовь.</p><p class="p1">— Откуда ты помнишь всякую дрянь?</p><p class="p1">— Помню вот. Ладно, ложись. Я сейчас постелю.</p><p class="p1">Она постелила ему на старом матрасе. Громов долго лежал без сна, смотрел на белый фонарь, яркий даже сквозь штору, на тени веток на стенах и потолке. Хорошо жить на первом этаже. Иногда далеко, на Ленинском, ревели машины ночных гонщиков. К Кате Штейн, так же без сна лежавшей в соседней комнате, Громов не прикоснулся. Солдат солдату брат, не более.</p><p class="p1">В половине седьмого утра он проснулся, взглянул на часы, оставил благодарственную записку и тихо вылез из окна, осторожно закрыв его.</p></span></span></span></span>
