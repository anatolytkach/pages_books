</div><p class="p1">По телевизору шла «Белая сила» — просветительская программа, запущенная в рамках реализации образовательного национального проекта. Вел ее Топтухин, в прошлом политический обозреватель, отличавшийся феноменальной способностью всюду усматривать оскорбление России и русского духа. Мир, окружавший Топтухина, был полон неизлечимой русофобии. Все только и думали, как бы уязвить русских. Губернатор догадывался о государственной необходимости такого подхода, но, признаться, считал его чрезмерным. Отчего мы самые бедные? Сейчас враги должны всюду мерещиться Штатам, но и там — он почитывал еще до войны, пока можно было, американскую прессу и даже американские сайты, — не было такого злорадного предвкушения вражеского наскока, такой мазохистской радости при виде очередного ущемления. Топтухин и ему подобные постоянно нуждались в предлоге для разжигания подпольной, подспудной ярости: а, мы опять самые плохие, самые грязные и бедные, — и мы действительно таковы, и в силу этой-то нашей неискоренимой бедности мы всем сейчас покажем! Жалеть Топтухина и топтухинскую Россию после этого становилось куда как затруднительно. Главное же — Россия каждым своим движением отчего-то плодила новых врагов, и понять, за что ее так ненавидят, из топтухинских проповедей было решительно невозможно. Весь мир только и делал, что желал русской погибели: в этой немотивированной, онтологической ненависти, видит Бог, было что-то хазарское. Скажи кто-нибудь Топтухину, что он ведет себя как сущий хазар, — и он, вероятно, умер бы от разрыва сердца, не успев даже врезать оппоненту (в русском национальном дискурсе отвечать на слова словами считалось трусостью, а без разговоров давать в морду — доблестью). Хазары тоже были уверены, что весь мир их ненавидит — за богоизбранность; своя богоизбранность была и у русских государственников, и называлась она богоносностью. Если бы губернатор догадался отделить русское от варяжского, он давно уже заметил эту зеркальность, — но государственный человек редко выходит за рамки бинарных оппозиций, тогда как истинное миропонимание начинается со срывания этой двухцветной маски, за которой обнаруживается третье. Топтухин, впрочем, понятия не имел, что он варяг. Он был из числа тех искренних варягов, для которых сама мысль о своей неорганичности и пришлости — еще одно проявление все той же клинической русофобии; он искренне, без тени спекуляции, верил сам и уверял окружающих, что Россия несет свет миру, а заключается этот свет опять-таки в противостоянии торгашеской цивилизации юга. Вне противостояния он Россию не мыслил. Истинное христианство, о котором он дважды в неделю рассказывал в «Белой силе», заключалось в любви к Отечеству, а любовь состояла в истреблении его врагов. Врагами были все, и потому христианство в конечном своем развитии состояло, надо полагать, в истреблении всех, кроме Отечества, дабы некому уже было проявлять русофобию. Патриотизм топтухинского извода сводился к беспрерывному истреблению — именно это истребление воспитывало подлинных воинов христовых; с исчезновением последнего врага истина воссияла бы автоматически. Это голимое варяжство преподносилось как новая патриотическая доктрина, хотя старше нее, вероятно, было только хазарство. Нынешняя лекция Топтухина была посвящена борьбе русского государства с хазарскими нашествиями.</p><p class="p1">Топтухин, перешедший теперь из политических обозревателей «Времени» в авторы и ведущие собственной вторничной и четверговой лекционной программы, был толст, как большинство государственников, бородат, как все истинные варяги, и солидно, округло басовит. Разговаривая, он пристукивал кулаком по столу. В его одышливости было что-то грозное. Этой одышкой он как бы намекал, до чего довели враги приличного человека. Вот и говорить уж ему трудно, но он будет, будет говорить, все больше ярясь, доводя себя до все более сильной одышки, все отчаяннее ударяя по столу кулаком. После программы его долго отпаивали валокордином, валидолом, чаем. Вся студия ненавидела Топтухина. Он страшно потел. «Брань духовная», — с умилением говорил о Топтухине регулярный участник его программ, протоиерей Посысай (Купыкин). Школьников заставляли на уроках принудительно смотреть Топтухина, и они тоже ненавидели его. Топтухин был уверен, что все его обожают. Вот странность — он полагал, что Россию все ненавидят, а лично его любят. Тут был парадокс. Он воображал, что даже враги России глубоко чтут его, Топтухина, боятся его, заискивают перед ним, желали бы знать его мнение по любому вопросу: а это, Валериан Павлович? А как вам это? Враги России ненавидели Топтухина больше по обязанности; будь их воля — они приползли бы целовать его задние ноги, заскорузлые большие пальцы. Такое противоречие — уверенность в общей ненависти к России и в столь же повальной любви к себе — объяснялось просто: как всякий истинный варяг-захватчик, в душе Топтухин полагал, что сама Россия — довольно бросовый товарец. Он оттого так и ярился, защищая ее, оттого и любил Отечество с такой страстью, готовой стереть в порошок все окружающее: варяги догадывались, что захватили очень так себе землицу. Они уже жалели, что сюда пришли, но с тем большим показным пылом изо всех сил нахваливали этот надел. Между прочим, надел был действительно ничего себе, но не варягу это понять: варяг ли разберется в талантах коренного населения, оценит песни местных дервишей, красоту промыслов, кротость пейзажа, округлость гоношей, вкуплость одарей? Им с самого начала казалось, что и население неважное, и земля неурожайная, — договариваться с этой землей никто из них не умел, — но другие земли им как-то не покорялись. Неудачливое было племя, чмошное, по-армейски говоря: только эти им и дались в полное пользование, не умея и не желая сопротивляться; приходится иметь дело с такой Родиной. Именно оттого патриотизм варяжского толка имел столь жалобный и притом агрессивный вид: да, землица убогая, народишко так себе, — но мы убьем любого, кто осмелится нам на это намекнуть! Сами мы, несомненно, куда лучше, чем эта наша так называемая Родина; вот почему все варяжские патриоты — называвшие себя по-прежнему русами, русскими, так привычнее, — так были уверены во всеобщей любви к ним и столь же всеобщем презрении к их бросовой землице.</p><p class="p1">Любопытно, что у хазарства все было несколько иначе, при несомненном сходстве дискурсов: хазары считали себя настолько прекраснее этой земли, что никогда с нею не отождествлялись. Ни один хазар, кроме несчастных фанатиков-ЖД, не признался бы вслух, что это их коренная местность; нет, она была чужая с самого начала, но они принесли сюда искусства, науки, торговлю… С ними эта земля обрела смысл и вид, до того же была безвидна и пуста; но так как они были слишком для нее хороши — их с нее, естественно, поперли при молчаливом, а то и прямом пособничестве предательского туземного населения. Хазар никогда и ничего не признает своим — потому что имеет право на весь мир и никогда не удовлетворится малой его толикой; у нас нет «своей» земли, потому что вся она — наша. В этом вся разница между хазарством и варяжством, а по сути — между Яхве и Одином: Один беспрерывно завоевывает мир — Яхве владеет им изначально. Один всегда обижен на то, что ему опять достался не лучший кусок земшара, — Яхве обижен на то, что ему достался еще не весь земшар.</p><p class="p1">Губернатор не понимал этой разницы, но догадывался о сходстве: богоизбранный богоносец как раз заходил на очередной крутой вираж, раскачиваясь, как хазар на молитве, и все громче колошматил по столу.</p><p class="p1">— С тех самых пор, как русский народ сделал свой исторический выбор, призвав на Русь крепких государственников, строителей национальной вертикали Рюрика с братьями и дружиной, хазарский каганат не терял надежды вернуть себе утраченные позиции. Хазары вторгались на Русь, опустошая ее огнем и мечом. (Глаза Топтухина затуманились: ему было жалко опустошаемую Русь). Наш национальный гений, крепкий, крепчайший государственник Александр Пушкин воспел русскую месть хазарам, которых, вопреки установившейся традиции, наш народ всегда заслуженно почитал неразумными. Какой же разумный хазар пойдет на Русь, на которой каждый гибнет от того, с чем приходит? (Тут он, сам того не желая, сформулировал удивительный закон, и губернатор улыбнулся: Топтухину и мысли не приходило о том, что на Русь можно прийти с чем-нибудь хорошим). Князь Владимир Мономах, государственник истовый, основатель российского государства в том виде, в каком мы и посейчас им благодарно пользуемся, установил так называемый Выдобогчский закон: «Ныне из всея Русския земли всех жидов выслать и впредь их не впущать, а если тайно войдут — вольно их грабить и убивать. С сего времени жидов на Руси нет, а когда который приедет, народ грабит и побивает». Эти великие, поистине золотые слова и сегодня остаются руководством для всякого истинно русского. Скажу более: кто не грабит и не побивает, тот плюет! плюет! на могилу Владимира Мономаха! — И Топтухин смачно сплюнул в угол, показывая, как именно надо это делать. — Разумеется, изгнанному проклятому народу ничего не оставалось, кроме как распускать безобразные слухи о земле, откуда их попросили добром. Зелен виноград! Именно отсюда берет свое начало отчаянная русофобия, охватившая всю Европу. В Европе не нашлось государственного мужа, равного Мономаху, и хазарство, неся знахарство, ухарство и варварство, вольно рассеялось по всему обреченному континенту. Однако у них зудело! У них чесалось! И уже во второй половине двенадцатого века некий Вениамин Тудельский, а за ним и раввин Петахия проникли на Русь. Они, видите ли, собирались описывать рассеянные по свету хазарские общины! Ведь им ясно было сказано, что на Руси нет, нет и никогда более не будет хазарских общин! Однако они сунулись — и конец их был так же печален, как и конец киевских ростовщиков, которых киевляне справедливо пожгли и погромили в 1124 году от Рождества Христова.</p><p class="p1">Зазвучала громкая музыка, по экрану заметались серые языки пламени (телевизор был черно-белый и при появлении титров жужжал), а в языках показался скорченный жид, изображенный в лубочной стилизованной манере. На жиде была почему-то нашит могендовид. Вероятно, прежде чем пожечь, киевляне их пометили.</p><p class="p1">Топтухин подробно остановился на ереси хазарствующих, сообщив, что сии еретики — он вообще предпочитал местоимения «сей» и «оный» — совершали вместо богослужения такие кощунства, что даже рассказать о них он почитает невозможным, после чего долго и со смаком рассказывал, особое внимание уделив групповым совокуплениям. Губернатор сроду не слыхивал ни о чем подобном: вероятно, Топтухин пользовался новейшими историческими разысканиями — не зря их спонсировали в рамках национальных проектов. Он не делал тайны из того, что татаро-монгольское иго — клевета и черный пиар хазарствующих историков, впервые разоблаченных Львом Гумилевым. Хазары неуклонно пытались вбить клин между Русью и дружественным ей монгольским народом, а также татарами; ислам был историческим союзником Руси, и именно этой давней дружбой объяснялись многочисленные тюркские заимствования в русском и русские — в тюркских языках; так, русские позаимствовали у тюрков слово «караван» и в ответ подарили слово «барабан». Никакого монгольского ига в таких условиях быть не могло — было хазарское, и именно с хазарским богатырем Черибеем (за кадром в исполнении сестер Берри зазвучало «Чирибим, Чирибом») бился русский инок Пересвет. После того, как Дмитрий Донской на поле Куликовом осенью 1380 года объяснил подлым хазарам, где им следует зимовать (отсюда же и выражение «где раки зимуют», происходящее от древнехазарского проклятия «Рака!»), хазары надолго оставили попытки проникновения на Русь и попятились в Европу (почему и речных тварей, ползающих задом наперед, стали называть раками, а впоследствии тем же именем нарекли страшную болезнь. Губернатор поморщился от смеха, представляя некролог «умер от жида»). Топтухин не удержался и на фоне стремительно несущихся по стенам теней зачитал блоковскую «Степную кобылицу». В начале семнадцатого века хазары предприняли очередной реванш, ринувшись на Русь в составе польского войска: прозвучали знаменитые строки из послания Минина. Поганый хазар Лжедмитрий Второй был умерщвлен русами с присущей им изобретательностью (Топтухин со смаком расписал пытки — подлинный интерес было не спрятать). Злокозненная Польша вообще служила главным каналом проникновения хазар на Русь. «После заключения договора с поляками в 1678 году отношение к хазарству стало более суровым. Однако в последние десятилетия XVII века в левобережной Малороссии, вернувшейся после польской оккупации в состав России, образовалось оседлое поселение — потомки хазарских иудеев, занимавшиеся на этих землях безжалостной эксплуатацией русских крестьян. В середине семнадцатого века русское население под руководством Богдана Хмельницкого их „совсем истребило“, и страну эту заняли чисто православные казаки». Об этом рецидиве каганата губернатор слышал впервые: Хмельницкий, конечно, был известный антихазар, но что за хазарское поселение существовало в левобережной Малороссии? Между тем Топтухин ссылался на «Путешествие Антиохского патриарха Макария, описанное его сыном архидиаконом Павлом Алепским». Век живи, век учись, подумал Бороздин.</p><p class="p1">Отдельный комплимент достался Петру Великому за упорство в недопущении хазар на вверенные ему территории: «Я хочу видеть у себя лучше народ магометанской или языческой веры, нежели жидов», — с надрывом процитировал Топтухин, подчеркнув, что историческая близость ислама и православия тем самым подтверждается снова. Губернатор с особым нетерпением ждал главного — истории о том, как в результате трех последовательных разделов Польши подлые хазары ворвались в Россию вместе с западными ее областями, как бы в троянском коне; и он дождался. Все получило исчерпывающее и внятное объяснение. При первом разделе в Россию проникли более 100 тысяч хазар, при втором и третьем их число удвоилось. Топтухин как дважды два доказывал, что разделы Польши и присоединение буферных областей, кишащих евреями, было делом рук злокозненного Понятовского. Хазар в открытую называли «агентами оккупационного режима». Польша многие годы вынашивала замысел собственного раздела — все потому, что польские короли и шляхта были с самого начала подкуплены циничными хазарами. Никакого иного замысла, кроме проникновения в Россию, у хазар не было. Ради этого они были готовы на все. Польша в изложении Топтухина представлялась зловонным гнойником на российской границе — орудием каганата, жестоко угнетавшего несчастных поляков; именно местью за это многовековое угнетение — и инспирированные хазарством разделы — объяснял Топтухин радость поляков, наблюдавших, как горело варшавское гетто. Польская хазарофобия, восклицал он, не менее обоснована, чем русская.</p><p class="p1">Главной задачей русских, по Топтухину, было с тех пор ограничение хазарского влияния: черта оседлости не помогала, ибо русский народ по бесконечной доброте своей не только пропускал хазар в столицы, но и сходился с бесчестными, развратными хазарками. О хазарском разврате Топтухин говорил столь же долго и смачно, сколь и о пытках Лжедмитрия Второго. Лекция продолжалась второй час, подпрыгивал от топтухинских ударов давно опустевший стакан на столе, а разоблачитель все не уставал, приводя новые и новые факты хазарских зверств на Руси. Последняя попытка окончательного реванша была сделана в семнадцатом, но русские оказались не так просты — и отбросили хазар в 1937–1939 годах значительно дальше, чем за черту оседлости. Глаза Топтухина вновь увлажнились от умиления, когда он упомянул Молотова: «Больше всего, — вспоминал гранитный нарком великого Сталина, — мы боялись гражданской войны, уже принесшей нам однажды поистине неисчислимые бедствия. Не допустить ее было нашей главной задачей — и для этого все средства были хороши». Надо ли говорить, что под гражданской войной гранитный нарком великого Сталина разумел войну русских с мировым хазарством, спящим и видящим уничтожение последнего оплота православия?! Но великий Сталин с гранитными наркомами не дал уничтожить православие, окончательной его реабилитацией в 1943 году узаконив полную преемственность советской империи относительно российской. Протоиерей Посысай (Купыкин) возгласил Сталину вечную память и сказал, что Церковь не устанет оплакивать жертв террора, поддавшихся на хазарскую ересь. Именно их, хоть и этнически русских, пришлось уничтожить в процессе так называемых репрессий, хотя давно уже пора переименовать этот спасительный процесс в ремиссию, поскольку именно он остановил иудейское посягновение на русский престол. Итак, после сталинских ремиссий хазарский вопрос непременно был бы решен окончательно, если бы подлый британско-хазарский наймит Литвинов не вбил клина между руссами и исторически дружественными им тевтонцами. По экрану поплыли репродукции полотен Константина Васильева — тяжелогрудые Брунгильды, готические сосны и неотличимые тевтонцы в касках.</p><p class="p1">— Мы — люди Севера, белая сила! — трубно возгласил Топтухин. — Сегодня, когда Россия четвертый год кряду ведет величайшую из войн в своей истории, последнюю и великую битву с мировым хазарством, любые переговоры и компромиссы были бы возмутительной слабостью. Все силы мирового севера, вся белая мощь должна покончить с горсткой омерзительных ростовщиков, посягающих на нашего Белого Бога. Мужие, братие! Воздвигнем…</p><p class="p1">Бороздин выключил телевизор — пульта тут не было, пришлось вставать, но отвращение оказалось сильнее лени. Некоторое время он лежал на кровати, закинув руки за голову, и приходил в себя.</p><p class="p1">В лекции Топтухина не было ничего, о чем он не слышал бы раньше. Все это подробно излагалось в брошюрах типа «Русские боги» и «Русский реванш», но никогда еще не было государственной доктриной. Он знал, что идет война — точнее, локальные стычки с так называемыми либерал-радикалами (или радикал-либералами — в газетах не было единства на этот счет). Он понимал, как и все в России, что под радикалами понимаются ЖД. Он не мог лишь предположить, что за те несколько недель, что они с Ашей кочуют по стране, добираясь до Дегунина, — отечественная риторика набрала новые обороты и договорилась до того, с чем ни один приличный государственник солидаризироваться не мог бы.</p><p class="p1">Белая сила спасает мир. Ига не было. Ислам — исторический союзник христианства. Гитлер и Сталин вместе стремились решить хазарский вопрос и непременно решили бы, если бы не ЖД. Текущая война — величайшая в истории. Умри все живое. Вот почему его преследовали: он в своей Сибири отстал от жизни. Государство жило не просто по военной, а по казарменной логике: приказы не обсуждались, левые связи не дозволялись, да и правые ставились под сомнение. На самом же деле его травили никак не за Ашу, дело вообще было не в ней — государство, стремглав перестраиваясь на военный режим, уничтожало всех, кто умел думать. По газетам, конечно, об этом судить было нельзя — в газетах давно уже писали о том, чего не понимали сами, переходя для пущей невнятности на вымышленные языки. Не в газетах было дело. Почему он не смотрел телевизор там, в Сибири? Давно бы догадался… И ведь по теленовостям ничего нельзя было сказать. Все та же череда умолчаний и сонная гладь благодушества. Лекции надо слушать, а не «Время» смотреть. Подлинное «Время» давно перетекло сюда.</p><p class="p1">Это что же за страна у них получается, думал Бороздин, закуривая. Курить в хате Аша запретила, но тут уж было не до запретов. О я идиот, почему я опять купился?! Ясно же, что Аша тут ни при чем, что не о ней речь, что несчастная туземка попала в зубчатые колеса… Конечно, их мишень — я. Они, как во время милых их сердцу ремиссий, будут решительно уничтожать чиновничество, не подходящее для нужд текущего момента. А если бы не связь с туземкой, они измыслили бы другой предлог. Хорошо, но почему меня не взяли сразу в Москве? Потому что проверяли, тут же ответил он себе. Если бы я беспрекословно отказался от единственной дорогой мне женщины, я прошел бы тест на мобилизационное поведение. А я не прошел. И они поняли, что для этого нового государства я не подхожу.</p><p class="p1">Все это, однако, были соображения побочные. Не все ли равно, по какой причине они отвергли меня и полюбили Топтухиных? Ясно же, что люди с какими-никакими мозгами не вписываются в это новое государство. Не сегодня, так завтра, не под этим предлогом, так под тем, не мытьем, так катаньем. (В это самое время хозяйка избы занималась в огороде катаньем — полоскала белье не в воде, а в пыли, это был старый коренной способ, о котором русские не подозревали, почему и считали пословицу бессмысленной). Мучительнее всего была мысль не о жестокости, а о непроходимой тупости этой новой системы: Бороздину, только что, казалось, научившемуся не соотносить себя с державой, — стало вдруг за нее невыносимо обидно. Он так долго был ее частью, что не готов был смириться с этим внезапным прыжком в идиотизм. ЖД, инспирировавшие раздел Польши; хазарское государство на территории Запорожской Сечи; ересь хазарствующих как иудейская диверсия… Неужели они думают, что в это поверят? И тут же оборвал себя: поверят. Сегодня поверят во все. Надо было долго воспитывать это усталое равнодушие, эту привычку к тому, что возможно все — завтра ворвутся, придут, убьют, все отнимут, сожгут многолетние сбережения, лишат работы, отправят на Кавказ или Колыму, разлучат с семьей, женят насильственно… Теперь чего ни скажи — все будет одинаково недостоверно, полуреально и потому приемлемо. Кому-то наверняка понравится историческая схема, в которой наконец расставлены все акценты: виноваты хазары и только они, война за территорию идет полторы тысячи лет, хазарам ненавистна Россия как оплот православия… Собственно, половина населения давно уже так думала. Никто не ожидал, что будет провозглашено равнение именно на эту половину.</p><p class="p1">Губернатор выбросил сигарету в окно и снова включил телевизор, надеясь, что Топтухин отговорил и начнется что-то другое. Ничуть не бывало — Топтухин только подбирался к финалу лекции.</p><p class="p1">— На беду нашу, — с надрывом говорил Топтухин, — доверчив и отходчив народ русский. В ущерб себе добр, в поругание себе безответчив на слово злобное, нерассудное. Неспешко, неторопко мыслит, несуетно живет. Враг же суетен и быстр, и опережает подчас даже и нашу государственность. На иные посулы готов купиться любой, кто падок на легкую наживу. (Постпозитивные определения могли относиться только к вещам варяжским, истинным; к мысли несуетной, делу неторопкому. Все препозитивное, неинверсированное было непременным атрибутом хазарства; его же прерогативой было действовать торопко, суетно — русский семь раз мерил, один раз резал, и чем медленнее, непродуктивнее трудился, тем это почиталось более патриотичным). Вместо труда на благо народное, во славу русскую иной муж государственный предпочитает подлую, плодную хазарскую корысть. Со слезами, с горечью неизбывной скажу, что и в высших эшелонах власти отечественной случаются предательства лютые, непрощаемые. Одного из таких предателей, братие, вы сейчас увидите.</p><p class="p1">И за полсекунды до того, как перед губернатором на экране возникло его собственное лицо — с официозной фотографии, украшавшей некогда его удостоверение, — Бороздин четко знал, что увидит именно себя; что это он теперь — враг государства, оклеветанный тупым ничтожеством и приписанный к хазарским войскам. Он, столько сил положивший на то, чтобы край его не окончательно превратился в болото; он, почти в одиночку придававший этой власти лоск, авторитет и так называемое человеческое лицо!</p><p class="p1">— Каждый, кто увидит презренного перебежчика, — гремел и пыхтел Топтухин, — пусть вспомнит грудь материнскую и славу отцовскую! Ни ему, ни полюбовнице его, — на экране возникло лицо Аши, откуда только взяли фото?! — не ходить по земле безнаказанно, не пить воды русской, не дышать воздухом отеческим, не топтать нив тучных и дорог пыльных! Хуже хазар предатели ненасытные, кровопивцы неупиваемые. Не пройди мимо изменника, человек русский!</p><p class="p1">Решение Бороздина оформилось мгновенно. В экстремальных ситуациях он соображал торопко, суетно — а по-русски говоря, решительно и скоро.</p><p class="p1">— Значит, к ним, — сказал он вслух. — К хазарам так к хазарам. После, сволочи, не жалуйтесь.</p></span></span></span></span>
