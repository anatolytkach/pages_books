<span><span><span><span id="id105"><div class="title5">
<p class="p">4</p>
</div><p class="p1">— Тут видишь какая вещь, — говорил Волохов через полчаса, когда они уже ополовинили двухлитровую бутыль. — Помнишь — хотя откуда тебе помнить, зубцу… Был такой Устрялов, сменовеховец. Слышал, может.</p><p class="p1">— Кое-что и мы, зубцы, слышали, — сказал Громов спокойно.</p><p class="p1">— Ну, тогда знаешь, — обрадовался Волохов понимающему собеседнику. — Ты ведь помнишь, что они с белоэмигрантами спорили: сменовеховцы талдычат, что Сталин будет красным царем и коммунисты возродят империю, а белые — что Сталин Россию губит и ничего от не осталось. Я все думал — кто прав? А перед войной допер, что правы обе стороны. Все хорошее он да, погубил. А во всем плохом — полная преемственность, стопроцентное престолонаследие. Это и есть отрицательная селекция в действии. Заметь, что у последней революции все то же: говно в полной неизменности, а все приличное, что в совке было, — полный привет, съелось. Знаешь, почему это?</p><p class="p1">— Да во всякой революции приличное первым гибнет, — сказал Громов.</p><p class="p1">— Ни черта подобного. Это ЖД наврали, когда им надо было ту революцию обосрать. Механизм простой: я тебе уже докладывал — тут четыре фазы. Так вот, к этой четвертой фазе успевает нарасти кое-какая сложность. Культура, отношения, опыт, как хочешь назови. В стареющем цикле есть своя прелесть: душно, конечно, и потолок низкий — все как в старой оранжерее, где уже подтухает почва и плесень по краям. А потом ломается все это дело. Все приличное, что успело нарасти за время оттепели и застоя, — раз! — и к черту. Это приличное — оно всегда нарастает где-то с шестидесятых по восьмидесятые. А потом культурный слой сдирается — и опять поперла голая борьба дурного с отвратным. У меня, правда, недостаточно это обосновано насчет Алексей-Михалыча… Но, знаешь, и при нем бывали вещи здравые. Петр все повытоптал, насадил и хорошего, и плохого поровну, но дикость осталась — она же нужна ему была, дикость. Без нее разве бы он столько всего перевернул? А все здравое, что было в допетровской Руси, все, на что молились потом хомяковцы, — под корень. При Александре революция была убогонькая, так что ниспровергать ничего не стали. Так, забыли. Державина с Херасковым как и не было. Ну, а про двадцатый да про наш ты сам все должен видеть. Штука в том, что революции учащаются, а восстанавливаться все трудней. Так что каждый раз труба немного пониже и дым чуть пожиже. Вот почему выживает все худшее: так в ритме заложено. Чуешь?</p><p class="p1">— Я в такие умозрения не верю.</p><p class="p1">— А во что веришь? В факты? Мало тебе фактов?</p><p class="p1">— Это все вещи непознаваемые. А вот дело свое делать — это да, это нам дано в ощущении.</p><p class="p1">— Да на кой его делать! — взорвался Волохов. — Что толку его делать, когда механизм заведен!</p><p class="p1">— Для себя, — сказал Громов.</p><p class="p1">— А смысл? Чтобы себя правильным считать? Кто тебе, капитан, в детстве успел внушить, что ты такой неправильный? Может, правильно не делать ничего, а тихо лежать, глядеть в небо, надышаться напоследок? Осталось-то с гулькин хер!</p><p class="p1">— Какая мне разница — осталось, не осталось… Это не от меня зависит. От меня зависит долг, я его выполняю, вот и весь наш ответ на ваш конец света.</p><p class="p1">— Ну-ну, — сказал Волохов. — Но хоть круг-то этот ты замечаешь? Нельзя же на карусели ездить и думать, что приближаешься к морю!</p><p class="p1">— Карусель — тоже неплохо. Я в детстве любил. По сторонам смотреть нечего, можно заниматься собой.</p><p class="p1">— Ну, занимайся, — пожал плечами Волохов. — Это у тебя, знаешь, детское. Тоже очень любят старые книжки перечитывать, наизусть известные, и по кругу ездить. А я хочу во взрослый мир, капитан, взрослый! Где у людей есть нечто поверх простейших разделений… но мы же этот слой всю жизнь сдираем! Нам же окончательную революцию подавай, чтобы с нуля! И все, что у других наросло и удерживает их вместе, у нас первым делом с корнем рвут. Так называемую культуру — в особенности. Ну и начинается… пока дети победителей не одумаются и не пойдут своим путем.</p><p class="p1">— Тоже правильно, — сказал Громов. — Нечего им идти своим путем. У каждого поколения должна быть своя революция, своя война и своя оттепель. Это идеальная схема человеческой жизни, если хочешь. У каждой генерации — свой круг.</p><p class="p1">— И будут штамповать одинаковых людей: вот тебе десять просветителей Фонвизиных, десять диссидентов Радищевых, десять раскаявшихся государственников и десять разочарованных либералов разной степени одаренности…</p><p class="p1">— Ну а где иначе?</p><p class="p1">— Везде иначе! — закричал Волохов. — Только у нас одна и та же пьеса в разных декорациях играется седьмой раз! Пара новых действующих лиц, несколько новых хохм, а так — все понятно!</p><p class="p1">— И что ты хочешь делать? — спросил Громов. — Все с нуля?</p><p class="p1">— Нет, — мечтательно сказал Волохов. — С нуля необязательно.</p><p class="p1">Он был уже совсем пьян, и лицо у него было красное, вдохновенное. Пламя свечи колебалось, волоховская косматая тень металась по потолку.</p><p class="p1">— Размыкается все очень просто, — сказал он твердо. — Нужно хотя бы сто человек, которые верили бы во что-то, кроме собственного брюха. У которых была бы хоть одна надличная ценность, вера хоть в один закон. Тогда им будет не все равно. Тогда их не будет всю жизнь заворачивать на круг, потому что кто живет по законам человеческим — тому природные не опасны. И тогда сразу будет пятое время года. А потом шестое, десятое…</p><p class="p1">— А как ты предполагаешь внушить им эти убеждения? — осторожно спросил Громов. Он понимал, что Волохова лучше не заводить — он явно уже не владел собой.</p><p class="p1">— Ходить, — выдохнул Волохов.</p><p class="p1">— По кругу?</p><p class="p1">— Не-ет, — улыбнулся Волохов хитрой сумасшедшей улыбкой. — По кругу — ни в коем случае. Но я, знаешь, долго изучал разные варианты. Нам ни один не подходит: у большинства как формировалась нация? В результате войны. А в нашем варианте нельзя: у нас всякая война — гражданская, и ни одна не ведет к победе. Договориться нельзя: это как если бы в Штатах Север с Югом были нацелены на полное истребление, без вариантов. Только всех под корень — и до конца. Значит, война отпадает. Что тогда? Самый душевный случай — это бегство из Египта. Помнишь, как в начале перестройки все вспоминали: Моисей их водил сорок лет, чтобы выветрилась память о рабстве, чтобы умер последний, кто его видел… Но сорок лет водить — это кто же выдержит? У них там везде поправку надо делать. Четырех лет вполне хватит. Я вывез бы этих людей за границу, куда угодно — но, во-первых, границы все закрыты, а во-вторых, не вернется же никто! Стоит попробовать — точно все там останутся. Были прецеденты, были. Одних эмиграций сколько. Не хотят назад, сволочи, хотя там кое-чему научились и жили вполне себе линейно. Остаются здешние пространства. По какой пустыне мне их водить? А вот по лесам, по лесам… Ты не представляешь, какие результаты! На второй год хождения люди начинают отвечать за себя!</p><p class="p1">Громов молчал. Сказать, что это бред, — он не мог, хоть и не сомневался, что у Волохова снесло крышу. Переубеждать его было бесполезно, а дослушать хотелось.</p><p class="p1">— Если у них сработало, — упрямо повторил Волохов, — то и у нас должно. Не может такого быть, чтобы все законы распространялись только на них. С этих моих жароносных и пойдет новая нация. Я не доживу — Редькин поведет.</p><p class="p1">— Ты маршрут разработал?</p><p class="p1">— Какой там маршрут… Я давно не знаю — где своя земля, где чужая. Тут главное, чтобы не по кругу.</p><p class="p1">— Постой… Так, значит, это все вранье — летучий отряд, легендарные схватки?</p><p class="p1">— Ага, — совершенно по-детски усмехнулся Волохов. — Плоскорыловская лажа. Он тоже не дурак, сука. С самого начала смекнул — лучший отряд тот, которого нет. Это очень по-ихнему, по-варяжски.</p><p class="p1">— А как же — Волохов, гроза ЖД? Я читал, они за твою голову обещали что-то под лимон…</p><p class="p1">— Ты, Громов, чудило, — в голосе Волохова не было злости: чувствовалось, что он устал. — Что им опаснее: летучий отряд или рождение нации? Кстати, такой способ создания нации — его вовсе не ЖД придумали. Этот их завет… и даже все это христианство, извини, пожалуйста… все это с греческих образцов, не самых плохих. Про Сократа как прообраз Христа еще Гегель писал, это неинтересно. Но вот с Одиссеем… с Одиссеем все не так просто, капитан!</p><p class="p1">Волохов налил и выпил, Громов пригубил.</p><p class="p1">— Почему Одиссей плыл восемь лет? Итаку надо заслужить. Где их там носило, там по Средиземноморью, хоть оно и большое, восемь лет негде плавать, это можно его вдоль и поперек избороздить! Тирренское, Э-ге-гейское… Гейское море, прикинь, капитан, всех спутников Одиссея трахнули, один он хитрожопо спасся. Но суть не в том, не-ет, суть не в том. Почему мы вечно плаваем между Сциллой и Харибдой, капитан? Потому что у нас нет Итаки! Нам некуда возвращаться, она захвачена женихами, Пенелопа ткет, ткет, все уже выткала, все распустила, и вся литература наша, извини за выражение, капитан, ткет и распускает, ткет и распускает… Но чтобы дойти до своей Итаки, ее надо выслужить у богов, капитан, ее надо выбродить в долгом бродяжничестве, как выбраживает вино. Плавать, плавать, туда, сюда… Я теперь уверен, капитан, что это ведь он их нарочно. Потому и был такой хитрожопый, более хитрожопый, чем мог догадаться Гомер. Гомер, извини меня, оказался в функции Плоскорылова. Тот ведь тоже думает, что я брожу, повинуясь таинственным штабным предписаниям. Хренушки! Я не по воле богов странствую, а по личной инициативе. Одиссей не просто так повернул от Итаки вспять, когда они почти доплыли. Он понял, что они еще не достойны! После Троянской войны, на которой люди отвыкли от правил, убивали друг друга почем зря, делали всякие гадости вроде коня, только на миг становились людьми, как вот в сцене Приама с Ахиллом, когда оба плакали… после такой войны что надо делать, капитан? Надо странствовать, чтобы на утлом этом суденышке среди зыбей выработать новые правила жизни. И тогда можно возвращаться, капитан, и выгонять женихов. Одна беда — у него все спутники перемерли; ну, так и у Моисея только молодежь выжила! Что можно сделать после стольких лет пленения? Бродить, капитан; и моисейцы бы плавали, если бы у них было море, — но у них была пустыня, и они бродили. Надо будет поискать в книге, что там было у Моисея вместо Сциллы с Харибдой… и вместо Калипсо… Прикинь, Одиссей — Моисей! Скрижали Одиссеевы… Тип-то один! Если бы я был академик Фоменко, я бы уже такой том тиснул, что это одно и то же лицо!</p><p class="p1">Волохов расхохотался.</p><p class="p1">— А Пенелопа… да, ткет. Все уже выткала — гора, леса, луга… Потом, в припадке футуризма, все распустила, потом, в припадке постмодернизма, все обратно соткала… Вот постранствую — и тоже к своей Пенелопе. Между прочим, я виделся с Женькой.</p><p class="p1">— С какой Женькой?</p><p class="p1">— Господи, с ЖД. Ты что, не знаешь, что их главная комиссарша — на самом деле моя любимая женщина Женька Долинская?</p><p class="p1">— Не знал.</p><p class="p1">— Ну, а я знал. Я пять лет назад чуть не женился на ней.</p><p class="p1">Громов вылупил на него глаза и замолчал надолго.</p><p class="p1">— Надо было жениться, — сказал он после паузы.</p><p class="p1">— Да она и тогда уже была трехнутая на всю голову. Однако, должен заметить, славные бои с нею действительно имели место. Между прочим, в последний раз — не далее как неделю назад. Правда, она предупредила, что этот раз действительно последний. «Это, — говорит, — единственный раз, что дух уступил плоти, за последние пять лет». Вона как! Все-таки получилось у нас с ней на российской территории. Как ни звал — ни в какую. Очень я мечтал, понимаешь, с ней в России пожить. Ну, и пожил… недели три, урывками по ночам. В общей сложности сутки набегут. Огонь-баба, ты что.</p><p class="p1">Громов закурил.</p><p class="p1">— Что ж ты ее не удавил? Такой шанс!</p><p class="p1">— Да толку-то. Ты думаешь, они без нее сразу домой пойдут? Нет, милый, тут все серьезно — или они нас, или мы их. Сколько можно откладывать… И потом — она же меня не придушила, и ребятам своим не сдала… Могла запросто. Иногда надо, чтобы все было красиво. Победа, добытая некрасивым образом, гибельно влияет на судьбы наций — я об этом столько понаписал в бытность свою историком, что запомнил.</p><p class="p1">— Как она выглядит хоть? Всегда было любопытно…</p><p class="p1">— Она? — Волохов закурил и мечтательно затянулся. Глаза его по-котовьи сощурились. — Она… она такая рыжая, рыжая. У, блядь, какая рыжая! И горячая. Очень горячая вся. Всегда у нее температура тридцать семь и два. Во как у нас! Очень быстро соображает, вообще быстро все делает. Кончает быстро, что для женщины величайшее достоинство. Быстро и неоднократно. Росту в ней метр шестьдесят, примерно, пять. Глаза у нее, примерно, серо-голубые. И злая, ух, какая злая! Причем успокаивается сразу — то ли натренировалась хорошо, то ли наигрывает все время. И когда злая, и когда спокойная. И ключицы торчат. Не ходит, а летает. Это ей, значится, двадцать семь лет. И сиськи, тем не менее, в прекрасном виде! Она мне знаешь что напоминала? Вот этот ихний огонь, который не жжется. В первые десять минут священный огонь, добываемый хазарским хитрым способом в храме Тела Господня, не обжигает молящихся. Как они это делают — никто не знает. Короче, Женька — это такой огонь. Купался бы и купался. И ведь, что самое непонятное, — она любит меня! Любит, тварь такая, кричит, стонет… Но теперь фигу, нас теперь хрен проймешь. Если дело дошло до порабощения — на тебе. Меня, говорю, можешь убить, пожалуйста. Но всех, говорю, ты все равно не переубиваешь, как оно ни банально звучит. Будет, говорю, сколько-то лет вашей власти, а потом нация все равно свое слово скажет. Только надо сначала, чтобы нация была, — но это уж, говорю, мы постараемся.</p><p class="p1">— А она что?</p><p class="p1">— А что она? Смеется, плачет. Ты, говорит, Волохов, как был мой любимый дурак, так и будешь мой любимый дурак. Мда. Она точно будет еще ничего, если, конечно, свои не убьют. Таких всегда свои убивают, поверь мне, капиташа, я историк. А эти — особенно склонны убивать своих. Чуть в ком-то заведется душа, они его р-раз — и под корень. Чувствуют, сволочи. Это же… Они же понимаешь кто такие?</p><p class="p1">Волохов налил себе самогону, залпом выпил, задохнулся и, казалось, мгновенно протрезвел.</p><p class="p1">— Это же два вируса, капитан, — сказал он хриплым шепотом. — Два народа-вируса. Две модели абсолютного истребления. Два типа захвата. Злой и добрый следователь из одного ведомства. Мы сами их такими сделали, до полного совершенства довели, — они на нас свои способности отточили, как на манекене. Ты посмотри, капитан. Во всей Европе только они двое не приняли христианства. Эти так и верны своему язычеству, а те — своему Яхве, который их избрал и всю жизнь порет. Только они устояли, понимаешь? Эти двое не допускают в себя никакой души. Одни могут извести любого, если нападут извне, а другие — если поселятся изнутри; одни всех задавят властью, а другие вообще упразднят власть — в общем, набор «Черный истребитель». Я не знаю, как им противостоять. И это великий Божий промысел, что они увидели тихое место, стали драться за него и в результате намертво вцепились друг в друга. Только наши тогда глупость сделали. Они к себе пускали тех и других, а надо было уйти, капитан. Если бы они ушли, все было бы замечательно. Цыгане ведь ушли, и никто им ничего не сделал. Ты не знаешь разве про цыган?</p><p class="p1">— Нет, — сказал Громов, — не знаю.</p><p class="p1">— А напрасно, Громов, напрасно! Ты знаешь, почему они бродят? Это ведь индусы, только очень оторвавшиеся… Я когда еще догадался… Немножко язык изучал, потом курсовик писал по цыганологии на третьем… Интересно стало. — Волохова развезло окончательно. — У них была такая земля… вполне себе благодатная… Потом пришли захватчики — и амба. Коренные населения ведь разные бывают. Я когда-нибудь об этом докторскую напишу, когда мир окончательно рухнет, — он счастливо засмеялся. — Интересная вообще фигня. Одни терпят всех захватчиков и вырождаются, как индейцы. Другие хитренько так их между собой стравливают, как наши, — Гуров-то хитер, капитан, очень хитер, не следует недооценивать Гурова! Я думаю, не просто так эти два народца вцепились в наш лакомый кусок: сказано, что призвали, — очень может быть, что и впрямь призвали. Сначала одних, потом других. Ну и живут под ними, как под зонтиком… Но есть третий вариант, Громов! Есть! Это вариант цыганский. Они ходят, чтобы никогда никому не достаться, и воруют, заметь себе, только коней — только средства передвижения! Видимо, в их случае травма захвата была слишком ужасна. А может, они просто не могут остановиться, потому что это ведь затягивает. Вот почему я думаю, что ходить надо не больше четырех лет. Но эти четыре года я прохожу, это как Бог свят. Потому что выбора нет, капитан, время близко. Больной когда подыхает? Когда вместо одной хронической болезни у него расцвел букет. Что и имеем. Ты бы хоть задумался, капитан, — сказал Волохов. — Тебе же голова не только для фуражки, сколько я могу судить. Вот и прикинь: есть тут два типа государства. Точнее, было, потому что сейчас мы имеем нечто третье, окончательный конец, вроде того, который наступает от резонанса двух хронических болезней. Был понос, присоединилась золотуха, спи, товарищ. Приступаем к характеристике поноса. Твои северные коллеги любят тут строить империю, хорошая вещь, науке известны позитивные примеры. Но чтобы строить империю, Громов, надо иметь — куда ее строить. В правильном языке, если есть правильный язык… ты представляешь, я ведь его не знаю, понятия о нем не имею! — но если он есть, то должно быть именно такое управление: строить — куда? Империя — она имеет целью распространяться, покорять себе, да, кто же спорит, — но нести свою истину, понимаешь? А у варягов нет этой истины, не восприняли, захват ради захвата, и весь их империализм — это долбать своих, гробить собственных солдат, своему, а не чужому населению создавать неприятности! Почему? А потому что изначально чужие. Они не умеют иначе воевать, кроме как швырять в топку: я все думаю — что же они-то с места сорвались, ходить пошли? Наверное, там случилось оледенение, ты как думаешь?</p><p class="p1">— Может быть, — пожал плечами Громов. — Я не помню, как оно шло.</p><p class="p1">— Да точно, точно. Китайцы в Китай откуда пришли? От чукчей. Чукчи жили на севере, а тут похолодание. Кто помобильней — те в Китай двинулись, а самые патриотичные остались. Получились эти… как их… юкагиры… — Волохов мечтательно затянулся. — По-юкагирски юкагир — значит человек. Остальные все не люди. Это, я думаю, у них такое самоуважение оттого, что они остались. Остались, спились, в чумах живут, моржевятиной мажутся, грязью заросли. Но патриоты, капитан, патриоты!</p><p class="p1">Он помолчал, скребя подбородок.</p><p class="p1">— Ну и вот. А вторые, хазарские наши друзья, строят тут не империю, нет. Они строят тут кор-по-ра-ци-ю. Знаешь ты, что такое корпорация? Это, в отличие от центробежной империи, вещь принципиально центростремительная. Она сокращается все время. Заметь, во все времена хазарского владычества мы отдавали территории. Потому что у корпорации тоже принцип простой — она должна быть эффективна, а стало быть, капитан, миниминизи… Вот водка, а? Язык заплетается — башка ясная. Миниминимизирована. Меньше народу — больше прибыли, все дела. Корпорация — это же вроде незверская такая вещь, необидная. Никто никого не убивает, а просто тебя не надо. И кого не надо — тот тихо себе, спокойно вымирает сам, не допущенный до жизненных благ. Они же не убийцы, капитан, сам видишь, они в войне не ахти эффективны. Если ты им не нужен, зачем уничтожать-то? Выбросить, и привет. Такая хрень, капитан. Но и корпорация их, капитан, неустойчива, потому что надо ведь служащим светлые перспективы нарисовать. А какие могут быть светлые перспективы, если ты на фиг не нужен никому? Служащий почему впахивает? — он может подняться. А в их корпорации, если ты не из их числа, хрен поднимешься. Нечего предложить, вот никто и не работает на них. И тебе неинтересно, ведь неинтересно?</p><p class="p1">— Я не пробовал, — сказал Громов.</p><p class="p1">— Как не пробовал? Ты же при всем этом жил! Но тут, прикинь, капитан, начинается самое увлекательное. Наши вечные противоположности, неизменные наши борцы начинают постепенно, постепенненько… очень, конечно, аккуратно… но сближаться, капитан, будь я проклят! Они начинают строить третий вариант — имперскую корпорацию. Два гениальных способа истребления объединяются. Научились друг у друга, сволочи, за двести лет вместе, потому что на самом деле их не двести, Громов, а тысяча двести, кабы не больше. И в результате в их империях все больше воруют, а в корпорациях все больше маршируют, и получаем мы перед самой войной — при нарастании, конечно, внешнего антагонизма, низовых передряг и прочих видимостей, — почти абсолютное сходство будущих противников, что и является, капитан, главным условием войны. Это как у Сталина с Гитлером: не с Америкой же воевали, в конце концов! Подобное с подобным! Так вот и тут: прежде чем начать воевать, надо вовсе уж уравняться. И получается у нас, капитан Громов, принципиально новый тип государства: империя, в которой нет идеи, плюс корпорация, в которой нет свобод. Нефтянку вывозим, стабфонд складируем, народ морим. Я тебе точно говорю, Громов, они бы помирились, если б нефтянка не кончилась. Они уже почти, можно сказать, слились в экстазе, но тут кончилась нефтянка, и все занервничали. А не то бы и дальше вместе морили народ — потому что вместе у них почти уже стало получаться величественно и эффективно. И помяни мое слово, они опять замирятся. Потому что все равно не умеют воевать, — разучились, понимаешь, за годы халявы, — а истреблять нас очень хорошо умеют. Эта война скоро кончится, капитан, вот увидишь, и кончится миром, это я тебе говорю. Ну, пошумят для порядку, а потом подпишут какой-нибудь кючук-карджайский договор, по которому к северянам отойдет север, к южанам юг, и пойдет совместное доедание народца. Гуров хоть и непрост, а не понимает, что воевать им не вечно. Он себе думал — они воюют, а мы под их сению… Дудки, не вечно нам быть под сению. Они вырождаются — и договариваются. Вот то, чего он не учел, Гуров-то, умная лысая голова! А как выродились — так и начали вместе нас морить, потому что делить давно уже нечего: и там и там звери, и там и там воры. Синтез ворюги с кровопийцей. А что это означает, Громов? Это означает, что время близко, что от населения ничего больше не останется, а так как защищать нас некому и спасателей не наблюдается, надо самим уходить в леса. В леса, Громов, в леса. Или в степи. Слава Богу, пространства у нас много, в этом пространстве нас никто не найдет. Правильно я говорю?</p><p class="p1">Громов уже перестал вслушиваться в волоховский пьяный бред и кивнул машинально.</p><p class="p1">— Степь я особенно люблю, — продолжал Волохов. — Больше леса. Особенно вечером люблю. И чтобы конь бежал одинокий. Никогда я этого не видел, а представляю замечательно. Есть такие песни… Они хоть и революционные, но по сути-то не про то, конечно. Революция ни при чем. Они про другое. Вот Шмаков… ты слышал бы, как поет Шмаков… Шмаков, спой!</p><p class="p1">Невысокий рябоватый Шмаков встал с ржавой матрацной сетки, оправил гимнастерку, прокашлялся и чистым серебряным тенором запел:</p><p class="p1"><em>— Там вдали за… рекой за… гора-лись-аг-ни,</em></p><p class="p1"><em>В не-бе яснаа-ам… заря да-га-ра-ла…</em></p><p class="p1"><em>Со-отня юных ба-айцов… из буденновских во-о-ойск…</em></p><p class="p1"><em>На разведку… в поля па-аскакала…</em></p><p class="p1">Громов закрыл глаза. Ему представилось мокрое росистое поле и всадники на нем. Болотная, рыже-зеленоватая заря текла по горизонту. Всадники скакали неизвестно куда. Вероятно, их всех поубивали.</p><p class="p1">— Во поет, черт?! — прошептал Волохов. — Откуда взял только! И ведь сам, заметь, ни слова не понимает. Не знает вообще, о чем речь. Спроси его, кто такой Буденный, — понятия не имеет, какой-такой Буденный. Но что-то в этом есть, капитан, что-то есть! Почему-то эти песни пережили все и, видишь, запомнились. Какой был проект, черт меня дери совсем! Величайший проект. Никогда бы не хотел жить, кроме как в те времена. И смотри, как работает Бог, — Волохов хохотнул. — Если он есть, конечно. Вот смотри: грандиозная идея, да? И эти два вируса, эти два подлейших народа, которые я ненавижу! ненавижу! со всей силой отрицания, которая мне вообще доступна! Эти два взаимоистребителя, способные из чего угодно сделать предлог для выяснения собственных поганых отношений! Что же они делают? Они губят его, капитан, губят вчистую! Сначала — идиотским своим хазарским мщением. Это ведь они, гады, придумали отмщать. Вот сейчас-то мы вам покажем — за черту оседлости, за погромы, за многовековые унижения, за все! Тут никогда, нипочем не могла начаться история — потому что все время вылезают либо те, либо эти и все превращают в свой бардак! Потом — варяжский реванш, да такой, что двадцать лет не могли остановиться, всех под корень изводили, себя в том числе! Мало что этих выбили с командных высот, стали среди себя чистку проводить — варяжская кровь, не успокоятся, пока миллионов двадцать не сожрут… Все изгадили, все! Но каков был замысел?! Идея, утопия какая, какие сверхъестественные горизонты! Везде, в любом другом месте оно могло, оно обречено было получиться… но тут-то и хитрость Божия: ни у кого не могло получиться, кроме нас. Чтобы такая штука вообще осуществилась, нужно было до предела расшатанное государство, больная кровь, слабое звено — и вот тебе пожалуйста, революция свершается у нас, и тут же превращается в гражданскую войну, как и все наше вообще. У нас ведь что ни случись — гражданская война, капитан! Шаг влево, шаг вправо — она! И почему мы их терпим, скажи ты мне на милость? Неужели этот мой, мой собственный, несчастный коренной народ вбил себе в башку, что никакие перемены не ведут к лучшему? Ты посмотри, однако, как они все загорелись в семнадцатом, какие были великие прожекты, как возликовал Хлебников — единственный из наших, кто успел что-то опубликовать! Но они же не умели строить утопию, мечтатели платоновские, искатели родины электричества. Какие из них были строители? Они только начали что-то созидать, как налетели сначала эти, потом другие — и все, привет нашей революции! И с тех пор от этого народа — уже никакой активности, словно последнюю надежду у них отняли и хребет перерубили. Так они теперь и терпят, пока затопчут. Но не-ет, нет, капитан! Это я тебе говорю, Волохов, водитель жароносной дружины, и помяни ты мое слово, капитан, — я нацию выведу, выведу! Как выводят цыпленка в инкубаторе! Вывести — наше слово, нашего языка. Только смысла никто не понимал, а я понял!</p><p class="p1">Громов испугался. Он чувствовал, что Воронов, сидящий рядом с ним, тоже дрожит мелкой дрожью. Волохов был страшен. Он допился до того состояния, в котором не слушают уже ни ответов, ни возражений, а только выкрикивают свою заветную правду, не заботясь о внятности. Заветная эта правда была законченным бредом, стройным и последовательным, каким бывает только бред: истина всегда противоречива, в ней обязательно есть нестыковка, скрытый изъян… Громов не хотел больше слушать про все это — наверное, еще и потому, что хриплый волоховский монолог лишал его жизнь последнего смысла. Участвовать в бессмысленной стычке двух вирусов Громов не желал. Он знал, что такое долг. Долг надо было беречь. Нельзя было выставлять его на всеобщее обозрение, даже в качестве аргумента; нельзя было поверять его кислотой чужих историософских спекуляций. Надо было делать то, что должно. Сейчас должно было доставить Воронова в Москву и следовать к Маше.</p><p class="p1">— Они же все знаешь кто, капитан? — после паузы выговорил Волохов, уже еле ворочая языком. — Они все, как этот твой рядовой. А, рядовой? Встать, когда со старшим разговариваешь!</p><p class="p1">Воронов вскочил, хотя ни с кем не разговаривал.</p><p class="p1">— Шутка, — прошипел Волохов. — Сит даун, рядовой Даун. Спасти рядового Дауна. Это тебя, что ли, выделили его сопровождать, капитан? А-а, инспектор Гуров бережет своих. В Москву везешь?</p><p class="p1">— Задание, — коротко сказал Громов. Он не желал никаких объяснений.</p><p class="p1">— У нас задание, товарищ майор, — подтвердил Воронов с собачьей преданностью.</p><p class="p1">— Замолчите, Воронов, — брезгливо сказал Громов. — Вы в присутствии прямого начальника не имеете права обращаться к майору Волохову без разрешения, сколько раз вам говорить…</p><p class="p1">— А ты его учи, учи, — зло улыбнулся Волохов. Он, кажется, опять начал понемногу трезветь. — Учи рядового. Ты не понял еще, капитан, — они же необучаемы! Нельзя с ними ничего сделать, то есть с нами, я имею в виду. Такой народ удивительный. Из всего этого народа дай Бог пять процентов способны к осмысленной деятельности. Все остальные либо по кругу бродят, либо песни поют, либо с кустами разговаривают. Они пребывают в особенном пространстве. И никак их нельзя вынуть из этого пространства, ты чуешь? Они в нем неуязвимы, вот почему никто и не вытопчет их до конца. Мы такие живучие, что ужас. Но ведь пока этот народ не изменится, ничего не начнется, так? А чтобы он изменился, никакого другого выхода нет… только бродить, бродить…</p><p class="p1">Громов встал.</p><p class="p1">— Пойдемте, Воронов, — сказал он строго. — До свидания, майор.</p><p class="p1">— Куда ты ночью-то? — поднял голову Волохов. — Отдохнул бы, выспался…</p><p class="p1">— Задание, — повторил Громов. — Бывай, удачи тебе.</p><p class="p1">— Ну и тебе удачи. Ты знаешь хоть, куда идти-то?</p><p class="p1">— Представляю, — сказал Громов.</p><p class="p1">— Валяй, иди. Станция большая, на какой-нибудь проходящий обязательно вскочишь.</p><p class="p1">После его ухода Волохов почувствовал странное облегчение. Даже хмель, казалось, отпустил его. Все-таки Громов был варяг, хотя и настоящий, из продвинутых, с понятием о воинском долге. А в присутствии варягов и хазар, за исключением одной хазарки, Волохов чувствовал себя стесненно, как нога в новом сапоге. Впрочем, с этим варягом можно было говорить откровенно. И даже, пожалуй, водить его. Волохов взял бы его с собой, и этого придурка, возможно, прихватил бы тоже, хотя варяг Громов нравился ему больше соплеменника. Но Громов двигался собственным курсом. Что же, подумал Волохов, это неважно. Важно, что тоже двигается. Может, года за четыре он доберется до Москвы и научится в дороге понимать, чему стоит служить, а чему не надо…</p><p class="p1">— Шмаков! — крикнул он.</p><p class="p1">— Й-я! — отозвался Шмаков с койки.</p><p class="p1">— Спой еще, про Щорса. Знаешь, кто был Щорс?</p><p class="p1">— Командир полка, — сказал Шмаков.</p><p class="p1">— Ну вот и пой.</p><p class="p1">— Шел отряд по берегу, — затянул Шмаков с детской трогательной интонацией. Отчего-то эту песню очень любили в советских, да и постсоветских детсадах. — Шел издалека. Шел под красным знаменем командир полка…</p><p class="p1">— Э-эх, командир полка! — подхватила летучая гвардия.</p></span></span></span></span>
