<p class="p">Глава тринадцатая. Повесть о трех городах</p>
</div><span id="id141"><div class="title5">
<p class="p">1</p>
</div><p class="p1">— Можно, кажется, — сказал губернатор осторожно, и они выглянули из-за угла. Провинциальная серая улица была пустынна, облупленный серебряный Ленин указывал рукой на кинотеатр «Победа», словно укоряя — до чего дошли. В кинотеатре раньше был вещевой рынок, потом его закрыли и стали опять показывать кино, большей частью патриотическое, но на кино никто не ходил, и его тоже закрыли. Одно время там была выставка-продажа природных лекарств и оккультных услуг, но ее ограбили. Тогда там сделали православную ярмарку, но ее посещали плохо, так что сейчас кинотеатр пустовал. Иногда в зале пировала плохим пивом местная молодежь. В этом городе, как почти во всех других городах на этой территории — вам не нравилось, когда говорили «эта страна», хорошо, давайте говорить «эта территория», потому что страну вы благополучно уконтрапупили, — постоянно что-нибудь закрывали и открывали в новом качестве, но всегда с некоторым сдвигом по шкале, с небольшой, но заметной деградацией. Например, в этом городе был собор. Расписал его добрый купец Чунькин, художник-самоучка, рослый, круглолицый, пухлый, и весь собор был расписан такими же розовыми, круглолицыми, пухлыми ангелами. Все, за что бралось коренное население, получалось добрым и пухлым. Купец Чунькин впоследствии разорился и побирался у собора, расписанного им в лучшие времена: человек, рисующий пухлых ангелов, вряд ли может быть хорошим купцом по варяжским или хазарским законам, а другой торговли на этой территории не оставалось. И тогда купец Чунькин стал жить при соборе, и собор славился тем, что молитвенные просьбы в нем исполнялись, потому что пухлые ангелы доносили их непосредственно до престола Господня. Пухлые ангелы имеют преимущество.</p><p class="p1">В революцию собор закрыли и снесли вместе со всеми ангелами, и на месте его выстроили продуктовый магазин. Но собор имел такую силу, что молоко в магазине всегда было самое свежее, творог самый вкусный и продавцы самые добрые. Они тоже были розовые, пухлые и улыбались каждому покупателю, и те, кто ходил в этот магазин, были счастливы в личной жизни.</p><p class="p1">В следующую революцию магазин снесли и опять построили собор, и расписали его вертикальными готическими композициями в варяжском духе, потому что людей, подобных купцу Чунькину, на этой территории почти не осталось. И потому в соборе ютилась по углам мелкая нечисть, присутствие которой отлично чувствуют прихожане. Им было неуютно в соборе. А все молоко в городе стало кислое, и творог невкусный, а продавцы готические, с чертами варяжских мудрецов и воинов, неприступных и презирающих чужие мелкие нужды. Так всегда бывает, если что-нибудь долго строить, а потом сносить, и опять строить, и опять сносить. После второго сноса уже не получается ничего хорошего, а после третьего вообще все разваливается. В этом городе была улица Соборная, переименованная в улицу Розы Люксембург, а потом обратно в Соборную, а потом в Первую Патриотическую. Второй Патриотической в городе не было, потому что Родина у нас одна, сынок, да и от той, если честно, мало что осталось. Все улицы в этом городе были переименованы по три-четыре раза, и потому ходить по ним не было никакого удовольствия. Честно говоря, паршивый это был город. Его построили на берегу реки Мурки, прозванной так за миролюбивое журчание; варяги пришли и сделали из него крепость, хазары пришли и крепость перестроили, варяги вернулись, сожгли город и выстроили снова, во времена хазарского ига его разрушили и выстроили каменный, во время опричнины разрушили каменный, после опричнины отстроили, но разрушили во время смуты, а дальше он рушился и строился каждые сто лет, и ему самому это страшно надоело. Реку Мурку последовательно переименовывали в Красну, потому что на ней были бесчисленные побоища, Десну, потому что предводитель хазар уронил туда вставную челюсть, Шексну, потому что на языке варягов это означало «Ща как тресну!», Блесну, потому что первый секретарь обкома любил тут рыбачить на блесну, и Весну, потому что это соответствует светлому патриотическому духу, но ни одно из этих имен не прижилось, и в городе ее называли просто рекою. «Усну, — лепетала она, час от часу мелея, — усну…».</p><p class="p1">— Можно, — повторил губернатор, и они с Ашей медленно, чинно, типа обычная пара, пошли по улице. Они только что оторвались от преследователей, долго отсиживались в подвале, плутали, петляли, путали следы и вот теперь вышли на улицу Народного Сопротивления, бывшую Ленина. Идти по улице было трудно, сам воздух словно сопротивлялся. Ее пересекала улица Народного Напряжения, вся выгнутая горбом, словно от народного напряжения. Улицы Народной Силы Тока в городе не было, поэтому и с электричеством возникали перебои. Неожиданно в конце улицы показался милиционер. Сюда уже дошли фотороботы губернатора и Аши, а о предательстве губернатора рассказали все телеобозреватели. И хотя узнать Бороздина было теперь трудно — он зарос, исхудал и был грязен, вот что делает с людьми любовь, — все милиционеры его узнавали, потому что от губернатора и Аши исходили флюиды загнанности, а на эти флюиды милиция реагирует безошибочно. Вот и теперь, привлеченный запахом угнетения и унижения, милиционер, которого в случае драки или грабежа было не дозваться, возник в конце улицы и стал принюхиваться. Угнетение и унижение были где-то близко. Не поживимся, так хоть поглумимся. Он радостно заверещал всем телом и устремился к Аше и губернатору.</p><p class="p1">— Бежим! — крикнул губернатор и устремился в переулок. Погода была в великолепии. Пыльный зной изливался на южный город. Бежать было трудно. Аша была на пятом месяце, год — на восьмом, лето — на третьем. Ашу тошнило. Губернатор сжимал ее потную вялую руку и чувствовал, что на этот раз им далеко не убежать.</p><p class="p1">— Ага! — радостно закричал пьяный мужичонка в подворотне. — Лови, держи, бягуть!</p><p class="p1">— Бягуть! — радостно поддержала его огромная бабища, старшая по дому шесть в переулке Народного гнева. — Дяржи, бягуть!</p><p class="p1">Губернатор силком волок беременную Ашу. Они бежали медленно, толпа преследовала их немногим быстрее. Толпа растягивала удовольствие и попутно обдумывала — что бы с ними такое сделать? Зашить в мешок и бросить в реку было неинтересно, потому что мучения жертвы будут скрыты водой и мешком. Можно было зашить в мешок и заставить бежать, получится бег в мешках. Так и сделаем, а дальше придумаем. Губернатор бежал с трудом, воздух разрывал его легкие. Аша почти не могла бежать, задыхалась, сердце ее проваливалось. «Дяржи!» — заорала встречная кошка, черная от злобы, серая от пыли, и перебежала им дорогу.</p><p class="p1">— Убьем, убьем, и выблядка убьем! — кричало население этой территории. Им было неважно, кого и за что убивать. Оно уже так часто меняло название, веру и социальный строй с одного на другой и обратно, что начисто забыло себя и испытывало только глухое отвращение к себе и любым встречным. Встречных оно убивало, а себя изводило. В последний раз населению пришлось переворачиваться, когда через город дважды проходили сначала ЖД, а потом федералы. Тогда Народную переименовали в Кошерную, а все предки перевернулись в гробах. Потом Кошерную переименовали в Народную, и все предки перевернулись обратно. Не предки, блядь, а пропеллеры. То-то земля и шевелится на всех кладбищах этой территории, и падают надгробья. Все говорят: акт вандализма, акт вандализма… Ничего подобного, это все предки.</p><p class="p1">Из переулка генерала Паукова, названного так при жизни генерала Паукова потому, что он родился в этом городе, да где бы еще могла и появиться такая дрянь, — выбежал небольшой отряд, вооруженный дрекольем, осмотрелся и тоже побежал за Ашей и губернатором.</p><p class="p1">— Бягуть! — кричала одна толпа.</p><p class="p1">— И выблядка! — кричала другая.</p><p class="p1">Аша вырвала у губернатора руку и упала.</p><p class="p1">— Не побегу дальше, — сказала она.</p><p class="p1">— Ветер! Вызови ветер! — прерывающимся шепотом попросил губернатор.</p><p class="p1">— Не могу. Сил нет. Здесь нет ветра.</p><p class="p1">— У-гу-гу! — загуготала толпа и замедлила шаг. Теперь можно было не торопиться.</p><p class="p1">— А и к черту все, — сказал Бороздин. — Хватит прятаться. Третий месяц бегаем.</p><p class="p1">Они с Ашей встали, держась за руки и шатаясь, и уставились на толпу.</p><p class="p1">В эту секунду первый пузырь газа флогистона, скопившийся под этим городом, оглушительно лопнул, разделяя жертв и преследователей широким осыпающимся рвом. Толпа в ужасе остановилась на краю рва и попятилась от него. Пропасть ширилась. Призрачный газ без цвета и запаха поднимался в небо.</p><p class="p1">— Землетрясение, — в ужасе прошептал кто-то из толпы.</p><p class="p1">Губернатор и Аша, не веря чудесному спасению, замерли на краю пропасти.</p><p class="p1">— Ты сделала? — спросил губернатор.</p><p class="p1">— Не я, земля. Худо дело. Земля встала, не носит нас больше. Старики говорят — когда земля встанет, значит, нет сил у земли. Не выдержала. Все, конец.</p><p class="p1">Губернатор сел на асфальт, обрывавшийся в трех шагах от них, и взялся за голову.</p><p class="p1">— Что же, это все мы? — спросил он. — Всему верю, а этому не верю. Неужели из-за ребенка, Аша?</p><p class="p1">— Не знаю, — сказала она блеклым голосом. — Идем.</p><p class="p1">— Погоди! Но если правда… из-за нас… конец всего этого…</p><p class="p1">— Идем, — сказала она решительно. — Этот мир ничего другого не стоит. Если все они так хотят убить одного ребенка, так им и надо.</p></span><span id="id142"><div class="title5">
<p class="p">2</p>
</div><p class="p1">В следующем городе уже почти не было народу. Все чувствовали, что надо переезжать — например, в Москву, где что-то еще осталось. Ходили слухи, что скоро Москву закроют, не резиновая же она, и так все поля вокруг города застроили в радиусе двухсот километров, — но пока туда еще пускали на всякую грязную работу, и надо было торопиться. В городе N+1 было очень много церквей и двухэтажных домов. Вода постепенно заполняла этот город, но дело было не в тихой и сонной, стоячей реке Энке, над которой зависали в дрожащем напряжении синие прозрачные стрекозы, а в какой-то подпочвенной, непонятной воде — может быть, минеральной. Она выступала из недр и осторожно, вдумчиво, спешить ей было некуда, подтопляла город N+1. Никаких грехов на нем не было, и наказания своего он не заслужил, и вообще смешно придумывать нравственные обоснования физическим процессам, вроде камнепада или затопления. Нравственные события бывают в нравственной истории, а в физической случаются только физические. Они — не расплата и не урок, а отсутствие заботы о земле. Когда земля пустеет, она естественным образом заболачивается, а когда болото не осушается, оно медленно превращается в озеро. Очень может быть, что и с градом Китежем случилось нечто подобное, а захватчики совершенно ни при чем. N+1 уходил под воду, стоял в ней по пояс, как новая Венеция, затопляемая по тем же причинам (со времени дожей здесь нет никакой истории, население деградирует, нельзя же считать населением бесчисленных туристов!), да тут еще лето случилось дождливое — сухих улиц не осталось. Во всем городе работал один магазин, где Аша с губернатором купили каменных пряников, и одно учреждение, а именно краеведческий музей, директриса которого, она же единственный экскурсовод, выращивала в собственном огороде влаголюбивые культуры и тем жила.</p><p class="p1">Директриса энплюсодинского музея была женщина интеллигентная, высокая, когда-то красивая, очень культурная. Униформой всем культурным женщинам провинции служила шаль местного производства — во всей провинции коренное население выживало тем, что шило платки, а если ткани не хватало, плело кружева. Библиотекарши, учительницы, директрисы провинциальных музеев, все, на ком так долго держалась истинная культура, то есть все, кто так долго и глупо делал вид, будто что-то еще есть, тогда как на деле давно уже следовало отказаться от этого дрянного представления и начать какое-нибудь другое, — всегда кутались в шали. Их представление о культуре, однако, было стопроцентно варяжским: веди себя скромно, не харкай. Они любили, чтобы формуляры были заполнены разборчиво. Им нравились ритуальные вещи вроде отставленного мизинца при чаепитии, слов «спасибо» и «пожалуйста», варяжских паролей, не имеющих к культуре никакого отношения, и еще они любили варяжские народные романсы, в которых суровые варяжские женщины, поющие в нос, давали решительный отлуп, тоже в нос, любым мужским поползновениям. Разумеется, среди провинциальных библиотекарей и директрис были истинные подвижники, хорошие люди, и одна из таких подвижниц, Марья Семеновна, работала в городе N+1. Она любила свой приплюснутый купеческий город и крошечный музей, восстановленный местными умельцами. Она любила зал местных промыслов — изготовление грибов из любых подручных материалов, от дерева до глины; грибы были вытканы на местных шалях, украшали кружева, столовый прибор в виде грибов был когда-то подарен президенту, и только так он узнал о существовании данного города. Грибов в городе и его окрестностях водилось очень много. Вероятно, они питались подземной влагой, тогда еще скрытой, смирной.</p><p class="p1">Не найдя в городе ни одного работающего заведения, губернатор и Аша зашли в музей — просто потому, что там было открыто.</p><p class="p1">— Проходите, проходите, добрый день, — поприветствовала их директриса. — Я рада, что вы интересуетесь историей нашего города.</p><p class="p1">Она провела их по залам, стилизованным под купеческое жилище начала девятнадцатого века, где под стеклом на столах лежали извлеченные из семейных архивов гимназические сочинения про Дубровского, фрагменты частной переписки, в которой все благодарили Бога за то, что до сих пор живы, и страница рукописи писателя Кислопрядильщикова, видного народника, сотрудника журнала «Русское богатство»: очерк «Лесной пожар». По стенам висели портреты местных купцов и их детей. Купцы были насупленными, лица их — каменными, и видно было, что купеческое слово их твердо. В лицах детей читался затаенный ужас перед тем, что когда-нибудь и им придется стать каменными, и купеческое слово их будет твердо. Купцы были по большей части варягами и люто ненавидели хазар, видя в них опасных конкурентов. Когда хазары стали комиссарствовать в городе, купцам мало не показалось.</p><p class="p1">— Это музыкальная шкатулка, — рассказывала Марья Семеновна. — Музыкальные диски хранились в доме казака Онуфрия Янова, впоследствии расказаченного, и купца Прокофия Жвакина, впоследствии раскупеченного. Музыкальные ящики Янова и Жвакина были сломаны во время революции, и диски негде было прослушать. Дети делали из них мишени для луков, и большинство дисков погибло. Уцелел один, завалявшийся на чердаке и содержавший вальс «Амурские волны». Музыкальный ящик случайно уцелел в хозяйстве трактирщика Прушкина, впоследствии растрактиренного. Его починил кустарь Зобов, впоследствии раскустаренный. Ящик долго хранился у комиссара Штейнмана, впоследствии комиссованного, а в 1937 году раскомиссаренного окончательно. Создатель нашего музея Борис Павлович Феклыгин, местный учитель, впоследствии разучившийся, обнаружил диск и совместил его с ящиком, потому что диск без ящика и ящик без диска не представляли никакого интереса. Да, в сущности, вся страна у нас состоит из дисков без ящика и ящиков без диска, и они вечно враждуют, вместо чтобы объединиться и произвести дивную музыку. (Это уже я говорю, а не она). Сейчас вы ее услышите.</p><p class="p1">Она поставила диск на ящик, накрутила ручку, пружина стала раскручиваться, диск завращался, задевая прорезями за шипы, и хрипловатые колокольчики заиграли вальс «Амурские волны». Аша выглянула в окно. Воды Энки, а может, какие-то другие воды уже поднялись до окна провинциального музея. Вода проступала сквозь крашеные доски пола. По воде бежали мелкие амурские волны: амур означает любовь, и вода как бы слегка трепетала от любви к заполняемому ею городу.</p><p class="p1">— Благодарю вас за внимание, — сказала Марья Семеновна, поправляя очки. — Теперь мы продолжим нашу экскурсию по городу, надо только взять лодку.</p><p class="p1">Она быстро надула с помощью насоса небольшую резиновую лодку, открыла окно, причем вода хлынула в дом; директриса забралась в плавсредство и помогла разместиться там губернатору с Ашей.</p><p class="p1">— Внизу под нами вы видите улицу Семеновскую и дом купца Кузина, пожертвовавшего три тысячи на создание городской библиотеки, — говорила Марья Семеновна, деловито гребя, лавируя меж постепенно скрывавшимися домами и возвышавшимися над водой храмами. — Вот эта удивительная церковь Николая Угодника казалась мне в детстве очень высокой, как бы длинношеей, и я называла ее «балерина». А вот эта удивительная церковь Параскевы Пятницы казалась мне кругловатой и приземистой, и я называла ее «бабушка». У нас был очень хороший город. Приносим вам свои извинения за то, что вы знакомитесь с ним в ситуации временных неудобств.</p><p class="p1">Вода прибывала неудержимо. Лодка поднималась выше и выше. Скоро над водой торчали уже только кресты колоколен. Вдалеке виднелся скалистый обрывистый берег — здесь начинался юг, горы.</p><p class="p1">— Благодарю вас за посещение нашего города, — сказала Марья Семеновна, причалив к скале. — Наша экскурсия окончена. Всего доброго.</p><p class="p1">Губернатор и Аша вылезли на скалу и хотели помочь Марье Семеновне, но она решительно отказалась.</p><p class="p1">— Я не могу оставить музей, — сказала она. — Надеюсь, экскурсия вам понравилась. Там между гор есть тропинка, она вас вывезет к жилью. До свидания. Не забывайте наш город.</p><p class="p1">Она взялась за весла и отчалила куда-то по розово-серой гладкой воде.</p></span><span id="id143"><div class="title5">
<p class="p">3</p>
</div><p class="p1">В горах Кавказа жили вечно воевавшие, горные, гордые жители, и именно у них в последнее время находили приют немногочисленные правозащитники, бежавшие из Москвы и других городов. Естественно было бы предположить, что они переместятся к ЖДам, но правозащитники, в отличие от губернатора Бороздина или наивного сельского борца Вовы Сиротина, были ребята умные и знали, что ЖДам они не нужны абсолютно. В лучшем случае их поблагодарят и дадут грамоту. За рубежом они тоже больше никому не были нужны, а горцы их еще кормили — за то, что они делали горцам посильный пиар в глазах мирового сообщества.</p><p class="p1">Мировое сообщество, правду сказать, особенно не интересовалось горцами. Но они были частью исламского мира, с которым остальной мир до сих пор вяло воевал, и в этом качестве могли иногда послужить информационным поводом. У них был свой сайт «Горцы. ru», полный кавказских легенд и шахидских баллад. В балладах говорилось о том, как сладко взорвать себя. Баллады были богато проиллюстрированы. Все они походили на стихи из дембельских альбомов, и гурии изображались примерно так же.</p><p class="p1">Каждый день ровно в четыре часа пополудни полевой командир Рамзан, которого давно никто не ловил, потому что у русских не было на это сил, а остальных он не интересовал, выходил в эфир, публично молился Аллаху, а потом начинал рассказывать о том, как плохи неверные.</p><p class="p1">— Неверные не моют ног, а мы моем ноги пять раз в день, — говорил он веско. — Неверные носят вонючее нижнее белье, а мы не носим никакого нижнего белья. Неверные едят нечистую, грязную свиню, фу. А мы не едим свиню, мы прэзираем свиню. Свиня не моется ни разу в день, а мы моемся до пяти раз в день. Свиня — нечистое, неверное животное. Неверный — такая же свиня. Неверного надо резать, как свиню.</p><p class="p1">После этого Рамзан непосредственно в кадре резал очередного неверного, творил благодарственную молитву и исчезал. Его место заступал правозащитник или правозащитница. Правозащитница рассказывала о борьбе гордого народа горцев за свою независимость. Борьба увенчалась полным успехом, потому что гордый горный народ был теперь на фиг никому не нужен и сидел в своих горах в полном одиночестве. Даже резать неверных становилось все трудней, потому что похищать их на улицах больших городов было рискованно, а добровольно ехать в горы они не хотели. Правда, действовал небольшой экскурсионный бизнес «Война в горах» — ознакомление с местной культурой, горловое пение, посещение развалин древнего монастыря, дегустация вина, похищение, выдача после выкупа (выкуп оговаривался заранее и входил в стоимость тура). Похищение заложника уже было аттракционом вроде похищения невесты, но Рамзан часто не удерживался и резал заложника, а это серьезно ударяло по бизнесу.</p><p class="p1">С тех пор, как в мире перестали сходить с ума из-за нефти, воинственный восток уже не представлял особенного интереса. Он тихо превращался в историко-культурный заповедник, посещаемый специалистами и любителями старины. Периодические взрывы были неудачны, бомбы готовили кое-как, иногда оставался жив даже сам шахид, и книга его, написанная после неудавшегося теракта, уже не становилась бестселлером. Воевать в России горцам тоже было неинтересно. ЖД надеялись на их союзничество и даже обещали принять их в ЖД, но горцы не торопились заслужить эту честь. ЖДов они терпеть не могли. Завоевывать Россию им не хотелось, она была слишком большая, нефть ничего не стоила, и потому они ограничились захватом предгорий и некоторой части Кубани. Именно этот район — по умолчанию до сих пор русский — предполагалось отдать ЖДам после официального замирения. ЖД, конечно, не хотели, но выбор у них был, правду сказать, небольшой. Война еще тянулась, то тут, то там вспыхивали мелкие схватки, банды бродячих ЖД и странствующих федералов бродили по стране, никем не координируемые, и все ждали мира. Мира, однако, быть не могло, потому что от страны отделилась Москва. Она теперь жила своей жизнью, и ей не было никакого дела до исхода войны. Война иссякала сама собой, после генерального сражения о ней не упоминали даже по телевизору. Земля делала свое дело, медленно зарастая, заболачиваясь, скрывая следы исчерпавшей себя цивилизации и начиная все с нуля. В земле все перепреет. Горы стояли неколебимо, но кого они занимали? Можно было сколько угодно резать заложников и нанимать правозащитников — никто уже почти не глядел в эту сторону.</p><p class="p1">Как раз в тот день, когда губернатор и Аша шли через горы в азиатскую республику на берегу Каспия, чтобы там пересидеть осень и тихо родить, заложника поймать не удалось, и потому резали правозащитника. Среди горного пейзажа, на узкой тропе сидел полевой командир Рамзан и омывал себе ноги из специального кувшинчика. После этого обряда, сопровождаемого краткой проповедью о пользе мытья ног, он предоставил слово правозащитнице.</p><p class="p1">Это была седая, коротко стриженная, пожилая правозащитница, немного знавшая нравы горных народов, а потому примерно понимавшая, что сейчас будет. Между тем она надеялась, что если будет говорить хорошо, то ее, может быть, не зарежут, а ограничатся, ну я не знаю, бараном. Баран ведь тоже не моет ног. Правозащитница уставилась в камеру и дрожащим голосом стала рассказывать о том, как она любит народы гордого Кавказа. Она рассказывала о том, как они боролись за свою свободу, как в качестве послов мира входили в зал «Норд-Оста» и в школу Беслана, как раздавали заложникам кока-колу и шоколад, а зал украшали поддельной взрывчаткой, как со слезами на глазах умоляли тогдашнего президента прекратить войну, а в промежутках между обращениями не забывали пять раз в день мыть ноги. Это послы мира, повторяла правозащитница, настоящие голуби мира…</p><p class="p1">— Ну, хватит, — сказал полевой командир Рамзан и скомандовал оператору, чтобы брал крупнее. В следующую секунду он мастерски перерезал правозащитнице горло и швырнул тело в пропасть.</p><p class="p1">— Так будет с любым, кто не уважает пророка, — добавил он в камеру стандартную формулу и стал на молитву. Губернатор и Аша за ближайшей скалой боялись пошевелиться. Полевой командир Рамзан поднялся, кивнул оператору и удалился кормить правозащитников.</p><p class="p1">Это было одним из его любимых развлечений. Он выпускал правозащитников из сарая, где они содержались, и широким жестом кидал им репу. Правозащитники ползали по сухой земле, собирая репу, и продолжали о чем-то собачиться.</p><p class="p1">— Ну погляди, — говорил Рамзан оператору. — Разве это люди? Они же не люди, клянусь Аллахом.</p><p class="p1">Оператор кивал.</p><p class="p1">Губернатор и Аша беспрепятственно прошли через горы. Кроме короткой вспышки активности в четыре часа пополудни, Рамзан ничего особенного не делал. Конечно, он с удовольствием отловил бы пару заложников, но, правду сказать, ему было лень. Холодной ночью, под крупными синими звездами, Аша и губернатор проползли под колючей проволокой и пересекли никем толком не охраняемую границу.</p></span></span></span></span>
