<p class="p">4</p>
</div><p class="p1">— Ты здесь? — осторожно спросил Волохов.</p><p class="p1">Женькин мобильный весь день не отвечал, но он все равно отправился в баню в условленный час — мало ли, не могла ответить ему прилюдно… В конце концов, если бы у нее что-то случилось, она бы просто отключила телефон, и все. А тут гудки. Надо идти.</p><p class="p1">— Да-да, милый, — ответил визгливый глумливый тенорок. — Я здесь, я вся твоя!</p><p class="p1">Волохов включил фонарь. К чертям безопасность, все равно уже накрыли. Тенорок был ему смутно знаком. Прямо на лавке, поблескивая очками и лысиной, сидел и широко ему улыбался Константин Гуров собственной персоной.</p><p class="p1">— А где наша Женя? — пищал Гуров. — А нету нашей Жени! Вместо подруги мы обрели друга. Обними же меня, любимый, займемся любовью, а не войнами.</p><p class="p1">— Какого хера ты тут делаешь? — спросил Волохов, пряча глаза. Ему казалось, что от страха и злости у него все лицо дергается. Вдобавок ему было стыдно.</p><p class="p1">— Жду тебя, — продолжал глумиться Гуров. — А ты мне словно и не рад, милый. Жди меня, и я вернусь, только очень жди! Жди, когда наводят гнусь желтые ЖД… Тебе не кажется, что это сущий манифест ЖД? — сказал он уже обычным своим голосом. — Сплошное ЖД, прямо-таки рефреном. Жди, когда снега метут, жди, когда жара, жди, когда других не ждут… И вообще, было в нем что-то хазарское. Картавость эта, и «Убей его» — совершенно ветхозаветные стихи… Интонация какая! Сколько раз увидишь его, столько раз его и убей. Ему, как известно, очень нравилось быть хазаром среди варягов и наоборот. Знаменательный случай слияния варяжской этики с хазарской эстетикой, — первый признак того, что злейшие враги уравнялись…</p><p class="p1">— Позвездеть ты, Гуров, любишь, это точно.</p><p class="p1">— Ну а что еще делать? Мешки ворочать? Варяги пусть мешки ворочают…</p><p class="p1">— Где она?</p><p class="p1">— Она довольно далеко, — вкусно затягиваясь сигареткой, сказал Гуров. — И скоро будет еще дальше. Сильно подозреваю, что увидитесь вы нескоро, если увидитесь вообще. Ай, ай, какое горе. Руки распускать не вздумай, оружие при мне, и владею я им прилично. А теперь настало время познакомить нашего мальчика с некоторой частью его родной мифологии. Надо же знать свой край, как говорят варяги. Кстати, лишний пример полного непонимания нашего праязыка. Край по-нашему — предел, граница. А часть территории — крой. Местность, которую кто-то покрыл. Отсюда же и кройка — ткань делится, как карта. Надо знать свой крой. Смешно же знать свой край, то есть предел. Его никто не знает.</p><p class="p1">Волохов молчал.</p><p class="p1">— Короче, — сухо продолжал Гуров, — я тебе, Володя, не враг, ты мне, Володя, брат. И тебя я сроду никуда не пошлю, потому что мне мой край очень хорошо известен. Против своего у меня никакой силы нет, а если и есть, пользоваться ею мне неприлично. А хазаркам нечего крутить амуры с коренным населением, особенно теперь, когда всякий час на счету. Что сроки близятся — вижу, а откуда шандарахнет — не вижу, такой у меня край, а Василий Иванович ушел, спросить не у кого.</p><p class="p1">— Какой Василий Иванович? — спросил Волохов.</p><p class="p1">— Не обращай внимания, считай, что Чапаев. Ну так вот, друг милый. Что ходим мы по кругу — это мы с тобой обсуждали многократно. Хождению этому не было бы края, кабы не одно специальное пророчество, известное нашему племени с давних времен. Угнетать нас по очереди можно сколько угодно, а вот в брак вступать с угнетателями можно избирательно. Потому что родиться от этого брака может тот, кто всему нашему роду положит начало. Что такое начало, надо тебе объяснять или сам догадаешься?</p><p class="p1">— Где она? — снова спросил Волохов.</p><p class="p1">— Жива-здорова, прояви терпение. Мог бы и не перебивать старшего по званию. Начало, милый друг, — это самый и есть конец нашей истории в той версии, которую мы доселе знаем. Привет всему, проще говоря. И настанет этот привет в одном из двух случаев, либо в обоих сразу, чего, как я понимаю, можно сегодня опасаться. Либо славного рода наш человек полюбит хазарку, либо славного рода наша девушка полюбит варяга. И тогда амба, пожар, потоп и короткое размыкание. Случаи подобные бывали, примеры суть многи, и всякий раз история хитроумно вмешивалась. Или не история. Или не хитроумно. Пару раз совсем уж было на грани останавливали — царевич Алексей, нашей девушки отпрыск, почти-почти батюшку сдвинул, но оговорили и царевича. Много, много было разного, а ты как думал. История — жестокое дело. Но тут уж, как говорится, выбирай: либо ты одного царевича оговоришь, либо всю страну к чертям провалишь. Так и дожили до двадцать первого, и еще проживем, хотя отдельные знамения подсказывают… подсказывают… — Гуров глубоко вздохнул и затушил сигарету. — А прочие цивилизации — где они, желал бы я знать? И Риму привет, и Византии привет, и Америке скоро то же самое, а Европа, мнится, давно уже. В то время как мы себе живем в прекрасной неприкосновенности, и убыль от всех захватов и тираний не превышает естественной убыли от старости и пьянства, которое, кстати, одних губит, а другим открывает высшие миры. Об этом подробнее в свое время. Вопросы, майор Волохов?</p><p class="p1">— И ты хочешь сказать, — медленно выговорил Волохов, — что из-за этого вашего мудацкого суеверия… я больше не увижу Женьку?</p><p class="p1">— Ну, это дело твое. Захочешь — увидишь.</p><p class="p1">— Где она?! — в третий раз повторил Волохов, сжав кулаки.</p><p class="p1">— Есть такая деревня — забыл, как называется, — сказал Гуров. — Деревень, собственно, две. Все остальные созданы по их образу и подобию. В одной деревне все есть, и она называется Дегунино. В другой ничего нет, и ее названия никто толком не помнит, потому что никто еще оттуда не возвращался. Интересная очень местность. Что туда ни попадает, все пропадает. Очень может быть, что там замечательно, и именно поэтому никто оттуда не вернулся. Самолеты над ней не летают, чтобы никто не увидел, как там замечательно. Поезда, правда, ходят, потому что поезда ходят везде, это так положено. Но стоянка всего полминуты, и пассажиры всегда только сходят. Не заходят никогда, нет. Некому оттуда заходить. Машинисты стараются побыстрей проехать. Ну так вот, все деревни сделаны либо по дегунинскому, либо по вот этому второму образцу. В одних все есть, в других ничего нет, и никакой председатель этого не поправит. А почему это так распределено — никто не знает. Вероятно, от роду. Женька твоя сейчас едет в ту деревню и, по всей видимости, скоро узнает, хорошо там или плохо. А поскольку ты ей небезразличен, она уж как-нибудь даст тебе сигнал. Некоторые, говорят, умудряются.</p><p class="p1">Волохов молчал.</p><p class="p1">— Я тебе, Володя, должен был раньше сказать, но не хотел грузить, — мягко проговорил Гуров. — Ты, друг, не самого простого рода, это тебе помнить надо. Не высшая ступень иерархии, не жреческая, само собой, аристократия, — но волхв, волк, рудознатец и тайновидец, лозоходец и лесовод в лучшем виде. Знаешь, кто такой лесовод? Ты думаешь — он вроде садовника лесного? Брехня, Володя, искажение языка. Лесовод — тот, кто может людей два года по лесу водить и двум армиям глаза отводить, хорошо ли ты понял меня? Другой бы на твоем месте давно задумался — как это ты два года не воюешь, и никто еще тебя не поймал? Это, Володя, не всякому дастся, и не со всякой девушкой тебе, Володя, можно дело иметь. Мы тебе лучше найдем.</p><p class="p1">— А знаешь ты, Костя, как называется эта твоя деревня? — тихо спросил Волохов.</p><p class="p1">— Не знаю, милый, и тебе не советую.</p><p class="p1">— А я знаю, Костя. Деревня твоя называется Жадруново, хорошо ли ты слышал меня? Хочешь, Костя, пойти в Жадруново?</p><p class="p1">Гуров молчал, и лица его Волохов не видел. Он снова включил фонарик и вместо испуга увидел на этом лице не то жалость, не то досаду, словно Гуров раскусил горькую пилюлю и при этом пилюлю жалел.</p><p class="p1">— Это кто же тебя успел послать туда? — спросил он.</p><p class="p1">— Нашлось кому. Кстати, он тут неподалеку квартирует. Эверштейном звать.</p><p class="p1">— Убью суку, — зло сказал Гуров. — Какого человека в Жадруново послал. Волка в двадцатом колене, элиту нашу. Ну, погоди. Пойдешь ты у меня в Жадруново.</p><p class="p1">— Многовато нас будет в Жадрунове-то, — усмехнулся Волохов.</p><p class="p1">— Ничего, там просторно.</p><p class="p1">— А сам туда сходить не боишься?</p><p class="p1">— Я бы, может, и хотел, — спокойно ответил Гуров. — Интересно все-таки. Но, знаешь, не всякий меня туда и отправит. Человек-то я, Володя, не больно простой — понимаешь, в чем причина?</p><p class="p1">— Это точно, — кивнул Волохов. — Непростой.</p><p class="p1">— Да погоди, может, и на тебя не подействует. Эверштейн, конечно, много всего почитал и даже не без способностей, но каббала против наших умений слабовата. Я думаю, не пойдешь ты ни в какое Жадруново. В конце концов, ты и сам не последнего разбора волк…</p><p class="p1">— Нет, Костя, — твердо сказал Волохов. — В моем случае каббала работает как милая. В Жадруново я пойду, это как пить дать. Даже, что называется, к бабке не ходи.</p><p class="p1">— За Женькой, значит?</p><p class="p1">— Разумеется. Или ты думаешь, что я, альтернативщик с двумя образованиями, поверю в твою дурость насчет предсказания? Не смеши людей, Костя. Что ты ее туда отправил — Бог тебе судья, у меня, сам знаешь, не лежит душа людей убивать. Но чтобы я еще и поверил, будто ты мир спасаешь…</p><p class="p1">— Не мир, не мир, что мне мир? Я свое спасаю. И тут уж верь, не верь — дело твое.</p><p class="p1">— А как ты его спасаешь? — спросил Волохов, усаживаясь напротив. — Это вот хождение по кругу — и есть вечная жизнь в твоем варианте? Спасибо большое, не надо нам такого бессмертия. Это кого же ты спасаешь — население свое коренное, которое, кроме как вечно гнить, ничего больше не умеет? Нет, Гуров, погоди. Мы с Женькой в Жадрунове такой новый мир построим, такого начинателя родим, что вся ваша шарашкина контора с ее круговыми циклами треснет по швам, одна вонь останется!</p><p class="p1">— Что, и забеременела уже? — оживился Гуров.</p><p class="p1">— Представляешь, да! Только ты-то ее уже не догонишь, слабо тебе в Жадруново сунуться.</p><p class="p1">— Может, и слабо, — согласился Гуров. — А зачем мне ее там догонять? Есть у нас еще дома дела.</p><p class="p1">— Какие? Сохранять режим попеременной оккупации? Сильный проект, ничего не скажешь. Я тебе, Костя, всю твою мифологию разложу в пять минут. Любое общество раскалывается на варяг и хазар, любое, в полпинка! Примеров тому — без счета, так было в каганате из-за Газы, в Штатах из-за Буша, во Франции из-за Алжира, и всякий раз у людей оставалось что-то более серьезное, чем эти разделения. Потому, Костя, что Бог создал примерно поровну сторонников личности и поклонников общности, и это, к сожалению, как мужиков с бабами — ровно столько, чтобы не пресекся род человеческий. Так вот, во всем мире у людей есть что-то, кроме этого отличия. И только у нас — ничего, потому что мы не нация. А не нация мы, Костя, по милости таких, как ты, жрецов-охранителей, охренителей, сплотившихся в едином строю, чтобы у страны не дай Бог не завелась история. Понял ты, кто такие ваши варяги с хазарами? Это все наши, местные, у которых ничего нету, кроме первичного признака. Воюют члены с дырками, а толку чуть.</p><p class="p1">— Думай как знаешь. Каждый верит, как ему удобнее.</p><p class="p1">— Да что уж тут удобного, — окончательно разошелся Волохов. — Ты думаешь, на твоей земле два поработителя в очередь действуют? Так они на любой земле есть, и везде их терпят. Варяги в родной Скандинавии отлично себя чувствуют и по всему миру селятся, хазары в тех же Штатах и по прочему миру ни с кем не конфликтуют, кроме соседей по дому… И всем хорошо, и все довольны! Знаешь ты, почему они здесь превратились в такое дерьмо? И те, и другие? А я тебе скажу! Это все мы, коренное население. Мы это сделали, потому что мы такие.</p><p class="p1">— Какие же? — спросил Гуров ровным голосом.</p><p class="p1">— Да вот такие! Виктимность это называется, жертвенность, как угодно. Те вас насилуют, эти насилуют… Если все вас каждый день насилуют, может, вы как-нибудь не так лежите?</p><p class="p1">— О да, конечно. Жертва всегда виновата. Что-то на тебя, Володя, пребывание в варяжской армии странно действует, — сказал Гуров злым тонким голосом, и Волохов понял, что попал в цель. — Может, тебя в хазарскую пристроить, для равновесия? Я вот и там, и там свой человек.</p><p class="p1">— Ага. Друг на друга натравливаешь, чтобы нами не занялись.</p><p class="p1">— Конечно. Целое искусство.</p><p class="p1">— Ну, тебе-то легко, ты у нас гений. В этом нашем населении, Гуров, так все сбалансировано — любо-дорого! Девяносто процентов ничего не могут и не хотят, а десять умеют все. Вот как мы с тобой. Элита. Понимаю, Гуров, понимаю. Очень хорошо вижу, почему тебе нравится такая жизнь. На фоне этого населения ты кум королю. Кругом васьки, вон уж и догнили почти, — а тут ты, весь в белом, инспектор седьмой ступени. Начнется история — кто ты будешь? Дерьмо будешь. А так — страж порога, почетный караул, высшая доблесть. Судьбами вон рулишь.</p><p class="p1">— Ты, Володя, водички бы попил, что ли, — примирительно сказал Гуров.</p><p class="p1">— Сам попей, освежает. Сделали себе вечность, а? Да ты понимаешь, Гуров, что все варяжские зверства, все хазарские хитрости — от этого самого твоего населения, про которое ты мне столько распинался?!</p><p class="p1">— Почему же моего? Нашего, Володя.</p><p class="p1">— Нашего, нашего, черт бы нас драл! Нигде в мире больше нет такого населения! Это оно, оно же само все сделало, посмотри ты на милость, ведь от него действительно начнешь либо зверствовать, либо по лесам бегать! Ничего не усваивают, ничего не понимают, глядят сквозь тебя, не интересуются ничем, не хотят ничего! Это ты любишь? Ради этого все затеяно? Оно само и вырастило на себе таких захватчиков, потому что его только обманывать или только дубасить! Другое бы или скинуло их к чертям собачьим, или я не знаю что!</p><p class="p1">— Договаривай, — сказал Гуров. — Или вымерло.</p><p class="p1">— Да уж все лучше было бы!</p><p class="p1">— Не уверен. Ай, не уверен. Ты, Володя, хоть и волхв, а о коренных населениях мало знаешь. Они, Володя, и так уж вымерли почти. Мало нас осталось, наше вот живо, не в последнюю очередь усилиями сторожей, миллион извинений, конечно. Коренные населения — особая раса, Вова; это раса доисторическая, в полном смысле, ибо истории у нас не было. Зачем нам история, Вова? Мы и так друг друга понимаем. Нам не надо лезть в начальники, волхвы, землевладельцы: мы ими, Вова, рождаемся. Все, за что прочие расы бьются, нам дано. Мы первое поколение земли, Володя. Певцы наши и странники, волхвы с их искусствами, лесоводы и лозоходцы с древним знанием — это давно, давно было, Володя. И почти ничего этого уже нет. Прочих истребили — я тебе рассказывал; выморила новая раса, народившаяся Бог весть откуда. Захватчики разные бывают. Почему они взялись — ну, тут не мне судить. Побочная ветвь, мутация. Агрессивные ребята, расплодились шибко, выживаемость высокая. У нас всего этого нет — мы мало что можем. Так, с землей иногда договориться, но в последнее время и земля не слушается. Мы знаешь почему выжили, Володя? Из всех коренных населений мира, индейцев, юкагиров, льянос, каско, майя, калигалов, бакаудов, торикасов, атлантов, цыган? Одни индусы остались, но тем уж очень с климатом повезло, и количество выручило… Лучше всех выжили мы, Вова, потому что такое уж нам выпало везение — два захватчика, по разные стороны. Это счастье наше, что они друг на друга так запали.</p><p class="p1">— И во что мы их превратили? — не сдавался Волохов. — Они же озверели тут с нами…</p><p class="p1">— Они совсем бы озверели, Володя. Они бы от нас человека живого не оставили, если б друг другом не занимались.</p><p class="p1">— Они и так озверели. Посмотри, что мы сделали с ними.</p><p class="p1">— Так и по заслугам, — ухмыльнулся Гуров. — Сами виноваты. На нас вины нет, Володя, тут не выбор наш — тут антропология. Не было у нас выхода, и не быть нам другими, хоть ты тресни. Оно, может, ты и прав — во всем прочем мире варяги с хазарами давно приличные люди, а у нас все завоеватели. Все никак завоевать не могут. Ну, так это наша миссия такая. Держали щит.</p><p class="p1">Волохов замолчал. Из него словно вынули скелет. Он сел на лавку, на которой еще так недавно, о Господи, лежала его Женька Долинская, ни в чем ни перед кем не виноватая, — и бессильно свесил руки между колен.</p><p class="p1">— Я все равно за ней пойду.</p><p class="p1">— Пойдешь, пойдешь. Думаешь, не пущу? Не буду я тебя останавливать, иди, пожалуйста…</p><p class="p1">— Но ее-то за что?! — не выдержал Волохов. — Что тебе баба сделала?!</p><p class="p1">— А кто ее звал сюда, твою бабу? — прищурившись, спросил Гуров. — Сбежала — там и жила бы… Нет, ЖД — ждущие дня! День настал, пора вернуть эту землю себе! Или, скажешь, она в гости приехала?</p><p class="p1">— Она приехала ко мне, — сказал Волохов.</p><p class="p1">— Ну да, ну да. И Эверштейн к тебе, проконсультироваться… И все они к тебе, повидаться…</p><p class="p1">— Ты мне вот что скажи, Гуров. Долго ты еще рассчитываешь за всеми местными бабами следить, как бы они варягу не дали? И за бабами хазарскими, чтобы с нами не спали?</p><p class="p1">— Следим покуда, — пожал плечами Гуров. — До сих пор получалось, глядишь, и дальше не пропадем…</p><p class="p1">— Не уверен. У меня такое чувство, что нельзя вечно бегать по кругу. Вагоны начнут отваливаться, колеса ржавеют…</p><p class="p1">— По крайней мере они ржавеют дольше, чем разваливается обреченный вагон первого класса, ездящий по прямой, — раздельно, как ребенку, объяснил Гуров. — Наше дело — подбрасывать щепки в костер: пусть они топчут друг друга и вообще живут как угодно — но пусть не прекращают отрицательной селекции и берут верх друг над другом. Потому что мы в это время продолжим единственно нам любезную жизнь вне истории, — при этих словах он потянулся и замурлыкал, как сытый кот.</p><p class="p1">— И тебе все это нравится? Вот это?! — Волохов обвел широким жестом шершавые мокрые стены убогой баньки. Одну стену он задел, и прочь побежала испуганная мокрица.</p><p class="p1">— Банька-то с пауками? — спросил Гуров, закуривая, и при свете зажигалки Волохов увидел, что инспектор ласково улыбается. — Ничего банька, других не хуже… Ты, майор, в Америке Латинской бывал? А я бывал, нашел случай. Там славная одна была цивилизация, вроде нашей. Так через нее за тысячу лет чуть не десяток волн прокатился. Половина уж и забыл, как называется. Такое место удобное — все норовили захватить, даже испанцы разделились и стали друг друга выгонять. Одни испанцы, другие креольцы. И знаешь, что с тамошними коренными теперь? Совершенно себя не помнят, вообще не знают, зачем живут. Каждый следующий надписи сбивает, богов уничтожает и язык перекраивает. Их же нету уже почти, Волохов. А у нас, скажу тебе, еще вполне приличный вариант. Вроде, знаешь, параллельного присоединения против последовательного. У них десять захватчиков подряд, а у нас всего двое по очереди. И население не успевает окончательно привыкнуть, и навыков лишних не надо. С этими научились, с теми приспособились — ну и все, и пожалуйста, меняйтесь, пока не надоест. А не надоест им никогда, потому что они друг без друга жить не могут. Мы их топливо, они наша крыша. Вечный двигатель это, понимаешь ты, Волохов? Я же рассказывал тебе, да ты не понял. Это не они нас, это мы их на себе разводим. Коренные населения — они тем и отличаются от захватчиков, Володя, что сопротивляться не умеют. Работать — да, сопротивляться — уволь. Так вот, чем десять волн через себя пропускать, мы, по-моему, ловко устроились — не находишь? И не дам я такой хороший перпетуум мобиле разрушать даже из-за самой рыжей девки, хорошо ли ты меня понял, майор?</p><p class="p1">— Хорошо, — сказал Волохов. — Куда уж лучше.</p><p class="p1">— Что, скажешь, неправда все?</p><p class="p1">— Почему, правда. Нравится младенцу в утробе, вот он и решил не рождаться.</p><p class="p1">— Дело, дело. Чего рождаться-то? Кто родился, тот и умер, а нам и тут неплохо. Можно прекрасными вещами заниматься. Пока твои так называемые нации медленно помирают, наша думает о главных вещах. Понемногу странствует. Сочиняет очень недурные стишки на родном языке. Поет песни. Хранит фольклор. Девушки замечательные, жрецы талантливые, земледельцы такие, каких ни в одной другой стране не осталось. Земля у них сама родит, яблоня плоды приносит, печка пироги печет. О чем ни попросишь, само делается. Вот скажу я баньке — банька, топись! — и затопится банька, слышь, Волохов? А скажешь ты — и тоже затопится, потому что коренное население. Вот скажи: топись, банька!</p><p class="p1">— Рухни, банька, — сказал Волохов.</p><p class="p1">— Дурак ты, — беззлобно отозвался Гуров. — Рухни — варяжское слово, она на этом языке не понимает. А вот «топись» — понимает.</p><p class="p1">Влажный жар медленно поднимался вокруг. Голова у Волохова закружилась.</p><p class="p1">— Что, попаримся, майор? — спросил Гуров. — Банька — она ведь чтобы париться, а не чтобы с захватчиками спать. Какого парку закажешь? Березового, облепихового, эвкалиптового?</p><p class="p1">— Серного, — сказал Волохов и выскочил наружу. В бане становилось жарко, он еле выдерживал липкий, обволакивающий пар. Из белого облака, которым окуталась баня, доносилось довольное, заливистое похохатывание Гурова.</p><p class="p1">До своих Волохов бежал опрометью, словно от погони. Он поднял отряд на рассвете, в шестом часу утра.</p><p class="p1">— Подъем! — закричал он. — Выступаем немедленно. Десять минут на оправку, пять на перекур, и вперед.</p><p class="p1">Серое, сырое пространство расстилалось вокруг него. Ближе к утру пошел мелкий дождь, он смутно сеялся на серые избы и старые заборы, и все вокруг было так невыносимо второсортно, так безысходно кисло, что сама мысль о бесконечной — сколько там еще до конца? — жизни без Женьки наводила смертную тоску. Если это не желает кончаться, мы кончимся сами. Даже птицы, кажется, собрались жить вечно и косились на Волохова презрительно. Ну да, говорило все вокруг, мы и это переживем, и очень отлично. Хорошо же, подумал Волохов, приятно вам покачаться на ваших вечных качелях. Одна приличная баба почтила собой это протухшее пространство, и ту оно попыталось сожрать — хорошо, посмотрим, посмотрим.</p><p class="p1">— Куда мы, командир? — несмело спросила медсестра Анюта на правах женщины, которой дозволялось любопытство.</p><p class="p1">— Есть такая деревня — Жадруново, — сказал Волохов. — Все пойдем туда.</p></span></span></span></span>
