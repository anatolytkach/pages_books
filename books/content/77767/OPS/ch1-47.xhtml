<span><span><span><span><span id="id63"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Бороздин готов был застать полный разгром, выломанную дверь, а то и труп, чем черт не шутит, — но дверь была заперта; на первый же звонок отозвался испуганный Григорий.</p><p class="p1">— Да?</p><p class="p1">— Откройте, свои.</p><p class="p1">Григорий приоткрыл дверь.</p><p class="p1">— Вы один?</p><p class="p1">— С телохранителем.</p><p class="p1">— Входите.</p><p class="p1">— Аша где?</p><p class="p1">— Здесь, в кухне.</p><p class="p1">— Чего вы без света сидите?</p><p class="p1">— Была мне охота лишний раз светиться… Я весь день боюсь, что за ней придут. В местных новостях объявили приметы. Я вашу машину услышал, потому и отозвался.</p><p class="p1">— Почему приметы? Что сказали?</p><p class="p1">— Сказали, по подозрению в покушении на губернатора.</p><p class="p1">— На меня?</p><p class="p1">— А что, вы уже не губернатор — после поездки? Разжаловали?</p><p class="p1">— Попробовали бы они, — сказал Бороздин, хотя и без особенной уверенности.</p><p class="p1">Они прошли в кухню. Аша сидела у стола на шаткой табуретке, уронив руки. Весь ее вид выражал тупую, странную покорность — губернатор никогда не видел ее такой.</p><p class="p1">— Сняли? — спросила она тихо.</p><p class="p1">— Да почему сняли, так, вызывали по рутинным вопросам…</p><p class="p1">— Ты не ври про рутинные. Они тебя вызывали, чтобы без тебя меня тут… Ты другое скажи: куда думаешь деть меня? Меня теперь быстро надо отправлять отсюда, они все приметы сообщили.</p><p class="p1">— Где жена? — спросил Бороздин у Григория.</p><p class="p1">— Жену я отослал. Нечего местным про это знать. Я так понимаю, что на нее зуб не только у ваших, но и ее собственной родни. Так? — обратился он к Аше. Она молча кивнула.</p><p class="p1">— Слушай, — Бороздин не выдержал и сел на пол, прислонившись спиной к древнему холодильнику. — Скажи ты мне русским языком: чем ты им так мешаешь?</p><p class="p1">— Им не я мешаю, — устало сказала Аша. — Им дитя мешает.</p><p class="p1">— Что такого сделает это дитя?</p><p class="p1">— Никто не знает этого. Пророчество есть. Если древнего северного рода начальник спознается с девушкой древнего рода волков, плод их погубит весь мир, разорвет круг, и начнется то, чего еще не было. Или если южного рода дева полюбит мужчину из волков, то же самое будет. Этим, кто пришел, — захватчикам, — все у нас можно, одно нельзя. Нам нельзя, чтобы мы их любили. Владеть — пусть владеют, а тяжелеть нам от них нельзя. Волкам нельзя с захватчиками. Если от них родится что, то от этого человека выйдет начало. Это у вас говорят — конец, у нас нет такого слова. У нас говорят: начнется начало. Тогда никакой нашей жизни не будет. Чтобы начала не допустить, мы всю жизнь настороже. А вот не устерегли. Я же не знала, какого ты рода. Да я и не думала, какого ты рода. Любила я тебя очень, и теперь люблю, — говорила она спокойно, но у губернатора по коже побежали мурашки.</p><p class="p1">— Аша! Когда, в какие времена власть руководствовалась пророчествами?!</p><p class="p1">— Во все времена, — тихо заметил Григорий. — В Риме гадали по внутренностям, чем вы лучше Рима? И в пророчестве этом, кстати, глубокий смысл. Как только местное начальство полюбит свой народ, вся эта канитель кончится и начнется нечто совсем другое, только никто из этого начальства уже не уцелеет. Им же не надо, чтобы что-то начиналось, — понимаете? Их устраивает эта вечная русская жизнь, какая она есть. А от вас может что-то такое родиться. Я в это верю вполне. Вы же славный малый, губернатор. Приличия знаете. Вам не место на госслужбе, я вам еще когда говорил. Вам одного не хватает — немного самодостаточности, этого, знаете, доверия к судьбе… Так у вашей пассии этого хоть отбавляй. Короче, от вашего союза вполне может получиться человек, с которого здесь начнется нормальная жизнь. Если, конечно, вы спасетесь — в чем я крепко сомневаюсь. У меня вам оставаться нельзя, я не святой. Если вас у меня найдут, мне выйдет полное начало. На меня кое-что есть, вы знаете.</p><p class="p1">— Ладно, ладно, — поморщился губернатор. — Пока еще я первый человек в крае.</p><p class="p1">— Это вам так кажется, — сказал Григорий. — На самом деле МВД вам никогда не подчинялось, вот они и есть тут первые люди. А вы — так, витрина московская. Вы отлично знали, что менты грабили губернаторов и драли их, как сидоровых коз, за любую провинность. Вы думали, что вы человек государственный и так надо. А теперь это государство хочет вытравить вашего ребенка и убить вашу женщину, потому что ему страшный сон приснился в ночь на пятницу. И вы как человек государственный должны этому способствовать, нес па? За это у вас будет возможность и дальше насаждать тут науки, открывать школы и ездить ко мне отводить душу в разговорах. Не хотел бы я быть на вашем месте, губернатор, и никогда не буду, слава тебе Господи.</p><p class="p1">У губернатора заиграл мобильник. Номер не обозначился.</p><p class="p1">— Алексей Петрович, — сказал осторожный голос Мстиславского, — у меня есть подозрение, что вам надо уходить, и быстро. Мои ребята слышали, как ваш камердинер вас закладывал. Вы, может, не знаете, но Никита — человек Хрюничева, его не просто так к вам подставили. Короче, Никита доложил, что вы поехали за Ашей. Если за вами не было хвоста, они вас найдут не сразу, но так или иначе следовало бы уходить. Или по крайней мере поместить ее в безопасное…</p><p class="p1">— Костя, — перебил его губернатор, — откуда вы говорите?</p><p class="p1">— Я говорю из автомата, тут не слушается. Но скоро они начнут слушать все. Город у нас маленький. Я не знаю, где вы сейчас, и вы не вздумайте говорить…</p><p class="p1">— Не дурак, знаю. («Вдруг именно он подкуплен и начнет выманивать меня туда, где уже ждет эта свинья со своими мордоворотами?»).</p><p class="p1">— Я бы вам посоветовал уходить на Захаровку, но вы там, кажется, выставили облаву на дезертиров. Лучше бы всего брать Васильича, он ваш без глупостей, и гнать с ним куда угодно, если есть надежное место. У меня, к сожалению, нет. Учтите, что спрятать ее у своих не получится…</p><p class="p1">— Черт возьми! — шепотом крикнул Бороздин. — Вы-то откуда знаете?</p><p class="p1">— Туземцы с утра по всему городу рыщут. У них оказалась приличная самоорганизация, мы-то и не знали. Они бы так работали, как ее ищут… В общем, мое дело вам сказать, а там как знаете. Тут у вас, кстати, факс пришел от Тарабарова с запросом — вы ему какое-то подтверждение должны…</p><p class="p1">— …в рот я ему должен! — просто сказал губернатор. — Спасибо, Костя, жив буду — не забуду.</p><p class="p1">— Облава? — спросил догадавшийся Григорий.</p><p class="p1">— Не без того. Обложили немного. Черт с ними. — Бороздин выглянул в окно: его машина была на месте; машину знали, в городе ее обнаружить нетрудно. Он набрал номер Васильича.</p><p class="p1">— Да?</p><p class="p1">— Васильич, быстро гони в резиденцию, — сказал губернатор. — Будут спрашивать, куда ездили, — скажешь, на ж/д строительство.</p><p class="p1">— Не дурак, — понятливо отозвался Васильич.</p><p class="p1">— Ну, спасибо. Я завтра вернусь.</p><p class="p1">— С Богом.</p><p class="p1">Во дворе раздался рев машины — машина у губернатора была громкая, БМВ.</p><p class="p1">— И что вы думаете делать? — поинтересовался Григорий.</p><p class="p1">— Я думаю прежде всего вызвать такси, — сказал губернатор, — и ехать до границы области. Там я думаю сесть в поезд и везти Ашу в Дегунино, это трое суток, Мстиславский порулит без меня.</p><p class="p1">В этот момент он рассуждал, конечно, не как государственный человек. Впрочем, он рассуждал и не как любовник, поскольку любовь к Аше была в этот миг ни при чем. Дело было в нем самом, в оскорбленном государственном чувстве. Он принес на алтарь своего дела все, что у него было. Он готов был служить на любом посту, куда бы его ни бросили. Двадцать лет его безупречной службы в разных качествах и на разных должностях были перечеркнуты разом, в один день, из-за того, что он отказался прислушиваться к дурацкому суеверию. Ну а что такого, спросил ненавистный внутренний голос, чем ты недоволен? Разве не из-за таких же идиотских суеверий вроде недостаточного почтения к куску тряпки или набору бездарных рифм люди шли на каторгу, а то и на виселицу? Разве не такими же суевериями ты упивался, называя их прекрасной бессмыслицей? Разве не спорил ты с либеральной сволочью, утверждавшей, что государство — большая жилконтора или прачечная? Разве не доказывал ты, что государство — наместник небесной Родины на земле? Получи, хлебай полной ложкой: если государство, как ты полагал, живет великими мифами, — вот тебе один из них, древнее пророчество; принести в жертву ты должен свою женщину и своего ребенка. Черт с ней, с этой женщиной, — в конце концов, ты всегда считал ее своей слабостью. О ребенке ты пока ничего не знаешь, он пока зародыш и человеком станет через пять месяцев, если до того его не выбьют из матери сапогами. Дело в принципе: тебя, кажется, что-то не устраивает? Может быть, тебя смущает свиноподобность Хрюничева? Ну, а если бы на его месте был вестернизированный красавец вроде тебя, подтянутый и безупречно одетый, с хобби поблагороднее охоты и рыболовства? Не ты ли утверждал, что в истории и государстве роль личности ничтожна, а уж внешний вид личности подавно не имеет никакого значения? Один объект государственной воли должен сдать мучителям другой объект государственной воли, причем о причинах спрашивать западло: государственная необходимость, обладая ветхозаветным величием, не снисходит до мотивировок. Тем, кого ты сек, тоже, вероятно, казалось, что делать это не обязательно. Заткнись, сказал он себе. Любой обиженный немедленно начинает проповедовать свободу, понимаемую как отказ от любой ценности. Я не дам допустить сюда свободу, я не допущу ее даже в свое сознание. Я ненавижу этот ЖДовский фантом, нужный ЖДам только для того, чтобы искоренить уже всякую память о свободе как таковой. Два главных врага человека — свобода и простота. Я не дам ничего упростить, не дам отменить ни одного ритуала, ни на секунду не ослаблю самодисциплины, ибо свобода начинает с того, что упраздняет порядок, чтобы на место его водрузить произвол. Я государственник и умру государственником, но мое государство вечно перехлестывает, плодя врагов. Я никогда не плодил врагов — и не дам этого делать моему государству. Я не стану его врагом. Я дам ему время разобраться в приступе безумия, а потом все пойдет по-прежнему. Я еще губернатор.</p><p class="p1">Заиграл мобильный. Его вызывала Москва.</p><p class="p1">— Я вас слушаю, Алексей Петров, — сказал в трубке сиплый голос Тарабарова.</p><p class="p1">— Это я вас слушаю, Николай Филиппович.</p><p class="p1">— Нет, Алексей Петров, это ты мне должен сказать, как ты выполнил директиву. Время отчетное, сам должен помнить.</p><p class="p1">— Я выполнил директиву, — ровно сказал Бороздин.</p><p class="p1">— Каким образом, Алексей Петров?</p><p class="p1">— Я отвез девушку к ее родне и больше с нею видеться не намерен.</p><p class="p1">— В уши-то мне не ссы, Алексей Петров! — прикрикнул Тарабаров. — Думаешь, у ее родни поста не поставили? Я тебе что сказал, Алексей Петров?! Государева служба — это цицю сосать, ты думаешь? Ты цицю хочешь сосать? Я на тебя возлагаю в двадцать четыре часа…</p><p class="p1">— Это я на вас возлагаю, Николай Филиппов, — сказал Бороздин. — Не тяжело вам там, нет? С большим прибором возлагаю. Пошел на хуй, рожа красная.</p><p class="p1">При этих словах порыв мокрого ветра распахнул форточку и ворвался в окно.</p><p class="p1">— Никогда при мне это слово не говори, — раздельно произнесла Аша. — У него при мне сила есть.</p><p class="p1">Губернатор представил, как западный ветер хуй в эту самую секунду налетел на Тарабарова и опрокинул его вместе с креслом. Ему стало весело.</p><p class="p1">— Ладно, надо собираться. Спасибо, Гриша.</p><p class="p1">— И куда вы сейчас? — спросил Григорий.</p><p class="p1">— Да есть куда, — вдруг ответила Аша. — Я знаю тут дороги, выйдем. На краю города машину возьмем, деньги у меня припрятаны. Я все припрятывала, что ты давал. Там на попутной доедем до другого города, где не ищут пока. В электричку сядем да в Дегунино поедем. Я все деревни тут знаю, знаю, где волки, где так себе люди. К волкам нам нельзя, но до Дегунина и они не тронут. А так себе люди везде мне приют окажут. Слово я такое знаю. Пойдем, губернатор, а то, неровен час, и сюда сейчас припожалуют…</p><p class="p1">Они спустились по темной лестнице. Дождь перестал, и крупные мохнатые звезды показались в тучах, как заплаканные глаза между слипшимися ресницами.</p><p class="p1">— Вот ты и бегаешь, как заяц, государев человек, — сказала ему Аша. — И все твое государство.</p><p class="p1">— Подожди, недолго мне бегать, — сказал Бороздин.</p><p class="p1">— И то, недолго. Хорошо еще, если добежим. Ладно, пошли.</p><p class="p1">Она долго вела его темными дворами, среди каких-то ям, рытвин, канав, брошенных тряпок, мотков проволоки, свалок… Много, слишком много было земли. Ее не обрабатывали, она замусоривалась, на ней рос бурьян, ее рыли и уродовали, начинали прокладывать дороги и бросали, строили дома и недостраивали. Губернатор никогда еще не ходил по окраинам. Его пронзила внезапная мысль о том, что именно среди этих еле освещенных халуп, на свалках, в ямах и колодцах, где живут васьки или прячут трупы, ему придется теперь ночевать. Запах мокрой земли мешался со смрадом помоек. Все раскисало, разлелось, пузырилось, и ничему больше он не был хозяин.</p><p class="p1">— Долго нам идти? — спросил он.</p><p class="p1">— Долго, кружной путь. Много у тебя денег с собой?</p><p class="p1">— На карточке хватает. Карточка с собой.</p><p class="p1">— Надо будет снять. Заблокируют они тебе.</p><p class="p1">— Хорошо, в городе снимем.</p><p class="p1">— Ты не робей, — сказала она вдруг. — До Дегунина довезу, а там, глядишь, все получится. Этот ребенок, что во мне, — он ребенок не простой. Большую силу мне дает, кстати. Я до него помнишь какая слабая была? Ветром шатало. А теперь дойду. До Дегунина дойду, и до гор дойду. И тебя доведу, куда скажешь. Ты потом сюда вернешься, тебя наши любят. А твои простят, у них мало таких, умных-то.</p><p class="p1">— Видно будет, — сказал Бороздин.</p><p class="p1">— Нам бы до электрички добраться, — сказала она. — Где железная дорога, я проживу.</p></span><span id="id64"><div class="title5">
<p class="p">3</p>
</div><p class="p1">В соседнем городе он снял с карточки все деньги, и вовремя: когда два часа спустя, на вокзале, решил проверить, заблокировали ли счет, — доступа к нему и впрямь не оказалось. Деньги Аша заботливо рассовала по его и своим карманам; он думал, что после бессонной ночи и пяти часов в тряском междугородном автобусе она будет чуть жива, — но она словно крепла с каждым шагом, и состояние бездомности было для нее самым естественным. И то сказать, она не радовалась, когда он ввел ее в свои хоромы, — с чего ей было огорчаться, когда всего этого больше не было? Оно ведь было чужое, не свое.</p><p class="p1">— Мы давно так привыкли, — сказала она, угадав его мысли. — У нас своего, почитай, и нет ничего. На своей земле, как на чужой. Странствие — самое наше дело. Васьки тоже все странствуют, их за это святыми людьми зовут. Они потому и странствуют, что мир этим спасают.</p><p class="p1">— Как спасают? — машинально спросил Бороздин.</p><p class="p1">— А чтобы начало не началось. Они по кругу ходят, вот и спасают. Может, весь мир на них держится.</p><p class="p1">— Почему?</p><p class="p1">— Должность такая, кружиться. Вы их васьками называете, а у нас они соколы. Сокол — он окол ходит, круг рисует. Они кружатся, а кольцо ими держится. Теперь-то можно и тебе знать, — добавила она снисходительно, — теперь ты сам вроде как без дома, без дела. Немного — и сокол станешь.</p><p class="p1">— А волк?</p><p class="p1">— Волком родиться надо, — обиделась она.</p><p class="p1">— И что, васьки у вас — святые?</p><p class="p1">— Святые. Святей — только те, что дорогу строят.</p><p class="p1">— Какую дорогу? — не понял Бороздин.</p><p class="p1">— Разную. Раньше такую топтали, теперь железную делают. Железную дорогу строить — это самое святое дело.</p><p class="p1">— Это зачем? — не понял он.</p><p class="p1">— Это еще не время. Будет пора — тогда расскажу.</p><p class="p1">Она рассказывала ему это, как раз когда они подходили к вокзалу. На вокзале в этот день отчего-то проводилась спецоперация по отлову васек, так что Бороздину с Ашей, можно сказать, повезло. Сам Бороздин в бытность губернатором, случалось, несколько раз санкционировал прямые отловы — в особенности когда дело касалось васят, развозимых по приютам, — но особенно старался не зверствовать: в конце концов, от васек не было особого вреда, а что такое распределители, он знал, ездил в показательный московский васятник, когда для губернаторов сделали экскурсию под руководством все того же Тарабарова. Прежде чем они попадали в васятники, их подолгу морили в обезьянниках, досматривали, выясняли обстоятельства, а проще сказать — выбивали из них сведения; половина васек никаких сведений не помнила, и за это их били снова, уже без всякого смысла. Если бы по страшной, невообразимой немилости судьбы губернатору выпала бы судьба работать в обезьяннике или васеприемнике, он бы, вероятно, тоже бил васек. Хуже такой участи была только участь самого васьки.</p><p class="p1">Решительную зачистку сулили ежегодно, но до нее как-то не доходили руки, да и иностранцы к нам почти уже не ездили — для кого было стараться? Впрочем, то, что происходило теперь на вокзале, по жестокости и масштабности было очень похоже на окончательное решение васятского вопроса. Васек вытаскивали из всех углов, где они обычно ютились, сапогами гнали в открытые грузовики, а кто не шел — тащили волоком; на вокзале густо пахло бомжом. Публика смотрела с явным одобрением, лишь немногие в ужасе отворачивались, кто-то пытался объясняться с милицией — милиция никого не слушала. Большая часть васек шла в машины покорно, тупо, с тем вечным неопределенно-несчастным выражением лица, с которым они скитались по своим темным маршрутам; лица у всех были темно-желтые, опухшие, клочья волос на головах — свалявшиеся, как шерсть в старой куртке; почти у всех непременно была в одежде какая-то красная деталь — некогда красная, точней сказать, ибо на васьках вся одежда была одного бурого цвета; несмотря на лето, многие были в вытертых кацавейках. Некоторые из них сопротивлялись, но молча; только одна машка, в которой от женщины был только пронзительно-визгливый голос, цеплялась за все фонарные столбы и умоляюще орала менту:</p><p class="p1">— Зая! Зая! Зая!</p><p class="p1">Мент продолжал тащить ее к машине, потом ему надоело ее беспомощное сопротивление, и он одним движением зашвырнул ее в грузовик; она пролетела, кажется, метра три. Как только она плюхнулась в машину, на другие дряблые тела, визг тотчас прекратился. В суматохе отлова губернатор и Аша, оба прилично одетые, даже не без некоторого лоска, спокойно прошли к поезду, идущему на Барнаул.</p><p class="p1">— И ты скажешь — это ваши святые?! — не выдержал губернатор.</p><p class="p1">— Молчи, — сказала Аша. Губернатор видел, что она до крови прикусила губу.</p><p class="p1">— Что с тобой?</p><p class="p1">— Одного слова… одного слова моего хватило бы — отпустить их всех, — сказала она. — Я бы ментам сказала, и все. Твоим когда говорила, всегда отпускали.</p><p class="p1">— А ты говорила? Не знал.</p><p class="p1">— Не все тебе знать.</p><p class="p1">— Что за слово?</p><p class="p1">— Нельзя мне сейчас, сам знаешь. Да и не примут они теперь ничего от меня.</p><p class="p1">Она оглянулась. Грузовик уже заводился, васек увозили — но некоторые из них стояли у борта и смотрели вслед губернатору и Аше со странным, сосредоточенным вниманием.</p><p class="p1">— Узнали, — просто сказала Аша. — Меня что ж не узнать. Наше радио работает. Не бойся, не скажут никому.</p><p class="p1">— Куда их? — спросил губернатор, словно не он, а она должна была это знать.</p><p class="p1">— Откуда я знаю. Это твоим видней. Не слыхал вчера в Москве, зачистку делают или так?</p><p class="p1">— Не слыхал, — признался губернатор, поражаясь тому, что еще вчера его официально встречали во Внукове-2. Если честно, он был втайне рад тому, что хотя бы к этой зачистке непричастен — и если она действительно началась, и окажется вдобавок тотальной, то на нем не будет хотя бы этой вины. Он, конечно, и так не мог отвечать за многие художества центра, — но, если честно, слегка тяготился ими. В повадках ментов во время этой акции было что-то особо решительное — вряд ли после такого повезут в обезьянники; дело пахло чем-то похуже — хотя что может пахнуть хуже обезьянника?</p><p class="p1">Они сели в зеленый грязный поезд, шедший на Барнаул; билетов не взяли — сунули денег проводнику. Брать билеты было опасно: кассиры спрашивали документы. Правда, в городе на них пока не оглядывались — видимо, розыск еще не начался или шел плохо, как и все тут в последнее время. Слава Богу, подумал губернатор. Я просто не подумал, что в выродившейся стране и репрессии вырождаются, нам на радость. Впрочем, расслабляться не следовало. Мобильник он отключил, отправив на всякий случай эсемеску Калядину — «Нуждаюсь в помощи, напиши, если сможешь», — и получив естественный для государственного человека ответ: «Ничем не смогу». Хорошо, подумал Бороздин, на его месте я поступил бы так же. Когда вся эта ситуация распутается и Тарабаров ответит за самоуправство, а Хрюничева сошлют из Сибири в Сибирь, — я позвоню Калядину и кое-что расскажу ему, и он, возможно, поймет.</p><p class="p1">В конце перрона показался милиционер. Он вальяжно шел вдоль поезда, заглядывая в окна. Аша побледнела. Губернатор сидел против хода поезда и не видел милиционера — видел только Ашу и по выражению ее лица обо всем догадался. Он оглянулся: мент был уже близко, вагонах в пяти от них.</p><p class="p1">— Даждь-бог, Даждь-бог, — повторяла Аша, еле шевеля губами; он скорее угадал, чем услышал.</p><p class="p1">— Он не успеет, — сказал Бороздин, имея в виду мента. Поезд уже скрежетнул, готовясь тронуться.</p><p class="p1">— Даждь-бог, — лепетала Аша.</p><p class="p1">Поезд, однако, все не тронулся, а мент был все ближе; можно было перейти в следующий вагон, можно сбежать назад — в тот, мимо которого он уже прошел… В руках у мента уже был виден листок с фотороботом.</p><p class="p1">— Не одна в поле дороженька, — пронзительно выкрикнула Аша, и мент остановился.</p><p class="p1">Бороздин уставился на нее в недоумении.</p><p class="p1">— Не одна ненаглядная, — быстро заговорила Аша. Мент остановился и посмотрел вокруг.</p><p class="p1"><em>— Не одна в поле дороженька,</em></p><p class="p1"><em>Не одна безлошадная.</em></p><p class="p1">Мент постоял в задумчивости, выбросил листок и пошел вдоль поезда обратно. В ту же секунду колеса опять заскрежетали, и состав медленно тронулся в путь.</p><p class="p1">Аша улыбнулась гордо и открыто — он давно не видел у нее такой улыбки.</p><p class="p1">— С волками жить — по-волчьи выть, — сказал губернатор.</p><p class="p1">— И то правда, — ответила она. — Погоди, завоешь. Выть по-нашему — петь.</p><p class="p1">— А петь — что?</p><p class="p1">— А петь — ничего, имя такое. Петь, а петь, дай посмотреть!</p><p class="p1">Она засмеялась, и он неуверенно улыбнулся в ответ.</p><p class="p1">За окном потянулись гаражи, заборы, исписанные заклятьями, и заросшие сухим бурьяном пустыри.</p><p class="p1"><em>— Не одна в поле дороженька, — пела Аша, —</em></p><p class="p1"><em>Не одна безотрадная,</em></p><p class="p1"><em>Не одна в поле дороженька,</em></p><p class="p1"><em>Не одна беспощадная…</em></p></span></span></span></span></span>
