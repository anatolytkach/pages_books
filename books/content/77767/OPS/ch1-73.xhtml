<span><span><span id="id101"><div class="title5">
<p class="p">Глава седьмая. Ворота</p>
</div><span id="id102"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Особенность сильной любви — способность влюбленных общаться на расстоянии, жить как бы в едином ритме или, музыкальнее говоря, в общей тональности. Им снятся одинаковые сны, они задают друг другу вопросы и получают ответы, и даже болезни у них, как правило, общие — причем это вовсе не те болезни, которые приключаются от любви. Женька шла от станции Жадруново в сторону деревни, и как-то пространство вокруг нее начинало искажаться. Кроме нее и сопровождения, в Жадрунове никто не сходил, и прочие пассажиры посмотрели на нее как-то странно; и поезд остановился всего на полминуты, и унесся, словно старался поскорее проехать это гиблое место. А место было самое обыкновенное, даже красивое.</p><p class="p1">Она сама не очень понимала, что происходит. Голова не кружилась, а, так сказать, подкруживалась, смещается все градусов на пятнадцать — и обратно. Отдельные люди видели фильм такого Уира «Пикник у висячей скалы» и знают, что речь там идет о трех таинственно исчезнувших девушках из австралийской школы. Случай подлинный, 1900 год, День святого Валентина. Частная школа поехала в горы, девушки отошли от толпы одноклассниц и вдруг пропали. Такое вообще бывает. В фильме очень здорово это сделано: там они все дальше идут по жаркой австралийской горе, среди буйно цветущих лугов (в горах вся растительность крупнее обыкновенной, и бабочки толще), — но вдруг их начинает морить и томить что-то вроде дремы. Разговоры их становятся все медлительнее, реплики — прерывистее; им так хорошо, что уже почти плохо. Еще птица какая-то клекочет, причем птицы не видно. При этом пропорции начинают меняться, воздух зыблется, контуры плывут — то ли девочки так видят друг друга сквозь дрему, то ли они вошли в искривленное пространство, совершенно другое, в котором уже никто никого не найдет. Иногда можно как-то удержаться в нашем, обычном пространстве — если, например, в это время мимо проходит человек, который тебя узнает и окликнет, или ты будешь думать о чем-нибудь будничном, очень целенаправленно, сосредоточенно держаться за эту мысль, крепко, крепко цепляться за нее, о чем-нибудь простом, вроде школы; но иногда и это не срабатывает, и тогда тебя усасывает туда, откуда нет возврата. Ничего подобного, конечно, не бывает. Мы будем гнать эту мысль. Но, наверное, что-то случилось с Володей, иначе почему же мне так трудно идти и я чувствую такое странное голово, во, вокружение, некоторые сбои дыхания, медленное поворачивание плоского горизонта вокруг своей, ей, оси, си.</p><p class="p1">Что-то с Женькой, думал Волохов, что-то совершенно непоправимое, но при этом, странное дело, не фатальное, не окончательное. Я понимаю, что она туда доехала, но не понимаю, что там с ней. Тут вещь какая: когда я был, в бытность мою, в мою бытность, надо как-то уцепиться за слова, иначе я тоже поплыву, в мою бытность в состоянии любви с ней еще пять лет тому назад я не мог так чувствовать ее, потому что между нами было, во-первых, гораздо большее расстояние, а во-вторых, мы виделись очень редко. Теперь же я почти месяц в течение каждой ночи ощущал ее рядом, связь наша стала физической, она тоже может ослабнуть, но не ослабнет, я сделаю так, что этого не будет, я дойду туда, где она. Он избегал слова «Жадруново», физически чувствуя, как с каждым его произнесением из него уходит немного жизни, изни, зни. Волохова крутило, тошнило и качало. Главное же — он понимал, что Женька проходит некую границу, и надо бы ее остановить, но с другой стороны, она ее все равно пройдет, ей деваться некуда. Он, однако, может сделать так, чтобы прохождение этой границы было ей немного облегчено. Все-таки действие происходит в его стране. Но вот что удивительно: он не чувствовал страха. Он понимал, что сейчас будет непонятное, но понимал и то, что понятное, среди которого он прожил последние тридцать пять лет, уже пугает его гораздо больше, чем ощущаемая теперь новизна.</p><p class="p1">Женька между тем шла по жаркому цветущему лугу, чуть впереди следующего за нею гурионовского отряда из пяти человек — отряда, как она знала, совершенно бесполезного. Стрекотали кузнечики, пахло медом и сухой почвой. Почему-то на горизонте виднелась коричневая мартовская земля с пятнами снега, и даже доносило оттуда весенний запах земли, навоза и талой воды, ах нет, показалось, ничего подобного. Откуда снег? Не может быть никакого снега. Признаков мятежного гарнизона также не наблюдалось. Женька шла, словно сквозь плотную теплую воду: между движением и образом движения был легкий зазор, как бывает, когда накуришься марь-иванны. Гурионовское сопровождение шло позади, несколько замедляя шаг; они отставали все заметнее. Женька оглядывалась и видела их, рощу позади, линию электропередачи, провода над железной дорогой. Все это немножко уже размывалось, но было пока отчетливо. Жаркий жадруновский воздух дрожал вокруг.</p><p class="p1">Посреди ровного звенящего и тикающего луга стояли ворота, похожие на футбольные: два глубоко врытых, гладко обтесанных столба, белых, как сухие кости, и коричневая поперечина над ними. Тропа шла прямиком к воротам, хоть обойти их было несложно — рядом не было ни забора, ни иной преграды. Женька решила обойти ворота слева. Ей показалось почему-то, что она не сможет соступить с тропы, — но она смогла, и ничего не произошло. Никто не мешал ей. Мяч пересекает линию ворот. В детстве она любила с отцом смотреть футбол. Потом они с матерью уехали в Каганат, а отец остался. Она прошла рядом с воротами, успев разглядеть, какие они шершавые даже на вид. Гол.</p><p class="p1">Она оглянулась. Гурионовские стояли в ряд, ровной шеренгой, типа отдавая последний долг. Они смотрели виновато и сочувственно. Гурион еще в Грачеве сказал им идти до ворот, так что они уже знали — ворота будут.</p><p class="p1">— Что же вы? — спросила Женька, но они смотрели все так же виновато.</p><p class="p1">— За мной, — сказала она, откладывая крик на потом как последний резерв: если не послушаются, она заорет, если не послушаются и тогда, выстрелит в воздух, а что потом с ними делать, она не знала.</p><p class="p1">Они молчали, не двигаясь с места. Потом повернулись и медленно пошли к станции. Женька вдруг заметила что-то не то, что-то странное, чего не было. Станции она больше не видела. И линии электропередач там, за рощей, тоже не было. Куда-то она делась за это время. Там начало все пропадать. Наверное, бывает такая местность, где все исчезает само. Она слышала такие местные легенды. Правда, названия деревни никто не знал. Ну, у каждого народа своя легенда о заколдованном месте. Но вот как наказывается трусость! Она прошла за ворота, и ничего с ней не было, а они повернули вспять, и теперь неизвестно, что с ними будет.</p><p class="p1">— Вернитесь! — закричала она. — Пропадете!</p><p class="p1">Они не оглядывались, словно не слышали. А может, и вправду не слышали.</p><p class="p1">Женька расстегнула кобуру, вынула пистолет и выстрелила в воздух. Никто не обернулся. Да и звук выстрела был, прямо скажем, так себе. Пукнуло что-то, словно шампанское открыли. Скромный салют по случаю перехода в новое состояние.</p><p class="p1">Она стремительно шагнула к воротам, думая, что тайная сила остановит ее хоть на этот раз, но тайная сила не снисходила до столь буквальных кинематографических проявлений. Женька легко вернулась за жадруновские ворота, только никакого гурионовского отряда впереди уже не было. Странная местность, трусоватые солдатики не заживались в этой местности. Они бледнели, бледнели и пропали совсем. Ничего не сделалось только роще вдали, и полю, и полевым цветам. Природа — она и есть природа.</p><p class="p1">Делать было нечего, нечего в таком буквальном и очевидном смысле, что на короткий миг ЖДовский комиссар Женька Горянская ощутила смертную тоску. Но она никогда не позволяла себе расслабляться, а потому решительно шагнула за ворота уже вторично. Надо было идти в Жадруново и в одиночку усмирять мятежный гарнизон. Странное дело, куда все-таки подевалось это дезертирское сопровождение.</p><p class="p1">Дезертирское сопровождение стояло перед воротами и в ужасе смотрело, как за воротами тает силуэт комиссарши. Когда ее стало совсем не видно, они переглянулись и, обливаясь потом, побрели к станции. Им было стыдно, но под стыдом билась жаркая, стыдная радость, знакомая всякому солдату, мимо которого только что просвистело и вот в очередной раз не задело.</p></span></span></span></span>
