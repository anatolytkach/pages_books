<p class="p">3</p>
</div><p class="p1">Ресторан «Циля Целенькая» располагался неподалеку от автовокзала. Громов допускал, что цены в Блатске страшные, но до четырех в самом деле надо было себя куда-то деть: честно говоря, он боялся ходить по городу. Здесь было пространство нечеловеческой логики, в которой ему, с его прямолинейными представлениями, нечего было делать: они с Вороновым запросто могли угодить в ловушку, и даже сказочная способность Воронова выкручиваться никого бы не спасла. В городе на каждом углу шла игра, девки заманивали прохожих в притоны, в любой подворотне кого-то резали — Блатск, казалось Громову, управлялся тысячей сложных законов, прописанных в блатном кодексе, а в этом кодексе он ничего не петрил. Если бы Громов был чуть сообразительней и не брезговал задуматься о блатных всерьез, он бы давно уже понял, что суть блатского закона чрезвычайно проста: надо вести себя максимально отвратительным образом, и тогда ты всегда будешь прав. В этом смысле блатные действовали строго по антихристианской доктрине: если христианство предполагает, что всегда надо быть чуть лучше оппонента, — блатные верили, что надо быть хуже, и не чуть, а значительно; это роднило их как с варяжством, так и с хазарством, у которых по этой части особенных расхождений не было. Среди блатных примерно поровну были представлены варяги, хазары и представители гордого Кавказа, тоже не отличавшиеся щепетильностью: от них блатные унаследовали гордость и культ внешней респектабельности. Именно на Кавказе додумались, что трусу и вору выгодней всего позиционировать себя, устраивая истерику по ерундовым поводам: кто-то не так отозвался о двоюродном дяде его тетки (именно для этой цели велся придирчивый учет разветвленной родни), кто-то посмотрел на его пятиюродную сестру, только что распустившийся цвэток, каковому цвэтку сам горец только что бросил «Пошла вон, сучка!» — за то, что цвэток в свою очередь не вовремя подал миску для омовения пальцев. Жизнь для того и ритуализируется, чтобы было кого опускать за нарушения ритуалов: спорить с людьми по серьезным поводам апологеты внешних приличий остерегаются, потому что серьезные люди могут и убить. Трусу нужно как можно больше мелких и легкодоступных поводов для самоутверждения: не так сказал, не так посмотрел. В блатном и горском мире сильному можно все, там он чихать хотел на все приличия, — а слабому на каждом шагу навязывают закон, изменяя его по своей прихоти. На деле же в блатном мире нет никакого закона, и бесчисленные баллады о героических ворах, отдававших жизнь за свои привилегии, имеют к реальности такое же отношение, как эпос короля Артура. Единственным определяющим правилом блатного мира является лозунг «Умри ты сегодня, а я завтра». Ради этого можно пойти на все, хотя зачем добывать себе еще один день такой жизни — загадка для любого непредубежденного человека.</p><p class="p1">У Цили Целенькой, против ожидания, Громов и Воронов оказались желанными гостями и попали на внезапную халяву: здесь праздновал свой юбилей Марик Харьковский, видный спонсор хазарской Миссии, давно уже увлекавшийся этой игрой в солдатики. В Блатске почти все кого-нибудь спонсировали — вкладывать деньги в войну было гораздо интересней, чем в гладиаторские бои (васьки все равно дрались посредственно), и уж наверняка увлекательней, чем в говенную благотворительность. В первые два года войны все вообще было очень интересно — это теперь настало нудное затишье, а поначалу тотализатор был одним из главных блатских развлечений. Сейчас Марик отмечал сорокалетие первой ходки: он с приятелями взял ларек и сдал всех приятелей. Потом он повторял этот фокус еще трижды и был коронован именно за легкость сдачи, весьма ценимую в блатных кругах. После коронации он уже не работал по ларькам — все больше по недвижимости. Его подручные покупали у алкоголиков московские квартиры, увозили этих алкоголиков под Москву и там быстро спаивали клофелином до смерти или до полного безумия, а московские квартиры продавали. Марик имел от московского правительства почетный значок «Санитар» и очень им гордился.</p><p class="p1">Когда Громов и Воронов зашли в ресторан, торжество уже было в разгаре.</p><p class="p1">— Солдатики! — закричал краснорожий Марик. — Ведите солдатиков! Где служишь, братка?</p><p class="p1">— Сто двадцать пятая артиллерийская бригада, — ответил Воронов. Громов молчал, предоставив рядовому выпутываться самостоятельно. Сам попросил жрать, в конце концов.</p><p class="p1">— Уважаю! — кричал Марик. — Иди сюда, сладкий, иди, зая! Угостить солдатиков. Федеральчики мои! Я не на вас ставлю, я старая хазарская рожа, да, но в Блатске, вы знаете, нету этого, — он помахал в воздухе короткопалыми ручками, изображая войну. — Нет этого бардака, все равны. Идите, покушайте, солдат вору — брат! Оба жизнью рискуем, оба баб любим, иди, зая! Клавонька, солнце, обслужи солдатиков. Отощали на перловке, да? Плохо вас Руслик кормит. Я говорил ему: Руслик, сладкий, нельзя так кормить солдата! Шо ты жалеешь на хавчик, шо ты жидишься, как ЖД! Шо ты вкладываешь усе в вооружение? Ведь голодная армия не навоюет много, зая! Надо кормить солдатика, надо хлебушка, маслица… Дети должны кушать, ты понимаешь, Руслик? Нет, Руслик не понимает. Старый ЖД Марик понимает, поэтому у ЖД есть кушать. Принесите им все, и водочки принесите! Ша! Пусть теперь будет музыка!</p><p class="p1">На эстраде проникновенно запели песню «Букет сирэни». Пел ее шансонье Глум, со сломанным носом, придававшим каждой выпеваемой ноте неповторимую гнусавость. В голосе Глума отвратительней всего было сочетание разнузданности с жалобностью, то есть варяжских интонаций — с хазарскими: он как бы все время жаловался и этим пугал. То же сочетание легко было заметить и в его песнях: блатной там всегда был несчастной жертвой, готовой, однако, уничтожить любого в случае чего при первом косом взгляде. В песне рассказывалось о том, как лирический герой Глума, молодой, но уже безжалостный воренок, украл с кладбища букет сирэни и принес возлюбленной, но возлюбленная, сука, как раз в это время отдавалась его соседу, отвратительному фраеру, — и первый ее букет стал последним: воренок пописАл обоих, рыдая и, видимо, кончая, потому что какой же вор не кончает при виде крови? — а на трупы положил букет сирэни, потому что кладбищенский цвэток найдет дорогу к трупу. Убитую возлюбленную Глум называл «девочкой» и рыдал по ходу исполнения весьма натурально. Покончив с букетом, он взялся за следующую балладу — то был своеобразный гимн верным воровским подругам. Герой этой баллады все время жаловался на то, что у него напряжены нэрвы, — оно понятно при такой-то жизни, — но верная подруга, кроткая, как дерево, мягкая, как пух, снимала с него напряжение. Почему-то они сидели с ней в тавэрне и пили вино, хотя в настоящих тавернах, во времена их расцвета, никто не знал слова «нэрвы». «Ты кисанька пушистая моя!» — стонал Глум в припеве. Кордебалет кисанек в страусовых перьях выделывал у него за спиной неслыханные антраша.</p><p class="p1">— Ша! — воскликнул Глум после этой песни. — Марик, я пою для тебя, и я счастлив, что пою для тебя. Ты человек, Марик, ты из тех людей, про которых никто не скажет, что они несправедливы. Никто из людей, собравшихся здесь, — Глум широким жестом обвел кордебалет, — не скажет, шо ты бываешь несправедливый. Ты мужчина, Марик, и держишь слово. Но я хочу выпить за тех, Марик, без кого и самый настоящий мужчина не может прийти в этот грубый мир. Я хочу выпить за родителей, Марик, и особенно за маму!</p><p class="p1">Воцарилась тишина, погасла многоярусная хрустальная люстра, по залу ресторана поплыл синий свет. Тост за маму был обязателен на блатских застольях. На сцену вынесли стул с мамой. Маму в каждом ресторане держали специально — ее отбирали из блатского дома престарелых; блатные редко давали на него деньги, поскольку привыкли жертвовать только на тех, в ком могли хоть отдаленно увидеть себя; стариками они себя не видели — не только потому, что редко доживали до старости, но прежде всего потому, что старики пришли в конце жизни вот к такому разбитому корыту. На самом деле к разбитому корыту приходит всякий, так устроена жизнь, — но блатные были убеждены, что это не про них. Они подкармливали либо сироток, годившихся для траха и еды, либо вдов, ибо овдоветь в Блатске в любую секунду могла всякая, даже и подруга Марика по кличке Зайка, чудовищно жирная сорокалетняя баба в перстнях, расползшаяся по креслу по правую руку от него. Единственным способом выживания для стариков была игра в маму.</p><p class="p1">Культ мамы у блатных — такой же результат вымысла, как и героическое поведение воров или их принципиальный отказ от убийства. На самом деле все отлично знают, что никакой мамы у блатного не бывает. Блатной выходит на свет, прогрызая маму и тем убивая ее при рождении: это особенность, по которой блатного можно отличить с первого дня. Обижать его опасно уже тогда. С этой травмой блатной живет и мучается, полагая себя сироткой, и потому очень любит попеть песню о беспризорном мальчишке, которого бросили жестокие родители. Никто никого не бросал, а сам загрыз. Всемерно скрывая эту главную свою тайну, блатной все время поет про маму, которая ждет его где-то там, прощая ему все его прегрешения. Прегрешения, понятное дело, тоже специальные: вор страдает исключительно за справедливость, так что просит маму простить его именно за то, что он такой хороший. Ты прости меня, мама, за то, что не волк я по крови своей. Эту строчку они подцепили у одного поэта, которого тоже загрызли. Крепкими, ровными белыми зубами блатные с легкостью перемалывают мелкие камни. Тост за маму и песня про маму были непременным атрибутом всякого блатского застолья. Мама из числа богаделок считала большим благодеянием, что ее выбрали. Работы было много: застолья происходили ежедневно, иногда по два раза на дню, и мамы требовались часто. После застолья маму на кухне кормили объедками. Папы, к сожалению, не требовались, — кое-что старухи умудрились приносить им с собой, хотя на выходе мам строго досматривали. Старики были Блатску без надобности.</p><p class="p1">Стул с мамой установили в центре смены, Глум подошел к маме сзади и застонал: «Прости меня, прости, мамуся, мама, мам!». В песне рассказывалось о том, что еще ребенком, пачкая штанишки, Глум уже не терпел никакой несправедливости, а мама защищала его от всех; теперь, когда ментовские суки опять разлучили Глума с мамой, он сидит среди снега и льда, мечтательно глядя в сторону заката, туда, где мама, а кругом запретка и жестокие конвоиры. В голосе Глума вскипели слезы. Марик уронил голову на сжатые кулаки. Зайка поморщилась: под столом в это время девушки из местного салона красоты ей обкусывали ногти на ногах — другого педикюра воровские подруги не признавали, — и невзначай откусили чуть больше.</p><p class="p1">— Ты пла-а-ачешь по ночам, — стонал Глум, — ты ждешь неча-а-астых писем…</p><p class="p1">Мама сидела на стуле с хорошо натренированной, каменной неподвижностью, олицетворяя незыблемую материнскую верность. Глум пел о том, что шмара предаст, а мама не предаст; по морщинистой щеке мамы отработанно покатилась мелкая слеза. «О-о-о!» — завыл Марик. «И буду целовать морщи-и-иночки твои!» — закончил Глум и принялся взасос целовать маму. В его поцелуе появилась даже некоторая чувственность: ведь мама как-никак была органическая материя, съедобный, в конце концов, предмет. Старуха округлила глаза и вжалась в спинку стула. Глум с трудом оторвался от нее и отвесил слушателям низкий поклон. Марик рыдал в голос, прочие бешено аплодировали. Зажглась люстра. С кухни внесли «Чудо в перьях» — фирменное блюдо Цили Целенькой, шедевр варяго-хазарской кухни: лося, фаршированного поросем, фаршированным гусем, фаршированным карасем, набитым в свою очередь деньгами. В каждую купюру была завернута сосиска.</p><p class="p1">— Выпьем за солдатиков! — провозгласил Марик.</p><p class="p1">— Не вставать, — сквозь зубы сказал Громов Воронову; тот с готовностью кивнул.</p><p class="p1">— У каждого из нас, с Божьей помощью, есть мама, — сказал Марик. — Но помимо такой мамы, есть и другая мама, общая у всех. Это мама-Родина, и солдатик служит маме-Родине. Вы знаете все, что у нас нет вот этого — хазар-шмазар, базар-вокзал… У нас у всех есть одна общая мама, и если ей надо вести зачем-нибудь войну, то дай Бог ей здоровья. Мы поможем ей и вот солдатикам, которые так вовремя сейчас присутствуют среди нас. Выпьем за них и за всех, кто выполняет сейчас долг, тяжелый долг, на разных рубежах, в караульном помещении и вообще, пьет, так сказать, березовый сок и вспоминает дом.</p><p class="p1">В интонациях и даже внешности Марика появилось что-то обкомовское; положительно, всякий истинный вор в истинном законе обладал безграничными способностями к трансформации! Складчатое лиловое лицо его стало похоже на залупу. Впрочем, оно и было.</p><p class="p1">— У каждого из нас свои интересы, — сказал Марик. — У меня интересы, у Ицика интересы, у Руслика огромные интересы и огромное, чем удовлетворять эти интересы. — Зал сдержанно хохотнул. — Но мы имеем общий главный общий интерес, чтобы была жива наша мама-Родина. Я предлагаю выпить за нее, чтоб она была здорова, и за солдатиков, которые обслуживают ей главную ее надобность, чтобы было что покушать, ну и нам чтобы было покушать, дай Бог здоровья!</p><p class="p1">Все повскакали с мест и потянулись чокаться. Из колонок зазвучало патриотическое попурри любимого блатского барда Бобзбзона, большого доки по части любви к Родине. Попурри состояло из упомянутого «Березового сока», блатного эмигрантского романса о ненаглядной колдунье и баллады «Комсомол — мое богатство». Бобзбзон обещал приехать лично, но не выбрался — в Москве тоже кое у кого бывали дни рождения. Марик был не та еще шишка, чтобы к нему на сорокалетие трудовой деятельности ездил Бобзбзон. Громов успел подивиться блатному представлению о Родине, которую солдатики неуклонно снабжали кровавой пищей. Этот блатной взгляд был очень похож на штабной. При таком раскладе любая жертва разборки воспринималась как павшая за Родину, и, наверное, в этом был свой резон, как пел Бобзбзон: Родину вполне устраивало такое положение вещей, когда максимальное количество ее граждан мочили друг друга без толку и смысла, максимально жестоким образом. Ни на что, кроме пищи, они ей не годились: так мы не интересуемся мыслями коровы, а корова — творчеством сена. Громов на секунду заподозрил, что в глазах Родины ничем не отличался от подручных Марика, и решил, что в конце вечера непременно врежет Марику меж глаз за такую трактовку воинского долга; он знал, что блатные посиделки часто заканчиваются хаосом, потасовкой и перестрелкой, но еще не догадывался, как лихо все закончится на этот раз.</p><p class="p1">Наступил черед поздравлений. Представитель мэрии Блатска, до шаровидности разожравшийся на ежедневных торжествах, огласил приветствие от мэра. Никакого мэра в Блатске давно не было, хотя некоторые блатные и верили в него, как в Деда Мороза, и даже держали в офисах его портрет — у каждого свой, потому что единого идеала государственного деятеля в их головах не складывалось. На всех портретах он был дорого одет и украшен галстуком с брильянтовой булавкой. У одних это был строгий, подтянутый бритоголовый Виторган с волчьими глазами, у других — Джигарханян с волчьей улыбкой, у третьих — нервический Смокнутовский с дряблым ртом и волчьими ушами, но все сходились на том, что мэр Блатска — абсолютный вождь преступного мира, король королей, прошедший все тюрьмы обоих полушарий. От его имени на каждое новогодье направлялась малява к временно заключенным, неизменно начинавшаяся гордым, заграничным словом «Арестанты!» — никаких других обращений преступный мир не признавал. На арестантов регулярно собирали деньги, которые тут же и прожирались счастливцем, которому общак достался по жеребьевке, поскольку подогревать лохов, попавшихся в лапы ментам по своей вине, дураков не было. Взаимопомощь в блатном мире была таким же мифом, как мэр. Пресс-секретарь мэра зачитал письмо, в котором особо отметил заслуги Марика перед городом: на его деньги была замощен Комсомольский проспект, названный в честь испытанной кузницы кадров. Чего-чего, а чувства благодарности у блатных было не отнять.</p><p class="p1">Приветствий было много: Марика поздравлял не только мэр Блатска, но и несколько ребят из Москвы, занимавших серьезные посты. Отдельный адрес прислал фольклорный ансамбль «Березка»: интернационалист Марик любил его солисток, одну из которых прислали ему в пользование вместе с адресом. Фольклорную дивчину усадили за стол и поднесли чарку, чтобы открыть чакру. Глума сменил на эстраде специальный поющий мальчик — желтый мальчик, гадкий, гладкий и сладкий; вздрыгивая попой, он запел про черные глаза. Такой мальчик запросто мог прикинуться нищим, а потом выхватить заточку и прирезать подающего; мог плакать, вспоминая о разлученной с ним сестренке и умалчивая, что сестренку он изнасиловал и загрыз как нежелательную свидетельницу; такой мальчик отличался ангельской внешностью и неотделимым от нее патологическим зверством. Он пел про то, как любит черные глаза, как хочет черные глаза, а жестокая не подпускает его к своим, сука, черным глазам; такой мальчик мог аккуратно, почти без крови выцарапать черные глаза, если бы их обладательница ему наскучила, и сожрать их, потому что именно черные, как и соответствующая икра, считаются у таких мальчиков изысканным лакомством. Сладкий и гладкий был в одной набедренной повязке. Марик нехорошо подмигивал ему. Мальчик подмигивал ему в ответ, как Саломея.</p><p class="p1">Громов почти не ел — он брезговал кровавой пищей; зато немного выпил, и в голове у него с отвычки зашумело. Воронов, напротив, начал есть жадно, но почти сразу перестал; несколько позеленев с лица, он выбежал в сортир, и его вывернуло наизнанку. Эта еда была совсем нечеловеческой, еще более нечеловеческой, чем СМЕРШ или устав гарнизонной службы. Между тем приближался кульминационный момент всякого блатного сборища — ритуальная охота на лоха, ради которой солдатиков и позвали к столу. Если бы не они, Марик уже послал бы за сиротками, — но поохотиться на солдатиков было даже интереснее: сиротка ловилась быстро и сопротивлялась неинтересно. Громов догадался о том, что сейчас будет, за секунду до того, как Марик вытащил пистолет. Громов был боевой офицер и здесь оказался в своей стихии: левой рукой он сбросил Воронова под стол, чтобы тот оказался вне досягаемости хотя бы в первый момент (он помнил, что отвечает за него головой), а правой выхватил собственный пистолет и навел его на Марика. Побоища ему не хотелось: он знал, что в этом побоище у него мало шансов.</p><p class="p1">— Сука! — взвыл Марик, вскакивая со стула. Тут же повскакали со стульев его охранники, сидевшие за столом слева и справа. Они наставили пистолеты друг на друга и замерли.</p><p class="p1">— Мы сейчас уйдем! — крикнул Воронов, так ничего и не понявший. Ему, как всегда, казалось, что он здесь кого-то обидел, а потому все из-за него и теперь надо немедленно уходить.</p><p class="p1">— Уйдем! — загоготал Марик. — Ты сейчас, хлопчик, уйдешь очень далеко! (От наслаждения он, как Глум, тянул: «О-ачень, о-ачень!»). А ну встал, засранец федеральный!</p><p class="p1">— Лежать, — приказал Громов, и Воронов, поднявший было голову, забился под стол и постарался стать плоским. — Ты что ж это, Марик, в федеральных солдат стреляешь? Нехорошо, Марик! Положи пушку.</p><p class="p1">Марик мог бы разнести Громову голову, но это испортило бы весь интерес. Солдатиков надо было погонять. Он выстрелил, пуля прошла правей громовского уха, но Громов, не любивший шуток, не промазал. Марик рухнул, охрана рефлекторно выстрелила друг в друга, начался невыносимый гвалт, по Громову стреляли со всех сторон, но он отлично владел тактикой ухода от погони. Начался дурной боевик: блатные давно утратили навык нормальной перестрелки — лох обычно не сопротивлялся, и его преследование не представляло труда. Все стреляли друг в друга. Солистка «Березки» оглушительно верещала. Дело в том, что Марик давно нарывался, и подослали ее не просто так: она была своего рода троянская кобыла, призванная замочить Марика за то, что он плохо поделился с товарищами после покупки казино «Парадиз», и подарили ее не без умысла. Поскольку Марика свалили первым, она постреливала теперь в кого попало: досмотреть подарок никто не догадался, да и вряд ли кто-нибудь полез бы туда, где она прятала миниатюрный пистолет. Это место предназначалось имениннику.</p><p class="p1">Воронов выполз из-под стола и боялся поднять голову. К ресторану уже мчалась блатская милиция, имевшая по части отлова лохов солидный опыт. Блатных она не трогала никогда. Между тем перестрелка набирала обороты: у всех сидевших за столом оказались претензии друг к другу. Краем глаза Громов заметил маму, делавшую ему странные знаки от эстрады: она как будто указывала на дверь, ведущую в кухню.</p><p class="p1">— Воронов! — крикнул Громов, отстреливаясь, хотя на него уже почти никто не обращал внимания. — Пригнись! За мной!</p><p class="p1">На этот его крик кто-то из уцелевших охранников Марика отозвался выстрелом, но пуля лишь оцарапала громовскую руку. Воронов, пригнувшись и схватившись за живот, побежал к выходу. Оба они стремглав нырнули на кухню. Повар, глядя на них с детским восторгом, повел их было во внутренний двор, — но Громов успел сообразить, что это блатский повар, а в Блатске нельзя верить никому. Во время боя у него всегда включалась интуиция; он слегка придушил повара, уперся ему в ухо пистолетом и спросил:</p><p class="p1">— Выход где, сука?</p><p class="p1">— Там, — повар показал на дверь во внутренний двор.</p><p class="p1">— Правду говори, тварь! — прошипел Громов. Он чувствовал, что из внутреннего двора нет никакого выхода, что там глухой тупик, где повара к удовольствию уцелевших гостей будут их с Вороновым долго гонять, пока не пристрелят. У настоящего солдата во время перестрелки всегда открывается третий глаз, тогда как у труса слепнут оба. Громов выстрелил над ухом у повара.</p><p class="p1">— Туда, туда! — закричала мама, вбежав на кухню. Она показала на крошечную дверцу в конце коридора. Громов с удовольствием разнес бы повару башку, но ограничился тем, что отшвырнул его, как куль. К счастью, в заведении Цили Целенькой у поваров отбирали оружие при входе, чтобы не пострадали клиенты; вообще-то в Блатске стволы были у всех.</p><p class="p1">Крошечная дверь вела в узкий коридор, за ним была еще одна дверца — Громов вышиб ее шутя, за ним, задыхаясь, бежал Воронов, а за Вороновым уже слышался топот погони. За дверцей было темно, крутая лестница уводила вниз, в подвал, а в подвале пахло плесенью и не было видно ни зги.</p><p class="p1">— Там они! — услышал Громов визг перепуганного повара. Затопотали шаги. Громов чиркнул зажигалкой и увидел впереди что-то вроде узкой трубы. «Как на тот свет», — успел подумать он, но на том свете, кажется, в конце трубы должно было обозначаться мерцание. Никакого мерцания не было, но и вариантов — тоже, почти как у души, покинувшей тело. Громов прошептал: «За мной!» — и ринулся в трубу. Бежать приходилось пригнувшись, он оскальзывался, спотыкался и слышал за собой задыхающегося Воронова: парень вовсе не умел бегать, куда такого в армию? Преследователи в подвале палили, куда ни попадя. Труба петляла. Громов снова посветил: кирпичная кладка, старый замшелый свод… Они бежали глубже и глубже во тьму. На миг показалось, что запахло речной сыростью, что этот запах перебил вековую плесень, — с потолка закапало, от стен повеяло холодом; вдруг Громову почудилось, что тьма впереди бледнеет. Он увидел тот самый свет в конце трубы, о котором столько читал.</p><p class="p1">— Видать, в нас все-таки попали, — буркнул он вслух. Воронов не ответил — он еле дышал.</p><p class="p1">— Да ладно, не бойся, Воронов, — выговорил Громов. — Хуже смерти не будет.</p><p class="p1">Он и в самом деле не был уверен, что жив, и сколько ни щипал себя — не мог счесть это надежным доказательством: вдруг душа сохраняет с телом фантомную связь, чувствует, что у нее есть руки и ноги? Между тем прямо перед ним была лестница с выщербленными кирпичными ступенями, и откуда-то сверху тек слабый, сумеречный свет. Громов глянул на часы: четыре. Их автобус ушел, но до автобуса ли теперь?</p><p class="p1">— Что, товарищ капитан, полезем? — выдохнул Воронов.</p><p class="p1">— А куда деваться, — сказал Громов. — Я первый, ты за мной.</p></span><span id="id84"><div class="title5">
<p class="p">4</p>
</div><p class="p1">Прямо перед ними широко спускался к воде зеленый склон, а внизу текла серая, желтеющая у берега, спокойная и тяжелая река. Громов оглянулся: наверху виднелись остатки блатского Кремля, трижды выдержавшего польскую осаду в смутное время. Полуразрушенная красная стена смотрела на реку узкими высокими бойницами — классическое варяжское укрепление; коренное население никогда не умело обороняться и крепостей не строило. Все древние города обнесены были стенами варяжского или хазарского происхождения, почти неотличимыми. Внизу вода поплескивала о глинистый бережок, хлюпала меж серых полусгнивших мостков, а у мостков поднималась и опускалась на местной воде деревянная плоскодонка.</p><p class="p1">— Будто люди? — удивленно спросил мужик в лодке. Он был бородат, одет в черное, на голове скуфья — не то крестьянствующий монах, не то крестьянин, юродствующий во Христе.</p><p class="p1">— Перевези, а? — задыхаясь, попросил Громов.</p><p class="p1">— Так я для чего тут и есть, — радостно сказал мужик. — Говорил отец Николай — поезжай, посмотри, вдруг из хода люди вылезут… Прямо сквозь землю видит человек. А откуда люди? Из этого хода сто лет никто не вылезал…</p><p class="p1">Он торопливо подгреб к самому берегу, Воронов поспешил в лодку, Громов толкнул ее и влез туда же. Лодка просела и черпанула, но выровнялась.</p><p class="p1">— Ну, поедем, люди добрые.</p><p class="p1">— А куда поедем? — спросил Воронов, представив вдруг, что их могут увезти в какое-то не менее страшное место.</p><p class="p1">— Да вон, — мужик указал на далекий пологий остров посреди реки. — Даниловский монастырь, слыхали, нет?</p><p class="p1">— Не слыхали, — сказал Громов.</p><p class="p1">— А и хорошо, — сказал мужик и налег на короткие весла.</p></span></span></span></span>
