<span><span><span><span id="id147"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Ходят тучи, да алеют зори, да летают журавли. Это точно было сказано в каких-то стихах, которые Волохов раньше помнил наизусть, а теперь забыл начисто, помнил только самое главное. В срединной России вообще забывалось случайное. Волохов вспомнил тут, что он настоящий волк, волхв, и научился смотреть на вещи правильным образом — соединяясь с ними и не думая о смысле. Русь вокруг лежала былинная, билибинская: бел-горючи камни со стершимися надписями, полупустые деревни, где одинокие старики безмолвно его угощали, пыльные дороги, поля с налитым колосом, островерхие ельники на тревожном закате. Долго шел Волохов полями, неуклонно веселея сердцем, чувствуя приближение цели, словно говорившей ему: не взыщи, мил-человек, что долго тебя сюда не пускали, так у нас устроено, что дойдет не всякий; но коли уж дошел, мы тебе не враги, пользуйся. Входи, забирай свою девушку, хочешь — уводи, да смотри, не оглядывайся. Не певец ли ты часом? Ах нет, это ведь была греческая история, а у нас не греческая, у нас, верно, будет иначе: зайдешь в Аид — а там совсем не то, что думаешь, и захочется ли еще назад — неизвестно.</p><p class="p1">Ходят тучи, да алеют зори, да летают журавли.</p><p class="p1">Тучи ходили, низкие, синие, и перемещались таинственно, кругами, словно и ветер тут дул по кругу, вернувшись на круги своя. Так и покойники возвращались — ушли, пришли; и правда, откуда бы иначе брались люди? Волохов сам изумлялся, как это раньше не пришло ему в голову. Обработанная земля кончилась, пошли поля сплошной высокой травы с синими колокольчиками: трава была Волохову сперва по пояс, потом по грудь. В густой траве пропадешь с головой, в тихий дом войдешь, не стучась. Вот здесь у меня куст белых роз, вот здесь вчера — повилика вилась. Где ты был, пропадал, что за весть принес, кто любит, не любит, кто гонит нас? Никто нас не гонит, все любят, а пропадал я так долго потому, что не сразу ведь и дойдешь.</p><p class="p1">Дождик прошел и кончился.</p><p class="p1">Волохов шел, теряясь в густой траве, и сам не заметил, как пропал в ней — и не тропа это была уже, а лес, густой и пестрый, смешанный, хвойно-лиственный; вот он все гуще, вот уже и продираться сквозь него трудно, и ни тропы, ни просвета. Волохов, однако же, шел, замечая, что лес отчего-то чахнет: вот был зеленый, вот рыжий, а вот и совсем сделался мрачный, одни сохлые ели да болото. Под ногами у него пружинили иглы, пахло хвоей и гнилью. Волохов присел отдохнуть на пень, задрал голову — вот и вечер, косые золотые лучи сквозь паутину. Далеко я зашел, никогда так далеко не был.</p><p class="p1">Тут у ног его раздался шорох, а потом деликатное попискиванье; нагнулся Волохов и увидел малую мышку. Мышка была не совсем обыкновенная: человека не боялась, села на задние лапки, а передними стала его подманывать, наклонись, мол. Нагнулся Волохов, подставил ладонь, и мышка на нее взобралась, словно того только и ждала.</p><p class="p1">— Здравствуй, дяденька, — сказала мышка, — дай мне хлебца, а я тебе добренькое скажу.</p><p class="p1">Ах ты, разумница какая, сказал Волохов, достал из-за пазухи горбушку, подаренную ему стариком в последней деревне, и накрошил мышке по мышиным ее возможностям. Деликатно покушавши, мышка снова села на задние лапки и передними показала, чтобы Волохов приблизил ухо.</p><p class="p1">— Ну, чего? — спросил он.</p><p class="p1">Оглянувшись, не подслушивает ли кто, мышка ему прошептала, как себя вести при таких-то и таких-то обстоятельствах; поблагодарив разумную зверюшку, отпустил ее Волохов и двинулся дальше.</p><p class="p1">Как и предсказала мудрая мышь, вскоре открылась ему ровная поляна с шестью деревьями; деревья были не простые, а какие — Волохов сам не знал. На одном сидела птица Сирин, на другом Финист, на третьем Феникс, на четвертый Алконост, на пятом Гамаюн, а на шестом прельстительный воробей. Волохов никогда прежде этих птиц не видел, но легко узнал бы, да и мышка его предупредила.</p><p class="p1">— Здравствуй, молодец, — сказала птица Сирин. — С какой поры льны топтать?</p><p class="p1">Волохов отвечал, как следовало.</p><p class="p1">(Ответ: с середины грязника).</p><p class="p1">Птица Сирин вспорхнула и скрылась, то есть ответ был правильный.</p><p class="p1">— Здорово, молодец, — весело проклекотал Финист. — До Дмитра девка хитра, а после Дмитра?</p><p class="p1">Волохов отвечал, как должно.</p><p class="p1">(Ответ: еще хитрее).</p><p class="p1">Финист вспорхнул и улетел, то есть верифицировал.</p><p class="p1">— Здрав будь, молодец, — сказала птица Феникс. — Балабол на толобол, а коломок не растолок, что это будет?</p><p class="p1">Волохов задумался. Птица Феникс нацелилась слететь к нему и стремительным темно-золотым клювом ударить в глаз. Она принялась пожимать крыльями, как разбойник пожимает плечами: ничего, мол, нету, начальник! — и вдруг выхватывает нож из рукава.</p><p class="p1">Волохов сосредоточился и ответил как положено.</p><p class="p1">(Ответ: не твое дело).</p><p class="p1">— Знатно! — прочирикал Феникс, снялся и с ободряющим поухиваньем, широко маша зелеными крыльями, вертикально поплыл в темно-синие небеса.</p><p class="p1">— И что теперь будет? — глубоким контральто спросил Волохова Алконост.</p><p class="p1">Волохов отвечал правильно.</p><p class="p1">(Ответ: не знаю).</p><p class="p1">— А я знаю, да толку-то, — сказал Алконост. Он засунул голову под крыло и немедленно уснул. Перо у него был сплошь кобальтовое, с переливом, на шейке воротник цвета червонного золота.</p><p class="p1">— Добрый, добрый молодец, — снисходительно заметил Гамаюн. — Ну-ко, скажи: бежит свинка, золотая щетинка, на кого глянет, того обманет, кого полюбит, того и погубит, а кого забудет, тот жив не будет.</p><p class="p1">Волохов поскреб затылок, чтобы не выглядеть легкомысленным всезнайкой, и после небольшого молчания ответил в соответствии с этикетом.</p><p class="p1">(Ответ: разгадка утрачена).</p><p class="p1">— Ну, и ладно, — удовлетворился Гамаюн. — Послушай теперь воробушка.</p><p class="p1">— Ах, ах! — принялся обольщать Волохова прельстительный воробей. Это была небольшая, очень суетливая серая птичка, бурно жестикулирующая крыльями и оттого в избытке чувств приподнимавшаяся над сухою еловою веткой. — Как хороша жизнь, сколько в ней удовольствий! Проснешься с утра — и уже замечательно! Покушаешь — и совсем хорошо! Как гармонично, как разумно все устроено. Как, в сущности, неблагодарны те, кто ропщет на Бога, даже и неприятные вещи вроде зимы обставившего красиво, с белеными холстами и алмазными россыпями! Сколько удовольствий таит в себе непринужденная беседа в дружеском кругу: ляпнешь что-нибудь умное — а все: ах! И, наконец, жалко маму, очень жалко маму. — Воробей прослезился и сел на ветку, умильно сложив крылышки.</p><p class="p1">Волохов почувствовал, что здесь можно ответить независимо от этикета, в соответствии с личными вкусами, и сказал учтивый экспромт: «Лети, пока цел».</p><p class="p1">— Ах, ах, какая прелесть, — враз поскучнев, пролепетал воробей и, обратившись в филина, скрылся в дупле. «Дурак ты, братец, как есть дурак», — послышалось оттуда. Вероятно, это был пароль, условное слово вроде симсима. Деревья расступились, и Волохов увидел бледно-зеленое ночное небо над огромной деревней впереди. Он подходил к Жадрунову со стороны леса. Навстречу ему шла рыжая девочка с прозрачными глазами. Она подала ему руку и повела сквозь полосы тумана. Ничего особенного пока не было, если не считать легкого разочарования: и только-то?</p><p class="p1">— Слышь, — сказал Волохов девочке, держа ее за маленькую холодную руку. — Женька Долинская не у вас, часом?</p><p class="p1">— А то, — сказала девочка. — На кого глянет, того обманет, кого полюбит, того погубит, а кого забудет, тот жив не будет.</p><p class="p1">— А, — сказал Волохов. — Значит, она меня забыла?</p><p class="p1">— И правда дурак, — сказала девочка. — Ты разве не жив?</p><p class="p1">— Жив, — не очень уверенно признал Волохов.</p><p class="p1">— То-то же, — сказала она наставительно. — Да вон она, белье полощет.</p><p class="p1">Далеко, на реке, кто-то шумел и плескался, и русалочий смех доносился оттуда. На середине реки холодно мигал зеленый бакен. В том, что Женьке вздумалось полоскать белье именно ночью, не было ничего удивительного. Весь день она, вероятно, была занята, а может, ей просто хотелось, чтобы Волохов застал ее именно за таким мирным, несвойственным ей занятием.</p><p class="p1">— Почему-то я ее не чувствую, — пожаловался Волохов. — Раньше все время, а сейчас никак.</p><p class="p1">— Врать-то, — сказала девочка укоризненно, и в ту же секунду Волохов понял, что и правда врет: он точно чувствовал Женьку, но совсем не так, как раньше. Та ровная, одобрительно-ласковая нота, которая все пела у него в душе, пока он шагал с редеющим отрядом по концентрической среднерусской равнине, — как раз и была женькин голос, но он никогда не слышал ее такой. Он помнил ее разной — злой, тоскующей, радостной, — но всегда стремительной; он и не знал, что в душе ее течет подспудный тихий поток, но всегда стремился именно к этой, самой глубокой ее глубине. Он подумал вдруг, что Женька, в сущности, очень добрая. Сам он не был уверен, что смог бы любить кровного врага, — а вот она смогла, хотя кровь ей и не велела. Он вспомнил, как она все прощала ему, как мало и коротко говорила о своей любви, снисходительно выслушивая его неуклюжие монологи, — но как любовалась всякой его удачей, и восхищалась всяким вовремя сказанным словом, и как звонила изредка по ночам, помня о разнице во времени, но зная, что он не обидится на такое пробуждение, — звонила сказать, что не может удержаться, просто хочет его слышать, ну все, пока, — и понял, что зря он всю жизнь с ней соперничал. Ее не надо было удивлять и завоевывать силой, она ничего от него не хотела, кроме того, что уже было; он впервые понял, как спокойно, верно и навсегда она полюбила его, и как ровно и неотступно хранила его эта любовь до войны, на войне и в странствии. А их размолвки душными, жаркими, еще каганатскими ночами! Идиот, ничтожество, он злился на нее всерьез, стараясь на ее упрек ответить обиднее и язвительнее — не понимая, что они не в царстве варягов и не в юрисдикции хазар, где каждый озабочен первенством и доминированием; ей просто хотелось видеть его совершенным, идеально ей подходящим, таким, каким он задуман, и оттого ее так коробило любое неверное слово, и оттого она с таким детским изумлением смотрела на него после его особенно колючих ответов. И как она гордилась им, когда у него что-то получалось! Только это и помнил он о ней сейчас — а не стремительность, не жажду деятельности, не припадки внезапной тоски; все это было дело двадцать пятое. Господи, что сделала с нами жизнь в этой стране: мы во всех предполагаем худший мотив! Мы, привыкшие, что нас на каждом шагу запрягают или подкупают, не верим, что нас могут просто любить! Но ясный голос, различимый теперь с небывалой ясностью, сказал ему, что особо самоедствовать тоже не следует: в конце концов, ты нашел меня, полюбил меня и пришел за мной. Да, сказал Волохов, действительно, чего это я?</p><p class="p1">Девочка стояла рядом, выжидательно глядя на него. Ровная свежая ночь стояла над Жадруновом, с реки доносился нежный смех, подмигивал бакен, и весь мир говорил: ну да, да, а ты что же думал? Да, конечно! Да, мой милый дурак! Спускалась сине-зеленая тьма, окутывая Волохова нежным пахучим одеялом; пахло травами и речной илистой сыростью, и звенел, звенел смех на реке. Так смеются нам с далеких печальных берегов, мимо которых мы плывем, плывем непонятно куда и все не можем остановиться, а ведь на них счастье. Вот я и на таком берегу, а мимо кто-нибудь станет проплывать и махать. Что же, пойдем?</p><p class="p1">— В одной книжке, помнится, герои получают покой, — сказал Волохов девочке. — Идут в сад, в саду типа дом, в доме будет прекрасная жизнь. Так вот, по идее надо, чтобы в этот момент все загрохотало, раздался сатанинский смех, и вместо дома открылась пустая печальная местность. Потому что никогда и ничего не надо брать у определенных дарителей. И вот я думаю: а что, если сейчас —? Но не может же быть все это…</p><p class="p1">— Ты с кем разговариваешь? — спросила девочка.</p><p class="p1">— Да так, — сказал Волохов.</p><p class="p1">— Ну ты чего? — повторила она. — Пошли.</p><p class="p1">Синее, синее спускалось на него.</p></span></span></span></span>
