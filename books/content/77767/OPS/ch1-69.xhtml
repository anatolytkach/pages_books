<span><span><span><span id="id92"><div class="title5">
<p class="p">3</p>
</div><p class="p1">У васьки Саши началось с того, что вокруг него начали подменять мир. Может, его и не подменяли, а в самом ваське Саше начало происходить что-то, — пробуждение, скажем, того самого синдрома Василенко, как назывался дар васек на медицинском языке, — но жить с людьми так и так нельзя, независимо от того, тебя подменили или всех остальных.</p><p class="p1">Девушка, которую он любил и с которой подал заявление, внезапно вызвала его в центр города и без всякого объяснения причин заявила, что уходит, причем уходит в никуда. Добро бы к другому. Последовали расспросы, уверения, мольбы, полный отказ от самолюбия — все зря. С этого, как он потом вспоминал, началось все.</p><p class="p1">Поначалу перемены можно было объяснять собственной уязвленностью, манией преследования — люди стали смотреть на него с тайной укоризной, а то и с откровенным презрением, словно только любовь ушедшей девушки и делала его приемлемым для окружающих, окутывала облаком счастья. Но увольнения уже никак нельзя было объяснить тем, что она ушла. Начальство вызвало его неделю спустя, когда он только-только начал приходить в себя. В его услугах больше не нуждались.</p><p class="p1">Он работал в некоем аналитическом центре, готовившем выборы, — надежная структура с хорошей перспективой, созданная сначала затем, чтобы изучать общественное мнение и выдавать результаты, а потом и для того, чтобы эти результаты ненавязчиво обрабатывать, доводя до кондиции. Он и сам втайне понимал, что кое-что подменяет, так что, очень может быть, цепочка подмен началась именно тогда; но все эти месяцы по крайней мере цель оправдывала средства. Он выходил на телевидение с отчетами о своих опросах и с небольшим идеологическим комментарием — необходимость свободы, примат частной жизни, самоценность личности, то-се, но тут вдруг потребовалось совсем другое.</p><p class="p1">— Вы еще не поняли? — почти сочувственно поинтересовался у него начальник отдела.</p><p class="p1">— А что я должен был понять?</p><p class="p1">— Установки меняются. Вы живете так, будто ничего не произошло. Надо говорить совсем другие вещи.</p><p class="p1">— Например?</p><p class="p1">— Например, о борьбе с нелегальной миграцией. Я же говорю, вы не сможете. Вам лучше уйти сейчас. Я вам выписал в последнюю зарплату двести долларов сверху.</p><p class="p1">Тут уж самолюбие у васьки Саши заорало в полный голос, и он не стал никого упрашивать. Взял деньги, ушел, иногда смотрел по телевизору выступления коллег, с которыми еще месяц назад курил на лестнице, и не узнавал их. Подмена произошла стремительно, — люди были прежние, а слова совершенно другие. Впрочем, что особенного? Актер сегодня играет ангела, завтра — злодея, но актер-то один и тот же, не все ли ему равно, что говорить?</p><p class="p1">Но Саша, по старинной привычке, все еще пытался валить на себя: в мире все нормально, это я изменился, называется «прохудилась защита», а возможно, и кризис середины жизни, восстановлюсь, ничего. По-настоящему он испугался, когда понес менять валюту: денег не хватало, он решил продать сто баксов, которые отложил в лучшие времена.</p><p class="p1">Он протянул в окошечко деньги и паспорт, ждал три минуты, охранник уже начал коситься… Саша просунулся в окошко:</p><p class="p1">— Скоро вы?</p><p class="p1">— Чего — скоро?</p><p class="p1">— Деньги мои где?</p><p class="p1">— Какие деньги?</p><p class="p1">— Я только что передавал, вместе с паспортом…</p><p class="p1">— Каким паспортом?</p><p class="p1">Но до него все не доходило:</p><p class="p1">— Я говорю, деньги мои давайте!</p><p class="p1">Охранник тронул его за плечо:</p><p class="p1">— Ты чего тут забыл, друг?</p><p class="p1">Саша обернулся:</p><p class="p1">— Я только что, при вас, отдал туда деньги! Сто долларов!</p><p class="p1">— Никаких денег ты не давал. Понял? Я тут стою, все вижу. Пошел.</p><p class="p1">— Какое «пошел»? Ты совсем охамел, мужик? Деньги где?</p><p class="p1">Вместо ответа охранник развернул его и дал здорового пинка, на который стоящий на перекрестке милиционер никак не прореагировал.</p><p class="p1">Надо было выручить хотя бы паспорт. Не помня себя, Саша побежал в ближайшее отделение милиции, где — без особого доверия к собственным словам — изложил ситуацию. Ему никогда и в голову не могло прийти, что деньги, робко сунутые в окошечко, могут никогда не вернуться. А ведь это был самый простой и такой естественный вариант.</p><p class="p1">— И что? — спросил дежурный.</p><p class="p1">— Как — что? Я хочу получить обратно хотя бы паспорт… — Соглашаясь на меньшее, он уже заведомо выдавал слабину.</p><p class="p1">— Потеряли паспорт — идите в паспортный стол.</p><p class="p1">— Я не потерял, вы не поняли, они не отдали…</p><p class="p1">— Будет п…ть-то, — сказал дежурный. — Я этот пункт знаю, ребята хорошие… А будешь скандалить — видишь вон тех?</p><p class="p1">Вон те сидели тут же, за решеткой, и требовали их выпустить — пара алкашей и вокзальная проститутка. И ведь был Саше знак, один из алкашей посмотрел на него узнающим взглядом и даже, кажется, подмигнул; и сказал несколько непонятных слов, то есть слова все были понятные, но в странном порядке, — что-то вроде «Стойкий обломок на короткий обмылок», — но Саша тогда еще ничего не понимал, молодой был.</p><p class="p1">Паспорт он восстанавливал еще полгода, собирая справки о своем существовании, — справки трижды терялись в паспортном столе, так что и впрямь впору было усомниться в собственном присутствии на свете.</p><p class="p1">Небольшим утешением ему служила Светка, одиннадцатиклассница, еще на первом уроке смотревшая на него так, что, собственно, для нее одной он и говорил. И когда его вызвал директор — провести разъяснительную беседу о том, что по новым временам, вы же понимаете, не следует делать акцента на репрессиях, а стоит подчеркнуть объединительную роль народной веры в вождя во время Великой Отечественной войны, — именно Светка поджидала его у выхода из школы:</p><p class="p1">— Александр Олегович, он вам нахамил, да?</p><p class="p1">— Никто мне не нахамил, Одинцова. Вообще — что за тон? Идите домой, ей-Богу…</p><p class="p1">— Александр Олегович, он идиот, не слушайте его. Мы его все терпеть не можем, а вас любим. У нас никогда еще не было такого историка.</p><p class="p1">«Скоро опять не будет», — хотел он ответить, но передумал: за последние два месяца появилась-таки эта привычка одергивать себя.</p><p class="p1">— Ладно, спасибо. Идите, вас дома ждут.</p><p class="p1">— Никто меня не ждет, там нет никого. Александр Олегович, вы только их не слушайте всех, ладно? Потому что если их слушать, можно в такое превратиться…</p><p class="p1">И он ухватился за эту соломинку, полупрозрачную девочку-акселератку, за эти хождения-провожания, разговоры по предмету и не по предмету, потому что мы любим тех, с кем нравимся себе, — а с ней он себе нравился, потому что был прежний. Не запуганный, отовсюду ожидающий удара, а уверенный, знающий, в каком мире живет. Она уже осталась у него однажды ночью, чего-то наврав довольно беззаботным родителям, и он с удивлением понял, что учителю есть еще чему поучиться у нового поколения. Только иногда он замечал у нее какое-то странное, отсутствующее выражения, она слушала и не слушала, но потом спохватывалась и принималась кивать. В классе никто ничего не знал — она держала слово.</p><p class="p1">Все кончилось зимой, когда это отсутствующее выражение стало появляться чаще и чаще, а восторженное внимание, на которое он так купился с первого урока, исчезало непонятно куда.</p><p class="p1">Однажды она не пришла в их сквер, где он, по обыкновению, поджидал ее после шестого урока (они всегда выходили врозь). На другой день, забыв про всякую осторожность, он подошел к ней на перемене:</p><p class="p1">— Что вчера случилось?</p><p class="p1">— Я не смогла… я потом объясню.</p><p class="p1">Но не объяснила.</p><p class="p1">Поговорили они только неделю спустя, когда он подкараулил Светку возле ее дома.</p><p class="p1">— Объясни мне по-человечески, что происходит.</p><p class="p1">Он смотрел на нее, не узнавая. Куда девалась та девочка? На него пустыми глазами смотрел незнакомый человек — ее возраста, ее роста, в ее белой вязаной шапке, с ее колечком на безымянном пальце, но с другим овалом лица, с другими волосами — вместо светлых, блестящих, были тусклые и темные, так не покрасишься.</p><p class="p1">— Ничего не происходит.</p><p class="p1">— Но ты от меня все время сбегаешь — в чем дело? Родители?</p><p class="p1">— Родители ни при чем. Вообще ничего не случилось.</p><p class="p1">Он не выдержал и, забыв о прохожих, схватил ее за плечи, затряс:</p><p class="p1">— Что со всеми вами делают? Где вас меняют?</p><p class="p1">Только тут в глазах ее мелькнуло что-то прежнее, как под свежей краской проступают иногда контуры прежнего рисунка; только тут он увидел в ее лице какую-то минутную борьбу, словно она собиралась рассказать, но не могла решиться, словно в темной реке, у самой поверхности, плеснула рыба и тут же ушла на глубину.</p><p class="p1">— Говори! Говори, Светка!</p><p class="p1">Она уже опустила глаза, а когда подняла — на него смотрела прежняя кукла.</p><p class="p1">— Ничего не случилось, Александр Олегович! Ничего ведь и не было. Не надо меня трясти.</p><p class="p1">Он повернулся и пошел домой.</p><p class="p1">Но и дома не было, потому что была метель, и он, пьяный, из горлышка выпивший бутылку «Слънчева бряга», не мог найти собственную улицу: не чувствуя холода, блуждал по району и района не узнавал.</p><p class="p1">— Скажите, это «Филевская»? — спрашивал он прохожих, встречавшихся все реже, и благополучные люди с собаками брезгливо говорили ему:</p><p class="p1">— Нет, Семеновская… Откуда здесь «Филевская»?</p><p class="p1">И он понимал, что в самом деле неоткуда, и низвергался в метро, падал на эскалаторах, просыпался на конечных станциях неведомых линий, в ужасе выбегал наружу:</p><p class="p1">— Скажите, это какая станция?</p><p class="p1">— «Битцевский парк».</p><p class="p1">Как он попал на «Битцевский парк», ведь точно помнил, что не пересаживался? Неужели его, пьяного, волокли, перетаскивали из поезда в поезд? И снова он ехал неизвестно куда, пока не очнулся в абсолютно пустом вестибюле. Поездов не было, он сидел на скамейке, женщина с красным семафорчиком в руке прошла мимо.</p><p class="p1">— Скажите, что это за станция?</p><p class="p1">— «Новый тупик».</p><p class="p1">— Такой станции нет.</p><p class="p1">— Есть такая станция, молодой человек. Позавчера открыли.</p><p class="p1">— А какая линия?</p><p class="p1">— Преображенская. Вы прямо как с Луны упали.</p><p class="p1">Опасаясь, что она сдаст его в милицию, он встал, минут двадцать дожидался одного из последних поездов, время было позднее, часа четыре он так мотался туда-сюда, — и на стене вагона увидел новую карту метрополитена. Преображенская линия пересекала Кольцевую властной и широкой черно-красной полосой. Она начиналась на глухих окраинах, шла через центр и терялась в дебрях пригородных станций. Он никогда не слышал об этой линии, но о чем он вообще в последнее время слышал?</p><p class="p1">…Вечерами он сидел теперь один, допиваясь до забытья. Включать телевизор стало уже не страшно, а как-то безнадежно тошно.</p><p class="p1">Более всего потрясла его программа «Молода, одинока, беременна». Некий аналог этой программы, сочувственно адаптировавший залетевших старшеклассниц к новой жизни, был ему знаком по давней поездке в Штаты. В отечественном варианте на экране появлялась огромная, рыхлая баба в белом колпаке, похожая не то на колхозную повариху, не то на сестру-хозяйку пионерского лагеря:</p><p class="p1">— Ну что? — спрашивала она с иезуитской лаской. — Влетела? Влетела?! Ах ты тварь! — и дальше, апоплексически краснея, топая ногой, брызгала слюной в кадр еще минут десять. — Да как глаза твои падлючьи не лопнули! Да как ты на родителей-то посмотришь! Да кому ж ты теперь нужна, тьфу на тебя! Ось, бачь, плюю: тьфу!!!</p><p class="p1">Тут рядом появлялся мужик, похожий на агронома, и принимался уговаривать повариху:</p><p class="p1">— Успокойся, Клавдя Тимофевна, что ты душу рвешь из-за этой курвы! — и добавлял, уже глядя в кадр:</p><p class="p1">— До чего ты рабочего человека довела!</p><p class="p1">Следом на экране появлялась торжествующая семья — пролетарий-отец, пролетарий-сын, только что обмочившийся красный внук, невестка в халате, необъятная свекровь у плиты, — и хором кричала:</p><p class="p1">— Вешайся! Вешайся!</p><p class="p1">Этим же утешением заканчивались программы для безработных, больных и одиноких.</p><p class="p1">В магазинах снова выстроились очереди, продавщицы хамили напропалую, да и сырки будто подменили. Однажды вместо сырка ему выдали странный твердый брикет; он откусил — пресно, немного мыльно.</p><p class="p1">— Я просил сырок «Московский»!</p><p class="p1">— Это и есть сырок «Московский».</p><p class="p1">Но сломался Саша, когда в начале весны пошел в овощной закупаться картошкой. На лотке лежали ярко-зеленые клубни некартофельной и вообще необъяснимой формы: правильно-овальные, но со множеством выростов, выбросов, причудливо застывших в фигурки. Картошка была словно рогатой, и рога эти росли повсюду, превращая клубень в диковинного зеленого ежа.</p><p class="p1">— Это картошка?</p><p class="p1">— Картошка, что спрашиваете, не задерживайте…</p><p class="p1">— Но она… странная какая-то…</p><p class="p1">— Это вьетнамская, гуманитарная помощь. Понимаете? Нам Вьетнам ее присылает…</p><p class="p1">— А обычной нет?</p><p class="p1">— Эта и есть обычная. Никакой другой не бывает. Где вы другую видели?</p><p class="p1">Он не мог объяснить, где видел другую. Он вообще не был уверен, что где-то когда-то видел что-то другое. И потому не особенно удивился, когда на свой вопрос «Который час?» (часы давно остановились, а денег на ремонт не было) услышал от прохожего:</p><p class="p1">— Асять кукут петого.</p><p class="p1">— Сколько? — переспросил он машинально.</p><p class="p1">— Асять петого, — буркнул прохожий и поспешил мимо.</p><p class="p1">То ли он забыл язык, то ли язык забыл его. Он уже почти не понимал того, о чем писали в газетах. Надо было сматываться. Пусть в Москве все менялось — на свете было нечто незыблемое, он продал всю мебель и купил плацкартный билет в Геленджик, к друзьям.</p><p class="p1">Он проспал всю дорогу под стук колес — отсыпался за полгода бессонницы и страхов: ему все казалось, что теперь-то кошмар кончится. Они могли подменить страну, но подменить море и горы им было слабо.</p><p class="p1">Друзья были рады. Его приняли. Его кормили. Он радовался прочности чужого уклада, незыблемости этого быта, и его так разморило, что выйти в тот же вечер к морю казалось подвигом. Ему отвели ту же самую комнату, что и всегда, — комнату уехавшего в Москву старшего сына, — только кровать стояла не так… изголовьем к двери… а он ясно помнил, что прежде спал головой вон к той стене… но какая разница, где уж тут на ночь разбираться! Насытившись впервые за несколько невыносимых месяцев, он заснул, едва добрался до постели.</p><p class="p1">С утра хозяева ушли на работу, только старуха — мать его друга — хлопотала в кухне. Дом стоял в пяти минутах ходьбы от моря. Он вышел на берег и замер.</p><p class="p1">Море было красным.</p><p class="p1">И все-таки это было выше их сил, они не могли заменить море! Задыхаясь, он бросился вверх, к людям, к базару:</p><p class="p1">— Что сегодня с морем? — крикнул он старухе, продававшей маслины прошлогоднего засола.</p><p class="p1">— Отходы прибило, — пояснила она миролюбиво. — Тут сбросили какую-то гадость, вот ее и прибивает иногда… Говорят, и плавать можно, говорят, безвредно…</p><p class="p1">— Но ведь это по всему побережью, на сколько глаз хватает!</p><p class="p1">— Да говорят, дальше-то чисто… Погоди, через денек волной разгонит…</p><p class="p1">Он долго не мог заставить себя спуститься к этой красной воде, но деваться было некуда. Надо было привыкать к тому миру, который теперь простирался вокруг.</p><p class="p1">Саша долго сидел на берегу, глядя на красную воду. Он не заметил, как стемнело, и только потом спохватился: прошло не больше трех часов!</p><p class="p1">Он поднял глаза.</p><p class="p1">В густо-зеленом, цвета вьетнамской картошки небе тускло горело ярко-синее маленькое солнце, на которое можно было смотреть без боли. Мимо прошел старик, подняв лицо к синим лучам; оно казалось мертвым.</p><p class="p1">— Вы не видите?! — не помня себя, крикнул Саша.</p><p class="p1">— Я ничего не вижу, — ровно сказал старик.</p><p class="p1">Только тут Саша увидел, что он слеп: старика вела собака, и на эту собаку лучше было не смотреть.</p><p class="p1">Он сел на гальку, закрыл глаза, потер виски. Затряс головой. Снова посмотрел в небо.</p><p class="p1">Синее солнце стояло в зените. Зеленое небо окружало его.</p><p class="p1">И тут он понял, что больше не боится. Ярость сильнее страха, она изгоняет страх. Здоровая, ясная, сухая ненависть пылала в нем.</p><p class="p1">— Ну и черт с вами, — процедил он сквозь зубы. — Черт с вами, пусть все будет так. Делайте что хотите. Я-то не изменюсь. Дулю вам всем, я не изменюсь. Сами меняйтесь как угодно. Со мной вы хрен чего сделаете. Я какой был, такой и есть. Я не изменюсь.</p><p class="p1">С этого дня он ушел бродить, ища настоящее небо и настоящее море, но нигде пока не встретил их. Синдром Василенко, Анька знала, выражается иногда и в том, что нарушается восприятие цветов, что-то вроде дальтонизма, только по всему спектру. Знание настоящего языка проснулось в Саше сразу, и теперь, под Тамбовом, ему уже трудно было говорить на русском. Но Анька понимала его.</p></span><span id="id93"><div class="title5">
<p class="p">4</p>
</div><p class="p1">Третьим рассказывал свою историю васька Петр Степанович, который заснул однажды в Крыму, в «Беседке ветров», — таинственном месте, где есть, говорят, дыра в другое измерение. Ветер там завывает на разные голоса, трава растет высокая, почти в человеческий рост, и место это скрытое, туристы про него не знают, только местные ходят иногда, в надежде оздоровиться.</p><p class="p1">Петр Степанович жил в Гурзуфе со старой матерью, работал шофером, был неудачно женат, развелся и ничего особенного от жизни уже не ждал. Сон, приснившийся ему, был ни на что не похож и так реален, словно Петр Степанович и в самом деле побывал в другом измерении. Ему снился северный город, в котором он, оказывается, прожил всю жизнь; у него был там другой отец и другая мать, но главное — другая жена. Он жил в доме пять по Большой Коммунистической, в квартире тридцать два; в городе было много других особых примет, но их Петр Степанович помнил смутно. У него были в этом городе сын и дочь, сын любил собирать легкие деревянные самолеты из тонких планок, с резиновым двигателем, а дочь играла на пианино и пела в хоре. Сам Петр Степанович работал водителем троллейбуса, ходившего по пятнадцатому маршруту. Это был прекрасный маршрут, начинавшийся у городского парка, на высокой горе над медленной рекой, а заканчивавшийся в парке, на низкорослой окраине, где уже вырастали, однако, новостройки, и простор за ними открывался такой, словно там, дальше, было море. Настоящего моря, у которого прожил всю жизнь, Петр Степанович во сне не видел и не скучал по нему.</p><p class="p1">Он проспал целые сутки, потому что в Беседке ветров легко забыться надолго, но за эти сутки успел прожить с новой семьей год или два, и все события этих двух лет — выпускной концерт дочери, сломанную руку сына, переход жены с одной работы на другую, — помнил отчетливей, чем всю свою гурзуфскую жизнь. Он был удивительно на месте в той семье, все его любили, никто ничем не попрекал, и жена у него была такая милая, а дети такие родные, все в него, что он проснулся в слезах и долго плакал, лежа в траве, вспоминая, кто он такой и откуда, и зачем здесь.</p><p class="p1">С тех пор гурзуфская жизнь и работа стали ему невыносимы. Он стал тратить все деньги и время на разъезды по стране, ища город с большой северной рекой, парком на горе и улицей Большой коммунистической. Правда, такие улицы были почти во всех городах. Еще он смутно помнил, что была в городе площадь Декабристов, — это навело его на мысль, что снился ему Иркутск или Якутск, но улицы или площади Декабристов были во многих еще городах. Однажды он решил не возвращаться в Гурзуф, дал матери телеграмму, что женился и остается в Братске, а сам отправился на поиски своего города. До сих пор он ходил, но так ничего и не нашел — лишь иногда ему в толпе попадалось лицо, похожее на лицо его выросшей дочери, или мелькал вдруг затылок сына, но никогда не мог Петр Степанович догнать его в толпе. Портретами жены, сына и дочери он беспрерывно изрисовывал любой клочок бумаги. Он показал несколько портретов и Аньке: печальная замордованная женщина стояла у плиты. Или просто Петр Степанович в нынешнем своем состоянии не мог изобразить никого веселого и цветущего. Он ходил уже два года.</p><p class="p1">Невыносимее всего была для него мысль о том, как же они там без него. И как, должно быть, им страшно знать, что его подменили, что в Иркутске или другом северном городе вдруг взял и проснулся рядом с ними чужой человек. Бывает же так, что душа во сне странствует и почему-то не может вернуться в прежнее тело, вот и попадает в чужое. Петр Степанович не знал, с кем он обменялся душами и как вообще это вышло, что он уныло прожил тридцать четыре года в Гурзуфе, не зная, что ему надо быть в совсем другом месте. Но он знал одно: от наваждения ему уже никуда не деться, пока он не найдет дом пять и квартиру тридцать два, и жена его Лариса с детьми Олей и Колей не выбегут навстречу ему.</p><p class="p1">— Хорошая история, — похвалил Василий Иванович. — Бесприютная.</p><p class="p1">Это было точное слово. Все сказки васек отличались одним — удивительной, тоскливой, сосущей бесприютностью. Да и какие другие сказки могут быть у людей, бродящих по свету без пристанища.</p></span><span id="id94"><div class="title5">
<p class="p">5</p>
</div><p class="p1">Вслед за Петром Степанычем вступила васька Варька, женщина неопределенного возраста с клочковатой шевелюрой, слезящимися глазками-щелочками, но неожиданно глубоким и красивым голосом. Она прокашлялась и объявила:</p><p class="p1">— Покинутая. Народная баллада.</p><p class="p1">Сидевшие у костра одобрительно захмыкали. Васька Варька запела прочувствованным речитативом:</p><p class="p1">— Когда жила у папи и у мами, закусывала сливки калачом, с соседями дружили мы домами, восемь на семь, отказа я не ведала ни в чем. Но жисть моя сложилась так ужасно, что где-то там случился перегиб, и папа, оклеветанный напрасно, шесть на девять, отправился в тюрьму и там погиб. А мама полюбила машиниста, водившего железный паровоз, но он ее замучил очень быстро, на три счета, а падчерицу выгнал на мороз.</p><p class="p1">Дальнейшая жизнь васьки Варьки излагалась в бесчисленных (Анька сбилась после пятнадцатого) куплетах, в которых перечислялись ее мужчины, пройденные ею города и нажитые профессиональные заболевания. Анька уже поняла, что большая часть баллад, сочиняемых коренным населением, состоит из отчетов и перечней: ходил туда-то, видел то-то. Сюжет почти во всех песнях и сказках отсутствовал: герой все время куда-то шел, кого-то находил и тут же покидал. Васька Варька долго и со вкусом перечисляла профессии своих мужчин (все они рифмовались на — ист), потом свои болезни (все они рифмовались на — ит), и, наконец, пройденные ею места (все они рифмовались на — ово). Баллада, таким образом, делилась на пять частей: вступление, куплеты на — ист, на — ит и на — ово, после чего следовал эпилог. Анька уже успела заметить, что как традиционная баллада увенчивается «посылкой», то есть обращением к покровителю или адресату, — так и васькинская народная баллада увенчивалась просьбой о пище, с которой исполнитель обращался к слушателям. Каждый из сидевших у костра во исполнение ритуала кинул ваське Варьке медный гривенник.</p><p class="p1">— Василий Иванович, — сказала Анька неуверенно, — но вы же вроде рассказываете истории о том, как начали ходить?</p><p class="p1">— Точно так, — улыбнулся Василий Иванович, гордясь искусством соплеменников.</p><p class="p1">— Но ведь это все неправда, про что в балладе поется!</p><p class="p1">— Конечно, — кивнул Василий Иванович. — Это, Анечка, такой жанр. У нас два жанра, Анечка. Рассказ про то, как стали ходить, и народная баллада.</p><p class="p1">— А как же все было на самом деле?</p><p class="p1">— Ну, какой же васька про это расскажет, — снисходительно заметил Михаил Егорович. — Это опыт особенный, у всякого свой. Это только под пыткой можно рассказывать, и то не под всякой.</p><p class="p1">— Что же, — спросила Анька, — вы и друг другу не доверяете?</p><p class="p1">— Наоборот, — сказала васька Варька, — мы до того друг другу доверяем и друг друга бережем, что о самом главном не говорим. Такой разговор сил требует и всей жизни иногда, а нам силы для другого нужны.</p><p class="p1">— Так что ж, Василий Иванович, — сказала Анька, — ты никогда правды мне не расскажешь, как начал ходить?</p><p class="p1">— Отчего же, — задумчиво сказал Василий Иванович. — Будет время — и расскажу, а теперь спать надо. Ты и так уж одним глазом спишь.</p><p class="p1">— Не сплю я, — сердито ответила Анька.</p><p class="p1">— Да, да, — подтвердил васька Саня. — Пора укладываться. Эк звезд-то…</p><p class="p1">— Спой колыбельную, Варя, — попросил Василий Иванович.</p><p class="p1">Варя подперлась рукой и совсем другим голосом — грудным и тихим — запела, глядя в костер, что-то бесконечно древнее, чего Анька никогда не слышала ни от собственного отца, ни от матери, но почему-то знала. То ли она где-то вычитала слова, то ли всегда помнила их.</p><div class="poem">
<div class="stanza">
<p class="v">— Спи, дитя мое, усни,</p>
<p class="v">Сладкий сон к себе мани.</p>
<p class="v">В няньки я себе взяла</p>
<p class="v">Ветер, солнце и орла.</p>
<p class="v">Улетел орел домой,</p>
<p class="v">Солнце скрылось за горой.</p>
<p class="v">Ветер, ветер, где ты был?</p>
<p class="v">Почему не приходил?</p>
<p class="v">Волны быстрые смущал?</p>
<p class="v">Звезды ясные считал?</p>
<p class="v">Не смущал я волн морских,</p>
<p class="v">Не считал я звезд златых,</p>
<p class="v">Я дитя оберегал,</p>
<p class="v">Колыбелечку качал.</p>
<p class="v">Что ты видел пред собой?</p>
<p class="v">Синий, красный, голубой,</p>
<p class="v">Метный, ятный, полотой,</p>
<p class="v">Омный, томный, завитой,</p>
<p class="v">Ясень, весень, остроград,</p>
<p class="v">Зелень, мелень, виноград,</p>
<p class="v">Остров, астров, пароход,</p>
<p class="v">Видел, слышал, не поймет…</p>
</div>
</div><p class="p1">Звезд было много, и под ними было спокойнее, чем под крышей. Вот я и на месте, и никто меня больше не выгонит, подумала Анька и заснула.</p></span></span></span></span>
