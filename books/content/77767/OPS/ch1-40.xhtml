<span><span><span><span><span id="id52"><div class="title5">
<p class="p">1</p>
</div><p class="p1">С первой их ночи она много ему рассказывала о туземной вере. Ей ли было не знать — Аша принадлежала к туземной аристократии, к древнему роду жрецов, хотя и ненавидела слово «жрец».</p><p class="p1">— Оно чужое, ваше. Что-то жрущее. Мы называем — волк.</p><p class="p1">— Это, вероятно, восходит к волхву, — сказал губернатор. Он даже помнил стихи — «Я волхв, ты волк, мы где-то рядом в текучем словаре земли».</p><p class="p1">— Волхва придумали ваши, — упрямилась она. — Не умели произносить наше слово и придумали лишние буквы. Волк, самое высокое звание. А ваши из него сделали звериное имя, потому что нас боялись.</p><p class="p1">— Что же вас бояться? Что вы такого умеете?</p><p class="p1">— Увидишь еще. Вот то, что ты со мной, — это разве не наше искусство? Это я захотела, чтобы ты был со мной.</p><p class="p1">— Сразу-сразу?</p><p class="p1">— Сразу-сразу. Как увидела. Ты ведь тут главный, ты государев человек. А я кто? А вот я у тебя во дворце, и в твоей спальне. Это все волчье слово. И от врага помогает, но про это я тебе не буду говорить.</p><p class="p1">— Почему? Научила бы.</p><p class="p1">— У тебя враги?</p><p class="p1">— У государства, Аша, у государства. Мне бы пригодилось.</p><p class="p1">— С государственными врагами, губернатор, сам будешь разбираться. Мне твое государство без надобности.</p><p class="p1">Она была, вероятно, из какого-то племени, покоренного еще Ермаком, — много их тут бродило, и какие-то отголоски легенд долетели до нашего времени. Губернатор понятия не имел, как выбить у нее из головы идиотский предрассудок насчет завоевателей и коренного населения. Он отлично знал, что население всегда завоевывает само себя и выдумывает бесчисленные оправдания, изобретая внешнего врага. Прием, известный любому психологу: персонификация собственной вины. Придумали агрессора, наделили внешностью и биографией — интересный излом туземной психологии; как будто не сами себя колонизировали! Сами же угнетали и бунтовали, нечего оправдываться. Конечно, он сильно отличается от туземца — примерно как элой от морлока, но тут уж не захват, а два пути эволюции. В конце концов, туземцам никто не препятствовал выйти в элои: к их услугам было образование, он лично открыл две сельских школы (и закрыл десяток, напоминал он себе; но что же делать, если на иную деревню народу-то — два старика?). Найдись кому учиться, учили бы… Пьянство, вырождение, грязь, безволие, безответственность. Этих людей ничему не научишь, ни в какое счастье силой не загонишь — вечно построят себе одно и то же. Так зачем тогда эта легенда про захват? Для самоуважения?</p><p class="p1">— Ты говоришь глупости, — сердилась она, и он тоже сердился. Хотя и дочь волка, и древнего рода, но все-таки простая туземка, и распускать ее не следовало. — Тебя выучили дураки, и ты повторяешь их дурацкие слова. Ни один народ не угнетает сам себя, никакую нацию не заставляют забывать свою веру. А нашу веру вы потоптали, и помнят ее только волки.</p><p class="p1">— Ты про язычество? — спрашивал он. — Про Велеса?</p><p class="p1">— Велес — ваш бог, — говорила она с ожесточением, какого он никогда не мог бы в ней предположить: слабая, бледная… — Вы принесли козлобородого Велеса, волосатого северного бога. Вы приняли потом Христа, но из него опять сделали Велеса. Вы из кого угодно его сделаете, страшного, грубого… А все равно ничего у вас не вышло. Мы как праздновали свои праздники, так и празднуем.</p><p class="p1">— Что за праздники?</p><p class="p1">— Их у нас два, — сказала она важно. — День жара и день дыма.</p><p class="p1">— Жар и дым? — переспросил он.</p><p class="p1">— Да. Год идет по кругу, катится колесо, а держит его палка, что поперек колеса. Где она упирается в колесо, там два праздника. День жара — весной, как апрель закончится и май начнется. А день дыма — осенью. Свиней, гусей коптить. Ой, красивый праздник! Я покажу тебе. У бабушки в селе празднуют. Сейчас мало кто помнит. Но вы на этот день все равно праздновали, только свое. На день жара — то Пасху, то Первомай свой с флагами. А на день дыма — то в честь главной иконы праздник, то седьмое ноября, то четвертое. Сами же видите — его нельзя отменить. Ты его в дверь гонишь, он в окно влезет. Толобок на колобок, а он убок и оболок, у нас говорят.</p><p class="p1">— А на день жара что у вас делают? Впрочем, погоди, я догадываюсь. Парни за девками бегают, так?</p><p class="p1">— Да ну, глупости, — сказала она презрительно. — Что ты, на Ивана-купала насмотрелся? Мы народ тихий, к чему нам эти игрища? Это знаешь какая красота — день жара! Все ходят по лугу и поют, девушки в венках, парни в кольцах. Это такое… вокруг шеи.</p><p class="p1">— Гирлянда это называется.</p><p class="p1">— У вас гирлянда, у нас кольцо.</p><p class="p1">— А на руке что?</p><p class="p1">— И на руке кольцо. Кольцо — это вещь круглая, любая. Вот шапочка у меня кольцом, я сама вязала. Это наше главное — кольцо. Ты же видал, к тебе часто в наших шапках приходят.</p><p class="p1">Кольцом она называла круглую вязаную шапочку, немного похожую на сванскую, а отчасти на кипу. Туземцы действительно часто являлись на прием в таких шапочках, но снимали их, кланяясь, из уважения к власти. Почему-то они называли это «ломать шапку».</p><p class="p1">— Ну да, ломать, — объясняла она. — Снимать — это когда с кем вместе ходишь. Я с ним, снимаю его. Тебя снимаю. А ломать — шапку, дурака…</p><p class="p1">— Дурака-то почему?!</p><p class="p1">— А вот если надоел тебе дурак — ты его от себя убираешь, как шапку с головы…</p><p class="p1">Он никогда не мог понять, сама она импровизирует весь этот туземный язык или вправду передает ему тайнознание, состоящее, как всякое тайнознание, из чужих ошибок, обмолвок и самых тупых суеверий. Губернатор ненавидел язычество и презирал древние культы: все тайны веков представлялись ему набором глупейших страхов, да и Библия-то, если честно…</p><p class="p1">— И все у нас кольцо. Ваши дураки придумали: живем в лесу, молимся колесу. «Колесо» — тоже кто-то из ваших недослышал, а все за ним повторяют. У вас все за одним повторяют. Правильно — «кольцо». Трехколечный велосипед.</p><p class="p1">Он засмеялся.</p><p class="p1">— Да вы все врете, ни одного слова правильно сказать не можете, — повторила она.</p><p class="p1">— Аша — это я правильно говорю?</p><p class="p1">— Это — правильно.</p><p class="p1">— А почему два бога? — Это было ему в новинку, он много читал о языческом пантеоне, где под конец все усложнилось до полной незапоминаемости, свой божок появился у каждого ручья, каждой лавки — и все они путались у Зевса под ногами, и требовали бессмертия, и тогда система кардинально упростилась, как оно всегда и бывает; пришло единобожие, более простое и решительное, чем язычество, без напряженных и прихотливых притяжений и отталкиваний в синклите божеств, — но зато и возник неразрешимый вопрос: если прежде противоречия в людской участи легко было объяснить ревностью Афины к Артемиде, ссорой Аполлона и Марса — единый Бог лишился этого спасительного оправдания, и ему пришлось провозгласить, что в его действиях по определению нельзя искать логику. Сегодня так, завтра сяк — но не пытайся уловить удою левиафана, делай, что я сказал, и смотри, какие у меня горы! Двоебожие, однако, никогда не встречалось губернатору; некие зачатки его были, конечно, в монотеизме, где главному божеству непременно вредил Сатана, падший ангел, божий Троцкий, начинавший вполне прилично, но возгордившийся; кажется, гордыню в нем с самого начала пестовали нарочно, возносили, чтоб тем разительнее низринуть — и после все уже валить на него; в сущности, так же было и со старательно надутым Тухачевским, и с Ходорковским, которому позволяли до поры пухнуть и дуться (где он теперь? По последним сведениям, где-то у ЖДов; сам ли бежал или был похищен — не знал даже губернатор, человек государственный; поняли люди, что на заклепанного во узы много не свалишь). Он потому и не любил никакой религии, что все это было человеческое, слишком человеческое: в сущности, всякий начальник известного ранга должен начинать с того, чтобы вырастить соперника, неглупого малого, одержимого гордыней; старательно раздувать в нем искорку тщеславия, даже и подставляться, чтоб захват власти показался сопернику вовсе уж плевым делом, — тут-то мы его и бабах, за пять минут до того, как он сам на нас замахнется! Тут-то и можно станет валить на него все наши промахи, все людские грехи; а между тем ни в какое сравнение с верховным божеством низринутый ангел не шел, поскольку иначе никакое движение оказалось бы немыслимо — враги знай сдерживали бы друг друга, а мир качался бы в неустойчивом равновесии. Кажется, именно в таком гомеостазисе и пребывал мир коренного населения, где два бога взлетали, словно на качелях, возносясь поочередно и поочередно же правя.</p><p class="p1">— Два бога потому, что всего два, — объясняла Аша. — Полгода правит Даждь-бог, полгода Жаждь-бог. Даждь все дает, Жаждь берет. Где правит Даждь — там всегда все есть. А где Жаждь — никогда ничего. Даждь правит со дня жара до дня дыма. А потом Жаждь. Потом зима.</p><p class="p1">— А, — догадался губернатор. — Ну конечно. Знаешь, что я понял? — Вообще, когда он был с ней, говорил с ней, просто лежал рядом и думал — голова делалась удивительно ясной, потому, вероятно, что в присутствии Аши он не помнил ни о службе, ни о тысяче обременительных мелочей. — Единобожие хорошо для стабильного климата. Где зимы нет. Оно потому и зародилось в жарких краях, где смена сезонов почти незаметна. А многобожие — в мягком климате, где резких смен нет (и заметь, у греков почти нет божеств однозначно злых), зато разнообразных вариантов одной и той же погоды — тысячи. Средиземноморье, мягкость, погода на дню пять раз меняется. Я тебя свожу обязательно, все покажу. А у вас… у нас… здесь все понятно: полгода жизнь, полгода смерть.</p><p class="p1">— Все у тебя с ног на голову, — говорила она без осуждения; вообще в разговорах о вере не впадала в дурной фанатизм и никогда не повышала голоса. — Ты говоришь, что такой климат, и поэтому два бога. А на самом деле — два бога, и поэтому такой климат.</p><p class="p1">— Ну да. Две точки зрения, как кому удобнее. И что делает Даждь-бог?</p><p class="p1">— Он все подает. Податель всего. Кого он любит — у того все само произрастает и ни в чем отказа нет. Он добрый. О чем ни попросишь — все делает. Щедрый. А Жаждь-бог — этот все отбирает. Жизнь отбирает, на урожай мороз шлет. Когда кто радуется — он очень не любит. — Губернатор заметил, что Аша, с ее богатой, гибкой и правильной речью, передразнивает язык пословиц и даже, кажется, слегка окает, как было принято у туземцев. Пословицы коренного населения отличались своеобразным лаконизмом, но не римским, чеканным, а невнятным, порченым, словно туземцы боялись выразиться ясно и договорить все до конца. Более-менее внятными были только те, в которых доказывалась необходимость труда: готовь сани летом, телегу зимой; без труда не выудишь рыбку из пруда; как потопаешь, так и полопаешь. Эти тезисы, часто рифмованные, больше всего напоминали лозунги со стройки, с доски почета или позора, словно сочиняло их в самом деле не коренное население (кому же в здравом уме придет в голову воспевать труд), а пришлые и более цивилизованные, да все без толку. Туземцы обращали на эти призывы не больше внимания, чем на конституцию, и всю жизнь работали словно на дядю, без малейшей охоты. Впрочем, они и на себя уже почти не работали — думали, вероятно, что все подаст Даждь-бог.</p><p class="p1">— А после смерти как? Кто хороший — попадает к Даждю, а плохой к Жаждю?</p><p class="p1">— После смерти? — Аша посмотрела на него с удивлением. — После смерти ничего не бывает. Куда же всех девать-то?</p><p class="p1">Представления о бессмертии у туземцев не было вообще. Их мир не знал слова «конец» и не имел начала, он жил по кругу, в неизменном чередовании двух божеств, в их динамическом равновесии на двух чашах мировых весов, — и самая смерть тут ничего не значила, потому что отдельная личность не существовала. Туземцы мыслили себя только вместе, как единый народ, не помнящий рождения, не знающий смерти, — они водили бесконечный хоровод под двумя солнцами и не желали его прервать.</p><p class="p1">— У нас всего по двое, — повторяла Аша. — Два светила на небе, два бога, два захватчика.</p><p class="p1">— Какие захватчики?</p><p class="p1">— Будто не знаешь. То вы, то другие.</p><p class="p1">— Аша, хватит молоть ерунду. Вас никто никогда не захватывал, вы мучаете себя сами.</p><p class="p1">— А зачем?</p><p class="p1">— Затем, чтобы не работать, — сказал губернатор, начиная слегка раздражаться.</p><p class="p1">— Да кто же работает, кроме нас? — не поняла она. — Это вы друг друга мучаете, а мы себе все за вас делаем. А вам только повод дай — бах, бах!</p><p class="p1">— Ну ладно. Мы захватили, да. Покорили Сибирь. А кто вторые?</p><p class="p1">— Степняки, вот кто. Из жарких мест. Вы с севера, они с юга. И тоже приходите по очереди, как Даждь-бог и Жаждь-бог. Полгода одни, полгода другие.</p><p class="p1">Он не стал ее переубеждать, подумав, что со временем напишет занятное эссе о праязыческих верованиях — это будет открытие поинтереснее Аркаима, и счастье, что ему встретилась дочь волка. Прочие губернаторы жили рядом с туземцами, но не замечали их, как не замечают деревьев; он первый вгляделся в таинственное расположение ветвей. Аша знала туземный язык, который и ему казался смутно знакомым — и то сказать, большинство слов совпадало с русскими или отличалось парой букв, но смысл был совершенно иной. «Это все вы сделали, потому что просто переняли. Вы половину слов неправильно говорите. Это вот что такое?»</p><p class="p1">— Кресло, — говорил он ласково, потакая ее выдумкам. Наверняка сама все придумала, вообще была хитрая, и очень может быть, что даже история с захватчиками — плод ее собственного воображения. Замаскировала под народное, как делают многие стихийные таланты — Шевченко, кажется…</p><p class="p1">— Вот видишь. Кресло — это когда две дороги в лесу крест-накрест, а совсем не это. Это потолок, в нем сидят. Стул — толокно, а кресло — потолок.</p><p class="p1">— А вот это что такое? — указывал он на потолок.</p><p class="p1">— Небо, — удивлялась она. — Это же так просто: во рту нёбо, свод рта, как бы крыша… Все, что сверху, любая граница верха — небо. Потому что дальше небо: нет больше, стой.</p><p class="p1">— А пол? — спрашивал губернатор.</p><p class="p1">— Пол — половина, и мужчина, и женщина — все половины. А то, что внизу, — это недо. Нет дальше. Небо и недо, а не пол и потолок. Но ты все равно не выучишь, уж и наши-то почти все забыли. Только волки помнят, но их мало.</p><p class="p1">Она рассказывала ему, что все самые священные слова они, захватчики, объявили запретными, грязными, хотя знаменитое трехбуквенное, которым исписаны были все заборы, — слово волшебное, призывное: в нем слышится вой западного ветра, его призывают волки, когда нужно принести удачу или унести врага; убийство запрещено волкам, туземцы на него неспособны, и когда крикнешь волшебное слово — западный ветер сам примчится и все за тебя сделает. Волчий вой тоже похож по звуку на это слово. Правда, в последние годы, после того, как захватчики сменяли друг друга все быстрей, — старое заклинание не действовало и ветер приходил только к немногим избранным. «Даже я не всегда могу вызвать», — грустно признавалась она. Губернатор хохотал. Это объясняло, конечно, почему все заборы и лифты были исписаны древним заклятием, — и ветер с Запада в самом деле неутомимо приносил в Россию новые и новые бесполезные заимствования.</p><p class="p1">— Ну хорошо. А как же тогда называется это самое?</p><p class="p1">— Это самое? — В голосе ее он различил почти презрительные интонации. — Это не называется.</p><p class="p1">Если верить ей, язык прошел через два фильтра — сначала его осваивали северные захватчики, потом непонятные степняки, и ни те, ни другие не знали настоящего значения слов, не желая снисходить до изучения туземной речи. Это было туземцам даже на руку — их настоящей речи почти никто не понимал; но поскольку захватчиков становилось все больше, а коренное население истреблялось все неутомимее, — скоро носителей языка осталось раз и обчелся. Спасение туземцев было в том, что захватчики истребляли друг друга, все чаще отвлекаясь от главного своего дела — порабощения несчастного коренного народа и сведения его численности к штатному расписанию необходимой прислуги.</p><p class="p1">— Ата, что ты говоришь! — начинал он сердиться по-настоящему. — Что за чушь позорная. Что плохого ты видишь от меня? Я ведь обидеться могу, в конце концов.</p><p class="p1">— Я — ничего. Но я ведь не все, верно?</p><p class="p1">— Может, мне гарем набрать? Чтобы уже всех облагодетельствовать?</p><p class="p1">— Шутишь все, шутишь, — грустно говорила она.</p><p class="p1">— Какие шутки! Ты говоришь, что захватчики вас только и морят. Во-первых, грязь и тупость, лень и пьянство — это все никак не захватническое, это ваше собственное, и посмотри толком на то, что с вами стало…</p><p class="p1">— Это вам — лень и тупость! — вскидывалась она. — Мы так живем! Нам не надо работать, как вы. Ваша работа — убийство! Вы все убиваете, что трогаете. Мы иначе работаем. Нашу работу не видно.</p><p class="p1">— Ага. Даждь-бог подает, а хуй приносит.</p><p class="p1">В эту секунду за окном резко и внезапно подул ветер. Аша вскочила, подбежала к раме, распахнула окно и зашептала что-то.</p><p class="p1">— Закрой окно немедленно! — закричал губернатор.</p><p class="p1">Аша гневно обернулась:</p><p class="p1">— Никогда зря не говори это слово! Особенно когда волк рядом. Видишь, ты не волк, ты простой человек, а и то подействовало.</p><p class="p1">— Я его миллион раз говорил в разных обстоятельствах, — улыбнулся губернатор. Он не умел долго на нее сердиться, и слишком она была хороша у окна, вся белая, длинная, тонкая в свете уличного блеклого фонаря.</p><p class="p1">— То не при мне было. А при мне не смей.</p><p class="p1">Случайные порывы ветра пугали ее, в дождях она видела приметы, считывала морзянку веток, стучавших в стекло. И, наверное, что-то заговаривать она действительно умела: у губернатора в ее присутствии сразу проходили насморки, терзавшие его, случалось, по две недели; вот голова у него почти никогда не болела, давление космонавтское, сказывался спорт (велосипед, гребля) — он никак не мог по-настоящему занедужить, чтобы проверить ее знахарские способности. Зато однажды отправился с ней в лодке через Камыш-озеро, показать, как гребут настоящие мастера, — поднялся ветер, разгулялась волна, и ей долго пришлось шептать что-то, уговаривая воду. Губернатор знай смеялся — ему не привыкать было грести по бурной воде, а лодка была хорошая, крепкая, — ему ли было не выгрести! Правда, в какой-то момент ему и впрямь показалось, что ветер чересчур разгулялся, не опрокинуться бы, — но инстинкт самосохранения, предупреждал тренер, был у него несколько занижен, и он быстро успокоился. И почти сразу успокоился ветер — до того берега, знаменитого диким малинником, они доплыли как по зеркалу.</p><p class="p1">— Ваша работа — она вся без смысла, — сказала она как-то. — Вот работаешь ты. Я же вижу — работаешь. За столом сидишь, глаза портишь. Бумаги перекладываешь, как большой. А толку?</p><p class="p1">Губернатор знал, что от его работы нет никакого особенного толку, но знал и то, что он государственный человек. Главной чертой всякого русского государственного человека была способность не думать о последствиях, не представлять себе временную перспективу, ограничиваясь ближайшим будущим: если задуматься о дальнем — неизбежно встанет вопрос о смысле, а русский государственный человек тем и отличался, что прекрасно знал о его отсутствии. Способность работать в отсутствии смысла как раз и была главной особенностью русского государственника, слова «государственное» и «бессмысленное» выступали синонимами, это было азбукой для всякого чиновника на известной ступени умственного развития, а в военных академиях, на богфаках, это, говорят, излагалось в специальной дисциплине. Само понятие смысла пришло из позитивизма, из французского просвещения, оно считалось подлым хазарским порождением — да им, в сущности, и было. Истинно русскому чиновнику не полагалось задумываться о причинах и целях — и чем бесцельнее, бессмысленнее было дело, тем с большим жаром чиновник отдавался ему. Сейчас, во время войны и почти повальной нищеты, которую нельзя уже было залить никакой нефтью, губернатор регулярно получал предписания улучшить работу сельских музыкальных школ (которых в подведомственных ему волостях вообще не было), организовать для крестьян лекции о пользе подсолнечного масла (как будто крестьяне готовили на чем-то другом!) и установить во всех присутственных местах анемометры, регулярно снимая их показания; все эти мероприятия были бы, возможно, уместны в невыносимо процветающей стране, где все настолько хорошо, что уж и не знаешь, чем занять руки свободного и пресыщенного населения: уж и то у нас есть, и этого избыток, только что анемометры не везде еще поставлены! Истинное же величие, граничащее с героизмом, было именно в том, чтобы во времена всеобщего упадка вдумчиво заботиться о том, в чем нет никакого смысла; высшая воинская доблесть не в том, чтобы правильно рассчитать атаку и сберечь максимум людей, а в том, чтобы отважно положить всех. Положим, с этим варяжским воинским максимализмом губернатор спорил, вызывал даже пару раз губернского военкома с тем, чтобы тот не греб в строй хотя бы явно увечных, а то уж и одноногие жертвы дребезжащих городских трамваев дважды призывались в течение прошлой осени; положим, сам Алексей Петрович был цивилизованный государственник, — однако в том, чтобы удалить из государственной деятельности последние остатки смысла, он тоже видел некую грандиозность. Старайся, не старайся — результат один; все прагматические правительства кончали хуже бессмысленной северной державы. Европа выродилась, исламизировалась, Штаты бесперечь воевали — а сколько было смысла, рацеи, взвешенных подходов! какая гордыня! Россия продолжала вариться в своем черном нефтяном соку именно потому, что местные государственники отрицали саму идею рационализма: государственный муж постигает необходимость интуитивно. Именно поэтому государство на переломах своей истории позволяло себе заниматься литературой, благозвучием в музыке, Павел Первый лично регламентировал, на какую сторону закладывать известный орган, когда лосины надевались в обтяжку… Вопрос «зачем?» да «на что?» был особенно любим коренным населением: лишь бы ничего не делать! Нет, работа, только работа, без цели и смысла, труд ради труда, сугубое монастырское послушание: вот основа северной, истинной государственности. Пора забыть подлое либеральное заблуждение насчет того, что государство служит народу и нанимается им, как жилконтора или пекарня. Государство никому не служит, оно само себе цель и никому не дает отчета! В чем цель Бога? Человек тем и отличается от зверя, что способен заниматься вещами, не приносящими немедленной выгоды, — а лучше бы не приносить никакой, ибо выгода есть понятие хазарское, мелочное, вечная торговля со Всевышним. Я тебе так, а ты мне за это так. Нет! Я тебе так, и так, и так — а ты мне, если хочешь, никак, ибо в монастырях не спрашивают, зачем. Сказано тебе сажать редьку хвостом вверх — и будешь сажать, ибо не здравомыслие твое подвергают проверке, а послушание. Этого из губернатора было не выбить. Он не вовсе отрицал прагматизм, но ашино «А толку?» вывело его из себя.</p><p class="p1">— А о толке не тебе судить, — ответил он грубо.</p><p class="p1">— Да мне что, мучайся, пожалуйста, — сказала она ласково. — Вот все вы такие: сказали вам, что надо работать, — вы и работаете, как белка в колесе. Ну бегает она, и зачем?</p><p class="p1">Он понял: Аша ревнует. Назавтра ему надо было на два дня лететь с докладами в Москву, вечером присутствовать с депутацией прочих губернаторов на очередном открытии сезона — давали «Лебединое озеро», русский балет, символ русской государственности, очередной триумф бессмысленной дисциплины. Если вдуматься, государство и есть балет, только на войне все статисты погибают, отрепетировав перед этим несколько тысяч раз балетный строевой шаг; строевые парады на Красной площади давно уже больше походили на балет, чем на воинские мероприятия…</p><p class="p1">— Я же вернусь скоро.</p><p class="p1">— Да ладно, — она махнула рукой. — Лети, я с тобой не набиваюсь.</p><p class="p1">— Ты прекрасно знаешь, что я не могу тебя взять.</p><p class="p1">— Я не про то… Вот сам посмотри: ты губернатор, ладно. Но при тебе двадцать человек — помощники, вице-помощники, еще какие-то помощники… Что они все тут делают? Ты погоди, — перебила она его, и в глазах ее светилась ласка, мигом погасившая вспыхнувшее было губернаторское раздражение: если она получила доступ в резиденцию и видела, как все они работают, — это был, в конце концов, не повод, чтобы глупая девятнадцатилетняя туземка судила о государственной необходимости. — Я понимаю, что не мое дело. Но хоть раз сам себя спроси: тебе надо заместителя, чтобы я любила тебя? Чтобы слушалась тебя?</p><p class="p1">— Аша, — усмехнулся он, — я не могу спать со всей губернией.</p><p class="p1">— Тебе не надо с ней спать. Но если бы вы не были захватчики — для чего тебе было бы столько людей, столько солдат? Разве то, что все вы делаете, — не пустое? Кому хорошо от твоей службы, от которой тебе одно расстройство и Москве твоей никакой выгоды? Вы не умеете главного, вы не можете заговаривать, не умеете плавать.</p><p class="p1">— Не можем чего? — переспросил он.</p><p class="p1">— Плавать. Вы и слова не знаете. «Работать» — это вы придумали. Раб работает, он подневольный, у него палка вместо совести. Вы и сами работаете, как рабы, потому что все тут не ваше. Вы воинственное племя, где вам плавать на земле? Вас земля не слушает, вы не умеете с ней. Вы ее душите, ковыряете, режете почем зря — разве она будет так родить? С землей надо разговаривать, вот так, — она подошла к окну и стала что-то шептать цветам: чахлой фиалочке, непременному бюрократическому столетнику, словно олицетворявшему вечность власти… Ничего не происходило.</p><p class="p1">— И что теперь будет? — злорадно спросил губернатор.</p><p class="p1">— Погоди, вот будет весна, я покажу тебе, как плавают. К бабке не повезу, нельзя — это тебе, как мне в Москву: не положено. Но съездим на поле, посмотришь.</p></span><span id="id53"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Этот разговор у них был осенью, а весной, в конце апреля, Аша напомнила ему свое обещание.</p><p class="p1">— Поедем, покажу тебе, как плавают.</p><p class="p1">Весна была теплая, ранняя, и близился День Жара — его полагалось отсчитывать от какой-то природной приметы, ведомой только волкам. Губернатор отвез Ашу в летнюю резиденцию, приказав ее расконсервировать: дом был скромный, отапливался плохо, зимой он туда не ездил. Дача как дача, не лучше остальных. Чиновничество в последнее время не слишком жировало: украсть было давно уже нечего.</p><p class="p1">— Отошли всех. Никому не надо видеть.</p><p class="p1">Он отдал распоряжение, прислуга отбыла в город, осталась только охрана у въездных ворот, от которой он не мог избавиться, даже если бы хотел.</p><p class="p1">В полночь Аша накинула халат, велела ему одеться и вышла с ним в холодный прозрачный сад, где едва проклюнулась первая зелень. За дальнейшее он бы не поручился — вероятно, она и впрямь была старого шаманского рода и знала темные гипнотические практики; волнообразно взмахивая руками, плавно кружась и приседая, Аша обращалась к земле, деревьям, кустам со страстной и вместе виноватой проповедью, словно просила их об одолжении:</p><p class="p1">— Уж вы старайтесь, уж вы старайтесь. Оболонь, посолонь, толоколь, охолонь, расти, кусти, усти, пусти, выстынь, росстань, пустынь, вестынь. Размелись, земля, зазмеись, земля, разлети, замети, выползень, вызелень. Росла зелена, трусла пелена, мелет, мелет, зеленит, белит. Шепотом, ропотом, опытом, копытом: выбелом, выделом, выпалом, выгулом… Плавься, плавься, славься, славься! Стройся, ройся, бойся, кройся! Встал, встрял, сдал, взял: брошенное, ношеное, прошеное, кошеное…</p><p class="p1">Все это сопровождалось странными, плавными движениями на все четыре стороны: вся она извивалась, колыхалась, притягивала и отбрасывала что-то, — и губернатору уже казалось, что в одном ритме с ней покачиваются березы и яблони; ночь запомнилась ему двухцветной, черно-зеленой, — зеленела звезда в небесах и вода в пруду, зелень словно прорезывалась сквозь черноту, как острый лист травы проклевывается сквозь почву, и сам воздух грезил будущей листвой; Аша продолжала что-то бормотать, словно из Хлебникова, изгибаясь, змеей бросаясь вправо и влево, то клонясь к земле, то вытягивая к небу руку в широких, спадающих рукавах; то вскрикивала, то шептала, то умоляла, то требовала, — так что и сам губернатор не мог ничего разобрать, хоть стоял в двух шагах. Одно время, казалось, у нее с незримым собеседником начался торг; она переспрашивала, качала головой, один раз даже топнула ногой, — но поклонилась и продолжала спокойнее. Скоро шепот ее стал ласков, колыбелен, — губернатор почувствовал, что и его неумолимо клонит в сон; а она все продолжала свои плывущие, легкие движения, отгонявшие холод, нагонявшие сонное тепло. Плавился воздух, плавилась и плавала луна в небе, приплясывая, корча рожицы — такой губернатору часто снилась луна его детства, особенно в полнолунье, когда он лежал в кровати у самого окна и не знал, спит или бодрствует: она ныряла, подпрыгивала, подмигивала… У них с луной был заговор, оба не спали — она смотрела на него дружелюбно и покровительственно, как на младшего брата; теперь та же детская разноцветная луна, медленно и задумчиво меняя цвета с красного на голубой, с голубого на желтый, — кувыркалась в апрельском небе, свободно плавала с Запада на Восток; наконец, после часа камлания, Аша покачнулась, и губернатор еле удержал ее — она повалилась к нему на руки, не в силах держаться прямо. Так он и отнес ее в дом, а утром она разбудила его ликующим смехом:</p><p class="p1">— Посмотри! Говорила я, а?</p><p class="p1">Холода этой ночи оказались последними, черемуховыми. Вокруг губернаторской беседки зацвело все, что могло цвести: сирень, которой в этих краях выпадал срок еще только месяц спустя, огромный старый черемуховый куст, посаженный на этой госдаче еще при советской власти, и все шесть вишен губернаторского сада. Никакими чудесами погоды объяснить это было нельзя.</p><p class="p1">— И… ты можешь это делать каждый день?</p><p class="p1">— Нет, только перед Днем жара. Мы все эти дни плаваем. Сам же видишь — земля плавится, вода плавится…</p><p class="p1">И точно: вокруг него дробилась, плавилась, золотилась весенняя вода, растворившая солнце. От земли шел пар, в нем мелькали и тут же таяли голубоватые фигуры, сгущения, призраки, Аша носилась по саду и хлопала в ладоши. Никогда он не видел ее такой счастливой.</p><p class="p1">— Удалось, все удалось! Урожай будет — пять лет такого не было!</p><p class="p1">Он и тогда, конечно, не поверил в ее способности. Земля не могла послушаться туземки, хотя бы и самого древнего шаманского рода. Это был отголосок древней местной сказки — о том, что ничего не надо делать самому, скажешь волшебное слово — все и сделается; местный герой никогда не работал, ограничиваясь заклинаниями. Аша страшно обиделась, когда он напомнил ей про Емелю, про Фому и Ерему и дюжину других персонажей, не знавших труда.</p><p class="p1">— Вам надо тут работать, потому что это не ваша земля! Нам — не надо, нас она и так слушается.</p><p class="p1">— Но позволь, — рассердился он, — во всем мире люди живут на своей земле, и им приходится пахать, как милым!</p><p class="p1">— Где? — Она сузила глаза и посмотрела на него с девчоночьим ехидством. — В Америке? Те, что там раньше жили, не то что плуга, а колеса не знали — и земля им давала все! Во Франции? Там тех, кто умеет с землей договариваться, человек пятьдесят осталось! Но у них хоть захватчики давно по местам расселись, они за тысячу лет успели почувствовствовать, что вот — их земля! Привыкаешь, с чем хочешь сродниться можно, вот она и начинает понемножку у них родить, потому что уже своя! А у вас — когда привыкнуть? Вы друг с другом никак не разберетесь, то одни, то другие — вот вам и приходится ее ковырять. Те-то вообще ничего не умеют, да и вы, правду сказать… С ней надо говорить, а чтобы она понимала — язык знать, а чтобы язык знать, не захватывать надо, а нас слушать.</p><p class="p1">Он еще раз поразился тому, как строго продумана эта мифология, как все в ней гармонично и пригнано одно к другому: два бога, два захватчика… И как два бога не позволяют разомкнуть круг, устремившись по линейному пути, — каждый сводит на нет завоевания предыдущего, то усыпляя, то пробуждая природу и всякий раз возвращаясь к исходной точке, — так и два чередующихся захватчика снимали с туземцев всякую ответственность, направляя их историю по вечному кругу. Конечно, все это было частью одного мифа — и двоебожие, и двоевластие; от народа при таком раскладе в самом деле ничего не зависело, а вечная его лень и безразличие к собственной судьбе обретали окончательную легитимность. Можно было ничего не делать, если в свой час Бог Жара сменит Бога Дыма, а захватчик-северянин сменит южанина, а после зимы настанет лето: от человека здесь ничего не зависело, он мог и не работать, если вовсе уж отстал от человечества и больше всего полюбил кроткое полусонное забытье. Удивительно пассивный народ, чистые моэмовские туземцы, ленивые, хитроватые, только на то и способные, чтоб ударить исподтишка. Ленивое, праздное племя, не знающее дисциплины. Стыд ему за минуту слабости, когда он уж почти готов был поверить, что с землей можно договориться чем-то, кроме плуга, а с туземцем — чем-то, кроме палки.</p></span><span id="id54"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Из того, что она рассказывала, мало-помалу вырисовывалась следующая картина. Их племя, не знавшее письменности и не желавшее ничего записывать («потому что все и так есть, и всегда будет — зачем же сохранять?»), жило в этих краях с незапамятных времен, рассеявшись по огромной территории. Волна, по неразумию захватчиков писавшаяся Волгой, и Дон, и Нева, за которую к северу селиться было нельзя, потому и не ва, не ваша земля дальше, — все было их собственностью, их заговариваемой и свободно родящей землей, на которой стояли печки-самопеки, яблони, клонящие ветки долу под тяжестью даровых плодов, и вся земля была сплошной скатертью-самобранкой, не требовавшей ухода: бери не хочу. Она кормила их вольно и щедро, без принуждения, как мать кормит сына, как корова поит телка, — и длился этот золотой век, пока не набрели на них степняки, не знавшие никаких ремесел, но умевшие столь хитро и изобретательно торговать плодами чужого труда, что вскоре все чувствовали себя их должниками. Главное, учили они, — не работать, но отобрать и продать, не сделать, а рассказать, и мир держится не теми, кого слушается земля, а продажей и обменом, да таким, чтобы главная выгода досталась посреднику. Кроткое коренное население покорилось им без спора, да так, что влезло в вечную долговую кабалу, из которой не было выхода; и как это сделалось — объяснить никто не мог. Да и то сказать, сколько ни читал губернатор туземных сказок в собрании Афанасьева — все были о том, как у добра молодца хитрым обманом выманили его победу: побеждать добрый молодец умел, и то все больше добротой да простотой, — а отстоять отобранное и оборонить отвоеванное никогда не мог. Мудрено ли, что в конце концов от мягкого степняцкого ига туземному населению захотелось другой власти? В степняках губернатор не без легкого изумления признал ЖДов; он догадывался, конечно, что русский народ не любит хазар, но что вражда эта уходит корнями в столь глубокую древность — понятия не имел. Официальная историография утверждала, что ЖДы пришли на русскую землю не ранее восемнадцатого века, после очередного раздела Польши, а до того князь Владимир настрого запретил им даже приближаться к границам, отчего Россия и выстояла, не поддавшись бесовскому влиянию, погубившему Европу; хазары порывались, конечно, присваивать наши коренные земли — но с тех пор, как им радикально отмстил вещий Олег, о них не было ни слуху, ни духу. Правда, ЖДы упоминались в послании Минина, но мало ли кто приперся тогда на Русь с ляхами! Из сказок Аши выяснялось, что хазарское иго было прежде монгольского — да, пожалуй, и пострашней; из дальнейших рассказов Алексей Дмитриевич с ужасом понял, что в темной народной памяти все перепуталось и монголы давно уже были тождественны степнякам — собственно, и на поле Куликовом хазар бился с русским; но печальнее всего было ему сознавать, что и русские были тут, судя по всему, пришлыми. Аша столь решительно отмежевывалась от них, что это не могло быть ее личным заблуждением, собственной фантастической выдумкой: речь шла о чем-то гораздо большем, о древнем и общем предрассудке. «Ты не наш, и грех мне, что я полюбила тебя», — повторяла она; напрасно губернатор поначалу убеждал себя, что у этого странного племени всякий личный проступок отчего-то приобретает черты национального предательства и всякая любовь к чужаку преображается в любовь к захватчику. Аша считала его представителем чуждого племени. «Посмотри на себя — разве ты наш? У тебя и руки не те, и глаза не те. Оттого я так и люблю тебя».</p><p class="p1">Так, в изложении Аши, и выглядела вся русская история: коренное население отчаялось умилостивить хазар и, стеная под их каббалой (слово «кабала» тут же получило исчерпывающее объяснение, — то-то зря лингвисты ломали над ним голову!), обратилось к воинственному северному племени, кочевавшему поблизости и собиравшему дань со встречных: вы воины, придите, выгоните хазар! Те пришли и выгнали, и пожгли хазарскую столицу, и принялись княжить сами — да так, что коренное население взмолилось о пощаде и заплакало по хазарам. На смену так называемому призванию варягов, о котором русская историография сообщала подробно и со вкусом, случилось призвание хазар, о котором оная историография по понятным причинам молчала; то, что получило название ига, было не чем иным, как возвращением хазарства по личной просьбе коренного населения. Иные князья, объявленные потом предателями, прибегали к помощи татар вовсе не ради братоубийства, и искали союзничества степняков не в усобицах — они звали хазар на Русь, чтобы сместить ненавистное северное иго. Под северянами оказалось не легче, чем под хазарами: они не торговали, брали не хитростью, не уговорами, а грубой военной силою, — и вместо того, чтобы дать несчастному коренному населению тихо работать на родной земле, принялись вербовать его в свои косматые дружины. Коренное население воевало плохо, а потому варяги кидали его в бойню, как дрова в печку: воевать не всякий может, но умереть ума не надо. И шли, и умирали, и завоевывали ненужные земли, — а те, кто мог еще бежать, подавались дальше, в бега, в леса, прочь от родной плодородной земли. Так осваивали они сырые пустоши, за которыми нет жизни, холодные снежные пространства, где, чтобы уговорить землю вырастить хотя бы луковку, приходилось часами отогревать ее собственным убогим теплом; так уходили они в горы, на каменистую почву, отродясь не родившую ничего, кроме волчцов и терний; так забирались во мшистые и каменистые леса севера, откуда даже варяги сбежали, отчаявшись договориться с неплодной, болотистой землей, — и часами, днями, месяцами вымаливали у нее росток, клубенек, ягодку. Не в силах стряхнуть варяжское иго, туземное население разбегалось — и скоро в Сибири начинал произрастать дикий лук, леса заселялись ягодой, из болот проклевывались кислые стебли щавеля.</p><p class="p1">— Слушай, — не выдержал губернатор. — Почему вы терпели это иго? Почему вам было не сбросить его?</p><p class="p1">— Да ведь мы не по этой части, — изумленно ответила Аша. — Плавать — мы, договариваться — мы. Но воевать — как воевать? У нас силы на это нет.</p><p class="p1">— То есть, ты хочешь сказать, у вас нет воли?</p><p class="p1">— Воля — наше слово, — ответила она упрямо, — воля — это то, что у волков. У волков есть, но волков сколько? Пять, много шесть из ста. Можем и мы, вот Олега ихнего смогли. Он наших волков встретил, они ему и сказали волчье слово. От волчьего слова смерть где хочешь настигнет, это никогда не ведомо. Может, от коня, а может, шишка на голову свалится: от волчьего слова нет спасения. Но волков мало, а народу еще много было. Что же мы могли? Вот и расходились. А на иное и у волка воли нет. У меня вон сколько воли, а я с тобой. Есть и на меня сила.</p><p class="p1">— И вам проще было сбегать в леса и болота, и договариваться с этой землей, чем один раз как следует вломить степнякам?</p><p class="p1">— Да как же им вломишь, — тоскливо говорила Аша. — Мне булочку убить трудно, а ты говоришь — вломить.</p><p class="p1">— Булочку? — переспрашивал губернатор. Все-таки иногда, лунными ночами, ему становилось страшно с ней: существо из другого, вовсе чужого мира лежало рядом.</p><p class="p1">— Курицу по-вашему, — поясняла она со вздохом. — У нас курица — тот, кто курит, костер палит.</p></span><span id="id55"><div class="title5">
<p class="p">4</p>
</div><p class="p1">Так и шло чередование. Губернатор четко прослеживал народную версию истории по легендам и притчам, хранившимся в путаном сознании Аши: конечно, одному человеку было не под силу выдумать целую мифологию. Варяги и хазары чередовались с почти математической ритмичностью: раз в сто лет они устраивали побоища и мутузили друг друга. Собственно говоря, побоища устраивались иногда и без их участия: приходила пора — и в России случалась революция, но и она никогда не кончалась ничем, потому что превращалась в обычное северно-степное побоище. Вместо того, чтобы освободить коренное население, она отбрасывала его назад на очередной виток, и все приходилось начинать сызнова, чтобы вновь дойти до точки неразрешимости; все вскипало, выкипало и снова кончалось ничем. Варяги и степняки использовали любой предлог, даже и внешнюю агрессию, для выяснения собственных многовековых отношений; кто бы ни нападал, они принимались истреблять друг друга, а воевать в конце концов приходилось коренному населению, которое хоть и обучалось кое-чему, но по-прежнему ужасно мучилось, нажимая на курок. Умирать им было проще, чем убивать. Были, конечно, попытки разделить Россию — так, чтобы отдать половину варягам, а половину степнякам, но терпеть друг друга рядом они никак не были готовы. Первую такую попытку предпринял Иван Красный — Грозным его, кажется, прозвали варяги, потому что это звучало красивее, а Красным он был провозглашен по причине своей кровавости. Красный отдал опричнине лучшие земли, а прочее выделил земщине, — но и этой мерой ничего не добился, ибо сосуществование было немыслимо. Когда с разделением не выгорело, Красный задумал помириться с хазарами, приблизил степняка Курбского — но и того пришлось удалять, и переписка их дышала неподдельной взаимной ненавистью. Хазары вечно отстаивали свободу — хотя это почти всегда была свобода подыхать голодной смертью; северяне отстаивали долг — хотя это всегда был долг подыхать за других; коренное население чувствовало краткую передышку лишь во время очередной стычки — и потому каждой революции ждало с надеждой, хоть и знало, что никакой свободы им это не принесет: «Просто, пока вы раз в сто лет друг друга колошматите, нам вздохнуть можно».</p><p class="p1">— А как же смутное время? Когда людей ели?</p><p class="p1">— А вот это самое страшное было. Мы тогда и поняли, что — навсегда. Нельзя прогонять. Это же как было? И тех выгнали, и этих. И даже одно время сами хотели. А земля родить перестала, и снег летом выпал. Ой, не говори. — Она рассказывала обо всем так, словно помнила, сама брела по вымерзшему полю неведомо куда, сама побиралась по избам, словно бесприютность была в ее генах, в самой природе, — потому и песни ее всегда были так тоскливы. — Ой, страшно было. И опять северных позвали. А после уж…</p><p class="p1">— Постой. Так у тебя получается, что Петр был хазар?</p><p class="p1">— Он самый и был степняк. Ты посмотри на него: он не ваш, не северный.</p><p class="p1">— Тьфу, глупость. Он же немцев привел!</p><p class="p1">— Да не таких немцев, не всяких, — объясняла она. — Он привел тех степняков, которые на север бежали. Они потом по всей Европе ходили, жили там… Ты посмотри, кого он привез: все рыжие, все голубоглазые. А русских он не любил. Почти всех извел. То-то и бунтовали.</p><p class="p1">— Господи, Аша! И Меншиков, стало быть, степняк?</p><p class="p1">— Степняк, — убежденно говорила она. — На севере и помер сразу.</p><p class="p1">Дальше слушать этот бред было ему невмоготу… но какой-то червь продолжал его точить: чередования оттепелей и заморозков в точности напоминали качели, на которых Даждь-бог и Жаждь-бог летали в своем неподвижном, ровно освещенном, плоском пространстве. И конфликт свободы и долга прослеживался на каждом шагу… Боже мой, но он ведь и везде прослеживался! Я тебе хоть сейчас по этому признаку любое сообщество разделю, вон и в Каганате ссорятся… просто в прочем мире есть скрепы, которые удерживают людей вместе помимо и поверх этого зловещего раскола; есть закон, есть Родина, в конце концов… Сколько ни делись, а все же «единой матери сыны». В том-то и штука, что в России сторонники свободы и долга, личного и надличного не были сынами единой матери. Их не устраивало сожительство — им непременно надо было уничтожить друг друга; и странная народная версия — насчет двух захватчиков — была еще не худшим объяснением. Туземцы явно не воспринимали власть как свою, да и то, что сам он называл их туземцами, колонизируемым населением, — явно было неспроста; он старался гнать эти мысли, и это тоже роднило его с Ашей. Кое-какие мысли отгоняла и она.</p><p class="p1">— Скажи, — спросил он ее как-то в сухой, ломкий осенний день, незадолго до последнего Дня дыма, когда она прощалась с летней дачей и помогала растениям погрузиться в зимний сон — нашептывала что-то, уговаривала, утешала. — Скажи, но ведь вечно этот ваш круг не может продолжаться? Должны когда-то иссякнуть запасы, надоест, в конце концов…</p><p class="p1">— Мы про это не думаем, — сказала она ровно, но он почувствовал, что Аша насторожилась.</p><p class="p1">— Ой, не глупи. Жить и не думать о смерти — это, прости, детство. Ты же не хочешь оставаться вечным ребенком, как все ваше племя?</p><p class="p1">— При чем тут дети? Про смерть мы знаем, смерти не боимся. После нас будет, как при нас. Это уж мы должны сделать.</p><p class="p1">— Но вечного ничего нет, пойми. Посмотри на это ваше коренное население, оно же все теперь — как васьки. Ни работать, то есть прости, плавать, конечно, — ни думать, ни жить… Не бывает бесконечной деградации, должно быть и дно…</p><p class="p1">— Так ведь деградация — это по-вашему. А по-нашему — это все к лучшему. Васьки — они тоже не просто так. Васьки — как волки, даже и повыше, иные думают.</p><p class="p1">— А. Понял. Местные юродивые. Вонюченькая святость.</p><p class="p1">— Думай как знаешь, — ласково сказала она.</p><p class="p1">— Ладно, я не про них. Ты мне объясни: представление о конце времен в вашей религии бывает? Не бывает религий без учения о конце света, это закон. Вырождение — такая вещь, оно невооруженным глазом видно…</p><p class="p1">— Ну так и у вас вырождение, — ответила Аша, поднимая на него огромные карие глаза. — Вот на себя посмотри: многих ты туземцев до смерти запорол? Некоторых даже из тюрьмы выпустил, кто батон украл или что… Васек при тебе не очень ловят, не трогаешь их… Со мной всегда хороший, я не могу жаловаться на тебя… Значит, и ты уже не очень северянин, государственный человек. Разве я любила бы тебя, если бы…</p><p class="p1">— Нет, нет, конечно. Это вполне в русле ваших представлений, — сказал губернатор, в душе впервые усомнившись в допустимости союза с туземкой. Может быть, тут и впрямь был признак деградации? Если судить по Моэму, с туземками жили все губернаторы, — но это были времена вырождения империи; достаточно вспомнить, чем дело кончилось…</p><p class="p1">— Что, если я уйду от тебя? — спросил он однажды, шутки ради. — Я вспомнил рассказ, старый, про туземку и чиновника. Она его любила и прокляла. Он отплыл в Англию, жениться на богатой, и едва корабль отвалил от берега — у него началась мучительная икота. Икал день, два, три, а через неделю умер, потому что не мог ни пить, не есть. Скажешь какое-нибудь волчье слово — и что со мной будет?</p><p class="p1">— Не скажу я тебе волчьего слова, — ответила Аша, плача. — Если захочешь жениться, иди куда хочешь, у нас не бывает так, чтобы за это проклинать…</p><p class="p1">Тут он и понял окончательно, что никогда, никуда не уйдет; что сильнее, чем похотью, она привязала его жалостью, что стоит ему представить ее оставленной, тихо плачущей, молча все терпящей — как он бросит все, любой долг, любую государственную необходимость. Может, долг еще и не бросит, утешил себя губернатор. Но женщины, которая сумела бы его переманить от Аши, — нет в природе. Здесь тоже долг, тоже преданность… разве что государственная необходимость — но какая же государственная необходимость в том, чтобы им не быть вместе?</p><p class="p1">— А ты меня не оставишь? — спросил он.</p><p class="p1">— Не оставлю.</p><p class="p1">— Даже если бабушка скажет?</p><p class="p1">Аша вскочила и уставилась на него с ужасом.</p><p class="p1">— Почему бабушка скажет?</p><p class="p1">— Мало ли. Иногда бабушкам не нравятся внучкины женихи. Что такого, что ты всполошилась?</p><p class="p1">— Не знаешь ты, — выдохнула она, — не знаешь. Если мне с тобой нельзя — значит, все; тут и волчье слово не спасет.</p><p class="p1">— И что, уйдешь?</p><p class="p1">— Тут уж уходи, не уходи. Тут уж конец, — и больше он не добился от нее ни слова.</p></span><span id="id56"><div class="title5">
<p class="p">5</p>
</div><p class="p1">— Уходить мне надо, — сказала она, едва он вошел; она ждала в кабинете, стояла у окна, высматривала его.</p><p class="p1">— Погоди, погоди. Нельзя меня сейчас так огорошивать, меня и так, знаешь, только что не убили.</p><p class="p1">— Кто?! — она в ужасе прижала руки к груди; никогда он не видел ее такой потерянной.</p><p class="p1">— Какой-то васька, странный мужик. Впервые видел его. Лопотал непонятное — уезжай, уезжай… Можешь ты мне объяснить, в чем дело?</p><p class="p1">— Обо мне говорил?</p><p class="p1">— Говорил что-то. Погоди, сейчас… Да сядь ты, наконец! Почему ты света не зажигаешь!</p><p class="p1">— Не надо, нельзя свет! — вскрикнула она.</p><p class="p1">— Почему?! От кого ты прячешься? Что за ерунда, черт возьми, это мой дом, в конце концов…</p><p class="p1">— Я все скажу, все! Не сейчас, погоди. Не надо свет. Пойди сюда. Ну, что он про меня говорил?</p><p class="p1">— Говорил, чтобы я тебя оставил. Аша, это черт-те что. Я не могу разбираться в этой белиберде туземной. Мне эти ваши верования…</p><p class="p1">— Тут не верования! — застонала она. — Что ты знаешь! Говори: он сказал, чтобы ты ушел?</p><p class="p1">— Да. Он так говорил — черта с два поймешь. Говорил, чтобы я оставил тебя и уезжал, с тобой разберутся. Кто с тобой должен разбираться, что ты натворила? Покрывала коснулась?</p><p class="p1">— Какого покрывала?</p><p class="p1">— Успокойся, я просто забыл, что ты не все читала. Была такая легенда про девушку, которая коснулась покрывала богини.</p><p class="p1">— Я не касалась, ничего не касалась, — повторила она, дрожа. Губернатор обнял ее и зашептал в ухо:</p><p class="p1">— Ну хватит, хватит. Что за глупости. Пьяный дурак замахнулся топором. Он же и ударить не смог. Ты права, он еще сказал, что они убивать не могут.</p><p class="p1">— Мы не можем, да, — закивала она. — Иногда волки могут, но потом знаешь, как мучаемся? Я никогда не пробовала. Я не смогу. Мне уйти надо.</p><p class="p1">— Почему уйти, куда? Объясни ты наконец! — Он решительно шагнул к выключателю, зажег свет, и через секунду в окно влетел огромный булыжник — Аша еле успела отскочить. На пол брызнуло стекло. Внизу затопотала охрана, послышались свистки и ругань. В комнату ворвался телохранитель.</p><p class="p1">— Что, Алексей Петрович? Не ранены?</p><p class="p1">— Аша, ты как?</p><p class="p1">Она молчала, закрыв лицо руками.</p><p class="p1">— Мы эту сволочь поймаем, за ним Михалыч побежал. Как же это он, откуда? — Телохранитель шагнул к черному окну, оскалившемуся осколками. — Напротив стоял, гадина… Ну, поймаем — лично допрошу. Не уйдет, Алексей Петрович, верняк, не уйдет.</p><p class="p1">— Ко мне его, когда поймаете, — сказал губернатор. — Позовите там водителя, скажете, что мы поедем на дачу.</p><p class="p1">— Нет! — закричала Аша. — Нельзя! Нет! Только тут, только в городе!</p><p class="p1">— Черт, — устало выговорил губернатор и потер левый висок. — Ну, усильте охрану… пусть постелят на первом этаже, а ваши ребята стекла проверят. (В спальне на первом этаже стекла на всякий случай стояли не простые, а бронированные, — но покушений на власть в этом городе не было с незапамятных, досоветских времен, туземцы были известны мирным нравом и почти буддистской пассивностью). Идите сейчас, мы чай пить будем.</p><p class="p1">— Да накрыто, — сказал телохранитель. — Вы не сердитесь, Алексей Петрович, я по периметру посты выставлю… Мне уж водитель сказал — что это вы без меня-то? Ведь такое могло…</p><p class="p1">— Ничего там не могло, — сказал губернатор. — Вы не очень распространяйтесь, что я туда ездил. Это мои дела, мы сами разберемся. Аша, идем.</p><p class="p1">Он взял ее за руку. Она шла за ним вяло, безвольно, опустив глаза, еле передвигая ноги.</p></span></span></span></span></span>
