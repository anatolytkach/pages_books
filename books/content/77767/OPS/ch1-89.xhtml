<p class="p">3</p>
</div><p class="p1">Между тем у Гурова было самое горячее время. Он и так-то еле поспевал везде, а теперь и вовсе разрывался на части, и помощи ниоткуда не предвиделось.</p><p class="p1">Никаким особым всемогуществом Гуров не обладал. Он мог казаться могущественным только на фоне остальных девяноста пяти процентов своего народа, от которого, правду сказать, очень мало что осталось. И осталось бы еще меньше, если бы не пять процентов, которых обошел синдром Василенко или, по-простому говоря, национальный характер. Но таких, как он, было мало, хоть коренное население и отличалось разнообразными талантами.</p><p class="p1">Были дервиши, поэты и мудрецы; были выживальцы вроде бесполезного на вид, нежного душою рядового Воронова (нежные мальчики всегда неуязвимы, это уж закон — твердое ломается, мягкое гнется); были волки вроде Волохова, наделенные способностью маниакально думать одну мысль… Но дервиши и мудрецы не были способны ни к какой борьбе, выживальцы думали только о выживании, а волки в последнее время почему-то бывали особенно беззащитны перед любовью: влюбятся — и вот тебе маниакальная идея, и ни на что другое уже не годны. Гуров и сам знал, что последние времена близко. Сбывалось волоховское предсказание — ни один поезд не может бегать по кругу вечно. Дошло до того, что он, Гуров, вынужден был отдать приказ о ликвидации — не сразу, знамо, а в случае неповиновения, — своей, чего не бывало давно: туземка из древнего рода понесла от варяга столь же древних корней. Проглядел, прохлопал — губерния дальняя; теперь разводить их было поздно, разлучить не удалось — выход один. Воронову предписывалось поговорить с волчицей и уговорить ее вытравить ребенка; срок хоть и поздний, но волки знают и не такие секреты. Ребенку этому нельзя было рождаться никак, Гурову предписано было встать на его пути; одну задачу такого рода он уже выполнил, отправив в Жадруново волоховскую хазарку, — теперь ему предстояло любой ценой сделать так, чтобы не родился сын волчицы от потомка варяжских конунгов. Можно не сомневаться, он это сделает. Чай, сам из волков, да посильнее Аши. Он знал, что она в Дегунине, знал, в какой избе прячется, и знал, что деваться ей будет некуда. Сейчас Дегунино было под ЖДами, и в принципе он под именем Гуриона легко мог войти туда — но были еще дела перед генеральной битвой: волчица волчицей, пророчество пророчеством, а про людей помни.</p><p class="p1">Одно время он думал, что все уж, кранты — сама земля не пустила Громова с Вороновым выполнить задание. Земле Гуров доверял, как никому — да, собственно, никому и не доверял; совсем было померещился ему знак гибели в громовской неудаче, но, поразмыслив, он понял, что знак был другой. Никому нельзя перепоручать главное, его надо делать самому, и волчица Аша была предназначена ему одному. Убить ее он бы не смог — через этот древнейший запрет не может перепрыгнуть и самый сильный волк; значит, договоримся. И он знал, что договорится. У него, собственно, и вариантов не было. Вот почему Гуров готовился к генеральному сражению, — а ведь дел было по горло, не на Аше свет клином, были под его эгидой и еще люди.</p><p class="p1">Мудрецу должно бояться не тогда, когда он провидит хорошее или дурное будущее, а тогда, когда не видит никакого: собственная судьба от него скрыта, и если впереди темно — значит, что-то главное должно произойти именно с ним. Не тогда бойся, когда предчувствуешь страшное, а тогда, когда не предчувствуешь ничего. Тут бы Гурову и насторожиться, — потому что вместо привычной картинки видел он перед собой некое как бы затмение; но объяснял его тем, что все зависит теперь от главного разговора, а главного-то разговора он еще и не провел, наметив его на послезавтра.</p><p class="p1">Гуров мало, очень мало мог. И если бы нашлось кому спросить его, хочет ли он сам в очередной раз предотвратить конец своего мира, — он вряд ли нашелся бы, что ответить. Ну да, хочет; но Гуров знал цену своему миру и всем его составляющим. Он давно и с одинаковой силой ненавидел хазаров и варяг — хазарскую властность, железную хватку, тщательно замаскированную под заискивающую робость и деликатность, и варяжскую неуверенность, упрятываемую за грубостью, дикостью и хамством. В них все было обоюдно-враждебно, все противоположно и одинаково омерзительно — все их ответы на главные вопросы били мимо цели, симметрично, слева и справа от нее. Промахиваясь мимо главного, они с дьявольской точностью попадали друг в друга. Параболические траектории их перелетов и недолетов словно надстраивали воздушную крышу над тем главным, что знало и умело коренное население, — и потому Гуров мог за него не беспокоиться: что-то угрожало здесь только тем, кто брал варяжскую и хазарскую сторону. И таких хватало. Но они были самым бросовым материалом — инфицируемым, индуцируемым, неустойчивым. Прочих никогда не удавалось вовлечь в эти пошлые разборки.</p><p class="p1">Но он знал цену и коренному населению с его непобедимой инертностью, с упорным и непобедимым желанием становиться нацией — ибо у нации есть начало и конец; он знал глухую, тайную, темную живучесть, непобедимую витальную мощь своего племени, сознавал ее и в себе, и никто из них, коренных соплеменников, не мог бы причинить ему вреда, даже если бы и захотел. Он знал их преданность кругу, циклу, болезненную тягу к езде по замкнутым траекториям — сам бы давно чего-нибудь изменил, но знал, что бесполезно. Он был из этого народа, хоть и из тех немногих мутантов, которых не затронул паралич воли. Но воля волей, а во всем остальном он был из тех самых, из коренных, которые даже название свое утратили или утаили глубже, чем достигает человеческая память: славяне — название грубое, оскорбительное, долго бывшее синонимом рабства. Было и настоящее, Гуров был из немногих, кто помнил его, но вслух не произносил никогда, как не показывают людям главного сокровища.</p><p class="p1">Всю жизнь, делая карьеру в варяжской среде и не забывая светиться в хазарской, поигрывая в двойного агента, становясь своим в обоих враждебных кругах, — он искал представителей своего народа, чистых, беспримесных, не опоганенных чуждой кровью. Иногда он выделял их чутьем, полагаясь на нюх, различая в других то же ползучее, непобедимое выживание; иногда выявлял нехитрым вопросом — всем казалось, что они где-то уже слышали эту загадку, хотя ни во дворе, ни в школе слышать ее не могли; из дальних генетических глубин всплывала память о языке — но это ведь и к лучшему, что никто ни о чем не догадывался. Околок на соколок, толобок на обмолок… Гуров знал язык в совершенстве, усвоил от родителей с поразительной легкостью — скорее вспомнил, ибо истинный волк хранит в памяти всю жизнь своего народа, не нуждаясь ни в учебниках, ни в справочниках. Зачем справочник, когда все в генах? Этим языком писал Хлебников, его знал и об этом знании проговаривался Платонов — у других хватало ума не писать литературу на языке коренного населения, или по крайней мере не публиковать ее. Гуров знал тысячи стихов и песен своего народа, но не читал и не пел их — разве что использовал для паролей. Только мурлыкал иногда про себя: «Не одна в поле дороженька»… О чем? О том, что нет никакой определенности; паутиной бессчетных дорог опутана их земля, и все никуда не ведут. Дороги — главный инструмент земли: сама переводит стрелки на железнодорожных путях, сама меняет направление лесных троп. Идет человек в одно место — она его выведет в другое. Вот почему здесь никогда ничего нельзя было предсказать. Сам он был как будто в заговоре с землей и выходил, куда хотел, но кто же знает, что скажет ему волчица Аша. Спросить бы мудреца Василья Иваныча, но Василь Иваныч ходил со своей спасительницей где-то по бескрайней России, и связи с ним давно не было.</p><p class="p1">А что ж, не жалко мать с ребенком? Жалко, очень жалко. Мы люди сентиментальные. Но разве мы не помним, как это уже было? Был мир иудейский, жестоковыйный и прочный, но отроковица из коренных, из славного древнего рода, понесла от захватчика; было там избиение младенцев, но отроковица оказалась хитра, ибо волки знают будущее. Нечего придумывать про ангелов: сама все знала, схватила мужа, которому изменила, да и сбежала в пустыню, и в пустыне родила. И родился мальчик, которого потом вся Иудея не остановила, — два раза сторожи проморгали, Гуров знал, чем это чревато. Ему проморгать было нельзя. И где теперь Иудея?</p><p class="p1">Он знал и то, что уцелевшие дети золотого века выродились, ничего не могут, и от них исходит зловоние. Но не просто так озаботилась земля изоляцией этого странного оазиса: везде есть флогистон, дух истории, а у нас нет и не предвидится. Не надо нам флогистона. Мы лучше останемся в нашем зловонии: зловонного можно отмыть, завшивевшего — переодеть, а вас, зараженных историей, не спасешь уже никак. Страшный дух истории принесли вам дети кровосмесительных браков, сыновья пантеры, бродячие учителя; ну нет, мы этого не допустим. Пусть другие молятся истории и верят в прогресс; что такое прогресс? Путь смерти. Кто выдумал его обожествлять? Вероятно, те, кто надеется переждать и на руинах общества, устремившегося к смерти, выстроить свое, вовсе уже беспощадное. Гуров не знал, чего хотят бродячие учителя, люди без нации, люди нечистой крови. Они бы весь мир, дай им волю, превратили в одно сплошное Жадруново, в царствие небесное. Вот пусть и идут в свое Жадруново — не зря оно заведено на нашей территории, есть куда послать делателей истории. Нечего лезть к нам с христианством, у нас и христианство перепрело. Мы и из него сделали карусель о двух кабинках, с Даждь-богом и Жаждь-богом, с днем Жара на Пасху и днем Дыма под Рождество. Мы умеем. Зачем нам христианство? Что это за учение? Или по Европе не видно, до чего оно довело? Или не его именем жгли и грабили коренное население несчастной Южной Америки, укрывавшееся за океаном от страшного старого мира? Или не христианские миссионеры разрушали последние островки блаженной первобытной идиллии? Не надо нам этого, не смейте вторгаться, сидите тайно по монастырям, но пока живы сторожи, не видать вам моей земли. Сама земля не выпустит вас из монастырской ограды.</p><p class="p1">Гуров знал свою землю. Он понимал, чего она хочет.</p><p class="p1">Христианства он не любил уже потому, что оно победило, — а в золотом веке никто никого не хотел победить. На деле, если отбросить маскировку и демагогию, это была обычная, хоть и эффектная по-своему самурайская религия, учившая не бояться смерти — не потому, что в раю ждут девственницы-гурии, а потому, что это красиво. Нечего здесь делать. В этом мире не о ком жалеть, презрение к нему — норма, и уход из него — лучшая часть. Гуров знал, что на том свете нет ничего, как нет и никакого того света: все уходит в землю и прорастает травой. Ненавидеть мир могут только незаконные дети, сыновья захватчиков и волчиц, — а нам, коренным, мир нравится. Это дом наш. Пусть захватчики не пытаются нам внушить, что в нашем доме плохо, а в доме отца хорошо. Знаем мы этого отца, и если у него такой сын, то и дом, вероятно, не лучше.</p><p class="p1">Он ценил оппонента, конечно. Он любовался, хоть и не без злорадства, христианскими приемчиками: вот ведь, чуть дело заходит о доказательствах, о конкретных отличиях, о прямых вопросах, — начинаются разговоры о чудесах, о мистическом опыте, ссылки на нечитаемые святоотеческие хитросплетения словес, на чудо Воскресения, никем не документированное, на кусок обожженной ткани, никем толком не исследованный… Все это было у них очень хорошо поставлено. Особенно любили они ссылаться именно на Воскресение. Спросишь их, бывало, — чем Христос отличается от Сократа? Отвечают: Сократ не воскрес. Хорошо, а чем тогда Христос отличается от Озириса? Новая порция демагогии, на этот раз о моральных аспектах учения… Как они все не понимали очевидного: если их Христос учил тому, чему учил, — самая идея Воскресения должна быть ему чужда изначально! Это ведь идея природная, наша, доисторическая. Природа умирает и воскресает, и живет неизменно. А пророку истории воскресать не положено — он зовет на путь смерти, в никуда. Собственно, мир туда уже и пришел. А мы, не надейтесь, не сдвинемся.</p><p class="p1">…Плоскорылов предупреждал о своем появлении громкой, булькающей одышкой; Гуров почуял его издали. Он постучал — интимно, ласково, почти скребясь, — как гость, которому явно рады, и потому предупреждать о своем появлении — чистая формальность. Гуров поднял глаза от листка, на который выписывал схему будущих нарядов.</p><p class="p1">— Да! — крикнул он.</p><p class="p1">— Капитан-иерей Плоскорылов по собственной инициативе прибыл, — мягко улыбаясь, произнес идеолог. — Разрешите присутствовать.</p><p class="p1">— Присутствуй, коли пришел, — сказал Гуров, нехорошо улыбаясь. — По делу или так?</p><p class="p1">— Можно сказать, что и по делу, — с нежным, обольстительным лукавством произнес Плоскорылов, присаживаясь. — Да, скорее по делу.</p><p class="p1">— Ну, излагай, — без особого гостеприимства пригласил Гуров.</p><p class="p1">— Видишь ли, — проворковал Плоскорылов, — я пришел тебе напомнить об инициации, Костя. Ты же обещал — конец июля, начало августа…</p><p class="p1">— Слушай, капитан-иерей. Ты что-то не о том думаешь перед генеральным сражением.</p><p class="p1">— Именно! Именно о том! — заторопился Плоскорылов. — Сам подумай, Костя. Оно ведь действительно генеральное. Это если не конец войны, то по крайней мере решительный перелом. Со мной может всякое случиться. Ты же знаешь. Если вдруг что… я умру, так и не узнав главного. Так нельзя, Костя. Может быть, сегодня, перед сражением… всетаки ты инициируешь меня?</p><p class="p1">Гуров усмехнулся. Он уже придумал для Плоскорылова замечательный обряд инициации. Всякий раз, вспоминая об этом обряде, представляя его себе с необыкновенной живостью, он улыбался, даже когда у него было отвратительное настроение и хлопот по горло. Он собирался инициировать его эксклюзивным обрядом, принятым в спецслужбах варяжства: всякий, кого принимали на работу в главную службу государственной безопасности, включавшую в себя и внешнюю разведку, и проверку доносов, и провокации с заговорщиками, — проходил через это, чтобы неповадно было перебегать. Специнициация заключалась в банальном акте мужеложества, который совершали со всяким новеньким стукачом, пылко желавшем работать в тайной полиции. Существовал специальный инициатор, которого кормили на убой. Как только очередной шпион перебегал на сторону противника, главная спецслужба спешила обнародовать кадры, на которых он предается извращенной любви, да еще и в самой унизительной, пассивной форме. Конечно, инициируемый на пленке визжал, но пойди разбери, от боли или удовольствия. Все разведчики, нелегалы, строгие допросчики, адские следователи, у которых на допросах раскалывались и железные богатыри, — были пропущены через инициатора, легендарного Гуньку, и если им не хотелось, чтобы в один прекрасный день эти кадры сделались всеобщим достоянием, — они должны были трудиться не за страх, а за совесть, хотя какая же варяжская совесть без страха? Этот-то обряд инициации заготовил Гуров для капитана-иерея Плоскорылова, и человек у него уже был присмотрен надежный — Корнеев, могучий, страшно тупой, не побрезгует и скотиной; иногда среди варягов еще попадались былинные персонажи, несмотря на общее их вырождение. Может, и стоило бы инициировать Плоскорылова прямо теперь, развлечения ради, но не было времени на развлечения, и Гуров нахмурился.</p><p class="p1">— Подождешь. Как покажешь себя героем в генеральном сражении, так и инициируем. А если убьют — что ж ты сомневаешься, капитан? Сразу все и узнаешь, без всякой инициации.</p><p class="p1">Плоскорылов покраснел.</p><p class="p1">— Да, конечно… Но, понимаешь, Костя… Для того, чтобы как следует проявить себя — ну, в сражении… Мне хотелось бы все-таки понимать яснее, ты же знаешь, на богфаке не говорили последнего. Пятая ступень — она… как бы это… Ну вот представь: главное сражение выиграно. Оно и будет выиграно, я не сомневаюсь ни секунды. И победа. И что тогда?</p><p class="p1">— Битва до последнего ЖД, — пожал плечами Гуров. — Согласно гласу двунадесятому от пустынника Акакия…</p><p class="p1">— Я помню двунадесятый глас, — перебил Плоскорылов. — Но ты скажи мне: это и будет означать как бы исход борьбы? Как бы последнюю победу, за которой царство льда?</p><p class="p1">— Не думаю, — покачал головой Гуров. — Ты прекрасно знаешь, что варяжство не может остановиться, пока не истребит всех и не оставит последних жрецов.</p><p class="p1">— Да, да, я это знаю, — закивал Плоскорылов. — Это объясняли. Полное самоистребление до последних достойнейших. Но, Костя, согласись, я же должен знать, что будут делать последние достойнейшие?</p><p class="p1">— Капитан-иерей, — сказал Гуров и встал. — Вы спрашиваете о такой тайне, которая и на седьмой ступени доступна не всем, а лишь тем, кто способен делать самостоятельные выводы. Я посвящу вас в эту тайну не прежде, чем вы проявите исключительное мужество в послезавтрашнем генеральном сражении, да и то еще подумаю. Как можете, как смеете вы на вашей пятой ступени даже задаваться такими вопросами? Как вы можете обращаться к инспектору в момент, когда он, может быть, решает судьбу генерального сражения?!</p><p class="p1">Плоскорылов упал на колени и стал ловить губами гуровскую руку. Он только теперь понял, до какой степени забылся.</p><p class="p1">— Простите… простите… — лепетал он.</p><p class="p1">— Встаньте и изыдите, — тяжелым голосом сказал Гуров. — Я подумаю о вашей инициации. Все будет зависеть от вашего поведения в сражении. Если вы проявите себя истинным бойцом, я, быть может, рассмотрю вопрос в ближайшее время. Но вы проявили непростительное любопытство и забвение субординации, и, памятуя о вашем неполном знании обязанностей дневального…</p><p class="p1">— Я выучил, выучил! — вскричал Плоскорылов. — Дневальный есть военный солдат, в чьи непосредственные обязанности…</p><p class="p1">— Кру-гом! — зычно гаркнул Гуров, как он умел, когда хотел. — Прочь с глаз моих! Готовиться к сражению, стирать носки!</p><p class="p1">Плоскорылова сдуло. Настроение Гурова несколько улучшилось. Он всякий раз по-детски радовался, когда ему удавалось пнуть эту квашню. Надо будет придумать, что ему сказать после инициации. Полное самоистребление, покуда не останутся двенадцать вернейших? Их танцы с грубыми, рублеными телодвижениями вокруг ледяного кристалла, батюшки-холода? Многоступенчатое групповое совокупление? Тут он волен был придумывать что угодно. Штука в том, что у варягов не было эсхатологии. Она не была толком продумана, что и является первым признаком народа-вируса. Ни о каком собственном апокалипсисе не могло быть и речи. Мечтания варягов и хазар простирались ровно до того момента, когда будет осуществлена их главная цель — подчинение прочего мира. После этого хазары ждали своего мессию, варяги — всеобщего конца, ибо не мыслили никакой иной идиллии, кроме коллективной гибели в бою; но что делать после этого истребления, они не представляли и близко. На вопрос о последствиях прихода мессии хазары удивленно пожимали плечами; варяги на вопрос о венце своей миссии возводили очи горе. И те, и другие не брались ответить, что будет, когда станет некого покорять и растлевать. Ничего, кроме коллективного самоубийства или голодной смерти вследствие отсутствия новой пищи, вирусу не останется. Но об этом вирус не знает — иначе он может остановиться, задуматься и перестать жрать. Главным условием бурного функционирования варяжства и хазарства было именно темное пятно на месте эсхатологии, отсутствие представления о цели — она должна была мистическим образом открыться ровно в момент ее достижения; никто не смел заглядывать за черно-звездную завесу, пока длится путь. Лишь очень немногие варяги и вовсе единичные хазары могли представить себе, что за темной завесой нет решительно ничего, кроме самоуничтожения, — оно и есть высшая форма власти над миром, та стадия, на которой мир становится не нужен… но до этого почти никогда не доходило. Все они ждали генерального сражения, не представляя, за что сражаются. Это было даже забавно. Гуров жалел их в такие минуты.</p><p class="p1">Он-то знал, что никакого конца света не будет никогда, потому что его народ бессмертен. Он сам выбрал для себя эту жизнь — и никому не даст прервать движение по кругу, если только инспектор будет смотреть в оба.</p></span><span id="id129"><div class="title5">
<p class="p">4</p>
</div><p class="p1">А между тем глубоко в лесу, глубоко в земле, глубокой ночью зреет пузырь. В нем пирует, ликует, играет синими огоньками веселый газ флогистон.</p><p class="p1">Странен газ флогистон! Прочие полезные ископаемые в слепых, кротовьих земных недрах, в чернозеленых глубинах, в слепом мельтешенье корней, червей, кровей — гниенье бывших растений, костных останков, перепрелой органики. Чуть отлетит от живого душа, как бешено активизируется стремительная, броунова жизнь плоти: все мельтешит, роится, кружится. Душа еще сдерживала: постой, что делаешь? Тело не знает вопросов. Превращения материи увлекательней однообразных приключений души. Что за набор — любовь, тоска, обида? То ли дело распад, столько интересного.</p><p class="p1">Но пока гниет, перегнивает, перепревает темная земная плоть, — в черной сырой массе образуются пузыри, пустоты, прозрачные, ничем не заполненные пространства. Камни ли так лягут, почва ли провалится, крот ли выроет ход да забудет — в плотной земле возникает лакуна, вакансия, пространство умолчания. Что получится из материи — знают все: другая материя. Но никто не знает, что получается из пустоты. А из пустоты получается веселый газ флогистон.</p><p class="p1">Вообразим себе человека, которому назначено на четверть пятого. Что назначено — не знаем: дантист, интервью, собеседование с высокомерным боссом, принимающим его на работу. И вот он пришел, и вот ему сказали, что у дантиста флюс, интервьюируемый испугался и решил подготовиться, а высокомерный босс уволен и другого пока не назначили. В плотном графике униженного человека, суетливого, как разлагающаяся материя, лихорадочно устраивающего свои дела, образуется воздушный пузырь величиной в полтора часа. Можно пойти прогуляться, посмотреть в небо, чего наш герой не делал уже давно, принюхаться к тополям, присмотреться к детям, идущим из школы со второй смены. Купить бублик, в центре которого бушует веселый газ флогистон. Можно подумать, переглянуться с незнакомкой, которой посчастливилось ровно так же — шла рвать надоевшие отношения с вечно ревновавшим любовником, а он взял и сбежал к другой, и вот на месте затяжного угрюмого романа блаженная пустота и вакансия. Теперь она сидит в кафе ранней весной, смотрит на прохожих и наслаждается равенством всех возможностей. Можно так, а можно сяк. Из таких пустот и получаются потом вещи, меняющие жизнь, и изменил ее флогистон, газ пустот, веселый дух свободного времени.</p><p class="p1">Природа боится пустоты, потому что природа дура, тетеха, курица. История любит пустоту и начинается с нее. Нет ничего, все кончилось — и вот заплясал на пустом месте синий огонек, огневушка-поскакушка, радостный признак исчезновения материи. Где материи нет — пирует чистый дух: кончилась жизнь, и началось самое интересное. Но коренное население любит материю, производит ее в огромных количествах, тянет из себя, как паук паутину из брюшка: вечно что-нибудь есть в запасниках, никогда не выскребешь всех сусеков, и опять полным-полна коробушка, плотно, под завязку забит мир вещами и людьми, и негде бушевать веселому газу флогистону. Чуть бы сместиться, отойти в сторону, освободить куб пространства — какая удивительная жизнь тотчас начнется в нем! Здесь-то и запирует история, свободная от производительных сил и производственных отношений. Скучный бухгалтер Маркс, любитель вурста, все думал, будто история делается эволюцией материи; да ничего подобного, где он это видел! История начинается там, где исчезает материя, где нашлось полчаса времени отдохнуть от погромов и отгромов (ответный вариант погрома; такого слова нет, но я захотел, и стало). Праздность — повивальная бабка истории, праздник — ее локомотив. Только то и творчество, когда из ничего, а когда из чего-то — получается все то же самое, прежние атомы в новом порядке. Кой черт мне в порядке, когда я знаю, что от перемены атомов молекула не меняется!</p><p class="p1">Тесно мне, тесно мне.</p><p class="p1">Но есть пробелы в истории и провалы в земле, и блаженные окна в расписании; и копится, копится в пустотах веселый газ флогистон, и горят по ночам голубые болотные огоньки. О, веселый газ не чета природному, скучному, угарному, кишечному газу почвы, метеоризму недр, перистальтике магмы. Состав флогистона неведом и, скорее всего, отсутствует. Флогистон — чистая сила воображения: раз ничего нет, надо придумать. Пустота — возможность всех наполнений; флогистон — обещание всех возможностей. Автомобиль, работающий на нем, несется к небывалому, а потому его никогда не обгонит нудная нефтяная машина, плюющаяся вонючим дымом. Лучший двигатель работает ни на чем, силою одного самоусовершенствования. Растет, растет земной пузырь, ширится пустота, и первые выбросы первого русского флогистона протуберанчиками вспыхивают над болотом. Много на свете материи, а и ее на хватит забить все воздушные ямы; много тела, а есть дырка и для души.</p></span><span id="id130"><div class="title5">
<p class="p">5</p>
</div><p class="p1">Утро сражения было прекрасно, как прекрасно бывает только утро сражения — специально чтобы человек себе сказал: о ты, что в горести напрасно на Бога ропщешь! Чего ты хочешь, небо ясно. Между прочим, глупость. Какая ценность в небе, островерхих скалах и туманных пропастях, когда сам себе не можешь ответить, кто ты такое и зачем? В душе каждого варяга и хазара есть роковой вопрос: кто я? Но вирусу душа не положена, и оттого сосущая пустота вечно наполняется враждой: жрут, жрут и никогда не могут наесться. Варягу и хазару в такое дивное утро не до природы: природой наслаждаться может тот, кто определился. Но ни варяг, ни хазар не определятся никогда: такими они созданы. Истреблять, истреблять — может, хоть от этого станет что-нибудь понятно? Но никогда не становится.</p><p class="p1">В семь утра варяжские полки были построены в каре, перед которым с боевой варяжской музыкой выступали специально приглашенные рок-фолк-ансамбли «Мельница», «Мыльница» и «Хлебница». Все три коллектива звучали, как задница. Телодвижения их были исполнены агрессии и задору. Звучали гимны перуновы. Войска переминались. За время дождя они так привыкли к бездействию, что не были морально готовы воевать. Они уже думали, что так будет всегда.</p><p class="p1">В центр каре выдвинулся генерал-полковник Колесов, прибывший лично руководить генеральным сражением, то есть орать на всех, кто отвечал за него на месте. Он уже учинил разнос Паукову (сдержанный), Здроку (серьезный) и капитану Кукишеву (страшный), а дневальных приказал расстрелять за то, что нашел дохлую муху на одном из подматрасников. Приятное впечатление на него произвели только местный СМЕРШевец Евдокимов, отвратительней которого трудно было представить человека, и капитан-иерей Плоскорылов, явно не боец, но опытный демагог. Плоскорылов смотрел на Колесова влажно-собачьими глазами.</p><p class="p1">— Солдаты! — рявкнул Колесов. — Сегодня некоторых из вас убьют, такое наше дело. Я даже больше вам скажу, убьют половину. Посмотрите друг на друга хорошенько, может, больше и не увидитесь. И то сказать, кому охота помирать? Вон погода какая. Но если не помирать, то мать изнасилуют, сестру изнасилуют, отца изнасилуют, брата изнасилуют…</p><p class="p1">Колесов долго еще рассказывал, сколько народу изнасилуют, если не умирать. Солдаты переминались.</p><p class="p1">«Мельница» сыграла «Перуне, рцы!». Это была песня о пути на север, одиноком всаднице и златовласой спутнице. Упоминались эльфийские руны.</p><p class="p1">Настала очередь Плоскорылова. Он собирался говорить о геополитике, о великой исторической роли Дегунина, где сходятся север с югом, о том, что сама природа ликует, приуготовляя воинов к последней битве, о соборности и уборности (под нею он понимал необходимость убрать захватчика с наших полей), и о многом еще — сотни будущих покойников стояли перед ним, и всех хотелось благословить, и в горле у Плоскорылова сладко замирало, а в штанах сладко напрягалось, но тут случилось непредвиденное: вследствие штабной игры ЖД выступили в сторону Баскакова часом раньше, потому что Строцкий не поверил Колесову, и теперь по большому полю, выбранному для генерального сражения, чтоб разгуляться где на воле, — медленно и скрытно двигался в засаду передовой отряд под командованием капитана Зельдовича.</p><p class="p1">— Что за меб твою ять?! — выругался Колесов. — Генерал-майор Пауков! Почему проспала разведка?!</p><p class="p1">Истинный варяг, он и теперь, в экстремальной ситуации, когда им порушили весь митинг, прежде всего желал не принять срочные меры, а выругать виноватого.</p><p class="p1">— Па-а-а-батальонно! — истошно заорал Пауков. Офицеры кинулись к своим батальонам. «Мельница», «Пятница» и «Хлебница» стояли по местам, сжимая бесполезные инструменты, и понятия не имели, куда им теперь бежать.</p><p class="p1">Первая колонна, в полном соответствии с диспозицией, нехотя двинулась в сторону северной оконечности деревни Дегунино. Марш-марш, цюмба-цюмба-цюмба. Впереди гнали новобранцев со стертыми ногами, в тапочках. Тапочники должны были пасть первыми. Однако ЖДовский начштаба Строцкий в полном соответствии со своим тайным планом начал на северной оконечности Дегунина газовую атаку, и, почуяв запах газа, смешавшаяся первая колонна отклонилась к востоку, куда со своими молодцами стремглав летел на холеных конях атаман Батуга. Батуга потоптал тапочников и смял первую колонну, которая, отступая в беспорядке перед превосходящими силами союзного казачества, уперлась в Дресву. Около Дресвы поспешно занимала оборону вторая колонна, но Дресва от дождей разлилась, а потому окапываться пришлось близ деревни, прямо под носом у ЖДов. ЖДы, первыми начавшие наступление, ждали атаки откуда угодно, но не со стороны Дресвы. Хазарский начштаба Строцкий срочно перегруппировал силы, сберегая людей, и отвел основные войска из Дегунина в сторону Чумкина, по которому ни о чем не подозревавшая третья варяжская колонна только еще маршировала в дегунинскую сторону.</p><p class="p1">И потоптала всю пшеницу.</p><p class="p1">Ударная бригада ЖДов «Возмездие», по обыкновению, гнала перед собой толпу коренных жителей Дегунина — стариков, женщин и детей. Прикрываться стариками, женщинами и детьми — излюбленная хазарская тактика не только в дискуссиях. В хвосте колонны ехал громкоговоритель.</p><p class="p1">— Вот старики, женщины и дети! — кричал комментатор. — Преступная власть давно уже не платит пенсий старикам, пособий женщинам и подачек детям. Кровавый режим стреляет в стариков, женщин и детей. Старики, женщины и дети предпочитают смерть такой жизни. Старики, женщины и дети, подберитесь, марш-марш!</p><p class="p1">— А вот кому пирожков! — кричали женщины.</p><p class="p1">Часть казачьего отряда Батуги набросилась на стариков, женщин и детей и принялась топтать их с утроенной силой, чтоб чужие боялись. ЖД радостно наблюдали и фотографировали.</p><p class="p1">Корреспондент журнала «Daily week», ангажированный ЖДами для освещения генерального сражения, заносил в портативный компьютер: «Нельзя сказать, чтобы спасение заложников было приоритетной задачей русских войск».</p><p class="p1">Наглядевшись на то, как конники Батуги топчут стариков, женщин и детей, отряд «Возмездие» с песней «Мир вам» отправился в сторону Баскакова.</p><p class="p1">И потоптал всю люцерну.</p><p class="p1">Завидев на горизонте противника, третья колонна генерал-майора Паукова в панике свернула на север и уперлась в лес. Завидев на горизонте третью колонну, противник свернул на юг и уперся в войска Батуги, которые, в свою очередь, стремглав ринулись к Дресве и потоптали собственные укрепления. Часть казачьей роты повернула в деревню с намерением одним ударом выбить оттуда силы ЖДов.</p><p class="p1">— А вот огурчиков, хлопчики, — ласково предлагали дегунинцы. — А вот яблочек!</p><p class="p1">Поскольку главные силы ЖДов были уже выведены из Дегунина, батугинцы заняли деревню, не встретив сопротивления, но в этот миг замаскированная хазарской хитростью колонна ЖДовских боевиков выскочила из леса на восточной оконечности деревни и, отчаянно лупя из автоматов, погнала батугинцев вон.</p><p class="p1">И потоптала всю рожь.</p><p class="p1">— А вот пирожков, — ласково предлагали жители деревни стремительно набегающим ЖДам. — А вот капустки.</p><p class="p1">Тем временем вторая колонна, державшая оборону у Дресвы, услышала перестрелку в деревне и поняла, что переправляться через реку никто не намерен, а вот в Дегунине началось, и снялась с окопанного места. Но на глинистом склоне, по которому карабкалась усталая пехота, она повстречала собственный третий батальон и, не разобравшись, вступила с ним в перестрелку. В это время из деревни с гиканьем вылетел Батуга, преследуемый ЖДами.</p><p class="p1">И потоптал весь овес.</p><p class="p1">— Куда! — заорал он с перекошенным лицом. — Своих бьете, хады!</p><p class="p1">Второй батальон одумался и с утроенной силой устремился в Дегунино, но в этот момент со стороны другого леса (там был еще другой лес) выкатилось несколько ЖДовских танков. Они медленно подняли башни, прицеливаясь. У варягов танки тоже были, но давно. Генералы их продали, а деньги хапнули. Настоящий варяг должен воевать без оружия.</p><p class="p1">— А вот картошечки! — закричали местные жители в сторону танков. — А вот помидорчика!</p><p class="p1">Башни плюнули огнем, и несколько снарядов, перелетев заговоренную деревню Дегунино, шмякнулись в том, другом лесу, где укрывалась третья колонна генерала Паукова. Послышались негодующие крики.</p><p class="p1">Чувствуя, что лес хорошо простреливается, третья колонна кинулась врассыпную, но заметила странную вещь. Только что они бежали по ровному месту — и вдруг оказались словно на дне огромной воронки. Земля словно встала дыбом, оставив их на дне глубокого оврага, вылезти из которого не было никакой возможности — трава отсырела, сапоги скользили.</p><p class="p1">— Воронка! — закричал капитан.</p><p class="p1">Тем временем и с Дресвой делалось что-то непонятное: она разливалась шире и шире, ближе и ближе подступая к деревне. Ее глинистый берег вплотную придвинулся к дегунинским домам, и второй батальон начал медленно сползать в воду.</p><p class="p1">Танки между тем перестали стрелять, поскольку начали вдруг уходить в грязь сначала по гусеницы, потом по башни — и скоро ушли совсем; экипажи успели выпрыгнуть и стремглав побежали врассыпную. С землей творилось непонятное: она норовила схватить за ноги.</p><p class="p1">Потрясенные увиденным солдаты первой колонны (которая, как вы помните, была потоптана Батугой и в беспорядке рассеялась по полю) ринулись в Дегунино, ища спасения. Вытаращив глаза, они побежали по широким дегунинским улицам.</p><p class="p1">— А вот сальца! — кричали поселяне. — А вот хлебушка!</p><p class="p1">ЖДовские силы вдруг почувствовали, что ни отступать, ни наступать, ни совершать обходные маневры больше не могут. Земля широко расступилась, как некогда Красное море, и, не особенно церемонясь, поглотила два батальона. Она отрыгнула их только за двадцать километров от Дегунина — солдаты были грязны, голодны и совершенно деморализованы.</p><p class="p1">И потоптали все сорго.</p><p class="p1">Однако часть диспозиции Паукова была все же выполнена. Жароносная дружина двинулась в сторону Дегунина, увидела танки, в ужасе свернула, уперлась в Батугу, в ужасе свернула, уперлась в Дресву, в ужасе свернула и в отчаянии кинулась в лес, где увидела поглощение ЖДовских сил и от греха подальше побежала во второй лес, в котором и очутилась в том самом болоте, в которое должна была примашировать с самого начала. Так что, как и написано в варяжских учебниках стратегии и тактики, примерно десять процентов всякий диспозиции в ходе боя выполняются безукоризненно.</p></span><span id="id131"><div class="title5">
<p class="p">6</p>
</div><p class="p1">Аша сидела у окна и прислушивалась к себе. Ребенок еще не шевелился, тошнота уже не подымалась, никакой опасности не было, и вместе с тем ей было сильно, сильно не по себе. Не от войны, не от штурма ждала она худа: волку в войне ничего не делается, и даже шальной снаряд не ударит в дом, где прячут волка. Да и не попадет снаряд в Дегунино: либо не долетит, либо перелетит. А все-таки было страшно, очень страшно: что-то во всем этом было не то. Опасность двигалась к ее дому, опасность пересекала поле, опасность плотным рыжим шаром подкатывалась к ее убежищу. Аша не знала, что это было. Волки все видят, не видят только самых старших; Аша была древнего, славного рода и увидела Гурова, но ни бежать, ни даже встать не могла. Ноги словно к земле приросли.</p><p class="p1">— Сметанки? — спросила хозяйка за дверью.</p><p class="p1">— После, — сказал Гуров и вошел к Аше.</p><p class="p1">Он пробрался в Дегунино с казаками Батуги, одним из первых. Долго искать дом ему не надо было: это Аша видела его темно и как бы размыто, он-то видел и ее, и ребенка во чреве.</p><p class="p1">Мало что понял бы сторонний человек из их разговора. Слова были те самые, используемые всеми захватчиками, но смысл их другой, ибо говорили они подлинным, коренным языком, в котором не сместились еще смыслы. «Зеленая вдова», — говорил Гуров; «Отлично усиженный разбой, говорливый кран», — испуганно отвечала Аша. «Разве не отстала раскосая корысть? Не увилял банный отклик? Не разомкнуть красных троп?» — «Вылей меня», — отвечала Аша. Но тот, кто знал язык, услышал бы иное.</p><p class="p1">— Здравствуй, красавица, — сказал Гуров. — Как ни бегали, а встретились.</p><p class="p1">— Здравствуйте, — потупившись, сказала Аша.</p><p class="p1">— Кто я, знаешь?</p><p class="p1">— Не знаю.</p><p class="p1">— Врешь, знаешь. Не из простых девка. Зачем пришел, поняла?</p><p class="p1">— Поняла, — с трудом выговорила Аша.</p><p class="p1">— Сделаешь? — коротко спросил Гуров.</p><p class="p1">— Никогда, хоть убей, — ответила она.</p><p class="p1">Гуров понял, что разговор будет долгий. Он присел на лавку. За окном грохотало, и туда-сюда бегали обалдевшие солдатики, отвыкшие от боевых действий.</p><p class="p1">— Зачем убивать, — сказал он беззлобно. — Много нас, что ли? И так есть кому убивать, странников наших ловят, морят, знаешь?</p><p class="p1">— Видела, — тихо сказала она; в шуме он угадал скорее по губам. Вдруг все стихло — видимо, хазар ненадолго выбили из Дегунина, и бой переместился в поле.</p><p class="p1">— Ты хорошего рода. Не так бы нам с тобой разговаривать. Ваш род старый. Лес растит, землю заговаривает. Отец жив?</p><p class="p1">— Помер.</p><p class="p1">— Знатный был старик. Я самого не знал его, слыхал. Вас таких, почитай, не больше сотни осталось, кто плавать может.</p><p class="p1">Аша подняла на него огромные глаза.</p><p class="p1">— И сотни не будет.</p><p class="p1">— Ну так что ж ты! — вскочил Гуров с лавки. — Или не знала, с кем гуляла? Как волхву можно с северянином, да еще такого рода?! Кто б тебе слово сказал, если б ты от нашего понесла? Или нам не надо нового волхва? На руках бы носили! Но ведь ты понимаешь, что будет.</p><p class="p1">— Где мне понимать? Я по земле, сам знаешь.</p><p class="p1">Тут она не лгала. Их род, как и вся Сибирь, славился умением договариваться с землей, чувствовать ее, уговаривать, плавить, им удавалось выращивать хоть виноград в мерзлоте, хоть картошку на скалах, — но во всем, что касалось будущего, они были слепы и глухи; пророчества знали, но в исполнение их не верили.</p><p class="p1">— Ну, мне-то не ври, — сказал Гуров. — Или сама не чувствуешь?</p><p class="p1">— Я чувствую, что земля встала, — ответила Аша, и в наступившей тишине слова эти прозвучали внятно, властно и страшно. Гуров вгляделся в ее лицо. Она могла и лукавить, но если не лукавила, все обстояло хуже, чем он мог предполагать. Гуров верил земле и догадывался о некоторых ее намерениях, но все же был не из рода земледельцев, а потому что-то мог и упустить. Если земля встанет, срок и правда близок, и тут уж не в Аше дело.</p><p class="p1">— Ну уж и встала, — произнес он. — Голову-то мне не морочь, словами не бросайся.</p><p class="p1">— Мы такими словами не бросаемся. Скоро сам поймешь. Слышал, как гудит?</p><p class="p1">— Она всегда гудит, это ты раньше не слыхала. В тягости все чувства обострены, или не знаешь?</p><p class="p1">— Нет, то другое. Я слышу. Может, сегодня уже увидишь. По ночам дрожит.</p><p class="p1">— Это ты по ночам дрожишь!</p><p class="p1">— Я спорить не буду, — устало сказала она. — Все потом поймешь.</p><p class="p1">— Да хватит тебе! — вспылил Гуров. — Не про землю речь! Ты сама знаешь: твоему ребенку быть нельзя. Земля встанет, не встанет — про то не нам с тобой знать. А если твой родится, тут никому не жить.</p><p class="p1">— И что он сделает?</p><p class="p1">— Не знаю, что сделает, знаю, что от него пойдет начало. А я для того живу, чтобы начало не началось, это пост мой, как у тебя кусты растить, а у странников ходить, а у теберяков теберить, а у чернецов чернить, а у бахарей баять, и я свое сделаю.</p><p class="p1">— Делай, — усмехнулась она.</p><p class="p1">— И сделаю, — спокойно сказал Гуров. — Но я ведь не северный и не южный, — он назвал захватчиков их коренными, горькими именами, самыми черными словами в родном языке. — Мне, знаешь, не праздник — людей мучить. Своих особенно.</p><p class="p1">— Так и не мучай.</p><p class="p1">— И рад бы. Что ж я, не знаю? Ты мать. Но пойми и то, что ничего ведь не будет, ничего и никого. И тебя не будет.</p><p class="p1">— Не верю, — сказала Аша.</p><p class="p1">— Тут уж верь не верь, а мне видней.</p><p class="p1">— Что тебе видней? Что ты знаешь?</p><p class="p1">— Ты знаешь свое, а я свое. Нельзя тебе родить. От кого другого, потом, как хочешь, — от него нельзя.</p><p class="p1">— Если его сейчас вытравить, я никогда потом не рожу.</p><p class="p1">— Ну, не ври. Эти-то вещи вы умеете.</p><p class="p1">— Больше того, что человек может, никто не умеет. Хватит, я тебе говорю. Или ты меня убьешь, или я рожу.</p><p class="p1">— Да тебя-то мне зачем убивать? — усмехнулся Гуров. — Я не тебя убью. Где ж видано — своих-то. Я северянина твоего убью.</p><p class="p1">Он рассчитывал поразить ее этим, но либо она очень хорошо владела собой (сильные волки из древних сибирских родов умеют прятать чувства), либо ей и в самом деле ничто уже не было важно, кроме судьбы ее ребенка.</p><p class="p1">— Где ты его найдешь-то, — сказала она спокойно.</p><p class="p1">— Ладно, не дури, я знаю, что он с тобой.</p><p class="p1">— Был со мной, весь вышел, — сказала Аша. — Он к южанам побежал, у них будет убежища просить. Свои-то ему не простят.</p><p class="p1">— Так его и южане не возьмут.</p><p class="p1">— Пока взяли. Для телевизора снимали, как каялся. Он к ним пойдет, а я дальше.</p><p class="p1">— Куда?</p><p class="p1">— Мне мои сказали, в Дегунине, что пусть уйду.</p><p class="p1">— Не ври! — прикрикнул Гуров. — Не могли они тебе такого сказать. Им-то откуда знать, они не сторожа!</p><p class="p1">— Ничего, тоже волки.</p><p class="p1">— Не всякий волк знает! Ты что ж думаешь, уйдешь, родишь, ничего не будет?</p><p class="p1">— Если и будет, то не от меня. Земля встала, говорю тебе.</p><p class="p1">— Ну вот что, — сказал Гуров. — Встала земля, не встала — спорить не буду с тобой. Но если встала — значит, сама понимаешь: далеко зашло. Пугать не буду, вижу, ты не пугливая. Но подумай хоть раз: тебе что ж, никого не жалко?</p><p class="p1">— Кого тут жалеть? Северян с южанами?</p><p class="p1">— Дегунино жалеть. Баб, мужиков.</p><p class="p1">— Баб-то? Это которые всем огурчика предлагают, кто ни войди? Мужиков, которые дорогу строят, по кольцу ездить? Что жалеть? Ты сам жалеешь?</p><p class="p1">— Жалею, — сказал Гуров.</p><p class="p1">— А я не жалею. Темно живем, света не видим, сами как трава. Не хочу больше.</p><p class="p1">— А, — кивнул Гуров. — Ну, тогда понятно. Надоело, значит?</p><p class="p1">— Давно надоело. Всем надоело. Сколько можно? Конца не видно.</p><p class="p1">— Будет конец, — сказал Гуров. — Дождешься.</p><p class="p1">— Может, и дождусь.</p><p class="p1">Это было сказано без вызова, очень тихо, но очень твердо.</p><p class="p1">— Да тогда ведь и ребенку твоему конец, — так же тихо сказал Гуров. За деревней, в поле, грохнуло. Явно танки, понял инспектор. Смотри ты, как все серьезно. Северяне свои давно сперли, а у этих осталось еще. Грамотные ребята, никого не пожалеют.</p><p class="p1">— Ребенка я заберу, — сказала она. — Мы уйдем, не бойся, сторож.</p><p class="p1">— Не уйдешь.</p><p class="p1">— Уйду. Я слово знаю.</p><p class="p1">— Таких слов, какие я знаю, ты и слыхом не слыхивала.</p><p class="p1">— Что, спробуем? — сказала она.</p><p class="p1">— Поиграть захотелось?</p><p class="p1">— Зачем поиграть. Я так сказать могу, что будет мне дорога отсюда до самых гор, и уйду.</p><p class="p1">— Смотри, землю разбудишь.</p><p class="p1">— Земля и так проснулась.</p><p class="p1">Именно при этих ее словах в трех километрах от избы земля расступилась перед хазарским отрядом — двух батальонов как не было, выплюнулись за двадцать верст.</p><p class="p1">Не сказать, чтобы Гуров ничего не чувствовал. Он чувствовал, и даже очень, — но на то нам и воля, чтобы держать себя в руках. Сильна девочка, подумал он, сильна, и зря я недооценил ее. Сибирь есть Сибирь. Надо кончать с этим делом, и быстро. Последняя попытка, и довольно. Пока еще в ней говорит только ее собственная сила, но будет час — и добавится сила ребенка, она растет с каждым днем, с каждым часом.</p><p class="p1">— Землю-то не жалко тебе? — сказал он. — Мертвое место здесь будет, пустое место.</p><p class="p1">— Землю жалко, — сказала она и заплакала. Но и в слезах ее Гуров не почувствовал слабости — он знал, что не сдвинул ее ни на шаг.</p><p class="p1">— Эх, — сказал он горько, — не так бы нам встретиться, волчица. Мы с тобой могли бы неплохие дела делать…</p><p class="p1">— Не могли бы, — ответила Аша. — Не хочу твои дела делать, не хочу одних зверей на других натравливать. Не хочу длить. Сама не буду и тебе не дам.</p><p class="p1">— Ну, смотри, — сказал Гуров. — Защищать тебя некому. Бабка твоя ушла, сам знаю. Я за Дегуниным слежу, место не простое.</p><p class="p1">Аша молча кивнула.</p><p class="p1">Гуров знал, что не отступит, и знал, что деваться некуда им обоим. Она была девушка серьезная и ставила его перед выбором с решительностью умной волчицы: хочешь спасать свой мир — убивай меня, сама не поддамся. Пистолет был при нем. Думать об этом не хотелось. Страшно сказать, он никогда еще не стрелял в людей.</p></span><span id="id132"><div class="title5">
<p class="p">7</p>
</div><p class="p1">Плоскорылов ворвался в избу ровно в этот момент. Он не мог упустить случая: Гуров должен был видеть, что капитан-иерей сражается в первых рядах.</p><p class="p1">— Инспектор! — крикнул он, размахивая гранатой. — Вы в опасности?</p><p class="p1">Гуров окинул его таким взглядом, что более впечатлительный персонаж растаял бы в воздухе.</p><p class="p1">— Ты что здесь делаешь? — спросил он тихо.</p><p class="p1">— Вашу жизнь, инспектор… спасаю вашу жизнь… вы в опасности… кругом ЖД…</p><p class="p1">— Пошел на х…! — заорал Гуров, и западный ветер пролетел по Дегунину тяжелой холодной птицей.</p><p class="p1">— Инспектор… — попятился Плоскорылов. Он и вышел бы из комнаты, но сзади его вдруг похлопали по плечу.</p><p class="p1">— Тихо, тихо, капитан. Не спешите. Поговорим.</p><p class="p1">Это был Эверштейн, взявшийся непонятно откуда.</p><p class="p1">— Ба, Гурион! — воскликнул он. — Какая встреча! Контрразведка и тут впереди. Но уж этого вы не трогайте, не трогайте. Этот — мой.</p><p class="p1">Плоскорылов дрожал и покрывался крупным потом.</p><p class="p1">— Как это вы его выцепили? — без умолку трещал Эверштейн. — Я и мечтать не мог о такой удаче. Ну, думаю, этот-то мне никогда не дастся! Я ведь могу добраться только до тех, кто в бою, а патриотические мыслители всегда в обозе. Много, много про него наслышан. И как он при пытках любил присутствовать, и пленных расстреливал, и своих мог… Колоритнейший персонаж! Да, Плоскорылов, гранатку-то отдайте. Отдайте, нечего. Все равно не взорвется. Во-первых, не умеете, а во-вторых, небоевая.</p><p class="p1">— Она боевая! — завизжал Плоскорылов.</p><p class="p1">— Бросьте, бросьте. Боевое — вот, это настоящее, оно действительно стреляет, — он достал маленький хазарский пистолетик, прекрасное боевое оружие, мечту офицера. — Давайте ваш муляж, и нечего.</p><p class="p1">Поджимаясь, словно прикосновения хазара способны были отравить его, Плоскорылов отдал гранату.</p><p class="p1">— То-то же. А чего это вы со своими в бой пошли? Я видел, конечно, как вас солдатики прикрывали, — не боялись вы, Плоскорылов, что вас свои пристрелят? Вас же страшно любят в войсках, идеолог гребаный.</p><p class="p1">— Что вы знаете о войсках! — взвизгнул Плоскорылов. Он уже понял, что Эверштейн сразу не убьет, сначала поглумится. На богфаке учили: кто хочет убить, убивает сразу. Эверштейн часто производил обманчивое впечатление: слишком типичный с виду, совершенно стальной внутри. Тоже типично, но не так общепринято. Автор рисует Эверштейна с нескрываемой симпатией, но это не потому, что ему так уж симпатичен Эверштейн. Ему симпатичны любые нехазарские проявления в хазарах и всякое неваряжство в варягах. Эверштейн был человек последовательный — редкость в хазарах; они обычно последовательны только в одном — в святой уверенности, что им-то разрешена любая непоследовательность. Эверштейн укрепился в этом не до конца — слишком долго жил в России, много читал литературы.</p><p class="p1">— Знаю, — сказал он. — Знаю больше, чем достаточно. Удивительный народ — все никак не пойму, почему они не повернут оружие против начальства? Впрочем, это дэтали. Что ж вы, Плоскорылов, по избам отсиживаетесь во время боя? Ваши там уже побежали, а вы решили в погребе закрепиться?</p><p class="p1">— Я охраняю жизнь инспектора Гурова! — гордо сказал Плоскорылов.</p><p class="p1">— Похвально, похвально. Инспектор Гуров — наш человек, охрана его жизни вам зачтется.</p><p class="p1">Плоскорылов побелел еще раньше, поэтому теперь посерел.</p><p class="p1">— Костя, это правда? — спросил он с надрывом.</p><p class="p1">— Неправда, — спокойно сказал Гуров. — Вы, Миша, зря перед ним так распространяетесь.</p><p class="p1">— Думаете, он кому-нибудь успеет рассказать? — улыбнулся Эверштейн. — Дудки. Вы меня, Гурион, плохо знаете. Я за ним слежу с довойны. Интересный малый. Я его ЖД читал — прямо поэма. Так расписывал наше будущее четвертование на Красной площади — я плакаль! Говорил, что пусть мы только сунемся. Лично, лично! Зубами будет грызть! Ну и вот, мы и сунулись. А, Плоскорылов? Юзер Плоскорыл? Гроза живого дневника, ядерное православие? Что делать будем, Плоскорылов? Молиться или деньги предлагать?</p><p class="p1">Плоскорылов молча трясся, перебегая глазами с Гурова на Эверштейна.</p><p class="p1">— Деревня, кстати, за нами, — бросил Эверштейн. — Генеральное сражение проиграно блистательно. Вас уже земля не терпит — Дресва в ясный день из берегов вышла.</p><p class="p1">— Около заухало? (Твои дела?) — быстро спросил Гуров у Аши.</p><p class="p1">— Не я, — покачала она головой.</p><p class="p1">— Но не я же!</p><p class="p1">— Говорила я тебе — земля встает.</p><p class="p1">— Э, э! — заинтересовался Эверштейн, не опуская, однако, пистолета, направленного в живот Плоскорылову. — Что еще заухало?</p><p class="p1">— Так, пословица.</p><p class="p1">— А это еще кто? Прекрасная пленница? Что-то я вас в Дегунине не видал…</p><p class="p1">Эверштейн шагнул к Аше, не забывая поглядывать на Плоскорылова. Эта предосторожность, впрочем, была лишней — капитана-иерея парализовал ужас. Он вообще уже ничего не понимал.</p><p class="p1">— А-а! — радостно воскликнул Эверштейн. — Подтверждаются лучшие предположения! Интересно, интересно. Не ушли, стало быть. А где же наш возлюбленный? Наш доблестный губернатор Бороздин, якобы перебежчик? Вот оно как все оборачивается-то, а? Ну, Гурион, ну, умница! Не зря ценим. Как же вы их раскололи-то, Гурион? Вас же не было, когда он приходил!</p><p class="p1">Гуров молчал. В теперешней обстановке это было самое верное.</p><p class="p1">— Значит, вот оно как! — повторял Эверштейн. — Чудесная операция. И как масштабно! Сначала объявляем человечка преступничком. Потом он якобы перебегает к нам — психологически очень убедительно. Потом остается в Дегунине, и заметьте, что все это аккурат к генеральному сражению! Троянский губернатор, а? Чудесно. В наших лучших традициях. После чего во время боя за деревню включается наша пятая колонна! Ну-ка, говорите: что вы должны были тут делать?</p><p class="p1">В его голове мгновенно выстроилась истинно хазарская схема. В эту секунду он и помыслить не мог, что подобное хитроумие варягам не свойственно, что разведчиков они в последнее время не засылали, полагаясь исключительно на силу оружия, что поведение беглецов не объяснялось никакой логикой, ибо у губернатора были все возможности перестрелять половину штаба, и он этого не сделал; роковым дефектом варяжства и хазарства была именно неспособность допустить, что в мире существует иная логика, отличная от их собственной. Варяг во всем видел подлый шантаж и стремление его ущучить, хазар везде обнаруживал заговор — и если версия не подтверждалась, предполагал в этом лишь более глубокую конспирацию. Губернатор явно пришел в Дегунино не просто так: его готовили к генеральному сражению. Конспирология — двигатель истории. Хазар усматривал заговор всюду, ибо поверить в божественное устроение мира не мог никогда: бог распоряжался только хазарами, все прочее было делом рук человеческих. Хазарство питалось легендами о тайных обществах и само себя мыслило в тех же категориях, только руководитель у них был посерьезней. Заговор надлежало разоблачить. Эверштейн направил пистолет на Ашу.</p><p class="p1">— Ну! Где он?</p><p class="p1">— Здесь! — заорал Бороздин и выпрыгнул из соседней комнаты. В руках у него была хазарская винтовка.</p><p class="p1">Эге, подумал Гуров. Хорош бы я был. Стало быть, я у него на мушке с самого начала?</p><p class="p1">— Я все думаю — где тебя искать, — сказал губернатор. — А ты сам пришел.</p><p class="p1">— Руки, — спокойно сказал Эверштейн. Он слишком привык, что перед ним все пасуют. Губернатор был хоть и варяжское начальство, но человек не вовсе испорченный и кое-что умел. Впрочем, чтобы снять винтовку с убитого хазара, много ума не надо.</p><p class="p1">— Руки тебе? — осклабился Бороздин. Он и так еле сдерживался, пока Аше угрожал Гуров, но разговора совсем не понимал, а потому не мог и вмешаться. Зато теперь все было слишком понятно. Эверштейн представлялся ему главным виновником его собственного предательства и падения, хотя в этом-то как раз не был виноват ни сном, ни духом. Бороздин обязательно нашел бы его. В том, что хазар явился сам, явственно обнаруживался перст судьбы. Конечно, Бороздин не хотел убивать его сразу. Он хотел подробно ему объяснить, как именно его ненавидит, — но палец дрожал на курке, и винтовка выстрелила как бы сама собой.</p><p class="p1">Все дальнейшее произошло стремительно и так же путано, как генеральное сражение. Эверштейн дернулся, осел, но успел нажать на курок. Губернатор рухнул на Гурова, Плоскорылов кинулся спасать инспектора, Эверштейн выстрелил в Плоскорылова, а когда дым рассеялся, Эверштейн оказался ранен в бедро, губернатор — в живот, а Гуров мертв окончательно и бесповоротно. Плоскорылов, на котором не было ни царапины, стоял среди избы и испуганно озирался.</p><p class="p1">Эверштейн лежал без сознания, все его силы ушли на последний выстрел. Губернатор хрипел, и на губах у него лопались красные пузыри. Гуров лежал лицом вниз, затылок его был разворочен — Эверштейн попал прямо в лоб. Аша не двигалась. Плоскорылов ничего не понимал. Он понимал только, что теперь никто не объяснит ему конечной цели войны, а стало быть, и инициация его — главная цель нынешнего генерального сражения — откладывается на неопределенное время. Больше того — он не уберег инспектора генштаба, погибшего у него на глазах вследствие цепи необъяснимых случайностей.</p><p class="p1">— А-а-а! — заорал он на Ашу, потрясая кулаками. — Это все ты! Ты, гадина! Из-за тебя все!</p><p class="p1">Она была единственной уцелевшей в этом побоище, и, как истинный варяг, он немедленно должен был провозгласить ее виноватой.</p><p class="p1">— Огурчиков? — испуганно спросила Галя, заглядывая в комнату, где только что стреляли. — Курочки?</p><p class="p1">Аша стояла молча, сжав кулаки. Потом наклонилась над губернатором и странно напряглась, словно пыталась вернуть ему здоровье усилием воли.</p><p class="p1">— Не этого! — заорал Плоскорылов. — Не этого спасать надо!</p><p class="p1">— Того уже не спасешь, — глухо сказала Аша.</p><p class="p1">— Сука! — взвыл Плоскорылов.</p><p class="p1">— Да пошел ты на х…, — сказала Аша, не глядя на него. Холодный западный ветер влетел в избу. Необъяснимая сила подхватила Плоскорылова, подняла в воздух и понесла за синие леса, за крутые берега, далеко-далеко, вон из нашего повествования.</p><p class="p1">Из этого мы видим, что и в генеральном сражении иногда перепадает кому надо.</p><p class="p1">Ниже приводится, для пользы читателя, заклинание западного ветра.</p></span><span id="id133"><div class="title5">
<p class="p">8</p>
</div><p class="p1">Западный ветер! Западный ветер!</p><p class="p1">Западный ветер! Западный ветер!</p><p class="p1">Ты налетаешь полночью летней. Ты выметаешь сор многолетний. Ты задеваешь створы ворот. Ты затеваешь водоворот. Ветров веселых родина — запад. Холод и солод — главный их запах. Холоден, светел, весел, тяжел западный ветер — весть о чужом.</p><p class="p1">Западный ветер! Западный ветер!</p><p class="p1">Западный ветер! Западный ветер!</p><p class="p1">Капли-отравы вещей Гекаты, буки, дубравы, Татры, Карпаты, пляски безумных, бред Кастанед, взвизги мазурок, треск кастаньет! Рвался и грабил, хапал и цапал. Музыка сабель, капель и цапель. Мчит, самочинный, в наш мезозой вальс с чертовщиной, вальс со слезой!</p><p class="p1">Западный ветер! Западный ветер!</p><p class="p1">Западный ветер! Западный ветер!</p><p class="p1">Хладный, дождливый, плотный, болотный, лживый, глумливый, наоборотный, неимоверной мощи праща, ветер таверны, рощи, плаща! Лижущий долы, мнущий подолы, мат трехходовый, кукиш пудовый силе несметной сторожевой. Вечно предсмертный, вечно живой.</p><p class="p1">Западный ветер! Западный ветер!</p><p class="p1">Западный ветер! Западный ветер!</p><p class="p1">Бьет батальоны, путает кроны, рушит колонны, мечет короны. Грают вороны, воют дома. У обороны шансов нема. Свежий, бродяжий, дюжий, пригожий, проклятый стражей дух бездорожий, — вейся, стоцветен, дуй и целуй, западный ветер, за-а-а-па-а-ад-ны-ы-ый</p><p class="p1">ХУ-У-У-У-У-У-УЙ!</p></span><span id="id134"><div class="title5">
<p class="p">9</p>
</div><p class="p1">Когда Эверштейн пришел в себя, в первое время он не понимал, где он, что он и зачем он. Какой-то чужой дом, в котором сильно воняет пороховым дымом. Вероятно, бабушка готовила к обеду порох, и он убежал, перекипел. Зачем она готовила порох? Мало нам несчастий, так еще обед сбежал. Мир не удерживается под контролем, вечно норовит сбежать к кому-то другому. Тут же он вспомнил все и застонал от боли. Повернув голову, он увидел Ашу, стоявшую на коленях над губернатором. Наклонившись к его развороченному животу, она что-то шептала, словно вытягивая оттуда смерть. Губернатор лежал с закрытыми глазами, лицо его было бледно, волосы мокры.</p><p class="p1">Прислушавшись к себе, Эверштейн понял, что нечто вытягивают вовсе не из губернатора, а из него. Из него явственно уходила жизнь. Он чувствовал, что рана его, в сущности, пустяковая, грамотный хазарский врач поставил бы его на ноги в три дня, но теперь случилось что-то необратимое, и было уже поздно. Дело было не в ране. Туземка забирала у него силу и отдавала своему идиоту-губернатору. Это было похоже на переливание крови, но кровь можно перелить обратно, а силу уже не вернешь. Место, занятое в теле силой, заполняется соединительной тканью, зарастает хрящом, и Эверштейн уже почти не мог пошевелиться. Слабой, макаронной рукой он потянулся к пистолету — Аша даже не удосужилась его отнять, он так и валялся рядом, — но пальцы не слушались. Самое ужасное, что он не мог ничего сказать; язык повиновался ему, но говорить в самом деле было нечего. Все было слишком понятно.</p><p class="p1">Эверштейн, однако, понимал и то, что шутки кончились и сейчас он, вероятно, умрет. Это было непонятно. Умирать от глупого колдовства глупой туземки, которая, будь он здоров и невредим, не имела бы над ним никакой власти, да еще и в конце войны, после выигранного генерального сражения, конечно, выигранного, потому что варяжство бежало, оставив деревню Дегунино, — участь не просто обидная, а позорная. Обидно было не просто умирать, унося все свое знание, — и какое знание! — но и уйти, не поняв, зачем все это знание было нужно. Они почти победили, и теперь, стало быть, им должен был открыться следующий уровень Б-жественного плана; но Эверштейн уходил, так и не увидев его, хотя сделал для выполнения миссии больше многих. С этим он не мог смириться, хазарская обида сильна, и выкачивание жизни как будто замедлилось; он начал сопротивляться.</p><p class="p1">Губернатор застонал, но Аша и без того почувствовала бы, что операция осложняется. Она перестала шептать невнятные слова и посмотрела на Эверштейна очень спокойным и совершенно пустым взглядом. Эверштейн увидел бездонную пустоту ее глаз и обнаружил в ней следующий этап Б-жественного плана. Этот этап заключался в исчезновении Эверштейна и всех других Эверштейнов. Вся его безумная тяга к ускорению истории ускоряла движение в сторону этой бездонной пустоты, вся хазарская воля к оформлению аморфного оформляла только эту всепоглощающую кашу. Все, что могли ЖД сделать с коренным населением и с миром вообще, сводилось к одному: исчезнуть в этих совершенно пустых глазах, пустота — в пустоту. На фоне этого абсолютного, идеально замкнутого нуля ничто не имело смысла. Эверштейн вздохнул и перестал сопротивляться.</p><p class="p1">— Вот и ладно, — шептала Аша, — лежи, теперь все, теперь вытащу. Встанешь, в горы пойдем, через горы перевалим, в Азии перезимуем. В ноябре рожу, тихо сидеть будем, никто не найдет.</p></span></span></span></span>
