</div><p class="p1">— Надо платить за квартиру, — сказал отец.</p><p class="p1">Отношения с отцом были у Громова странные: отец и сын отлично понимали друг друга в главном и ничего не проговаривали вслух. Это было особенное целомудрие мужского взаимопонимания и дружбы. Теперь, увы, все выглядело подделкой — они молчали не потому, что хорошо понимали друг друга, а потому, что им нечего было сказать. Громов чувствовал, что глубоко на дне души отец понимает что-то и мучается, но собственная старость, слабость, привычка к заботе о собственном слабеющем теле мешают ему поговорить с сыном, как когда-то.</p><p class="p1">— Я заплачу, — сказал Громов. — Чего тебе таскаться, отдохни. Мне все равно в паспортный стол и еще в поликлинику эту идиотскую.</p><p class="p1">— Там очереди везде.</p><p class="p1">— Ничего, постою. Делать все равно нечего.</p><p class="p1">— Ты знаешь, — сказал отец после долгого молчаливого чаепития, — ты все-таки не торопись с выводами. У нас тут, конечно, убого. Я знаю, что ты скажешь. Погоди. Убого, да, но если бы тебе было, сколько нам, — Громов заметил это «нам», хотя отец был старше матери на семь лет, все-таки они, видно, очень несчастны, если уже сплотились в столь неразрывное целое, — если бы ты был, как мы, на пенсии, ты бы понял. У всего этого есть свои удобства. Не думай, пожалуйста. Ты, наверное, осуждаешь нас, что мы переехали. Это ведь была и твоя квартира, но…</p><p class="p1">— Ладно, пап, ладно.</p><p class="p1">— Нет, погоди. Тебя давно не было, я разучился с тобой разговаривать. Пойми, что так лучше. Тут зелено, — ах, опять не то. Я не про то говорю. Я хочу сказать, что здесь тот темп жизни, который нам подходит. Мы тут все время заняты, ты понимаешь?</p><p class="p1">— Понимаю, — машинально сказал Громов, отхлебывая жидкий чай; и чай они тут пили жидкий! Неужели так экономили, неужели им не присылали пособия за сына-офицера? Чай-то могли себе позволить!</p><p class="p1">— Когда вернешься, ты будешь жить отдельно. Как-нибудь разменяемся.</p><p class="p1">— Погоди, вернусь, не так долго осталось.</p><p class="p1">— Я просто… тут все удобно, под рукой, — торопливо заговорил отец, — и маме удобно, ателье близко, ей одно надо чинить, другое… Мы не покупаем нового, ты знаешь. Мы тебе откладываем.</p><p class="p1">— Не надо мне откладывать! — разозлился Громов.</p><p class="p1">— Ну, не сердись. Я все не то говорю. Я хочу тебе сказать, что такая жизнь, как у нас… не надо ее осуждать.</p><p class="p1">— Я никого не осуждаю.</p><p class="p1">— Но я же вижу. Я сам понимаю, что было лучше. Но и ты понимай, мы все-таки уже с матерью…</p><p class="p1">— Господи, пап. Я и так об этом много думаю, как вы здесь.</p><p class="p1">— Ну ладно. Все-таки сходи куда-нибудь… к друзьям… Что тебе в эту сберкассу?</p><p class="p1">— Нет, мне все равно на регистрацию. Это же по пути, наверное?</p><p class="p1">— По пути, да…</p><p class="p1">«По пути всякой плоти», — сказал бы ему отец, если бы мог. По вечному пути, по которому пройдешь и ты, — тебя тоже постепенно перестанут интересовать все вещи, кроме собственной физиологии; мир устроен справедливо — так, чтобы уходящий утратил почти все способности и не мог уже в полную меру переживать ужас своего распада и ухода; так, чтобы и миру не жаль было терять отработанный материал. Ты будешь когда-нибудь, как мы, и сам захочешь жить на окраине, по образцу спального района семидесятых, устроенного как раз для стариков, потому что и время было старческое, все в прошлом, — жалкое, неуверенное в себе. Ты когда-нибудь непременно приедешь сюда — и поймешь, что не надо было никого осуждать, но сказать об этом будет некому. Всякий старик утешается тем, что молодые когда-нибудь раскаются, — других утешений в его убожестве нет. Все это Громов-отец обязательно сказал бы сыну, постаравшись передать всю свою заваленную глыбами старости тоску и нежность, — но сил у него уже не было, как и ни на что и ни у кого уже не было сил.</p><p class="p1">В спальных районах стариков действительно загружали по полной программе: у них едва оставалось время проглотить обед. Жизнь здесь — стихийно или по иезуитскому плану социального министерства — была организована так, чтобы старики плавно перетекали из одной очереди в другую, устраивая свои пустяковые дела. Очередь стояла за всем — за дешевым обезжиренным творогом в молочной палатке, за справкой, которую требовалось возобновлять ежемесячно, за одеждой, выдаваемой по социальной программе и все равно никуда не годной, — но старики, по вечной неуверенности и скопидомству, брали и такую. Все они жили в ожидании загадочного крайнего случая, не догадываясь, что крайний случай давно наступил и что в их ситуации такое ожидание было непозволительным оптимизмом.</p><p class="p1">Все в этом спальном районе мучительно напоминало позднесоветские времена хрупкого уюта и бессмысленного скопидомства. Громов помнил их генетически, смутно, по первым годам детства. Все держалось на пределе; дома ветшали в первый же день после постройки — их словно и строили облезлыми, как в классическом саду искусственно возводят руины. Повсюду висели плакаты, предупреждающие об экономии — даже теперь, когда нефти было залейся. Район был населен почти исключительно стариками и детьми, причем старики решительно преобладали. Дети тоже были стариковатые, белесые, робко прыгавшие через веревочку. Ясно было, что выше этого спального района они в жизни не прыгнут: страты перестали смешиваться. Старики читали им книги, купленные когда-то еще для их родителей. Поразительней всего было то, что ровно таких же стариков Громов видел когда-то в детстве, они сидели на тех же лавках и, мнилось, с теми же детьми. Механизм их воспроизводства, выходит, никуда не делся. Советская жизнь вытеснилась на эту окраину и вернулась здесь в наиболее естественное свое состояние — в очередь, где каждый завидует стоящему впереди и презирает стоящего позади. В сущности, вся советская система тоже строилась как очередь — блага доставались за выслугу. Главный приз маячил в конце, но его не было видно — его заслоняла то машина, то квартира, то дача. Все стояли в очереди за смертью, опасаясь, что ее не хватит на всех, — и даже атрибуты похорон оказывались в дефиците; дефицит маячил и тут, поскольку в стране был хитро организован избыток дорогого и катастрофический недостаток доступного. Вдобавок в окраинных районах так хитро были организованы магазины, что очереди возникали сами собой: на весь магазин работала одна кассирша, в паспортном столе сидел один пыльный мент, а наведываться в паспортный стол пенсионерам приходилось чуть не ежедневно, и в этом смысле их жизнь устроили идеально. Им некогда было не то что протестовать, но задуматься. Между ежемесячными вручениями пенсии требовалось собирать такое количество бумаг для подтверждения права на нее, столько медицинских справок, бумаг с бывшего места работы и заключений загадочных квалификационных комиссий, чья работа в свою очередь регламентировалась тоннами бумаги, — что старики ощущали себя самой занятой и востребованной частью общества. Варягам нельзя было отказать в изобретательности: молодых они умели отправить в армию, стариков мобилизовать в очередь.</p><p class="p1">Старики не только не жаловались — они были горды такой жизнью. Очереди были их клубами, их митингами, их средством самоутверждения. Громов заметил, до чего медленно все тут делалось: в очереди на обследование старики успевали обсудить десятки своих болезней, в очередях на оформление пенсий — неблагодарность детей, в очередях за хлебом — дороговизну; все были больны и еле-еле скрипели, но этот скрип мог продолжаться бесконечно. Все были бессмертны. Смерть была исключена из этого мира, ибо очередь не убывает после того, как очередной очередник, в свою очередь, купит диабетическую булку. Куда исчезает купивший — никто не задумывается; ясно, что булка ему не нужна, ведь у него не диабет, а паркинсонизм, совсем другое дело; он просто переходит в другую очередь — в собес, на флюорографию, к райским вратам… Без флюорографии вообще ничего не делалось, она осталась последним рудиментом советских диспансеризаций. Без нее не выдавали даже карточки. Карточки, правда, ввели только в первый год войны, к майским праздникам частично отменили — оставили только на снотворные.</p><p class="p1">Громов высидел очередь в паспортный стол, оттуда его отправили за справкой в ЖЭК, в ЖЭКе должны были выдать бумажку о метраже родительской квартиры и о том, что родители не нуждаются в дополнительной жилплощади для размещения сына, прибывшего в отпуск; если бы нуждались, пришлось бы идти еще в инспекцию по распределению жилья, где должны были бы выдать справку о том, что свободной жилплощади в районе нет, но можно получить компенсацию в размере 13 рублей 29 копеек, обязательно с простыми числами; отказ от получения компенсации был чреват штрафом на сумму пяти компенсаций, который вычитался из пенсии. В ЖЭКе, несмотря на июль, пили чай две тетки в мохеровых кофтах, высоких шапках и зимних сапогах. Громов сначала заподозрил, что это чучела, но тетки периодически прерывали чаепитие и запускали по одному человеку; к часу дня он получил бланк, который следовало заполнить в ближайшей сберкассе, но сберкасса работала по прихотливому графику — по четным числам с утра, по нечетным с обеда, в первую половину месяца обед был с часу, во вторую с двух, к тому же была больна кассирша, и Волохову пришлось час курить на качелях, на детской площадке в серо-зеленом дворе, обрызганном теплым дождиком. Маленькая девочка, похожая на старушку, крутилась на скрипучей карусели, отталкиваясь ногой и выкрикивая монотонное «Трамбал! Трамбал! Трамбал!». Что это было — то ли подслушанное у больной бабки название трамала, то ли странно искаженный трамвай, — Громов не догадался. По мусорным бакам шныряли пестрые кошки. К дверям сбербанка Громов подошел за десять минут до конца обеда, но выяснилось, что перед его началом старики успели записать свои номера и тут же восстановили искусственно прерванную очередь; Громов был теперь пятнадцатым. Все стояли за пенсией, у всех пахло изо рта гнилью и разложением, у всех было что-то с желудком или легкими, и у каждого в горле что-то булькало. Каждый старик, подходя к окошечку, униженно здоровался, после чего заявлял, что он инвалид второй группы. Далее извлекался ворох обтерханных справок. Девушки в сбербанке высохли прежде времени, ибо выслушивали эти разговоры ежедневно, с перерывом на чай с булкой или китайскую лапшу, и от едкой, с поддельными специями лапши сохли дополнительно. Все это Громов охранял, за это он воевал. Булькая мокротой, старики требовали по десять раз объяснить им, правильно ли они заполнили бланки и не будет ли чего, если в одну графу сведения не влезли и пришлось переносить их на другую строку. Старикам казалось, что сейчас их в очередной раз обманут. Они по пять раз собирались уходить и возвращались к окошечку с негодующим «Я стоял!», «Я стояла!» — старики, впрочем, были как-то стыдливее, оглядывались на Громова виновато, вот, мол, чем приходится заниматься, тогда как старухи были в своем праве. Во время деградации вылезало женское, истинное, — ведь фундаментальное различие между полами всего одно: мужчина всегда виноват и должен оправдываться, женщине все должно доставаться само собой, этого гендерного стереотипа не выбьешь никакими эмансипациями, потому что это так устроено. Старухи были особенно твердо убеждены, что девушки в окошечках их обманывают. Они по десять раз переписывали счета с тридцатью нулями, — на эти счета перечислялся теперь налог на армию, за неуплату лишали пенсии на полгода, — скандалили из-за телефонных счетов и квитанций на электричество. Громов не понимал одного: каким образом старики научились выживать среди всего этого? Любого нормального человека такая жизнь свела бы в могилу, — но им она напоминала советскую, а потому была живительна и стопроцентно понятна. Они наслаждались пролонгацией всякого действия. Старик вообще стремится затянуть все, что делает, — ибо уже понимает, что спешить некуда; он ничем не занят, кроме затягивания собственной жизни, и потому растягивает до последнего предела любой процесс, будь то дорога за хлебом или ссора с соседом. С девушками в окошках старики и старухи вступали в долгий спор либо столь же долгий обмен любезностями: Валенька, вы чудно выглядите сегодня. Как мама? Как папа? Ой, не говорите, эта погода… Иссохшая Валя кивала, а три минуты спустя уже оправдывалась перед следующим стариком, который, напротив, ничего не знал о ее маме и папе, зато негодовал на задержку пенсии, за которой уже приходил вчера и ушел после твердого обещания выплатить ее послезавтра, но сегодня на всякий случай пришел опять, напомнить, что он инвалид второй группы. В громовском детстве роль инвалидности играло ветеранство, но теперь ветеранов осталось не больше тридцати на страну: это были крепкие, бодрые, ничего не помнящие старики, только потому и выжившие, что им все удалось забыть. Перед днями Победы они были нарасхват, выступали перед призывниками, в неизменном составе маршировали по Красной площади и получали в подарок то акваланг, то снегокат.</p><p class="p1">Громов отстоял очередь в сбербанк, вернулся в ЖЭК, отстоял очередь за справкой, узнал все о состоянии здоровья пяти старух, томившихся в приемной под неизменным антиалкогольным плакатиком, и к семи вечера подошла его очередь регистрироваться в паспортном столе. Без пяти семь пыльный милиционер закрыл паспортный стол.</p><p class="p1">— Извините, — сказал Громов, — я в отпуске, может быть, можно…</p><p class="p1">— Послезавтра, — сказал мент.</p><p class="p1">— Почему не завтра? — опешил Громов.</p><p class="p1">— Что значит — почему? — сухо спросил мент. — Существует известный распорядок.</p><p class="p1">— Но мне надо в комендатуру…</p><p class="p1">— Что значит — в комендатуру? — спросил мент. — Всем надо в комендатуру. Надо было вовремя приходить, и вы бы имели успеть. Но как вы пришли, так вы и имеете. Не задерживайте, не загораживайте.</p><p class="p1">— Слушай, служивый, — сказал Громов. — Я офицер, у меня тоже служба…</p><p class="p1">— Что значит — тоже служба? — спросил мент. — Если вы будете тут разглагольствовать, если имеете тут загораживать, то мы можем поговорить иначе, и тогда выяснится, какая служба.</p><p class="p1">Громов повернулся и вышел. Он все уже понял и, если честно, втайне догадывался о том, что не зарегистрируется сегодня. Он понимал, что в отсутствии целей и смыслов население надо чем-то занять, а так как работы тоже нет, занять его можно только добычей той или иной бумаги, дающей право получить еще одну бумагу. Молодежь могла самоистребляться в перестрелках, войнах или экстремальных развлечениях, а старики — бесконечно длить полусуществование в очередях. Страна превратилась в обитель самоуничтожающейся молодежи и непрерывно, как дворовая карусель, скрипящих по кругу стариков. Громов понял, что тоже стоит в очереди на эту участь. Идти домой пешком ему было невыносимо. Он сел в троллейбус. От паспортного стола до дома было три остановки.</p><p class="p1">Троллейбус ехал медленно, тоже скрипя и дребезжа. Тут все делалось медленно, ме-е-едленно, ибо медлительность есть власть, а тут было сразу много властей: власть времени, власть распада, просто власть, а человек, существо быстрое, ничего тут не мог и не значил. Человеку тут ничего было нельзя в силу этических, физических, юридических, биологических и климатических причин, и каждый имел девяносто девять оснований ничего не делать, а тот, кто делал, был всегда и во всем виноват. Тесно мне, тесно мне. Мне душно, мне медленно. Так медленно идет жизнь, а когда проходит, оказывается, что все произошло очень быстро. Я вхожу в эту жизнь, как в воду, я чувствую, как она тормозит, расхолаживает, поглощает меня. Пожалуй, мне надо поскорей убираться отсюда. Пассажиров было мало. Молодой человек, то есть подросток, или там отрок, короче, существо лет восемнадцати, для которого в русском языке не было подходящего слова, не юношей же называть грязного, прыщавого типа в косухе, орал на толстую накрашенную деваху в платье с голубыми и розовыми разводами. Деваха оглушительно рыдала. Она хватала отрока за косуху. Еще бывает слово «парень». Я люблю, когда мой парень сзади. Мой парень требует, чтобы я себе брила. Подскажите, дорогая редакция, не опасно ли это. Ее парень отпихивал ее, упираясь в толстые сиськи. Она рыдала и умоляла. Он орал «Отвяжись, сука!» и наконец вмазал ей по толстой морде. Публика наблюдала без особенного интереса, в сериалах она видала и не такое.</p><p class="p1">Тут в Громове наконец распрямилась пружина, сжимавшаяся весь день, а может, и все два года перед тем, а может, и всю жизнь. Он вскочил с изрезанного кожаного сиденья, одним прыжком достиг парня и принялся мутузить его так, что в первые секунды сквозь красный туман перед глазами и красный шум в ушах ничего не воспринимал. Ему казалось, что парень визжит толстым женским голосом. Это злило Громова дополнительно. Он бил его так и еще вот так, до хруста, повалил, уселся сверху, заломил руку и бил теперь лицом об пол. Каким-то образом парень, лежа на полу с заломленной рукой, ухитрялся хватать Громова за волосы и за уши, царапать ему щеки и звать на помощь. Вскоре до Громова дошло, что его оттаскивает девка.</p><p class="p1">— Убил! — орала она. — Петю убил! Сука, тварь, он убил Петю! Милицию зовите! Ой, зовите милицию!</p><p class="p1">Никого в троллейбусе не удивляло такое развитие событий. Всем было понятно, что Громов первым напал на парня, подростка, что отрок выяснял отношения с отроковицей, а третий не лезь, и вообще коренное население, ка к знаем мы, но не знал Громов, не стремится вмешиваться в ситуацию, даже когда рядом кого-то насилуют, потому что насилуют, может быть, и за дело, мы же не знаем; девка молотила Громова по спине, плечам, голове, царапала ему щеки и шею и оглушительно визжала. Водитель вел троллейбус, не отвлекаясь.</p><p class="p1">— Петю убил, сука! — орала девка. — Гад, Петю! Люди, милицию!</p><p class="p1">Громов перестал бить юношу и переключил внимание на юницу. Он тупо смотрел на нее, не понимая. Потом до него дошло. Он понял, что девушка горячо вступается за любимого.</p><p class="p1">— Он же тебя бил, — пробормотал Громов.</p><p class="p1">— Кто бил? Он бил?! Кто видел, что бил?! Ты сам, сука, ты первый, сука…</p><p class="p1">Троллейбус остановился. Громов вышел. На остановке было пусто. Последним, что он видел в троллейбусе, был неуверенно поднимающий голову отрок — и отроковица, влюбленно хлопочущая над ним. Троллейбус уехал.</p><p class="p1">Громов стоял на городской окраине и вдруг увидел поезд. Поезд шел далеко за домами, медленно, как все на этой окраине. Над ним стоял бледный месяц. Небо на западе синело, а на востоке еще голубело, и по нему плыли розовые полосы. Поезд шел на восток.</p><p class="p1">Громов бросился бежать и в минуту достиг железной дороги, проходившей за тремя высокими, длинными серыми домами. Поезд был длинный, его оставалось еще много. Громов впрыгнул в ближайший вагон, приоткрытый ровно настолько, чтобы туда можно было пролезть. Поезд подали словно нарочно. Земля тут сама управляла поездами, переводила стрелки и меняла направления. Громов не знал, куда едет этот поезд, но с детства мечтал уехать на поезде, идущем мимо дома. В вагоне лежала охапка сена. Кажется, такая охапка сена лежала в каждом вагоне.</p><p class="p1">Делать тут больше было нечего. Громов улегся на сено и стал смотреть в приоткрытую створку вагона. Поезд медленно шел мимо домов, остановился, прошел в серые стальные ворота и двинулся дальше, прочь из этого города.</p></span><span id="id119"><div class="title5">
<p class="p">7</p>
</div><p class="p1">Если сесть на этот поезд, можно ехать вдоль окраин, мимо школ и поликлиник, гаражей и огородов, мимо фабрик и заводов, мимо свалок и отходов, медленно переходящих в состояние природы; если сесть на этот поезд, можно ехать вдоль природы, пригородов, переездов, полустанков, семафоров, элеваторов, заборов, рек под хлипкими мостами, текстов с темными местами, грядок, гравийных карьеров, недокрашенных сараев, перекрашенных бараков, перекошенных подъездов, недокошенных оврагов, недокушанных объедков, недостроенных объектов, недостреленных субъектов, многих слов с приставкой «недо» и других, с приставкой «пере», — а меж ними только поезд, золотая середина. Он идет с привычным грузом по дороге по железной. Если сесть на этот поезд, можно выехать отсюда.</p><p class="p1">Можно выехать в пространство промежуточное, в область умолчаний и догадок, пешеходов, пассажиров, путешествующих, плавающих и обремененных, в промежуточную область переходов, переносов, сдвигов и анжамбеманов, будок, стрелок и клетушек, станций, пристаней, причалов, накопителей и стоек регистрации; короче — в область меж собой и миром, в ту, где бодрствует дежурный и командует диспетчер, отправляя самолеты и встречая пароходы.</p><p class="p1">Миновавши эту область, можно выехать в другую, безграничную, в которой только небо, только ветер, только радость, но не радость, а какое-то другое; вот летит веселый аист, цапля серая пухпухга, или вещий Вяйнямёйнен — кто их знает, угрофиннов; вот растет степное чудо — гомерический подсолнух, вот цветут ночные травы, это те ночные травы, что не любят света солнца; вот гуляет глупый пингвин, жирной молнии подобный, шаровой, — а буревестник громко дразнится, подобный глупой молнии; а дальше стонут вещие гагары, ноют тощие верблюды, веют воющие ветры Средней Азии. И степи превращаются в пустыни.</p><p class="p1">Если сесть на этот поезд, наконец увидишь своды бледно-выцветшего неба, арки, парки, минареты Ашхабада, Самарканда, Бухары и Хоросана, огнедышащее небо Закавказья и Кавказа, под которым копошатся и пируют дети юга, у которых нету сердца, но зато избыток фруктов. Если сесть на этот поезд, можно выпасть отовсюду — так солдат, уехав в отпуск, выпадает из сраженья. Вскочишь в темный куб вагона, проползешь по гулким рельсам, выйдешь из повествованья — и вернешься в эпилоге.</p></span></span></span></span>
