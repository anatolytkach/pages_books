</div><p class="p1">В это же самое время в Москве, в Генеральном штабе, пилили бюджет генерального сражения.</p><p class="p1">Крайне далеко от сути варяжства легкомысленное предположение, будто воровство — дурной признак либеральной хазарской природы, черта ненавистного рынка. Хазар не снисходит до воровства: он просто берет все, как свое, не сомневаясь в праве эффективного собственника на любую собственность. Варяги, в отличие от хазар, никогда не считали себя эффективными собственниками. Эффективность недостойна их. Есть глубинное различие между хазарством и варяжством: почти каждый хазар от рождения чувствует себя властелином мира, но почитает долгом хоть как-то соответствовать этому высокому званию. Он искренне стремится к первенству во всем, дает детям образование, читает сложные книжки, делает стремительную карьеру в любой области, куда его допускают, и проявляет навязчивую активность. Не таков варяг: его право на все вещи, звания и территории ничем не подкрепляется. Это право имманентное, врожденное, не нуждающееся в обоснованиях, и потому любые упоминания о заслугах для варяга оскорбительны. Он не намерен суетиться, активничать и выслуживаться. Он должен получать земные блага просто так, не прилагая усилий; и чем грязней, несчастней и ни к чему не способней варяг, тем нагляднее закономерность. Именно поэтому обозреватели вроде Топтухина так любили подчеркивать варяжскую бедность, жалкость, ничтожность — и так гордились ею. Варяжский принцип отрицательной селекции срабатывал не только в России, где захватчицкое начальство продвигало наверх самых тупых, жестоких и грубых; варяжский военачальник всегда был тупее и жесточе остального войска, поскольку демонстрировал тем самым врожденное право худших быть лучшими.</p><p class="p1">Главная проблема варяжства в мирные времена заключалась в том, что оно и тут не могло отказаться от идеи насилия и захвата. Собственность, которую варяг тырил, он тут же и уничтожал нерачительным хранением или нецелевым использованием: воин воюет не ради поживы, а ради наслаждения грубой красотой битвы. Эффективно использовать награбленное было для варягов так же постыдно, как заниматься любовью по расчету. Их воровство было бескорыстно, оно носило характер захватнический, воинственный и грубый. Земля давно уже принадлежала им, лежала покорно, не сопротивляясь, — но они рвали и рвали от нее куски, как если бы им кто мешал или, не дай Бог, ругался. Генералы воровали не потому, что хотели сладкой жизни. Воровство не приносило им счастья. Они воровали, чтобы доказать доминирование, подтвердить генеральство, а заодно и сделать жизнь солдат максимально невыносимой. Коренное население было робко, трусливо, лениво — такой солдат мог хорошо воевать только от полной безысходности; офицерству, впрочем, тоже не след распускаться — истинный варяг должен быть постоянно озлоблен и срывать зло на подчиненных, чтобы они боялись своих, варягов, больше, нежели врагов. В силу описанных причин генералитет не мог не воровать — это был священный долг и своего рода подвиг. Они воровали тяжело, мучительно, ибо ритуал требовал изобретения бесчисленных отмазок и предлогов, в чем варяги никогда не были сильны, — но что поделаешь, приходилось: чай, мы не хазарове поганые, чтобы брать просто так, как бабы пьют водку, не морщась.</p><p class="p1">— Идеологическое обеспечение, — брезгливо говорил генерал-лейтенант Колесов, огромный, обрюзгший, оплывший, словно сошедший с карикатуры времен хазарского засилья, но и видевший истинную варяжскую доблесть именно в том, чтобы воплощать собою тип варяжского служаки: не красотою силен генерал, и не в изяществе его очарование. Колесов сипло дышал, не мог отжаться от пола, любил баню и страдал после нее тяжелыми мигренями. Истый военачальник не должен много шевелиться, чтобы солдату, глядючи на него, было о чем мечтать. — Войсковой молебен. Проводит генерал-иерей Гундоскин, ответственный полковник Козяев.</p><p class="p1">— Я! — Козяев встал и щелкнул каблуками. Колесов с трудом подавил желание сказать ему что-нибудь вроде «Головка от патефона»: он любил пощеголять истинным окопным юмором.</p><p class="p1">— Плац-балет, — продолжал он зачитывать по списку. — Выполнение упражнений на раз-два-три, ружейные приемы, торжественное прохождение мимо трибуны, приветственная речь генерал-лейтенанта Колесова. Я. Ну, это я скажу. Показательный расстрел отобранных СМЕРШем симулянтов — начальник Центрального отделения СМЕРШа генерал-майор Тютюнин…</p><p class="p1">— Я, — холодно сказал очкастый прямой Тютюнин, не привставая. СМЕРШ никогда не рубился перед начальством, все ходили под СМЕРШем.</p><p class="p1">— Лично будете расстреливать? — В голосе Колесова впервые появилась заинтересованность.</p><p class="p1">— По обстоятельствам, — еще холоднее ответил Тютюнин, не обязанный делиться с «зелеными», как в СМЕРШе презрительно называли боевиков, спецтайнами спецмероприятия спецслужбы.</p><p class="p1">— Ладно, — буркнул Колесов. — Не затягивайте с формальностями, в двенадцать ноль-ноль время «Ч». Подготовка поля?</p><p class="p1">Согласно новому варяжскому уставу гарнизонной, караульной и всенощной службы поле боя, как каток перед соревнованиями фигуристов, должно было готовиться загодя. На самом деле никаких работ не проводилось, только выгоняли роту-другую поутаптывать грунт и помахать метелками, но на расчистку поля перед каждым сражением выделялся серьезный бюджет, традиционно падавший в карман руководителя так называемых полевых работ.</p><p class="p1">— Поле готовится, — несколько суетливо доложил хозяйственник, генерал-майор Каблучный. — В процессе подготовки поля обнаружен холм, идет равнение холма.</p><p class="p1">— Вы что это, генерал-майор Каблучный? — брезгливо спросил генерал-полковник Колесов. — Вы в Дегунине ровного поля найти не можете? Вы, может быть, по Интернету рельеф выбираете? — В устах Колесова трудно было придумать ругательство страшнее «Интернета». — Вы за детей нас, может быть, держите, генерал-майор? Вэ че че пе, солдатская мать в душу… У меня послезавтра генеральное сражение с превосходящими силами Жэ Дов, а вы, солдатская мать, равняете мне тут холмы среди дегунинской равнины. Я вас в расход, генерал-майор Каблучный, я вами подотрусь, я топчу, я презираю вас и в ногах попираю! Я делаю с вами вот так, вот так! — Колесов встал, отшвырнул кресло и тяжело потоптался. Каблучный молчал, уставившись в пол. Он знал ритуал. — Вы будете жрать говно, генерал-майор Каблучный, и я лично прослежу, чтобы оно было жидкое! — Генералы услужливо улыбнулись. — Вы агент противника, генерал Каблучный, нет, полковник Каблучный, нет, прапорщик Каблучный.</p><p class="p1">С каждым понижением его в должности Каблучный опускался на подгибающихся коленях все ниже, а в момент производства его в прапорщики встал на четвереньки и гнусно завыл.</p><p class="p1">— Достаточно, — сказал Колесов, отдуваясь. — Если завтра не разравняете холма, я сделаю вам больно, я растерзаю вам жопу на британский флаг и глаз на нее натяну.</p><p class="p1">Генерал-полковник Колесов вернул кресло на место и сел. Успокаивался он мгновенно. И он, и генерал-майор Каблучный отлично знали, что в Дегунине нет никакого холма, но для более молодых генералов и прикрепленного к генштабу специального корреспондента газеты «Красная звезда» подполковника Тутыхина нужно было имитировать бурные разносы. Так создавались легенды о том, как, гонимый гневом штабного тучегонителя, генерал лично брал в руки лопату и вместе с подчиненными сравнивал холм с землей: без надрыва и пупочной грыжи деятельность генштаба была немыслима. Тутыхин так себе и записал: репортаж, холм.</p><p class="p1">— Размещение представителей прессы, — продолжал начштаба. — Корреспондентский пул утверждается генерал-майором Зубиковым.</p><p class="p1">— Я! — радостно вскочил Зубиков.</p><p class="p1">— Список, — потребовал Колесов. Зубиков положил перед ним поименную роспись штабного пула: двадцать человек, преимущественно первый и второй федеральный каналы, «Красная звезда» и трое проштрафившихся из прочей прессы, которых ссылали на фронт для исправления. Они призваны были вести репортаж непосредственно из окопов, тогда как группа мужественных репортеров программы «Специальный корреспондент» — в пуле их знали под кличкой «Три толстяка» — наблюдали за сражением непосредственно с генеральского НП. Они же получили аккредитацию на расстрел и почетное право крупным планом добить недобитых.</p><p class="p1">— Годится, — сдержанно одобрил Колесов. — Прочие расходные статьи: спектакль Московской артистической артели «А зори здесь тихие»… Это что такое, я спрашиваю?</p><p class="p1">— Это после сражения, в порядке отдыха, — браво рапортовал главный идеолог штаба генерал-майор Коромыслов.</p><p class="p1">— Какой отдых, генерал-майор Коромыслов? Солдат только что чуть не помер, в нем адреналин бушует, ему поспать теперь до следующего сражения, а вы ему зори свои тихие суете? Вы из Москвы на деньги народные попрете ему в Дегунино военным бортом свой монастырь стародевичий из московской артистической артели? Вы будете на деньги народные солдата после сражения кормить своими старухами растелешенными? Я буду вас так и так, генерал-майор Коромыслов! — кричал Колесов, но, конечно, уже не с тем пылом, с каким опускал Каблучного в прапорщики. Кончилось тем, что деньги на артистах он сэкономил, а сэкономленное выписал на себя.</p><p class="p1">Покончив с военным советом и окончательно распилив бюджет между идеологическими, интендантскими и тыловыми службами, а на собственно сражение выделив примерно двадцатую часть бюджета, Колесов тяжело поднялся и, небрежно попрощавшись, прошел к себе. В кабинете, щедро декорированном инкрустациями на темы русских берез и смиренных дев, машущих платочками вслед уходящему воинству (последнее вырезано было из мореного дуба), он сел за огромный стол и по вертушке связался с начальником ЖДовского штаба. Началась изощренная штабная игра.</p><p class="p1">Согласно тайной договоренности, достигнутой в верхах, после генерального сражения ЖД должны были получить Краснодарский край и часть Ростова, отделить их от основной территории непроходимым забором и зажить припеваючи в южной части бывшего Каганата, полное восстановление которого оказалось невыполнимой, а главное — бессмысленной задачей. Согласно тайной генеральской игре, войну следовало продолжать до последнего солдата, поскольку именно такова была стратегическая цель варяжства, более всего озабоченного истреблением собственного населения, а хазарские военачальники своих хоть и берегли, но заканчивать войну на условиях противника считали ниже своего достоинства. Наконец, хоть генералы и вступили в сговор, решившись саботировать действия своих же правительств, но варяги ненавидели хазар до того, что не верили ни одному их слову, а хазары не верили вообще никому. Из этих трех векторов слагался сложный тактический расчет. Плелась интрига, которую варяжский начштаба Колесов и хазарский начштаба Строцкий вели с наслаждением, самоуважением и изобретательностью. Все на свете обусловлено множеством факторов; проблема только в том, что и факторы эти говно, и все на свете говно, и скучно разбираться, что чем обусловлено.</p><p class="p1">Оба военачальника в соответствии с тайной договоренностью правительств сдавали друг другу результаты своих секретных совещаний, в соответствии с собственной установкой на войну перевирали их с точностью до наоборот, а в соответствии с варяго-хазарским взаимным недоверием даже и получившейся белиберде верили только наполовину, так что реальность войны, трижды преображенная, ускользала от них окончательно. Колесов наврал, что генеральное сражение назначено на полдень, хотя назначил его на одиннадцать; Строцкий решил, что варяги, как всегда, врут и выступать надо в десять. Колесов сказал, что сражение будет дано при Дегунине, и точно — обе армии давно топтались вокруг этого богатого и плодородного села, единственного, где можно было достать пищу (в прочих давно уже шаром покати, война, все дела). Строцкий, однако, не поверил и решил, что сражение будет дано при Баскакове, где размещался варяжский штаб. Наконец, Колесов точно знал, что ядерное оружие ввиду ведения боевых действий на своей территории применяться не будет, но Строцкому сказал, что будет; Строцкий, услышав это, заключил, что будет применено также и химическое. Всегда, знаете ли, лучше подстраховаться.</p><p class="p1">Организовав взаимную утечку, генералы удовлетворенно повесили трубки и потерли руки. Воцарилось благолепие. Хеллер отдыхал, Гашек сосал, и я тоже что-то плохо себя чувствую.</p></span><span id="id127"><div class="title5">
<p class="p">2</p>
</div><p class="p1">В это же самое время генерал-майор Пауков составлял диспозицию для будущего генерального сражения. Стратег, он хорошо знал, как пишутся диспозиции. Они все равно никогда не исполнялись. Варяги воевали как Один на душу положит, подчиняясь внезапным велениям сердца и прихотливому движению боя. В конце концов всегда наступал предел, за которым бесчестье и гибель, — и на этом пределе коренное население обязательно совершало подвиг, такова уж была его природа, не только ратная, но и бытовая. В реальном сражении Пауков пасовал, ибо не чувствовал ни духа войска, ни настроя противника; он не умел предугадывать чужие замыслы и внушать бодрость собственным подчиненным, — но диспозиции выходили у него круглы, пространны и внушительны.</p><p class="p1">«Первая колонна федеральных сил (батальон 1) марширует на северную оконечность деревни Дегунино, — писал он, одновременно нанося на карту толстую синюю стрелу, — и героическими усилиями, не жалея крови и самой жизни, удерживает высоту 23.30 в квадрате 2569. Вторая колонна (батальон 2) марширует на южную оконечность деревни Дегунино, где окапывается вдоль берега реки Дресвы, отрезая противнику возможную переправу через нее. Третья колонна (рота 13) марширует в обход деревни Дегунино в сторону деревни Баскаково, совершенно деморализуя противника и вводя его в заблуждение. Когда же противник отвлечет свои силы от штурма и оттянет их в сторону деревни Баскаково, третья колонна, не доходя упомянутой деревни, сворачивает налево и вместо Баскакова идет к восточной оконечности деревни Дегунино, где занимает оборону и в 13:18 переходит в решительное наступление свежими силами. Путем усиленной артиллерийской подготовки противник вынуждается к ответным действиям. Артиллерийская подготовка осуществляется силами дивизиона, при участии установок „Град“, „Ливень“, „Тайфун“ и „Погода дрянь“. Четырнадцатая рота под командованием капитана Фунтова выдвигается на западную оконечность деревни Дегунино и до особого распоряжения находится там. В 15:32 первая колонна перемещается на южную оконечность деревни Дегунино, а ее место занимает вторая колонна. Четырнадцатая рота ударяет в тыл противника и, посеяв панику в его рядах…».</p><p class="p1">Пауков как всякий военный, даже не открывавший «Войны и мира», отлично знал, что суть воинских распоряжений, делаемых начальниками разных рангов, заключается вовсе не в том, чтобы войска выполняли распоряжения, делаемые ими, и вследствие этих распоряжений занимали бы такие-то и такие-то позиции, но что суть эта заключается в том, чтобы несколько тысяч праздных и сытых людей имели возможность поставить себя в такие условия жизни, при которых они могли бы, не только не рискуя собой, но даже и не приближаясь к месту боевых действий, совершать бессмысленное и противное человеческой природе дело, а именно регулировать людские потоки, в то время как всякая война и 0,99 всех сражений выигрываются не маршировкою первой колонны, второй колонны и т. д., а тем неуловимым, но ясно чувствующимся духом войска, который не зависит ни от каких диспозиций и марширующих колонн, а лишь от совокупности тысяч воль, начитавшихся Шопенгауэра и никак не могущих закончить многострочный период, скучный, как война, и бессмысленный, как мир. Пауков отлично понимал, что диспозиция его, даже если бы кто-то и пожелал ее выполнить, не содержит и йоты смысла — потому что вся она сводится к перемещениям вокруг Дегунина, по почти ровному кругу, лишь бы солдатики ходили. Это была тонкая смесь психической атаки, стратегического расчета и наведения порядка в расположении.</p><p class="p1">Ближе к финалу эти перемещения становились все более хаотическими, словно колонны делались все легче, неуклонно теряя людей и начиная обращаться в образчики мобильности. Поредевшие колонны начинали бегать вокруг Дегунина, как поезда по Кольцевой. Наверное, этот маневр долженствовал вызывать у противника зависть, смешанную с ужасом: война, а они так бегают!</p><p class="p1">Но особенно он гордился маневром, придуманным для Жароносной Дружины. Не путать с летучей гвардией: эта гвардия скиталась, по его расчетам, где-то в окрестностях деревни Чумкино, вылавливая партизан. Такое последнее задание дал ей Здрок (на деле, конечно, ни с какой гвардией не связывавшийся, ибо Волохов с его орлами был давно вне пределов его досягаемости): надо было выловить распоясавшихся партизан. Кому же, как не летучим. Жароносная Дружина — совсем иное: элитный боевой отряд, мастера рукопашного боя по системе древних северных ратников. Национальные боевые искусства, перунизированное самбо, снабженное боевыми кличами вроде «Влесе, рцы!» или «Молонья, жги!». На «Влесе» — замах, на «рцы» — удар пяткой в грудь, в ключицу, в переносицу, чтобы хрустнуло в противнике. Жароносная дружина призвана была поражать противника мобильностью, мечась с одного участка фронта на другой: впервые появившись у Дресвы, она должна была затем промаршировать к южной оконечности Дегунина, дать там короткий показательный бой, метнуться к западной оконечности, поджечь пару домов, отправиться в лес, настигнуть там стремительно убегающих хазар, подойти к северу, взорвать правление бывшего колхоза, выйти к другому лесу, что направо, и там окопаться у болота в ожидании, пока разрозненные силы противника устремятся к нему в надежде укрыться за деревьями. Здесь-то Жароносная Дружина и должна была нанести решающий удар, своего рода coup d’etat, загнав варягов в болото и тем повторив в слегка усовершенствованном виде бессмертный подвиг Сусанина — он завел, а они загнали. Паукову больше всего нравилась схема этого маневра на карте: ровный круг, по которому бегали основные силы, прорезывался огненным зигзагом, прочерченным передвижениями Жароносной Дружины. Прочертив этот зигзаг, генерал откинулся на стуле и похлопал себя по туго обтянутым ляжкам. Все-таки что-то особенное в нем было, эту старую шлюху Гуслятникову можно понять.</p></span></span></span></span>
