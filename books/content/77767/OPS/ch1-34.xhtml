<span><span><span><span><span id="id44"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Он знал, что надо делать. Он давно понял хазарское ноу-хау и ждал только момента, чтобы его применить. Как только его призвали и, сообразно капитанскому званию, дали роту, — он представил грамотно обоснованный, старательно составленный план: диверсионный отряд должен был действовать во вражеских тылах, нанося бесшумные, внезапные удары. Бумагам в русском штабе верили фанатично, красивые и гладкие слова весьма ценились, ибо нужно было все более витиевато обосновывать перед начальством свое полное, тоскливое, вязкое бездействие; Волохову утвердили его отряд, а дальнейшее было делом техники. Он знал, что главная его задача — избегать столкновений; знал и то, что очень многие скоро от него побегут. Раскрыть истинную свою задачу он не мог никому — даже тем, кого без толку таскал за собой по лесам и пустеющим деревням центральной России. Четыре года нужны были ему, всего четыре года. Три были уже позади. Женька знала истинную его цель. Женька знала все. Перед ней он лукавить не мог.</p><p class="p1">Врет Гуров, что новая жизнь начнется сама собой. Новой жизни не будет, если все останется как есть; из трубы Неглинка выйдет вялым, безжизненным ручьем. Волохов знал это — перед отправкой на фронт он зашел к бывшей подруге, с которой так бесповоротно порвал после появления Женьки, и то, что он увидел, окончательно его отрезвило. Он и поныне мучался этим воспоминанием.</p><p class="p1">Бывшая подруга по-прежнему жила в их однокомнатной квартире, которую он ей оставил; по-прежнему ходила на работу и даже поливала цветы, но это было, кажется, последним, что она делала осмысленно. В остальном жизнь ее и квартира зарастали, как брошенное поле, ненужными, сорными вещами: она жила так тихо, так жалобно и кротко, что Волохов всерьез возненавидел себя. Это было беспомощное, покорное увядание; в доме не на что было сесть и нечего съесть, а она часами выклеивала коллажи, играла с соседской дочкой, рассказывала ей сказки — из тех, от которых так привязался к ней поначалу Волохов: неизменно жалобные, унылые, бесприютные, как свист ветра за окнами щелястого дома, который вот-вот рухнет. Она не злилась на Волохова и никого ни в чем не винила, говорила все тише, ходила в черном, напоминала монашку; его она встретила с той же кроткой ласковостью, которой он так умилялся прежде и которую так возненавидел после женькиного веселого буйства. Ей ничего не хотелось. Она не доводила до конца ни одного дела. Предложила ему починить рукав — он донашивал старую куртку, которую бывшая подруга штопала много раз, — и пришила один рукав к другому, сама того не заметив. Она ни на миг не выходила из мечтательной задумчивости, из тихого, сладкого безумия, в которое жизнь не вторгалась даже военными новостями. Телевизор давно не работал, экран пылился, раковина была полна немытой посуды, из крана капало — а когда Волохов попытался его починить, хлынуло; прокладка была ни к черту, он еле сладил с потопом, вырезав новую из старой подметки. Так жила она, тихая девушка из коренного населения, о которой он почти забыл за два последних года; только теперь он понял, почему в одиночку ему было легче, чем с ней. В ее квартире все было в упадке, кроме цветов: они разрослись щедро, пышно, словно чувствуя, что это теперь их территория. Цветы не знают добра и зла, наш прах — лучшая для них почва, а в этой квартире все постепенно становилось прахом: пепел подругиных сигарет, пыль, хлам старой одежды. Подруга что-то шептала цветам, и они, казалось, слушали, поворачивались к ней, тянулись за ней, когда отходила; с ними она легко находила общий язык, и Волохов с облегчением вздохнул, уйдя из этого растительного царства. Она слегка всплакнула, провожая его, но тут же утешилась. Она, кажется, не поняла, куда он уходит. Он оставил денег — она машинально сунула их в шкаф, видимо, чтобы тут же забыть и о них. Ее существование лишилось всякого стержня — и он мог утешаться только тем, что это случилось бы все равно, даже останься он с ней; он часто видел ее замершей, задумавшейся ни о чем, как бы заснувшей наяву, с шитьем или книгой в руке, — теперь она вовсе не выходила из этого ступора. Волохову страшно было думать, какой он застанет ее, когда вернется, и что будет в квартире — может, вообще ничего, кроме сплошных лиан, распирающих стены, выдавивших окна?</p><p class="p1">Он думал было показать ее Гурову, чтобы тот понял наконец, с каким населением придется иметь дело, — напрасно было надеяться, что оно не деградирует за годы попеременного угнетения, — но что-то было стыдное в том, чтобы показывать бывшую подругу чужим людям; и он остался со своим знанием, надеясь на свое хазарское хождение. Не может быть, чтобы это помогло только хазарам. Этот способ годился для всех.</p><p class="p1">Он и сам замечал, что люди, которых он таскал за собой, становились все осмысленней, все умелей и быстроумней — словно только им и недоставало сорваться с места, чтобы наконец обрести себя. С ним был Яков Битюг, чью настоящую фамилию давно позабыли, — толстый, высокий малый, незаменимый в походе человек, в последнее время подобравшийся, избавившийся от глупого добродушия; была медсестра Анюта, которой давно не приходилось перевязывать раненых, чему она несказанно радовалась; был возлюбленный Анюты диверсант Федька Цыган, утверждавший, что в их цыганском племени давно поняли осмысленность и пользу скитаний — а потому командир все делает правильно; в Цыгане проснулась цыганская кровь, и он недурно играл на гитаре. Снайпер Михаил Моторин, которого любили девки во всех окрестных деревнях; бывший учитель Климов, рассказывавший всем на ночь шедевры мировой литературы; повар Дровненьков, сочинявший деликатесы из подножного корма и подручных средств вплоть до древесной коры; много их было, медленно просыпавшихся душ, и разве не сработал уже один раз этот способ во время последней великой войны, когда все сорвались с места да и побрели сначала на восток, потом на запад? Разве наступавшие части, делавшие в день до сорока километров, не вошли в Берлин новыми людьми? Разве не потребовалось еще пять лет до окончательного их закрепощения? Жители России чувствовали единственную панацею и всегда втайне желали сорваться с места — кочевники, беженцы, строители, подниматели целины и осваиватели нехоженых земель бороздили страну во всех направлениях, зная, что стоит закрепиться, как у них тут же отберут работу и свободу; рабство не зря называлось в России прикреплением к земле — земля была чужая, и только дорога всегда своя. Дорога была прирожденным, наиболее естественным состоянием беглого раба — ни с чем другим свобода для него не связывалась; глупый Гуров, он не желал этого понимать, все колесил по стране и армии, выискивая своих, проверяя их на оселке соколка, — тогда как своих давно почти не осталось, делать их предстояло с нуля, и годился для этого только древний Моисеев способ, о котором Волохов не рассказывал никому.</p><p class="p1">В отряде были в основном коренные с небольшими варяжскими примесями; он отбирал их сам, безошибочно чуя болезненную, жалкую кротость и незлобивость. Он берег их от столкновений, отвираясь по мобильному, да никто и не разыскивал их — такая неразбериха царила на фронте с обеих сторон. Хваленая хазарская боеготовность загнивала на глазах, здесь от нее не было никакого толку; варяги никакими расстрелами не могли поднять армию в бой, да и состояла эта армия из тех, у кого не нашлось денег откупиться. Волохов странствовал, питаясь манной небесной — всем, что удавалось добыть в деревнях; он совсем было вознамерился двинуться со своими людьми в Сибирь, где было и хлебно, и свободно, и почти не чувствовалась война, — но не мог оторваться от Женьки и презирал себя за это. Хазары стояли в Грачеве второй день.</p><p class="p1">Теперь Волохов шел в Грачево. Своих он думал разместить в бесхозном покамест Дегунине, откуда только что ушел Громов, — а утром снова увести и решительно двинуться на восток. Что-то надо было делать с этой зависимостью, отказываться от нее — в конце концов, они с Женькой принадлежали теперь к двум враждующим племенам, и несмотря даже на волоховскую тактику неучастия в боевых действиях, он понимал, что полным и окончательным его предательство станет в первую же ночь с ней. Однако делать было нечего. Может, вся война затеялась для того, чтобы они встретились опять. И вот он шел через смешанный мокрый грачевский лес, обходя муравейники, пиная валуи, срывая иногда бледно-алую костянику, и летучий его отряд, сократившийся до полусотни, шел за ним, не спрашивая, куда.</p><p class="p1">Зазвонил мобильник.</p><p class="p1">— Седьмой слушает, — без выражения сказал Волохов.</p><p class="p1">— Ты где ходишь, еб твою мать?! — привычно заорал Здрок. — Ты еще позавчера, еб твою мать, должен был выйти на воссоединение с силами капитана Громова, чтобы объединенным ударом ударно ударить по позиции главного удара!</p><p class="p1">— Я хожу вокруг Грачева, товарищ полковник, — спокойно ответил Волохов. — Есть уникальный шанс взять живой комиссаршу третьей армии. По сведениям моей разведки, штаб третьей армии развернут в избе крестьянина Малахова. Имею возможность ночью внезапным ударом обезглавить третью армию. — Волохов улыбнулся, представив, как будет брать комиссаршу этой же ночью, если, конечно, комиссарша даст.</p><p class="p1">— А, — сказал Здрок слегка разочарованно, как показалось Волохову. Он желал устроить нагоняй офицеру, и тут, на тебе, такой облом. — Ну бери. Действуй как знаешь. Ты летучий отряд, гордость армии. Смотри, чтоб твои орлы там дел не натворили. — Эта отеческая фраза была у Здрока неизменна — он как бы страховал своих детей-командиров от поощрения слишком уж безудержной храбрости.</p><p class="p1">— Я доложу утром, — сказал Волохов и отключился. Мобильный тотчас затрезвонил снова.</p><p class="p1">— Брать, значит, хочешь? — спросил веселый родной голос.</p><p class="p1">— А вы уже и переговоры сечете? — ответил Волохов, не удивившись.</p><p class="p1">— Давно сечем.</p><p class="p1">— А. То есть ты в курсе, куда я направляюсь?</p><p class="p1">— Естественно. Только я тебе не понравлюсь. Не мылась нормально тыщу лет, косметики никакой. Походно-полевая жена, в чистом виде.</p><p class="p1">— Да Господи, — сказал Волохов глупым счастливым голосом. — В этом ли суть. Я буду часа через полтора.</p><p class="p1">— Один?</p><p class="p1">— Да, ребят размещу в Дегунино. Слышь, ты хоть караул-то предупреди.</p><p class="p1">— Уже. — Она засмеялась так, что у него закружилась голова, и отключила связь.</p><p class="p1">С веток капало, пахло мокрой хвоей и корой, трава хлестала по сапогам. Чужая Родина была кругом — не женькина и не волоховская, и она изо всех сил старалась не пустить одного захватчика к другому. Волохов оглянулся на летучий отряд.</p><p class="p1">— Подтянись! — крикнул он. — Скоро уже! Запе-вай!</p><p class="p1">— Не одна в поле дороженька, — затянул высоким, слегка задыхающимся голосом рядовой Чудиков.</p><p class="p1">— Не одна самоцветная, — подхватил нестройный хор. Невозможно было выучить коренное население строевым песням — оно, кажется, только «Дороженьку» и знало, но она никак не тянула на марш.</p><p class="p1"><em>— Не одна в поле дороженька,</em></p><p class="p1"><em>Не одна неприветная.</em></p><p class="p1"><em>Не одна в поле дороженька,</em></p><p class="p1"><em>Не одна, быстротечная,</em></p><p class="p1"><em>Не одна в поле дороженька,</em></p><p class="p1"><em>Не одна, бесконечная…</em></p></span><span id="id45"><div class="title5">
<p class="p">Интерлюдия</p>
</div><p class="p1">Когда гусарский полк входил в уездный город N, уездные мужчины вымирали, а женщины, построившись вдоль деревянных стен, гусарский полк глазами пожирали. Бросали в воздух чепчики, и лифчики, и проч. Гусары на лету ловили юбки. Потом лилось шампанское, и опускалась ночь, и начинались яростные рубки.</p><p class="p1">Гусарский полк не воевал: летал туда-сюда и отдавал досуг увеселеньям, исправно выбирая для постоев города с преобладавшим женским населеньем. Там жили полчища ткачих, вязальщиц и врачих, и всяческих валяльщиц завалящих. Мужчины прятались в лесах, давно уже ничьих, — да их и мало было, настоящих.</p><p class="p1">Зато каков гусарский полк! Полковник Гребанько, известный широтою и азартом; метал ножи, джигитовал и выпивал легко бутылку рома — залпом, суки, залпом! Седой, квадратный, с мордой цвета печени сырой, весь в шрамах от бесчисленных дуэлей — он ехал впереди полка, как истинный герой, любимец женщин в возрасте дуэний.</p><p class="p1">О, что до свежих, до девиц, — для них на всякий вкус хватало лиц. В любом собранье женском всегда фурор производил Д’Эрве, силач-француз, чей прадед в плен попался под Смоленском. Французу-прадеду весьма понравилось в полку, и он остался, несмотря на толки, — игрок, жуир, бретер, в долгу буквально как в шелку… Служили там и все его потомки. Грузинов первый, из грузин, воспитанный жарой и вольницей Колхиды плодородной, — его ближайший конфидент был Муромцев второй, хотя блондин, но очень благородный. Ужорский, слава наших дней, вязавший кочергу морским узлом, — пленительный Ужорский! — и Бурцев, назначавший всем свидания в стогу. Такой его был способ ухажерский.</p><p class="p1">Когда гусарский полк входил в уездный город N, от прочих городов неотличимый, — сам мэр протягивал хлеб-соль и не вставал с колен, не в силах ощутить себя мужчиной. Мужчины — вот! Петров четвертый, Батеньков шестой — ты не сравнишься, как бы ни извелся. Они вставали на постой — и это был постой! Стояло все, включая производство.</p><p class="p1">«Скажите, как там на фронтах?» — нежнее ранних птах стонали толпы барышень покорных. «Да что ж, мамзели, на фронтах? Все то же — трах-тах-тах!» — им сдержанно ответствовал полковник. «Когда закончится война?» — «Не знаю, не штабной. Боец. Скажи-ка, дядя, ведь недаром? Да что нам, собственно, война? Мы вскормлены войной! И так ли жали нас под Кандагаром!».</p><p class="p1">Под Кандагаром никогда, как сказано уже, он не бывал. Всегда, в жару и стужу, не отвлекаясь, он на том сражался рубеже, откуда вылез род людской наружу. И весь его гусарский полк — как, в сущности, любой гусарский полк, других полков страшнее, — хотя и двигался вперед, разбуженный трубой, но устремлялся в эти же траншеи.</p><p class="p1">«А ну-ка, цыпочки, за мной! Повзводно! Те-те-те!» — кричал полковник, бил себя в лампасы — и полк со свитой из девиц шатался в темноте по кабакам и пожирал запасы. Когда же съеден был запас и взяты в сладкий плен все женщины (все женщины рыдали), — полк неохотно покидал уездный город N и устремлялся в глинистые дали. Копыта вязли. Дождь хлестал, и было далеко до города, который обозначим N+1. И впереди полковник Гребанько качался на коне своем казачьем, Д’Эрве — вальяжный, как Самсон, уставший от Далил, мурлыкал по-французски под сурдинку, а пьяный Муромцев, блондин, с Грузиновым делил последнюю уездную грудинку.</p></span></span></span></span></span>
