<span><span><span><span><span id="id31"><div class="title5">
<p class="p">1</p>
</div><p class="p1">По большому счету у Волохова не было еще случая, когда он по-настоящему, ни в чем себе не солгав, мог бы жить с женщиной в одной квартире, разговаривать обо всем на свете и при этом постоянно ее хотеть. Что-то ему подсказывало, что дело тут нечисто. Это было частью всемирного заговора. Он никогда еще не рассматривал Женьку как представительницу чуждого мира. Ощущения были новые, неизведанные и не сказать, чтобы вовсе неприятные.</p><p class="p1">— Что-то ты нынче расстарался, — сказала она подозрительно. — Еще немного, и я бы заорала. А это дурной тон, нет?</p><p class="p1">— Будто трахаешь дочь врага, — отозвался он.</p><p class="p1">— Это откуда? — Она мгновенно стряхнула оцепенение и уставилась на него любопытными сощуренными глазами. Горел ночник. Волохов лежал на животе, свесив левую руку на пол.</p><p class="p1">— Лимонов. Как он хороводился с богатой девочкой в красном платье. Снял ее в каком-то клубе году в девяносто пятом, а очерк напечатал в «Экзайл». Чувство, будто трахаешь дочь врага.</p><p class="p1">— И почему ты вспомнил?</p><p class="p1">— Ну, тут сложный ход. Я думал: вот, если все человечество действительно живет на чужих, захваченных местах… Где гарантия, что каждый из нас не спит с дочерью врага? Не бери в голову.</p><p class="p1">— Но почему? Ты все правильно подумал. В нашем случае особенно интересно.</p><p class="p1">— Женька, — сказал Волохов мягко и по возможности терпеливо. — Если ты играешь в эту ерунду — дело твое. Она в самом деле очень заразительна. Я знал в Москве одну толкиенистку, все хорошо, только говорила о себе в мужском роде — я пошел, я сказал… Но меру-то надо знать, верно? Не можешь же ты всерьез полагать, что Россия — ваша земля?</p><p class="p1">— Зачем мне всерьез полагать, — пожала плечами Женька. — Я знаю, и все. И ты знаешь, только не хочешь себе признаваться.</p><p class="p1">— Ага. И вся мыслящая Россия догадывается.</p><p class="p1">— Вол, но это азбука. Об этом тома написаны.</p><p class="p1">— Никаких томов я не читал.</p><p class="p1">— Как я тебя люблю, моя радость. «Чего я не знаю, того не существует». И все вы, русские, таковы, прости дуру за обобщение.</p><p class="p1">Больше всего Волохов боялся, что прорвется высокомерная снисходительность, как сегодня у Эверштейна; с ним он сдержался — кто ему Эверштейн?! — но на Женьку наорал бы обязательно.</p><p class="p1">— Ну не злись, не злись на меня. Я не знала, что ты так невинен в этом отношении. Я тебя познакомлю с людьми. Очень милыми и совершенно нормальными. Ты увидишь, что это решительно ничем тебе не угрожает. Своего рода движение за возвращение на Родину, не более того. Ну считай, что у нас эмигрантский союз вроде евразийцев. Только без шпионажа.</p><p class="p1">— Нет, я не к тому… — Волохов потянулся за бутылкой «Липтона»: духота была невыносимая, и как он в прежние ночи не замечал ее? — Я вдруг почувствовал… черт его знает. Я просто не понимаю теперь, как ты можешь со мной…</p><p class="p1">— Тебе разонравилось?</p><p class="p1">— Господи, ну о чем ты вообще?! Ну представь, что я русский, а ты немка. Или, того хуже, наоборот. Каково тебе с завоевателем, что ты должна испытывать — вот чего я понять не могу.</p><p class="p1">— Ну, Вол, прости меня, пожалуйста, но до тебя — пока бедная девушка еще не встретила свою true love, — здесь несколько раз ночевал один немец, такой себе немец, хорошая паровая машина. И ничего, никакой катастрофы, ни даже мстительного чувства…</p><p class="p1">— Ах да, я понял, — сказал Волохов гораздо злей, чем ему бы хотелось. — Утонченное удовольствие. Виктимность и реванш в одном флаконе. Особенно в моем случае, когда мы видим поработителя столь порабощенным, да и на родине его, прямо скажем, без вашего хозяйского пригляда все до такой степени ай-лю-лю…</p><p class="p1">— Во-ло-дя! — сказала она раздельно и с такой тоской, что он сразу устыдился. — Ну что это такое, в конце концов! Все это сделали не я и не ты, мы оба заложники! И зачем вообще выяснять отношения, когда времени так мало… можно сказать, вообще уже нет…</p><p class="p1">— То есть после моего отъезда, если я правильно понял, все будет кончено? Будем друг другу благодарны за миг блаженства и не станем его омрачать долгими прощаниями, так?</p><p class="p1">— Слушай! — Она резко села на кровати. — Я, кажется, не давала тебе никакого повода… вообще… что такое?! Ты один раз поговорил с Эверштейном — и теперь всякое мое слово истолковываешь наихудшим для себя образом, так?</p><p class="p1">— Похоже, что так.</p><p class="p1">— Я вообще не о твоем отъезде говорю! У нас вообще мало времени, вообще, ты понимаешь? До того момента, когда ты знать меня не захочешь, а если и захочешь — так все равно уже ничего не получится. Какая разница, сколько ты раз до этого успеешь приехать… и сколько я к тебе… Я бы с тобой жизнь прожила и не устала, у нас могла с тобой быть огромная жизнь, понимаешь? Я с первого твоего слова, дурацкого, выпендрежного, когда ты нес там какую-то самодовольную чушь про свой институт, поняла, что — вот жизнь, вот то, что меня заставило бы кинуть к чертям все это и ни о ком больше не думать, бывают такие ужасные вещи, я не думала, что их надо проговаривать вслух! — Она говорила быстро, сердито, злясь на себя и на него: признания вообще были не в ее стиле. — Я все эти ночи… и частично дни… пытаюсь тебе втолковать доступными мне способами, что никого, кроме тебя, мне не было бы нужно на свете, ни в моем fucking прошлом, ни в моем fucking будущем.</p><p class="p1">— Что fucking, это точно, — заметил он и получил подзатыльник.</p><p class="p1">— Русская свинья… Ты ни черта не хочешь понять. Есть вещи, которыми я не распоряжаюсь, есть история, в конце концов… ты что-то должен в ней понимать, если не врешь… Я не знаю, сколько у нас там — месяцев, лет… Знаю, что все ненадолго, ну и только. И не говори со мной больше об этом. У нас с тобой не как у русского офицера с немкой, а как у Монтекки с Капулетти, если хочешь. Когда мы придем, я тебя пощажу.</p><p class="p1">— Женька! — Волохов уставился на нее, уже спокойную и почти веселую. — Ты что… всерьез думаешь, что вы придете?</p><p class="p1">— А куда же мы денемся, Вол? Каганату пыхтеть осталось совсем мало. Каганат просто не протянет ближайшие десять лет. Да и у вас там дела не лучше, сам должен понимать. И после этого у нас с тобой так же ничего не получится, как у аристократки с разночинцем, которые случайно росли вместе, а потом встретились году в восемнадцатом. Есть вещи непреодолимые, еще удивляться будешь.</p><p class="p1">— Уже удивляюсь.</p><p class="p1">— Чему? Глубине моего цинизма?</p><p class="p1">— Это не цинизм, это ум. Ты умная девочка.</p><p class="p1">— Спасибо, ваша светлость.</p><p class="p1">— Скажи… а меня тогда не будут пускать в кафе, да? Как представителя некоренной национальности?</p><p class="p1">— Что за ерунда. Здесь же тебя пускают?</p><p class="p1">— Здесь не все рассуждают, как вы с Эвером.</p><p class="p1">— Во-первых, здесь просто не все признаются. А во-вторых, возвращаться ведь тоже будут не все… Кто-то наверняка останется или поедет ассимилироваться на историческую родину. В Марокко там… Но среди ЖД, между прочим, не только бывшие наши. И англичане есть, и даже, не поверишь, один мулат.</p><p class="p1">— И что со мной будет в случае вашей победы? Если до нее, конечно, дойдет?</p><p class="p1">— А я не думаю, что тут может быть окончательная победа. Разве что вы надумаете устроить себе наконец какой-нибудь русский Израиль и все уедете восвояси, с Дудугиным во главе…</p><p class="p1">— Ага. Возродим русский иврит, на котором говорило наше несчастное северное племя…</p><p class="p1">— Что-нибудь вроде церковнославянского. Представляешь себе государство, где все говорят на церковнославянском? Газеты выходят: «Аще же американьский империализм восхощет нас отымети… коемуждо… лаяй»…</p><p class="p1">Они захохотали.</p><p class="p1">— Ты уходишь от разговора, — сказал Волохов. — Я так и не понял, что будет с некоренным населением.</p><p class="p1">— Я же тебе сказала. Дойдет до открытого столкновения, как уже много раз доходило. А окончательной победы, боюсь, не видать. Правда, учитывая ваше бедственное положение и полную неспособность трудиться на вашей любимой почве… есть некоторый шанс. Да, допустим. — Она мечтательно закинула руки за голову. — Допустим, что мы победили. Тогда лучше всего тебе будет уехать.</p><p class="p1">— Куда? В каганат?</p><p class="p1">— Почему в каганат? Мир большой…</p><p class="p1">— И что, все уедут? Старики, дети?</p><p class="p1">— Ну, наши старики и дети ехали и не жаловались…</p><p class="p1">— Вам отвели Каганат.</p><p class="p1">— Нам отвел его Сталин, сыскал такую резервацию — без него бы до сих пор ничего не вышло. Но эта резервация доживает последние дни. Сколько ее ни возделывай, а своей земли она не заменит…</p><p class="p1">— Это и есть ваша историческая страна! Здесь происходила вся ваша история! — Он сам не заметил, как опять начал орать на нее.</p><p class="p1">— Ну, далеко не вся. Ты что же, действительно думаешь, что здесь — наша единственная Родина? Это твое право, конечно, но ведь об этом даже спорить смешно… Здесь наша колыбель, а потом началось множество отдельных историй… Мы выиграли конкурс на эти земли, зверь. При нас они чувствовали себя лучше всего.</p><p class="p1">— Я очень хорошо помню, как они чувствовали себя при вас…</p><p class="p1">— И что? По крайней мере тебе не затыкали рта. Только не надо мне рассказывать про миллионы голодающих стариков, вынужденных торговать малосольными огурцами. Сегодня им и огурцами торговать не дают. Вы очень интересно исправляете то, что делаем мы: все то же самое, только хуже. Это, понимаешь, как если бы… если бы у человека были сломаны ноги и при этом насморк: ноги вы не лечите, а нос отрубаете. Мы для спасения страны вынуждены обычно делать какие-то крайние вещи. Революцию. Приватизацию. Это шоковые меры, но они спасительны — иначе больной просто сгнил бы заживо, ты вспомни, в девяностом ведь на прилавках стояло одно сухое молоко!</p><p class="p1">— Я был дитя.</p><p class="p1">— А меня вообще не было, но газеты-то не спрячешь! Мы приходили и делали то, что полагалось бы сделать вам — но вы, конечно, никак не могли взять на себя исторической ответственности! Страшно! Народ не поймет, еще скинет, чего доброго! Заметь: коренное население активизировалось только тогда, когда вы прогребывали страну! А потом вы говорите: опять хазары все погубили! Хазары сделали величайшую из европейских революций, произвели гигантскую модернизацию, построили промышленность, сделали две бомбы, а когда вы вернули себе власть и благополучно все загноили, снова вынуждены были спасать положение и перестраивать страну! Потом вы с этим вашим дирижером опять все погубили местничеством, пьянством и воровством — и опять у вас виноваты хазары, благодаря которым вас по крайней мере стали в общество пускать! Ты не заводи меня лучше, морда, а то я тебе много чего порасскажу про вашу славную историю.</p><p class="p1">— Особенно про то, как вы выиграли войну, — сказал Волохов, отлично чувствуя, что он не должен был этого говорить.</p><p class="p1">— Тебе напомнить, среди какой народности самый высокий процент героев Советского Союза? — Она даже пристукнула кулаком по подушке. — Или, может, рассказать, кого немцы принимались истреблять в первую очередь?</p><p class="p1">— Они и у себя вас истребляли в первую очередь… И у норвежцев… И у французов…</p><p class="p1">— Но, может быть, в Европе хоть где-то было что-нибудь похожее на Бабий Яр?</p><p class="p1">— Ничего похожего на Хатынь в Европе тоже не было…</p><p class="p1">— Вол. — Она отвернулась к стене. — Спокойно. Слушай, войну давай не трогать. Там все настолько страшно… и настолько еще не зажило… Я объясню тебе когда-нибудь… как сама это понимаю. Ты же не можешь не знать эту вашу любимую версию о том, что именно хазары стравили русских с немцами, а вообще-то они были лучшими друзьями. Два единоприродных режима, похожих до мелочей, не ужились на одном континенте. Вот и все, Вол. Не надо мне доказывать, что фашизм от коммунизма чем-то серьезно отличался…</p><p class="p1">— Он многим отличался, — упрямо сказал Волохов. — Фашизм — средневековая мистика, а коммунизм — библейская утопия, без сатанизма и эзотерики. Но допустим, что речь идет не о теории, а о тоталитарной практике. Тут не без сходств, да. Разница в том, что при ненавистном тебе сталинизме у хазарства был шанс, почему Фейхтвангер и написал свой известный панегирик…</p><p class="p1">— До поры — был, — сказала она, все еще лежа лицом к стене. — А потом не стало. А был он, между прочим, только потому, что революция, в результате которой стал возможен твой любимый сталинизм, была в огромной степени хазарской — и позиции наши вплоть до сорок восьмого были еще кое-как сильны…</p><p class="p1">— Слушай, мать, прости меня. Я больше не буду, — сказал вдруг Волохов, не отрывая взгляд от ее лопаток. — Я правда скоро уеду, ну нельзя же в постели с главной женщиной своей жизни обсуждать двадцатый век. Для выяснения отношений нам даны многие другие возможности. Не сердись, честное слово.</p><p class="p1">— Я не сержусь.</p><p class="p1">— Я слышу, что сердишься.</p><p class="p1">— Просто есть вещи, которые будут болеть всегда. Просто я знаю, как много на самом деле общего у вас, со всем этим вашим варяжством-гуннством, и у них… И вот в такие минуты мне действительно кажется, что ты чужой. Хотя я и прекрасно знаю, что…</p><p class="p1">— Не чужой, не чужой, — Волохов ее обнял и почувствовал, что она дрожит. — Что с тобой, Женька?</p><p class="p1">— Я боюсь. Вдруг мне с тобой воевать, к чертовой матери…</p><p class="p1">— Ну, ну. До убийства не дойдет. Что, вы устроите нам русский погром? Будете вспарывать перины?</p><p class="p1">— Нет, конечно. Все это ерунда. Но могу я быть немножко человеком? Могу я элементарно бояться за тебя? Ты такой дурак. Ты до такой степени русский, что никогда ничего не поймешь. И надо мне было попасться… мало, что ли, хорошеньких хазарят…</p></span></span></span></span></span>
