<p class="p">1</p>
</div><p class="p1">Губернатор едет к тете, нежны кремовые брюки. Пристяжная на отлете вытанцовывает штуки. Саша Черный? Губернатор прошел в столовую и сел завтракать. Погода была мерзкая — дождь шестые сутки. Дождь хлестал в стрельчатые, зеленые окна столовой, за ними размывалась зеленая масса сада. Никита, верный слуга, в одном лице официант и камердинер, внес гречневую кашу с грибами в серебряном судке — вместо овсянки, почитаемой многими за символ европеизации, губернатор предпочитал гречку, оно и сытней, и здоровее. Две куриные котлетки, аккуратно-округлые, украшенные веточками укропца, лежали себе с краю; соусница с грибным соусом явилась следом. Черный хлеб — любимый, с тмином, выпекаемый по специальному заказу, — был уже разложен на тарелке. Кофию губернатор не признавал — чай, только чай, крепкий, сладкий, иногда с мятой. Нынче был с мятой, по особому, с вечера, распоряжению.</p><p class="p1">Он завтракал рано, не поздней половины восьмого, чтобы успеть просмотреть почту и к девяти уже быть во всеоружии. В девять он принимал. Прием начинался с выслушивания жалоб населения — многие в своих округах начали подражать ему и пропускали туземцев вперед сановников, но первым это ввел он — демократично и эффектно, туземцы ценят. Жалобы были однообразны, он чувствовал себя в такие минуты немного сельским врачом, к которому обращаются лишь с двумя недугами — «Инда в боку колет» и «Нутре жжет». Рассудить имущественные споры было делом пяти минут, но он выслушивал внимательно, не торопя, не прерывая. Особенно смешны были наивные туземные хитрости, но он и их разоблачал не сразу, давая сторонам проявить невеликие актерские таланты. Иногда ему казалось, что туземцы только притворяются идиотами, разыгрывая перед ним свои спектакли, а на деле отлично зная цену его правосудию — и лишь давая ему ощутить себя белым человеком; но не все туземцы были таковы, как его любовница Аша — девушка редкого ума и проницательности, не той грубой, животной проницательности, какой обладают подчас крестьяне, но той глубокой и продуманной деликатности, какая свойственна лишь утонченным натурам. В Аше губернатор не чаял души.</p><p class="p1">Отправившись полтора года назад в Сибирь с крайнею неохотой, он теперь представить себе не мог, что никогда не встретил бы эту девушку, ставшую для него оправданием чрезмерной ответственности, рутинных обязанностей и удаленности от столиц. Он никогда бы не причислил ее к туземному населению: стройная, бледная — она ничем не напоминала смуглых, приземистых, с сильной китайской примесью крестьян и пролетариев русского Востока. Правда, необыкновенна была ее выносливость и способность ко всякой домашней работе — но она давно уже была необыкновенна и для местных работяг, ни к какой систематической работе не способных. Народ был ленивый и хитрый, и это губернатор первым ввел словцо «туземцы» — нововведение так же прижилось, как и первое, насчет утреннего приема. Преувеличения тут не было: Россия давно уже распалась на крошечный, все сжимающийся центр и обильные, отдаленные колонии, и окружной представитель (округов было теперь восемнадцать, и число их ежегодно росло) вправе был зваться губернатором. «Я хочу, чтобы все было по Моэму», — говаривал губернатор, и это была третья его придумка, пользовавшаяся общей любовью. Он был человек начитанный, гордился библиотекой в три тысячи томов, из которой в Сибирь поехали пятьсот любимейших, и на все случаи жизни подбирал литературную аналогию — отчего-то так было легче. Впрочем, всегда легче, если до нас кто-то прошел по мрачным местам и благополучно выбрался к свету; да ему и было откуда хорошо ориентироваться в словесности — успел посидеть и в Минкульте, и только оттуда плавно переместился сначала в геополитику, а потом вот и на губернию.</p><p class="p1">Губернатор не был похож на бессмертный тип самовоспроизводящегося советского чиновника: в конце советских времен, когда всех уже тошнило, казалось, что все эти типы вымрут — тетки в высоких шапках, тугие, с ногами-тумбочками; секретарши, бесконечно пьющие бесконечный чай и занимающие друг другу очередь в какой-нибудь «Ятран» или «Балатон» за сапогами, которые выбросили (только выбрасывать и стоило); старухи на лавках, зорко следящие за жизнью домов — кто к кому входит и во сколько, по неделе кряду пережевывающие беззубыми ртами любое событие так же, как жевали они хлебный мякиш, долгими часами, до полного усвоения, по телевизору сказали, что так здоровее; был и тип чиновника, который губернатор встречал на всех сборищах государственной партии, тип, одним своим видом вызывающий ту смесь отвращения со страхом, горестного узнавания с робкой надеждой, которая и называлась в России государственным чувством. Свое государственное чувство есть у каждого народа, он, помнится, защищал диплом именно на эту тему; образ государства у каждой нации строго индивидуален, для кого-то государство — герб и флаг, для кого-то — чистая абстракция, туземцы о государстве вообще понятия не имели (иногда губернатору казалось, что они, отчужденные от Москвы и цивилизации, в самом деле превратились в отдельную нацию, неспособную ни к самодисциплине, ни к самоуправлению); русский государственный образ как раз и сводился к этому самовоспроизводящемуся чиновнику, который был абсолютно недоступен, непостижим, неумолим — и в то же время оставался свойским. Свойскость была в самой его неумолимости: да, он таков, но это наше, нам другого не надо, с нами иначе нельзя; без такого, как он, все развалится, и сами мы перестанем существовать. Он был омерзителен — но привычен, любой другой действовал по другим законам, а потому был страшнее. Тип строгого, подтянутого, вежливого, даже доброжелательного чиновника не приживался тут — вот почему губернатор точно знал, что достиг пика своей карьеры. Губернаторский чин был по нынешним российским временам не особенно престижен: все делалось в Москве, назначение в провинцию всеми рассматривалось как ссылка. Ниша была удобная, даже, пожалуй, и надежная, но далеко не столь почетная, как в приснопамятные сырьевые времена, когда три года административной работы в Сибири — даже и шестеренкой в губернском аппарате — помогали обеспечить внуков и правнуков. Сырьевая эра окончилась, и вероятно, навсегда. Губернатор не мог рассчитывать на место в Москве — именно потому, что не носил кока надо лбом, не хлопал нижестоящих по плечу с великолепной панибратской покровительственностью, не обращался к равным по имени-отчеству и на ты — «Что, Фрол Титыч?», — не школил секретарш, не спал с ними, не любил саун и застолий, а дистанцию между собою и туземцами устанавливал не с помощью грозных окриков, а посредством ледяной вежливости, самой осанкой своей давая понять, что они принадлежат к разным цивилизациям. То ли дело Фрол Титыч! Фрол Титыч принадлежал к тому же племени, просто с юных лет вырабатывал в себе начальственность. В сущности, губернатор был тут, в Сибири, на своем месте: он по призванию был истинным цивилизатором, далеким от туземных слабостей. Кроме Аши, у него слабостей не было, да и что это за слабость — любовница из туземок? У кого из окружных смотрителей не было такой девушки?</p><p class="p1">Впрочем, сам губернатор понимал, что его связь с Ашей давно уже не похожа на обычную любовную историю, заурядный affair чиновника с местной красоткой. Прежде всего — он был разведен, и это могло быть косвенной причиной той призрачной опалы, легчайшего недовольства, которое он ощущал всякий раз, когда вызывался на верха. Может быть, и отправка в Сибирь — при его-то административных способностях и хватке! — была своего рода почетной ссылкой, ибо сколько ни демонстрируй лояльность, сколько ни потакай мелким слабостям начальства — своим можно стать только на генетическом уровне. А с этим были проблемы. Губернатор соображал чуть быстрей, запоминал все чуть лучше и прогнозировал чуть точней, чем полагалось чиновнику; а впрочем, он давно уже понял, что при выборе объяснения своих неудач лучше выбирать лестное, наименее травматичное. Повинуясь этому рефлексу, он и о губернаторстве своем думал по-моэмовски, по-британски: лучше было представлять себя сыном могучей империи в южных краях, нежели сыном бывшей империи в краях северо-восточных. Отсюда был и белый шлем на летних прогулках, и привычка строго одеваться к завтраку, даже когда он завтракал один, и отсутствие фамильярности со слугами; коллеги в отдаленных провинциях поразительно быстро опускались, но губернатор был не таков. Страшно было вспомнить, с какой бабой жил Климов… Но Аша! Он заметил, что его мысли все чаще возвращаются к ней, и понимал причину: вот уже третью ночь он спал один. Аша ушла, как она выражалась, к своим — ей надо было что-то обсудить; уж эти загадки! Но никакого насилия. Девочка имеет право участвовать в жизни своего социального слоя. Мысль о женитьбе, естественно, не приходила ему. Нет-нет да и появлялось опасение: что, если она слишком привыкнет к своему положению губернаторши? Но она скорее тяготилась этим статусом, нежели гордилась им. Он видел ее сейчас перед собою так ясно, словно она, по обыкновению, сидела напротив: рослая, но тонкая, бледная, даже с чертами вырождения, но сколь прелестного вырождения! Пальцы рук и даже ног почти неестественной длины, маленькая грудь, худоба, которая казалась бы болезненной, если бы не природная грация и естественность всех движений, и потом — за время жизни с ним она все же стала хоть немного женщиной: раздалась в бедрах, на хорошей пище набрала килограмма три… Он заметил, что думает о ней, как о дочери, и действительно годился ей в отцы — ему сорок три, ей девятнадцать; вспомнил ее круглые карие глаза, всегда наполнявшиеся слезами так внезапно, — в последнее время она беззвучно плакала по дурацким, необъяснимым поводам: закат… птица… Должно быть, что-то не так. Он никогда не умел заботиться о женщинах, всегда был с ними суховат и холоден — все это от неуверенности, конечно; одна Аша научила его истинной нежности. Надо было, однако, читать почту.</p><p class="p1">Почта была обильная — две московские газеты, прибывшие с двухнедельным опозданием, пять писем, служебная записка… Записку он отложил и взялся за газеты. У губернатора давно выработалась общая для всех государственных людей привычка выдумывать дополнительные смыслы, будто бы вычитанные между строк, — и на совещаниях окружных смотрителей он обсуждал эти смыслы с коллегами, тонко маневрируя, чтобы показаться проницательным, но не слишком умным; наедине с собой губернатор признавался, что никаких смыслов давно уже вычитать не может и тычется в газету, как щенок в угол. За последние три года нарос комплекс причин, не позволявших высказываться прямо; война странным образом не разрубила ни одного узла, но все их еще запутала, да и велась небывалыми средствами, долго, вязко, с неясной целью. Боевые действия осуществлялись все увеличивающимся числом сторон, которые, однако, опасались входить в прямое столкновение и ограничивались таинственными маневрами, бессмысленными, как стояние на Калке. Было похоже, что противоборствующие силы готовы схлестнуться намертво в последнем сражении, но предчувствуют его единственный итог — полное взаимное уничтожение. Ни у одной из сторон не хватало решимости первой вступить в бой. Подкусывали друг друга по мелочам, отрезали дороги, окружали мелкие группировки, и каждый день гибли три-четыре человека, а иногда сразу двадцать шесть (почему-то это была наиболее частая цифра: то ли ее ляпали куда ни попадя по аналогии с Бакинскими комиссарами, то ли каждая из сталкивающихся сторон теряла в бою по тринадцать — несчастливое число). Тлел Кавказ, но оттуда приходили вовсе уж разноречивые сведения — только из репортажей западных радиостанций, трудно ловившихся на его территории, узнавал он о новых взрывах и стычках. Рамзан уже подгреб почти всех, но не все были готовы терпеть Рамзана, а сын его еще не подрос и не мог в случае чего унаследовать всю власть. В Сибири покуда, слава Богу, было тихо, но такая тишина была хуже войны — все медленно, неуклонно осыпалось, остаточную нефтедобычу давно осуществляли китайцы, свое производство прекратилось вовсе — работала в каждом городе пара китайских же мебельных фабрик, переводивших лес на уродливую, хрупкую мебель, а население вело темную, полуподпольную жизнь, в которой не просматривалось смысла. Губернатору самому было смешно вспоминать, как он ожидал внезапного краха, катастрофы, завоевания страны извне — ее не было смысла завоевывать, силой берут то, что представляет ценность. Что тут было ценного — иссякающая нефть, без которой большая часть мира выучилась обходиться? Золото, давным-давно проданное и вывезенное? Земля? — но кому нужна была топкая, заросшая земля в таком количестве, да еще с непредсказуемым населением? Весь внешний мир давно махнул на нас рукой, как на заколдованное место. Губернатор не боялся в кругу коллег высказываться на этот счет — не слишком резко, конечно, дабы не донесли наверх, но ему нравилось поддерживать репутацию западника.</p><p class="p1">Вероятно, мир не без интереса выжидал, пока русские сами переубивают друг друга. Странно было и то, что газетчики и телевизионщики во все более скудных и невнятных военных репортажах (как же: секретность!) продолжали на этот прочий мир оглядываться, избегая называть вещи своими именами. ЖД до сих пор именовались ультралиберальными силами, хотя весь мир знал, что войну ведут хазары; почему-то ни в коем случае нельзя было сказать, что русские воюют с каганатом. Известно было, что Запад держит принципиальный нейтралитет, несмотря на все разговоры об американских винтовках и консервах, которыми якобы пользовались ЖД; американские консервы, положим, были у обеих сторон — равно как, впрочем, и китайские. Об этом губернатору рассказал китаец, организовывавший поставки. Относительно прочих воюющих сторон господствовала неясность: казаки претендовали теперь уже на всю европейскую часть России, продолжалась эвакуация, в Ташкенте открылся Новый драматический театр, репортаж с премьеры занимал подвал в «Красной звезде», которую нельзя было не читать государственному человеку, — но вместо того, чтобы радикально обновить и омолодить дряхлеющую страну, война только обнажила полную ее нежизнеспособность. Война шла, все списывала, была предлогом и оправданием мобилизационной экономики, распределения, карточек и прочих решительных мер, — но самой войны, в сущности, не было; таковы, по крайней мере, были газетные сводки. Русские (которых губернатор наедине с собою принципиально не называл нашими) все время отходили на заранее подготовленные позиции, и страшно было подумать, сколько успели наготовить этих позиций; видимо, только этим и занимались все предвоенные годы, когда уж вовсе было непонятно, куда уходят деньги. Губернатор тонко улыбнулся при мысли об этих позициях: ящики с консервами, сауны для командования… ЖД наступали то по двум, то по трем направлениям, и все это медленно, вязко — в последние полгода боевые действия сосредоточились вокруг двух населенных пунктов: на юге, ближе к Украине, вокруг одной из крупных деревень образовался загадочный дегунинский котел, причем деревню считали почему-то стратегическим пунктом исключительного значения, — второй такой стратегический пункт по неясным, засекреченным соображениям обнаружился в деревне Жадруново, названия которой губернатор не слышал отроду. Жадруново находилось восточнее Москвы, на казанском, что ли, направлении, и там боевые действия шли особенно вяло: к деревне стягивались войска, намечались противостояния, потом все как-то рассасывалось и циклически обострялось. Губернатор читал сводки, изучал карты и ничего не понимал.</p><p class="p1">На фоне всего этого распада удивителен был буйный рост злаков и небывалые урожаи яблок — земля плодоносила с прощальной страстностью, словно торопясь накормить страну, пока еще есть кого кормить. Это был необъяснимый, ломящийся избыток — казалось, яблони стонут под тяжестью плодов, зерна вытекали из колосьев, природа изнемогала от изобилия, истекала им, переливалась через край — и все это среди полного запустения. Чувствуя, что люди ничего уже не смогут с нею сделать, она радостно захватывала заброшенные заводы, пустые деревни, городские окраины, где редко-редко проглядывали среди травы ржавые рельсы; казалось, еще немного — и брошенные на путях старые паровозы прорастут лианами из проводов и железными цветами — что еще может вырасти на такой экзотической почве, как металл, уголь и машинное масло? Газета сообщала о фантастических урожаях и приписывала решение продовольственной проблемы исключительно переходу на мобилизационную экономику, однако карточек никто не отменял — на пути у изобилия, как всегда, вставало государство, непременно желавшее процеживать щедрую роскошь через сито бесчисленных формальностей. К счастью, — и это было единственным плюсом нараставшего разложения, — никто давно уже никем не управлял, и карточки ходили только в оставшихся крупных городах.</p><p class="p1">Губернатор прочел об урожае, о маневрах в районе Дегунина, о переброске войск под Жадруново, о новом массовом отключении воды и газа в Детройте (ах, и у них скоро будет, что у нас!), о землетрясении в Греции, о Новом драматическом театре, где ставили «Русских людей», — и взялся за письма. Инструкции по вакцинации не представляли интереса, требования неукоснительно усиливать патриотическую пропаганду приходили ежедневно, приказ о начале подготовки к осеннему призыву ничем не отличался от аналогичной директивы насчет призыва весеннего, — конечно, норму и тогда недовыполнили, но кто ж ее теперь выполнял? Туземцы покорно являлись на призывные пункты, многие через полгода возвращались, говоря, что получили отпуск, — губернатор прекрасно знал, что это заурядное дезертирство, ибо не может отпуск длиться месяцами, но ловить дезертиров в местной глуши было некому, да и не ему судить людей, уходящих по домам с такой бессмысленной войны. Тем не менее он исправно выставлял оцепления вокруг лесов, где будто бы скрывались дезертиры. Директива дня состояла на этот раз из предупреждения о начале партизанской войны. Губернатор не удивился. Он давно понимал, что истинная директива обязана быть абсурдна — она напоминает о непостижимости государственных целей; в этот день, 15 июня, когда все, собственно, началось, — губернаторам и наместникам сообщали, что в последнее время участились нападения партизанских банд на железные дороги. Партизаны перерезали коммуникации и деморализовали население придорожных деревень. В связи с этим предписывалось активизировать розыскную работу «вплоть до прочесывания лесов» — губернатор тонко усмехнулся, ибо для прочесывания бескрайних лесов его округа понадобилось бы снять с железнодорожных работ всех туземцев до последнего. Кстати, насчет строительства железной дороги он тоже ничего не понимал. Дорогу строили, сверху с нею торопили, это была единственная работа, которую туземцы выполняли с охотой — потому, вероятно, что на ж/д строительстве полагались пайки; строительство железной дороги в его округе контролировала почему-то ФСБ, а вовсе не МПС, но это бы ладно — округ приграничный, неподалеку Китай; губернатор вообще не понимал, куда ведет эта железная дорога. Одна транспортная артерия, связывавшая его город с центром, тут уже была, и ладно; какого черта было тащить ветку через безлюдные леса, вдоль границы? Этого он не понимал, сколько ни вдумывался. Конечно, в государственных делах доля бессмыслицы необходима — не то, чего доброго, страна лишится иррационального величия; но одно дело — управления, директивы, публичные выступления, и совсем другое — реальная железная дорога из ниоткуда в никуда. Каждый месяц его запрашивали о темпах строительства, требовали их взвинтить, показательно наказывать лентяев (как человек цивилизованный, он старался не злоупотреблять публичными порками), — к чему воюющей стране железная дорога через тайгу, и какие это партизаны могут на нее напасть? Кто такие вообще партизаны? Если это ЖДовские банды, хоть что-то понятно, — но в его краях никакими ЖДами не пахло. Губернатор перечитал директиву, пожал плечами и набрал мобильный номер начальника областного МВД.</p><p class="p1">— Михаил Николаевич, — сказал он официально, без тени панибратства. — У меня директива о борьбе с партизанщиной. Я на ближайшем совещании оглашу. Скажите, у нас в области были случаи партизанщины?</p><p class="p1">— Никак нет, — отозвался Михаил Николаевич, толстяк с милой фамилией Хрюничев. Его основным занятием давно была рыбалка: может, и к лучшему — другой бы со своим рвением давно запорол остатки населения. — Дезертирщина имеется, оцепление в районе Захаровки стоит — там вчера двоих видели, беглых. А партизанщину я не знаю, какая партизанщина?</p><p class="p1">— Я тоже не знаю, — осторожно сказал губернатор. — Все-таки не усилить ли охрану на строительстве ж/д?</p><p class="p1">— А кого там охранять-то, — сказал начальник МВД. — Там и поезда еще не ходят. Я поспрошаю у своих, что за партизаны. Но вы, Алексей Петрович, не берите в голову. Я думаю, директивы давно машина пишет. В области вор на воре, все провода срезали, а они — партизаны. Делать здесь нечего, только партизан ловить.</p><p class="p1">Губернатор вежливо попрощался и продолжил разбор почты. Московская администрация с двухмесячным опозданием поздравляла его с днем рождения и желала новых свершений. Последнее письмо — отложенное потому, что корявые печатные буквы на конверте выдавали туземную жалобу, наверняка бессмысленную и тупую, как все образцы местного сутяжничества, — содержало в себе, однако, сюрприз столь неприятный, что губернатор встал, прошелся по комнате, закурил, чего давно себе не позволял, и еще раза три перечел отвратительный донос.</p><p class="p1">Из доноса явствовало, что ашины участившиеся отлучки связаны с изменами — да, с изменами, хотя само это слово, естественно, в письме отсутствовало. Указывался адрес, по которому она в городе сняла квартиру для свиданий (вот на что уходили деньги, которые он ей давал! Она клялась, что тратит на семью). «Пойди проверь на Чайковского 8 она там будет всяку ночь что не с тобой» — с отвратительной фамильярностью, на ты, что было мерзее всего, советовал неизвестный доброжелатель. Разумеется, ехать или посылать кого-то по этому адресу было нельзя — мало ли, засада, покушение, да и нельзя же идти на поводу у анонима! Губернатор заметил за собой, что покушение представляется ему вариантом почти идеальным в сравнении с ашиной изменой. Но если правда? Эта тоска в последнее время, эти внезапные слезы, эти участившиеся отказы от близости под предлогом нездоровья… Впрочем, в ночи, когда близости не было, она как раз казалась трогательно нежной, по-другому, по-детски близкой ему. Да и нельзя было представить… Туземки не умели врать! «Гони ее гони не позорся». Как можно верить хоть единому слову такого доноса? Но Аши рядом не было, и некому было развеять подозрение, которое — анонимный автор знал — застрянет теперь в голове губернатора надолго.</p><p class="p1">Он был недаром англоман, а потому взял себя в руки и, брезгливо выкинув послание, аккуратно подшил распоряжения в архив (с тех пор, как прекратилась электронная почта, папки этих многословных, паутинистых, ничего не объяснявших распоряжений пухли с каждым днем, и пойди выброси!). Надо было принять туземцев, но он испытывал теперь такую ненависть к ним, что не чувствовал себя в силах выслушивать жалобы. Злоба его душила. Чертова баба, чертов народ! Нет, это, конечно, зависть. Завидуют, что приблизил. Он кликнул Никиту и потребовал воды со льдом.</p></span></span></span></span></span>
