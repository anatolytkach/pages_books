<span><span><span><span><span id="id15"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Храм Плоскорылов оборудовал при штабе, — крестьяне построили его по чертежу дня за три. Пауков удивительно умел распоряжаться массами. Храм получился аккуратный, истинно воинский, с арктической устремленностью вверх, с чисто декоративным, несерьезным крестом и без всякой уродливой луковицы, этой неотъемлемой принадлежности православия; Плоскорылов жаждал увидеть на храме древний, любимый ведический знак и даже укрепил на концах креста маленькие, осторожные намеки на него, — собственно, стесняться было нечего, крестьяне не возразили бы, даже укрепи он на храме звезду, и такие прецеденты бывали, весь сталинский стиль тому порукой, но полностью раскрываться пока не следовало. Плоскорылов, однако, настоял, чтобы рядом оборудовали подсобку, которую он лично запирал на замок; туда никто, кроме него, не мог проникнуть. Там, в сейфе, хранилась атрибутика арийского, нордического богослужения: без этого Плоскорылов давно бы сошел с ума среди беспрерывных баскаковских дождей, тупости коренного населения и однообразия пресной крестьянской пищи. Пройдя третью ступень, на протяжении всего третьего курса неустанно и восторженно изучая историю ариев и неразрывно связанное с нею арианство, он не допускал для себя и мысли о молитве пошлому, растлительному хазарскому божеству. Страдальческая фигура на кресте оскорбляла его душу, всецело посвященную солнценосному учению. В подсобке хранился ведический знак, своеручно вырезанный Плоскорыловым в обстановке строгой секретности из куска тонкой жести, да двенадцать изображений варяжских божеств — почти весь пантеон, кроме Велеса, которого сожрали ненасытные баскаковские мыши, а набить нового было пока не из чего; да череп, который Плоскорылов всегда возил с собой для напоминания о главном; да платок, омоченный в хазарской крови (драгоценная реликвия, вручаемая на четвертом курсе); и непременный льдистый кристалл с острыми гранями — образ полюса Севера, с надписью «Привет из Арктики!» для камуфляжа: такие сувениры имперская промышленность в избытке производила в шестидесятые, но вынуждена была скрывать «Ориентацию на север» и маскировать ее дурацкой романтикой освоения новых территорий.</p><p class="p1">Гуров разлапистой, совсем не военной походкой шел к храму. Снова припустил мелкий дождичек, холодало, и Плоскорылов поеживался после теплой избы.</p><p class="p1">— Часто служишь? — не оборачиваясь, спросил инспектор.</p><p class="p1">— Стараюсь не чаще трех раз в неделю, — виновато признался иерей. — Ну а где мне силу брать, сам скажи?</p><p class="p1">— Силу нигде брать не надо, сила должна быть внутри.</p><p class="p1">— Она и есть внутри! — ругательски ругая себя за неправильный ответ (опять расслабился!), немедленно исправился капитан. — Но пойми, тут же нет ни книг, ни общества! Я скоро шерстью зарасту!</p><p class="p1">— А для того и глушь! — наставительно произнес Гуров. — Для чего подвижник уходит в затвор? Почему хазарство переняло эту ведическую практику? В душе своей обретешь неиссякаемый источник! Ты думал, ты просто так на фронте гниешь? Ты закаляешься для главного служения!</p><p class="p1">Плоскорылов сам еженедельно вдалбливал все это офицерам, но когда этим банальностям принимался учить Гуров — ощущал некоторую неловкость.</p><p class="p1">— Я знаю, — кивнул он. — Но на практике…</p><p class="p1">— На практике устав читай! — прикрикнул инспектор. — Ты должен быть как алмаз, иерей! Понял? Как алмаз! Я в тебе, тебе одном вижу смену! А спроси тебя обязанности дневального по роте — ты поплывешь, как Вайсберг в океане! Что, нет?</p><p class="p1">— Ты шутишь, что ли? — обиделся Плоскорылов. — Я в двенадцать лет это знал! У меня с шестого класса строевой устав под подушкой… я карту Курской битвы рисовал, первый приз за реферат по району!</p><p class="p1">— Ты мне не первый приз за реферат, — холодно сказал Гуров, и Плоскорылов опять не знал, шутит он или всерьез. — Ты мне обязанности дневального, и стоять смиренно!</p><p class="p1">— Дневальный есть военный солдат, — бойко начал Плоскорылов, — которого первейшая обязанность есть надзирать, следить, досматривать и докладывать, а такожде поддержание порядка в расположении роты неусыпно. Дневальный есть принадлежность тумбочки, каковая есть принадлежность входа в расположение. Дневального долг есть натирать краники, стоять смиренно в ожидании кто есть любезный гость, а при появлении любезный гость производить отдание чести и три выстрела: выстрел известительный, выстрел предупредительный и выстрел контрольный, если любезный гость окажется вероятный противник. Когда дневальный заступать, то наряд принимать…</p><p class="p1">— Вот и врешь, — спокойно сказал Гуров. — Пропустил про дежурного.</p><p class="p1">— Ах, черт, — вспомнил Плоскорылов. Ну конечно, как он мог забыть! Отчего-то он всегда пропускал этот пункт. — Дневального есть долг оповещать дежурного по роте, аще кто прибыл, убыл, прибил, убил, привалил, увалил, пристал, устал, прикололся, укололся…</p><p class="p1">— Ну?</p><p class="p1">— Черт… прости, инспектор. Не помню.</p><p class="p1">— Приложился, уложился, — небрежно продолжил посвященный. — Дневальный есть дежурного по роте первый помощник, правая рука и неодушевленный предмет. Достаточно. В следующий раз спрошу тебя про караульный грибок, и аще ты мне не доложиши квантум сатис, будеши имети от мене три наряда на кухню с отиранием стен и подносов двоекратным отмыванием, понятно ли я излагаю? — Он расхохотался. — У тебя строевой устав не вызубрен, а я тебя посвящаю! Ну не развал ли воинской дисциплины? Ладно, пошли молиться.</p><p class="p1">В храме было прохладно, пахло свежим сырым деревом — то был славный запах хвои, живой природы, внушал себе Плоскорылов… хотя на деле это был запах мокрых досок, надолго зарядившего дождя и угрюмой крестьянской глуши. Надо было быстро убрать всю убогую, дешевую атрибутику полковой церкви — жалкие бумажные иконки, фанерное распятие, без любви выпиленное лобзиком и раскрашенное местным умельцем, — и расставить на алтаре арийские святыни. Пока Плоскорылов хлопотал по своему хозяйству, Гуров осматривался. Вместе они молились только однажды, при самом первом приезде Гурова; о дне знакомства Плоскорылов вспоминал с умилением. Молитвенный стиль инспектора поразил его аскетической скупостью — минимум выразительности, проборматывание, аккуратные жесты: будничность служения была важной приметой гуровского стиля, иерей даже пытался одно время копировать эту сухость, но его влажной, немного женственной природе она была покамест противоположна. «Дело молодое», — любовно подумал он о себе. Гуров всякое повидал, его, должно быть, выжгло; он бывал у хазар, отлично знал их быт, не один день провел в общении с коренным населением — где тут было сохранить первозданную чистоту чувств? В этой чистоте Плоскорылов и видел некоторое свое преимущество, о котором думать избегал, но в душе всегда помнил. Он был так еще нежен. И нигде, в конце концов, не сказано, что варягу противопоказана нежность: один сухой, другой влажный, вот и будет цветущая сложность!</p><p class="p1">Он разложил святыни — череп, свастику, кристалл, извлек из недр рясы старинный, закапанный воском и кровью молитвенник, укрепил в специальном держателе свечу вниз фитилем, подставил под нее чашу для сбора драгоценного освященного воска, снял крест и застенчиво спрятал в специальный карман, куда всегда убирал ненавистный хазарский символ во время собственных одиноких молитв; все было готово. Гуров пропустил бородку через кулак, поправил очки и посерьезнел.</p><p class="p1">— Сам будешь читать? — почтительно спросил Плоскорылов.</p><p class="p1">— Изволь, — сухо отвечал инспектор. Он положил правую руку на кристалл и размеренно, однако без подвываний и замедлений стал читать «Молитву о даровании победы арийской расе над сыновьями хамовыми»:</p><p class="p1">— Едине Истинный Господи Боже Израилев. Ты создал еси человека по образу Твоему и по подобию, при Ное же возблаговолил еси учредити и возвестити иерархию посреде племен сынов его, падения ради Хама, последиже чрез законоположника Мойсеа и прочих пророк Ты рекл еси многократне, яко не подобает никоего смешения имети с проклятыми сынами хамовыми. Сего ради подобает Тебе, ЯХВЕ, именоватися Всеотцем расы нордическия, яко избран есть корень Симов и Яфетов духовнаго ради господьствия и обладания на земле сей. При конце же времен Ты Сам воздвиг вождя германстего, яко Кира новаго, егоже призвал еси учение о избрании расы ариев прорещи внове и свободити людей Господних от ига антихриста коллективнаго. И днесь со усердием молим Тя, о Всевышний и Всемогущий Творче, о еже вновь вознесеной на высоту быти священной свастике, бо суть символ древлий действа приснаго в людех Пресвятаго Духа Твоего. Собери воедино разсеянный Исраиль и даруй нам Судию обетованнаго, яко Ты еси Бог воителей и меч Твой да пойдет пред нами во одоление над супостаты. Аминь!</p><p class="p1">— Аминь! — с чувством возгласил Плоскорылов. На глазах у него кипели слезы. Слова молитвы, даже в суховатом и сдержанном исполнении инспектора, действовали на него наркотически. На словах «расы нордическия» он всегда ощущал такой прилив сил, что забывал и о дурной погоде, и о тупости баскаковцев: нерушимая истина сияла перед ним. «Ариев прорещи…». Как смел Каганат посягнуть на звание Израиля! В такие минуты иерей готов был рвать ЖДов зубами.</p><p class="p1">— Прочти «На рать идущим», — с мягкой улыбкой сказал Гуров, видя душевный подъем молодого друга.</p><p class="p1">— Адонаи ЯХВЕ, — умоляющим голосом начал Плоскорылов, борясь со слезами, — Владыко Господи Боже отец наших, Тя просим, Тебе ся мили деем, яко же бе изволил еси Сам взыти со угодником Твоим Моисеом, возводя люди Твоя Израильтяны из Египта в землю обетования, такоже и ныне Сам иди с рабами Твоими сими Егорием и Константином (он радостно, громко поименовал себя и Гурова, лишний раз ощутив тайную с ним связь), и с вои сими, храня их день и нощь. Якоже бе укрепил Исуса Навина образом Крестным, и молитвою Моисеовою на Амалика, и царства ханааньска секущася с ними. Якоже бе помогл Гедеону с тремя сты, прогонящу мадиамско множество, и секущу Зива и Зевея и Салмона, и вся князи их, такоже и сим помози от избытков Пречестнаго и Животворящаго Духа Твоего, ныне и присно и во веки веком. Аминь.</p><p class="p1">— Аминь, Яхве наш Один, Влесе козлобрадый, смрадный, хвостозадый, Отче верховный, идолище варяжское злобубучее, — неожиданно подхватил Гуров издевательски высоким голоском. Плоскорылов в ужасе оглянулся на кощунствующего инспектора.</p><p class="p1">— Что с тобой, Костя?! — спросил он шепотом.</p><p class="p1">— А ты не знаешь, так не лезь, — холодно и резко отвечал Гуров. — Канон Велесу всевеликому седьмый, окончательный. А тебе только шестый положен, до инициации. Не учи отца молиться.</p><p class="p1">— Но раньше ты никогда…</p><p class="p1">— Что я «раньше никогда»? — с вызовом спросил Гуров. — Все тебе знать надо, карьеристе пухлое, полногрудое. Порядок наведи и изыди конспектировати, да не узрю тебя, пока не отбарабаниши устав гарнизонныя и караульная, полныя и краткия. Убрал свои побрякушки и кру-ом арш! Благословляю, чапай отсюда.</p><p class="p1">Плоскорылов продолжал стоять столбом.</p><p class="p1">— Вольно, вольно, — махнул рукой Гуров и дробно рассмеялся. — Что ты, иерей, дурак какой… Ты думаешь, я тебя испытываю? Я тебя, засранца, люб-лю! — и звучно чмокнул Плоскорылова в щеку.</p><p class="p1">— В храме-то, — с мягкой укоризной выговорил Плоскорылов, еле переводя дух.</p><p class="p1">— Отче наш бо воитель, при нем и не такое сказати возмогу, — улыбнулся Гуров. — Уебывай, иерей, шевели булками. Я к тебе вечером зайду, а пока схожу гляну, каков у солдат есть моральный дух.</p></span></span></span></span></span>
