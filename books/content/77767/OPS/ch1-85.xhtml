<span><span><span id="id120"><div class="title5">
<p class="p">Глава десятая. Предательство</p>
</div><span id="id121"><div class="title5">
<p class="p">1</p>
</div><p class="p1">— Ну, вот оно и Дегунино, — сказала Аша с гордой радостью, какой он давно не слышал в ее голосе — одна загнанность да слезы. — Как?</p><p class="p1">Губернатор постоял на крутой железнодорожной насыпи, с которой спускалась широкая тропа среди сочной травяной зелени. Далеко за лугом темнели вдоль всего горизонта приземистые дома: деревня была большая.</p><p class="p1">Пассажирских поездов здесь уже полгода не было — как же, дегунинский котел, район боевых действий. Эшелоны шли — с людьми, техникой, фронтовыми бригадами артистов, — но в эти эшелоны Бороздину с Ашей лучше было не соваться: их и на полустанках-то уже оглядывали подозрительно, портреты успели разослать везде… Последние пятнадцать километров они шли пешком по шпалам, уступая дорогу проносящимся к Дегунину эшелонам. Впрочем, и эшелон-то пронесся всего один: война выдыхалась.</p><p class="p1">От рельсов пахло гарью, мазутом, нагретым железом — но в Дегунине этот запах перебивался густым медвяным настоем, духом теплой, разморенной травы и бесчисленными цветами, прячущимися в ней. Аша легко, словно и не было четырехчасового перехода и четырехмесячной беременности, сбежала с насыпи к лугу и почти потерялась в нем. Губернатор шел следом. После долгих дождей трава вымахала почти в человеческий рост. На другом краю луга пятеро чуть видных косарей медленно, без напряжения срезали хрусткие податливые стебли. Косари что-то пели, но губернатор не разбирал слов. Над лугом стояло звонкое, счастливое шмелиное жужжание. Пчелы, осы, бабочки вились вокруг, одна бабочка села губернатору на плечо, снялась и улетела. Губернатор мог бы покляться, что она хихикнула.</p><p class="p1">— Господи, — вслух сказал Бороздин, — и чего не жить?</p><p class="p1">В самом деле, жить здесь было одно наслаждение. Воздух полнился сытой, плавной ленью. Бывают в России такие дни в разгар позднего лета, когда природа отдыхает от самого отдыха, пресытившись всеми видами работы, нарожавшись, наплодоносившись, назагоравшись; в такие дни становится ясно, что делать ничего не надо, ибо то, что надо, происходит само, а все остальное от лукавого. Природа лежала, покорно отдаваясь любому пришлецу, и пришлец радостно накидывался на это доступное, сонное благоденствие, — не подозревая о том, что нужен он только для его сохранения; здесь его примут, накормят, напоят, примут в себя и превратят в часть захваченной территории, на которой он уже будет не он, а что-то совсем другое. Здесь он и останется навеки, охваченный блаженством сонного оцепенения, сонной полдневной сытостью, опутанный сетями избытка; здесь личное его время прервется навеки, и никому он ничего не сделает. Можно, конечно, иногда схватиться с другим пришлецом — погнать его отсюда либо сбежать самому, — но деревня Дегунино так устроена, что ей от всего этого никогда ничего не сделается.</p><p class="p1">— Как дома я, — говорила Аша, идя впереди него по еле видневшейся луговой тропке. — Что за место, а? Ну что за место! Нигде больше ни травы такой, ни цветов таких…</p><p class="p1">Они прошли луг и дошли до огромной деревни, раскинувшейся по сложно переплетенным, извилистым улицам. Точного плана Дегунина никогда не мог составить ни один военачальник — обязательно обнаруживалась пара неучтенных домов, а иногда казалось, страшно сказать, что деревня двигалась, не стояла на месте: тут улица изогнулась, там дом переехал… Дегунинское пространство шутило странные шутки с гостями.</p><p class="p1">— Там за деревней дальше Дресва будет, — сказала Аша. — Речка. Она здесь начинается, далеко течет…</p><p class="p1">— Ты хоть знаешь, где дом-то бабкин?</p><p class="p1">— Это ты, может, чего не знаешь, — все так же гордо отвечала Аша. — Мне тут каждый забор родной…</p><p class="p1">Странно, что во всей деревне не слышалось собачьего лая: собаки лениво чесались, подходили к заборам, ласково смотрели на прохожих и отходили прочь, не дождавшись от них чего-то важного. Некоторым из них Аша шептала еле слышные ласковые слова — губернатор их не разбирал. Несколько раз им встретились люди. Аша им кивала, и они кивали в ответ, но ни слова не говорили. В воздухе запахло тревогой.</p><p class="p1">Дом, к которому они шли, ничем не отличался от прочих, кроме густого плюща, обвивавшего северную стену. В палисаднике цвело великое множество всего — георгины, золотые шары, крупные садовые колокольчики…</p><p class="p1">— Бабушка! — крикнула Аша. Ей никто не ответил.</p><p class="p1">— Никого, что ли, — сказала она скорее себе, чем Бороздину, и решительно толкнула незапертую калитку. Губернатор вошел следом. В доме завозились, но встречать никто не вышел.</p><p class="p1">— Бабушка! — громче и раздельнее крикнула Аша.</p><p class="p1">Странное дело: пока губернатор шел по дорожке, засыпанной крупными стружками, к дому ашиной бабушки, — ему казалось, что цветы вокруг расступаются перед ним с некоторой брезгливостью или ужасом, да и сама земля слегка проваливается под ногами, словно не желая выносить его на себе; впрочем, в дегунинской жаркой тиши, в августовском мареве и не такое привидится.</p><p class="p1">Между тем никто не выходил к ним, хотя губернатор и чувствовал устремленный на него пристальный, несколько испуганный взгляд; может быть, это смотрели обитатели приземистого дома, прильнувшие к окну, а может, бабочки или георгины.</p><p class="p1">Аша обернулась на него, и в ее глазах, только что сиявших счастьем гордости и родства, губернатор увидел отчаяние. Если к ним не выходили — значит, спасения в Дегунине не было.</p><p class="p1">— Может, никого нет? — спросил он.</p><p class="p1">— Всегда есть! — отозвалась она с упрямством безнадежности, отвергающей всякие утешения. — Я знаю. Это так всегда у нас.</p><p class="p1">Дверь неожиданно открылась, и на крыльце очутилась высокая старуха в темном платке и черно-лиловом тряпье.</p><p class="p1">— Заходите, — сказала она негромко.</p></span><span id="id122"><div class="title5">
<p class="p">2</p>
</div><p class="p1">— Под кем Дегунино сейчас? — спрашивала Аша.</p><p class="p1">— Да под южными вроде. Не поймешь у них, сама уж путаю.</p><p class="p1">— Ражие, утюжие?</p><p class="p1">— А кто знает. С колого боку рожие, с колого талыжие. На полоток расколешь, да и боровик намажешь. И никакого.</p><p class="p1">— Бабушка, что же делать мне?</p><p class="p1">— А что я знаю? Голод бы намолоть, так и колоб не тупился бы.</p><p class="p1">— А если на улок?</p><p class="p1">— Улок не улок, а затолок на коробок…</p><p class="p1">Аша уронила голову на руки. Она не плакала, сидела молча. Губернатор тоже боялся нарушить молчание. Перед ним стояла нетронутая чашка темного отвара — местный чай с кипреем и еще какими-то бодрящими травами, тварями…</p><p class="p1">— Ты-то что же думал? — спросила ашина бабка, поднимая на него кроткие глаза. — Ну, она дура молодая, понятно. А ты что ж?</p><p class="p1">— Я думал жениться на ней, — сказал губернатор. Ему странно было отчитываться перед туземкой, но он понимал, что от этой туземки зависит теперь все.</p><p class="p1">— Так ведь ты спросил бы хотя, какого она роду. Разве у вас не спрашивают, какого роду? У вас разве бывает так, чтобы не пойми на ком, не спросясь, жениться?</p><p class="p1">— Редко, — признал губернатор.</p><p class="p1">— Ну так что ж ты? Ведь ей никак с тобой нельзя, неужто не слышал?</p><p class="p1">— Откуда ему слышать, бабушка? — проговорила Аша. — Где про это написано?</p><p class="p1">— Ну а ты куда смотрела?</p><p class="p1">— На него смотрела, — сказала Аша.</p><p class="p1">Бабушка была ничем как будто не опасна — чутье на опасных людей губернатору не изменяло никогда; самым страшным в ней было именно это сознание своего бессилия, полная беспомощность. Аша шла сюда за решением своей участи, но здесь ничего не могли решить.</p><p class="p1">— Или ты не видишь, как все стало? — спросила ее бабушка.</p><p class="p1">— А что? Вроде все хорошо…</p><p class="p1">— Да что ж хорошего? В этом году ничто не родит. И яблонька не так родит. Дресва вон среди ровного дня шумит. Трава-то — видишь, какая? Разве в прошлом такая была? У Марфы корова целыми днями воет, у Акулины скворец слова забыл…</p><p class="p1">Аша снова опустила голову.</p><p class="p1">— Нельзя вам тут. А уйдешь ты за горы — и тоже не знаю. Тут что у нас, что в загорье — разницы нет, всяко коломок на боловок…</p><p class="p1">— Я уйду, — сказала Аша. — Мы отдохнем два дня и уйдем.</p><p class="p1">— Куда вы уйдете? Ищут вас везде, он же говорит, — бабушка кивнула на губернатора. — И по телевизиру я видала.</p><p class="p1">— Не найдут, — сказал губернатор. — Я к ЖД пойду. Они спрячут.</p><p class="p1">— Никуда они тебя не спрячут, — махнула рукой бабушка. — Главное, от земли ты куда спрячешься?</p><p class="p1">— Авось земля не встанет, — ответила Аша. Бабушка покачала головой.</p><p class="p1">— Я вечером старух соберу, — сказала она. — Сделать мы тебе ничего не можем, это ты, Аша, знаешь, у нас на своих сроду рука не поднялась. А и помочь, Аша, не могу, это уж как обловок на поплавок, как колоб на желоб…</p><p class="p1">— Да ведь ребенок это! — крикнула Аша. — Это ведь ребенок, что он всем вам сделает?!</p><p class="p1">— Он-то ничего не сделает, — сказала бабушка. — А про то, что ребенок… Ты знаешь хоть, какой он ребенок?</p><p class="p1">— Был бы не такой — я бы чуяла.</p><p class="p1">— Что ты чуешь сейчас? Ты мать, откуда тебе чуять? А я знаю. Ребенок тот будет не простой. У ребенка того зубы будут от рождения, волоса от рождения, и первым делом, как родится, он мать убьет и отца убьет. А потом всех убьет, и начало начнется.</p><p class="p1">— Как он убьет отца? — не поверил губернатор. — Не может ребенок отца убить…</p><p class="p1">— Этот все сможет, — испуганно сказала бабушка. — Этот как родится, тут уж делать нечего. Знала бы я — сказала бы ей когда еще. Да ведь кто знает? Сторож знает, а сторож за всем не уследит. И не знаю я, где сторож и какой он из себя. Приезжал вроде один, говорил, что ты придешь. Говорил, чтоб донесла ему. А больше не приезжал.</p><p class="p1">— Донесешь? — спросила Аша с вызовом.</p><p class="p1">— Ты знаешь, что не донесу. Да и он знал, он для порядку сказал. А может, и не сторож. Сказано же про сторожа: никому не ведомо. Ему иногда самому не ведомо.</p><p class="p1">— А спрячешь, если опять придет?</p><p class="p1">— Спрятать спрячу, а помогать не буду. И оставаться нельзя тебе. Сама подумай, что будет, если в Дегунине земля встанет. Где хочешь можно, хоть и там бы не надо… Но если у нас встанет, Аша, если у нас-то, что ж это будет, Аша!</p><p class="p1">Она в первый раз обняла внучку и прижала к себе ее голову.</p><p class="p1">— Ох, что ж за напасть напала, что ж за припасть припала… Как быть, как быть…</p><p class="p1">— Ничего, — сказала Аша тихо. — Я отдохну и уйду. А своих ты вечером все-таки собери.</p><p class="p1">— Соберу. Но ты не жди, не согласятся.</p><p class="p1">— Знаю, что не согласятся. Хоть повидаю их всех.</p><p class="p1">— Ладно, — сказала бабушка. — Спать идите с дороги. Вечером разбужу.</p></span><span id="id123"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Вспоминая потом дегунинских старух, губернатор сам не очень понимал, что за странное чувство владело им в тот вечер. Он не боялся их, нет. В них не было ничего грозного. Это они его боялись.</p><p class="p1">За годы работы с коренным населением он успел понять о нем многое, но никогда не отдавал себе отчета в истинной мере его беспомощности. Оно в самом деле ничего не могло, когда дело касалось будущего. Жизнь коренного населения протекала в бесконечно тянущемся настоящем. На все вопросы о завтрашнем дне ответ был один — «Как Бог даст»; и Даждь-бог давал завтрашний день, а Жаждь-бог отбирал вчерашний, и не было случая, чтобы завтра не наступило; так что же о нем и беспокоиться? Перед будущим, вторгающимся в сегодняшний день, коренное население испытывало панический ужас. Аша несла в себе угрозу, угроза росла с каждым днем, остановить ее не было сил, убивать коренное население не умело — оно только жалось да отступало, сбивалось в жалкую кучку… И старухи, волчицы Дегунина, жрицы тайной полузабытой веры, были не сумрачные рослые весталки, а маленькие, кругленькие, с писклявыми голосами бабки, улыбавшиеся робко и заискивающе. И говорили они в точности как Стрешин и Рякин, дополняя и перебивая друг друга:</p><p class="p1">— И будет тот человек белый, волос его черный, глаз его карий.</p><p class="p1">— Глаз карий, волос мягкий.</p><p class="p1">— Уже с зубами родится.</p><p class="p1">— С зубами, с зубами. Зубищи — во!</p><p class="p1">— Смущение сделает.</p><p class="p1">— Вас убьет, а нам смущение сделает.</p><p class="p1">— Вот как родится, так сразу и убьет.</p><p class="p1">— Ладно, — прервала Аша. — Сама все знаю. А если уйду?</p><p class="p1">— Никак нельзя тебе уходить, — запищали бабки.</p><p class="p1">— Ты уйдешь, а он что ж?</p><p class="p1">— Он же все равно родится!</p><p class="p1">— Родится и смущение сделает.</p><p class="p1">— Волос будет черный, а глаз карий. Беспременно.</p><p class="p1">— Уже и так времена последние.</p><p class="p1">— Печка не печет, яблонька не блонит.</p><p class="p1">— Ай, страшно.</p><p class="p1">— Ай, страшно, страшно.</p><p class="p1">И так жалобно они пищали, так невыносимо причитали, что губернатор не смог больше этого слушать. Он хоть и скитался уже месяц, но не утратил еще начальственных интонаций и в доме у ашиной бабки чувствовал себя как хозяин.</p><p class="p1">— Будет! — прикрикнул он решительно. — Вы другое объясните. Чем вам ребенок опасен? Что такое будет, когда он родится?</p><p class="p1">Странная тишина была ему ответом. Туземки переглядывались и пожимали плечами.</p><p class="p1">— Этого мы знать не можем, губернатор.</p><p class="p1">— Не можем, гублинатор.</p><p class="p1">— Прости, блинатор.</p><p class="p1">— Это такое знание, что не дадено.</p><p class="p1">— Нельзя, и все. Если знать, то это другое. А это не знается.</p><p class="p1">— Это не знается и не говорится.</p><p class="p1">— Ладно, — не выдержал он. Его бесили эти крики, словно вокруг них с Ашей водили хоровод, и эта детская тупая беспомощность, сильнее которой, однако, ничего нельзя было придумать: это болото хоть кого засосало бы. — Мы завтра уйдем.</p><p class="p1">— Кто ж вас пустит?</p><p class="p1">— Ищут вас, ищут вас!</p><p class="p1">— Об этом не беспокойтесь, — сказал Бороздин. — В Дегунине сейчас хазары, так?</p><p class="p1">— Южные стоят, — запели свое бабки, — южные, южные…</p><p class="p1">— По дворам стоят…</p><p class="p1">— Нас не забижают, нет, не забижают…</p><p class="p1">— Обходительные такие.</p><p class="p1">— И те тоже обходительные. Все обходительные.</p><p class="p1">— Эти обходительные, а те обстоятельные. Те ходят, а те стоят.</p><p class="p1">— Где штаб у них? — спросил Бороздин.</p><p class="p1">— У Гали в избе, у Гали!</p><p class="p1">— По третьей улице пятый дом.</p><p class="p1">— Ну, пойду я, — сказал он решительно. Он уже куда угодно готов был идти, лишь бы не видеть эту толпу ласковых старух, чью отдельную от всего мира кроткую жизнь должен был разрушить его ребенок. В конце концов, Дегунино было сейчас под ЖДами. А именно к ЖДам он все это время и шел. Пока губернатор шел в штаб по пыльной, жаркой, пустой улице, вдоль дегунинских заборов, увитых плетьми вьюнкаберезки и бешеного огурца, вдоль вишневых садов и аккуратных огородов, ему все казалось, что эти сады и огороды смотрят на него с опаской, как на бешеную собаку, опасную, но обреченную. Он явился сюда нарушить дегунинский уют, и теперь от него надо было избавиться как можно скорее. Ему нечего было здесь делать. Его было здесь не надо. Он принес смущение. Хорошо, он уйдет. Может быть, его и Ашу смогут использовать ЖД. Может быть, их куда-то переправят.</p><p class="p1">Около большой, приземистой и просторной избы — пятого дома по третьей улице — он остановился. Часовой окликнул его.</p><p class="p1">— Я в штаб, — сказал Бороздин.</p><p class="p1">— По какому делу?</p><p class="p1">— Я русский губернатор, — сказал губернатор. — Я хочу сделать заявление о переходе на вашу сторону.</p></span></span></span></span>
