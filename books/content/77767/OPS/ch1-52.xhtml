<span><span><span><span id="id69"><div class="title5">
<p class="p">Глава четвертая</p>
</div><p class="subtitle">1</p><p class="p1">Вскоре после того единственного запуска соколка началась война, а вместе с ней то самое лавинное осыпание жизни, с которого Анька почувствовала себя взрослой. Она даже перестала на какое-то время всех жалеть, потому что жалости больше не хватало.</p><p class="p1">Собственно, ни о какой войне разговоров не было. Сначала вдруг кончилась стабилизация, о которой все время говорили по телевизору. Прекратилась она в одночасье, когда открыли флогистон. До того процветание было такое, что в страну стали возвращаться почти все уехавшие из нее. Их было много, и все они раскаялись и вернулись. Пускали охотно — на радостях-то почему не пустить? Больше всего народу возвращалось из Каганата. Некоторые из вернувшихся каялись по телевизору. Лица у них были при этом подозрительно веселые. Анька догадывалась, что на самом деле они не очень-то раскаиваются. Когда она сама за что-нибудь просила прощения у родителей, у нее никогда не было такого хорошего настроения.</p><p class="p1">Вероятно, они о чем-то догадывались. Потому что ехали в страну, где их не очень любили и даже устраивали против них демонстрации по случаю Дня народного единства или в другие праздники. И когда начался флогистон, а вскоре после него и война, эти раскаявшиеся возвращенцы оказались тем самым десантом, с которого начались боевые действия. Кое-какие ЖД, или ультралиберальные силы, оставались еще и в России. Они ждали только, когда начнется флогистон. Потом говорили, что именно ЖД и изобрели этот отвратительный миф. В школе всегда учили, что флогистона не бывает; химичка подробно объяснила, что флогистон — вражеская выдумка, что формула его содержит множество ошибок и что никаких универсальных горючих веществ, которые могли бы заменить нефть, нет в природе. Однако враги России как-то так умудрились поставить дело, что на выдуманном газе работала вся мировая промышленность. Теперь нефть нельзя было продавать, а больше в России ничего толком не умели. Скоро появились нефтяные продукты, стали закрываться предприятия, отец боялся потерять работу и ходил мрачнее тучи, но вовремя успел перепрыгнуть из своей газеты в «Русойл». Там он писал рекламные тексты про нефтяную колбасу и нефтяное масло, продуктов ему на пробу давали достаточно, и их даже можно было есть, хотя живот потом болел страшно. Василий Иванович окончательно затих, не рассказывал сказок и всем своим видом старался показать, как благодарен за корм и крышу: в семье и так денег нет, а тут еще ваську держать… Васек сдавали в васятники целыми партиями, и скоро государство не могло прокормить приюты: их закрывали, васек распускали, и они опять начинали ходить. К соседке Нелли Александровне зашел васька Леша — оборванный и вонючий; их васятник закрыли, обратно он не просился, потому что у Нелли Александровны была больная старая мать и им самим есть было нечего. Он зашел просто попрощаться и сделать на прощание деревянный сувенир — два бородача на качелях. Почему-то почти все васьки любили этот сувенир и часто оставляли его хозяевам. Васьки утверждали, что он приносит счастье.</p><p class="p1">В октябре, когда все уже летело в тартарары, неожиданно появился Гуров. Анька гуляла одна, без Василия Ивановича, потому что его молчаливое и всегда грустное присутствие бывало ей теперь в тягость. Он хорошо это понимал и не мешал ей гулять в одиночестве. Анька шла по сухим листьям, шуршала ими и думала о том, что от снега осталось совсем немного. Гуров вышел к ней из-за ближайшего дерева. Он был строг и непривычно серьезен.</p><p class="p1">— Я хочу вас поблагодарить, Аня, — сказал он вместо «здравствуйте».</p><p class="p1">— За что? — спросила Анька. Ей было неловко называть взрослого человека вот так, без отчества, Петром.</p><p class="p1">— Вы очень хорошо относитесь к Василию Ивановичу. Знайте, это только благодаря вам ваши родители до сих пор не вернули его в приют.</p><p class="p1">— Они не собираются никуда его возвращать! — обиделась Анька за родителей.</p><p class="p1">— Я знаю. Но если бы не вы, обязательно собрались бы. Я хочу вас также поблагодарить за то, что вы взяли именно его. Я тогда обратил на вас самое серьезное внимание.</p><p class="p1">— Вас же там не было! — не поверила Анька.</p><p class="p1">— Там — не было, но в том приюте я бывал часто. И для меня очень важно, что Василий Иванович у хороших людей.</p><p class="p1">— Вы его сын?! — догадалась Анька. Василию Ивановичу было за пятьдесят, Гурову за тридцать, хоть и лысый, так что они вполне могли…</p><p class="p1">— Хорошо придумываете, Аня, — одобрил Гуров. — Нет, не сын, мы вообще не родственники. Василий Иванович, как вы понимаете, человек непростой. Он замечательный сказитель, и мне его судьба не безразлична.</p><p class="p1">— Но тогда… тогда почему… — начала Анька и осеклась.</p><p class="p1">— Почему я не взял его сам? — спокойно спросил Гуров. — Вы ведь это хотели сказать? Потому что я, видите ли, почти не живу дома. Много разъездов, работа такая. А постоянно таскать его с собой — выше моих сил. Вы, наверное, заметили, что он совершенно беспомощен в быту. Оставить его одного в квартире — значит почти наверняка убить.</p><p class="p1">— У него этот синдром… в самой крайней стадии? — Испугалась Анька.</p><p class="p1">— Я бы сказал, в самой высшей. Но не в синдроме дело. Забудьте про синдром. То, что с ним, — это не болезнь. Это особый склад характера, не более. И я рад, что вы с ним подружились. Теперь слушайте меня внимательно. Именно в этом человеке может оказаться спасение и для вас, и для всей вашей семьи.</p><p class="p1">Анька испугалась, и было отчего. Они были одни с Гуровым в скверике, где уже болезненно краснел холодный закат и быстро темнело.</p><p class="p1">— Наступают плохие времена, Аня, очень плохие. Вы сами это понимаете, и я хочу, чтобы у вас не было иллюзий. Страна при нынешнем правительстве никак не выдержит кризиса, и кончится дело войной. Мы сейчас никому особо не нужны, кроме одного нашего давнего врага, и враг этот обязательно воспользуется моментом. Поэтому война будет, что бы вам ни говорили в школе. Это будет не совсем обычная война. Ее никто не будет так называть. Но имейте в виду, все по-настоящему. И убивать будут, и врагов везде искать. Вам будет очень трудно сберечь Василия Ивановича. Может случиться всякое. Я не все время в Москве, говорю вам, поэтому от вас зависит очень многое. Пожалуйста, если что-то заметите, звоните сразу. Или мне, или вот, — он протянул ей клочок бумаги с телефоном и адресом. Анька мельком взглянула на адрес: Сиреневый бульвар.</p><p class="p1">— Да ведь мы там были, — еле выговорила она.</p><p class="p1">— Я знаю. Там живут верные люди, они помогут в случае чего. Берегите Василия Ивановича, Аня. Это очень важный человек. Мы с вами гадаем, а он все знает, только не обо всем говорит.</p><p class="p1">— А… чем все кончится?</p><p class="p1">— Да ничем, как обычно, — сказал Гуров и вдруг улыбнулся. — Вы же знаете, тут при всяком ужесточении бывает большая война. Или небольшая, неважно. Я не стану вам сейчас забивать голову ерундой. Моя задача одна: чтобы в этой войне погибло как можно меньше коренного населения. У меня, собственно, всегда такая задача. Василий Иванович — из самых главных представителей этого населения. Пусть вас не удивляет, что он васька. Васьки — непростые люди.</p><p class="p1">— Я поняла, — кивнула Анька.</p><p class="p1">— Я понял, что вы поняли. Кстати, откуда родом ваши родители?</p><p class="p1">— Папа из Москвы, мама из Саратова. А что?</p><p class="p1">— Ничего, неважно. Вы каких-то хороших корней. Аболок на потолок, косолоток на позолоток?</p><p class="p1">— Чего? — испугалась Анька.</p><p class="p1">— Ничего, присловье такое. Я же фольклорист. В общем, я очень прошу вас беречь Василия Ивановича, что бы ни случилось, Ладно?</p><p class="p1">Анька кивнула.</p><p class="p1">— Слово даю.</p><p class="p1">— Я и так верю, — и Гуров, отступив за деревья, исчез, словно его и не было. Анька побежала домой.</p><p class="p1">А потом начались столкновения в центре, демонстрации, драки и самая настоящая война. Накануне все московские ЖД стремительно бежали из столицы — это у них было хорошо придумано, потому что в Москве была армия и милиция, здесь они еще кого-то слушались, а в остальной России, как оказалось, ни армии, ни милиции толком нет. Целые банды ЖД свободно хозяйничали почти по всем южным губерниям, где было тепло, и по северным, где была нефть; ЖД захватывали целые деревни, как сообщали радиоголоса, но в Москве стояли хорошие глушилки, и расслышать эти радиоголоса было почти невозможно. Анькин отец рассказывал ужасы. Сведения с остальных территорий поступали противоречивые и смутные. Бабушка из Саратова писала, что ЖД дважды входили в город, но их выбивали. Еще появились какие-то партизаны. Они все время взрывали железные дороги — думали, наверное, что, если взорвать, ЖД не доберутся до Москвы. Впрочем, на чьей стороне они действовали — никто не знал. Наверное, им просто нравилось взрывать дороги.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p1">После голодной и холодной зимы, когда даже школа работала не каждый день, потому что учителям опять перестали платить, как в конце прошлого века, в эпоху дестабилизации, — родители впервые заговорили о том, чтобы сдать Василия Ивановича в приют. Анька подслушала этот разговор и ворвалась в родительскую комнату с криком и слезами. На этот раз обошлось, но не было никакой гарантии, что они не вернутся к этому разговору.</p><p class="p1">Анька превратилась к концу восьмого класса в высокую, стройную и симпатичную девушку, только лицо у нее было нервное и тревожное. Она почти не плакала теперь, но все время боялась. Телевизор она старалась не смотреть — по нему не говорили ничего ужасного, но ужасное было очевидно без всяких сводок. Страна себе больше не принадлежала. Ни федералы, ни ЖД не знали, какая часть страны у них в руках. В Москве кое-что еще было, а в Саратове уже почти ничего. В программе «Время» показывали какие-то репортажи с посевной, но они были старые, явно прошлогодние — Анька их помнила, у нее была фотографическая память.</p><p class="p1">Гуров объявился к началу июня. Он похудел, сбрил бороду и уже не улыбался. На этот раз он не стал подкарауливать Аньку в скверике, а заявился прямо домой: где только адрес взял?</p><p class="p1">— Здравствуйте, Вячеслав Викторович, здравствуйте, Марина Андреевна, — поздоровался он с Анькиными родителями. — Можно позвать Василия Ивановича? Разговор и его касается.</p><p class="p1">— С кем имею честь? — напряженно спросил отец.</p><p class="p1">— Гуров Петр Антонович, инспектор Генерального штаба, — Гуров показал красную книжечку с орлом. Вот какой он был, оказывается, фольклорист.</p><p class="p1">— Чем обязаны? — так же напряженно спросил отец.</p><p class="p1">— Прежде всего я очень вас прошу никому не рассказывать об этом визите, — сказал Гуров. — Я существенно нарушаю должностные полномочия, навещая вас. Но ничего не поделаешь, ситуация критическая. На следующей неделе в стране будет введен план «Антициклон». Начинается масштабная зачистка. Всех так называемых васек отловят, вывезут из города и… — Гуров сглотнул, — …и, по моим сведениям, уничтожат.</p><p class="p1">Все оглянулись на Василия Ивановича. Он был очень бледен, но спокоен.</p><p class="p1">— Я не думаю, что вы сможете спрятать Василия Ивановича, и не уверен, что захотите этого. Я могу забрать его сейчас и приехал именно за этим. Если вы к нему привязались, простите меня.</p><p class="p1">— Я знал, — тихо сказал Василий Иванович.</p><p class="p1">— Давно знали? — вскинулся Гуров.</p><p class="p1">— Соколок, — ответил Василий Иванович.</p><p class="p1">— И молчали?! — укоризненно спросил Гуров.</p><p class="p1">— Что говорить, коли ничего не сделаешь. Я не поеду с вами, Петр Антонович.</p><p class="p1">— Почему?!</p><p class="p1">— Я знаю, куда мне надо. Я в Алабино пойду.</p><p class="p1">— В Алабине опасно, Василий Иванович.</p><p class="p1">— Давно там не опасно, врут все. Наших много там.</p><p class="p1">— Но почему? В конце концов, я собираюсь в Дегунино. В июле, я там бываю часто…</p><p class="p1">— Вы меня не трогайте, других спасайте. О них-то никто не позаботится, а обо мне есть кому.</p><p class="p1">— Василий Иванович, поймите, — Гуров даже прижал к груди короткие ручки. Ни на Аньку, ни на Анькиных родителей он не обращал теперь ни малейшего внимания. — Поймите, что вами рисковать невозможно, таких, как вы, у нас раз и обчелся…</p><p class="p1">— Мне ничего не будет, — сказал Василий Иванович с непривычной твердостью. — Мне они никогда ничего не сделают. А вам надо остальными заняться. Я все равно с вами не поеду, потому что есть еще неделя. Я за эту неделю три-четыре города успею обойти, всем скажу.</p><p class="p1">— Я уже работаю, люди предупреждены…</p><p class="p1">— Всех-то вы не предупредите. Да не все вас и послушают. А меня послушают, я как-никак им свой брат. Пойду, скажу. Я и чувствовал, что пора, но думал — может, мерещится… Вы же знаете, у меня с решениями трудно…</p><p class="p1">— Знаю.</p><p class="p1">— Но одно мое решение твердо, — сказал Василий Иванович. — Мной не занимайтесь, другими занимайтесь. Благословение мое вам на это, а чтобы со мной возиться — нет вам моего благословения. Спасибо, что предупредили, Петр Антоныч. Не забуду.</p><p class="p1">— Я и не ждал от вас другого, — после паузы сказал Гуров. — Не было такого, чтобы человек вашего склада позаботился о себе.</p><p class="p1">— Было, — горько сказал Василий Иванович. — Всяко было, но больше не будет.</p><p class="p1">— Василий Иванович, — с тоской проговорил Гуров. — Вы же беспомощны, простите меня…</p><p class="p1">— В чем беспомощен, а в чем и нет. Ходить — много ума не надо. Двадцать лет ходил, еще похожу. Поезжайте, Петр Антонович, у вас дел много. Я о себе позабочусь.</p><p class="p1">Гуров рассеянно оглядел Аньку и родителей, словно не понимая, зачем они, и стремительно вышел. Некоторое время все в оцепенении молчали.</p><p class="p1">— Пойду я собираться, — сказал Василий Иванович. Он был по-прежнему бледен, но руки у него не дрожали, голос тоже, он даже как-то выпрямился.</p><p class="p1">— Никуда ты не пойдешь, Василий Иванович, — твердо сказала Анька. — У нас есть куда тебя спрятать.</p><p class="p1">— Меня-то ты спрячешь, а остальным кто скажет?</p><p class="p1">— Можно, наверное, написать им или позвонить, — не сдавалась Анька.</p><p class="p1">— Да, по мобильному. У каждого васьки мобильник, — усмехнулся Василий Иванович. — Нет, Анечка, тут надо по-старому. Своими ногами, своим голосом. Полетел соколок, не догонишь. Завтра соберусь, послезавтра уйду.</p><p class="p1">— Подождите, Василий Иванович, — сказал отец. — Что за глупости? Что за уничтожение, какой-то человек из генштаба, темные слухи… Неужели вы верите, что кого-то будут… уничтожать?</p><p class="p1">— Что ж не верить, — сказал Василий Иванович. — Прокормить не могут, так уж конечно, уничтожать. Варяги — они как? Они народ жалостливый. Они, если прокормить не могут, всегда убивают. Сказки наши любят. Слезливый народ. А когда жрать нечего — так и убьют, опять же из жалости.</p><p class="p1">— Варяги? — переспросила мать.</p><p class="p1">— Ну, русы, — объяснил Василий Иванович. — Да как хотите назовите. Ладно, спасибо вам за все. Пойду я собираться.</p><p class="p1">И отправился на кухню, где под старой Анькиной кроватью все эти два года лежал в неизменной готовности его синий рюкзачок.</p><p class="empty-line"/><p class="subtitle">3</p><p class="p1">Следующая ночь была дождливая, сырая и холодная. Анька рано легла спать, сославшись на головную боль. Василий Иванович с ней попрощался и сказал, что уйдет ближе к утру, когда на улицах не останется даже случайных прохожих, да и милиция расползется греться. Кажется, он все понял, поэтому прощался с Анькой тихо и сдержанно, словно понарошку.</p><p class="p1">— Как так можно? — шепотом стонала мать. — Ребенок успел привязаться к нему, это же больше, чем собаку потерять…</p><p class="p1">— Он вернется, все это глупости, — повторял отец. — Какая зачистка, какое уничтожение? Я бы знал… Лично мне этот Гуров не внушает никакого доверия.</p><p class="p1">— А генштаб?!</p><p class="p1">— Мало ли подделок. Я тебе за час три таких наклепаю. Ты скажи, ты Василию Ивановичу с собой еды положила?</p><p class="p1">— Положила… Бутерброды там, термос я ему отдала…</p><p class="p1">— Зачем ему термос?! — взвился отец. — Ты бы лучше яблок там, хоть витамин какой-то…</p><p class="p1">Анька лежала под одеялом, не раздеваясь. Не то чтобы она боялась заснуть, но просто вылезать из-под теплого одеяла ночью неприятно. Лучше уж в одежде. Она никогда еще не выходила из дома по ночам. Все-таки ей было всего четырнадцать.</p><p class="p1">— Ну, вы ложитесь. Мне так спокойнее будет, — сказал Василий Иванович.</p><p class="p1">Отец и мать ушли к себе. Анька знала, что они не спят, но к трем часам ночи, надеялась она, заснут. До трех она читала под одеялом при помощи фонарика. Книжка была дурацкая, приключенческая, — этим она никогда не увлекалась. В четверть четвертого послышались шаги в коридоре. Василий Иванович встал и тихо пошел к дверям. Вскоре щелкнул замок — это Василий Иванович закрыл за собой дверь. Анька мысленно сосчитала до двадцати, вскочила, подхватила школьную сумку, куда с вечера сложила все необходимое, и выскользнула за ним.</p><p class="p1">Она догнала его уже в подъезде. Шел дождь, размывая классики во дворе. Василий Иванович стоял у подъезда — то ли ждал ее, то ли не знал, куда пойти. Все-таки отвык скитаться за два года.</p><p class="p1">— Что ж ты, Василий Иванович? — тихо сказала Анька, тронув его за плечо. — Или думал, что я тебя одного отпущу? После всех твоих сказок-то?</p><p class="p1">— Анька! — залепетал Василий Иванович. — Живо домой, я кому говорю!</p><p class="p1">— Мне, мне говоришь. Пошли, что ли?</p><p class="p1">— Вот хитрая какая! — прошептал Василий Иванович. — Ты думала, я всех перебужу дома, да? Потому и дождалась, пока выйду?</p><p class="p1">— Умный ты, Василий Иванович, — уважительно сказала Анька. — Но я тоже, видишь, не совсем деревянная.</p><p class="p1">— Ну, попрощались, и хорошо. У меня сердце болело, что не попрощаемся. Иди давай, видишь — дождь сыплет?</p><p class="p1">— У меня зонтик есть, — сказала Анька, только сейчас вспомнив о зонтике. Все-таки ей было тяжело уходить из дома, и она только сейчас поняла, что уходит отсюда в последний раз. Ну, пусть не в последний, но в любом случае надолго.</p><p class="p1">Она раскрыла зонт. Василий Иванович попытался перехватить его, чтобы держать над ней и над собою, но рукоятка выскользнула у него из руки, и зонт ветром понесло по двору. Анька еле догнала его.</p><p class="p1">— Вот видишь, — сказала она, запыхавшись. — Куда тебя одного отпускать, такого-то? Я до Алабина твоего тебя довезу, а там и вернусь. Нельзя же, чтобы тебя ловили, как бродягу. Понимаешь? А когда ты со мной, ты не бродяга, ты как бы меня сопровождаешь к родне в Саратов. Нормально? У меня и адрес бабушки записан, я у нее гостила однажды.</p><p class="p1">— Вот хитрая, — повторял Василий Иванович, и его мокрое лицо умильно морщилось. — Все придумала, все рассчитала… Что ж ты храбрая такая, Аня? Ты же знать не знаешь, какое оно — Алабино.</p><p class="p1">— Я тебя зато знаю, — просто сказала Анька. — Пошли, Василий Иванович. Где Алабино твое?</p><p class="p1">— Под Белгородом, — прошептал Василий Иванович.</p><p class="p1">— Вот и хорошо. Электричками поедем, так безопаснее. Я и денег взяла.</p><p class="p1">— Ах ты! — умилился Василий Иванович, но тут же посуровел. — Твои же решат, что я взял.</p><p class="p1">— Не решат, — сказала Анька. — Я записку оставила. Ну, скорей, а то вдруг они проснутся.</p><p class="empty-line"/><p class="subtitle">4</p><p class="p1">В электричке Анька задремала. Народу почти не было, только хмурый парень напротив исподлобья смотрел на нее. Василий Иванович явно боялся этого парня и отчего-то все время поджимал ноги, пряча их под скамейку.</p><p class="p1">Анька не понимала, почему парень так зол и почему Василий Иванович его боится. Это был обычный пьяный парень. Ну, не выспался, возвращается из каких-то гостей… Сиплый голос машиниста сказал, что поезд проследует до Тулы со всеми остановками, кроме Силикатной и Покровского. Анька свернулась калачиком и впервые за ночь провалилась в сон.</p><p class="p1">Проснулась она от того, что кто-то на нее навалился и, сопя, пытался раздвинуть ей ноги. Со сна она не сообразила, чего хочет от нее парень, который теперь сопел ей в лицо чесночным духом и лез то под свитер, то в штаны.</p><p class="p1">— Ааааа! — заорала Анька. — Спасите!</p><p class="p1">Вся надежда была на Василия Ивановича, но на Василия Ивановича в таких делах, прямо скажем, надежда была плохая. Он топтался рядом, воздевая руки к небу, и причитал: «Ах! Горе-то какое! Ах, Господи, что делается! Анечка! Анечка, что делать-то!»</p><p class="p1">— Кнопку! — взвизгнула Анька. — Кнопку нажми!</p><p class="p1">Она знала, что в электричках бывает экстренная связь с машинистом, но знала и то, что от этой связи нет никакого толку, не бросится же машинист в вагон, оставив управление поездом; а бригад милиции в поездах давно не было — все были брошены на отлов ЖД в Москве, в которой никаких ЖД давно уже не было, да и кавказцы как-то вдруг исчезли, словно тоже решили поучаствовать в войне.</p><p class="p1">— Ааа! — орала Анька, и никогда в жизни ей не было так страшно. Холод наполнял ее, холод и ужас, от которого руки и ноги отказывались повиноваться. Парень был тяжелый, навалился на нее всем телом, грязным губастым ртом залеплял ее рот, и она содрогалась от страха и гадливости. Она плохо представляла себе, что будет, но понимала, что сейчас это будет, и будет неотвратимо, потому что помочь некому. Ночью в электричках всегда помочь некому.</p><p class="p1">— Ааа! — так же визгливо, по-заячьи, кричал со слезами в голосе Василий Иванович. — Анечка, детонька, что делается!</p><p class="p1">Он пытался хватать парня за руки, за скользкий плащ, — но тот ногой отшвырнул Василия Ивановича, и несчастный васька, пролетев полвагона, рухнул в проход.</p><p class="p1">Аньку спасло только то, что на остановке в вагон вошел рослый мужчина средних лет. Мгновенно поняв, что происходит, — часто, наверное, ездил в электричках, — он схватил парня за шиворот, поднял и без церемоний врезал в челюсть. Парень повалился, но тут же вскочил; новый пассажир встретил его ударом в нос. Парень понял, что дело нешуточное, и побежал. Пассажир погнался было за ним, но оглянулся — и понял, что помочь Аньке сейчас важней, чем настигать несостоявшегося насильника.</p><p class="p1">— Цела? — спросил он.</p><p class="p1">— Цела, — дрожащим голосом ответила Анька, кое-как прикрываясь растерзанным свитером.</p><p class="p1">— Что ж ты одна в поезде в такое время? — укоризненно сказал пассажир.</p><p class="p1">— Я не одна, — сказала Анька. — Я с дедушкой.</p><p class="p1">— Дедушка… Много толку от твоего дедушки! — сказал пассажир, вынимая термос. — На, глотни. Вставай, дедушка. Сам-то цел?</p><p class="p1">— Я-то цел, — пролепетал Василий Иванович.</p><p class="p1">— Василий Иванович, — сказала Анька, все еще дрожа. — Выйдем в тамбур…</p><p class="p1">Васька поплелся за ней. Светало. Рассвет был дождливый, мутный и серый. За окном тянулись сизые капустные поля.</p><p class="p1">— Что ж ты так, Василий Иванович? — сказала Анька. Она впервые разговаривала со своим васькой так резко.</p><p class="p1">— Анечка, — залепетал он, — я потому и хотел один… Одному мне не страшно, а с тобой что хочешь сделают… Что же я могу, Анечка? Я не умею этого, Анечка…</p><p class="p1">— Это что же, — догадалась она, — мне от тебя никакой защиты, так? Это, значит, мне тебя защищать?</p><p class="p1">— Зачем защищать, Анечка, — лопотал он, — мне-то что сделается…</p><p class="p1">— Эх, Василий Иванович, — сказала Анька со взрослой горечью в голосе. — Трудно нам с тобой будет, милый друг.</p><p class="p1">— Трудно, трудно, — закивал Василий Иванович. — Возвращайся, Анечка…</p><p class="p1">— Да куда уж теперь, — сказала Анька и пошла обратно в вагон — благодарить нового пассажира и пить кофе из его термоса. Она, впрочем, не забывала оглядываться на тамбур, чтобы Василий Иванович не сбежал.</p><p class="p1">Он и не думал бежать. Он стоял, прижавшись лбом к холодному стеклу, и беззвучно шевелил губами. Анька ничего не слышала. Она пила кофе из жестяной крышки и со, стыдом чувствовала, что не может унять дрожи. Только сейчас ей стало по-настоящему страшно.</p><div class="poem">
<div class="stanza">
<p class="v">— Не одна в поле дороженька,</p>
<p class="v">Не одна колокольная, —</p>
</div>
</div><p class="p1">тихонько мычал Василий Иванович, обливаясь слезами. –</p><div class="poem">
<div class="stanza">
<p class="v">Не одна в поле дороженька,</p>
<p class="v">Не одна подневольная.</p>
<p class="v">Не одна в поле дороженька,</p>
<p class="v">Не одна баламутная,</p>
<p class="v">Не одна в поле дороженька,</p>
<p class="v">Не одна бесприютная…</p>
<p class="v">Ну вот, все и поехали. Чух-чух-чух.</p>
<p class="v">Не одна в поле дороженька,</p>
