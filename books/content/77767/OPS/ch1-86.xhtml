<span><span><span><span id="id124"><div class="title5">
<p class="p">4</p>
</div><p class="p1">— И теперь, — закончил губернатор, — я от всей души надеюсь, что когда-нибудь смогу быть полезен… как представитель власти, имеющий опыт управленческой работы…</p><p class="p1">— Да-да, — сматывая провода и прочие удочки, забубнил интервьюер. — Покорно благодарим. Несомненно, несомненно.</p><p class="p1">Он ссутулился, словно для конспирации, и юрко исчез — слился с пейзажем, как это хорошо умели делать его коллеги. Вот уж кого Бороздин ненавидел всегда, но понял это только сейчас.</p><p class="p1">Губернатор чувствовал известную неловкость — примерно как партизан из классического анекдота: «И немцы не заплатили, и с ребятами нехорошо получилось». Он чувствовал себя ненужным. Главное сделано, публично покаялся, перебежал — теперь, вероятно, можно и в расход; но кто же станет тратить на него пулю? Пусть убирается…</p><p class="p1">— Ну что, Алексей Петрович? — ласково сказал Эверштейн. — Пройдемте ко мне, побеседуем.</p><p class="p1">В этом ласковом тоне чувствовалась уже начальственность — Бороздин никогда не ошибался в таких вещах. Он сам был когда-то начальником. В теперешнем Эверштейне ничего не было от благородного, благодарного идеалиста, который два часа назад доброжелательно встречал перебежчика. Губернатора обласкали, напоили чаем, срочно по мобильному вызвали оператора, чтобы зафиксировал признание… Теперь можно было и пинка.</p><p class="p1">— Чайку? — спросил Эверштейн благодушно.</p><p class="p1">— Давайте, — пожал плечами губернатор.</p><p class="p1">— Что делать думаете?</p><p class="p1">— Не знаю. Работать на вас. Если надо — воевать. Пути назад мне теперь нет, сами понимаете.</p><p class="p1">— Да вам давно его нет.</p><p class="p1">— Тоже верно.</p><p class="p1">Эверштейн почесал нос, лоб, ухо.</p><p class="p1">— Но воевать, как вы понимаете, мы вас тоже не пустим. Догадываетесь, почему?</p><p class="p1">— Догадываюсь. Не доверяете.</p><p class="p1">— Нет, дорогой Алексей Петрович. Не поэтому, Алексей Петрович. А потому, что вы не хазар, вот и все объяснение. Это варяги вербуют к себе всех, кого попало. А мы, если вы обратили внимание, даже и мужиков из захваченных деревень под ружье не ставим. Варяжская армия велика и обильна, хазарская невелика и мобильна. И нам совершенно не нужен человек в возрасте — вам ведь за сорок, я так понимаю, — не имеющий вдобавок никаких полезных навыков. Это ведь так, Алексей Петрович?</p><p class="p1">— Не пойму, куда вы клоните, — раздраженно сказал Бороздин. Он чувствовал, что надо ударить Эверштейна по рукам, обозначить границы, за которые ему заходить нельзя: да, перебежчик, да, покаялся, — но он человек, и человек государственный, с ним нельзя вот так… Он еще не знал, что с ним теперь можно всяко. Незнание это отчасти извинялось тем, что варяги относились к перебежчикам иначе. Для них перебежчик был все же иностранцем, гостем, туристом; он доказывал правоту варяжского дела, в которой варяги сомневались куда чаще хазар — ибо голос почвы всегда слабее, чем голос крови, в особенности если эта кровь так долго не знала почвы. Хазары потому и выглядели на первый взгляд мягче иных варягов, что могли себе это позволить: зверства происходят от неуверенности, а вышибить уверенность и правоту из хазара можно было только вместе с кровью. Именно поэтому таким бредом с самого начала были разговоры про кровь варяжских младенцев, которою питались хазары. Зачем им кровь варяжских младенцев, когда есть своя?</p><p class="p1">— Сейчас поймете, — все так же ласково сказал Эверштейн. — Вы, наверное, действительно думаете, что можете нам пригодиться в качестве организатора, да? Я буду с вами откровенен, Алексей Петрович. В принципе вы свое дело сделали. Ваша миссия этим интервью и ограничится. Живите как хотите, дорогой.</p><p class="p1">— Но вы же понимаете, что мне некуда идти, — зло сказал Бороздин. — Я только потому и перешел к вам, что оставаться на русской стороне больше не мог…</p><p class="p1">— Понимаю, Алексей Петрович, отлично понимаю, — мелко захихикал Эверштейн. — И вы решили, что нам резко пригодится раскаявшийся враг. До известной степени так оно и есть, и убивать вас действительно никто не будет. Но брать вас в наши ряды — сами понимаете… Я бы еще понял, Алексей Петрович, если бы вы были какой-нибудь специалист. Но вы ведь никакой не специалист, положа руку на сердце. Вы всю жизнь умели одну нехитрую вещь, за которую и пострадали. Вы умели трахать коренное население в хвост и в гриву, за что вам большое человеческое спасибо, — но ведь вы и хазарское население не очень жаловали, верно? Вы всю жизнь принадлежите к прелестной местной касте, которой все мы многим обязаны, — вы, верно, и не догадывались об этом никогда? Я вам сейчас объясню. Это ваше устройство, дорогой, изнутри никогда толком не поймешь. Только со стороны, и то не сразу. Я долго наблюдал.</p><p class="p1">Он явно тянул время, наслаждаясь своей властью над губернатором. Бороздин никогда бы не поверил, что этот человек два часа назад чуть не бросился ему на шею.</p><p class="p1">— Понимаете, как функционирует система? Ваша власть и те, кто ее осуществляет, — имеют тут простейшую функцию. Вот вы изволили говорить о бессмыслице — и говорили очень убедительно, я даже, видите, чуть не прослезился. Такая величественная, прекрасная в своей бессмысленности государственная машина. Но она на деле очень, очень даже осмысленная! Вы же ничего не умеете, кроме как трахать туземцев, — что, нет? Вопросы и негодования потом… Знаете ли вы, господин губернатор, что ежели бы британские колонии располагались друг к другу поближе — они бы тоже объединились в Британский Союз, и были бы ничем не хуже Советского? Ничто так не сплачивает, как общее угнетение, совместно пережитый стыд — то-то вы и не можете до сих пор избавиться от ностальгии по родному Союзу. Отсюда и феномен братской дружбы, — нет? Только два народа не покорились этому угнетению — всего два, Алексей Петрович, потому что один из них как раз и выступал главным угнетателем, а другой — его единственным антагонистом! Вы ничего не умеете, кроме угнетения, и это так задумано, но именно поэтому из вашей власти нет никакого выхода. В любой другой среде вы тут же задохнетесь, как рыбка!</p><p class="p1">Эверштейн замолк и ласково посмотрел на губернатора. Бороздин молчал.</p><p class="p1">— В этом, кстати, ошибка большинства начальничков, когда они перебегают на сторону восставшего народа. Таких, если помните, было не очень много. Инстинкт у вас развит, ничего не скажу. Это у вас любовь его притупила, или что человеческое вдруг проснулось. Вам нельзя перебегать, Алексей Петрович. Другого какого перебежчика я бы, может, и принял, и обласкал… Но у вас же инстинкт угнетателя, Алексей Петрович! Вы если начнете, то уже не успокоитесь. Вы ничем, ничем не можете руководить просто так. Чистое подавление, без малейшей примеси. Как же я могу вас запустить к себе, сами посудите? Русская власть — это же очень простой аппарат. Она понимает, что держится на честном слове. Если бы она не угнетала всех помаленьку, ее бы немедленно сорвало. И потому я никогда вас не приму в хазары, дорогой Алексей Петрович. Да в хазары и вообще не принимают. Идите на все четыре стороны, но я ведь не совсем зверь, верно? Я понимаю, что за вами слежка, а после нашего интервью вам вообще недолго гулять. Верно?</p><p class="p1">Бороздин молчал. Никогда и никого на свете он не мог бы ненавидеть так, как этого человека.</p><p class="p1">— И потому я вам советую: здесь недалеко юг. Уходите на юг, в Краснодар и дальше, в горы. Там воюют наши, чеченские. Вы им тоже, конечно, не нужны, но они вас по крайней мере спрячут. У них там оставаться не надо, но помогут переправиться из страны — куда-нибудь в Азию или мало ли… На других границах вас возьмут быстро. А тут все-таки недалеко. Мы же не звери, Алексей Петрович. Мы не из ваших варягов. У нас человека преследовать не станут — иди себе куда хочешь. В этом и разница, понимаете?</p><p class="p1">Бороздин поднял глаза на Эверштейна, и Эверштейн выдержал его взгляд. Его не так-то просто было запугать взглядами. Губернатор отлично понимал теперь эту разницу — разницу из анекдота, подумать только, на все случаи успел придумать анекдоты наш веселый народ. Зять сбрасывает тещу с десятого этажа, держит за волосы: «Петя тещу убил, Вася задушил… А я — гуманист: я тебя от-пуска-ю!».</p><p class="p1">— Вы поймите, Алексей Петрович, — вкрадчиво сказал Эверштейн. — Это в варяги можно записаться. А в хазары не принимают. У хазар все просто: наш — не наш. Абсолютная нация. Даже самого расхазаренного хазарина, в жизни не открывавшего священных книг, можно потянуть за ниточку, одну такую ниточку, — и он вспомнит, кто он такой, и пойдет, куда идут прочие. Вы все очень завидуете нам, и завидуете давно. Что же мы, не видим? Но даже снисходя во всем вашим заслугам, Алексей Петрович, мы никогда не примем вас в хазары, даже в самые заштатные хазары. Это вам следовало бы помнить. Заметьте, мы не варяги, мы гораздо эффективнее. Варягу, чтобы выбить из противника признание в поражении, надо сначала пытать его три дня, да потом он его еще дополнительно помучает за предательство. А у нас все просто. У нас вы сами все делаете, разве нет? Вы пришли сюда сами, потому что вам надоели свои. И предали своих сами, никто вас к этому не склонял. Видите, как полезно быть просто союзником времени: все происходит без нашего участия! Это потому, что мы знаем вектор.</p><p class="p1">Эверштейн говорил все это спокойно, даже без особого как будто энтузиазма, словно о вещи давно решенной, общеизвестной, не нуждающейся в пылких сторонниках и тщательных обоснованиях. Любое несогласие он выслушал бы со скучающим видом математика, которому предлагают поспорить о таблице умножения. В нем появилась великолепная снисходительность, от которой он сам заводился. Бороздин понял, что главная претензия к «Протоколам хазар» была несостоятельна. Многим не верилось, что злодеи могут так смачно, с наслаждением расписывать свое злодейство, так упиваться свинством, так открыто признаваться в мерзости. Но все это было лишь ответом на долгие унижения, а может быть, обычной самоуверенностью людей, сделавших самую безошибочную ставку — на распад. Вечные его союзники, они не допускали его только к себе — тут на его пути стояла железная стена; такой самоорганизацией стоило гордиться, и, пожалуй, главным их занятием после полной победы в самом деле могло стать чтение всему миру бесконечной лекции о том, сколь они хороши.</p><p class="p1">— Ведь у вашей элиты никогда не было другого желания, как только стать нами, — снисходительно продолжал Эверштейн. — Вы всегда хотели быть как мы, перенимали все наши черты, упоминали даже в вашей публицистике о необходимости, просто Господи, невротизировать детей — чтоб росли настоящими честолюбцами… Вам невдомек, что все это не имеет смысла без одного маленького элемента, без крошечной гаечки — без богоизбранности, богоизбранности, Алексей Петрович! Каждый хазар — частица мировой души; у каждого из нас, конечно, лишь бесконечно малая ее часть, ибо душ было сотворено, как сказано в книге, всего шестьсот тысяч, а нас уже гораздо больше. Но у других-то ее вовсе нет, понимаете? Поэтому у нас все получается и будет получаться, поэтому для Всевышнего только мы имеем цену, и именно поэтому к нам нельзя ни прибиться, ни затесаться. Вы можете помогать нашей победе, но это будет только наша победа. Все усилия варягов направлены только на то, чтобы хазары заметили их и приняли к себе. Не будет этого, Алексей Петрович. Мы ничего не будем с вами делать. Мы вас не будем даже убивать. Обратите внимание, что в последнее время никто никого и не убивает. Вся эта война так идет: поначалу нам еще приходилось отвечать на ваши дикие провокации в городах, отвечать погромщикам… А теперь ясно, что надо только дать вам перезреть и сгнить, и все само рухнет, даже без особого треска. Мы ничего, ничего не будем делать с вами. Вас просто нет, понимаете?</p><p class="p1">Эверштейн посмотрел на Бороздина с невыразимым сочувствием. Он сделал бровки домиком, поцокал языком и покачал головой: ай-яй-яй, господин губернатор, как нехорошо получилось!</p><p class="p1">— Так что на юг, на юг, — спокойно сказал он. — Подальше куда-нибудь. Тридцать серебренников можете получить завтра в бухгалтерии штаба.</p><p class="p1">Бороздин встал и вышел, не прощаясь. Он знал, что ему надо сделать перед бегством на юг.</p></span></span></span></span>
