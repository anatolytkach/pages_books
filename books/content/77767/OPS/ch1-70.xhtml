<p class="p">Глава шестая. Монастырь</p>
</div><span id="id96"><div class="title5">
<p class="p">1</p>
</div><p class="p1">— Давненько, давненько не заплывали с той стороны, — говорил седобородый в черном, распахивая тяжелые ворота. — Как вас, воины, угораздило?</p><p class="p1">— Извините, — говорил Воронов с той заискивающей радостью, какая всегда просыпалась в нем после избавления от опасности; как ни устал Громов, как ни выдохся после перестрелки и бегства, но и тут успел подосадовать на вороновское облегченное многословие. — Извините, мы просто, знаете, попали в Блатск, хотя совершенно туда не собирались, а потом, понимаете, пришлось бежать…</p><p class="p1">— Блатские-то сюда не доплывают, — пояснил монах. — Из них если кто и знает про ваш ход, так не всякому и откроется. Он с тех еще времен, когда нормальный город был. Ну что, милые, надо вас к настоятелю. У нас правило — все новые люди представляются.</p><p class="p1">Однако, подумал Громов. Не попасть бы нам из огня да в полымя. Что за монастырь, почему за такой высокой каменной стеной, что за остров, не помню я тут никакого острова… Секта, ясное дело; в теперешней военной путанице как не процвести суевериям? Этот настоятель может еще оказаться пострашней Марика; ну, да посмотрим.</p><p class="p1">— Нам, собственно, — сказал он сухо, — надо бы в Коноши, и лучше до ночи…</p><p class="p1">— Ну, до Коношей отсюда далеко, — сказал монах. — Завтра, может, наши туда поплывут, так и вас прихватим. А до того никак не доберетесь — вниз по реке километров двадцать будет. Да и дождь собирается.</p><p class="p1">Попали мы, подумал Громов. Воронов между тем не чувствовал никакой опасности — он трещал без умолку, восхищаясь местными красотами. Восхититься было чем: Блатск на том берегу был почти не виден (вроде и плыли недолго — что за шутки пространства?), и теперь они стояли на острове — пологом зеленом холме, вершина которого была обнесена высокой белокаменной стеной. За стеной виднелись витые, цветные, золотые купола; впрочем, в проеме ворот Громов разглядел и обычные двухэтажные деревянные строения. К одному из них монах и направлялся.</p><p class="p1">— Что это за монастырь? — спросил Громов.</p><p class="p1">— Даниловский. Не слыхал?</p><p class="p1">— Что-то слыхал, — сказал Громов без особой уверенности.</p><p class="p1">Над рекой между тем заклубились серо-серебряные тучи. В небе свивались и разворачивались свитки, и уже поблескивала блеклая, словно никелевая молния, но где-то так высоко, что слабое ворчание грома долетало нескоро. Собиралась гроза, и далеко, над неблатским берегом, повисли хорошо видные темные плети дождя. На том берегу Громов различал стога, приземистую рощу и длинную деревню с красными крышами.</p><p class="p1">— Чивирево, — сказал монах. — Ну, проходите.</p><p class="p1">Громов шагнул за ним в ворота, Воронов вошел следом. Монах запер ворота на тяжелый засов и повел их к двухэтажному деревянному дому вполне дачного вида, с палисадничком вокруг. Перед грозой резко пахли цветы — табак, календула, несколько больших чайных роз.</p><p class="p1">На крыльцо вышел высокий и не старый еще настоятель — лет сорока пяти на вид. На носу у него сидели круглые очки в железной оправе.</p><p class="p1">— Добрый вечер, — сказал он весело. — Неужели из Блатска?</p><p class="p1">— Мы не оттуда, — поспешил объяснить Воронов, — мы не блатские… Мы там случайно, извините…</p><p class="p1">— Ну, сюда какими только путями не приходят, — пожал плечами настоятель. — Некоторые даже через Блатск. Сами они тут, конечно, не бывают, да и мы туда в последнее время не ходим… Есть ощущение, что скоро никакого Блатска не будет.</p><p class="p1">— Почему? — спросил Воронов.</p><p class="p1">— Доиграются, юноша. Пойдемте в дом, попьем чайку.</p><p class="p1">Дом и внутри ничем не отличался от обычной подмосковной дачи, обставленной старой скрипучей мебелью; что до икон, так ведь и они на дачах встречаются нередко, пусть в меньшем количестве. Громов в иконописи ничего не понимал, но заметил, что рядом с досками старого письма висели во множестве и самые простые, бумажные, из тех, что продаются в церквах и особенно популярны у водителей-частников.</p><p class="p1">— Гроза будет, — с радостным предвкушением сказал настоятель, словно именно этой грозе и суждено было покончить с Блатском. — Я, кстати, отец Николай.</p><p class="p1">— Капитан Громов, — сказал Громов.</p><p class="p1">— Костя Воронов, — сказал Воронов, и Громов не стал его поправлять, хотя представляться надо было рядовым. Как-никак на Воронове была форма, хоть и изрядно испачканная, — да и сам он выглядел немногим лучше, но даже в подземном ходе Воронов умудрился испачкаться сильней. Положительно, бывают люди, совершенно не рожденные для службы.</p><p class="p1">— Ну и чудесно. Стало быть, чайку. Вы не из Дегунина следуете?</p><p class="p1">— Я был недавно в Дегунине, — ответил Громов, не желая распространяться о дислокации своего полка.</p><p class="p1">— У кого оно сейчас, не знаете? У федералов или у ЖД?</p><p class="p1">— Когда я уходил, было у федералов.</p><p class="p1">— Ага, ага. Ну, это ненадолго. Удивительная деревня, сто лет там не был. С этой войной и не высунешься никуда, совсем озверели люди. Мы в последние годы особенно никуда не выходим, новостей почти не знаем. Нас ведь, вы знаете, с обеих сторон ненавидят.</p><p class="p1">— Почему? — не понял Громов. — У нас в каждом полку иерей…</p><p class="p1">— Ну, какой же это иерей? Это варяжский извод, ничего общего с христианством не имеющий. Они нас ненавидят больше, чем любого хазарина.</p><p class="p1">Точно секта, понял Громов. Но чтобы у секты был целый монастырь…</p><p class="p1">— Вы, наверное, не в курсе, — мягко сказал настоятель. — Немудрено. Сейчас вообще мало кто в курсе. Может быть, водочки? Сам не употребляю, но для гостей найду.</p></span></span></span></span>
