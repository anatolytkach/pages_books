<span><span><span><span><span><p class="p1">— Да, оно забирает много жизненных сил, — устало подтвердил Эверштейн. — Я тоже что-то устал, Воленька… Давайте потом договорим. Что касается Соловья, то он сделался народным сказителем и, ослепив себя в знак траура по лучшему другу, стал ходить по русским деревням, сказывая былины о богатырях-жидовинах. Впоследствии русские, конечно, их отредактировали до неузнаваемости, убрали внутренние рифмы, погубили распев… Извращена была и история бегства Элии, который якобы бился с жидовином, что-то такое делал с Соловьем… какому-то чуду-юду головы рубил… Мы попытались реконструировать оригиналы, они изданы. Есть, кажется, даже сидюк с хазарским распевом, но это уж совсем левые дела. Поговорите с Женькой, она расскажет.</p><p class="p1">Он встал и принялся с прежней суетливостью (без следа исчезнувшей при рассказывании легенды о страшной гибели Ильи-Муромца) собирать бумаги, бессмысленно перекладывать брошюры на столе, с десятком сложных ритуалов открывать и закрывать портфель, упихивать туда что-то, уминая и утрамбовывая…</p><p class="p1">— Вы Женьку правда расспросите, — повторял он рассеянно, — потому что она прицельно этим занималась. Ви же знаете, я специалист только по второй мировой… и хотя вполне разделяю мысль о том, что русские не имеют никакого морального права называться коренным населением, — но ви же знаете, все народы переселяются. Нормальная практика. Этак, знаете, американские индейцы потребуют сделать в дельте Амазонки свой индейский Израиль, сколько их там еще осталось… да? Я вполне разделяю все эти аргументы. Нельзя переиграть историю. Надо довольствоваться нынешним местом и по мере сил его отстаивать. Так? Согласны? Нет, они хотят куда-то в Россию… Зачем вам обратно в Россию? Россия давно не та страна, с землей черт-те что сделали, недра разграбили, леса и те остались только в Сибири, а Сибирь скоро будет китайская… Грибов нет… Правда, что этим летом совершенно нет грибов? Я в детстве очень любил… еще там… мы ведь уехали, мне одиннадцать лет было…</p><p class="p1">Эверштейн наконец завершил ему одному понятные утрамбовки и перекладки и теперь смотрел выжидательно, давая понять, что им обоим пора.</p><p class="p1">— Миша, — спокойно спросил Волохов, и не думая подниматься. — Вы теперь ослепите себя и пойдете петь народные баллады?</p><p class="p1">— Воленька, — мягко сказал Эверштейн, — ну к чему издеваться? Я вам поведал одну из легенд моего народа. Вам сейчас мало кто расскажет настоящую хазарскую сказку. Не Павича же читать, этого Маркеса недоделанного… Пойдемте, правда.</p><p class="p1">— Последний вопрос. Можно?</p><p class="p1">— А по дороге никак нельзя? — жалобно промямлил хранитель. — Башка раскалывается…</p><p class="p1">— Нам не по дороге, — терпеливо объяснил Волохов. — Я отношусь ко всему как к обычной гипотезе, сколь бы оскорбительной она мне ни казалась. Нельзя вполне абстрагироваться от национального чувства, но я пытаюсь как могу. Скажите, вам не кажется, что вы совершаете довольно опасную подмену? Что, приписывая хазарам либертарианскую доктрину, вы смешиваете национальность с идеологией? То есть пользуетесь, по сути, уже готовой концепцией прохановцев?</p><p class="p1">— Но прохановцы абсолютно правы, — изумленно произнес Эверштейн, часто моргая. — Разве это для вас не очевидно? Стал бы Березовский издавать Проханова, будь это иначе! Они в одном врут, в главном, — что это их земля. А что существует непримиримый антагонизм между хазарами и русами — с этим и у нас никто не спорит. Какая может быть дружба у захватчика с захваченным? Я ведь вам докладывал уже: наша нация была этическим понятием… она и вообще далеко не сводится к генетическому коду… В хазары, если вы знаете, принимают всех. Даже и вам путь открыт, хотя вы, я чувствую, не рветесь…</p><p class="p1">— Вы не поняли, — поморщился Волохов. — Вы просто подобрали национальный псевдоним для убеждений, а это опасно, — вот что я хочу сказать. Это все равно что у нас патриотами себя называют наиболее кровожадные почвенники. При чем тут вообще Patria?</p><p class="p1">— Именно при том, — терпеливо проговорил Эверштейн, так и стоя перед ним с портфельчиком, — что ваша местная любовь к Родине предполагает не созидание, а именно и только истребление чужих. У вас всегда война. Оборона рубежей. Потребность в подвиге. Молитвенное разбивание лбов. А если лоб не разбит, так это не молитва. Вспомните, как на одной летней олимпиаде ваши призвали всю страну молиться за спортсменов — потому что они приравнены к воинам, защищающим честь Отечества. И православные попы молились за прыгунов с шестом, а прыгуны слезно жаловались, что их судьи зажимают. Мешают, понимаете, защищать честь Отечества. Еще бы немного — и стрелки начали бы стрелять по судьям… Вы обратили внимание, что вашим теперь везет только со стрельбой? Все периоды созидания относились, увы, к нашим кратковременным засильям. Когда построили всю промышленность? В начале тридцатых. Инженеры Маргулиесы из повести «Время, вперед!». Когда Москва ваша эклектическая приобрела свой нынешний облик? В девяностые, при власти ненавистных вам либертариарцев.</p><p class="p1">— Когда недра грабили с особенной силой.</p><p class="p1">— Когда крупнейшей нефтяной компанией мира стала русская, — поправил Эверштейн. — Когда месторождения начали наконец научно разрабатывать, а прибыль щедро отдавать на образовательные проекты. Когда в России появилась свободная печать — где, между прочим, и вы сотрудничали квантум сатис, с необременительными историческими очерками и столь симпатичными мне прогнозами. А издавалось все это на нефтяные деньги, которые при вашем патриотическом правительстве перекачиваются в основном на оборонку, не так ли? Очень может быть, что сельское население в то время сокращалось, да и интеллигенции приходилось поторговывать на рынках. Но сейчас, когда ваши окончательно запретили эту торговлю, стали преследовать за попрошайничество и отбирать дачные участки у семей призывников-«альтернативников»… стало таки сильно лучше, n’est ce pas?</p><p class="p1">— С этим я не спорю, — мрачно согласился Волохов. — Но нельзя в этом не увидеть реакции на ваши собственные художества…</p><p class="p1">— Которые были нашей реакцией на ваши художества, которые в свою очередь… Это порочный круг, Воленька, и началось коловращение с 862 года, когда на беззащитные и плодородные земли хазар случайно набрело мрачное и глупое северное племя, шатавшееся с воинственными целями по всей нынешней среднерусской равнине. Другие благополучно давали им отлуп, а хазары не смогли. Верней, их и хазары лупили, пока в хазарских рядах не нашлось собственного предателя. В семье не без урода. А теперь это глупое и воинственное племя называет себя патриотами России и любое, даже самое мирное дело умудряется организовать как войну — потому что война все спишет. И даже самые умные и терпимые их представители совершенно неспособны к творческой дискуссии, а вечно норовят увидеть в оппоненте оскорбителя их национальной идеи и засветить ему в зубы, чтобы он перестал порочить бедных и обиженных нас. Мне пора, Володя. Извините.</p><p class="p1">— Ну, про бедных и обиженных… — проговорил Волохов, вставая. — Про бедных и обиженных, наверное, не надо, товарищ хазар, — а? И про способность абстрагироваться от национальных корней… Вы ведь и во мне видите прежде всего руса, похитителя ваших земель?</p><p class="p1">— Ваши постарались.</p><p class="p1">— Я одного не пойму, Миша! Вот, возьмите, у меня есть солпадеин — наш, захватнический, но действует.</p><p class="p1">— Да-да, спасибо, — Эверштейн взял таблетку и проглотил без воды, сильно двинув кадыком.</p><p class="p1">— Одного не пойму, — повторил Волохов. — Вы сами-то верите в то, что говорите?</p><p class="p1">— А не знаю, — сказал Эверштейн, глянув на Волохова просто и честно. — Верю ли я, что Иисус Навин остановил солнце? Меня там не было, я историк, работаю с источниками. Я одно знаю: стоит русскому с хазаром заспорить на исторические темы — только титаническая воспитанность или профессиональная близость могут их удержать от кулачного боя. И еще знаю, что ничего у русских на их якобы родной земле не получается. А после всякой вашей революции, как, знаете, в мочевом пузыре при простатите, — что-то остается. Это не ваша земля, понимаете, Володя?</p><p class="p1">Он был очень серьезен и смотрел Волохову прямо в глаза. Волохов молчал.</p><p class="p1">— Ладно. Пойдемте, пожалуйста. Мне правда пора.</p><p class="p1">— Да-да, пойдемте… — Волохов пошел с Эверштейном к выходу, но внезапно остановился, пораженный самоочевидной мыслью. — Что-то остается? То есть вы призываете… к окончательному решению русского вопроса?</p><p class="p1">— Или еврейского, — вымученно улыбнулся Эверштейн.</p><p class="p1">— Стало быть… «Нам двоим на земле нет места»?</p><p class="p1">— Почему же нет. Есть. И вам есть. Только вам надо вернуться на это место. Куда-нибудь на Север, который вы все так любите. Только не на наш — наш вы уже отдали Абрамовичу, Вексельбергу… и правильно сделали. У них сразу дело пошло. Вы идите куда-нибудь к себе, в заброшенную Гренландию, в землю мирового льда, который так любят ваши наци… Попробуйте сделать, чтобы там яблони зацвели. Это вообще большая беда, что у русских нет своего Израиля, — вы не находите? Но когда мы вернемся в Россию, — если эти наши безумные ЖД добьются-таки своего, — вы, если хотите, можете заселиться в Каганат. Махнем не глядя, как на фронте говорят?</p><p class="p1">— Мы подумаем, — в тон ему ответил Волохов.</p></span><span id="id29"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Очнулся он только на улице, машинально идя к Женькиному дому. Кругом шумел, орал, жрал, хвастался, назначал свидания, ехал на автобусах Каганат — пестрый и избыточный во всем; странно было бы представить себе все эти яркие глаза и черные волосы среди среднерусской природы, слышать громкую гортанную речь на улицах русских городов. Русские — захватчики… бред собачий! Достаточно посмотреть на то, как похожи эти ненавистные всему миру русы на собственный пейзаж. Эти соломенные волосы, прозрачные глаза, распевная речь-речка… Волшебный язык со смещенными ударениями, повторяющий неравномерные, непредсказуемые подъемы и спуски пыльной русской дороги… Вечная тоска русской песни, тревожной, как островерхий черный ельник на закате… Он вздрогнул и остановился. Мысли, приходившие ему в голову, были шаблонны, как передовица почвенника. Тоска и тревога… Откуда тоска и тревога? Что это за русская тайна, об которую все обламывали зубы? Может, она в том и есть, что…</p><p class="p1">— Тьфу, черт, — выругался он вслух. Любимый прием всех альтернативщиков: идея внедряется как бредовая, потом ты веришь, потом понимаешь, что только так и могло быть. Любая интерпретация истории верна, пятый пункт «Памятки альтернативщику», которую он же сам вывесил на двери отдела. Пункт раз. Никто не знает, как все было. Пункт два. Все источники в той или иной мере сфальсифицированы. Пункт три. Нет истины, есть лишь ряд асимптотических приближений к ней (Набоков). Пункт четыре. Фоменко и Носовский — дураки, но их дело не пропало. Пункт пятый: смотри выше. Шестой, или главная логическая теорема. Если какое-либо утверждение является верным, то верно и обратное. Седьмой: забудь все прочитанное и марш работать.</p><p class="p1">В конце концов, каждый верит, как хочет. Им проще верить так. Ну и милости просим. А что такого? Хазары были на российской территории, кто бы спорил. Кого там Женька упоминала? Кестлера? Надо прочесть Кестлера… Да, были. Но каганат преувеличивать не следует. Гумилев уже на этом обломался, выдумав, по сути, целое государство. А у него любой школьник десять подтасовок на главу найдет… Да и потом, разве можно было так защищать чужую страну, как мы во время последней войны?</p><p class="p1">Можно, сказал внутренний Эверштейн, которого Волохов тут же попытался виртуально задушить. Еще как можно. Вошедшая в кровь и плоть привычка распоряжаться собственным народом, как чужим. Захватнические приготовления — проверить по Суворову, но ведь он, Волохов, занимался этим детально: насчет танков и переправ возразить нечего, готовились… И кого немцы истребляли первыми? Почему они так набрасывались именно на… Да, и на коммунистов. «Я выхожу, в меня стреляйте дважды». Господи, какая пошлость! Но ведь у себя они тоже истребляли именно их. Всеобщая мишень. Почему? Потому что не умеют сопротивляться? Потому что не работают на земле? Или потому, что все когда-то и в самом деле было их собственностью?</p><p class="p1">Нет, нет, черт его знает. Все это надо строго продумать. С этим надо серьезно спорить, как со всякой концепцией национальной исключительности. Но ведь они не претендуют на Германию, тут же возразил себе Волохов. Они не требуют Италии, им не нужна Польша. Им с избытком хватает России, им нужна она. Может быть, потому, что — как пишет та же «Позавчера» — они уже захватили все остальное, а мы — последние, кто сопротивляется? Да нет. При желании можно представить их сосуществующими с немцами, итальянцами, чехами. Даже с поляками, хазарофобами, каких поискать. Только с нами у них вечная неувязка, и даже сейчас я чуть не бросился на Эверштейна, несчастного Эверштейна с птичьей грудью… Господи, что за бред!</p><p class="p1">Ночь, ночь — а ведь еще час назад по улице тек пыльный розовый зной, смотри Бабеля. Кто писал по-русски лучше Бабеля, и Зощенки, в чьем хазарстве не сомневалась Ахматова? А сама горбоносая, черноволосая Ахматова? Мне от бабушки-хазарки были редкостью подарки… Я никогда ничего не дарю Женьке. Подарить бусы, дешевые, дурацкие, на память? Я ведь скоро уеду домой, к своим захватчикам, а что у нее останется от меня? Да и надо ли ей? Он поймал себя на том, что думает о ней с явной, ревнивой враждебностью. Ревновать ее случалось ему и прежде, но чтобы так злобно… Боже мой, так вот чего добивался Эверштейн! Ну конечно. Как все просто. Он ревнует и пытается вбить клин — самый простой, национальный; и как я сразу не врубился!</p><p class="p1">Сзади оглушительно бибикнули. Он подпрыгнул и оглянулся: Женькина древняя «мазда» стояла у тротуара.</p><p class="p1">— Я уже минут пять за тобой еду. Ты что, не чувствуешь ничего? Где ты торчал столько времени?</p><p class="p1">— Это ты где торчала? — отозвался он, чувствуя, как с первым звуком ее голоса испаряются враждебность и подозрительность; тоже мне — «Мой сексуальный партнер, мой классовый враг». Вот Женька, какой еще искать правды?</p><p class="p1">— Я-то на репортаже, а вот ты-то?</p><p class="p1">— А я-то у Эверштейна, — с отвращением признался он, с трудом, при своих почти двух метрах, влезая в машину. — Устала?</p><p class="p1">— Да нет, надоело. И что, просветил тебя Эверштейн?</p><p class="p1">— Сверх всякой меры. Женька, скажи мне честно, он в тебя влюблен?</p><p class="p1">— Эвер? — Она расхохоталась и тронула «мазду» с места так, что Волохова бросило на спинку сиденья. Он никак не мог привыкнуть к ее манере водить — да и все тут гоняли как сумасшедшие без всякой на то причины, это странно сочеталось с пресловутой левантинской леностью. — Эвер влюблен в Россию и больше никем не интересуется. Не представляю себя с Эвером. Да ну его к черту. Ты есть хочешь? Я голодна, как сорок тысяч братьев.</p><p class="p1">— Хочу, — сказал Волохов и понял, что голоден, счастлив, влюблен, как сорок ласковых сестер, и знать не хочет про территориальные споры тысячелетней давности. Мир, дружба, жвачка, make love, not wars. Как смел он забыть все это? Колдовство, чистое колдовство. Ужо тебе, чертов гипнотизер! Ты у меня пойдешь в Жадруново.</p></span></span></span></span></span>
