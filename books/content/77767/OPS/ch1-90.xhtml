<span><span><span id="id135"><div class="title5">
<p class="p">Глава двенадцатая. Деревня Дегунино</p>
</div><span id="id136"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Странное началось после генерального сражения.</p><p class="p1">Генеральные сражения — вещь привычная, не раз и не два случались они в Дегунине да и в других местах. Ни одно генеральное сражение не заканчивалось полной и безоговорочной победой. Причина заключалась в том, что захват куска земли ничего не решает, все это знают и не придают земле особенного значения. Главное, так сказать, — наложить руку сильнейшего духом противника. Рука накладывалась, противник все понимал и убирался, и хорошо еще, если земля его выпускала; а то бац, воронка, или река, где не было, и поминай как звали со всеми твоими двунадесятью языками.</p><p class="p1">Но ни один двигатель не вечен, и в Дегунинском сражении, которое непременно вошло бы в историю, если бы кому-нибудь захотелось написать такую историю, некому было накладывать сильнейшую руку на слабейшего противника. Неуязвимый проект, при котором два всадника по очереди седлали рабочую лошадь, закончился благодаря деградации всадников и износу лошади. Земля вступила в дело. Все и до этого было понятно, но теперь стало видно, а это совсем другой разворот событий.</p><p class="p1">Вроде и не сделалось ничего особенного — подумаешь, лопнуло поле среди боя и поглотило солдат; но ведь это бывало. Только варяги и хазары скрывали такие вещи, чтобы тем вернее приписать себе все боевые заслуги; а коренные-то знали, что действуют в завете с землей и что в случае чего она поможет. Множество раз помогала — то прятала своих, то разверзалась под чужими; коренное население, если его допускали до телевизора, намекало иногда, что война выиграна не без помощи земли, — но это считали безобразной клеветой. Варяги утверждали, что война выиграна жертвами и ничем иным, хазары упирали на заградотряды. Между тем где-где, а в Дегунине знали свою землю, и если она вступила в войну — значит, действительно край, но непонятно было, на чьей стороне она действует. Похоже, что ей надоели все три силы и, стало быть, сам процесс.</p><p class="p1">Страшно стало в деревне Дегунино.</p><p class="p1">Началось с того, что прославленные дегунинские яблоньки, росшие почти в каждом дворе, среди августа месяца стали ронять листву, яблоки на них сморщились и пожелтели, кора потрескалась. Главная яблонька, росшая в дегунинском лесу, та самая, от которой брали все черенки, отводки и семечки, вечно плодоносящая, даже зимой неутомимо рождающая мороженые рязанские яблоки, так и завязывавшиеся коричневыми, — потекла смолой, как слезами, и круглые сутки издавала тихий, едва слышный стон, словно просила прощенья, что не может больше угощать деревню Дегунино. Печка, стоявшая неподалеку, спрятанная лесом от посторонних глаз, невесть когда сложенная старая печка, неутомимо предлагавшая всем сдобные пирожки с непредсказуемой начинкой, — никогда не угадаешь, то с рисом, то с яблоками, а то вдруг с капустой, — сначала стала предлагать непропеченные, сырые, вязкие, а потом вовсе замерла, уставившись черной, нерожающей пустотой на потрясенных дегунинцев. В самые дикие, самые голодные времена, когда подчистую вымаривали коренные деревни то одной, то другой государственной инициативой, — яблонька плодоносила, а печка пекла, и население удерживалось на краю. А уж если печка и яблонька, основа основ всякой коренной деревни, отказываются жить дальше — это значило только, что дальше и некуда. В Дегунине жили люди непростые, им не надо было других пояснений.</p><p class="p1">Коренное население долго гадало, чем на этот раз прогневило своего Даждь-бога. Ведь оно жило, как всегда, — щедро и безропотно отдавая все, что имело; как прежде, на круглой поляне, служившей Даждь-божьим храмом, кружились хороводы. Как прежде, прятались в лесах от мобилизации дегунинские мужики, возвращавшиеся к женам лишь в краткие периоды затиший. Как прежде, дегунинские жители были неспособны к убийству и чужды воровству. Все шло обыкновенным порядком, но из Дегунина словно вынули душу, и случилось это в тот самый августовский день, когда в избе ашиной бабки убили сторожа.</p><p class="p1">Не сказать, чтобы сторож был главный человек для коренного населения. Были и такие, что думали — а, не надо сторожа, и без сторожа выживет Дегунино. Но те, что постарше и поумней, знали: если он убит, да еще и в самом Дегунине, — это не зря, ох, не зря. Сторожей немного, каждый на счету. И ежели кто не углядит — прощай все: не миновать начала. Аша ушла из Дегунина со своим еле плетущимся спутником, провожаемая тяжелыми взглядами; что с того, что она поклялась уйти в горы? Какая разница, где родится страшный ребенок, который положит Дегунину окончательное начало? Кроме сторожа, остановить ее было некому — так и ушла, а Дегунино осталось ждать страшного.</p><p class="p1">Холодно стало в деревне, тихо стало в деревне. Даже и песен не пели, а только плакали.</p></span><span id="id137"><div class="title5">
<p class="p">2</p>
</div><p class="p1">— Яблонька моя, яблонька, — причитала Галя, гладя сухой ствол. — Яблонька моя кормилица, душенька моя голубушка. Что на тебя напало, что с тобой станет, что с нами будет? Земля моя землица, чем я тебя обидела? Печка моя печенька, что я не так сделала? Я ли тебя не благодарила, песен тебе не пела, сказок не рассказывала? Прощай, печенька, прощай, яблонька, холодное пришло на нас время, голодное время…</p><p class="p1">Галя чувствовала, что и печка, и яблонька изо всех сил стараются ей ответить, корнями цепляются за иссохшую, безответную дегунинскую землю, пытаются выдавить из себя хоть пирожок, хоть яблочко, чтобы утешить несчастных коренных жителей, но могут теперь только стонать — жалобно, еле слышно. А что вы думаете, и у печки корни. У всего живого корни, каждый дом в Дегунине корнями сосал из земли устойчивость и силу, — но земля не рожала больше, влага жизни ушла из нее, и дома рассыхались, трескались, скрипели дверями, стонали стенами. В доме ашиной бабки покосилась крыша, у ее соседки Фроси треснуло окно. Коренное население сохло с корня. Давно к этому шло, а почему — никто не знал; видно, и впрямь нет на свете ничего вечного.</p><p class="p1">Коренное население Дегунина боялось смерти. Смерти не было в дегунинском мире, ее не пускали, о ней не думали, — что уходит в землю, не умирает, а переходит в дерево либо травку, и длится бесконечный круг, и не иссякает живая влага. Коренное население Дегунина не знало будущего в своем бесконечном циклическом настоящем. Коренное население думало, что если древние волчьи роды будут блюсти запреты и не смешиваться с завоевателями, то ничего плохого и не будет. Одного не знало коренное население Дегунина — что иссыхает любая почва и сужается круг, по которому ходит жизнь; и если не выйти из круга, пусть даже в опасное, чреватое смертью пространство, — круг сведется в точку, и поминай, как звали.</p><p class="p1">— Яблонька моя, яблонька, — причитали в каждом дегунинском дворе, — печенька моя, печенька.</p><p class="p1">Отдельная песня была для плюща, оплетавшего заборы, отдельная — для георгинов, отцветавших пышно и бурно, словно в последний раз, отдельная — для золотых шаров.</p><p class="p1">Стон стоял над деревней Дегунино.</p></span><span id="id138"><div class="title5">
<p class="p">3</p>
</div><p class="p1">В такое-то время, первыми, раньше срока наступившими осенними заморозками вошли сюда Анька и васька Василий Иванович.</p><p class="p1">— Что же это, Анечка, — залепетал Василий Иванович, вслушиваясь в тихий, нараставший по мере приближения стон, похожий на вой телеграфных столбов в сыром осеннем поле. — Что это делается, или ты не слышишь?</p><p class="p1">Анька не слышала, но чувствовала. Что-то было не так, очень сильно не так.</p><p class="p1">— Анечка, что же это делается. Это ведь Дегунино, или мы не туда пришли?</p><p class="p1">— Не знаю, Василий Иванович.</p><p class="p1">— Нет, точно Дегунино! Я-то знаю. Что же с ними сделалось? Вот ведь Катерина, вот сторожиха: сказала, да накаркала.</p><p class="p1">Василий Иванович знал тут все дворы, каждый васька не раз и не два в своих странствиях заходит в главную коренную деревню и снова покидает ее, потому что не может нигде оставаться долго; если б не начали их распихивать по васятникам, так бы всю жизнь и ходили. К ашиной бабке зашел он сразу, потому что знал ее не один год.</p><p class="p1">— Василий Иванович! — запричитала она. — Что ж ты раньше не приходил! Пойдем, покажу тебе, что делается.</p><p class="p1">На Аньку никто из них не взглянул. Маленькие, круглые дегунинские бабки выкатились в двор и обступили высыхающую яблоньку.</p><p class="p1">— Вот, гляди, что стало. Отчего это, Василий Иванович?</p><p class="p1">— Ахти, беда какая, — заговорил Василий Иванович, опускаясь на колени. — Видно, корень пересох или ты как-нибудь еще недоглядела…</p><p class="p1">— Опомнись, Василий Иванович, когда же я могла недоглядеть? Отворот до роскоши, поворот на крепости, вывод из громкости не такой, чтобы утешить голубчика расхожего…</p><p class="p1">Дальнейшего Анька не понимала: слова все были знакомые, но в странной связи друг с другом, а стало быть, коренные жители перешли на свой язык. На этом языке обсуждалось только то, чему не было аналога в речи захватчиков, которую они давно приняли и считали своей; возвращение к коренному наречию причиняло им почти физическую боль, бередило самую глубокую память, и потому, раз уж на него перешли, дело шло и впрямь о главном, для чего не было слов в новой речи.</p><p class="p1">— Да ты коробок выливала ли?</p><p class="p1">— Ахти, выливала.</p><p class="p1">— Да ты уголок бормотала ли?</p><p class="p1">— Ахти, бормотала.</p><p class="p1">— Да ты, может быть, колосок не одобрила?</p><p class="p1">— Ахти, одобрила!</p><p class="p1">В другое время Анька посмеялась бы над всей этой белибердой, но по интонации Василия Ивановича и местной старухи понимала, что речь идет о чем-то страшном, крайне серьезном, и сам Василий Иванович был напуган едва ли не больше старух.</p><p class="p1">— Прежде-то не было так, а?</p><p class="p1">— Никогда так не было, Василий Иванович!</p><p class="p1">— Ахти, что же это. К печке, к печке пойдем.</p><p class="p1">— Ах, печка-то, печка-то! — запричитали хором старухи и пошли с Василием Ивановичем в избу. Анька подошла к яблоне, неотличимой на вид от тех, что росли у нее на даче, и погладила ствол. Желтая смола вытекала из трещин, сухие коричневые листочки лопотали на ветру.</p><p class="p1">— В лес надо, в лес надо, — быстро повторял Василий Иванович, выходя из покосившейся избы. — Хоть там погляжу, что делается. Ахти, если и там так, то что ж это, чего мы сделали…</p><p class="p1">— Да и там, и там, — плакали старухи. — Там и началося.</p><p class="p1">— Пойдем, Анечка, — приговаривал Василий Иванович. — Печку сейчас посмотришь, яблоньку посмотришь…</p><p class="p1">Посреди идеально круглой поляны возвышалась раскидистая, мощная, очень старая яблоня, а рядом с ней — приземистая уютная печка, которая словно стояла тут всегда; ее словно никто не складывал, не топил — она сама выросла тут непонятно откуда; нес ветер печное семечко, выбрал поляну покруглей, обронил, и взошло. Первой проклюнулась труба, а там и пошло, и пошло, — и вот уже первый пирожковый урожай снимают прохожие; а где принялась печка — там можно строить деревню, потому что место это правильное, благословленное. Яблоня не вся еще высохла, еще трепетала на ней живая листва, но по стене печки змеилась уже широкая трещина, такая зловещая, что ясно было — сколько ее глиной ни замазывай, ничем не починишь.</p><p class="p1">— Анечка, что же это! — в голос заплакал Василий Иванович.</p><p class="p1">Анька подошла к печке. Теперь, после двухмесячного скитания, она верила в свою силу — много раз вытаскивала она Василия Ивановича из безнадежных положений, привыкла заботиться о нем и теперь считала себя сильней, а то и старше. Ей казалось, что и здесь ее сила хоть как-то выручит, выправит положение — не может быть, чтобы ее любви не хватило на яблоньку и печку; она погладила трещину — и точно, в печке что-то зашуршало, задвигалось, заслонка выпала, и в теплом печном чреве наметилось некое движение. Анька сунула руку в черное зияние и нащупала одинокий подгоревший пирожок, черствый и остывший.</p><p class="p1">Это было все, чем могли ее тут встретить.</p><p class="p1">— Кушай, Анечка, — прошептал Василий Иванович. — Это она здоровается.</p><p class="p1">— Это она прощается, — сказала Анька. — Не могу я, Василий Иванович.</p><p class="p1">Она положила пирожок обратно в печкино чрево. Так никто и не узнал, с чем он был.</p></span><span id="id139"><div class="title5">
<p class="p">4</p>
</div><p class="p1">— Куда же ты пойдешь, Василий Иванович? На кого ты нас бросишь, Василий Иванович? — кричали круглые дегунинские бабки. Василий Иванович стоял посреди деревни и кланялся на четыре стороны.</p><p class="p1">— Вы знаете, куда я пойду, — говорил он робко.</p><p class="p1">— Да нельзя тебе, Василий Иванович! Никто же еще не приходил оттуда, Василий Иванович!</p><p class="p1">— Нет, надо, надо, — лепетал он. — Видно, уж не избежать. Надо Жаждь-бога попросить, надо умилостивить.</p><p class="p1">— Не ходи туда, Василий Иванович! Пожалей нас, Василий Иванович!</p><p class="p1">— Нет, милые, надо пойти. Думаете, не страшно? Еще как страшно. А вы ждите. Может, умилостивлю.</p><p class="p1">— Куда мы теперь, Василий Иванович? — спросила Анька, когда, провожаемые общим стоном бабок, печек и яблонек, они медленно брели по пыльной дороге к железнодорожной станции.</p><p class="p1">— Ах, не спрашивай, Анечка. Поезжай домой, туда-то я без тебя дойду.</p><p class="p1">— Что ты, Василий Иванович. Как же я теперь домой поеду. Надо же Дегунино спасать.</p><p class="p1">— Не надо тебе его спасать. Не твоя деревня, не тебе и спасать.</p><p class="p1">— Ты что же это? Ты гонишь меня, Василий Иванович!</p><p class="p1">— Да пойми ты! — сказал васька, останавливаясь среди дороги. — Нельзя туда ходить, никто еще не вернулся!</p><p class="p1">— Да, может, это потому, что там очень хорошо, — сказала Анька.</p><p class="p1">— Не поеду я с тобой! — рассердился Василий Иванович. — Что ты упрямая какая! На поезд садись, и чтобы к родителям!</p><p class="p1">— Никуда не поеду!</p><p class="p1">— Поедешь!</p><p class="p1">— Не поеду!</p><p class="p1">— Анечка, — плаксиво заговорил Василий Иванович. — Ну что мне делать с тобой! Ты же сама, сама видела…</p><p class="p1">— Видела, — решительно сказала Анька. — Нельзя так оставлять. Поехали что-нибудь делать.</p><p class="p1">Василий Иванович почувствовал ее спокойную силу, и ему стало легче.</p><p class="p1">— А и то, — сказал он. У васек против силы не было никакого иммунитета, они с облегчением сдавались, едва кто-то начинал решать за них. — Глядишь, еще и вымолим чего.</p><p class="p1">— А куда мы едем-то? — спросила Анька.</p><p class="p1">— Да есть одно место, — уклончиво ответил Василий Иванович. — По дороге расскажу.</p></span></span></span></span>
