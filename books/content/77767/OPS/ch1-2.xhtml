<body class="z">
<span id="id3"><div class="title">
<p class="p"><strong>Ж.Д</strong></p>
<p class="p"><em>поэма</em></p>
</div><div class="epigraph">
<div class="cite">
<div class="poem">
<div class="stanza">
<p class="v">«Помню Родину, русского Бога,</p>
<p class="v">Уголок на подгнившем кресте,</p>
<p class="v">И какая сквозит безнадега</p>
<p class="v">В робкой, смирной его красоте».</p>
</div>
</div>
<p class="text-author">Лев Лосев</p>
</div>
<div class="cite">
<p class="p1">«Грузно попыхивая, паровоз начал брать поворот, и они плавно скрылись из виду со своим убогим и вечным терпением, со своей безмятежной недвижностью. С этой готовностью детски неумелой. И вместе какая, однако, способность любить без меры и заботиться о подопечных, надежно их оберегая и обкрадывая, а от обязательств и ответственности отлынивать так простодушно, что и уверткой этого не назовешь…»</p>
<p class="text-author">Уильям Фолкнер</p>
</div>
<div class="cite">
<p class="p1">«Все идет в одно место».</p>
<p class="text-author">Экклезиаст, 3:20</p>
</div>
</div></span>
