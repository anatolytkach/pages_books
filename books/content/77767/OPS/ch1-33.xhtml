<p class="p">1</p>
</div><p class="p1">Теперь Волохов во главе небольшого отряда, называемого Бог весть почему его летучей гвардией, шлепал по мокрому смешанному лесу к северу от Дегунина, снимал с лица липкую паутину, отводил ветки, чтобы не хлестали по щекам, и чувствовал себя неприлично счастливым, потому что ночью ему предстояла встреча с Женькой — комиссаром ЖД, стоявших в соседней деревне Грачево.</p><p class="p1">Летучая гвардия — да, это они вмастили. Вполне в духе позднего варяжства с его напыщенной, самоочевидной тупостью: в последнее время всякий стыд потеряли. Стоило помереть от пьянства или нищеты полузабытому актеришке, сыгравшему две эпизодические роли в комедиях на излете застоя, — газеты именовали его великим; ничтожества вроде Паукова прозывались цветом русского воинства, опорой национального духа; в последний предвоенный год ввели страшное количество праздников. И то сказать, работать никто уже не мог, да и незачем было — работали, по сути, себе в убыток: произведенное не продавалось, скудный экспорт не окупал и малой доли затрат, нефти было больше, чем могла потребить страна и в лучшие свои годы, — что ж не праздновать? Черные дни календаря все наглядней вытеснялись красными, большей частью воинскими: все они в сознании Волохова сливались в одного Всеархистратига Стратилата, чернокрылого дракона, пожирающего собственный хвост и оттого невыносимо страдающего, — змееборца и мученика в одном лице. Эта змея, сама себя борющая, но собою же и питающаяся, — была лучшим символом русской истории, и утешаться оставалось тем, что нельзя же заглатывать себя вечно. Праздновали пышно, жирно, со сбитнем и гулянками, но в каждом празднестве все отчетливей проступал погром. Нововведенный день народного единства с каждым годом отмечался агрессивнее и вызвал наконец прямое побоище. То есть побоища бывали и прежде — борцы с нелегальной миграцией ежегодно хаживали по столицам торжественным маршем, в открытую неся свастики, а навстречу им разрозненными, скудеющими толпами выходили посрамленные демократы: в первый раз с цветами, во второй с гондонами. Наполненные водой гондоны олицетворяли любовь. «Занимайтесь любовью, а не войнами!». «Все, кто не боится! Ждем вас на Воздвиженке, у дома несуществующей дружбы народов!». Раздавали пиво — вероятно, для бесстрашия. Против свастики еще можно выходить с красной звездой, но делать это с презервативом — ход сомнительный; борцы с миграцией хорошо тогда погромили «всех, кто не боится». Волохову, пожалуй, одинаково отвратительны были свастика и презервативное шествие, но дальше — больше, действие равно противодействию, и на следующий год против свастик вышло уже вдвое больше народу. Еврею, конечно, еще можно было крикнуть — «Эй ты, жид! Поди сюда! Бабки давай!» — но желающих давать бабки не осталось, отзывались все реже, а если и подходили, то почему-то вдруг били первыми. Поначалу противники миграции, гордые потомки ариев, изумлялись, отчего жиды наглеют, — но к жидам вскоре подключились хачи, и белой расе стало вовсе не до смеху. Вот тогда-то и началось — сначала драки в центре, потом отпадения окраин, подключился Кавказ, и через месяц страна, сама того не чая, очутилась в состоянии войны.</p><p class="p1">Война эта принципиально отличалась от того, что устроили в оны смутны времена гражданин Минин и товарищ Пожарский. Впрочем, кому ж, как не альтернативщику, знать: о том, что они устроили, достоверно ничего не известно. Да и про Сусанина мы мало что знаем — особенно если учесть, как лепило варяжство своих героев: ничем не брезговало, отовсюду подбирало. Вспоминал же бывший диссидент, впоследствии главный борец с либерализмом Зиновьев: прыгали курсанты с парашютами в сорок четвертом году, один забоялся, облевался, обосрался, а будучи вытолкнут из самолета — умер от разрыва сердца. Когда покойник благополучно приземлился на автоматически раскрывшемся парашюте, его немедленно канонизировали и даже наградили посмертно: был бы труп, подвиг присочиним. Курсанты много тем тешились: русский народ — веселый народ, своя смерть ему забава, чужая — праздник. Минина и Пожарского засахарили до полной неузнаваемости: каждый год, да не по одному разу, демонстрировалась художественная картина о них, статуарная, позднесталинская, с грозной лающей музыкой, древнерусскими буквицами в титрах, с многословно-интеллигентным, коварным польским королем Жигимонтом подозрительно неарийского вида. Положительные сверкали глазами из-под гневно супящихся бровей: «Головы прозакладываем!». В прессу вовсю проникало слово «супостат». В детстве Волохову, увлекавшемуся тогда физикой, супостат представлялся прибором, регулирующим температуру супа, наподобие реостата, коим можно было умерять громкость; теперь мы на него бесперечь супились. Новая волна самоистребления началась сама собой, без верховного сигнала — ибо власть, что-то смекнув, давно уже не ставила задач: видно было, что призови ты хоть к разведению помидоров — завтра же начнется бойня, да картофельные бунты уже и описаны. Как из любой физической материи, включая табурет, умели в России изготовить самогон, — так и любой духовный материал с легкостью превращали в погром, и что ж мудреного, что один из дней единства и согласия дал начало побоищу? Признали его не сразу, говорили о массовых беспорядках, о том, что все под контролем, — но быстро прикинули возможные выгоды войны, списали на нее все за милую душу и объявили тотальную мобилизацию.</p><p class="p1">Как несложно было предположить, от мобилизации откупались кто во что горазд, и в первых рядах — противники нелегальной миграции. Погромить они очень были горазды, но служить в прославляемой ими же армии, где давно уже не полагалось и двух воскресных яиц, охотников не находилось. Поначалу, к чести власти, мели всех. Волохов давно ждал подобного исхода — особо после знакомства с Гуровым; в день объявления войны, случившийся аккурат после его тридцать третьего дня рождения, незадолго перед новым годом, он с Гуровым встретился на Поклонной горе. Место выбрали людное — шел патриотический митинг, можно было побалакать незаметно.</p><p class="p1">Гуров, впрочем, незаметен был везде — Волохов поклялся бы, что и в первую встречу, у давно уехавшей Иды не замечал его, пока Гуров сам не пожелал объявиться. О таинственных его делах Волохов понятия не имел: Гуров служил в Генштабе и постоянно ездил в командировки. Он инспектировал войска, проверял училища, интересовался непредсказуемыми вещами — то рыбными промыслами, то сталью, — имел знакомства в деловых и эзотерических кругах (а впрочем, все российские круги были перемешаны, и деловые мало отличались от эзотерических); с Волоховым они виделись редко — не в последнюю очередь потому, что первая приязнь сменилась некоторой взаимной подозрительностью. Волохов догадывался, что Гуров бережет его для тайного дела, на которое он, Волохов, еще, может, и не подпишется — тогда как для Гурова сама его принадлежность к коренному населению была залогом готовности на все. Волохов вообще не очень желал прислушиваться к голосу крови — апелляция к этому голосу равно отвращала его в варягах и хазарах, и почему надо было делать исключение для таинственного населения, к которому они с Гуровым принадлежали, — он не понимал. Что из того, что он помнит пароль «соколок» и питает равное отвращение к обоим поработителям? Волохов подозревал, что Гуров отвел ему роль в своем плане, а Гуров подозревал, что Волохов не желает больше играть какую-либо роль в чьих-либо планах, а злится потому, что собственных у него нет.</p><p class="p1">— Что, дождался? — в лоб спросил его Волохов.</p><p class="p1">Гуров кивнул. Он был спокоен, как всегда, но очечки его поблескивали победительно.</p><p class="p1">— Значит, все сделалось силою вещей?</p><p class="p1">— А то. Ты меня слушай, я зря не скажу.</p><p class="p1">— Перебьют, думаешь, друг друга?</p><p class="p1">— Непременно. Долго терпели, да теперь уж, видать, окончательно.</p><p class="p1">— И чем все кончится?</p><p class="p1">— А ничем. Полным ничем. Я давно говорил, что победы тут не будет — друг друга пожрут, да и сдохнут. Им поврозь помирать неудобно, а вместе, думаю, даже радостно. Сам не ам и никому не дам. Достойный венец двух бесполезных племен.</p><p class="p1">— Непохоже пока, чтобы друг друга. Похоже, что наша возьмет.</p><p class="p1">Гуров пожал плечами.</p><p class="p1">— Думай, как знаешь. И что это за «наша»? Когда ты уже перестанешь к варягам примазываться?</p><p class="p1">— Нравится мне так.</p><p class="p1">— Ты и в армию пойдешь?</p><p class="p1">— Почему нет. Призовут — пойду. Мой год пока не трогают, молодых гонят.</p><p class="p1">— Ну, давай. Варяг выискался. Убьют тебя, дурака, — с кем страну будем поднимать?</p><p class="p1">— Это когда ж ты ее поднимать вознамерился?</p><p class="p1">— Когда два ига друг друга схарчат, — весело сказал Гуров.</p><p class="p1">— И что, думаешь, будет кого поднимать?</p><p class="p1">— Обязательно, — сказал Гуров. — Откуда и возьмутся…</p><p class="p1">— Немного же ты с ними наподнимаешь, если они тысячу лет такое терпели.</p><p class="p1">— А они не терпели, — все так же ровно и весело ответил Гуров. — Они часа ждали.</p><p class="p1">— Ну да. Те ждали, эти ждали…</p><p class="p1">— А дождались мои, — кивнул Гуров. Он не говорил «наши», к коренному населению у него было интимное отношение.</p><p class="p1">— А не думал ты, Костя, — ехидно спросил Волохов, — что когда твои без захватчика останутся — они вовсе уж ничего не смогут?</p><p class="p1">— Дурак ты, Волохов, — беззлобно ответил представитель коренного населения. — Как есть дурак. Знаешь ты про реку Неглинку?</p><p class="p1">— Как не знать. В трубе течет.</p><p class="p1">— Вот рухнет со временем Москва, разлезется труба, — думаешь, Неглинка течь разучится? В землю уйдет? Нет, Волохов. Это Глинка их вонючая в землю всосется. А Неглинка — НАША река, — прибавил он со значением. — Священная река. Они, сволочи, в трубу ее заковали, а мы и терпим, верно? А почему, спроси? А потому, что реке ничего не сделается. Она выйдет на свободу и потечет себе, как прежде. Ты про Глинку слыхал?</p><p class="p1">— Как не слыхать. «Жизнь за царя».</p><p class="p1">— Дурак ты, ваше благородие. Глинка — та, от которой Глинские пошли. Была такая река, варяги крепко ее жаловали. Михал Иваныч ихний специально в ее честь назвался. Это и есть правильное название Москва-реки, его только истинное варяжство знает. Им, вишь ты, некрасиво казалось, что у них главная столичная река — Глинка. Но что от глины пошло, в глину и возвратится. А Неглинка останется, чуешь, историк?</p><p class="p1">— Чую, чую, — сказал Волохов. Спорить ему не хотелось. Он давно знал, что сделает в случае войны, но рассматривал эту возможность как гипотетическую, отдаленную. В истории часто бывает, что идет к одному, а случается другое — без этой божественной иррациональности не стоило бы и любить ее; только русская была чудовищно предсказуема и тем повергала в беспросветную тоску. На его глазах сама собой, из воздуха ткалась война; она нужна была всем, ею можно было оправдать любые заморозки, списать на нее все художества, она становилась окончательным оправданием нового диктата — и вот начиналась, на ровном месте, не во враждебном даже, а в безразлично-брезгливом мировом окружении. И война была, судя по всему, не на жизнь, а на смерть — окончательное решение русского вопроса.</p><p class="p1">Так думалось ему в первый год, и поначалу действительно как будто шли сражения, затевались масштабные операции, печатались сводки потерь — начались даже перебои с продуктами, как и положено на войне; только на второй год стало ясно, что продуктовые перебои существуют сами собой, а война потому и нужна, что надо их объяснять. Тут-то и выскочила иррациональная, Божья ирония: в стране, где все протухло и оскудело, мало что осталось и от войны. Открыли банку стратегической тушенки — а оттуда пахнуло духом, каким пахнет от ржавого гнилого ручья, вытекающего из щели летнего помойного бака: не война то была, а такое же издевательство над самой идеей войны, как поздние варяжские праздники в честь крылатого архистратилата. Варяги бесперечь расстреливали своих перед строем, хазары не знали, что делать с захваченной землей, — и обе стороны лихорадочно убегали от крупных столкновений: варяги разучились умирать за эту землю, а хазары усомнились в том, что она того стоит. Война длилась и длилась, но воевать давно уже было не за что: разойтись по домам казалось стыдно, да и нельзя было после всего жить рядом, — а уничтожить друг друга никому не хватало сил. Это не могло продолжаться дальше. Это должно было кончиться, совсем, бесповоротно, — чтобы начался новый человек на новой земле; и этого нового человека выращивал Волохов.</p></span></span></span></span></span>
