<span><span><span><span><span id="id49"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Жалобы в этот день были самые рутинные, и он слушал вполуха. Надо было утвердить несколько порок, и он утвердил порки. Это ввели недавно, в Москве сомневались, как он сможет, — он смог, не возразил, хотя недоброжелатели ожидали демарша. Он был не так глуп, чтобы подставляться по мелочам. Лучше он два раза в месяц выпорет явных тунеядцев и алкоголиков, нежели его сместят из-за идиотского конфликта и новый губернатор будет сечь уже всех поголовно. Он знал, такое бывало. Впрочем, секомые и так орали вовсю — но это входило в ритуал. Губернатор знал, что Никита или его подручный Артем наказывают скорее символически. Артем, Артемон. У Рякиных и Стрешиных тянулась бесконечная тяжба за дом. Перед губернатором на специально отведенном серебряном подносе выросла гора обтерханных справок. Места, где их выдавали, были непредсказуемы. Была даже квитанция из ломбарда — не пойми почему долженствовавшая доказать, что дом принадлежит Рякиным; губернатор давно отчаялся разобраться в этой коллизии, иррациональной, извилистой, приземистой, как все хитрости темных людей. У Рякиных вдобавок было страшное количество родни, состоявшей в запутанных имущественных отношениях друг с другом; младший Рякин женился на Стрешиной, отписал ей полдома и пропал без вести, но у Стрешиной осталось трое детей, которым требовалось все больше места, — обратно же и Рякиным требовалось больше, нежели полдома, а распоряжение свое младший Рякин сделал в помрачении ума, в котором находился все последнее время и от которого, собственно, пропал без вести. Человек в нормальном уме (Рякины говорили: в уму) нешто без вести пропадет? Пропадание без вести рисовалось губернатору чем-то вроде прижизненного перехода в иной мир, где все продолжается по непонятным и вовсе уж бесчеловечным законам: вот так зайдешь на Чайковского, 8, а там странные люди, чужие, и смотрят по-чужому, но ты уже вовлечен в их игры и живешь по их ужасным законам, где, допустим, нельзя открывать дверь правой рукой… и ни одной естественной человеческой реакции, никто не пожалеет, никто… как, должно быть, страшно безвыходными, туманными синими вечерами! Дальше, дальше от этой жизни; почему он должен выслушивать туземные жалобы, копаться в их справках, путаться в семейственных связях? «Вот квитанция от его пальта, он сдал пальту в ломбард, нешто в здравом уме под осень стал бы сдавать пальту?». И Стрешина, конечно, от него гуляла, дети не его, вот справка, у детей искривление носовой перегородки, у двух из трех, а у него нешто было когда искривление перегородки? Вся деревня любовалась, какой справный. И с этими справными справками они ездили в город из деревни через день, когда он принимал, и занимали очередь, и он выслушивал их сагу с самого начала, хотя иногда умудрялся запомнить, на чем прервал их в прошлый раз, и просил: вот с этого места, пожалуйста. С отравы, с зеленых соплей… с пятого такта…</p><p class="p1">— А и то поди пойми, от кого она прижила, — говорил представитель Рякиных, бабообразный, приземистый, беспрестанно прижимавший к груди пухлые ручки. — Пригуляла, не погнушалась. Никого не пропускала. А ён знал, ён все как есть знал.</p><p class="p1">— Тю! Ты что?! — визгливо негодовал представитель Стрешиных, такой же маленький, круглый, но с раскосыми бурятскими глазами, и пухлые ручонки он не прижимал груди, а хлопал себя ими по ляжкам. — Никогда она ни с кем не гуляла, она думать не думала про тако! Про тако как можно думать?! Полдома отписать, кому! Яму все говорили: кому ты отписывашь? А он говорил: то не ваши полдома, то мои.</p><p class="p1">— А что с того, что полдома? Кому толку, что полдома? У меня около Талдома тож было полдома, так там и солома едома…</p><p class="p1">— А что солома, так против лома нет приема.</p><p class="p1">— Около-то кокола, да Вукола-то сокола…</p><p class="p1">— А что у Вукола-то буркала, да кыркала-то экала…</p><p class="p1">В какой-то момент губернатор перестал понимать, что за действо перед ним разыгрывается. Тяжба Стрешиных и Рякиных постепенно перешла в песню и танец, коронный номер фольклорного коллектива: один бил себя по груди, второй по ляжкам, один подпрыгивал, второй приседал, и оба по-бабьи взвизгивали, тошно кружась. Наконец Рякин вынул платочек, а Стрешин стремительно переобулся в шитые сапожки, и они пошли друг на друга, выкрикивая странные слова. «Тьфу!» — «Тьфу!» — крикнули они друг на друга и вновь пошли кругами, и каждый кланялся губернатору и немного подшаркивал перед ним ножкою. Наконец, утомясь ходьбой, прыжками и взвизгами, оба одновременно низко поклонились и, отдуваясь, замерли.</p><p class="p1">— Народный танец «Тяжба»! — прохладным голосом ведущей консерваторского концерта объявила личная секретарша губернатора, появившись из-за портьеры. — Сказанного достаточно!</p><p class="p1">— Не понял, — осторожно улыбаясь, сказал губернатор. Он долго откладывал рассмотрение тяжбы, опасаясь, что придется принимать непопулярное решение, но настоящего туземного имущественного спора не видывал еще никогда. Он и не знал, что это заканчивается так забавно. — Спасибо, конечно, за танец, но чего вам нужно все-таки?</p><p class="p1">— Мне нужно? Тю! — воскликнул Стрешин (или Рякин) и ткнул Рякина (или Стрешина, в общем, того, который остался) в круглое плечо. — Это ему нужно!</p><p class="p1">— Да не мне, ему нужно!</p><p class="p1">— Не мне, ему!</p><p class="p1">— Да не мне, ему!</p><p class="p1">— Тю! Ничего не нужно.</p><p class="p1">— А что нужно? Ничего не нужно. Все есть.</p><p class="p1">— Вот ей-Богу, все есть!</p><p class="p1">— Как есть ей-Богу, все есть!</p><p class="p1">— Народный танец «Божба»! — прохладно и звучно объявила секретарша.</p><p class="p1">— Довольно, — властно сказал губернатор. — Я вас жалую и милую. Ты возьми этого, — он указал Рякину на Стрешина, — а ты этого, — и показал Стрешину на Рякина. — И оба пошли отсюда, живо.</p><p class="p1">— Спасибо, губернатор, — сказал один и поклонился.</p><p class="p1">— Ай, пасибо, бубернатор.</p><p class="p1">— Пасиб, гублинатор.</p><p class="p1">— Паси, блинатор…</p><p class="p1">И кланяясь, повизгивая, похлопывая себя по груди и ляжкам, просители удалились.</p><p class="p1">— Народный танец «Дружба»! — вслед им объявила секретарша.</p><p class="p1">— Что это было? — спросил губернатор.</p><p class="p1">— Это у них, Алексей Петрович, главное развлечение. Тяжба, народный ритуал. Иногда годами длится. Как добьются приема, так празднуют.</p><p class="p1">Губернатор работал в регионе второй год, но всех туземных обычаев не знал — не потому, что они были так уж сложны или многочисленны, а потому, что совершенно бессмысленны. Все туземные драки заканчивались примирениями, а жалобы друг на друга здесь подавали, кажется, только для того, чтобы лишний раз повидаться с начальством. К начальству относились с благоговением, словно само прикосновение к нему служило залогом процветания. Губернатор выслушал и разобрал жалобу Семеновны на местного врача, который не желал определять ее болезнь и вообще не уделял должного внимания, а главное, сообщила Семеновна, стыдясь, он на нее льстился, ластился. Семеновне было восемьдесят пять. Губернатор не понимал, почему он должен был выслушивать этот бред. В другое время Семеновна была бы даже забавна, но сегодня его скребло подозрение. Он еще не виделся с Ашей, с этими отлучками определенно пора было кончать. Дождь усиливался. Губернатор принял еще трех туземцев — двум задержали зарплату, у одного протекала крыша, все это было вне его компетенции, сами должны были, мерзавцы, латать крыши и выяснять отношения с работодателями, но без верховной власти ничего не решалось. Он встал и прошел к себе: с двенадцати до обеда полагалось работать с документами. Губернатор, как все государственные люди, отлично понимал, что никакого смысла в этой работе нет, но писать отчет о поиске новых нефтяных месторождений было, кроме него, некому. Правда, он не знал, кому нужны месторождения: страна и так захлебывалась нефтью, сделала стратегический запас на пятьсот лет, выучилась гнать из нефти масло, которое без устали рекламировали по телевизору, — но государственные люди не спрашивают о смысле. Они делают дело, и все тут. Дело, однако, не делалось. Он набрал ашин мобильный — она не отвечала. Черт-те что делалось в регионах с мобильной связью. Позвонил ей домой — лично распорядился провести телефон в их гнилой барак, — перепуганный отец пролепетал, что ушла еще вчера утром. Губернатор никогда не понимал, откуда в такой семье Аша: отец огромный, топорный, корявый, мать крошечная, забитая, с бесцветными волосами; один раз он даже заставил себя у них отобедать — все было невкусно, нечисто, Аше кусок в горло не лез от стыда… И все-таки — куда она делась? Он написал полстраницы доклада, дважды разложил пасьянс «Косынка» в самом жестком варианте — на деньги, по три карты, — оба раза не вышли даже тузы, что вовсе уж никуда не годилось. Посмотрел в окно: пожалуй, сад в резиденции был единственным ухоженным местом в городе. Губернатор лично заботился о гравиевых дорожках, выписывал дорогую рассаду, следил, чтобы не протухала в бассейне вода и чтобы вовремя вычерпывали оттуда листья, — ежели бы каждый из туземцев делал для своего дома и огорода половину того, что глава региона делал для собственного сада и кабинета, можно было бы жить. Но туземцы словно провалились в складку времени, в щель, в неразрешимый вопрос, над которым задумались раз навсегда: ничто не имело смысла. Их нельзя было заставить работать и даже сознавать свое положение. В провинции это было нагляднее, а в Москве, видимо, зрело подспудно. Как ни зализывали кадра в московских газетах, даже на праздничных, лощеных фотографиях с народных гуляний или презентаций в объектив непременно попадала примета распада вроде дохлой кошки. Государственный человек обязан был верить, что тайный ресурс власти огромен, — но государственный же человек обязан был знать истинное положение дел. Кроме Аши, в этой провинции вообще не было ничего, что стоило бы губернаторского внимания. Он посмотрел на себя в зеркало: залысины, да, и морщины, но неужели можно было предпочесть ему хоть кого-то в этой глуши? Она настолько не отсюда… Конечно, он был у нее не первым, — какой-то из дядьев или шурьев растлил ее, четырнадцатилетнюю, в бане; но ведь это не в счет, это ни при чем. Она ждала одного его, и то, что было между ними, нельзя было сыграть. Он уже знал, что не сразу, пусть ругая себя, пусть ненавидя себя за недоверие к ней и доверие к неизвестному мерзавцу, — но поедет на Чайковского, 8. В конце концов ее могли держать где-то в плену и теперь шантажировать судьбой главного государственного человека в регионе. Кавказцы пошаливали и тут, хотя диаспора была минимальна — китайцы не терпели конкуренции.</p></span><span id="id50"><div class="title5">
<p class="p">3</p>
</div><p class="p1">— Чайковского, восемь, — сказал он шоферу. Тот глянул вопросительно:</p><p class="p1">— А что там? Вроде не ездили…</p><p class="p1">— Дом аварийный, — неохотно пояснил губернатор. Шофер с фамильярностью прислуги, которой многое позволено, заворчал: вот, из-за каждого аварийного дома лично ездим черт-те куда… время позднее, другой бы давно почивал. Губернатор посматривал в окно. В городе сохранилось кое-что советское, а ничего нового не построилось; был дом культуры, был кинотеатр, впоследствии ярмарка, впоследствии опять кинотеатр и потом сразу ночлежка, как будто в кинотеатре так и крутили закольцованный ролик про жизнь дна, с современными технологиями, включая запах. Афиши в фойе еще висели, хотя и их постепенно скуривали на самокрутки. Странное дело: он выстроил для васек ночлежку, но васьки в ней ночевали неохотно и только в самые ледяные холода: в прочее время бродили по городу и спали где попало. Он пробовал распоряжаться насчет отлова — распоряжения на их счет ужесточались, — но и отлов ничего не давал: численность их не убывала. То ли выпускали, брезгуя возиться, то ли их место тотчас заполнялось новыми, словно для поддержания какой-никакой жизни города васек должно было в нем оставаться строго определенное количество.</p><p class="p1">В начале улицы Чайковского губернатор приказал остановиться. Дом восемь ничем не отличался от других — это был старый, двухэтажный купеческий особняк, каких полно в Сибири, явно конца позапрошлого века, уже с трещиной сверху донизу, давно не крашенный и не ремонтированный. Судя по забитым окнам, тут было пусто. Дверь, однако, оказалась не заперта. Шофер вызвался сопровождать — губернатор был неумолим: в случае, если все подтвердится, он не желал свидетелей своего позора. Что делать с Ашей, коль скоро… неважно, он все равно уже придумал. Он ее посадит, докажет антигосударственный умысел и посадит. Классическая месть государственного человека; все остальное недостаточно. Семьей она не дорожит, ссылать некуда — дальше Сибири не сошлют; но пусть она, разбаловавшись с ним на всем дорогом и готовом, окунется в иную среду и что-нибудь, возможно, поймет. Он просто забыл, что она туземка, а мягкость с туземным населением никого еще не доводила до добра — хоть в Британии, хоть в Алжире…</p><p class="p1">Он толкнул дверь. Света не было. Хорошо, в машине нашелся аварийный фонарь. Велев водителю оставаться в машине, губернатор вошел в помещение, пропахшее затхлостью и древесной гнилью. Прежде тут, верно, был обычный барак — но расселили ввиду аварийности (эк он предугадал! — а впрочем, половина домов в центре города выглядела еще и похуже). Внизу никого. Он прислушался. Что могло ее заставить ездить сюда, в пустой гнилой дом, к грязному туземцу? Только голос крови, самый страшный из голосов. Так Марокка у Мопассана, что ли, уходила от красавца француза к грязному бедуину. Дитя пустыни. Потом возвращалась тощая и потасканная. Думать о чем угодно, кроме того, что он может сейчас увидеть. Осматривался: пусто, туземцы редко бросают вещи. Ужас, какая им свойственна жадность, в сочетании с тупостью: полная деменция. Подбирают старые газетки, тряпочки, никогда не выбрасывают детские игрушки. Он попытался как-то спросить об этом Ашу, но она обиделась: «Жалко же!». Проще новое купить, сказал он; глупый, ответила она, не в том смысле жалко. Сама подбирала даже его записки, которые он шутя писал; нет, тут не скопидомство, тут странная сентиментальность, которой вроде неоткуда взяться в народе, лишенном интеллекта и воли. Все они словно раз навсегда загрустили и от грусти не были способны ни к какой осмысленной деятельности. Губернатор обошел первый этаж, пустые комнаты с выцветшими квадратами на стенах — фотографии, конечно, сняли и увезли, куда ж теперь делись эти жуткие вытаращенные крестьяне, смотрящие в объектив так, словно вот-вот вылетит птица Рух; на треснувших стеклах виднелись дождевые потоки. Никого. Розыгрыш, конечно, и ни единого звука. Он поднялся на второй этаж и зашел в пустую квартиру. Фонарем обшарил стены. Что-то было не то. Здесь явно был след чужого пребывания — не пустота нижнего этажа, где подобрана каждая щепочка, а остаток темной, жалкой, потаенной жизнедеятельности; снова с фонарем осмотрел пол — и точно, в углу валялась консервная банка с остатками еды. Почувствовал странную скованность в движениях: что это, боюсь я, что ли?</p><p class="p1">— Эй, кто здесь? — позвал он негромко. Ни звука. Половицы поскрипывали, когда он прошел в соседнюю комнату. Что-то пошевелилось сзади: даже не звук, а колебание воздуха насторожило его. Он стремительно развернулся. В коридоре, высоко подняв топор, стоял длинный бледный мужик с вытаращенными глазами.</p><p class="p1">Губернатор выронил фонарь, и мужик внезапно завыл — тонким, жалобным голосом, как старый волк. В ту же секунду губернатор выстрелил. Он редко выходил в город без оружия — мало ли, к тому же по военному времени носить с собою пистолет предписывал регламент. Вой оборвался. Губернатор стремительно нагнулся за фонарем, поднял, направил перед собой. Мужик сидел на корточках, по-прежнему держа над головой топор и упираясь спиной в стену. На лице его застыл тупой ужас.</p><p class="p1">— Ты кто? — резко спросил губернатор осипшим от напряжения голосом. Он явно промазал, да и не целился толком, — мужик не был ранен, он просто перепугался. По лестнице уже топотал шофер, услышавший выстрел.</p><p class="p1">— Кто тут?! — заорал он, распахивая дверь.</p><p class="p1">— Ничего, Васильич, я справлюсь, — сказал губернатор уже спокойнее. — Кто такой? Чего задумал?</p><p class="p1">Мужик промычал что-то невнятное.</p><p class="p1">— Ну! — шофер пнул его. Тот наконец выронил топор и опустил руки. Он был почти комичен — у стены, на корточках, с вытаращенными глазами; но губернатор понимал, что если бы не его бдительность да еще реакция, лежать бы ему сейчас на втором этаже аварийного дома с раскроенным черепом. Впрочем, в мужике с самого начала было что-то странное: хотел бы убить — убил бы. Передвигался он бесшумно, как настоящий васька, и пахло от него соответственно. Дело было в том, что пощадил он губернатора не по своей воле. Он хотел его убить — и почему-то не мог.</p><p class="p1">Отвечать, судя по всему, он не был способен тоже. Сидел, с мольбой глядя на губернатора, и выл непонятное.</p><p class="p1">— Да что ты воешь-то! — заорал шофер. — Сейчас как дознавателям тебя отдадим, живо все выложишь…</p><p class="p1">— Уезжай, — внятно выговорил наконец мужик. — Ее оставь и езжай. С ей без тебя разберутся. Ты человек не злой, на тебе греха нет. Уезжай, не будет ничего. А ее оставь, ей нельзя.</p><p class="p1">— Кого оставь? — строго переспросил губернатор. — Ты про кого говоришь?</p><p class="p1">— Все ты знаешь, про кого. Езжай, честно прошу. Нельзя тебе было с ней. Оставь, разберемся.</p><p class="p1">— Где она? — заорал губернатор.</p><p class="p1">— Не знаю, ищем, — промычал мужик. — А тебе нельзя, езжай. Хотел тебя положить, не могу. Правду наши говорили — не дано нам этого. Вишь, не тронул я тебя. Так езжай, будь человек, иначе всем погибель. Долыкать не долыкать, мамкать не плямкать, а обыкуло не разотолочишь.</p><p class="p1">— Вызови наряд, — спокойно сказал губернатор шоферу. — И Ашу в розыск.</p><p class="p1">Шофер вынул тяжелый мобильник и принялся вызывать милицию. В этот момент у губернатора в кармане запел его собственный телефон. Кроме кремлевских, номер знали только секретарша и Аша.</p><p class="p1">— Да! — крикнул он.</p><p class="p1">— Быстро приезжай домой, — сказала Аша. — Прямо в резиденцию. Ты цел?</p><p class="p1">— Да, все в порядке. Где ты была?!</p><p class="p1">— Приезжай, все расскажу. Только как можно быстрее. Пожалуйста, ладно?</p><p class="p1">— Еду. — Он перехватил взгляд шофера. Внизу уже ревела мигалка. По губернаторскому вызову милиция приезжала быстро.</p><p class="p1">— Пока я лично не допрошу, — не трогать, — бросил губернатор непомерно толстому сержанту. — Осмотрите место происшествия, проверьте, откуда топор… Там еще банка консервная… — Здесь всем приходилось объяснять их прямые обязанности.</p><p class="p1">— Уезжай! — закричал мужик. — Не я достану, другой достанет!</p><p class="p1">Сержант ударил его в печень, и мужик снова сполз по стене.</p><p class="p1">— Сильно не обрабатывайте, — предупредил губернатор. — Виктор, едем.</p><p class="p1">Водитель стремительно ссыпался по лестнице, губернатор шел следом, силясь унять дрожь в ногах. Трус боится до опасности, храбрец — после.</p><p class="p1">— Домой, — сказал губернатор. Шофер привычно ворчал насчет того, что добрые люди шагу не делают без охраны. Губернатор не вслушивался. Недавний ужас и чудесное спасение — все потускнело перед тем, что Аша жива и, кажется, в безопасности. Он еще раз набрал ее номер, желая проверить себя — вдруг померещился и звонок, и голос, бывает такое в минуты крайнего напряжения…</p><p class="p1">— Быстрей, — повторила она. — Пожалуйста, быстрей.</p></span></span></span></span></span>
