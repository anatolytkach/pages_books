<span><span><span id="id152"><div class="title5">
<p class="p">Глава шестнадцатая. Эпилог</p>
</div><span id="id153"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Высоко в горах над Махачкалой, в пещере, где губернатор Бороздин обустроил убогое ложе, туземка Аша рожала будущего антихриста.</p><p class="p1">Они с губернатором пришли в Махачкалу через горы, долгим кружным путем, и только здесь вздохнули свободно — здесь их не преследовал никто. Фотографии сюда не добрались, власти почти не было, город жил собственной жизнью, а эвакуированным было не до них. Они пропали бы без жилья, но Аша безошибочным чутьем нашла девушку, готовую им помочь. Девушка так ненавидела этот мир, что не возражала против его уничтожения. Сама она была не из коренных, а из того среднего слоя, который составлял большинство: то ли варяжские, то ли хазарские отпрыски, безнадежно утратившие память о корнях. Но ненависть ее была сильна, она ненавидела этот мир почти так же, как Аша. Аша не рассказывала ей, что собирается родить антихриста, и вообще не посвящала в свою историю. В этом не было необходимости. Довольно было того, что ее преследовали, согнали с места, мужа лишили работы и собирались арестовать — ни за что, просто за то, что в новое государство он не вписывался. Девушка была из числа эвакуированных, из самых бесправных, и готова была помогать таким же бесправным. До ноября Аша умудрялась прятаться, губернатор устроился на базар сторожем, и они уже думали, что благополучно родят. Аша ждала этого дня с радостным нетерпением. Она знала, как знает всякая волчица, что новорожденный зверь убьет ее первой, но за то, чтобы привести его в такой мир, не жалко было и умереть. Нельзя было умирать только до его рождения, а потом будь что будет.</p><p class="p1">Губернатор случайно увидел на базаре добравшиеся наконец до Махачкалы листовки. Хозяин, нанявший его, то ли не узнал его на портрете, — да и мудрено было узнать после полугода голода, — то ли не подал вида. Но то, что их продолжали искать, было серьезным знаком. Надо было уходить в горы — туда, где никто не достанет.</p><p class="p1">Последнюю неделю перед родами Аша жила в пещере. Девушка Маша ее сторожила, губернатор приносил еду. В горах было холодно, лежал снег, но Аша уже ничего не чувствовала. Всем ее существом владел ребенок, огромный и страшный. Она знала, какой это будет ребенок и что он принесет в мир, и ждала этого радостно и нетерпеливо, как ждут освобождения.</p><p class="p1">— А у тебя есть муж? — спросила она однажды у Маши. До этого они избегали разговоров о будущем.</p><p class="p1">— Он не муж, — сказала Маша. — Он воюет.</p><p class="p1">— За кого?</p><p class="p1">— За нас. Против ЖДов.</p><p class="p1">— За нас никто не воюет. А когда он придет?</p><p class="p1">— Не знаю. Когда война кончится.</p><p class="p1">— Война не кончится, — радостно сказала Аша. — Я рожу того, от кого придет конец миру.</p><p class="p1">— Ладно тебе, — сказала Маша. Она решила, что это обычный психоз, часто посещающий рожениц.</p><p class="p1">— Не маши руками, я знаю. Я должна тебя предупредить. Я умру первая, а ты его сохрани. С мужем моим останься и сохрани его. Он вырастит и убьет этот мир, и отомстит за всех нас.</p><p class="p1">Маша не стала слушать этот бред. Аша была глупая туземка, может быть, даже немного сумасшедшая. Правда, она как-то умела гипнотизировать торговок на рынке и добывала Маше всякую вкуснятину, и разговаривать с ней тоже было забавно — она без конца выдумывала странные сказки про коренное население, про райскую деревню, где есть все, и адскую деревню, где ничего нет. Наверное, она сошла с ума, когда ее мужа, крупного чиновника, выгнали с работы. Мало ли было уволенных чиновников, по телевизору каждый день говорили о новых раскрытых заговорах. Теперь безумие Аши становилось опасным — она могла что-нибудь над собой сделать или в самом деле умереть от страха. Маша должна была поговорить об этом с губернатором. Он в очередной раз пришел к ним тайными тропами, и Маша, улучив момент, отозвала его из пещеры.</p><p class="p1">— Вы знаете, что Аша боится родить антихриста? — спросила она.</p><p class="p1">— Нет, не боится, — твердо сказал Бороздин. — Она хочет родить антихриста.</p><p class="p1">— Но вы-то понимаете, что это бред?</p><p class="p1">— Из-за этого бреда нас выгнали отовсюду. Скорее всего, это именно так.</p><p class="p1">— Слушайте, Леша. Я понимаю, что вы пережили потрясение. Но надо же сохранять остатки здравомыслия. Никто и никогда не родит антихриста, это бред и безумие, и вы должны с ней поговорить.</p><p class="p1">— Я не буду ни о чем с ней говорить. Я хочу, чтобы она родила антихриста или как это у них называется. Я хочу, чтобы она родила нашего ребенка и чтобы наш ребенок уничтожил этот мир.</p><p class="p1">— Я сама охотно уничтожила бы этот мир, но не хочу, чтобы человек сознательно гробил себя. Она умрет, если будет думать так.</p><p class="p1">— Не знаю. Во всяком случае она этого хочет.</p><p class="p1">— Вы что, тоже этого хотите?</p><p class="p1">— Не знаю. Я знаю, что должно быть, как будет. Не мешайте ей.</p><p class="p1">— Ну вас к черту, — сказала Маша и больше не возвращалась к этому разговору.</p><p class="p1">Накануне ашиных родов ей приснился антихрист — красивый мальчик с зубами и волосами. Он ползал по пещере, где спала обессиленная родами Аша, и не понимал, что это его мать. Он понимал только, что перед ним лежит кусок чего-то съедобного, и набрасывался на нее, как голодный пес. Маша вскрикнула во сне. Она проснулась от собственного крика, слившегося с ашиным. Так это началось.</p><p class="p1">Это началось в полночь и продолжалось шесть часов, и Аша не умерла. Она лежала в беспамятстве, а губернатор и Маша смотрели на антихриста. Это был обычный красный ребенок, без зубов и волос, и похож он был на мать, и никаких признаков сверхчеловечности в нем не обнаруживалось.</p><p class="p1">Губернатор во время родов сидел в пещере, зажмурившись, заткнув уши и раскачиваясь взад-вперед. Он не мог слышать, как кричит Аша, и первого крика своего сына тоже не слышал. Маша сделала все сама, хоть и не имела не малейшего опыта в таких делах. Когда выхода нет, опыт приобретается сам собой.</p><p class="p1">— Это не антихрист, Леша, — сказала Маша, пошатываясь от слабости; губернатор едва успел подхватить ее. — Это обычный ребенок, сами теперь видите. И нечего было бегать.</p><p class="p1">— Не знаю, — сказал губернатор. — Что ж они, все с ума сошли?</p><p class="p1">— Да конечно, — сказала Маша. — Или вы. Они вас выгнали совсем не за это. Ну признайтесь, что вы сами все придумали, чтобы хоть как-то себе объяснить гонения.</p><p class="p1">— Я не сумасшедший, — жалобно сказал губернатор Бороздин. — Мне не надо ничего выдумывать. Я знаю, что меня отовсюду выгнали за Ашу, и в ее деревне ей сказали, чтобы она не смела там оставаться, и через всю Россию нас гнали сюда только из-за ребенка. Нас хотели убить, вы знаете? Просто федералы уже ни хрена не умеют, а коренное население не может убить волхва…</p><p class="p1">— Знаю, знаю. Она рассказывала. Все это глупости. Вот же перед вами обычный ребенок. И ему надо жить. И всем нам придется это делать, понимаете? Не будет никакого конца света. Слишком все было бы легко, если бы случился конец света. Я бы сама не против, но как-то пока не получается.</p><p class="p1">— Не знаю, — сказал губернатор. — Подождите, он вырастет, и тогда посмотрим.</p><p class="p1">— Посмотрим, — сказала Маша.</p><p class="p1">Что-то они упустили, думал губернатор. Чего-то они все не поняли. Он же в самом деле обычный, я вижу, я чувствую это. Значит, мир опять уцелел, хотя так явно, так наглядно двигался к концу. Может, они просто выбрали не ту пару? Может, и я никакого не древнего рода, и Аша никакая не волчица? Не может же быть, чтобы все зря.</p><p class="p1">Маша подошла к выходу из пещеры и некоторое время молча смотрела на белую долину и бурый город внизу. Рано или поздно в этот город предстояло спуститься и как-то жить дальше. Ребенок у нее на руках проснулся и запищал.</p></span><span id="id154"><div class="title5">
<p class="p">2</p>
</div><p class="p1">В это же самое время в один из холодных ясных дней, когда снега еще нет и потому все особенно невыносимо, капитан Громов в воинском эшелоне ехал на юг, где еще бродили, говорят, разрозненные группировки ЖД. Война явно исчерпывалась, но все не могла закончиться. Ясно было, что никаким перемирием такие войны не увенчиваются — все прекратится ходом вещей, самым отвратительным способом, медленным вымиранием, долгой болотистой деградацией. Деревни обезлюдели, поживиться в них было нечем, перемещения армий окончательно лишились смысла. Громов знал, что обязан доиграть комедию до конца. Честно говоря, ему самому было интересно, как именно все придет к концу, — но это тянулось несколько дольше, чем он предполагал.</p><p class="p1">Солдаты пели песни, играли в карты, дрались от скуки. В армии уже было голодно, снабжение к осени стало ни к черту. О Москве доходили смутные слухи, но она была где-то далеко и выглядела почти недостоверно. Полковник Здрок дезертировал, и следы его затерялись.</p><p class="p1">На небольшой станции, возле которой эшелон замедлил ход, словно боясь разбудить некие тайные силы, Громов почувствовал неодолимое желание сойти на платформу. Платформа была как платформа, самая обычная, только название ее было смутно ему знакомо. Кажется, инспектор Гуров — странный инспектор, погибший в его отсутствие, — отправляя Громова в отпуск, говорил что-то вроде «Ты у меня пойдешь в Жадруново». Но это, конечно, была поговорка, что-нибудь вроде Макара, гонявшего телят, или кудыкиной горы.</p><p class="p1">Между тем сила, толкавшая Громова на платформу, была поистине страшной. Это было что-то вроде тяги перевалиться за перила балкона на пятнадцатом этаже — тяги, знакомой ему с детства. Он ехал мимо черного безлиственного леса, окружавшего платформу, мимо черного поля, видневшегося вдали, и чувствовал страшное, нечеловечески сильное желание сойти с поезда, чтобы узнать наконец, как выглядит деревня Жадруново. Он никогда здесь не был, но ему казалось, что в этой деревне он получит ответ на некоторые вопросы.</p><p class="p1">Громов стоял в тамбуре, державшись за ледяной поручень. Он удержался бы и не спрыгнул, и поехал бы дальше на юг, воевать в бесконечной войне, но вдруг увидел на платформе девочку лет пятнадцати, очень худую, черноволосую, и сутулого старика, сидевшего прямо на асфальте. Что-то столь бесприютное, жалкое и беспомощное было в этой паре, что Громов не выдержал и спрыгнул прямо на перрон, оставив вещи в поезде и не особенно о них заботясь. Да и какие вещи у офицера.</p><p class="p1">Он приземлился удачно, да и поезд шел очень медленно. Машинист словно того и ждал — эшелон тут же набрал ход и исчез в осенней дали.</p><p class="p1">— Что вы тут делаете? — спросил Громов девочку. У нее было тонкое, нервное, изможденное лицо и худые красные руки.</p><p class="p1">— Понимаете, — сказала девочка, — мы шли, шли в Жадруново, теперь пришли, а Василий Иванович не хочет туда идти.</p><p class="p1">— Почему? — спросил Громов, ничего не поняв.</p><p class="p1">— Да ведь как пойдешь-то, — залопотал старик. — Ведь никто же не возвращался-то… Так хоть живешь, а что там будет — никто же не знает…</p><p class="p1">— Василий Иванович! — плачущим голосом сказала Анька. — Может, ты сумеешь там этого вашего Жаждь-бога уговорить… Может, он печку починит и яблоньку вернет…</p><p class="p1">— Ничего он не вернет, — сказал Василий Иванович. — Не могу я, Анечка. Пойдем отсюда.</p><p class="p1">— Столько времени добирались! — закричала Анька. — Чуть в милицию не попали столько раз! Пошли, Василий Иванович, не могу я больше просто так ходить. Надо же уже куда-нибудь прийти, честное слово!</p><p class="p1">— Не могу я, Анечка, — повторил Василий Иванович. — Силы нет.</p><p class="p1">— Стоп, — сказал Громов. — Давай по порядку. Как ты тут оказалась?</p><p class="p1">— Это васька, — сказала Анька. — Он у нас жил, мы его домой взяли. Потом их в Москве стали отлавливать, ему пришлось уйти. А я пошла с ним, чтобы он не пропал.</p><p class="p1">— Как? — не поверил Громов. — Бросила все и пошла?</p><p class="p1">— Ну а как? Он же один не может ничего. Ну и пошла. Пришли мы сначала в Алабино, а там говорят — идите в Дегунино. Пришли мы в Дегунино, а там печка сломалась и яблонька засохла. Пришли мы в Жадруново, а Василий Иванович не хочет туда идти.</p><p class="p1">— Так ведь нельзя, — заскулил Василий Иванович. — Никто из наших туда своей волей не пойдет…</p><p class="p1">— Не понял, — сказал Громов. — А зачем в Жадруново?</p><p class="p1">— Попросить Жаждь-бога, чтобы вернул печку, — сказала Анька. — А вообще, какая разница. Вы все равно не знаете, кто такой Жаждь-бог. Просто отсюда надо куда-нибудь идти, а дороги никакой нет, кроме как в Жадруново. Оттуда никто еще не приходил, ну так это, может быть, потому, что там прекрасно? Мы же не знаем ничего. Нельзя же все время кругами. Если уж пришли, то надо туда идти, правда?</p><p class="p1">— Конечно, надо, — сказал Громов. — Не бойтесь, я с вами пойду.</p><p class="p1">Васька взглянул на него с надеждой.</p><p class="p1">— Правда пойдете?</p><p class="p1">— Конечно, пойду, — сказал Громов. — Надо же как-то решить с печкой и яблонькой.</p><p class="p1">— Вот и идите, — сказал васька. — Вот и очень хорошо. А я в Дегунино.</p><p class="p1">— Как, Василий Иванович?! — не выдержала Анька. — Ты меня бросишь?!</p><p class="p1">— Ты же не одна теперь, Анечка, — залепетал васька. — С тобой вон товарищ офицер. Ну, вы и идите, а я не могу. Мне нельзя в Жадруново, Анечка. Мы никогда туда сами не ходим. Я своим ходом в Дегунино пойду. Может, печку починю. Может, яблоньку вылечу.</p><p class="p1">— Ну, иди, — упавшим голосом сказала Анька.</p><p class="p1">— А ты не грусти, — сказал Громов. — Тебя Аней зовут?</p><p class="p1">— Да, — кивнула она. — А тебя?</p><p class="p1">— Максим, — сказал Громов.</p><p class="p1">— Хорошее имя, — сказала Анька и заплакала.</p><p class="p1">— Не плачь, — Громов прижал ее к себе и стал гладить по грязным, растрепанным, мягким волосам. — Ничего страшного, Анька. А может, оно и к лучшему. Никогда же такого не было, а мы попробуем. Это интересный вообще вариант — такое сплошное милосердие, взяла и все бросила, и пошла спасать последних из последних. Это очень хорошо, Анька. Это можно попробовать. Долг и милосердие, если их скрестить, получаются удивительные вещи. Тут это никогда не получалось, а у нас, может быть, получится. Так что ты не бойся.</p><p class="p1">— Я не от страха, — повторяла Анька сквозь слезы. — Знаешь, как страшно ходить? Ходишь, ходишь, все гонят, ни приюта нет, ни помощи, помыться негде, и все вокруг воет, воет, словно вот-вот умрет и никак не соберется… Перед снегом такое бывает, знаешь? Как мне грустно было, Максим, как мне страшно было, Максим… Ходишь, ходишь… Они же все не могут ничего, а что я-то могу? Я только жалею… И нигде помощи ни от кого…</p><p class="p1">— Ладно, ладно, — повторял он. — Теперь все позади.</p><p class="p1">В это же самое время в Даниловском монастыре брат Мстислав, пребывавший в затворе, почувствовал вдруг, что может выйти за пределы монастыря.</p><p class="p1">— Брат Николай! — крикнул он. — Я, кажется, свободен!</p><p class="p1">— Очень интересно, — улыбнулся брат Николай. — Я с утра догадывался о чем-то подобном.</p><p class="p1">— Стало быть, нечто кончилось? — спросил брат Мстислав.</p><p class="p1">— А нечто началось, — ответил умудренный брат Николай.</p><p class="p1">— Кто же это сделал? Было две пары, и обе они сделать этого не могли. Одна была разлучена прежде времени, а другая не представляла большого интереса, ибо государственный чиновник был самого обычного рода, и ребенок его не мог ничего изменить в мире.</p><p class="p1">— Брат Мстислав, — сказал брат Николай. — Как не стыдно тебе верить в туземные сказки? Какая тебе разница, кто какого рода? Важно, что двое встретились и с этой встречи что-то начнется. Неважно, что она случайно оказалась полухазаркой, а у него есть часть туземной крови. В конце концов, не в этом дело. Не заставляй меня пересказывать тебе весь смысл этой путаной истории и довольствуйся тем, что стены нашего монастыря, благодарение Богу, трескаются.</p><p class="p1">— Значит ли это, — спросил подошедший к ним брат Андрей, — что весь тысячелетний опыт замкнутой истории был ошибкой?</p><p class="p1">— Он не был ею, — ответил брат Николай, светясь тихой радостью, — ибо чем дольше был затвор, тем с большею силой вырвется наружу копившаяся в бездействии история. Не знаю насчет нового неба, хотя и в нем я вижу определенные знамения, — но уж новую землю, братия, я вам обещаю.</p><p class="p1">Брат Мстислав вышел за ворота и радостно, как выздоравливающий после долгой болезни, пошел к пристани.</p><p class="p1">— Так я пойду, — сказал Василий Иванович.</p><p class="p1">— Ну, ступай, — сказала Анька, улыбаясь сквозь слезы. — Осторожнее.</p><p class="p1">И Василий Иванович пошел — сначала медленно, а потом все быстрее. Он шел по рельсам вспять от деревни Жадруново, и земля не противилась ему. Он шел, а чтобы идти было легче — пел песню, единственную, которую знал.</p><div class="poem">
<div class="stanza">
<p class="v">— Не одна в поле дороженька,</p>
<p class="v">Не одна неплакучая,</p>
<p class="v">Не одна в поле дороженька,</p>
<p class="v">Не одна негорючая,</p>
<p class="v">Не одна в поле дороженька,</p>
<p class="v">Не одна беспечальная,</p>
<p class="v">Не одна в поле дороженька,</p>
<p class="v">Не одна безначальная…</p>
</div>
</div><p class="p1">Анька и Громов стояли на платформе и слушали удаляющуюся песню. Потом она смолкла, и сразу смолк стон, который Анька слышала все последнее время. Напротив, из-за леса донеслись какие-то смутные, но веселые голоса, явно обещавшие что-то еще небывалое.</p><p class="p1">— Ну, пошли, что ли? — спросил Громов.</p><p class="p1">— Пошли! — весело сказала Анька.</p><p class="p1">И, взявшись за руки, они пошли в деревню Жадруново, где их ждало неизвестно что.</p><p class="p1"><em>2001–2006,</em></p><p class="p1"><em>Mountain View, Arc., — Москва.</em></p></span></span></span></span>
