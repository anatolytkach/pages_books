</div><p class="p1">Все было продумано, хоть, может, и бессознательно, на уровне инстинкта, заменяющего варягу мысль. Оно и понятно — сформулируй варяг вслух хоть десятую долю своих взглядов, назови по имени хоть один из фирменных приемчиков, и даже его варяжское сердце, заросшее шершавым волосом, вздрогнет от стыда. Мыслить словами варягу вообще несвойственно, людей слова он презирает, болтунов ненавидит, объясняя эту ненависть тем, что дело надо делать, мешки ворочать… Мешки тут, разумеется, ни при чем, ворочать их варяг не рвется и к любой работе питает презрительное отвращение воина. Он не любит слово именно потому, что слова предполагают нечто помимо инстинкта. Вся мораль укладывается в возможность перекинуться последним словом перед казнью, подмигнуть перед боем, пошутить на одре — то есть как-нибудь доказать свою не совсем звериную, а там, как знать, почему бы и не бессмертную природу. Но все эти проявления того, что так общо называется душой, варяжству были искони отвратительны: варяги без души любили своих и ненавидели чужих, потому что и паролем для опознания своих служило у них пустое, тесное, пыльное место там, где должна гнездиться душа.</p><p class="p1">И весь мир они хотели сделать таким же холодным, пыльным местом. И все людское — привязанность к родителям, верность друзьям, жалость к больным, — казалось им мерзостью, заслуживающей лишь преодоления, и потому они тащили к себе в союзники даже одного несчастного немца, много говорившего о преодолении человеческого; и это было похоже на то, как если бы водолаз брал в союзники канатаходца. Одни отказывались от человечности, проваливаясь глубже, в почву, к червям; другой рвался в горы, столь же безжизненные, как почва с ее слепой растительной волей, — но варягам по причине их врожденной тупости и немцу по причине его безумия было одинаково невдомек, что сверхчеловечность, если уж пользоваться их любимым дурацким словцом, — это всего лишь человечность, доведенная до высших ее проявлений: мать, не спящая пятую ночь над больным ребенком, старик, объездивший весь город, чтобы достать ему куклу… Но поскольку они не понимали этой нехитрой, в сущности, вещи, уползая в свои зловонные норы и на ледяные пики, — немец рехнулся, а у варягов никогда ничего не получалось, пока они не набрели наконец на страну, не сумевшую или не захотевшую им сопротивляться.</p><p class="p1">Конечно, казнить умели не только варяги. Многие народы любили изощренно мучить — своих и чужих, но и в этом был уродливый, страшный излом человеческого: душевная болезнь есть все же свидетельство о душе. У варягов ее не было настолько, что до утонченных издевательств они не снисходили. И для людей вроде рядового Воронова это было всего страшней: жертва, которую пытают, все-таки надеется, что она может что-то сказать или сделать, чтобы ее пощадили. Она до последнего верит, что мука ее не самоцельна (и иногда так оно и бывает). Воронов же чувствовал, что его просто не должно быть, что машина выбрала его, проверила на вкус (у машины есть вкусовые рецепторы), насадила на иглу и несет теперь к железному, воронкообразному рту, и как бы он себя ни вел — изменить эту участь не в его власти. Кается пища, извивается или, напротив, встречает участь мужественно и достойно — она все равно есть пища, и никаких оправданий у нее нет. Она, собственно, и не виновата. Злимся ли мы на хлеб?</p><p class="p1">Чтобы не полностью поддаться власти машины, хотя это ничего уже не меняло, — Воронов пытался думать о том, что было в нем человеческого. Больше всего он думал о доме — о том, что варягам было всего ненавистней. Дома у Воронова были мать и сестра, и еще оставался в Москве дядя с материнской стороны. Особенно страшна почему-то была мысль о том, что в это самое время, пока он сидит тут в сарае, а за дверью, охраняя его, без единой мысли о нем ходит рядовой Пахарев, — жизнь его семьи в Москве продолжается, что эти два мира существуют одновременно. Жизнь его московской семьи этим сосуществованием совершенно обесценивалась. Если Воронов сидит теперь здесь, а Пахарев его охраняет, — все московское не имело никакого смысла. И когда Воронова будут убивать (причем человек умирает не сразу, он, читал Воронов, умирает где-то девять минут, пока агонизирует мозг), — дома еще никто ничего не будут знать, и в это самое мгновение его будут ждать, и мать его ничего не почувствует, а если и почувствует, то не придаст значения. Она никогда не давала себе воли, иначе давно сошла бы с ума только от того, что Воронов где-то вне дома, в неизвестном месте, среди чужих людей. У нее был домашний мальчик, нежный, мечтательный, сострадавший даже газете, которую выбрасывали в мусоропровод. Дома всегда всех жалели и прикармливали, все дворовые собаки ждали, когда Воронов отправится в школу и обязательно чего-нибудь вынесет. Это делалось не нарочно, не ради самоуважения, а естественным порядком. Или мыши. Дома были плюшевые мыши, весьма потертые, многажды заштопанные, но их не выбрасывали — ведь жалко! Плюшевая вещь имеет душу — и, сам того не замечая, Воронов привык наделять душой неодушевленное; даже теперь он мысленно разговаривал с машиной, собирающейся его сожрать. Воронов не понимал, как может быть иначе. В его голове не укладывалось, как можно не пожалеть нищего или голодного, да всех жалко! — и потому ему трудно, мучительно было себе представить, что рядовой Пахарев, чапающий сейчас без устали слева направо и справа налево, думает не о вороновской печальной участи, а о том, как бы это ему поспать поскорей. Или пожрать. Или все же поспать? Когда жрешь, сначала меньше хочется спать, а потом больше. Когда поспишь, меньше хочется жрать. Мир был придуман для рядового Пахарева, а Воронова в нем не должно было быть, и тем, что он не сумел защитить себя, он как бы предал и мать, и сестру, и дядю с материнской стороны, ласкового врача, вечно возившегося с малолетними пациентами. Больничное начальство не раз указывало ему, что истинный врач-педагог обязан учить ребенка мужественно переносить боль и ни в коем случае не баловать обезболивающими (которые, между прочим, нужны на фронте — а вороновский дядя регулярно лазил в НЗ за анальгетиками, за что и лишился в конце концов работы, а частную практику давно запретили. Анальгетики предназначались генералитету, и дядя еще благодарил судьбу, что его не привлекли за диверсию). Он действительно не вписывался в образ варяжского врача, главной задачей которого было внушить пациенту стойкое отвращение к жизни: подробно описать, с какими унижениями будет сопряжена инвалидность, как трудно будет теперь обслужить себя, как ничего вкусного теперь нельзя — чтобы пациент тем верней и радостней устремился навстречу смерти. Смерть от болезни, конечно, совсем не то, что на поле боя, но машине годилась и больная пища. Воронов не знал одного — что будет делать машина, когда всех съест. Но ведь она ела не всех. Когда останутся такие, как рядовой Пахарев, — машина, вероятно, войдет в оптимальный режим существования и вообще перестанет жрать, а займется чем-то главным, — однако от одной мысли об этом главном вороновская душа отдергивалась и вообразить его не могла.</p><p class="p1">Особенно ужасно, конечно, было думать, что тебя убьют, а никто не почувствует. Мать будет по-прежнему проверять свои тетрадки или медленно, тяжело идти из магазина, где она накупила чего-то для посылки ему, — на эти посылки уходили теперь почти все ее заработки, — и даже не заметит, как Воронов перестанет быть. Эта одновременность своей смерти и чужого продолжающегося существования была непредставима. Ведь и сейчас, пока Воронов сидел в сарае, его мать ждала весточки о нем в Москве. Ни о чем другом Воронов не печалился — он уже понимал, что всю роту так или иначе ждет гибель, и его показания тут никакой роли не играют; понимал и то, что если его мать или дядьку захотят обвинить в связях с изменником Родины, — сделают и это, и не в его власти чему-либо помешать; о собственной участи он не думал в силу спасительного гипноза, опустившегося на его душу, — но мысль о том, что его мучают здесь, а одновременно продолжается другая жизнь, не давала ему покоя. Нельзя было представить, что его мучают, а мать не знает и не может помочь, что она будет продолжать жить, ничего не понимая, и что страшная весть достигнет ее не сразу; нельзя было умирать с сознанием, что мать еще некоторое время будет ждать его живого, — это казалось Воронову особенно изощренным мучительством, и он зарыдал бы, если бы мог. Но зарыдать он не мог — все в нем оцепенело.</p><p class="p1">В это время загремел засов, и Воронов почувствовал, что ведь не сможет встать, какой позор, столько готовился, даже попрыгал, проверяя способность стоять на ногах, а теперь не поднимется. В сарай, нагнувшись, вошел высокий, тучный капитан-иерей. Воронову этот капитан казался приличным, добрым, он любил поговорить с солдатами — Воронову и в голову не могло прийти, что некоторые иереи говорят с солдатами не потому, что любят солдат, а потому, что любят поговорить.</p><p class="p1">— Вольно, вольно, — ласково сказал Плоскорылов, расправляя мокрую рясу и суя Воронову руку для поцелуя. — Зашел для прощальной беседы. Ныне искупаеши, рядовой Воронов, вину свою и возвращаешься в ряды доблих воинов. Считаю приятным долгом напутствовать и дать несколько советов. А что это мы лежим? — Плоскорылов говорил с родительской лаской, чувствуя, что эта нежность возбуждает его дополнительно. — Что это мы не хотим встать при виде старшего по званию, тем более духовному? Или мы кашки мало кушали? Встаньте, встаньте, рядовой Воронов, и укрепитесь духом. Или когда вас будут расстреливать, — это слово Плоскорылов произнес особенно отчетливо, — вы тоже будете лежать? Перед вами будут стоять старшие по званию, а вы будете перед ними лежать, как принцесса какая-нибудь? Нет, дорогой Воронов, право лежать, как какая-нибудь принцесса, в присутствии старшего по званию покупается только смертью. Но пока этого не произошло, вы должны стоять, стоять. Возьмите себя в руки и встаньте, как истинный воин. Вот так.</p><p class="p1">Хочу вам заметить, — ласково журчал Плоскорылов, поглаживая Воронова по плечу, — что мысли многих слабых духом — к числу коих вы, несомненно, относитесь, — в последний миг обращаются вокруг того, как, собственно, все будет происходить. Я расскажу вам об этом в подробности, и вы сможете обратить свою мысль к спасению воинской чести. Вы будете выведены за околицу и установлены у края русского чистого поля. Чистое русское поле прекрасно на рассвете, и у вас будет возможность насладиться этим зрелищем. Чистое русское поле как бы скажет вам: я прощаю тебя, рядовой Воронов, и принимаю тебя в свое чистое русское лоно. Ради одного этого, рядовой Воронов, уже стоило родиться. Затем караульствующий над казнью произнесет непременную формулу — «Упраздняется раб Божий рядовой такой-то, в нашем случае Воронов, за отшествие от воинския добродетели и глаголание нечестивое». Я буду там, вы поцелуете мне руку в знак того, что прощены и готовы к искуплению. Я вас благословлю и сообразно законов воинской вежливости пожелаю доброго здоровья в такое прекрасное утро. Караульственный издаст команду «Целься». У вас будет возможность попросить прощения у рядовых, поднятых ранее подъема для вашего искупления. Караульственный издаст команду «Пли». После этого вы не сразу перестанете чувствовать себя, но испытаете как бы неприятность, легкое неудовольствие, возможно даже, упадок сил. Возможно, вы испытаете даже боль, рядовой Воронов, хотя расстреливание есть самый гуманный вид искупления. Но вы заслужили боль, рядовой Воронов, и должны понимать, что вас расстреливают не просто так. Не каждого расстреливают, хотя в принципе каждый достоин. У вас будет время задуматься о том, что это конец и что вот, собственно, все. Я вам желаю и должен открыть святые тайны, рядовой Воронов. Святых тайн числом две. Тайна номер один заключается в том, что все происходит на самом деле, в чем некоторые сомневаются. Тайна номер два, она же главная, заключается в том, что истинная цель всякого истинного воина заключается в том, чтобы погибнуть, и путь воина есть путь гибели, а потому, рядовой Воронов, ваше главное предназначение исполнено. Генеральною целью русского офицерства и всего русского воинства является истребление русского солдатства и оставление достойнейших. Полагаю, вы не догадывались об этом, но поскольку вы все равно никому уже не расскажете, то можете теперь знать святые тайны.</p><p class="p1">Воронов ничего не понял.</p><p class="p1">— Вы, кажется, недослышите, рядовой Воинов? Я повторю вам громко и раздельно: поняли ли вы святые тайны? Прониклись ли вы их дивным благоуханием?</p><p class="p1">— Благоуханием, — повторил Воронов. Ему казалось, что повторение и есть утвердительный ответ.</p><p class="p1">— Но вы прониклись? — настойчиво переспрашивал Плоскорылов. — Мой долг сделать так, чтобы вы прониклись, и если вы не готовы, я могу потратить с вами сколько угодно своего времени. Я готов, у нас до утра еще полно. Поняли ли вы, как величественна роль русского воинства? Осознали ли вы, что завтра не только искупаете свою вину, но совершаете высшее свое предназначение? У армии нашей нет никакой иной цели, как только перевод солдата в совершенное состояние. Мы не воюем с внешним врагом, внешний враг сам в ужасе убегает и рассеивается, убоясь нашей храбрости. Подобно Муцию Сцевольскому, воинским своим духом потрясаем воображение и доблестию усобачиваем врага вплоть до полного раскорячивания. Никто не должен просто жить, понятно вам сие, рядовой Воронов? Жизнь есть мерзостное существование, которое должно быть преодолено. Ни секунды комфорта подлому телу с его низменными запросами, ни секунды напрасного лежания просто так! Солдат должен быть всегда занят, а всегда занят только мертвый солдат. Я поздравляю вас, рядовой Воронов, с тем, что завтра на рассвете вы станете идеальным солдатом!</p><p class="p1">Воронов тупо молчал.</p><p class="p1">— О чем вы думаете, рядовой Воронов? — вкрадчиво спросил капитан-иерей.</p><p class="p1">— Я думаю, товарищ капитан-иерей, — ответил Воронов так тихо, что за шумом дождя, шелестевшего по крыше сарая, Плоскорылов с трудом разбирал его слова, — я думаю, что вот я жил и ничего не сделал, и никому не мешал. И вдруг пришли вы и остальные ваши, и я уже должен где-то служить, а потом почему-то умирать. Я у вас ничего не брал, а теперь кругом вам должен. И этого я не понимаю, товарищ капитан-иерей.</p><p class="p1">— Вас мало расстрелять, рядовой Воронов! — воскликнул Плоскорылов, чувствуя, как все больше напрягается и горячеет там, в паху, где ху. — Вас мало расстрелять! Вы и после этого ничего не поймете! Вы полагаете, ваша жалкая жизнь имеет какую-то ценность? Ценны вы будете, только когда умрете, рядовой Воронов! Пока вы существуете, вы только жрете и в рифму, а когда перестанете существовать — из вас можно будет сделать человека! Цель каждого истинного воина есть смерть, она же начало истинной жизни, а сейчас вы еще никто, личинка! В мир смерти из вас вылетит прекрасная бабочка и полетит на ледяные цветы Валгаллы.</p><p class="p1">— Я не хочу на ледяные цветы, — тупо повторил Воронов. — Я не понимаю, почему вы должны решать, жить мне или нет.</p><p class="p1">— О, расслабленная южанами кровь, сгнившая раса! — воскликнул Плоскорылов, поднимая пухлые руки к сарайной крыше. — О разложение! Неужели вы думаете, что ваша жизнь самоценна? Ваша жизнь нужна только для того, чтобы ее скосил ледяной серп, и ничего лучшего с человеком случиться не может! Вы размножаться, может быть, хотите, рядовой Воронов? Вы и так уже настолько размножились, что страна не может вас прокормить! Вы должны не размножаться, а сокращаться до количества, потребного в свете высших нужд! И когда указанное сокращение произойдет, мы сможем приступить к великой арийской мистерии! Вы потомок ариев, рядовой Воронов, или кто?</p><p class="p1">— Я не знаю про ариев, — упрямо сказал Воронов. — Я потомок своих родителей, вот что я знаю. И я не знаю, почему я все время должен умирать.</p><p class="p1">— Потому что начальству виднее, что вы должны! — закричал Плоскорылов. Воронов вел себя неправильно, он обламывал кайф. Он должен был ползать, слюнявить ему руку или даже сапоги, как некогда Калинин. Он должен был бояться, и тогда Плоскорылов почувствовал бы то, что так любил и чего так стыдился. Когда рукой, это было совсем другое. Да и мало было мест, где уединиться. А вот когда соборуемые целовали руку, это было так, как надо: с дрожью в спине, и даже словно легче становилось дышать. Плоскорылов иногда боролся с мучительным соблазном дать им для поцелуя не руку, скажем, а — нет, нет, никогда. Хотя рассказать, конечно, никому уже не успеют. Воронов был совсем не похож на правильную жертву, он не годился даже на это, и руку целовал без чувства. Плоскорылов вышел под дождь, хлопнув дверью сарая, и Пахарев закрыл засов. Слышно было даже сквозь дождь, как звонко Пахарев чмокает капитан-иерейскую руку.</p><p class="p1">Воронов остался один и почему-то вспомнил, что пряности у них в доме хранились в коробке из-под его детских ботинок. Он вспомнил кухню, вспомнил, как в теплом квадратном пространстве, под апельсиновым плафоном, среди холода и мрака ноябрьской ночи ждет возвращения матери с работы — она преподавала еще и во вторую смену, потому что надо было без отца тянуть их с сестрой. В ноябре ночь начиналась в пять, а в шесть делалась непроглядной. Сестры не было дома, гуляла с кавалером. Запотевало окно, по нему бежали слезы. Ключ врезается в замок, входит мать, мир обретает осмысленность. Все это было сном, и уже тогда будущий рядовой Воронов догадывался, что это сон. То, что происходит на самом деле, то, о чем говорилось в святой тайне номер один, — было дождем, сараем и рядовым Пахаревым, ходящим взад-вперед за дверью с единственной мыслью поспать или пожрать. И девятилетний Воронов, сидя в кухне и дожидаясь матери, догадывался об этой правде, от которой его лишь до времени защищала светлая коробка кухни, не более надежная, чем коробка от ботинок, набитая пряностями и переписанными от руки домашними рецептами. В их доме рецепты передавались по наследству, их накопилось очень много, и никому они не были нужны, потому что все это отвлекало от смерти — главной задачи истинного жителя их страны. Воронов догадывался и об этом, но умирать с этой мыслью ему не нравилось. Надо было найти какое-нибудь возражение, потому что коробка с пряностями и рецептами имела большее право на существование, чем сарай, засов, дождь, Пахарев и Плоскорылов. Мысль заключалась в том, что жизнеспособное не обязательно хорошо, это надо как-то продумать, но продумать он не успел, потому что засов загремел опять. Быстро прошла ночь, подумал Воронов, но она совсем не прошла.</p><p class="p1">В сарай вошел незнакомый лысый человек в круглых очках. Знаков различия Воронов в темноте не видел.</p><p class="p1">— Чего, смерти ждешь? — спросил незнакомец. — Рано, рано. Есть у нас еще дома дела. На, выпей. — Он протянул Воронову фляжку. — Не бойся, не бойся, не яд. Мы не можем разбрасываться людьми, рядовой Воронов. Надеюсь, пережитое послужило для вас хорошим уроком. Слушайте меня внимательно, около-кокола!</p><p class="p1">В этот момент Воронов узнал этого человека и понял, что сошел с ума. В сарай мог войти кто угодно, только не психолог, который в шестом классе московской средней школы семь лет назад тестировал их всех по поручению Министерства образования. Тест был профориентационный, несложный — нарисовать без помощи циркуля кружок, решить уравнение второй степени и отгадать загадку. «Ехали охали, ухали хахали, бухали бахари, бахали бухари, — кто вышел?»</p><p class="p1">— Около-коколо, — уверенно сказал тогда очкастому инспектору шестиклассник Воронов. Почему-то он один на весь класс отгадал эту загадку, вычитанную, что ли, в детской книжке, — он сам не помнил, откуда ее знал, и уж подавно не понимал смысла. Еще один мальчик из параллельного тоже знал ответ — и тоже не помнил откуда, но он скоро начал пить, и его отчислили. Воронов ничего о нем больше не слышал, да и инспектора не видал. Но внешность запомнил — не каждый день задают такие загадки.</p></span></span></span></span></span>
