<span><span><span><span id="id73"><div class="title5">
<p class="p">1</p>
</div><p class="p1">— А деревня та большая-большая. В середине ее столб, на столбе лик прибит, кто на тот лик посмотрит — там и останется. И вокруг все столбы, столбы. Это те, кто взглянул на лик, да так и остолбенел.</p><p class="p1">По краям ее тучи ходят, низко стоят, никогда в ней света не видано. Земля там вся плоская, далеко видать, лес видать и поле, а не дойти. За лесом станция. Со станции в деревню десять минут ходу, а из деревни до станции и за год не дойти. Нету выхода из деревни, и никто еще не возвращался.</p><p class="p1">Избы высокие, просторные, а все черные. Люди в них живут голые, им одежда без надобности. В любой холод голые ходят, сами тоже черные. Попадет туда живой человек, спросит, сколько времени, а никто ему не скажет, потому что с живыми они не разговаривают.</p><p class="p1">«Часов нет, — подумал Громов, — вот и не скажут. — Надо было прибить вместо лика часы. Никто бы не столбенел, и все бы время знали».</p><p class="p1">— А почему они не разговаривают? — спросил ребенок.</p><p class="p1">— Не понимают по-живому, — вздохнула мать и продолжила описывать деревню, куда проводник сдаст ребенка, если он немедленно не заснет. Все проводники, если верить ей, обходили поезд и проверяли, кто спит, кто не спит. Если ребенок в неположенный час бодрствует, проводник его берет и сдает в Жадруново. Почему Жадруново? Громов знал, что такая деревня есть, и даже шли вокруг нее смутные боевые действия в первые месяцы войны, но потом о ней перестали сообщать — видимо, федералы были там неуспешны. Именно туда пообещал закатать его Гуров, если он не доедет до Копосова. Темная деревня представилась ему чем-то вроде огромной гауптвахты, где вместо лика был Здрок, перед которым все замирали; на эту гауптвахту проводники, разводящие, водопроводчики и другие профессионалы с корнем «вод» собирали солдат, которые, вместо того чтобы бодрствовать, спали на посту. Всех их сдавали в Жадруново, и все они там замирали столбами в том же состоянии полусна-полуяви, в котором и сам он вторые сутки тащился в поезде, спотычливом и вялом; Воронов бесшумно, не всхрапывая, спал на нижней полке древнего плацкартного вагона, куда они пересели пять часов назад из такой же вялой дегунинской электрички. В соседней плацкарте долго голосила сумасшедшая старуха, раскрывала розовый, беззубый, кошачий рот, мявчила чего-то; ее вез с чьих-то похорон, непременно требовавших присутствия прародительницы, толстый лысый сын, все умолявший мать успокоиться, а потом пристукнувший на нее кулаком; еще через стенку орал младенец, так они вдвоем голосили, старый да малый, в бледном полусвете июльского вечера. Электричества в вагоне не зажигали. «Цыцю, цыцю ему дайте!» — прикрикнул толстый сын прародительницы на соседку с младенцем; та огрызнулась, что младенец только что ел и кричит не от голода. Только заснул младенец и успокоилась старуха — проснулся мальчик лет шести напротив Громова и принялся трясти мать, повторяя, что ему страшно; мать не нашла ничего лучшего, как рассказать ему сказку, которой перепугался бы и более уравновешенный дошкольник. Она уныло, монотонно описывала ему деревню Жадруново, куда он немедленно попадет, если вот сейчас не заткнется; деревня Жадруново, по легенде, располагалась где-то на юге, на Волге, за Казанью, и сведения о ней были очень сомнительные, потому что оттуда никто не вернулся; откуда же знали, что там? Может, звонил кто, или писал… здравствуйте, дорогие родители, во первых строках моего письма хочу сообщить вам, что нахожусь в деревне Жадруново Казанской области, куда забрел сдуру и выбрести теперь не могу. Умоляю прислать что-либо, поскольку еды здесь тоже нет никакой, коровы доются черным молоком, а на всех окнах желтые занавески. После третьего обращения «Который час?» они срываются с этих, о Господи, забыл, как это называется, с этих, короче, штук, вот же как выбили из меня все приметы штатской жизни, о, вспомнил, карнизы, и душат задавшего несвоевременный вопрос. Несвоевременным его следует признать потому, что времени в деревне Жадруново нет, как нет и ничего другого. Там исчезает все, включая посылки. Шли скорей посылки, сало, масло шли, зашипит старуха — в рот ее еби. Отечественный фольклор, переписка внука-зэка с дедом-крестьянином. Дед-крестьянин явно был из Жадрунова — он решительно отказывает внуку в сале, масле, да и старуху, вероятно, ебать не стал, перетопчется. Если бы он жил в Дегунине, он бы точно собрал посылку, огромную, со сливками, ее не приняли бы на почте… В Дегунине живут добрые белые бабы, а в Жадрунове — странные черные люди, вероятно, негры, потомки Пушкина, и все сведения о деревне исходят именно от них: призывают же их в армию, или ездят же они куда-то за солью… Откуда ты, хлопец? — спрашивают его. — Я из Жадрунова. О как! И тут же все столбенеют, решительно все, потом на эти столбы натягивают провода и прокладывают железную дорогу, чтобы хоть на что-нибудь сгодились. До чего я ненавижу эти провода и поезда, и это население, ни на что не способное ни в мирное, ни в военное время. Стоят остолбеневшие люди, а мимо них тянется поезд с такими же столбами. Столб маменька-прародительница все время орет кошачьим ртом. Дайте мамыньке цыцю! Мамыньке дают цыцю, и она затыкается. Когда же все это кончится, ведь мы давно должны были приехать. В эту секунду они приехали.</p><p class="p1">Поезд дернулся, заскрежетал и остановился. Это была не первая остановка, и Громов не ждал от нее ничего особенного, — то полустанки, то просто замрем среди ровного поля не пойми почему, отдыхаем, переводим дух, плетемся далее… но вскоре в окно, совсем рядом с его головой, решительно постучали. По вагону побежала перепуганная проводница.</p><p class="p1">— Батюшки, партизаны, — причитала она, — партизаны напали! Мальчики, не погубите, мы за вас! Ей, пуэбло унидо хамас сера венсидо!</p><p class="p1">Молодой человек в ватнике с оранжевой повязкой на рукаве прошел по вагону, оповещая пассажиров:</p><p class="p1">— Господа и товарищи! Рельсы взорваны молодежной боевой организацией «Революционная альтернатива». Можете оставаться на местах, но предупреждаю вас, что это бессмысленно. Поезд дальше не пойдет, просьба освободить вагоны. Просьба не оставлять в вагонах свои вещи. Боевая организация «Альтернатива» действует бескорыстно. Ваше барахло нас не интересует, — чувствовалось, что партизан любит поговорить. — Наша единственная задача — разрыв коммуникации и прекращение бессмысленной бойни. Так всем и передайте, если спросят. А спросят, кто взорвал, — передайте привет лично от бойца Петра Каланчева, по кличке Каланча…</p><p class="p1">— Каланча! — неожиданно крикнул с нижней полки рядовой Воронов.</p><p class="p1">— Ктой-то? — дурашливо отозвался Каланчев.</p><p class="p1">— Это я, Воронов.</p><p class="p1">— Господи! Ворона! Ты откуда? Ты же на фронте, Ворона!</p><p class="p1">— Да я в Копосово тут… по заданию еду, — уклончиво отвечал Воронов.</p><p class="p1">Громов понял, что роли поменялись и что теперь он у Воронова в руках. Сейчас рядовой сдаст его партизанам, которые вряд ли благоволят к офицерству, тем более федеральному, — и прощай, моя блондинка. Воронов, однако, никого сдавать не собирался.</p><p class="p1">— Товарищ капитан, — зашептал он доверительно, — разрешите обратиться!</p><p class="p1">В него настолько вбили воинскую вежливость, а Громов еще и добавил, что теперь, в экстремальных обстоятельствах, он не мог слова сказать в простоте.</p><p class="p1">— Обращайтесь, — кисло сказал Громов.</p><p class="p1">— Это мои товарищи, я сам когда-то был в «Альтернативе», — шептал Воронов. — Знаете, еще когда они просто… ну, в армию не шли и все такое… Это уж потом я узнал, что они поезда под откос пускают. А тогда ничего такого, поэтому я с ними и был. Они нормальные ребята, товарищ капитан. Никому ничего не сделают. Может, еще до Копосова добросят… нам же срочно, да? Я договорюсь, да?</p><p class="p1">— Договаривайтесь, — пожал плечами Громов. В этой ситуации от Воронова могла быть хоть какая-то польза.</p><p class="p1">На все купе голосила проснувшаяся мамынька. Боец Петр Каланчев по прозвищу Каланча, хилый и малорослый, проталкивался к Воронову.</p><p class="p1">— Ты с кем тут? — спросил он, потискав друга в суровых подростковых объятиях.</p><p class="p1">— Это капитан Громов, следует в отпуск, в Москву, — сказал Воронов. — Лучший у нас офицер, очень солдат бережет.</p><p class="p1">— Вы, Воронов, погодите мне характеристики давать, это вам пока не по чину, — брезгливо сказал Громов. — Здравствуйте, Каланчев. Я хочу говорить с командиром вашего отряда.</p><p class="p1">— Мало ли чего вы хотите, — засмеялся Каланчев. — Тут не вы командуете.</p><p class="p1">— Каланча! — укоризненно прошипел Воронов. — Он приличный человек. Чего ты, в самом деле…</p><p class="p1">— У тебя все приличные, — сказал Каланчев, не отводя глаз от Громова. Громов хорошо видел, что Каланчев — зеленый пацан и что на дне его глаз плещется страх. Надо было не сбавлять тона, и пацан поплывет. — Вы, капитан, в отпуск, значит, следуете?</p><p class="p1">— Я вам отчитываться не буду, — спокойно сказал Громов. — А вот с командиром вашим мне есть о чем переговорить.</p><p class="p1">— Ну, положим, я командир, — нагло заявил Каланчев.</p><p class="p1">— Что положим, так это точно, — заметил Громов. — На такого командира только положить. Вы зачем взорвали дорогу, Каланчев?</p><p class="p1">С ним не стоило особенно церемониться. Это был революционер, интеллигент, мальчишка, вчерашний студент, начитавшийся прокламаций, неудачливый в любви, покупавший успех у девчонок экстремальными акциями, и ему было решительно все равно — раскидывать листовки, швыряться помидорами, давить апельсины или в военное время взрывать дороги. Обычно от этой публики не бывало ни вреда, ни пользы, но в военное время они занимались прямым саботажем. Громов слышал о каких-то партизанах, но считал их частью федеральной мифологии — где-то по чьему-то раздолбайству пошел под откос или попросту был украден поезд со жратвой или боеприпасами, вот и свалили на партизан, как валили на них все во всех войнах. Громов знал цену партизанскому движению — плохо организованное, хаотичное, трусливое, оно годилось для демонстративных акций, никак не для систематической черной работы, которая и есть война. Оказалось, однако, что партизаны существовали, черт бы их побрал совсем. Вот куда делись сопляки из антивоенных демонстраций, доморощенные леваки из числа золотой молодежи, элита Садового Кольца, вечно играющая в шестьдесят восьмой год. «Партизанские повести», мать их. Вечно-то здесь не может кончиться гражданская война.</p><p class="p1">— Ну ладно, — с угрозой проговорил Каланчев. — К командиру хотите? Будет вам сейчас командир. Эй, Ворона! Этот федерал тебя обижал? В наряды ставил?</p><p class="p1">— Кончай, Каланча! — почему-то вполголоса проговорил Воронов. — Ну чего ты, в самом деле… Говорят тебе — он нормальный человек…</p><p class="p1">— А то у нас быстро, — сказал Каланчев. — Ну чего, если вы все еще хотите к командиру, то марш-марш. Он сейчас машинисту справку выдает, что машинист не виноват. У вас же, сами знаете, строго теперь. По законам военного времени.</p><p class="p1">Они вышли из вагона. Было темно, пахло гарью, росой и тринитротолуолом. Далеко впереди насыпь была разворочена взрывом. Около паровоза стоял рослый малый, тоже в ватнике, но без шутовской повязки, и втолковывал что-то машинисту. Пищала птичка. Прочие партизаны покуривали поодаль. Пассажиры предполагали пойти пешком. «Пиздец!» — подумал положительный персонаж, представив последствия. Потом плюнул. «Пошли», — приказал потешный партизан, показывая перстом прямо.</p></span></span></span></span>
