<span><span><span><span><span id="id58"><div class="title5">
<p class="p">1</p>
</div><p class="p1">— Черт-те что, — повторил губернатор, совершенно успокоившись. Сходить с ума было положительно не из-за чего. Тревожило его по-настоящему только одно — да и то не тревожило, а так, вечный червячок внутри посасывал: во всяком триллере страшно не тогда, когда убивают, — это бы полбеды, жанр такой, — но когда убивают неумело. Страшно не просто получить письмо, написанное кровью, — но письмо детским почерком, с грамматическими ошибками. Во всей этой истории его пугала именно детскость, неуклюжесть попыток: его бездоказательно уверяли в ашиной неверности, его караулил с топором мужик, не умеющий нанести удара даже и в благоприятнейшей обстановке, когда враг явился без охраны и без спутника; в его окно метнули булыжник, как только там загорелся свет и обозначились силуэты, — но ясно же, что булыжником никого не убьешь… Он сумел вызвать в местном населении, которое сроду ничего не делало, кроме тупой сельхоз-работы, — не просто ненависть, а желание его убить, убрать; чтобы эта публика дошла до такого намерения — надо было в самом деле привести в действие серьезные силы. Это он понимал. Он не понимал только, почему дурацкая легенда о конце времен так живуча именно в сознании этого несчастного народа, — да, его область и так считалась обособленной, далекой от цивилизации, глухой даже по сибирским меркам, но как-никак двадцать первый век, второе его десятилетие… нельзя же, чтобы деградация после совка дошла до забвения школьных прописей! Победили коммунизм, спасибо, — все для того, чтобы очнулись древнейшие, забытые, тупые верования! Впрочем, если верили в Кашпировского и Белое братство, последнее он застал первокурсником, — почему не верить, что от их с Ашей брака родится антихрист? Вполне в русле здешних легенд. Вот, значит, как закончится равновесное качание двух богов. Не вечно бегать по кругу здешней истории. Придет человек из старого северного рода, встретит девушку-волка из другого старого рода, они познают друг друга, она понесет от него, — и тот, кто от них родится, положит конец обоим захватчикам, да и самому коренному населению. А потому никак нельзя, чтобы он рождался. Пока они были вместе, туземцы терпели, да большинство из них ничего и не знало; но стоило Аше поехать к бабушке и признаться в беременности (туземцы говорили — «в тягости», беременем у них называлась грибная корзина), как волки забеспокоились. Тут же прознали — откуда только, по какому телеграфу?! — что варяг того самого, северного рода.</p><p class="p1">— Почему ты не говорил мне? — спросила Аша с жалобным укором, действовавшим на него особенно неотразимо; он тут же чувствовал себя виноватым за все ее бывшие и будущие беды.</p><p class="p1">— Чего не говорил?!</p><p class="p1">— Что ты рюрикова корня.</p><p class="p1">— Господи, Аша! Откуда мне было знать, что это имеет значение! Я Кононов по отцу, никогда не носил этой фамилии, всю жизнь писался Бороздиным. Это фамилия отчима, мать вышла замуж, когда мне был год. Кононов никогда и не жил с нами, я понятия не имею, кто он такой…</p><p class="p1">— Что ж ты так, губернатор. Это же самый варяжский род. Конунг, конан — или не знаешь? Предводителев сын, вот оно что значит. Ты бы хоть мне сказал, я б к тебе на полок не пошла.</p><p class="p1">— На какой полок?</p><p class="p1">— Сто шагов, мера наша, — сказала она с виноватой улыбкой. — У вас переврали, говорят — «порог».</p><p class="p1">— Где же я это читал? — хмуро спросил губернатор. — Он полюбил местную ведьму, а ей с ним было нельзя. Ее за связь с человеком и свои проклянут, и деревенские камнями побьют… Вспомнил! «Олеся», да? Ты же, Ашка, начитанная девочка, только притворяешься дурой. В библиотеку небось ходишь, да? Вот дурак, как я сразу не отгадал. — Он улыбнулся, и она робко ответила ему — улыбка вышла кривая, жалкая, но он и ее принял за подтверждение. — Это чтобы я посерьезнее к вашим относился, да? Бедная моя, да я и так отношусь к тебе и твоим сказкам серьезнее некуда! Ведьма местная, надо же… Там тоже бабка была, все глупости говорила… Да таких сюжетов пропасть: полюбил паныч ведьму, а ведьму камнями закидали. Брось, хватит! Вот увидишь, сейчас этого поймают, что камнями тут разбросался, — окажется, что я какую-нибудь тяжбу не в его пользу решил. Погоди, увидишь…</p><p class="p1">Видимо, губернатор и впрямь обладал неким даром предвидения, необходимым для государственного человека: затрезвонил телефон на столе, и охрана доложила по внутреннему, что злоумышленник пойман, да не особенно, собственно, и убегал; что их оказалось двое; что оба они готовы предстать перед губернатором для снятия первичного допроса и впредь до особого распоряжения их толком не трогали.</p><p class="p1">— Ну, давайте, — сказал губернатор. — Вот увидишь сейчас. Я, кажется, даже знаю…</p><p class="p1">Предчувствие и тут не соврало ему. Охрана втолкнула в столовую Рякина и Стрешина, или Стрешина и Рякина, или Стряшина и Рекина — словом, сладкую парочку, полгода изводившую его тяжбой, а сегодня с утра (чувство — будто год назад) распотешившую божбой и дружбой.</p><p class="p1">— Драсти, губернатор, — сказал Стрешин.</p><p class="p1">— Драсти, драсти.</p><p class="p1">— Не серчай, губернатор.</p><p class="p1">— Прости, гублинатор.</p><p class="p1">— Оно так вышло.</p><p class="p1">— Вышло, чего уж.</p><p class="p1">— Нельзя тебе тут.</p><p class="p1">— Нельзя, нельзя.</p><p class="p1">— Полгода смотрим.</p><p class="p1">— Думаем, думаем.</p><p class="p1">— А сегодня поняли.</p><p class="p1">— Ты самый и есть.</p><p class="p1">— А ну молчать! — заорал губернатор. Рякин и Стрешин испуганно заткнулись. Охрана врала — их-таки потрепали при задержании: под глазом у того, что слева, набухал багровый фонарь, а у второго раздулось и пылало ухо, по которому некто от души засветил.</p><p class="p1">— Все время лопочут, — пожаловался телохранитель. — Ничего, посидят, подумают…</p><p class="p1">— Посидеть можно, — завел дуэт Рякин.</p><p class="p1">— Можно, можно.</p><p class="p1">— Теперь можно.</p><p class="p1">— Теперь все можно.</p><p class="p1">— Мы всем сказали.</p><p class="p1">— Всем, всем сказали…</p><p class="p1">— Что вы сказали?! — не выдержал губернатор. — Быстро, внятно и по одному.</p><p class="p1">— Вот она все скажет, — показал Стрешин на Ашу.</p><p class="p1">— Скажет, скажет, — подхватил Рякин.</p><p class="p1">— Она все знает.</p><p class="p1">— Теперь знает.</p><p class="p1">Губернатор обернулся на Ашу. Она сидела неподвижно, опустив глаза.</p><p class="p1">— Ты их знаешь?</p><p class="p1">— Знает, знает, — залопотал Стрешин, но телохранитель двинул его кулаком по затылку, и тот заткнулся.</p><p class="p1">Аша подняла на него полные слез глаза. Он понял, что это утвердительный ответ.</p><p class="p1">— Откуда? Кто они такие?</p><p class="p1">— Наши, — сказала она. — Из бабушкиной деревни.</p><p class="p1">— Они что, следили за тобой?</p><p class="p1">— Значит, следили, — сказала она.</p><p class="p1">— Вы со своей тяжбой идиотской за этим ко мне ходили? — спросил губернатор.</p><p class="p1">— Не за этим, не за этим, — испуганно проговорил Стрешин.</p><p class="p1">— У нас правда тяжба.</p><p class="p1">— Мы по делу, губернатор.</p><p class="p1">— По делу, гублинатор…</p><p class="p1">— Мы не следить, не следить…</p><p class="p1">— Нам нельзя следить…</p><p class="p1">— Мы люди маленькие, губернатор…</p><p class="p1">— Маленькие, гублинатор…</p><p class="p1">Телохранитель слегка столкнул Стрешина и Рякина лбами. Парный конферанс ненадолго стих.</p><p class="p1">— Они камень бросили? — спросил губернатор.</p><p class="p1">— Вот этот, — телохранитель вытолкнул вперед того, что стоял слева, черт его разберет, как зовут…</p><p class="p1">— Мы не в тебя, губернатор…</p><p class="p1">— И не в нее, гублинатор…</p><p class="p1">— Просто чтоб ты знал…</p><p class="p1">— Чтоб уехал.</p><p class="p1">— Дальше хуже будет…</p><p class="p1">— Земля поднимется!</p><p class="p1">— Нельзя, чтоб поднималась.</p><p class="p1">— Нельзя, гублинатор!</p><p class="p1">— Уже и земля? — язвительно спросил Бороздин. — Это что же, всем миром, что ли?</p><p class="p1">— Это хуже, — сказала Аша. — Они правду говорят, ты не знаешь. Земля в последний раз давно поднималась, старики не упомнят. Это наша земля, заговоренная. Если мы не уйдем — тут весь город посыплется.</p><p class="p1">— И село, и село, — закивал Стрешин.</p><p class="p1">— И лес, и лес, — зачастил Рякин.</p><p class="p1">— Ямы!</p><p class="p1">— Овраги!</p><p class="p1">— Реки!</p><p class="p1">— Горы!</p><p class="p1">— Тихо! — крикнула теперь уже Аша. Губернатор никогда не слышал у нее столь властного голоса и не предполагал, что она может так командовать. Туземцы испуганно притихли.</p><p class="p1">— Что я в тягости — вы знаете, — начала она решительно. — Теперь и ты, губернатор, знаешь. Я четвертый месяц молчу, пять осталось.</p><p class="p1">Губернатор только теперь вспомнил, что еще ничего ей не сказал о судьбе будущего ребенка — до того его поразила ашина вера в пророчество и само это пророчество, говорившее о нем; он никогда, конечно, не принимал всерьез такие вещи — но она была явно не в том состоянии, чтобы говорить с ней о радостях материнства и о его готовности если не заключить брак, то по крайней мере признать ребенка. Сначала надо было утешить, успокоить, а уж потом… Только теперь до него дошло главное в этой истории: она на четвертом месяце, а он ничего не замечал! Вот откуда эти слезы при виде заката, и страхи, и впечатлительность; он знал, что многие во время беременности и родов сходят с ума — вот почему она так поверила этой позорной ерунде… Врача, и немедленно! Он-то ее отучит от этих глупостей, объяснит их происхождение, — если найти хорошего специалиста, она быстро придет в себя.</p><p class="p1">— Я уйду, — продолжала она после недолгого молчания. — Но дитя мое убить я не дам, у меня не будет другого. Я свою судьбу знаю, у волков всегда так. Дитя не дам трогать. Убить дитя — дело страшное, толочное, соколобное. Кто бы он ни был, а он мой, и это уж мое дело — кто из него вырастет. Мать не захочет — дитя никогда злодеем не будет, за то я отвечу. С тобой, губернатор, я не уйду, нам нельзя вместе.</p><p class="p1">— Никуда ты не уйдешь, — начал губернатор.</p><p class="p1">— Молчи, слушай! Тут мои дела начались, тебе лезть нечего. Рожу — вернусь, за мной не ходи. Я одна пойду.</p><p class="p1">— Без моего разрешения отсюда никто не выйдет, — спокойно сказал губернатор. — Охрану предупредите там, — и он снял трубку внутреннего телефона. Телохранитель буркнул в рацию: «Первый! Седьмой, повышенная».</p><p class="p1">— Ты не знаешь, что будет, — с неожиданной мягкостью сказала Аша. — Ты не видел, как земля встает.</p><p class="p1">— Я всякое видел, — махнул рукой губернатор. — Без меня ты никуда не пойдешь, а я найду, куда тебя отправить. Надо будет — я готов и…</p><p class="p1">— Ох, благодетель! — протянула Аша. — Жениться хочет на местной, ай, молодец! Что теперь жениться? Ты все сделал, дальше моя забота. Сама виновата, не разглядела. Правду ты говорил — все выродилось. Да тебя и старые-то волки чуть не проглядели. Хорошо, эти братцы, — она кивнула на Стешина и Рякина, — заметили: не иначе, говорят, ты самый и есть. А я и не знала, что они к тебе ходят.</p><p class="p1">— Не хватало еще, чтоб ты всех знала, кто ко мне ходит, — угрюмо сказал губернатор. — Ладно. Проследите, чтобы этих сегодня же допросили, — держать отдельно от васьки, которого на Чайковского взяли. Сговорятся — никогда правды не узнаем. И насчет стекла распорядитесь там… Никита! Еще чай.</p><p class="p1">Никита бесшумно внес стакан в толстом серебряном подстаканнике с гербом.</p><p class="p1">— Пойдем со мной, Аша. Сегодня здесь останешься.</p><p class="p1">Она покорно подошла к нему, но на полдороге обернулась к охране.</p><p class="p1">— Думаете, я выйти не могу? Я осталась, чтобы с ним быть. Если земля встанет, плохо ему быть одному. А выйти я могу, дяденьки. Возьму и выйду, и ничего не сделаете. А, дядя Егор?</p><p class="p1">— Может, может, — закивал Стрешин.</p><p class="p1">— А ты что скажешь, дядя Кузьма?</p><p class="p1">— Может, она может, — подтвердил Рякин.</p><p class="p1">— И допрашивать их не надо, я сама про них все расскажу.</p><p class="p1">Губернатор, к вящему своему изумлению, увидел, что его личный телохранитель покорно кивает Аше.</p><p class="p1">— Спать отведете да накормите, — повелительно сказала она. — А ты, губернатор, прыгни.</p><p class="p1">— Куда прыгни? — тупо спросил Бороздин.</p><p class="p1">— Да хоть на месте. Можешь?</p><p class="p1">— Знаешь что, Аша, — очень тихо сказал губернатор, — ты все-таки не забывайся, хорошо? Не то я такое волчье слово скажу, что тебя и беременную выпорют.</p><p class="p1">— О как, — спокойно ответила Аша. — Мне бы, дуре, давно догадаться. Никакой моей власти над тобой нет. Лаской еще могу что-то, а командой — никак. Значит, ты самый и есть, давно бы поняла. Все случая не было — приказать да обломиться.</p><p class="p1">— Ладно, — сказал губернатор. — Время позднее. Идем спать.</p><p class="p1">— Смотри, губернатор, — сказала она. — Не жалуйся потом. И помни: если я пойму, что земля встает, — все равно уйду, у тебя надо мной тоже власти немного.</p><p class="p1">— Кое-какая есть, — возразил губернатор и за руку повел ее в спальню. Он знал, что к утру восстановит логику в пошатнувшейся картине мира и надумает, как быть с Ашей и с ребенком. Дождь усиливался, и резиденция, казалось, мелко вздрагивала под его внезапно налетающими порывами.</p></span></span></span></span></span>
