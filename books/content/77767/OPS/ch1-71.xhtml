<span><span><span><span id="id97"><div class="title5">
<p class="p">2</p>
</div><p class="p1">— До чего хорошо, — мечтательно говорил Воронов два часа спустя, глядя в мокрое окно. — И пахнет, как на даче. И уютно так.</p><p class="p1">— Любите уют? — спросил отец Николай, и Громову померещилась в этом скрытая недоброжелательность. Ему почему-то хотелось понравиться отцу Николаю, и он боялся, что Воронов понравится больше. Чувство это было настолько детским, труднообъяснимым и постыдным, что он его попытался заглушить; и в самом деле — никакой недоброжелательности в голосе отца Николая не было.</p><p class="p1">— Очень люблю, — с готовностью подтвердил Воронов. — Я в детстве, чтобы заснуть, всегда себе представлял, что лечу в маленьком самолете, войлочном изнутри, как валенок, там тепло и все оттуда видно… Звезды кругом… Такое со всех сторон подоткнутое пространство.</p><p class="p1">— Да, что подоткнутое, так это точно, — кивнул отец Николай. — Носа не высунешь.</p><p class="p1">— Да почему же? — спросил Громов. — Я допускаю, что хазары — да, там давняя ненависть к христианству, хотя, насколько я знаю, и среди них полно выкрестов…</p><p class="p1">— Видите ли, — сказал настоятель, — я даже не знаю, какой извод мне противнее. Пожалуй, хазарский, хотя многие из наших полагают, что варяжский хуже. Если бы этот вопрос казался нам принципиальным, в монастыре давно случился бы раскол. Хазарский вариант — это такое, знаете, христианство с человеческим лицом, как будто на деле у него нечеловеческое… Вы замечали, что они очень любят на все натягивать маску под названием «человеческое лицо»? Прежде всего их мишенью становятся обряды, потом церковь как таковая, потом они делают акцент на антигосударственной проповеди — потому что, если захотеть, акцент можно сделать на чем угодно… И все это с такой суетливостью, такой искусственной горячностью… Впрочем, варяги не лучше — и даже хуже иногда, потому что ближе к сути. Сильней компрометируют. У хазар Иисус — какой-то диссидент, любящий выпивать в обществе приятелей и учеников, изрекатель афоризмов — они же тоже очень любят сочинять афоризмы, посылать их в юмористические отделы… У варягов — абсолютный диктатор, не признающий милосердия, непрерывно самоутверждающийся… Один в качестве идеала навязывает сверхчеловека, второй — недочеловека, но оба промахиваются. И поэтому так люто ненавидят человека — с двух сторон. Если бы кто-то один — мы могли бы еще усомниться в правильности нашего пути, и то вряд ли; но когда двое с противоположным вектором — значит, все точно.</p><p class="p1">Некоторое время все молчали. Отец Николай подкрутил фитиль в керосиновой лампе.</p><p class="p1">— Главное извращение христианства, которое воцарилось на Руси, — сказал он, — вполне в варяжском духе: воины, что же вы хотите. Они и победили. Все — долг, никакого счастья. Кто-то наврал, что в монастырях должна быть казарменная дисциплина; да отчего же? Монастырь — место радости, собрались единомышленники, проводят время в изучении единственно интересных вещей, иногда выходят в мир, находят новых людей для братства, кому надоело — ушел, кому наскучило в миру — вернулся… Все же свои, христианство в идеале и есть тот единственный язык, на котором всегда можно договориться. Самые разные люди на нем договариваются, если этого хотят. Оно само по себе означает определенный уровень — вы же тоже не просто так пришли? Ход-то строили серьезные люди, отцы-пустынники и жены непорочны; заметьте, что погоня за вами не пошла!</p><p class="p1">— Я не очень верю в такие вещи, — деликатно сказал Громов.</p><p class="p1">— Дело ваше, дело ваше. Иной на Луну глядит и говорит — тарелка… Человек если идет в монастырь, и вообще как-то доходит до христианства, — это значит просто, что ему все остальное уже невыносимо. Это последняя отрешенность от всякой земной гадости, и прежде всего от идиотского этого стремления доминировать любой ценой. Высшая и самая необременительная форма гордыни, если угодно: я здесь, у вас, не хочу больше доминировать. И тогда человек уходит в монастырь, и ему хорошо в монастыре… Это не бегство от жизни, это бегство к жизни, скажу я, предупреждая ваше возражение. Только в варяжском монастыре могли придумать ни на что не похожий институт послушания — все эти бессмысленные дисциплинарные упражнения, сажания редьки хвостом вверх… Варяжство сделало из христианства какой-то, извините, бред — апофеоз долга, насилия, изобрело Бога-командира, перед которым все виноваты, и он всех периодически — в наряд… Что хорошего может проистечь из чистого долга?</p><p class="p1">— Многое, — сказал Громов. — И потом, я слишком часто видел, что проистекает из его отсутствия…</p><p class="p1">— Да понятно мне, — с некоторой досадой отмахнулся отец Николай. — Я в людях отчасти понимаю, иначе какой бы я был настоятель? Только настойку на травах настаивать… Нормальная концепция, смешная, имеет право быть. Самурайский извод. Подвиг как самоцель, сам себе награда. Но это, понимаете, тоже безрадостно. Не скажу там, что особенная гордыня, — я сам, может быть, гордый человек, сижу тут и страшно собой доволен… Но ведь христианство исходит просто из хорошего знания человеческой природы, оно состоит из простейших, но тонких правил душевной гигиены — и весь рецепт. Этот ваш подвиг какое-то время срабатывает, нет слов. Потом копятся ожидания — вы все-таки ждете благодарности, воздаяния, мир вам должен все больше и больше, и кончаете вы тем, что либо начинаете мучить всех подряд, либо кончаете с собой. Нельзя же вечно терпеть из чистого самоуважения — оно с годами раздуется в горб и вас расплющит… Но самый печальный вариант — знаете какой? Это если вы под занавес суровой жизни находите девушку, абсолютный идеал, чистого ангела, награду за годы самоотречения, и это ваша последняя ставка. Вы ей верите абсолютно, всячески пресмыкаетесь, возносите на немыслимую высоту — не всякая девушка такое выдержит. Очень, очень печальное зрелище. И противное, извините меня. Хотя по сравнению с остальными вариантами…</p><p class="p1">— Мотивация у всех своя, — сказал Громов, стараясь не выказать обиды. — В загробные сказки не всякий человек поверит.</p><p class="p1">— Да разве я спорю?! — горячо ответил отец Николай. — Очень может быть, что ничего и нет. Если есть — это так, бонус. Я вам больше скажу: очень может быть, что и Бога никакого нет.</p><p class="p1">— У нас, знаете, замполит был в училище, — усмехнулся Громов. — Тоже психолог. Очень любил убеждать от противного. Долго рассказывал, что Родину можно и не защищать. Рисовал жуткие картины незащищенной Родины.</p><p class="p1">— Ну, он-то вас пытался удержать в рядах, так сказать. А я совершенно не пытаюсь, нам и так неплохо, — скромно заметил отец Николай. — Тоже, агитатора нашли… Агрессивная проповедь, сетевой маркетинг, позднее католичество — кому надо? Я вам пытаюсь объяснить свои мотивации, потому что ваши вы и так знаете. Так вот, очень может быть, что Бога нет. Но поскольку без этой гипотезы мир приобретает вовсе уж сиротский и бессмысленный вид, голая смерть, никаких удовольствий — мы полагаем более правильным думать так, как думаем. И знаете, сколько раз уже такое бывало в истории — если вещь красивее выглядит с допущением, то так оно, как правило, и есть. Вроде планеты Плутон, которую никто не видел, но вот казалось, что она должна там быть, — она и есть. Пока вы не надстраиваете над миром этот купол — мир стоит голый, лысый, дождем его заливает… Ну, значит, он должен быть — вот и все рассуждение. Собственно, вся христианская картина мира — просто наиболее удобная схема для того, чтобы в этом мире жить по христианским правилам. Буддийская удобна, чтобы жить по буддийским, хазарская — по хазарским… В их мире, кстати, нет никакого бессмертия, это вы знаете. У местных бессмертия тоже нет, им нравится, когда из них лопух растет. Ну, они и живут, как живут.</p><p class="p1">— Кто это — местные? — спросил Воронов. — В Чивиреве?</p><p class="p1">— Не только в Чивиреве, юноша. Придумали себе, что там ничего быть не может, поэтому бессмертия надо достигнуть здесь: мир без развития, вечный бег на месте. Левая нога, правая нога… Но ведь это когда-нибудь кончится. И тогда, вероятно, нам можно будет отсюда выйти. А пока, не имея возможности подарить миру нашу веру, мы ее тут храним и приятно проводим время.</p><p class="p1">— Почему же у вас нет возможности проповедовать? — все еще не понимал Воронов. — Никого не преследуют, я и в Москве сколько раз видел странствующих монахов, и никто их не преследовал…</p><p class="p1">— Да мало ли кого вы видели, в рясу теперь кто только не рядится. Да, может, и не преследовали бы — чутье у них притупилось. Но какой толк? Пока тут эти двое рубятся, учения все равно никто не воспримет. Местным оно не нужно, им и так прекрасно в своем кругу, а эти уже переняли главные тезисы и извратили до предела. Их разубеждать бессмысленно, да нам это не очень-то и надо. А вот когда поломается весь этот вечный двигатель — тогда мы и понадобимся…</p><p class="p1">— Как же он поломается, если вечный? — совершенно по-детски спросил Воронов.</p><p class="p1">— Не бывает вечного двигателя, — назидательно сказал настоятель. — Какая пошлость, честное слово: всякий местный житель — варяг ли, хазар ли, прочее ли население, — так и мечтает найти уединенную избушку либо остров, чтобы там, значит, сидел бородач и все ему объяснил. Иной девочку изнасилует, до самоубийства доведет — и приходит исповедаться: объясни мне, отец Тихон, в чем я неправ! И автор всю жизнь мечтал о подобной же ерунде: идет, идет, бац — избушка. А в ней старец исключительной праведности, в чем душа держится: проходи, дорогой грешник, сейчас будет психоанализ. Выложу тебе все ответы на все вопросы: и почему ты убил, и где закопал, и почему это в конечном счете перед Богом оправдано. А как я могу вам что-то подобное предложить? Я не Бог, не царь, не герой, я монах, существо ограниченное. В лучшем случае могу рассказать, почему я сам живу так, а не иначе.</p><p class="p1">— Но двигатель все-таки сломается? — уточнил Громов. — Это вам отсюда видно?</p><p class="p1">— Ну, какие-то вещи я обязан понимать. Хотя тоже, знаете… Этот ихний Ленин, человек не без догадливости, говорил: представителям обреченных классов свойственно так называемое эсхатологическое мышление. Ну да, свойственно. А поскольку обреченность входит в наше понимание человека вообще и имеет, как бы сказать, перманентный характер, — потому что без этого чувства обреченности многие полезные состояния вообще недостижимы, — то нам и кажется всю жизнь, что завтра конец света. Когда пришло христианство, вечность кончилась, круг разъехался — отсюда и общая злость: как это, как это мы будем не всегда?! Но даже такая прочная конструкция, как русская, с этими ее двумя взаимообусловленными паразитами на неистощимом местном теле, — имеет свой предел, это я вам на Библии поклянусь. Причем, по некоторым признакам, скорый — мне удобнее полагать так.</p><p class="p1">— И кто победит?</p><p class="p1">— Никто не победит, — назидательно сказал отец Николай.</p><p class="p1">— Я думал — Христос, — усмехнулся Громов.</p><p class="p1">— Ну вот еще, тоже мне… Христос давно победил. Военные триумфы — это не по нашей части. Я же не говорю, что настанет царство истины. Просто кончится очередное царство лжи, это да. А что будет — никто не знает, только поэтому и интересно. Мы вам кое-что покажем ближе к ночи, когда на дежурство пойдем. Или спать хотите?</p><p class="p1">— Ничего, я не устал, — сказал Громов.</p><p class="p1">— И я не устал, — пробормотал Воронов, клюя носом.</p><p class="p1">— Ложитесь пока, — сказал отец настоятель. — Вон там у меня комната для гостей, ступайте. Я вас ближе к дежурству разбужу.</p></span></span></span></span>
