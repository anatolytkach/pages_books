<span><span><span id="id107"><div class="title5">
<p class="p">Глава восьмая. Синдром Василенко</p>
</div><span id="id108"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Когда-то в Алабине была атомная станция. В конце прошлого века, незадолго до очередной хазарской революции, с ней что-то случилось — то ли земля внезапно содрогнулась в одном-единственном месте, хоть там сроду не бывало землетрясений, то ли начальство недосмотрело, но алабинская зона была огорожена колючей проволокой, на всех дорогах установили посты, а жителей самого поселка Алабино, молодого научного городка на пять тысяч жителей, срочно эвакуировали кого куда. После алабинской катастрофы распад пошел быстрей, а может, сама она была первым знаком распада. Говорили, правда, что никакой опасности эти места теперь не представляют. Через десять лет после аварии туда даже стали возить туристов. Говорили, что все радиоактивное топливо вылетело из реактора прямо в момент взрыва, Анька слышала об этом в какой-то передаче, — но точно никто ничего не знал. И причины, и последствия взрыва оставались в тени, а всякий, кто приближался к разгадке, либо бесследно исчезал, либо внезапно кончал с собой.</p><p class="p1">Анька знала об этой станции мало и смутно. Честно говоря, она думала, что они идут в какое-то другое Алабино, но когда среди леса пришлось ползти под ржавой колючкой, невесть с чего проведенной тут, она стала догадываться, что Василий Иванович привел ее в ту самую запретку.</p><p class="p1">— Тут же нельзя, Василий Иванович, — сказала она укоризненно. — Я читала, тут в радиусе двухсот километров ничего живого нет.</p><p class="p1">— Как нет? — удивился Василий Иванович. — А это все что?</p><p class="p1">— Да ведь это далеко от эпицентра.</p><p class="p1">— Ничего не далеко. Полезли, Анечка. Я тебе покажу тут все, раз уж ты привела меня. Увидишь, как тут люди живут. Никакому туристу не покажут, как оно на самом деле. А потом домой, сразу домой. Здесь-то мне ничего не сделается.</p><p class="p1">Некоторое время они шли лесом, потом он начал редеть, и сквозь просветы между березами, кленами и дубами Анька увидела высокие белые дома. Издали они казались очень красивыми. Алабино стояло в лесу, закрытое от случайных гостей. Туда и во времена станции пускали не всех. Только вблизи становилось видно, что дома сильно обветшали и краска местами облупилась, а стекла везде выбиты.</p><p class="p1">В центре города был стадион, заросший сейчас редким лесом. На зеленой мягкой траве здесь и там лежали васьки — это была их зона. Обычные люди, включая охранников, опасались сюда заходить. Ходили слухи, что в Алабине до сих пор сплошная радиация. Счетчики Гейгера показывали уровень, в десять раз превышающий норму, и никто не знал, сколько можно тут находиться, — но васьки ничего не боялись, и им действительно ничего не делалось. Анька испугалась — вдруг это распространяется только на них? — но Василий Иванович ее успокоил:</p><p class="p1">— Анечка, тут правда безопасно. Мы же тоже люди…</p><p class="p1">Он, казалось, даже обиделся.</p><p class="p1">— Почему же никто больше не ходит?</p><p class="p1">— Боятся, глупые потому что. Я бы тебя не повел в плохое место, Анечка.</p><p class="p1">Васьки ласково приветствовали Василия Ивановича, но ни о чем его не расспрашивали. Среди них это было не принято. Наверное, они и так все знали друг о друге, а может быть, в их среде просто стеснялись излишнего любопытства.</p><p class="p1">— А чего сюда все не идут?</p><p class="p1">— Анечка, каждый ведь в своем месте ходит. Наши никогда все сразу никуда не идут. Одни думают, что у себя пересидят, а другие — что облава скоро кончится. Я, кого мог, предупредил, а другие не хотят. Если человек не хочет спасаться, как его силком потащишь?</p><p class="p1">В Алабине природа быстро и уверенно брала свое. Среди города то тут, то там проступал лес, отвоевывая спортивные площадки, детские городки и дворы. Асфальт трещал, его взламывали побеги, и ясно было, что точно так же природа взломала когда-то страну, породившую Алабино. Это была сильная страна, она до многого дотянулась, но то ли земля против нее восстала, то ли сама она с собой не сладила, — и природа взломала ее, выбила окна, сорвала асфальт, хлынула неуправляемой и слепой стихией в города и на стадионы. Анька покачалась на ржавых качелях в детском городке. Скрип их напомнил ей собственный ее двор, и она, боясь разреветься, остановилась. В парке культуры и отдыха под ветром тихо поворачивалось колесо обозрения. На него, задрав головы, с улыбкой кроткого удивления смотрели местные васята. Детское в итоге досталось детям — но это детское было теперь ржавым, скрипучим, рассыпающимся; и дети были соответствующие, одно слово — васята. В детском садике уцелели шкафчики, в которых висела кукольная одежда, и осталась на стене газета, вышедшая за день до катастрофы. Туристов сюда не водили — они прогуливались лишь на самых дальних подступах к городу и рыбачили в реке, где якобы водились рыбы-мутанты. Есть их никто не собирался, ловили посмотреть, но так пока никого и не выловили, кроме обычной плотвы.</p><p class="p1">Анька долго бродила по детскому саду, в котором жили теперь васьки. Они ничего не трогали — во всяком случае, их пребывание здесь не вносило в этот мир большего запустения, чем то, которое воцарилось само собой. Заплесневел бассейн в центре детского сада, и в зеленой тине увязла пластмассовая золотая рыбка в короне. Теперь таких игрушек давно не делали, все было китайское. Правда, после того, как открыли флогистон, приходилось возвращаться к самообеспечению — на нефть уже никто ничего не менял, и новые игрушки были сплошь военные — солдатики, автоматики, иногда нефтянички.</p><p class="p1">Она мало знала о стране, исчезнувшей до ее рождения, но здесь кое-что о ней можно было понять. В сущности, теперь, когда от нее почти ничего не осталось, васьки были идеальными гражданами ее руин. Было похоже, что со всей страной случился синдром Василенко. В один миг у нее не стало ни прошлого, ни будущего, потому что в отсутствие страны ни прошлое, ни будущее не имело смысла. Ее история и планы были постижимы только в ней, а после нее рассыпались, как истлевший папирус. Все куда-то шли и что-то делали, и вдруг словно забыли, зачем. Наверное, это была не самая лучшая страна. Она была мало похожа на боевой лагерь, о котором читала Анька — на страну репрессий и войн. Здесь все уже дряхлело, осыпалось, а начальство кидалось приглядывать за всем одновременно и никого уже не могло ни удержать, ни наказать, ни защитить. Природа брала свое и перла отовсюду. Природу можно победить, но ненадолго — последнее слово всегда будет за ней. Хазары хорошо это понимали, поэтому и победили тогда. Вся последняя революция описывалась в учебниках как диверсия ЖДов, и Анька понимала теперь, почему. Если верить Василию Ивановичу, каждый из захватчиков следовал тут собственной стратегии. Варяги были союзниками зимы, когда все замерзает и замирает; хазары — союзниками весны, когда все тает и гниет. А дальше земля кое-как справлялась и начинала выживать сама — либо рожала, либо спокойно и уютно спала под снегом. Самым безобразным было время захвата — март, октябрь. Анька поняла теперь, почему всегда их ненавидела.</p><p class="p1">Васьки жили тут давно, они облюбовали алабинскую зону задолго до облавы. Тут был их рай — место, где никто никуда не торопился, никуда не шел, ни за что не ругал. Можно было слагать баллады, лежать на траве, бродить по зарастающим дорожкам или набережным, заходить в брошенные научные институты, откуда в спешке вывезли только аппаратуру, а мебель оставили. Коренному населению осталось в стране только одно место — где жить вообще было нельзя; но коренное население приспосабливалось ко всему, так что научилось выживать и при радиационном фоне, смертельном для других. Уж такое это было население: что для всех смертельно, для них оказывалось здорово и почти полезно.</p><p class="p1">Васьки расселялись в брошенных квартирах, в лесных наблюдательных станциях, в шалашах, которые неумело строили сами. Они почти не разговаривали друг с другом, потому что им и так было все понятно. Здесь, на земле, принадлежащей только им, они вернулись к прежним занятиям — васьки ведь бродят потому, что работать на чужой земле для них невыносимо. Здесь они временно оставляли бродяжничество и даже начинали что-то выращивать — как всегда, путем договора с почвой. Земля в Алабине родила удивительно, и немногие исследователи, проникавшие сюда в защитных костюмах и с массой предосторожностей, считали это следствием радиации. Тут росли одуванчики по пяти цветков на стебле, а картошка была с детскую голову. Радиация, конечно, была ни при чем. Просто землю оставили в покое, и она неутомимо рожала для своего коренного населения.</p></span><span id="id109"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Впрочем, сказать, что в Алабине вовсе не было начальства, нельзя. В Алабине была Екатерина.</p><p class="p1">Екатерина — высокая, полная, решительная женщина, — давно уже занималась васьками, и не с целью благотворительности, всегда публичной, а просто потому, что таков был зов ее сердца. Она перевязывала их раны, руководила какими-никакими работами, на которые можно было их подвигнуть в Алабине, и содержала место в относительном порядке. Постоянных жителей в зоне было немного — редкий васька долго усидит на месте, случались побеги даже из васятников, бродяжничество у странника в крови; те, кто шел сюда подлечиться и отдохнуть, называли это про себя именно «пойти к Екатерине». Екатерина принимала всех. Она была строга, но справедлива. Жить здесь ей нравилось, потому что здесь был последний советский остров — осколок той страны, которую она застала и успела полюбить. Все, что стало после, ей не нравилось. Она уехала сюда из своего Петербурга и жила в одной из квартир шестнадцатиэтажной башни с ржавой надписью «Слава труду!» на крыше. В доме стояло сломанное пианино и кое-что из мебели. Васьки в благодарность за опеку пытались ей кое-что сколотить, но мастера из них были известно какие.</p><p class="p1">— Сейчас, сейчас, — бормотал Василий Иванович. — К Екатерине надо, а как же. Представиться. Кто пришел, тот сразу к Екатерине. У нас по правилам все.</p><p class="p1">Анька нехотя шла за ним по вечернему Алабину, мимо брошенных ржавых машин и переполненных мусорных баков. Ей почему-то не хотелось идти к Екатерине. Ей самой хотелось полежать на траве под желтым закатным солнцем, погреться, подремать и впервые за три недели не бояться погони. За ними столько раз гнались, дважды они чудом не напоролись на патруль, несколько раз отсиживались на темных вонючих чердаках и в подвалах — теперь, кажется, можно было успокоиться. Тем более, что совсем скоро ей домой. Ведь она привела Василия Ивановича туда, где его теперь долго никто не тронет. Дважды ей пришлось врать патрулям, что это ее обеспамятевший дедушка, которого она выводит погулять: документов у них не проверяли — ясно же, что раз старик с девчонкой и девчонка относительно прилично выглядит, то они не васьки. Анька боялась и думать, что было бы с Василием Ивановичем без нее.</p><p class="p1">На двери квартиры было неумело, так же робко, как жираф в васятнике, нарисовано странное существо. В нем при желании можно было опознать женщину у плиты, и даже угадывалась кастрюля, а рядом разматывался белый рулон — то ли бинт, то ли туалетная бумага. Внизу по-детски старательно было выведено белой краской: «Катерина». Василий Иванович осторожно постучался.</p><p class="p1">— Да! — ответил властный голос.</p><p class="p1">— Катерина, это Василий Иванович, — сказал он и вошел, поманив за собой Аньку.</p><p class="p1">— Кто с тобой? — сразу спросила Катерина. Она была в кухне и, судя по запаху, варила рыбу. В алабинской речке Алабани рыбы хватило бы и на город побольше.</p><p class="p1">— Сквозь стены видит! — восторженно прошептал Василий Иванович.</p><p class="p1">— Может, мне нельзя? — тихо спросила Анька. Катерина уже вышла к ним — прямая, стройная, с легкой проседью, волосы собраны в тугой пучок.</p><p class="p1">— Внучку привел? — спросила она ровно, без усмешки.</p><p class="p1">— Это, Катерина Николавна, со мной, — засуетился Василий Иванович. — Тут вишь какое дело, тут я в семье жил год, хорошая семья, и когда облавы пошли, то я, стало быть, решился уйти. И когда я решился уйти, то она, стало быть, со мной, чтобы одному мне, значит, не так страшно. Вот, видишь, какое дело… И особенно еще потому, что ищут же везде, сама знаешь. А из меня теперь какой бегун? У меня и глаза не так видят, и вот, видишь ты, довела. Теперь обратно поедет.</p><p class="p1">— Поедет да всем расскажет, да, милая? — спросила Катерина с нехорошей улыбкой. Василий Иванович испугался.</p><p class="p1">— Ты что, ты что. Что ты такое говоришь. Да и кому рассказывать, все знают. Но она знаешь какая? Ты не знаешь, она какая. Она жизнь мне спасала, вот!</p><p class="p1">— Да уж вижу, какая, — усмехнулась Катерина. — Помочь старику решила, да, девочка?</p><p class="p1">Анька кивнула.</p><p class="p1">— Ну, проходите на кухню. Сейчас уха поспеет.</p><p class="p1">Катерина варила уху в огромной кастрюле на газовой плите, переоборудованной под дровяную. Анька видела такую в музее московского быта, куда их водили однажды во время москвоведения. Ни электричества, ни газа в Алабине не было со дня катастрофы, — правда, воду из Алабянки можно было таскать беспрепятственно, а для известных нужд выстроили кривобокие будочки. Васьки ничего не умели строить как следует.</p><p class="p1">Скоро под окно начали стягиваться васьки, она разливала уху по тарелкам и протягивала им в окно. Они благодарно брали тарелки и ели — кто-то ложкой, а кто-то пил через край, так проще. Катерина хорошо варила уху. Проблема в Алабине была одна — соль, она в огороде не растет, но пришлые васьки приносили, да и Катерине случалось выбраться из города. Все остальное было, разве что зимой холодно, но васьки привычные, в каждой квартире было по кострищу, — а Катерина на зиму уезжала домой, хотя и тогда наезжала с инспекциями.</p><p class="p1">— Так что же ты, девочка? — заговорила Катерина, когда Анька съела суп. Уха была невкусная, но она так давно не ела горячего супа, что была рада и такой. — Как же ты решилась уйти с Василием Ивановичем?</p><p class="p1">— Я подумала, ему опасно ходить, если облава, — нерешительно сказала Анька. Она боялась этой прямой и строгой женщины, как будто была перед ней виновата.</p><p class="p1">— Опасно-то опасно, а разве тебе не опасно уходить из дома? Ты до этого из дома уходила?</p><p class="p1">— Нет, никогда, — сказала Анька. — Один раз в лагере была.</p><p class="p1">— Я тебя не про лагерь спрашиваю, — мягко, но недоброжелательно продолжала Катерина. — И что же, ты вот так все бросила и одна пошла с Василием Ивановичем? И родители тебя не ищут?</p><p class="p1">— Ищут, — сказала Анька, — но они же не знают, куда мы пошли. Я могла его спрятать на даче, но там нас нашли бы. Надо было уехать из Москвы, и мы через Тамбов доехали.</p><p class="p1">— И куда ты теперь?</p><p class="p1">— Домой, наверное. Вы же скажете, как выбраться.</p><p class="p1">— Это я тебе, конечно, скажу. Но, я думаю, домой тебе сейчас не надо. Прямо домой — опасно.</p><p class="p1">— Почему? — не поверила Анька.</p><p class="p1">— Арестовать могут. Ты помогла скрыться ваське, он у вас был зарегистрирован, жил, наверняка уже приходили с облавой… Так что домой тебе сейчас никак нельзя. Если, конечно, ты не хочешь, чтобы тебя сразу посадили.</p><p class="p1">— Да за что же меня сажать?! Может, я просто ушла из дома…</p><p class="p1">— Тогда за бродяжничество. Если родители действительно объявили тебя в розыск, ты уже везде числишься как бродяжка. Знаешь, что делают с бродяжками у вас в Москве?</p><p class="p1">Катерина говорила с ней, как с ребенком, но почему-то именно в этой интонации, и в отвратительном уменьшительном слове «бродяжка», и в ее больших мягких руках с ямочками на локтях Аньке мерещилась страшная угроза. Она сама не понимала, в чем тут дело, но ясно чувствовала, что Катерина ей враждебна, что она не хочет ее здесь видеть и злится даже на Василия Ивановича — за то, что он привел ее сюда.</p><p class="p1">— Мне все равно идти некуда, — сказала Анька. — Я не хочу уходить из дома насовсем. И потом, знаете, у отца возможности… Он не даст меня просто так посадить, я думаю. Только за то, что я ушла.</p><p class="p1">— Твоего отца никто не спросит, — сказала Катерина. — Твой отец ничего не может.</p><p class="p1">— Не надо так говорить про моего отца, — решительно сказала Анька.</p><p class="p1">Она догадывалась, что именно не нравится Катерине. Катерина уже привыкла быть главной благотворительницей этих мест, главной благодетельницей этих людей, и когда здесь появилась Анька, которая по своим невеликим годам принесла гораздо большую жертву, — она, понятное дело, ревновала.</p><p class="p1">Катерина молчала, внимательно оглядывая Аньку.</p><p class="p1">— Как же ты решилась? — спросила она наконец.</p><p class="p1">— Да что тут решаться? — зло сказала Анька. — Человек беспомощный, прости, Василий Иванович. Все-таки не чужой. Тут никакого подвига, многие бы так…</p><p class="p1">— Ну, пока ты первая. Ладно. Утро вечера мудренее.</p><p class="p1">Анька ненавидела эту пословицу, потому что именно с нею ее всегда укладывали спать родители, а ложиться спать она не любила, потому что, едва гасили свет, ее, как всякого нервного ребенка, тут же обступал пестрый рой отвратительных видений. Из альбома репродукций выползало «Сумасшествие», из детской энциклопедии — «Землетрясение».</p><p class="p1">— Я спать еще не буду. Я погуляю тут, можно?</p><p class="p1">— Гуляй, — ласково сказала Катерина, — у нас никто не обидит.</p><p class="p1">— Я с ней схожу, — выговорил Василий Иванович.</p><p class="p1">— Останься, Василий Иванович, разговор есть.</p><p class="p1">— Ночью, Катерина Николавна, ночью. Одной-то ей как же? Одной нельзя…</p><p class="p1">— Ну, ступай, — без охоты разрешила Катерина.</p></span><span id="id110"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Посреди бывшего стадиона стояла молодая лосиха и задумчиво, запрокинув рога, смотрела на молодой месяц. Она не боялась людей, понимая, видимо, что это не совсем люди.</p><p class="p1">Анька прошлась по городу, послушала несколько народных баллад у костра — она не все понимала, тут пели в основном на своем языке, — ненадолго углубилась в лес, но испугалась. В Алабине и так было совсем как в лесу, и так же пахло мокрой землей, росой, корой. Василия Ивановича как почетного гостя Катерина разместила у себя, в одной из комнат четырехкомнатного облупленного жилища. Чистоту, правда, она блюла, а стены завешала репродукциями из глянцевых журналов. У нее можно было даже помыться</p><p class="p1">Аньку уложили на старый, многажды залатанный надувной матрас, Василий Иванович прошел к Катерине Николавне на кухню и при свече о чем-то говорил с ней. Ночью в Алабине было страшно, неуютно — дома стоят как призраки, окна не горят… Анька не могла заснуть. Разговор доносился до нее обрывками. Она хотела подойти, прислушаться, но половицы страшно заскрипели, и голоса умолкли. Она полежала еще, вслушиваясь и гадая, за что Катерина Николавна зла на новых гостей, — но усталость взяла свое, и, ничего не разобрав, она заснула. Оно и к лучшему: слушать этот разговор ей было ни к чему. Вдобавок велся он на языке коренного населения — все слова те же, а порядок непонятный. Аньке снились бледные, прозрачные жители мертвого Алабина. Они протягивали к Аньке тонкие, зыбкие руки и умоляли все это как-нибудь остановить, но остановить ничего уже было нельзя: все сыпалось, потому что повторилось слишком много раз.</p><p class="p1">— Василий Иванович, — тихо говорила Катерина Николавна, — ты зачем девочку привел?</p><p class="p1">— Так ведь я не приводил, Катерина Николавна, — оправдывался старый васька. — Она сама за мной пришла, или ты не слышала?</p><p class="p1">— Захотел бы ты — не пришла бы. Ты мне, Василий Иваныч, вот что скажи. Только не врать! — жестко добавила Катерина. — Было у вас что с девочкой?</p><p class="p1">— Опомнись, Катерина Николавна, — жалобно заморгал Василий Иванович, что ты такое говоришь… с ребенком-то…</p><p class="p1">— Я почем знаю? Вы люди особые, это я варяг с хазарами насквозь вижу, а про вас, странников, мне ничего не известно…</p><p class="p1">— Как можно, Катерина Николавна! — продолжал он увещевать ее. — Ведь она мне… ну… как дочь она мне! У меня дочь когда-то была, ты знаешь, Катерина Николавна? Славная девочка, вроде этой, забыл только, как звали…</p><p class="p1">— Все ты забыл. Может, у тебя с ней было что, а ты забыл?!</p><p class="p1">— Да какая же со мной пойдет, с бродягой! — не понимал Василий Иванович.</p><p class="p1">— Да ведь пошла же она с тобой из дома! Это значит, она любит тебя, Василий Иванович.</p><p class="p1">— Ну, не так же любит… не по-женски…</p><p class="p1">— Этого мы с тобой знать не можем. Женская душа потемки, это я тебе сама говорю. А знаешь ты, Василий Иванович, что девочка твоя — хазарка?</p><p class="p1">— Откуда мне знать, Катерина Николавна, опомнись…</p><p class="p1">— А как же не знать? Самая что ни на есть, только давно это было. Что ж ты на семью смотрел, да ничего не увидал?</p><p class="p1">— Какие они хазары, Катерина Николавна! Если бы они хазары были, так уж их к началу войны в Москве бы не было! Хазары подчистую ушли, а кто не ушел — того выгнали…</p><p class="p1">— Ну, это ты мне не рассказывай. Среди хазар такие есть, что давно с русскими породнились, но меня-то не проведешь. Я эту кровь чую. Я по ней, можно сказать, специалист. Я сторож, Василий Иванович, у меня работа такая.</p><p class="p1">— Так это… это… — засуетился Василий Иванович. — Ее же инспектор Гуров видел, и ничего! Лично смотрел, и ничего!</p><p class="p1">— Когда это Гуров ее видел? — недоверчиво спросила Катерина.</p><p class="p1">— В Москве был у меня, — торопился Василий Иванович, — он-то про облаву и предупредил! И ее видел, и дома был, со всей ее семьей разговаривал…</p><p class="p1">— Что же он там себе думает, Гуров? — проворчала Катерина. — Явная же хазарка, к бабке не ходи… Колене в седьмом хазарка… Что, он знал, что она с тобой пойдет?</p><p class="p1">— Да откуда же ему знать? Она сама ведь не знала, что пойдет…</p><p class="p1">— А надо было знать, Василий Иванович. Сторож на то и сторож. Как же Гуров не углядел… Вы же — пара!</p><p class="p1">— Что за пара? — не понял Василий Иванович.</p><p class="p1">— Ты из наших, из странников, славного рода, она из хазар, — ты понимаешь, что будет, если меж вами что начнется?!</p><p class="p1">— Да что начнется-то, Катерина Николавна! Между нами сроду ничего не будет, я же не то что в отцы, в деды ей гожусь…</p><p class="p1">— Плохо все, Василий Иванович, — строго сказала Катерина. — Земля не держит больше, чувствую. Такое может случиться, что не знаешь, откуда ждать. Плохо все, куда ни глянь — плохо. И где это видано, чтобы хазары такие слезливые пошли — ваську в странствия провожать? Это все неспроста, Василий Иванович, думать тебе надо, Василий Иванович…</p><p class="p1">— Я сам все видал, — с невыразимой печалью сказал Василий Иванович. — И гадали, и соколок пускали — все видно. Но как хочешь, Катерина Николавна, печкой тебе клянусь, яблонькой клянусь — это не через меня придет.</p><p class="p1">— А все-таки в Дегунино пойти вам придется.</p><p class="p1">Василий Иванович замер.</p><p class="p1">— Как — в Дегунино? Она только что пришла, хоть отдыха ей дай!</p><p class="p1">— Нельзя ей здесь оставаться. Нечего хазарам тут делать.</p><p class="p1">— Да видел ее Гуров, и родню видел…</p><p class="p1">— Гуров — не по хазарам, Василий Иванович. Гуров у нас по варягам спец, они ему видней. А по хазарам у нас я, Василий Иванович, и тут уж я спуску не дам. Подойдет молодой васька, и на тебе, сделались. Может, она затем и пришла сюда с тобой, я не знаю. Она же тоже себя не сознает. Никто не сознает. Не дам я ей здесь оставаться, как хочешь, не дам. Пусть ее в Дегунине смотрят. Если они скажут, что нет от нее опасности, — пусть хоть домой, хоть на все четыре стороны. Но хазарка, которую к ваське потянуло, — это, как хочешь, неспроста. Такого сроду не было. Они же за дом держатся, как за соломинку. У них дом — первое дело. Сколько ты крови к ним не подмешай, хазары будут хазары.</p><p class="p1">— Да нельзя ж по одной крови судить! — воскликнул Василий Иванович.</p><p class="p1">— Тебе нельзя, а сторож на то и нужен. Завтра уведешь ее в Дегунино, и смотри мне.</p><p class="p1">— А ну как она не пойдет в Дегунино?</p><p class="p1">— Пойдет, — сказала Катерина. — Это я тебе точно говорю.</p><p class="p1">Василий Иванович надолго задумался.</p><p class="p1">— Ты вот что пойми, — проговорила Катерина после паузы. — Это как к врачу на консультацию. Один врач по одним болезням, другой по другим, в Дегунине такие люди сидят, что все знают… Нельзя без этого, пойми ты, нельзя. Время сейчас такое, что того гляди все упустим. Для этого ли сторожили тысячу лет?!</p><p class="p1">— А в Дегунине война, — сказал Василий Иванович. — Котел дегунинский. Меня не жалко, а если с ней что?</p><p class="p1">— Да ты сам знаешь, какая сейчас война. Войны-то уж нет давно, заканчивать будут. Опять худой мир и опять по-старому. Они ведь как хотели? Они думали, если война, так можно решить как-то. А у них такая война раз в сто лет — то сажают друг друга, то громят. И никакого толку. Так что будет все это вечно, если только люди твоего рода не станут с хазарками гулять.</p><p class="p1">— Я не гулял с ней, — в который раз повторил Василий Иванович. Другой бы на его месте рассердился, но у васек эта эмоция не получалась.</p><p class="p1">— Значит, пусть и другие не гуляют. А в Дегунино пойти вам надо. Я с ней завтра сама поговорю. Ты не лезь. Ступай, спи. Но Василий Иванович не спал. Если б не синдром Василенко, он в эту ночь непременно наложил бы на себя руки.</p><p class="p1">Но у васек не было и этого умения.</p></span><span id="id111"><div class="title5">
<p class="p">4</p>
</div><p class="p1">— Аня, — серьезно и по возможности доброжелательно сказала Катерина. Ей трудно было разговаривать с хазарами — у нее действительно было на них безошибочное чутье, и любить их ей было не за что. Но она держалась изо всех сил и даже улыбалась. — Аня, Василию Ивановичу нельзя оставаться в Алабине.</p><p class="p1">Анька посмотрела на нее с тоской. Она чувствовала, что ее странствие так просто не закончится.</p><p class="p1">— Ему надо пойти в нашу главную деревню, — сказала Катерина. — В Дегунино, Аня. Ты, наверное, слышала про него.</p><p class="p1">— Да, слышала. Там боевые действия.</p><p class="p1">— Ну, боевых-то нет, — уверенно сказала Катерина. — Какие боевые… Не это страшно. Страшно, что яблонька наша сохнет и печка портится. А поговорить с ними может только Василий Иванович. Другого такого специалиста у нас нет.</p><p class="p1">— А откуда вы знаете, что там с печкой? — спросила Анька.</p><p class="p1">— Мы все знаем. У нас эта связь поставлена.</p><p class="p1">— А он уже знает, что ему надо туда идти?</p><p class="p1">— Знаю, знаю, Анечка, — мелко закивал Василий Иванович. — Надо печку посмотреть, это святая наша печка… Это такое особенное у нас место. Если я печку не посмотрю, может, и Дегунино погибнет…</p><p class="p1">— И яблоньку, — твердо добавила Катерина.</p><p class="p1">— И яблоньку, — тихо повторил Василий Иванович.</p><p class="p1">— Может, при обстреле повредило или что, — сказала Катерина. — Ты пойми, Аня. Ты можешь, конечно, вернуться домой. Тогда Василию Ивановичу придется идти одному. Отправить с ним мне некого. Здесь есть неподалеку поезд, но в поезде, сама понимаешь, его могут схватить. Могут и с тобой, но один он не сумеет убежать. А ты уже несколько раз спасала его, спасибо тебе за это большое.</p><p class="p1">— Ты можешь вернуться, Анечка, — снова закивал Василий Иванович, — даже и лучше, если вернешься… Правда, вернись…</p><p class="p1">— Что ты, Василий Иванович, — сказала Анька твердо. — Конечно, я пойду с тобой. Здесь мы, наверное, кому-то мешаем.</p><p class="p1">Она не могла не подколоть Катерину. Очень уж уверенно та держалась, очень уж доброй и надежной выглядела — не будучи на деле, как выясняется, ни доброй, ни надежной. Анька знала таких уверенных в себе людей и не любила их. К тому же у Катерины на щеке была большая бородавка, и это тоже настраивало Аньку против нее.</p><p class="p1">— Вот ты какая, Аня, — сказала Катерина. — Ну, и к лучшему. Такой можно доверить Василия Ивановича.</p><p class="p1">Анька хотела сказать, что ей никто его не доверял, она сама все решила и, собираясь совершить подвиг, не спрашивала разрешения на это. Но заедаться с Катериной она не стала. Это обесценивало подвиг.</p><p class="p1">— Прямо после завтрака и идите, — сказала Катерина. — До Дегунина неблизко, кружным путем километров пятьсот. Лучше всего до Копосова поездом, а там либо по реке, либо лесом…</p><p class="p1">— Да в Дегунино-то дойду я, — засуетился Василий Иванович, — в Дегунино как не дойти…</p><p class="p1">Анька хотела отказаться от завтрака, но поняла, что гордость гордостью, а поесть надо. Путь предстоит долгий. Она уже научилась понимать цену горячей еде.</p><p class="p1">…Когда они вышли из Алабина и по заросшей бетонке зашагали к лесу, где им вновь предстояло невидимо для охраны пересечь линию запретки, — Анька почувствовала странное облегчение. Оно знакомо только очень тревожным людям, для которых дом — всегда нечто временное, а дорога — то, чего отнять невозможно. Тут ни у кого не надо было ютиться из милости. Скоро они вошли в лес, полный свиста и щебета, запахов и ягод. Василий Иванович со своим рюкзачком, покряхтывая, шел следом.</p><p class="p1">— А хорошо, Василий Иванович, — сказала Анька. — Лучше так, правда?</p><p class="p1">Василий Иванович посмотрел на нее с испугом, но ничего не сказал.</p><p class="p1">— Вместе весело шагать по просторам, по просторам, по просторам, — запела Анька. Василий Иванович шел следом и молчал. Это была не его песня.</p></span></span></span></span>
