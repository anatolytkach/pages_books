<span><span><span><span id="id103"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Деревня Жадруново ровной темной линией тянулась вдали. Линия медленно утолщалась, вырастала Женьке навстречу и вот превратилась в ряд приземистых домов, отчего-то очень длинный. Это была большая, даже огромная деревня — больше всех деревень, когда-либо попадавшихся Женьке.</p><p class="p1">В первом же дворе возилась молодая красивая поселянка с гладкими темными волосами и полуоткрытым, как бы все время улыбающимся ртом.</p><p class="p1">— Здравствуйте, — сказала Женька. Ей было жарко, она давно расстегнула воротник гимнастерки и мучилась жаждой. — Водички не дадите?</p><p class="p1">Интересно, подумала она. Хорошо захватчица входит в чужую деревню. Хенде хох, водички не найдется?</p><p class="p1">Хозяйка, ни отвечая ни слова, зашла в избу и вернулась с большой глиняной крынкой в одной руке и большой глиняной кружкой в другой. Странно, что она не налила молока прямо там, в избе. Зачем-то надо было налить именно у Женьки на глазах. Она наклонила крынку, молоко полилось в кружку, лилось и лилось, и кружка наполнялась, а потом переполнялась, причем молоко не иссякало. Оно переливалось через край, полилось на сухую землю, сначала впитывалось, потом разлилось лужицей. Женщина добродушно засмеялась. Это был такой местный фокус. Женька протянула руку за кружкой. Женщина нехотя прервала фокус и дала ей полную кружку. На вкус молоко было как молоко.</p><p class="p1">— Спасибо, — сказала Женька, вытирая губы. — А не скажете, где тут стоит Жадруновский гарнизон?</p><p class="p1">— Да тут много, — низким голосом сказала женщина. — Тут порядочно.</p><p class="p1">Неожиданно из дома вышел молодой солдат в незнакомой форме. То есть где-то Женька точно видела эту форму, но не могла припомнить — где. Вероятно, Жадруновский гарнизон по случаю бунта пошил себе гимнастерки старого образца. Кажется, в такой форме в первые дни войны ходили русские, потом ее реформировали. Кубари заменили на погоны и все такое. Гимнастерка на солдате была расстегнута, ремень висел, что называется, на яйцах, и вообще, кажется, он только что оторвался от сиесты.</p><p class="p1">— Здравствуйте, — поздоровалась Женька и с ним.</p><p class="p1">Он поднял на нее глаза и кивнул.</p><p class="p1">— Вот интересно, — сказал он равнодушно. — Говорят, ничего нет, а тут все есть.</p><p class="p1">— Где тут Жадруновский гарнизон? — спросила Женька.</p><p class="p1">— Вы есть хотите? — спросил солдат.</p><p class="p1">— Я спрашиваю, где гарнизон, — повторила Женька уже зло. Ей было неловко срываться после того, как ее тут напоили молоком, но тупость местного населения начала ее раздражать.</p><p class="p1">— Сейчас, — испуганно сказал солдат и ушел в дом. Женщина стояла и улыбалась полуоткрытым ртом. Женька томилась жарой. Через пару минут солдат вернулся с тонкой цветной брошюрой в руках. Он виновато улыбнулся и протянул его Женьке.</p><p class="p1">— Вот, — сказал он робко. — Больше нет.</p><p class="p1">Женька взглянула на брошюру. Это был журнал «Мурзилка» за семьдесят восьмой год, зимний, с детской горкой на обложке. С горки катился на санках, так сказать, хоровод веселой детворы.</p><p class="p1">Он или косил под дурака, или действительно был местным дураком, которому ради развлечения пошили солдатскую форму.</p><p class="p1">— Вы на свалке были? — спросила женщина. — Попробуйте на свалку сперва. Если вам в гарнизон, то надо мимо свалки.</p><p class="p1">Она показала рукой куда-то в поле, и Женька действительно заметила метрах в двухстах от деревни большую кучу мусора. Раньше она ее почему-то не замечала.</p><p class="p1">Никакого Жадруновского гарнизона там, конечно, не было и быть не могло. Но она повернулась и пошла от этих психов к мусорной куче, оказавшейся гораздо ближе. Все расстояния тут странно искажались — явно из-за жары. То ли воздух так зыбился, то ли голова у нее шла кругом. Свалка была удивительная, на ней валялось страшное количество всего, многое еще в сравнительно приличном состоянии. Башмак, монета, рукав шинели, шариковая авторучка, книга «Справочник по элементарной геометрии», компас, детский пластмассовый меч, двуручная пила, граммофонная труба — все валялось в полном беспорядке, хотя само по себе, в отдельности, было еще пригодно. Женька поняла, что и ей надо что-то бросить. Почему — она понятия не имела, но что-то надо было. Это было что-то вроде входного билета. Она полезла в карман и вытащила фотографию Волохова, но поняла, что этого не выбросит никогда. Больше у нее ничего с собой не было, если не считать нескольких мятых купюр. Бросать купюры почему-то было не принято, тут была другая валюта. Она с трудом оторвала от гимнастерки пуговицу и бросила в мусорную кучу. Видимо, это надо было сделать давно, потому что воздух после этого перестал дрожать и вообще все стало как-то понятнее, но все-таки не совсем, потому что смерть была бы непозволительной пошлостью, и с ней явно происходило что-то другое. Она была жива, даже слишком жива, болели пальцы, которыми она отрывала пуговицу, и по-прежнему хотелось пить, и жить, и она все помнила. Женька отошла от свалки и направилась к жадруновским дворам. В следующем дворе сидел хорошо ей известный лейтенант Горовец и чинил радиоприемник.</p><p class="p1">Она понятия не имела, что Горовец в Жадруновском гарнизоне. Он был контрразведчик, раненный при наступлении на Заверюхино, маленькую деревню, ничтожную в стратегическом отношении, но именно за нее противник почему-то бился с непостижимым упорством — принципиальная алогичность варяжского военного искусства давно была ей известна. Его оставили в избе, где разместился госпиталь, а сами пошли дальше. Наступление развивалось стремительно, хоть и непонятно, зачем и куда.</p><p class="p1">— Здорово, Горовец, — сказала Женька. Только тут она поняла, что в облике Горовца ее смутило больше всего. Черт с ним, что этот аккуратист был лохмат, с репьями в шевелюре, и дня три не брит: он починял радиоприемник, а этого не могло быть ни при каких обстоятельствах. Горовец многажды ей признавался, что даже велосипеда не мог починить в детстве — когда соскакивала цепь, всякий раз бежал к соседу. Руки у него росли совершенно не оттуда. В хазарстве это было явление нередкое, не тем сильны, но у Горовца доходило до сверхъестественной неловкости: он и оружие разбирал медленно, и вообще Женька не понимала, куда такого человека в армию. Он держался на чистой идее.</p><p class="p1">Горовец поднял голову и близоруко сощурился.</p><p class="p1">— Добрый день, — сказал он неуверенно.</p><p class="p1">— Ты что, не узнал меня:? — Женька в первый раз испугалась по-настоящему. Она знала Горовца с довоенных времен, с юности, — он хоть и не был ЖД, по нелюбви к военно-спортивным играм, но в Каганате все молодые друг друга знали, да и не только молодые, если честно.</p><p class="p1">— Почему, узнал, — сказал он все так же робко. Они все тут чего-то боялись, что ли.</p><p class="p1">— Как ты сюда попал? — спросила она.</p><p class="p1">— Да тут, видишь, — сказал Горовец, — ничего особенного, хотя с другой стороны, конечно, не сразу.</p><p class="p1">Все они тут отвечали на вопросы с тем же сдвигом на десять-пятнадцать градусов, с каким медленно покручивался местный пейзаж.</p><p class="p1">— Но так-то нормально, — сказал Горовец. — Бывают такие предметы, что надо идти на собрание. Но собрание редко. Вообще спокойно. Мне надо будет сейчас пойти, я разверну и подтолкну. Но когда смотришь, то в первое время все равно избегаешь. Иногда хочется, а иногда нет. Тут семь звезд, и там семь звезд.</p><p class="p1">Женька ничего не понимала, но чувствовала, что это хорошо: когда она начнет понимать эту сдвинутую на пятнадцать градусов речь, то станет совсем как Горовец, а этого она пока не хотела. Она додумалась вдруг, что чем дольше пробудет в Жадрунове, тем больше будет смещаться ее собственный взгляд и словарь: сначала на пятнадцать градусов, потом на девяносто, а потом занесет туда, что каждое слово и движение будут соотноситься со своим смыслом вовсе уже непонятным образом. На всякий случай она закрыла глаза и ткнула себя в кончик носа, причем попала, как всегда, безукоризненно.</p><p class="p1">— Это вот напрасно ты, — сказал Горовец с искренним сочувствием. Тут на секунду прорвалась его прежняя интонация, которую она хорошо знала. — Это не так, не туда, твоя детская кожа не может понимать…</p><p class="p1">Он жалел не столько ее, сколько себя, тщащегося и неспособного выразиться на понятном языке.</p><p class="p1">— Ты походи, — сказал он с усилием. — Походи, и будет иначе.</p><p class="p1">— Куда пойти-то? — спросила она.</p><p class="p1">— Ну, почему нет, — ответил он.</p><p class="p1">Женька повернулась и пошла в поле. Бывает такой цветок, который сначала желтый, а потом белый, пушистый. Он как-то называется. Вот, этих цветков было очень тут здесь достаточно. Небольшая группа солдат тренировалась, маршировала то вперед, то задом наперед. Пройдут пять шагов строевым шагом, остановятся, потом, не разворачиваясь, пять шагов задом наперед. Бывает такое состояние, когда очень сильно солнечно. Трудно его выразить одним словом, одним каким-то словом на букву, которую я помнила, но потом она мне перестала быть интересна. Вот я, кажется, поняла теперь, похожий шифр был описан в одной книге: первое слово еще бывает такое, как положено, а каждое следующее сдвигается на пятнадцать градусов, а следующее — еще на пятнадцать градусов от предыдущего, и так дальше, дальше, пока совсем не завернется. Мы получим тогда вот что. Мы получим фразу: «Она умерла и пошла погулять в поле», но она будет звучать «Она приехала, который улетел обратно не туда, а совсем нет». Надо попробовать теперь перевести то, что говорил Горовец, но она это уже забыла. Наверное, он не говорил ничего важного. Думать на мертвом языке, том, который она так долго принимала за живой, было теперь трудно, как идти в воде. Мысли уже закручивались той спиралью, которая и есть правильный язык, намеченный угрожать разностороннюю крышу пространства.</p><p class="p1">Куковала кукушка — сначала «Ку-ку», потом наоборот — «Ук-ук». Как хотела, так и куковала. Тут все наконец делали, что хотели, и к этому надо было привыкнуть.</p><p class="p1">Группа солдат все двигалась туда-сюда, в тысячный раз повторяя свой вход сюда и надеясь, что с какой-то стотысячной попытки у них получится ушагать обратно, но не получится. Маленькая рыжая девочка стояла рядом с ними и смотрела большими прозрачными глазами. Женька подошла к ней, девочка отвернулась от солдат и стала смотреть на нее. И чем внимательней она смотрела, и чем глубже всматривалась Женька в эти большие прохладные глаза, тем отчетливее Волохов там, у себя, в дальней деревне Соломино, чувствовал, что не чувствует ее больше. Так затягивается рана, долго мучившая болью, а потом вдруг выясняется, что без этой раны тебя здесь вообще ничто не держит.</p></span><span id="id104"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Волохов так был поглощен этим новым ощущением абсолютной бессмысленности и свалившейся на него глухоты, что не обратил внимания на Громова, ввалившегося в тот же самый Дом колхозника, где стояла постоем волоховская летучая гвардия по пути в Жадруново.</p><p class="p1">— Хозяева, есть кто? — хрипло спросил Громов.</p><p class="p1">Волохов поднял голову.</p><p class="p1">— Нет хозяев, располагайся, — сказал он.</p><p class="p1">Громов обернулся к Воронову и кивком позвал его за собой. Они вошли в широкую комнату с коричневыми стенами и полом. В комнате стояло двадцать продавленных кроватей, на некоторых лежали матрасы в бурых пятнах. На кроватях валялась волоховская летучая гвардия.</p><p class="p1">— Что за бардак? — брезгливо спросил Громов. — Дом колхозника тут или что?</p><p class="p1">Волохов не ответил. Он только сейчас стал замечать окружающее, потому что до этого видел в основном поле и избы Жадрунова с их странно плывущими пропорциями. Теперь, когда Женьки не было с ним, он с ясностью трезвого, холодного, рвотного пробуждения видел коричневые стены и щелястый пол, и облупившиеся рамы окна, и пейзаж с ржавыми колесами и рессорами за этим окном. В голову ему отчего-то пришло ржавое, шершавое слово «хоздвор».</p><p class="p1">— Капитан, вы кто будете? — спросил Громов у Волохова.</p><p class="p1">— Майор Волохов, — машинально ответил Волохов.</p><p class="p1">— Как? — переспросил Громов.</p><p class="p1">— Так, Волохов. А в чем дело?</p><p class="p1">Громов захохотал. Воронов и Волохов поглядели на него с испугом.</p><p class="p1">— Ах, ха, ах-ха-ха, — выдохнул Громов. — Вот она, провидческая способность воинского начальства. Ты хоть знаешь, капитан, что мне неделю назад было предписано соединиться с тобой под покровом ночной тьмы?</p><p class="p1">— Чего? — обиделся Волохов.</p><p class="p1">— Я тебе говорю, мне Здрок — помнишь Здрока? — приказал выступить в Дегунино и скрытно соединиться с тобой под покровом ночной тьмы. Ты же у нас летучая гвардия, нет? Жароносная Дружина?</p><p class="p1">— Ну, я, — нехотя признался Волохов.</p><p class="p1">— Ну вот! Я с тобой и соединился!</p><p class="p1">— А нахрен ты со мной соединился?</p><p class="p1">— Теперь уже не знаю. Теперь уже я в отпуске и следую в город Москву, при себе имея рядового для доставки туда же. Мне теперь и Здрок похрен, и ты, если честно, только не обижайся.</p><p class="p1">— Ну да, — равнодушно сказал Волохов. — Мне не в обиду. А ты сам-то кто?</p><p class="p1">— Я капитан Громов, командир девятой роты шестнадцатого батальона тридцать пятой гвардейской дивизии, — представился Громов. — Волохов, а почему тебя никогда в войсках не видно? Что, такой отряд скрытный?</p><p class="p1">— Нормальный отряд, — крикнул со своей койки боец Дылдин, обнимавший сестру Чапыгину.</p><p class="p1">— Я вижу, — сказал Громов. Отчего-то его перестал раздражать бардак. Видимо, чем ближе была Москва и отпуск, тем меньше в нем оставалось казарменного и уставного духа.</p><p class="p1">— Да ни хрена ты не видишь, капитан, — тоскливо сказал Волохов. — Что ж я, не слышал про тебя? Слышал. Ты у нас есть главный зубец, слуга царю, отец солдатам.</p><p class="p1">— Ну, не главный.</p><p class="p1">— Какая разница. Важно, что зубец. И никак ты не поймешь, капитан, что вся твоя служба псу под хвост. Не зависит ничего от твоей службы, понял? Ты едешь по кругу и думаешь, что исполняешь долг. А исполняешь ты мотив на шарманке, понял?</p><p class="p1">— А чего еще исполнять-то? — миролюбиво сказал Громов. — Шарманка — тоже музыка.</p><p class="p1">— Наливай да пей, — ответил Волохов. — Я с тобой с трезвым разговаривать не буду.</p></span></span></span></span>
