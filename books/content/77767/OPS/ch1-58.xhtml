<p class="p">1</p>
</div><p class="p1">— И долго ты рассчитываешь водить всех за нос? — спросила Женька.</p><p class="p1">— Года четыре, — беспечно отозвался Волохов. — Этот ваш Моше водил сорок лет… за нос.</p><p class="p1">— Не трогай мою религию, Касс Кинсолвинг!</p><p class="p1">— Ладно, Жень. Не в Каганате, в конце концов.</p><p class="p1">В деревенской бане, где они украдкой встречались второй месяц, пахло березовыми вениками. Тускло мерцало квадратное оконце зеленоватым светом июльской ночи. Скоро август, начнут падать звезды, природа зацветет в полную силу, прежде чем умирать.</p><p class="p1">— Сколько раз мне говорили — «Иди ты в баню!», — сказал Волохов. — Я и не предполагал, что это заклятие. Видишь, я в бане, и моя бы воля — никуда бы не уходил отсюда. Знаешь, что меня больше всего огорчает?</p><p class="p1">— Ну?</p><p class="p1">— Я где-то читал… у Брэдбери, что ли… что человек — это и есть машина времени. Время проходит, а человеку ничего не делается, как во время путешествия, скажем, по проселочной дороге. Я не видел тебя три года, с того раза перед самой войной, а до того еще сколько-то, и еще сколько-то. И вот как будто ничего не было — понимаешь?</p><p class="p1">— Ты, Вол, забавный, у тебя все такие америки…</p><p class="p1">— Ну, жизнь и состоит в постоянном подтверждении давно известных вещей. Как будто всех сюда послали для того, чтобы доказать пять-шесть теорем. Кто-то не доказал, его, наверное, на второй год, разбираться во всех ситуациях по второму, третьему кругу… Отсюда навязчивые повторы одних и тех же мотивов в некоторых биографиях, национальных историях… А у нас с тобой все доказывается с первого раза, значит, мы скоро умрем.</p><p class="p1">— Ну, ты как знаешь, а мне еще не надоело.</p><p class="p1">— Да и мне не надоело, но не я решаю.</p><p class="p1">— Ужасно мне чаю хочется, — сказала она, переворачиваясь на живот. — Но это же надо звать ординарца, а лень одеваться. Видишь, я заговорила стихами. Можно самой пойти вскипятить, но лень тем более. А тебя не пошлешь — при виде варяга весь штаб переполошится, я и так к тебе огородами, огородами…</p><p class="p1">— Я в следующий раз захвачу чайник, — пообещал Волохов.</p><p class="p1">— Когда ты рассчитываешь здесь появиться?</p><p class="p1">— Завтра же и рассчитываю.</p><p class="p1">— У тебя это так свободно?</p><p class="p1">— А конечно. Я сам себе начальник, летучий диверсионный отряд. Чем реже я появляюсь, тем меньше хлопот.</p><p class="p1">— И сколько, по-твоему, продлится все это удовольствие?</p><p class="p1">— Сам не знаю. Могу допустить, что это уже навсегда. Что изменилось, в сущности? Мы же и так всю дорогу воевали. Теперь война идет почти бесконтактно. Это и не война, в общем, а как всегда — вяленькое такое противостояние.</p><p class="p1">— Ничего себе вяленькое! Такое бывало…</p><p class="p1">— Ну, бывало, а сейчас больше никак. Я боюсь, случилось самое ужасное. На эту землю не хватает уже ни ваших, ни наших сил. Мы даже друг друга уже укусить не можем.</p><p class="p1">— Ты по-прежнему веришь в этот бред про коренное население? — сказала она едко. Он никак не мог привыкнуть к ее мгновенным переходам от нежности к злости — все, что касалось ЖД, их программы и мифологии, по-прежнему строго отделялось от всего личного. При ней нельзя было ругать каганат и строго воспалось развивать гипотезу о коренном населении. Коренным населением были хазары, они явились сюда вернуть свое, и в том, что туземцам было теперь плохо, виноваты были только туземцы, слишком долго губившие землю ленью и бесхозяйственностью. Никто не смог бы объяснить ей, что плохо было как раз хазарам, а туземцы чувствуют себя ровно так же, как и всегда. Конечно, дегунинцам и их ближайшим соседям грачевцам не особенно комфортно от того, что молочная ферма закрыта за нерентабельностью, зато открыты три банка и две постоянно лающиеся газеты, — но ведь такова была хазарская колонизация во все времена, и хазарское пленение некоторым казалось даже комфортней русского, при котором всех мужчин постоянно призывали в армию и заставляли маршировать, а у женщин отбирали последние запасы в пользу командования, тогда как солдаты на глазах у сердобольных крестьянок дохли с голоду. Женька самой себе не призналась бы в главном — в том, что давно уже понял консультант главного штаба Эверштейн: после легкого, почти без сопротивления, издевательски-халявного захвата этой территории, после того самого дня, которого Ждущие Дня ждали почти сто лет, а до того еще сто, а до того еще десять раз по сто, — хазарам было решительно нечего делать с этой страной.</p><p class="p1">Только здесь, в этой стране, становилась наглядна природа хазарства, избравшего антиваряжские методы, но неотличимого от варяжства по сути. Насмерть схватились два вируса, каждый из которых был незаменим при отравлении организма и годился даже для частичной победы над ним, — но ничего не мог предложить после того, как организм сдавался на милость и предоставлял себя для экспериментов. Был, помнится, такой эротический учебник для начинающих: «Ну и что мы будем делать после того, как ты затащил меня сюда?». А ничего, передавать из рук в руки.</p><p class="p1">Варяги и сами толком не знали, какова их конечная цель; еще меньше об этой цели знали хазары. Вечно маскируя это незнание разговорами об ожидании Мессии, который придет и всех рассудит, они по сути откладывали до бесконечности ответ на главный вопрос — о цели безудержной экспансии. Никакая власть над миром не может быть самоцельна, всякое племя несло захваченным народам некую истину и рисовало себе ту послезахватную картину мира, в которой есть место и колонизуемому племени, — только варяжство и хазарство не представляли, что им делать со своей победой, ибо варяжство умело только истреблять, а хазарство — только разлагать. Варяжские колонизации приводили к массовым гибелям от муштры (но и к муштре умудрялось приспособиться проклятое население), хазарские — к растлениям и отказу от малейшей дисциплины, которой и так было не густо, но обе цивилизации в ужасе пасовали перед самим фактом будущей победы. Они категорически не знали, что делать дальше. И Женька не знала, и понимала это. Впрочем, признать это было бы еще самоубийственней, чем заявить в штабе: «Я иду на свидание с местным». И так уже охранник в штабе, штабес-гой, смотрел на нее в высшей степени подозрительно — хотя комиссар полка имеет право ходить, куда хочет, ни перед кем не отчитываясь.</p><p class="p1">— Да, — сказал Волохов, — я не просто верю в бред про коренное население, но даже принадлежу к нему, хотя у меня нет никаких доказательств. Я просто одинаково ненавижу тех и этих, и этого мне достаточно, чтобы причислять себя к третьим. Я бы и тебя к нам забрал, но ты ведь не захочешь.</p><p class="p1">— Нет, извини, милый, не захочу. Я знаю, кто здесь коренное население.</p><p class="p1">— Бог с тобой, золотая рыбка, теперь это уже только твоя проблема. Закрывай фермы, открывай банки, насаждай рынок, упраздняй культуру, проповедуй каббалу. Тебе все равно нечего сюда принести. Вся ваша прекрасная идеология шикарно годится для того, чтобы выживать под спудом, и еще лучше — чтобы исподволь подтачивать чужую, но сами по себе вы ничего и никому предложить не можете. Это, прости, уже и в Каганате было видно.</p><p class="p1">— Каганат дал лучшую медицину и лучшую физику!</p><p class="p1">— Ну, не надо, не надо. Все лучшее каганат давал в чужих средах, а сам по себе очень быстро превратился черт-те во что. Плавали, знаем.</p><p class="p1">— Много ты знаешь.</p><p class="p1">— Да уж кое-что. Вы безусловные гении, когда надо выживать, потому что еще не пришло время захватывать. Вы тем более гении, когда приходит подходящее время — тогда можно захватить ослабленный организм в считанные часы. Но вы абсолютно бессильны, когда надо предложить ему новую жизненную программу; бессильней вас — только варяги, которые прямо и грубо начинают брать людей пачками, придумывать и разоблачать заговоры, вводить казарму… Люди успевают кое-что сделать только в крошечных паузах, в переходах между вами. Вы больше всего похожи на два вируса — и надо же было случиться такому чуду, что вы накрепко вцепились друг в друга. Иначе весь остальной мир давно бы пал вашей жертвой — половина варяжская, половина хазарская. Но, хвала богам, вы нашли друг друга — и никак не можете оторваться. Вас нельзя развести по разным углам — ни один из вас не будет жить спокойно, пока жив другой. Но в том и тайна вашей взаимной предназначенности, вашей зацикленности друг на друге, вашего антихазарства и варягофобии, что оба вы — народы-вирусы, ничего не способные принести человечеству; гениальные, абсолютные захватчики с пустотой за душой. Они ведь тоже не знают, что делать со страной: убивать уже сил нет, так они дошли до того, что расстреливают перед строем больше, чем в бою гибнет…</p><p class="p1">— А мы? Что плохого делаем тут мы?</p><p class="p1">— Вы? Ничего плохого. Вы всегда посильно разрушаете варяжскую государственность, которая, конечно, половину местного народа калечит, но другую половину учит, лечит и спасает от беспредела. Вы подтачиваете ее, как умеете, доводя до того, что народ начинает отчаянно самоистребляться. Наши братковские войны были формой гражданской войны, только и всего. Это вечная черта варягов — в условиях свободы они мочат друг друга. Ну вот, вы устроили тут пятнадцать лет беспредела, и что? Где великие свершения и грандиозные завоевания, которыми мы удивили мир? Вы ничего, вообще ничего не можете принести человечеству. Вы гениальные посредники и пиарщики, промоутеры и пересмешники чужих ценностей, вы отлично их перепродаете, разрушаете, низводите и укрощаете, вы даже умеете их интерпретировать, хотя и не без чернокнижия, и переводить на чужие языки, хотя и не без наглой провинциальной отсебятины. Но больше вы не умеете ничего, прости меня тысячу раз, богоизбранная моя.</p><p class="p1">— Ты рассуждаешь, как Гитлер. В точности как он! Ты читал «Застольные разговоры»?</p><p class="p1">— Читал, и не один раз. И что такого? На редкость идиотская книга. Не только Гитлер, которым вы всегда теперь отмахиваетесь от любых упреков, — тысячи людей говорили то же самое, только делали из этого разные выводы. Гитлер был маньяк и развязал бойню, другие думали так же и терпели… Мало ли было людей, которые вас не любили и притом не участвовали в погромах? «Протоколы мудрецов» тоже чистой воды фальшивка, списанная с французского памфлета, но это потому, что готовили ее дураки. А если бы кто-нибудь нашел в себе силы прямо написать о вашем вирусе, о вашей двойной морали, о вашем делении мира на своих и чужих и абсолютной солидарности вне всех критериев…</p><p class="p1">— Знаешь что! — взорвалась она.</p><p class="p1">— Знаю, что если еще раз услышу «знаешь что», надеру тебе уши, — спокойно сказал Волохов. — Давай спокойно, Жень. Я тоже, знаешь, несколько рискую, пока мы с тобой тут…</p><p class="p1">— Тебя никто не заставлял!</p><p class="p1">— Женя, может, мы перестанем наконец, а? Может, мы наконец признаем, что когда мы вместе — мы не варяги и не хазары, а нечто третье, пятое, десятое? Может, у нас появится наконец некая общая идентификация и мы прекратим наконец это идиотское выяснение, кто из нас высшая раса?!</p><p class="p1">— Ты хочешь, чтобы я ради тебя отказалась от себя, — угрюмо сказала она. — А этого не будет никогда.</p><p class="p1">— Да не от себя! — закричал он шепотом. Баня стояла на отшибе, около сгоревшего, давно брошенного дома, в который еще год назад угодил снаряд, — и все-таки приходилось осторожничать: вдруг услышат, войдут, застанут комиссара полка ЖД и командира летучей гвардии федералов в неглиже, за бурным выяснением отношений, хоть сейчас в бой. — От вшитого этого микрочипа откажись, от памяти о великой миссии, от богоизбранности, от чего угодно! Здесь ты моя, а я твой, и ничего больше!</p><p class="p1">— Это у тебя ничего больше. У вас во всем так: призвали в армию — служи, отпустили из армии — не служи… Как собака, честное слово. Я не так служу. У меня отпуска не бывает.</p><p class="p1">— И со мной — ты тоже на службе?</p><p class="p1">— Да нет у меня этой разницы — на службе, не на службе… Нас не военкомат призывает, понятно?</p><p class="p1">— Да, да, конечно. А мы — низшая раса, никуда без военкомата.</p><p class="p1">— Мы никогда не выжили бы без этого, как ты называешь, чипа! Без чипа мы погибли бы в рассеянии!</p><p class="p1">— Без чипа вы не попали бы в рассеяние, to begin with.</p><p class="p1">Он подсел ближе и обнял ее, она не отстранилась.</p><p class="p1">— Ужас, — сказала она вдруг горько и беспомощно. — Вшиты в меня две программы, и ни одна не пересиливает. Одна — ЖД, вторая — ты, и то и другое явно сильней меня. Как мне это совмещать — ума не приложу.</p><p class="p1">— Ну, потерпим, — сказал Волохов. — Говорят, если долго терпеть, само рассасывается.</p><p class="p1">— И что тут рассосется?</p><p class="p1">— Да очень просто. Повоюют и перестанут, будет все, как раньше. Будешь жить тут, на хазарских территориях, я перееду поближе к границе…</p><p class="p1">— А что я беременна — тоже рассосется? — спросила она.</p><p class="p1">Некоторое время Волохов безмолвствовал, крепко прижимая ее к себе.</p><p class="p1">— Прости, Жень, — сказал он.</p><p class="p1">— Ничего, я сама давно хотела.</p><p class="p1">— Да не за то, Господи… Это да, это как раз отлично. Прости, что я это… распространился.</p><p class="p1">— Ты еще не так распространишься. — Единственное хазарское, что в ней было, — так это кажущаяся отходчивость, легкость перемены настроения, да еще неутомимость, конечно. — Ты будешь теперь все чувствовать, как я. Мы же связаны крепче некуда, это самый абсолютный союз. И будь уверен, когда у меня начнется токсикоз, тебя тоже начнет тошнить — не только от хазарства, но и от твоих друзей варягов, и от коренного населения, в которое ты веришь…</p><p class="p1">— Да от коренного населения, если это тебя утешит, меня давно тошнит. Меня эта пассивность чертова, неумение распорядиться своей судьбой, идиотская мечтательность — давно уже достали вот как. Ни одному слову верить нельзя, и не потому, что врут, а потому, что сами не понимают, что говорят. Я их ненавижу, если хочешь знать, и себя ненавижу за бессилие. Когда мне один наш местный глаза на это открыл, — я, веришь ли, ликовал. Нашел брата! А как присмотрелся к этим братьям, которые готовы вечно прожить в кабале у вас ли, у кого ли другого, — лишь бы самим ни за что не отвечать… Где те великие свершения, которыми это все оправдано? Тоже нуль. Культуру сделали раскаявшиеся варяги и передумавшие хазары — единственные, кто тут что-нибудь умел. А наши — так, фольклор да сумасшедший Хлебников. Что это за народ, интеллектуальная элита которого живет в метро на кольцевой и ездит по кругу?</p><p class="p1">— Как ты сказал? Интеллектуальная элита?</p><p class="p1">— Да, объясню как-нибудь. Говорят, сейчас на них облавы начались — варяги, как всегда, борются не с внешним врагом вроде вас, а с теми, до кого могут дотянуться.</p><p class="p1">— Это ты мне расскажешь, да. Но не расскажешь ли ты мне, что мне делать с нашим будущим метисом? — Она похлопала себя по животу.</p><p class="p1">— Ну, что делать… Сама понимаешь, возвращаться в каганат я тебе не посоветую.</p><p class="p1">— Никакого каганата больше нет. Ему осталось лет пять от силы.</p><p class="p1">— Да, это верно. И почти все здесь.</p><p class="p1">— Конечно. А ты чего ждал?</p><p class="p1">— Именно этого и ждал. Я думаю, ты дождалась своего дня и можешь теперь жить тут, как и мечтала, полноправной гражданкой. У меня в Москве квартира. И мы бы с тобой туда вернулись.</p><p class="p1">— А как же наш гениальный план водить людей четыре года по долинам и по взгорьям?</p><p class="p1">— Ну, я периодически возвращался бы к тебе… Пойми, я ведь только для эксперимента. Если эту нацию не сформировать, она так и останется ни к чему не годной. Уже два года ходим, и прогресс налицо. Затвержены простейшие правила, в зародыше имеется дисциплина и чувство ответственности. Я подсчитал, в Ветхом Завете десятикратные преувеличения не редкость. Мафусаил прожил лет девяносто шесть, не более. За сорок лет хождений по пустыне люди поняли бы, что их водят по кругу, и ни один народ не выдержит сорокалетнего странствия. А вот четыре года походить с людьми, небольшим отрядом, без разлагающей оседлости… Я, впрочем, буду все время заходить в Москву. А может, вообще брошу всю эту затею. Пусть нация начнется с нас. С меня, с тебя и с него.</p><p class="p1">— Почем ты знаешь, может, будет она, а не он.</p><p class="p1">— Меня все устроит. Кто бы ни был.</p><p class="p1">— Ага. И я, значит, дезертирую.</p><p class="p1">— Почему дезертируешь? У вас в армии декрет не предусмотрен?</p><p class="p1">— У нас в армии по законам военного времени это считается дезертирство. И потом, даже если я как-то отмажусь от этого, как я объясню свой переезд в Москву? Перебегу на сторону врага, да?</p><p class="p1">— Я тебя так вывезу, что никто не узнает.</p><p class="p1">— Каким образом?</p><p class="p1">— Неважно, найду, придумаю. Я ведь все-таки из местных, меня тут все слушается, включая удачу. Приходи завтра, все придумаем.</p><p class="p1">— Приду, если смогу. Но учти, ничего придумывать я не намерена. Я останусь со своими — по крайней мере, пока смогу.</p><p class="p1">— Не вздумай вытравлять ребенка! — еле слышно запретил Волохов.</p><p class="p1">— Не вздумаю, — кивнула она. — Это у нас не принято. Но насчет тихой семейной жизни в Москве ты все-таки не обольщайся. Я — ЖД и всегда буду ЖД.</p><p class="p1">— Хорошо, я потерплю.</p><p class="p1">Ему вдруг стало невыносимо жаль ее. Он понял, куда она возвращается. Она возвращалась в ту самую вертикальную иерархию, которая не знала уже никакого сострадания, в торжество имманентных ценностей, где правил голос крови, тот самый вживленный чип. У варягов были еще хоть какие-то критерии — они ценили во враге отмороженность, замороженность, завороженность… У хазар критерий был один: наш — не наш. И не наш, обладай он всеми добродетелями, о необходимости которых так долго говорили хазары любого призыва, никогда не мог удостоиться одобрения: верно, только так и мог выжить народ, который все истребляли, — но ведь этот народ, как отлично знал теперь Волохов, подставлялся под истребления и нарывался на них только для того, чтобы тем безжалостней мстить от имени истребленных. Частью всего этого была Женька, и то, что при всем своем ЖДовстве она была человеком, — становилось главным залогом ее будущей гибели. Да еще она и беременна теперь — нет, уводить, только уводить.</p><p class="p1">— Жень, а ты не могла бы уйти со мной? Пожалуйста?</p><p class="p1">— Давай лучше ты уйдешь со мной. Я как бы захватила командира летучей гвардии. Он чапал тут огородами морковку воровать, я схватила его за морковку и привела в штаб. Давайте все, товарищи, посмотрим на живого варяга.</p><p class="p1">— Я не варяг, ты знаешь.</p><p class="p1">— Это ты себе придумал, чтобы не казаться захватчиком. Очень понятный психологический трюк.</p><p class="p1">— Слушай, я серьезно говорю. Тебе же так и так скоро нельзя будет там находиться.</p><p class="p1">— Не беспокойся, я найду убежище.</p><p class="p1">— В Европе? Типа у коллег?</p><p class="p1">— Нет, отсюда я никуда уже не денусь. Я дождалась дня, это моя земля, и я с нее не уйду.</p><p class="p1">— А, понятно. Ты дождешься вашей полной победы и примешь меня в семью, но только в качестве угнетенного. Дворецким назначишь? Или сразу в дворники?</p><p class="p1">Она хотела влепить ему затрещину, но он удержал ее руку.</p><p class="p1">— Ладно, не дерись, я от тоски.</p><p class="p1">— Идиот.</p><p class="p1">— А чего ты хочешь? Ты ведь была и будешь ЖД, сама сказала. Следовательно, можешь меня рассматривать только в качестве потенциального дворника, — нет?</p><p class="p1">— Да какой из тебя дворник, ты в комнате ни разу не убрал, когда жил у меня…</p><p class="p1">— Ну, тогда это не было моей обязанностью.</p><p class="p1">— Если мы победим, — а мы победим, — сказала она серьезно, — я, конечно, буду растить ребенка одна. Ты мне не нужен в качестве побежденного. А ты, вероятно, будешь скитаться с остатками своей гвардии, вынужденно бегая по России, потому что придется скрываться. Иногда будешь забегать ко мне, и мы будем опять урывками встречаться в какой-то бане. Сыну я буду рассказывать, что ты на опасном задании, а дочери — что ты сволочь и вообще все мужики сволочи. Потом ты пробегаешь со своей сворой четыре года и добегаешься до национального сознания. Придешь и убьешь меня, потому что это единственное, что надо со мной сделать. А ребенка похитишь и будешь воспитывать в лесах, чтобы получился Тарзан или Тарзанка. Универсальный мститель.</p><p class="p1">— Никогда. Я наймусь дворецким в соседний дом и буду тобой любоваться, когда ты будешь ходить мимо… за молоком…</p><p class="p1">— Когда мы придем к власти, молоко будет течь из крана, — сказала она.</p><p class="p1">— Господи, как я люблю тебя, Женя.</p><p class="p1">— И я тебя тоже, Володя. — Она редко называла его Володей, и он боялся, когда это случалось. Он вспомнил, как она прощалась с ним тогда, в каганатском аэропорту; он готов был разнести по бревну жалкую баньку, служившую им убежищем, и сжечь всю эту проклятую сырую землю вокруг, из-за которой они должны были теперь вот так… да и всю жизнь вот так…</p><p class="p1">— И спросить некого, да? Никто ведь не учил, как теперь со всем этим жить, — сказала она.</p><p class="p1">— Тысячи людей жили, и ничего.</p><p class="p1">— Тысячи людей жили до войны. А теперь война, причем, как всегда, гражданская.</p><p class="p1">— Тоже было. «Сорок первый».</p><p class="p1">— Нет, совсем другое дело. Там они оба варяги, только разного происхождения. Такое еще бывает. А мы два разных племени, совсем разных, и такое родство… Самое ужасное, что ты ведь тоже выполняешь программу, только не знаешь, какую. Я знаю, а у вас она скрыта. Наверное, такой ужас, что вы можете не выдержать. Что-нибудь гораздо страшнее, чем у нас.</p><p class="p1">— Нет у меня общей программы, — сказал Волохов. — Моя программа — быть с тобой, и только.</p><p class="p1">— Нет, так не бывает. Ладно, мне пора.</p><p class="p1">— Никуда тебе не пора.</p><p class="p1">— Точно пора. Главная драма в мире знаешь что? Что надо вставать.</p><p class="p1">— Я первым выйду.</p><p class="p1">— Никуда ты не выйдешь первым. Здесь наша территория. Если тебя возьмут, а я в это время в бане — что люди подумают? Помыться пошла? Сиди и выходи только по моему звонку. Я тебе по мобиле прозвонюсь, у меня не слушают.</p><p class="p1">— Женька!</p><p class="p1">— Все, Вол, все. Завтра на том же месте, в тот же час.</p><p class="p1">Она быстро обхватила его голову, чмокнула в угол рта и вышла, прихватив уродливую полевую сумку-планшет. Волохов сидел на полке и тихо ненавидел себя. Через десять минут заверещал мобильник.</p><p class="p1">— Да!</p><p class="p1">— Выходи, все чисто. До завтра.</p><p class="p1">— Женька! — простонал он, но она уже отключила связь. Волохов вышел из баньки и огородами пошел в Дегунино — деревню в трех верстах от Грачева, где расквартировалась по избам его летучая гвардия, будущий оплот национального самосознания.</p></span></span></span></span>
