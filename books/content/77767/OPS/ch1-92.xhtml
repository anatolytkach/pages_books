<p class="p">Глава четырнадцатая. Деревня Жадруново</p>
</div><span id="id145"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Глубже и глубже шел Волохов со своей гвардией в среднюю Россию, называвшуюся так потому, что окраинная осталась позади. Устройство этой земли только теперь открывалось ему. Он понял, что в согласии с циклическою историей и структура ее была концентрична, подобно обожествляемому здесь дереву, и нарастала подобно годовым кольцам. Варяжский, хазарский или иной вражеский клин мог войти в эту древесину глубоко, но сердцевины ее не затрагивал; в сердцевине-то и находилось Жадруново, к которому держал он теперь путь.</p><p class="p1">Чем дольше он шел, тем лучше понимал замысел, небольшой частью которого был. Прежде казалось Волохову, что предназначение его в создании нации, которую надо четыре года или сколько уж там получится водить по российским пустошам; у Одиссея было море, у Моисея — пустыня, а у русского человека лес да поле, зеленая равнина, пересеченная извилистыми тропами и железнодорожными путями. В некий момент воссоединение с возлюбленной показалось ему важнее всякой нации, которая еще неизвестно, создастся ли; подумав, он рассудил, что одно другому не мешает — может, странствуя в поисках Женьки, он как раз и сформирует отряд истинных воинов, бесстрашных мужей. Путь его все сбивался с прямой линии на спираль, Волохова как бы сносило течением земли, не менее мощным и ощутимым, нежели водное: то между городами не было прямого сообщения, то приходилось спускаться вдоль разлившейся от дождей реки до моста, то, добравшись уже было до железной дороги, по которой попала в Жадруново его возлюбленная, он узнавал, что сообщение прервано, ибо таинственные партизаны постарались и тут. К Жадрунову он приближался медленно, но неуклонно, нарезая вокруг него сужающиеся круги; глубже, глубже в центр спирали погружался Волохов со своими людьми, понимая, что прямого пути в искомую точку у него нет. Странно устроена русская земля, у всякого тут свой путь: где один пройдет прямо, перед другим вырастет неодолимое препятствие, где одному мост — другому брод, третьему переправа, а четвертому омут; один может попасть в Жадруново прямым путем, другой кружит вокруг не один месяц, пока неумолимое тяготение не приведет его к месту; общего для всех маршрута нету ни для кого, потому-то и железных дорог тут больше, чем нужно, вся страна, как меридианами, оплетена их сетью, но если кому нет пути, то не доедет он ни по какой дороге, ни конным, ни пешим. Многие путешественники по России вспоминали о том, как водил их леший, сбивал с дороги буран, останавливал то мороз, то жара, — российская земля труднопроходима, хотя по природным своим кондициям мало отличается от всякой иной. Она сама решает, кому куда идти.</p><p class="p1">И Волохов доверился земле, понимая, что в Жадруново к Женьке она выведет его так и так, и уж верно, это зачем-нибудь нужно, — но попадет он туда не прямым, а кружным, спиральным ходом, теряя по дороге спутников и обретая знание. Он подходил к Жадрунову третий месяц — что ж было не подходить? Жарким и благодатным выдалось то последнее лето, и новым своим знанием, появлявшимся Бог весть откуда, Волохов знал, что оно последнее. Знал он и то, что есть жизнь и после, — но это будет совсем другая жизнь, столь отличная от прежней, что даже бледных ее контуров не мог он разглядеть в будущем. Словно пелена стояла между ближайшей осенью и будущей весною. Пока же все цвело, словно напоследок; Волохов шел прогретыми хвойными лесами, полями, в которых сладко пахло сухой травой и пылью, прозрачными пустынными березняками, в которых встречались ему подчас поселения странных людей, забывших, откуда они и как их зовут; шел, ничему не удивляясь и ни о чем не думая, не упуская из виду единственной цели и подходя к ней ближе, ближе, как спутник, обреченный упасть на Землю. И чем ближе он подходил, тем ясней понимал, что и за деревней Жадруново есть какая-то жизнь, но угадать ее невозможно, как невозможно из нынешнего лета увидеть будущее.</p><p class="p1">Он не то чтобы чувствовал Женьку, приближаясь к ней, — он знал о ее присутствии; вместо глухой пустоты ощущал он теперь странные сигналы, которыми она не то чтобы предостерегала его, а скорей направляла единственно правильным путем. Она не снилась ему и не говорила с ним мысленно; он чувствовал, что там, в Жадрунове, будет уже не совсем Женька, как и Фаусту в раю встретилась не совсем Гретхен, а всего лишь одна из грешниц, прежде так называвшаяся; но какая-то часть ее души была то ли самой живучей, то ли просто вечной, и эта часть находилась в сложном соотношении с его собственной душой, а потому и подавала искаженные сигналы, доходившие, как голос с того берега. Дальнее ауканье за туманом он слышал все ясней — а потому шел, хоть и знал заранее, что увидит не то, чего ждет, и вообще все будет иначе, а может, и вообще друг друга они не узнают, как было однажды предсказано.</p><p class="p1">И еще один странный звук слышал Волохов — слышал его все время, наяву и во сне; он был неотвязен, но ненавязчив, как тонкая песня проводов над равниной, как ветровое посвистывание, как пение снега, гонимого по ровному зеленому льду. Это был стон не стон, жалоба не жалоба, а ровный кроткий напев, приманивающий и засасывающий одновременно. Сама земля словно пела ему на одной ноте, и это можно было принять за сигнал — правильной, мол, дорогой идете, братцы, а можно и за тихий бессильный протест, а можно — и лучше всего — за мурлыканье одиноко играющего ребенка, которому в тихих его играх и дела нету до посторонних. В песне этой, однако, Волохов чувствовал странную нежность, легкую снисходительную радость — с такой улыбкой на него редко кто смотрел, но ею-то он и дорожил больше всего. В ней было лукавое одобрение — надо же, не ждали, а вот ты какой. То яснее, то глуше доходила до него эта песенка, но когда она начинала звучать отчетливей — он знал, что на верном пути, и по ней ориентировался.</p><p class="p1">Как-то раз он вышел со своей гвардией к ровному, черному, как тарелка, лесному озеру — в их устных преданиях оно получило название аукающего. Кто-то громко и радостно кричал «Ау!» с одного его края, кто-то так же весело отзывался с другого, — голоса были звонкие, девичьи, юношеские, раздавались они внезапно, с неравными интервалами и в непредсказуемых местах. Вот кто-то откликнулся совсем рядом с ними: они оглянулись — никого нету. Тогда сами они в детском восторге стали кричать: «Ау! Ау!» — и голоса звонко, ликующе стали откликаться им наперебой, то с одной, то с другой стороны, словно так и звала их к себе невидимая компания, разбредшаяся по грибы ли, по орехи, но никто так и не появился — только легкая рябь прошла по озеру, или ветер ее пронес?</p><p class="p1">— Не надо нам сюда ходить, — сказал Волохов. Страха он не чувствовал, но понимал, что попал в один из входов, вход этот ложный, сейчас он ему по случайности открыт, но предназначен другому; с сожалением поднялась летучая гвардия после короткого привала и направилась прочь от черной воды, над которой висели причудливо изогнувшиеся березы и вились голубые стрекозы. Голоса печально поаукали им вслед, да и стихли.</p><p class="p1">Входов таких было много, и Волохов за полтора года предшествующих странствий научился их различать, но только теперь понял, что вся Россия пересечена не только железными дорогами, но и воздушными тоннелями, позволяющими попасть напрямую в отделенное и труднодоступное место; иной человек, которому положено, по такому тоннелю мог за сутки дойти с одного конца страны на другой. Земля эта непредсказуемо выстраивала и прятала мостики и проходы; Волохов не догадывался, что договариваться с ней и чувствовать маршрут он умеет не потому, что набрался опыта, а потому, что после долгого странствия в нем проснулся истинный волк, человек той породы, о которой рассказывал ему Гуров. Но он теперь и Гурова не очень-то помнил, и слова его накрепко забыл — смотреть по сторонам было интереснее, чем вспоминать.</p><p class="p1">Много чудных чудес встречалось им по пути: видели они одинокую лесную избу, в которой решили заночевать — и перенеслись вместе с нею за двадцать верст, в новый лес, в незнакомую местность; видели серебряный лунный березняк, в котором одним слышалось пение, другим струнный оркестр, а третьим строевой марш; видели реку, над которой плыл колокольный звон, а никакого колокола в окрестностях не было. Впрочем, многое было объяснимо: когда долго странствуешь, поневоле всему веришь и на любой морок поддаешься. Ходить им не надоедало, Волохов набрал себе хороший отряд; одно было странно — чем дольше они ходили, тем различнее были их видения. Доходило до того, что один видел перед собою лес, а другой поле. Поразмыслив, Волохов понял и это: в процессе хождения, как он и предполагал, все они стали наконец людьми, догулялись до истинного своего облика, а люди все разные и на вещи смотрят неодинаково. До того дошло, что запевала рядовой Шмаков пошел в малинник, да так и пропал: виделся ему там не малинник, а троллейбус, он и сел в этот троллейбус и уехал восвояси. Остальные пошли в малинник — куда там! Только провода пощелкивают да машины гудят, но где-то очень вдалеке, там, куда уехал Шмаков. Горевать по нему не стали: верно, попал человек туда, куда ему надо было.</p></span><span id="id146"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Долго ли, коротко ли шел Волохов, а только в конце концов пришел он со своей летучей жароносной дружиной в те места, в которых никто уже не удивлялся солдатикам. То была срединная, самая глубинная Россия, до которой доходил не всякий враг; ни хазары, ни варяги тут не задерживались — не потому, что тут было плохо, а потому, что им было тут неуютно. Шла и шла летучая гвардия, постоем заходила в деревни, и в каждой деревне спрашивали их по-разному.</p><p class="p1">— Это што ж, с войны, што ли? — говорил косматый дед-пасечник, угощая их свежим медом и разливая холодное, из погреба, молоко.</p><p class="p1">— С войны, дед, — отвечал ему Яков Битюг.</p><p class="p1">— И што, жмет немец?</p><p class="p1">— Да какой немец, дед? — удивлялся Битюг. — Немца побили давно.</p><p class="p1">— А-а, — кивал дед. — Глубоко живем, ничего не знаем. И вести не доходят, и радио што-то молчит. Раньше еще говорило, а теперь молчит. Давно побили-то?</p><p class="p1">— Да лет семьдесят уж, кабы не больше.</p><p class="p1">— Ну, и хорошо. А то ведь он и досюда не дошел, ходу сюда ему не было. Так вот и не знаем.</p><p class="p1">Битюг починил деду забор, перекрыл крышу, постучал молотком в сарае, подлатывая стены, — старик сетовал, что у самого уже сила не та. Деревня их, от которой пасека стояла в трех верстах, была полупустая, как большинство русских поселений: одни уехали, другие умерли, но тут еще теплилась жизнь, крепко устроенная.</p><p class="p1">— Что ж, уходят все? — спросил Волохов.</p><p class="p1">— Иные уходят, иные и приходят, — загадочно отвечал дед.</p><p class="p1">— Командир, — сказал Битюг, отведя Волохова в сторону. — Жалко деда, один живет. Я б ему на пасеке помог, да потом бы тебя догнал. Хорошо тут, командир, чую — мое тут место. Не серчай, я останусь. Прежде нигде остаться не хотел, а теперь знаю — пора.</p><p class="p1">— Так и оставайся, — широко разрешил Волохов. — Видно, и впрямь такое твое место. А если последние времена близко, подобное должно лепиться к подобному.</p><p class="p1">И Битюг остался.</p><p class="p1">Долго ли, коротко ли шли они без Битюга, а только пришли в другую деревню, еще поближе к Жадрунову, но поближе не напрямую, а, как бы сказать, по касательной. В этой деревне выбежала им навстречу девчонка в красном платьице в горошек, совсем молодая, лет пятнадцати.</p><p class="p1">— Ой, никак солдатики! — крикнула она. — Солдатики, а солдатики! Што, побили вы немца?</p><p class="p1">— Давно побили, красавица, — ответил за всех Михаил Моторин. — А у вас, чай, и не слыхивали о том?</p><p class="p1">— Не слыхивали, — покачала головой девка. — Говорят, у немца таньки и еропланы.</p><p class="p1">— Дак и у нас таньки, — в тон ей отвечал Моторин, подходя поближе и оглаживая ее ласковым взглядом.</p><p class="p1">— И газы ишо, — сказала девка. — Как пустит немец газу, так все и полягают.</p><p class="p1">— Никак нет, газы запрещены, — пояснил Моторин. — Молочка бы нам, или кваску…</p><p class="p1">— А как жа вы говорите, што побили его, а сами вон куда зашли?</p><p class="p1">— Это мы по домам расходимся, милая, — сказал Моторин.</p><p class="p1">— Долго воевали, — недоверчиво сказала она. — Отец бабки моей, мой прадед, как ушел, так и вести нету. Ишо до революции было.</p><p class="p1">Волохов с ужасом, а пожалуй, что и не с ужасом, а почему бы с ужасом, наоборот, с легким даже весельем догадался, что девка говорит о первой мировой войне, которая, по ее представлениям, все никак не заканчивалась; именно ею объяснялись все жертвы и пертурбации, включая колхозы и их последующий крах. В срединной России все давно уже объяснялось войной.</p><p class="p1">— Ну, теперь заживем, — сказал Моторин. — Отвоевались. Тебя как звать, красавица?</p><p class="p1">— Ксенией добрые люди называют, — хихикнула она.</p><p class="p1">— Ну, Ксения, пойдем, выпьем за победу! — сказал Моторин, и все они пошли пить за победу. Конца тут не было увлекательным рассказам про войну. В деревне жило пять стариков да шесть старух, да общая на всех внучка Ксения, чьи родители давным-давно из деревни уехали — тоже, видать, на войну. А куда ж ишо можно уехать из деревни, если не на войну. Прислали оттуда одно письмо, звали бабку Прянишну к себе, но бабка Прянишна для войны была уже старая и никуда не поехала. Если немец придет сюда, так она его ухватом, но чтой-то маловероятно. Никто еще не доходил, даже и в революцию приехал комиссар, плюнул и уехал.</p><p class="p1">— Ты не серчай, командир, — после застолья сказал Волохову снайпер Моторин, — но я чувствую к этой девице влечение и, если будет на то благоугодное твое согласие, останусь здесь.</p><p class="p1">Он уже заговорил в местном духе, это было заразительно. Пахло в деревне великолепно, и медом, и дегтем.</p><p class="p1">— Дак оставайся, — благословил его Волохов и после уютного ночлега на сеновале пошел с неуклонно уменьшающимся отрядом дальше.</p><p class="p1">Долго ли, коротко ли шел Волохов со своей убывающей гвардией, а только пришли они в следующую деревню, где жил одинокий бобыль с мальчиком. Мальчик был немой, а бобыль глухой и все толковал про какого-то хранцуза. Еще у них была говорящая собака. Правда, при Волохове и его гвардии она из застенчивости не говорила, но смотрела так, как будто при случае могла.</p><p class="p1">— Хранцуза мы победили, мальчик! — сказал Волохов. — Объясни ты ему, что уже давно победили, теперь не страшно.</p><p class="p1">Мальчик жестами показал бобылю, что француз не тяжеле снопа ржаного: взял вилы, покидал ими сено, объяснил, что сено изображает француза. Бобыль покивал — значит, понял.</p><p class="p1">— Уж ты прости меня, майор, — сказала медсестра Анюта с характерной для нее прямотою и резкостью, — но я останусь с мужиками. Трудно им одним, нет женской ласки.</p><p class="p1">Бобыль, хоть и глухой, покивал в том смысле, что нет.</p><p class="p1">— Он не сын мне, а так приблудился, — без связи с разговором заметил бобыль. — А мне одному что ж не взять.</p><p class="p1">Собака тоже покивала в том смысле, что бобыль не врет. Она была и слышащая, и говорящая, самая из всех полноценная, но не умела сама добывать пищу, ибо, обретя дивный дар разумной речи, не находила уже в себе сил загонять беззащитную дичь. Так они и жили, обеспечивая друг друга и не умея обходиться один без другого. Анюта должна была увенчать собою этот симбиоз, потому что когда люди и звери только обеспечивают друг друга — жить им скучно. Должен быть кто-нибудь, кто всем этим любуется и плодами их дел благодарно пользуется. И она осталась, а Волохов побрел дальше.</p><p class="p1">В двадцати следующих деревнях растерял он всю свою гвардию и не жалел о том. Все они нашли свое место на свете, а он никак не находил, и, стало быть, все его странствие было затеяно для того, чтобы достойные представители нации разошлись по деревням, оплодотворяя собою инертную русскую жизнь. Во всех деревнях радовались, что солдатики пришли с войны: интересовались только, побили ли уже ляхов. А то ходили тут, собирали ополчение, и робята ушли, но не вернулся еще никто. Волохов объяснил, что ляхов побили, а ополчение, наверное, осталось в Москве. Не могли же они погибнуть, в самом деле. И то, сказали старики, должно, в Москве. Если бы погибли, то уже вернулись бы. Обязательно все возвращаются лет через триста, а иные и раньше, иначе и народу бы уже не было. Откуда же Господу взять столько нового народу? Рожают-то давно уже меньше, чем помирают, а народ все не вымрет: стало быть, это мертвые належатся в земле да и приходят по домам. Показали ему и кладбище, с которого все иногда возвращаются; у одной могилы сидела старуха и ждала мужа, утонувшего шестьдесят лет назад, пора было бы ему и встать, а то ведь может и не дожить. Увидевши деревню, где покойники приходят назад, навоевавшись, наотдыхавшись и восстановившись, Волохов смекнул, что Жадруново близко.</p><p class="p1">Скоро он остался один, и так-то легко стало ему идти.</p></span></span></span></span>
