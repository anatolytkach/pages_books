<p class="p">2</p>
</div><p class="p1">Этих хорошеньких хазарят она ему показала, как обещала, в самом скором времени. Публика была странная, отчасти знакомая ему по Москве; странной она казалась ему только теперь, когда он пытался представить хазар представителями коренного населения. Большинство ЖД — по крайней мере тех, которых ему предъявила Женька, — были не старше сорока, но это как раз и понятно — не могла же она слишком выпрыгивать за границы своей возрастной категории. Чем больше Волохов на них смотрел, тем меньше их любил — и тем больше ненавидел себя за это. Выходило, что Эверштейн его вроде как инициировал (само слово «инициация», бесперечь встречавшееся как в русских эзотерико-патриотических изданиях, так и в хазарском талмудическом литературоведении, Волохова раздражало до головной боли: в нем была первобытная магия, риффенштальская любовь к ритуальным танцам у костра — странно роднившая Дудугина с Лоцманом). До последнего времени Волохов и помыслить не мог, что когда-нибудь хазары станут так раздражать его; но чем чаще ходил он с Женькой на сборища ЖД, тем яснее замечал в себе поначалу тайную, пиковую, а потом все более явную недоброжелательность. И понять, чем его так раздражала эта тусовка, он до поры не мог, отделываясь внешними придирками: так Писарев ругал Пушкина за сюжетные ляпы, хотя бесила его, шизофреника и аскета, пушкинская легкость и успешность в делах любовных. Он отмалчивался в ответ на Женькины расспросы, понимая, что она обидится, — а главное, не умея сформулировать собственных претензий к этим добрым и веселым, слишком добрым и слишком веселым ребятам.</p><p class="p1">Дело было, конечно, не в том, что он видел в них будущих победителей и своих гонителей: надежда на реванш ЖД представлялась ему чем-то вроде ожидания мессии — удобной, почти ни к чему обязывающей национальной конвенцией. Бытие нации получало как бы отсроченный смысл. Дело было в ином: его раздражала именно эта веселая легкость, гостеприимство, вечная игра — отношение к миру, естественное для балованного ребенка. Было чувство, что все они выросли вместе, в одной системе паролей, в пространстве цитат; некоторые так все время и говорили цитатами. У всех были прекрасные отношения с родителями. Все принадлежали к советской элите — то есть и в России чувствовали себя очень неплохо; некоторые гостили в Каганате, иные по полгода проводили здесь и там, а кое-кто вообще проводил большую часть времени в беспечных гастролях по всему свету. Все говорили, будто постоянно перемигиваясь: строчки, фамилии и филологические термины служили для этой же цели. Для непосвященного разговор был темен: непосвященному деликатно указывали на место. Волохов был более или менее в теме: классику читал, историю знал, в РГГУ не учился, но на лекции туда бегал в порядке самообразования; многие фамилии и цитаты, впрочем, ни о чем ему не говорили, но чужим он чувствовал себя не поэтому. Он сам не взялся бы объяснить, в чем тут дело. Отчасти причина была в том, что все ЖД с русской культурой — особенно с той ее частью, которую создали хазары, — были подозрительным образом запанибрата. Это была их среда, где они распоряжались весело, уверенно, по-хозяйски… он даже ловил себя на том, что само слово «хозяин» звучало для него теперь как «хазарин». Он завидовал им дико, страстно, не признаваясь в этом и себе.</p><p class="p1">Вообще он заметил вдруг, что Кочетов и Шевцов, неутомимо описывавшие такие же сборища московской богемной молодежи, испытывали, вероятно, те же чувства и наталкивались на то же веселое недоумение в ответ: ну чего беснуетесь? Это была реакция будущих победителей, ответ сильной стороны, не удостаивающей противника даже злобы. Просто Кочетову и Шевцову не хватало таланта по-настоящему их зацепить, изобразить среду: даже карикатуре необходима точность, одной злобой сыт не будешь. Ну, например: прежде всего Волохова бесило их высокомерие, но в чем проявляется это высокомерие — он не объяснил бы. Возможно, дело было в том, что с ним не спорили; он произносил реплику, возникало ироническое, перемигивающееся молчание, кто-то весело говорил «Да ладно», и разговор менял русло. Захватчик, что взять. Никто не говорил ему грубого слова. Его просто не принимали всерьез, тогда как между собой спорили яростно, подчас забывая об его присутствии. В первый же день, когда Женька знакомила его с ЖД, он стал свидетелем спора о Каганате: тридцатилетняя переселенка Елена, оказавшаяся тут пять лет назад по беспримесно идейным соображениям, наскакивала на сорокалетнего, тихоголосого, очкастого программиста Илью, приехавшего в гости. В Москве они принадлежали к одному кругу и здесь, разумеется, увиделись — а увидевшись, сразу заспорили.</p><p class="p1">— Только здесь я стала человеком, ты понимаешь? — кричала Елена. — Ты можешь сколько угодно врать себе и всем, что не боишься жить там, но ты не можешь не видеть, что все они на самом деле ненавидят тебя, и ты делаешь все, чтобы понравиться им! Каждый твой шаг там — заискиванье. Ты хочешь быть, как они, говоришь, как они, пьешь, как они, ты готов ассимилироваться до полного скотства, ты хочешь стать даже большей скотиной — и все это время смотришь на них с мольбой: скажите, я уже достаточно надругался над собой, чтобы вы мне позволили тут пожить?</p><p class="p1">Все это она выпаливала на страшном и очевидном самоподзаводе, жадно куря, размахивая сигаретой, бешено жестикулируя, и голос у нее был низкий, страстный, идеально подходящий для оплакиваний и проклятий, — и видя таковую страстность по столь абстрактному поводу, Волохов не верил ни одному ее слову. Ужасна была эта ежеминутная готовность хазарских женщин к истерике, причем по любому поводу; можно было списать ее на южный темперамент, вон сколько скандалят на любом приморском базаре, — но базар хазару не ровня: на базарах торг шел не об истине и потому не требовал надрыва.</p><p class="p1">Илья — он был по идеологии ближе к ЖД, шепотом пояснила Женька, просто продолжал жить в России и потому в их компании не состоял, — флегматично отвечал, что его предки жили на этой земле, и он не понимает, почему должен оставлять ее на откуп мерзавцам и бездарностям; если все уедут, существование этой страны будет уже вовсе нечем оправдать… «И прекрасно! И пусть все уедут! Тогда, может быть, ее перестанут щадить ради нескольких праведников, и с ней случится то, что давно должно случиться!». На это Илья грустно улыбался и отмалчивался. Но Елена не переставала наскакивать на него, размахивать руками, дымить, — ее не остановили даже тихие слова одного из ЖД, высокого, мрачного красавца с томными восточными глазами: «Солнце, не забывай, что это все-таки не их страна». Они часто обращались друг к другу так — «солнце».</p><p class="p1">— Мне плевать, чья это страна! — крикнула Лена, переключив ярость на мрачного юношу. — Я живу мою жизнь, и я буду жить ее там, где мне не приходится каждую секунду выпрашивать себе право на существование!</p><p class="p1">— Живи свою жизнь, — спокойно отвечал юноша, — но не навязывай всем бегство как единственно верный путь.</p><p class="p1">— Почему ты говоришь «бегство»?! — ярилась Лена. — Я выбрала жизнь среди моего народа, я вошла в этот народ, я расчистила в себе свою душу, которая от долгого страха почти исчезла, — какого хера я должна была делать там, где меня все равно никогда не признают своей?!</p><p class="p1">— А тебе так нужно их признание? — спросил маленький, ехидный, налысо обритый, с двумя серьгами в левом ухе. В России он был отчаянным энтузиастом дальних походов и фотографом-любителем, в каганате увлекся парапланами. — Ты хочешь, чтобы тебя любили, да, Лена?!</p><p class="p1">— Да! — и она расхохоталась, и по легкости перехода от трагической ярости к беззлобному хохоту Волохов окончательно себе уяснил, что она ни на минуту не переставала играть; она принадлежала к тому типу, который он ненавидел с ранней юности — именно за фальшь, за вамп, за штамп, за несмешной неуместный мат. Такие женщины матерились и пили одинаково неартистично, словно давно привыкли и к водке, и к ругани, — вероятно, им казалось, что самая будничность мата, пьянства и разговорчиков известного толка служит знаком особой опытности; Волохов не курил, водки терпеть не мог, от разговоров на постельные темы воздерживался — и ненавидел себя за то, что стеснялся чистоты; слава Богу, скоро возненавидел тех, кто устанавливал такие правила. Устанавливали их в том числе именно такие Лены, — он уже выслушал от этой физматвыпускницы рассказ о том, как она лично соблазнила собственного мужа, мрачного татуированного типа, молчавшего в углу; они ехали в поезде, она погасила свет — «И тогда я набросилась на него и обесчестила!». Все было невыносимой пошлостью — и поезд, и жаргон, и сигарета, и жесты, и страстная защита собственного достоинства, которое только теперь, среди родного народа, развернулось в полную силу; Волохов с ужасом понял, что женский тип, всю жизнь им ненавидимый, был по преимуществу хазарский. Он даже головой затряс, чтобы вытрясти из нее жуткое подозрение: в нем явно просыпался захватчик, он уже готов был произнести вслух инвективу не хуже той, что вылетали из кочетовских партийных писателей, попадавших на сомнительные вечерники со всякой бугой-вугой и пепси-кокой, — Женька посмотрела на него в изумлении; «Башка трещит», — шепнул он ей на ухо. А интересно, подумал он, я сам-то не отказался бы с Леной? Лена была смугла, черноволоса, кареглаза, тяжелогруда, ее распирала энергия — пожалуй, не меньшая, чем у Женьки, но здесь это была уже энергия чистого самоутверждения. Впрочем, почти все в каганате были уверены, что мир принадлежит хазарам и только по неразумию — а может, чтоб Б-гу было интереснее, — пока не сдался им окончательно; это не обсуждалось, это входило в стартовые условия, в изначальную конвенцию, и хазарские мужчины даже умели скрыть эту уверенность — выпирала она только из женщин. Вдруг и Женька на самом деле такая? Черт его знает, что она рассказывает о нем за глаза. Волохов поймал себя на противной, беспричинной неприязни к ней: так, почитав с полчаса пошляка или графомана, долго потом ненавидишь литературу как таковую, не понимаешь, как и зачем писать вообще… После Лены, ее неостановимого трепа и истерических наскоков на собеседника, — так ведущие «Эха» наскакивали на несогласных, — Волохову были противны все собравшиеся, и в первую очередь он сам, потому что ему тут делать вовсе уж нечего. Поучаствовать в споре он все равно не мог — каганат, увы, не был землей его предков, с ассимиляцией в России проблем тоже не возникало, а всерьез возражать тем, кто считал эту землю своей, он не желал, чтобы этой серьезностью не придать бредовой гипотезе статус реальности, не позволить пузырю земли надуться и выпить окрестный воздух. И эти ухмылки… Волохов еле сдерживался, чтобы не наговорить резкостей, после которых его так же деликатно, мягко, сочувственно выпроводили бы за дверь. Они были вежливые и всегда веселые ребята. Они мягко, но решительно вступались за честь своих девушек. Их девушки могли говорить любые резкости, но любой, кто осмеливался им возразить, должен был извиниться перед девушкой. Девушку выставляли вперед, как свободу на баррикадах. Это тоже был их метод — самые сильные аргументы исходили от слабых, от женщин и детей, от тех, с кем нельзя воевать. С этим был как-то связан их культ матерей, мамочек: все, что говорили матери, — священно. Поэтому устами матерей, в том числе солдатских, так часто озвучивалась в предвоенное время самая отчаянная противогосударственная риторика.</p><p class="p1">Страшно вспомнить, Волохову приходилось однажды драться с женщиной, то есть какое драться — она попросту била его, а он стоял, как идиот, и ничего не мог сделать. Это было во время его долгого и безвыходного романа с нежной, ленивой, капризной однокурсницей, никогда не умевшей позаботиться о себе и спокойно выбиравшей того, кто позаботится о ней лучше, так, чтобы самой вовсе не пришлось шевелиться. В нее влюблялись — в том числе и ровесницы, жесткие, мужеподобные, начисто лишенные женского обаяния; они ей служили. Однажды пьяный и злой Волохов, до смерти уставший от ее измен, караулил ее в подъезде, они с подругой возвращались из театра, он наорал на ленивую возлюбленную, и тогда подруга принялась ее защищать — то есть попросту бить Волохова, причем без всякой жалости, по-настоящему. Она где-то занималась чем-то восточным — вероятно, на случай самообороны от насильника, который все медлил где-то и тем добавлял ей ярости на тренировках. Он не мог не убежать, ни дать сдачи, а ленивая подруга, прислонившись к стене, заводила глаза, но не вмешивалась: почему я, такая нежная, должна на все это смотреть? К счастью, эта ситуация навеки излечила Волохова от прилипчивой страсти.</p><p class="p1">В остальном ЖД были очень веселой публикой. Они много танцевали под местную музыку — заразительную и яркую, хотя, на волоховский вкус, несколько однообразную, как однообразна яркость восточного базара. И в этом их «веселитесь!» было тайное знание о том, что чем хуже им будет — тем лучше они потом на этом сыграют; каждая новая беда добавляла им аргументов в копилку и способствовала чувству тайной правоты; вместо «радуйтесь!» им следовало бы припевать «злорадуйтесь!». И на лицах их во время танца — страстного, почти ритуального, — он читал это же сложное сочетание отчаяния и восторга: так нас! так! о, как вам все это припомнится потом! Взглянув в родное Женькино лицо — закинутое, со сдвинутыми бровями, с глазами, зажмуренными от удовольствия, — он и в нем все это увидел; и страшно было подумать, что таким же это лицо бывало в любви. Ох, как мне еще за все это отомстится, понял он. Как всегда, почувствовав его взгляд, она открыла глаза и хитро ему подмигнула.</p><p class="p1">Однажды она повела его на квартирник Псиша Коробрянского. Псиш был ему немного известен по Москве — мультиинструменталист, выступавший в продвинутых клубах, где танцевальные вечера чередовались с филологическими и политологическими дискуссиями (впрочем, на филологических и политологических давно выступали одни и те же люди, ибо влияние политолога на политику скукожилось до влияния интерпретатора классики на текст: оболгать еще можем, но изменить — уже никак). Коробрянский жил между Москвой и Каганатом, много ездил по провинции, играл на синтезаторе, гитаре, флейте, позвякивал бубенчиками, пел то на идише, то на древнеславянском, и в Москве его считали очень заводным. Концерт он давал на квартире своей страстной и, кажется, неплатонической обожательницы Маши Голицыной, считавшейся отпрыском сразу двух аристократических родов: кто-то из князей Голицыных в двадцатые годы скрывался от грозной Чеки под чужой фамилией, служил в учреждении под началом прекрасной еврейки Лизы Каган, влюбился в нее, женился, взял ее фамилию, и гены русской аристократии, смешавшись с генами самой что ни на есть хазарской, дали блистательное потомство. За эту блистательность, кажется, прощали даже брак с захватчиком; ЖД вообще были снисходительны к смешанным бракам, вот и Женьку не осуждали за Волохова — вероятно, потому, что это тоже было оружием грядущей победы.</p><p class="p1">Машина старшая сестра преподавала в Штатах, младший брат был в Москве экспертом по живописи двадцатых и выпустил в проекте ОГИ нашумевшую книгу переписки с немецким коллегой; он был одним из кураторов антирелигиозной, как называл ее он сам, выставки, на которой экспонировался, в частности, Христос в потеках кока-колы и подписью «Сие есть кровь моя». За этот концептуальный жест младший брат Маши чуть не угодил под суд, зато получил приглашение преподавать сразу в трех крупнейших университетах Европы. В одном из них — Гейдельбергском — он сейчас и читал цикл лекций «Ритуал и стиль».</p><p class="p1">Сама Маша была крупна, громогласна и ассоциировалась у Волохова с миндалем — миндалевидные темные глаза, миндалевидные красные ногти и духи с запахом горького миндаля, да и пила она амаретто. «Здравствуй, мать!» — «Здравствуй, солнце»; они с Женькой тут же защебетали о неведомых Волохову общих знакомых. В углу обширной комнаты, увешанной венецианскими масками (Маша увлекалась театром и сама недурно делала из папье-маше портреты приятелей и классиков), настраивал гитару сам Псиш — тоже крупный, полный детина с аккуратной лысиной на макушке и длинными темными кудрями вокруг; он ласково улыбался всем входящим. На запястье правой руки у него были привязаны бубенцы, это напоминало тфиллим — хазарский мешочек с молитвой. Сам Псиш предпочитал называть свои песенки псалмами, гимнами, а то и просто молитвами, да большинство их и были выдержаны в стилистике панибратской беседы со снисходительным, чудаковатым, но властным папашей, с которым можно поторговаться и даже поспорить, пока он благодушествует. В них, однако, как-то подспудно чувствовалось то самое, что так мучило Волохова во всех хазарских планах: ощущение чужой временности и своей вечности. Сейчас с ним, адресатом Псиша, еще надо считаться, но будет время — и он останется только персонажем, культурологическим воспоминанием.</p><p class="p1">О происхождении псевдонима московского концертуалиста, как называл себя он сам, говорили разное. Псиш — это как бы душа, но мужского рода, снисходительно пояснила Маша; Короберь — название хазарского местечка, откуда происходили предки Псиша. Он проповедовал — хотя и шутовски с виду, но в душе, как уверяла Маша, вполне искренне, — возвращение именно в местечки, штетл, с их особой культурой. Его сетевое сообщество собирало воспоминания о местечках, тамошних традициях и фольклоре. Псиш уверял, что идиш органичнее и попросту понятнее иврита: «В конце концов, — объясняла Маша, — это язык хазар, вынужденно ушедших в Европу, язык ашкеназов, как доказано у Кестлера, живое свидетельство нашего изгнания». Были, правда, люди, утверждавшие, что идиш древнее всех европейских языков — это истинный первоязык Иудеи, на котором говорили повседневно, а богослужебные и священные тексты писались на иврите, бывшем достоянием немногих жрецов. Сначала идиш — удобный и рациональный — усвоили римляне, поработившие Иудею, а потом от него произошли все романо-германские языки; русский же — «испорченный санскрит» — был языком захватчиков-варягов, и поклонники идиша от души его презирали. Изгнанные хазары принесли идиш германским племенам, а оттуда прекрасный новый язык с небольшими разночтениями распространился по всей Европе. Так что когда варвары пришли завоевывать Рим, они с римлянами отлично понимали друг друга.</p><p class="p1">Псиш не заходил так далеко, считая, что идиш был вынесен хазарами из Германии, где они укрылись после разгрома. Ему было жаль терять этот чудесный жаргон, на котором написаны лучшие хазарские тексты от Паркиша до Фингера. Древнеславянских песен у него было меньше — Маша объясняла их появление особой толерантностью Псиша. Да, захватчики — но в те времена в их боевом примитивном фольклоре было хоть что-то огненосное. «О, Влесе! Я в лесе», ну, и прочие языческие прибамбасы.</p><p class="p1">Все это Маша излагала еще до концерта, при первом знакомстве. Теперь Волохов созерцал псалмопевца лично. Он представлял свой новый альбом «Душечка», названный так по песенному обращению к собственной душечке, Психее, Псише. Душечка вызывала у Псиша чрезвычайно теплые чувства. Он по-розановски предлагал ей: «Гуляй, славненькая, гуляй, тепленькая!» — после чего повторял то же самое на идише, а в конце обращался уже к «божечке», прося «потерпеть немножечки». Прочие песни из альбома поражали языковым смешением — тут был сетевой, туристический, филологический фольклор вперемешку со старославянизмами, французскими и английскими восклицаниями: Псиш, сообразно собственной концепции, стирал границы. По неотступным просьбам собравшихся была исполнена «Пизда-матушка» — «моя главная песня о Родине», как пояснил Псиш под общий хохот. «Ах, Пизда-матушка, Пизда Ивановна, — пел он глубоким крестьянским басом, — Пиз-да… пи-зда… Ах, сколько ты есть глубока, ах, сколько ты есть широка… пи-и-зда… пиззз-да…». Далее перечислялось все, что в ней помещается, включая Русь, каганат и самого исполнителя.</p><p class="p1">После концерта Псиш крупно потел, пил, с той же ласковой улыбкой выслушивал восторги — Волохов молчал, чувствуя себя совершенно неуместным на этом празднике жизни. Восторженный толстяк в порядке тоста зачитал собственное трехстраничное эссе о Псише — разумеется, с подробно прослеженной «интертекстуальностью», писанное на тартуском птичьем языке с вкраплениями мата. Маша склонилась к Волохову и шепнула, что это сам Ося Бакулин. Волохов угрюмо кивнул.</p><p class="p1">— Но вам понравилось? — спросила она.</p><p class="p1">— Очень не понравилось, — сокрушенно произнес Волохов. Он ответил тихо, но в этот момент Бакулин как раз замолчал, набирая воздуху, и все услышали неприличный ответ.</p><p class="p1">— Один из всех нашелся честный человек, — ласково сказал Псиш, снимая неловкость. За столом засмеялись, но Маша не на шутку обиделась.</p><p class="p1">— Что, действительно? — переспросила она.</p><p class="p1">Волохов понял, что терять нечего.</p><p class="p1">— Очень, — кивнул он. — По-моему, это совсем плохо.</p><p class="p1">— По-моему, тоже, — радостно сказал Псиш. — А они никто не хотят верить.</p><p class="p1">— Да ладно, — сказал Волохов. — Вы же так не думаете, Псиш. Вам очень нравится. Вы такой добрый, и все вокруг вас такие добрые. И все у вас получится, вот увидите.</p><p class="p1">— Что получится? — не понял Псиш.</p><p class="p1">— Все. Ну, вот это. Все, что вы хотите сделать с литературой.</p><p class="p1">— Я ничего не хочу делать с литературой, Боже упаси! — поклялся Псиш, прижимая руку к груди и звеня еще не снятыми колокольчиками.</p><p class="p1">— Нет, хотите. Вы хотите, чтобы она вся была вот такая, по крайней мере большая ее часть. Я уверен, что для себя — и, может, для десятка избранных, — вы пишете что-то настоящее, тяжеловесное и торжественное, настоящие псалмы. А для остальных — вот это. Чтобы любое серьезное высказывание воспринималось как моветон.</p><p class="p1">— А вы откуда, простите? — спросил опомнившийся Бакулин.</p><p class="p1">— А я из Москвы, простите, — ответил Волохов.</p><p class="p1">— А… ну да. Ну я тоже из Москвы вообще-то, — улыбнулся Бакулин, предлагая не придавать его вопросу серьезного значения. Так в компании горожан разговаривали бы с безнадежной деревенщиной, которая, однако, может врезать — так что опускать сельского гостя надо так, чтобы он сам ничего не понял. В конце вечерники, по законам жанра, деревенский гость должен был обо всем догадаться и попрекнуть собравшимся хлебом, который они едят. «Но этот хлеб, который жрете вы, — ведь мы его того-с, навозом!» — как написал ангелоподобный бандит, в жизни не знавший крестьянского труда. Волохов вдвойне обозлился на себя за идиотскую ситуацию, в которую влип.</p><p class="p1">— Все отлично, Псиш. Мне в самом деле было интересно.</p><p class="p1">— Всегда пожалуйста, — кивнул концертуалист.</p><p class="p1">— Нет, погодите! — Маша завелась не на шутку. — Если вы позволяете себе так высказываться, хотелось бы, в конце концов, каких-то аргументов…</p><p class="p1">— Это вы мне позволяете так высказываться, — грустно сказал Волохов. — Вы же меня спросили, верно? Я вам ответил…</p><p class="p1">— И на чем основана такая оценка? Я просто хочу понять, в конце концов, я имею право…</p><p class="p1">— Да не оценка это! — поморщился Волохов. — Это мнение мое. Имею я право на мнение?</p><p class="p1">— Маша, ну что в самом деле, — сказал томный юноша из угла. В каждом собрании ЖД был томный юноша — или один и тот же? Волохов вскоре научился распознавать эту хазарскую наступательную триаду: начинает девушка; за девушку вступается томный; после томного вступает решительный и завершает дело либо окончательной грубостью, либо, если не помогает, физической расправой, упирая на то, что мстит за оскорбленную девушку. — Ну не понял человек, чакры какие-то закрыты у человека… Не будем же мы здесь сейчас, за столом, чистить человеку чакры?</p><p class="p1">У Волохова появилось и, по счастью, тут же пропало желание начистить кое-кому чакры, хотя он никогда прежде не любил драться и презирал тех, кто в пылу спора начинал хватать оппонента за грудки.</p><p class="p1">— Не будете, конечно, — вступила Женька. — И не будете разговаривать с гостем в таком снисходительном тоне, ладно, Валя?</p><p class="p1">— Ну родная, — протянул Валя. — Почему я не могу сказать? Человек высказался довольно резко, человек предполагает же, наверное, что с ним могут не согласиться… Если бы человек читал хотя бы Гадамера, он бы подумал, прежде чем ляпать…</p><p class="p1">— Он высказался, потому что его спросили. А что будет, если я скажу то же самое? Прости, Псиш, но мне тоже совсем не нравится то, что ты сейчас делаешь. Когда у тебя был блюзовый период, это было мило и смешно, а это уже совсем не смешно и не мило.</p><p class="p1">— Так. — Псиш посмотрел на нее серьезно. — Я чувствую, что напросился наконец на обсуждение. Мальчики, девочки. Я для того и показываю вещь, чтобы услышать мнение. Никаких обид, честное слово.</p><p class="p1">— Но тогда надо хоть разговаривать, как серьезные люди! — фальцетом потребовал Бакулин. — Нужен элементарный уровень разговора! Что это — нравится, не нравится? Коробрянский предъявил законченную работу, надо судить о ней хотя бы со знанием контекста… (Из дальнейшей речи Бакулина, как, впрочем, и из тоста, Волохов не понял ничего — кажется, говорилось о том, что Псиш занимается карнавализацией, в результате которой напряжение между массовой и элитарной культурой ослабевает и в обществе прибавляется толерантности. Таким языком писали в «Универсальном Филологическом Обозрении» — сокращенно «УФО», и дурнота от этих статей была примерно такая же, как от кружения на одноименном аттракционе — гигантской тарелке, вращающейся сперва в горизонтальной, а потом в вертикальной плоскости).</p><p class="p1">— Ося, — с истинно псишевской ласковостью сказал Волохов. Он уже начал понимать, как бить врага его же оружием. Нужней всего здесь была непробиваемая самоуверенность. — Вы мне не скажете, зачем читать Гадамера?</p><p class="p1">— Ну, если вы не понимаете, — пожал плечами Бакулин и возвел очи горе.</p><p class="p1">— А вы представьте, что не понимаю. Что я вообще о герменевтике впервые слышу. Представьте себе, многие серьезные немцы Хайдегера не читали, и ничего, никто не умер. Вы мне можете внятно объяснить, что такого сделал Гадамер? Или вам просто слово нравится?</p><p class="p1">— Гадамер — гадомер, измеритель количества гадов, — в последний раз попытался Псиш перевести все в шутку.</p><p class="p1">— А, — сказал Волохов. — Ну да, конечно. Ада мэр. Любитель садо-мер. Вопрос снят, всем спасибо.</p><p class="p1">— Я не готов сейчас к лекции, — фальцетом сказал Бакулин. — Никто не предупреждал, что будут дети…</p><p class="p1">— Ну да, ну да, — еще ласковей сказал Волохов. — Все дети, а вы взрослые. Хотите, я вам сейчас скажу, Ося, что такое ваша герменевтика, и ваш Гадамер, и в особенности ваш усатый Лоцман? Простите меня тысячу раз за кощунство. Вся ваша семиотика, и Соссюр, и структурализм, и тартуские сборники, с точки зрения нормального соседа-гуманитария, — вы не забывайте, друг мой, истфак ведь в том же первом гуманитарном корпусе… У нас знаете как шутили? Хорошую вещь Соссюром не назовут! Все это дешевый способ подавлять собеседника, система переименований, жалкие понты, банальный перенос каббалистики на вещи, каббалистикой не исчерпываемые. Поэтому вы все так любите ритуалы и прочие магические штучки, а также книжки про тайные общества и эзотерические братства. Все это, знаете, попытка сажать огурцы посредством геометрических вычислений. Знаете такую сказку?</p><p class="p1">Все молчали, демонстративно не глядя на Волохова, но это его уже не останавливало.</p><p class="p1">— Вы «Магизм и единобожие» читали? Там это подробно прописано… У всей вашей филологической каббалы довольно низменные цели — тот же самый эзотерический язык, чтоб чужие боялись, все черты секты, я вам потом перечислю, если хотите… и главное — презрение ко всему, что не секта. Я только не понимаю: вы действительно хотите, чтобы вся литература перестала существовать, или кое-что оставите? Из того, что нравится вам лично? А, да, забыл. Тут же еще и фрейдизм, тоже ваша вера. Получаем, значит, такой синтез: с одной стороны, всем управляет срамной низ, а с другой — ритуал. Ничему божественному и просто хорошему вообще места не остается. Все тайно желают двух вещей — инцеста и славы. Если писать о литературе, как пишете вы, да еще и делать литературу по вашим рецептам, как вот товарищ Псиш, тысяча извинений, — можно за каких-то двадцать лет всю ее, голубушку, убить на фиг, и с чем вы тогда останетесь? Мне особенно нравится ваша манера излагать, этот ваш новый РАПП, с первых фраз уничтожающий оппонента. Но это все потому, Ося, что оппонент до времени молчит, подавленный количеством иностранных имен и непонятных слов. А потом он в один прекрасный день устанет от ваших толкований слова «хуй», инцестуозности, интертекстуальности — и скажет вам открытым текстом, что и литература ваша, простите, говно, и наука, ее обслуживающая, не лучше. Простите мой французский, но у Псиша в текстах и не такое случается. Нос не надо драть, Ося. Вы поняли меня? Га-да-мер, — передразнил он. — Я знаете где видал вашего Гадамера? И Лоцмана? И что вы имеете на это возразить?</p><p class="p1">— Господи, да кто же будет возражать? — снова возвел очи к небу Бакулин. — Дикаря привели в кают-компанию, показали компас, дикарь на него помочился — что тут возразишь? Чтобы спорить, надо, чтобы оба собеседника по крайней мере знали слова…</p><p class="p1">Псиш оглушительно захохотал.</p><p class="p1">— Женя, — сказал томный из своего угла. — Женя, зачем ты водишь в кают-компанию дикарей, которые мочатся на компасы?</p><p class="p1">— По-моему, вы обидели девушку, Илья, — улыбнулся Волохов, прибегая к любимому приему ЖД.</p><p class="p1">— А-а, — протянул томный. — Ну да, конечно. Можно, я не буду отвечать? — отнесся он к хозяйке. — Мне скучно, мебель хрупкая…</p><p class="p1">— Да, действительно, — поддержал юношу его сосед справа, бровастый, с ярким румянцем. — Давайте пить чай. Маша, солнце, что к чаю? Я весь день жду и трепещу!</p><p class="p1">— Ну ладно, — сказала Женька. — Вы тут посидите еще, помажьте компас жертвенной кровью… А мы с дикарем пойдем, пожалуй.</p><p class="p1">— Но я не понимаю! — внезапно обрела дар речи Маша. — Я не понимаю, как это можно — вот так прийти и… Есть же, в конце концов… — Она не договорила и бурно разрыдалась.</p><p class="p1">— Маша! Маша, сердце мое! — подскочила к ней с утешениями толстая очкастая девушка, слушавшая Волохова с таким непримиримым выражением лица, что от ярости, казалось, испарились все ее рациональные аргументы. — Маша, как ты можешь? Ты! Он пальца… он ногтя твоего не стоит! Маша! Из-за кого?!</p><p class="p1">— Пошли, дикарь, — Женька потянула Волохова к двери.</p><p class="p1">— Простите, если что, — сказал Волохов уже из прихожей.</p><p class="p1">— Бог простит, — сказала Женька, когда они спускались по узкой и темной лестнице. — Кажется, теперь меня не ждут и в этом доме… Поразительное место Каганат — все двадцать раз со всеми переругались по принципиальным соображениям. До этого в России ругались, но Россия хоть большая. А тут посрешься с кем-нибудь насмерть — и приходится на другой день мириться. Куда на фиг денешься с подводной лодки? Тесно, все со всеми… Встретимся где-нибудь — придется делать вид, что не было ничего. Я в этой кают-компании раз по десять со всеми так. Во времена размежевания знаешь что было? Раз по пять рвешь отношения навсегда, а наутро как ни в чем не бывало.</p><p class="p1">— Спасибо, Женька, — сказал Волохов в «Мазде». — Вступилась, пострадала…</p><p class="p1">— Да было бы перед кем, — она дернула плечом. — У меня это Ромино высокомерие вот тут…</p><p class="p1">— Рома — это ленивый такой?</p><p class="p1">— Да, мальчик-тюльпанчик. Чакры у него прочищены, видали идиота? Он поездил бы, как езжу я, посмотрел на то, что вижу я…</p><p class="p1">— Ладно, это тоже высокомерие.</p><p class="p1">— Имею право. А пусть не трогает моих любимых.</p><p class="p1">— Может, он сам в тебя влюблен, почем ты знаешь…</p><p class="p1">— Рома?! Рома не может быть влюблен. У Ромы есть девочка старше него, которая его кормит и попу ему вытирает, а он ее третирует с высоты своей герменевтики.</p><p class="p1">— Он тоже из ваших? Из ЖД, я хочу сказать?</p><p class="p1">— Вот еще. Это из Машкиной шоблы, в ЖД люди поприличнее. Ты бы тоже был в ЖД, если бы жил в Каганате.</p><p class="p1">— Может, примете? — спросил Волохов.</p><p class="p1">— Не пройдешь, — сказала Женька.</p><p class="p1">— Почему?</p><p class="p1">— Врать не умеешь. Хитрости мало.</p><p class="p1">— Сильно я испортил твою репутацию?</p><p class="p1">— Да тут у всех на репутации живого места нет. Я ж говорю, тесно. Напишешь что-нибудь в дневнике — на следующий день пятьдесят комментов от друзей и соседей: предала, предала…</p><p class="p1">— Ну и фиг ли ты его вообще ведешь?</p><p class="p1">— Не знаю. Вывешиваю, что в газету не прошло.</p><p class="p1">— Кстати, ЖД — это в честь вашего движения? Живой Дневник, я имею в виду.</p><p class="p1">— А… — она усмехнулась. — Не думаю. Есть такие аббревиатуры, они обозначают все. У нас приложение было — «ЧП». Так там на каждой полосе была своя расшифровка — «Что Показывают», «Чудеса Природы», «Чакры прочисть»…</p><p class="p1">— Рома тоже там работал?</p><p class="p1">— Дался тебе Рома… Рома больше по глянцу. Сти-иль…</p><p class="p1">Они свернули на свою улицу. Волохов так привык и к этой улице, и к дому, что уже злился на себя за это.</p><p class="p1">— Ну вот, я тогда к этому «ЧП» расшифровок двадцать придумала, если не больше. Так и «ЖД». Живой дневник, жаркая дискуссия, жуткие дрязги, жалкие душонки, жаркие деньки…</p><p class="p1">— Женька дура, — добавил Волохов.</p><p class="p1">— Жирный дебил, — отозвалась она. — А все вместе — Желтый Дом, ты не находишь?</p><p class="p1">Она припарковалась и подмигнула ему.</p></span><span id="id33"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Подмигивают, подмигивают… Еще в «Заратустре» его смутило это подмигивание тайно знающих. Он не понял тогда, о чем речь. Речь шла, скорее всего, не о хазарстве — она была именно об этом тайнознании победителя, вовремя понявшего, куда все катится, и выбравшего сильную сторону. Сильной стороной был распад, энтропия, которой и надо было всячески способствовать, неуклонно оберегая при этом собственное тайное братство; подкладывать щепки во все чужие костры — чтобы хранить свой невидимый град, которого не было на карте, который был поэтому неуязвим для любых пушек. Всякое истребление отдельных граждан этого града было только на руку его тайным правителям — потому что становилось аргументом в спорах: это был новый кирпич в стену неуязвимости, ибо хазары ничем на это не отвечали. Они были на стороне врага, которого нельзя увидеть: они желали гибели всем царствам, чтобы на их руинах наконец утвердить свое — тактика поистине безупречная, потому что они выступали в союзе с самим временем, самой вечностью, которой некуда торопиться.</p><p class="p1">Собственно, «Протоколы» именно об этом и были написаны, хотя являлись, конечно, чистейшим плодом фантазии Нилуса, не придумавшего ничего лучше, как переписать французский памфлет. Но то, о чем в них говорилось, было реальностью, нимало не зависящей от нравственных и умственных качеств Нилуса. Когда древние полагали, будто ветер — дыхание Перуна, они описывали то же самое явление, которое мы называем перемещением воздушных масс; нам так больше нравится, только и всего. Слог был слаб, автор — глуп, но то, с чем он так неумело бился, несомненно существовало. Жалкость этого инструментария не вызывала ничего, кроме брезгливости, погромы — ничего, кроме омерзения, однако и погромы казались беспомощными по сравнению с этой прекрасно продуманной громадой, обреченной в конце концов победить мир. Волохов это чувствовал, но объяснить не мог, как язычник не мог объяснить ветра, как Иоанн Кронштадский отделывался бессильными проклятьями; он чувствовал, что никакое добро нельзя утверждать с той яростью, с какой защищали его в каганате, и никакая свобода не предполагает такого рабства, какое царило в стане ее защитников, — но кроме интуиции, доказательств у него не было. Нилус, Иоанн Кронштадский, идиот Крушеван и прочая шобла начала века стала представляться Волохову грязной, пьяной, бездарной врачебной командой, которая негодными средствами бьется с раковой опухолью — но от грязи и глупости врачей, от омерзительности их тактики опухоль не перестает быть злокачественной и никак не тянет на символ добра и свободы. Все добро, вся свобода нужны были только до поры, до окончательной победы. После этого можно будет отбросить гуманистический антураж, с которым в Каганате так хорошо научились отождествляться; о, человечность была тут главным оружием, старики, женщины и дети шли впереди войска, чтобы противник не мог стрелять, — но как только опухоль доест противника и распространится повсеместно, она установит такой режим, на фоне которого детской игрушкой покажется любой погром.</p><p class="p1">Все рухнет, расколовшись, запутавшись, провалившись в себя — не без нашей осторожной помощи; и тогда на развалинах воцаримся мы, потому что нас ржавчина не коснется, наш благородный металл не окисляется. И это привлечение в союзники заведомого победителя бесило Волохова особенно. Ямщик лихой, седое Время. Не зря главный наш прозорливец написал об Олеге, которому за мечи и пожары, за разграбление неразумных хазар отмстили не сами хазары, а змея, живущая в черепе: лучшего символа мудрой вечности не выдумать, но стоит ли брать сторону змеи, поселившейся в трупе? Мертвый череп был для них идеальной средой: падет конь — тут-то они и заселятся. Где был мозг, хотя бы и конский, — будет шипеть змея.</p><p class="p1">Вот почему Волохову так не нравились в его подростковые годы, пришедшиеся на самый конец века, злорадные комментаторы российского распада: если бы его родина погибала от врага — гибель ее была бы достойней и красивей, но она умирала на гноище, хрипя и дергаясь, крича на преданных сиделок и вымогая сострадание у презрительно наблюдающих чужих; с терминальными больными такое случается — бить своих, призывать чужих, чтобы тем вернее добили, потому что мучиться нет больше сил. Они смотрели и подмигивали, в любую секунду готовые ринуться на освободившееся пространство. И Волохову было не легче от мысли, что это их земля.</p><p class="p1">Некоторое время Волохов боялся, что вернется из Каганата законченным антихазаром, и сильно корил себя за это — хазарофобия была в его глазах серьезной, неискупаемой виной. Такова была, впрочем, любая национальная фобия — но хазарская казалась особенно ужасной потому, что хазарам, по сути, нечего было инкриминировать. Их история состояла из гонений. С любой нации было за что спросить: с немцев — за тевтонский дух, бюргерство, первую и вторую мировую, с русских — за кроваво-пыточную историю с привычным вывихом массовых самоистреблений, который давал о себе знать раз в столетие, с неумолимостью возвращающейся кометы; с англичан, итальянцев, греков — со всех было за что спрашивать, и лишь хазары, лишенные собственной государственности, не были замечены ни в массовых самоистреблениях, ни в кровавых походах на соседские земли. В том и ужас, что они ничего не сделали — только давали деньги в рост, врачевали, адвокатствовали в судах да благодетельствовали человечеству великими изобретениями. Отсюда были все байки про кровавые жертвоприношения и мировое правительство: поймать за руку хоть на чем-то. Нет, они только бедствовали, кротко снося гонения, ответив лишь арабам, и то в последние годы, когда у них завелась собственная крошечная государственность; хазар истребляли все — бессильные, однако, не то что истребить, а хотя бы ослабить. Они знай себе перемигивались и причитали, и причитания их всякий раз готовы были перейти в песнь торжества — вот почему самые ликующие их песнопения были так заунывны, а самые скорбные так подспудно радостны. Не было ничего победительней и неуязвимей, чем их подчеркнутая, прокламированная беззащитность. Волохову даже казалось, что Женька, становящаяся рядом с ним по-детски послушной и ласковой, на самом деле все крепче забирает его во власть — но тут он вспомнил шевцовские рассуждения о хазарских женах и устыдился окончательно. На ненависть к хазарским женам экстраполировалась догадка о женственной природе самой хазарской власти — власти матерей и так называемых девушек, наших девушек, которых мы никогда не дадим в обиду; позор мне, позор — до чего я дошел, «Тля» дрожащая! Впрочем, примитивные натуры вроде шевцовых и кочетовых всегда чувствуют врага тоньше, по-звериному, просто не могут высказаться — и воют в бессильной ярости, пока понимающие люди улыбаются и подмигивают. Как я смею так ненавидеть их? Неужели это в самом деле генетическое, захватническое?</p><p class="p1">Впрочем, он успокоился, припомнив простую закономерность: любой мужчина, полюбивший женщину из определенного клана, скоро начинает ненавидеть этот клан, потому что хочет, чтобы женщина принадлежала только ему. Он презирает ее обязанности перед другими и их права на нее. Если бы Монтекки и Капулетти не враждовали, вражда началась бы с Ромео, возненавидевшего всю семью Джульетты — как она смеет быть еще чьей-то, не только его? Ах, все это не хазарофобия, а банальная ревность, сказал себе Волохов и перестал терзаться. Один вопрос мучил его до самого отъезда: если я так схожу по ней с ума здесь, что будет со мной там?</p></span></span></span></span></span>
