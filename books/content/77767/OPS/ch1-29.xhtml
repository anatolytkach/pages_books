<p class="p">5</p>
</div><p class="p1">Но странное дело — вместо законного отвращения к Родине он почувствовал к ней необъяснимую жалость. Казалось бы, самым правильным выходом из ситуации было немедленно взять сторону ЖД, помочь им вернуть эту землю, найти в ней флогистон (отсутствие которого, верно, и не позволяло России разомкнуть цепь) и устремиться вместе с ними по новому пути. Волохов, однако, чувствовал себя русским и ничего не мог с этим поделать. Что-то мешало ему покинуть эту скрипящую, разваливающуюся карусель и пересесть на поезд, несущийся в светлую даль эмансипации личности. Подозрительно мелка казалась ему идея личной свободы; подозрительно мало личной свободы видел он в каганате, где либерализм проповедовался на экспорт, но далеко не соблюдался. В сущности, идея ЖД заключалась в том, чтобы как можно шире распространить учение о зловредности всяких вертикалей — с той единственной целью, чтобы все эти ржавеющие вертикали заменить своей, последней и окончательной. Волохов с удовольствием уступил бы Россию тому, кто сохранил и преумножил бы лучшее в ней, — но не тому, кто вырвал бы ее с корнем, заняв возвращенную почву чем-нибудь более полезным. Главное же — Волохов чувствовал за Россией слабость, а за ЖД силу, и переходить на сторону силы мешала ему совесть, рациональных доводов не признающая и о справедливости не слышавшая.</p><p class="p1">После каганата он уже нимало не сомневался в том, какую именно Россию построят ЖД на месте прежней, столь отвратительной ему теперь. Вольно или невольно они окажутся в роли угнетателей, а потому воспроизведут все ту же схему… хотя — все-таки не девятый век на дворе? — вдруг да не отважатся на полное истребление или изгнание нынешних хозяев своей несчастной земли?! Однако в том, что они не отважатся, Волохов как раз уверен не был. Несколько раз они уже были весьма близки к успеху, — и их решимость сделать так, чтобы никакой России не было вовсе, пугала его по-настоящему. Они, кажется, не остановились бы перед тем, чтобы вчистую отменить всю литературу, которую так хорошо знали и цитатами из которой так весело обменивались — старательно низводя ее, однако, именно к набору детских игр и сомнительных острот. Они не просто так ее пересмеивали, стараясь выглядеть в ней уж настолько своими, что ни один русский не мог бы с ними соперничать в этой кажущейся укорененности; они превращали ее в цитатник, в объект каббалистического исследования, в набор непристойностей и ошибок, обусловленных трудным детством авторов и их тайными сексуальными комплексами, — и не было более верного способа уничтожить эту культуру, кроме как подвергнув ее анализу по системе Лоцмана или разложив на составляющие по Фрейду. В конце концов, деконструкция тоже была отнюдь не французским изобретением. Впрочем, если бы все ограничилось культурой — Волохов, скрипя сердцем, согласился бы уступить страну; его никто ни о чем не спрашивал, но он вел теперь с воображаемым ЖДовским оппонентом непрекращающийся внутренний диалог. Да, говорил он, да, я отдал бы. Возьмите. В конце концов, народу, весьма возможно, даже лучше без всего этого — а главное, я уверен, что он опять сотворит все это с нуля, и лучше. Все-таки вся наша пресловутая литература, все наши Толстые и Достоевские, и диагностики-агностики Чеховы, — не что иное, как следствие комплекса вины захватчика перед захваченным, и оттого так тягостны даже лучшие их страницы, оттого в русской прозе нельзя ни вдохнуть сырого, последождевого воздуха, ни обозреть вечернего пейзажа, ни съесть спелую, горячую от солнца клубничину без мучительного чувства вины. Пускай себе. Может, освобожденный народ напишет на освобожденной земле новую лирику, какую начали было сочинять ваши Пастернак с Мандельштамом, и будут всюду Бахуса службы, как будто на свете одни сторожа и собаки, — Господи, как я люблю эту вещь! Лучше нее, ей-Богу, ничего никогда не было по-русски, даже у Пушкина, хотя он не хуже, конечно. И у Лермонтова нет ничего лучше, хотя — по камням струится Терек, плещет мутный вал… Господи, я все отдал бы вам, даже это, если бы у меня была хоть тень надежды, что без этого будет лучше. Но не будет, — и я знаю, что будет взамен. Пусть после переноса сюда вашего тайного общества уже не останется вечных каганатских склок, отличающих всякое правительство в изгнании. Пусть будет прочное и ровное государственное устройство. Но ведь у вас тут почти уже было свое государственное устройство, ведь вы почти отказались от идеи каганата! И что вы начали делать прежде всего? То, о чем наш несчастный Шмелев, чьего сына убили по приказу вашей Землячки, сказал в «Солнце мертвых»: нет, тут не русская злоба и не русская методичность! Вы могли бы угнетать, но это поддела — угнетение бывает разным, бывает благотворная колонизация и окультуривание, в конце концов, — я отчего-то знаю, что вы будете делать нечто совсем иное, не заставляйте, о, не заставляйте меня говорить об этом вслух! Он говорил вслух, и прохожие оглядывались на него. Отчего-то я знаю, что вам мало будет угнетения. Вы захотите разорвать круг, потому что вечно меняться местами вам надоело. И это объяснимо, это слишком понятно — вы захотите истребить, уничтожить, чтобы не было и духу, и на новой земле начать новую жизнь… разве не так? Вы придете не для того, чтобы нас поработить. Вы придете для того, чтобы нас вообще не было… Я правильно понял? И внутренний голос — тенорком Эверштейна, а иногда глумливым, гнусаво-вальяжным баритоном Псиша Коробрянского, — отвечал ему: а разве вы с нами не так?</p><p class="p1">— Нет, мы с вами все-таки не так, — ошеломленно отвечал Волохов.</p><p class="p1">— Да? А с самого начала, когда вы жгли наши города? А потом, когда выгнали нас в Германию? А при первой попытке возвращения, когда ваш Державин придумал для нас черту оседлости? Хотите черту оседлости — ради Бога, мы вам это устроим. Но если не хотите — звиняйте, дядьку. Кроме того, границы будут открыты. Ступайте на все четыре стороны. Убирайтесь в свою Россию, откуда пришли когда-то на нас. Знаете, где она? Вероятно, где-нибудь в Кремле до сих пор хранятся реликвии оттуда. Понятия не имеем, откуда вас принесло в нашу Хазарию — видно, из каких-то северных земель, где почва не желала родить и снег лежал чуть не весь год; вот туда и убирайтесь — welcome Grenlandia! Не любо — оставайтесь, но тогда уж не взыщите.</p><p class="p1">— Поглядим, — с тоской и ненавистью думал Волохов. — Поглядим.</p><p class="p1">Несомненно, они были кем-то вроде мокрецов. Несомненно, они желали блага. Правда, в первоисточнике не было учтено, что и с детьми они потом сделают что-то такое. Ведь это были не их дети. Уничтожат родителей их руками, а потом и с самими разберутся… Волохов затряс головой, отгоняя дикую мысль. Ну с чего я это взял?! Ведь они так чадолюбивы, так нежны… Ни о каком уничтожении, конечно, и речи быть не может. Запишут навеки в люди второго сорта, и только. О, подлая моя русская голова! Почему ее посещают только такие видения?! Но каких еще ты ждал? — спрашивал он у себя. Ты живешь на захваченной земле, по законам захватчиков, и сам ты захватчик, если к тридцати дорос до завсектором. И ведь как силен в тебе этот инстинкт поработителя! — ты не желаешь отдать страну тем, кто явно прав, тебе почему-то отвратительны эти самые мокрецы, которые, между прочим, могли бы построить тут наконец что-то человеческое… Могли бы, соглашался он. Но как раз человеческим это и не было бы. Я не желаю покоряться еще одной нерассуждающей силе, еще одной абсолютной правоте. Я отчего-то знаю, что истинные хозяева земли так не приходят. Так приходят хозяева жизни, а это совсем другое дело.</p><p class="p1">Поначалу, когда теория захваченного хазарства еще казалась ему бредовой, он особенно внимательно присматривался к немногим оставшимся тут хазарам, к собственным друзьям из их числа, даже к людям смешанной крови («полухазаров не бывает» — любимая поговорка патриотов). Ему казалось, что все они объединены тайнознанием, все в курсе своего происхождения и предназначения, — но разговоры на эту тему либо сразу гасились, либо ни к чему не вели. Хазары давно уже не скрывали, что ненавидят Россию и русских; самые умные из них говорили, что Россия-то им как раз очень нравится, но гордиться фактом рождения здесь — и любым другим имманентным признаком — способен только негодяй. Некоторые повторяли заезженные истины конца восьмидесятых: истинно русским должен называться тот, кто владеет языком, языком лучше владеем мы, литература, наука и даже политика лучше получается у нас, — хватит, вы себя дискредитировали, у вас уже ничего не получилось, отдайте! Про ЖД никто ничего не знал, аббревиатура прочно увязалась с Живым Дневником (может, сами ЖД и придумали его для конспирации?), а стоило Волохову намекнуть на существование молодежной организации — его поднимали на смех. «Слушайте, в Каганате каждые три хазара — тайная организация; вы что, не знаете Каганата?». О Каганате принято было отзываться с иронией, но любовной, почти нежной — вообще обычай высмеивать себя, как заметил Волохов, был у хазар одним из механизмов самозащиты. Они экспроприировали насмешку над собой, чтобы не дать другим возможности насмехаться над ними; так мать шлепает ребенка, чтобы не дать отцу выпороть его по-настоящему. Русские хазары, ругавшие Каганат, чувствовали его своим; россияне, ругавшие Россию, ненавидели ее, как чужую.</p><p class="p1">Только один раз Волохов серьезно сцепился с хазаром — и то потому, что напился, чего делать ни в коем случае не следовало. Водка, как известно, усиливает настроение, в котором ее пьешь — радостное опьянение ведет к эйфории, а грустное к полному отчаянию. Волохов был в гостях у выпускницы РГГУ, активистки ОГИ, девочки из хорошего круга — давно не девочки, конечно, хотя манера по-детски присюсюкивать, играть в вечное младенчество никуда не девалась с годами. Эта девочка любила собирать и стравливать поклонников, ей нравилось сочетание невинности с порочностью — хотя невинность была крайне искусственна, а порочность очень второсортна. Но главной, любимейшей ее игрой было дворянство, принадлежность к аристократии: она жила в огромной квартире, владела двумя дачами, одну из которых сдавала, и старательно закашивала под дворянку. Этого Волохов и не выдержал во время первого же посещения богемистой квартиры, где большая компания собралась по случаю чьего-то очередного окончательного отъезда. Волохова сюда привела очередная кратковременная подруга.</p><p class="p1">— И откуда все эти хоромы? — зло спросил Волохов. Хозяйка была хазарка, типичная, ничего не скрывающая, наглая, а хазарок он ненавидел даже больше — у них уж вовсе отсутствовало чувство меры.</p><p class="p1">— У нее дедушка был академик. Видный марксист. А папа — специалист по Всеволоду Вишневскому. Десять книг о нем издал.</p><p class="p1">— А. Остатки былой роскоши.</p><p class="p1">— Типа того. Но сама Соня совсем другая. Она Маркса вообще не читала, как и Вишневского, впрочем.</p><p class="p1">— Неблагодарная какая, — сказал Волохов. — Наизусть должна знать. Первый матрос, к залу: «Люди, львы, орлы и куропатки, рогатые олени, пришедшие сюда для забавы и смеха, — вот пройдет перед вами жизнь женщины-комиссара с ее темным началом и темным концом. Кто из вас хочет комиссарского тела?» Советская драматургия, кровавое наследие символизма.</p><p class="p1">Подруга засмеялась, но ничего не поняла.</p><p class="p1">Выпив, стали думать, что бы спеть. В стране давно не осталось песен, которые все знали бы, — не считая чего-нибудь вроде «Привет, подушка — привет, подружка» или «Билайн — Джи-Эс-Эм!». Впрочем, такие песни и всегда были в дефиците — захватчики пели одно, захваченные сквозь зубы тянули другое, и «Эй, ухнем», спетое в обществе захватчиков, звучало так же оскорбительно, как Вертинский в кругу фабричных рабочих. Правда, последняя революция основательно смешала ряды, и Окуджава, казалось, примирил всех — однако и его терпеть не могли в так называемых русских кругах. Там вообще не пели — как ни странно, захватчики были начисто лишены вокальных данных. По идее, им следовало бы, хоть для маскировки, затягивать «Лучинушку» — но «Лучинушка» была песней угнетенного большинства, и вообще в кругах профессиональных русских стиль рюсс популярностью не пользовался. Там не любили косовороток, предпочитая френчи. Варяги не умели даже делать вид, что любят захваченную страну: сквозь все их увлечения и разговоры проступала угрюмая северная атрибутика, и фолку они предпочитали рок, ценя в нем ненависть и жизнеотрицание — любимые воинские добродетели.</p><p class="p1">Что до ЖД — они как раз любили Окуджаву и пели его тихие грузино-арбатские песенки со странной страстью, не особенно идущей к материалу. Здесь был родной прием — пылкость настаивания на очевидном, и если Окуджава посмеивался над собственными банальностями, диву даваясь, до чего должны были дожить слушатели, чтобы им приходилось напоминать о таком, — Лариса Герштейн и иже с нею исполняли эти зонги с проповеднической страстью, трагическим надрывом, настаивая на том, что и так всем понятно. Эту мысль следовало додумать, тут была причина, — Волохов отвлекся на вспыхнувший спор: кто-то ради шутки затянул старый гимн — хозяйка дома, Соня, грубо оборвала шутника: «Что за плебейство!». Певец стушевался, заговорили о плебействе, о том, как Соня ненавидит хамов и о том, что, стоит выйти за пределы «своего круга», как тут же вляпываешься в быдло; разговор велся с поразительной откровенностью, постыдной еще десять лет назад, когда полагалось хотя бы ритуально приседать перед народом; кривясь и кривляясь, Соня изображала манеры простонародья. Народ, по ее мнению, не заслуживал лучшей участи, чем доживание по хрущобам; народ мешал Соне и таким, как она. С этим народом ничего нельзя было построить. Народ отстал от своей элиты и не желал тянуться за ней. Рядом с Соней сидел невысокий, лысый, крепкий малый и нагло улыбался. Вероятно, это был ее нынешний обожатель — сменялись они, с восхищением рассказала подруга, чаще, чем у Ксении Собчак.</p><p class="p1">Впрочем, элита была не единственной темой разговоров. Особенно много говорили о благотворительности, добре, борьбе со злом. Тут было то самое, о чем только что думал Волохов: в кругу ЖД, особенно в тактике их девочек, принято было отчаянно доказывать аксиоматичное. Волохов поначалу — о, святая простота! — вообще не понимал, зачем это нужно, и лишь затем вывел для себя ответ: отчего так раздражает банальность, на которой настаивают? Ведь человек не говорит ничего особенного — защищает, скажем, пользу пожертвований или утверждает, что нехорошо убивать детей; почему же хочется не просто возразить ему, но пресечь этот пылкий монолог? Дело в том, что повторение банальностей не бывает бескорыстным: человек прислоняется к общеизвестному, чтобы после десяти бесспорных тезисов осторожно внедрить свой спорный, а то и неверный, но уже привязанный к ним намертво, хитрым ходом выведенный из общепринятого. Когда в твоем присутствии начинают настаивать на очевидном, самое верное — затаиться и выжидать: в какой момент начнется тщательно законспирированное свинство? Никто не станет просто так утверждать, что обижать мать нехорошо. Следующим тезисом наверняка будет что-нибудь куда более ужасное, чем любая обида, наносимая матери.</p><p class="p1">В качестве бесспорного прикрытия брались так называемые общечеловеческие ценности, против которых, казалось бы, уж никак спорить нельзя — тотчас попадешь в людоеды. Окуджаву в кругу ЖД любили именно за такие проповеди — давайте восклицать, друг другом восхищаться, возьмемся за руки, друзья, а кто не хочет с нами браться за руки — тому мы никогда уже не подадим ни руки, ни надежды, ни милостыни. Присвоим человеческое, чтобы тем верней утвердить свое нечеловеческое; в среду, расслабленную гуманизмом и дружеством, осторожно внедрим свою власть — а любого, кто не желает поклоняться ей, запишем в сатрапы безумного султана. Бедный Окуджава, он так и не понимал, что они с ним сделали, а когда понял — года не прожил! Как он сам ненавидел собственный призыв взяться за руки, как отрекся от него под конец — но никто уже не хотел этого слышать…</p><p class="p1">Разговор поначалу зашел о Милошевиче, только что умершем. Хазары радовались смерти Милошевича, не особенно даже стесняясь. Хорошо говорить о мертвых, прощать их, видеть в мертвом враге человека — было в этом кругу не принято. Волохов подумал, что для идентификации собеседника в качестве хазара совершенно достаточно трех признаков: ненависти к Милошевичу (или к столь же мертвому Арафату), любви к семиотике и Лоцману, а на закуску — широковещательного, чрезмерного почтения к благотворительности. Были и иные признаки, типа характерной манеры спорить, мгновенно смешивающей собеседника с дерьмом, или столь же преувеличенной любви к своим, соумышленникам, единоучастникам (солнце мое, сердце мое! Не болит ли головка? Не жмет ли здесь, здесь и здесь?) — но это уж, что называется, интонация, а Волохова больше занимали смыслы. Например, насчет благотворительности он уже смекнул. Благотворительность нужна была для того, чтобы скомпрометировать государство, лишний раз продемонстрировав его жестокость и недееспособность, — а атака на государство нужна была, чтобы переломить стране хребет; конечно, это было дурное, жестокое государство — но без него, как без позвоночника, пусть десять раз искривленного, страна не жила вообще. Благотворительность призвана была именем больных детей добить последние скрепы, кое-как державшиеся; и когда после Милошевича сразу перескочили на помощь убогим — Волохов радостно подобрался: наглядности было выше крыши, он угадал.</p><p class="p1">Соня помогала больным животным, содержала приют для них, возилась с ними, и хотя во всем остальном была чудовищной, непроходимой дурой — к ней прислушивались, берегли ее, как юродивую, и едва она, старательно округляя глаза, просюсюкивала — «Я вообще не понимаю, как люди могут спорить о каких-то принципах, когда каждый день в городе умирает десять бездомных собак?!» — сворачивали любой принципиальный разговор, в котором Волохов уже начинал было одерживать верх. Вы продолжайте, продолжайте, словно говорили ему, пусть последнее слово будет за вами, неважно, все это так незначительно в сравнении с бездомными собаками… Были аргументы и посерьезнее — например, больные дети. В каганате очень увлекались благотворительностью, причем именно в отношении русских детей: о хазарских заботилось правительство, вся страна и так добровольно жертвовала на них, а вот русская благотворительность была позорно не развита. Молодая кучерявая художница Ида с криком, со слезами доказывала, что дети, больные раком, не получают ни малейшей помощи, и это первый, первый признак вырождения страны! Потому что если в ней такое происходит — она не имеет, не имеет права больше жить! Ида с таким пылом убеждала всех в необходимости помогать больным детям, так рассказывала о своей благотворительной выставке, которую устроила ради них, так подробно перечисляла всех детей, которых подержала за руку, — словно и сам ее приход к больным детям был подобен Божьему дару, кратковременному визиту ангела в ад, — что Волохов начинал подозревать ее в нечеловеческих грехах: чего надо было натворить, чтобы так оправдываться? Впрочем, он скоро успокоился: Ида занималась чистым самоутверждением, ее рисунки вне благотворительности не имели никакой ценности, рисовала она откровенно так себе, но в свете гуманитарной выставки все эти розочки и козочки начинали приобретать особую подсветку, и Иде уже заказали роспись больницы в одном из пригородов Лиона. У нее был роман с французским аристократом, чьей аристократичностью она упивалась особенно, — она-то и сподвигла его пожертвовать пять тысяч евро на московские больницы. На нее, впрочем, он жертвовал много больше.</p><p class="p1">Она много еще чего говорила, и все это обретало статус непреложной истины — ведь Ида помогала больным детям! Аргумент был выбран точно: рак и сам по себе страшен, а когда речь о детях… «Матери закладывают свои квартиры! И когда дети… я не могу… в общем, когда этих детей уже нет — долг приходится выплачивать все равно!» — Ида рыдала, закрывала лицо руками, за столом воцарялась скорбная тишина, и обязательная тихая девочка уже кидалась утешать ее неизменным «Ида, солнце мое, сердце мое…».</p><p class="p1">— Все, что вы говорите, Ида, — это вещи бесспорные, — не выдержал Волохов. — Но не кажется ли вам, что благотворительностью вы только упрочиваете существующее положение?</p><p class="p1">Глаза у Иды мгновенно высохли. Волохова давно поражала хазарская способность переключаться и успокаиваться.</p><p class="p1">— Вы хотите сказать, что я не должна помогать обреченным детям?</p><p class="p1">— Ну, обреченным никто не поможет. Остерегитесь называть их обреченными. Давайте договоримся о термине «больные», — Волохов уже понял, что в этих дискуссиях договариваться о терминах надо с самого начала, иначе подмена произойдет так, что моргнуть не успеешь. — Итак, мы говорим о больных, и вы собираете деньги, по сути, на взятки. Поскольку…</p><p class="p1">— Поскольку без взяток у вас здесь ничего не делается! — пошла в атаку Ида. — Чтобы вовремя попасть на томограф, надо платить семь-десять тысяч рублей, а счет идет на дни… на минуты!</p><p class="p1">— Подождите. Во-первых, насколько я знаю, томограф в Москве не один, и далеко не везде недельная очередь. Во-вторых, собирая деньги на взятки, вы тем самым конституируете взяточничество…</p><p class="p1">— А что вы предлагаете? — презрительно спросил неизбежный, тонкий, очень бледный и очень красивый юноша с почти дворянским грассированием. Волохов узнал триаду и восхитился: как тевтонцы даже на льду норовили выстроить свою свинью, так и эти в любых географических условиях строились треугольничком с женщиной впереди.</p><p class="p1">— Я предлагаю не придавать столь большого значения собственным подвигам, — пожал плечами Волохов. — Вы не делаете ничего особенного, и не стоит, по-моему, так уж гордиться собой. Вообще докладывать о своих добрых делах, учили меня в детстве, стыдно. Вы помогли больным детям, очень хорошо, добродетель сама себе награда…</p><p class="p1">— Мой пример может разбудить десятки людей! — заорала Ида. — О чем вы говорите, вы не в теме, вы ничего не понимаете! Если мы все будем молчать, я, она, они, — она обвела широким жестом всех присутствующих, в том числе и тех, кто ни сном, ни духом не был причастен к благотворительности, — такие, как вы, вообще не узнают о ситуации!</p><p class="p1">Спорить с ней было трудно, почти невозможно — именно в силу пресловутой хазарской тактики; благотворительность выступала тут в функции розы, подвешенной к танку, но Волохов знал и видел танк. Он чувствовал, что кругом неправ, но чувствовал и то, что всякая белоснежная правота, не желающая никого жалеть, не знающая снисходительности к побежденным, неразборчивая в приемах, хуже его неправоты — умирающей, слабой, грязной, как февральский снег.</p><p class="p1">— Вы напрасно думаете, что мы не знаем о ситуации, — мягко сказал Волохов. Он уже выучился тут говорить мягко и размеренно — только это непрошибаемое спокойствие действовало на хазар, заставляя их выходить из себя и явно грешить против логики. — Я помогаю нескольким семьям инвалидов, мой институт регулярно жертвует ближайшей больнице — но это наше личное дело, понимаете? Это не есть общественная добродетель. Вы, может, и разбудите кого-то, и напомните о необходимости благотворить, — хотя, замечу, гораздо больше добра вы сделали бы, громко обнародовав хоть один факт взятки. Это, конечно, не так красиво, как жертвовать на детей, но тоже полезно…</p><p class="p1">— Вы уволите одного взяточника — придут десять других! — перебила Ида.</p><p class="p1">— Почему десять? — не понял Волохов. — Но вообще я договорю, ладно? Вы принесли бы больше пользы, обнародовав одну взятку, но самое главное — занимаясь этими благими делами, вы необратимо разрушаете себя. Понимаете, почему я против смертной казни? Потому что казненному уже все равно, а вот палача она уродует серьезно. Это же убийство, пусть и с государственного разрешения. Так и благотворительность: ребенку, конечно, все равно, государство ему помогло или Ида Кирпотина. Но вот Ида Кирпотина уже почувствовала себя святой и не терпит никаких возражений, а это первый признак неадекватности. Более того, Ида Кирпотина уже начинает оценивать свои акварели не с точки зрения живописи, а с точки зрения приносимой ими пользы, — разве нет? То есть святость уже распространяется и на живопись, нес па? Тысяча извинений, если я вас оскорбил…</p><p class="p1">— Вы никого здесь не можете оскорбить, — ответил за потрясенную Иду очень красивый юноша, явно ее паладин. — Чтобы оскорбить человека, надо находиться с ним на одном уровне. А вы должны понимать, какая честь вам оказана тем, что вы сидите за одним столом с Идой Кирпотиной… Впрочем, понятия о чести у вас известно какие, но следует по крайней мере помнить свое место.</p><p class="p1">— А какие у нас понятия о чести? — очень спокойно спросил Волохов.</p><p class="p1">— Они отсутствуют в вашем обществе, — невозмутимо ответил молодой красавец.</p><p class="p1">— Очень может быть, что ваши понятия о чести у нас действительно отсутствуют, — не повышая голоса, произнес Волохов. — Но сообразно нашим, дрянь этакая, я сейчас вобью тебе в глотку каждое твое слово. Ты хорошо меня понял? Встал! — заорал Волохов, вскакивая на ноги. — Встал быстро и вышел со мной! И я объясню тебе, мразь, кому и какая честь тут оказана! — Он сгреб красавца и потащил в прихожую, но несколько крепких рук растащили их.</p><p class="p1">— Ты тут под элиту особо не закашивай, — крикнул Волохов, которого на всякий случай как следует держали, но на пол из гуманизма не валили. — Баре нашлись, аристократия, мать вашу… Наследники великой культуры… Славное имя Кирпотиных, стукачей из Союза писателей… Дедушка-марксист, папа-вишневед… Я дедушку-то твоего знаю, не пальцем деланный. Товарищ Коган, видный специалист по раннему товарищу Марксу. Это по его доносу, если ничего не путаю, погиб товарищ Гельфанд, специалист по позднему Марксу, грешивший рационалистическим механицизмом и метафизическим мистицизмом? Вот и квартирка в высотке, правильной дорогой идете, товарищи. Аристократия. По Вишневскому специалисты. По Федору Панферову и его брускам.</p><p class="p1">— Выведите его! — завизжала Соня.</p><p class="p1">— Не бойся, успеется. Понятия о чести. Где, откуда у вас понятия о чести? Каковы ваши права на культуру, на честь, на все? Вы можете делать что угодно… Вы победите, и это правильно… — В глазах у Волохова стоял туман опьянения и ярости, комната плыла, лиц он не видел. — Не надо только тут этого… Аристократии тут не надо! Вы не аристократия, потому что все сдали с концами, а когда ненадолго пришло ваше время — вы оказались мелко мстительны, тупо мстительны! Вы доносили друг на друга! Вы вели себя как классические захватчики, потому что ничего другого давно не умеете! Вы ненавидите культуру захватчиков — и правильно делаете, была эта культура и вся вышла. Все наше дворянство — потомки завоевателей, кто б спорил. Но все-таки завоевателей, а не местечковых страдальцев! Вы! В-вы… только и умеете, что жаловаться по углам, трепаться на кухнях, кусаться под одеялом! Да, захватчики… культура захватчиков… Но они хотя бы огнем и мечом, а не кухонными шепотками! У них хотя бы какие-то аргументы, а у вас — только «наш-не-наш»! Вы, если хотите знать, вы худшие расисты, чем все скины… Что вы сделали, когда у вас был реванш? Вы, может быть, великую культуру построили? Хрена с два! Вы ничего… ничего не можете! Из вашего Мандельштама получилось что-то только потому, что он думал и писал по-русски! Быдло не нравится, да? Да — быдло! Но не ваше быдло! Наше помирает достойнее, наше падает, как дерево… аристократы… Какие вы аристократы? Вы черви в трупе, заведшиеся ходом вещей… но не надо претендовать на то, что вы высшая форма жизни!</p><p class="p1">Никто, конечно, не понимал, о чем речь и в чем дело, — казалось, Волохов просто перепил. Сильная рука взяла его за плечо и подтолкнула к выходу.</p><p class="p1">— Я уйду, уйду, — сказал Волохов. — Не надо меня… торопить. А вы тут останетесь, праздновать будущую победу. Но только вот не надо… про аристократию, да? Ты тоже, что ли, аристократ? — обернулся он к невысокому лысому ровеснику, который аккуратно, но уверенно подталкивал его к выходу.</p><p class="p1">— Аристократ, аристократ, — промурлыкал ровесник. — Пойдем, поговорим.</p><p class="p1">— Ну, поговорим, — кивнул Волохов. Триада достроилась. Хотя его и пошатывало, в силе своей он был уверен. Он набросил плащ и вместе с лысым гостем вышел на лестничную площадку.</p><p class="p1">— Драться будем? — спросил он с вызовом.</p><p class="p1">— Почему драться, — миролюбиво ответил лысый. — Айно густо, вайно хрусто. Оболокать картошно, растолокать оплошно. Да бурно достать, али норно плескать?</p><p class="p1">— Не понял, — тупо сказал Волохов. — Я, кажется, перебрал немного… а?</p><p class="p1">— Ладно, спросим проще, — еще спокойнее предложил лысый. — Пестрый кошак на толстый лешак, справа стука, слева крюка, ан что посередке?</p><p class="p1">— Соколок, — уверенно сказал Волохов. Он сам не знал, откуда помнил эту загадку — то ли вычитал в детстве в фольклорном сборнике, то ли слыхал от старухи-няньки, тамбовской уроженки, но что-то в этих дурацких словах было невыносимо родное. Чистая нескладуха, конечно, но потому и смешно, и мило. Только в очень сильном опьянении можно было проникнуть в такие глубинные пласты собственной памяти; Волохов сразу вспомнил деревянные грибки, елки и матрешек, которыми играл в трехлетнем возрасте, — матрешки ходили искать грибки под елками. В загадке про кошака и лешака говорилось про волшебный лес около дачи — там наверняка жил леший, а в подчинении у него пестрый лесной кошак, животное вроде рыси. Кажется, Волохов даже видел его однажды.</p><p class="p1">— Хоть это помнишь, — удовлетворенно сказал лысый.</p><p class="p1">— А ты почем знаешь?</p><p class="p1">— Что ж мне, языка своего не знать? Ты, окулок, соколок-то видал когда?</p><p class="p1">— Не бывает никакого соколка, — сказал Волохов назидательно. — Это нескладуха.</p><p class="p1">— Это нескладух не бывает, — в тон ему назидательно ответил лысый, широко улыбаясь. — Соколок — это вот. Здесь кошак, здесь лешак, тут крюка, тут стука, и все это вместе качается. Неужели не видел? Вверх-вниз, три-четыре.</p><p class="p1">— Типа качели? — в недоумении спросил Волохов.</p><p class="p1">— Ну да, только похитрей. Да ты небось сам его в детстве делал сколько раз.</p><p class="p1">— Никогда.</p><p class="p1">— Стало быть, все впереди. А вот так: хомка на почку, домка на точку, бурка на ступку — кто на зарубку?</p><p class="p1">— Шмяк, — радостно сказал Волохов. — Это у нас во дворе так считались.</p><p class="p1">Лысый хлопнул его по плечу.</p><p class="p1">— Хороший был двор.</p><p class="p1">На лестничную площадку робко высунулась волоховская подруга:</p><p class="p1">— Мальчики, у вас тут все в порядке?</p><p class="p1">— Даже слишком, — сказал лысый. — Скажи там Соне, что мы пойдем, наверное.</p><p class="p1">— Я сейчас оденусь…</p><p class="p1">— А ты посиди, — властно, словно имея право приказывать волоховской подруге, произнес странный гость. — У нас свой разговор, не для женских ушей.</p><p class="p1">— Сиди, правда, Галя, — успокоил ее Волохов. — Я завтра позвоню.</p></span></span></span></span></span>
