<p class="p">Глава пятнадцатая. Отпускник</p>
</div><span id="id149"><div class="title5">
<p class="p">1</p>
</div><p class="p1">В Махачкалу Громов добирался десять дней. Поезда уже ходили неважно, и потому на все про все оставалось у него не больше недели. Правда, из разговоров с попутчиками он узнавал смутные новости о том, что войне вроде как крышка, по крайней мере боевые действия окончены, но достоверной информации не было, и вернуться, думал он, все равно придется. Что бы с ним ни сделал Гуров за невыполненное задание — долг есть долг, присяга есть присяга.</p><p class="p1">Ближе к югу стала меняться земля: потянулись ровные степи, потом солончаки, потом гнилые озерца, болотца, из которых торчали кустики сухой травы; небо выцвело, и повеяло Каспием. Каспий — особое место, недаром сюда всегда тянуло главного русского дервиша, последнего, кто умел хорошо слагать стихи на языке коренного населения. Долгая, сухая каспийская степь лежит на берегу моря, начинающегося как-то вдруг, сразу; здесь ясно, что стихии степи и воды не противоречат друг другу. Одна сухая, второе мокрое, но в обеих нет места человеку: он делает вылазки в них, любуется ими, но понимает, что терпят его до поры.</p><p class="p1">В Махачкалу, в эвакуацию, отправляли в начале войны, когда казалось, что все всерьез; ехали главным образом отрепья среднего класса, городские мещане, те, по кому война ударила бы в первую очередь, ибо элите ничего не делалось ни при каком раскладе, а низам нечего терять. Брали самое необходимое. Эвакуация была организована из рук вон плохо, жилья в Махачкале не хватало, толком устроились только те, у кого были деньги, — жилье вздорожало и стоило почти как в московских спальных районах; Маша писала обо всем этом скупо, и Громову о многом приходилось догадываться. Он знал, что она живет на улице загадочного Ахметова, местного поэта и просветителя, что мать ее устроилась в магазин, а сама она работает то письмоводителем, то учителем и кормится еле-еле.</p><p class="p1">Поезд остановился за пятнадцать километров до города. Все поезда, в которых ехал Громов, останавливались, не доезжая до станций. Что-то странное стало твориться с расписаниями: никто не желал доезжать до конца. Один Громов шел, не сворачивая и не раздумывая, — прямо в Махачкалу. Он даже думал, что это и к лучшему — проделать последние пятнадцать километров пешком, чтобы лучше приготовиться к встрече. Как-никак, ради этой встречи он вытребовал отпуск, только ее и ждал два года, и, если вдуматься, ничего у него больше на свете не осталось. Кроме, само собой, долга.</p><p class="p1">Он шел по степи, в которой пахло морем, к морю, похожему на степь. Какие-то крупные птицы перепархивали вокруг, взлетали, опускались, косились круглыми золотистыми глазами. Город возник неожиданно, как мираж. Дома были серые, пыльные, старые. Во дворах играли дети. Скоро Громов дошел до набережной, посмотрел на плоскую мутно-зеленую воду, покурил, облокотившись на парапет. Смуглый мальчик посмотрел на него с любопытством. Громов спросил, где улица Ахметова. Мальчик показал куда-то направо. Громов долго блуждал, ища хоть одну табличку с названием улицы, но ничего не находил и уже отчаялся разобраться в этой путанице узких переулков, застроенных хрущобами, как вдруг его окликнул голос, ради которого он и приехал сюда.</p><p class="p1">Как она бежала, как она бежала к нему! Ради этого стоило воевать два года и добираться на поездах, никогда не доходящих до пункта назначения. Она была в коротком ситцевом платье, которое он знал; она посмуглела, и волосы ее выгорели. Она обхватила его длинными загорелыми руками и стояла молча, уткнувшись ему в грудь. Громов с небывалой остротой понял две вещи: во-первых — что приехал, а во-вторых — что скоро уедет. Она всегда приносила с собой ощущение скорой утраты, не могла иначе, состояла из этого; он сам не знал, в чем тут дело.</p></span></span></span></span>
