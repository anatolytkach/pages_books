<span><span><span><span id="id150"><div class="title5">
<p class="p">2</p>
</div><p class="p1">— Ну, говори.</p><p class="p1">— Да что говорить. Ты ведь и не представляешь, что такое эта эвакуация. Да?</p><p class="p1">— Нет, я только то, о чем писали…</p><p class="p1">— Да ничего не писали. Я думаю, что и вся война была из-за этого. Они просто чистили Москву.</p><p class="p1">— Нет, это ты брось.</p><p class="p1">— Точно тебе говорю. Они специально объявили: все больные, увечные, малоимущие — все в эвакуацию. Если бы могли, высылали бы силком, конечно. Но зачем им было силком, когда все и так ломанулись? Твои не уехали?</p><p class="p1">— Нет, остались.</p><p class="p1">— Вот и слава Богу. А мама как с ума сошла. Войдут, всех перебьют… Знаешь, она никогда особенно не любила ЖД, а тут просто обезумела. Еще по телевизору истерики каждый день… Все, что могли, продали. Пианино отдали за гроши какие-то. Ну, и уехали. В теплушке, совершенно военной. Я иногда думаю, знаешь, Громов, может, они нарочно устроили игру в войну? Все же как в фильме. И все понарошку. Они помнят, что во время войны у них что-то получалось. Ну и подумали, что теперь опять получится, если все сделать, как тогда.</p><p class="p1">— Да ну, глупости. Ты же помнишь, как все началось.</p><p class="p1">— Помню, ну и что? К этому давно подводили. Они же понимают, что у них получается, только когда война. Война — это решение всех проблем, Громов, глупый. Ты представляешь, сколько они хапнули квартир? Наших квартир ведь нет больше, Громов. Ты был в Москве и не стал заходить ко мне, правда?</p><p class="p1">— Правда. Я боялся. Грустно очень.</p><p class="p1">— А надо было зайти, правда. Ты бы увидел, что там давно чужие люди. Барак снесли, что-то элитное построили. Мне Лизка написала, она осталась. Они очень правильно все сделали. Выперли из города всех самых уязвимых. Тебя, меня. Дураки вроде тебя ушли служить, дуры вроде меня уехали в Махачкалу. А город достался тем, кому он должен принадлежать. Понял теперь?</p><p class="p1">Громов молчал.</p><p class="p1">— Ну и вот. С мамой вообще что-то страшное делалось. Знаешь, я когда в детстве выбрасывала, допустим, старую газету или одноразовую посуду — все думала, что эта посуда меня умоляет: не бросай, я тебе пригожусь… Было у тебя такое?</p><p class="p1">— Наверное, было. От меня мало что осталось, Маша.</p><p class="p1">— От меня тоже, но я помню. И вот мама — она все время всех умоляет: подождите, может быть, я пригожусь! Все время идиотская надежда, на что угодно, на любую отсрочку, снисхождение какое-то, из всего делается повод для оптимизма, всем положено улыбаться… Она ходит и упрашивает, ест и упрашивает, спит и упрашивает: позвольте, я побуду тут из милости! Это давно началось, но здесь дошло черт-те до чего. Это были полтора года такого унижения, Громов, что я сама сбежала бы на фронт, если бы не знала с самого начала, чего этот фронт стоит. Нет, подожди, не надо, — она ложно истолковала его порыв, тогда как он хотел только обнять ее от тоски и жалости. Обоим было совершенно не до того, что называется физической стороной любви. Они лежали рядом и говорили, мучительно привыкая к близости, и не смогли бы ничего сделать, не выговорившись.</p><p class="p1">— Чем ты тут зарабатываешь?</p><p class="p1">— Я зарабатываю тут всем, Громов, всем, кроме торговли собой, и то потому, что я мало кому нужна. Здесь востребован более пухлый тип. Я работала в писательском бюро — писателей же эвакуировали сразу, все творческие союзы тоже. Половина на фронт, а кто постарше — сюда. Тоже бесполезный народ, пусть едут в Махачкалу. У них было бюро пропаганды, давали какой-то гороховый концентрат, я оформляла им путевки на сельхозпредприятия… Потом встречи с местным населением, которое по-русски уже ни бельмеса… Много, много было интересного, Громов, ты что. Я хотела на компьютере — так здесь не так много компьютеров, эти места все разобраны. Мать в магазине, то продавщицу подменяет, то пол моет. Я на местное телевидение толкалась — но там русские ни к чему. Одно время в больнице работала, тоже выперли, конкуренция. Перебиваюсь с хлеба на воду. Я давно бы вернулась, но сейчас трудно с поездами, а на самолет у нас нет.</p><p class="p1">— Я пришлю.</p><p class="p1">— Хорошо, пришлешь, и куда я денусь? Мне в Москву ехать некуда.</p><p class="p1">— Найду.</p><p class="p1">— Не знаю, как ты будешь искать. Я слышала, Москву закрыли.</p><p class="p1">— Я тоже слышал. Неправда. Я там был.</p><p class="p1">— И что? Многие вернулись из эвакуации?</p><p class="p1">— Не знаю. Я не встречал.</p><p class="p1">— А я тебе скажу. Никто не вернулся. Нас никогда не пустят обратно, Громов. Нас там не надо, точно тебе говорю.</p><p class="p1">Он опять промолчал.</p><p class="p1">— Вот ты за кого воюешь, мой прекрасный. А теперь расскажи, как воюется.</p><p class="p1">— Да как воюется, — сказал Громов. — Никак, в сущности. В первый год еще воевалось. Это, как ты понимаешь, было довольно неприятно. Когда у человека кишки вон — ничего хорошего. Говорили, привыкаешь, — так это неправда. Никто не привыкает. Сначала убивали по-настоящему. Потом пошли затишья между боями, потом они стали все дольше. Я в какой-то момент понял, что силы на войну нет ни у нас, ни у них. А демобилизовать стыдно.</p><p class="p1">— Да зачем же им демобилизовать? Что ты за ребенок у меня, Громов, милый? Им же не надо, чтобы вы все возвращались по домам. Им надо, чтобы вы воевали, они ничего другого не делают. Это как армия перед войной, помнишь? Когда они все только драили территорию?</p><p class="p1">— Помню, да. Эта армия и не умела ничего в первые полгода.</p><p class="p1">— Ну вот. Я одного не понимала: почему все безропотно едут воевать, а когда выдадут оружие — не повернут его, по классическим образцам, против начальства. А потом поняла. Безнадега, Громов. Ну, повернут они, и дальше что? Это тупик по всем фронтам, чистое самоуничтожение. С обеих сторон. И ты туда пошел ради самоуничтожения, не говори мне, что это не так.</p><p class="p1">— Я и не говорю.</p><p class="p1">— Ну вот. А то — долг, долг…</p><p class="p1">— Маш, а что не самоуничтожение? Тут никогда ничем другим не занимались. Тут нельзя просто жить. Если просто жить — ты всегда или вор, или убийца. А когда служишь — ты по крайней мере чист.</p><p class="p1">— Ага. Как славно быть ни в чем не виноватым.</p><p class="p1">— Молчи, я знаю, что ты скажешь. Ты скажешь, что я мог спасти тебя, а вместо этого ушел спасать себя.</p><p class="p1">— Никогда я этого не скажу. Я не хотела, чтобы ты меня спасал.</p><p class="p1">— Не ври.</p><p class="p1">— Я не вру. Если бы ты меня стал спасать, я бы тебя не любила. Очень мне нужен тупорылый ловкач, который косит от призыва и устраивает мне квартиру в Махачкале. Я сама себе устроила квартиру, меня дальняя родня пустила. Ты же знаешь, что у нас тут родня.</p><p class="p1">— Что же она тебе ни в чем не помогает?</p><p class="p1">— Жить пустила, и то спасибо.</p><p class="p1">Что это за родня и что за жилье, Громов уже знал. В этом самом жилье, в единственной комнате на втором этаже утлого барачного дома, ничем не отличавшегося от того, медведковского, они теперь ночевали. Машина мать караулила магазин и должна была прийти к утру, на следующую ночь уже надо было искать другое помещение — Маша обещала сбегать к писателям, те могли пустить к себе по старой дружбе.</p><p class="p1">— Так ты вернешься?</p><p class="p1">— Говорю тебе, мне некуда возвращаться. Я не хочу больше в Москву, там делать нечего.</p><p class="p1">— Что же, здесь останешься?</p><p class="p1">— Не знаю. Посмотрю. Если захочешь ко мне, приезжай сюда. Но ведь ты не захочешь, верно? Ты теперь опять на фронт?</p><p class="p1">— А как иначе? У меня отпуск, я обязан вернуться, если под трибунал не хочу.</p><p class="p1">— Да какой трибунал, кто тебя здесь будет искать?</p><p class="p1">— Неважно.</p><p class="p1">— Ну, правильно. Это мне и нравится, хотя не только это. Громов, Громов. Я никогда не смогла бы с тобой жить.</p><p class="p1">— Почему?</p><p class="p1">— Не знаю. Мне кажется, я вообще ни с кем не могу жить. Меня все оскорбляет — чужие люди, чужие привычки. Мне здесь проще, потому что здесь по крайней мере ВСЕ чужое. Язык, люди. На этом фоне как-то скрадывается эта общая чужесть, она здесь, что ли, честнее. В Москве меня все в людях оскорбляет, потому что хотя бы формально они моей породы. А здесь все, все люди не моей породы, все другие, и мне проще. Я никогда больше не поеду в Москву.</p><p class="p1">— Что, и я чужой?</p><p class="p1">— Ты — нет. Но если бы мы жили вместе, ты обязательно стал бы чужой. Я, наверное, не должна тебе всего этого говорить, но мне уже проще тебя любить, когда ты где-то. Я люблю тебя, Громов, страшно люблю тебя, но для этого ты должен быть не со мной. Ты поймешь потом, что у тебя так же. Наверное, нельзя так говорить солдату, тебе же надо на что-то надеяться, пока ты воюешь. Но война ведь уже почти кончилась, так что…</p><p class="p1">— Да нет, ты всегда была честная.</p><p class="p1">— Пойми, это не от жестокости. Это просто я такой урод. Я не могу быть с людьми, мне этого нельзя. Я бы давно сдохла, но это так безвкусно — накладывать на себя руки… И потом мама.</p><p class="p1">— И потом я.</p><p class="p1">— Да, конечно. Я не знаю, может быть, я оттаяла бы с тобой. Я сама уже не знаю, что говорю. Я все-таки очень обиделась, когда ты пошел в армию.</p><p class="p1">— Правда? — Он приподнялся на локте. — Никогда бы не сказал. Мне казалось, ты одобряешь.</p><p class="p1">— Громов, как я могла это одобрять? Ты оставил меня одну среди войны.</p><p class="p1">— Я думал, ты не простишь, если я останусь.</p><p class="p1">— Это глупости все. Я все-таки, знаешь, существо женского пола. Это ты себе выдумал какую-то валькирию, которая провожает бойца на позицию. Я не хотела, чтобы ты уходил.</p><p class="p1">— Так сказала бы!</p><p class="p1">— Ты бы не послушался.</p><p class="p1">— Почем ты знаешь?</p><p class="p1">— Я тебя знаю. А теперь я привыкла одна и уже не знаю ничего. Подожди, у тебя ведь пять дней. Может, за пять дней я опять привыкну. Не обижайся. Я, наверное, должна изображать сплошную радость, и я действительно страшно рада. Но я не знаю, что с нами будет, Громов, правда, не знаю.</p><p class="p1">— Будет то, что я довоюю и приеду за тобой.</p><p class="p1">— Я не знаю, Громов, правда. Поспи, ты ведь на себя уже не похож.</p><p class="p1">— Не хочу спать, — он обнял ее и поцеловал в шею.</p><p class="p1">— Подожди, не надо. Я за два года вообще забыла, как это бывает.</p><p class="p1">— Ну, сейчас вспомнишь. Я же люблю тебя, Маш.</p><p class="p1">— Не говори так, Громов. Не надо. Это все давно не значит ничего. Никто никого не любит, когда слова не имеют смысла. А они не имеют, пойми. Нельзя любить, когда вместо эвакуации отбраковка, а вместо войны черт-те что, нельзя, Громов. Позор — устраивать среди всего этого что-то человеческое, это значит оскорбить человеческое, ты правильно все сделал, когда ушел, пусти, не хочу…</p><p class="p1">Он все-таки заставил ее вспомнить, как это бывает, — но она не чувствовала ничего, кроме боли, и Громов окончательно уверился в том, что с войны не возвращаются. Выжженный человек приходит на выжженную землю, и все надо начинать с нуля, даже если когда-то эта земля при виде его зеленела всеми травами, пестрела всеми цветами. Победитель, пришедший с войны, и то в первый момент не знает, что делать; а отпускник, явившийся в разоренный мир с войны, где нет победителя, вообще не должен надеяться ни на что.</p><p class="p1">И привыкать друг к другу им не следовало, хоть к концу пятого дня Громов и добился от нее прежнего смеха и прежних словечек. Никогда ни к кому не надо привыкать, особенно в отпуске.</p></span><span id="id151"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Вокруг них кипел вокзал: торговали семечками, медалями, вяленой дыней. Инвалид играл на гармони. Поезда из Махачкалы ходили редко: один в неделю уходил, один приходил, и вокзал был одна декорация: на нем делалось то, что обычно делается на вокзале. Но поскольку весь этот мир давно уже одна декорация, причем спектакль закончился, а зрителям просто некуда расходиться, то и торговля семечками, и игра на гармони, и вяление дыни продолжались в прежнем темпе, и даже, возможно, бойчей. Отдельные участники представления давно уже догадывались о его сугубой декоративности, а Маша и Громов так и попросту знали, и знание это объединяло их крепче всякой любви. Я даже вам скажу ужасную вещь. Я даже вам скажу, что любовь и есть это знание о последних вещах, и только те крепко любят друг друга, кто понимают эти вещи и понимают, что другой понимает. Красота — дело двадцать пятое, она лишь знак причастности к последним вещам, принадлежности к ним: она сама — одна из них. Нет никакой красоты, кроме обреченности; красота и есть высшая форма обреченности, она для того, чтобы мы острей, ясней чувствовали: умрет все, все, даже и это. Более точного определения любви нет и никогда не было. Это я понял, потому что знаю последние вещи. Теперь я вам их рассказал, и вы тоже их знаете, и я вас люблю. Гудел паровоз, играл инвалид, без жалоб и слез стоял индивид.</p><p class="p1">— Ну, прощай, Громов, — сказала Маша. — Был бы ты другой, не любила бы тебя; была бы я другая, не любил бы ты меня.</p><p class="p1">— Правда и это, — сказал Громов.</p><p class="p1">— Вместе жить нам нельзя, сам знаешь, — какая жизнь вместе у героя и красавицы? Красавица ждет, герой воюет, дракон издыхает. Они вернулись жить долго и счастливо, но кто же когда рассказал о том, как недолго и несчастливо они жили? Герой не может жить долго и счастливо. Он взял весло и пошел странствовать, и будет странствовать до тех пор, пока встречный человек не спросит его: что это у тебя за ЛОПАТА? Тут герой и остановится, и странствие его окончится. Но не потому, что он пришел наконец к народу, не знающему мореплавания, и будет теперь учить этот народ бороздить моря. Нет, — герой просто поймет, что ему нет больше места в мире, ибо в мире забыли, что такое мореплавание, и принимают весло за лопату. Тут он и умрет, и все кончится. А красавица вдали почувствует это и тоже умрет, потому что какая может быть жизнь без героя? Без героя бывает только поэма, и то так себе.</p><p class="p1">— Правда и это, — сказал Громов.</p><p class="p1">— Но это еще нескоро, Громов, и мы будем с тобой тосковать друг по другу долго и счастливо. Ты всегда будешь обо мне мечтать и никогда не будешь со мной жить. А я всегда буду тебя любить, петь и плакать, шить и распускать. Я же не нужна тебе рядом, я нужна тебе где-то. Ты всегда будешь уезжать за день до того, как тебе станет скучно со мной. Сейчас ты обнимешь меня, чтобы еще год или два помнить только это объятие, и я буду помнить только его, и с тобой никогда ничего не случится.</p><p class="p1">— Правда и это, — сказал Громов и обнял ее, худую под тонким платьем; он вдохнул его домашний ситцевый запах, и запах ее смуглой кожи, и лиственный запах волос, и почувствовал ее слабость, усталость и непреклонность, и гордость, и твердость, и обреченность, и перелом ее возраста от юности к зрелости. Он обнял ее и оторвался от нее, и стоял, прямой, пока она, не дожидаясь сигнала к отходу поезда, пошла прочь от него, и один только раз обернулась помахать, и помахала. Это тоже было по правилам жанра, оба они знали эти правила. А Громов вошел в свой поезд, дрянной, обшарпанный, сообразно бюджету постановки, и сел у окна за исцарапанный матом стол. Множество пассажиров и новобранцев, генетической памятью коренного населения помнивших главные заклинательные слова, исписывали ими все доступные поверхности, в критические минуты вырезали их на столах, стенах, заборах, — но бесполезно, волшебные слова утратили смысл, никто никому не помогал. Пишет новобранец на стене вагона — «Х…!» — но никакой ветер не прилетит спасать его от армии; вырезает бедный васька ножиком в тамбуре — «Х…!» — но язык давно не слушается бродячего поэта, забылся, ушел на глубину, не значит ничего.</p><p class="p1">Поезд тронулся, и Громов поехал по железной дороге на войну, которой больше не было, за страну, которой больше не было. Только и была железная дорога. Врут, что можно сойти с поезда. Ну, сойдешь ты, а дальше что? Дальше снова дорога, которая только кажется степной и пыльной. На самом деле она тоже железная. Других на этой территории нет.</p></span></span></span></span>
