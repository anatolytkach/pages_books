<p class="p">4</p>
</div><p class="p1">Клуб переехал на Новый Арбат — он знал об этом из письма приятеля, полученного еще в начале службы. Все московские рестораны, казино и ночные заведения скучковались теперь тут, в паутине арбатских переулков и на новоарбатской магистрали. Даже небо здесь золотилось по ночам. Дешевых клубов не осталось, даже студенческие стоили теперь дай Бог, поскольку не осталось и малоимущих студентов — образование давно уже сделалось уделом людей с годовым доходом от сотни. Почти все оно было теперь платным (два бесплатных места на каждом факультете МГУ разыгрывались в телевикторине, где от участников требовался отнюдь не интеллект, а ловкость и сексапильность: необитаемая местность, ураганы, кручи, сырые палатки, круглосуточно включенные камеры). Громов шел по Москве и радовался, что два года назад покинул ее. У него была одна короткая командировка сюда в прошлом году, но тогда он почти ничего не успел — три дня потратил на выбивание двух ящиков гвоздей (кому, зачем нужны были гвозди?!). В мокром асфальте дробилось и плавилось московское золото. Тут не пахло никакой войной. Громов купил аппетитный с виду пирожок (шавермы теперь было не достать — кавказцев турнули отовсюду), надкусил и плюнул: гниль, кислятина… Верно, было и тут не без умысла: пусть люди знают, что за пятнадцать рублей ничего приличного не купишь. Странно, что по дороге от Красных ворот до Арбата (часть пути он проехал на десятке) ни разу не попался васька — раньше Москва ими кишела, особенно в окрестностях трех вокзалов; только краем глаза увидел он двух ментов, выволакивавших нищего из подземного перехода. Нищий был одутловатый, с васькообразным, маскообразным, воскообразным лицом.</p><p class="p1">Ни в коем случае нельзя было позволять себе думать — вот они тут, пока мы там… Это было невыносимой пошлостью, предсказанной еще отцом Николаем в монастыре, и Громов не стал сравнивать свой быт с местным. В конце концов, не за то ли он воюет, чтобы дети в Москве были спокойны, а женщины красивы? На беду, ему не встречались ни спокойные дети, ни красивые женщины. Дети вообще подевались незнамо куда (лето, все в лагерях или на дачах, или дома, прилипнув к мониторам). Женщины были то крикливо размалеваны, то замордованы до полного безразличия к себе и миру; середины не осталось ни в чем, все стеклось к полюсам, да вдобавок полюс нищеты был замаскирован, спрятан с глаз долой, чтобы ничто в центре города не напоминало его счастливым обитателям о бывших соседях. Главной чертой этого поляризованного мира стало полное неумение противников сосуществовать. Прежде и ЖД как-то уживались с русскими, хотя и без особой любви; прежде и богатый терпел рядом бедного, не торопясь высылать его из города; правда, и бедный был не настолько зловонен, как васьки в последнее время. Их не сразу стали выбрасывать из городов — поначалу пытались воспитывать, даже раздавали на руки состоятельным семьям, — но вскоре любое воспитание стало казаться анахронизмом. Мир отчетливо разделился на крайности, а крайности не бывают хороши. Так началась война с хазарами, так же, видимо, воевали и с бедностью — на истребление. Вела ли бедность ответные боевые действия, Громов не знал: вероятно, у нее не хватало сил. Хотя кто знает, не копятся ли по окраинам эти самые силы, удесятеряемые отчаянием, и не собираются ли в отряды новые партизаны… Будь громовская воля, он не смирился бы так просто с этим вытеснением, — но таких, как Громов, больше в Москве не было. Повинуясь стратифицирующему закону войны, ее гигантскому сепаратору — предвестнику последних времен, — Громов отправился в армию, где и надлежало быть человеку с правилами, а прочим бедным не хотелось никому мстить. Им хотелось быть богатыми, а из долгого опыта своей и родительской жизни они уже понимали, что это у них никогда не получится. Революции делаются не из желания разбогатеть — для них нужно представление о справедливом мироустройстве, а новые бедные были так бедны, что у них не было никаких представлений. Их вполне устраивало существование на своем полюсе. Да богатых и подталкивать было не нужно — они постепенно съезжали отсюда сами. Одни вымирали, другие эмигрировали, третьи и четвертые убивали друг друга на войне — земля медленно очищалась, как и всегда бывает с территориями, которые никто не ощущает своими.</p><p class="p1">Клуб размещался теперь в здании бывшего арбатского гастронома, где Громов ребенком часто покупал пирожные и виноградный сок. Он любил зайти сюда летом, среди жары, — тогда еще они жили неподалеку, он часто бегал в арбатский «Букинист», — любил прохладу гастронома, серо-мраморный пол и огромные прозрачные конусы сока. История похожа на этот конус — когда сока в нем еще много, на его поверхности возможны какие-то колебания и сотрясения, а когда в конусе почти ничего не останется, всей поверхности — крошечный пятачок; конец света всегда происходит в масштабах того самого света, который кончается, и потому катастрофа оказывается жалковатой. Многие не замечают ее вовсе. Громова не хотели пускать в литературный клуб. Мордатый охранник добродушно пояснил ему, что люди сюда ходят отдохнуть от войны, сами понимаете (словно все остальное время они только и делали, что рыли окопы на подступах к Москве, где-нибудь в Химках), — и Громов, выругавшись про себя, повернулся было уходить, но откуда-то из глубин клуба выпорхнул Лузгин, друг былых игрищ и забав: он схватил Громова в охапку, закружил, что-то шепнул охраннику и увлек отпускника в зал.</p><p class="p1">Тут все было как в прежнем помещении, в районе проспекта Мира, — те же красно-зеленые рыбы по стенам, грубо намалеванные кактусы, заросли, водоросли — подводная прерия; вероятно, намек был на то, что весь мир пустыня. Играла та же невыносимо легкая музыка, которую Громов запретил себе слушать уже давно, и даже стоя у входа в клуб, препираясь с охранником, он запрещал себе слушать доносившиеся до него, страшно знакомые звуки. Это были песни времен романа с Машей, да что там — он знал их и прежде, ведь читал здесь когда-то, бывал, выпивал с тем самым Шуриком, который и теперь наяривал «Питерскую»… Эту музыку он любил, и эта любовь оказалась прочнее всех.</p><p class="p1">Он любил тех, кто не цепляется за жизнь, а эта музыка не цеплялась. В ней была легкость. Может быть, она лгала, и тех мальчиков и девочек, о которых пел Шурик, давно не существовало. Может быть, никакой богемы не существует вообще, а есть тесный кружок завистников, нетерпимых к чужому успеху, — но песни, которые слушал Громов в «Венике» (Бог весть, почему так назывался этот литературный кабак, где главным блюдом был дешевый салат с пучком петрушки — именно что веник), были об этих самых весельчаках, живущих так легко, ничем не дорожащих, таких кукольных, таких хрупких. Громов никогда таким не был, но всегда к таким тянулся. В совершенной чистоте все эти черты были явлены в одном Шурике — вечном мальчике-одуванчике, тонком стебельке с кучерявым шаром шевелюры; Шурик, кажется, узнал Громова и кивнул ему, как кивал всем. Ему уж подлинно было безразлично, кто пришел его слушать. «А-адна такая девочка ходила по бульвару» — летние вечера, пыль, дворы, огромные старые московские квартиры…Всех расселят, переселят, выставят, никого не оставят.</p><p class="p1">— Ну ты как, Громов?! — тискал и тормошил его Лузгин. — Как ты сюда-то? Тебе дембель вышел, что ли?</p><p class="p1">— Какой дембель, Лузга, — сказал Громов. — Война идет, не до дембеля.</p><p class="p1">— Все еще идет? Неужели до сих пор еще воюем? — Лузгин цитировал всех и по любому поводу.</p><p class="p1">— Воюем.</p><p class="p1">— Ты, что ли, не дай Бог, раненный? Или отпуск?</p><p class="p1">— Отпуск.</p><p class="p1">— Лаконичный какой стал, сука, немногословный! Боевой типа офицер, охренеть можно! Из наших-то сегодня мало кто будет, вот жалко. Ты повидал бы всех. А где эта, подруга-то твоя? Я ее помню, такая длинная…</p><p class="p1">— В эвакуации.</p><p class="p1">— Что ж она поехала? Тогда, ты знаешь, всем предлагали, а потом оказалось — фигня, ложная тревога. Нечего было и париться.</p><p class="p1">— Ну, у нее все равно дом сносили…</p><p class="p1">— А, тогда да. Тогда правильно. Вернется — квартиру дадут. И тебе дадут, ты боевой офицер. Ты хоть расскажи, когда кончится-то?</p><p class="p1">— Не знаю, — сказал Громов.</p><p class="p1">— Но мы ломим? Гнутся шведы?</p><p class="p1">— Кое-как ломим.</p><p class="p1">— Что, секрет? Военная тайна? Да расскажи ты по совести! Ты пишешь там что-нибудь?</p><p class="p1">— Я давно не пишу.</p><p class="p1">— А, ну правильно. Ты копишь. Издашь потом «Записки кавалериста». Ты в каком звании-то, капитан, что ли?</p><p class="p1">— Капитан.</p><p class="p1">— Темно, не видать ни хрена… Ты вообще мало изменился, Громыч. Я тебя сразу узнал. Люди, по-моему, очень мало меняются. Слушай, я тебе сейчас прочту…</p><p class="p1">И Лузгин прочел. Это было в его духе — немедленно обчитывать стихами всякого встречного; Громов с ужасом подумал, что и он когда-то был таким — написав новую вещь, немедленно должен был сообщать ее кому-то. Стихи, как всегда у Лузгина, были культурные, ироничные, со множеством цитат, с эффектной, хотя и снижающей пафос концовкой, — стихи хорошего московского мальчика, которому хорошо за тридцать. Такие стихи мог написать любой из завсегдатаев «Веника». В них не было ничего от самого Лузгина, и это к лучшему — Лузгин и все остальные давно поняли, что людям времен упадка лучше не заглядывать в себя. В их распоряжении достаточный цитатный багаж.</p><p class="p1">— Ничего, — сказал Громов. — Вполне.</p><p class="p1">— Какое ничего, это моя лучшая вещь! У меня подборка в «Новом мире» в августе будет! Она бы в мае вышла, но, сволочи, перенесли. Я тебе пошлю.</p><p class="p1">— Обязательно, — кивнул Громов. Лузгин всегда очень хотел напечататься в «Новом мире». Непонятно было, зачем это ему теперь. Громов даже не знал, что «Новый мир» еще выходит. Впрочем, все симметрично: Лузгин тоже не знал, идет ли еще война.</p><p class="p1">— А Черединского ты слышал?</p><p class="p1">— Нет, не помню.</p><p class="p1">— Ну, может быть. Когда тебя загребли, он только в славу входил.</p><p class="p1">— Да не загребли меня, Лузга, — сказал Громов. — Я сам пошел.</p><p class="p1">— Хорошо, хорошо, если тебе так больше нравится. Слушай, Черединский — это что-то. Наши все девки от него визжат. Говорят, что он голубой, но ты не слушай. Он с Марфой живет, с этой, которая в церковном хоре, — помнишь?</p><p class="p1">Марфу Громов помнил, хотя готов был поклясться, что за последние два года не вспоминал о ней ни разу. Поэтесса Марфа Попова специализировалась на церковно-эротической лирике. Странно было думать, что два года назад Громов слушал Марфу Попову, даже о чем-то говорил с ней — все-таки человек очень прочен. Позавчера ночью Громов пил с сумасшедшим Волоховым и видел сумасшедшего телеграфиста, вчера ехал в закопченном древнем паровозе, а сегодня в «Венике» слушал болтовню Лузгина. Поверить нельзя было, что все эти миры сосуществуют, — но они потому и могли существовать одновременно, что никак не пересекались. Время, когда миры вынужденно пересекаются, — революции, настоящие войны, — оказывается самым плодотворным, но и самым страшным: на короткое время возникает общий мир, о котором все потом вспоминают с тоской, — мир, в котором салонная поэтесса бинтует раненых, конферансье бьет чечетку для солдат на передовой, крестьянин оборачивает сбитую ногу трофейным аристократическим бархатом, пущенным на портянки… Это длится недолго, и первый признак настоящего события — именно перемешивание, скрещивание параллельных миров; тогда, кажется, и Божественный план проступает сквозь земную реальность, и небеса с землею говорят — но теперь ничего подобного не было, и Громов яснее ясного видел, что его война была не война, а лишь одна из бесчисленных декораций того же квеста. Даже убить там не могли как следует.</p><p class="p1">— Черединского, конечно, только слушать, — продолжал Лузгин. — На бумаге все теряется. Но клянусь тебе, когда он читает — плачет. И вообще, хочешь ты того или нет — а я знаю, Громыч, ты не хочешь, — но устная форма вытесняет письменную… Черт, ты хоть рассказал бы, как ты там. Ты не встречал там Михельсона? — Михельсон был известный ЖДовский романтик, сочинитель балладных стилизаций под Киплинга, малорослый, но накачанный до безобразия мальчик со сросшимися бровями; лет пять назад он уехал в Каганат и теперь, по слухам, воевал на русской территории.</p><p class="p1">— Где ж я его там встречу?</p><p class="p1">— Да черт его знает. Собственно, я никогда не верил в его мачизм, и баллады мне его не нравились, но знаешь — не удивлюсь, если он где-нибудь при штабе. Такие вояки обязательно при штабах. Или поваром. Представляешь, Михельсон — повар?</p><p class="p1">— Не видал, — сказал Громов. — Мы, знаешь, редко с ними пересекаемся. Война сейчас позиционная. Больше выжидаем.</p><p class="p1">— А-а, — безразлично сказал Лузгин. — А то по телеку все дрянь, ни слова правды. Я, знаешь, тебе даже завидовал поначалу. Потом посмотрел пару репортажей — ну ее на хрен, что это за война? Ты понимаешь, что я не из трусости, да, Гром? Я же писал тебе. Но это не моя война, я не могу воевать на стороне этого государства, а воевать против этого государства мне совесть не позволяет. Все-таки Родина. Родина есть предрассудок, который победить нельзя, сказал автор получше нас с тобой. Пока не призывают, я не сунусь. Призовут — пойду.</p><p class="p1">Громов отлично знал, что лузгинский возраст призвали, но какой это был призыв? — так, название одно. Служить пошел дай Бог каждый пятый, и то все больше деревенщина, дети похмелья, жертвы хронического недокорма. Лузгин, впрочем, ошибался, думая, что Громов кого-то винит. Громов был одним из немногих добровольцев, пошедших в армию исключительно из эгоизма — потому только, что дома стало невыносимо. Толстой сделался вегетарианцем не потому, что хотел похудеть, и уж подавно не потому, что надеялся личным примером воздействовать на умы, усовещивая бессовестных. Праведник начинает праведную жизнь, как иной спасается из горящего дома, — сам Толстой предпочитал эту метафору всем другим и никогда не обижался на тех, кто не спасается. Он искренне их жалел. Громов хотел бы объяснить это Лузгину, добавив попутно, что, в отличие от Толстого, ни во что особенно не верит — просто жить с таким неверием в армии легче, чем на гражданке, — но давно отказался от задушевных разговоров. Он, может, и не возражал бы против такого разговора, но утратил язык, на котором можно было говорить с Лузгиным. В армии принято было другое наречие: человек, командующий ротой, не должен был помнить прежние слова, если хотел сохранить себя. Это во время настоящей, все перемешивающей войны можно читать солдатам стихи и командовать интеллигенции «Смирно!». Во время поддельных войн офицеры не знают стихов, а поэты не командуют.</p><p class="p1">Громов поглядывал по сторонам: клуб был прежний, и главным в нем была ностальгия. Это была удивительная черта интеллигентных московских заведений: они и начинались как ностальгические, ненавязчиво тоскующие по эпохе джаза, раннему Голливуду или московским шестидесятым с их второсортной придурковатой бодростью, но уже со второго посещения мальчики и девочки вовлекались в процесс, начиная тосковать по первому. Во второй раз и публика казалась уже не той, хоть была той же, и атмосфера — не такой праздничной; все московские клубы жили в перманентной легкой тоске по ушедшему, а точней — уходящему времени; такая атмосфера идеально соответствует прожиганию жизни, а в таких местах ее именно тратили, не признаваясь себе в том, что девать ее попросту некуда. В эту игру все старательно играли, в восемнадцать лет грустя о прошедшей молодости, вспоминая полулегендарных персонажей, имевших свойство исчезать и появляться, — помнишь братьев Левычей? А Батона? А Удивительную Девушку с Покровки — да-да, она ведь так и представлялась? Все только и делали, что грустили о прекрасном былом, отлично зная, что ничего прекрасного не было, да ничего, в сущности, и не изменилось — кроме того, что еще день, месяц, год жизни провалился в никуда; все сходились снова, отсюда нельзя было уйти навсегда, ибо ностальгия — сильный наркотик, особенно для тех, кому нечем больше позолотить бездарную трату времени. Вот и Громов пришел сюда — это в нем уцелело, хотя больше, пожалуй, ничего не осталось. Или осталось все? Безоговорочно изменилось одно: раньше он хотел почти всех местных девушек, а теперь вообще не представлял, как можно с ними иметь дело. Не то чтобы все два армейских года он воздерживался: случались ночевки в Дегунине и в других деревнях, и увольнения в городах, но здешние девушки были совсем другие, и Громов не понимал теперь, как можно с ними выпивать, шутить, ложиться в постель. Подсознательно он не мог им простить одного: он был на войне, несколько раз чуть не был убит, считал заслугой храбрость перед лицом гибели, — а эти девочки существовали рядом со смертью каждый день и словно были ей сродни, а точней, вовсе ее не замечали. Она не имела для них значения, это было врожденным даром, даже теперь они были сильней Громова. Тяжелые люди ничего не могут с этим поделать, ибо легкость — дар врожденный.</p><p class="p1">Между тем на сцену выскочил Черединский, приветствуемый хоровым женским стоном. Это был высокий, тощий до субтильности вечный мальчик, которому можно было дать и восемнадцать, и тридцать; на нем не было ничего, кроме ярко-алых шелковых обтягивающих трусов. Обвиваясь вокруг стальной колонны, как стриптизерша вокруг шеста, он принялся громко, с придыханием и подвывом, читать пятистопные ямбы, содержания которых Громов не уловил. Все держалось на эллипсисах, якобы задышливых, торопящихся — в Москве года четыре назад установилась такая мода: писали полуфразами, обрывками — сказать давно было нечего, но имитировался надрыв. Черединский закидывал голову, приседал, встряхивал светлыми кудрями:</p><p class="p1"><em>— Люблю с утра — откинув одеяло —</em></p><p class="p1"><em>Как в первый раз — не знаю, не скажу —</em></p><p class="p1"><em>Нет, никогда — когда бы ты сияла —</em></p><p class="p1"><em>Когда бы я — откинув паранджу —</em></p><p class="p1"><em>Люблю сейчас — но смерть уже так скоро —</em></p><p class="p1"><em>А мне всего — но может быть, уже —</em></p><p class="p1"><em>Последний звук — из ангельского хора —</em></p><p class="p1"><em>Сними, сними — но лучше в парандже…</em></p><p class="p1">— А?! — шептал Лузгин. — Если бы глазами, то, может быть, ерунда, но согласись, что в таком виде…</p><p class="p1">— Сильно, — сказал Громов.</p><p class="p1">— Чего «сильно», чего «сильно»?! Ты небось думаешь — в армию бы его, в окоп, к моим ребятам?! Фельдфебеля, бля, в Вольтеры! Солдафон хренов.</p><p class="p1">— Не думаю.</p><p class="p1">— А что, если бы послать его в бригаде артистов, перед солдатами читать? Как думаешь, покатит? — похохатывал Лузгин.</p><p class="p1"><em>— И вот тогда — как птица в глубину —</em></p><p class="p1"><em>Нырнуть в окно, где тополь и направо</em></p><p class="p1"><em>Такой же мальчик, как когда-то я,</em></p><p class="p1"><em>Нагнать совсем, по голове погладить,</em></p><p class="p1"><em>Сказать — не бойся, девочка не съест,</em></p><p class="p1"><em>Не выдаст Аполлон, прощай, так лучше, —</em></p><p class="p1">выкрикнул Черединский на одной ноте, повернувшись к залу спиной; потом стремительно вырвался из трусов, бросил их назад, не оборачиваясь, и ринулся за голубой вениковский занавес.</p><p class="p1">Вокруг трусов возникла небольшая потасовка; они достались толстой румяной девушке, тут же победоносно взметнувшей их над головой. Зал визжал. Девушка прижала трофей к лицу и разрыдалась от счастья.</p><p class="p1">— Ну чего, чего? — приставал Лузгин, одержимый чувством вины и жаждущий немедленно получить от Громова либо отпущение грехов, либо равносильное ему подтверждение громовской деградации: нечего делать в этих окопах, люди там с ума сходят и вообще. — Что ты скажешь?</p><p class="p1">— Слушай, Паш, — сказал Громов, — А вон там не Бахарев сидит?</p><p class="p1">— Узнал, гляди ты, — Лузгин прищурился, вглядываясь. — Точно, Бахарь. Ну, этот редкая птица, высоко залетел. Он знаешь теперь где? В администрации, курирует идеологию.</p><p class="p1">— Речи пишет?</p><p class="p1">— Да ну. У него книги, издательство «Евразия», мультикультурный проект… Он же вместе с Мышастиковым выдумал «Новую автономию». Ты слыхал анекдот про трех идеологов? Был Суслов, потом Сурков, потом Мышастиков. Все грызуны, мал мала мельче. Дотрахались до мышастиков.</p><p class="p1">Директивы Мышастикова Громов читал, их доводили на политзанятиях — это были витиеватые поэтизмы, где расплывчатая, кучерявая бледная мысль, как бледный кучерявый Черединский вокруг шеста, вилась вокруг нескольких опорных слов: великая степь, безоглядность, непрагматический масштаб, коридор пассионарности, бродящие вызовы, конспиративные месседжи, автономия белых, северная ориентация, трехпальцевая комбинация. Бахарева сильно разнесло за последние два года. Он мрачно курил трубку, глядя прямо перед собой — видимо, в коридор пассионарности.</p><p class="p1">— Пошли, пошли. Вы же с ним сколько не видались! Ему наверняка интересны вести с фронтов. Бахарь! Смотри, кого я веду!</p><p class="p1">Они протолкались к столику, где Бахарев сидел одиноко, отрешенно, без спутников: посетители «Веника» образовали вокруг него почтительное кольцо, избегая тревожить даже приветствиями. По Громову он скользнул неопределенным и, пожалуй, робким взглядом: в конце концов, Бахареву было всего двадцать восемь, и он не совсем еще зарос сановитостью. Он понимал, что боевого офицера надо приветствовать ласково и ободряюще, в соответствии с идеологией, — но понимал и то, что чиновник его ранга не может даже снисходительно общаться с бывшими однокашниками: он стал другим, и надо сразу же, без хамства, дать почувствовать это. Сейчас он попросит перевести его с фронта, подумал Бахарев. Сейчас он подумает, что я попрошусь в тыл, подумал Громов. Оба поняли, что для разговора им оставлен чрезвычайно узкий коридор; в России вообще не осталось разнообразия — все стало предсказуемо.</p><p class="p1">Громов подошел единственно потому, что когда-то, на поэтических собраниях его молодости, Бахарев пару раз сказал неожиданно умные вещи. Он и тогда уже курил трубку — для солидности, — но еще не мыслил теми странными сгустками, которыми были полны теперь их совместные с Мышастиковым послания. Теперь работа Бахарева заключалась в том, чтобы придумывать опорные слова. Никакого смысла за ними давно не было — нужен был человек, имитирующий смыслы, и для этого государственного символизма поэт годился лучше прочих. Стратегия камышовых тигров. Выпад. Глобализация провинции. Эскепизм родника. Глухота авгуров. Пластиковое варварство. Бахарев давно комбинировал свои вербализмы, как он называл их, методом Рембо — или, если угодно, методом тыка. Все политологи России, состоящие теперь поголовно на кремлевском пайке, наполняли эти формулы произвольным содержанием и растолковывали населению.</p><p class="p1">— А, здравствуй, — небрежно, но вежливо сказал Бахарев. — На каком фронте?</p><p class="p1">— В Дегунине. Здравствуй, Слава.</p><p class="p1">— Каков дух в войсках? — с иронической улыбочкой спросил Бахарев. Он старательно играл в умного чиновника, вынужденного спрашивать о дежурных вещах, сознающего как глупость, так и необходимость подобных условностей.</p><p class="p1">— Духом называется солдат первого года службы, — сказал Громов. — А не можешь ты как-то устроить, чтобы регистрация для офицеров была устроена попроще? У человека отпуск десять дней, максимум две недели. Он половину этого времени тратит на оформление, флюорографию всякую… Неужели упростить нельзя?</p><p class="p1">— Ну, это не моя компетенция, — холодно сказал Бахарев. — Вы присаживайтесь, что стоять-то?</p><p class="p1">Громов и Лузгин присели к столу.</p><p class="p1">— Чего пить будете?</p><p class="p1">— Я не пью, — сказал Громов.</p><p class="p1">— Быть не может, чтобы боевой офицер — и не пил, — повелительно возразил Бахарев, щелчком подозвал студентку-официантку и заказал «Белой силы» — новой беспохмельной водки, стоившей втрое против обыкновенного. — Я поговорю там, конечно, — сказал он, показывая глазами в потолок. — Все-таки ко мне прислушиваются. Но не думаю, что повлияю. Сам понимаешь, у военного начальства свои прибабахи. Без флюорографии никак. Ты смотрел в последнем «Репортере» сюжет про контейнер в желудке?</p><p class="p1">— Мать честная, да ведь это чистый бред! — влез Лузгин. — Я смотрел. Никто не поверил.</p><p class="p1">— Смею тебя уверить, — важно заметил Бахарев, — что все это чистая правда. Я лично курировал.</p><p class="p1">— Ну какая же правда, Слава… — начал было Лузгин, но осекся под ледяным взглядом Бахарева.</p><p class="p1">— Иногда кажется, что абсурд, а когда вдумаешься — все осмысленно, — обратился Бахарев к Громову. — Я думаю, что это как устав. И моя служба тоже в своем роде военная, так что не подумай…</p><p class="p1">Отчего-то все они были уверены, что он плохо о них подумает. Им давно не было стыдно перед собой, но перед боевым офицером они по привычке комплексовали. Знали бы они, насколько мне там легче.</p><p class="p1">— Но тогда, может, хоть отпуска продлить?</p><p class="p1">— Я поговорю, — с легким раздражением повторил Бахарев. — Они меня слушают.</p><p class="p1">Громов вспомнил, что он и в молодости любил сфотографироваться с известным автором, задать ему колючий с виду, но глубоко комплиментарный по сути вопрос — типа «Не слишком ли сложна ваша новая манера для современного читателя?»; любил похвастаться надписью престарелого мэтра на книге, гордился даже тем, что лично выкрасил несколько переделкинских заборов и бывал за это угощаем скромными обедами; впрочем, это выглядело невинной заботой о стариках, да и бороться в литературе давно было не за что — она не давала никаких привилегий. Видимо, Бахарев уже тогда угадал, что спасением для власти в который раз окажется именно поэзия с ее способностью говорить все и ничего.</p><p class="p1">— Поговори, — сказал Громов.</p><p class="p1">— Впрочем… — Бахарев выдержал паузу. Надо было чем-то побаловать офицера от щедрот своих, а заодно и блеснуть осведомленностью. — Есть маза, что все это скоро кончится.</p><p class="p1">— Что именно?</p><p class="p1">— Война, вообще. Все главное получено. Автоматическое преодоление полномочий по военному времени — раз, мобилизационная экономика — два. Скажу тебе честно, он устал. Ты думаешь, он сам хочет продлевать полномочия до бесконечности? Он еще слабей Володи, хоть и держится огурцом. Это все-таки очень утомительно. Да и они понимают, что воевать бессмысленно. Против такой махины… прати против рожна…</p><p class="p1">— И что будет? — спросил Громов. Разговор принимал любопытный оборот.</p><p class="p1">— Да ничего не будет. Скорее всего, отдадим автономию. Будет небольшой русский Каганат, вроде черты оседлости. Где-нибудь на Востоке. Ну и чего они добились? Есть, правда, версия, что черта теперь будет жесткая, вроде границы. Отгородиться, как от Чечни. Почему не отдать им часть земли? Китайцам отдали, и что страшного? Скажу тебе честно, эффективность — не пустой звук. Лучше иметь гектар эффективной земли, чем двадцать гектаров пустоши.</p><p class="p1">— И что, они пойдут на это?</p><p class="p1">— В смысле на черту оседлости? Пойдут.</p><p class="p1">— С ними говорили?</p><p class="p1">— С ними постоянно говорят, — тонко улыбнулся Бахарев. — Современная война ведется не в окопах, уж прости. Современная война ведется за хорошо накрытыми столами, под тонкие вина. В постиндустриальном мире окоп — только декорация. А главные пружины — там, — он опять завел глаза к потолку. — Идет большая постановка, или даже, я бы сказал, пишется картина. Большой живописный проект. Мир должен двигаться, иначе он застынет. Надо писать сценарии.</p><p class="p1">— И ты, стало быть, их пишешь? — спросил Громов.</p><p class="p1">— Иногда — я, — со значением кивнул Бахарев. — Понимаешь, на определенном этапе тебе становится скучно оперировать просто словами. Ты начинаешь ставить свои пьесы на другой сцене. Это та же литература. Ты захотел делать литературу на войне, я — в политике, но оба мы по-прежнему литераторы. — Он нашел наконец формулу, уравнивающую его с Громовым и притом неунизительную для него самого.</p><p class="p1">— То есть вся моя окопная пьеса, выходит, бессмысленна. Вы уже договорились.</p><p class="p1">— Почему — бессмысленна? Бессмысленна для кого? Для тебя она полна смысла.</p><p class="p1">— И когда все кончится?</p><p class="p1">— Думаю, скоро, — неопределенно сказал Бахарев. — Я бы и раньше договорился… Они и сами наверху уже испугались — национализм ведь такая вещь, что может обернуться против системы. Наши цепные псы несколько зарвались. Там уже натягивают поводки, но они все лают. Скины оборзели совершенно. Ты видел отряды? Прямо по городу рассекают, пристают к прохожим…</p><p class="p1">— Ну, ясно, — сказал Лузгин. — К кому им еще приставать? ЖДов-то не осталось, и чурок поперли…</p><p class="p1">Бахарев скользнул по нему брезгливым взглядом и не удостоил ответом. Лузгин не был боевым офицером и не мог служить подходящим объектом для демонстрации дружеского демократизма.</p><p class="p1">— Так что пора, пора. Повоевали, и хватит. В армию люди не хотят, значимых успехов, уж извини, нет… Генеральчики рвутся во власть, а кому это надо, если они фронтом командовать не могут? Особенно не рассказывай про это, но я тебе как старому другу, — подчеркнул Бахарев, — скажу твердо: не позднее осени.</p><p class="p1">— До осени много чего может случиться.</p><p class="p1">— Например?</p><p class="p1">— Убьют много кого, — сказал Громов.</p><p class="p1">— Ну, не преувеличивай. Я смотрю за сводками. Пойми, всякая война в сегодняшнем мире нужна не для окончательной победы. Окончательных побед больше нет. Последняя была в сорок пятом, почему ее так и празднуют. Теперь — только встряски, чтобы кровь не загустела. Мы не заинтересованы в том, чтобы ЖДов не было вовсе. Полное истребление — это лозунги крайних, скорее жупел, пугалка. Евразийская цивилизация не истребляет никого, у нее собственный цикл. Нам достаточно, чтобы они к нам не лезли — только и всего.</p><p class="p1">— Два года назад были совсем другие разговоры.</p><p class="p1">— Два года назад и война была другая, вспомни. Обе стороны очень быстро поняли, что в современном мире между двумя высокоразвитыми народами серьезной войны быть не может. Показали друг другу, и будет. Вернется черта, будут местечки, в столицы им ходу не будет, революций они теперь долго не захотят — идея поделить страну с самого начала была вовсе не так глупа.</p><p class="p1">— Вы немножко недодумали, — тихо сказал Громов. — Вы не учли, что война — это не так просто.</p><p class="p1">— В каком смысле? — насторожился Бахарев.</p><p class="p1">— Война меняет людей. Русская война — в особенности. Москва от нее отгородилась, но в стране она идет. И она не может кончиться просто так. Она переместится на улицы, как чеченская. Войны нельзя бросать недоигранными. Их надо либо выигрывать, либо проигрывать.</p><p class="p1">— Это двадцатый век, — пренебрежительно сказал Бахарев. — Он давно кончился. Сегодня другая геополитика.</p><p class="p1">— Геополитика всегда одна, — ответил Громов. — Либо они нас, либо мы их.</p><p class="p1">— Но пойми, есть цветущая сложность зрелой нации. Зрелая нация не может существовать изолированно от всех. Автономия белых — это не уничтожение черных или желтых. Это выработка культурных стратегий для всей страны…</p><p class="p1">— Не может быть общих стратегий, когда война проиграна, — упрямо повторил Громов. — Объединяет только победа. Если не будет победы, не будет и страны. Все распадется.</p><p class="p1">— Ну, кто же сказал, что не будет победы? Победа будет. Враг окончательно изгнан с нашей земли.</p><p class="p1">— На нашу же землю? — усмехнулся Громов.</p><p class="p1">— Мы обставим это как резервацию. Если угодно, как плен.</p><p class="p1">— И как ты заглушишь их радио? Телевидение? Интернет?</p><p class="p1">— Обо всем можно договориться, — успокаивающе ответил Бахарев. Он сам не знал, как заглушить радио, телевидение и интернет. Он об этом не думал. Наверху давно не считали даже на один ход вперед. Там понимали только, что если не закончить войну на условиях дележа территории, воевать скоро станет нечем. Судя по всему, это понимали и в противоположном лагере: сигналы возможного примирения двинулись практически навстречу друг другу. — Это же не будет перемирие. Будет генеральное сражение, боевая ничья.</p><p class="p1">— Генеральное сражение? — Громов насторожился. — Когда?</p><p class="p1">— Скоро, скоро. Но ты успеешь. Без тебя не начнут.</p><p class="p1">— И его результаты заранее известны?</p><p class="p1">— Ну, не вполне. Но это будет красивое, эффектное завершение войны. Только и всего. Мы уже многое придумали, не переживай, и жертв постараемся поменьше… Только, Громов, ты меня понимаешь — это действительно не для чужих ушей, — Бахарев сам испугался собственной откровенности. Неужели ему настолько хотелось произвести впечатление на этого служаку?</p><p class="p1">— И когда?</p><p class="p1">— Этого тебе никто не скажет. Когда время подойдет. Это ведь не просто так делается — все надо подсчитать, продумать…</p><p class="p1">— И чем оно закончится?</p><p class="p1">— Нашей полной победой. Такой, чтобы они убрались, — и достаточно.</p><p class="p1">— А они согласны?</p><p class="p1">— Ну, вспомни, сколько нас и сколько их. Думаю, они понимают, что вариантов нет.</p><p class="p1">— Скажи, — медленно произнес Громов, — а может так случиться, что вы все просчитаете, проговорите это ваше сражение на уровне генералов… а солдаты возьмут и сделают все иначе?</p><p class="p1">— Не думаю, — холодно сказал Бахарев. — Даже если они все переубивают друг друга, решение будут принимать не они.</p><p class="p1">— А если солдаты почувствуют измену и перестреляют генералитет?</p><p class="p1">— А потом друг друга? — усмехнулся Бахарев. — Слушай, кто из нас окопный офицер? Неужели ты сам не видишь, что люди не хотят больше воевать? Всех распустим по домам. Вернутся победителями. Каждому льготы. Кстати, ты не думал о том, что будешь делать после войны?</p><p class="p1">— Там о таких вещах мало думают, — сказал Громов. — Ты же сам видишь — война специальная. Никто не думает, что она скоро кончится.</p><p class="p1">— А о чем думают? Это интересно.</p><p class="p1">— Да ни о чем не думают. Говорят между собой, что это не война, а масштабные учения. Противник-то давно прячется. Кажется, мы ему не очень и нужны. Мы входим в деревни, берем их, они входят в другие и тоже берут, потом меняемся местами… Иногда артисты приедут, иногда кино покажут…</p><p class="p1">— Вот видишь, — сказал Бахарев. — Значит, пора все это кончать.</p><p class="p1">— Да нельзя это кончить, как ты не понимаешь! Война не кончается договором. Люди должны пойти по домам с чем-то внятным… Иначе они дома разнесут, жен побьют…</p><p class="p1">— Ничего, ничего. Будет нацпроект «Демобилизация», — этот нацпроект Бахарев придумал только что, но сообразил, что наверху оценят. — И нацпроект «Граница». Главное — прочертить границы. С территориальных начнутся идеологические. В конце концов, сам понимаешь — куда нам столько земли…</p><p class="p1">— А жителей той части, которую мы им отдадим, — кто-нибудь спросил, хотят ли они жить под ЖДами? — поинтересовался Громов.</p><p class="p1">— Ну, мы эвакуируем… Как тогда…</p><p class="p1">— А куда денем? Тоже как тогда, когда беженцам некуда было ткнуться?</p><p class="p1">— Найдем, найдем. В конце концов, Москва строится. Будет нацпроект «Жилье», — Бахарев сам усмехнулся очередному нацпроекту.</p><p class="p1">— Никогда это не кончится, Слава. — сказал Громов. — Так там и передай, если тебя слушают. И насчет отпусков тоже намекни, ладно?</p><p class="p1">Он встал, попрощался и выбрался из «Веника» на теплый, влажный воздух. Дождь перестал, висел легкий туманец. Из бесчисленных арбатских заведений доносился шансон, почти неотличимый от блатского.</p><p class="p1">Почему я его не убил, подумал Громов, почему не убил сейчас? Ведь это несложно. Он рыхлый, толстый. Я мог бы крикнуть: ах, гадина, ты играешь в свои игры, пишешь свои пьесы, а у меня в роте в первый год поубивало двадцать лучших людей! И это только у меня, а сколько всего было! А у ЖД сколько?! Но я его не убил, потому что это ведь не он убил. Он такая же пешка в этой игре и так же играет свою роль до конца. Просто я выбрал солдатскую, но разве я поэтому лучше? Я никогда не согласился бы играть идеолога, врать, выдумывать идеологическое обеспечение бойне, — но я пошел на бойню и убивал… И неизвестно еще, скольких я убил лично… Не он начал войну, и если теперь он хочет замириться — пускай. Просто мне больше нечего будет делать. Прав был Волохов: Одиссей без Итаки. Я думал вернуться, а тут вместо Итаки помесь борделя с ночлежкой, в одном отсеке ночлежка, в другом бордель. И всех женихов не поубиваешь, хотя Пенелопа когда-то была моей. Тут у тебя неувязка, Волохов, неувязка, командир летучей гвардии. Если бы этот Одиссей так долго странствовал, ему плевать бы стало на женихов. Это не воскресило бы его товарищей, и рабынь он вешать не стал бы… Он вернулся бы на Итаку, плюнул и пошел дальше, что, собственно, и случилось. Так он странствовал с веслом на плече, пока не встретил человека, спросившего: «Что у тебя за лопата?». Тогда он понял, что нашел наконец дом. Здесь не знали мореплавания, и он взялся учить их мореплаванию — бедный мужик с веслом, античная статуя, извращенная впоследствии развратным Римом. Я вернулся на Итаку и поехал дальше, спасибо. Впрочем, я не видел еще Машку.</p><p class="p1">— Если армию распустят, пойду в монастырь, — вслух сказал Громов. — Николай примет.</p><p class="p1">Он глубоко вдохнул и пешком отправился в сторону Бородинского моста.</p></span></span></span></span>
