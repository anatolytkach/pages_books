<span><span id="id26"><div class="title4">
<p class="p">6</p>
</div><p class="p1">У Вали болело все тело, но такой приятной боли он не испытывал даже после спортивных тренировок, когда в девятом классе кратковременно занимался айкидо.</p><p class="p1">После долгого воздержания проснуться в обществе сразу двух туземок — ощущение сильное. Некоторое время Валя к нему привыкал. Обычного утреннего желания забыть ночь и скрыться куда подальше не было, не было и жгучего стыда, обещанного всей мировой литературой. Валя чувствовал себя удивительно мило, другого слова не подобрать. Некоторое время все смущенно хихикали и друг друга щекотали.</p><p class="p1">— А ты что там в университете учишь? — спросила та, что справа. В утреннем свете она казалась симпатичнее той, что слева.</p><p class="p1">— Фольклор, — важно сказал Валя. — Мы даже собирали после первого курса. Песни там, частушки.</p><p class="p1">— У нас нет частушек, — сказала та, что слева. — Ночные песни есть.</p><p class="p1">— Это как? — Валя восхитился этой новой возможностью. Он и представить не мог, что станет первым собирателем арийского фольклора.</p><p class="p1">— Ну, это так, — сказала та, что справа, и нараспев произнесла:</p><div class="poem">
<div class="stanza">
<p class="v">— Девушки, девушки, зачем</p>
<p class="v">Вы купаетесь в озере, девушки?</p>
<p class="v">Можете вы то там найти,</p>
<p class="v">Что вам учиться помешало!</p>
</div>
</div><p class="p1">Левая прыснула. Валя не понял, над чем она смеется. Смысл ночной песни от него ускользал.</p><p class="p1">— Чему учиться? — спросил он, чем вызвал новый приступ хихиканья.</p><p class="p1">— Что ты думал, у нас школы нет? У нас старшие учат младших, — едва выговорила правая сквозь хохот.</p><p class="p1">— Ничего я не думал, — буркнул Валя.</p><p class="p1">— А еще, смотри:</p><div class="poem">
<div class="stanza">
<p class="v">— Цветет в лесу очень много черемухи,</p>
<p class="v">Есть кое-где и вдруг сирень.</p>
<p class="v">Мой милый скоро вернулся,</p>
<p class="v">Меня перевернул!</p>
</div>
</div><p class="p1">— Девчонки, — сказал Валя, когда они отсмеялись, — а можете на своем языке?</p><p class="p1">— На каком? — изумились они почти хором.</p><p class="p1">— Ну, на этом! На арийском!</p><p class="p1">— Так наш и есть арийский! Это ваш неправильный, а наш такой, какой надо. Никакого другого мы не знаем.</p><p class="p1">— А вот еще, знаешь, — прыснула левая, — смотри:</p><div class="poem">
<div class="stanza">
<p class="v">— Мой милый покидает избу,</p>
<p class="v">Стоит он прямо перед дверью,</p>
<p class="v">Хочет что-то найти</p>
<p class="v">И неожиданно падает!</p>
</div>
</div><p class="p1">— Теперь отвернись, — сказала правая, — нам пора одеваться. Гость отвернулся, не смотрел.</p><p class="p1">Валя закрыл глаза.</p><p class="p1">— Нет, в подушку лицом!</p><p class="p1">Валя послушно вжался лицом в подушку, снова вдохнув запах лежалого сырого белья, смешанный с дымком, хвоей и, страшно подумать, шампунем — но не могли же они мыться шампунем! Наверняка это был, как в старой книжке, их естественный запах. Он слышал, как что-то шуршит, потом раздался шепот и хихиканье, потом — быстрые шаги и скрип двери. Когда он поднял голову, никого не было.</p><p class="p1">В ночных песнях было что-то смутно знакомое, но он пока не понимал — что именно.</p><p class="p1">Штаны он застегнул с тайным сожалением, будто это нехитрое движение окончательно подвело итог ночи, отделив ее от наступающего дня. Валя подхватил рюкзак, моряцкой походкой вышел из избы и пошел к поляне, не оглядываясь. Уже светлело, и если бы он оглянулся, он заметил бы, что и дом не так стар, и дверь выкрашена совсем недавно. Возле второй избы он увидел Дубняка — тот, в одних трусах, отжимался на кулаке, заложив вторую руку за спину.</p><p class="p1">— Доброе утро, — весело сказал Валя. Он сейчас любил даже Дубняка.</p><p class="p1">— Пятьдесят восемь, пятьдесят девять, шестьдесят… А, Песенка. Выспался?</p><p class="p1">— В общем, да. — Валя был так благостен, что даже не огрызнулся на «песенку», но и посвящать Дубняка в подробности ночи не собирался. — А где все?</p><p class="p1">Все были еще в доме, собирали вещи: хмурый дядя Игорь, сосредоточенный Тихонов, задумчивый Окунев. Глядя на них, Валя чувствовал, как прошедшая ночь стремительно тает, принимая статус воспоминания. Вале быстро и вкратце рассказали новости: по всему выходило, что надо двигать к заводу. Но сначала поесть и узнать дорогу.</p><p class="p1">Они вышли к большому костру. Поляна теперь жила дневной суетливой жизнью: мужчины, женщины, дети — все были заняты своими делами, непостижимыми для посторонних. Валя во все глаза высматривал своих девушек, но не видел. Едва заметив гостей, их окружили и отвели к большому костру, сунули каждому по деревянной миске (зато ложки были алюминиевыми, столовскими) с темной вкусной кашей, похожей на гречневую. Валя надеялся, что их снова угостят мамонтятиной, но у ариев, видмо, было не принято завтракать мясом. Как только Валина миска опустела, Николай Егорыч потянул его за собой.</p><p class="p1">— Шаман хочет говорить. Ты идешь. Другие остаются.</p><p class="p1">Валя испугался. Он понял, что речь сейчас пойдет о ночном приключении — он был уверен, что шаману все известно. Что, если он совершил преступление? Но они же сами пришли… Может, все равно не надо было? А может, девушкам не понравилось? Может, они рассказали шаману, как он неопытен, и тот поднимет его на смех? А вдруг шаман скажет, что Валя должен теперь жениться — сразу на двух, как здесь принято?</p><p class="p1">А что, не самая плохая идея. Валя представил, как он живет с племенем. Как вообще их день проходит? Наверное, они охотятся, значит, придется и ему… Интересно, у них хоть оружие современное? Валя представил себя, с копьем бегущего за мамонтом. Вряд ли им тут филологи нужны… О! Он будет писцом! Он напишет для них историю арийского народа. Тогда, возможно, на мамонта его не пошлют… В любом случае, следующий мамонт только через год…</p><p class="p1">— Гость спит хорошо? — спросил шаман, как показалось Вале, с сальной ухмылкой.</p><p class="p1">— Хорошо, — осторожно ответил он.</p><p class="p1">— Гость дал документы.</p><p class="p1">Этого Валя никак не мог ожидать. Но спорить он не стал, достал из внутреннего кармана паспорт в непромокаемом пакете, развернул и протянул шаману. Тот без интереса посмотрел на документ.</p><p class="p1">— Не это. Билет, путевка. Оформлять надо.</p><p class="p1">— К-какой еще билет? У меня нет путевки…</p><p class="p1">— А у кого?</p><p class="p1">— Я не знаю… Я вообще впервые слышу. У нас нет путевок. Мы сами экспедицию собрали…</p><p class="p1">— Так, — сказал шаман. Он был явно озадачен. — Кто главный?</p><p class="p1">— Игорь, — Валя указал на дядю, сидевшего у костра в середине поляны.</p><p class="p1">— Очки? — уточнил шаман.</p><p class="p1">— Да. Игорь Савельев.</p><p class="p1">— Он тебе говорит, зачем идет?</p><p class="p1">— Конечно. Он самолет ищет, я же сказал.</p><p class="p1">— Понятно. — Шаман нахмурился, но быстро вернулся к прежней деловитости. — Мне с ним надо это, говорить. Я говорить с ним имею.</p><p class="p1">— Пожалуйста, — разрешил Валя в недоумении.</p><p class="p1">— Значит, они сюрприз тебе делают? — уточнил шаман.</p><p class="p1">— Ну, не знаю…</p><p class="p1">Валя опять ничего не понял, но обрадовался, что речь не зашла о девушках.</p><p class="p1">— Игорь сказал, что здесь рядом завод, — поспешно сказал он, чтобы речь и дальше об этом не зашла. — Вы нам дорогу не покажете?</p><p class="p1">— А чего показывать? — спросил шаман. — Там место такое, надо будет — сами придете, не надо будет — не придете. Туда кто не надо, тот не попадай.</p><p class="p1">Он подхватил полы балахона и, широко шагая, двинулся к центру поляны. Валя побежал за ним. Шаман подошел к дяде Игорю, жестом остановив Валю: разговор не предназначался для чужих ушей. И в самом деле, он был столь странен, что добавлять новые загадки ко всем странностям этой ночи значило бы лишить ее всякого очарования.</p><p class="p1">— Вы старший группы? — спросил шаман строго.</p><p class="p1">— Я, — честно ответил Савельев.</p><p class="p1">— Ну вы это, — сказал шаман. — Надо как бы расплатиться.</p><p class="p1">Савельев очень удивился — он и подумать не мог, что бывают такие меркантильные шаманы, — но полез за бумажником и вынул три тысячи. Столько, казалось ему, стоили ночлег и угощение.</p><p class="p1">— Так, — сказал шаман, не беря денег. — Гость не хотел, гость ничего не дал. Гости пошли на завод! — закричал он вдруг громовым голосом, и поляну охватила паника.</p><p class="p1">Женщины испуганно визжали, дети плакали, мужчины отрывисто произносили непонятные слова, явно местную нецензурщину. Все столпились вокруг обалдевшей пятерки. Откуда ни возьмись появились и Валины подружки: плача, они хватали его за одежду, причитая что-то про сильного, как лось, гостя, который собрался сгинуть в пасти Хохо, или что-то в этом роде. Подбежали и Николай Егорыч с братом, злые, как лесные черти, наперебой твердя, что на завод ходят только те, кто ищет смерти. Это было светопреставление — как и положено настоящему ужасу, без причины, смысла и логики.</p><p class="p1">— Хорошо! — заорал дядя Игорь, перекрикивая толпу. — Хорошо, я говорю, не пойдем мы ни на какой завод! Мы самолет ищем! Са-мо-лет! Нам не нужен завод! Все, никто никуда не идет, успокойтесь вы, ради бога… Нельзя так нельзя.</p><p class="p1">— Тогда гость платил, — сказал шаман, успокаиваясь так же внезапно, как только что закамлал. — Гость отдал путевку и платил.</p><p class="p1">— Какая путевка? — заорал Савельев. — Я говорю вам, я радист, мы поисковая группа! Мы идем искать самолет!</p><p class="p1">— Тут нет самолета, — очень серьезно сказал шаман. — Тут однако никогда не было, нет и не было самолета.</p><p class="p1">— Но я получал сигналы…</p><p class="p1">— Все получали сигналы, — ответил шаман. — Все всегда получали сигналы, воздух весь в сигналах. Но никто не искал самолет там, где его однако не было. Метеорит был, самоеды были, колхоз однако был. — То ли от волнения, то ли потому, что речь зашла о давних делах, он все чаще употреблял «однако». — А самолет не был, ты не искал, не нашел. Если ты не давал путевку, ты шел на завод, а про завод лучше даже не говорил, такое это место.</p><p class="p1">— Я еще раз повторяю, — начал Савельев, но повторить еще раз шаман не дал:</p><p class="p1">— Хорошо. Ты сказал, ты решил. Шаман не уговаривал.</p><p class="p1">Он резко повернулся и отправился к трону. Племя постепенно успокоилось и вернулось к делам, словно это не оно пять минут назад валялось тут в ногах у группы, умоляя не ходить на страшный завод.</p><p class="p1">— Что делать будем? — тихо спросил Тихонов.</p><p class="p1">— Сами найдем, — сказал Дубняк.</p><p class="p1">— А оно нам надо вообще? Че-то фигня какая-то нездоровая.</p><p class="p1">— А если они там? — возразил Окунев.</p><p class="p1">Дядя Игорь пошарил по карманам.</p><p class="p1">— Вот блин, — сказал он. — Сигареты оставил в доме. Сейчас приду, и решим.</p><p class="p1">Арии, казалось, утратили к ним всяческий интерес. Пока ждали дядю Игоря, заспорили: Дубняк и Окунев настаивали, что надо идти к заводу, а Тихонов, казалось, утратил весь энтузиазм и пугал их версиями, одна другой невероятнее. Валя молчал — ему тоже не хотелось на завод, он все думал, какие билеты требовал от него шаман, и начинал подозревать неладное. Слишком уж тут все было… организованно? Гладко? Слишком спокойно их встретили, с чрезмерной откровенностью делились своими тайнами. Ночные песни эти, явно знакомые…</p><p class="p1">Дядя Игорь вернулся через пятнадцать минут, попыхивая сигареткой, и вид у него был заговорщицкий.</p><p class="p1">— Ладно, — сказал он. — Мы пойдем, откуда пришли. Мы там, видно, промахнулись, возьмем левее.</p><p class="p1">— А завод? — спросил Окунев.</p><p class="p1">— А ну его. Ясно же, что там нет самолета. Не совпадает.</p><p class="p1">Прощались с ними вежливо, но отстраненно, они уже стали для ариев тем прошлым, для которого в их языке не было времени, но само-то оно было. В дорогу дали каждому по несколько кусков холодной мамонтятины и по мягкой меховой фляге с водой: похожие сувенирные продавались в магазинах для туристов и рыбаков, только эти были грубее, проще, с деревянными пробками. Проводить до тропы отправился тот же человек, который их там встречал, Степан. По дороге он еще поуговаривал их не соваться к заводу, убеждая, что если бы там упал самолет, они бы это видели, потому что рядом. Дядя Игорь согласно кивал, и Валю это обрадовало бы… Но он слишком хорошо знал дядю — и сейчас был уверен: все не так просто, как кажется. Тот явно задумал нечто хитростное. Валю припекало любопытство, но дядя был сосредоточен и на Валины отчаянные знаки не реагировал. Вместе со Степаном они дошли до того места, где начиналась тропа.</p><p class="p1">— Если гости довольны, люди тоже довольны, — сказал Степан и, махнув рукой, исчез в лесу.</p><p class="p1">— Ну, куда теперь? — спросил Дубняк, разложив на коленке карту.</p><p class="p1">— Спрячь, Толя, — сказал дядя Игорь, вглядываясь куда-то в заросли. — Думаю, пока она нам не понадобится. Подожди просто.</p><p class="p1">Дубняк хмыкнул, но карту не убрал, продолжая водить по ней длинным серым ногтем мизинца.</p><p class="p1">— Что ты там придумал еще? — спросил Тихонов.</p><p class="p1">— Погоди…</p><p class="p1">Валя знал, что пытать дядю Игоря бесполезно — ничего не скажет, пока не сочтет нужным. Он скинул рюкзак и уселся на него верхом, прислушиваясь к сладкой боли в мышцах. «Боль в членах, — подумал Валя, — хотя там как раз у меня ничего не болит». Он откинулся на рюкзак и смотрел вверх, туда, где сходились кроны и в просвет между ними смотрело бледное небо. Лес уже был полон звуков — шорохов, шагов, тресков, птичьих голосов. Издалека, как через вату, слышался жалобный прерывистый свист, щелчки, трескотня. Видимо, где-то далеко ходил мамонт, а от него убегал снежный человек, но это уж совсем далеко. Убегая, он кричал иволгой: фирифирь-чьоу! Фирифирь-чьоу! На местном наречии это означало: не догонишь, не поймаешь. Лес был полон сигналов, все обо всем сигнализировало и по большей части врало, потому что маскировалось. Кукушка тоже наверняка кому-то врала, потому что так долго жить не может ни один человек, даже снежный.</p><p class="p1">— Ку-ку! — крикнул вдруг дядя Игорь. — Ку-ку!</p><p class="p1">— Приехали… — Тихонов подошел к дяде Игорю и потрогал его лоб. — Ты чего? Хохонулся?</p><p class="p1">— Мамонта объелся, — прибавил Окунев, обращаясь к Вале, но Валя зыркнул на него зло: про своего дядю свисти. Он-то как-раз все понял. Дядя Игорь нашел им провожатого! Естественно, тайного. И теперь ждет его, а кукушка — условный сигнал. Конечно, это не Степан. А кто? Валя привстал и тоже стал вглядываться в лес.</p><p class="p1">— Ку-ку, — настойчиво повторял дядя Игорь, не обращая на остальных внимания. Из лесу ему вторила кукушка. А потом кусты бесшумно расступились, и перед ними возникла Катерина Дмитриевна.</p><p class="p1">— Ты что? С духами говоришь? — спросила она дядю Игоря. — Так они по-звериному не понимают.</p><p class="p1">Валя покраснел за дядю, но тот будто и не заметил собственного конфуза, победоносно глядя на группу.</p><p class="p1">— Вот Катерина Дмитриевна нас и проводит туда, где она видела круглый самолет, — торжественно сообщил он.</p><p class="p1">— Где самолет, показала. Дальше не ходила, нельзя, — доброжелательно сказала старуха.</p><p class="p1">— Ничего, там разберемся, — весело сказал дядя Игорь, впрягаясь в рюкзак. По лицам остальных Валя видел, что они веселья не разделяют, но возразить никто не успел.</p><p class="p1">— Туда идти. И дыры не делать, всем по своей дороге идти, — напомнила Катерина Дмитриевна и сошла с тропы.</p><p class="p1">— Игорь, — тихо позвал Валя. — А ты уверен? Ты же говорил, она — того…</p><p class="p1">— А мы все тут уже того, — дядина спина исчезла за кустами.</p><p class="p1">Делать было нечего.</p><p class="p1">Старуха шла прытко, как молодая, почти бесшумно — только и мелькал впереди ее облезлый меховой балахон. Дядя Игорь шел впереди и правее. Валя слышал, как где-то сбоку шумно пробирается Окунев, как сзади шумно дышит Тихонов. Дубняк появлялся и исчезал то там, то тут, исправно путая следы и успевая поглядывать на компас.</p><p class="p1">Шли долго. Валя перешел уже полностью в режим автопилота, механически убирая от лица ветки, перелезая через камни и поваленные стволы, обходя топкие места, перепрыгивая ручейки, и мысли его стучали в такт шагам: как-это-все-странно-что-там-нас-ждет-если-бабка-как-сусанин-нас-в-болото-заведет — более сложные рассуждения в ритм не попадали, так что Валя смирился и расслабился. В горле сохло, жутко хотелось передохнуть, а старуха и не думала останавливаться, попросить о привале было стыдно, так что он прямо на ходу отпивал из фляги, но питье тоже сбивало с ритма, поэтому вскоре он плюнул и больше уже не чувствовал ни жажды, ни дрожи в утомленных ногах — зомби как есть. И только он подумал, что так-могу-идти-неделю-или-больше-так-могу, как стволы разошлись, и его глазам открылась неширокая просека с рельсами, идущими в обе стороны — одна колея, черные рассохшиеся шпалы с проросшими между ними серыми низкими стебельками, никаких проводов — паровозы здесь ходили, что ли? Катерина Дмитриевна остановилась.</p><p class="p1">— Там вижу самолет, — она махнула рукой влево. — Дорога кончается, там вижу.</p><p class="p1">— А завод где? — спросил запыхавшийся Тихонов.</p><p class="p1">— Там, — старуха указала в другую сторону. — Там стена. Зла нет, можно ходить. Шаман не знает.</p><p class="p1">— Почему же все говорят, что там зло?</p><p class="p1">— Там не зло. Там счастья нет. Яма, как духи делают. Но это не духи, это люди. Вы сами туда ходили, мне нельзя, шаман сердится. — Она снисходительно вздохнула и добавила: — Наш шаман слишком много слушает ящик.</p><p class="p1">— Да, у нас тоже такие встречаются, — понимающе кивнул Окунев.</p><p class="p1">Валя подумал, что не такая уж она и сумасшедшая. А если так, возможно, они пришли сюда не зря…</p><p class="p1">Катерина Дмитриевна на прощание поцеловала каждого в лоб, а Вале еще и шепнула на ухо кое-что, но этого вам… ну, вы поняли.</p><p class="p1">Когда старуха скрылась в лесу, организовали долгожданный привал. Скинув рюкзак, Валя почувствовал, что сейчас взлетит. Он сел и услышал, как звенит все тело. Взгляд его уперся в тускло поблескивающий рельс. С рельсом что-то было не так, но Валя никак не мог ухватить свербящую мысль. Тогда он отпустил ее и стал думать о том, что сказала ему бабка.</p><p class="p1">— Ну что? Пока все сходится. Вот железная дорога. — Дядя Игорь жадно отхлебнул воды и утер рот рукавом. — Пошли искать?</p><p class="p1">— Уверен, что самолета там нет, — сказал Окунев. — Вот не знаю почему. Интуиция подсказывает.</p><p class="p1">— У нас один тоже все на интуицию рассчитывал вместо карты, — начал Дубняк, но его быстро и не слишком вежливо перебил Тихонов:</p><p class="p1">— Есть или нет, сходить надо. Бабка сказала, где рельсы кончаются. Интересно, куда они вели?</p><p class="p1">— Да какое-нибудь местное сообщение между пунктами А и Б, — обиженно пробурчал Дубняк. — На карте их нет, сто лет в обед этим рельсам. От деревни до завода рабочих возили.</p><p class="p1">— Так завод-то работает. Если тут все такое секретное, так ясен пень, на карте не будет, — сказал Окунев. Ему вообще очень нравилось все, что не значилось в официальных источниках, даже если оно там не значилось по официальным соображениям.</p><p class="p1">— Ну пошли, — сказал дядя Игорь. Ему явно не терпелось.</p><p class="p1">Сначала хотели оставить Валю с вещами здесь и пойти налегке, но Дубняк велел идти всем вместе — мало ли что там впереди. И вещей не бросать: мало ли что там позади. Пришлось Вале собирать тело в кучу и подниматься на ноги. Идти по шпалам было неудобно — кто вообще придумал класть шпалы в полшага? Валя плелся в хвосте, глядя под ноги — рельсы, рельсы, шпалы, шпалы, ехал поезд запоздалый… Что же здесь не так? Нет, опять ускользало, таяло…</p><p class="p1">Рельсы кончились неожиданно. Просто оборвались и все, как та тропа, на которой их встретил первый арий. «Лес тупиков», — подумал Валя, и на этом мы оставим его в своих мыслях и увидим дальнейшее глазами журналиста Тихонова.</p></span><span id="id27"><div class="title4">
<p class="p">7</p>
</div><p class="p1">Тихонов был хорошим человеком, не прошедшим еще окончательной профдеформации — то есть, скажем, он мог поступиться сенсацией ради человечности, особенно если сенсация была так себе, а человек симпатичный. Зато он сохранял еще интерес к миру и умел смотреть на вещи широко — так он о себе думал, хоть и не вполне знал, что это значит.</p><p class="p1">Рельсы упирались в небольшую пустошь, уже подзаросшую местной флорой. Когда-то здесь могли стоять бараки для рабочих…</p><p class="p1">— …а потом их разобрали и увезли, — озвучил он свое предположение. Других пока ни у кого не было.</p><p class="p1">Тихонов посмотрел на Савельева: тот стоял как оглушенный. Никаких следов самолета не было в помине. Честно говоря, Тихонов так и думал, но Савельева все равно было жалко.</p><p class="p1">— Пошли лес прочесывать, — сказал он.</p><p class="p1">Лес прочесывали под предводительством Дубняка часа два — безрезультатно. Не было ни обломков, ни сломанных деревьев — то есть деревья были, но не такие, как от падения самолета. Нельзя было даже предположить, что самолет здесь садился, а потом улетел в небо или провалился под землю. А бабка говорила именно об этом месте — самолет был ровно там, где кончаются рельсы… Совершенно вымотанные, они вернулись к железной дороге и расселись рядом.</p><p class="p1">— Наврала старуха, — сказал Окунев. — Или это правда НЛО было. Было, да сплыло.</p><p class="p1">Дубняк изучал пустошь, вернулся хмурый.</p><p class="p1">— Что-то тут было. Может, они тут и садились. Только следы не от «Ан-2».</p><p class="p1">— Ну точно, НЛО, — Окунев ковырял прутиком землю. — Проблема в том, что мы не ищем НЛО.</p><p class="p1">Окунев не нравился Тихонову, как не нравятся обычно блогеры журналистам. Так что Тихонов не упускал возможности поспорить с ним, даже когда спорить было не о чем. Сейчас ему просто было жаль Савельева, и поэтому высокомерный скепсис Окунева раздражал еще больше.</p><p class="p1">— Значит, мы пойдем в другую сторону.</p><p class="p1">— А может, мы плохо искали? — жалобно спросил Савельев.</p><p class="p1">— Искали хорошо, — сказал Дубняк, и все ему поверили: если уж Дубняк говорил, что хорошо искали, значит, не могли не найти.</p><p class="p1">— Пошли, — скомандовал Тихонов, поднимаясь.</p><p class="p1">Вскоре они дошли до того места, где оставила их Катерина Дмитриевна. И тут Песенка, шедший опять последним, сказал:</p><p class="p1">— Я понял, что не так.</p><p class="p1">Все остановились и обернулись.</p><p class="p1">— Я понял, что не так с рельсами, — повторил Песенка. — Они выглядят так, будто по ним до сих пор ходят поезда.</p><p class="p1">Теперь это увидели и остальные. А Дубняк был так обескуражен собственным проколом — ведь это он должен был заметить первым и сразу! — что до конца путешествия называл Валю по имени.</p></span></span>
