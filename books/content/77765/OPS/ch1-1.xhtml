<div class="epigraph">
<p class="p1">Мы считали, что нашли обыкновенный Термитник, только кремового цвета и похожий на зонтик, но вышло, что он никакой не Термитник, а хозяин большого и богатого рынка. Дорога была чистая — ни единого следа, и постепенно мы стали догадываться, в чем дело: дорога-то вела в Безвозвратный Город, и живые существа по ней не ходили, потому что если кто-нибудь попадал в этот город, то обратно он уже никогда не возвращался: там жили дикие и злобные существа. Мы шли на юг до четырех часов дня, но дорога по-прежнему оставалась пустой, и тогда нам стало совершенно ясно, что она ведет в Безвозвратный Город.</p>
<p class="p1">И вдруг мы глянули и увидели себя, и сначала удивились, но потом успокоились: поняли, что смотрим на свои изображения — они были точь-в-точь похожи на нас, только белые, и тут мы опять удивились: мы не могли догадаться, откуда они взялись, и подумали, что Взгляд, который фокусировал, был никакой не Взгляд, а обычный фотограф, и он снял нас. Но точно мы этого не знали.</p>
<p class="text-author">Амос Тутуола.</p>
<p class="text-author">Путешествие в город мертвых</p>
</div>
