<span><span id="id15"><div class="title3">
<p class="p">6</p>
</div><p class="p1">Царь Вакула обходил советников, и один оказывался нем, другой слеп, а третий глух; играли вяло, но старательно, суфлер из первого ряда подсказывал текст, и больше всего это было похоже на больничный утренник с клоунами. Тихонов, не отрываясь, смотрел на Сырухина: да, это был он, знакомый по фотографиям в «Глобусе», пропавший и, как считалось, сожранный. Следов истощения уже не было заметно, он даже округлился немного и старательно изображал глупого царя из мультиков. Разумеется, никаких актерских талантов у него не было — во всем его хохмачестве чувствовалась постоянная натуга; он явно чего-то боялся и ни на секунду не забывал об опасности. Это, впрочем, было вполне по роли. Сам Ратманов с мягкой самоиронией сыграл Трумфа — и его центральный монолог сопровождался аплодисментом, на который он ответил шутовским расклоном:</p><div class="poem">
<div class="stanza">
<p class="v">— Мой знает плутня твой, и за такая шашня</p>
<p class="v">Мой будет вас сашать на цепи и на пашня,</p>
<p class="v">Да на рабочий дом вас будет посылать,</p>
<p class="v">Где, кроме хлаб да вод, вам кушать не давать!</p>
</div>
</div><p class="p1">Вероятно, аплодисменты в этом месте тоже были его режиссерской задумкой — смотрите, какая у нас дозволяется фронда. От всей постановки, как и от раздававшихся в антракте коржиков с несладким чаем, веяло той сине-зеленой госпитальной и казарменной тоской, которая в русском языке лучше всего выражается словом «опрятность». В нем есть глубоко упрятанная обратность, противоположность всему человеческому, байковый больничный халат иссохшей старухи, клеенка, подкладываемая под простынку. Для спектакля пошиты были костюмы, у Вакулы была даже мантия, почему-то с красными звездами. Роль Слюняя исполнял бывший алкоголик, ныне находящийся на исцелении. Все дни он проводил в так называемой лечебнице — избе без мебели, с голым полом; он был прикован к стене и предоставлен себе, а трижды в день получал свою порцию зверобойного отвара и ячневой каши. Оправка предлагалась дважды в сутки, строго по часам. Лечение продолжалось уже месяц и приносило плоды: первую неделю несчастный метался, грозил разрушить избу и требовал водки, во вторую по большей части спал, в третью задумался и начал разговаривать со стенами. Всю четвертую Ратманов разучивал с ним роль. В случае успеха алкоголику были обещаны послабления — кровать, ведро для оправки в произвольное время, книги (все это без права выхода наружу). К концу второго месяца Ратманов обещал ему полное исцеление и право передвигаться вокруг избы в специальном ошейнике, на двадцатиметровом поводке.</p><p class="empty-line"/><p class="p1">— Так он… ну видись ли… все это мне отп’атит.</p><p class="p1">И голову с меня, как кочерыжку, скатит! — произносил он голосом Вицина, с ужасом показывая на грозного Ратманова, и это тоже встречалось аплодисманом.</p><p class="p1">В финале Ратманова изгонял идиот Дурдуран (а ведь пророчество, подумал Окунев), а Слюняй шел под венец с басовитой дылдой Подщипой, так боявшейся забыть текст, что произносила она его безо всякого смысла, отбарабанивая, как пионерский монтаж.</p><p class="p1">Спектаколь в целом — если считать «спектаколь» через «о» особенным ратмановским жанром, — больше всего и напоминал пионерский монтаж в исполнении повзрослевших, не нашедших себя, лишившихся вожатой и частично спившихся пионеров, у которых остались только детские навыки, внушенные тогда, когда людьми еще кто-то занимался.</p><p class="p1">После представления одних развели по жилищам, других вернули на лечение, и Ратманов дал Сырухину команду ждать в гостинице, а пока, до отбоя, предложил осмотреть хозяйство.</p><p class="p1">— Темно же, — робко возразил Дубняк. Он почему-то боялся смотреть хозяйство.</p><p class="p1">— Ну так у нас свет! Мы же свет протянули! — радостно объяснил Ратманов.</p><p class="p1">— Мы видим, — ответил за всех Окунев.</p><p class="p1">— Ну так он не только в гостинице! Он в каждой избе! Вот пойдем посмотрим нарколечебницу, — пригласил Ратманов и, теряясь в сырой темноте, зашагал по гравийной дорожке.</p><p class="p1">Поисковики следовали за ним, ориентируясь по скрежету.</p><p class="p1">Нарколечебница оказалась большой сырой избой, где на койках, расставленных по периметру, лежали плотно привязанные серолицые пациенты. Когда Ратманов вошел, нестройный хор крикнул:</p><p class="p1">— Войди, хозяин, исцели того, кто сам себя не может! Мы раньше сами не могли, но это больше не тревожит!</p><p class="p1">Окунев чувствовал себя в дурном сне, но этот дурной сон снился явно хорошему человеку — правильных взглядов, твердых убеждений, со склонностью к самопожертвованию.</p><p class="p1">В центре лечебницы стоял обычный офисный стол, за которым сидел чтец. Он читал пациентам вслух «Историю Тома Джонса, найденыша». Периодически он засыпал, и тогда сидевший рядом санитар в белом халате лил ему на голову холодную воду из пластиковой бутылки, после чего чтение возобновлялось с прежней монотоннотью.</p><p class="p1">— В состоянии ломки, — назидательно сказал Ратманов, — текст усваивается гораздо лучше.</p><p class="p1">Он повел их еще в лазарет, где на вопрос «Каково поправляетесь, молодцы?» — больные заученно ответили «Много довольны»; в лазарете проводил назидательную вечернюю беседу поп Терентий, в миру Виталий, — молодой мужчина с длинными волосами, забранными в конский хвост; он объяснял больным связь между понятиями «лазарет» и «Лазарь» и пояснял, почему выписка непременно сопровождается словами «Лазарь, иди вон».</p><p class="p1">Ощущения журналиста Тихонова трудно было передать словами: больше всего он изумлялся тому, сколь богата и разнообразна русская жизнь на заброшенных территориях. Вот был тут колхоз, бесприбыльный, расформированный, потом — гибнущие деревни, потом пустое место, но постепенно все эти российские пустоши стали заселяться новыми людьми, про которых ничего еще не было понятно. Государство, освободив себя от заботы о населении, занималось собственными тайными делами — торговлей сырьем, личным обогащением, всякого рода имитациями вроде законов о болельщиках и пиратстве; тем временем население спасало само себя, пускай и варварскими методами, и на ничейной земле стало заводиться линчеобразное правосудие, тюремное лечение, крепостное искусство, тут процвели секты любых видов и тайные общества, чья тайна сохранялась только потому, что никому до нее не было дела. В один прекрасный день власть проснется и обнаружит себя на острове среди народного самоспасения, среди рубленых изб, где привязанные к койкам наркоманы слушают «Тома Джонса», а неисправимые должники разыгрывают классицистские драмы. На одной пустоши будут вешать вора, на другой — жечь ведьму, а на третьей — жарить заблудившегося охотника. И все это будет та самоорганизация, та система власти, нарастающая снизу, о которой грезили все спасители народа, — кто же обещал, что она сразу отольется в гламурные формы? Собственно, все давно жили так, в сочетании звероватой изобретательности и цветущей дикости, и вариант каргинского Иерусалима был еще далеко не худший — просто непривычна еще была эта картина полного зажима в центре и абсолютной, ничем не ограниченной свободы на прочей, отпущенной в никуда территории. Изумительный народ, думал Тихонов, он не видит верховного угнетения и угнетает сам себя, с самыми благими целями, в антураже культуры восемнадцатого века, в который все тут и провалились после слишком страшного двадцатого. Напиши я об этом — никто не поверит, и надо ли писать? Ведь Ратманов не захочет ограничиваться Иерусалимом, ему приспичит, допустим, баллотироваться в местную власть — и тогда сразу выяснится, что в его Иерусалиме насиловали детей, а наркоман, умерший от СПИДа, был в действительности забит санитарами; хотим ли мы этого? Хотим ли мы, чтобы этот наркоман и дальше терроризировал семью? На душе у Тихонова было смутно, как и в природе, среди больной и мелкой, кривососенной уральской тайги, но поверх всего он чувствовал гордость за родное население, не захотевшее вымирать просто так. А может, другими способами и не спасешься — всех привязать, кормить ячневой кашей, оправлять по часам и читать классику, еще Моцарта врубить для большей душеполезности? Тарарам, тарарам, таратата — тарарам, тарарам, тарарам, бодрый трехстопный анапест сороковой симфонии, то ли праздничной, то ли похоронной…</p><p class="p1">— Цыганку видели? — спросил Ратманов, когда они направлялись обратно в гостиницу. — В спектакле?</p><p class="p1">— Да, конечно, — сказал Тихонов. — Совсем как настоящая.</p><p class="p1">— Она и есть настоящая. Из Каменца.</p><p class="p1">В Каменце год назад выжгли цыганское поселение, обвиненное городскими активистами фонда «Без дури!» в наркоторговле; троих торговцев избили до полусмерти, остальные разбежались по области, но в Каменец уже не возвращались.</p><p class="p1">— Раскаялась типа? — спросил Дубняк.</p><p class="p1">— Да не очень. Они, вы знаете, в смысле покаяния не ахти. Но просто одному там… понравилось. Или жалко стало, или попользоваться… Ну, в общем, попользовался. Месяц прожила, потом все деньги из дома вынесла — и на станцию. Благодарность. Хорошо, сосед увидел, он ему брякнул — тот с работы сорвался и на вокзале перехватил. Побил ее немного, но она объясняет — голос крови. Простил. Через месяц то же, и еще квартиру подожгла. Ну, убивать он ее не стал, конечно, но поучил крепко. Видели — она садится не очень уверенно? Это до сих пор, а она тут с марта. Причем он честно мне сказал, что когда ее во второй раз бил — он очень большое удовольствие чувствовал, очень. Больше, чем во все предыдущее время. Я сам такого удовольствия не чувствую, но понять могу.</p><p class="p1">Он помолчал, и некоторое время слышался только скрежет.</p><p class="p1">— Вдобавок она беременная была, — сообщил Ратманов. — Но после такого — выкидыш, конечно.</p><p class="p1">— Евгений, — церемонно обратился к нему Савельев, почти все время молчавший. — Вы для чего рассказываете все это? Я просто не совсем понимаю, что именно вы хотите сказать.</p><p class="p1">Ратманов остановился.</p><p class="p1">— А вам неприятно, да? — спросил он с изысканной любезностью, не предвещавшей ничего хорошего. — Вы брезгуете людьми, да?</p><p class="p1">— Я не то чтобы брезгую людьми, — сказал Савельев. — Я не очень интересуюсь их делами, пока они меня не касаются. И если вы нам сообщаете все эти довольно грязные детали, вы, должно быть, что-то имеете в виду?</p><p class="p1">— Да так, — сказал Ратманов. — Просто чтобы вы понимали. Он привез ее ко мне сюда, и если бы я ее не взял — ее бы либо убили, либо посадили, либо она пошла бы кочевать, потому что прежние ее не приняли бы, конечно. И еще вопрос, куда прибилась бы. А здесь, как вы видите, она играет в театре.</p><p class="p1">— Я понимаю, — сказал Савельев, который Ратманова, казалось, вовсе не боялся. — Я уже понял, что у вас тут только те, кому некуда больше деваться. Но ведь это легко — быть хорошим для всех, кому некуда деваться. Для них любой, кто не добил, уже хороший.</p><p class="p1">Валя Песенко, который смотрел на все это в состоянии крайней подавленности и потому молчал вот уже три часа, — тут неожиданно для себя вмешался.</p><p class="p1">— Да ладно, Игорь, — сказал он; Валя всегда называл дядю только по имени, как старшего брата. — В каком-то смысле сейчас всем деваться некуда…</p><p class="p1">— Устами младенца! — воскликнул Ратманов и неестественно захохотал. До самой гостиницы разговор не возобновлялся.</p></span><span id="id16"><div class="title3">
<p class="p">7</p>
</div><p class="p1">Сырухин ждал их, прихлебывая слабый чай — или один из ратмановских излюбленных отваров, — и грызя крупные черные сухари.</p><p class="p1">— Мы хотели узнать, — осторожно начал Савельев. — Если вам не хочется говорить, то конечно… Но просто вы, я слышал, видели, как упал самолет. Я с него получил сигналы, там люди живы, я хочу их найти.</p><p class="p1">Сырухин молчал. Никто не решался его торопить.</p><p class="p1">— Ему повторять надо, — сказал наконец Ратманов. — Панург, я тебе разрешаю ответить. Ты видел, как упал самолет. Расскажи все про него.</p><p class="p1">— Ну, я уже тогда счета времени не знал, — тихо и сипло проговорил новокрещеный Панург. — Но Глеб еще живой был. Точно был живой. Он сказал: за нами самолет. И на другой день только… это… Он расстроился, видно. Что самолет упал. А я знал, что не за нами, я не расстроился.</p><p class="p1">— Это где было? — нетерпеливо спросил Ратманов.</p><p class="p1">— А вот как у сосны со знаками, там со знаками сосна, — охотно отвечал Сырухин, словно сосна эта была общепризнанным ориентиром. — От нее доседа, я думаю, будет километров восемь, я от нее потом шел. Уже Глеба не было, я съел его, — просто пояснил он. — Все не съел, но большую его часть я съел и еще немного нес с собой. Остальное там прикопано, вы можете видеть, если хотите.</p><p class="p1">— Подождите, — вмешался Тихонов. — Они ведь живы оба, спутники ваши. Их нашли, и они, наоборот, сказали, что это вы отбились. И теперь все думают, что это вас съели.</p><p class="p1">— Ну, сказать они могут что угодно, — пожал плечами Сырухин. — Но я их съел, это я вам могу чем хочешь, как хочешь…</p><p class="p1">Валя Песенко почувствовал, что либо его вырвет, либо он упадет в обморок. Как учили его однажды во время первой попойки, он сосредоточил взгляд на древесном узоре, на свежеструганой доске стола, и подумал, как хорошо было бы сейчас уйти в этот лабиринт, где нет ни печали, ни воздыхания, ни охотничьего каннибализма. Несколько раз он глубоко вздохнул, но почти не полегчало.</p><p class="p1">— Я их не убивал, конечно, — продолжал Сырухин. — Я с детства, это самое, мухи не… как это, хозяин?</p><p class="p1">— Не обижу, — строго напомнил Ратманов забытое слово.</p><p class="p1">— Это, да. На обиженных воду возят, — добавил Сырухин по внезапно всплывшей ассоциации. — Не подходи ко мне, я обиделась, обиделась раз и навсегда.</p><p class="p1">Он был очевидно и непоправимо безумен, в его речах не было связи, и он никого, конечно, не ел. С чего ему взбрела в голову эта адская фантазия — понятно: его бросили, он люто хотел питаться и в одиночестве, в полном помрачении решил, видимо, что съел попутчиков, как любовник в старом анекдоте: кровь на бороде?! — убил и сожрал!</p><p class="p1">— Как же вы их съели? — не удержался Окунев. — От чего они умерли?</p><p class="p1">— Они умерли, должно быть, от цинги, — неуверенно ответил Сырухин, — или от полного истощения, да. Мы заблудились почти сразу. Один раз чуть не вышли, но снова сбились. Нас что-то кружило там. Я это не могу сказать.</p><p class="p1">— Пили вы небось, — хмыкнул Ратманов, полагавший, что все пороки от безволия.</p><p class="p1">— Так кончилось быстро, — сказал Сырухин, сам словно недоумевая. — Потом патроны кончились, уже мы бить утку, гуся, еще кого бить уже мы не могли. Уже мы только друг друга могли бить, и некоторое время били. Потом Слава надумал ставить капкан на лося, но не было лося, или он не шел в капкан. Потом Глеб видел слона, как мамонт, но мы с ним сделать ничего уже не могли.</p><p class="p1">Совсем ку-ку, понял Савельев.</p><p class="p1">— И тогда Слава не проснулся однажды, Глеб не стал есть, а я стал. Глеб вообще Славу не любил, как бы брезгал. И вот потому, что он брезгал, он и погиб. Если бы он Славу ел, — с тем же недоуменным, вогнутым лицом продолжал Сырухин, — то он был бы жив, но он не ел, и я теперь один великий грешник.</p><p class="p1">Он привстал, зачем-то посмотрелся в зеркало, висевшее на стене, и быстрым лихорадочным движением почесал щеку. Видимо, у него нарос сложный комплекс обсессий и ритуалов, как у всех вечно виноватых людей.</p><p class="p1">Тихонов понял, что выпытывать подробности о съедении, которое вдобавок примерещилось, бессмысленно: надо было разузнать что-нибудь о самолете, эта информация явно хранилась в неповрежденной части сырухинского мозга.</p><p class="p1">— А самолет, какой был самолет? — настаивал он. — Вы тип не разглядели?</p><p class="p1">— Ну, это кукурузник был, — радостно ответил Сырухин. — Я это точно говорю, тут другие не летают. Кукурузник, во всех краях и областях Союза может давать урожай кукуруза. А с другой стороны, ну что такого, допустим, что я их съел? Уже все равно никакой жизни у них не было, так я себе говорю. Глеба с работы выкинули, у Славы язва.</p><p class="p1">— А где эта сосна? — не отставал Тихонов. — Ну, где вы самолет видели?</p><p class="p1">— Я говорю же, восемь отсюда километров. На ней знаки, вы не пропустите.</p><p class="p1">— Это манси тут знаки рисуют, — вмешался Ратманов. — Отмечают для охоты.</p><p class="p1">— Но это отсюда на север, восемь километров на север, — повторил Сырухин. — Я дошел, потому что уже тогда съел. Там труднопроходимо, конечно, и все время горы, камни… Но тут везде так. В одном месте немного есть тропа. Охотничью я видел избушку, но она была пустая. Росомаха на меня напасть хотела, но тоже брезгала. И я тогда сюда пришел, — закончил он, и более конкретных указаний из него никто не вытянул. — Упал самолет у Лосьвы, — повторял он, — упал громко, хорошо упал.</p><p class="p1">— Отпустите Панурга, — сказал Ратманов. — Устал человек.</p><p class="p1">— А хоть вкусно было? — вдруг спросил Дубняк.</p><p class="p1">— Невкусно, — честно ответил Сырухин. — Соли мало, вообще жестко.</p></span><span id="id17"><div class="title3">
<p class="p">8</p>
</div><p class="p1">В полночь, когда прочие улеглись, а Ратманов избрал Окунева для последней аудиенции, Игорь Савельев установил рацию на столе и попытался поймать новые сигналы.</p><p class="p1">Пеленгатор молчал — никто в радиусе трех километров не работал на рации. Эфир, напротив, жил бурно и повседневно, словно никакого крепостного права не существовало в природе. Милиция в Перове ловила трех хулиганов, разбивших витрину на улице доблестного подпольщика Корсунского. Начинающий любитель из Читы интересовался, как собрать радиомаячок для кошки. Киров и Сыктывкар обсуждали, с помощью какого устройства и на каком расстоянии снимали переговоры в «Анатомии протеста».</p><p class="p1">На частоте 114,7 Савельев услышал внятное:</p><p class="p1">— Повторяю! Берег реки обитаем (шумы). При попытке контакта мы потеряли одного. Ответьте «Астре»! Повторяю: племя на берегу реки унесло одного. Припасов осталось на три дня. Все, кто может…</p><p class="p1">Голос был явно мужской, низкий, не столько просящий, сколько повелевающий. Это почти наверняка был Трунов — привычка командовать не покинула его и в бедствии. Но что за племя и кого они потеряли?</p><p class="p1">Савельев попытался ответить, но предполагаемый Трунов отключился. Надо было шарить вокруг, и Савельев принялся ласково, ювелирно сканировать пространство вокруг таинственной частоты. Очень скоро в уши ему буквально ворвался захлебывающийся, умоляющий голос:</p><p class="p1">— …кроме тебя некому! Отец, что бы ни было, прошу тебя, отец! Никого больше (яростные помехи) ни одного слова (треск) и помни, что всегда, только по утрам…</p><p class="p1">Загадка была почище записки капитана Гранта. Самое досадное состояло в том, что никто не сообщал координат, примет, конкретных обстоятельств: все жаловались, умоляли, а чуть доходило до дела — либо вступали помехи, либо вовсе прерывался контакт. Наконец молодой мужской голос отчетливо сказал:</p><p class="p1">— Это вопрос жизни и смерти. Если помощь не придет через три дня, все останутся здесь. Координаты: 59 градусов 28 минут северной широты, 61 (помехи) восточной долготы. Повторяю: всем, кто слышит. Осталось девять человек. Всем, кто слышит. Сообщите родственникам: группа (треск, обрыв связи).</p><p class="p1">Это было уже что-то: явно район Перова, но восточнее. Теоретически сигнал мог идти с берега Лосьвы — у Савельева не было карты, он растолкал Дубняка и уселся с ним определять полосу будущего поиска. Получался довольно приличный сегмент — в два дня точно не обойти, но там, где река делала петлю, примерно в двадцати километрах от бывшего колхоза, была точка, отвечающая всем условиям. Никакого жилья там не было отродясь, в пятнадцати километрах ниже по течению — деревня Зуево, обозначенная как нежилая.</p><p class="p1">— Завтра пойдем, — решил Дубняк. — Что ж возвращаться, если ты голос слышал…</p><p class="p1">Савельев долго не мог заснуть, ходил вокруг гостиницы, смотрел на Иерусалим, где горело единственное окно в барской усадьбе Ратманова. Он гадал, с чего бы Марина Лебедева — в том, что это она, сомневаться не приходилось, — все время обращалась к отцу. Молилась, что ли? Или ее отец — единственный влиятельный родитель, который еще может активизировать поиски?</p><p class="p1">Может быть, он понял бы чуть больше, если бы послушал два часа спустя частоту 118,5. «Отец тебе кедр, мать тебе таежная женщина Перепетуя», — говорил сухонький, бухгалтерский мужской голос, принадлежавший очень дальновидному человечку с толстым шрамом на правом виске.</p></span><span id="id18"><div class="title3">
<p class="p">9</p>
</div><p class="p1">Пока Савельев принимал новые сигналы, Окунев беседовал с Ратмановым, потому что Ратманов хотел беседовать. Впрочем, Окунева не слишком тяготила эта обязанность. У него накопились вопросы.</p><p class="p1">— Простите, у меня вопрос глупый и, может быть, оскорбительный…</p><p class="p1">— Ничего, ничего, — заранее простил Ратманов. Он выглядел снисходительным и утомленным, хотя и не настолько еще, чтобы спать.</p><p class="p1">— Я пытаюсь понять, в чем ваша выгода. Вы вложили сюда серьезные средства. Никаким сельским хозяйством на этой почве их не окупишь. Вам эти люди должны триста лет картошку собирать, чтобы только за жилье расплатиться. Я понимаю, что для вас, может быть, это еще и не такая трата. Но все-таки вы могли с большей пользой…</p><p class="p1">— Ну, я же не один, — заметил Ратманов. — Сюда вкладывают уже трое, не друзья — так, единомышленники. Мы расширяемся. Есть мои крепостные, есть один москвич, очень перспективный. Он статью готовит, хочет опыт распространить.</p><p class="p1">— А ему это зачем?</p><p class="p1">— Это затем, — с нажимом произнес Ратманов. Глаза у него уже не горели, образ хлебосольного весельчака был отброшен, выделываться стало не перед кем. — Это потому, что люди лишними не бывают.</p><p class="p1">— Мне кажется, в России все так или иначе лишние…</p><p class="p1">— Это слова. Говорить можно, даже полезно. Но купить человека — это рано или поздно будет опять. — Ратманов говорил трезво и внятно, ничуть не актерствуя. — Мы присутствуем с вами при конце великой химеры. Американский кризис это показал ясней некуда. Просвещение кончилось, права — фикция. Я не говорю, что можно убивать, забудьте всю эту раскольниковскую муть. Просто мысль недодумана. Есть собственники, и есть собственность. Вы же знаете — один родится, чтобы делать деньги, а другой треснет и не сделает. Такой же талант, как стихи. Я тресну, а двух строк не свяжу. Есть эффективные собственники, и человек — такая же собственность. Я посмотрю еще, что из них сделаю. У меня, между прочим, не все активы работают. Прикупить, скажем, обанкротившийся молокозавод и ждать, нужно будет молоко или еще что. Так и тут — не надо думать, что все какие-то особенные. Они могут на разное пригодиться. Может быть, когда-то один район пойдет на другой, и у меня будет армия. Это не так невероятно, как вы думаете. Вы просто не знаете. А в Москве, думаете, не начали уже… так же? Он покупает себе сотню гастарбайтеров, отбирает у них паспорта, все они теперь никуда не денутся. Потом они ему строят дом или дорогу. А может он и другое сделать, и они тоже пойдут. Вы можете триста лет врать про любое равенство, и все равно будут крепостники и крепостные, и это высшая организация общества. Россия всех своих успехов добилась только на этом — потом ничего подобного уже не было. Что, колхоз — не крепостное право? Где платили трудоднями и никто никуда выехать не мог? То же самое, только без Юрьева дня. У нас будет Юрьев день. Я допускаю, вполне допускаю, что мои захотят уйти к более эффективному собственнику. И милости прошу. А кто-то уйдет ко мне, если у меня кормят лучше. Все-таки у меня театр, будет веселей.</p><p class="p1">Окунев не возражал, да и не понимал, что тут возразить.</p><p class="p1">— Советы ведь наврали, — продолжал Ратманов все доверительней. — Они ругали то крепостничество, чтобы только крепче закрепить собственное. А русский крепостник был гораздо умней, и крестьянство жило лучше, само говорило. Старики-то помнили. И я больше вам скажу. Бесчеловечно отпускать в воду того, кто сроду не плавал. Вот им дали свободу. Вся свобода пошла на то, чтобы пить, торговать детьми или продаваться в рабство банку, но банк ведь не может владеть людьми. Банк присылает коллектора, шантажирует, избивает. Отбирает последнее. Зачем это? Я снимаю их с зависимости, лечу, учу. Большинство получает профессию. Я действительно заключаю браки. Они не должны ежесекундно решать. Сами они никогда не соскочат с иглы, как ее ни назови. Личность — это вымысел. Личность есть у одного из пятидесяти. И если один владеет этими другими, у которых ее нет, — это не выгода, вы зря ищете выгоду. Это единственное разумное устройство. И моя выгода только в том, что я его устанавливаю, и скоро так будет везде.</p><p class="p1">Он ждал контратаки, но Окунев молчал, разглядывая его с любопытством, без злобы.</p><p class="p1">— А как и что из них получится, я вам сказать не могу. Имейте в виду, собственность на человека — это особенный опыт. Кто не испытал, тот не поймет. Это как секс — бесполезно объяснять в теории. И здесь нет никакого наслаждения властью, не думайте. Это как возвращение в естественное состояние. Представьте себе, что всю жизнь ходили на руках, а тут вдруг пошли ногами. Отмелись все неудобства, отпало вечное подозрение, что все не так. И все стало так. Поймите, я ни секунды не наслаждаюсь, когда пьяницу приковывают к стене. Я не радуюсь, когда кормлю наркомана черемшой — кстати, только эта черемша и отвлекает его от ломки. Это обо мне сказано — я пришел дать вам волю. Да, я пришел дать вам волю — но мою!</p><p class="p1">Он помолчал и добавил решительно:</p><p class="p1">— А если они пожелают восстать — что же, очень приветствую. Ради бога. Дело человека — восставать, только пусть знает меру. Восставать — полезная вещь, кто же против. Только в этом и выковывается что-то… Но заметьте: человек всю жизнь восстает и ничего не меняет. Возвращается в русло. Да — обогащенным, да — осмелевшим, но в русло. Взлететь и даже полетать — можно, но в воздухе жить нельзя. И этот ваш самолет, упал он или нет, он тому порукой.</p><p class="p1">Окунев нисколько не обольщался насчет ратмановской честности — он и теперь был в роли, в хорошо известном амплуа: вечером был счастливый крепостник, сейчас — философствующий Волк Ларсон, зачем и злодействовать, если потом не пофилософствовать с мимохожим Ван Вейденом, не перевербовать его, не дать ему понять, в конце концов, что у него не будет в ответ никакого рационального аргумента. И его действительно нет — мир придуман так, что возразить может только Бог, ходом вещей; вся логика в руках у дьявола. Невозможно логически объяснить, почему нельзя убить старуху. Убить старуху можно, нужно, полезно. Возражения начинаются тогда, когда старуха уже убита и убийца уже раздавлен, и возражения эти лежат не в логической, а в антропологической плоскости. Можно было много чего наговорить в ответ Ратманову, и все это была ложь: дьявол, как всегда у него водится, взял самый надежный аргумент — аддиктов, и так уже находящихся под его копытом. Раз они в его власти, значит, его власть неизбежна, вот и вся его правда.</p><p class="p1">— Я же не говорю, — сказал Ратманов уже устало, явно борясь со сном, — не говорю же я, что все — или собственники, или собственность. Вот Пушкин. Никакой крепостник — сколько там было, пятьдесят душ в Михайловском, шестьдесят в Болдине, и то все откупались на волю? И сам никому не крепостной, хотя склонялся, кажется, к зависимости, это уж теперь… но ладно. Есть те, кто вне системы, их не трогаем, и пусть не мешают. Но остальные — вы увидите, уже скоро увидите…</p><p class="p1">— Я вас утомил, — сказал Окунев.</p><p class="p1">— Нет, что вы, что вы, — отозвался Ратманов, широко зевая.</p><p class="p1">— Я в гостиницу пойду. Спасибо.</p><p class="p1">— Нет, что вы? — внезапно оживился хозяин. — Какая же гостиница? Вы почетный гость, мы давно знакомы. Помните, под Питером-то?</p><p class="p1">— Как не помнить.</p><p class="p1">— Прошу, прошу. Я не хочу вас, так сказать, никак выделить из группы, но я вас заговорил, ночь глухая, поднимитесь, пожалуйста, в апартаменты. — В голосе его появилась особая барственная сальность.</p><p class="p1">«Что ж он тут со мной сделает, — подумал Окунев, — неужели у него такие предпочтения? Право, не хотелось бы».</p><p class="p1">Но Ратманов со свечой картинно проводил его наверх и ввел в комнату, какие бывают в гостиницах российской средней полосы, выстуженных, но с претензией на роскошь. Здесь тоже висели портреты русских вельмож — надо полагать, великих крепостников, — и почему-то Пушкин в палехском стиле: толпа пестро одетых крепостных подносила ему ребенка — то ли с целью крестить его у национального гения, то ли с мольбой признать отцовство.</p><p class="p1">— Это мой крепостной художник, — гордо заметил Ратманов, подталкивая Окунева к стене, дабы он лучше рассмотрел картину. — Учился в Палехе, но потом, знаете… Алкоголь, как всегда… Сюжет подсказал я, как и композицию.</p><p class="p1">— Очень тонко сделано, — сказал Окунев. — Но почему же ребенок?</p><p class="p1">— А вы не знаете разве? От него был мальчик у Ольги Калашниковой, «Белянки черноокой». Он сделал потом ее отца приказчиком в Болдине.</p><p class="p1">— Благодеяние, — сказал Окунев нейтрально.</p><p class="p1">— Он вообще был очень мягкий хозяин, — сказал Ратманов, зевнув. — Возможно, излишне. Его люди пили много, начиная с няни. Ну, располагайтесь. Нужник во дворе, биотуалет. Если что нужно, тут колокольчик.</p></span><span id="id19"><div class="title3">
<p class="p">10</p>
</div><p class="p1">Окунев, не раздеваясь, лег под одеяло и свернулся, пытаясь согреться. Гасить свет было страшно. Черт его знает, кого он сейчас подошлет. Ему вспомнилась вычитанная где-то история тургеневских времен — помещик заехал к соседу после охоты, улегся спать, но тут вошла старуха-нянька и предложила ему клистир. Помещик счел неловким отказываться — вдруг таковы были законы местного гостеприимства? — и принял клистир как должное, даже и нужное после сытного угощения; проведя веселую ночь, он узнал наутро, что старуха сослепу ошиблась дверью и поставила клистир не тому. Окунев захихикал и твердо решил не допустить клистира, но фантазия Ратманова оказалась бедней. Статная, хоть и несколько одутловатая красавица в кокошнике была прислана через двадцать минут.</p><p class="p1">— Доброй ночи, — сказала она, натянуто улыбаясь. — Меня зовут Ариадна.</p><p class="p1">— А по-настоящему? — спросил Окунев.</p><p class="p1">— Я по-настоящему Ариадна, — обиделась она. — Тут я Саломея.</p><p class="p1">Ого, подумал Окунев, не на шутку испугавшись за свою голову.</p><p class="p1">— Мне ничего не надо вообще-то, — поспешно сказал он. — Я спать хочу и вообще.</p><p class="p1">— Ну, не надо так не надо, — легко согласилась Ариадна. — Поговорим хоть. Нового человека у нас редко увидишь. Я, между прочим, с образованием.</p><p class="p1">Она присела на край кровати, скромно сложив руки на коленях.</p><p class="p1">— Ну, поговорим, — согласился Окунев. Спать все равно не хотелось, да и какой сон в дурдоме? — Как вас занесло сюда?</p><p class="p1">— А как всех, — призналась Ариадна. — Работы нет, ребенок, ну я и… Знакомые посоветовали.</p><p class="p1">— И что, не обижают?</p><p class="p1">— Хозяин-то? — усмехнулась она. — Нет, какая обида… Он сам обиженный.</p><p class="p1">— В каком смысле?</p><p class="p1">— Да в долгах кругом. — В голосе ее послышалось злорадство. — Ты что же думаешь, он сам это все понастроил? Он только господский дом да вот театр. А так было все, тут же «Волкобоя» снимали.</p><p class="p1">Окунев не смотрел «Волкобоя», но знал, что это экранизация русской национальной фэнтези с гигантским государственным бюджетом.</p><p class="p1">— Давно построили, — сказала Ариадна. — Он и заселил, не пропадать же. А так у самого денег нет, просто мечта у него была. Хозяйство, крепостные. Книжку об этом пишет, собирает всех по вечерам слушать. Записки хозяина.</p><p class="p1">— Я так примерно и думал, — сказал Окунев, поняв, что в самом деле думал так с самого начала.</p><p class="p1">— У него сначала-то были. И деньги, и машинами он торговал. Но потом кредитников выкупил — думал, они ему тут наработают, — а какая работа? На картошке не поднимешься. Он думает грант попросить, потому и пишет. А что, думаешь, могут дать?</p><p class="p1">— На крепостничество? — задумался Ратманов. — Почему ж, могут. Вполне себе инновация.</p><p class="p1">— Он переписывается тут с одним, — продолжала Ариадна. — Тот клуб сделал — родовые поместья. Выкупать землю по льготной цене и расселяться семьями. Земли-то много, девать некуда. Но наши не могут ничего, у нас один комбайн угробили уже. А где хозяину денег взять? Он сам прячется, на нем кредитов висит я даже не знаю сколько. Боюсь, найдут его, нас всех погонят, куда пойдем?</p><p class="p1">— Так, может, здесь останетесь?</p><p class="p1">— Нет, у него точно все отберут. Это он все, чтоб отвлечься, — театр, танцы…</p><p class="p1">— А он говорил, что у него друзья с деньгами, из Москвы приезжают…</p><p class="p1">— Из Москвы? — кисло улыбнулась она. — Да кто у него в Москве? Он там просил, не дали. Это местные небось приезжали, посмотреть, как он дурачится. А еще я боюсь, что его наши убьют. Он Психею, Катю, за Адониса отдал. А ее Гектор любил. Если б он себе ее взял — Гектор бы понял, без обид. Но за Адониса он обиделся. Знаешь, можно понять. Адонис совсем без башни, он и бьет ее, и всяко. Так что недолго хозяину хозяйствовать, так я думаю. Слушай, я прилягу, ничего?</p><p class="p1">И она прилегла, якобы от усталости, и через некоторое время между ними произошло то, что неизбежно случается между мужчиной и женщиной, оказавшимися в одной постели. Ариадна оказалась классической крепостной любовницей — послушной, подстанывающей, безынициативной, но ласковой. Окуневу не так уж много было надо — последний месяц, после расставания с очередной подругой, он прожил монахом.</p><p class="p1">— Интересно, — сказал он, отдышавшись. — А камеры у него тут стоят?</p><p class="p1">— Да зачем, — лениво сказала Ариадна. — Это он так прислал, от хорошего отношения. Я, может, сама хотела.</p><p class="p1">«Ужасно, — подумал Окунев, который всегда после соития, даже по любви, бывал не то что грустен, а слегка разочарован в себе и человечестве. — Ведь я ничего о ней не знаю, никогда ее больше не увижу. Обстоятельства нашей встречи самые бредовые: мы ищем пропавший самолет, которого никто никогда не видел, она крепостная у разоренного дурака, который сам в долгах как в шелках, — и все мы, кстати, крепостные у разоренных дураков, — подумал он ямбом, — мы случайно сошлись в брошенном колхозе, он же съемочная площадка, и тут же совокупились, хотя у нас нет и никогда не будет ничего общего. После этого говорите мне еще про абсурд. Ничего нет, кроме абсурда».</p><p class="p1">— Вы в лес потом пойдете? — спросила она безнадежно.</p><p class="p1">— Самолет искать, да.</p><p class="p1">— Осторожно тут. Люди ходят.</p><p class="p1">— Какие люди?</p><p class="p1">— Дураки всякие, — улыбнулась она, не желая развивать тему.</p><p class="p1">— Нет, ты уж скажи.</p><p class="p1">— А я сама ничего не знаю. Иногда выходят, потом опять уходят…</p><p class="p1">Она зевнула, и скоро он уже ничего не мог от нее добиться. Тяжкая сонная волна наплывала от нее, волна сна, каким спит безнадежно усталый человек, — и вся безнадежность в том, что он ничего не сделал, а устал просто так, только родившись. Окунев почувствовал, как его засасывает безволие этого слабого, в двадцать с лишним лет одряблевшего тела, как безмыслие накрывает его, как он проваливается в состояние кредитничества, — и успел только подумать, что крепостное право они уже видели, а дальше, в тайге, будет, вероятно, первобытно-общинный строй…</p><p class="p1">Он и не подозревал, до чего прав.</p></span></span>
