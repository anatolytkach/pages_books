</div><p class="p1">Окунев показал паспорт на проходной института и поднялся, как было ему сказано, на пятый этаж.</p><p class="p1">Институт был непомерно огромен даже для самого секретного завода: если одно изделие номер шестнадцать требовало в семидесятые годы такого научного обеспечения — значит, это было изделие либо очень большое, либо чрезвычайно значительное, либо несуществующее. Восьмиэтажный квадрат с бетонным внутренним двором, с тремя рядами гаражей, с широкими коридорами, буфетами, столовыми, с желтым линолеумом, широкими стеклами, досками почета и позора — этот институт сам мог быть градообразующим предприятием в иные времена, но теперь был, конечно, предприятием градозатопляющим, балластным, неподъемным даже для областного центра. Страшно было представить, какие вопросы решались за этими железными дверьми, обсуждались в курилках на высоких лестницах, около неизменных майонезных баночек с пеплом, сколько тут было грибных выездов, песенных костров, детских праздников, тайной ненависти к социализму и последующей страстной любви к нему; сколько по этим коридорам ходило странного народу, заоблачно умного в чем-то главном и беспомощного во всем остальном, сколько тут было сначала демонстративного презрения к быту, а после — самой подлинной и безбытной нищеты; сколько народу сначала не могло отсюда уехать, а потом уехало только для того, чтобы называть здешние годы своими лучшими; какие великие абстракции выдумывались тут — чтобы послужить ничтожной детали в узле номер триста пятнадцать изделия номер шестнадцать; но странней всего, что самый дух этого места был все-таки духом надежности. Можно было сколько угодно презирать номерные заводы, изделия, узлы, измываться над инженерами, единственными радостями которых были грибы, рыбалка и самиздат, — плюс, конечно, специальное снабжение, копченая колбаса, из-за которой совершалось в России столько предательств и, возможно, убийств, при одной мысли о которых хочется сейчас, немедленно, купить батон копченой колбасы и съесть его не нарезая, откусывая. Можно было сколько угодно издеваться, говорил себе Окунев, над их убогими радостями и безвыходными жизнями, но их резиновые лодки, институтские коридоры, изделия номер шестнадцать оставляли ощущение уюта, и он чувствовал это сейчас, шагая по желтому линолеуму. Откуда это чувство? При чем здесь, казалось бы, уют? Чувство большой, надежно защищенной страны, которая только и может позволить себе такое бетонное излишество? — нет, никого эти выдуманные враги не пугали. Ощущение, что все они тут были хорошие люди? Неправда, больше трех хороших людей на одном этаже не бывает физически, остальные становятся хороши либо плохи в зависимости от тысячи обстоятельств, начиная с погоды и кончая работой кишечника. Нет, дело было вот в чем. Сейчас мы сформулируем. Дело было в том, что все это была игра, и весь институт был огромная площадка для огромной игры.</p><p class="p1">Никто не верил, что изделия пригодятся, враги высунутся, абстракции оценятся. Все было громадным умозрением, а умозрение рождает чувство взаимопонимания; умозрение предполагает, что тебя не сразу сожрут, а сперва расспросят. Можно договариваться с идейным врагом — вдруг переубедишь или хоть нахамишь напоследок, — нельзя договариваться с медведем, который идет тебя есть; у него нет второй сигнальной. Здесь они все договорились так играть — институт уверял в своей полезности, жизненной необходимости, начальство играло в тупых злодеев, умеющих, однако, ценить ум, и все это пространство перманентного общественного договора стояло на зыбком болоте, куда и провалилось в конце концов. Дальше пошел пир чистой материи, которая могла тебя не тронуть, если была сыта, но если была голодна — не послушалась бы никакого аргумента. Все восемь этажей с двором, гаражами и коридорами были памятником умозрения, эксцессом просвещения, забавой дряхлого великана. Теперь шесть этажей из восьми сдавались материи — турфирмам, настоящим и фальшивым банкам, стоматологии, гинекологии, отделению «Мценской мебели», хотя где Перов и где Мценск? — и на пятом этаже, по которому шел Окунев, заседали перепетуйцы.</p><p class="p1">Он сам напросился в их штаб-квартиру. Они редко отказывали журналистам — годился любой пиар вплоть до разносного. Впервые Окунев услышал о перепетуйцах после Камского наводнения, когда Перепетуя поклялась отвести воду, если ей под офис отдадут любую уральскую мэрию. Никто не отдал, и вода в Камске стояла почти месяц. Дальше перепетуйцы широко распространились по Сибири, а в последние годы добрались и до столиц.</p><p class="p1">Окунев полагал — и не без оснований, — что эти бодрые ребята, как сорняки, первыми бросались на пустоши, но такой пустошью более или менее была сейчас вся территория, в особенности те места, где прежде гнездились НИИ. Малозаселенные и окраинные города, полуразвалившиеся дачи, поселки, где в школах на пятерых учителей приходилось шестеро учеников, — все это была их вотчина, там они процветали, оттуда вели наступление на центр. Во главе перепетуйцев стоял невысокий, плотный очкастый человечек с толстым шрамом через правый висок. Согласно перепетуйской мифологии, шрам этот он получил в одиночном походе, неудачно упав со скалы. От такого удара, само собой, околел бы и более твердоголовый, — но человечек (его звали Башмаков) упал виском в целебный источник, кисловатый на вкус. Он там полежал, рана затянулась, к Башмакову вернулись прежние способности и появились новые, парапсихологические. У него, в частности, появилось новое имя. Его звали теперь Оноре. Скоро Оноре почувствовал способность взывать — не голосом, а всем телом. Он воззвал, и явилась Перепетуя.</p><p class="p1">Генезис Перепетуи был темен. Во время коллективизации ее мать сбежала из колхоза в лес — в надежде, что медведь будет милосердней советской власти. Там она встретила дружественного йети, который привел ее в нору и научил призывать всем телом. Вместе они прожили без малого тридцать лет, но дети их погибали от несовместимости йети с колхозницей. Выжила только седьмая по счету — Перепетуя, которую колхозница зачала уже в старости; спаслась она только потому, что ее регулярно полоскали в целебном источнике, открытом йети в начале пятидесятых. Сам он, конечно, не открыл бы источника, но прилетела круглая тарелка, обитатели которой решили устроить пикник именно на странном горячем ручье. Дальше мнения расходились: одни полагали, что источник стал целебным после посещения тарелки, другие же — что он был целебным всегда, но инопланетяне его открыли таежным жителям. Как бы то ни было, Перепетуя жила теперь близ источника, считая себя его хранительницей. Туда-то и занесло бывшего Башмакова. Мать Перепетуи, колхозница, давно умерла, а йети оказался более живуч («Они живут до 175 лет», — авторитетно заявлял Башмаков во втором томе десятитомной саги о Перепетуе и ее жизненных принципах). Имя Перепетуя означает «вечная», доходчиво пояснял Оноре. Перепетуя была и будет всегда, но воплотилась примерно пятьдесят лет назад. Она не имеет возраста, ходит без одежды летом и зимой, легко растапливает снега. Оноре добился любви таежной красавицы и стал перенимать у нее тайнознания. Тайнознаний было много, их хватило на десять томов и осталось на вторую серию. Суть учения Перепетуи заключалась в том, что все деревья в тайге делятся на кедры и пихты — остальные принадлежат к этим видам. Кедры олицетворяют собой благородное, мужское начало. Пихты — начало женское, тоже благородное. Не все кедры одинаково хороши: среди них есть так называемые правильные. Определить правильный кедр можно посредством медитации. Если долго стоять у кедра, набрав в рот минеральной воды «Зеленое чудо» и никакой иной («Зеленым чудом» спонсировалось издание десятикнижия), в голове у стоящего зазвенит, «и даже можно потерять сознание», предупреждал заботливый Оноре. Так осуществится контакт с материнскими силами природы, после чего жертва эксперимента начнет получать сигналы от Перепетуи непосредственно в голову. С пихтой не так: пихта управляла женщинами, около правильной пихты бесплодная женщина могла забеременеть, а пьющая — бросить. Пихта была соединена непосредственно с Прамамочкой. Насчет Прамамочки Окунев уже ничего не мог постигнуть — книга, посвященная ей, была набита немыслимой кашей из тонких энергий и световых материй, но все это опять же передавалось через пихту.</p><p class="p1">Офис перепетуйцев располагался в бывшей лаборатории высоких энергий. В сущности, ничего не произошло — разве что высокие энергии заменились на тонкие. Здесь перепетуйцы принимали адептов, которые целыми группами направлялись к особо правильным кедрам, детородным пихтам и, главное, живительным источникам. Оноре нарыл в тайге десятки ручьев, которые выдавал за целительные. Разувшись, перепетуйцы часами стояли у кедров, ожидая, пока вода во рту закипит. Иные блевали. Многие перепетуйки, однако, исправно возвращались беременными. Наиболее успешной в этом отношении слыла давно покинутая жителями деревня с характерным названием Чадовка. За экскурсию брали по десяти тысяч с человека, сухпаек включался: для Перова и подобных городов это были серьезные деньги, но исцелиться в источнике хотелось всем. Все были больны. Когда человеку нечего делать, он маниакально сосредоточен на собственном теле. Тот, кто сказал бы клиентам перепетуйцев, что они совершенно здоровы, — оскорбил бы их тяжко и непоправимо.</p><p class="p1">Окунев не совсем понимал, зачем он сюда идет. С одной стороны, раз уж он попал в Перов-60, ему интересно было посмотреть на беспримесный идиотизм, занявший все пространство, откуда выкорчевали культурные растения. Его во всем привлекала чистота жанра, а тут она была. Но была и другая сторона — он сам не вполне понимал, что его манит в перепетуйстве, но понимал, что это и есть самая перспективная форма самоорганизации, куда более привлекательная, чем все волонтерство. Это была утопия для дураков, многочисленного и активного отряда приматов, существование которых отрицает политкорректная идеология, а между прочим, напрасно. Дураки есть, им принадлежит будущее, и это далеко не самый пессимистичный вывод. Человечество развивается волнами, с этим не спорят даже дураки, которые спорят со всем на свете. Опасный предел ума был достигнут человечеством к Первой мировой войне, остатки умных были истреблены во Второй, вдобавок она наставила таких ограничений, что следующим умным было уже неповадно умнеть, поскольку им наглядно показали, чем это кончается. Теперь мир надолго принадлежал дуракам — последние островки умных затонули в девяностые; дуракам нужна была своя наука с торсионными полями, прамамочками-пихтами и кипящими кедрами, свое искусство в телевизоре, своя вера и даже свои мученики. Потом — и в довольно близкой перспективе — они, разумеется, должны поумнеть, и путь перепетуйцев еще далеко не худший. У Окунева были свои подозрения на этот счет, и его не пугало даже то, что офис перепетуйцев располагался в НИИ, на форпосте былой и уже мертвой науки. Живая собака лучше мертвого льва; просвещение опиралось на разум, а перепетуйство — на что-то иное, не менее сильное и живучее.</p><p class="p1">— Вы к нам по журналистике или болезнь какая? — певуче спрашивала его хозяйка офиса, перовская представительница Оноре.</p><p class="p1">— И по делу, и болезнь, — решительно сказал Окунев.</p><p class="p1">— А и очень хорошо, — говорила перепетуйка, придвигая к нему пухлой рукою стакан лиственничного отвара. — Всегда лучше, когда личный интерес. Что хотите исцелять?</p><p class="p1">— Я сначала хочу про другое, — настаивал Окунев. — Я слышал, что вы партию создаете. Очень хочется понять какую.</p><p class="p1">— Какую? — пела перепетуйка. — Лесную, мы создавать хотим лесную партию братьев-пенсионеров, потому что у нас пенсионеры сейчас никак не представлены. Наши бабушки, они какую могли бы экономическую самостоятельность иметь! Наши грибочки, кто еще сделает такие грибочки? У нас Америка все купила бы, у нас самое экологически чистое, у них нет такого и не будет никогда. У нас ягодки, где в Америке такие ягодки? Голубика, костяника, морошка, куманика, зубаника, бзника! Они сварят, продадут, и вот им хватит до старости. А носочки, рукавички? Кто свяжет такие рукавички, а? — спрашивала она его, словно годовалого, и все ее пятидесятилетнее лицо уютно морщилось. Невозможно было понять по этой женщине, как она жила, что делала, во что верила. Жизнь не оставила на ней следа. — Кто-кто у нас свяжет такие рукавички? Из зайчика сошьет, из овечки свяжет? Да нигде в мире не бывает таких рукавичек! Мы считаем как? Мы думаем, что главный-то класс и есть старческий, что в нем есть умудренность. Умудренные-то люди и должны все решать, и всегда Россиюшка была страной старичков, бабушек! Вот мы бабушкам дадим заработать, шить-вязать, потом грибки, огурчики. У нас бабушек сколько — знаете сколько? Перепетуюшка наша хоть и вечная, а сама бабушка, и прамамочка ее давно бабушка. Скоро бабушки наши будут жить как йети, к йети потому и тарелушки прилетают, что ищут рецептик. Рецепт старости, вечной жизни ищут тарелушки, а наши ученые отворачиваются. Все это гордынюшка!</p><p class="p1">Окунев пил лиственничный отвар, кисловатый, древесного цвета, кивал и все ясней понимал: так, так. Все именно так, как он думал. Вот она, партия будущего: конечно, это будут старики, кто бы кроме? Потом они создадут партию внуков. Внуки к сорока годам, может быть, поумнеют — хотя бы настолько, чтобы не верить в йети. Впрочем, может быть, к тому моменту появятся и йети — последние остатки одичавших сотрудников НИИ, отказывающихся верить в торсионные поля. И тарелушки будут летать, дождавшись наконец времен, когда землю можно будет захватывать уже безо всякого риска.</p><p class="p1">Через полчаса ее припеваний Окунев понимал, что готов рассказать этой женщине все о себе. Его расслабил лиственничный отвар, а может, он просто устал сопротивляться. Его затягивало в перепетуйство, как усталого путника манит хвойная подстилка. Кому и зачем нужно все остальное — он уже не понимал, и чем торсионные поля хуже каких-либо иных? Уют НИИ странно слился с уютом перепетуйства, как жизнь со смертью, образующих, если вдуматься, нерасторжимое гармоническое единство.</p><p class="p1">Она рассказывала ему о родовых усадьбах, о программе, которую они хотят подать ИРОСу, и новая эта прекрасная партия обещает помочь, и уже они отправили им в Москву банку огурчиков, вот только очень жаль, что местное отделение все погибло, но на самом деле оно, конечно, не погибло, а взяли его тарелушки. Там они их обследуют, дадут вечную жизнь и вернут. Ну а у вас-то, у вас-то какая хворобушка, ведь мы всем, всем помогаем?</p><p class="p1">— Я вижу сон и во сне животное, — сказал Окунев необыкновенно честно. Он никому этого не рассказывал.</p><p class="p1">— Какое именно животное? — спросила перепетуюшка с интонацией строгой медсестры.</p><p class="p1">— Я вижу умирающее животное, — медленно, с трудом, словно под гипнозом, продолжал Окунев. — Оно исчезающий вид. Оно не знает, как себя вести.</p><p class="p1">Теперь кивала перепетуюшка, но из нее вдруг исчезла вся умильность — перед Окуневым был серьезный диагност.</p><p class="p1">— Оно должно вылезти из норы, но у норы его ждут, — продолжал Окунев, — и между тем находиться в норе оно тоже больше не может. Его встречают и бьют, и оно сначала угрожает, но всем только смешно. Потом оно просит. Это никого не трогает. Потом оно останавливается и плачет, тогда его пытаются добить. Но оно еще довольно большое и быстрое, и тогда оно возвращается в нору. Из которой все равно потом придется выходить. Мне кажется, что мое рождение было ошибкой.</p><p class="p1">— Все это гордынюшка, — решительно сказала перепетуйка. — Вам надо поехать на источник немедленно. Очень-очень быстро надо поехать на источник. Вам будет это стоить по льготной программке двенадцать тысяч, если оформить до послезавтра.</p><p class="p1">Окунев встал. Гипноз кончился.</p><p class="p1">— Пока я жив, — сказал он твердо, — этого не будет. Впрочем, окончательно я ничего не знаю, но у меня есть предчувствие…</p><p class="p1">И он сказал ей еще кое-что, чего вам не нужно знать.</p></span></span>
