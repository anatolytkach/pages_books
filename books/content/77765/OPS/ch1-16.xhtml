<span><span id="id38"><div class="title5">
<p class="p">10</p>
</div><p class="p1">Савельев нервно затягивался четвертой, когда дверь открылась и в комнату медленно вошел бледный Тихонов. Савельев не был готов рассказывать кому-либо об услышанном, да и не очень знал, как рассказать. Но Тихонов не спросил. Он без спроса достал из савельевской пачки сигарету, сел на кровать и закурил. Они смотрели друг на друга и молчали.</p><p class="p1">Тихонов тоже не знал, как начать. Он ждал, что Савельев задаст ему какой-нибудь вопрос, первым размочит тишину, но Савельев ждал от него того же, и они могли бы сидеть еще долго, если бы их не спас приемник, который вдруг закряхтел и выдал:</p><p class="p1">— Никого не останется, ничего. — Голос был не пойми чей, то ли высокий мужской, то ли низкий женский. — Уходить надо.</p><p class="p1">Лампочка на приемнике погасла, и он отрубился.</p><p class="p1">— Черт, — выругался Савельев, — в чем дело-то?</p><p class="p1">Тихонов молча смотрел, как Савельев суетится возле аппаратуры. Ему почему-то показалось очень смешным, что радиолюбитель, ничего не знающий о том, что их ожидает, волнуется из-за приемника, хочет его разбирать, рассуждает о том, что надо завтра взять на заводе паяльник. Он не выдержал и нервно засмеялся.</p><p class="p1">— Оставь, Игорь. Ну его в жопу, приемник твой. И паяльник.</p><p class="p1">От этого ему стало еще смешнее, и он захохотал, срываясь на визг и постанывая: «в жопу, в жопу, паяльник в жо-о-опу!» Очнулся Тихонов от того, что перепуганный Савельев тряс его за плечо.</p><p class="p1">— Игорь, я че ржал-то, — сказал Тихонов, тяжело дыша. — Надо нам уходить отсюда.</p><p class="p1">— Да кто же против-то?</p><p class="p1">— А они все против. Директор наш любезный, все они тут вообще.</p><p class="p1">— Ну так пиши быстрее свою оду.</p><p class="p1">— Не. Ты не понимаешь. Они нас просто не отпустят.</p><p class="p1">— Что значит — не отпустят? — удивился Савельев. — Как они могут нас заставить?</p><p class="p1">— Зачем заставлять? Они нас просто замочат. — И Тихонов пересказал ему разговор с Женей, умолчав, правда, об обстоятельствах, при которых он состоялся. Он говорил и чувствовал, что Савельев ему не верит, впрочем, он и сам не поверил бы на его месте. Но Савельев не видел Жени, а Тихонов видел, и этого было достаточно.</p><p class="p1">— Ладно, — сказал Тихонов, — иди сюда.</p><p class="p1">Он подвел Савельева к окну, предусмотрительно погасив свет. Наблюдатель был там: не меняя позы, он стоял, глядя на окна.</p><p class="p1">— Это кто? — спросил Савельев.</p><p class="p1">— Хрен его знает. Но он явно не погулять вышел. Слушай. Мы здесь все равно время теряем. Даже если нам ничто не угрожает, нам же надо самолет искать.</p><p class="p1">Тихонов видел, что этот аргумент был для Савельева убедительнее невнятной угрозы. Они пошли к остальным.</p><p class="p1">Окунев и Песенка занимали соседнюю комнату. Сонный Окунев недовольно открыл им дверь, но сон у него сразу как рукой сняло — в отличие от Савельева, он поверил сразу, потому что такой расклад как раз очень вписывался в его картину мира, и побег на поезде тоже вписывался. Валя молчал.</p><p class="p1">— А где Толя? — спросил Окунев.</p><p class="p1">— А к вам не заходил? — удивился Тихонов.</p><p class="p1">Выяснилось, что Дубняка никто не видел — как он ушел к своим славянским единоборцам, так и пропал. Но скорее всего, он уже вернулся и залег спать в отдельной комнате — хотя с чего бы ему такая роскошь? Или о нем тоже какая-нибудь единоборица позаботилась?</p><p class="p1">— Пойду узнаю внизу, — сказал Тихонов.</p><p class="p1">Заведующей на посту так и не было. Тихонов, воровато оглянувшись, пошуровал рукой за стойкой и нащупал книгу учета. Но фамилии Дубняка там не оказалось; получалось, что он не приходил. Тихонов посмотрел на часы: было два. Погрузка начиналась в шесть, а в восемь поезд уже покидал территорию завода. Если Дубняк не вернется этой ночью, они все покойники — другого шанса сбежать скорее всего не будет… Но тут входная дверь с грохотом распахнулась, послышались громкие голоса и в «Лосьву» внесли Дубняка.</p><p class="p1">Сказать, что Дубняк был нетрезв, означало сильно польстить ему. Он был пьян в дымину. Обильно потея спиртом, он висел между двумя крепкими русобородыми молодцами, мутно глядел из-под бровей, ноги его волочились по полу.</p><p class="p1">— О! — обрадовались молодцы, увидев Тихонова. — Куда нести?</p><p class="p1">Тихонов растерялся.</p><p class="p1">— Ну… Давайте наверх? — робко предложил он.</p><p class="p1">Крякнув, молодцы подхватили Дубняка поудобнее и поволокли по лестнице. Волокли они его почтительно, как рояль.</p><p class="p1">— Ш-ш-шлава Перуну! — завопил Дубняк таким басом, что вздрогнувшие носильщики чуть не выронили его. — Шлаву Перуну воспой… и Перуну, Перунову… сукину сыну!</p><p class="p1">— Кто это его так? — спросил Тихонов, поднимаясь вслед за ними.</p><p class="p1">— Ну так это… Самогонка-то у нас крепкая больно, — виновато ответил молодец повыше.</p><p class="p1">— Надо же аккуратно, а Анатолий Михайлович-то — он человек решительный, — добавил тот, что потолще.</p><p class="p1">Анатолий Михайлович одобрительно замычал.</p><p class="p1">— Давайте сюда, — попросил Тихонов, открывая дверь. Дубняка втащили в комнату и бережно положили на кровать, лицом в подушку — под недоумевающими взглядами Окунева, Савельева и Вали.</p><p class="p1">— Вот. Извините, — сказали хором молодцы.</p><p class="p1">— А вы кто? — неприязненно спросил Савельев.</p><p class="p1">— Мы Перуновы воины, — сказал высокий. — То есть клуб у нас так называется. Нам такая честь, что Анатолий Михайлович к нам… Ну, мы и встретили…</p><p class="p1">— Да уж, встретили, — прокомментировал Окунев. — И куда нам его теперь?</p><p class="p1">— Так а ничего! До завтра проспится и будет как огурец.</p><p class="p1">— Огу… Огурец, епта, — глухо подтвердил Дубняк через подушку. — Шлава огурцу! Тоже, бля, Перунову сыну…</p><p class="p1">— У нас хорошая самогоночка-то, на чистом продукте, никаких последствий, — продолжал высокий Перунов воин. — Только сейчас пусть поспит. Вы уж его не трогайте.</p><p class="p1">Но как раз сейчас-то времени на это не было, и трогать Дубняка все равно пришлось бы. Закрыв за молодцами дверь, четверо трезвых встали над кроватью, глядя на Дубняка. Тот бормотал в подушку что-то о родственниках Перуна и слабо шевелил ногами.</p><p class="p1">— Н-да, — сказал Тихонов. — Что делать-то с ним? Я думал, он нам сейчас весь план побега сочинит.</p><p class="p1">— Здесь нет дорог, и потому побег немыслим, очень жаль, — отчетливо пропел Дубняк.</p><p class="p1">— Может, его под воду сунуть? — предложил Валя.</p><p class="p1">— Простудится потом, — возразил Савельев. — На улице-то не май.</p><p class="p1">— Нормально. Мы его сейчас засунем. Пока пойдем, обсохнет, — решил Окунев, и они потащили Дубняка в ванную.</p><p class="p1">Дубняк шел покорно, заваливаясь на всех по очереди и глупо хихикая, но Тихонов, навидавшийся пьяных, знал, что покорность эта обманчива. Общими усилиями они раздели Дубняка по пояс — от запаха, который источала его одежда, Тихонов сам чуть не захмелел — и затолкали в узкий санузел.</p><p class="p1">— Так, — сказал Тихонов. — Все не поместимся, давайте мы с Лехой. Держи крепче.</p><p class="p1">Они нагнули голову Дубняка под душ и включили холодную воду. И тут Дубняк преобразился — одним движением скинув с себя Окунева и Тихонова, он рванулся из ванной — но Савельев с племянником схватили его и втолкнули обратно, вопящего и размахивающего руками. Сейчас Дубняк сам был похож на Перуна — грозного, непобедимого и вдупель бухого. Тихонов обхватил его поперек тела, а Окунев пытался подтащить голову к воде. Дубняк отчаянно вырывался, ор и грохот стояли невообразимые, явно слышные на всем этаже. Наконец Дубняк устал сопротивляться — или, как это бывает спьяну, забыл, зачем это нужно, — и послушно подставил шею под душ. Теперь он жалобно постанывал и сетовал, как его не любят и мучают, а вот хорошие люди любили его и дали самогонки. Постепенно всхлипывания стихли. Обмякшего Дубняка вытащили из-под воды, Тихонов накинул ему на голову полотенце, и тот даже сам попытался вытереться. До кровати он дошел своими ногами и, упав на нее, захрапел. Тихонов достал блокнот.</p><p class="p1">— Значит, вот зона погрузки. В зону погрузки мы никак не попадем, там по пропускам. А вот потом поезд выходит, проходит первые ворота… Там открытое пространство, но это еще территория завода, сюда мы пройти сможем. Тут внутренний пропускной пост, около него поезд останавливается и стоит какое-то время. Получается, что проще всего залезть в поезд как раз здесь.</p><p class="p1">— А если там проверяют? — спросил Савельев.</p><p class="p1">— Не думаю. — Тихонов рассматривал схему. — Они там просто документы на выезд оформляют. Поезд они осматривать не станут, вся проверка на стадии погрузки.</p><p class="p1">«Это если они не знают о нашем плане», — подумал он про себя, но говорить не стал, все равно других вариантов не было.</p><p class="p1">— И что, мы полезем в поезд на глазах у охраны? — Вале явно не нравилась эта идея.</p><p class="p1">— Мы подойдем с другой стороны и будем закрыты от них поездом. Там КПП — будка одна фанерная. — Тихонова охватил странный азарт, как будто он всю жизнь мечтал прокатиться на товарняке. — Я узнал, что за локомотив, он по заказу сделан. Не помню, как называется, но там за кабиной машиниста есть еще большой пустой отсек. Туда и залезем, пока машинист в будку пойдет.</p><p class="p1">— А если не пойдет? — спросил Савельев.</p><p class="p1">— Пойдет. Он всегда выходит и идет к ним. — Тихонов говорил уверенно, хотя уверенность его была напускная: не было у него никаких гарантий, что Женя все это не выдумала. В конце концов, она могла сама не знать или ошибаться. — Ну вот. Машинист садится в поезд и выводит его за забор. Все, дальше уже неважно, главное нам оказаться снаружи.</p><p class="p1">— Все это прекрасно, — сказал Окунев, — но есть одна проблема. Ты говорил, что нас там снаружи караулят.</p><p class="p1">— Да… — Тихонов задумался. Окна комнаты выходили на другую сторону, так что это было не проверить. — Вот что. Я пойду сейчас посмотрю, кто там и зачем.</p><p class="p1">— С ума сошел? — крикнул Окунев ему вслед, но тот уже выскочил из комнаты.</p><p class="p1">За стойкой по-прежнему никого не было. Тихонов выглянул в окно, но фигура исчезла. На подгибающихся ногах Тихонов подошел ко входной двери, отодвинул щеколду и вышел на крыльцо. «Скажу, покурить вышел. Подышать воздухом». Но никто не спрашивал, потому что было некому — наблюдатель исчез. Тихонов спустился и сделал несколько шагов в темноту. Вот оно, место, где стоял человек… Тихонов нагнулся, пытаясь разглядеть какие-нибудь следы, но ничего не видел. «Сюда бы Дубняка», — подумал он, но на Дубняка сейчас рассчитывать не приходилось. И все же каким-то седьмым или сто двадцать пятым чувством Тихонов ощущал: их караульный ушел. Он прошел вдоль здания профилактория в одну сторону, потом в другую, прислушиваясь и всматриваясь в ночь. Ни души не было вокруг. Тихонов вернулся внутрь и взлетел на второй этаж.</p><p class="p1">— Ушел, — выдохнул он, войдя в комнату.</p><p class="p1">Надо было идти сейчас — ушел-то ушел, но мог вернуться. Быстро и молча собрали вещи, свет в комнатах выключать не стали — пусть думают, что они еще тут, не спят ночью, играют в карты или сочиняют опус про директора. Теперь надо было поднять и одеть Дубняка. Он был безжизнен, как тряпичная кукла в сто кило весом, но зато не сопротивлялся. Однако нести рюкзак он не мог, разумеется. Рюкзак взял Окунев — нацепив его на себя спереди, он стал похож на жирную черепаху.</p><p class="p1">— Будем нести по очереди, — сказал Тихонов. — Толя, ты меня слышишь?</p><p class="p1">— Я все слышу, — сказал Дубняк, не открывая глаз. — Все слышу про вас, только ничего не вижу.</p><p class="p1">— А ты глаза открой. А теперь слушай. Мы сейчас пойдем очень-очень тихо. Ты можешь идти тихо?</p><p class="p1">Дубняк открыл глаза и весь скривился, отворачиваясь от света.</p><p class="p1">— Толя, ты понял? Это очень важно. Это…</p><p class="p1">— Спортивное ориентирование, — вставил Окунев. — Но кругом засада.</p><p class="p1">— Поэл, — сказал Дубняк и выпрямился. — Старший сержант Дубняк к засаде готов, епта.</p><p class="p1">— Все, пошли, — скомандовал Тихонов, и они вышли в коридор.</p><p class="p1">В фойе Дубняк чуть не подвел их всех под цугундер: увидев пустую стойку, он вдруг пришел в неистовство, крича, что такая красивая женщина не выходит их проводить, и от этого теперь им не будет попутного ветра. По счастью, красивая женщина в это время отлеживала себе щеку на чужих пуговицах и воплей не слышала. Савельев схватил Дубняка и поспешно вытащил его на улицу.</p><p class="p1">— Не, ну че вы, бля, со мной, как с ребенком, а? Че как с ребенком-то? — возмутился Дубняк. — Я вам че, ребенок? Нашли, бля, ребенка!</p><p class="p1">— Тихо, Толя, — холодея, сказал Тихонов, но здесь по-прежнему не было никого. — Мы тебя любим.</p><p class="p1">— Никто меня не любит, — проворчал Дубняк и заплакал, но уже тихо.</p><p class="p1">— Ладно, куда идти-то? — шепотом спросил Валя.</p><p class="p1">Тихонов открыл блокнот и посветил фонариком.</p><p class="p1">— Пока прямо.</p><p class="p1">Они пошли по центральной дороге, ведущей от «Лосьвы» к заводу. Но потом где-то надо было свернуть, чтобы выйти прямо к рельсам, а где именно, Тихонов не понимал. Кругом был лес, черный и пугающий, и не было видно никаких тропинок. Через десять минут Тихонов остановился.</p><p class="p1">— Черт знает, — пробормотал он. — Вроде уже должен быть поворот.</p><p class="p1">Все столпились вокруг него, разглядывая коряво нарисованную Женей карту.</p><p class="p1">— Вот блин, — сказал Окунев. — И этот, как назло, нажрался.</p><p class="p1">— К-кто нажрался? — вскинулся Дубняк. — Я? Я Перунов воин, епта. Д-дай сюда!</p><p class="p1">Он выхватил у Тихонова блокнот и с трудом сфокусировал взгляд на рисунке.</p><p class="p1">— Эт че, бля? Вам куда надо-то?</p><p class="p1">— Вот сюда нам надо. — Тихонов ткнул пальцем в кособокий крестик.</p><p class="p1">Дубняк поднял голову и обвел окрестности блуждающим взором. Тихонов раздраженно посмотрел на него — о чем говорить, куда мог их привести человек, который не понимает даже, где он находится? Он протянул руку, чтобы забрать блокнот обратно, но Дубняк вдруг с такой скоростью припустил дальше по дороге, что остальные не сразу сообразили кинуться следом. Дубняк размашисто шагал, качаясь из стороны в сторону, и не падал, казалось, только благодаря скорости — по принципу велосипеда. Окунев, нагруженный двумя рюкзаками, сразу же отстал. Тихонов обернулся к нему, а когда снова посмотрел на дорогу, Дубняк исчез.</p><p class="p1">— Твою же мать, — сказал Тихонов. — Куда он делся?</p><p class="p1">Они начали обшаривать фонариками кусты у дороги — и вдруг Тихонов увидел узкую дорогу, отходящую вбок.</p><p class="p1">— Вот оно! Нашел, — выкрикнул он громким шепотом и первым свернул.</p><p class="p1">Через несколько метров они обнаружили раздраженного Дубняка.</p><p class="p1">— Ну и че вы? Я им, бля, веду, а они тормозят. Эт че, мне надо? Эт вам же туда надо, не? Я грю, вам же надо туда, хули отставать?</p><p class="p1">Пьяный и матерящийся Дубняк был отвратителен, так же невыносим, как и трезвый, но четкая работа автопилота восхитила Тихонова, — особенно то, что Дубняк был без фонаря и, похоже, совершенно в нем не нуждался.</p><p class="p1">— Мы тут, Толь, не кричи. Помнишь, засада же кругом. Веди дальше, только не так быстро.</p><p class="p1">— Ага, — пропыхтел Окунев. — Я, между прочим, чьи-то вещи тащу, а могу и бросить.</p><p class="p1">Дубняк бессмысленно посмотрел на него.</p><p class="p1">— Тащи, студент. Вишь, дядя пьяный. — Он развернулся на пятках и резво двинулся дальше.</p><p class="p1">Деревья редели, вскоре стали появляться отдельные постройки, заброшенные бараки, какие-то склады, что ли — пыльные окна, кое-где с выбитыми стеклами, строительный мусор под ногами, обломки кирпичей, доски, сдувшийся футбольный мяч — почему-то ни одна забытая людьми территория не обходится без этого мяча, как будто футбол — это вечный последний ритуал, который всегда необходимо совершить, уходя. Тихонов поискал глазами такую же непременную куклу с оторванной головой, но не увидел и огорчился — потому что без нее все было слишком по-настоящему, не представишь уже, что просто смотришь триллер. Тихонов догнал Дубняка и схватил его за рукав.</p><p class="p1">— Стой. Надо обождать.</p><p class="p1">— Ну че-о-о-апять? — недовольно заныл Дубняк, но видно было, что ночная прогулка его еще немного отрезвила.</p><p class="p1">— Народ, здесь давайте осторожно, — сказал Тихонов. — Похоже, пути уже рядом. Оставляем один фонарь. Толя, где пост?</p><p class="p1">— Какой, нах, пост?</p><p class="p1">— Ну крестик где.</p><p class="p1">— А. Там, — Дубняк вскинул руку и едва не потерял равновесие.</p><p class="p1">— Пошли тихо.</p><p class="p1">Они двинулись дальше между постройками, которые теперь уже стояли ровными рядами, и скоро действительно вышли к рельсам — они перерезали безрадостный пейзаж, выходя из темноты и убегая куда-то, где был виден слабый свет. По всей видимости, там и была пропускная будка. Тихонов погасил фонарик, и дальше пошли в темноте, ориентируясь на слабое мерцание рельсов — непонятно, что они отражали, но тускло мерцали в ночи. Когда до будки было уже совсем близко, они зашли за угол очередного полуразвалившегося здания, уселись на рюкзаки и стали ждать. Тихонов надвинул капюшон и погрузился в полудремотное состояние — вроде бы он все слышал и осознавал, но краем сознания уже видел путаные, тревожные сны. Рядом всхрапывал Дубняк, ворочался Валя. Под куртку пролезал предрассветный холод, но даже его Тихонов воспринимал отстраненно — то есть он знал, что ему холодно, но не мерз. До поезда оставалось еще три часа.</p><p class="p1">Тихонов очнулся, когда небо уже начинало светлеть. Это был еще не рассвет, но уже его преддверие. Он посмотрел на часы — скоро пойдет поезд. Если пойдет… Он растолкал остальных, и они сидели в молчании, слушая, как ночная тишина сменяется утренней. А потом в эту тишину пришел звук, который не перепутаешь ни с чем: издалека медленно, будто тоже не проснувшись еще до конца, полз поезд. Тихонов выглянул из-за угла. Бурое неповоротливое чудище, скрежеща всеми частями, плыло мимо них. Это была странная конструкция из локомотива, большого товарного вагона с загадочными маркировками из букв и цифр и еще одного локомотива. Поезд замедлил и без того неспешный ход, дополз до будки и остановился, как и рассчитывал Тихонов, отрезав их от поля видимости сторожей. Из своего укрытия они видели, как машинист открыл дверцу, вылез из кабины с папкой в руках и, обойдя махину, исчез. Что-то в фигуре машиниста показалось ему знакомым, но думать было некогда.</p><p class="p1">— Бежим, — скомандовал Тихонов.</p><p class="p1">Все, включая ничего не понимающего до сих пор Дубняка, подхватили вещи и кинулись к кабине. Тихонов забрался первым — и сразу же обнаружил проход в тот отсек, о котором говорила Женя. Савельев снизу передал ему рюкзаки, а потом и сами они влезли туда же — Тихонову казалось, что этот процесс занял целую вечность. Забившись в тесное пространство, они закрыли перегородку и попытались разместиться с хоть каким-то удобством. Еще одна вечность прошла до того момента, когда хлопнула дверь кабины, что-то засвистело, залязгало — и поезд, неловко дернувшись, двинулся вперед.</p><p class="p1">Тихонов только сейчас почувствовал, в каком напряжении он пребывал последние несколько часов. Теперь оно отпустило его, но взамен пришла крупная дрожь — не то от недавнего холода, не то от всего остального. Дубняк снова заснул, но на этот раз хотя бы не храпел — нет, машинист бы все равно не услышал, но без храпа было, ей-богу, лучше. Тихонов еще не верил, что все удалось так легко, было в этом что-то подозрительное. Но он одернул сам себя — радоваться надо, а не подвох искать. Поэтому делиться подозрениями он ни с кем не стал, а постарался принять максимально удобное положение и расслабиться. По всем расчетам они давно уже миновали ворота, миновали и внешний пост, который поезд всегда проходил без остановок, и все дальше уезжали от Перова-60, будь он неладен. Постепенно Тихонов успокоился, нехорошие предчувствия растворились бесследно. И зря. В этот самый момент он почувствовал, что поезд замедляется.</p><p class="p1">— Это еще что? — недоуменно спросил Окунев. — КПП?</p><p class="p1">— Да нет, мы же уже час едем, какой тут КПП? — Тихонов растерялся, предположений у него не было никаких, а поезд меж тем остановился окончательно.</p><p class="p1">— Какого черта… — начал Савельев, но тут перегородка редко отодвинулась, и первое, что увидел Тихонов, было дуло пистолета, направленное прямо на него.</p><p class="p1">— Так-так-так, — сказал машинист, ухмыляясь. Теперь Тихонов его узнал — это был тот самый гид из музея, и он же, совершенно очевидно, караулил их под окнами «Лосьвы». — Значит, убегаем. Чужих баб ебем — и убегаем. Значит, к нам со всей душой, а мы убегаем. Мы, значит, думаем, что самые умные. Ан нетушки, здесь я самый умный.</p><p class="p1">«Сдала, — подумал Тихонов. — Или… Или ее заставили». С одной стороны, так думать было приятнее, получалось, что Женя все-таки была не совсем к нему равнодушна, но с другой — думать о том, как именно ее заставляли, не хотелось совершенно. Впрочем, в данную минуту думать о чем-либо вообще было не с руки.</p><p class="p1">— Как вы узнали? — спросил он.</p><p class="p1">Гид рассмеялся и не ответил, переводя оружие на каждого по очереди. Краем глаза Тихонов заметил, что Дубняк сполз на пол и распростерся у ног гида, кряхтя и источая запах перегара. Тот брезгливо отодвинулся. Тихонов ненавидел сейчас Дубняка особенно сильно, сильнее даже, чем вооруженного человека, стоящего перед ними. А тот все смеялся искусственным, противным смехом, каким смеются, желая вывести противника из равновесия.</p><p class="p1">— Ну ладно, — сказал он наконец. — Давайте на выход, и без глупостей. Паровоз казенный, пачкать не стану.</p><p class="p1">Тихонов ожидал, что гид сейчас начнет долгий обидный монолог, который даст им отсрочку и шанс на спасение, но это было явно не кино, и продолжать тот не собирался. Тихонов открыл было рот, чтобы как-то потянуть время, но тут случилось нечто, что он потом всю жизнь прокручивал в голове и все равно не мог понять, как именно все произошло. Он только увидел, что гид лежит на полу в проходе, а Дубняк сидит на нем, держа пистолет. На лице гида, обращенном к ним, Тихонов видел выражение такого безграничного недоумения, что даже пожалел беднягу. Дубняк, прижимая шею гида локтем, свободной рукой подлез тому под живот, пошуровал там и вытащил из штанов лежащего ремень. Недоумение сменилось на лице их несостоявшегося убийцы неописуемым ужасом — бог знает, что он себе вообразил. Но Дубняк кинул ремень Савельеву.</p><p class="p1">— Вяжи.</p><p class="p1">Савельев послушно подполз к гиду и крепко затянул ремень на его руках. Женины фантазии сбывались с удивительной точностью. Дубняк проверил узел, что-то в нем перетянул и встал.</p><p class="p1">— Стрелок, епта, — сказал он беззлобно. — Хера себе у вас ориентирование. Пошли отсюда, что ли?</p><p class="p1">Они вылезли из закутка, Дубняк запихнул туда связанного гида и задвинул перегородку. Один за другим спустились они на землю. Уже наступило настоящее, светлое утро, кругом был лес, а поезд стоял на пути, который обрывался через пару десятков метров — так же, как и тот, по которому они вышли к заводу.</p><p class="p1">— Дела, — сказал Окунев. — Мы что, там же?</p><p class="p1">— Нет, — ответил Дубняк, оглядевшись. Глаза у него были красные, но в целом, если бы не сногсшибательное амбре, казался вполне свежим. — Лес другой.</p><p class="p1">Тихонов уже все понял. Не было никаких отгрузок, никакого обмена деталями. Все было обманом — потому и единственный вагон был зажат между двумя локомотивами: его приводили сюда или еще куда, путей было много, но все они заканчивались ничем, он тут какое-то время стоял, а затем отправлялся назад, везя то же, что и увозил. Имитация, без которой завод не существовал бы. Но все это он собирался объяснить после, сейчас у него не было сил на разговоры. Он впрягся в рюкзак и двинулся за Дубняком в лес, подальше от железной дороги, поезда, гида, завода с его бессмысленными механизмами, от Жени, от всего этого безумия, мира, который не может существовать, но существует, к своему привычному, который существовать может, но никто не знает зачем.</p><p class="p1">Навстречу им, отводя ветки, снимая с прелестного скуластого лица подобную липкой смерти осеннюю паутину, шла Марина Лебедева.</p></span></span>
