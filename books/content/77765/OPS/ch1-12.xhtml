<span><span id="id32"><div class="title5">
<p class="p">4</p>
</div><p class="p1">Командированный Туляков словно спрыгнул со страницы производственного романа. Савельев не верил, что такие люди еще бывают. Но он был, вечный советский командированный со своим кипятильником, с портретом толстого школьника в бумажнике, с коробкой конфет для директорской секретарши.</p><p class="p1">— Наши, томские. Суфле, — гордо говорил он, издали — на всякий случай, вдруг бросится на суфле-то, — показывая Савельеву темно-коричневую, тоже как бы шоколадную коробку. — Без подходца-то как? Без подходца никак, — меленько, кругленько сыпал он, а сам при этом нарезал перочинным ножом копченую колбаску, утеху командировочного быта. — К Клавдии Сергевне как придешь иначе? У Клавдии Сергевны из Москвы, из министерства, вынь-положь, товарищ Семенов тем нужен и другим нужен… вот, кушай… всем нужен товарищ Семенов, а товарищу Тулякову шиш. Товарищ Туляков тогда с подходцем. И если все получится, то завтра у товарища Тулякова будет требуемое, и поедет он в Томск-50 с полным согласием. Как нам делать изделие номер тридцать три, скажи пожалуйста, если нет у нас соответствующих частей? Мы тоже, понимаешь, не лыком… будем! (Он кинематографично крякнул.) И поедет товарищ Туляков в Салехард, а как же. В Салехарде что делают? — Он подмигнул. — Это даже мы не знаем, не то что вы. А договариваться кто будет? Товарищ Туляков с подходцем…</p><p class="p1">От Тулякова припахивало потцем, это был как бы запах подходца. Он был единственным постояльцем в «Лосьве» и зашел к Савельеву познакомиться. Савельев мучительно думал, как его вытолкать, потому что пора было выходить на связь — он уже понял, что на заводе ему ничего не скажут, и отчаянно ждал новых сигналов, они были, он чувствовал это. Чем дальше они шли на север, тем отчетливей было присутствие самолета, он сам его улавливал, как рация, — но Туляков и не думал уходить. Как всякий командированный, он привык болтать по вечерам, ему нечем больше было заполнить ужасную пустоту разъездной жизни. Он и сам уже не верил, что где-то в Томске-50 его ждали бесконечно добрая жена-сердечница и несчастный пухлый мальчик, который из-за почти постоянного отцовского отсутствия растет хилым, робким, мучительно жаждущим отмщения, и когда он вырастет наконец, то никому рядом с ним мало не покажется. Жизнь Тулякова проходила в выбивании составных частей для изделий, которых он не видел и применения которых не понимал. В этом разъездном, призрачном состоянии единственной реальностью был кипятильник, с которым он не расставался, и еще носки — последняя связь с домом; прочую реальность приходилось постоянно наборматывать, и он бормотал всегда — в вагонах, в номерах, где оказывался один, в гостиничных буфетах, где всегда брал холодную курицу.</p><p class="p1">— Да-да, — говорил Савельев, — очень хорошо все это понимаю…</p><p class="p1">Мог бы спасти Дубняк, но Дубняка утащили к себе местные знатоки славянских единоборств, легендарные реконструкторы из Перова-60, — он был тут фигурой авторитетной. Валю Песенко увели в школу, где воспитывались гении секретной инженерии: Семушкин, большой энтузиаст разностороннего образования, заставил его читать лекцию о северном фольклоре. «Отработаете», — говорил он с нехорошей улыбкой, имея в виду Валины подвиги в племени. Окунев пошел в институт — там на третьем этаже размещался теперь офис перепетуйцев, и это было ему интересно. Савельев ждал, когда наговорится Туляков, но он явно недооценил Тулякова.</p><p class="p1">— И вот, — продолжал он, — Семенов спрашивает: а что же вы в Белгород не едете? Но это просто сказать, я не знаю… это как в лужу со всего размаха, так сказать, наступить! Что, я в Белгороде не был? В Белгороде у самих ничего нет. Хотя я ничего не могу сказать, и курочка, и яички, и гостиница в целом неплохая, я очень вообще их сельскохозяйственную продукцию уважаю. Но то курочка, а то комплектующая Бэ Пять! По кашкам вообще происходит такое, что просто я очень вас прошу. Без кашек они как же хотят? Без кашек, извините, нельзя простой блок собрать, а в номере тридцать этих блоков вы знаете сколько, очень вас прошу?</p><p class="p1">— Кашек? — переспросил Савельев. Он начал догадываться.</p><p class="p1">— К-18, кашки, — сказал Туляков и поперхнулся, испугавшись, не выбалтывает ли он чего секретного. Но ведь он встретил Савельева в «Лосьве», а разве в «Лосьве» мог появиться случайный человек? — Ты, дорогой товарищ, вообще откуда будешь?</p><p class="p1">— Я радист, тоже в командировке тут, — поспешил наврать Савельев. — Я знаю про кашки. Л-25 без них не работает.</p><p class="p1">— Л-25? — настороженно переспросил Туляков.</p><p class="p1">— Без них Л-25 не стыкуется с Б-10, — раздраженно пояснил Савельев, давно выучивший первые сигналы наизусть.</p><p class="p1">— А, так конечно! — с облегчением выдохнул Туляков, но от волнения поспешил выпить еще. Стало быть, Савельев свой, в курсе. — Б-10 я сколь раз возвращал: не стыкуются! Но это такой узел, что золотые руки надо иметь. Тут есть у них один сверловщик — чудо, Боря Захарченя. Но он на пенсию пошел, к матери на Украину. Ему говорили — ты что, здесь ты первый человек, а там подсолнухи разводить? Он говорит — матери восемьдесят, трудно. Так ты сюда ее вези, чудак-человек, неужели ее тут не возьмут в профилакторий или что? Он говорит — нельзя, кабанчик. Она не может бросить кабанчика. Третий год не может забить, привязалась по-человечески. Ну, поезжай к кабанчику, кто тебя держит? Но Б-10 стал не тот, это я точно тебе говорю. И никакими кашками нельзя поправить. Кашка — один разговор, что кашка. На самом деле та же бэшка, только дыркой меньше.</p><p class="p1">— Слушай, — прервал Савельев эту сравнительную характеристику неведомой кашки с устаревшей бэшкой. — Я одного понять не могу: они что, только по рации могут это обговаривать? Заказывать и все такое? Я проверял, в гостинице Интернет, во всем городе он есть, зачем им меня вызывать и радиста держать?</p><p class="p1">— Ну ты что! — хохотнул Туляков. — Номерной завод — по Интернету? Ты что, первый раз тут, товарищ?</p><p class="p1">Савельев решил, что честность — лучшая политика, и признался:</p><p class="p1">— В первый.</p><p class="p1">— Это ты им обновления ставишь?</p><p class="p1">— Вроде, — лаконично ответил Савельев.</p><p class="p1">— Да ты не стесняйся! Ну что ж, что в первый, понравится — будут всегда тебя звать. Тут дело такое. Они же сами специалистов отбирают. А поди плохо — у них такое снабжение, что никакой кризис нипочем, и работу эту ты не потеряешь, и денег тебе не урежут. Они ж под Москвой ходят, им Москва все решает. Но ты сам подумай: какой может быть Интернет? Это четвертая секретность, даже не третья. В Интернете теперь, знаешь, все читают. У американцев вон, не то что у нас. Так что без рации никуда, все будет по рации. А так это любой школьник с айфона взломает. Они все сейчас взламывают, — и он говорил об этом еще минут десять.</p><p class="p1">— Ну ладно, — сказал Савельев. — Мне настраиваться пора, — и он взглядом указал тулякову на рацию.</p><p class="p1">Туляков понимал теперь, что Савельев человек очень важный, и возражать не посмел. Он исчез так же легко, как появился, вообще был легкий человек, не зря его и носило по всей стране.</p><p class="p1">Настроение у Савельева было хуже некуда — Туляков опустошил его совершенно. Савельев в энергетический вампиризм не верил, для него почти все окружающие были вампирами. Когда тот ушел вместе со своим суфле (чего приносил?), Савельев долго еще сидел, уставившись в одну точку. Собравшись с силами, он встал, открыл форточку — в комнату вполз сырой холод, который несколько привел Савельева в чувство. Он закурил и настроил приемник. И сразу же услышал прерывающийся хриплый мужской голос:</p><p class="p1">— …опоздали. Теперь все бессмысленно. Прощайте…</p><p class="p1">Голос провалился в треск. Савельев похолодел. Что значит — опоздали? «А то и значит», — ответил он сам себе. Пока они теряли время, где-то там кто-то умирал от голода, от холода, от медведей, бог знает от чего еще. Отвратительное чувство бессилия растеклось по телу — так всегда оказывается в конце концов: когда не знаешь, куда идти, всегда в итоге пойдешь не в ту сторону. И все-таки кто-то еще жив, значит, надо спешить. Только куда, в какую сторону? Если это вообще те, кого они ищут. Но если нет — значит, кто-то еще терпит бедствие? Савельев даже не знал, во что ему больше хотелось верить: если этот тревожный сигнал был от «Ан-2», значит, они живы, но он же значит и другое — они в несомненной опасности, они ждали чего-то, но не дождались, и теперь может случиться все, что угодно…</p><p class="p1">— …все что угодно! — эхом выкрикнул прорвавшийся через помехи голос и замолчал уже окончательно.</p><p class="p1">Савельев закурил вторую, вскочил и заходил по окончательно уже выстывшей комнате. Закрывать форточку он не хотел, вместо этого натянул куртку и снова сел за стол. Тишина была в эфире, но Савельеву казалось, что еще немного, и он начнет понимать язык самой этой тишины. Он и сейчас почти понимал, во всяком случае, чувствовал — это был вечный фон бытия, не имеющий ни конца, ни начала, не ограничивающийся ни планетой, ни галактикой, еще не холст, но грунт, на который то там, то тут накладывались мазки человеческих жизней, мыслей, эмоций, но краска выцветала и облезала с годами, а этот фон оставался навсегда и, может быть, сохранял еще на себе невидимые частицы всех этих красок, молекулы, которые можно было бы обнаружить при химическом анализе. Да, это была тугая печаль, растворенная в космосе, поэтому-то она всегда проступала сквозь любую радость, любое счастье и даже любой страх — потому что без нее страх, счастье и радость не смогли бы держаться без грунта, на голом холсте. Савельев всегда это знал, а теперь чуть не плакал, потому что именно сейчас к этому фону не примешивалось абсолютно ничего. И он даже не сразу заметил, что тишина уже звучит.</p><p class="p1">Это не был звук человеческого голоса. Это вообще не был звук живого, но и на обычные радиошумы он не походил — Савельев вообще никогда не слышал ничего подобного, а уж он слышал все, что можно было услышать в эфире. Звук начинался на тягучей высокой ноте, переливался, двигался, перетекал, как музыка. Наверное, это и была музыка, но подчиненная каким-то неизвестным законам, рожденная неизвестным инструментом, каких не было ни в одной стране, и даже, казалось, рассчитанная не на человеческое ухо. От нее было невыносимо тревожно, и Савельев рад был бы, чтобы она прекратилась, но он будто оцепенел, не в силах поднять руку, выключить ее. Он сидел и сидел, почти забывая дышать, и когда уже оставался один миг до того, чтобы он умер или сошел с ума, музыка закончилась сама, оставив после себя во всем мире и в голове Савельева такую пустоту, что он просидел неподвижно еще несколько минут, ожидая, пока она заполнится хоть чем-нибудь. Надо сказать, что до конца она так уже никогда и не заполнилась…</p><p class="p1">Когда Савельев смог шевелиться, он первым делом резко закрыл форточку, едва не оборвав веревку. Вернувшись к приемнику, он закурил было третью, но тут же затушил — вкус был кислый и тошнотный. Когда из приемника донесся человеческий голос, Савельев так обрадовался ему, будто только что вернулся из одиночного космического полета.</p><p class="p1">— Белое все, белое-белое, — говорил звонкий юношеский голос. — Мы думали, будет по-другому. А тут все белое, и свет будто отовсюду. Не страшно совсем. Они добрые.</p><p class="p1">— Кто добрый? — спросил Савельев скорее сам себя, но неожиданно голос ответил ему.</p><p class="p1">— Я не знаю, кто они. Но они действительно добрые. И красивые очень. Здесь вообще красиво.</p><p class="p1">— Где?! — заорал ошарашенный Савельев. Он так привык к односторонней связи, что само по себе было вообще-то удивительно, что теперь с трудом вспомнил, что бывает обоюдная. — Где здесь?</p><p class="p1">— Здесь. Вы там скажите, чтобы не боялись. Ничего страшного нет. Это все так и должно быть. Слышите? Ничего страшного нет! Нам пора. До связи!</p><p class="p1">— Стойте! — Савельев вслушивался в эфир, но неведомый собеседник исчез окончательно.</p><p class="p1">Это явно были не люди с самолета — среди них, насколько Савельев знал, подростков не было. Вообще-то у него была одна безумная догадка… Но этого вам знать не надо, а впрочем, вы уже наверняка сами знаете.</p></span><span id="id33"><div class="title5">
<p class="p">5</p>
</div><p class="p1">— Ну вот, — сказал Семушкин Вале Песенко. — Тут школа.</p><p class="p1">Меньше всего это походило на школу: дети свободно слонялись по всей территории, в классах вокруг подозрительно молодых учителей кучковались человек по пять, интенсивно о чем-то споря, а к Семушкину запросто, безо всякой субординации подбегали дети самого разного возраста с вопросами самого разного рода. Семушкин плавал в этом любопытстве и обожании, явно наслаждаясь ролью гуру.</p><p class="p1">— Дядь Володь! — кричал совсем маленький. — Я задачу сочинил! — и протягивал ему тетрадь в клеточку, где была старательно — со множеством стирок — изображена шахматная задача.</p><p class="p1">— Ну и неправильно, — говорил Семушкин, мгновенно оценив позицию.</p><p class="p1">— То есть как неправильно! — возмущался маленький — несколько, впрочем, картинно; все явно делалось в расчете на стороннего наблюдателя.</p><p class="p1">— А если конь идет на B5, что тогда? — строго спросил Семушкин.</p><p class="p1">— Гм, — сказал маленький и задумался. — Тогда ладья на B3.</p><p class="p1">— Ну и слон на С6, и вилка.</p><p class="p1">— Да, — сказал маленький и потер нос. — Это я как-то не подумал.</p><p class="p1">— А если эту ладью вообще убрать, ты не думал?</p><p class="p1">— Нет, не думал, — проговорил маленький уже безо всякой рисовки. — Это красиво получается, да! Пойду покумекаю…</p><p class="p1">Это «пойду покумекаю» получилось у него так взросло и солидно, что он сам захихикал, убегая.</p><p class="p1">— Владимир Алексеич! — крикнула толстая девушка, вся раскрасневшаяся от сильных чувств. — Там Шмакин опять не хочет работать.</p><p class="p1">— Где он? — спросил Семушкин, мгновенно переменившись: из расплывчатого добряка он превратился чуть не в комиссара.</p><p class="p1">— В рубке заперся.</p><p class="p1">— Сейчас будет ему рубка. Рубка мяса. Идемте со мной, — бросил Семушкин Вале и почти без одышки полез на пятый этаж.</p><p class="p1">У обитой жестью двери радиорубки он остановился, несколько раз глубоко вдохнул, словно готовясь к погружению, и наконец решительно постучал.</p><p class="p1">Ответа не было.</p><p class="p1">— Шмакин! — заорал Семушкин. — Где чертеж?!</p><p class="p1">— Не будет чертежа, — ответил сиплый мальчишеский голос.</p><p class="p1">— Шмакин! — повторил Семушкин. — Ты чувствуй! Я не посмотрю, что ты калека. Я тебе вторую руку вырву. Если завтра не будет чертежа, у меня цех встанет.</p><p class="p1">За дверью молчали.</p><p class="p1">— Шмакин, — сказал Семушкин гораздо тише. — Это ты мне так за все мое добро, да?</p><p class="p1">Щелкнули два замка, и дверь открылась. Шмакин, щуплый малый с болтающимся рукавом линялого, некогда лилового свитера стоял перед ними с выражением отчаянным и почти слезливым.</p><p class="p1">— Я не могу, Владимир Алексеич, — сказал он.</p><p class="p1">— Шмакин, — проникновенно выговорил Семушкин. — Если не ты, это вообще никто не сделает. Пойми, Шмакин. Такая голова одна не на школу, а на город. Ты подумаешь и сделаешь. Если ты не сделаешь, меня же снимут с цеха, а куда я пойду?</p><p class="p1">Не поверить ему было невозможно. Казалось, сейчас он и сам пустит скупую мужскую слезу.</p><p class="p1">— Это нельзя сделать, — прошептал Шмакин. — Эти техусловия… вы же знаете… они взаимоисключающие.</p><p class="p1">— А ты сделаешь, — настойчиво повторил Семушкин. — Никто не сделает, а ты сделаешь. Но прятаться — это же последнее дело. Переформулируй там условия, в конце концов. В пределах допуска. Ты же знаешь, как по ГОСТу…</p><p class="p1">— Но если я не могу? У вас что, инженеров нет?</p><p class="p1">— У меня нет таких инженеров, Шмакин. У меня никогда не будет таких инженеров. Хочешь, я тебе, к чертям собачьим, двойные сверхурочные заплачу?</p><p class="p1">— Да при чем тут! — взорвался Шмакин. — Вы хотите какую температуру поставить? У вас при такой температуре все полопается к фигам, а крайний снова я буду!</p><p class="p1">— Когда ты был у меня крайний? Я всегда тебя прикрывал.</p><p class="p1">— Когда вам это нужно? — прошептал Шмакин после долгой паузы.</p><p class="p1">— Послезавтра все. Край.</p><p class="p1">— Я попробую, — сказал Шмакин и мимо Семушкина сомнамбулически побрел в актовый зал.</p><p class="p1">— Изумительный парень, — тихо рассказывал Семушкин Вале, спускаясь на второй этаж. — Я его в Вологде нашел. Отказник, что-то с рукой, родился с культяпкой. Способности фантастические. Я его забрал к себе. Он уже две олимпиады выиграл.</p><p class="p1">— Но вам же не нужен его чертеж? — спросил Валя, который давно догадался.</p><p class="p1">— В цеху не нужен, — признал Семушкин. — Но чисто по-человечески очень нужен. Если он решит эту задачу — значит, ему доступны проблемы, над которыми пятикурсники голову ломают.</p><p class="p1">— А не резко вы с ним? Руку вырву и все это…</p><p class="p1">— Но с ним невозможно иначе, с ними со всеми, — сказал Семушкин, удивляясь, как Валя не понимает такую очевидную вещь. — Невротизацию ведь не я придумал. И потом, они должны знать, насколько они нужны. Сейчас никто ничего не может именно потому, что никто никому не нужен. А этим я сразу говорю — если не сделать такую-то рационализацию, план летит.</p><p class="p1">— И действительно летит?</p><p class="p1">— Ну, не всегда, — сказал Семушкин лукаво. И хотя в этом лукавстве тоже был расчет на зрителя, Валя к нему проникся.</p><p class="p1">На втором этаже им навстречу пробежала девочка лет тринадцати, с лицом некрасивым, но веселым и живым, с лягушачьим ртом и большими оттопыренными ушами.</p><p class="p1">— Я прочел, — сказал ей Семушкин. — В общем, дельно, но не твой уровень, сама понимаешь.</p><p class="p1">Она просияла.</p><p class="p1">— Я чувствовала, что не мой. Но иногда же, знаете, кажется, что вообще уже не напишешь ничего…</p><p class="p1">— Тебе кажется, а ты крестись. Первая глава вполне, а к третьей видно, что ты сама скучаешь. Надо вторую линию или что хочешь, но чтобы в конце я понял — все они встретятся, деваться некуда.</p><p class="p1">— Я попробую!</p><p class="p1">— И в начале второй главы, конечно, длинноты невыносимые.</p><p class="p1">— Ой, точно! Я сама тяну-тяну, все думаю, так будет похоже на серьезное…</p><p class="p1">— Ты вообще меньше думай, что получится. Плотней надо. Валяй, — он отпустил ее и прошел дальше, к кабинету, откуда доносился тихий и четкий учительский голос.</p><p class="p1">— Отличная девка, — сказал он Вале. — Писатель будет, всех за пояс заткнет.</p><p class="p1">Они посетили несколько кабинетов, где школьники свободно бродили по классам, присаживались, заглядывали друг другу в тетради, перешептывались и продолжали что-то писать. Это была контрольная, на которой разрешалось свободно консультироваться. В другом кабинете учитель читал вслух малопонятное, но, судя по содержанию, связанное с топологией.</p><p class="p1">— Ну вот что он пишет! — вскрикивал мальчик с «камчатки». — Это же шарлатанство чистое!</p><p class="p1">— Почему шарлатанство?</p><p class="p1">— Некорректно потому что. Вы же сами видите, у него тут слабый переход.</p><p class="p1">— Не скажи, — осаживал его учитель, — он проработает. Это же не принципиально…</p><p class="p1">— Все принципиально! Или мы математикой занимаемся, или у нас тут шарашкина контора…</p><p class="p1">Все вместе производило впечатление не то утопии Стругацких, не то антиутопии Уиндэма: это были другие дети в другой школе. Во время обхода Семушкин успел поправить два чертежа, наставить на путь истинный толстого малого, застрявшего над трудной физической задачей (не обошлось без комического подзатыльника) и дать пару советов детям из драмкружка, ставящим «На дне».</p><p class="p1">— Как вы думаете, — спросил Валя, — есть еще такие школы?</p><p class="p1">— Скоро все такие будут, — бодро ответил Семушкин, — или не будет никаких. Если их не будет стимулировать любопытство, пиши пропало. Все, что надо, они узнают в Сети, без учителя. Надо учить тому, чего нет в Сети.</p><p class="p1">— И куда они идут после школы?</p><p class="p1">— Большей частью на завод, — неохотно ответил Семушкин. — Кое-кто в институт. А некоторые просто дома сидят и думают, стипендия позволяет.</p><p class="p1">— Стипендия?</p><p class="p1">— Лучшим выпускникам мы платим. Пускай думают, гению нужна праздность. Я вас еще с директором познакомлю, он сейчас отъехал в Перов за пособиями. Хотя чего ему не хватает? Весь наш брак к его услугам, разбирай с детьми да не повторяй ошибок. Нет, ему пособия нужны… Ладно, деньги есть…</p><p class="p1">— А вы тут куратор от завода?</p><p class="p1">— Н-ну. Я вообще с детства преподавать мечтал, но в школе очень быстро понял, какой должна быть моя школа. И до сорока лет, видите, ее придумывал. А потом, когда Семенов спросил, как делать школу, — я изложил. Он сразу понял, ни вопроса не задал. Только спросил, где я учителей возьму. А я ответил: придут. Вот и вы пришли. Вы же останетесь?</p><p class="p1">— Не знаю, — честно сказал Валя. Он и вправду не знал.</p></span></span>
