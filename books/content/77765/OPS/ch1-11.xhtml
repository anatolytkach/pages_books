<span id="id28"><div class="title4">
<p class="p">Глава четвертая</p>
<p class="p">Завод</p>
</div><span id="id29"><div class="title5">
<p class="p">1</p>
</div><p class="p1">В это самое время начальник шестого сборочного цеха Владимир Семушкин вдумчиво изучал чертеж, отнявший месяц упорного труда у его сына-подростка Николая. По всему выходило, как в «Малахитовой шкатулке», что парнишечко-то лучше узор смекнул.</p><p class="p1">— Погоди, погоди, — растроганно приговаривал Семушкин, хотя уже при первом взгляде на ватманский лист уловил идею. — Ты хочешь, значит, этот узел вообще убрать?</p><p class="p1">— Да, — гордо отвечал сын. — Ты подумай, он нужен тут только для охлаждения. Но охладить же можно в блеминге, а если тут убрать, мы получаем выигрыш в пятнадцать и три сотых секунды.</p><p class="p1">Эти «три сотых» бесконечно умилили Семушкина-старшего.</p><p class="p1">— Ты один чертил или помогали? — спросил он, уже догадываясь об ответе.</p><p class="p1">— В классе помогали немного, — сказал сын, смущаясь.</p><p class="p1">— А Курков? Курков не помогал?</p><p class="p1">— Курков вообще не видел.</p><p class="p1">Курков преподавал черчение после того, как у него не сложилось с прежним первым замом, но теперь, когда из Екатеринбурга прислали Челищева, стоило, может быть, вернуться к тем его идеям: далеко не все было бредом. Другое дело, что Курков уже два года не работал на производстве и мог отстать.</p><p class="p1">— Ну что ж, — сказал Семушкин, стараясь выглядеть как можно строже и деловитей. — Мы посоветуемся, и тогда… Но вообще, — не выдержал он, — вообще, Клетчатый, ты герой! Ты даже не понимаешь, какой ты герой! (Клетчатым он называл сына за пристрастие к ковбойкам, он с детства предпочитал их любой другой одежде.) Это мало того что экономия — это может оказаться революция, если применить по всем цехам… Вот смотри! — и он только собирался было показать сыну, как применить все это к другим цехам, но тут зазвонил заводской бездисковый телефон, связывавший его квартиру прямо с заводом.</p><p class="p1">— Что там у них? — с раздражением сказал Семушкин, ненавидевший этот телефон, и снял трубку.</p><p class="p1">— Владимир Алексеич! — сказал сиплый Вахрушев с проходной. — Опять тут эти… неплательщики.</p><p class="p1">— Черт бы их драл, — сказал Семушкин. — Еду.</p><p class="p1">Он сунул ноги в ботинки, надел плащ, выскочил во двор и через пять минут на верных «Жигулях» подъехал к седьмой проходной.</p><p class="p1">В прокуренной, пропахшей потом комнатке на продавленном диване сидели трое. Еще двое стояли рядом, подпирая стену.</p><p class="p1">— Группа, говорят, — усмехнулся Вахрушев. — Поисковики.</p><p class="p1">Поисковикам предстал исключительно мирного вида мужчина, чтобы не сказать мужичонка, лет сорока пяти — редеющие светлые волосы, младенчески-розовые щеки, защитный плащ расстегнут, под ним обозначалось добродушное штатское пузцо. Охранник успел перепугать их. Впрочем, Тихонов твердо решил не расслабляться: он знал, что от таких-то круглых, от которых никто ничего дурного не ждет, и происходят главные неприятности.</p><p class="p1">— Значит, платить не хотим? — спросил он, выслушав сбивчивый рассказ Савельева о сигналах.</p><p class="p1">— За что платить? — взорвался Савельев. — Племени за ночлег? Никто ничего не говорил!</p><p class="p1">— Ну уж и не говорил, — сказал мужичок хитровато и скорее дружелюбно. — Путевку купили? Купили. К поляне вышли? Вышли. Гостеприимством, так сказать, пользовались? Обязательно. Все по программе: мифология, экология, молодому человеку — экзотика. Нарекания есть?</p><p class="p1">Валя столь густо покраснел, что стоявшего рядом Тихонова буквально обдало жаром.</p><p class="p1">— Вы не поняли, — с тоской повторил Савельев. — Нас, наверное, не за тех приняли. Мы не покупали никакой путевки, мы идем строго по сигналам. Мы вообще ни в какое племя не хотели попадать…</p><p class="p1">Светлые бровки Семушкина поползли вверх.</p><p class="p1">— Интересно как, — сказал он. — Что же вы в это самое время оказались точно на месте? Вы меня извините, товарищи, но я в мистику не верю. Таких совпадений не бывает. А бывает, что вы сначала попользовались, а потом не хотите платить. У вас предоплата сколько была?</p><p class="p1">Савельев хлопнул себя по колену и замотал головой. Он не знал, как им объяснить, чтобы они поверили.</p><p class="p1">— У меня с собой десять тысяч, — сказал он. — Я вам отдам, сколько смогу, но это грабеж и безобразие.</p><p class="p1">— Минуточку, — очнулся молчавший доселе Тихонов. — Это Перов-60?</p><p class="p1">— Допустим, — с вызовом сказал Семушкин. — А что?</p><p class="p1">— Но завод же закрыт, — сомнамбулически проговорил Тихонов. — Город же распущен.</p><p class="p1">— То есть как распущен? — обиделся Семушкин. — Где вы видели, товарищи, распущенные города? Завод действует, просто не всем про это надо знать. А так он вполне функционирует, вы же видите забор?</p><p class="p1">В самом деле, они прекрасно видели бетонную стену и огромные ворота, у которых обрывались рельсы. Там их и обнаружил охранник, который теперь в полном недоумении прислушивался к этому разговору, стоя на пороге.</p><p class="p1">— Подождите, подождите, — повторял Тихонов, до которого стало наконец доходить. — Это племя… оно что же, от вас работает?</p><p class="p1">— Что значит — от нас? Вы что, товарищ? — Семушкин вынул из кармана плаща глянцевый рекламный листок. — Вы что, под дурачков косите? Кому вы будете рассказывать, что в тайге случайно вышли на базу? Вы же видели дома — что, это манси такие строят?</p><p class="p1">— А что, не строят? — тупо спросил Савельев.</p><p class="p1">Семушкин помолчал и вдруг согнулся от смеха.</p><p class="p1">— Ну это надо! — восклицал он, вытирая глаза. — Ну это, товарищи, ни в сказке сказать… Куда ж тогда эти делись, которых там ждали? Ну эти-то, которые путевку купили?</p><p class="p1">— Да какую путевку! — снова заорал Савельев. — На какую базу!</p><p class="p1">Семушкин протянул ему листок. Поисковики уставились на него в полном недоумении.</p><p class="p1">«База отдыха завода № 34/76. Посетите нашу базу! Древнее арийское племя обеспечит ваш досуг. Камлание. Гадание по внутренностям. Спросите духов о будущем! Ночлег в уральской тайге со всеми удобствами! Фольклорный коллектив. Незабываемые арийки. Сауна».</p><p class="p1">— Сауны не было, — цыплячьим голосом сказал Валя.</p><p class="p1">— Сауна на ремонте, это да, — признал Семушкин. — Вы что же, действительно случайно забрели? Первый раз такое вижу. Что же вас в сентябре в тайгу понесло, без путевки-то?</p><p class="p1">— Я же вам говорю, — в десятый раз начал Савельев. — Пропавший самолет «Ан-2»…</p><p class="p1">— Да какой самолет, — уже мирно сказал Семушкин, все еще посмеиваясь и качая головой. — Самолет когда был?</p><p class="p1">— В июне.</p><p class="p1">— Ну и какие сигналы он вам должен был подавать? Вы радист?</p><p class="p1">— Радист, — мрачно подтвердил Савельев.</p><p class="p1">— И они в сентябре вам сигналы подали? Людей не смешите.</p><p class="p1">— Я слышал…</p><p class="p1">— Да мало ли что вы слышали!</p><p class="p1">— Я тоже слышал, — вступился Тихонов.</p><p class="p1">— И что мне теперь с вами делать? Вы же у людей время отняли. И неизвестно еще, где теперь те, кто действительно заплатили… Мне что им, деньги возвращать?</p><p class="p1">— Это уж я не знаю, — сказал Савельев решительно, — но людей надо где-то разместить. В тайгу ночью не пойдем.</p><p class="p1">— Да это понятно, — вздохнул Семушкин. — Вахрушев! Машину вызывай, в «Лосьву» звони. Пять мест. Должны у них быть, пусть селят. Разбираться завтра будем, ночь на дворе. А вы, товарищи, — обратился он к поисковикам, улыбаясь почти дружелюбно, — соблюдайте, так сказать, законы гостеприимства. Ночью по городу не шастать, утром до моего сигнала не выходить. Сами понимаете, завод у нас секретный, и город тоже не совсем простой.</p></span><span id="id30"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Завод 34/76 был в самом деле секретный — настолько, что большинство сотрудников понятия не имели, что они тут производят. Разногласий не было — все знали, что Перов-60 занимается сборкой главных узлов изделия № 16, но каково это изделие в целом — гадать бесполезно. Это было сродни ощупыванию слона. На заводе было двенадцать цехов, и в каждом делали что-то свое, но соединить это вместе мешала абсолютная закрытость цехов 3, 5 и 11, из которых нельзя было вынести ни колесика. В прочих цехах надзор был послабее, и особо любопытным удавалось вынести детали и даже целые узлы, но все вместе не складывалось никак. После долгих споров предположили, что изделие № 16 — громадный транспорт для доставки сверхракеты на стартовую позицию, потому что разные узлы, которые удавалось смонтировать методом тыка, давали в результате непостижимую конструкцию с множеством колесиков, плотно сцепленных, вращающихся в разных направлениях и передающих это вращение на толстую ось. Сборочный цех — одиннадцатый, самый закрытый, — должен был собирать воедино всю эту, по-рабочему говоря, херовину, — но люди, работавшие в одиннадцатом, жили в общежитии на берегу и с людьми из прочих цехов не общались. Их дети и в школе держались особняком, на дни рождения ходили только к сыновьям главного инженера. А дети директора вообще учились в другом городе, и никто не знал — где.</p><p class="p1">Сверхсекретный завод, занимавший территорию в 70 га, был выстроен в шестьдесят девятом, перестроен и радикально усовершенствован десять лет спустя, благополучно пережил бури перестройки и дикого капитализма, но упорно продолжал производить все то же изделие № 16, хотя его и модифицировали каждые полгода, добавляя новых деталей и ничуть не проясняя назначения. Никто и не любопытствовал особо. И не только потому, что чрезмерное любопытство означало бы немедленный расчет, а других предприятий в Перове-60, по сути, не было, — уволенного с завода тут не взяли бы даже в продавцы; нет, все сознавали бесполезность расспросов и личных дознаний, и таинственность изделия никак не мешала его величию в глазах производителей. Напротив, оно вырастало до главного гаранта российской обороноспособности. Может быть, это даже была подводная лодка.</p><p class="p1">Не сказать, чтобы гигантский завод бросал все свои силы на изделие № 16. Первый цех до всякой конверсии выпускал пылесосы, которые вполне успешно сосали в первые полгода, да и потом, покряхтывая, справлялись; второй одно время делал стиральную машину «Сибирочка» — вероятно, из соображений секретности, поскольку изготовлялась она все-таки на Урале. «Сибирочку» сняли с производства внезапно, росчерком пера — ходили упорные слухи, что у нее чрезвычайно высок был процент травматизма: центрифуга вырывалась из машины и принималась летать по кухням, круша все. Но это был, конечно, анекдот — просто второй цех понадобился для модифицированного шестнадцатого изделия. Из седьмого цеха выходили прекрасные отбойные молотки. Но ключевые узлы всех этих механизмов требовались для главного, а не для стирки и уж подавно не для сосания пыли; мирные отходы сугубо военного дела нужны были лишь для того, чтобы надежней замаскировать истинную суть секретного города.</p><p class="p1">Вся жизнь Перова-60 до сих пор крутилась вокруг завода, хотя новые веяния, что ни говори, добрались и до самого закрытого предприятия в области: часть цехов закрылась, а некоторые помещения в заводском НИИ сдали в аренду турфирмам и банкам. Постепенно отключались цеха — первый, шестой, — но остальные работали бесперебойно, и все благодаря директору, Максиму Леонидовичу Семенову, который давно бы стал национальным героем, если б не пресловутая секретность. Семенов спас завод в девяностые, удержал на плаву в нулевые и собирался поднять в десятые, хотя сам вступил, как он любил выражаться, в ревущие восьмидесятые; а впрочем, точного возраста его не знал никто. Он так и не пересел на иномарку с черной «Волги», которую личный шофер, попавший к нему еще мальчишкой, а теперь разменявший пятый десяток, содержал в идеальном состоянии. Он по-прежнему был на заводе верховной инстанцией, его побаивалась даже Москва — и это при том, что угождать Москве он никогда не пытался. Семенов не приносил клятв, не обещал вывести на московские улицы людей со своего завода, избегал ездить к начальству, а с инспекциями разговаривал так, словно они отрывают его и прочих от жизненно важного дела. Он, да Полуторов в Томске, да Бердымухамедов в Белгороде — вот все, что осталось от славного секретного директорского корпуса; без них, конечно, все тотчас рухнуло бы.</p><p class="p1">Да и много ли осталось в России заводов, производящих номерные изделия? Давно был расформирован Серпухов-20, переориентирован на кока-колу Рязань-40, отдан неблагодарным соседям Харьков-60, где вместе с итальянцами клепали теперь тупорылую машину «Кабан» — в выражении ее квадратной морды было что-то торжественно-скорбное, неуловимо напоминавшее лицо рачительного сельского хозяина, когда на его глазах тонет в навозе непутевый сосед. Семенов держал завод железной рукой, неутомимо совершенствуя технологию, выращивая образцовых инженеров, лучших в России сверловщиков, прокольщиков, развальщиков, буторщиков и рубильщиков; и хотя НИИ сдавал теперь почти все свои этажи — седьмой и девятый оставались неприкосновенными, и входа на их территорию не было даже заводским. Семенов лично проводил еженедельные совещания, и мохнатые его брови так же грозно топорщились, а мохнатые уши не пропускали ни единого постороннего шепотка. Время его не брало, и после восьмидесяти он оставался так же загадочен и всесилен, как изделие номер шестнадцать.</p><p class="p1">У завода по-прежнему были профилакторий, санаторий и музей. И по этому музею экскурсовод водил Тихонова, с которым Семушкин предварительно поговорил в своем маленьком кабинете, увешанном разноцветными вымпелами.</p><p class="p1">— Ну что мне с вами делать? — говорил он добродушно. — Обычно неплательщиков если шлют — но это, сами понимаете, большая редкость, — мы проводим тут беседу. И они обычно понимают. Без воздействия там, без хамства. Но просто это наши же люди, и мы должны защищать, если что.</p><p class="p1">— А я догадывался, — сказал Тихонов. — Как-то очень они, понимаете, по сценарию работают. А жизнь не похожа на сценарий.</p><p class="p1">— Ну вот еще. Очень похожа. Просто вы в племенах не жили. А я застал еще рабочих, которые в походах с манси общались. Мы прямо по их рассказам. Правда, манси под крышей не спят, только в чуме могут. Крыша их, говорили, угнетает.</p><p class="p1">— А зачем вам все это? Ну, племя?</p><p class="p1">— Так а как же, — с уютным лукавством пояснил Семушкин. — База эта у нас в тайге давно была, мы ее подзапустили, потом директор решил реанимировать. Подлатали, домики достроили, вот они и работают, артисты-то.</p><p class="p1">— А мамонт?</p><p class="p1">— Какой?</p><p class="p1">— Которым кормили.</p><p class="p1">— Ну, это обижаете, — сказал Семушкин. — Почему мамонт? Телятина.</p><p class="p1">— На вкус не телятина.</p><p class="p1">— Ну так в глине запекают! Там профессионалы. Знаете, сколько уже народу там в племени побывало? У нас за месяц записываются! В Перове офис на Линейной.</p><p class="p1">— Никогда не слыхал, — тоскливо признался Тихонов. Он почти все время тратил на работу, да и денег на подобный отдых у него никогда не водилось. Семушкин показал ему прейскурант. Всем вместе им было не расплатиться, даже если выскрести дома всю наличность.</p><p class="p1">— Ну ничего, — Семушкин ухмылялся так, словно все уже придумал. — Вы нам тут отработаете.</p><p class="p1">— У станка? — кисло сострил Тихонов.</p><p class="p1">— Почему же, по специальности. У директора юбилей, мы хотим книгу ему поднести. Сами понимаете, официально издать не можем — не пропустят. У нас степень секретности знаете какая?</p><p class="p1">— Первая? — догадался Тихонов.</p><p class="p1">— Де-ся-та-я, — гордо отчеканил Семушкин. — Первая небось у вашего этого ИРОСа, который вы тут ищете.</p><p class="p1">— А вы слыхали про них что-нибудь? Говорят, они собирались ваш завод возрождать…</p><p class="p1">— Наш завод возрождать не надо, он никогда не вымирал. В Москве пусть возрождают, автозавод имени Ленинского комсомола… Там что сейчас, не знаете?</p><p class="p1">— Не знаю, — признался Тихонов, — я не москвич…</p><p class="p1">— Москвичей больше не делают, — загадочно сказал Семушкин. — А я бы возродил, чего ж? Мы производственники, мы это дело знаем. Автомобиль «москвич» — раз, автомобиль «гастарбайтер» — два. Можно «чучмек», «таджик». И гонки. Представляете, сколько народу можно собрать?</p><p class="p1">Тихонов не понял, шутит он или всерьез вынашивает идею автомобиля «гастарбайтер», он же «чучмек». Хорошая была бы машина, шахид-такси, как называлось это в Москве, вся разваливающаяся, но безотказная, подклеенная, подвязанная, с радио, всегда передающим только восточную музыку — можно с русскими словами, можно с рычанием и взвизгами чужого языка, в котором все ползучие плети и внезапные прыжки арабской письменности выражались такими же продолжительными «айяааа» и неожиданными «ыр».</p><p class="p1">— А нас не надо возрождать, — продолжал Семушкин. — Мы сами кого хочешь… И даже я вам больше скажу, — прибавил он вовсе уж доверительно, — это очень хорошо, что они сюда не летали. Нечего им тут делать у нас.</p><p class="p1">— Они же не к вам, — сказал Тихонов. — Может, они тоже путевку купили…</p><p class="p1">— Ну мы бы знали, наверное. Нет. Они, наверное, не возрождать нас, а просто тут в какую-то баньку с девками, вот что я думаю. Нам, товарищ дорогой, чем меньше Москва про нас думает, тем лучше. А к вам действительно имеется дело. Если вы правда журналист, то напишите про нашего директора. Все покажем, все расскажем.</p><p class="p1">«А потом убьем, — мелькнуло у Тихонова. — Секретно же все. Приехал, написал, потом тут в двенадцатом цеху скинули в ковш, и никто ничего не видел».</p><p class="p1">— Ну что это за глупости, — тут же прочел его мысли Семушкин. — Никакого тут нет для вас риска, мы же вас все равно в секретные цеха не поведем. А в остальном у нас город открыт с девяносто седьмого, даже два раза паломники приезжали на святой источник. У нас тут монастырь был до двадцать третьего, вам в музее все расскажут, но теперь, говорят, вода уже не та. Хотя наши пьют, и нравится.</p><p class="p1">«Вышли из Петрушевской, — подумал Тихонов, — и пришли в Сорокина. Но в обоих случаях и он, и ты, идиот, да-да, тебе говорю, нечего оглядываться, больше тут никого нет, ты, идиот, наклеивающий на все ярлыки, — были совершенно неправы».</p></span><span id="id31"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Музей был устроен широко. Он занимал все фойе первого корпуса, состоял из двенадцати — двенадцать тут, видимо, было числом священным — мозаичных пластмассовых картин с подсветкой, включал в себя полный макет завода, с выбивающим слезу старанием изготовленный из папье-маше, а в конце экскурсии Тихонову пришлось расписаться в книге почетных посетителей, где расписывались все, поскольку непочетным хода сюда не было. Первая картина изображала дореволюционное запустение в глухой тайге, монастырь с недвусмысленно красноносым попом на первом плане и святой источник, из которого била явно не простая водичка. Тихонов заметил, что в Перове-60 не было ни одной церкви: физика себя блюла. Если рассматривать весь их поход как странствие по наиболее вероятным путям российского будущего, завод воплощал собою национал-технократическую, архаично-прогрессивную идею, то есть устремление к будущему в карете прошлого, с графеновым покрытием, на конной тяге. Вторая картина изображала массовый повал тайги и героическое строительство первого вагоностроительного гиганта, возведенного в здешних краях руками раскулаченных, сосланных и просто безработных. На строительстве завода вместе комиссарили отцы знаменитого барда, великого режиссера и легендарного фарцовщика. Все трое впоследствии были неразлейвода, а отцы пополнили число сосланных, высланных, лишенных всех прав состояния, а впоследствии самой жизни — поскольку позволили себе считать, что это их страна и что государство — это они. На третьей картине завод посещал Г. К. Орджоникидзе, сказавший в речи на XVII съезде с почти отеческой нежностью: «Много есть у нас прекрасных строек, но нет такой изящной, такой во всех отношениях прелестной стройки, как Перовский локомотивный завод». И все засмеялись с такой же нежностью, как родители при виде шаловливого дитяти. Г. К. Орджоникидзе любил эту стройку, бывал тут неоднократно, а когда отцы барда и режиссера начали исчезать в мясорубке, из последних сил пытался их вытащить оттуда, и утром того рокового дня еще звонил на роковой завод, а днем уже нажал на роковой курок.</p><p class="p1">На четвертой картине завод спешно переходил на военные рельсы, изображенные тут же: по ним отправлялась на фронт новая продукция, танки, эти трактора войны, как с придыханием заметил гид. Тогда перовцы гостеприимно приняли Приволжский тракторный, эвакуированный из-под Сталинграда, и вместе они все силы отдали фронту. Страх сказать, война была для завода звездным часом: принимая эвакуированных, он расширился, оброс бесценными кадрами и на неделю раньше обещанного дал фронту легендарное изделие № 12 — тогда это был танк, стоящий теперь на постаментах во всех городах Курской области и кое-где в Восточной Германии. Работа над его летающим вариантом — великий замысел, похеренный при хрущевских сокращениях, — была отражена на пятой картине, где на полигоне, задрав головы, стояли очкастый конструктор, бровастый директор и плечистый рабочий. То, на что они смотрели, было столь секретно, что не изображалось, как Аллах в исламской традиции, — но, как в той же традиции, истинно верующие могли узреть летающее чудовище; и Тихонову оно представилось ясно — многотонное, защитного цвета, на просторных брезентовых крыльях с алой эмблемой, почему-то аэрофлотовской. Тихонова поразило, с какой любовью выписаны были травинки полигона, даже робкие цветы у ботинок главконструктора: само изделие, возможно, вовсе не летало или падало на двадцатой секунде, вбивая в сухую почву полигона государственные миллионы, — но травка, очки, брови… это да. И Тихонову стыдно стало насмешничать.</p><p class="p1">Шестой шедевр, однако, заставил его переспросить гида, — мало ли, ослышался; но нет, перед ним был траурный митинг по случаю смерти Сталина. Хотя музей созидался в семидесятые, когда любимое имя произносилось с осторожностью и, несмотря на полу-официальную реабилитацию, избегалось елико возможно, — в Перове не потерпели никаких умолчаний. Траурный митинг шел в ночном цеху, при свете раскаленного металла (Тихонов не стал уточнять, были тут ночные вахты постоянной практикой или специально решили запустить цех на всю ночь, чтобы таким образом почтить память самого полуночного полуночника). Огромный бюст — видимо, только что отлитый, — занимал половину первого плана; рядом на трибуне возвышался тот самый директор, который только что смотрел в небо. Теперь, глядя прямо перед собой напряженными красными глазами — покрасневшими то ли от слез, то ли от жара, — он явно в чем-то клялся. Вокруг чернела безмолвная, озадаченная толпа, не представляющая, как же теперь и на кого покинул.</p><p class="p1">— Я вижу, вы хотите что-то сказать, — заученно произнес гид. Видимо, большинство посетителей не могли удержаться от полемики: да, достижения, но с другой стороны…</p><p class="p1">— Нет, ничего, — скромно ответил Тихонов.</p><p class="p1">— Руководителя государства, — сказал гид, потирая усталые, тоже вдруг покрасневшие (не от слез ли?) глаза. — Руководителя государства… следует судить по тому, что от него осталось. Все, что мы имеем, осталось от него.</p><p class="p1">Тихонов не стал возражать. Тем более что возразить на это было нечего — следовало лишь понять эту фразу чуть шире.</p><p class="p1">Седьмая картина вызвала у гида особый восторг: то были блаженные шестидесятые, время строительства того самого НИИ, который размещался возле завода и неутомимо тянул его в будущее. Ершистые, вихрастые физики отчаянно спорили вокруг белого листа (чертеж, вероятно, был виден посвященным или проступал при особом освещении); чуть поодаль к их спорам одобрительно прислушивался пожилой шеф лаборатории — эх, молодежь! Заблуждается, понятно, перехлестывает через край, — но какой энтузиазм, вера какая! На восьмой Перовский тракторный, впоследствии Перовский танковый, преобразовывался в Перов-60: картина изображала торжественное закрытие огромных бетонных ворот. Открытие завода совпало с закрытием города. С этого времени Перов-60, бывший Чудеев (по имени монастыря и его чудотворцев), начинал жить если не в коммунизме, то по крайней мере при том идеальном строе, который должен был получиться вместо коммунизма: умные, но насмерть идейные люди в обстановке полной закрытости, истерически выросшей духовности и полной исключительности, подогревающей трудовой энтузиазм. Остальные три картины — открытие стадиона, выпуск первого и опять-таки невидимого (на закрытой брезентом гигантской платформе) изделия № 16 и математическая олимпиада среди школьников из закрытых городов — посвящены были идиллическим, но грозным картинам этой полужизни, рождавшей гениев и параноиков в количествах, превышающих любую потребность. Двенадцатой картины не было — то есть она была, разумеется, но изображала, как шутили в курилках тех же заводов, разгрузку угля черной африканской ночью. Тихонов не сдержался и усмехнулся. Гид привычно вскинулся.</p><p class="p1">— Я понимаю, конечно, — начал он, — что вы иронизируете…</p><p class="p1">— Просто хочу понять, что на двенадцатом панно, — кротко сказал Тихонов.</p><p class="p1">— Этого вам не нужно знать.</p><p class="p1">— Да я уж догадался.</p><p class="p1">Он действительно догадался — и не сказать, чтобы именно на заводе, именно во время экскурсии, — что во всяком деле есть своя двенадцатая картина, то, чего нам не нужно знать, и эта-то картина обеспечивает оправдание всем очевидным глупостям и мерзостям, которые мы видим при подсветке и без. Всегда есть что-то, могущее перевернуть наши представления о мире, сигнал ниоткуда, после которого нам сделается стыдно ругать очевидности, — и вот мы оправдываем их, утрачивая всякие критерии, и готовы терпеть уже что угодно — все из-за этого ничтожного процента тайны, невидимого ингредиента, который, однако, и делает кока-колу кока-колой, и никому нет дела до того, что кока-кола вообще дрянь. В мире наблюдается та же история — мы никогда не можем назвать вещи своими именами, потому что повсюду оставлено место для двенадцатой картины, она же Бог, и эта картина изменит до неузнаваемости все то уродство, которое ежеминутно бросается в глаза. Но в том-то и штука, что неуловимый процент «этого-вам-не-нужно-знать» растворен в каждом пейзаже, в каждом закате, даже в самой тупой бабе, в которой на миг мелькает нечто этакое, — и все терпится, все переносится.</p><p class="p1">— На самом деле это цех номер одиннадцать, — сказал гид, видя сложную игру взаимоисключающих чувств на лице Тихонова. — Просто подсветка не работает.</p><p class="p1">Но он сказал это так, чтобы неработающая подсветка могла восприниматься как спасительная уловка.</p><p class="p1">— И вообще, — добавил он. — На месте людей, которые никогда и ничего не сделали своими руками, я бы иронизировать не стал.</p><p class="p1">— Никто и не иронизирует, — вяло заметил Тихонов.</p><p class="p1">И эта вялость остановила гида, уже готовившегося произнести явно включенный в экскурсию монолог о том, что миром должны и будут править производители ценностей, ученые-практики, не размазывающие соплей и не желающие лишнего. Может быть, его остановило то простое соображение, что триумф этих сугубо рациональных людей возможен лишь в том иррациональном мире, где двенадцатая картина всегда занавешена.</p></span></span>
