<p class="p">7</p>
</div><p class="p1">В огромном кабинете гендиректора Семенова на третьем этаже заводоуправления шло заседание верхушки — два зама, главный инженер, руководитель второго отдела НИИ (они все были номерные, без расшифровок), кадровик и кто-то из Екатеринбурга, с неясной, но важной миссией. Тихонову разрешили сидеть в углу, за отдельным столиком, где обычно помещалась секретарша. Но сегодня в ней не было нужды — Семенов ее отослал.</p><p class="p1">— Вот он у нас все запишет, — сказал он загадочно, указывая на Тихонова.</p><p class="p1">Заседание производило на Тихонова крайне странное впечатление. Он не понимал, о чем речь, поскольку на заводе давно выработался стиль умолчаний о главном — все приборы и узлы назывались по номерам либо загадочным буквенным обозначениям. Чувствовался некоторый надрыв. Было видно, что все эти люди работают вместе бог весть сколько и, в общем, прекрасно друг к другу относятся, и даже человек из Екатеринбурга явно присутствовал на таких обсуждениях не в первый раз, потому что он — единственный из всех — со скучающим видом чертил в блокноте геометрические фигуры. Остальные неистовствовали, изображая трудовой энтузиазм и полемику с чуть большим старанием, чем следовало: то ли специально старались для гостя, то ли развлекались таким образом сами.</p><p class="p1">— Вы как хотите, — говорил главный инженер, — но я таких обязательств не возьму и вам, насколько смогу, буду противостоять. Да, потому что вы как хотите, но это абсолютный волюнтаризм. — Тихонов давно не слышал таких слов, их никто уже всерьез не употреблял. — Простите меня, Максим Леонидович, но о таком графике может мечтать только сумасшедший. Мы опять все запорем, я уж не говорю — по кашкам, но даже и пятнадцатый узел мне еще не кажется готовым. Ведь это на что будет ставиться? Это будет ставиться… — Он осекся и многозначительно посмотрел на журналиста. — Это будет на таком изделии, которое уже не переделаешь после пуска. И на коллегии опять будут песочить — кого же? Вы как хотите, но я совершенно не могу, я не хочу и категорически требую!</p><p class="p1">— Владимир Михайлович! — прижимая руки к груди, говорила очкастая женщина лет сорока, больше всего похожая на библиотекаршу, измученную отсутствием финансирования и личной жизни. — Мы можем перестраховываться и перерассчитывать, но дело стоит и будет стоять! Я позволю себе процитировать — великой державе застой опаснее поражения. И пока вы будете обсчитывать и проверять, люди могут спросить нас — что мы, собственно, делаем? Почему мы это делаем и где наш, наш личный, не государственный, но собственный прогресс? Меня сын уже спрашивает: мама, когда вы рапортуете? И как мы посмотрим на детей, и неужели нам важней то, как на нас посмотрит комиссия?</p><p class="p1">— Елизавета Борисовна! — почти закричал инженер. — Я очень уважаю мнение вашего Миши, он развитой мальчик! Но речь может пойти о миллионах. Да, рублей, а, слава богу, не жизней, я надеюсь, что до жизней не дойдет. Но погоня за очередным рекордом — это, товарищи, штурмовщина, и мы все уже видели, что было с «Протоном»… — Он опять осекся и без особой приязни поглядел на Тихонова. — Отрасль переживает ломку, товарищи, и не в последнюю очередь потому, что некоторые до сих пор берут от прошлого не те традиции, которые заслуживают, а те…</p><p class="p1">Он махнул рукой и отвернулся.</p><p class="p1">— Какие есть, такие и берут, — задумчиво сказал сыроватый толстяк с широким крепким лбом. — Я со своей стороны могу только заметить, что в прошлом году эта, как вы сказали, штурмовщина привела к первому месту по отрасли. А победителей, как известно, не судят. Поэтому если вы спросите меня — я бы поддержал второй отдел. Если наука говорит — да, почему практики должны тормозить? Отливка у нас слава богу, батонщики не подводят, министерство дает добро — почему не рискнуть? Четырнадцать значит четырнадцать, но есть ведь еще, как народ говорит, пятое число и прогрессивка…</p><p class="p1">— Перестраховка — хорошая вещь, — заметил человек из второго отдела НИИ, высокий, нервный и, кажется, не очень здоровый: язва? колит? Непонятно было, поддерживает он инженера или возражает ему с позиций упомянутого волюнтаризма. — А с другой стороны, движение — все. В последнее время, товарищи, темпы меня смущают. Мы все-таки недогружаем людей, и если прибавить, скажем, один час хотя бы по вторникам, да что там, по четвергам…</p><p class="p1">Инженер ударил себя по ляжкам, но промолчал.</p><p class="p1">Тихонов смотрел главным образом на молодую — лет двадцати семи — и неотразимо его привлекавшую участницу совещания, чья функция, однако, была ему неясна. Называли ее с преувеличенным почтением «товарищ Кузнецова» — видимо, подтрунивая над молодостью. Кузнецова была высока ростом, стройна, черноволоса, курчава, решительна, черты ее были, пожалуй, крупноваты, но серые глаза под очками смотрели весело, она забавно морщила нос, словно постоянно посмеиваясь над собой и всеми, и было что-то во всей ее мимике и фигуре, что Тихонов распознавал безошибочно: ясно было, что она любит это дело и как следует в нем попрактиковалась. Иногда она ловила тихоновские взгляды, выдерживала их, улыбалась, а один раз — он даже подумал сперва, что померещилось, — показала ему кончик языка. Тихонов окончательно перестал понимать, на каком он свете.</p><p class="p1">Наконец она взяла слово.</p><p class="p1">— Вот у нас тут сидит товарищ журналист, — сказала она, стрельнув глазками в сторону секретарского столика. — И он может подумать бог знает что. На самом деле я хочу сказать, что вопрос-то, как мне кажется, не принципиальный. Мы отвлекаемся на него нарочно, потому что боимся сказать о главном. По большому счету, товарищи, такая ли разница, сойдет изделие с конвейера седьмого ноября или пятнадцатого? Все знают, что раньше двадцатого испытания не начнутся — просто потому, что глубокий снег еще не ляжет. А отвлекаемся мы, товарищи, от того, что шестой цех приходится переводить на мирные рельсы, и все мы боимся себе в этом признаться.</p><p class="p1">Повисла, что называется, напряженная тишина.</p><p class="p1">— Ну, положим… — начал главный инженер. — Положим, это вопрос далеко не решенный…</p><p class="p1">— Вот мы и боимся сейчас решать, а людям надо что-то говорить. Я веду как идиотка, простите, переговоры с заказчиком, институт бьется над этими санями, как будто они имеют оборонное значение, мы торопимся к сезону выбросить на рынок эти сани, всем говорим, что никакие финны еще не предложили такую конструкцию — а потом выясняется, что мы безумно дорожим шестым цехом и, может быть, опытная партия вообще будет готова только к декабрю. Спрашивается, зачем тогда весь рекламный отдел три месяца стоит на ушах, зачем мы вкладываемся в телевидение, почему испытатель на поролоне ездит три дня, рискуя, между прочим, — а теперь оказывается…</p><p class="p1">Тихонов не слышал ни о каких новых санях, но это, наверное, потому, что он вообще мало ими интересовался, а может, выброс новой продукции на мирные рынки удерживался в секрете. Но товарищ Кузнецова ему нравилась, и после недельного воздержания он бы очень не возражал против личной беседы о санях.</p><p class="p1">— Погодите, — прервал ее помалкивавший до тех пор Семенов. — Успеется о санях. Давайте все-таки утвердим: если мы останавливаемся на седьмом, приходится перестраивать весь график, и людей надо хотя бы предупредить…</p><p class="p1">Кузнецова явно хотела возразить, но в голосе гендиректора была та самая сталь, которая заставляла прислушаться и министров.</p><p class="p1">— Вопрос о шестом цехе, — продолжал Семенов, — я бы сказал, все же тактический. А стратегический — это именно вопрос о графике, потому что либо мы мобилизуемся, либо верим Владимиру Михайловичу, за которым все-таки тридцатилетний опыт, и много раз, напомню, его предостережения были крайне полезны. Крайне. Не скрою, мне самому хотелось бы дать, так сказать, новый стимул, и финансы нам как раз сейчас позволяют. Но риск есть, я от него не прячусь, и давайте спросим себя: можем мы, так сказать, в лучших традициях… или следует нам действовать применительно к стране, к той эпидемии безделья, которая коснулась уже всех. Если из дому не выходить, оно, конечно, безопасно, не простудишься, под трамвай не попадешь… но…</p><p class="p1">— Если мы сначала решаем по графику, то я за то, чтобы рискнуть, — сказала Кузнецова. — Город поддержит, я думаю.</p><p class="p1">Она посмотрела на человека из Екатеринбурга и, не удержавшись, опять на Тихонова.</p><p class="p1">— Ну что же, — после минутной паузы, когда все смотрели в стол, подытожил Семенов. — Предлагаю решить так. Если проходит предложение Грохотова и мы изо всех сил успеваем к седьмому, и все получается на уровне — я главному инженеру выписываю утешительный приз в размере пятидесяти процентов, и пусть он нас простит за недоверие. А если будет как в позапрошлом, я штрафую всех присутствующих на те же пятьдесят и Грохотова перевожу в технологи. Соглашаемся?</p><p class="p1">Все зашевелились, Кузнецова хихикнула.</p><p class="p1">— За что всех-то? — пробасил широколобый толстяк.</p><p class="p1">— Коллективную ответственность никто не отменял, — развел руками Семенов. — Payer les pots cassés, простите мой французский.</p><p class="p1">— Ну и прекрасно, — сказал человек из Екатеринбурга. Видно было, что он не разделял общего энтузиазма, да и сам этот энтузиазм нисколько его не убеждал. Ему больше всех было плевать на ноябрьские планы и тем более на санки шестого цеха, и он смотрел на всю эту дискуссию, как взрослый на детские игры. — Город поддержит, я докладываю в Москву, и помогай бог, как говорится.</p><p class="p1">— Всем спасибо, товарищи, а я попробую объяснить гостю, чем мы только что занимались, — Семенов широким жестом отпустил всех, и кабинет опустел.</p><p class="p1">— Чайку, — сказал он в селектор.</p><p class="p1">Секретарша внесла две чашки и тарелку фисташек.</p><p class="p1">— Что же, — вздохнул Семенов. — Я к вашим услугам.</p><p class="p1">Это прозвучало издевательски, поскольку в этом кабинете Тихонов чувствовал себя последним из последних, да и задача, которую он призван был выполнить, являлась по существу лакейской. Он решил вести себя нагло.</p><p class="p1">— Видите ли, — сказал он вежливо, почти ласково. — Мне было бы легче о вас писать, если бы я знал, что производит ваш завод.</p><p class="p1">— Это совершенно необязательно, — ответил Семенов без предполагаемой паузы: Тихонов ждал, что он хоть задумается, поколеблется, а там, как знать, и раскроется. — Вы наверняка знаете — вам сколько лет-то? Двадцать шесть, двадцать семь? К этому возрасту вы наверняка уже знаете, что всякий завод производит сам себя.</p><p class="p1">Тихонов не понял и переспросил.</p><p class="p1">— Да очень просто, — Семенов был странно добродушен и, кажется, рад потрепаться. — Этот завод производит людей, которые на нем работают, институт, который при нем что-то выдумывает, школу, которая в свою очередь производит Семушкина, и весь вообще город, который вокруг всего этого нарастает. А больше никакой завод ничего не может произвести. Вы думаете, что пчелы существуют для меда, а мед, в сущности, побочный продукт их деятельности. И они крайне бы удивились, узнав, что человек их разводит только для этого.</p><p class="p1">— Понимаю, — сказал Тихонов. — Уводите от вопроса. Я так и ждал.</p><p class="p1">— Да погодите вы! — с досадой сказал Семенов. — Вы думаете, что если я вам назову изделие номер шестнадцать каким-нибудь именем, вас это приблизит к его пониманию? Ну хорошо, пожалуйста, глюкатор трехосный. Тримальхион. Беспилотный разведчик «К-317». Вам все ясно? Ни один завод, ни один человек не производит продукцию как таковую. Вся промышленность в конечном итоге производит говно и глину. Часть немедленно превращается в говно, а часть впоследствии — в глину. Все это неважно. Но производятся при этом всякие типы, а это уже важно! Сельское хозяйство производит ужасного типа, простите, если у вас кто-то в нем занят. Это угрюмый тип, собственнический тип, он занят работой трудной и грязной, и всех поэтому считает хуже себя. Может быть, это так не везде, только в России, но я других не встречал. Журналистика, которой вы, видимо, занимаетесь, производит тип очень интересный, талантливый, энергичный, вечно собой недовольный. Там, кстати, не задерживаются, потому что в конце этот тип производит страшный кризис, переоценку: он видит, как все ненадолго, и убегает во что-то более прочное. Интересных людей производит война — но везде, кроме войны, они заурядны, а вечно воевать не будешь. Короче говоря, из всех, кого я видел, самые интересные люди производятся в закрытых городах, на заводах, вокруг которых крутится вся жизнь. Это институт, занятый самой чистой наукой, потому что она ни на что не отвлекается, и государство ее кормит, и деться ей некуда — приходится мыслить. Она мыслит, кстати, во всех направлениях — в социальном тоже. Как в Новосибирске. Я много там бывал, если вам это интересно. Потом — школы для молодых гениев, потом — магазины для них же, и рабочие, которые уверены, что спасают страну. Они не всегда понимают, чем занимаются, но бесконечно совершенствуют это занятие. Я бы сказал, что они работают, как поэты. Да вы не записывайте, просто слушайте. Поэт ведь чем занят? Не зря Колмогоров этим занимался подробно, хотя его интересы лежали в совершенно других сферах. Поэт — тот же сборщик, который не понимает толком, что собирает. Он собирает изделие номер шестнадцать, из которого потом неизвестно что получится. Нам не дано предугадать и так далее. И о деталях он имеет очень слабое представление, потому что не знает, откуда взялись слова и что они значат в действительности. Но его интересует, как эти непонятные для него детали лучше всего пригнать друг к другу — занятие, между нами, совершенно бессмысленное. Но в нем достижимо совершенство, и вот эти люди, не извлекающие из своего дела никакой практической пользы, ищут это совершенство — и это их улучшает, они хороший материал, из них могло бы получиться прекрасное общество. Если допустить, что в одиннадцатом цехе вообще ничего не происходит, вы сразу все поймете. Предположите просто, что все эти колесики, которые в разных комбинациях собирают в остальных цехах, здесь разбираются заново и возвращаются назад, и потом их собирают по новым чертежам, которые готовит институт. Вот и все, хотя на самом деле все гораздо сложнее, мы отгружаем продукцию, обмениваемся ею с тремя другими номерными заводами, получаем от них новые составляющие и так дальше, так дальше. Но схему я вам изложил, и в ней нет никакой секретности.</p><p class="p1">Тихонов молчал. Он был ошарашен.</p><p class="p1">— Но деньги? — сказал он наконец. — На какие-то деньги все это должно существовать?</p><p class="p1">— Ну а ракеты? — спросил директор. — Ведь их нельзя продать, ими нельзя выстрелить, все это понимают. Ракеты же существуют на какие-то деньги? И, наверное, они зачем-то нужны стране, хотя всем ясно, что они никогда не полетят на врага. Нужно невероятное допущение, безумный скачок — кто же будет кончать с собой таким дорогостоящим способом? Но они нужны, потому что самоощущение человека с ракетами совсем иное. Если у вас при себе пистолет, из которого вы с огромной вероятностью никогда не будете стрелять, — вы ведете себя храбрей, мужественней, у вас просто осанка другая. Если страна тратит миллиарды на эти ракеты, допускаете же вы, что на более важное производство у нее могут найтись кой-какие средства?</p><p class="p1">— На какое же более важное? — все еще не понимал Тихонов.</p><p class="p1">— Самым важным производством, — назидательно сказал директор, — в любой стране являются граждане. Не побоюсь сказать, что наилучшие граждане, граждане высшего сорта производятся в закрытых городах, и одним из таких производств я непосредственно руковожу. И, кстати, о деньгах: мы неплохо зарабатываем. Вы племя видели?</p><p class="p1">— Конечно. Я уже понял, что это ваши.</p><p class="p1">— Это не просто наши. Это наш драматический театр, один из лучших в России, между прочим. Шамана видели? Гамлет наш. Когда кончается сезон в тайге, он в театре играет так, что на него из Англии приезжают. Мы пускаем. Череп видели у него?</p><p class="p1">— Я думал, настоящий, — признался Тихонов.</p><p class="p1">— Так он и есть настоящий. Это предыдущего шамана череп. Он из шаманской семьи, Гамлет наш. Булабахин его фамилия. Когда он камлает «Быть или не быть?» — в зале знаете что делается?</p><p class="p1">Все здесь было обманкой, пора привыкнуть. Племя — не племя, а артисты; артисты — не артисты, а шаманы; шаманы тоже наверняка были не шаманы, а беглые русские крепостные, но Тихонов не стал в это углубляться.</p><p class="p1">— Мы еще заказы берем, — продолжал Семенов. — Изделие номер три — тоже наше, — это роликовые коньки. Лучшие, между прочим, в России. Пылесосы замечательные. Седьмой цех переключился на мебельные гарнитуры. Но там, как вы понимаете, третий сорт. Первый сорт — это изделие номер шестнадцать, основная специализация. Я имею в виду, разумеется, людей, потому что в номерных изделиях сортность не указывается. Там сорт один — высший.</p><p class="p1">— Я сначала подумал, — признался Тихонов, — что у вас тут круглые самолеты делаются.</p><p class="p1">— Круглые? — Семенов поднял кустистые брови.</p><p class="p1">— Нам в племени сказали. Артисты ваши, в смысле. Говорят, круглые самолеты летают, — мы подумали, это ваши заготовки…</p><p class="p1">— Чушь, — сказал директор. — Это они, наверное, тарелки видели.</p><p class="p1">— А что, летают? — Тихонов уже ничему не удивлялся.</p><p class="p1">— Нет, конечно. Группа Скороходова тоже якобы погибла от летающих шаров где-то километрах в тридцати отсюда, но ясно же, что там была обычная лавина.</p><p class="p1">Темнело, но Семенов не зажигал света. Тихонов посмотрел в бледно-лиловое окно и неожиданно почувствовал глубокий, почти школьный, с детства забытый уют — так же он поднимал глаза, когда делал уроки, и тоже не торопился включать настольную лампу, хотя все хуже видел тетрадную страницу. Тихий сумрак осени наполнял тогда комнату — Тихонов никогда не воспринимал осень как время увядания, скорей это была подготовка к чему-то самому главному, что всегда делается само. Вот подготовится мир, и в застывшем зимнем воздухе, чтобы никто ни о чем не догадался, начнет совершаться это главное. И в земле, и за окнами домов тоже будет твориться то основное, ради чего все сюда присланы. Лето — всегда каникулы, а осень — всегда работа, и он тоже призван участвовать в ней, хотя бы тем, что делает уроки. Он со всеми в заговоре. А понимать, кто и о чем договорился, ему не нужно: все и так устроится.</p><p class="p1">— Просто сейчас очень многие поверили, будто все дело в экономике, — продолжал директор совершенно по-домашнему, тише и мягче. — Экономика вообще псевдоним, математика и психология плюс небольшой процент азарта, очень человеческая вещь без строгих закономерностей. А в основе всего эволюция, тоже на «э», но это как раз вещь научная. Человек должен усовершенствовать себя, иногда он себя усовершенствует массовыми убийствами, иногда торговлей с лотка, и долгие исследования — в том числе мои лично — показали, что лучше всего он эволюционирует в закрытом городе, служа не совсем понятным, но благородным целям. А выращивать на конвейере он может хоть грибы — эволюция грибов или деталей никого не интересует. И государство, если оно государство, если вообще не хочет стереться с земли и остаться в преданиях, — должно заботиться о гражданах будущего, тратиться на заводы, от которых ничего не получает, запускать пробные ракеты, хотя настоящие не полетят… Вероятно, такие люди, как наши — на этом заводе и подобных ему, — не очень приспособлены к жизни в том же, я не знаю, Перове просто, Перове без цифры. Но я спрошу: а зачем к ней приспосабливаться? Зачем торгашествовать, спиваться? Почему надо быть впереди всех на пути в глину? Вы думаете, страна сможет в кризисе опереться на тех, кто живет в Перове? Нет, ее спасут те, кто из Перова-60. Их не должно быть слишком много. Чтобы спасти, много не надо. И пусть лучше государство вкладывает в этих людей, чем в никому не нужных стариков или еще какую-то ерунду.</p><p class="p1">Разумеется, для Семенова старики смысла не имели. Они свое отэволюционировали. Ценно было только свежее мясо, молодая кровь, новые заводчане.</p><p class="p1">— Вы ведь знаете, что нас закрыть хотели? — продолжал Семенов. — Я в Москву сколько раз ездил. Оставили. Потому что, сами посудите, на кого им опираться в случае чего? На Сколково?</p><p class="p1">И он усмехнулся так, как умело усмехаться только это поколение, сразу признавая несуществующей какую-нибудь мелкую дрянь.</p><p class="p1">— Но подождите, — не сдавался Тихонов, хоть он и сам не слишком понимал, что именно защищает. — Подождите. Их же вечно упрекают — ну, всех, — что они чистые прагматики. И оказывается, что они поддерживают завод… недешевый завод… кормят тут всех… Хотя отдача стремится к нулю! Ну — если практически, вы понимаете…</p><p class="p1">— То есть! То есть! — запротестовал Семенов. — Что производит государство, если смотреть в корень? Вся Африка производит пофигистов, которым только под пальмой лежать да стрелять иногда из «калаша». Вся Америка производит превосходных граждан будущего, для которых биологический носитель уже неважен, они все время пол меняют и возраст одолевают, в сто три года с парашютом и так дальше, так дальше. Китай производит идеальных солдат, которые, правда, только умирать умеют, но что же еще делать солдату? Можно и так воевать…</p><p class="p1">— Ну, это очень все приблизительно, — вступился Тихонов за Китай. — Они и фигуристов производят, и скрипачей, и программеры очень приличные…</p><p class="p1">— Идеальные солдаты, — повторил Семенов. — Я разве что, разве против? Пусть воюют… Просто они танцуют там, на льду, — будто их назавтра расстреляют. И на скрипке так же… Очень чувствуется.</p><p class="p1">— А у вас не так?</p><p class="p1">— У нас не так, нет. — Семенов снова усмехнулся, и непонятно было — жалеет он, что у них не так, или радуется. — У нас энтузиазм. Это же великое дело — когда никто не знает, что получится. Это вам не пулемет собирать и не холодильник.</p><p class="p1">— А скажите, — спросил наконец Тихонов, давно лелеявший этот вопрос, но никак не решавшийся его задать, — в открытом городе может быть что-то подобное?</p><p class="p1">— Нет, конечно, — сказал Семенов, снова без паузы, словно только этого вопроса и ждал. — Знаете, был эксперимент такой в семидесятые. Моделировали эволюцию на ЭВМ. Ну, какие тогда были ЭВМ — сами знаете, но, в общем, как-то у них не моделировалось появление панциря. Все есть — а панциря нет. Что такое? Да они же внешнюю угрозу туда не внесли! В стартовых условиях, — повторил он для невидимых непонятливых, — нет внешней угрозы. Так и тут: если у вас нет закрытого пространства, откуда в нем возьмется давление? Кто будет его нагнетать? Без давления у вас так же ничего не выйдет, как у ребенка невоспитанного, которому все можно. Но давление это должно быть осознанным, понятным! А не так, чтобы каждое утро брали непонятно за что, или ночью обыски, или бить в подворотне. Это не самодурство и даже не государство, это слу-же-ни-е! Вот почему я и верю, что только с закрытых заводов выйдет когда-нибудь будущее России… которое я и произвожу… а больше ему неоткуда взяться, молодой человек, но только этого ты не пиши. А впрочем, что хочешь пиши, но не печатай. Важно же то, что ты написал и что с тобой от этого сталось, а кто тебя прочитал — дело десятое. Хочешь посмотреть одиннадцатый цех?</p></span><span id="id36"><div class="title5">
<p class="p">8</p>
</div><p class="p1">То, что увидел Тихонов в одиннадцатом цеху, потрясло его именно потому, что нечто подобное он как раз ожидал увидеть, но, разумеется, не мог себе этого представить. Нас всегда потрясает совпадение наших тайных догадок с реальностью — вот какие мы умные! — но верный вектор еще не означает точного представления. Да, он думал правильно, но то, о чем он думал, оказалось в реальности бессмысленней, торжественней и грандиозней. Он увидел изделие номер шестнадцать и мог бы его описать, но его сознание не могло вместить увиденного.</p><p class="p1">— Вот, — с гордостью сказал Семенов. — В этом цеху делается у нас на полной автоматизации главное ноу-хау — новый человек. На этом изделии — номер шестнадцать, как вы знаете, — он, так сказать, обтачивается.</p><p class="p1">Явление изделия номер шестнадцать было подготовлено с почти театральной роскошью. Семенов провел Тихонова через три кафельных коридора, сверкающих хирургической чистотой; через три проходных, где директору приходилось прикладывать к пультам три разных пропуска, и через огромные железные ворота во дворе; приходилось идти то под землей, то поверху, среди неожиданно мирных, заросших полынью и сухой травой асфальтовых дворов, они обходили мазутные лужи, долго шли вдоль огромного бассейна, от которого шел густой химический запах, — заглянуть туда было нельзя из-за высокого бортика, из-за которого валил лиловый пар; над территорией завода включились гигантские прожектора, и пейзаж окончательно стал инопланетным. Наконец Семенов набрал сложную комбинацию на кнопочном замке, и черные створки медленно разъехались.</p><p class="p1">— Одиннадцатый цех! — сказал Семенов и отступил вправо, пропуская Тихонова.</p><p class="p1">Перед Тихоновым стояла — но это не то слово, потому что непрерывно шевелилась, — бесконечная стена, которая жужжала, тикала и свистела ремнями; это была пятидесятиметровая в длину и шестиметровая в высоту плоскость, состоявшая, если вглядеться, из бесчисленных разноразмерных шестеренок, зубчатых колес, трансмиссий, пружин, ремешков, находившихся в непостижимо сложных связях. Все они крутились с разной скоростью, некоторые — беззвучно, другие — с щелканьем и тиканьем, часть издавала музыкальный звон. Здесь, видимо, никогда не выключался синеватый свет, и в этом свете блестело идеально чистое, превосходно смазанное железо: эти блестящие шестеренки казались столь же неисчислимыми, как звезды на небе, и само звездное небо долго потом представлялось Тихонову набором таких же тесно связанных, непрерывно трущихся колес, чей слабый отблеск едва долетает до нас. Если мир был как-нибудь устроен, он был устроен так.</p><p class="p1">Проследить хоть иллюзию порядка в этом раз навсегда запущенном механизме не мог, вероятно, и сам его создатель. Лучшей метафорой сложности и разнообразия не могла стать никакая электроника. Электроники тут и не было — все крутилось на честном машинном масле, стиралось, заменялось, ни на секунду при этом не останавливаясь; все эти разнонаправленные вращения задавал один крошечный, наверняка невидимый валик — и все металлическое мироздание начинало передавать его импульс, уменьшавшийся в бесконечном трении, но никогда не исчезавший до конца. Тихонов минут десять стоял, любуясь, то приближаясь на шаг, то отступая, ничего не понимая и не пытаясь понять. Ради этого стоило содержать завод, город, планету — которая, очень может быть, только благодаря этому еще и вертелась. Сверкали железные звезды, пели железные птицы, все было беспричинно и взаимосвязано, не имело ни начала, ни конца, ни смысла, но страшно напряжено и бесконечно разнообразно.</p><p class="p1">— Ну хватит, — сказал наконец Семенов. — Насмотрелись.</p><p class="p1">— Простите, — прошептал Тихонов, но голос его растворился в тиканье и свисте. — Простите, — повторил он громче, — а многие это видели?</p><p class="p1">— Немногие, — серьезно ответил Семенов. — Но немногие сюда и приезжают, хотя город давно открыт. Монастырь работает, источник бьет. Завод закрыт, конечно, но некоторые прорываются. Я обычно сам выбираю, кому это нужно. Вам, по-моему, нужно.</p><p class="p1">— Очень, — в тон ему ответил Тихонов. — Исключительно. Наверное, писать ничего не надо?</p><p class="p1">— Почему же, — удивился Семенов. — Обязательно надо. Только напишите так, чтобы никто не понял.</p><p class="p1">— Попробую, — честно пообещал Тихонов.</p></span></span>
