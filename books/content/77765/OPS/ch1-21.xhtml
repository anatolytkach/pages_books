<span><span id="id44"><div class="title6">
<p class="p">5</p>
</div><p class="p1">— Ну? — буркнул эмчеэсник. — Теперь понял?</p><p class="p1">Он неспешно собирал вещи, складывал их в два больших мешка — нужное в брезентовый, ненужное в бумажный. В ненужное полетели вымпелы, грамоты и бюст министра, все равно теперь поменявшего пост. Для эмчеэсника увольнение словно вовсе и не было катастрофой, он понимал, что рано или поздно эта работа кончится и начнется что-нибудь другое; люди из этого ведомства не пропадали. Да и кто пропадал? Разве самолеты, и те никуда не летали.</p><p class="p1">— Как же это выплыло? — спросил Савельев, тупо глядя на эти неспешные, деловитые сборы.</p><p class="p1">— А вот расспрашивали такие, как ты, оно и выплыло, — объяснял поисковик беззлобно. — И летчик дурак. Я говорил Меньшутину — спрячь ты его как следует. Нет, он его в оплаченный отпуск отправил. Нешто можно такому авиатору оплаченный отпуск давать? Он и запил. А тут приехал искатель вроде тебя, приключений искатель, на свою и чуждую жопу. И нашел летчика. Летчик в деревне жил у матери, а тут приехал в город, нашел время. Сидит пьет в рыгаловке. Этот подсел, заговорили, слово за слово, тот спрашивает — чего слышно про самолет? А не было самолета, говорит летчик. Никуда он не летал. Его на запчасти разобрали. Этот возьми и напиши, и пошел шум. Комиссия обратно приехала. Где ячейка партии? Нет ячейки партии, не было никогда. Ничего, теперь будет, вспомните нас, да поздно…</p><p class="p1">— Но как же, — упорно не понимал Савельев. — Ведь Дронов. Ведь такой крутой.</p><p class="p1">— Не было никакого Дронова, — не прекращая сборов, терпеливо, как дитю, объяснял эмчеэсник. — Никого не было. Они же что прислали? Они прислали указивку: чтобы за неделю создать отделение партии «Инновационная Россия». А какая тут инновационная Россия, когда мы в «Единую» никого найти не могли? Им что, они хоть каждый день там партии могут штамповать. А нам где людей брать? Да еще таких, с инновациями? У них самих со Сколковом ничего не вышло и ни с чем не выйдет, инновация — она не лопух, сама не вырастет. Им мэр отписывает: так точно, все создано, функционирует. Всю жизнь так отписывал, ничего не было. А теперь взялись всерьез, «Единую» сливают, «Инновационную» надувают, и народ все должен быть идейно крепкий, морально чистый. И в июне бац, здравствуйте пожалуйста, они едут. К нам едет ревизор. Без предупреждения, без всего. Что мы им скажем? Простите, так вышло, «Инновационная Россия» в полном составе улетела в неизвестном направлении. Ведутся поисковые работы. Летчика в отпуск, самолет разобрали, и я так полагаю, что уже частично распродали. Они посмотрели, понюхали и пошли прочь. А что ты сделаешь? Захотели полететь — полетели. А у нас тут хоть двадцать самолетов в тайгу упадет — все засосет, как не было. И если б не ты с твоими сигналами, так бы и не вспомнил никто.</p><p class="p1">— Но я слышал сигналы, — повторил Савельев.</p><p class="p1">— Ну и слышал, ну и молчал бы, — без злобы сказал эмчеэсник, покончив наконец со сборами и усевшись за стол. Он по-бабьи пригорюнился, опершись подбородком на ладонь. — И ничего бы не было. А теперь мэр будет другой и все другое. Я-то устроюсь, не пропаду. А вот чего вы все теперь будете делать, я не знаю. Новая метла чисто пометет. Не дай бог мэра выбирать будут. Если назначат — считай, дешево отделались. А если выборы — тут может такое победить, что мало не покажется. Тебе тоже. Чистка будет — мама не горюй. Мне что, я инструктором пойду или в школу устроюсь, а через год все забудется. Но за этот год тут все головы полетят. Далеко они, конечно, не улетят, но скандал большой, сам видишь, до Москвы докатилось. Шутка ли — целой ячейки не было. Улетели, пропали, а тут нашлись, и все мертвые. Мертвые души, одиннадцать штук.</p><p class="p1">— Кто же подавал сигналы? — гнул свое Савельев.</p><p class="p1">— Чудак человек, — вздохнул эмчеэсник. — Кого колышут твои сигналы, когда тут целый мэр с полпинка вылетел? Ничего, они вам тут теперь пришлют. Продавай свою рацию, серьезно говорю. Или проверками замучают, или сразу в шпионы. Теперь без шуток.</p><p class="p1">— А Марина? — все еще не понимал Савельев. — Марина Лебедева? Ведь фотография…</p><p class="p1">— Фотография твоя — это верхняя половина Анджелины Джоли и нижняя половина Скарлетт Йоханссон, — признался эмчеэсник. — А хорошая получилась, да? Сам бы драл, но она, видишь, пропала. Улетела и не обещала вернуться. У нас таких делают за полчаса, а в черно-белом варианте вообще не разберешь. Не было сроду никакой Марины Лебедевой, хотя лично мне по-человечески глубоко жаль. Если б она такая была, мимо меня она бы точно не прошла, я бы для этого случая сам в ИРОСы записался. Но не судьба. Не родилась еще женщина из двух таких половин.</p><p class="p1">— Родилась, — сказал Савельев. — Я ее в тайге нашел.</p><p class="p1">— Ну поздравляю, — сказал эмчеэсник, — ты у нас вообще везучий. Надо было мне тогда тебя закатать за незаконные связи с заграницей, может, ты бы и в «Глобус» не пошел, и этот бы не приехал, и не было бы ничего. А так целого мэра сняли и город на всю страну обосрался. Но это ничего, что ни делается, все к лучшему. Иди давай отсюда, находитель.</p><p class="p1">Савельев вышел на звонкую, подмерзающую, пустую улицу — город словно стыдился себя, став всероссийским посмешищем, и старался сам себе не попадаться на глаза. Люди не выходили на улицу без крайней необходимости. Каждому страшно было подумать, что если копнуть — окажется, что и города никакого нет, а так, ошибка картографа, которую никогда не поздно исправить. Города нет, а рапортовали, что есть, и даже выходила газета. А на самом деле, может, одна тайга. Чтобы лишний раз не спрашивать себя об этом, жители все больше смотрели телевизор. По телевизору-то уж явно показывали то, чего нет, и вопросов не возникало.</p><p class="p1">Вернувшись из тайги, Савельев отвез Дашу Антипову в Булыгино, а потом в Балахово. Он представился ее бабушке, а потом матери. Бабушка так и знала, что Даша не пропадет, потому что у нее с детства были все навыки, необходимые для выживания в тайге, а мать вообще не очень о ней беспокоилась, поскольку пятнадцать лет жила отдельно и нарожала в новом браке еще троих, из которых один не разговаривал, но понимал все лучше остальных. Намерение Савельева жениться на Даше вызвало у бабушки подозрения, а у матери восторг. Они решили подать заявление ближе к Новому году, и Даша уже переехала к нему. Савельев смирился с тем, что она не Марина Лебедева, и даже начал, пожалуй, находить в этом преимущества.</p><p class="p1">Валя Песенко вернулся в родной университет и всерьез подумывает о том, чтобы по окончании его устроиться в школу в Перове-60, потому что другие школы ему после этого вряд ли понравятся. А может, он поедет консультантом в племя, потому что другие племена ему тоже вряд ли подойдут. Те две девушки, конечно, вряд ли его дождутся, а все-таки шанс есть. Впрочем, девушки-то найдутся, а вот такая школа и такое племя — вряд ли. Летом он собирается поехать в племя на практику, а осенью — в школу, на другую практику. Он уже списался с Семушкиным, тот вовсе не обиделся на их бегство, хотя несколько удивился. Он пишет, что им ничто не угрожало, но Валя Песенко теперь никому не верит до конца.</p><p class="p1">Окунев всей душой включился в создание партии «Настоящая Россия». Их уже собралось пятнадцать человек, и скоро можно будет регистрироваться. Ему ужасно надоело, что все местные совы оказываются не тем, чем кажутся. Ему хочется создать хоть одну партию, в которой все будет по-настоящему. Ему еще не пришло в голову, что в этой ненастоящести, в этом-то зазоре, может, все и спасение — иначе, будь все всерьез, тут давно никого не осталось бы в живых. Со временем он поймет и это — и сосредоточится, надо полагать, на благотворительности.</p><p class="p1">Тихонов восстановился в «Глобусе» и планирует серию очерков о йети, но главный редактор ему не верит. Впрочем, на популярности «Глобуса» это никак не скажется. Технолог Кузнецова вышла замуж за своего гида, и теперь Тихонову, вероятно, не обломится, но он не слишком о ней скучает — его теперь, может быть, вообще пригласят в Москву, потому что цикл очерков о йети перепечатает любая центральная газета. Жаль только, что тогда стемнело и Тихонов ничего не снял. Да ему и не хотелось почему-то. Он тогда не мог себе представить, что вернется в «Глобус», но раз такое дело и главный лично извинился — почему нет? Вадим смотрит на него благоговейно и, когда он работает, старается не отвлекать.</p><p class="p1">Дубняка больше никто не видел и вряд ли увидит, хотя не исключено, что лет через тридцать он выйдет к туристам, как Шухмин, и расскажет немало удивительного. Пока его именем назван клуб реконструкторов-перуновцев в Перове-60 — «Старый Перун. Воины Дубняка», а у Савельева в гараже висит его большая фотография с хмурым и деловитым, по обыкновению, лицом. Таким счастливым, как при встрече с йети, его в Перове никогда не видели, и потому на фотографиях он, как правило, печален, словно ждет несбыточного и понимает всю его несбыточность. Все мы так смотрим на мир, а напрасно. Надо помнить, где мы живем.</p><p class="p1">Если же вернуться к счастливому семьянину Савельеву, тут нас караулит некая неожиданность. Жена женой, но радиолюбительство так просто не бросают. Каждую ночь Савельев, исполнив супружеский долг, идет в свой гараж и продолжает ловить сигналы, которые, как ни странно, не прекращаются. Словно другая, невидимая Россия на разные голоса стонет, жалуется, умоляет спасти, радуется, поздравляет и надеется на скорую встречу. Этот хаос ликующих, жалобных и матерящихся голосов никуда не девается с загадочной частоты 145,17, которая раньше молчала, а теперь вот заговорила. Со временем Савельев научился различать эти голоса и даже прослеживать судьбы. Казачий атаман женился на маленькой лесной разбойнице. Обитатели колхоза имени какого-то октября уходят в лес все дальше, спасаясь от неведомой опасности, и с наступлением холодов им стало совсем плохо, но искать их, конечно, уже бесполезно. Кто-то так и не может установить контакт с кем-то неизвестным, но очень нужным. Какой-то Щенников сломал руку, Степанида родила, у командированного на завод Беляева истекли полномочия, и теперь он не получит своих бэшек. Козлик любит свою пушистую Радугу. Махотин убил медведя и теперь изнемогает от чувства вины. Марина Лебедева все еще ждет свою единственную любовь, Дронов требует, чтобы городские поисковики наконец зашевелились, а маленькая, чуть картавящая девочка постоянно напоминает, что куда-то идут три кота. Но куда они идут, Савельеву пока не нужно знать.</p></span></span>
