<span id="id20"><div class="title3">
<p class="p">Глава третья</p>
<p class="p">Ария ария</p>
</div><span id="id21"><div class="title4">
<p class="p">1</p>
</div><p class="p1">Много на свете зрелищ, внушающих человеку полную его неуместность, — скажем, ледяная ночная улица с ртутным светом фонарей; но на ночную улицу посмотришь из окна, да и юркнешь под одеяло. А уральская тайга осенью — такое место, из которого ни под какое одеяло не юркнуть: скоро начинает казаться, что она везде, не только до горизонта, а до всех горизонтов. И ведь не сказать, чтобы полная дичь, — тут и там следы человека, но следы эти всякий раз обрываются, словно шел-шел некто, да и пропал, взят живым на небо или навеки провалился в подпочвенный слой.</p><p class="p1">Растет тут много всего — осина, дуб, береза, есть и сосна, и пихта, и широкая разлапая мать сибирская ель; а ровного места почти нет — все холмы и овраги, и горные склоны, так что от ходьбы устаешь втрое быстрей, чем если бы топал по равнине. А главное, что тут растет, — чувство вины и обреченности: оно возрастает буквально с каждым шагом. И зачем ты сюда полез, и кто ты вообще такой? Тяжелеет рюкзак и, как носки водой, набухают чугунной усталостью ноги, так что ломит щиколотки. Пахнет гнилью, сыростью и подступающими холодами. Иной раз ощутишь под ногами прочную тропу — и тут же ей конец, и проваливаешься в глину; а то еще бывает такой феномен, как подземный пожар, — некоторые верят, что это тут упало НЛО и топливо его до сих пор горит, но на самом деле это газы выходят из земли, и глина тлеет месяцами. Хотя какие газы, откуда газы? Почему здесь выходит, а там не выходит? Часто видишь явный след автомобильных шин — вот он, двойной, ехал кто-то на вездеходе или внедорожнике; а вот и обрыв следа, широкая поляна с черным пятном посередине, остановились и засосало. Тресни, а останавливаться нельзя.</p><p class="p1">Вот они и шли с раннего утра, шли на северо-восток, к берегу Лосьвы, пока не увидели обычную, а все равно необъяснимую вещь: тропа обрывалась у большой поляны, устланной ржавыми листьями, словно упираясь в невидимую стену.</p><p class="p1">— Нельзя дальше, — уверенно сказал Дубняк.</p><p class="p1">— А куда тогда? — спросил вымотанный Савельев.</p><p class="p1">— В обход надо.</p><p class="p1">Они свернули, стали огибать поляну и почти сразу увидели знаки. Они были вырезаны на сосне — не слишком высоко, метрах в полутора от земли.</p><p class="p1">— Охотнички развлекались, — усмехнулся Дубняк.</p><p class="p1">— Навряд ли, — сказал Валя. — Это местные.</p><p class="p1">— Какие местные! — хохотнул Дубняк. — Вон айфон!</p><p class="p1">Валя вгляделся: и точно, между двумя столбцами черточек, рядом с чем-то четвероногим — не то собака, не то олень, — явственно виднелся айфон, изображенный хоть и схематически, но узнаваемо. Рисунок был свежий, максимум дня три назад.</p><p class="p1">— Это что же они хотели сказать? — спросил Валя, не ожидая ответа.</p><p class="p1">— Все такие бродяги хотят сказать: здесь были мы, — презрительно осудил неведомых путников Дубняк. — Или не уродуй дерево, или уж рисуй так, чтобы понятно было. Я знаки манси знаю, они так не режут. У них четко: сверху черточки — это сколько людей. Снизу — сколько собак. Тотем рода. И посередине — кого убили. По твоему рисунку выходит, что пятеро мужчин с тремя собаками убили айфон.</p><p class="p1">— А тотем?</p><p class="p1">— А тотема нет, я ж говорю — не манси…</p><p class="p1">На всякий случай Валя аккуратно зарисовал знак и почувствовал странное спокойствие: все-таки люди. Люди были кругом, их присутствие ощущалось, но они ничем себя не выдавали — видимо, наблюдали. Ужасно людное место эта уральская тайга, а начнешь тонуть в бочажине — и сразу нет никого, все так и попрятались. Или им интересно посмотреть, как тонет человек, или боятся, что их же и обвинят потом, возбудят уголовное дело, дадут пять лет строгого режима, а кандидат от «Единой России» так и останется ни при чем.</p><p class="p1">Дикий человек вышел из леса неожиданно, как и положено дикому человеку. Родная среда, умение гибко прятаться в тенях и листьях. На плечи его была наброшена рыжая кухлянка, а из-под кухлянки торчали обычные джинсы, как и положено современному манси. Были они заправлены в унты, какие продаются в любом аэропорту, как и положено восточней Екатеринбурга.</p><p class="p1">— Однако здравствуйте, — сказал он неуловимо знакомым голосом с интонациями пьяного, но совестливого телеведущего. — Один, два, пять, почему не шесть? Ждут шесть.</p><p class="p1">— Вы нас ждете? — удивился Савельев.</p><p class="p1">— Как не ждем, конечно ждем. А девушка где, должна девушка быть…</p><p class="p1">— Девушки никакой нет, — пояснил Дубняк. — Мы поисковая группа, ищем самолет. Видели вы самолет?</p><p class="p1">— Вон оно как, — без удивления сказал манси. — Ждем, ждем, духи сказали. Говорят духи, группа идет. Ну пойдемте, гости, кушать надо, отдых надо. Только все вместе не надо, цепочка надо делать. Опасно тут.</p><p class="p1">— Что опасно? — не понял Валя.</p><p class="p1">— Духи не любят, когда много вместе ходят. Тогда яма бывает, вылезать надо.</p><p class="p1">Вот оно что, понял Валя. Вот что случилось с группой Скороходова. Расспросим, подумал он, и в животе его сладко заныло от страха.</p></span></span>
