<span><span id="id22"><div class="title4">
<p class="p">2</p>
</div><p class="p1">Валя, к чьему зрению мы теперь прибегаем, изучал на филфаке фольклор, не совсем понимая, отчего его тянет к архаике. Иногда он думал, что архаика уже вернулась и ее надо знать, а иногда полагал, что она вообще честнее. В душе он всегда понимал, до чего она неискоренима, и догадывался, что если каждого тут поскрести — тут же провалишься во что-нибудь родоплеменное. Он был человек простой, но милый, как и его фамилия Песенко, которую всякий тут же норовил переделать в Песенку, и непонятно, что ему не нравилось — Песенка уж точно была лучше, чем ПесЕнко, с уничижительным собачьим корнем. Но всякий раз, как его норовили обозвать Песенкой, Валя огрызался. В остальном он был славным спутником, Шуриком от филологии, тоже сознававшим, что тайные силы — возможно, нематериальные, — постоянно за ними следят; но только ему, по особой мягкости характера, представлялось, что это силы добрые.</p><p class="p1">Через полчаса ходьбы по буеракам, когда Савельев уже решил, что всем точно каюк, а Дубняк отследил, что движутся они строго на север, — глазам их открылась большая поляна со здоровенным костром в центре и несколькими маленькими по краям. По поляне сновали люди, одетые так же, как их провожатый; семеро мужчин сидели у главного костра, что-то доедая. Провожатый вполне по-современному помахал им рукой и скрылся на другом краю поляны. От костра отошел приземистый безбородый мужик монголоидной внешности и поманил их к себе.</p><p class="p1">— Гости сели и ели с нами, — сказал он. Все с облегчением скинули рюкзаки и расселись вокруг костра на необычно толстых шкурах с жестким мехом. Росомаха, что ли? — подумал Валя. Он никогда не видел живую росомаху. Один из сидевших порылся в углях с краю кострища и вытащил несколько черных кусков чего-то несъедобного с виду.</p><p class="p1">— Вы манси? — спросил Валя, уже понимая, что никакие это не манси.</p><p class="p1">— Мы арии, — обыденно сказал мужик. — Я Николай Егорыч.</p><p class="p1">Следом по кругу представились остальные — имена у всех были вполне заурядные: Алексей, Кирилл, Степан, Петр Егорыч (брат Николая) и их отец, почему-то Тимофей Павлович.</p><p class="p1">— В каком смысле арии? — бестактно спросил Окунев.</p><p class="p1">— В прямом, — ответил Николай Егорыч. — Люди. Люди уходят туда, туда, туда, — он ткнул пальцем в разные стороны. — Мы остаемся.</p><p class="p1">— Но вы… Как бы это… Не похожи, — возразил Окунев.</p><p class="p1">— Не понимаю, — вмешался человек, назвавшийся Степаном. — Гости говорят, не похожи, но не видят, на что не похожи.</p><p class="p1">— Но есть же исследования, — сказал Валя. — Многие сходятся на том, что арии были похожи на европейцев.</p><p class="p1">— Ваши ученые не спрашивают. Мы не говорим. Гости ели мясо, потом говорили. — И он замолчал, сосредоточившись на еде.</p><p class="p1">Все с ума посходили. Город в двух шагах, люди живут, а тут арии. Гиперборея, блин. Тут Валя задумался. По одной из версий Гиперборея находилась где-то в этих краях, только севернее. Теоретически… Но места хоженые, не может целый народ, пусть и малочисленный, столько веков тайно существовать среди прочих. Тем более тайны никакой они не делают, нас пригласили к себе… Он, как сумел, соскреб с теплого куска мяса золу и осторожно надкусил. На удивление мясо оказалось сочным и мягким, вкус его был странным, не похожим ни на что, горьковатым — но горечь была приятная, оставлявшая на языке изумительное послевкусие. Валю охватило странное ощущение, которого он все не мог сформулировать — состояние, близкое к счастью, священный трепет, будто он не просто ел мясо, а прикасался к чему-то огромному, древнему и величественному, как сама планета. Но что это? Медвежатина? Валя когда-то ее пробовал, но вкуса не помнил.</p><p class="p1">— Это медведь? — спросил он, прожевав.</p><p class="p1">— Ты медведь, — почему-то развеселился Николай Егорыч. — Это мамонт! Вчера приходит мамонт, гостям удача, свежее мясо! Потом засолили, завялили, завтра жесткое стало.</p><p class="p1">— Нет, правда. Что это? — поддержал Тихонов.</p><p class="p1">— Хобот, — сказал арий.</p><p class="p1">Все почтительно помолчали. Наконец Савельев спросил:</p><p class="p1">— Вы не знаете ничего об упавшем самолете? Два месяца назад где-то здесь упал, там остались выжившие, мы их ищем. Я сигналы получил.</p><p class="p1">— Самолет не знаем, — сказал Степан и медленно покачал головой, словно катая в ней эту мысль: самолет? — нет, самолет не знаем.</p><p class="p1">— Нет, не знаем, — подтвердил Кирилл.</p><p class="p1">— Два месяца долго, — вступил Николай Егорыч. — В лесу никто не выжил, когда не знал, куда ходить. Хохо приходит.</p><p class="p1">Речь у ариев была странная — Валя никак не мог понять, что в ней происходит с грамматическим временем. Похоже, будущего для них вовсе не существовало, а повелительное наклонение всегда выражалось прошедшим — как в грубой, армейской или бандитской русской форме: «Живо встал! Пошел сделал!». Категория давнопрошедшего выражалась с помощью «однако»: однако не видели. Однако не ходили.</p><p class="p1">К костру подошли женщины — две молоденькие, лет по семнадцати, были очень даже ничего, и Валя им улыбнулся. Они демонстративно отвернулись, но искоса поглядывали и тоже улыбались. Николай Егорыч встал.</p><p class="p1">— Гости пошли к шаману, — с этими словами он зашагал прочь от костра.</p><p class="p1">Валя первым вскочил и пошел за ним, следом поспешили и остальные. Николай Егорыч подвел их к дальнему небольшому костру, метрах в десяти от него развернулся и ушел.</p><p class="p1">Шаман выглядел как шаман. Он возвышался над ними, сидя на огромном сооружении странной формы, покрытом шкурами. Весь он был в мехах, перьях и ожерельях из когтей, но оказался неожиданно молод — явно моложе Николая Егорыча, чуть старше их лесного провожатого. Впрочем, кто их разберет, монголоидов. Он кивком пригласил их сесть — по-простому, на землю, на такие же шкуры, как у большого костра.</p><p class="p1">— Гости сыты, и можно говорить, — сказал шаман.</p><p class="p1">Гости робко поздоровались.</p><p class="p1">— Мы искали упавший самолет, — сказал Тихонов. — И встретили в лесу одного из ваших. Он нас и привел.</p><p class="p1">Шаман кивнул.</p><p class="p1">— Нам сказали, что про самолет ничего не знают, — продолжал Тихонов, оглянувшись на остальных.</p><p class="p1">— Но мы слышали их, они вышли на связь по радио, — добавил дядя Игорь. — Координаты вроде ваши.</p><p class="p1">Шаман кивнул снова и вытащил откуда-то из складок своих мехов небольшой, но явно человеческий череп. Он погладил его, не то одобряя, не то надеясь с его помощью узнать что-нибудь о самолете. Череп не реагировал. Савельев всмотрелся пристальней: несмотря на полумрак, он со своим ортопедическим опытом мог разглядеть, что артефакт вполне подлинный либо очень тщательно изготовленный из тонкой пластмассы… да нет, какое там, кость есть кость. «Интересно, угроза это или предупреждение? Мы вроде ничего пока не сделали…»</p><p class="p1">— Простите, — сказал Валя. — Мы подумали, что вы могли что-то знать.</p><p class="p1">— Я их по радио не слышу, — сказал шаман. — Многих слышу, самолет не слышу.</p><p class="p1">— У вас что, радио есть?! — изумился дядя.</p><p class="p1">Шаман кивнул.</p><p class="p1">— А вы, простите, сами собрали или купили?</p><p class="p1">— Нахожу, — сказал шаман. — Сколько есть в самолете людей?</p><p class="p1">— Одиннадцать, одна женщина. Как вы думаете, могли они выжить?</p><p class="p1">— Я спросил у духов ночью, когда гости спали.</p><p class="p1">— И чего они сказали? — спросил Окунев. Он еще не разобрался, что шаман в такой форме дает поручение самому себе.</p><p class="p1">— Никто не знает, что сказали духи, пока не спросил, — ответил шаман, глядя на Окунева, как на дурачка. — Но это я спросил потом. А сейчас гости спросили, что хотели знать.</p><p class="p1">И Валя решился.</p><p class="p1">— Николай Егорыч сказал… Он говорит, вы арии… Я не очень понимаю.</p><p class="p1">Шаман опять кивнул и начал рассказывать. Иногда он принимался рычать, иногда петь, пару раз даже катался по земле, потом начинал колотить в бубен и так же резко обрывал стук. Страннее всего было то, что после экстатического камлания он мгновенно приходил в себя и снова продолжал, будто и не отвлекался. Короче, история их народа, смешанная с мифами, сохранилась только в устных источниках. Они действительно называли себя ариями. Расположенный на Южном Урале Аркаим был их первым университетом. Когда-то их многочисленный народ господствовал на всей северной части материка, занимался земледелием, разводил скот. Потом пришли черные люди, и арии раскололись — часть ушла, как понял Валя, в Индию, часть рассеялась по Европе. Оставшиеся с тех пор кочевали по северу, останавливаясь то здесь то там. На каждом месте жили подолгу, десятилетиями — как понял Валя, пока не сменялся шаман. Новый шаман первым делом отыскивал неподалеку новое место, и племя переходило туда. Черных людей вскоре вытеснили красные люди, потом белые, в своих разборках про ариев забыли, и они существовали спокойно, ни с кем не общаясь и никого не боясь, кроме Хохо. Со временем из десятка кочующих общин осталась одна, численность падала, но говорил об этом шаман без грусти, даже, как Вале показалось, с потаенной радостью человека, приближающегося к цели. Валя пытался сопоставить эти сведения с писаной историей Урала, но безуспешно. В самом деле, думал он, что там мы знаем? По черепкам да сомнительным летописям… Может быть, история действительно выглядела совсем иначе. Вот тебе и открытие. Но что же их раньше не открыли?</p><p class="p1">— Ваши ученые приходят когда-то давно. Пишут. Все теряется. Теперь не приходят. Кто приходит, те не спрашивают. Кто спрашивает, не верят. Вот ты веришь, что мамонта ешь?</p><p class="p1">— Нет, — озадаченно сказал Валя.</p><p class="p1">Шаман кивнул.</p><p class="p1">— Арии не обманывают. Но в правду никто не верит. Смеются, говорят, люди шутят. Смотри! — он встал и откинул шкуры со своего трона. Валя услышал, как рядом присвистнул Тихонов. Трон был сооружен из здоровенных закрученных бивней, выглядевших совсем свежими — во всяком случае, непохоже было, чтобы они тысячелетиями пролежали в земле.</p><p class="p1">— Вчера мамонт приходит. Один год — один мамонт.</p><p class="p1">— На раскопках сперли, — неуверенно прошептал Окунев, наклонясь к Вале.</p><p class="p1">Шаман внимательно посмотрел на Окунева и накинул шкуры обратно.</p><p class="p1">— Кому тут копать, — спросил он страшным шепотом. — Ты как друг Хохо. Ищешь зло. Что, если однажды ты его нашел?</p><p class="p1">Это очень точно, подумал Валя. Окунев ему скорее нравился, но и он заметил, что новый знакомый будто слепнет, когда рядом появляется что-то хорошее, что он везде ищет несправедливость, обман, несчастье, и торжествует, когда находит: ага, а вы мне не верили, но вот вам жизнь как она есть и что вы на это скажете?</p><p class="p1">— Ты пришел в город, — продолжал шаман, — сказал, что ешь мамонта у ариев. Кто тебе поверил? Подумали, тебя Хохо находит.</p><p class="p1">Это была правда, Валя даже и представить не мог, как он будет рассказывать об этом друзьям или, того непредставимей, матери. Эх, какой материал пропадет! Пропал, мысленно поправил себя он, переводя на странное арийское наречие. О том же самом, он был уверен, подумал и Тихонов.</p><p class="p1">— Хохо — кто это? — спросил он шамана.</p><p class="p1">— Хохо — дух. Кого Хохо находит, у того становится дыра в душе. Один есть в нашем роду — плохо прячется от Хохо, выдает себя, Хохо его находит. Он тогда делается с дырой в душе, ходит, ходит среди людей, говорит не дело, пугает женщин, не трогает воду. Потом уходит в лес. Давно уходит. Никто его больше не видит.</p><p class="p1">Шаман снова взгромоздился на трон и продолжил:</p><p class="p1">— Духов много, но все боятся Хохо. Но он нас бережет, мы скоро одни остались.</p><p class="p1">Этого Валя уже совсем не понял.</p><p class="p1">— Знаешь речку в трубе? — заговорил шаман вовсе уж путано.</p><p class="p1">— Канализация? — робко спросил Валя.</p><p class="p1">— Ты канализация, — беззлобно осадил его шаман. — В Москве дома строили, речку в трубу забрали. Дома все рухнули, речка осталась. Так и мы остались. Предсказание есть. Зачем нам сейчас выходить, когда вы еще есть? Мы вышли, когда вы ушли. Тогда все наше.</p><p class="p1">— А что, — почти шепотом спросил Валя, — это близко?</p><p class="p1">— А то сам не видел, — ласково сказал шаман.</p></span><span id="id23"><div class="title4">
<p class="p">3</p>
</div><p class="p1">Говорил он еще долго, все уже клевали носом, дядя Игорь давно ушел к своему приемнику — ловить новые сообщения. Шаман, казалось, ничуть не уставал и мог бы камлать еще долго.</p><p class="p1">— Я еще хотел спросить, — Валя вытащил из кармана блокнот. — Мы там знаки видели…</p><p class="p1">Шаман заглянул в блокнот и неожиданно захохотал.</p><p class="p1">— Ты рисуешь, как Данила охотится, — воскликнул он, глядя на изображение первого знака. — У тебя получается знак, что на этом месте охотника, стоящего вниз головой, кроют два лося, а другие охотники поют им ночную песню.</p><p class="p1">Валя почувствовал, что краснеет.</p><p class="p1">— Я показал Марье, мы так попробовали. Как два лося. Только нам не хватает второго лося. Ты был им? Месье знает толк в извращениях, — неожиданно процитировал шаман, чем поверг Валю в окончательное смущение.</p><p class="p1">— Я еще сфотографировал, — оправдывался он.</p><p class="p1">Шаман утер слезы, отцепил от блокнота ручку и быстро перерисовал знаки.</p><p class="p1">— Вот как. Это растущий месяц. Это люди. Это защита от Хохо. Вот это — глаза охотника, который убивает зверя. Это время. Здесь — песня. А это, — он указал на полосатый овал на ножках, — это тебе знать не надо. — И он строго посмотрел на Валю.</p><p class="p1">Значит, все-таки есть и у них тайны, в которые не посвящают пришлых.</p><p class="p1">— Теперь гости пошли спать. Их проводили в дома. — Речь шамана стала замедленной, взгляд рассеянным. Видимо, готовится к общению с духами. Ах, как Валя мечтал посмотреть на ритуал! Но это было нельзя, видимо, этого тоже пришлым знать не надо. Валя знал о шаманизме достаточно, но то был другой, изученный шаманизм известных народов, которые из своих традиций никакой тайны не делали. По рассказам шамана Валя понял, что арии исповедуют привычный культ духов, при этом духи никак не были связаны с силами природы — к природе арии вообще относились практично: дождь и ветер были не более чем природными явлениями, животные не обожествлялись, в общем, их знания об окружающем мире соответствовали среднестатистическим современным. Духи же существовали сами по себе и отвечали только за людей, за их поведение и мысли. Самый страшный и сильный был Хохо — что-то, как Валя решил, вроде духа безумия. Именно безумия боялись арии больше всего на свете, и это тоже Вале очень понравилось. Трудно сказать, что ему здесь не нравилось — вкусное мясо, красивые девушки, умные традиции… Интересно, какие у них дома? И где они?</p><p class="p1">Шаман кивнул им напоследок и отвернулся. Николай Егорыч уже стоял неподалеку, выжидая. Они пошли следом за ним куда-то к окружавшим поляну кустам — только сейчас Валя заметил, как ровно они высажены. Специально? Возможно, чем Хохо не шутит…</p><p class="p1">— А наши вещи? — вспомнил Тихонов.</p><p class="p1">— Вещи гостей теперь в домах.</p><p class="p1">В кустарнике открылась брешь, в которую они и прошли друг за другом. В лесу было уже совсем темно, приходилось держаться друг за друга, а их провожатый начал бубнить под нос заунывный мотив без слов — так и шли на голос, шли, по счастью, недолго. Через пару минут Николай остановился, Валя различил впереди темный силуэт домика. Скрипнула дверь, мелькнул огонек — свеча, лучина? — высветивший немолодое женское лицо.</p><p class="p1">— Ты, ты, ты, ты — спали здесь, — сказал Николай, затем взял Валю за руку и повел дальше в темноту. Это Вале уже не очень понравилось. С другой стороны, он понимал, что дома у ариев не такие, чтобы пятеро взрослых мужиков (звучало приятно, что уж) свободно там разместились. Тем временем они, кажется, пришли — глаза, привыкшие к темноте, разглядели еще одну избушку. Ничего, утром можно будет все рассмотреть подробно. Здесь им навстречу никто не вышел, Николай подтолкнул Валю к двери и растворился во мраке: Валя наконец понял, как это бывает — растворяться во мраке. Ощупью он отыскал ручку на двери и вошел. Споткнулся обо что-то, тут же натолкнулся на вторую дверь. За нею уже было светло — горела, чадя и воняя салом, свеча, топилась печь. Это была обычная деревенская изба, добротная, крепкая — неужели они на каждом новом месте такие строили? Нет, вряд ли, скорее заняли пустующее поселение. Странно, конечно, что дома стояли прямо посреди леса, на деревню не похоже. Сколько там лет этому шаману — сорок? И когда он стал шаманом? Валя продолжал осматриваться. Интерьер был спартанский — дощатый стол с двумя скамьями, в углу потемневший от времени сундук. Валя попытался было открыть, но безуспешно, замка он не нашел и усердствовать не стал — не дома, чай, по сундукам-то шарить. Он взял со стола свечу (она была в самом деле не восковая, а из чьего-то жира) и прошел в другую комнату. Ага, вот и спальня: кровать железная, сверху набросаны шкуры. От печи шло тепло, и он с облегчением скинул куртку и свитер. Посмотрел на часы — всего десять, рано же здесь темнеет, они только с шаманом часа три просидели… Голова кругом шла от усталости, и Валя, кое-как разувшись, рухнул на шкуры. Он успел в падении последним выдохом задуть свечу. Кровать под ним поплыла и закачалась, и он упал в полусон, пропитанный странным местным запахом: древним, лесным, дымным.</p><p class="p1">Проснулся он от невыносимой жажды — и тут же понял, что в комнате он не один. Здесь обострялось шестое чувство — настолько, что становилось ясным: есть еще и седьмое, и еще несколько зачаточных. Отходя от сна, в котором его настигал Хохо с лицом дяди Игоря, он вдруг почувствовал у губ что-то влажное, мягкая рука откинула ему голову, и в рот полилась вода. Напившись и проморгавшись, он всмотрелся в темную фигуру… нет, две фигуры. Фигуры зашуршали, задвигались, и Валя наконец узнал их — это были две девушки, которым он улыбался у большого костра.</p><p class="p1">— Здравствуйте, — хотел было сказать он, но горло онемело, и он издал только неразборчивый хрип.</p><p class="p1">Девушки захихикали. Потом к его губам прижались прохладные пальцы. Ладно, помолчим, подумал Валя и почувствовал, что вспотел. Девушки раздевались. Надето на них было много всего, как на капусте, на двух капустах. Неэротичное это сравнение отрезвило Валю, но ненадолго. Честно говоря, он был близок к тому, чтобы вскочить и убежать. Не то чтобы ему не нравились девушки — они ему очень нравились. И насчет гигиены он не беспокоился. Просто их было две и они были почти… нет, уже совсем голые. «Месье знает толк в извращениях», — некстати вспомнилось ему.</p><p class="p1">Увы, месье не знал толка. Стыдно сказать, но к своим двадцати Валя имел настолько скудный сексуальный опыт, что думал о самом блаженном из человеческих занятий со страхом и почти с отвращением. Первый раз случился у него год назад, с такой же неопытной девочкой, они долго возились под одеялом в полной темноте, бесконечно боясь и притом стараясь сделать друг другу больно — не говоря уж об удовольствии. Подробности стерлись из его памяти на следующий же день, с девочкой этой они потом сходили несколько раз в кафе, и с каждым разом тем для разговора становилось все меньше, в результате все мирно сошло на нет. Вторая попытка была недавно, на пьянке у однокурсника — друзья затолкали его в комнату вместе с третьей красавицей курса, и она была очень даже не прочь, фактически даже более не прочь, чем он сам, — но когда уже оставались считаные миллиметры, вдруг разрыдалась и сказала, что всем вам от меня только одно нужно: а к этому моменту Валя действительно ни о чем другом думать не мог и надеялся, что все-таки… Но она обозвала его таким же, как все, а она-то думала! И убежала в слезах. Валя вышел из комнаты, внимания на него никто не обращал — вечеринка уже достигла определенного градуса накала. Минут через десять он увидел, что третья красавица тащит в ту самую комнату рыжего пятикурсника, вскоре из-за двери донеслись недвусмысленные звуки — видимо, рыжий оказался не таким, как все, и ему было нужно что-то другое. Потом был еще третий эпизод, но об этом вам уж точно знать не надо.</p><p class="p1">О том, что в глухой тайге ночью к нему придут с очевидными намерениями сразу две, он не то что мечтать не мог, ему бы и в голову не пришло такое. Но они были здесь, уже сидели рядом с ним на кровати, шаря руками, где не надо. Наверное, подумал Валя, это местный обычай. Такое встречается у разных… о-о-о… у разных народов. Когда приходит гость… а-а-ах! — ему предлагают… да! ему предлагают… о, о! Ему… что там ему? Кому — ему? О-о-охххх… и к тому же нужна свежая кровь, чтобы… нет, нет, не убирай… чтобы… как два лося… чтобы племя не… не так сильно… чтобы новое племя сильно обновило кровь… а вот здесь сильнее… и если гости… у-у-у-ух… чтобы… в общем, отказаться было бы невежливо — такая была его последняя связная мысль, да отказываться, собственно, было бы поздно. Кожа девушек пахла хвоей, а волосы — кислым молоком, хотя Валя уже не помнил, что такое молоко и хвоя, что означают все эти слова — кожа, волосы, все эти скучные анатомические подробности были так ненужны и неуместны, и вообще слова были неуместны, потому что правильных слов не существовало. И был еще главный запах, заслонивший все прочие и вообще всё прочее, в нем-то Валя и утонул с несказанным облегчением. Если бы он мог еще внятно мыслить, он бы подивился тому, как все оказалось легко и просто, и нестрашно, и приятно, как будто он всю жизнь этим занимался. Но внятно мыслить, как мы уже говорили, он не мог, поэтому на время мы покинем его — все равно его глазами мы пока ничего важного для повествования не увидим — и перенесемся в избу, где разместилась остальная четверка.</p></span></span>
