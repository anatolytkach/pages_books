<span><span id="id24"><div class="title4">
<p class="p">4</p>
</div><p class="p1">Хозяйкой избы была пожилая арийка по имени Катерина Дмитриевна, и под этой крышей никаких эротических приключений не предполагалось. Гостям отвели две комнаты, в каждой стояло всего по одной кровати, зато огромные. Решили, что Дубняк возляжет с Окуневым, а Савельев, смирившись, согласился разделить ложе с Тихоновым. Савельев позавидовал племяннику, которому, судя по всему, досталась отдельная постель (ах, знал бы он), но делать было нечего, спасибо и на том. Он достал спальник и бросил его на кровать — все же хоть какая-то изоляция. Пока что они все сидели в комнате Дубняка и Окунева при свете сальной свечи и вяло обсуждали прошедший день, ни на сантиметр не приблизивший их к цели. Савельев никаких новых сигналов сегодня не поймал, и теперь надо было решать, куда идти дальше.</p><p class="p1">— Лажа какая-то, — сказал Тихонов. — Никакие они не арии. И мамонт не настоящий.</p><p class="p1">— Слушайте, а помните, сумасшедший в колхозе тоже говорил про мамонта? — вспомнил Тихонов.</p><p class="p1">— Так он псих на всю голову, блин! Он тебе еще не то увидит, он тебе динозавра увидит, — встрял Дубняк. — Вот кого Хохо нашел.</p><p class="p1">— Но совпадение странное, согласись.</p><p class="p1">— Какая разница, — устало ответил Савельев, глядя в сторону. — Они самолета не видели.</p><p class="p1">— Нет, погоди. — Тихонов встал. — Псих видел самолет. Псих видел мамонта. Мамонт был — допустим, что был. Значит, был и самолет, там где псих сказал. Тропа есть. Знаки на деревьях есть. Значит, псих был тут.</p><p class="p1">— Вам, газетчикам, лишь бы сенсацию. Мамонты… Мамонты вымерли. Ты представляешь, сколько тут этих сосен со знаками? Все это бредовая затея была с самого начала.</p><p class="p1">— Э, ты это брось, — насторожился Тихонов. — У нас все равно других зацепок нет пока.</p><p class="p1">— Но если псих был здесь и видел самолет, почему его эти не видели? — задумчиво произнес Окунев.</p><p class="p1">Тихонов помолчал.</p><p class="p1">— Кто их знает, что они видели. Люди видят то, на что смотрят. Мог ли самолет входить в круг их интересов? Ну подумаешь, железная птица. Охотиться на нее нельзя, стоит ли зацикливаться?</p><p class="p1">— Прямо, железная птица. Они же не отсталые. Шаман вообще сказал, у него радиоприемник есть.</p><p class="p1">— Да нет у него ничего, — рассердился Савельев. — Сам подумай, откуда? И это же регистрироваться надо — что, так вот он пришел в своих перьях, я арийский шаман, хочу быть радиолюбителем?</p><p class="p1">— Не надо регистрироваться, — возразил Окунев. — Это вам не двадцать лет назад. Сейчас никому нет дела, и слава богу. Сейчас даже без паспорта можно жить, и никто тебя никогда не достанет — нет твоих данных, и все, для государства ты не существуешь! Может, у него и есть приемник. А если у него есть приемник, он может что-то услышать.</p><p class="p1">Савельев не хотел спорить. Все не ладилось, все шло не так. Оказалось, что в этой глуши полно людей, и все они на всю голову двинутые, нет среди них только тех, кого они ищут. Может, сигналы вообще были не от них? Что, если все они были от разных людей, от таких, как ратмановские крепостные, как этот шаман… Много ли еще здесь таких мест, где живут люди, никем не замечаемые и никем не разыскиваемые, связанные друг с другом только эфиром? Выходит, все погибли? Он отбросил эту мысль. Сигналы были, и надо искать. Что, если именно в этот момент они выходят на связь? Достать приемник, поймать… Нет, рано. Надо ночи дождаться. Пусть эти все спят, а он попробует. Будильник поставить…</p><p class="p1">Но будильник ему не понадобился, он проснулся сам, как Штирлиц, за десять минут до сигнала, осторожно перелез через храпящего Тихонова — вот кто должен бы спать, как Штирлиц, фамилия обязывает — и вышел в горницу. Времени был час ночи. Он подготовил аппаратуру и стал слушать ночной эфир, хрипящий и стрекочущий, потрескивающий и покряхтывающий, свистящий и шипящий, потусторонний. Слушая его здесь, в этом странном доме, в странном месте, среди странных людей, окруженный необитаемой на первый взгляд, но хранящей свою тайную жизнь тайгой, с шаманами и мамонтами, духами и крепостными, с этими невозможными смещениями пространства и времени, Савельев очень хорошо понимал тех, кто соблазнился феноменом электронного голоса, кто часами просиживал в эфире, выслушивая голоса с того света или из параллельного мира — и действительно слышал их. А из этого ли мира были те голоса, которые он сам лично слышал, которые и привели его сюда? Савельев этого уже не знал. Как же так, спросите вы, такой разумный человек, пусть романтик, немного фрик, но все же врач, образованный малый, и вдруг готов поверить в такую антинаучную чушь? Готов, еще как готов, ведь на дворе ночь, а ночью человек дезориентирован, деморализован, критический разум его засыпает, и остается голая душа, открытая любому безумству и любому безумию. Вот и страшные истории рассказываются на ночь — не потому что в темноте страшнее, а потому что в темноте во все легче верится. В черную простыню. В мамонта. В голоса мертвых. В любовь и смерть, в конце концов. Поэтому не будем судить Савельева строго, сами не застрахованы. Тем более что как раз в этот момент из приемника донесся наконец голос:</p><p class="p1">— Сообщаю: третья партия уйдет в понедельник! Эл-52, Бэ-17, Е-11, Эн-Эр-24, все отгружаем. Но по-прежнему нет кашек, если кашек не будет, все остановится, эски не подходят. — Голос замолк, и какое-то время ничего внятного не было слышно, затем снова послышалось: — Сколько можно людям голову морочить? Все, конец.</p><p class="p1">Так, подумал Савельев. Старые знакомые со своими кашками. Вернее, без кашек. Он уже понимал, что это не те, с самолета. Он вдруг разозлился: срут в эфире всякие, а ты сиди, разбирай. И всю жизнь так — столько лишних людей, на них отвлекаешься, время тратишь, чтобы их как-то раздвинуть и найти среди них нужных — а что толку? Если бы в мире существовали только нужные ему люди, вот это было бы правильно. Правда, хорошо бы, чтобы этим людям тоже был нужен только он, иначе так по цепочке и выйдут те же самые семь миллиардов. Савельев задумался: ну понятно, Марина. Ну, сестра с сыном. Он бы оставил еще Тихонова, пожалуй, в благодарность за поддержку, да и вообще Тихонов был не вредный. Коллег не надо… Нет, надо, врачи нужны разные. Электрики, производители всякие, фермеры, чтобы обслуживать всю толпу… Опять толпа получается. Хорошо, пусть бы они все были, но отдельно. Почему человек не может существовать в собственной изолированной ячейке, окруженный только своими — Савельеву, например, нескольких человек хватило бы, — никак не контактируя с другими такими ячейками? Так, иногда настраиваясь на них в эфире, когда надо. Но тут он остановил себя: почему не может? Так живет Ратманов со своими кредитниками, так живут эти арии со своим шаманом. Есть же и единичные отшельники — семьями, группами уходят от цивилизации и живут сами по себе, налаживают быт, рожают и растят детей, и таких все больше. Вот так, сначала людей тянуло в кучу, в города, эта их тяга запустила процесс, и теперь мир уже сам стремится загнать всех в человейник, но чем больше он стремится, тем больше людей стало вдруг отрываться от него, выбиваться из колеи… И мир не больно-то препятствует, подумал он. Все идет к разделению человечества на две расы — одну огромную, глобальную, без внутренних границ и другую, малочисленную и разобщенную, но не низшую, а наоборот, расу отдельных людей. По крайней мере, Россия к этому идет: оставляя за бортом большие города и государственное управление, сворачивает с исторического тракта на малоприметные тропки, сходит на промежуточной станции, пока весь состав тяжело громыхает к мифическому пункту Б… Савельев так погрузился в свою наивную философию, что подскочил от неожиданности, когда частота ожила:</p><p class="p1">— Этап третий, день восьмой. Контакта нет. Считаем, что контакт невозможен. Продолжаем движение. Как меня слышно? А, какая к херам разница, как меня слышно…</p><p class="p1">— Э! — заорал Савельев (и напрасно, потому что там его не слышали). — Слышно хорошо! — Тут он вспомнил, что в доме полно спящих людей, и с перепугу приглушил звук, но опоздал: в хозяйкиной комнате послышались медленные шаги, дверь открылась, Катерина Дмитриевна, тяжело переступая, подошла к столу и уселась, без любопытства глядя на технику.</p><p class="p1">— Простите, — сказал Савельев. — Я разбудил вас. Я просто хотел послушать, не будет ли сигналов от людей с упавшего самолета. Мы ищем упавший самолет, нам сказали, что где-то здесь видели, но ваши сказали, что не видели.</p><p class="p1">— Я вижу самолет. Тогда стоит лето. Люди уходят под землю, все уходят, я остаюсь. И вижу самолет.</p><p class="p1">— Где?! Вы видели, как он упал?</p><p class="p1">— Вижу, вижу. Нехорошее место, где упал. Там железная дорога кончается, все кончается.</p><p class="p1">— А где эта железная дорога?</p><p class="p1">— Там, — она махнула рукой. — Большой самолет. Как круг. Потом дым идет.</p><p class="p1">«Зашибись, — подумал Савельев. — Еще одна ненормальная. Или нет?»</p><p class="p1">— Что значит — как круг?</p><p class="p1">Старуха недоверчиво посмотрела на него, затем сложила пальцы, изображая что-то круглое.</p><p class="p1">— Вот так. Круг. Знаешь круг?</p><p class="p1">Савельев знал круг, но не знал круглых самолетов, исключая, впрочем, НЛО, которых не бывает.</p><p class="p1">— А дальше что?</p><p class="p1">— Я иду туда. Вижу не людей. Они большие, как Хохо. Они говорят со мной, что арии спаслись и стали царствовать в мире, когда небо стало красное. Я потом смотрю и жду. Розовое небо есть. Красного пока нет, но оно скоро было.</p><p class="p1">Савельев ничего не понял, кроме того, что старуха явно сумасшедшая. Кто бы мог подумать, что и среди дикарей есть контактеры? С другой стороны, странно как раз другое — что контактеры есть не только среди дикарей. Тем временем старуха порылась за пазухой и вытащила предмет, висящий на кожаном шнурке — что-то вроде детали нездешнего механизма — размером с пачку сигарет, из темного металла, весь округлый и перекрученный, с несколькими отверстиями. Два из них были с резьбой, остальные гладкие.</p><p class="p1">— Вот они мне дают. — Катерина Дмитриевна с гордостью протянула ему деталь. Савельев протянул было руку, но она вдруг нахмурилась и спрятала свою драгоценность в складки одежды. — Я говорю шаману, он не верит.</p><p class="p1">— Шаман умный, — злорадно сказал Савельев.</p><p class="p1">— Иногда человек умный, а верит в глупое, — неожиданно здраво возразила хозяйка. — Прежний шаман не слушает голоса в ящике. Прежний шаман умеет говорить с духами без ящика. Ящик слушает тот, кто не умеет. Как ты. Ты совсем не умеешь слушать, у тебя большой ящик. У шамана маленький.</p><p class="p1">Значит, все-таки не врал шаман насчет радио? Это уже интереснее, надо бы с ним пообщаться, решил Савельев. Интересно, что у него за аппаратура? У старухи, понятно, не спросишь, да она уже и поднималась из-за стола.</p><p class="p1">— Гость спал хорошо, — сказала на прощание хозяйка, но спать Савельев и не думал. Он включил звук — теперь уже совсем тихо, но голосов не было. А если бы Савельев включил звук чуть раньше, он услышал бы тихий, то ли детский, то ли женский голос:</p><p class="p1">— Больно, больно, больно, больно, больно, больно…</p><p class="p1">Но Савельев его прослушал, и слава богу. Вместо этого он услышал медленный, почему-то знакомый голос, говорящий по-английски, с жутким произношением:</p><p class="p1">— I prepare myself for the rite. I take on special clothes. My father take on this clothes. Father of my father take on this clothes…</p><p class="p1">— Grandfather, — вступил вдруг кто-то другой, незнакомый и почти без акцента.</p><p class="p1">— Grandfather of my father take on this clothes too.</p><p class="p1">— Стоп. Вы что, все одновременно ее надеваете? — спросил второй голос.</p><p class="p1">— Я надеваю. До меня мой отец надевает. До него — его отец.</p><p class="p1">— Тогда нужно говорить в прошедшем времени! В прошедшем! Паст симпл.</p><p class="p1">— Не нужно в прошедшем, — упрямо сказал первый голос.</p><p class="p1">Савельев вскочил из-за стола и выбежал из избы.</p></span><span id="id25"><div class="title4">
<p class="p">5</p>
</div><p class="p1">В небе висела толстая рыжая луна, в ее слабом свете Савельев кое-как различил тропинку и побежал к поляне. Сейчас здесь горел только один дальний костер. Савельев остановился в нескольких шагах от него.</p><p class="p1">— Все, конец связи, — сказал шаман в айфон. — Saw you later.</p><p class="p1">«Так не бывает, чтобы все разом сошли с ума», — подумал Савельев. Ни один школьник не поверил бы, что в эфир можно выходить с мобильника. Но сам-то он был уже не школьник и имел право поверить во что угодно.</p><p class="p1">— Вы что, английский учите? — спросил он шамана, подходя ближе.</p><p class="p1">— Иногда духи говорят на разных языках. Хочу понимать. — Шаман кивнул Савельеву на шкуры, тот послушно сел. — Я спрашиваю духов про ваш самолет. Они не знают.</p><p class="p1">— Послушайте… Та женщина, у который мы живем, Катерина Дмитриевна, она сказала, что видела самолет. То есть что видит. Правда, она сказала, что он круглый и что там люди, которые с ней говорили. Она его видит, когда люди уходят под землю. Как вы думаете, может, она правда видела… видит?</p><p class="p1">Шаман вздохнул и поворошил костер палкой.</p><p class="p1">— Тот человек, которого находит Хохо, — это ее сын. Катерина Дмитриевна теперь тоже как будто немного… Как будто Хохо идет за ней по следам.</p><p class="p1">Что ж, Савельев примерно этого и ожидал. Сумасшедший Панург, сумасшедшая старуха — вот и все свидетели падения «Ан-2». Может, всей их группе тоже следует сойти с ума, тогда они его мигом найдут? И рецепт есть — наделать дыр в лесу и дождаться, пока их найдет Хохо… Савельев чувствовал уже, что долго ждать не придется. Но тут шаман продолжил:</p><p class="p1">— Я знаю, что она видит. Они здесь редко летают. Иногда падают.</p><p class="p1">— Кто летает? — спросил Савельев, ощущая затылком зловонное дыхание Хохо.</p><p class="p1">— Круглые самолеты. Я знаю, когда она видит. Когда люди ушли под землю добывать рыму.</p><p class="p1">Савельев даже не стал спрашивать, что за рыма.</p><p class="p1">— Тогда Катерина Дмитриевна остается одна. Тогда и видит.</p><p class="p1">— И что это за круглые самолеты? Инопланетяне, что ли?</p><p class="p1">— Инопланетян нет. Это завод. Там делают.</p><p class="p1">— Господи, какой еще завод? — воскликнул Савельев. Ни о каком заводе здесь он никогда не слышал.</p><p class="p1">— Там завод, — шаман указал себе за спину. — Делают разное. Дурные вещи. И круглые самолеты тоже.</p><p class="p1">Савельев помолчал.</p><p class="p1">— Скажите, а вы правда через телефон радиосигналы принимаете?</p><p class="p1">— Арии не обманывают.</p><p class="p1">— Но это же технически невозможно.</p><p class="p1">— Технически невозможно. А так — возможно, — туманно ответил шаман.</p><p class="p1">— А заряжать как?</p><p class="p1">— Когда электричество летает. Я делаю шар из электричества, он заряжает. Такой шар, весь горит.</p><p class="p1">Шаровая молния? Бред. Савельев хотел сказать, что и это технически невозможно, но знал, что скажет на это шаман: «А так — возможно». «Так» было возможно все. Савельев встал и побрел назад.</p><p class="p1">Войдя в дом, он с ненавистью посмотрел на приемник и прошел в комнату. Тихонов разлегся наискосок через всю кровать, и Савельев осторожно примостился рядом.</p><p class="p1">— Ах ты кроличек… Ты одна меня понимаешь… — пробормотал Тихонов, причмокивая, и положил руку Савельеву на бедро. Это было так отвратительно, что Савельев крепко ткнул соседа под ребра кулаком.</p><p class="p1">— Ты охренел? — Тихонов тут же проснулся.</p><p class="p1">— Сам охренел. Какой я тебе кроличек? Зверовод херов.</p><p class="p1">Тихонов смутился и поспешил сменить тему:</p><p class="p1">— А ты че не спишь? Сигналы слушал? Поймал чего?</p><p class="p1">— Да уж, наловил… — Савельев начал докладывать.</p><p class="p1">У Тихонова была прекрасная, профессионально необходимая черта — мгновенно включаться в любой разговор, даже если за минуту перед тем он во сне ласкал кроличка.</p><p class="p1">— Короче, приходит бабка и говорит: я самолет видела, — рассказывал Савельев. — Я — что, где, какой самолет? Она говорит: большой, круглый. Ну, НЛО в общем. И с инопланетянами разговаривала, типа. Ну, думаю, бабка ку-ку. Включаю радио, а там шаман на связи! И что, ты думаешь, он делает? Учит английский. Я к нему. Рассказываю про НЛО. А он мне говорит: да они все время тут летают, никакие не НЛО, конечно, тут секретный завод рядом, они и запускают, видать. Скажи, ты слышал когда-нибудь про секретный завод здесь?</p><p class="p1">— Не. Так на то он и секретный. И что они там производят?</p><p class="p1">— Шаман сказал, дурные вещи.</p><p class="p1">— Оборонка, — веско сказал Тихонов. — Зашибись вообще. Пойдем туда?</p><p class="p1">— Зачем?</p><p class="p1">— А что если бабка все-таки видела самолет?</p><p class="p1">— Черт знает. Хрен нас туда пустят.</p><p class="p1">— Но люди же там есть какие-то. Поселок рядом должен быть — не на заводе же они живут. Мы на сам завод и не пойдем, на фига он нам?</p><p class="p1">— Если оборонка, то нас и в поселок хрен пустят.</p><p class="p1">— А мы скажем, что журналисты. У меня и удостоверение есть еще.</p><p class="p1">— Тем более не пустят… — Савельев задумался. — Вообще попробовать можно. Мы завтра бабку спросим точно, где там он упал, и туда пойдем. А если там нет ничего, попробуем на завод.</p><p class="p1">Тихонов заснул так же стремительно, как проснулся, Савельев поворочался немного и тоже провалился в тревожный, неровный сон.</p><p class="p1">Когда наступит раннее утро, мы вернемся в голову Вали и снова будем смотреть на все оттуда.</p></span></span>
