<span><span id="id40"><div class="title6">
<p class="p">1</p>
</div><p class="p1">Даша Антипова, как все обитатели заброшенных и опустевших деревень, думала не одной только головой, а всем телом. Для этого тело надо было содержать чисто, использовать полно и правильно. Захотелось тебе поваляться — так надо поваляться. Валяльщик Даши Антиповой, Сергей Сергенбаев, жил в сорока километрах от ее родной деревни Булыгино — в своей родной деревне Ждановка, и Даша Антипова к нему пошла. Хотела она ему послать смс, а связи не было. Связь один день была, другой нет. А он и без смс ее ждал. Он ей приглашение послал через программу «Дом-2», там бегущей строкой шел смс-чат. Он ей написал: «Котюленька жду ты самый дорогой мой человечек приходи непожалееш». Котюленька — это было, конечно, не из его словаря, но от сильного желания чего не сделаешь. Дальше там вообще шло объявление «Лижу девушке женщине везде». Но еще неприличнее, кажется, было «Продам десятую „Ладу“ 2003 состояние хорошее». Если у тебя десятая «Лада» десятилетней давности, то ты хоть не ври.</p><p class="p1">И вот Даша Антипова пошла к Сергею Сергенбаеву за сорок километров поваляться, в июле пошла, а в конце сентября еще не пришла, потому что заблудилась, отклонилась от хорошо, казалось бы, известной тропки и попала в пространство вины, куда лучше человеку не попадать. Человек если попадет в это пространство, то делается виноват, и ему начинает, например, казаться, что он кого-нибудь съел, одного или двух. Здоровый, сильный и сравнительно молодой мужчина еще может это преодолеть, но девушка в семнадцать лет, приехавшая на лето к маме и бабушке из перовского бухгалтерского училища, такую силу преодолеть не может, и она начинает кружить по тайге столько, сколько хватит сил. А что потом с ней бывает, никто не знает.</p><p class="p1">Бабушка Даши Антиповой подняла, конечно, шум, побежала в милицию, милиция одна была на пять деревень и сказала, что если будет труп, то пусть он приходит, и они тогда возбудят дело о пропаже или, может быть, несчастном случае, но пока трупа нет, время искать еще не вышло. Бабушка переполошила мать Даши Антиповой, которая с новым мужем жила в Балахове, но в Балахове тогда случилось наводнение от дождей и было не до того. Но прошло пять дней, потом неделя, а Даши не было. И тогда началась поисковая операция, то есть милиционер Ухтомин пошел в тайну и стал искать Дашу. Не нашел ни Даши, ни грибов — ничего не было.</p><p class="p1">Штука еще и в том, что Даша не сказала бабушке, зачем пошла. Она пошла будто к подруге Свете Козиной, в Трунино, а это день пути да день назад, ну и там бы они погуляли дня два, сходили бы на танцы или еще к какой подруге, но потом бы она всяко вернулась. Поэтому бабушка три дня не волновалась, заволновалась на четвертый, заявила на пятый, а на пятый, сказал Ухтомин, искать уже трудно. Уже не осталось следов. Заявили, конечно, в город, но в городе сказали, что мало ли, может, они с подругами пошли в Сельцово, там мотоклуб. Запросили Сельцово — нет, никто не приходил, и мотоклуба нет. Пока искали мотоклуб, прошла еще неделя. Наконец стали прочесывать вдоль опушки, ничего не нашли, а вертолеты все были заняты, и как-то руки у всех опустились. Мать в Балахове спросила экстрасенса, экстрасенс сказал, что жива, но очень печальна. Мать Даши плюнула экстрасенсу в рожу и пошла бы искать сама, но август, август, огород! В августе день всю зиму кормит. Отлучись от огорода — и что тогда? А Даша Антипова была девушка самостоятельная, так просто пропасть не могла, и как знать, может, прав экстрасенс?</p><p class="p1">Даша Антипова в это время уже месяц ходила по тайге и стала догадываться, что заблукала. Это не страшно, человеку из деревни Булыгино тайга — дом родной, и у нее были с собой бутерброды. На третий день она их доела и перешла на грибы, которых было мало. Мобильный то брал, то не брал, но в деревне никто не отвечал, а Сергей Сергенбаев был почему-то вне зоны доступа. Это получилось потому, что за участие в чате «Дома-2» с него сняли все, что у него там было, а больше он положить пока не мог. Даша и тут не растерялась, она прислушалась всем телом, как умела, это многие умеют в тайге безо всякой Перепетуи, и услышала рядом с собой охотничью избушку. В избушке этой не было никакого запаса, но можно было хоть пересидеть те самые дожди, которые рядом заливали Балахово. Потом она призвала кабаргу, убила и наелась. А потом она почувствовала себя ужасно виноватой, сначала перед кабаргой, потом перед бабушкой, и такая это была ужасная вина, что ни сесть, ни встать. Так она и сидела в избушке, когда увидела за окном огромного коричневого человека. Он только мелькнул и сразу пропал. Мобильный у Даши давно разрядился, и снять его она не сумела. Это, кстати, причина, по которой никто до сих пор не снял йети. Мобильный на пятый день разряжается, а йети обычно приходят на шестой.</p><p class="p1">Йети приметил Дашу давно, еще когда она только приехала на каникулы. Он присмотрелся всем телом, как это у них водится, и выбрал Дашу, потому что она была молода, красива и могла дать хорошее потомство. Осталось дождаться, пока она пойдет в лес, а потом хитрым образом отвести ей глаза и направить чуть в сторону с тропинки. Сам йети еще не решался показаться Даше, только ходил вокруг и заглядывал в окна. Даша один раз увидела его большие следы. Она знала, что в тайге ходят всякие, да в Булыгине все это знали, но что вот так прямо — она представить не могла. Йети стал за ней ухаживать, то есть добиваться ее любви, но это была молодая особь, он не имел еще навыка ухаживания и вел себя довольно глупо. Даша, может, поговорила бы с ним, послушала бы музыку. Но музыки у него не было, а говорить он почти не умел и страшно стеснялся. Принести хворост — это он мог, и приносил, и однажды принес туесок ягод, но на большее не годился. Даша давно бы от него ушла, но ей страшно было отходить от избушки, а главное — йети напускал на нее виноватость, а в этом смысле им равных нету, что старым, что молодым.</p><p class="p1">Это было сложное чувство. Даша и сама была не простая. Ошибаются, кто думает, что в оставленных или малолюдных уральских и сибирских деревнях вырастают простые дети. У таких детей много навыков, каких городской школьник не имеет. Они могут убить и съесть кабаргу, позвать всем телом, сходить поваляться за сорок километров, нюхом найти гриб, по запаху крови определить — чья она. К этим людям вернулись сотни навыков, которые в христианские времена ушли в подсознание, а теперь опять полезли наружу. Городской человек не всегда почувствовал бы вину, исходящую от йети, а сельский чувствовал, и там часто все были виноваты. Даша остро ощущала, что йети хороший, только несчастный. Однажды, когда внезапно кончилась августовская жара и хлынули дожди, он ей принес резиновые сапоги, огромного размера, почти как на себя. С кого снял — непонятно. В другой раз он ей принес куртку, но куртка совсем уж была велика, а главное, что немодная. Даша в жизни бы такую не надела. Она пошла погулять, нашла медведя, убила, шкуру сняла, перочинным ножом сделала дырки, получилось стильно. Это не стыдно было надеть. Даша все такие вещи очень хорошо умела, у нее только с бухгалтерским делом в городе не ладилось, а медведь у нее даже не понял ничего.</p><p class="p1">Остальное время жили они, как в сказке «Аленький цветочек». Чудище ходило кругом и гугукало, а Даша все никак не могла решиться. Они начали издали разговаривать жестами. Даше иногда хотелось поваляться, но Сергей Сергенбаев был все-таки совсем другое дело. Он был красавец, смуглый, с приятно жесткими ладонями. Представить себя с йети она совсем не могла и потому ждала. Однажды над ними сравнительно низко пролетел вертолет. Йети упал и слился с пейзажем, а Даша, напротив, стала прыгать, пытаясь себя обозначить. Но вертолет, видно, искал кого-то другого, да и листья были еще густые, они могли Дашу в шкуре не разглядеть. Она уж призывала как могла, но, видно, летчики были защищены вертолетом. Даша плохо умела призывать сквозь вертолет.</p><p class="p1">Однажды она решилась включить телефон — вдруг он за это время как-то зарядился? И он ненадолго включился, согретый, видимо, теплом ее тела, и она получила смс от Сергея Сергенбаева: «Зая что ты так долго я скучаю». Смс был сравнительно свежий, дня два. Счет времени она вела внимательно, завязывала узлы на косынке, а потом развязывала. Еще она делала зарубки. Получалось, что она ушла из дома два месяца назад, и там уже, наверное, беспокоились. Мать со своим хахалем в Балахове вряд ли, а бабушка точно, и хотя здоровье у бабушки было крепкое, таежное, укрепленное смородиновым чаем, а все-таки надо было как-нибудь дать ей знать. Даша показывала йети издали мобильный телефон, но он только бил себя в грудь, как Кинг Конг, то есть, видимо, негодовал. Даша попробовала послать бабушке мысленный сигнал о том, как ей грустно и больно, больно, больно, — так пела певица Зара в песне «Больно, больно, больно!», ей оттого было так нехорошо, что почему же ты меня не простил, зачем же ты меня отпустил, теперь я тут одна ни в чем не вижу дна или что-то в этом роде. Но бабушка вряд ли это услышала. Наверное, она нашла бы способ прогнать йети, ведь прогоняли их как-то в прежние времена, когда они приходили в деревню или приставали к одиноким девушкам, идущим, допустим, по грибы. А с другой стороны, без него было бы совсем одиноко, а как вернуться на тропу, Даша не знала, хотя из последних сил напрягала спинной мозг. Спинной мозг обычно все понимал, но на этот раз молчал как убитый.</p><p class="p1">Несколько раз Даша пыталась уйти. Всякий раз, стоило ей на километр удалиться от избушки по сплетению почти невидимых троп, которые она, однако, чуяла, — ее накрывало такой волной тоски, будто она только что смертельно ранила беззащитного зверя, будто она предала отца, которого никогда не видела, и мать, которая ее сбросила бабушке; как будто она и бабушку бросила по доброй воле, захотев поваляться, а у той теперь наверняка ноги отнялись. Вот именно сейчас отнимаются. И у нее у самой начинали отниматься ноги, и она, полубесчувственная, еле брела назад, держась за стену стволов. Лес начал желтеть и буреть, дни стали короче, странные осенние тени проплывали по полянам, словно облака, но это были не облака, — всякий, кто походил по тайге, знает осенние тени, но это надо две недели проходить без хлеба, без связи, тогда и видно, что с тобой будет. Говорят, что это были души. Говорят, что в этих местах до сих пор плавают бестелесные тени группы Скороходова, восемь плавают, а девятая еще живая ходит, мучаясь чувством вины. Но отойти от избушки Даша не могла, не шлось, красавицу сторожило персональное чудовище, которое и было истинным хозяином здешних мест. И от того, что этих былых прекрасных гигантов вытеснили новые биологические виды, загнали в чащу леса, лишили всех удовольствий, — здесь никто и не мог ничего, и владело всеми безвыходное чувство вины. Только кто начнет что-нибудь делать, как опускаются руки. От этого же чувства вины все и позволяли с собой делать что угодно, и подписывали все, и никогда потом никого не проклинали, а считали, что с ними так и надо. Это чувство вины было как паутина, осенняя паутина, липнущая к лицу. Паутину тоже, видимо, делал йети. Если бы он захотел, он все бы тут оплел, находили в лесу такие коконы — думали потом, что это гигантские насекомые, а это не насекомые. Это человек хотел уйти от йети, а его так сильно любили, что оплели. Так любили, что даже не съели.</p><p class="p1">И вот однажды утром нашла на Дашу такая тоска, что свет ей стал окончательно немил, и спросила она себя — в чем же я виновата? Может, йети спал, должен же он когда-нибудь спать, а может, отвлекся на еду, — но ей впервые удалось отойти от избушки на полтора километра в ту сторону, куда она прежде не ходила; как-то все тело ее потянулось в эту сторону, словно там можно было как следует поваляться, раз в жизни, напоследок; и когда она прошла еще сто метров, чувствуя, как просыпается в ней прежняя невыносимая тоска, и завыла от этой тоски, от того, что никогда уж ей, верно, не спастись, — тут-то ей навстречу и вышли пять человек с рюкзаками, и тоска оборвалась, как перетянутая струна.</p></span><span id="id41"><div class="title6">
<p class="p">2</p>
</div><p class="p1">Савельев сидел с красавицей у костра и ничему не верил из того, что она говорила. В нем боролись два, а может, даже три чувства. Первое чувство было, что счастье ужасно изменило ему: вот нашел — а оказалась порченая. Да и кто бы не сошел с ума за три месяца блужданий по тайге. Но как она выжила? Неужели ее действительно кормил йети? Быть этого не может, бабкины сказки. Следовательно, случилось другое чудо, о котором он понятия не имел и отпечаток которого лежал теперь на этой девушке, так похожей на блеклую фотографию из его нагрудного кармана — и все-таки совершенно другой. Что-то ужасное случилось с Мариной Лебедевой, пока она ходила по лесу, что-то непостижимое случалось тут со всеми, после чего они либо исчезали, как группа Скороходова, либо выходили такими, как съевшие друг друга охотники, Сырухин и эти, как их. Но не может же быть, чтобы все сошли с ума? И шкура на ней подозрительно медвежья. И главное — это было второе чувство, еще более навязчивое, — Савельев понимал, что так врать нельзя; что Марина Лебедева была другая, а тут были бухгалтерское училище, певица Зара и котюленька. Не мог человек до такой степени выдавить из себя всю цивилизацию, выходить, вытоптать ее по тайге. Но тогда приходится признать, что она убила медведя и видела йети, но все это, конечно, развеется в Перове, когда они привезут туда и предъявят Марину Лебедеву. Третье же чувство, в котором стыдней всего было признаться, заключалось в том, что Савельеву отчаянно не хотелось предъявлять в городе Марину Лебедеву. Тогда она уж точно не досталась бы ему, девочка из молодежного отделения ИРОСа. И пусть бы, думал Савельев, она оказалась Дашей Антиповой. Пусть бы она была из деревни Булыгино. Пусть бы у нее был в деревне Ждановка валяльщик. Валяльщика мы как-нибудь перешибем. Пусть бы она была навеки моя, не может же быть, чтобы женщина с таким родным лицом не полюбила меня рано или поздно. И пусть даже придется тогда признать, что существуют йети, а по осенним полянам ходят лесные тени, — за Марину-Дашу он готов был и не такое признать, тем более что проскакивала между ними некая искра. Ясно же всегда, есть искра или нет. Он ее спас, вырвал, можно сказать, из лап. Если она свихнулась, он ей этот вывих вправит, в конце концов это его профессия. А если она и есть Даша Антипова, что же, с ней можно начать с нуля. У нее почти пустая голова, из которой за три лесных месяца выдуло последнее. И будет у него в результате как бы портативный «Беркут» с начинкой от Vega.</p><p class="p1">Они долго уже сидели у костра, а все прочие расползлись по палаткам, предоставив Савельеву побыть наедине со своей мечтой. И Савельев никак не брал в толк, отчего она за три без малого месяца в тайге не превратилась в йети сама, не одичала, и даже пахнет от нее не потом и запущенностью, а обычной лесной прелью? Вода у нее была, во время дождей даже слишком много воды, и ручей тут тек, и даже ключ в одном месте был, она все обещала показать; положим, она даже мылась, — но и они в профилактории мылись, а все-таки после побега и суток блуждания по тайге от них разило усталостью и грязью. Может, она и не человек вовсе? — подумал Савельев.</p><p class="p1">— А можешь ты объяснить, как он напускает эту вину?</p><p class="p1">— Как объяснить?</p><p class="p1">— Ну просто — как он делает это?</p><p class="p1">— Могла бы объяснить, так сама бы делала, — просто объяснила нечеловеческая Даша. — Я что могу объяснить, то сама могу. А переживается очень тяжело. Будто хуже меня нет.</p><p class="p1">Савельев вслушивался, пытаясь настроить свой внутренний приемник на чувство вины, но то ли йети не занимался групповым гипнозом, то ли мужскую психику в самом деле трудней прошибить. А может, йети спал, потому что было уже около пяти. Пора было спать и Савельеву, не говоря о Даше, которая, по ее признанию, вообще в последнее время почти не могла уснуть, потому что очень уж страшно сделалось осенью в тайге, а по ночам так и вовсе. Но Савельев чувствовал неловкость — ему надо было пригласить Дашу в свою палатку. Стоило ей сбегать от йети, чтобы попасть в мужские лапы? Савельев не хотел к ней приставать, он и думать об этом не мог, но молодость двужильна, и отучить ее от главного нелегко.</p><p class="p1">— Пойдем поваляемся? — сказала она жалобно, и Савельев внутренне просиял, но в ту же секунду безо всякой дополнительной настройки ощутил, что такое чувство вины. Этот йети, безусловно, знал свое дело. В следующий момент Савельеву показалось, что на него обрушилась вся палая листва этой осени, вся эта пустая и липкая тайга, все осенние тени, сколько их есть: не чувство вины, — куда годятся эти слабые слова? — но полное и внятное понимание, что его не должно быть на свете, что мир выталкивает, вычитает его; что все его беды были им честно заслужены, а счастья не будет больше никогда.</p><p class="p1">Это чувство наваливалось сразу, не проступая, а обступая. Савельев был кругом виноват перед всеми, кого затащил в экспедицию, потому что они, конечно, не выйдут отсюда, так и будут кружить среди наркоманов, безумцев, заводчан, безлюдных пространств и фальшивых племен. Он был виноват перед Мариной Лебедевой, которую вовремя не спас, и вот теперь пожалуйста, — и перед всеми, кто улетел с ней на самолете. Ведь он мечтал втайне, чтобы они все погибли, а она осталась, — а желание радиста имеет материальную силу. Он вспомнил все свои малочисленные врачебные ошибки, и все школьные конфликты, и преследующее нас всех с младенчества чувство нашей тут неуместности, и потянуться в этом состоянии к Даше Антиповой было трудней, чем подпрыгнуть при перегрузке в 3g.</p><p class="p1">Савельев понимал, чем заслужил все это. Он посягнул на Дашу, а она была собственность лесного жителя. Что же, значит, они бывают? Разумеется, как не бывать. Колупни сегодня Россию — и тут же провалишься в такое, что и в былинные времена показалось бы пережитком; Россия кишела ведьмами, феодалами, доисторическими племенами, в ней водилась теперь любая нечисть, и стоило отойти на шаг от протоптанной поколениями тропы — в кустах таился труп, пьянь, ребенок-урод, небывалое животное или трехметровое насекомое. Ничего уже нельзя было сделать — только ждать, пока все это самоорганизуется. Савельев был тут безнадежно чужим и чувствовал это с такой остротой, как никогда прежде.</p><p class="p1">Но вдруг безумный напор ослабел, словно поделился надвое, и Савельев почувствовал присутствие другого человека, словно вставшего между ним и страшным излучением вины. Этот человек — высокий сутулый старик в одежде, напоминающей рясу, — был похож на черного монаха из легенды, но Савельев узнал его. Лучше бы это, конечно, был черный монах.</p><p class="p1">— Шухмин? — пролепетал он.</p><p class="p1">— А я гляжу — костер, — сказал старик внятным полушепотом. — Дай, думаю, посмотрю на людей. Простите меня. Это я, все я виноват.</p></span></span>
