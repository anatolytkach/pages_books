<p class="p">2</p>
</div><p class="p1">Леша Окунев от природы не верил в государство, он родился таким, что всякая внешняя воля, хотя бы и самая благодетельная, была для него нестерпима, а поскольку детство его пришлось на девяностые годы, все вокруг подтверждало его детские предположения. Государство не собиралось защищать граждан, ничем их не обеспечивало, а полноценно передушить, чтоб не мучились, уже не могло. Оно висело на них, как ржавые кандалы. Силу Окунев еще мог уважать, а гниения не переносил. В десятом классе он вступил в партию УРА (Уральских радикал-анархистов), но покинул ее ввиду полной электоральной бесперспективности. Кроме того, он мало верил, что лидер партии Евгений Антонов, остроголовый человек в пенсне, способен будет самораспуститься и сдать все посты после, допустим уж немыслимое, прихода к власти. Окунев закончил уральский истфак, поучился в аспирантуре, ушел оттуда — поскольку узнал про Россию все, что его интересовало, — и принялся менять работы.</p><p class="p1">Строго говоря, все это была не работа — которая, по определению Бакунина, есть труд самосознающей души для общественного блага, но более для личного роста, — а приработок. Основным занятием Окунева было вытеснение государства из любых сфер, до которых оно пыталось дотянуться, — прежде всего из образования и медицины; теперь, к двадцати шести годам, он и сам затруднялся перечислить летние школы, православные и католические лагеря, кружки, семинары, клубы, в работе которых он поучаствовал. Он выезжал на все стихийные бедствия, спасал от пожаров и наводнений, два сезона поработал в движении ДеБа (дедушки-бабушки), возглавляемом московской студенткой Викой Кунгурцевой, но ушел из-за моральных разногласий: Кунгурцева разместила в Фейсбуке фотографии голой обгаженной старухи из дома престарелых в поселке Красная Крепь, после чего дом разогнали, директора уволили, а пенсионеров, сдружившихся было, раскидали по домам престарелых всей Тульской области. Окунев считал, что фотографировать и выкладывать на всеобщее обозрение голых старух не следует даже ради благой цели, а расформирование дома в Красной Крепи он благой целью не считал — тут была, по его мнению, классическая ситуация из «Защитника Седова», когда государство ради палаческих целей воспользовалось сигналом снизу. С врачом Тимашук, кстати, была та же история. На «врача Тимашук» Кунгурцева обиделась, а ведь Леша ей годился, она его хотела. Но Леше такие строгие столичные красавицы не нравились — он любил девушек попроще, принципов у самого хватало.</p><p class="p1">В странствиях по горячим, а точней — тлеющим точкам, по торфяным болотам, дымящим в июле, и поселкам, где трубы рвались при первых заморозках, Окунев открыл для себя совершенно иную Россию — не то чтобы подпольную, а параллельную. Она давно спасала себя, мгновенно координировалась, покрылась сеткой раздаточных пунктов, обзавелась тысячами активистов, делившихся в свою очередь на три категории. Первые были святоши, упоенные собственным подвигом, требовавшие абсолютной справедливости, а на деле — благодарности; эти не уживались даже с родителями. Отчего-то — Окунев боялся говорить вслух, отчего, — их особенно тянуло в медицину, к больным, увечным, обреченным, реже к бомжам, лучше бы тоже больным (здоровых бомжей, впрочем, не бывает). Эти отличались невыносимой экзальтацией и, кажется, тайной некрофилией. Вторые были любители экстрима, использовавшие бедствия как источник адреналина; этой корысти они не скрывали и были, в общем, приличные ребята — Леша причислял себя к ним, хотя, кажется, был к себе слишком суров. Третьи помогали потому, что не могли не помогать, и Окунев про себя называл их «провалившиеся». Живет человек, не делая ни зла, ни добра, что по нынешним временам и так немало, но судьба сводит его с больным ребенком либо брошенным стариком, и человек пропадает, ибо сделать ничего нельзя, а существовать по-прежнему он уже не может. Провалиться может не всякий, но тот, кого ничто не удерживает: все знают про больных детей и одиноких стариков, но всех удерживает семья, профессия, нетленка-эпохалка в компьютере, причем эпохалке грош цена и нужна она только для самооправдания; но есть те, кому зацепиться не за что, и сквозь лед быта, на котором мы все худо-бедно удерживаемся, они проваливаются в ледяное густое зловоние, которое, собственно, и есть жизнь, зачем же от этого прятаться. Благо тому, кто ходит по ее поверхности, словно посуху; нет никакой добродетели в том, чтобы проваливаться в выгребную яму, смрад которой ты никак не развеешь; никого не спасешь, а душу свою погубишь — это и есть то добро, от которого предостерегала одного молодого возлюбленного сама, скажем, Цветаева. Но вернуться обратно и жить, словно ничего не происходит, такой душе не дано, вот они и маялись, кидаясь в самые безнадежные ситуации. На глазах у Леши Окунева одна такая женщина — как обычно бывало, лет тридцати, — ударилась в помощь больным сиротам: мало того что сиротам, так еще и больным; потеряла на этом деле мужа, который сначала не одобрял ее увлечения, а потом стал злиться на бесконечные разъезды, запущенный дом, тоскливую муть в глазах жены, — и с легким сердцем, чувствуя себя глубоко правым, сбежал от нее, как от зачумленной, к ртутноглазой девушке без малейших признаков совести. Брошенная жена этого почти не заметила — она гробилась тогда, выхаживая тринадцатилетнего тяжелого эпилептика, нашла ему американских усыновителей, а когда запретили американское усыновление, эпилептик, к тому времени активно писавший в мордокнигу, громко обрадовался и заявил, что ни на что не променяет Родину; его немедленно обласкало «ЕдРо», а впоследствии усыновил губернатор. В публичном дневнике мальчик громко отрекся от благодетельницы, а ей написал прочувствованное письмо без знаков препинания — «Вы же все понимаете у меня нет другого шанса». И она, разумеется, все поняла.</p><p class="p1">Окунев тоже все понял, но у него быстро образовался профессиональный барьер: жалел он всех, но как-то вчуже. На путях волонтерства, благотворительности и прочего спасения на водах ему встречались всякие чудеса — например, Ратманов; но Ратманов давно исчез, и Окунев не думал, что им еще доведется свидеться.</p><p class="p1">Медицина еще не описала странный синдром, для которого характерны — всегда в связке — любовь к аббревиатурам, проповедям и телесным наказаниям. Может быть, чем-то подобным страдали идеалисты из числа большевиков. Сектант Тяпкин из Барнаула, народный поэт, часами наговаривал свои проповеди на магнитофон, а свою резиденцию в летнем лагере называл БАЛЕРИНА — Башня Летняя Резиденция Игнатия Начальника; народный поэт Давыдов создал ПОРТОС — Поэтизированное Объединение Теории Общенародного Счастья, — где совместно возделывали землю в Подмосковье, а нарушавших устав пороли с их полного согласия. Там предписывалось не просто писать стихи, но по возможности и говорить ими. Когда ПОРТОС разогнали — уж конечно, не из сострадания к поротым портосам, а из страха перед любым самостоятельным делом, — он получил землю под Харьковом, где дышалось повольней, и создал там поселение СПАРТА — Сельскохозяйственную Поэтическую Ассоциацию Развития Трудовой Активности. Свои поэтические советы людям будущего он издал в пяти томах, в поселении они рекомендовались к заучиванию наизусть.</p><p class="p1">Ратманов выглядел, конечно, адекватней народных поэтов, но в действительности был куда страшней. Леша впервые услышал его в летнем карельском лагере аутистов, куда несколько раз ездил педагогом. Там Ратманов спокойно рассказывал о проекте поселения для наркоманов, где их можно было бы лечить принудительно по методу «Города без наркотиков», и в этом не было ничего особенного, но экзальтированная питерская девушка стала ему возражать — дескать, Ройзман не лечит, а калечит, поскольку у него приковывают к нарам цепями. Тут глаза у Ратманова нехорошо засверкали, и он произнес громкий монолог о том, что у наркомана нет своей воли, души, имени, что у трех четвертей, а то и девяти десятых населения России нет своего ума, потому что страна жила в крепостничестве и не вышла из него; ясно было, что к обладателям ума и воли, потенциальным крепостникам, Ратманов причислял себя и не прочь был спасти тысячу-другую душ, привлекая их к возделыванию бесконечного российского пространства. Посмотрите на эту землю, говорил он. Обработана едва шестая часть, прочее зарастает мусором и бурьяном, — так же и народ, для которого крепостничество сегодня было бы спасением, коль скоро у людей нет собственной воли к жизни. Возьмите кредитных рабов — это хуже наркоманов: набирают денег, не думая, как расплачиваться, а потом вешаются, как у нас в Сызрани две идиотки, матери-одиночки, оставившие, между прочим, малолетних детей! И что вы будете делать с такими кредитными рабами, спросила экзальтированная, выкупать, может быть? А что же, и выкупать, согласился Ратманов. Деньги у меня есть (действительно были, он крупно поднялся на торговле машинами в девяностые, и нечто в его манерах наводило на мысль о братковском прошлом). Найду этим людям работу, научу любить искусство, а потом, глядишь, буду давать вольную — тем, конечно, кто докажет, что эта воля у них действительно есть. Спорить с ним никто не стал — не из особой деликатности, а скорей из экономии душевных сил; в поселении аутистов и так выкладываешься, а Ратманов, тоже своего рода аутист, был явно не из тех, кого можно переубедить. Окунев больше его не встречал, но хорошо запомнил. Теперь он видел, что у Ратманова все получилось. Он взял давно заброшенную землю в районе Перова, где можно было растить одни корнеплоды, и набрал таких же корнеплодных, темно-коричневых людей, избавив их от долгов, алкоголизма и свободы воли, а взамен получив крепостную власть. Окунев допускал даже, что эта власть была для него не самоцельна — хотя глаза у Ратманова при рассказе об этой утопии горели очень уж нехорошо; можно было поверить, что он и в самом деле радеет о благе Отечества, в котором большая часть населения не знает, что есть зло и что — благо. Но инстинктивное отвращение к этому насилию над чужой, хотя бы и почти отсутствующей волей в анархической душе Окунева было так сильно, что паспорт он отдавал с особенной неохотой.</p></span><span id="id12"><div class="title3">
<p class="p">3</p>
</div><p class="p1">Поселение Иерусалим состояло из пятидесяти рубленых домов, одноэтажных и однотипных, выстроенных на месте покинутой Каргинской. Поисковиков привели в приплюснутую, просторную и плоскую гостиницу — так называли здесь дом для новых.</p><p class="p1">— Людям же надо посмотреть сперва, — объяснил мужик в тюбетейке, назвавшийся Ратмиром. Таково было его новое имя — от старых все жители Иерусалима отрекались, подписывая купчую крепость.</p><p class="p1">— Сами приезжают?</p><p class="p1">— Кто сами, а кого хозяин приглашает, — нехотя сообщил Ратмир. — Меня привезли.</p><p class="p1">— И что, не могли отказаться? — спросил Окунев.</p><p class="p1">— Мог, почему ж. А куда мне было? Квартиру цыгане купили, отвезли в Алатарово помирать. Там хозяин нашел, сюда привез. А чего, живем, все есть.</p><p class="p1">Около некоторых домов копошились ребятишки с самодельными игрушками — большей частью с завернутыми в тряпки пластиковыми бутылками из-под минералки. Это были, надо полагать, куклы. В конце улицы человек десять достраивали деревянное здание с колоннами, похожее то ли на усадьбу обнищавшего барина, то ли на сельский клуб.</p><p class="p1">— Что строят? — спросил любопытный Тихонов.</p><p class="p1">— Театр будет. Пока тут играем.</p><p class="p1">Ах ты, подумал Окунев, у него и крепостной театр. Амуры и зефиры все.</p><p class="p1">— Поснедать прошу, — сурово предложил Ратмир. — С дороги-то.</p><p class="p1">Зря палатки тащили, думал Савельев. Тут и ночлег, и обед. Только откуда же сигналы?</p><p class="p1">— Слыхали вы, самолет тут упал неподалеку два месяца назад? — упрямо расспрашивал он.</p><p class="p1">— Не видали самолета, — сказал Ратмир. — Куда тут летать, река одна, да рыбы мало. Охота плохая. Грибы разве что, да кто за грибами полетит? Метеорит падал, это да, было.</p><p class="p1">— Когда? — спросил Савельев в дурацкой надежде, что самолет приняли за метеор.</p><p class="p1">— Месяца полтора. В тайгу упал. Грохнуло хорошо, поближе — окна бы высадил.</p><p class="p1">— Это где?</p><p class="p1">— Километров сотня будет отсюда. Пролетел — ночью светло стало. Да тут часто. Я второй год всего, а говорят, до меня еще два падали.</p><p class="p1">— И давно тут у вас Иерусалим? — стараясь говорить как можно нейтральней, поинтересовался Окунев.</p><p class="p1">— Четвертый год стоит.</p><p class="p1">Ага, понял Окунев. Значит, когда он про это рассказывал как про свою мечту, здесь уже все строилось. А что, не худшее вложение. Выстроил себе город солнца, только отчаявшимся и жить в такой утопии, земля опять же не простаивает.</p><p class="p1">Две опухшие девушки в венециановских нарядах, в кокошниках, внесли обед: постные щи и картошку в мундире; в центр грубо сколоченного деревянного стола поместили миску малосольных огурцов — «Они сами солят», — и расписную деревянную тарелку с квашеной капустой. Суп был пресен, салат тоже недосолен, а в венециановских девушках была невыносимая кротость людей, которым уже все равно. Тихонов попытался с ними поговорить — привычка собирать факты была в нем неистребима, — но они его словно не слышали.</p><p class="p1">— Кредитницы, — презрительно сказал Ратмир. Видимо, спиваться в его системе ценностей было благородней — пьяного посещали хотя бы странные мысли и видения, а кредитницы гибли сугубо потребительски.</p><p class="p1">— Сами приехали?</p><p class="p1">— Фантина почку продать хотела, а Фьяметта ребенком торговала. На вокзале взяли.</p><p class="p1">Судя по именам, Ратманов успел посмотреть «Отверженных» — читать их он стал бы вряд ли. А вот «Декамерон» он ради известных деталей читал наверняка — отсюда и Фьяметта.</p><p class="p1">— И где ее ребенок теперь?</p><p class="p1">— Ребенка отобрали, в детдом сдали. Хозяин обещал выкупить, если она человеком станет.</p><p class="p1">Однако, подумал Окунев, какие у него возможности!</p><p class="p1">— У нас вообще-то мясо есть, — сказал Дубняк. — Давайте вместе покушаем.</p><p class="p1">— Мясо у нас воспрещено, — гордо сообщил Ратмир. — И вам тут нельзя.</p><p class="p1">— Но мы же это, — поспешно сказал Тихонов. — Мы не кредитники. Мы поисковики.</p><p class="p1">— Когда ты в дом пришел куда, его закон блюди. Какая в доме есть еда, такую и люби, — назидательно продекламировал Ратмир. Тут, видно, тоже было в обычае говорить стихами — Ратманов, подобно «спартанцам», считал, что это облагораживает.</p><p class="p1">— А когда он будет? — спросил Дубняк. — Хозяин-то?</p><p class="p1">— Он нам не докладывает. К спектаклю будет.</p><p class="p1">В это время вдали зарокотал мотор, и вскоре к гостинице подъехал ратмановский «Ниссан Патрол».</p></span><span id="id13"><div class="title3">
<p class="p">4</p>
</div><p class="p1">— Один мой знакомый и даже, можно сказать, друг, — рассказывал Ратманов, красный от коньяка, — брал таджиков на работу очень своеобразно. Таджик настроен был на унижения, эксплуатацию и все такое. Гарик делал как? Он говорил: сначала ты должен почувствовать кайф жизни. Таджика везли к Гарику на дачу, кормили там до упада, поили, сколько вынесет (таджики плохо выносят), а когда было видно, что он уже битком и что ему хочется срать и ссать, — сапогами поднимали и заставляли бегать, пока он от напряжения и страху не обсирался. Таким образом он, во-первых, сразу понимал, что любой кайф будет теперь быстро обламываться, и, кроме того, у него надолго появлялось отвращение к еде, не говоря про выпивку. И еще, сверх того, сохранялся образ кайфа жизни, к которому надо устремляться. Я видел однажды, как они у него обгаженные бегали. Это мне несколько напомнило Тацита. Там описана такая казнь — пихали человека в корыто, сверху другое корыто, руки и ноги торчат, голова торчит, и в эту голову его кормят молоком и медом. Если не жрет — выкалывают глаза, так что жрали все. Потом он начинает срать под себя в это корыто, гниет, заводятся черви и за три недели выедают его совсем. Так был казнен царь Митридат.</p><p class="p1">Мать моя женщина, подумал Окунев. Не Тацит, а Плутарх, не царь Митридат, а персидский воин Митридат, приписавший себе честь убийства Кира, но зачем ему эти тонкости? Он помнит корытную пытку, этого достаточно. К этому списку — аббревиатуры, стихи, колонии — надо добавить пытки; чем изощренней они, тем больше нравятся.</p><p class="p1">— Я покажу вам сегодня театр, — обещал Ратманов. — На театре сегодня дают Крылова, «Подщипу». Надо, чтобы люди чувствовали восемнадцатый век. Я думаю, что девятнадцатый не был уже золотым. Золотым был век матушки Екатерины. Вот это было просвещение, а не то, что потом. Потом все изгадилось идеей равенства. Это тот величайший соблазн, тот гнойник, от которого пошла вся гниль. Если бы не подлая идея равенства, не было бы ни французской революции, ни русского ада. Революция убивает всех, потому что равны только мертвые. Люди никогда не равны. Посягательство на неравенство — главная трагедия. Крепостничество — единственное спасение для страны, где никто никогда ничего не решал.</p><p class="p1">Гостевой кабинет, в котором Ратманов принимал почетных визитеров, был украшен пестро и богато: всюду, где можно, висели портреты матушки Екатерины, сцены из античной жизни и концертный плакат Розенбаума с автографом. Чувствовалось, что гости у Ратманова случаются редко — он все-таки еще не осмеливался пропагандировать крепостничество во всеуслышание, — а потому в Иерусалиме принимали только вернейших; висели тут, однако, фотографии Ратманова с областным руководством, и хотя на лице у него была та поспешная заискивающая улыбка, какую всегда надевают жаждущие запечатлеться, приобнимая знаменитых гастролеров или случайно встреченных звезд, — чувствовалось, что он не совсем случайный человек в этих начальственных рядах, что его обществом не брезгуют и где-то даже готовы перенять опыт.</p><p class="p1">— Поймите такую вещь, — убеждал он, хотя никто ему не возражал. — Ведь в Иерусалиме только те, у кого правда не было выхода. Никакой другой судьбы, поймите. Вариант был один — гибель. Я же их знаю всех. Я подбираю только тех, кому действительно дальше — или петля, или канава. Вот он взял кредит. Они все берут. Их сознание не может мириться с тем, что есть деньги и можно взять. Как он будет возвращать — ему неважно, потому что такие считают на день вперед, это максимум. Они так же рожают, не думая. Им хочется маленького человечка. Мне так и сказала одна, уже вся синяя от первитина: я думала, что у меня будет маленький человечек. Они оба тут сейчас с человечком, он дебил, конечно, но мы выучим. Хотя бы сможет подтираться. Огромный прогресс, у меня своя методика, мне писал академик Лихутин из Москвы, что это передовой опыт. Я хочу его пригласить, чтобы он посмотрел. Поймите, — возвращался он к любимой теме, — не все люди могут отвечать за себя. Вы говорите: наркоман, свобода воли. Но какая воля у наркомана? Когда ему нужна доза, то он животное. У него нет мозга в это время. Его гонит страсть к наркотику и ничего больше. Он убьет мать, отца, сына, у нас один чуть не убил сестру. Вы думаете, я сам их забираю? Их мне сдают. Я никому не отказываю, но у меня все подписываются: если не может подписаться сам — тогда родственники. Я говорю, что у меня жестко. Да, я привязываю, другого метода нет. Если кредитник, он никогда, то есть пока он у меня, не увидит денег. Я все закупаю только сам. Я определяю круг чтения, кино для просмотра, у нас просмотр DVD два раза в неделю. Никто не может выйти. Тяжело тебе? — смотри, все смотри, во что ты мог превратиться! У нас храм, служит отец Терентий два раза в месяц, но, между нами говоря, я мало верю во всякую эту религиозную практику. Верить или не верить может человек свободный. Пока они все верят только в очередную дозу. У них нет воли и ума — я даю им свою волю и ум, потому что государством все это сейчас не востребовано. Я даю им работу, я учу их мыслить, и — да, они моя собственность. Вы думаете, может быть, что я побоюсь это сказать? Я не боюсь, потому что выкупал их из долгов за свои деньги, кормлю на свои, строил все это на свои, пять бригад работало тут… Я мог на все эти деньги купить себе яхты, хуяхты, я мог быть в списке «Форбса», но зачем мне «Форбс»? Моя планка выше. У нас говорили: крепостник. — Он хмелел все больше, уже не от коньяка, но от разворачиваемой перед гостями картины собственного величия. — Но кто сейчас вспоминает, кто знает в действительности, что за люди были эти крепостники? У генерал-фельдмаршала Шереметева было восемнадцать тысяч душ! — Он указал на портрет над своим резным креслом, с молитвенным восторгом возвел на него глаза и поднял рюмку, словно желая показать генерал-фельдмаршалу, что пьет его здоровье. — Он отдал своего сына в заложники при заключении Прутского мира, и сын умер, но мир был заключен. У него за стол не садилось менее двухсот человек. Кормил неимущих, поил солдат лично. Все крепостные были обуты, ухожены. Он делил свою волю, свой разум на восемнадцать тысяч! Мы говорим — крепостники. Но театр Зорича был куплен для императорской сцены! В Кускове у Шереметева-сына было три театра, с такой акустикой, какой не знал Петербург. Крепостники — те единственные подлинные народолюбцы, которых все искали. Что, народник любил кого-то, приносил пользу кому-то? Народник шел баламутить! Крепостник давал образование, — загибал пальцы Ратманов, — давал обувь (его почему-то особенно волновала обувь), стол, следил за здоровьем, потому что кому же нужен больной?! — и заключал браки! Мы говорим: женили не тех, не на тех. Откуда нам сегодня знать? Женили сообразно своим представлениям, совершенно правильным представлениям, потому что знали, как лучше!</p><p class="p1">Окунев мучительно хотел спросить о праве первой ночи, но сдержался. Ясно было, что Ратманов пользуется абсолютной властью над крепостными, и если ему захочется уестествить кредитницу — он сделает это без всякой первой ночи; коньяк и закуски в кабинет вкатила подозрительно блудливая, нарумяненная личная секретарша, в непременном кокошнике, но с глубоким вырезом цветастого ситцевого платья, и едва за ней закрылась дверь, Ратманов пояснил, что выкупил ее из турецкого борделя за сумму, в какую обходились обычно пять-шесть кредитоблудных душ. Кредитоблудие был его личный термин, один из семи смертных грехов, в компании спиртопития, наркодурствия, чадонебрежения, праздношатания, расточения (для разорившихся) и люботорговли (для проституции). Разумеется, он не отказал бы себе в удовольствии попользоваться личной собственностью, да и кто бы его укорил?</p><p class="p1">— И помяните мое слово, — продолжал он, все больше распаляясь, — с Иерусалима начнется возрождение России. Рано или поздно так будет жить вся Россия — здравый смысл диктует это; мы еще увидим, как оживет русская усадьба, русская усадебная проза, как станет вызревать новая «Война и мир»…</p><p class="p1">— Евгений Петрович, — вклинился Савельев в одну из пауз, когда Ратманов явно ждал новых вопросов об устройстве его крепостного хозяйства; он только было похвастался теплицами и начал рассказывать о своих планах обустроить там ананас, — но поисковики явились не за ананасом. — Вы слышали, конечно, что здесь неподалеку упал самолет, «Ан-2», с руководством «Инновационной России» на нем?</p><p class="p1">Ратманов помолчал, перестраиваясь на другую, явно неинтересную тему.</p><p class="p1">— Это не тут, — сказал он с неудовольствием. — Это севернее, на берегу Лосьвы.</p><p class="p1">Савельев так и подпрыгнул.</p><p class="p1">— Вы их видели?</p><p class="p1">— Я не видел, а Панург видел. У нас он Панург, а до этого был Сырухин, охотник. Какой он, впрочем, охотник — так, любитель. Я не хотел его брать, но куда ему деваться?</p><p class="p1">— Сырухин?! — вскричал Тихонов, не веря своим ушам. — Но его съели!</p><p class="p1">— Это не его съели, а он съел. Он попросил его спрятать, я его взял с условием, что он все забудет и навеки откажется от мяса. У него теперь другое имя. Он говорил, что видел какой-то самолет, но они до него не дошли. Он над ними пролетел и упал в тайгу, ближе к Лосьве. А потом он съел двух других и вышел ко мне.</p><p class="p1">— Он у вас? — настырно спрашивал Тихонов. — Я должен его увидеть, я же писал про всю эту историю!</p><p class="p1">— До спектакля вы его не увидите, — властно отвечал Ратманов. — Он готовится, у него с памятью плохо, я ему дал роль царя Вакулы. А после спектакля — ради бога, но предупреждаю, что много он не расскажет. У него не очень хорошо с головой.</p><p class="p1">— Это наверняка, — кивнул Тихонов.</p></span><span id="id14"><div class="title3">
<p class="p">5</p>
</div><p class="p1">История съеденного охотника взбудоражила перовские умы в июле, и следствие по ней длилось месяц, пока не стало понятно, что правды от уцелевших не добьется никто. Они были обнаружены мыкшанскими грибниками по чистой случайности — поиски с вертолета ничего не дали, а мобильной связи в мыкшанской тайге не было. Трое отправились на охоту в апреле, в самое глухариное время, когда, впрочем, можно подстрелить и пролетного гуся, и утку, и косулю, — но в то, что они шли охотиться, никто не верил. Слухи об «осиновском золоте» — по имени реки Осиновки, где в 1819 году крестьянин села Уродное Никифор Стремин нашел золотые россыпи, — ходили в Перове и его окрестностях все двести лет, хотя месторождение считалось давно выработанным, а самого Стремина через два года после чудесного открытия съели волки, и осиновское золото с тех пор считалось несчастливым. К моменту национализации приисков там уже почти ничего не оставалось, однако любое везение в этих краях так редко, что тысячи золотоискателей бороздили неласковые берега Осиновки в напрасных поисках золотой отмели. В 1968-м, однако, золото нашли снова, на этот раз южнее, и поиски закипели с новой силой — так что пропавшие охотники явно выждали, пока начнет сходить снег, и отправились отнюдь не за гусями. Родственники отчего-то не слишком о них беспокоились, вдобавок и родни у всех троих почти не было: Сырухин разведен, Ходырин холост, и только у Моренова была любовница с дитем. Она-то и подняла шум в мае месяце, но тут упал «Ан», и поисковикам стало не до охотников. Пятого июля они сами вышли почти к самому Мыкшанску, где и попались на глаза семье местных грибников. Охотников, однако, было всего двое, и куда девался третий — они объяснить не могли. Сначала пошли разговоры о том, что он отстал, потом — что они нарочно разделились, ибо так было больше шансов найти жилье, но перовские обыватели, читатели «Глобуса», почти единогласно решили, что так и не найденного сорокалетнего Сырухина просто съели как самого молодого и нежного — Моренову было под 50, Ходырину 43.</p><p class="p1">Версия эта, при всей своей жуткости, немедленно закрепилась в умах: во-первых, золотоискателей, в особенности доморощенных, недолюбливали и ждали от них любой гадости, да вдобавок Ходырин был не местный, он приехал якобы поохотиться из Астрахани, а зачем из Астрахани ездить в Перов? Арбузов там, может быть, не хватает? Как бы то ни было, по факту исчезновения Сырухина живенько возбудили уголовное дело, по которому двое спасшихся покамест проходили свидетелями, — но после первого же допроса они бесследно исчезли из больницы, где проходили восстановление после двухмесячных блужданий по тайге, и тут уж растворились бесследно. У любовницы Моренова не было никаких сведений о сердешном друге — она лукавила, конечно, это видно было по наглым ее глазам, обыскали ее перовскую квартиру и дом в поселке Треухино, где жили ее родители, подпол прошли с фонарем, все было чисто. Может быть, они ушли обратно в тайгу, теперь уже навсегда, а может, просто затерялись на бескрайних просторах Свердловской области; в России очень много всего пропадает, почти все навеки, а если и обнаруживается, то по чистой случайности. Иной человек уйдет из дому якобы по грибы, на самом же деле мыть золото, или поедет к любовнице, допустим, в город Актюбинск, ныне Актобе, — а обнаружит себя вдруг в Ахтарске, сидящим на скамейке городского автовокзала, причем сидит он там явно не первый день и ничего не помнит. Где был, кого за это время съел? Жива ли полюбовница в Актюбинске или он оттого и потерял память, что сожрал ее в припадке бешеной ревности и теперь скрывается от правосудия? Иной человек шел в комнату, попал в другую, за триста километров, а почему туда попал — сказать не может, пришла внезапная блажь; двадцать лет спустя вернулся на родное пепелище — семья давно уехала, соседи позабыли, — и с ужасом узнал, что никто его не искал: дело возбуждается по факту трупа, а факта трупа нет, еще не умер или не нашли; пропавшего без вести взрослого мужика не станут искать никакие добровольцы, это девочку малолетнюю ищут с собаками по всему району, подвергают самосуду отчима, который нехорошо на нее поглядывал и наверняка растлил где-то в лесополосе, и находят несчастную через двадцать лет почтенной матерью семейства, почему-то в удивительном поселке с названием Примыкание, Саратовской области; что заставило ее туда примкнуть, или туда все примыкают, кого вдруг закружило по России? Из Карабулака в Октябрьск выехал на поезде некто повидаться с теткой, которая его растила, но по дороге встретил женщину своей мечты, та его опоила, раздела, разула, пихнула в полусознательном состоянии в автобус Равенство — Черные Камни, он по дороге встретил женщину своей мечты, та его накормила, одела, обула, он через год поехал с ней в город покупать новые штаны и другую одежду, в магазине встретил женщину своей мечты, та была пропойца и шлюха, пила с грузчиками, грузчики его избили, раздели, разули, он очнулся в доме у тетки, подобравшей его на улице, но не узнал старуху и только все повторял «Не буду, не буду». Какой роман можно было бы об этом написать, какой скучный, бесконечный, никому не нужный роман, в котором никому не нужные герои ездят по неотличимым местам, и встреча с незнакомцем отличается от встречи с родственником только тем, что родственник при встрече иногда выставляет соленья! Никого нельзя найти, все пошли и не вернулись, особенно если человек ушел из больницы с явным и понятным намерением никогда туда не возвращаться. И в Перове забыли про Сырухина, потому что он был водопроводчик, человек, которого мало кто помнит в лицо.</p><p class="p1">— Это значит, они в июне там были, — рассуждал Савельев. — У Лосьвы. Но ведь дотуда… я полагаю, километров тридцать?</p><p class="p1">— Нет, поменьше, — сдержанно отвечал Ратманов, страшно недовольный тем, что его отвлекли от действительно важной темы. — Увидите своего Сырухина, никуда не денется. Но учтите, у него действительно плохо с головой.</p><p class="p1">— Надо ему объяснить, что он никого не съел, — долдонил Тихонов.</p><p class="p1">— Может, и не надо, — сказал Ратманов. — Недоразвитому, примитивному человеку нужно чувство вины. А сейчас, дорогие друзья, — спектакль!</p><p class="p1">И они отправились в гостиницу, где предполагалась крепостная премьера.</p></span></span>
