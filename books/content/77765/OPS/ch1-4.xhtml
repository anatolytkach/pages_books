<span id="id9"><div class="title2">
<p class="p">Глава вторая</p>
<p class="p">Купчая крепость</p>
</div><span id="id10"><div class="title3">
<p class="p">1</p>
</div><p class="p1">Русский человек собирается в путь неохотно и медленно. Не путь пугает его, а миг перехода от состояния оседлости к состоянию странствия. Отчасти это связано с погодой, которая редко бывает хороша, а отчасти — с изначальной инерционностью: русский человек по преимуществу домосед, а странствовать он выходит, когда жизнь выгоняет. Уходить из дома — ничего хорошего.</p><p class="p1">Зато когда инерционность преодолена и пошел он по маршруту, его уже не остановить. Русского человека вообще остановить трудно. Вот они идут, русские люди, надев рюкзаки, неся две палатки — двухместную и трехместную, посуду, термомешки, горелку с топливом, запас лапши на трое суток и четыре банки тушняка; у одного из них охотничье ружье и два ножа, у другого переносной пеленгатор личной сборки, состоящий из антенного блока, процессора диаграмм, блока усреднения и кое-чего еще, о чем непрофессионалу незачем знать. Савельев уверял Дубняка, что брать палатки не нужно, должно же в колхозе быть жилье, но Дубняк исповедовал славянский туризм, а это целая философия. По мысли Дубняка, славяне изначально были туристами, а не унылыми домоседами, странствовали, останавливались в хороших местах, а когда надоедало — шли дальше. В славянском туризме главное — предусмотрительность: все надо носить с собой, потому что жизнь в этих краях состоит из крайних случаев. Дубняк считал, что таскать на себе палатку и термомешки в любом случае благотворно. Он был гением этого дела. Никто лучше его не уложил бы сотню угловатых предметов в единственно возможном порядке, чтобы все застегнулось и ничто не терло спину; никто быстрей его не развел бы костер и не снарядил бы, если потребуется, капкан из подручных материалов. В то, что колхоз имени шестидесятилетия еще обитаем, Дубняк не верил. Как-никак он много ходил по окрестностям Перова.</p><p class="p1">Погода благоприятствовала, по перовским меркам осень была почти золотая — плюс десять и мутноватое солнце на бледно-сером небе. Они легко прошли пешком три километра от Черноярья до Храпова, сразу за которым, если верить карте, начинались колхозные владения. Никто не встретился им на разбитом проселке, но местность отнюдь не выглядела запущенной: Валя Песенко предполагал, что сразу за Храповом начнется тайга, та уральская редкая болотистая тайга, по которой не пройдет никакая техника, — но хоть колхоз и значился ликвидированным с 1961 года, по сторонам дороги виднелись распаханные поля, скошенные луга, а через час пути наконец появились и люди. Десяток колхозников в одинаковых темно-коричневых куртках, почти сливаясь с местностью, собирали картошку на подходе к деревне Каргинское, где в оны времена размещалось правление. Савельев на всякий случай засек время: первый контакт с местными жителями состоялся в 15.43, и люди в темно-коричневом были им не рады.</p><p class="p1">— Граждане! — крикнул Дубняк. — Мы поисковики из Перова, ищем упавший самолет! С него пришли сигналы, что он где-то у вас!</p><p class="p1">Колхозники молчали, странно переглядываясь. Наконец навстречу экспедиции шагнула иссохшая женщина неопределенного возраста и медленно, словно с трудом припоминая, произнесла стихотворное приветствие:</p><p class="p1">— Кто к нам пришел, тому мы рады, войди ты, если добрый гость, а кто не добрый гость, не надо, свою сюда не надо злость.</p><p class="p1">Валя Песенко, собиратель фольклора, был потрясен. Тихонов насторожился, ему все это сразу не понравилось.</p><p class="p1">— Мы добрые гости, — с широкой волонтерской улыбкой сказал Окунев, но чувствовалось, что и ему не по себе. Как всякий истинный волонтер, он плохо думал о людях и сразу заподозрил тут поселение монстров. — Это колхоз Шестидесятилетия Октября?</p><p class="p1">Поселяне опять переглянулись.</p><p class="p1">— Вот председатель приедет, он скажет, — пообещал со смутной угрозой мужик в тюбетейке. Гастарбайтер, догадался Окунев, неужели и здесь гастарбайтер?</p><p class="p1">— Когда приедет? — спросил Тихонов. Подойти к колхозникам поближе он не решался.</p><p class="p1">— Он вечером приедет, — сказала женщина лет тридцати и попыталась даже улыбнуться. — Вечером. Спектаколь будет.</p><p class="p1">— Спектакль? — переспросил Тихонов, ничего не понимая.</p><p class="p1">— Представление, — подтвердила колхозница. — Я буду представлять.</p><p class="p1">Прочие посмотрели на нее с осуждением, и она умолкла.</p><p class="p1">В уме Окунева мелькнула догадка столь парадоксальная, что он не стал ею делиться, а напрасно.</p><p class="p1">— Тут самолет не падал у вас? — спросил Савельев.</p><p class="p1">— У нас не падал, — ответил рослый, квадратного сложения парень, все это время рассматривавший гостей с крайним недоброжелательством. — У других пусть падает, у нас никогда не падает. Ходят, проверяют. У нас ничего тут не бывает.</p><p class="p1">— А можно нам хоть в правление пройти? — впервые заговорил Дубняк. Все это время он пристально изучал колхозников издали, поскольку лицо одного из них — плотного дяди, по самые глаза заросшего бородой, — показалось ему знакомо, но в такие совпадения он не верил.</p><p class="p1">На этот раз темно-коричневые переглядывались особенно долго, но наконец старик в тюбетейке подошел к экспедиции.</p><p class="p1">— Я поведу, — сказал он Дубняку, угадав в нем старшего. — Но вы паспорта сдайте.</p><p class="p1">Все нехотя достали документы. Тихонов буркнул под нос «С какой стати?» — но сдал паспорт, как все. Не просматривая их, старик сунул все пять паспортов во внутренний карман куртки и пошел во главе поисковиков. Прочие колхозники постояли, глядя им вслед, и вернулись к работе. Работали они удивительно вяло, неумело, словно после долгой спячки — эта мысль явилась оглянувшемуся Окуневу. Студенты на картошке, и те собирают бойчее. Впрочем, откуда у колхозников бодрость? Идиотский подневольный труд, как его ни зови.</p><p class="p1">— Так это колхоз имени шестидесятилетия? — спросил Савельев.</p><p class="p1">— Это Иерусалим, то есть Имени Евгения Ратманова Усадьба Счастья Лишенных Имени, — с нехорошей серьезностью сказал старик в тюбетейке, и четверо из пяти подумали, что они сошли с ума, зато Окунев, чьими глазами мы станем глядеть на эту первую остановку, понял, что догадка его верна и что надо бы им поворачивать, да поздно.</p></span></span>
