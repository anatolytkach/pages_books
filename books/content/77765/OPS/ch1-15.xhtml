<p class="p">9</p>
</div><p class="p1">До «Лосьвы» он добрался к десяти вечера. Профилакторий являл собою длинную трехэтажную постройку невнятного цвета, хоть и недавней покраски; при свете фонаря над входом она казалась просто серой. Широкое крыльцо с косоватыми бетонными ступенями, кривые железные перила — весь он выглядел кривым, неаккуратным, но абсолютно надежным именно в силу этой косоватости, внесенной в расчеты не иначе как гениями из НИИ. Все прямое тут давно упало. Краска новая, но с застывшими потеками, и линия, где кончается краска и начинается побелка, всегда неровная — по этой неровной линии, очнувшись после сна или обморока, всегда можно опознать местную вещь, будь то больница, санаторий, общежитие, отделение милиции или триллер с элементами пародии. Но фойе со стойкой, типа ресепшен, Тихонову понравилось, всколыхнуло в нем ностальгию по тому, чего он не застал: огромные пыльные фикусы в кадках по углам, ковровая дорожка, деревянный круглый столик с жесткими креслами, обшитыми грязно-красной тканью — все это можно было еще встретить в гостиницах в глухих городишках, причем там это воспринималось как прошлый век, признак отсталости, а здесь было абсолютно на месте и даже намекало на некоторую роскошь. В углу висел телевизор, по которому показывали без звука футбол — Тихонов так и не понял, кто против кого, ничего было не разобрать через рябь и помехи. За стойкой стояла заспанная квадратная женщина с отпечатком круглой пуговицы на щеке. Наблюдательный Тихонов зачем-то отметил, что на ее блузе пуговиц такой формы и размера нет.</p><p class="p1">— Завтрак в столовой в восемь, — сообщила тетка, не глядя на него, и положила на стойку ключ. — Распишитесь.</p><p class="p1">Обстановка комнаты погрузила Тихонова в совсем уже элегическое состояние: две узкие койки с лакированными бортиками вдоль заднего края, под гобеленовыми покрывалами, подушки треугольником, такие же лакированные тумбочки, на каждой по граненому стакану. Форточка с бечевкой — дерни за веревочку. Скрипучий шкаф в одном углу, письменный стол — в другом, все разного цвета и с чайными кругами. Тихонов скинул куртку и ботинки и вытянулся поверх покрывала. От подушки пахло прачечной. Как писать про Семенова, он не знал.</p><p class="p1">То есть все, все он знал бы, окажись это редакционным заданием. Но здесь нужно было иное. Почему-то он был уверен, что если результат не понравится директору, то все последующее уже ой как не понравится самому Тихонову. Да и как сказать это? «Продукция Перова-60 настолько секретна, что держится в секрете даже от рабочих», — прикидывал Тихонов. Нет, это ерунда. «Перов-60 не отмечен на картах, и случайный человек сюда не попадет». Тоже не годится — они же попали, и как попали! Вдобавок все в Перове знали о существовании Перова-60, но во времена дефицитов сюда не пускали, а с девяностых, когда город открыли, ехать туда было бессмысленно. «Вот уже который год генеральный директор далекого уральского завода Максим Семенов делает что?» Тихонов даже услышал в голове голос, произносящий это: голос советского диктора, звенящий баритон с еле сдерживаемым то ли ужасом, то ли смехом — старые передачи крутили по кабельному каналу, и Тихонова всегда завораживали эти голоса: неторопливостью, многословием, обилием эпитетов и постоянно сдерживаемым желанием сказать что-то совсем не то. Упомянуть среди рапорта какую-нибудь жопу. Потом, конечно, гори все огнем, но миг прорыва! Теперь таких дикторов не делают, да и о чем сейчас можно было бы рассказать таким голосом? Закрыв глаза, он увидел и саму передачу о «Перове-60» — черно-белая съемка, ряды станков, серьезные рабочие, поглощенные работой и не обращающие внимания на камеру — вот камера проезжает по цехам, вот крупный план какой-то машины, вот опять станки, коридоры — а затем монтаж, склейка, — и на весь экран лицо Семенова: сосредоточенный взгляд куда-то вниз, рука, подпирающая высокий нахмуренный лоб. Камера отъезжает, и видно, что Семенов склонился над бумагами за столом у себя в кабинете. Вот он поднимает голову, смотрит на зрителя и говорит не своим, размеренным голосом, улыбаясь:</p><p class="p1">— Продукция нашего завода всегда держится на самом высоком уровне качества. Мы сознаем, как она необходима стране, особенно сейчас. Вот здесь вы можете увидеть образцы этой продукции и убедиться, что наши фрикадели достойны самой высокой оценки.</p><p class="p1">«Какие фрикадели, почему?» — успел подумать Тихонов, а директор, теперь полноцветный, подвигал уже ему, а не телезрителю черный ящик. Крышка ящика откинулась, и Тихонов с ужасом увидел внутри людей — копошащуюся человеческую массу: розовые тела, руки, ноги, уши, мужчины, женщины, дети в полной тишине шевелились, извивались, как черви в банке, а над всем этим гремел голос Семенова: «Не правда ли, изумительные? Прекрасные, прекрасные фрикадели! Да вы попробуйте одну, попробуйте!»</p><p class="p1">Тихонов проснулся, и в первый момент не мог понять, где он: ему показалось, что он дома, но квартиры он не узнавал, и только постепенно, собирая мозаику из кусочков интерьера, вспомнил, наконец, что он вовсе не дома, и неизвестно еще, когда там окажется. В дверь стучали.</p><p class="p1">— Открыто! — сипло крикнул Тихонов, решив, что это кто-то из своих.</p><p class="p1">Но в комнату вошла высокая технологиня Кузнецова, с которой они строили друг другу глазки на заседании. Тихонов вскочил и попытался, как мог, расправить покрывало.</p><p class="p1">— Ты как меня нашла?</p><p class="p1">— Так мне Пахомова сказала. Пахомова — это Светлана Кирилловна, заведующая профилакторием. Я ей велела к тебе не селить никого.</p><p class="p1">— Зачем? — еще не понимал Тихонов.</p><p class="p1">Она рассмеялась мелким дробным смехом, который совсем не шел к ее росту и крупным чертам, но этот диссонанс был скорее необходимой неправильностью.</p><p class="p1">— А потому что я пришла. Ты рад?</p><p class="p1">— Рад.</p><p class="p1">— То-то я вижу, даже кровать заправил. Разбирай давай.</p><p class="p1">— Что разбирать?</p><p class="p1">— Слушай, ты какой-то дурак сегодня. Или ты всегда такой?</p><p class="p1">— Нет, — сказал Тихонов. — Только в последние три дня такой дурак. А так я умный вообще-то. Школу с медалью закончил.</p><p class="p1">— А мне все равно, какой ты. — Девушка деловито расстегнула куртку и огляделась. — Хорошее тут место. Мне нравится. А тебе?</p><p class="p1">— Да, очень здесь… ретро такое.</p><p class="p1">— Сам ты ретро. — Она уже снимала сапоги.</p><p class="p1">— Слушай, а ты чего пришла, раз тебе все равно, какой я?</p><p class="p1">— Ну не все равно. Так все равно же вы… — она замолчала, сражаясь с застрявшей молнией.</p><p class="p1">«Все равно вы уйдете», — понял Тихонов. Он еще не был уверен, зачем это она раздевается. Не может же быть, чтобы за этим, вот прямо так, с порога. Ну пришла, не в куртке же сидеть? А сапоги? А тоже жарко. И в блузке тоже. Ах ты, блин, и в лифчике?!</p><p class="p1">Тихонов даже на своем пионерском расстоянии чувствовал жар, исходящий от нее — как от работающей машины. Она посмотрела на него исподлобья.</p><p class="p1">— Ну?</p><p class="p1">«Что — ну?» — чуть было не спросил Тихонов, но вовремя одумался. Он решительно шагнул к девушке, стягивая через голову свитер.</p><p class="p1">Уже потом, когда Тихонов вспоминал события той ночи, он не мог припомнить ничего конкретного: только ощущение, будто у него выросло восемь рук, четыре ноги, три хвоста и один хобот. Казалось, что в постели их было не двое, а целая куча тел, колотящихся друг о друга в четком, связном движении — как детали механизма в одиннадцатом цеху-ху-ху. В общем, когда обессилевший Тихонов откинулся на подушку, у него действительно было такое чувство, будто его затянуло в огромную машину и выплюнуло, пропустив сперва через все шестеренки.</p><p class="p1">— Ну ты даешь! — выдохнул он.</p><p class="p1">— Кому даю, кому и нет. А чего?</p><p class="p1">— Ничего. Неожиданно просто.</p><p class="p1">— Ага. Врасплох, да? Но у тебя реакция хорошая, молодец. — Девушка устроила голову на его плече и смотрела куда-то в потолок. — Слушай, а у тебя подружка есть?</p><p class="p1">— Есть, — Тихонов не стал врать.</p><p class="p1">— Как зовут?</p><p class="p1">— Женя.</p><p class="p1">— О. И я Женя. Значит, считай, не измена.</p><p class="p1">Тихонов сомневался в правомерности такого оправдания, но на мораль сейчас сил не было. Изогнув шею, он посмотрел на нее. Вблизи она казалась старше, но какая разница? Все равно же они…</p><p class="p1">— Будешь про директора писать? — Женя дернула его за волос на груди.</p><p class="p1">— Ай! Буду, куда деваться.</p><p class="p1">— Да, деваться вам некуда. Жалко даже.</p><p class="p1">— Что тебе жалко?</p><p class="p1">— Да так. Не думай об этом.</p><p class="p1">Тихонов и сам не ожидал, что его хватит на второй круг. Впрочем, в этот раз было поспокойнее, даже с каким-то намеком на нежность.</p><p class="p1">— Курить будешь? — Женя соскользнула с кровати и ползала по полу, отыскивая куртку. Наконец нашла, достала пачку сигарет и протянула Тихонову. Он отказался, тогда она сама закурила, бесстыдно усевшись верхом на стул. Она казалась бодрой и свежей, будто ничего и не было. Несколько минут они молча смотрели друг на друга — она курила, он изучал ее.</p><p class="p1">— А ты знаешь, — Женя глубоко затянулась и выпустила дым к потолку, — а ты знаешь, что вас убьют?</p><p class="p1">— Я догадывался.</p><p class="p1">— Ты смотри, и правда умный, — удивилась девушка. — Даже жалко.</p><p class="p1">— Ты это уже говорила. Что жалко-то?</p><p class="p1">— Нет, ни черта не умный. Жалко вас.</p><p class="p1">Тихонов приподнялся на локте.</p><p class="p1">— Погоди. Ты что, серьезно?</p><p class="p1">Женя вдруг опять рассмеялась и закашлялась, хватанув дыма.</p><p class="p1">— Ну серьезно, серьезно! А похоже, что шучу?</p><p class="p1">— Вообще-то да.</p><p class="p1">— Нет. — Она встала и подошла к окну. — Говорю тебе, вы отсюда не уйдете. Секретный же завод, а вы там шастали.</p><p class="p1">— Подожди, подожди. Жень, но здесь же проходной двор, город открыт, люди ездят! Что, всех в расход?</p><p class="p1">— Люди ездят, только люди в одиннадцатый цех не ходят. Ты в одиннадцатом цеху был?</p><p class="p1">Тихонов кивнул.</p><p class="p1">— Ну вот. Чего же ты хочешь теперь? — Женя подошла к нему и села на кровать. — Напишешь, что им надо, не станут же они такой шанс упускать. А потом — опа! И нет мальчика. Ну что, не веришь? А зря. Что мне тебе врать-то? Ты пойми, они не злые. Просто выбора у них нет. Ну сам подумай — все отлажено, все работает. Москве до них дела нет — завод и завод, полураспроданный, половина помещений сдается всяким уродам, артисты изображают туземцев — сотни таких по стране. И никому не интересно. А тут ты приедешь к себе и начнешь всем рассказывать. Поедут комиссии, психологи, социологи, кто там у вас еще. И все рухнет! А Максим Леонидыч жизнь положил, чтобы все работало. Так что вас отпускать никак нельзя.</p><p class="p1">— Ну хорошо, а остальные наши? Они-то никакого секретного цеха не видели, их за что?!</p><p class="p1">— Ну ты смешной, — изумилась Женя. — Вы же вместе пришли. Что, одного убить, а остальные уйдут как ни в чем не бывало? Нет уж, вместе так вместе. За компанию, если хочешь.</p><p class="p1">— Я никак не хочу! Что это еще за средневековье? Я вообще в этот цех не просился! Он же сам меня позвал, — Тихонов почти кричал. — Сам все показывал, все рассказывал!</p><p class="p1">— Так а как бы ты писал тогда, если бы не видел?</p><p class="p1">— Да как-нибудь! Я же не хотел ничего этого вообще!</p><p class="p1">— Да? — Женя, прищурившись, посмотрела ему в глаза. — Точно не хотел? А может быть, все-таки хотел? Ты подумай. Если бы не хотел, разве бы тебя заставили?</p><p class="p1">— Жень… Это точно не розыгрыш? Это же не шутки, Женя! Это жизнь человеческая, нельзя же ее вот так…</p><p class="p1">— Можно. Еще и не так можно. Ты что, думал, у нас тут все игрушечное? Нет, все по-настоящему, это и есть жизнь человеческая.</p><p class="p1">«Да, — подумал Тихонов. — Здесь все настоящее. Даже у ненастоящего шамана настоящий череп. Интересно, наши черепа они тоже в реквизит пристроят?» Неприятный холод пополз от ног по всему телу.</p><p class="p1">— И что? Нам теперь вот так сидеть и ждать, пока за нами придут?</p><p class="p1">— Зачем же ждать? — возмутилась Женя. — Мужик ты или где? Действуй! Тебя жрут, а ты не давайся.</p><p class="p1">— Так ведь ты сама сказала, что нам нельзя отсюда уйти!</p><p class="p1">— Это им нельзя вас отпустить. Чувствуешь разницу? — Сигарета в Жениной руке истлела и погасла, но она будто не замечала. — А вам никто не запрещает сопротивляться. Нет такого закона, чтобы человек не сопротивлялся.</p><p class="p1">— Да? А убивать людей — есть закон? Черт с тобой, дай закурить.</p><p class="p1">— Держи. Такого закона тоже нет. Вот я и говорю — раз законов нет, вы равны.</p><p class="p1">Не то слово, как равны… Тихонов все-таки не верил до конца, что все происходит всерьез. Надо было срочно предупреждать остальных. Сколько у них времени, интересно? Пока он не напишет, их не тронут, уже хорошо. Но затягивать писанину до бесконечности тоже нельзя же. «А о том, что случилось с незадачливым фрезеровщиком, прекрасной формовщицей и хитроумным наладчиком, ты узнаешь завтра, о великий царь»… Надо бежать, и как можно скорее. Пока их не охраняют. Или…</p><p class="p1">Тихонов вскочил, подошел к окну и осторожно выглянул из-за занавески. За окном была непроглядная темень. Он медленно дошел до выключателя, вырубил свет и вернулся к окну. Теперь за стеклом проступили очертания деревьев, столбов… И неясный силуэт в тени: человек стоял, подняв голову, и спокойно смотрел прямо на Тихонова. Тот отпрянул, потом, вспомнив, что его в темном окне не видно, выглянул снова. Лица было не разобрать, но фигура показалась знакомой.</p><p class="p1">— Женя, там кто-то есть! — испуганно сказал он.</p><p class="p1">— Ну конечно есть. А то вдруг вы сбежите. Неплохой, кстати, вариант. Я бы на твоем месте сбежала.</p><p class="p1">— Да как же я сбегу, когда они следят?!</p><p class="p1">— Когда не следят, любой дурак сбежит. Вы там в вашем Кожине совсем разбаловались, — фыркнула Женя.</p><p class="p1">— Я не из Кожина, а из Пышвы.</p><p class="p1">— Пышва, Кожин, какая разница? Если не пошевелишься, то уже ни туда, ни туда не попадешь. Будет жалко.</p><p class="p1">— Жалко, жалко! Ни хрена тебе не жалко! Ты че пришла, а? Поиграться напоследок, да? — Тихонов почувствовал себя изнасилованным, и это было даже обиднее, чем мысль о смертельной угрозе. — Если жалко, скажи, что мне делать теперь.</p><p class="p1">Женя глубоко вздохнула и посмотрела на него с любопытством.</p><p class="p1">— Слушай. Просто так вам уйти не дадут. Там же посты на всех выездах. Но есть железка.</p><p class="p1">— Железная дорога? Но там же тоже пост, мы к вам так и пришли.</p><p class="p1">— Вы ногами пришли, а я про поезд говорю. Они же отгрузки делают. Можно попробовать спрятаться в поезде. А можно в ящиках — там такие ящики, где мелкие детали. А можно еще снизу под вагоном. — Женя оживилась. — В кино так делают. А еще можно убить машиниста и самим вести паровоз. Ты умеешь водить паровоз?</p><p class="p1">Тихонов не ответил. Кино она насмотрелась, вот что. Убивать никого он не собирался, конечно, но с поездом была идея неплохая. Когда они вышли к заводу, он видел, что рельсы там ветвятся и разбегаются в разные стороны — интересно, куда они ведут? Хотя какая разница? Главное — выбраться отсюда. А если они ведут к таким же закрытым заводам — получится шило на мыло? Но можно соскочить по дороге. Выпрыгнуть на ходу. Вообще, убивать машиниста не обязательно, можно просто связать… Тут Тихонов понял, что сам немного увлекся. И все-таки это был шанс… Он принялся выспрашивать Женю: выходило, что это план вполне осуществимый — в собственности завода был один тепловоз, который увозил что-то раз в месяц и возвращался, привозя что-то другое. Погрузки и выгрузки держались в секрете, но никто особенно ими и не интересовался, так что ничего там не охраняли, по большому счету. Очередная отгрузка была назначена как раз на завтрашнее утро — времени на подготовку побега было всего ничего, но это было всяко лучше, чем оставаться тут на неопределенный срок. Тихонов подробно записал в блокнот все этапы, предшествующие отправлению поезда, а Женя нарисовала ему план завода, отметив все важные точки.</p><p class="p1">— Откуда ты все это знаешь?</p><p class="p1">— Да так, рассказывали.</p><p class="p1">— Кто?</p><p class="p1">— Дед Пыхто. Ревнуешь, что ли? — Женя повела плечом.</p><p class="p1">— Если и ревную, то что?</p><p class="p1">— А ничего. Мне нравится. Значит, тебе не все равно.</p><p class="p1">— Тебе тоже не все равно, получается? Раз ты мне помогаешь. — Тихонов провел рукой по бедру девушки.</p><p class="p1">— Просто это по-честному. Раз уж я знаю, как можно сбежать, почему бы мне тебе не рассказать?</p><p class="p1">Тихонов убрал руку и сел в кровати.</p><p class="p1">— Что же, ты и им расскажешь, что мы собираемся удрать на вашем товарняке? Ну, раз уж ты это знаешь…</p><p class="p1">Женя задумалась.</p><p class="p1">— Вообще-то это было бы по-честному. Чтобы вы были на равных. А вы бы знали, что они знают, и могли придумать что-то другое.</p><p class="p1">На этот раз Тихонов и не подумал, что она шутит — нет, она была серьезна и в самом деле, видно, раздумывала, честно было бы или нет сдать их кому надо. Он уже понял, что она живет по каким-то собственным законам, в своих представлениях о справедливости, и если бы она сейчас прямиком отправилась к директору, это даже не было бы доносом — такого понятия для нее просто не существовало: существовало только уродливо извращенное представление о равенстве и справедливости… И было еще другое: так ей было интереснее. Как будто она придумывала приключенческий фильм, в котором герой не может так запросто взять и сбежать из-под стражи, его обязательно должны поймать за ботинок, когда он уже перелезает забор, иначе нет интриги, нет саспенса, и зритель, он же в данном случае и режиссер, начинает зевать и в конце концов засыпает. Такое положение дел Тихонова никак не устраивало — он не хотел участвовать в ее идиотском кино, он просто хотел домой, к своей, той Жене, которая не выдумывала бы никаких сюжетов, а, окажись на месте этой девицы, сама бы отвела их к поезду, отвлекла охрану и даже, возможно, сама связала бы машиниста. Тихонов посмотрел на эту Женю, и ему стало почти противно. Сдаст ведь, точно сдаст, если решит, что это украсит сценарий… Но в сценарии у одной стороны шансы всегда чуть больше…</p><p class="p1">— Ну хорошо, — сказал он, изо всех сил стараясь сохранять спокойствие в голосе. — Давай рассуждать. Они собираются нас убирать. Один-ноль. Мы об этом знаем. Один-один. У нас есть план. Один-два. Если ты им расскажешь наш план, будет два-два, но у них все равно преимущество: их больше и они на своей территории. Так что это получится по факту два-три, а это уже не совсем по-честному…</p><p class="p1">— Молодец, — сказала Женя. — Принцип ты понял, но меня не убедил.</p><p class="p1">— А что сделать, чтобы тебя убедить?</p><p class="p1">— Ну… Тебе не обязательно меня убеждать. Вообще-то, я зря тебе подсказываю, ты уже должен сам соображать. Но ладно: ты мог бы меня, скажем, убить. Тогда я уже никому ничего не расскажу.</p><p class="p1">— А ты вот так просто мне советуешь, да? — Тихонов готов был истерически заржать.</p><p class="p1">— Не так уж просто. — Женя дотянулась до своей куртки и достала из внутреннего кармана нож — самоделку с наборной рукояткой. Она сидела, настороженно глядя на Тихонова и держа нож перед собой, как будто и вправду ждала, что он сейчас бросится на нее. — Ты можешь попытаться, но это не значит, что я легко сдамся.</p><p class="p1">Эта игра порядком надоела Тихонову. Он встал с кровати, под пристальным взглядом девушки — она так и не опустила нож — собрал с пола ее одежду и бросил ей на колени.</p><p class="p1">— Иди, Женя. Спасибо тебе, что все рассказала. Дальше мы сами.</p><p class="p1">Тихонов ожидал, что она будет разочарована, но вместо этого с удивлением заметил в ее глазах интерес.</p><p class="p1">— Что, вот так отпустишь меня?</p><p class="p1">— Да, Женя. Вот так и отпущу.</p><p class="p1">— А если я им расскажу?</p><p class="p1">— Не расскажешь.</p><p class="p1">— Откуда ты знаешь? — Женя все еще держала нож, но уже не так агрессивно.</p><p class="p1">— Я не знаю. Но так интереснее.</p><p class="p1">Тихонов врал, конечно, но врал с расчетом.</p><p class="p1">— Тебе интереснее гладиаторские бои, а мне, если хочешь, шпионские игры, — продолжал он, одеваясь. — Я буду играть по своим правилам. — Тут он подумал, не перегнул ли с пафосом, но с Женей, кажется, перегнуть было невозможно. — Может быть, мы убежим на поезде. А может, нет. Этого я тебе не скажу, пожалуй. Может, мы останемся здесь и сами всех убьем. Тебя же я не хочу убивать, потому что если мы всех убьем и захватим здесь власть, я сделаю тебя своей наложницей — во всяком случае, я рассматриваю такую возможность. Но тебе никто не запрещает сопротивляться. Тогда я стану принуждать тебя силой, а ты можешь заколоть меня во сне или же, напротив, покончить с собой, не вынеся позора. Видишь, как я честен с тобой? Ну что, понял я принцип?</p><p class="p1">Женя несколько секунд молчала, а потом расхохоталась, но была в ее смехе на этот раз нотка неуверенности. Она вскочила и быстро оделась — неловко, одной рукой, в другой по-прежнему сжимая нож и не сводя с Тихонова глаз.</p><p class="p1">— Ты странный. Может быть, я и не буду сопротивляться.</p><p class="p1">Тихонов подошел к ней, жестом Бонда отодвинув ее руку с ножом (сердце его панически колотилось, и до бондовского хладнокровия ему было далеко) и театрально присосался к ее губам.</p><p class="p1">— Ну, иди. Может, еще увидимся, — сказал он, отвернувшись от нее — хотел красиво отвернуться к окну, но получилось, что к стене, делать было нечего, и он стал задумчиво смотреть в стену. За его спиной хлопнула дверь. Тихонов рухнул на кровать, все у него внутри мелко и стыдно дрожало, и чувство реальности улетучилось окончательно. Краем сознания он понимал, что все понарошку, но за этим краем всегда бездна, в которой все по-настоящему, и в некоторые минуты это становится до того ясно, что изо всех сил хочется себя почувствовать читателем, сторонним наблюдателем. А ничего подобного, все с нами и сейчас. Жизнь, в сущности, и есть завод, производящий в промышленных количествах это неприятное ощущение.</p></span></span>
