<span><span id="id43"><div class="title6">
<p class="p">4</p>
</div><p class="p1">Савельев уронил телефон в карман и беспомощно обвел взглядом всю компанию. Вид у него был растерянный и виноватый.</p><p class="p1">— Что там? — встревожился Валя. — С мамой что?</p><p class="p1">Савельев только помотал головой.</p><p class="p1">— Ну так что же? — продолжал Шухмин, будто ничего не заметив. — Пойдем? Я отведу, все покажу.</p><p class="p1">— Нет, — сказал Савельев. — Нам пора.</p><p class="p1">Идея была вовсе негодная — еще стоял день, но через несколько часов начнет темнеть, и куда ему приспичило на ночь глядя? Дубняк не терпел идиотского поведения в тайге, потому что прекрасно знал, чем заканчиваются шутки с ней. Нет, он-то мог найти дорогу в любых потемках, что и доказывал неоднократно, но, во-первых, он не поручился бы за остальных, а во-вторых… Во-вторых, его просто бесило, что он тут не главный — от этого чувства он отвык еще в старших классах. Но тут, так уж случилось, главным был именно Савельев.</p><p class="p1">— Ладно, — сказал он, даже не пытаясь спрятать раздражение. — Куда идем на этот раз?</p><p class="p1">— Домой, — сказал Савельев.</p><p class="p1">Дубняк внимательно посмотрел на него, затем на остальных. На лицах Вали и Тихонова читалось облегчение, Окунев тоже выглядел обрадованным, глаза Даши не выражали ничего, во всяком случае ничего понятного Дубняку. Старик Шухмин глядел колюче и настороженно.</p><p class="p1">— Чего вдруг? — спросил Дубняк. — Стух? Мы же тут что-то искали, не?</p><p class="p1">— Искали, искали, — закивал Шухмин. — И нашли. Вот же, я говорю, все покажу.</p><p class="p1">— Спасибо, не надо, — ответил Савельев. — Мы уже ничего не ищем.</p><p class="p1">Дубняк вскочил, схватил Савельева за рукав и оттащил от костра.</p><p class="p1">— Что такое?</p><p class="p1">— Сам пока не понял. Сестра позвонила, говорит, всех нашли.</p><p class="p1">— Где?!</p><p class="p1">— Не знаю пока.</p><p class="p1">Дубняк чувствовал, что Савельев врет, все он знает, но это было неважно. На него навалилось вдруг тупое разочарование. Почему-то мысль о возвращении в город показалась ему до тошноты противной, и сам город — противным, хотя он и так проводил там мало времени, постоянно водя по тайге молодежь, но теперь и эта дурацкая, ничего не понимающая молодежь тоже вызывала отвращение. Он всегда к концу похода ощущал что-то подобное, но сейчас это было необычайно остро и ясно. Хотя раньше ему случалось бывать в лесах месяцами, но именно за эти несколько дней — тьфу, всего ничего, и не поход даже, а так, прогулка — за эти несколько дней он так привык быть здесь не посетителем, а местным, что дальнейшую жизнь в Пышве представлял с трудом. И дело было не в тайге — или не только в тайге. Дело было в том, что в ней обнаружился другой мир, и не один, а если их тут много, то какой-то из них просто обязан оказаться созданным для него, по его, дубняковскому, лекалу. И он хотел ходить здесь еще и еще, искать свою идеальную жизнь, но вот теперь, когда она так близка, буквально, он чувствовал, за соседней елкой, они должны возвращаться.</p><p class="p1">— Тогда собираемся, пока светло, — горько сказал Дубняк, вернувшись к костру. — По дороге все расскажем.</p><p class="p1">Шухмин уже исчез. Валя, Окунев и Тихонов прекратили перешептываться и начали, оглядываясь на Савельева, собирать разобранные было вещи. Дубняку ничего собирать не надо было, у него всегда все было в таком порядке, чтобы подхватить и пойти. Краем глаза он видел, как Савельев, отведя Дашу к краю поляны, что-то ей горячо объясняет, машет руками, то и дело, будто случайно, трогая ее. Он плюнул и развернул карту — надо было выстроить маршрут. По карте выходило, что идти до соседней деревни с говорящим названием Долгие Концы совсем недолго, а там уже ходит автобус. Вполне можно было до ночи добраться.</p><p class="p1">— Ну, шевелитесь, — крикнул он, желая, если уж нельзя тут остаться, так хотя бы не травить душу и поскорее все закончить. — По темноте же пойдем!</p><p class="p1">Вещи были собраны, и вся группа стояла перед ним. Савельев держал Дашу за руку.</p><p class="p1">— Даша идет с нами, — объявил Савельев.</p><p class="p1">«Ну вот. Этот хоть бабу нашел», — подумал Дубняк, и хорошо еще, что он не знал об эротических приключениях прочих участников экспедиции, а то бы совсем огорчился.</p><p class="p1">— Да мне похеру, — грубо ответил он. Он всегда становился грубым, когда был расстроен — или пьян, как вы уже знаете.</p><p class="p1">Они шли через остывающий бурый лес, все существо которого ожидало уже вечера и зимы, тишины и темноты, жадно добирая лучи тепла и света, еще не последние и даже не предпоследние, а те, что предваряют их, самые грустные, потому что движение к финалу и вполовину не так печально, как ожидание перед началом движения. Тайга дышала ровно и размеренно, это было спокойное дыхание не засыпающего, а готовящегося ко сну. Дубняк уверенно двигался вперед, не сверяясь ни с картой, ни с компасом, со всеми этими глупостями — он не умел слушать телом, как лесная Даша, но за годы научился и свою примитивную аппаратуру настраивать тончайшим образом, и сейчас он принимал сообщения, посылаемые в другой, более тонкий эфир, какой не поймаешь через радио: голос бурелома, голос подземных пустот, дрожащий плач молодой лисицы, находившейся за километры отсюда, тягучий шепот воды и гулкий звон возвышенности. На самом деле по этим сигналам он знал, куда идти, без всяких карт, но привычка к бумаге сохранилась с тех пор, когда он был еще юн и умел ловить только сигналы больших гор и рек.</p><p class="p1">В этот раз к привычным сигналам примешивался еще один, который Дубняк порой слышал и раньше, но никогда — с такой ясностью. Сейчас он полноправно звучал в общей гармонии, но скорее контрапунктом, ясно было, что это нечто, не совсем родственное всему остальному, но и не чужое, вроде троюродного брата, а скорее даже шурина или деверя, такое косвенное, но все же родство, никуда не денешься. Впрочем, деваться и не хотелось — это был сигнал спокойствия, силы, простоты. Дубняк не знал, что это, но знал, что оно им не вредит, а помогает, и, пока эфир наполнен этими волнами, никому из них ничто не угрожает.</p><p class="p1">Вечер наползал на лес, еще не темнело, просто вдруг стало чуть меньше света, чуть острее обозначились сухие ветви деревьев, четче стали звуки, как будто теперь им не надо было пробиваться через густой свет — прозрачность, которая длится только несколько мгновений перед сумерками. Но идти оставалось уже недолго, всё они успевали, и Дубняку было от этого грустно. Он остановился и провел рукой по бархатному от лишайника стволу — голос кедра был тих и безопасен. Это все ерунда, что кедры звенят, их звук совсем другой: пуховое облако, кроличий мех, лепесток, бабочка — вот был звук кедра, и Дубняк любил его больше многих других. Но надо было идти дальше, тем более что все выжидающе смотрели на него, и он двинулся было, но вдруг услышал сигнал, которого не ожидал никак: густой зов болотистой низины прямо впереди. Карта ни о какой низине не сообщала, но не это тревожило Дубняка — он привык к такому, карты вообще часто врали. Но этот голос возник только что, прежде его не было, а значит, не было и самой низины.</p><p class="p1">— Что там, Толь? — голос Тихонова прозвучал резко и некрасиво, что было немудрено.</p><p class="p1">Дубняк не отвечал, прислушиваясь — край леса был совсем рядом, дальше холм, потом пустошь. Пустоши он слышал хуже и не знал, луг это или поле, что на нем растет, но за пустошью, несомненно, уже лежала деревня. И все же сначала была низина — небольшая, неопасная, только вот странно возникшая в прямом смысле на ровном месте. Обходить ее было долго, Дубняк не мог нащупать ее краев, так что путь был один — идти через нее. В конце концов, он мог ошибиться и не разобрать раньше: даже самая надежная аппаратура дает сбои, а тут — всего лишь человек, к тому же человек грустный. Дубняк отпустил кедр и повел группу вперед.</p><p class="p1">В воздухе так и держалась предсумеречная ясность, вопреки законам природы и здравого смысла — уже время было для наступающей темноты, а она все не шла, давала людям возможность выйти из леса и завершить путешествие — как честный работник засиживается допоздна в пятницу, чтобы не оставлять проект на понедельник. В этой светлой прозрачности они дошли до низины и спустились в нее — Дубняк безошибочно нашел проход, где почва была твердой. Внизу бежал ледяной ручей, подмывавший корни редких деревьев — здесь вообще деревьев было мало. Зато — и это Дубняк услышал отчетливо — тот не опознанный им сигнал звучал здесь в полную силу, окутывая стволы, вплетаясь в шелест ручья, проникая в тело через кончики пальцев.</p><p class="p1">Они перешли ручей по упавшему, как специально, стволу и полезли наверх — этот склон был круче и выше, но ровно настолько, чтобы по нему, хоть и с трудом, можно было подняться. Деревьев становилось все меньше, и вскоре они исчезли совсем, сменившись отдельными низкими кустами с темными листьями и желтыми ягодами. Цепляясь за кустарник, они выбрались на вершину холма, заросшую высоким пересохшим сорняком.</p><p class="p1">— Смотрите! — закричал Валя. — Дома!</p><p class="p1">Там действительно были дома, а левее они заметили и желтую ленту дороги, выбегающую из леса и ведущую к деревне. Забыв про все на свете, они кинулись к дороге, ломая стебли и цепляя на одежду репьи. Дубняк не бежал — он медленно шел следом по кромке холма, который делался все круче со стороны леса, превращаясь в настоящий обрыв. «Скользко», — подумал Дубняк и в ту же секунду почувствовал, как нога поехала, проваливаясь в пустоту: он шлепнулся набок и поехал вниз.</p><p class="p1">Оказавшись на дне, он встал и ощупал себя — удивительно, но руки-ноги целы, только несколько синяков будет да кожа на руках ободрана кое-где. Падать с такой высоты с такими незначительными последствиями ему еще не доводилось. Он понял — это тот самый сигнал, который жил здесь, спас его. Или не сам сигнал, а то, что его транслировало. Он его слышал — теперь в нем слышалось и торжество, но не злорадное, а искреннее, счастливое торжество, исключительная гармония полного счастья. Дубняк расхохотался, запрокинув голову. Ему навстречу бесшумно шагнуло существо огромного роста, покрытое бурой густой шерстью. И никакой вины Дубняк не ощущал — то ли он вправду был безгрешен, то ли йети знал, что он и так не собирается никуда уходить, и не включал свой излучатель. Йети тоже запрокинул крупную мохнатую голову и запел на одной высокой ноте — видимо, это означало у него смех.</p><p class="p1">Песню услышали оставшиеся наверху — до этого момента потери бойца отряд так и не заметил. Только теперь, остановившись, они увидели, что Дубняка нет. Через секунду все стихло. Сгрудившись у края обрыва, они посмотрели вниз. Снежный человек не спеша уходил в глубину леса, неся на плече Дубняка. В другой руке он держал хворостину, сделанную, видимо, из средней березки.</p><p class="p1">Откуда-то справа послышался трубный рев и треск деревьев. Мохнатый коричневый гигант с длинным хоботом и закрученными бивнями осторожно переступал ногами-колоннами. Йети крикнул жалобным грудным голосом, взмахнул хворостиной, и мамонт послушно повернул в лес. А потом послышался еще другой звук, который узнал только Савельев, — это была та нечеловеческая музыка, которую он принял в последнюю ночь в «Лосьве». Из-за крон поднялась летающая тарелка — огромная серебристая махина, вся переливающаяся красными и зелеными огоньками. Из-под тарелки выстрелил широкий сиреневый луч — он упал на йети и мамонта и двигался, освещая им дорогу. Тарелка была совсем близко, и они могли разобрать буквы и цифры на ее борту. Но что они означали, понял только один человек. А кто и что понял, вам знать не надо.</p><p class="p1">Йети и мамонт шли, как будто так и положено от века, как будто это вечное их занятие — пасти и пастись, как будто им обоим тут самое место. Желтоватый закат кротко угасал над ними, и ничего на свете не было гармоничней этой картины — йети с Дубняком на плече, мамонт, трусивший рядом, и тарелка наверху. Всего этого не могло быть по отдельности, но вместе они образовывали единственно возможный образ России, где все очевидности лгали, и только несбыточности были абсолютно надежны.</p><p class="p1">Темнота устала сдерживаться и развернулась над ними, как пружина, быстрым и плавным движением объяв все вокруг. Какое-то время еще был виден свет от тарелки, но потом и он утонул в тайге.</p></span></span>
