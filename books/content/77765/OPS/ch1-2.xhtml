<span id="id1"><div class="title1">
<p class="p">Глава первая</p>
<p class="p">Союз пяти</p>
</div><span id="id2"><div class="title2">
<p class="p">1</p>
</div><p class="p1">9 сентября радиолюбитель Игорь Савельев поймал сигналы с пропавшего самолета «Ан-2».</p><p class="p1">Вышло это так: в час ночи, любимое свое время, когда еще не тяжелеет голова, он сидел у себя в гараже, где была оборудована отличная любительская радиостанция с японской комплектацией, с позывным R9C8WN, где R обозначала Россию, 9 — Свердловскую область, 8W — город Пышва, а что обозначала N, вам пока знать не надо.</p><p class="p1">В час ночи на частоте 145,17, которая на его памяти сроду не использовалась, он услышал громкий и трагический женский голос, сказавший ему:</p><p class="p1">— Отец, молись за меня.</p><p class="empty-line"/><p class="p1">Радиопоиском Савельев занимался ровно полжизни и к тридцати годам был перворазрядником с перспективой кандидатства, со второй категорией и десятком грамот. В обычной жизни он работал ортопедом и профессию эту не любил, потому что приходилось иметь дело с людьми. Если бы можно было исцелять без личного контакта, по перечню жалоб, анализу и снимку — ему бы не было цены, и работа была бы ровно по нему; но иметь дело с людьми, их страхами и запахами (чем сильней страх, тем хуже запах) Савельев не хотел. Именно поэтому он до сих пор не женился, а случайные связи у него длились недолго. Специалистом он считался хорошим, поскольку чем меньше и жестче врач разговаривает, тем больше его чтут, — но перебираться из Пышвы хотя бы в Екатеринбург не собирался. Зачем, когда в гараже к его услугам был весь мир, причем в лучшем виде? Этот мир был лишен запаха, плоти, унизительной физиологии — он уже перешел в высшую форму существования, чем все мы когда-нибудь кончим, как позитивы, негативы и кассеты закончились цифрой. Высшая цель человечества — перевод себя в информацию; Савельев это знал, но никому не рассказывал.</p><p class="p1">В России порядка 50 тысяч настоящих радиолюбителей, дело это тонкое и требующее глубокой нелюбви к тому, что обычно называют жизнью. Радиолюбитель — человек без быта и сам в некотором смысле волна. У Савельева были друзья в Таиланде, Мексике, Японии и даже один друг в России, со странным позывным, относительно которого просил не расспрашивать: как известно, в региональной русской номенклатуре нет пятерки, но у этого странного собеседника почему-то была. Наверное, что-нибудь секретное. Личные тайны не волновали Савельева, поскольку он любил загадки высшего порядка: аномальные зоны, таинственные исчезновения туристических групп и одиноких странников, порталы в соседние миры.</p><p class="p1">В освоении всякой науки есть три уровня: неофита интересуют тайны, профессионал знает, что никаких тайн нет и у всего на свете есть материалистическое объяснение, а специалист понимает, что за всеми материалистическими объяснениями стоит тайна превыше людского понимания. Лучше всего эту аналогию понимают водители. Начинающий водитель понятия не имеет, как машина ездит, и в случае неполадки в лучшем случае подкачивает колеса, а в худшем очищает пепельницу; профессионал может разобрать свой автомобиль до последнего винтика и даже, случается, собрать обратно, — ас знает про машину все и все-таки не понимает, почему она ездит. Савельев был ас.</p><p class="p1">Короче. В час ночи женский голос ему сказал:</p><p class="p1">— Отец, молись за меня.</p><p class="p1">Это явно не был фрагмент милицейских переговоров, прослушиванием которых Савельев баловался еще в девятом классе, и уж тем более не диалоги «Скорых». «Летуны», как называют отряд рисковых радиолюбителей, ловящих переговоры летчиков с диспетчерами, работают преимущественно в диапазоне от 117 до 136. Мобильной связью тут тоже не пахло. Это было черт знает что такое. Савельев насторожился, включил запись и стал настраиваться. Через три минуты та же частота сказала сиплым мужским баритоном:</p><p class="p1">— Повторяю: колхоз имени (захлеб, бульканье). Семьдесят километров от Перова. Приходите, поздно будет. Повторяю: поздно!</p><p class="p1">Голос заглушили помехи, и, как Савельев ни вслушивался, ничего, кроме шума и треска, слышно не было еще долго. Потом сквозь шум снова прорвался голос, но прежний или другой, Савельев не понял. Говоривший не представился, не назвал позывного. Голос прокричал:</p><p class="p1">— Р-восемнадцать больше нет! Л-двадцать пять стыкуется с Б-десять. Р-восемнадцать нет. Нужны кашки, без кашек все пропало.</p><p class="p1">И все действительно пропало, утонуло в помехах.</p><p class="p1">Р-18 — сталь для режущих инструментов, у кого-то она закончилась, что ли? Но почему в эфире? А Л-25? Что-то знакомое… Модель танка? Или самолета? Но с кем они стыкуются? Савельев понял только, что неведомые кашки вряд ли были едой. Но ассоциации заработали, захотелось есть. Приемник молчал, и Савельев уже полез было на полку за консервами, как вдруг услышал еще один голос, явно принадлежавший человеку немолодому. Медленно, разделяя слова, голос произнес:</p><p class="p1">— Земля. Медведь. Человек. Быстро. Асимптота. Корабль. Бог. Котлета.</p><p class="p1">Затем то же самое повторилось по-английски. Это напоминало шифр или бред. Первый вариант был лучше, конечно, но в эфире нередко встречался и второй — Савельев чего только не наслушался за годы. Теперь вообще эфир был уже не тот, любой школьник мог купить AOR-3000 и творить на волнах что угодно. Малолетние хулиганы, откровенное хамье, психи всех мастей… Однажды Савельев даже подслушал переговоры домушников — через мат-перемат взломщики договаривались с теми, кто стоял на стреме.</p><p class="p1">Но говоривший не шутил, это было слышно. Савельев закурил и, продолжая вслушиваться в замолчавшую опять частоту, стал крутить в голове бессвязные слова. Он выписал их в аппаратный журнал, но без ключа шифр оставался бредом. Можно еще было объединить землю и медведя, но Бог и котлета? Савельев так погрузился в раздумья, что вздрогнул, когда приемник снова заговорил. Мужской голос доложил быстро и нервно:</p><p class="p1">— Самолет упал. Пилот мертв. Второй мертв. Еще двое ушли, не знаю, живы ли. Медведи вокруг. Атаман сказал, патронов больше не будет. Он видел, знает, он подтвердит. Охотники ушли за теми двумя. Пилот мертв. Ищите нас…</p><p class="p1">Тут голос пропал, но почти сразу пробился вновь, уже почти крик:</p><p class="p1">— …люции! Семьдесят…</p><p class="p1">И смолк уже окончательно. Савельев еще послушал, но все зря. Тем не менее переключаться не хотелось — словно уходом с частоты он отнимал у бедствующих последний шанс. Сна не было ни в одном глазу. Самолет — очевидно, несчастный «Ан-2», два месяца назад вылетевший из Перовского аэропорта (аэропорт — одно название, раздолбанная полоса, пыльная крапива в асфальтовых трещинах, три с половиной машины в дырявом ангаре), вез каких-то местных чиновников, что ли, в отдаленные уголки на политпросветительскую работу — да так и пропал с концами. Тогда его поискали-поискали, ничего не нашли, как сквозь землю провалился, и к сентябрю почти забыли. Савельев, правда, не забыл, но у него была своя причина.</p><p class="p1">Приемник все равно молчал, так что Савельев отключил запись и прослушал все подряд, подробно несколько раз прокрутив неразборчивые куски — но они и остались неразборчивыми. Он задумался. Пилот мертв, сказал последний голос. Еще двое, скорее всего, тоже. Что за атаман? Сколько там вообще народу было? Савельев не помнил. А что такое тогда «Р-18» и «кашки»? Ясно одно — люди живы, и людей надо спасать.</p><p class="p1">Порывшись в ящике стола, он извлек карту области и нашел Перов. В радиусе семидесяти километров населенных пунктов было мало — глушь, тайга. Колхоз? Заброшенных колхозов имелось полно, на разных стадиях запустения. На картах, разумеется, их никто не обозначал. Последний и первый голос, очевидно, говорили об одном: и там, и тут звучало «семьдесят». Семьдесят километров от Перова, колхоз имени… Революции? Скорее всего, не поллюции же. Может, они говорят, что выйдут к людям только через семьдесят лет после революции?</p><p class="p1">Тут Савельев кинулся в угол, разбросал сваленные кучей тряпки, книги и прочий хлам и вытащил здоровый фанерный ящик. Там хранились вещи отца — остались в гараже после его смерти, выкидывать рука не поднялась. «Москвич» сгнил на стоянке, а мелочь осталась, Савельев свалил все в ящик, освобождая место для аппаратуры, да и задвинул в угол. Там, помнил он, был и старый автодорожный атлас.</p><p class="p1">Точно! Был тут колхоз имени Шестидесятилетия Революции. Не в семидесяти, а примерно в сорока километрах от Перова — но, может, у них там вся навигация отказала. Не мог же колхоз переехать, не цыганский табор. И леса вокруг — в самом деле последний бастион цивилизации. Надо завтра в МЧС, куда еще? Ему немного жаль было делиться открытием. Но уж сам-то он мог претендовать на участие. Ему, в общем, плевать было, какие там чиновники и куда летели. Но Марину Лебедеву он помнил.</p><p class="empty-line"/><p class="p1">Савельев выскочил на улицу и подставил горящее лицо ночной мороси. Поэтому он не услышал, как приемник, немного потрещав, вдруг заговорил нараспев тихим женским голосом. Женщина чуть картавила:</p><p class="p1">— Как под черной горой там вода черна, как над черной рекой ходют три кота. Первый кот ийдет, все вокруг заснет, второй кот ийдет, все вокруг умрет, а как третий ийдет, все вокруг оживет.</p></span><span id="id3"><div class="title2">
<p class="p">2</p>
</div><p class="p1">МЧС располагалось на улице имени пыжвинского уроженца, чекиста Журавлева, в одном сталинском доме с управлением ФСБ. Был вторник, Савельев работал с трех, почему и мог засиживаться ночью в гараже, — и, толком не выспавшись, к десяти утра с записями сигналов на флешке пошел докладывать. Дежурный выслушал его без эмоций и отвел к начальнику поисково-спасательной службы.</p><p class="p1">— Кгхм, — сказал тот. — Ну, вы оставьте, я послушаю, конечно.</p><p class="p1">— Но там… там действовать надо, — неуверенно предложил Савельев. Он не умел давить на собеседника, тем более военного.</p><p class="p1">— Если надо, будем действовать, — объяснил начальник. — Вам спасибо, дальше нам видней.</p><p class="p1">— Я просто хотел… как-то поучаствовать, возможно…</p><p class="p1">— Ну зачем же вы будете участвовать? — спросил начальник со снисходительной интонацией родителя, отговаривающего ребенка трогать каку. — И вообще. Вот вы радиолюбитель. Скажите, какая рация будет работать три месяца спустя?</p><p class="p1">— Два, — поправил Савельев.</p><p class="p1">— Ну два. Уже ходили тут люди, родные. Им кто-то из пассажиров с мобильника позвонил. Позвонил и молчит. Если бы они были живые, они бы звонили, так? А если они не звонят, то это мишка, значит, перевернул кого-то и мобильник включил. Как вы себе представляете, что два месяца нет сигналов, и вдруг есть на неизвестной частоте?</p><p class="p1">— Может быть, они починили рацию, — предположил Савельев.</p><p class="p1">— Они ее два месяца там чинили, так? В летнее время, в сравнительной близости от колхоза, они ее там чинили, вместо чтобы идти к людям? Сорок или сколько там, семьдесят километров, три дня пути даже с ранеными, они ее там чинили, питались святым духом, а в колхоз не пришли? Это я не понимаю тогда. Разве что у них ум отшибло совершенно.</p><p class="p1">Савельев молчал. Рациональной версии у него не было.</p><p class="p1">— Ну я буду слушать, в общем, — пообещал поисковик.</p><p class="p1">— Я только хотел сказать, — не отставал Савельев, понимая, что вопрос о его участии решится сейчас, дальше будет поздно. Во всех разговорах с начальством надо решать проблему с самого начала, дальше она застынет, как бетон, и будет не пробиться. — Я хотел бы участвовать. Я поймал сигналы, имею право.</p><p class="p1">— Это все решим. Надо вообще смотреть, какая там экспедиция, какой колхоз и что. Мы вокруг Перова смотрели, вы что же думаете. Летали там, видели все. Если бы что-то было, уже бы мы их давно. Но там никаких следов. Вообще голо.</p><p class="p1">Почему-то поисковику хотелось избавиться от Савельева как можно скорей. У него, как у большинства русских людей на должности, явно было дело поважней профессии, кроссворд, может быть, или чат, и этому делу он немедленно хотел предаться, а Савельев отвлекал его со своими поисками, с сигналами от чиновников, которых давно медведи съели, — сначала съели, а потом позвонили родне и молча признались, так и так.</p><p class="p1">— Мне когда зайти? — спросил Савельев.</p><p class="p1">— Через неделю вам зайти, тут же надо экспертизу и все.</p><p class="p1">— Неделю?! — взвился Савельев. — Там минуты на счету, они уже молиться просят!</p><p class="p1">— Тут знаете сколько просят молиться? — странно спросил поисковик. — Каждый второй.</p><p class="p1">Савельев вышел из МЧС под колкий дождь в крайнем недоумении. Эмчеэсник меньше всего был похож на офицера чрезвычайной службы. Ему явно хотелось замотать сигналы, и это совсем не совпадало с тем, что говорили об их доблестном, авантюристическом ведомстве. Их называли единственными пристойными силовиками. Какую экспертизу сигналов могли они растянуть на неделю, чего искать? Савельев не знал, куда теперь податься, — разве что в ФСБ по соседству, — но вариантов не было, не самому же переться в колхоз. На следующую ночь он засел ловить сигналы, но ничего не было. Другие любители, с которыми он поделился открытием, энтузиазма не выказали.</p><p class="p1">— Там давно разрядилось бы все, — сказал коллега из Тбилиси.</p><p class="p1">— Но кого я поймал-то?</p><p class="p1">— Кого угодно. Дураков много.</p><p class="p1">— Вообще на «Анах» как раз РСИУ стоит, — вспомнил Савельев. — В диапазоне от 100 до 150.</p><p class="p1">— Да ладно, — отмахнулся коллега. — Это тебе сосед навел.</p><p class="p1">Остальные тоже не верили, и Савельев не стал распространяться о сигналах. Еще три ночи он их ловил безрезультатно, а на четвертую, когда до визита в МЧС оставалось всего два дня, в час ночи женский голос — не тот, прежний, трагический, а совсем еще детский, — вдруг сказал ему на той же частоте:</p><p class="p1">— Господи, и что будет, и как же я света не увижу.</p><p class="p1">— Алло! — заорал Савельев, но его явно никто не слышал. Это была непостижимая односторонняя связь.</p><p class="p1">Он слушал частоту до утра, переключался, курил и вдруг поймал себя на том, что ему страшно было бы выйти из гаража на улицу. Собственно, он никуда и не собирался, но когда обычно шел из гаража в дом — на рассвете или перед рассветом, — никакого страха не чувствовал, а тут, когда мир оказался населен непостижимыми несчастными голосами, несущими смешную и притом трагическую чушь, — ему стало не по себе. Тем более что он всегда знал о двойном дне простых вещей. Вот есть эфир, все знают и никто не понимает, что это такое. Савельев догадывался, что он как-то связан с эмоциями, а именно с грустью, как кислый вкус связан с электричеством. Пробуя языком батарейку — такое практиковалось во времена плоских батареек и электрических конструкторов, — мы чувствуем кислоту, а если не чувствуем, она разряжена; так же и эфир был непостижимым образом связан с печалью, она была разлита в мире и лучше всего передавалась. Эта мысль казалась бредом и самому Савельеву, но мало ли что казалось бредом наивным людям прошлого. Короче, ему было страшно, потому что невидимые люди вокруг него сильно страдали по непонятной причине. Так что в МЧС он пошел в понедельник, днем раньше, чем было ему назначено.</p><p class="p1">Поисковика не было, убыл — может, уже искал? Эта мысль была печальна, Савельев сам надеялся найти Марину Лебедеву, но если ищут — пускай. Дежурный, однако, сказал, что поисковик в школе, инструктирует детей насчет мер предосторожности перед туристическим фестивалем «Пыжвинская осень», будет через полтора часа. Он приехал через два, отынструктировав детей, видимо, до взаимной тошноты. При виде Савельева он широко заулыбался, словно теперь, после расшифровки и экспертизы, не было в МЧС гостя дороже.</p><p class="p1">— А, любитель! — крикнул он, заметив Савельева в коридоре. — Заходи давай.</p><p class="p1">Он вошел в кабинет, скинул куртку, уселся на стул и потер руки.</p><p class="p1">— Искатель, — сказал он. — Находитель.</p><p class="p1">Савельев не понял этой игривости.</p><p class="p1">— Ну чего там? — спросил он. — Ищете?</p><p class="p1">— Хо-хо, — сказал поисковик. — «Ищем»! Какое «ищем»? Звуковой эффект, отражение. Бывает. Это соседи твои по телефону говорят или теща.</p><p class="p1">— У меня нет тещи, — тупо возразил Савельев.</p><p class="p1">— Нет, так будет, — странным веселым голосом пояснил эмчеэсник.</p><p class="p1">Савельев никак не мог понять, с чего он так веселился.</p><p class="p1">— Я вообще-то перворазрядник, — сказал он обиженно, — скоро кандидат. И я никогда не слышал таких отражений.</p><p class="p1">— Ну а наши слышат, — радостно сказал поисковик. — Проверили и прослушали, ты что, все по первому разряду, как у тебя. Это отражение, вроде как оазис. Кто-то говорит, а к тебе занеслось. А это, может, вообще в Москве разговаривают или на Дону какой-то казачий атаман.</p><p class="p1">— Медведи на Дону?</p><p class="p1">— А что, и на Дону бывают. Степной медведь бурый, подхорунжий. Но про «Ан-2» ты забудь. Никакого отношения к «Ан-2», и там вообще другие люди были. Голосовая экспертиза имеется, я акт тебе могу предъявить.</p><p class="p1">— Хотелось бы, — возвысил голос Савельев.</p><p class="p1">— Чего хотелось бы?</p><p class="p1">— Голосовой акт.</p><p class="p1">— Ну я приготовлю тебе, — уже скучнее сказал поисковик. — Ты нудный какой-то, Савельев. Вот ты смотри. Ведь я же не говорю тебе, что ты сам все это записал. Я доверяю, так и ты доверяй. А между прочим, я мог бы тебя уже отправить, — он показал вверх, на третий этаж, где сидело ФСБ. — Уже я мог бы тебя туда. Сам знаешь, сейчас все эти ваши радио… Ты перерегистрацию прошел?</p><p class="p1">— Какую перерегистрацию? — Савельев даже отшатнулся.</p><p class="p1">— Ну какую-нибудь. Обязательно должна быть новейшая перерегистрация, а ты окажешься непрошедший. Или еще чего, они там найдут. Тебе надо?</p><p class="p1">В мозгу Савельева роились версии одна причудливей другой: поиск выявил секретные результаты, или все чиновники погибли и это надо скрыть, или крушение было подстроено ФСБ и раскрылось по чистой случайности, благодаря его радиолюбительству, или пропавшее чиновничество чем-то провинилось, так что теперь и черт бы с ним. Он привлек внимание к этой истории, а поисковику это было совсем некстати.</p><p class="p1">— Но люди же, — начал он, понимая всю бесполезность спора.</p><p class="p1">— Ну люди, да, — сказал поисковик. — Везде люди. Радиопередача «В гостях у сказки». Ты только знаешь что, искатель? Ты не рассказывай много про это дело. С тебя смеяться будут, как ты голоса слушаешь. От меня тебе благодарность, от всех нас, и будь спокоен.</p><p class="p1">— Хорошо, — сказал Савельев очень спокойным голосом. Сестры и пациенты, сколько-нибудь его знавшие, поняли бы, что этот спокойный голос ничего хорошего не предвещает, но эмчеэсник с ним не работал и в людях не разбирался.</p></span><span id="id4"><div class="title2">
<p class="p">3</p>
</div><p class="p1">Теперь надо прояснить связь между Игорем Савельевым и пропавшей руководительницей «Местных» Мариной Лебедевой, двадцатилетней активисткой-общественницей, улетевшей с компанией больших боссов якобы встречаться с массами, а на деле париться в баньке. Вся верхушка перовского отделения «Инновационной России» явилась в шесть вечера на аэродром и потребовала борт. Председателю ИР Дронову в Перове не принято было отказывать, но начальник аэродрома Крючников заартачился. Он сказал, что нет летчика. «Вызови!» — заорал Дронов, который явно был уже хорош, хоть прямо об этом не писали. Дронов был человек таинственный, появился в Перове недавно, и знали о нем только то, что в Москве у него паутина высших связей. Савельев ничего о нем не знал и не интересовался.</p><p class="p1">Крючников вызвал пилота, но тот отказался взлетать, упирая на технику безопасности: в «Ан-2» ни при какой погоде нельзя запускать больше двенадцати человек, а этих было тринадцать, и все, кроме Марины, грузные. Дронов опять заорал, и Крючников на собственный страх и риск сказал пилоту: не связывайся. Тяжело разогнавшись, они улетели в долгий зеленый закат, и больше их никто никогда не видел.</p><p class="p1">Фотографию Марины Лебедевой Савельев увидел на следующий день в перовской газете «Глобус». Есть женщины, заставляющие нас вспоминать, как мы живем, и сразу представлять другую жизнь, которая тут же начинает казаться реальной. Всякий спросил бы: что делать ангелу в «Инновационной России»? Но где же и быть ангелу, как не в аду, на переднем крае борьбы? Марина Лебедева принадлежала к тому типу святых, которые раздают себя всем, потому что мужчина никакой святости, кроме блуда, не понимает. Савельев сразу в ней увидел эту жертвенность, которую изображают столь многие — но понимающий человек разберется с первого взгляда. Он понимает, где шлюха с запросами, а где ангел с печальным детским ртом углами вниз, полуприкрытыми глазами и выражением сладостной обреченности. Савельев сразу понял, что найдет и спасет Марину Лебедеву, и потому в душе не очень удивился, поймав сигналы.</p><p class="p1">Он знал, что даже там, в дымной сырости начальственной баньки, Марина Лебедева будет двигаться среди жирных мохнатых тел как сияющий ангел; и в тайге станет наложением рук укрощать голодных медведей, и когда увидит его — в первых рядах спасателей, — немедленно все поймет и останется с ним. Савельев не полюбил бы другую. Вот почему из МЧС он направился в «Глобус» и попросил пятидесятилетнего рослого очкастого ответсека, похожего на советского агронома, принять от него информацию.</p><p class="p1">Ответсек сам его слушать не стал, а откомандировал на третий этаж к корреспонденту Вадиму Тихонову, специалисту по скандалам и происшествиям. Тихонову было двадцать четыре года, и по меркам «Глобуса» он был человек опытный. К двадцати шести годам журналисты либо переезжали в Екатеринбург, либо уходили на телевидение, либо выбирали литературу и спивались. Других путей из «Глобуса» не было. Можно было, конечно, пробиться в ответсеки, но нынешний явно не собирался умирать, да и как посмотришь на него — за что бороться-то? Раньше был еще вариант с политтехнологией, но тогдашние политтехнологи исчезли как класс, а новых набирали уже не снизу. Тихонов понимал, что года через два ему придется менять профессию, поэтому к обычной самоуверенности провинциального новостника в его случае добавлялась легкая тревога, а так как он не пил сильно, по-настоящему, — глушить ее было нечем. Свежий человек мог принять ее за любопытство и даже азарт, но коллегам все было ясно. Сейчас Тихонов выслушивал слезную жалобу пенсионера Блинова. Сын Блинова взял на себя вину за ограбление магазина, хотя был, разумеется, почти не виноват. Он поступил благородно. Сажать его вообще не следовало, тем более что и украли они всякой ерунды тысяч на тридцать, но он сел, оказался в колонии под Перовом и погиб там во время пожара. Теперь со старика Блинова требовали компенсацию, потому что загорелись личные вещи осужденных, якобы по вине Блинова-сына, который погиб и потому не мог оправдаться. Весь ущерб списали на него, и Блинов-отец должен был теперь выплатить сто двадцать тысяч рублей, которых у него не было. Он не понимал, как возможна такая ужасная, библейская, иовская несправедливость: сначала у него несправедливо посадили сына, потом сын погиб и теперь был посмертно должен. Тихонов все это выслушивал по седьмому разу. Ему казалось, что комната пропиталась запахом горелого зэковского имущества. Вероятно, так пахло в аду. Тихонов представил себе, как выглядела бы книга Иова в русском варианте.</p><p class="p1">«1.7. Товарищи, товарищи, что же это делается, что это делается такое.</p><p class="p1">1.8. Взяли, посадили, не разобрались никто ничего, не рассмотрели ничего.</p><p class="p1">1.9. Потом объявляли взыскания, все время объявляли взыскания ему.</p><p class="p1">1.10. Теперь, когда сгорело, он виноват, а ведь все знают, что они сами подожгли.</p><p class="p1">1.11. Алтынов, Алтынов, все виноват Алтынов. Я знаю, он мне писал, что это все Алтынов, все, что выделяли, он расхищал, и он же у родственников вымогал.</p><p class="p1">1.12. Они вымогали с родственников за все — за телефонный звонок, за свидание, за посылку вымогали.</p><p class="p1">1.13. Что же это делается такое, товарищи, или никто уже не видит ничего.</p><p class="p1">1.14. Они сами подожгли, чтобы только наружу не вышло, мне сын писал, они за это сына.</p><p class="p1">1.15. И я же должен теперь, вы слышите, я же должен теперь.</p><p class="p1">1.16. Товарищи, товарищи, что же это такое.</p><p class="p1">1.17. Еще когда был ребенком, все время клеил фанерные корабли».</p><p class="p1">Тихонов понимал, что ему не следует выдумывать про себя эту книгу перовского Иова, но иначе он сошел бы с ума. Савельеву он обрадовался как родному. У него появился предлог выгнать Блинова. В деле Блинова нельзя было разобраться, мимо таких вещей можно было только проходить, стараясь не оглядываться. Они засасывали. Некоторые люди, хорошо знакомые репортеру Тихонову, не удержались и всосались таким образом — кто в помощь заключенным, кто в лечение больных детей, кто в раздачу сирот; невинный поиск смысла обернулся такой жизнью, в которой задуматься о смысле было уже некогда, то есть вопрос в принципе решался, но так же, как головная боль излечивается гильотиной.</p><p class="p1">— Я вам позвоню, — сказал он Блинову.</p><p class="p1">— Да я сам зайду, что вы будете беспокоиться…</p><p class="p1">— Нет, я позвоню, — железным голосом настоял Тихонов. Но внешность у него была неубедительная, малый рост, круглая голова, очки, — и ясно было, что Блинов придет уже назавтра и будет так ходить долго.</p><p class="p1">Савельев уселся и собрался рассказать про сигналы, но Тихонов его заговорщически прервал.</p><p class="p1">— Тсс, — сказал он. — Сейчас вернется.</p><p class="p1">— Кто?</p><p class="p1">— Этот. Они никогда с первого раза не уходят.</p><p class="p1">И точно — Блинов вернулся еще дважды, оба раза порываясь начать сначала — ему все казалось, что Тихонов не услышал, не захотел понять главное. После его второго ухода выждали минут пять.</p><p class="p1">— Ушел, — сказал Тихонов. — Рассказывайте.</p><p class="p1">Савельев рассказал про сигналы и обещал дать записи, чтобы их выложили на сайте «Глобуса».</p><p class="p1">— Интересно-то интересно, — сказал Тихонов. Он нравился Савельеву, потому что совсем не выделывался. У журналистов желание понтоваться проходит быстро, если только они не спиваются в писатели. — Но вот честно, Игорь, — если вы, допустим, спросите меня… Я не очень трусливый человек в принципе. Но заплатите вы мне миллион — я не полезу в «Инновационную Россию».</p><p class="p1">При всей своей аполитичности Савельев не удивился. Он готов был услышать что-то подобное. «Инновационная Россия» была не та сила, чтобы иметь с ней дело, даже если оно сводилось к спасению от голодных медведей.</p></span><span id="id5"><div class="title2">
<p class="p">4</p>
</div><p class="p1">ИРОС, как называла она себя (будто бы по созвучию с древнегреческим «герои»), была партией долгожданных хунвейбинов, на которых не потянули ни «Наши», ни «Молодогвардейцы», ни прочая шушера. Эти собирались не на Селигере, а на Валдае, как одноименный клуб. Попасть на их сборища не могла даже пресса, проваренная в кремлевском пуле до последней степени подлости. Сведения о них не публиковались, а разглашались, не распространялись, а просачивались, не навязывались, а дозировались. Спонсировал их глава крупнейшей монополии, не будем называть имен, седовласый голубоглазый знаток пяти языков, включая два древних, образцовый славянин, заставивший всех женатых сотрудников своей корпорации креститься, венчаться и поститься. После дискуссий об инновациях все предавались боевым искусствам. Ездили туда не прыщавые недоучки, а продвинутая молодежь плакатной внешности; обсуждалась не борьба с врагами, а стратегические планы. Единственный репортаж со съезда ИРОСа — проходил он, в виде исключения, в Москве, — прошел по «Вестям-24» и занял три минуты. Ясно было, что пришли люди, не любящие шутить, молодые технократы умеренно-нацистских взглядов, осуждавшие Сталина разве что за избыток сентиментальности. Все они, в отличие от прежней неокомсомольской мелкоты, считались профессионалами. Их называли то движением, то партией, но в парламент они не торопились. Называли их также иродами — после статьи Крошева «Инновационная Родина», — но Крошева в двух шагах от дома, в центре, на людной улице избили так, что ИРОС перестали трогать. Богатейшие люди страны жаждали вписаться в их ряды, но брали с разбором. Говорили, что Стахов (которого Перельман называл недосягаемой величиной) и Глобушкин (единственная русская Нобелевка по физике за последнее десятилетие) читали лекции иросам на Валдае, а престарелый историк наших космических прорывов Жабин намекал в «Комсомолке», что в ИРОСе собралась чуть не вся элита советского Байконура. Теоретиком ИРОСа считался Гаранин, автор трехтомной «Геополитики», от которой в ужасе стонали все его бывшие коллеги по истфаку; стонать-то стонали, но дружно признавали, что Гаранин — голова, полиглот, переводчик с латыни и урду, а в свободное время — живописец, предпочитавший рисовать древних воинов в подробном вооружении. О его коллекции ножей ходили легенды. Он был высок, аскетичен, безупречен.</p><p class="p1">Среди всеобщего балагана последнего пятилетия ИРОС была единственной обещанной силой, внятно представлявшей себе будущее. Страна рисовалась ей гигантской шарашкой, где работали прикормленные интеллектуалы, большинство с идеями; секретным подотделом ФИАНа, где изобретают сверхбомбу, попутно укрощая термояд; мировое господство не обсуждалось — оно предполагалось. Подразделения «Инновационной России» плодились по городам-миллионникам, в Новосибирске на нее молились, и если над Сколковом не измывался только ленивый, к ИРОСу всерьез относились даже те, кто при слове «геополитика» крутил пальцем у виска. Там собрались хоть и больные на всю голову, а профессионалы, — и Дыбенко на РСН уже сказал, что если они так хорошо понимают в своих областях, чем черт не шутит, может, и в политике разберутся? Лахнин не подтверждал, но и не отрицал членство там. Медведева, шептали в кулуарах, туда не приняли.</p><p class="p1">Савельев всего этого не знал, но чувствовал ауру, и аура была нехорошая, примерно как у Анненербе, как если бы там, против обыкновения, признали ядерную физику.</p><p class="p1">В Перове, когда ближе к выборам здесь все в той же обстановке дозированной секретности создали отделение ИРОС, во главе его оказался Дронов, которого почти никто не видел. Его якобы прислали с самого верху. Говорили о возможной реставрации, расконсервации и полной модернизации Перовского турбинного завода, а самые доверчивые — о Перове-60 с его изделием номер раз, как звали его между собой перовцы; как звали его в Перове-60 — не знал никто, потому что до таинственного города никто из них не доехал. До него, по слухам, надо было сутки добираться пешком либо двое суток в обход, оплыв крюк по реке Бачее на моторной лодке, и то бы внутрь не пустили; вообще он был как Китеж — где-то есть, но никто не видел, впускают только праведников. В Перове-60 был один радиолюбитель, но о секретном Савельев не спрашивал, а мужик не распространялся. Раз только сказал, что скоро все повернется к возрождению, — но в стране, в мире или в масштабах Перова-60, не уточнял. Как бы то ни было, нужда в изделии номер раз настала снова, и это бросало кровавый отсвет технократической зари на все затеи Дронова, включая баньки.</p><p class="p1">— Я думаю, Игорь, вам не надо про эти сигналы никому говорить, — предложил Тихонов.</p><p class="p1">— Сговорились вы, что ли? — обозлился Савельев.</p><p class="p1">— А кто еще? — Тихонов сразу насторожился, потому что от ИРОСа ничего хорошего не ждал.</p><p class="p1">— Я в МЧС ходил, — неохотно признался Савельев. — Предлагал выехать им.</p><p class="p1">— А они?</p><p class="p1">— Изучили, сказали — аберрация. Но я же слышу, какая там аберрация!</p><p class="p1">— Ну и правильно. Я, знаете, — Тихонов картинно огляделся и понизил голос. — Я думаю, что так им и надо. Очень хорошо, что они пропали. Мысль же материальна, так? Слишком много народу им пожелало «Пропади ты».</p><p class="p1">— Но там люди! — крикнул Савельев. — Давайте их спасем, а потом будем разбираться…</p><p class="p1">— Игорь, — внушительно сказал Тихонов. — Там ищут спецы — не чета нам. И если они ничего не могут найти, то ваши сигналы — ошибка приборов, игра воображения, не знаю. Не надо про это писать. Я чувствую.</p><p class="p1">— Не будете, значит? — спросил Савельев, поднимаясь.</p><p class="p1">— Да погодите, куда вы сразу. Дайте послушать еще раз.</p><p class="p1">Тихонов взял флешку и долго, по три раза переслушивал сигналы.</p><p class="p1">— Давайте знаете как? — предложил он наконец. — Давайте на сайте, а там посмотрим. Ни к чему это не обязывает же. Пускай обсуждают, думают. Вдруг так кричит местная птица или дикий зверь, или все это правда, и тогда надо дать народу шанс, нехай спасает. Я сейчас к себе с флешки перепишу… Кстати, — он заговорил уже серьезнее, — вы мне можете дать слово, что это не ваш розыгрыш? Вы же не меня, а газету подставляете!</p><p class="p1">— Честное благородное слово, — торжественно сказал Савельев. — Да и смысл? Я же не для себя…</p><p class="p1">Хотя это, если вдуматься, было верно лишь наполовину.</p></span><span id="id6"><div class="title2">
<p class="p">5</p>
</div><p class="p1">Нет смысла описывать шквал непрошеных советов, язвительных комментариев и личных выпадов, который обрушился на Савельева сразу после публикации тихоновской статьи на сайте «Глобуса» 24 сентября со стандартным редакционным постскриптумом типа «ни за что не отвечаем, но мало ли». Свой брат радиолюбитель на тихом, никому не ведомом форуме в худшем случае высказал бы осторожное сомнение, но тут все были специалисты, в жизни не видавшие рации, и кто такой Савельев — они понятия не имели. В результате он за три часа огреб три сотни обвинений в полной своей несостоятельности, авантюризме и стремлении к дешевой славе. Савельев никогда не питал иллюзий насчет сетевой публики и человеческого рода в целом, но тут он завелся. Ему сообщили, что голоса поддельные, запись монтирована, а рация на самолете неизбежно сломалась бы при падении, потому что как же иначе? Набежали люди из Москвы, достоверно знающие, что медведей вокруг Перова нет. Казачий атаман Сыропяткин, держатель бензоколонки в Новохоперске, сообщил тут же, что никаких атаманов в Перове нет, поскольку они не признаны Большим кругом Всевеликого войска Донского, а если бы и были, то давно разогнали бы всех медведей и жидов. Далее обсуждение перешло на жидов и проблемы незаконной миграции.</p><p class="p1">На радиолюбительском форуме к сенсации отнеслись сдержаннее, но тут забила тревогу областная молодежная газета, срочно перепечатавшая савельевское сообщение и выложившая сигналы на свой сайт. Провисели они там недолго. Уже на следующий день главный перовский эмчеэсник авторитетно разъяснил, что рация на «Ан-2» неизбежно разрядилась бы в ближайшую неделю, что Савельев — известный городской сумасшедший, а местные поисковики сделали для обнаружения самолета все возможное, но они не боги. Клеветы насчет городского сумасшедшего Савельев не стерпел и, наскоро закончив прием больных, отправился в «Глобус».</p><p class="p1">Там его ждало зрелище в высшей степени странное. Тот самый поисковик, который так пренебрежительно отнесся к его сигналам, лично проводил общее собрание в кабинете главного редактора. Туда же вызвали и Тихонова, а Савельева не пустили. Он прождал два часа в приемной, пока перепуганные сотрудники не начали расходиться. Поисковик, выходя из кабинета, увидел Савельева и отшатнулся.</p><p class="p1">— Так, — сказал он, багровея, — виновник торжества. Прошу к нашему шалашу.</p><p class="p1">Он по-хозяйски распахнул редакторскую дверь и запустил Савельева в тесный кабинет, где, казалось, все еще витали вдоль стен флюиды разноса.</p><p class="p1">— Любуйтесь, — сказал поисковик. — Сам пришел.</p><p class="p1">— Я, собственно, — начал Савельев, но не знал, как продолжать. За два часа сидения в предбаннике он мысленно произнес несколько возмущенных монологов о том, как недопустимо обзывать честного человека, кандидата в мастера и безупречного специалиста, городским посмешищем, но тут он наткнулся на безумный, умоляющий взгляд редактора и понял, что заварившаяся каша серьезней личных амбиций.</p><p class="p1">— Ты, собственно, — передразнил поисковик с такой злобой, что Савельев окончательно перестал что-либо понимать. — Глядите на него. Он всех нашел. Голодные медведи. Ты знаешь, радийщик гребаный, какие ты вообще нажал кнопки? Ты понимаешь, кто теперь сюда поедет?</p><p class="p1">— Не понимаю, — сказал Савельев, чувствуя, что у него предательски задрожало веко.</p><p class="p1">— Ты… — прохрипел поисковик и задохнулся. — Тебе сказано было вообще рот не открывать?</p><p class="p1">— Но там люди, — попытался объяснить Савельев.</p><p class="p1">— Люди! — заорал поисковик. — Если там люди, то значит, так надо, дерево! Понял ты? Тебе почем знать, зачем там люди, ты вообще кто такой? Мутить тут! Ты принял херню на своем пылесосе, теперь в Москве на ушах стоят! Специалисты искали, не нашли, добровольцы искали, не нашли, теперь ты, рыло! Мышь бежала, хвостиком махнула! Люди ходили, штаб работал, одних облетов было сколько! В тех краях, где колхоз твой бывший, сейчас от людей не протолкнешься, грибники, ягодники. Если б там кто был или что лежало, они бы сто раз нашли. По рекам рыболовы сидят, что, не нашли бы? У меня спасатели три недели искали: не спали, ходили, летали, не ели, не пили вообще! Теперь добровольцы пойдут, нах, за каждого мне отвечать, нах, руки-ноги поломают, нах! Я лично, лично буду следить, чтобы тебя освидетельствовали. Я весь психдиспансер к тебе пришлю. Я посмотрю еще у тебя наркотики. Гнида. Услышал он. И этого вашего, — он обратился к редактору, — вашего Тихонова этого, я тоже прослежу, чтобы духу его! Чтобы он сапожником тут не мог устроиться! И если еще хоть слово про это… еще хоть звук мне про этот самолет! Я этот ваш глобус, — он схватил с полки символ редакции, изготовленный из уральских самоцветов, — этот ваш глобус я засуну так, что десять человек не выковыряют! Поняли? А тебе, — снова обратился он к Савельеву, — я рацию твою туда же, и если ты еще кому-то… понял? Пошел вон отсюда! — И Савельев, покорно, словно под гипнозом, покидая кабинет и ничего не поняв во всей этой безумной словесной пурге, успел заметить, как главный бросает под язык таблетку нитроглицерина.</p><p class="p1">Просто так уйти после этого феерического разноса было нельзя. Савельев пошел к Тихонову, который спокойно, даже меланхолично освобождал рабочее место от следов своего пребывания. Коллеги занимались своими делами, стараясь не смотреть на зачумленного.</p><p class="p1">— Вас что… погнали? — не веря глазам, тихо спросил Савельев.</p><p class="p1">— Слава богу! — с трагической бодростью отвечал Тихонов. — Сам бы долго еще терпел, а тут хоть какая-то перемена в жизни.</p><p class="p1">— Это все за сигналы?</p><p class="p1">— А за все. — Тихонов выгребал из ящиков старые письма, отложенные для ответа или командировки, да так и забытые; в любом редакционном столе этого хлама завались. Вообще, когда начинаешь освобождать рабочее место, всегда немного репетируешь собственную смерть и разбор завалов, которые от тебя останутся: жалкие вещи, лишенные всякой ценности, хранимые бог весть для чего инструкции, квитанции, записки, — в такие минуты с особенной остротой понимаешь, что вся твоя жизнь была процессом накопления мусора, стружки, которую ты снимал с неведомой детали, но теперь станок умолк навеки, и что ты выточил? Тихонов был настроен меланхолически. Он сам не ожидал, что увольнение из «Глобуса» произведет на него столь странное впечатление. Не было ни тревоги о будущем трудоустройстве, ни злобы на главного, который с таким необъяснимым испугом выстлался под рядового силовичка, — а только легкая озадаченность от ничтожности итога, который внезапно пришлось подводить. Тихонов проработал тут три года, и от всех этих лет осталась куча никому не нужных заметок да несколько десятков чужих писем с безграмотными воплями о помощи, на которые он собирался отреагировать, в душе отлично зная, что ничего сделать не сможет. Он только не решил еще для себя, всякая ли журналистская карьера так бессмысленна или лично ему так не повезло; а может, и любая жизнь с правильной точки зрения выглядит так же, и нечего ерепениться. Он сейчас как раз становился на эту правильную точку зрения.</p><p class="p1">— И вы уходите?</p><p class="p1">— Ухожу. Пойдем выпьем, — сказал Тихонов, хлопая Савельева по плечу. — Ты теперь псих, я безработный, терять нечего.</p></span><span id="id7"><div class="title2">
<p class="p">6</p>
</div><p class="p1">— Ничего не понимаю, — в пятый раз повторял Савельев за столом кафе «Настоящие пельмени» в ста метрах от редакции.</p><p class="p1">— А и понимать нечего, — объяснял Тихонов. — Они не нашли самолет. Ты лишний раз привлек внимание. Его вздрючили. Он пришел разбираться. Ты сам подумай. Как они будут искать? Тут «Боинг» пропадет, «Титаник» пропадет, и не найдут. В село Дристалово упала атомная бомба — хлюп, чпок! Они думали, не будет села Дристалова, а не будет атомной бомбы. И чего ему теперь делать? Он пошел редактора вздрючил. Кто крайний? Тихонов крайний. Пошел нах, Тихонов. Назавтра все забудут.</p><p class="p1">— Но так нельзя, — говорил Савельев, с некоторым ужасом смотря, как Тихонов распечатывает вторую бутылку «Зеленой марки». — Ты им должен теперь доказать.</p><p class="p1">— Что я им могу доказать? Ты сам-то веришь, что там сигналы?</p><p class="p1">— Верю я или нет, это не вопрос. Сигналы есть — они должны искать. Я не выдумал же. Он должен понимать.</p><p class="p1">— Он понимает, что ему по голове прилетело, — говорил Тихонов, криво ухмыляясь. — Ничего другого он не боится. Может, там правда всех медведи съедят, и ему ничего не будет. Но кого он может найти? Тут надо обшарить две Франции. Кто вообще знает, куда они спьяну полетели? А ты ходишь, будоражишь, теперь перепечатали. Ему надо?</p><p class="p1">— А что там люди живые мучаются, это никому, да? — спрашивал Савельев. Он почти не пил, но, как часто бывает в компаниях, опьянение собеседника распространялось и на него — он начинал говорить рублеными фразами и даже размахивать руками. — Что там женщина, может быть, умирает, ему ничего, да?</p><p class="p1">— Этой женщине туда и дорога, — доверительно сказал Тихонов. — Это такая женщина, что сама медведя съест. Записалась в ироды, теперь не вякай.</p><p class="p1">— Но тебя никуда не возьмут теперь!</p><p class="p1">— Куда-нибудь возьмут. — Тихонову и самому уже казалось, что все уладится. — Надо было, чтобы меня кто-то выпихнул из этого болота. Так что большое тебе человеческое спасибо, без шуток говорю.</p><p class="p1">— Я все равно соберу экспедицию, — сказал Савельев после паузы. — Ты как хочешь, а я с клеймом тут ходить не буду. Меня люди знают, в конце концов. Как они пойдут к врачу, если он городской сумасшедший?</p><p class="p1">— Плевать им, они вон к шаманам ходят. Мочу пить.</p><p class="p1">— Ну и радио у меня. Нет, я не буду. Я психом жить не могу. Я поеду и найду, и они увидят.</p><p class="p1">— Чего? — спросил Тихонов. — Куда ты поедешь? Сентябрь кончается, а ты в тайгу? МЧС не нашло, а ты найдешь?</p><p class="p1">— Они не верят, а я слышал, — повторил Савельев твердо. — Я знаю, где искать, а они нет.</p><p class="p1">— Ага. Ты знаешь, МЧС не знает, ты им найдешь медведей.</p><p class="p1">Разногласия эти возникли потому, что атмосфера «Настоящих пельменей» действовала на собеседников по-разному. Для Тихонова тут был дом родной, место традиционных редакционных попоек, при каждой редакции — провинциальной, да и московской, — есть забегаловка, куда все ходят сначала из-за территориальной близости, а потом в силу традиции, сплачивающей коллектив при отсутствии внятной цели и собственного лица. Чем тошнотворней эта забегаловка, тем родней. На всех, и особенно на завсегдатаев, тут орут, но и это кажется им чем-то родным, почти домашним. В «Настоящих пельменях», где пахло битками, растворимым кофе с молоком и прокисшим пивом, и ко всему этому еще примешивалась тушеная капуста, — Тихонову было уютно, и ему уже казалось, что все образуется: атмосфера привычной невыносимости всегда его грела, и от намерения радикально изменить свою жизнь ничего не оставалось. Устроится, а то еще главный остынет, а то еще он придумает радиопрограмму, и не придется никуда переезжать, и вообще из «Глобуса» регулярно кого-нибудь выгоняли, и все возвращались, потому что деваться было некуда. Савельев, напротив, никогда по таким забегаловкам не ходил, ему все здесь было отвратительно, начиная с осклизлых битков и кончая настоящими пельменями трех видов — с картошкой, сыром и в конце концов мясом; ему казалось, что все это — запах тушеной капусты, плохого пива и безнадежно нудных людей, ходящих сюда, — и есть дух настоящих пельменей, что все они тут настоящие пельмени, включая неплохого Тихонова, и что в этих пельменях утонет теперь вся его жизнь вместе с профессиональной репутацией. Ему надо было любой ценой вырваться отсюда, и лучше бы подальше, в таежную экспедицию, в колхоз имени Шестидесятилетия Октября, где его наверняка ждали полная реабилитация, триумф и Марина Лебедева.</p><p class="p1">— Это же не на месяц, — сказал он. — Это доехать туда, прочесать район и обратно.</p><p class="p1">— А ты знаешь, где колхоз-то этот? Его небось уж нет давно.</p><p class="p1">— Если они сказали, значит, есть.</p><p class="p1">— И как добираться?</p><p class="p1">— Найду, как добираться, — огрызнулся Савельев.</p><p class="p1">У Тихонова в этот момент как раз наступила стадия так называемого второго энтузиазма, то есть краткая вспышка бодрости и жажды деятельности — которая и разрешается обычно тем, что берут еще одну.</p><p class="p1">— Слушай, — сказал Тихонов. — А чо, если я с тобой туда… в экспедицию? Репортаж сделать?</p><p class="p1">Савельев обрадовался. Он не очень представлял, кого позвать с собой, а объективный летописец ему не помешал бы.</p><p class="p1">— А давай, — сказал он. — Тебе все равно делать нечего. Найдем, напишешь, они к тебе на карачках приползут.</p><p class="p1">— А правда, — восхитился Тихонов. — И в Москве напечатают. Но только ты смотри, мы обязательно должны найти. Если не «Ан», так хоть кого-то.</p><p class="p1">— А давай! — снова воскликнул Савельев. И еще минут десять они уговаривали друг друга, что обязательно должны поехать вместе, причем каждый был в душе уверен, что второй к утру передумает. С этой мыслью они и разошлись — Тихонов поехал к девушке Жене, которая всегда его понимала, а почти трезвый Савельев отправился в свой гараж, где ему надлежало все обдумать.</p><p class="p1">Сигналов в эту ночь не было.</p></span></span>
