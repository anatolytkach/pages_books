<p class="p">3</p>
</div><p class="p1">— Я расскажу вам, — повторял старик. — Конечно, я расскажу вам. Мне никогда никто не верил, но что же делать? Я только и могу это рассказывать. Я, может быть, только затем и живу.</p><p class="p1">Теперь уже вся группа Савельева сидела у костра и слушала последнего человека из группы Скороходова. Валя Песенко до сих пор не понимал, снится ему все это или мерещится наяву. Допустить, что все происходит в действительности, он не мог.</p><p class="p1">— Нас, как вы помните, было девятеро, — рассказывал Шухмин, в котором — и это было всего страшней — под сетью морщин ясно угадывался тот юноша пятьдесят девятого года в ковбойке: он удивительным образом сохранился, словно получил тут, в тайге, вечную молодость. — Мы остановились на ночлег в палатке на восточном склоне Тур-горы, выпустили вечернюю стенгазету и поужинали. Потом легли спать. Разбудил нас ужасный грохот и крик Коли Станицына — он почувствовал, что всю правую часть палатки завалило. Видимо, ложась спать, мы подрезали наст. Лавина сошла правей, но задела нас краем.</p><p class="p1">— Значит, все-таки лавина, — прошептал Валя.</p><p class="p1">— Да, — кивнул старик, — лавина. Но это было не все, далеко не все… Мы разрезали палатку изнутри и попытались выбраться. У Станицына была раздроблена нога, он страшно кричал, когда мы его тащили. Ночь была холодная, температура резко упала. Мы не успели одеться и взять вещи. Стали спускаться по склону, поддерживая Станицына, потом поняли, что он не может идти, и понесли его. Но тут из-за хребта выплыл огромный огненный шар, похожий на страшно раздутую луну. Он плыл над нами и вдруг взорвался — взрыв был ослепительный и, видимо, огромной температуры… Сашу Брянского ослепило сразу, он упал, закрыв лицо руками, и не шевелился больше.</p><p class="p1">— Значит, все-таки испытания? — чуть слышно спросил Валя.</p><p class="p1">— Да, — скорбно подтвердил Шухмин. — В эту ночь на склоне проводились секретные испытания, о которых никто ничего не писал, нас не предупредили, и мы выбрали самое неудачное место. Потом выплыли еще два шара, мне рассказывали туристы, что их видели местные жители… Сам я, как вы понимаете, ничего об этом прочесть не мог, а до середины восьмидесятых к нашей трагедии вообще не возвращались. Так мы потеряли Брянского. Но надо было спасаться, и мы спустились вниз, туда, где рос на склоне огромный кедр. Там мы оставили Станицына и Скороходова, который как старший принял решение ему помочь и развести костер. Остальные должны были спуститься вниз, там был мелкий лес, место казалось безопасным… Но это была страшная ошибка. Там нас караулила группа беглых заключенных, которые как раз в эту ночь пробирались в Балахово. Они надеялись там вскочить в электричку и уйти, но на их пути встретились мы. Они не стали ни в чем разбираться и сразу убили Володю Старикова. Остальным удалось затаиться в кустах, и мы лежали в снегу в чем были, в ватных штанах и свитерах, пока эти негодяи уходили в лес. Никто из нас не мог остановить их — ведь у нас не было оружия, кроме ножей…</p><p class="p1">— Значит, беглые зэки, — кивнул Валя.</p><p class="p1">— Да, — продолжал уцелевший, — но наши несчастья не кончились на этом. По ужасному совпадению, именно в эту ночь на склоне должна была высадиться американская диверсионная группа. Тогда Урал был главной мишенью американской разведки, через год там сбили Пауэрса — американцы постоянно пытались сфотографировать наши военные объекты… Американская группа увидела Борю Вершинина и убила его сразу, а Иру Саблину пытала, чтобы она сказала, где остальные. Но Ира ничего не сказала, и тогда они застрелили ее. Они надеялись, что девушка не выдержит и выдаст остальных — нас к этому времени оставалось трое, — но Ира была выносливее многих мужчин. Она думала, что платит жизнью за наше спасение, а между тем нам угрожала опасность не от американцев, а от своих.</p><p class="p1">Этого поворота Песенко уже никак не комментировал.</p><p class="p1">— Да, — сам себе сказал Шухмин, — нас оставалось трое, и мы пытались продержаться до утра. Американцы ушли, мы хотели вернуться к кедру и узнать, что происходит со Скороходовым. Но на нашем пути оказалась советская рота, которая собирала обломки взорвавшегося секретного оружия. Их нашли потом — несколько цветных обручей неясного назначения, — но никто не мог понять, откуда они. Рота прочесывала склон, увидела Игоря Сальникова и Аню Голубеву. Они вообще почти не расставались… Наши оказались грубей американцев, никого не стали пытать и убили их сразу. А я отстал, и это меня спасло.</p><p class="p1">— Наши? Все-таки наши? — не верил Валя. — Неужели просто убили?</p><p class="p1">— Им не нужны были свидетели запуска, тем более неудачного, — объяснил Шухмин.</p><p class="p1">Все остальные слушали молча, не в силах преодолеть недоверия: несомненно, это был он, таинственно пропавший, так и не найденный, — у поисковиков, пытавшихся решить загадку группы Скороходова, была даже поговорка насчет «найти Шухмина», примерно то же, что и найти квадратуру круга. Существовало несколько базовых версий насчет группы Скороходова, ни одна из них не объясняла всего, — но кому же могла прийти в голову версия, объясняющая все сразу: случилось все предполагавшееся, причем одновременно? А ведь именно эта мысль и должна была явиться первой: если в СССР, а потом и в России что-то случалось, это всегда было, как писали в расследованиях, результатом совокупности крайне маловероятных факторов. Вероятно, когда-нибудь это получит и чисто математическое объяснение: есть несколько запущенных — в обоих смыслах, то есть начатых и не отслеженных, — трагических процессов, каждый из которых чреват катастрофой, и ни один из них нельзя прекратить, потому что одна такая остановка чревата общим крушением расшатанного механизма, давно держащегося на честном слове. Иногда эти линии пересекаются, и в точках пересечения происходят взрывы невероятного масштаба. Каждая советская катастрофа, если вдуматься, несла на себе следы трех, а то и пяти внезапно сошедшихся деградаций, ошибок и позабытых угроз. Два поезда взрывались и начисто выгорали не потому, что сталкивались, а потому, что из-за опоздания одновременно оказывались в низине, полной газа, выходящего из поврежденного газопровода; проскакивала случайная искра — и все взлетало на воздух. Техногенная катастрофа, погубившая АЭС и прекрасный город будущего рядом с ней, происходила из-за того, что аварийную систему отключили из-за эксперимента, а кто-то из ответственных техников отвлекся на матч местного «Динамо», которое полностью погибло в авиакатастрофе на следующий год, потому что их самолет столкнулся с другим из-за поломки системы навигации, изготовленной как раз на том заводе, который незадолго перед тем взорвался от столкновения поезда, везшего промышленную взрывчатку, с другим, застрявшим на путях, и поскольку реставрация завода производилась ударными темпами, некоторое время он давал брак, на который в Москве смотрели сквозь пальцы. Ни одна катастрофа не происходила сама по себе, поскольку процессы распада и деградации множились — тут тебе и бардак в армии, которая не умеет запустить ракету, и тотальная скрытность, и диверсионные группы, шаставшие по местной тайге, как по Ближнему Востоку сорок лет спустя, с абсолютной, непростительной наглостью; все гадали, какая оплошность или гнусность погубили студентов, — а их погубили все сразу, и если вдуматься, здесь никогда не бывало иначе. В остальном пространстве случались катастрофы и похлеще, но нигде они не были так многофакторны — поскольку хоть часть угроз удавалось отсечь; здесь же, в предельно плотном и взаимосвязанном мире, большая часть и без того иссякающих сил уходила на то, чтобы все прятать, и ткань разлезалась неостановимо. Валя боялся предположить, что произошло со Скороходовым и раненым Станицыным, но реальность обогнала его предположения.</p><p class="p1">— Скороходову удалось развести костер, высокий, прекрасный костер. Один из лучших в его жизни. — Тут Шухмин сделал паузу, и стало слышно, как тихо плачет Даша Антипова. — Разведрота двинулась к этому костру, но тут случилось самое страшное. То, что мне и сейчас не дает заснуть спокойно.</p><p class="p1">Он замолчал.</p><p class="p1">— Вакуумная бомба? — вспомнил Валя сравнительно недавнюю версию. Никаких следов взрыва вакуумной бомбы на склоне не было, но, может быть, это была бесследная вакуумная бомба, впоследствии снятая с производства, или нейтронная бомба, уничтожившая всех, но не произведшая разрушений.</p><p class="p1">— К кедру начала стремительно снижаться летающая тарелка, на которой, видимо, догадались о намерениях разведроты, — сказал Шухмин, глядя в огонь. — От нее и остался тот непонятный круг около кедра, о котором так много врали потом. Мне рассказывали, будто Скороходова подозревали в совсем уж идиотском поступке — он якобы вытаптывал круг, чтобы согреться… Нет, это был идеально ровный круг, и снег протаял в его центре. Открылся люк в днище, и Скороходова буквально втянуло внутрь, а следом за ним взяли Станицына. Станицын страшно визжал. Он не понимал, что их пытаются спасти, и выпрыгнул из полуоткрытого люка с десятиметровой высоты. Тарелка медленно поднялась в воздух — спускалась быстро, а взлетала очень медленно, я успел ее рассмотреть. На борту у нее была надпись BCK-67. Все эти буквы есть и в латинице, и в кириллице, так что я не мог понять, наша она или американская, но не исключаю и того, что у инопланетян тоже принят наш алфавит. Трудно ведь придумать более экономный способ записывать слова. Не иероглифами же им было пользоваться? А может быть, это было скрытое послание нам всем, чтобы его поняли и русские, и американцы, — но я до сих пор не могу его прочесть, сколько ни пытаюсь. Может быть, это написанное без гласной BACK-67, то есть вернемся через 67 лет? А может быть, это русское сокращение «Войско»? Теперь мы никогда этого не узнаем, если только они не прилетят снова. Иногда мне говорят, что их видели тут, но лично мне не приходилось больше никогда. Разведрота дала несколько автоматных залпов по тарелке, но пули отскакивали от нее, как от лучшей брони. Она еще повисела над склоном, словно издевалась, а потом вдруг резко взмыла и пропала — я не успел даже понять, когда именно она исчезла. И ни следа, ни клочка дыма, ни инверсионного следа.</p><p class="p1">— Как же спаслись вы? — после небольшого молчания спросил Дубняк.</p><p class="p1">— Моя история не закончилась и до сих пор, — ответил Шухмин, словно рассказывая множество раз повторенную сагу. Видимо, он не раз делился ею со всеми встречными туристами, и никто ему не верил либо просто не знал толком историю скороходовской группы. — Я лежал в снегу, бредил, тело теряло чувствительность, и я наверняка замерз бы в ближайший час, но меня заметили и подобрали местные старообрядцы. Они давно живут здесь, часть ушла еще при Никоне, а часть сбежала от советской власти. В глубине тайги есть целые города старообрядцев — журналисты нашли всего одно поселение, а сколько их всего, точно не знаю даже я. В любом случае их больше, чем поселений инков на Амазонке. Я когда-то мечтал увидеть эти города в джунглях, но увидел совсем другие, гораздо таинственнее. Это отдельная цивилизация, о которой можно рассказывать неделями, но никто из встречных не поверил мне и не пошел туда. Впрочем, может быть, это и к лучшему: вас все равно бы там оставили у себя. Зачем им выдавать тайну?</p><p class="p1">В интонациях Шухмина отчетливо было сходство с говором ведущего программы «Очевидное — невероятное» — ее часто крутили по ностальгическому телеканалу, и все поисковики Савельева смотрели знаменитые выпуски про Тунгусский метеорит или бушменов, избегающих всякого контакта с прочим человечеством вот уже триста лет, с тех пор как их, дураков, вообще открыли; никто не верил Шухмину, потому что старообрядческие города в тайге — это уже перебор. А с другой стороны — почему бы и нет? Много всего в нынешней тайге, да и во всегдашней; треть российской территории вообще не заселена — леса, снега, тундры, полтора человека на сотню квадратных километров; кто же знает, что там есть? Там наверняка есть подземные города, подводные царства, Шамбала, а где-то даже справедливое мироустройство, а сколько беглецов от ужасного мира живет там, где их никогда не найдет никакая поисковая группа? Да и надо ли кому-то кого-то искать? Оттого и разбежалась Россия так широко, пока не уперлась в океаны, что бежала подальше от щупальцев, которые могут везде нащупать; оттого-то и не спешит она осваивать свою территорию, что надо же где-то прятаться. Жестокость законов уравновешена не тем, что они дурно исполняются, а тем, что всегда можно куда-то деться. В любом лесу тебе укрытие, в любом снегу пещера, а сколько всего таится в воде и под землей, в заброшенных городах и на пустующих дачах, в тайных скитах и охотничьих избах — про это лучше вообще не думать. Там такое делается, чего не придумали бы де Сад с Захер-Мазохом, там вызревает такое, до чего не додумались бы Эйнштейн с Бором, там копится такое, что заполнит однажды все низины и бабахнет от первой искры, — но пока это глубоко, очень глубоко. Там секретные заводы, еще более секретные разведроты, секты, скиты, коммуны, крепостное право и первобытное племя, и все это покрывает девяносто процентов земли, а десять, контролируемые и видные прочему миру, давно никому не нужны. Все делается там, под коркой, которую чуть колупни — и провалишься навеки. Почему же там не быть старообрядческой культуре и целому городу, ушедшему в леса при патриархе Никоне? А сколько всего происходит в загробной России, входы в которую легко обнаружить в нескольких уникальных, но ничуть не охраняемых местностях, — про это вам пока вообще не нужно знать и лучше даже не думать.</p><p class="p1">— С тех пор я живу со старообрядцами и сам стал одним из них, — продолжал Шухмин, пока Валя Песенко все это про себя проговаривал. — Я свободен передвигаться по тайге, как захочу, но они, — он показал длинным смуглым пальцем в чащу, — они знают, что я не уйду. Ведь я не могу вернуться к людям. Я и не хочу к ним возвращаться — вырос в детдоме, родителей не знаю, никто меня не ждал. Но стоит мне появиться в Екатеринбурге — все тут же скажут, что это я убил остальных. Я уже слышал, что именно меня сделали крайним. Чтобы закрыть дело и не упомянуть ни о разведгруппе, ни о взрывах, ни о роте, — меня назначили убийцей, объявили в розыск, и некоторые до сих пор верят, что это я раздробил ногу Станицыну, застрелил Сальникова и выдавил глаза Ире Саблиной…</p><p class="p1">«А ведь это больше похоже на правду, чем испытания, разведгруппа и летающая тарелка», — подумали все.</p><p class="p1">— Я знаю, что и вы охотней поверите в мою вину, чем во все, о чем я рассказал вам, — кивнул Шухмин, отлично выучившийся в тайге слышать мысли. Их было тут мало, полторы на сотню квадратных километров, и все слышались отчетливо. — Доказательств у меня нет, кроме того, что один человек не может нанести столько ранений восьми другим, да и оружия в группе, как признали все, не было. Но правда никого не интересует — нужен крайний. Я хотел открыться американцам, когда они приезжали сюда выбирать место для съемки, но, во-первых, не знаю английского, а во-вторых, их переводчик немедленно сдал бы меня… Нет, я доживу век в скиту. Если кто-то из вас захочет пойти со мной, пойдемте. Старообрядцы владеют многими знаниями — целительскими, ботаническими… Некоторые живут по сто десять лет. Правда, идемте. Ведь кого-то одного вам все равно придется оставить после похода в эти места, иначе вам просто не выйти.</p><p class="p1">«О господи, — подумал Валя. — Ведь с Савельева станется. Он захочет остаться, потому что во всем идет до конца».</p><p class="p1">— Скажите, — не зная, как обращаться к Шухмину, хрипло спросил Савельев, — а самолет тут не падал в последнее время? Дело в том, что я получил сигналы…</p><p class="p1">— Падал, — уверенно сказал Шухмин. — Конечно, падал. Здесь довольно часто падают самолеты. Летом как раз упал небольшой, уцелели трое…</p><p class="p1">— Вы знаете, где они?</p><p class="p1">— Конечно, знаю, — спокойно отвечал Шухмин. — Если вы пойдете со мной, я покажу их вам.</p><p class="p1">«Да, конечно, — с ужасом понял Валя, — сейчас мы пойдем туда и уже никогда не вернемся». Неужели не ясно, что этот старик просто заманивает их в лес, а там у него целая банда, сейчас у них отберут все консервы, а самих убьют? Или даже если там действительно прекрасный город старообрядцев, смолистые скиты, вековая мудрость и разговоры на таком же правильном русском языке, как в программе «Очевидное — невероятное», — неужели кто-то надеется выйти оттуда живым? Ведь это серьезные люди, они себя сжигали, когда их пытались вывести из леса, — стоит попасть к ним, и ты уже навеки их пленник! «Надо объяснить Савельеву хоть знаками, остановить его — тут же все засасывает! Мы чудом сбежали от Ратманова, еще более чудом — из племени, вовсе уж чудом покинули завод, но скит нас не отпустит, не на тех напали. И опять смотреть на эту жуткую сектантскую жизнь, на веру и правду, честь и совесть, возможные тут только в закрытых сообществах! Снова дисциплина, непонятные племенные ритуалы, дикие запреты, слежка, сумасшедшие бабы и мужики-шпионы… нет, нет! Я не пойду, не хочу в скит, потому что знаю, что и он окажется не скитом, что все это снова будет с двойным дном — военный лагерь, игра „Зарница“, учебно-тренировочная база партии ИРОС, замаскировавшаяся посредством бород… Я не хочу больше ходить по тайге, попадая ко все более безумным бе-зумцам, я не хочу глубже, потому что оттуда мы уже никогда не вернемся, но как, как ему объяснить?!»</p><p class="p1">Видимо, он воззвал об этом всем телом, потому что в следующую секунду у Савельева зазвонил телефон.</p><p class="p1">Шухмин не удивился — он уже видал такие штуки у других туристов, которым рассказывал свою историю. Конечно, в этих местах мобильный не брал, но, как мы знаем, иногда связь сопровождается таким сильным эмоциональным зарядом, а сообщаемое так важно, что физические законы пасуют перед моральными.</p><p class="p1">Это была Инна, сестра Савельева.</p><p class="p1">— Игорь! — сказала она так отчетливо, словно стояла за соседним деревом. — Вы в порядке?</p><p class="p1">— Да, все нормально, — ответил оторопевший Савельев.</p><p class="p1">— Валя с тобой?</p><p class="p1">— Да, конечно.</p><p class="p1">— Ну, в общем, возвращайтесь, — сказала она деловито. — Нашли ваш самолет. Он никуда не летал.</p></span></span>
