</div><p class="p1">К собственному удивлению, они встретились опять — утром Тихонов позвонил радиолюбителю и сказал, что идея экспедиции кажется ему все более привлекательной. Делать ему теперь было и вправду нечего, и Тихонов, как всякий человек, внезапно выпавший из рутины, чувствовал тревогу и тошноватую пустоту.</p><p class="p1">— Кого брать будем? — спросил он Савельева, когда они уселись в те самые «Пельмени».</p><p class="p1">— Врач есть, — сказал Савельев. — Это я.</p><p class="p1">— Но ты ж не универсал.</p><p class="p1">— Я хирург, этого хватит.</p><p class="p1">— Ладно. У меня один парень есть, — Тихонов в своей манере таинственно понизил голос, — Леша Окунев такой. Он блогер, но это ладно. Вообще он благотворитель по жизни. Дети-сироты, инвалиды, все такое. Неравнодушный очень человек, — добавил он с явной антипатией. — Но вообще нормальный. Он пойдет.</p><p class="p1">— Турист еще у меня есть, — вспомнил Савельев. — Настоящий. У него клуб свой, «Первопроходцы».</p><p class="p1">— Славянский? — спросил Тихонов. — Так я знаю их. Дубняк?</p><p class="p1">— Дубняк, да.</p><p class="p1">— Ты что, — сказал Тихонов. — Он же на всю голову.</p><p class="p1">— Да нормальный он!</p><p class="p1">— Он всех достанет, я тебе точно говорю. Он мне интервью неделю заверял.</p><p class="p1">— Ну, — сказал Савельев, — там-то он не будет тебе заверять интервью. Там он будет тебя учить палатку ставить и в тайге ориентироваться.</p><p class="p1">— В тайге я без него сориентируюсь, — отмел сомнения Тихонов, входя в период первого энтузиазма.</p><p class="p1">— Не думаю, — осторожно возразил Савельев. Он подумал вдруг, что один человек ему будет там совершенно необходим — его собственный племянник, сын старшей сестры, третьекурсник Уральского универа Валя Песенко, с ударением на втором слоге, но все его, разумеется, дразнили просто песенкой. Он специализировался на изучении местного фольклора, знал систему тайных древесных и наскальных знаков, которыми пользовались манси, и написал пару статей об их верованиях. У него была даже идея, что племена Северного Урала — последние хранители подлинной шаманской традиции, потому-то здесь и пропадают так часто тургруппы, самолеты и целые малые города. Но прок от Вали был не только в этом. Савельев не очень любил общаться с людьми, но понимал их. Он знал, что ему нужен энтузиаст. Дело было даже не в том, что Дубняк сразу станет лидером и захочет увести экспедицию в совершенно другом направлении — куда-нибудь к болотам или водопадам, к ведомым ему одному таинственным и опасным местам, а на Валю Песенко можно будет все-таки опереться, чтобы простым большинством ограничить дубняковские планы. Дело было в тайном психологическом расчете: из всех предполагаемых участников Валя был единственным, кто мог придать всей этой авантюре дух радости и бодрости. Его ничто не смущало, он был добр и чист, как дитя, и очень любил Савельева, воспринимая его не то как отца — сестра растила его в одиночку, — не то как старшего брата. Валя наверняка будет уверен, что все получится, а Савельев был в этом вовсе не уверен, потому что вообще обходился без иллюзий. Валя был тот луч света, без которого в тайге, да еще осенью, никуда не денешься. Савельев редко ходил в тайгу и презирал туризм как пустую трату времени, но представлял себе, с какими трудностями эта трата сопряжена.</p><p class="p1">— Ну нормально, — сказал Тихонов, выслушав соображения насчет фольклориста. — Ты, я, Окунев, Дубняк и этот твой парень.</p><p class="p1">— С Дубняком я сам поговорю, — предложил Савельев.</p><p class="p1">— Да ради бога. Я с ним однажды неделю говорил, мне хватило.</p><p class="p1">Дубняк, против ожиданий, согласился легко. Савельев опасался, что у него найдется тьма экстремальных дел, а может, он опять набрал свою секцию славянского туризма и два раза в неделю преподает в спортзале ближайшей школы, обучая неофитов вязанию тройных узлов и лазанию по канату с нагрузкой, — но он горячо ухватился за идею таежного поиска.</p><p class="p1">— Читал я, — сказал он еще до всяких объяснений. — Чушь, конечно, но проверить надо.</p><p class="p1">Савельев долго, несколько занудно рассказывал ему, почему не чушь, но Дубняк не вслушивался. Незадолго перед тем он в очередной раз поссорился с бывшей ученицей, с которой пытался создать семью, потому что никак не желал признать безнадежность этих попыток. Дубняку нужна была невозможная жена, обладательница взаимоисключающих качеств: покорная, гордая, суровая, всегда готовая к походам и к заботе о нем, исчезающая по одному его намеку и появляющаяся при первой необходимости, еще до зова. Ему нужен был, вообще говоря, дух, обретающий плоть лишь при особой необходимости, — но ни одна ученица (он сожительствовал только с ученицами) не могла угадать, когда исчезать и появляться. Дубняк ненавидел комфорт — но мечтал о ежедневной заботе; не переносил одиночества — и не терпел общества. Видимо, поэтому оптимальной средой для него был поход, где все терпели друг друга по необходимости: вне тайги около него не мог удержаться никто. Сейчас ему надо было срочно отвлечься от новой домашней драмы, и он с радостью ухватился за идею Савельева.</p><p class="p1">Благотворитель, блогер и волонтер Окунев, успевший засветиться и в Камске, и на лесных пожарах 2010 года, и на всех наводнениях в родной области, сначала вдруг заартачился. Ему не хотелось спасать иросовцев, его не волновала судьба самолета, он не любил осеннюю тайгу, да и в другие времена года она его не вдохновляла, — но у него как раз сорвался вылет в Африку, куда он совсем было собрался в составе международного волонтерского отряда: гражданская война в Танзании внезапно обострилась до того, что туда перестали пускать наблюдателей. Тайга — плохая замена Африке, но делать Окуневу было нечего, и он согласился. Тихонов соблазнил его всероссийской славой.</p><p class="p1">Что до Вали Песенко, его и уговаривать не пришлось: по его представлениям, дядя отправлялся в те самые края, где в 1958 году при необъяснимых обстоятельствах погибла группа Скороходова. Семерых нашли, двоих сверхъестественная сила порвала так, что не осталось и клочьев. Что это было — внезапный приступ коллективного безумия, лавина, встреча с беглыми зэками или иностранным диверсионным отрядом, — спорили до сих пор; детали не желали складываться в общую картину. От руководителя группы остался хоть блокнот, выброшенный почему-то под кедром. Его ближайший друг лежал под тем же кедром — судя по характеру травм, он упал с большой высоты. Прочие участники лыжного перехода в честь запуска очередного спутника Земли лежали кто где, кто с пулей в голове, кто со следами долгой борьбы с неопределимым противником, кто безо всяких внешних повреждений, один со снятым скальпом, другой со сломанными ребрами, и отчего-то ужасней всего была мысль о Шухмине, исчезнувшем бесследно: то ли он сам все это с ними проделал (но как? не скальпы же он снимал с них, единственный медик среди восьми строителей?!), то ли предполагавшийся многими взрыв вакуумной бомбы испепелил его на месте. Валя не терял надежды отсортировать артефакты, оставленные поисковиками, от личных вещей группы Скороходова и бесконечно изучал открытые ныне тома засекреченного на полвека уголовного дела; он знал, что рано или поздно попадет на Тур-гору, на склоне которой погибла скороходовская группа, и немедленно почует благодаря врожденной эмпатии, что тут, собственно, приключилось сорок пять лет назад.</p><p class="p1">Дубняк три дня составлял список необходимого оборудования и закупал недостающее на свои и савельевские средства; как Савельев ни торопил — ничто не заставило бы его вый-ти в осеннюю тайгу без пятидесяти килограммов снаряжения. Добираться до колхоза имени Шестидесятилетия Октября предстояло сначала поездом, затем автобусом, а потом пешком, три километра по проселочной дороге, пришедшей, должно быть, в полную негодность. Выход они наметили на двадцать восьмое. В ночь накануне старта Савельеву не спалось, и он снова вышел в эфир, скользя по частотам в напрасной надежде вновь услышать что-нибудь путеводное. На частоте 147,26 внятный и сиплый мужской голос неожиданно сказал:</p><p class="p1">— Никогда вы не придете, никогда не найдете. Ах, тьма, тьма, какая судьба.</p><p class="p1">Савельев долго еще вслушивался и сквозь шорох разобрал женское, такое же безнадежное:</p><p class="p1">— Чтоб ты проклят был, гад, и я, дура, с тобою.</p></span></span>
