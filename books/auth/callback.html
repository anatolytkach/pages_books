<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signing in... — reader.pub</title>
    <link rel="icon" type="image/svg+xml" href="/books/assets/logo.svg" />
    <script src="/books/shared/supabase.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&display=swap");
      body {
        margin: 0;
        font-family: "Source Sans 3", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #1f1b16;
      }
      .msg { text-align: center; font-size: 16px; color: #6c645a; }
      .msg a { color: #028f80; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="msg" id="msg">Completing sign in...</div>
    <script type="module">
      import config from '../shared/config.js';
      import { acceptInvitation } from '../shared/api.js';

      const sb = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
      const params = new URLSearchParams(window.location.search);
      const msgEl = document.getElementById('msg');

      function getReturnTo() {
        const returnTo = params.get('returnTo') || sessionStorage.getItem('authReturnTo');
        return returnTo && returnTo.startsWith('/') ? returnTo : '/books/';
      }

      async function finishRedirect() {
        const inviteToken = params.get('invite') || sessionStorage.getItem('authInviteToken');
        msgEl.textContent = inviteToken
          ? 'Email confirmed. Finishing your invitation...'
          : 'Email confirmed. Signing you in...';
        if (inviteToken) {
          try {
            await acceptInvitation(inviteToken);
          } catch (err) {
            msgEl.innerHTML =
              `Signed in, but invitation acceptance failed: ${err.message}<br><a href="/books/auth/?returnTo=${encodeURIComponent(getReturnTo())}">Return to sign in</a>`;
            return;
          }
          sessionStorage.removeItem('authInviteToken');
        }
        sessionStorage.removeItem('pendingSignupEmail');
        sessionStorage.removeItem('authReturnTo');
        window.location.href = getReturnTo();
      }

      const initialReturnTo = params.get('returnTo');
      if (initialReturnTo && initialReturnTo.startsWith('/')) {
        sessionStorage.setItem('authReturnTo', initialReturnTo);
      }

      let exchangeFailed = false;
      const code = params.get('code');
      if (code && typeof sb.auth.exchangeCodeForSession === 'function') {
        msgEl.textContent = 'Confirming your email and creating your session...';
        const { error: exchangeError } = await sb.auth.exchangeCodeForSession(code);
        if (exchangeError) {
          msgEl.innerHTML =
            `Confirmation failed: ${exchangeError.message}<br><a href="/books/auth/?returnTo=${encodeURIComponent(getReturnTo())}">Return to sign in</a>`;
          exchangeFailed = true;
        }
      }

      if (exchangeFailed) {
        // Stop here after rendering the error state.
      } else {
        // Supabase client automatically picks up tokens from the URL hash/params.
        // We just need to wait for the session to be established.
        const { data: { session }, error } = await sb.auth.getSession();

        if (error) {
          msgEl.innerHTML =
            `Sign in failed: ${error.message}<br><a href="/books/auth/">Try again</a>`;
        } else if (session) {
          await finishRedirect();
        } else {
          // No session yet — might still be processing. Listen for change.
          msgEl.textContent = 'Email confirmed. Waiting for your session...';
          sb.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN' && session) {
              await finishRedirect();
            }
          });
          // Timeout fallback
          setTimeout(() => {
            msgEl.innerHTML =
              `Email was confirmed, but the sign-in session did not finish automatically.<br><a href="/books/auth/?returnTo=${encodeURIComponent(getReturnTo())}">Return to sign in</a>`;
          }, 10000);
        }
      }
    </script>
  </body>
</html>
