<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Publish — reader.pub</title>
    <link rel="icon" type="image/svg+xml" href="/books/assets/logo.svg" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap");

      :root {
        --bg: #ffffff;
        --ink: #1f1b16;
        --muted: #6c645a;
        --accent: #028f80;
        --accent-2: #016b61;
        --border: #d8dee8;
        --border-active: #028f80;
        --radius-lg: 14px;
        --radius-md: 10px;
        --radius-sm: 8px;
        --rect-bg: linear-gradient(90deg, #fcfaf8 0%, #ffffff 100%);
        --error: #c0392b;
        --success: #028f80;
        --warning: #e67e22;
      }

      * { box-sizing: border-box; }
      html { font-size: 16px; }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: "Source Sans 3", "Helvetica Neue", sans-serif;
        min-height: 100vh;
      }

      #app {
        max-width: 960px;
        margin: 0 auto;
        padding: 28px 24px 40px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 28px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }

      .brand img { width: 36px; height: 36px; }

      .brand .title {
        font-family: "Playfair Display", "Times New Roman", serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--accent);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      h2 {
        font-family: "Playfair Display", "Times New Roman", serif;
        font-size: 24px;
        font-weight: 700;
        color: var(--ink);
        margin: 0 0 20px;
      }

      /* ── Panels ───────────────────────────── */
      .panel {
        background: var(--rect-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 24px;
      }

      /* ── Buttons ──────────────────────────── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 40px;
        padding: 0 18px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: var(--radius-md);
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      .btn:hover { background: var(--accent-2); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .btn-secondary {
        background: #fff;
        color: var(--accent);
        border-color: var(--border);
      }

      .btn-secondary:hover {
        border-color: var(--accent);
        background: #fcfaf8;
      }

      /* ── Upload area ──────────────────────── */
      .upload-zone {
        border: 2px dashed var(--border);
        border-radius: var(--radius-lg);
        padding: 48px 24px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }

      .upload-zone:hover,
      .upload-zone.dragover {
        border-color: var(--accent);
        background: rgba(2, 143, 128, 0.03);
      }

      .upload-zone p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .upload-zone .upload-icon {
        font-size: 36px;
        color: var(--accent);
      }

      .upload-zone input[type="file"] { display: none; }

      /* ── Progress ─────────────────────────── */
      .progress-wrap {
        display: none;
        margin-top: 16px;
      }

      .progress-wrap.visible { display: block; }

      .progress-bar-outer {
        height: 8px;
        background: #e8e5e0;
        border-radius: 4px;
        overflow: hidden;
      }

      .progress-bar-inner {
        height: 100%;
        background: var(--accent);
        border-radius: 4px;
        width: 0%;
        transition: width 0.2s;
      }

      .progress-text {
        font-size: 13px;
        color: var(--muted);
        margin-top: 6px;
      }

      /* ── Status badges ────────────────────── */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }

      .status-badge.pending { background: #f0ece6; color: var(--muted); }
      .status-badge.processing { background: #e8f4fd; color: #2980b9; }
      .status-badge.ready { background: #e8f8f5; color: var(--success); }
      .status-badge.published { background: #d5f5e3; color: #1a7f54; }
      .status-badge.failed { background: #fdf0ef; color: var(--error); }
      .status-badge.draft { background: #fef9e7; color: var(--warning); }

      /* ── Form ─────────────────────────────── */
      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 10px 14px;
        font-family: inherit;
        font-size: 15px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: #fff;
        color: var(--ink);
        outline: none;
        transition: border-color 0.15s;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        border-color: var(--border-active);
      }

      .form-group textarea { min-height: 100px; resize: vertical; }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }

      /* ── Book list ────────────────────────── */
      .book-list {
        display: grid;
        gap: 12px;
      }

      .book-item {
        display: grid;
        grid-template-columns: 60px 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 14px;
        background: var(--rect-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        text-decoration: none;
        color: inherit;
        transition: border-color 0.15s;
        cursor: pointer;
      }

      .book-item:hover { border-color: var(--accent); }

      .book-item-cover {
        width: 60px;
        height: 90px;
        background: #f3eee6;
        border-radius: 4px;
        overflow: hidden;
      }

      .book-item-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .book-item-info h3 {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 600;
      }

      .book-item-info .meta {
        font-size: 13px;
        color: var(--muted);
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
      }

      .empty-state p { margin: 8px 0; }

      /* ── Alert ────────────────────────────── */
      .alert {
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        font-size: 14px;
        margin-bottom: 16px;
        display: none;
      }

      .alert.error { background: #fdf0ef; color: var(--error); border: 1px solid #f5c6cb; }
      .alert.success { background: #e8f8f5; color: var(--success); border: 1px solid #a3d9d0; }
      .alert.visible { display: block; }

      /* ── Validation errors ────────────────── */
      .validation-errors {
        background: #fdf0ef;
        border: 1px solid #f5c6cb;
        border-radius: var(--radius-sm);
        padding: 12px 16px;
        margin-top: 12px;
      }

      .validation-errors h4 {
        margin: 0 0 8px;
        font-size: 14px;
        color: var(--error);
      }

      .validation-errors ul {
        margin: 0;
        padding-left: 18px;
        font-size: 13px;
        color: var(--error);
      }

      /* ── Views ─────────────────────────────── */
      .view { display: none; }
      .view.active { display: block; }

      /* ── Spinner ───────────────────────────── */
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
      }

      .spinner.dark {
        border-color: rgba(0,0,0,0.1);
        border-top-color: var(--accent);
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      @media (max-width: 600px) {
        .form-row { grid-template-columns: 1fr; }
        .book-item { grid-template-columns: 48px 1fr; }
        .book-item .status-badge { grid-column: 1 / -1; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <a class="brand" href="/books/">
          <img src="/books/assets/logo.svg" alt="" />
          <span class="title">Publish</span>
        </a>
        <div class="header-right">
          <a href="/books/" class="btn btn-secondary">Catalog</a>
          <user-menu></user-menu>
        </div>
      </header>

      <div id="alert" class="alert"></div>

      <!-- ── My Books view ──────────────── -->
      <div id="view-list" class="view active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:8px;">
          <h2 style="margin:0;">My Books</h2>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-secondary" id="showTenantBtn">Organization</button>
            <button class="btn" id="uploadBtn">+ Upload Book</button>
          </div>
        </div>
        <div id="bookList" class="book-list">
          <div class="empty-state">
            <p><span class="spinner dark"></span></p>
            <p>Loading...</p>
          </div>
        </div>
      </div>

      <!-- ── Upload view ────────────────── -->
      <div id="view-upload" class="view">
        <h2>Upload Book</h2>
        <div class="panel">
          <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">&#8593;</div>
            <strong>Drop your file here or click to browse</strong>
            <p>Accepts .epub files (max 100 MB)<br>DOCX support coming soon</p>
            <input type="file" id="fileInput" accept=".epub" />
          </div>
          <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar-outer">
              <div class="progress-bar-inner" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">Uploading...</div>
          </div>
        </div>
        <button class="btn btn-secondary" id="backToList">&larr; Back to My Books</button>
      </div>

      <!-- ── Tenant view ───────────────── -->
      <div id="view-tenant" class="view">
        <h2>Organization</h2>
        <div id="tenantContent">
          <!-- Loaded dynamically -->
        </div>
        <button class="btn btn-secondary" id="backFromTenant" style="margin-top:16px;">&larr; Back to My Books</button>
      </div>

      <!-- ── Edit metadata view ─────────── -->
      <div id="view-edit" class="view">
        <h2>Book Details</h2>
        <div id="editAlert" class="alert"></div>
        <div class="panel">
          <div id="bookStatus"></div>
          <form id="metadataForm">
            <div class="form-row">
              <div class="form-group">
                <label for="meta-title">Title *</label>
                <input type="text" id="meta-title" required />
              </div>
              <div class="form-group">
                <label for="meta-author">Author *</label>
                <input type="text" id="meta-author" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="meta-genre">Genre *</label>
                <select id="meta-genre" required>
                  <option value="">Select genre...</option>
                </select>
              </div>
              <div class="form-group">
                <label for="meta-year">Year Written *</label>
                <input type="number" id="meta-year" min="1" max="2030" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="meta-isbn">ISBN</label>
                <input type="text" id="meta-isbn" />
              </div>
              <div class="form-group">
                <label for="meta-language">Language</label>
                <input type="text" id="meta-language" value="en" />
              </div>
            </div>
            <div class="form-group">
              <label for="meta-annotation">Annotation *</label>
              <textarea id="meta-annotation" required placeholder="Describe this book..."></textarea>
            </div>
            <div class="form-actions">
              <button type="button" class="btn" id="saveMetaBtn">Save</button>
              <button type="button" class="btn" id="publishBtn" disabled>Publish</button>
              <button type="button" class="btn btn-secondary" id="backFromEdit">&larr; Back</button>
              <button type="button" class="btn" id="deleteBtn" style="display:none;background:var(--error);border-color:var(--error);margin-left:auto;">Delete</button>
            </div>
          </form>
        </div>
        <div id="validationErrors"></div>

        <!-- Offers section (visible for published/ready books) -->
        <div id="offersSection" class="panel" style="display:none">
          <h3 style="font-family:'Playfair Display',serif; margin:0 0 16px;">Pricing</h3>
          <div id="offersList"></div>
          <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border);">
            <strong style="font-size:14px; color:var(--muted);">Add Offer</strong>
            <div class="form-row" style="margin-top:8px;">
              <div class="form-group">
                <label for="offer-type">Type</label>
                <select id="offer-type">
                  <option value="purchase">Purchase</option>
                  <option value="rental">Rental</option>
                </select>
              </div>
              <div class="form-group">
                <label for="offer-price">Price (USD)</label>
                <input type="number" id="offer-price" min="0" step="0.01" placeholder="9.99" />
              </div>
            </div>
            <div class="form-group" id="rentalDaysGroup" style="display:none;">
              <label for="offer-rental-days">Rental Days</label>
              <input type="number" id="offer-rental-days" min="1" value="14" />
            </div>
            <button type="button" class="btn" id="addOfferBtn">Add Offer</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import config from '../shared/config.js';
      import '../shared/user-menu.js';

      const sb = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
      const API = config.apiBase;

      // ── Auth gate ──────────────────────────
      let currentUser = null;
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = `/books/auth/?returnTo=${encodeURIComponent(window.location.pathname)}`;
      }
      currentUser = session.user;

      async function apiFetch(method, path, { body, raw } = {}) {
        const { data: { session: s } } = await sb.auth.getSession();
        const headers = {};
        if (s) headers['Authorization'] = `Bearer ${s.access_token}`;
        const url = `${API}${path}`;
        const opts = { method, headers };
        if (body instanceof FormData) {
          opts.body = body;
        } else if (body !== undefined) {
          headers['Content-Type'] = 'application/json';
          opts.body = JSON.stringify(body);
        }
        const res = await fetch(url, opts);
        if (raw) return res;
        if (!res.ok) {
          const detail = await res.json().catch(() => ({ error: res.statusText }));
          throw new Error(detail.error || detail.message || `HTTP ${res.status}`);
        }
        const ct = res.headers.get('content-type') || '';
        return ct.includes('json') ? res.json() : res;
      }

      // ── DOM refs ───────────────────────────
      const $alert = document.getElementById('alert');
      const $editAlert = document.getElementById('editAlert');
      const views = {
        list: document.getElementById('view-list'),
        upload: document.getElementById('view-upload'),
        edit: document.getElementById('view-edit'),
        tenant: document.getElementById('view-tenant'),
      };

      function showView(name) {
        Object.values(views).forEach(v => v.classList.remove('active'));
        views[name].classList.add('active');
      }

      function showAlert(el, msg, type = 'error') {
        el.textContent = msg;
        el.className = `alert ${type} visible`;
      }

      function hideAlert(el) { el.className = 'alert'; }

      // ── Book list ──────────────────────────
      let myBooks = [];
      let genres = [];
      let editingBookId = null;

      async function loadGenres() {
        try {
          genres = await apiFetch('GET', '/genres');
        } catch { genres = []; }
        const sel = document.getElementById('meta-genre');
        sel.innerHTML = '<option value="">Select genre...</option>';
        for (const g of genres) {
          const opt = document.createElement('option');
          opt.value = g.id;
          opt.textContent = g.parent_id ? `  ${g.name}` : g.name;
          sel.appendChild(opt);
        }
      }

      async function loadMyBooks() {
        const $list = document.getElementById('bookList');
        try {
          myBooks = await apiFetch('GET', '/publish/books');
          if (!myBooks.length) {
            $list.innerHTML = `
              <div class="empty-state">
                <p>You haven't published any books yet.</p>
                <p>Click <strong>Upload Book</strong> to get started.</p>
              </div>`;
            return;
          }
          $list.innerHTML = myBooks.map(book => `
            <div class="book-item" data-id="${book.id}">
              <div class="book-item-cover">
                ${book.cover_url ? `<img src="${book.cover_url}" alt="" />` : ''}
              </div>
              <div class="book-item-info">
                <h3>${esc(book.title)}</h3>
                <div class="meta">${esc(book.author)} ${book.year_written ? `(${book.year_written})` : ''}</div>
              </div>
              <span class="status-badge ${book.status}">${book.status}</span>
            </div>
          `).join('');
        } catch (err) {
          $list.innerHTML = `<div class="empty-state"><p>Failed to load books: ${esc(err.message)}</p></div>`;
        }
      }

      function esc(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
      }

      // Click on book item → edit
      document.getElementById('bookList').addEventListener('click', (e) => {
        const item = e.target.closest('.book-item');
        if (!item) return;
        openBookEditor(item.dataset.id);
      });

      async function openBookEditor(bookId) {
        editingBookId = bookId;
        hideAlert($editAlert);
        showView('edit');
        try {
          const book = await apiFetch('GET', `/publish/books/${bookId}`);
          document.getElementById('meta-title').value = book.title || '';
          document.getElementById('meta-author').value = book.author || '';
          document.getElementById('meta-genre').value = book.genre_id || '';
          document.getElementById('meta-year').value = book.year_written || '';
          document.getElementById('meta-isbn').value = book.isbn || '';
          document.getElementById('meta-language').value = book.language || 'en';
          document.getElementById('meta-annotation').value = book.annotation || '';

          const $status = document.getElementById('bookStatus');
          $status.innerHTML = `<span class="status-badge ${book.status}">${book.status}</span>`;

          const $publishBtn = document.getElementById('publishBtn');
          $publishBtn.disabled = (book.status !== 'ready');

          // Show delete button for draft/failed books
          const $deleteBtn = document.getElementById('deleteBtn');
          $deleteBtn.style.display = (book.status === 'draft' || book.status === 'failed' || book.status === 'processing') ? '' : 'none';

          // Show validation errors if any
          const $valErr = document.getElementById('validationErrors');
          if (book.source_asset && book.source_asset.validation_errors) {
            const errors = book.source_asset.validation_errors;
            $valErr.innerHTML = `
              <div class="validation-errors">
                <h4>Validation Errors</h4>
                <ul>${errors.map(e => `<li>${esc(e.message || e)}</li>`).join('')}</ul>
              </div>`;
          } else {
            $valErr.innerHTML = '';
          }

          // Load offers for published/ready books
          if (book.status === 'published' || book.status === 'ready') {
            await loadOffers(bookId);
          } else {
            document.getElementById('offersSection').style.display = 'none';
          }
        } catch (err) {
          showAlert($editAlert, err.message);
        }
      }

      // ── Upload flow ────────────────────────
      document.getElementById('uploadBtn').addEventListener('click', () => {
        showView('upload');
        hideAlert($alert);
      });

      document.getElementById('backToList').addEventListener('click', () => {
        showView('list');
      });

      document.getElementById('backFromEdit').addEventListener('click', () => {
        showView('list');
        loadMyBooks();
      });

      const $zone = document.getElementById('uploadZone');
      const $fileInput = document.getElementById('fileInput');
      const $progressWrap = document.getElementById('progressWrap');
      const $progressBar = document.getElementById('progressBar');
      const $progressText = document.getElementById('progressText');

      $zone.addEventListener('click', () => $fileInput.click());

      $zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        $zone.classList.add('dragover');
      });

      $zone.addEventListener('dragleave', () => {
        $zone.classList.remove('dragover');
      });

      $zone.addEventListener('drop', (e) => {
        e.preventDefault();
        $zone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
      });

      $fileInput.addEventListener('change', () => {
        if ($fileInput.files.length) handleFile($fileInput.files[0]);
      });

      async function handleFile(file) {
        hideAlert($alert);
        const name = file.name.toLowerCase();

        if (!name.endsWith('.epub')) {
          showAlert($alert, 'Only .epub files are supported at this time.');
          return;
        }

        if (file.size > 100 * 1024 * 1024) {
          showAlert($alert, 'File too large. Maximum size is 100 MB.');
          return;
        }

        // Show progress
        $progressWrap.classList.add('visible');
        $progressBar.style.width = '0%';
        $progressText.textContent = 'Uploading...';
        $zone.style.display = 'none';

        try {
          const form = new FormData();
          form.append('file', file);

          // Use XMLHttpRequest for progress tracking
          const result = await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', `${API}/publish/upload`);

            sb.auth.getSession().then(({ data: { session: s } }) => {
              if (s) xhr.setRequestHeader('Authorization', `Bearer ${s.access_token}`);

              xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                  const pct = Math.round((e.loaded / e.total) * 100);
                  $progressBar.style.width = `${pct}%`;
                  $progressText.textContent = `Uploading... ${pct}%`;
                }
              });

              xhr.addEventListener('load', () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                  resolve(JSON.parse(xhr.responseText));
                } else {
                  try {
                    const err = JSON.parse(xhr.responseText);
                    reject(new Error(err.error || err.message || `HTTP ${xhr.status}`));
                  } catch {
                    reject(new Error(`Upload failed (HTTP ${xhr.status})`));
                  }
                }
              });

              xhr.addEventListener('error', () => reject(new Error('Network error during upload')));
              xhr.send(form);
            });
          });

          $progressText.textContent = 'Processing...';
          $progressBar.style.width = '100%';

          // Poll for processing completion
          if (result.bookId) {
            let attempts = 0;
            while (attempts < 30) {
              await new Promise(r => setTimeout(r, 2000));
              attempts++;
              try {
                const book = await apiFetch('GET', `/publish/books/${result.bookId}`);
                if (book.status === 'ready' || book.status === 'failed') {
                  await loadMyBooks();
                  openBookEditor(result.bookId);
                  return;
                }
                $progressText.textContent = `Processing... (${book.status})`;
              } catch { break; }
            }
            // Timed out or error — still go to editor
            await loadMyBooks();
            openBookEditor(result.bookId);
          }
        } catch (err) {
          showAlert($alert, err.message);
          $zone.style.display = '';
          $progressWrap.classList.remove('visible');
        }
      }

      // ── Save metadata ──────────────────────
      document.getElementById('saveMetaBtn').addEventListener('click', async () => {
        hideAlert($editAlert);
        const btn = document.getElementById('saveMetaBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';

        try {
          const metadata = {
            title: document.getElementById('meta-title').value.trim(),
            author: document.getElementById('meta-author').value.trim(),
            genre_id: document.getElementById('meta-genre').value,
            year_written: parseInt(document.getElementById('meta-year').value) || null,
            isbn: document.getElementById('meta-isbn').value.trim() || null,
            language: document.getElementById('meta-language').value.trim() || 'en',
            annotation: document.getElementById('meta-annotation').value.trim(),
          };

          if (!metadata.title || !metadata.author || !metadata.genre_id || !metadata.annotation) {
            showAlert($editAlert, 'Please fill in all required fields.');
            return;
          }

          await apiFetch('PATCH', `/publish/books/${editingBookId}/metadata`, { body: metadata });
          showAlert($editAlert, 'Saved.', 'success');

          // Re-check if publishable
          const book = await apiFetch('GET', `/publish/books/${editingBookId}`);
          document.getElementById('publishBtn').disabled = (book.status !== 'ready');
        } catch (err) {
          showAlert($editAlert, err.message);
        } finally {
          btn.disabled = false;
          btn.textContent = 'Save';
        }
      });

      // ── Publish ────────────────────────────
      document.getElementById('publishBtn').addEventListener('click', async () => {
        hideAlert($editAlert);
        const btn = document.getElementById('publishBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';

        try {
          await apiFetch('POST', `/publish/books/${editingBookId}/publish`, {
            body: { visibility: 'public' },
          });
          showAlert($editAlert, 'Book published!', 'success');
          const $status = document.getElementById('bookStatus');
          $status.innerHTML = '<span class="status-badge published">published</span>';
          btn.disabled = true;
          btn.textContent = 'Published';
        } catch (err) {
          showAlert($editAlert, err.message);
          btn.disabled = false;
          btn.textContent = 'Publish';
        }
      });

      // ── Tenant management ─────────────────
      document.getElementById('showTenantBtn').addEventListener('click', () => {
        showView('tenant');
        loadTenantView();
      });

      document.getElementById('backFromTenant').addEventListener('click', () => {
        showView('list');
      });

      async function loadTenantView() {
        const $content = document.getElementById('tenantContent');
        $content.innerHTML = '<div class="empty-state"><span class="spinner dark"></span> Loading...</div>';

        try {
          const memberships = await apiFetch('GET', '/me/tenants');
          if (!memberships.length) {
            // No tenant — show create form
            $content.innerHTML = `
              <div class="panel">
                <p style="color:var(--muted); margin:0 0 16px;">You don't have an organization yet. Create one to manage your publishing team.</p>
                <div class="form-group">
                  <label for="tenant-name">Organization Name</label>
                  <input type="text" id="tenant-name" placeholder="My Publishing House" />
                </div>
                <div class="form-group">
                  <label for="tenant-slug">URL Slug (lowercase, letters and hyphens)</label>
                  <input type="text" id="tenant-slug" placeholder="my-publishing-house" pattern="[a-z0-9][a-z0-9-]{1,48}[a-z0-9]" />
                </div>
                <div class="form-group">
                  <label for="tenant-type">Type</label>
                  <select id="tenant-type">
                    <option value="individual_author">Individual Author</option>
                    <option value="publisher">Publisher</option>
                    <option value="library">Library</option>
                    <option value="university">University</option>
                    <option value="distributor">Distributor</option>
                  </select>
                </div>
                <button class="btn" id="createTenantBtn">Create Organization</button>
              </div>`;

            // Auto-generate slug from name
            document.getElementById('tenant-name').addEventListener('input', (e) => {
              const slug = e.target.value.trim().toLowerCase()
                .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 50);
              document.getElementById('tenant-slug').value = slug;
            });

            document.getElementById('createTenantBtn').addEventListener('click', async () => {
              const name = document.getElementById('tenant-name').value.trim();
              const slug = document.getElementById('tenant-slug').value.trim();
              const type = document.getElementById('tenant-type').value;
              if (!name || !slug) { showAlert($alert, 'Name and slug are required.'); return; }
              const btn = document.getElementById('createTenantBtn');
              btn.disabled = true;
              btn.innerHTML = '<span class="spinner"></span>';
              try {
                await apiFetch('POST', '/tenants', { body: { name, slug, tenant_type: type } });
                await loadTenantView();
              } catch (err) {
                showAlert($alert, err.message);
                btn.disabled = false;
                btn.textContent = 'Create Organization';
              }
            });
          } else {
            // Show tenant info + members + invite form
            const m = memberships[0];
            const tenant = m.tenants || m.tenant || m;
            const slug = tenant.slug;

            let membersHtml = '';
            let members = [];
            try {
              members = await apiFetch('GET', `/tenants/${slug}/members`);
              membersHtml = members.map(mem => {
                const profile = mem.user_profiles || {};
                return `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border);">
                  <div>
                    <strong>${esc(profile.display_name || 'User')}</strong>
                    <span style="color:var(--muted); font-size:13px; margin-left:8px;">${esc(mem.role)}</span>
                  </div>
                </div>`;
              }).join('');
            } catch { membersHtml = '<div style="color:var(--muted); font-size:14px;">Could not load members.</div>'; }

            $content.innerHTML = `
              <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                  <div>
                    <h3 style="font-family:'Playfair Display',serif; margin:0;">${esc(tenant.name)}</h3>
                    <div style="color:var(--muted); font-size:13px;">${esc(tenant.tenant_type)} &middot; ${esc(slug)}</div>
                  </div>
                  <span class="status-badge ready">${esc(m.role)}</span>
                </div>

                <h4 style="margin:20px 0 12px; font-size:15px; color:var(--muted);">Members (${members.length})</h4>
                ${membersHtml}

                <h4 style="margin:20px 0 12px; font-size:15px; color:var(--muted);">Invite Collaborator</h4>
                <div class="form-row">
                  <div class="form-group">
                    <input type="email" id="invite-email" placeholder="colleague@email.com" />
                  </div>
                  <div class="form-group">
                    <select id="invite-role">
                      <option value="publisher">Publisher</option>
                      <option value="editor">Editor</option>
                      <option value="admin">Admin</option>
                      <option value="member">Member</option>
                    </select>
                  </div>
                </div>
                <button class="btn" id="inviteBtn">Send Invite</button>
              </div>`;

            document.getElementById('inviteBtn').addEventListener('click', async () => {
              const email = document.getElementById('invite-email').value.trim();
              const role = document.getElementById('invite-role').value;
              if (!email) { showAlert($alert, 'Enter an email address.'); return; }
              const btn = document.getElementById('inviteBtn');
              btn.disabled = true;
              try {
                await apiFetch('POST', `/tenants/${slug}/invite`, { body: { email, role } });
                document.getElementById('invite-email').value = '';
                showAlert($alert, 'Invitation sent!', 'success');
              } catch (err) {
                showAlert($alert, err.message);
              } finally {
                btn.disabled = false;
              }
            });
          }
        } catch (err) {
          $content.innerHTML = `<div class="empty-state">Failed to load: ${esc(err.message)}</div>`;
        }
      }

      // ── Delete ────────────────────────────
      document.getElementById('deleteBtn').addEventListener('click', async () => {
        if (!confirm('Delete this book? This cannot be undone.')) return;
        hideAlert($editAlert);
        const btn = document.getElementById('deleteBtn');
        btn.disabled = true;
        try {
          await apiFetch('DELETE', `/publish/books/${editingBookId}`);
          showView('list');
          await loadMyBooks();
        } catch (err) {
          showAlert($editAlert, err.message);
          btn.disabled = false;
        }
      });

      // ── Offers ────────────────────────────
      document.getElementById('offer-type').addEventListener('change', (e) => {
        document.getElementById('rentalDaysGroup').style.display =
          e.target.value === 'rental' ? '' : 'none';
      });

      async function loadOffers(bookId) {
        const section = document.getElementById('offersSection');
        const list = document.getElementById('offersList');
        try {
          const offers = await apiFetch('GET', `/books/${bookId}/offers`);
          if (!offers.length) {
            list.innerHTML = '<div style="color:var(--muted); font-size:14px;">No offers yet. Add a purchase or rental price below.</div>';
          } else {
            list.innerHTML = offers.map(o => `
              <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border);">
                <div>
                  <strong>${esc(o.offer_type)}</strong>
                  — $${(o.price_cents / 100).toFixed(2)} ${o.currency}
                  ${o.rental_days ? `(${o.rental_days} days)` : ''}
                </div>
                <button class="btn btn-secondary" style="height:32px; padding:0 12px; font-size:13px;"
                  onclick="window._deactivateOffer('${o.id}')">Remove</button>
              </div>
            `).join('');
          }
          section.style.display = '';
        } catch { section.style.display = 'none'; }
      }

      window._deactivateOffer = async (offerId) => {
        try {
          await apiFetch('PATCH', `/offers/${offerId}`, { body: { is_active: false } });
          await loadOffers(editingBookId);
        } catch (err) {
          showAlert($editAlert, err.message);
        }
      };

      document.getElementById('addOfferBtn').addEventListener('click', async () => {
        hideAlert($editAlert);
        const offerType = document.getElementById('offer-type').value;
        const priceStr = document.getElementById('offer-price').value;
        const price = parseFloat(priceStr);
        if (isNaN(price) || price < 0) {
          showAlert($editAlert, 'Enter a valid price.');
          return;
        }
        const body = {
          offer_type: offerType,
          price_cents: Math.round(price * 100),
          currency: 'USD',
        };
        if (offerType === 'rental') {
          body.rental_days = parseInt(document.getElementById('offer-rental-days').value) || 14;
        }
        const btn = document.getElementById('addOfferBtn');
        btn.disabled = true;
        try {
          await apiFetch('POST', `/books/${editingBookId}/offers`, { body });
          document.getElementById('offer-price').value = '';
          await loadOffers(editingBookId);
        } catch (err) {
          showAlert($editAlert, err.message);
        } finally {
          btn.disabled = false;
        }
      });

      // ── Init ───────────────────────────────
      await loadGenres();
      await loadMyBooks();
    </script>
  </body>
</html>
