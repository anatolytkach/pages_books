<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Account — reader.pub</title>
    <link rel="icon" type="image/svg+xml" href="/books/assets/logo.svg" />
    <script src="/books/shared/supabase.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap");

      :root {
        --bg: #ffffff;
        --ink: #1f1b16;
        --muted: #6c645a;
        --accent: #028f80;
        --accent-2: #016b61;
        --border: #d8dee8;
        --border-active: #028f80;
        --radius-lg: 14px;
        --radius-md: 10px;
        --radius-sm: 8px;
        --rect-bg: linear-gradient(90deg, #fcfaf8 0%, #ffffff 100%);
        --error: #c0392b;
        --success: #028f80;
      }

      * { box-sizing: border-box; }
      html { font-size: 16px; }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: "Source Sans 3", "Helvetica Neue", sans-serif;
        min-height: 100vh;
      }

      #app {
        max-width: 960px;
        margin: 0 auto;
        padding: 28px 24px 40px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 28px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }

      .brand img { width: 36px; height: 36px; }

      .brand .title {
        font-family: "Playfair Display", "Times New Roman", serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--accent);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      h2 {
        font-family: "Playfair Display", "Times New Roman", serif;
        font-size: 24px;
        font-weight: 700;
        color: var(--ink);
        margin: 0 0 20px;
      }

      h3 {
        font-family: "Playfair Display", "Times New Roman", serif;
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 16px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 40px;
        padding: 0 18px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: var(--radius-md);
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
      }

      .btn:hover { background: var(--accent-2); }

      .btn-secondary {
        background: #fff;
        color: var(--accent);
        border-color: var(--border);
      }

      .btn-secondary:hover {
        border-color: var(--accent);
        background: #fcfaf8;
      }

      .btn-danger {
        background: #fff;
        color: var(--error);
        border-color: var(--error);
      }

      .btn-danger:hover {
        background: #fdf0ef;
      }

      .panel {
        background: var(--rect-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 24px;
      }

      .profile-row {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .profile-avatar {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        font-size: 24px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .profile-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }

      .profile-info { flex: 1; min-width: 0; }

      .profile-name {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 4px;
      }

      .profile-email {
        font-size: 14px;
        color: var(--muted);
      }

      .book-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 16px;
      }

      .book-card {
        text-decoration: none;
        color: inherit;
        transition: transform 0.15s;
      }

      .book-card:hover { transform: translateY(-2px); }

      .book-card-cover {
        aspect-ratio: 5/8;
        background: #f3eee6;
        border-radius: var(--radius-sm);
        overflow: hidden;
        margin-bottom: 8px;
      }

      .book-card-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .book-card-title {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        margin: 0 0 2px;
      }

      .book-card-meta {
        font-size: 12px;
        color: var(--muted);
      }

      .empty-state {
        text-align: center;
        padding: 32px 20px;
        color: var(--muted);
        font-size: 14px;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .tab-row {
        display: flex;
        gap: 0;
        border-bottom: 2px solid var(--border);
        margin-bottom: 20px;
      }

      .tab-btn {
        background: none;
        border: none;
        padding: 10px 16px;
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: color 0.15s;
      }

      .tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .tab-btn:hover:not(.active) { color: var(--ink); }

      .tab-content { display: none; }
      .tab-content.active { display: block; }

      .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      @media (max-width: 600px) {
        .profile-row { flex-direction: column; text-align: center; }
        .book-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <a class="brand" href="/books/">
          <img src="/books/assets/logo.svg" alt="" />
          <span class="title">My Account</span>
        </a>
        <div class="header-right">
          <a href="/books/" class="btn btn-secondary">Catalog</a>
          <user-menu></user-menu>
        </div>
      </header>

      <!-- Profile -->
      <div class="panel" id="profilePanel">
        <div class="profile-row">
          <div class="profile-avatar" id="avatar"></div>
          <div class="profile-info">
            <div class="profile-name" id="profileName"><span class="spinner"></span></div>
            <div class="profile-email" id="profileEmail"></div>
          </div>
          <button class="btn btn-danger" id="signOutBtn">Sign Out</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tab-row" id="tabRow">
        <button class="tab-btn active" data-tab="library">My Library</button>
        <button class="tab-btn" data-tab="publications">My Publications</button>
        <button class="tab-btn" data-tab="tenants">Organizations</button>
      </div>

      <!-- My Library (purchased/rented/entitled books) -->
      <div class="tab-content active" id="tab-library">
        <div id="libraryList" class="empty-state"><span class="spinner"></span> Loading...</div>
      </div>

      <!-- My Publications (books I published) -->
      <div class="tab-content" id="tab-publications">
        <div id="publisherOnboardingPanel" class="panel" style="display:none;"></div>
        <div id="publicationsList" class="empty-state"><span class="spinner"></span> Loading...</div>
      </div>

      <!-- Organizations -->
      <div class="tab-content" id="tab-tenants">
        <div id="tenantAlerts"></div>
        <div id="superuserPanel" class="panel" style="display:none"></div>
        <div id="tenantsList" class="empty-state"><span class="spinner"></span> Loading...</div>
      </div>
    </div>

    <script type="module">
      import config from '../shared/config.js';
      import '../shared/user-menu.js';

      const sb = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
      const API = config.apiBase;

      // Auth gate
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = `/books/auth/?returnTo=${encodeURIComponent(window.location.pathname + window.location.hash)}`;
      }

      async function apiFetch(method, path, body) {
        const { data: { session: s } } = await sb.auth.getSession();
        const headers = {};
        if (s) headers['Authorization'] = `Bearer ${s.access_token}`;
        const opts = { method, headers };
        if (body !== undefined) {
          headers['Content-Type'] = 'application/json';
          opts.body = JSON.stringify(body);
        }
        const res = await fetch(`${API}${path}`, opts);
        const payload = await res.json().catch(() => null);
        if (!res.ok) throw new Error(payload?.error || payload?.message || `HTTP ${res.status}`);
        return payload;
      }

      function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
      function formatDate(value) {
        if (!value) return 'Unknown date';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return 'Unknown date';
        return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      }
      function inviteLinkFromToken(token) {
        const base = `${window.location.origin}/books/auth/`;
        return `${base}?invite=${encodeURIComponent(String(token || '').trim())}`;
      }
      function showTenantAlert(msg, type = 'success') {
        document.getElementById('tenantAlerts').innerHTML = `<div class="panel" style="border-color:${type === 'error' ? '#f5c6cb' : '#a3d9d0'}; color:${type === 'error' ? '#c0392b' : '#028f80'}; padding:12px 16px;">${esc(msg)}</div>`;
      }

      let platformAccess = { is_superuser: false, admin_tenants: [], publishing_tenants: [], can_publish: false };
      let platformTenants = [];
      let lastRosterUpdateSignal = null;

      function titleizeRole(value) {
        return String(value || '').replace(/_/g, ' ').replace(/\b\w/g, (m) => m.toUpperCase());
      }

      function notifyOrganizationRosterChanged() {
        try {
          localStorage.setItem('readerpub:tenant-roster-updated', JSON.stringify({ at: Date.now() }));
        } catch {}
      }

      function readOrganizationRosterSignal() {
        try {
          return localStorage.getItem('readerpub:tenant-roster-updated');
        } catch {
          return null;
        }
      }

      function applyPublishingNavVisibility() {
        const publicationsBtn = document.querySelector('[data-tab="publications"]');
        const publicationsTab = document.getElementById('tab-publications');
        if (publicationsBtn) publicationsBtn.style.display = '';
        if (!platformAccess.can_publish && publicationsTab && !document.getElementById('publisherOnboardingPanel')) {
          publicationsTab.innerHTML = '<div class="empty-state">Publishing is not available for this account.</div>';
        }
      }

      function slugify(value) {
        return String(value || '')
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-|-$/g, '')
          .slice(0, 60);
      }

      function renderPublisherOnboardingPanel() {
        const panel = document.getElementById('publisherOnboardingPanel');
        if (!panel) return;
        if (platformAccess.can_publish) {
          panel.style.display = 'none';
          panel.innerHTML = '';
          return;
        }

        const suggestedName = String(name || '').trim() || 'My Publishing';
        const suggestedSlug = slugify(suggestedName || email.split('@')[0] || 'publisher');
        panel.style.display = '';
        panel.innerHTML = `
          <h3 style="margin-top:0;">Become a Publisher</h3>
          <div style="color:var(--muted); font-size:14px; margin-bottom:18px;">Create your individual publisher account to upload drafts and manage your own books.</div>
          <div class="stack">
            <div>
              <label for="selfPublisherName" style="display:block; font-size:14px; font-weight:600; color:var(--muted); margin-bottom:6px;">Publisher Name</label>
              <input id="selfPublisherName" type="text" value="${esc(suggestedName)}" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md);" />
            </div>
            <div>
              <label for="selfPublisherSlug" style="display:block; font-size:14px; font-weight:600; color:var(--muted); margin-bottom:6px;">Publisher Slug</label>
              <input id="selfPublisherSlug" type="text" value="${esc(suggestedSlug)}" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md);" />
            </div>
            <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
              <button class="btn" id="selfPublisherOnboardBtn">Become a Publisher</button>
              <span id="selfPublisherOnboardResult" style="font-size:13px; color:var(--muted);"></span>
            </div>
          </div>
        `;

        const nameInput = document.getElementById('selfPublisherName');
        const slugInput = document.getElementById('selfPublisherSlug');
        nameInput?.addEventListener('input', () => {
          if (!slugInput) return;
          if (!slugInput.dataset.editedManually) {
            slugInput.value = slugify(nameInput.value);
          }
        });
        slugInput?.addEventListener('input', () => {
          slugInput.dataset.editedManually = '1';
        });

        document.getElementById('selfPublisherOnboardBtn')?.addEventListener('click', async () => {
          const btn = document.getElementById('selfPublisherOnboardBtn');
          const result = document.getElementById('selfPublisherOnboardResult');
          const tenantName = String(nameInput?.value || '').trim();
          const tenantSlug = slugify(slugInput?.value || '');
          if (!tenantName || !tenantSlug) {
            result.textContent = 'Publisher name and slug are required.';
            result.style.color = '#c0392b';
            return;
          }
          btn.disabled = true;
          btn.textContent = 'Creating...';
          result.textContent = '';
          try {
            await apiFetch('POST', '/onboarding/self-publisher', { name: tenantName, slug: tenantSlug });
            window.location.href = '/books/publish/';
          } catch (err) {
            result.textContent = err.message;
            result.style.color = '#c0392b';
          } finally {
            btn.disabled = false;
            btn.textContent = 'Become a Publisher';
          }
        });
      }

      // Profile
      const user = session.user;
      const profile = await apiFetch('GET', '/me').catch(() => null);
      const name = profile?.display_name || user.user_metadata?.display_name || user.email?.split('@')[0] || 'User';
      const email = user.email || '';
      const avatarUrl = profile?.avatar_url || user.user_metadata?.avatar_url;

      document.getElementById('profileName').textContent = name;
      document.getElementById('profileEmail').textContent = email;
      const $avatar = document.getElementById('avatar');
      if (avatarUrl) {
        $avatar.innerHTML = `<img src="${esc(avatarUrl)}" alt="" />`;
      } else {
        const parts = name.split(/\s+/);
        const initials = parts.length >= 2 ? (parts[0][0] + parts[1][0]).toUpperCase() : name.substring(0, 2).toUpperCase();
        $avatar.textContent = initials;
      }

      // Sign out
      document.getElementById('signOutBtn').addEventListener('click', async () => {
        await sb.auth.signOut();
        window.location.href = '/books/';
      });

      // Tabs
      const hash = window.location.hash.replace('#', '');
      document.getElementById('tabRow').addEventListener('click', (e) => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        window.location.hash = btn.dataset.tab;
        if (btn.dataset.tab === 'tenants') {
          refreshTenantView({ force: true });
        }
      });

      if (hash === 'tenants' || hash === 'publications' || hash === 'library') {
        const tabBtn = document.querySelector(`[data-tab="${hash}"]`);
        if (tabBtn) tabBtn.click();
      }

      // My Library (purchased/rented books)
      const $library = document.getElementById('libraryList');
      try {
        const entitlements = await apiFetch('GET', '/me/entitlements').catch(() => []);

        if (!entitlements.length) {
          $library.innerHTML = '<div class="empty-state">No books in your library yet. <a href="/books/">Browse the catalog</a> to find books.</div>';
        } else {
          $library.innerHTML = `<div class="book-grid">${entitlements.map(ent => {
            const book = ent.books || ent;
            const id = book.content_id || book.id;
            const typeLabel = ent.entitlement_type === 'rental' && ent.expires_at
              ? `Rented — expires ${new Date(ent.expires_at).toLocaleDateString()}`
              : ent.entitlement_type === 'purchase' ? 'Purchased' : ent.entitlement_type || '';
            return `
              <a class="book-card" href="/books/reader/#${esc(id)}">
                <div class="book-card-cover">
                  ${book.cover_url ? `<img src="${esc(book.cover_url)}" alt="" />` : ''}
                </div>
                <div class="book-card-title">${esc(book.title)}</div>
                <div class="book-card-meta">${esc(book.author || '')}</div>
                <div class="book-card-meta" style="color:var(--accent);font-size:11px;">${esc(typeLabel)}</div>
              </a>`;
          }).join('')}</div>`;
        }
      } catch (err) {
        $library.innerHTML = `<div class="empty-state">Failed to load: ${esc(err.message)}</div>`;
      }

      // My Publications (books I published)
      const $pubs = document.getElementById('publicationsList');

      // My Organizations
      const $tenants = document.getElementById('tenantsList');
      const inviteToken = new URLSearchParams(window.location.search).get('invite');

      try {
        platformAccess = await apiFetch('GET', '/me/platform-access');
      } catch {
        platformAccess = { is_superuser: false, admin_tenants: [], publishing_tenants: [], can_publish: false };
      }
      applyPublishingNavVisibility();
      renderPublisherOnboardingPanel();

      try {
        if (!platformAccess.can_publish) {
          $pubs.innerHTML = '<div class="empty-state">Create your publisher account above to start uploading drafts and managing your books.</div>';
        } else {
          const published = await apiFetch('GET', '/publish/books').catch(() => []);
          if (!published.length) {
            $pubs.innerHTML = '<div class="empty-state">You haven\'t published any books yet. <a href="/books/publish/">Publish your first book</a>.</div>';
          } else {
            $pubs.innerHTML = `<div class="book-grid">${published.map(book => `
              <a class="book-card" href="${esc((() => {
                const params = new URLSearchParams();
                params.set('id', String(book.content_id || ''));
                const sourceSlug = String(book?.tenant?.slug || book?.tenants?.slug || '').trim();
                if (sourceSlug) params.set('source', sourceSlug);
                return `/books/reader/?${params.toString()}`;
              })())}">
                <div class="book-card-cover">
                  ${book.cover_url ? `<img src="${esc(book.cover_url)}" alt="" />` : ''}
                </div>
                <div class="book-card-title">${esc(book.title)}</div>
                <div class="book-card-meta">${esc(book.author || '')}</div>
                <div class="book-card-meta" style="color:var(--accent);font-size:11px;">${esc(book.status)}</div>
              </a>
            `).join('')}</div>`;
          }
        }
      } catch (err) {
        $pubs.innerHTML = `<div class="empty-state">Failed to load: ${esc(err.message)}</div>`;
      }

      if (inviteToken) {
        try {
          const accepted = await apiFetch('POST', '/invitations/accept', { token: inviteToken });
          showTenantAlert(`Invitation accepted for ${accepted.tenant?.name || 'organization'}.`);
          notifyOrganizationRosterChanged();
          const nextUrl = new URL(window.location.href);
          nextUrl.searchParams.delete('invite');
          history.replaceState(null, '', nextUrl.toString());
          await refreshTenantView({ force: true });
        } catch (err) {
          showTenantAlert(`Invite could not be accepted: ${err.message}`, 'error');
        }
      }

      const $superuserPanel = document.getElementById('superuserPanel');

      function renderMemberRow(member) {
        const displayName = member.profile?.display_name || member.user_id || 'Unknown user';
        return `
          <div style="padding:10px 0; border-top:1px solid var(--border);">
            <div style="font-weight:600;">${esc(displayName)}</div>
            <div style="color:var(--muted); font-size:13px;">Role: ${esc(titleizeRole(member.role))} • Joined ${esc(formatDate(member.created_at))}</div>
          </div>`;
      }

      function isInviteExpired(invite) {
        if (!invite?.expires_at) return false;
        const expiresAt = new Date(invite.expires_at);
        return !Number.isNaN(expiresAt.getTime()) && expiresAt.getTime() <= Date.now();
      }

      function renderPendingInviteRow(invite, tenantSlug = '') {
        const expired = isInviteExpired(invite);
        const statusLabel = expired ? 'Expired' : 'Pending confirmation';
        return `
          <div style="padding:10px 0; border-top:1px solid var(--border);">
            <div style="display:flex; justify-content:space-between; gap:12px; align-items:flex-start;">
              <div>
                <div style="font-weight:600;">${esc(invite.email)} <span style="color:${expired ? '#c0392b' : 'var(--accent)'}; font-size:12px;">${esc(statusLabel)}</span></div>
                <div style="color:var(--muted); font-size:13px;">Role: ${esc(titleizeRole(invite.role))} • Invited ${esc(formatDate(invite.created_at))}</div>
              </div>
              ${tenantSlug ? `<button class="btn btn-secondary invite-delete-btn" data-tenant-slug="${esc(tenantSlug)}" data-invite-id="${esc(String(invite.id))}" style="height:32px; padding:0 12px;">Delete</button>` : ''}
            </div>
            <div style="margin-top:4px; word-break:break-all; font-size:12px;">
              <a href="${esc(inviteLinkFromToken(invite.token))}" style="color:var(--accent); text-decoration:none;">${esc(inviteLinkFromToken(invite.token))}</a>
            </div>
          </div>`;
      }

      function renderPlatformTenantsList() {
        if (!platformTenants.length) {
          $tenants.innerHTML = '<div class="empty-state">No organizations exist yet.</div>';
          return;
        }
        $tenants.innerHTML = platformTenants.map((tenant) => `
          <div class="panel" style="margin-bottom:16px;">
            <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:flex-start;">
              <div>
                <strong style="font-size:18px;">${esc(tenant.name)}</strong>
                <div style="color:var(--muted); font-size:13px; margin-top:4px;">${esc(tenant.slug)} • ${esc(tenant.tenant_type)} • Created ${esc(formatDate(tenant.created_at))}</div>
              </div>
              <div style="color:var(--muted); font-size:13px;">${tenant.members.length} members • ${tenant.pending_invites.length} pending invites</div>
            </div>

            <div style="margin-top:18px;">
              <div style="font-weight:600; margin-bottom:8px;">Invite member</div>
              <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
                <div style="flex:1 1 220px;">
                  <label style="display:block; font-size:13px; color:var(--muted); margin-bottom:6px;">Email</label>
                  <input data-tenant-email="${esc(tenant.slug)}" type="email" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md);" placeholder="person@example.com" />
                </div>
                <div style="width:160px;">
                  <label style="display:block; font-size:13px; color:var(--muted); margin-bottom:6px;">Role</label>
                  <select data-tenant-role="${esc(tenant.slug)}" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md); background:#fff;">
                    <option value="admin">Admin</option>
                    <option value="publisher">Publisher</option>
                    <option value="member">Member</option>
                  </select>
                </div>
                <button class="btn tenant-invite-btn" data-tenant-slug="${esc(tenant.slug)}">Send Invite</button>
              </div>
              <div data-tenant-result="${esc(tenant.slug)}" style="margin-top:10px; font-size:13px; color:var(--muted);"></div>
            </div>

            <div style="margin-top:18px;">
              <div style="font-weight:600;">Members</div>
              ${tenant.members.length ? tenant.members.map(renderMemberRow).join('') : '<div style="padding:10px 0; color:var(--muted);">No active members yet.</div>'}
            </div>

            <div style="margin-top:18px;">
              <div style="font-weight:600;">Pending invites</div>
              ${tenant.pending_invites.length ? tenant.pending_invites.map((invite) => renderPendingInviteRow(invite, tenant.slug)).join('') : '<div style="padding:10px 0; color:var(--muted);">No pending invites.</div>'}
            </div>
          </div>
        `).join('');
      }

      async function loadPlatformTenants() {
        $tenants.innerHTML = '<div class="empty-state"><span class="spinner"></span> Loading organizations...</div>';
        try {
          platformTenants = await apiFetch('GET', '/platform/tenants');
          renderPlatformTenantsList();
        } catch (err) {
          $tenants.innerHTML = `<div class="empty-state">Failed to load organizations: ${esc(err.message)}</div>`;
        }
      }

      async function loadMembershipTenants() {
        try {
          const memberships = await apiFetch('GET', '/me/tenants');
          if (!memberships.length) {
            $tenants.innerHTML = '<div class="empty-state">You are not a member of any organizations yet.</div>';
          } else {
            const adminMemberships = memberships.filter((m) => ['owner', 'admin'].includes(String(m.role || '')));
            if (!adminMemberships.length) {
              $tenants.innerHTML = memberships.map(m => {
                const t = m.tenants || m.tenant || m;
                return `
                  <div class="panel" style="margin-bottom:12px;">
                    <strong>${esc(t.name)}</strong>
                    <span style="color:var(--muted); font-size:13px; margin-left:8px;">${esc(titleizeRole(m.role))}</span>
                  </div>`;
              }).join('');
              return;
            }

            const rosters = await Promise.all(adminMemberships.map(async (membership) => {
              const tenant = membership.tenants || membership.tenant || membership;
              return apiFetch('GET', `/tenants/${encodeURIComponent(tenant.slug)}/roster`);
            }));

            $tenants.innerHTML = rosters.map((roster) => `
              <div class="panel" style="margin-bottom:16px;">
                <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:flex-start;">
                  <div>
                    <strong style="font-size:18px;">${esc(roster.tenant.name)}</strong>
                    <div style="color:var(--muted); font-size:13px; margin-top:4px;">${esc(roster.tenant.slug)} • ${esc(roster.tenant.tenant_type)}</div>
                  </div>
                </div>

                <div style="margin-top:18px;">
                  <div style="font-weight:600; margin-bottom:8px;">Invite new members</div>
                  <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
                    <div style="flex:1 1 220px;">
                      <label style="display:block; font-size:13px; color:var(--muted); margin-bottom:6px;">Email</label>
                      <input data-tenant-email="${esc(roster.tenant.slug)}" type="email" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md);" placeholder="person@example.com" />
                    </div>
                    <div style="width:160px;">
                      <label style="display:block; font-size:13px; color:var(--muted); margin-bottom:6px;">Role</label>
                      <select data-tenant-role="${esc(roster.tenant.slug)}" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md); background:#fff;">
                        <option value="publisher">Publisher</option>
                        <option value="member">Member</option>
                      </select>
                    </div>
                    <button class="btn tenant-invite-btn" data-tenant-slug="${esc(roster.tenant.slug)}">Invite New Members</button>
                  </div>
                  <div data-tenant-result="${esc(roster.tenant.slug)}" style="margin-top:10px; font-size:13px; color:var(--muted);"></div>
                </div>

                <div style="margin-top:18px;">
                  <div style="font-weight:600;">Members</div>
                  ${roster.members.length ? roster.members.map((member) => renderMemberRow({
                    profile: member.user_profiles || member.profile || null,
                    user_id: member.user_id,
                    role: member.role,
                    created_at: member.created_at,
                  })).join('') : '<div style="padding:10px 0; color:var(--muted);">No active members yet.</div>'}
                </div>

                <div style="margin-top:18px;">
                  <div style="font-weight:600;">Pending invites</div>
                  ${roster.pending_invites.length ? roster.pending_invites.map((invite) => renderPendingInviteRow(invite, roster.tenant.slug)).join('') : '<div style="padding:10px 0; color:var(--muted);">No pending invites.</div>'}
                </div>
              </div>
            `).join('');
          }
        } catch (err) {
          $tenants.innerHTML = `<div class="empty-state">Failed to load: ${esc(err.message)}</div>`;
        }
      }

      async function refreshTenantView({ force = false } = {}) {
        if (!force) {
          return;
        }
        lastRosterUpdateSignal = readOrganizationRosterSignal();
        if (platformAccess.is_superuser) {
          await loadPlatformTenants();
        } else {
          await loadMembershipTenants();
        }
      }

      async function refreshTenantViewIfRosterChanged() {
        if (!document.getElementById('tab-tenants').classList.contains('active')) return;
        const signal = readOrganizationRosterSignal();
        if (!signal || signal === lastRosterUpdateSignal) return;
        await refreshTenantView({ force: true });
      }

      window.addEventListener('storage', (event) => {
        if (event.key !== 'readerpub:tenant-roster-updated' || !event.newValue) return;
        refreshTenantViewIfRosterChanged();
      });

      window.addEventListener('pageshow', () => {
        refreshTenantViewIfRosterChanged();
      });

      window.addEventListener('focus', () => {
        refreshTenantViewIfRosterChanged();
      });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          refreshTenantViewIfRosterChanged();
        }
      });

      if (platformAccess.is_superuser) {
        $superuserPanel.style.display = '';
        $superuserPanel.innerHTML = `
          <h3 style="margin-top:0;">Platform Admin</h3>
          <div style="color:var(--muted); font-size:14px; margin-bottom:20px;">Superusers can create organizations, inspect their members and pending invites, invite admins, publishers, and members, and grant new superusers.</div>

          <div class="stack">
            <div class="panel" style="margin:0; padding:18px;">
              <h3 style="font-size:18px; margin-top:0;">Create Organization</h3>
              <div class="stack">
                <div>
                  <label for="org-name" style="display:block; font-size:14px; font-weight:600; color:var(--muted); margin-bottom:6px;">Organization Name</label>
                  <input id="org-name" type="text" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md);" placeholder="Acme Publishing" />
                </div>
                <div>
                  <label for="org-slug" style="display:block; font-size:14px; font-weight:600; color:var(--muted); margin-bottom:6px;">Source / Slug</label>
                  <input id="org-slug" type="text" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md);" placeholder="acme-publishing" />
                </div>
                <div>
                  <label for="org-type" style="display:block; font-size:14px; font-weight:600; color:var(--muted); margin-bottom:6px;">Type</label>
                  <select id="org-type" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md); background:#fff;">
                    <option value="publisher">Publisher</option>
                    <option value="distributor">Distributor</option>
                    <option value="library">Library</option>
                    <option value="university">University</option>
                    <option value="consortium">Consortium</option>
                    <option value="individual_author">Individual author</option>
                  </select>
                </div>
                <button class="btn" id="orgCreateBtn" style="width:max-content;">Create Organization</button>
                <div id="orgCreateResult" style="font-size:13px; color:var(--muted);"></div>
              </div>
            </div>

            <div class="panel" style="margin:0; padding:18px;">
              <h3 style="font-size:18px; margin-top:0;">Self-Publisher Invite</h3>
              <div class="stack">
                <div>
                  <label for="sp-email" style="display:block; font-size:14px; font-weight:600; color:var(--muted); margin-bottom:6px;">Email</label>
                  <input id="sp-email" type="email" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md);" placeholder="author@example.com" />
                </div>
                <div>
                  <label for="sp-name" style="display:block; font-size:14px; font-weight:600; color:var(--muted); margin-bottom:6px;">Display Name</label>
                  <input id="sp-name" type="text" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md);" placeholder="Ada Lovelace" />
                </div>
                <div>
                  <label for="sp-slug" style="display:block; font-size:14px; font-weight:600; color:var(--muted); margin-bottom:6px;">Tenant Slug / Source</label>
                  <input id="sp-slug" type="text" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md);" placeholder="ada-lovelace" />
                </div>
                <button class="btn" id="spInviteBtn" style="width:max-content;">Create Invite</button>
                <div id="spInviteResult" style="font-size:13px; color:var(--muted);"></div>
              </div>
            </div>

            <div class="panel" style="margin:0; padding:18px;">
              <h3 style="font-size:18px; margin-top:0;">Invite Superuser</h3>
              <div class="stack">
                <div>
                  <label for="superuser-email" style="display:block; font-size:14px; font-weight:600; color:var(--muted); margin-bottom:6px;">Email</label>
                  <input id="superuser-email" type="email" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-md);" placeholder="admin@example.com" />
                </div>
                <button class="btn" id="superuserInviteBtn" style="width:max-content;">Create Superuser Invite</button>
                <div id="superuserInviteResult" style="font-size:13px; color:var(--muted);"></div>
              </div>
            </div>

            <div class="panel" style="margin:0; padding:18px;">
              <h3 style="font-size:18px; margin-top:0;">Current Superusers</h3>
              <div id="superuserList" style="font-size:13px; color:var(--muted);"><span class="spinner"></span> Loading...</div>
            </div>
          </div>`;

        const slugify = (value) => value.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 60);

        document.getElementById('org-name').addEventListener('input', (e) => {
          document.getElementById('org-slug').value = slugify(e.target.value);
        });

        document.getElementById('sp-name').addEventListener('input', (e) => {
          document.getElementById('sp-slug').value = slugify(e.target.value);
        });

        try {
          const data = await apiFetch('GET', '/platform/superusers');
          const active = Array.isArray(data.superusers) ? data.superusers : [];
          const pending = Array.isArray(data.pending_invites) ? data.pending_invites : [];
          document.getElementById('superuserList').innerHTML = `
            <div class="stack">
              <div><strong>Active</strong></div>
              ${active.length ? active.map((row) => `
                <div>${esc(row.user_profiles?.display_name || row.user_id)} <span style="color:var(--muted)">(${esc(row.user_id)})</span> <span style="color:var(--muted)">since ${esc(formatDate(row.created_at))}</span></div>
              `).join('') : '<div style="color:var(--muted)">No explicit superuser rows yet.</div>'}
              <div style="margin-top:8px;"><strong>Pending Invites</strong></div>
              ${pending.length ? pending.map((row) => `
                <div>
                  <div style="display:flex; justify-content:space-between; gap:12px; align-items:flex-start;">
                    <div>
                      ${esc(row.email)} <span style="color:${isInviteExpired(row) ? '#c0392b' : 'var(--accent)'}">${esc(isInviteExpired(row) ? 'Expired' : 'Pending confirmation')}</span>
                      <div style="margin-top:4px; color:var(--muted);">Invited ${esc(formatDate(row.created_at))}</div>
                    </div>
                    <button class="btn btn-secondary superuser-invite-delete-btn" data-invite-id="${esc(String(row.id))}" style="height:32px; padding:0 12px;">Delete</button>
                  </div>
                  <div style="margin-top:4px; word-break:break-all;">
                    <a href="${esc(inviteLinkFromToken(row.token))}" style="color:var(--accent); text-decoration:none;">${esc(inviteLinkFromToken(row.token))}</a>
                  </div>
                </div>
              `).join('') : '<div style="color:var(--muted)">No pending superuser invites.</div>'}
            </div>`;
        } catch (err) {
          document.getElementById('superuserList').textContent = `Failed to load: ${err.message}`;
        }

        document.getElementById('orgCreateBtn').addEventListener('click', async () => {
          const name = document.getElementById('org-name').value.trim();
          const slug = document.getElementById('org-slug').value.trim();
          const tenant_type = document.getElementById('org-type').value;
          if (!name || !slug || !tenant_type) {
            showTenantAlert('Organization name, slug, and type are required.', 'error');
            return;
          }
          const btn = document.getElementById('orgCreateBtn');
          btn.disabled = true;
          btn.textContent = 'Creating...';
          try {
            const tenant = await apiFetch('POST', '/tenants', { name, slug, tenant_type });
            document.getElementById('orgCreateResult').textContent = `Created ${tenant.name} (${tenant.slug}).`;
            showTenantAlert(`Organization ${tenant.name} created.`);
            await loadPlatformTenants();
          } catch (err) {
            showTenantAlert(`Could not create organization: ${err.message}`, 'error');
          } finally {
            btn.disabled = false;
            btn.textContent = 'Create Organization';
          }
        });

        document.getElementById('spInviteBtn').addEventListener('click', async () => {
          const email = document.getElementById('sp-email').value.trim();
          const name = document.getElementById('sp-name').value.trim();
          const slug = document.getElementById('sp-slug').value.trim();
          if (!email || !name || !slug) {
            showTenantAlert('Email, display name, and slug are required.', 'error');
            return;
          }
          const btn = document.getElementById('spInviteBtn');
          btn.disabled = true;
          btn.textContent = 'Creating...';
          try {
            const payload = await apiFetch('POST', '/onboarding/self-publisher/invite', { email, name, slug });
            const link = payload.invite_url || inviteLinkFromToken(payload.invite.token);
            document.getElementById('spInviteResult').innerHTML = `Invite link for ${esc(payload.invite.email)}: <a href="${esc(link)}" style="color:var(--accent); text-decoration:none; word-break:break-all;">${esc(link)}</a>`;
            const emailStatus = payload.email_delivery?.sent ? ' Email sent via Pingram.' : ' Email not sent automatically; use the invite link above.';
            showTenantAlert(`Self-publisher invite created for ${payload.tenant.name}.${emailStatus}`);
            await refreshTenantView({ force: true });
          } catch (err) {
            showTenantAlert(`Could not create self-publisher invite: ${err.message}`, 'error');
          } finally {
            btn.disabled = false;
            btn.textContent = 'Create Invite';
          }
        });

        document.getElementById('superuserInviteBtn').addEventListener('click', async () => {
          const email = document.getElementById('superuser-email').value.trim();
          if (!email) {
            showTenantAlert('Superuser email is required.', 'error');
            return;
          }
          const btn = document.getElementById('superuserInviteBtn');
          btn.disabled = true;
          btn.textContent = 'Creating...';
          try {
            const invite = await apiFetch('POST', '/platform/superusers/invite', { email });
            const link = invite.invite_url || inviteLinkFromToken(invite.token);
            document.getElementById('superuserInviteResult').innerHTML = `Invite link for ${esc(invite.email)}: <a href="${esc(link)}" style="color:var(--accent); text-decoration:none; word-break:break-all;">${esc(link)}</a>`;
            const emailStatus = invite.email_delivery?.sent ? ' Email sent via Pingram.' : ' Email not sent automatically; use the invite link above.';
            showTenantAlert(`Superuser invite created for ${invite.email}.${emailStatus}`);
          } catch (err) {
            showTenantAlert(`Could not create superuser invite: ${err.message}`, 'error');
          } finally {
            btn.disabled = false;
            btn.textContent = 'Create Superuser Invite';
          }
        });

        await refreshTenantView({ force: true });
      } else {
        await refreshTenantView({ force: true });
      }

      $tenants.addEventListener('click', async (e) => {
        const deleteBtn = e.target.closest('.invite-delete-btn');
        if (deleteBtn) {
          const slug = deleteBtn.dataset.tenantSlug;
          const inviteId = deleteBtn.dataset.inviteId;
          if (!slug || !inviteId) return;
          deleteBtn.disabled = true;
          deleteBtn.textContent = 'Deleting...';
          try {
            await apiFetch('DELETE', `/tenants/${encodeURIComponent(slug)}/invitations/${encodeURIComponent(inviteId)}`);
            showTenantAlert('Invitation deleted.');
            await refreshTenantView({ force: true });
          } catch (err) {
            showTenantAlert(`Could not delete invitation: ${err.message}`, 'error');
          } finally {
            deleteBtn.disabled = false;
            deleteBtn.textContent = 'Delete';
          }
          return;
        }

        const btn = e.target.closest('.tenant-invite-btn');
        if (!btn) return;
        const slug = btn.dataset.tenantSlug;
        const emailInput = $tenants.querySelector(`[data-tenant-email="${slug}"]`);
        const roleInput = $tenants.querySelector(`[data-tenant-role="${slug}"]`);
        const resultEl = $tenants.querySelector(`[data-tenant-result="${slug}"]`);
        const email = emailInput?.value.trim() || '';
        const role = roleInput?.value || 'member';
        if (!slug || !email) {
          showTenantAlert('Organization and member email are required.', 'error');
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Sending...';
        try {
          let payload;
          if (role === 'admin') {
            payload = await apiFetch('POST', `/tenants/${encodeURIComponent(slug)}/admin-invite`, { email, role });
          } else {
            payload = await apiFetch('POST', `/tenants/${encodeURIComponent(slug)}/invite`, { email, role });
          }
          const invite = payload.invite || payload;
          const link = payload.invite_url || invite.invite_url || inviteLinkFromToken(invite.token);
          resultEl.innerHTML = `Invite link for ${esc(invite.email)}: <a href="${esc(link)}" style="color:var(--accent); text-decoration:none; word-break:break-all;">${esc(link)}</a>`;
          const emailStatus = payload.email_delivery?.sent ? ' Email sent via Pingram.' : ' Email not sent automatically; use the invite link above.';
          showTenantAlert(`Invite created for ${email} in ${slug}.${emailStatus}`);
          await refreshTenantView({ force: true });
        } catch (err) {
          showTenantAlert(`Could not create invite: ${err.message}`, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = platformAccess.is_superuser ? 'Send Invite' : 'Invite New Members';
        }
      });

      document.addEventListener('click', async (e) => {
        const deleteBtn = e.target.closest('.superuser-invite-delete-btn');
        if (!deleteBtn) return;
        const inviteId = deleteBtn.dataset.inviteId;
        if (!inviteId) return;
        deleteBtn.disabled = true;
        deleteBtn.textContent = 'Deleting...';
        try {
          await apiFetch('DELETE', `/platform/superusers/invitations/${encodeURIComponent(inviteId)}`);
          showTenantAlert('Superuser invitation deleted.');
          const data = await apiFetch('GET', '/platform/superusers');
          const active = Array.isArray(data.superusers) ? data.superusers : [];
          const pending = Array.isArray(data.pending_invites) ? data.pending_invites : [];
          document.getElementById('superuserList').innerHTML = `
            <div class="stack">
              <div><strong>Active</strong></div>
              ${active.length ? active.map((row) => `
                <div>${esc(row.user_profiles?.display_name || row.user_id)} <span style="color:var(--muted)">(${esc(row.user_id)})</span> <span style="color:var(--muted)">since ${esc(formatDate(row.created_at))}</span></div>
              `).join('') : '<div style="color:var(--muted)">No explicit superuser rows yet.</div>'}
              <div style="margin-top:8px;"><strong>Pending Invites</strong></div>
              ${pending.length ? pending.map((row) => `
                <div>
                  <div style="display:flex; justify-content:space-between; gap:12px; align-items:flex-start;">
                    <div>
                      ${esc(row.email)} <span style="color:${isInviteExpired(row) ? '#c0392b' : 'var(--accent)'}">${esc(isInviteExpired(row) ? 'Expired' : 'Pending confirmation')}</span>
                      <div style="margin-top:4px; color:var(--muted);">Invited ${esc(formatDate(row.created_at))}</div>
                    </div>
                    <button class="btn btn-secondary superuser-invite-delete-btn" data-invite-id="${esc(String(row.id))}" style="height:32px; padding:0 12px;">Delete</button>
                  </div>
                  <div style="margin-top:4px; word-break:break-all;">
                    <a href="${esc(inviteLinkFromToken(row.token))}" style="color:var(--accent); text-decoration:none;">${esc(inviteLinkFromToken(row.token))}</a>
                  </div>
                </div>
              `).join('') : '<div style="color:var(--muted)">No pending superuser invites.</div>'}
            </div>`;
        } catch (err) {
          showTenantAlert(`Could not delete superuser invitation: ${err.message}`, 'error');
        } finally {
          deleteBtn.disabled = false;
          deleteBtn.textContent = 'Delete';
        }
      });

    </script>
  </body>
</html>
