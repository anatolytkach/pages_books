  { pattern = "books-staging.reader.pub/books/api/selection-share*", zone_name = "reader.pub" },
  { pattern = "books-staging.reader.pub/api/selection-share*", zone_name = "reader.pub" },
  { pattern = "books-staging.reader.pub/books/reader/api/selection-share*", zone_name = "reader.pub" },
