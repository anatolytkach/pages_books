    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap");

      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --ink: #1f1b16;
        --muted: #6c645a;
        --accent: #028f80;
        --accent-2: #016b61;
        --border: #d8dee8;
        --border-active: #028f80;
        --shadow: transparent;
        --radius-lg: 14px;
        --radius-md: 10px;
        --radius-sm: 8px;
        --rect-bg: linear-gradient(90deg, #fcfaf8 0%, #ffffff 100%);
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        font-size: 16px;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: "Source Sans 3", "Helvetica Neue", sans-serif;
        font-size: 16px;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        min-height: 100vh;
        background-image: url("/books/assets/background.png");
        background-size: 100% auto;
        background-position: center bottom;
        background-repeat: no-repeat;
      }

      input,
      button,
      select,
      textarea {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: none;
      }

      #app {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 24px 12px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 28px;
        position: sticky;
        top: 0;
        z-index: 40;
        background: var(--bg);
        padding-top: 12px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .brandLink {
        color: inherit;
        text-decoration: none;
      }

      .brandLogo {
        width: 44px;
        height: 44px;
        display: block;
      }

      .title {
        font-family: "Playfair Display", "Times New Roman", serif;
        font-size: 24px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.4px;
      }

      .searchWrap {
        flex: 1;
        min-width: 240px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 12px;
        flex-wrap: nowrap;
      }

      .langWrap {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 0 0 auto;
        width: max-content;
        position: relative;
      }

      .langSelect {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: max-content;
        height: 44px;
        padding: 10px 36px 10px 12px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        background: var(--rect-bg);
        font-size: 14px;
        color: var(--ink);
        cursor: pointer;
      }

      .langValue {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .langSelect:focus {
        outline: none;
        border-color: var(--border-active);
      }

      .langSelect.disabled {
        opacity: 0.6;
        cursor: default;
      }

      .langChevron {
        margin-left: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .langMenu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        width: max-content;
        overflow: hidden;
        background: var(--rect-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        box-shadow: none;
        padding: 6px 0;
        display: none;
        z-index: 20;
      }

      .langList {
        max-height: 540px;
        overflow-y: auto;
        overscroll-behavior: contain;
        background: var(--rect-bg);
      }

      .langList::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      .langList {
        scrollbar-width: none;
      }

      .langWrap.open .langMenu {
        display: block;
      }

      .langOption {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        font-size: 14px;
        color: var(--ink);
        cursor: pointer;
        white-space: nowrap;
        background: var(--rect-bg);
      }

      .langOption span:first-child {
        flex: 1;
      }

      .langOption:hover {
        background: var(--rect-bg);
      }

      .langOption.active {
        color: var(--accent);
        font-weight: 600;
      }

      .langCount {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        text-align: right;
        min-width: 32px;
      }

      .langDivider {
        height: 1px;
        margin: 4px 12px;
        background: #d5d9e2;
      }

      .searchForm {
        position: relative;
        flex: 1 1 auto;
        min-width: 0;
        width: auto;
      }

      .searchInput {
        width: 100%;
        padding: 12px 48px 12px 16px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        background: var(--rect-bg);
        font-size: 15px;
        color: var(--ink);
      }

      .searchInput:focus {
        outline: none;
        border-color: var(--border-active);
      }

      .searchInput::-webkit-search-cancel-button,
      .searchInput::-webkit-search-decoration,
      .searchInput::-webkit-search-results-button,
      .searchInput::-webkit-search-results-decoration {
        -webkit-appearance: none;
        appearance: none;
        display: none;
      }

      .searchBtn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        border: none;
        background: transparent;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        color: var(--accent-2);
      }

      .searchPlaceholder {
        position: absolute;
        left: 16px;
        right: 46px;
        top: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.15;
        pointer-events: none;
        white-space: normal;
      }

      .searchInput:focus ~ .searchPlaceholder {
        opacity: 0;
      }

      .searchInput:placeholder-shown ~ .searchPlaceholder {
        opacity: 1;
      }

      .searchInput:not(:placeholder-shown) ~ .searchPlaceholder {
        opacity: 0;
      }

      .searchBtn:hover {
        background: rgba(45, 111, 107, 0.08);
      }

      .icon {
        display: none;
        width: 18px;
        height: 18px;
      }

      .searchForm.hasQuery .icon-clear {
        display: block;
      }

      .searchForm:not(.hasQuery) .icon-search {
        display: block;
      }

      .breadcrumbs-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      #breadcrumbs {
        font-size: 13px;
        color: var(--muted);
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      #breadcrumbs a {
        color: var(--accent);
        text-decoration: none;
      }

      #breadcrumbs a:hover {
        text-decoration: underline;
      }

      .my-books-link {
        font-size: 13px;
        color: var(--accent);
        text-decoration: none;
        white-space: nowrap;
      }

      .my-books-link:hover {
        text-decoration: underline;
      }

      .my-books-link {
        font-size: 13px;
        color: var(--accent);
        text-decoration: none;
        white-space: nowrap;
      }

      .my-books-link:hover {
        text-decoration: underline;
      }

      #breadcrumbs .my-books-link {
        margin-left: auto;
      }

      #toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      #main {
        flex: 1;
      }

      #footer {
        margin-top: auto;
        padding-top: 6px;
        padding-bottom: 4px;
        font-size: 16px;
        color: #ffffff;
        text-shadow: 0 3px 10px rgba(0, 0, 0, 0.95);
        text-align: center;
      }

      .toggleBtn {
        border: 1px solid var(--border);
        background: var(--rect-bg);
        padding: 6px 14px;
        border-radius: var(--radius-md);
        cursor: pointer;
        font-size: 13px;
        color: var(--muted);
      }

      .toggleBtn.active {
        color: var(--panel);
        background: var(--accent);
        border-color: var(--border-active);
      }

      .toggleBtn[disabled] {
        opacity: 0.45;
        cursor: default;
      }

      .mybooks-auth {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--rect-bg);
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 520px;
      }

      .mybooks-auth-title {
        font-size: 16px;
        font-weight: 600;
      }

      .mybooks-auth-copy {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .mybooks-auth-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .mybooks-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .mybooks-check {
        width: 18px;
        height: 18px;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .mybooks-open {
        font-size: 12px;
        color: var(--accent);
        text-decoration: none;
      }

      .mybooks-open:hover {
        text-decoration: underline;
      }

      .mybooks-list-row td:first-child {
        width: 34px;
      }

      .mybooks-meta {
        font-size: 12px;
        color: var(--muted);
      }

      .mybooks-empty {
        color: var(--muted);
        font-size: 14px;
      }

      .panel {
        background: var(--rect-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: none;
        padding: 20px;
      }

      .panel.noPanel {
        background: transparent;
        border: none;
        border-radius: 0;
        box-shadow: none;
        padding: 0;
      }

      .lettersGrid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
        gap: 14px;
      }

      .letterBtn {
        border: 1px solid var(--border);
        background: var(--rect-bg);
        padding: 12px 0;
        border-radius: var(--radius-md);
        font-weight: 700;
        color: var(--accent-2);
        cursor: pointer;
        transition: transform 0.08s ease, box-shadow 0.08s ease;
      }

      .letterBtnNonEnglish {
        background: linear-gradient(90deg, #e5f9f4 0%, #ffffff 100%);
      }

      .letterBtn:hover {
        transform: translateY(-2px);
        box-shadow: none;
      }

      table.list {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      table.list th,
      table.list td {
        text-align: left;
        padding: 10px 8px;
        border-bottom: 1px solid var(--border);
        white-space: normal;
        overflow-wrap: anywhere;
      }

      .authorName {
        color: var(--accent);
      }

      table.list th.count,
      table.list td.count {
        width: 120px;
        text-align: right;
        color: var(--muted);
      }

      tr.rowLink {
        cursor: pointer;
      }

      tr.rowLink:hover td {
        background: rgba(45, 111, 107, 0.08);
      }

      .prefixLabel {
        color: var(--accent-2);
        font-weight: 700;
        text-transform: uppercase;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 250px));
        grid-auto-rows: 1fr;
        gap: 16px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--rect-bg);
        padding: 12px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-height: 180px;
        height: 100%;
        text-decoration: none;
        color: inherit;
      }

      .card:hover {
        box-shadow: none;
        transform: translateY(-2px);
      }

      .cover {
        width: 100%;
        aspect-ratio: 5 / 8;
        background: #f3eee6;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
      }

      .cover img {
        width: auto;
        height: 100%;
        max-width: 100%;
        object-fit: contain;
      }

      .coverEmpty {
        background: #f0e8dc;
      }

      .cardTitle {
        font-weight: 600;
        line-height: 1.3;
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-height: 0;
      }

      .cardTitle a {
        color: inherit;
        text-decoration: none;
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .cardMeta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 0;
      }

      .status {
        font-size: 13px;
        color: var(--muted);
        margin-top: 12px;
      }

      .error {
        border: 1px solid var(--border);
        background: var(--rect-bg);
        color: #7a1f1f;
        padding: 14px;
        border-radius: var(--radius-md);
        font-size: 14px;
      }

      .loading {
        font-size: 14px;
        color: var(--muted);
      }

      #searchResults {
        margin-bottom: 14px;
      }

      .srHead {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .srItem {
        display: grid;
        grid-template-columns: 44px 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--rect-bg);
        margin-bottom: 6px;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
      }

      .srItem.noCover {
        grid-template-columns: 1fr auto;
      }

      .srItem.noCover:not(.hasCount) {
        grid-template-columns: 1fr;
      }

      .srItem:not(.hasCount) {
        grid-template-columns: 44px 1fr;
      }

      .srItem:hover {
        background: var(--rect-bg);
      }

      .srCover {
        width: 44px;
        height: 58px;
        border-radius: var(--radius-sm);
        background: #f3eee6;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 10px;
      }

      .srCover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .srTitle {
        font-weight: 600;
        color: var(--accent);
      }

      .srMeta {
        font-size: 12px;
        color: var(--muted);
      }

      .srCount {
        font-size: 12px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        text-align: right;
        justify-self: end;
        min-width: 70px;
      }

      .srHint {
        font-size: 11px;
        color: var(--accent-2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .srSectionTitle {
        font-size: 14px;
        font-weight: 600;
        color: var(--ink);
        margin: 12px 0 6px;
      }

      @media (max-width: 720px) {
        header {
          flex-direction: column;
          align-items: flex-start;
        }
        .searchWrap {
          width: 100%;
          justify-content: flex-start;
          align-items: center;
          flex-direction: row;
          flex-wrap: nowrap;
        }
        .langWrap {
          width: auto;
        }
        .searchForm {
          flex: 1;
          min-width: 0;
        }
        .srItem {
          grid-template-columns: 44px 1fr;
        }
        .srItem.noCover {
          grid-template-columns: 1fr;
        }
        .srItem.hasCount {
          grid-template-columns: 44px 1fr auto;
        }
        .srItem.noCover.hasCount {
          grid-template-columns: 1fr auto;
        }
        .srHint {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>

    <div id="app">
      <header>
        <a class="brand brandLink" id="brandLink" href="#view=letters">
          <img class="brandLogo" src="/books/assets/logo.svg" alt="ReaderPub" />

        <div class="searchWrap">

              </svg>

    </div>

          if (!sync) return;
          myBooksState.deleting = true;
          setToolbar("mybooks", parseState().bookView || "grid");
          setStatus("Deleting selected books...");
          try {
            const snapshot = await sync.deleteBooksCascade(ids, { interactive: true });
            try { sync.applySnapshotToLocalReader(snapshot); } catch (eApply) {}
            myBooksState.items = sync.listMyBooks(snapshot);
            myBooksState.selected = new Set();
            myBooksState.loaded = true;
            myBooksState.lastLoadAt = Date.now();

        function normalizeLetters(data) {
          if (!data) return [];
          let list = [];
          if (Array.isArray(data)) list = data;
          else if (Array.isArray(data.letters)) list = data.letters;
          else if (Array.isArray(data.items)) list = data.items;
          else if (Array.isArray(data.list)) list = data.list;
          else if (data.letters && typeof data.letters === "object") list = Object.keys(data.letters);
          else if (typeof data === "object") list = Object.keys(data);

          return list
            .map((item) => {
              if (item && typeof item === "object") {
                const label =
                  item.letter ||
                  item.label ||
                  item.name ||
                  item.value ||
                  item.key ||
                  item.id ||
                  item.slug ||
                  item.code;
                const key =
                  item.key ||
                  item.id ||
                  item.value ||
                  item.slug ||
                  item.code ||
                  item.letter ||
                  item.label ||
                  item.name;
                const labelText = String(label || "").trim();
                const keyText = String(key || labelText).trim();
                return labelText ? { label: labelText, key: keyText } : null;
              }
              const text = String(item || "").trim();
              return text ? { label: text, key: text } : null;
            })
            .filter(Boolean);
        }

        function getLetterTokenList() {
          if (!Array.isArray(cache.letters)) return [];
          return cache.letters
            .map((item) => (item && typeof item === "object" ? item.key || item.label : item))
            .map((item) => String(item || "").trim())
            .filter(Boolean);
        }

        function resolveLetterToken(letter) {
          const token = String(letter || "").trim();
          if (!Array.isArray(cache.letters)) return token;
          const norm = token.toLocaleLowerCase();
          const match = cache.letters.find((item) => {
            if (!item || typeof item !== "object") return false;
            const label = String(item.label || "").trim();
            const key = String(item.key || "").trim();
            return (
              label === token ||
              key === token ||
              label.toLocaleLowerCase() === norm ||
              key.toLocaleLowerCase() === norm
            );
          });
          if (match && (match.key || match.label)) {
            return String(match.key || match.label).trim();
          }
          if (token === "#" || token.toLowerCase() === "num") return token;
          return norm;
        }

        function normalizePrefixEntries(source) {
          if (!source) return [];
          let list = [];
          if (Array.isArray(source)) list = source;
          else if (typeof source === "object") list = Object.keys(source).map((key) => ({ key, value: source[key] }));

          return list
            .map((item) => {
              if (!item) return null;
              if (typeof item === "string") return { prefix: item, count: null };
              const prefix =
                item.prefix ||
                item.p ||
                item.key ||
                item.label ||
                item.value ||
                item.id ||
                item.name ||
                (typeof item.key === "string" ? item.key : null);
              const count = parseNumber(
                item.count ??
                  item.c ??
                  item.total ??
                  item.n ??
                  item.size ??
                  item.authors ??
                  item.authorCount ??
                  item.author_count ??
                  item.books ??
                  item.bookCount ??
                  item.value
              );
              if (!prefix) return null;
              return { prefix: String(prefix), count };
            })
            .filter(Boolean);
        }

        function normalizeAuthorEntries(source) {
          if (!source) return [];
          let list = [];
          if (Array.isArray(source)) list = source;
          else if (typeof source === "object") list = Object.keys(source).map((key) => ({ key, value: source[key] }));

          return list
            .map((item) => {
              if (!item) return null;
              if (typeof item === "string") return { name: item, key: item, count: null };

              const name = item.name || item.author || item.label || item.title || item.value || item.key || item.id;
              const key = item.key || item.id || item.slug || item.authorKey || name;
              const count = parseNumber(
                item.count ??
                  item.total ??
                  item.n ??
                  item.size ??
                  item.books ??
                  item.bookCount ??
                  item.works ??
                  item.value
              );

              if (!name) return null;
              return { name: String(name), key: String(key || name), count };
            })
            .filter(Boolean);
        }

        function normalizeBooks(source) {
          if (!source) return [];
          let list = [];
          if (Array.isArray(source)) list = source;
          else if (typeof source === "object") list = Object.keys(source).map((key) => ({ key, value: source[key] }));

          return list
            .map((item) => {
              if (!item) return null;
              if (typeof item === "string") return { id: item, title: item };
              const id = item.id || item.book_id || item.bookId || item.key || item.slug || item.value;
              const title = item.title || item.name || item.label || item.book || item.work || item.value || id;
              const cover = item.cover || item.coverUrl || item.cover_url || item.image || item.img || item.thumbnail;
              const author = item.author || item.authorName || item.creator || item.by;
              if (!id) return null;
              return {
                id: String(id),
                title: String(title || id),
                cover: cover ? String(cover) : "",
                author: author ? String(author) : "",
              };
            })
            .filter(Boolean);
        }

        function parseNumber(value) {
          if (value === null || value === undefined || value === "") return null;
          const num = Number(value);
          return Number.isFinite(num) ? num : null;
        }

        function detectListType(source) {
          if (!source) return null;
          let sample = null;
          if (Array.isArray(source)) sample = source[0];
          else if (typeof source === "object") sample = Object.values(source)[0];
          if (!sample) return null;

          if (typeof sample === "object") {
            if (sample.prefix || sample.children) return "prefix";
            if (sample.name || sample.author || sample.books || sample.bookCount) return "author";
            return null;
          }

          if (typeof sample === "string") {
            if (sample.includes(" ") || sample.length > 5) return "author";
            return "prefix";
          }
          return null;
        }

        function joinUrl(base, path) {
          const cleanBase = String(base || "").replace(/\/$/, "");
          const cleanPath = String(path || "").replace(/^\//, "");
          return cleanBase && cleanPath ? `${cleanBase}/${cleanPath}` : cleanBase || cleanPath;
        }

        function resolveCoverUrl(cover) {
          if (!cover) return "";
          if (/^https?:\/\//i.test(cover) || cover.startsWith("data:") || cover.startsWith("blob:")) return cover;
          if (cover.startsWith("//")) return `${location.protocol}${cover}`;
          if (config && config.assetBaseUrl) return joinUrl(config.assetBaseUrl, cover);
          if (config && config.baseUrl) return joinUrl(config.baseUrl, cover);
          return cover;
        }

        function openBookUrl(id) {

        function openReaderUrl(id, cover) {
          const isPagesDev = /\.pages\.dev$/i.test(String(location.hostname || ""));
          const base = isPagesDev ? "/reader/" : "/books/reader/";
          let url = `${base}?id=${encodeURIComponent(id)}`;

        function updateSearchIcon() {
