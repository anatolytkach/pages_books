<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReaderPub Protected Reader Redirect</title>
    <meta http-equiv="refresh" content="0;url=/books/reader_new/" />
    <style>
      body {
        margin: 0;
        font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f2e8;
        color: #2a241f;
      }

      main {
        max-width: 640px;
        margin: 8vh auto 0;
        padding: 24px;
      }

      a {
        color: #0d5ea6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redirecting to reader_new</h1>
      <p id="status">Protected reader integration mode has been retired. Redirecting to the unified reader_new host.</p>
      <p><a id="redirect-link" href="/books/reader_new/">Continue</a></p>
    </main>
    <script>
      (function () {
        function mapPath(pathname) {
          if (pathname.indexOf("/reader_render_v3/integration/protected-reader.html") === 0) {
            return "/reader_new/";
          }
          return "/books/reader_new/";
        }

        var current = new URL(window.location.href);
        var next = new URL(mapPath(current.pathname), window.location.origin);
        current.searchParams.forEach(function (value, key) {
          next.searchParams.set(key, value);
        });
        if (!next.searchParams.get("reader")) next.searchParams.set("reader", "protected");
        if (!next.searchParams.get("protectedUx")) next.searchParams.set("protectedUx", "protected-shell");
        next.hash = current.hash || "";
        var nextHref = next.toString();
        var link = document.getElementById("redirect-link");
        if (link) link.href = nextHref;
        var status = document.getElementById("status");
        if (status) status.textContent = "Protected reader integration mode has been retired. Redirecting to the unified reader_new host.";
        window.location.replace(nextHref);
      })();
    </script>
  </body>
</html>
