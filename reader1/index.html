            function getQueryParam(name) {
              try {
                var params = new URLSearchParams(window.location.search || "");
                var v = params.get(name);
                return v ? decodeURIComponent(v) : "";
              } catch (e) {

              if (p.endsWith("/")) return "directory";
              // If user passes something like "book" without trailing slash, still treat as directory
              if (p && !p.includes(".")) return "directory";
              return undefined;

            function bookLocationShard(id) {
              var raw = String(id || "").trim();
              if (/^\d+$/.test(raw)) {
                var value = Number(raw) % 100;
                return String(value).padStart(2, "0");
              }
              var total = 0;
              for (var i = 0; i < raw.length; i++) total = (total + raw.charCodeAt(i)) % 100;
              return String(total).padStart(2, "0");
            }

            function isLocalPreviewHost() {
              var host = String((window.location && window.location.hostname) || "").trim().toLowerCase();

            }

              var path = source

                : `/books/api/book-locations/${shard}.json?v=${Date.now()}`;
              return fetch(path, { cache: "no-store" })
                .then(function(response){
                  if (!response.ok) throw new Error(`book-locations fetch failed (${response.status})`);

                .then(function(payload){
                  var items = payload && payload.items ? payload.items : {};
                  var item = items && items[id] ? items[id] : null;
                  return item || null;
                });
